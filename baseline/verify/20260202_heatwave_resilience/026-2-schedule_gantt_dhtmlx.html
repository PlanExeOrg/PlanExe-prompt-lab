    {
      "id": "b4d2e621-b8b7-4720-b52d-5a14de0b996c",
      "text": "Identify potential NGO partners",
      "custom_tooltip": "<b>Identify potential NGO partners</b><br>Objective: Identify local NGOs with experience in public health, community outreach, and vulnerable population support.\nScope: Research and compile a list of NGOs operating in Thessaloniki that align with the project&#x27;s goals.\nSteps: 1. Conduct online research. 2. Consult with local authorities. 3. Review NGO websites and reports. 4. Create a shortlist of potential partners.\nDeliverables: A list of potential NGO partners with contact information and a brief description of their relevant experience.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Community Outreach Coordinator</li><li>Researcher</li></ul>",
      "start_date": "2026-05-15",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "1c8419bb-5c51-466a-9f23-fc384e905703 SS",
      "parent": "1c8419bb-5c51-466a-9f23-fc384e905703"
    },
    {
      "id": "04ab485b-06b6-4a86-a045-10edf069e632",
      "text": "Assess NGO capacity and alignment",
      "custom_tooltip": "<b>Assess NGO capacity and alignment</b><br>Objective: Evaluate the capacity and alignment of shortlisted NGOs with the project&#x27;s objectives and requirements.\nScope: Assess the NGOs&#x27; resources, expertise, and willingness to participate in the heat response program.\nSteps: 1. Send out questionnaires to shortlisted NGOs. 2. Conduct interviews with key personnel. 3. Review their past performance and financial stability. 4. Assess their understanding of GDPR compliance.\nDeliverables: A detailed assessment report for each shortlisted NGO, including their capacity, alignment, and potential contributions to the project.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Community Outreach Coordinator</li><li>GDPR Compliance Officer</li></ul>",
      "start_date": "2026-05-17",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "b4d2e621-b8b7-4720-b52d-5a14de0b996c FS",
      "parent": "1c8419bb-5c51-466a-9f23-fc384e905703"
    },
    {
      "id": "212529f4-1c6f-42c8-8618-04957f491b46",
      "text": "Negotiate partnership agreements",
      "custom_tooltip": "<b>Negotiate partnership agreements</b><br>Objective: Negotiate and finalize partnership agreements with selected NGOs, outlining roles, responsibilities, and resource allocation.\nScope: Develop legally sound and mutually beneficial agreements that ensure effective collaboration and accountability.\nSteps: 1. Draft partnership agreement templates. 2. Conduct negotiation meetings with selected NGOs. 3. Revise agreements based on feedback. 4. Obtain legal review and approval.\nDeliverables: Signed partnership agreements with selected NGOs, clearly defining roles, responsibilities, and resource allocation.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Legal Counsel</li><li>Community Outreach Coordinator</li></ul>",
      "start_date": "2026-05-19",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "04ab485b-06b6-4a86-a045-10edf069e632 FS",
      "parent": "1c8419bb-5c51-466a-9f23-fc384e905703"
    },
    {
      "id": "d1bb7d7c-8857-473e-b308-70afc32fcba3",
      "text": "Establish communication protocols",
      "custom_tooltip": "<b>Establish communication protocols</b><br>Objective: Establish clear communication protocols with partner NGOs to ensure effective information sharing and coordination.\nScope: Define communication channels, reporting requirements, and escalation procedures for addressing issues and resolving conflicts.\nSteps: 1. Develop a communication plan. 2. Conduct training sessions for NGO staff. 3. Establish regular meetings and reporting schedules. 4. Implement a system for tracking and resolving issues.\nDeliverables: A documented communication plan and established communication channels with partner NGOs.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Community Outreach Coordinator</li><li>Communications Specialist</li></ul>",
      "start_date": "2026-05-21",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "1c8419bb-5c51-466a-9f23-fc384e905703 FF, 212529f4-1c6f-42c8-8618-04957f491b46 FS",
      "parent": "1c8419bb-5c51-466a-9f23-fc384e905703"
    },
    {
      "id": "8b10a98f-9381-42f8-8a51-63718dae9410",
      "text": "Establish Partnerships with Healthcare Providers",
      "custom_tooltip": "<b>Establish Partnerships with Healthcare Providers</b>",
      "progress": 0,
      "open": true,
      "meta": "1c8419bb-5c51-466a-9f23-fc384e905703 FS",
      "parent": "4579fe9b-b0c8-4a2f-98ab-ca2d94436708",
      "type": "project"
    },
    {
      "id": "58c3639b-70a2-45ac-8729-46812ac32dee",
      "text": "Identify Key Healthcare Stakeholders",
      "custom_tooltip": "<b>Identify Key Healthcare Stakeholders</b><br>Identify key individuals and departments within hospitals, emergency services, and primary care facilities to engage with the program. This includes understanding their roles, responsibilities, and existing workflows related to heatwave response.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Community Outreach Coordinator</li><li>Healthcare Liaison</li></ul>",
      "start_date": "2026-05-23",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "8b10a98f-9381-42f8-8a51-63718dae9410 SS",
      "parent": "8b10a98f-9381-42f8-8a51-63718dae9410"
    },
    {
      "id": "81109f1f-abe1-4115-9a24-a5bffbc3e7a5",
      "text": "Develop Partnership Agreements",
      "custom_tooltip": "<b>Develop Partnership Agreements</b><br>Create formal partnership agreements outlining the roles, responsibilities, and data sharing protocols for each healthcare provider. Ensure compliance with GDPR and other relevant regulations.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Legal Counsel</li><li>Healthcare Liaison</li></ul>",
      "start_date": "2026-05-25",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "58c3639b-70a2-45ac-8729-46812ac32dee FS",
      "parent": "8b10a98f-9381-42f8-8a51-63718dae9410"
    },
    {
      "id": "6f7e1516-4ad2-4a74-93c4-f78c50c04c5a",
      "text": "Establish Communication Protocols",
      "custom_tooltip": "<b>Establish Communication Protocols</b><br>Define clear communication channels and protocols for sharing information about heat alerts, patient referrals, and program updates between the program and healthcare providers. This includes establishing contact lists, communication schedules, and escalation procedures.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>IT Specialist</li><li>Healthcare Liaison</li></ul>",
      "start_date": "2026-05-27",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "81109f1f-abe1-4115-9a24-a5bffbc3e7a5 FS",
      "parent": "8b10a98f-9381-42f8-8a51-63718dae9410"
    },
    {
      "id": "aa402e02-ffaa-45f1-959d-5beeec3929e3",
      "text": "Conduct Training for Healthcare Staff",
      "custom_tooltip": "<b>Conduct Training for Healthcare Staff</b><br>Provide training to healthcare staff on heat-related illnesses, program services, and referral procedures. This includes developing training materials, scheduling training sessions, and tracking attendance.<br><b>Resources needed:</b><br><ul><li>Healthcare Liaison</li><li>Medical Experts</li><li>Training Coordinator</li></ul>",
      "start_date": "2026-05-29",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "6f7e1516-4ad2-4a74-93c4-f78c50c04c5a FS",
      "parent": "8b10a98f-9381-42f8-8a51-63718dae9410"
    },
    {
      "id": "a2ec0418-af8d-4791-a22c-c33077273d6c",
      "text": "Integrate Program into Healthcare Workflows",
      "custom_tooltip": "<b>Integrate Program into Healthcare Workflows</b><br>Work with healthcare providers to integrate the heatwave response program into their existing workflows. This includes developing referral forms, updating patient intake procedures, and providing access to program resources.<br><b>Resources needed:</b><br><ul><li>Healthcare Liaison</li><li>IT Specialist</li><li>Healthcare Providers</li></ul>",
      "start_date": "2026-05-31",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "8b10a98f-9381-42f8-8a51-63718dae9410 FF, aa402e02-ffaa-45f1-959d-5beeec3929e3 FS",
      "parent": "8b10a98f-9381-42f8-8a51-63718dae9410"
    },
    {
      "id": "6056cc0a-a753-463f-946a-f8049d1068f0",
      "text": "Establish Partnerships with Transport Services",
      "custom_tooltip": "<b>Establish Partnerships with Transport Services</b>",
      "progress": 0,
      "open": true,
      "meta": "8b10a98f-9381-42f8-8a51-63718dae9410 FS",
      "parent": "4579fe9b-b0c8-4a2f-98ab-ca2d94436708",
      "type": "project"
    },
    {
      "id": "067fbbfd-b15d-45cb-82f9-d8efb96a736b",
      "text": "Identify potential transport service providers",
      "custom_tooltip": "<b>Identify potential transport service providers</b><br>Research and identify a pool of potential taxi/transport service providers in Thessaloniki that meet the program&#x27;s requirements (e.g., accessibility, availability, cost).<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Procurement Specialist</li><li>Research Assistant</li></ul>",
      "start_date": "2026-06-02",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "6056cc0a-a753-463f-946a-f8049d1068f0 SS",
      "parent": "6056cc0a-a753-463f-946a-f8049d1068f0"
    },
    {
      "id": "a0ef3f0c-3a6b-461d-a9bc-e7d569ad02f5",
      "text": "Assess provider capabilities and compliance",
      "custom_tooltip": "<b>Assess provider capabilities and compliance</b><br>Evaluate the identified transport providers based on their capacity, vehicle accessibility, insurance coverage, driver qualifications, and compliance with relevant regulations.<br><b>Resources needed:</b><br><ul><li>Procurement Specialist</li><li>Legal Counsel</li><li>Accessibility Consultant</li></ul>",
      "start_date": "2026-06-05",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "067fbbfd-b15d-45cb-82f9-d8efb96a736b FS",
      "parent": "6056cc0a-a753-463f-946a-f8049d1068f0"
    },
    {
      "id": "0c1ba7f9-e156-454e-b30d-1e037aae3f75",
      "text": "Negotiate contract terms and service level agreements",
      "custom_tooltip": "<b>Negotiate contract terms and service level agreements</b><br>Negotiate contract terms with selected transport providers, including pricing, service availability, response times, data privacy (GDPR compliance), and service level agreements (SLAs).<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Procurement Specialist</li><li>Legal Counsel</li></ul>",
      "start_date": "2026-06-08",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "a0ef3f0c-3a6b-461d-a9bc-e7d569ad02f5 FS",
      "parent": "6056cc0a-a753-463f-946a-f8049d1068f0"
    },
    {
      "id": "d4fcbefe-0988-46dd-b7c6-3874446e15bc",
      "text": "Formalize agreements with transport providers",
      "custom_tooltip": "<b>Formalize agreements with transport providers</b><br>Finalize and execute partnership agreements with the chosen taxi/transport providers, ensuring all legal and contractual requirements are met. Establish communication protocols and reporting mechanisms.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Legal Counsel</li><li>Administrative Assistant</li></ul>",
      "start_date": "2026-06-11",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "6056cc0a-a753-463f-946a-f8049d1068f0 FF, 0c1ba7f9-e156-454e-b30d-1e037aae3f75 FS",
      "parent": "6056cc0a-a753-463f-946a-f8049d1068f0"
    },
    {
      "id": "bf843028-3811-4956-be63-9f83bb5e2d17",
      "text": "Procure Cooling Center Equipment",
      "custom_tooltip": "<b>Procure Cooling Center Equipment</b>",
      "progress": 0,
      "open": true,
      "meta": "6056cc0a-a753-463f-946a-f8049d1068f0 FS",
      "parent": "4579fe9b-b0c8-4a2f-98ab-ca2d94436708",
      "type": "project"
    },
    {
      "id": "720d46b7-dfbc-4ccd-92ac-c52f6db7923c",
      "text": "Define Cooling Center Equipment Specifications",
      "custom_tooltip": "<b>Define Cooling Center Equipment Specifications</b><br>Determine the specific requirements for cooling center equipment, including fans, water dispensers, seating, and any other necessary items. This involves considering factors such as capacity, energy efficiency, durability, and compliance with safety standards.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Facilities Manager</li><li>Health and Safety Officer</li></ul>",
      "start_date": "2026-06-14",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "bf843028-3811-4956-be63-9f83bb5e2d17 SS",
      "parent": "bf843028-3811-4956-be63-9f83bb5e2d17"
    },
    {
      "id": "7382410f-7d59-4d57-a2b6-0879fd1de50f",
      "text": "Identify Potential Equipment Suppliers",
      "custom_tooltip": "<b>Identify Potential Equipment Suppliers</b><br>Research and identify potential suppliers of cooling center equipment. This includes gathering information on their product offerings, pricing, delivery timelines, and reputation. Prioritize suppliers with a proven track record of providing high-quality equipment and reliable service.<br><b>Resources needed:</b><br><ul><li>Procurement Specialist</li><li>Research Assistant</li></ul>",
      "start_date": "2026-06-18",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "720d46b7-dfbc-4ccd-92ac-c52f6db7923c FS",
      "parent": "bf843028-3811-4956-be63-9f83bb5e2d17"
    },
    {
      "id": "f8c92ce0-c030-4dd8-bbbf-a803678d6853",
      "text": "Obtain Quotes and Evaluate Proposals",
      "custom_tooltip": "<b>Obtain Quotes and Evaluate Proposals</b><br>Request quotes from multiple suppliers for the required cooling center equipment. Evaluate the proposals based on factors such as price, quality, delivery timeline, warranty, and supplier reputation. Conduct a thorough cost-benefit analysis to determine the most suitable option.<br><b>Resources needed:</b><br><ul><li>Procurement Specialist</li><li>Project Manager</li></ul>",
      "start_date": "2026-06-22",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "7382410f-7d59-4d57-a2b6-0879fd1de50f FS",
      "parent": "bf843028-3811-4956-be63-9f83bb5e2d17"
    },
    {
      "id": "68fd87bd-81b3-4ba4-a7c8-72326bf62ff8",
      "text": "Finalize Purchase Orders and Contracts",
      "custom_tooltip": "<b>Finalize Purchase Orders and Contracts</b><br>Prepare and finalize purchase orders or contracts with the selected equipment suppliers. Ensure that the contracts clearly outline the equipment specifications, delivery terms, payment schedule, warranty provisions, and any other relevant details. Obtain legal review of the contracts to ensure compliance with applicable laws and regulations.<br><b>Resources needed:</b><br><ul><li>Procurement Specialist</li><li>Legal Counsel</li><li>Project Manager</li></ul>",
      "start_date": "2026-06-26",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "f8c92ce0-c030-4dd8-bbbf-a803678d6853 FS",
      "parent": "bf843028-3811-4956-be63-9f83bb5e2d17"
    },
    {
      "id": "b61325cf-9460-4f03-804e-13b4bf491c61",
      "text": "Coordinate Equipment Delivery and Installation",
      "custom_tooltip": "<b>Coordinate Equipment Delivery and Installation</b><br>Coordinate the delivery and installation of the cooling center equipment at the designated locations. This involves working closely with the suppliers, facilities managers, and installation teams to ensure that the equipment is delivered on time and installed correctly. Conduct inspections to verify that the equipment meets the required specifications and is functioning properly.<br><b>Resources needed:</b><br><ul><li>Logistics Coordinator</li><li>Facilities Manager</li><li>Installation Team</li></ul>",
      "start_date": "2026-06-30",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "bf843028-3811-4956-be63-9f83bb5e2d17 FF, 68fd87bd-81b3-4ba4-a7c8-72326bf62ff8 FS",
      "parent": "bf843028-3811-4956-be63-9f83bb5e2d17"
    },
    {
      "id": "770b8213-7040-4d97-bbe7-eccbb0ed50ee",
      "text": "Procure Home Intervention Supplies",
      "custom_tooltip": "<b>Procure Home Intervention Supplies</b>",
      "progress": 0,
      "open": true,
      "meta": "bf843028-3811-4956-be63-9f83bb5e2d17 FS",
      "parent": "4579fe9b-b0c8-4a2f-98ab-ca2d94436708",
      "type": "project"
    },
    {
      "id": "327c80b3-e466-437b-9b03-f8a442667591",
      "text": "Research and select suppliers",
      "custom_tooltip": "<b>Research and select suppliers</b><br>Identify potential suppliers for home intervention supplies (shading kits, blinds, fans, hydration supplies, thermometers/hygrometers). Evaluate suppliers based on cost, quality, and delivery time.<br><b>Resources needed:</b><br><ul><li>Procurement specialist</li><li>Project manager</li></ul>",
      "start_date": "2026-07-04",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "770b8213-7040-4d97-bbe7-eccbb0ed50ee SS",
      "parent": "770b8213-7040-4d97-bbe7-eccbb0ed50ee"
    },
    {
      "id": "bb07ad8a-278a-4565-b755-bf8814a21127",
      "text": "Negotiate contracts with suppliers",
      "custom_tooltip": "<b>Negotiate contracts with suppliers</b><br>Negotiate pricing, delivery schedules, and payment terms with selected suppliers. Ensure contracts include quality guarantees and contingency plans for supply chain disruptions.<br><b>Resources needed:</b><br><ul><li>Procurement specialist</li><li>Legal counsel</li></ul>",
      "start_date": "2026-07-07",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "327c80b3-e466-437b-9b03-f8a442667591 FS",
      "parent": "770b8213-7040-4d97-bbe7-eccbb0ed50ee"
    },
    {
      "id": "cff7edc6-d9d9-4b08-9908-8936257350d3",
      "text": "Establish inventory management system",
      "custom_tooltip": "<b>Establish inventory management system</b><br>Set up a system for tracking inventory levels, managing storage, and ensuring timely distribution of home intervention supplies. This includes defining storage locations and transportation logistics.<br><b>Resources needed:</b><br><ul><li>Logistics coordinator</li><li>Inventory management software</li></ul>",
      "start_date": "2026-07-10",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "bb07ad8a-278a-4565-b755-bf8814a21127 FS",
      "parent": "770b8213-7040-4d97-bbe7-eccbb0ed50ee"
    },
    {
      "id": "d39b1534-26b1-4132-896b-eb78d37b6982",
      "text": "Coordinate delivery and storage",
      "custom_tooltip": "<b>Coordinate delivery and storage</b><br>Oversee the delivery of home intervention supplies to designated storage locations. Ensure proper storage conditions to prevent damage or spoilage.<br><b>Resources needed:</b><br><ul><li>Logistics coordinator</li><li>Warehouse staff</li></ul>",
      "start_date": "2026-07-13",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "cff7edc6-d9d9-4b08-9908-8936257350d3 FS",
      "parent": "770b8213-7040-4d97-bbe7-eccbb0ed50ee"
    },
    {
      "id": "6fe301a2-9605-44d4-b3a8-111ebb2936cd",
      "text": "Quality control and inspection",
      "custom_tooltip": "<b>Quality control and inspection</b><br>Inspect delivered supplies to ensure they meet quality standards and specifications. Address any discrepancies or defects with suppliers.<br><b>Resources needed:</b><br><ul><li>Quality control inspector</li><li>Procurement specialist</li></ul>",
      "start_date": "2026-07-16",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "770b8213-7040-4d97-bbe7-eccbb0ed50ee FF, d39b1534-26b1-4132-896b-eb78d37b6982 FS",
      "parent": "770b8213-7040-4d97-bbe7-eccbb0ed50ee"
    },
    {
      "id": "bb5dccac-138c-4784-af2e-185e350fb7d1",
      "text": "Procure Communication Materials",
      "custom_tooltip": "<b>Procure Communication Materials</b>",
      "progress": 0,
      "open": true,
      "meta": "770b8213-7040-4d97-bbe7-eccbb0ed50ee FS",
      "parent": "4579fe9b-b0c8-4a2f-98ab-ca2d94436708",
      "type": "project"
    },
    {
      "id": "e9303dc8-39d6-4738-9b8d-56f11f7c3a94",
      "text": "Design Communication Materials",
      "custom_tooltip": "<b>Design Communication Materials</b><br>Create visually appealing and informative flyers, posters, and digital graphics for the heatwave response program. Ensure materials are culturally sensitive and accessible to diverse audiences. Involve graphic designers and communication specialists.<br><b>Resources needed:</b><br><ul><li>Graphic designers</li><li>Communication specialists</li><li>Translation services</li><li>Design software</li></ul>",
      "start_date": "2026-07-19",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "bb5dccac-138c-4784-af2e-185e350fb7d1 SS",
      "parent": "bb5dccac-138c-4784-af2e-185e350fb7d1"
    },
    {
      "id": "4d01ae28-8c47-4105-8f88-a9ae2427d92b",
      "text": "Translate Materials into Multiple Languages",
      "custom_tooltip": "<b>Translate Materials into Multiple Languages</b><br>Translate all communication materials into languages spoken by significant vulnerable populations in Thessaloniki, including Greek, Arabic, and other relevant languages. Use professional translation services to ensure accuracy and cultural appropriateness.<br><b>Resources needed:</b><br><ul><li>Translation services</li><li>Reviewers fluent in target languages</li></ul>",
      "start_date": "2026-07-22",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "e9303dc8-39d6-4738-9b8d-56f11f7c3a94 FS",
      "parent": "bb5dccac-138c-4784-af2e-185e350fb7d1"
    },
    {
      "id": "2bf16f6c-c0e6-4ad5-9858-7e6ee4bb3245",
      "text": "Procure Printing Services",
      "custom_tooltip": "<b>Procure Printing Services</b><br>Obtain quotes from multiple printing vendors for flyers and posters. Select a vendor based on cost, quality, and turnaround time. Ensure the vendor can handle large print runs and deliver materials to designated locations.<br><b>Resources needed:</b><br><ul><li>Procurement specialist</li><li>Printing vendors</li></ul>",
      "start_date": "2026-07-25",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "4d01ae28-8c47-4105-8f88-a9ae2427d92b FS",
      "parent": "bb5dccac-138c-4784-af2e-185e350fb7d1"
    },
    {
      "id": "da9ccb57-d7c1-4d52-a2c0-97c88bf3088b",
      "text": "Set Up SMS Platform",
      "custom_tooltip": "<b>Set Up SMS Platform</b><br>Select and configure an SMS platform for sending heat alert messages to enrolled residents. Ensure the platform is reliable, scalable, and GDPR-compliant. Integrate the platform with the program&#x27;s database of vulnerable residents.<br><b>Resources needed:</b><br><ul><li>IT specialist</li><li>SMS platform provider</li><li>Data security expert</li></ul>",
      "start_date": "2026-07-28",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "2bf16f6c-c0e6-4ad5-9858-7e6ee4bb3245 FS",
      "parent": "bb5dccac-138c-4784-af2e-185e350fb7d1"
    },
    {
      "id": "6d762985-3d0f-4228-8168-419a118f2040",
      "text": "Distribute Communication Materials",
      "custom_tooltip": "<b>Distribute Communication Materials</b><br>Distribute flyers and posters to cooling centers, community centers, healthcare facilities, and other locations frequented by vulnerable populations. Coordinate with outreach teams to distribute materials during home visits and community events.<br><b>Resources needed:</b><br><ul><li>Outreach teams</li><li>Volunteers</li><li>Transportation</li></ul>",
      "start_date": "2026-07-31",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "bb5dccac-138c-4784-af2e-185e350fb7d1 FF, da9ccb57-d7c1-4d52-a2c0-97c88bf3088b FS",
      "parent": "bb5dccac-138c-4784-af2e-185e350fb7d1"
    },
    {
      "id": "b9e5f811-cc46-493d-8a70-205700add6cb",
      "text": "Contract Handyperson Services",
      "custom_tooltip": "<b>Contract Handyperson Services</b>",
      "progress": 0,
      "open": true,
      "meta": "4579fe9b-b0c8-4a2f-98ab-ca2d94436708 FF, bb5dccac-138c-4784-af2e-185e350fb7d1 FS",
      "parent": "4579fe9b-b0c8-4a2f-98ab-ca2d94436708",
      "type": "project"
    },
    {
      "id": "a928f5be-3990-4a0b-bd5d-784ce4fea6d5",
      "text": "Identify potential handyperson services",
      "custom_tooltip": "<b>Identify potential handyperson services</b><br>Objective: Identify qualified and reliable handyperson services in Thessaloniki.\nScope: Research local services, check online reviews, and gather contact information.\nSteps: 1. Online search. 2. Check business directories. 3. Contact local community centers for recommendations. 4. Compile a list of at least 10 potential services.\nDeliverables: A list of potential handyperson services with contact information and preliminary ratings.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Internet access</li><li>Phone</li></ul>",
      "start_date": "2026-08-03",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "b9e5f811-cc46-493d-8a70-205700add6cb SS",
      "parent": "b9e5f811-cc46-493d-8a70-205700add6cb"
    },
    {
      "id": "71884ef9-15c1-46fe-882b-786cd31695a2",
      "text": "Vet handyperson services qualifications",
      "custom_tooltip": "<b>Vet handyperson services qualifications</b><br>Objective: Verify the qualifications, licenses, and insurance of potential handyperson services.\nScope: Check licenses, insurance coverage, and references.\nSteps: 1. Contact each service on the list. 2. Request copies of licenses and insurance. 3. Verify licenses with relevant authorities. 4. Check references from previous clients.\nDeliverables: A list of vetted handyperson services with verified qualifications.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Administrative Assistant</li><li>Phone</li><li>Access to licensing databases</li></ul>",
      "start_date": "2026-08-06",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "a928f5be-3990-4a0b-bd5d-784ce4fea6d5 FS",
      "parent": "b9e5f811-cc46-493d-8a70-205700add6cb"
    },
    {
      "id": "ba94c46b-3554-482e-83a1-af81b6c03ed5",
      "text": "Negotiate service agreements and rates",
      "custom_tooltip": "<b>Negotiate service agreements and rates</b><br>Objective: Negotiate service agreements and rates with qualified handyperson services.\nScope: Obtain quotes, negotiate terms, and finalize agreements.\nSteps: 1. Request quotes from vetted services. 2. Compare quotes and negotiate rates. 3. Draft service agreements outlining scope of work, payment terms, and liability. 4. Finalize agreements with selected services.\nDeliverables: Signed service agreements with handyperson services.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Legal Counsel</li><li>Contract templates</li></ul>",
      "start_date": "2026-08-09",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "71884ef9-15c1-46fe-882b-786cd31695a2 FS",
      "parent": "b9e5f811-cc46-493d-8a70-205700add6cb"
    },
    {
      "id": "c5f15359-d4f7-442b-8a15-a9f1dec79f4e",
      "text": "Establish service scheduling process",
      "custom_tooltip": "<b>Establish service scheduling process</b><br>Objective: Develop a system for scheduling handyperson services for home interventions.\nScope: Create a process for residents to request services and for the project team to schedule and track appointments.\nSteps: 1. Develop a request form for residents. 2. Create a scheduling calendar. 3. Train staff on the scheduling process. 4. Implement a system for tracking completed services.\nDeliverables: A documented service scheduling process and a tracking system.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Administrative Assistant</li><li>Scheduling software</li></ul>",
      "start_date": "2026-08-12",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "b9e5f811-cc46-493d-8a70-205700add6cb FF, ba94c46b-3554-482e-83a1-af81b6c03ed5 FS",
      "parent": "b9e5f811-cc46-493d-8a70-205700add6cb"
    },

    {
      "id": "6b539ce1-7546-449d-bc5a-48df1ff31396",
      "text": "Establish Cooling Centers",
      "custom_tooltip": "<b>Establish Cooling Centers</b>",
      "progress": 0,
      "open": true,
      "meta": "bcec75a7-c131-4e8d-a001-512991977bfd SS",
      "parent": "bcec75a7-c131-4e8d-a001-512991977bfd",
      "type": "project"
    },
    {
      "id": "9fc51057-c435-47da-ab3f-36854c148121",
      "text": "Identify potential cooling center locations",
      "custom_tooltip": "<b>Identify potential cooling center locations</b><br>Objective: Identify suitable locations for cooling centers based on proximity to vulnerable populations, accessibility, and available amenities.\nScope: This includes surveying municipal buildings, community centers, and other potential sites.\nSteps: 1. Review demographic data to identify areas with high concentrations of vulnerable populations. 2. Conduct site visits to assess suitability. 3. Evaluate accessibility for individuals with mobility limitations. 4. Assess available amenities (e.g., restrooms, water fountains).\nDeliverables: A list of potential cooling center locations with detailed site assessments.<br><b>Resources needed:</b><br><ul><li>GIS data</li><li>Community Outreach Coordinator</li><li>Municipal Staff</li><li>Accessibility Consultant</li></ul>",
      "start_date": "2026-08-15",
      "duration": 6.0,
      "progress": 0,
      "open": true,
      "meta": "6b539ce1-7546-449d-bc5a-48df1ff31396 SS",
      "parent": "6b539ce1-7546-449d-bc5a-48df1ff31396"
    },
    {
      "id": "a3667025-1fba-46cd-b992-1d4f01275ed7",
      "text": "Secure agreements for cooling center use",
      "custom_tooltip": "<b>Secure agreements for cooling center use</b><br>Objective: Obtain formal agreements for the use of selected cooling center locations.\nScope: This includes negotiating terms of use, securing necessary permits, and addressing liability concerns.\nSteps: 1. Negotiate terms of use with property owners or managers. 2. Obtain necessary permits from local authorities. 3. Address liability concerns through insurance or waivers. 4. Draft and finalize formal agreements.\nDeliverables: Signed agreements for the use of cooling center locations.<br><b>Resources needed:</b><br><ul><li>Program Manager</li><li>Legal Counsel</li><li>Municipal Staff</li></ul>",
      "start_date": "2026-08-21",
      "duration": 6.0,
      "progress": 0,
      "open": true,
      "meta": "9fc51057-c435-47da-ab3f-36854c148121 FS",
      "parent": "6b539ce1-7546-449d-bc5a-48df1ff31396"
    },
    {
      "id": "284b0129-b81a-4a96-bf4b-c7565322bf95",
      "text": "Equip cooling centers with necessary supplies",
      "custom_tooltip": "<b>Equip cooling centers with necessary supplies</b><br>Objective: Equip cooling centers with essential supplies to ensure a safe and comfortable environment for users.\nScope: This includes procuring fans, water dispensers, seating, and first-aid supplies.\nSteps: 1. Develop a list of required supplies. 2. Obtain quotes from suppliers. 3. Procure supplies and arrange for delivery. 4. Install equipment and organize supplies.\nDeliverables: Fully equipped cooling centers with necessary supplies.<br><b>Resources needed:</b><br><ul><li>Logistics Coordinator</li><li>Procurement Specialist</li><li>Volunteers</li></ul>",
      "start_date": "2026-08-27",
      "duration": 6.0,
      "progress": 0,
      "open": true,
      "meta": "a3667025-1fba-46cd-b992-1d4f01275ed7 FS",
      "parent": "6b539ce1-7546-449d-bc5a-48df1ff31396"
    },
    {
      "id": "a1bb10a8-d923-4baf-87a5-c964f2beadf0",
      "text": "Train staff and volunteers for cooling centers",
      "custom_tooltip": "<b>Train staff and volunteers for cooling centers</b><br>Objective: Train staff and volunteers on cooling center operations, emergency procedures, and communication protocols.\nScope: This includes providing training on heat-related illnesses, first aid, and de-escalation techniques.\nSteps: 1. Develop a training curriculum. 2. Schedule training sessions. 3. Conduct training sessions. 4. Assess staff and volunteer competency.\nDeliverables: Trained staff and volunteers capable of operating cooling centers effectively.<br><b>Resources needed:</b><br><ul><li>Training Specialist</li><li>Healthcare Professional</li><li>Community Outreach Coordinator</li></ul>",
      "start_date": "2026-09-02",
      "duration": 6.0,
      "progress": 0,
      "open": true,
      "meta": "6b539ce1-7546-449d-bc5a-48df1ff31396 FF, 284b0129-b81a-4a96-bf4b-c7565322bf95 FS",
      "parent": "6b539ce1-7546-449d-bc5a-48df1ff31396"
    },
    {
      "id": "774c6721-89f5-4a79-9a83-31b2af97f101",
      "text": "Conduct Targeted Outreach",
      "custom_tooltip": "<b>Conduct Targeted Outreach</b>",
      "progress": 0,
      "open": true,
      "meta": "6b539ce1-7546-449d-bc5a-48df1ff31396 FS",
      "parent": "bcec75a7-c131-4e8d-a001-512991977bfd",
      "type": "project"
    },
    {
      "id": "26a9d8c7-e11f-4675-b6b1-9ae4937fe49c",
      "text": "Identify vulnerable populations",
      "custom_tooltip": "<b>Identify vulnerable populations</b><br>Determine specific demographics and locations of vulnerable populations in Thessaloniki at high risk during heatwaves. Use existing data and partner with NGOs.<br><b>Resources needed:</b><br><ul><li>Demographic data</li><li>GIS software</li><li>Community outreach coordinator</li><li>NGO partners</li></ul>",
      "start_date": "2026-09-08",
      "duration": 12.0,
      "progress": 0,
      "open": true,
      "meta": "774c6721-89f5-4a79-9a83-31b2af97f101 SS",
      "parent": "774c6721-89f5-4a79-9a83-31b2af97f101"
    },
    {
      "id": "788c483c-e250-49d3-936a-640ce2c54912",
      "text": "Develop outreach materials",
      "custom_tooltip": "<b>Develop outreach materials</b><br>Create culturally sensitive and accessible outreach materials (flyers, brochures, SMS messages) in multiple languages to inform vulnerable populations about the program.<br><b>Resources needed:</b><br><ul><li>Communications specialist</li><li>Translation services</li><li>Graphic designer</li><li>Community outreach coordinator</li></ul>",
      "start_date": "2026-09-20",
      "duration": 12.0,
      "progress": 0,
      "open": true,
      "meta": "26a9d8c7-e11f-4675-b6b1-9ae4937fe49c FS",
      "parent": "774c6721-89f5-4a79-9a83-31b2af97f101"
    },
    {
      "id": "e7221cae-d345-471c-af1b-754b280da3ae",
      "text": "Train outreach teams",
      "custom_tooltip": "<b>Train outreach teams</b><br>Provide training to outreach teams on effective communication strategies, heatwave safety information, and program enrollment procedures.<br><b>Resources needed:</b><br><ul><li>Training materials</li><li>Trainers</li><li>Community outreach coordinator</li><li>Healthcare professionals</li></ul>",
      "start_date": "2026-10-02",
      "duration": 12.0,
      "progress": 0,
      "open": true,
      "meta": "788c483c-e250-49d3-936a-640ce2c54912 FS",
      "parent": "774c6721-89f5-4a79-9a83-31b2af97f101"
    },
    {
      "id": "41ebe5ba-45fe-418a-a180-90840791ec2d",
      "text": "Conduct community events",
      "custom_tooltip": "<b>Conduct community events</b><br>Organize community events in high-risk areas to raise awareness about the program and enroll vulnerable residents. Provide information, resources, and incentives.<br><b>Resources needed:</b><br><ul><li>Event organizers</li><li>Volunteers</li><li>Outreach materials</li><li>Venue</li><li>Incentives</li></ul>",
      "start_date": "2026-10-14",
      "duration": 12.0,
      "progress": 0,
      "open": true,
      "meta": "e7221cae-d345-471c-af1b-754b280da3ae FS",
      "parent": "774c6721-89f5-4a79-9a83-31b2af97f101"
    },
    {
      "id": "352040c9-c5d2-4bb5-b8d9-1712530d3876",
      "text": "Track outreach efforts and enrollment",
      "custom_tooltip": "<b>Track outreach efforts and enrollment</b><br>Monitor and track outreach activities, contact success rates, and program enrollment numbers to assess the effectiveness of outreach strategies and make adjustments as needed.<br><b>Resources needed:</b><br><ul><li>Data analyst</li><li>Database</li><li>Community outreach coordinator</li><li>Reporting tools</li></ul>",
      "start_date": "2026-10-26",
      "duration": 12.0,
      "progress": 0,
      "open": true,
      "meta": "774c6721-89f5-4a79-9a83-31b2af97f101 FF, 41ebe5ba-45fe-418a-a180-90840791ec2d FS",
      "parent": "774c6721-89f5-4a79-9a83-31b2af97f101"
    },
    {
      "id": "16e1d13b-99ca-4781-86c0-afcbec7dd769",
      "text": "Implement Home Interventions",
      "custom_tooltip": "<b>Implement Home Interventions</b>",
      "progress": 0,
      "open": true,
      "meta": "774c6721-89f5-4a79-9a83-31b2af97f101 FS",
      "parent": "bcec75a7-c131-4e8d-a001-512991977bfd",
      "type": "project"
    },
    {
      "id": "1c9627ef-b3a0-44ff-8a46-ab932330f0f4",
      "text": "Assess Home Suitability for Interventions",
      "custom_tooltip": "<b>Assess Home Suitability for Interventions</b><br>Conduct pre-installation assessments to determine the suitability of homes for different interventions, considering factors like housing type, insulation, and resident needs. This includes scheduling appointments, performing on-site evaluations, and documenting findings.<br><b>Resources needed:</b><br><ul><li>Handyperson</li><li>Community Outreach Coordinator</li><li>Assessment Checklist</li></ul>",
      "start_date": "2026-11-07",
      "duration": 15.0,
      "progress": 0,
      "open": true,
      "meta": "16e1d13b-99ca-4781-86c0-afcbec7dd769 SS",
      "parent": "16e1d13b-99ca-4781-86c0-afcbec7dd769"
    },
    {
      "id": "bbda9e6c-ba8e-4115-b82a-4bab2a7b77ff",
      "text": "Schedule Home Intervention Installations",
      "custom_tooltip": "<b>Schedule Home Intervention Installations</b><br>Coordinate with residents to schedule installation appointments, taking into account their availability and preferences. This involves contacting residents, confirming appointments, and managing the installation schedule.<br><b>Resources needed:</b><br><ul><li>Community Outreach Coordinator</li><li>Scheduling Software</li><li>Transportation</li></ul>",
      "start_date": "2026-11-22",
      "duration": 15.0,
      "progress": 0,
      "open": true,
      "meta": "1c9627ef-b3a0-44ff-8a46-ab932330f0f4 FS",
      "parent": "16e1d13b-99ca-4781-86c0-afcbec7dd769"
    },
    {
      "id": "498eab3d-b187-41e8-b2d6-a10a17dee099",
      "text": "Install Home Intervention Supplies",
      "custom_tooltip": "<b>Install Home Intervention Supplies</b><br>Install the selected home intervention supplies, such as shading kits, reflective blinds, and window fans, according to the assessment findings and manufacturer instructions. This includes transporting supplies, performing the installation, and ensuring proper functionality.<br><b>Resources needed:</b><br><ul><li>Handyperson</li><li>Installation Tools</li><li>Home Intervention Supplies</li></ul>",
      "start_date": "2026-12-07",
      "duration": 15.0,
      "progress": 0,
      "open": true,
      "meta": "bbda9e6c-ba8e-4115-b82a-4bab2a7b77ff FS",
      "parent": "16e1d13b-99ca-4781-86c0-afcbec7dd769"
    },
    {
      "id": "9cc4eba6-35d7-4b09-9c60-48cd42a67ea6",
      "text": "Provide Residents Usage Instructions",
      "custom_tooltip": "<b>Provide Residents Usage Instructions</b><br>Educate residents on the proper use and maintenance of the installed interventions, ensuring they understand how to maximize their effectiveness and safety. This includes providing written instructions, demonstrating usage techniques, and answering questions.<br><b>Resources needed:</b><br><ul><li>Community Outreach Coordinator</li><li>Instruction Manuals</li><li>Demonstration Materials</li></ul>",
      "start_date": "2026-12-22",
      "duration": 15.0,
      "progress": 0,
      "open": true,
      "meta": "498eab3d-b187-41e8-b2d6-a10a17dee099 FS",
      "parent": "16e1d13b-99ca-4781-86c0-afcbec7dd769"
    },
    {
      "id": "08f427b0-bc15-4ed4-a66d-b7db8b8e844f",
      "text": "Collect Post-Intervention Feedback",
      "custom_tooltip": "<b>Collect Post-Intervention Feedback</b><br>Gather feedback from residents on their satisfaction with the interventions and their impact on indoor temperature and comfort. This involves conducting post-installation surveys, collecting temperature data, and documenting resident experiences.<br><b>Resources needed:</b><br><ul><li>Data Analyst</li><li>Survey Forms</li><li>Thermometers/Hygrometers</li></ul>",
      "start_date": "2027-01-06",
      "duration": 15.0,
      "progress": 0,
      "open": true,
      "meta": "16e1d13b-99ca-4781-86c0-afcbec7dd769 FF, 9cc4eba6-35d7-4b09-9c60-48cd42a67ea6 FS",
      "parent": "16e1d13b-99ca-4781-86c0-afcbec7dd769"
    },
    {
      "id": "128bcc0c-4918-41dc-a4da-a523b1f802a5",
      "text": "Coordinate with Healthcare System",
      "custom_tooltip": "<b>Coordinate with Healthcare System</b>",
      "progress": 0,
      "open": true,
      "meta": "16e1d13b-99ca-4781-86c0-afcbec7dd769 FS",
      "parent": "bcec75a7-c131-4e8d-a001-512991977bfd",
      "type": "project"
    },
    {
      "id": "062a65f6-3fd8-431a-9923-7e36f955e266",
      "text": "Identify Key Healthcare Contacts",
      "custom_tooltip": "<b>Identify Key Healthcare Contacts</b><br>Identify key personnel within hospitals, emergency services, and primary care facilities to serve as points of contact for the heat response program. This includes gathering contact information and understanding their roles in heat-related illness response.<br><b>Resources needed:</b><br><ul><li>Program Manager</li><li>Health System Coordinator</li></ul>",
      "start_date": "2027-01-21",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "128bcc0c-4918-41dc-a4da-a523b1f802a5 SS",
      "parent": "128bcc0c-4918-41dc-a4da-a523b1f802a5"
    },
    {
      "id": "d0ffa46d-d32b-499e-bcbf-99f79cf20dc8",
      "text": "Establish Communication Protocols",
      "custom_tooltip": "<b>Establish Communication Protocols</b><br>Develop clear and concise communication protocols for sharing information about heat alerts, program updates, and patient referrals between the program and healthcare providers. This includes defining communication channels, frequency, and content.<br><b>Resources needed:</b><br><ul><li>Health System Coordinator</li><li>Communications Specialist</li></ul>",
      "start_date": "2027-01-23",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "062a65f6-3fd8-431a-9923-7e36f955e266 FS",
      "parent": "128bcc0c-4918-41dc-a4da-a523b1f802a5"
    },
    {
      "id": "1b9180e7-7adf-4f28-b7f4-2cdb5ba82be3",
      "text": "Conduct Training for Healthcare Staff",
      "custom_tooltip": "<b>Conduct Training for Healthcare Staff</b><br>Provide training sessions for healthcare staff on recognizing and treating heat-related illnesses, utilizing program resources, and adhering to communication protocols. This includes developing training materials and scheduling training sessions.<br><b>Resources needed:</b><br><ul><li>Health System Coordinator</li><li>Medical Professionals</li><li>Training Materials</li></ul>",
      "start_date": "2027-01-25",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "d0ffa46d-d32b-499e-bcbf-99f79cf20dc8 FS",
      "parent": "128bcc0c-4918-41dc-a4da-a523b1f802a5"
    },
    {
      "id": "cba3a011-91eb-4d54-a728-14907820dc95",
      "text": "Integrate Program into Healthcare Workflows",
      "custom_tooltip": "<b>Integrate Program into Healthcare Workflows</b><br>Work with healthcare providers to integrate the heat response program into their existing workflows, such as patient intake procedures, discharge planning, and emergency response protocols. This includes developing referral pathways and data sharing agreements.<br><b>Resources needed:</b><br><ul><li>Health System Coordinator</li><li>Healthcare Providers</li><li>Data Analyst/GDPR Compliance Officer</li></ul>",
      "start_date": "2027-01-27",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "1b9180e7-7adf-4f28-b7f4-2cdb5ba82be3 FS",
      "parent": "128bcc0c-4918-41dc-a4da-a523b1f802a5"
    },
    {
      "id": "271fbae2-00ef-4ba8-9c4d-02ee8c8f9734",
      "text": "Monitor Healthcare System Impact",
      "custom_tooltip": "<b>Monitor Healthcare System Impact</b><br>Establish a system for monitoring the impact of the heat response program on the healthcare system, such as tracking heat-related emergency room visits, hospital admissions, and mortality rates. This includes collecting and analyzing data to assess program effectiveness.<br><b>Resources needed:</b><br><ul><li>Data Analyst/GDPR Compliance Officer</li><li>Health System Coordinator</li></ul>",
      "start_date": "2027-01-29",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "128bcc0c-4918-41dc-a4da-a523b1f802a5 FF, cba3a011-91eb-4d54-a728-14907820dc95 FS",
      "parent": "128bcc0c-4918-41dc-a4da-a523b1f802a5"
    },
    {
      "id": "b89f4838-4de9-462e-aff3-01a7496693ee",
      "text": "Implement Worker Protection Measures",
      "custom_tooltip": "<b>Implement Worker Protection Measures</b>",
      "progress": 0,
      "open": true,
      "meta": "128bcc0c-4918-41dc-a4da-a523b1f802a5 FS",
      "parent": "bcec75a7-c131-4e8d-a001-512991977bfd",
      "type": "project"
    },
    {
      "id": "d2edccb6-90fe-4ff1-be94-ee67056c3a0a",
      "text": "Identify high-risk worker populations",
      "custom_tooltip": "<b>Identify high-risk worker populations</b><br>Identify specific worker groups most vulnerable to heat stress (e.g., construction, agriculture, delivery). Gather data on their work environments and existing safety measures.<br><b>Resources needed:</b><br><ul><li>Community Outreach Coordinator</li><li>Data Analyst</li><li>Occupational Health Specialist</li></ul>",
      "start_date": "2027-01-31",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "b89f4838-4de9-462e-aff3-01a7496693ee SS",
      "parent": "b89f4838-4de9-462e-aff3-01a7496693ee"
    },
    {
      "id": "8f134b5f-5cb8-4f3f-a471-3e6608f5da32",
      "text": "Develop tailored protection strategies",
      "custom_tooltip": "<b>Develop tailored protection strategies</b><br>Design specific heat safety protocols for each identified worker group, considering their unique work conditions and needs. This includes hydration strategies, rest break schedules, and appropriate clothing recommendations.<br><b>Resources needed:</b><br><ul><li>Occupational Health Specialist</li><li>Safety Engineer</li><li>Communications Specialist</li></ul>",
      "start_date": "2027-02-02",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "d2edccb6-90fe-4ff1-be94-ee67056c3a0a FS",
      "parent": "b89f4838-4de9-462e-aff3-01a7496693ee"
    },
    {
      "id": "71c9df56-d8c6-4cf8-8435-31f2a1afb316",
      "text": "Engage employers and unions",
      "custom_tooltip": "<b>Engage employers and unions</b><br>Present the tailored protection strategies to employers and unions, seeking their buy-in and commitment to implementation. Address any concerns and provide support for integrating the measures into their existing workflows.<br><b>Resources needed:</b><br><ul><li>Community Outreach Coordinator</li><li>Program Manager</li><li>Legal Counsel</li></ul>",
      "start_date": "2027-02-04",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "8f134b5f-5cb8-4f3f-a471-3e6608f5da32 FS",
      "parent": "b89f4838-4de9-462e-aff3-01a7496693ee"
    },
    {
      "id": "9a703420-aa62-4f87-b49c-73fc65448367",
      "text": "Distribute educational materials",
      "custom_tooltip": "<b>Distribute educational materials</b><br>Create and distribute informative materials (e.g., flyers, posters, online resources) to workers and employers, highlighting the risks of heat stress and the benefits of implementing the protection measures. Translate materials into relevant languages.<br><b>Resources needed:</b><br><ul><li>Communications Specialist</li><li>Graphic Designer</li><li>Translator</li></ul>",
      "start_date": "2027-02-06",

    {
      "id": "acc5b4b5-9cdf-4606-a102-f7f55a284da4",
      "text": "Define outreach data collection metrics",
      "custom_tooltip": "<b>Define outreach data collection metrics</b><br>Establish specific, measurable, achievable, relevant, and time-bound (SMART) metrics for evaluating outreach effectiveness. This includes defining key performance indicators (KPIs) such as contact success rate, enrollment rate, and referral rate.<br><b>Resources needed:</b><br><ul><li>Community Outreach Coordinator</li><li>Data Analyst</li><li>Program Manager</li></ul>",

    },
    {
      "id": "59d5d98f-58d2-4d12-a0f9-bb5d04c514a6",
      "text": "Design outreach data collection tools",
      "custom_tooltip": "<b>Design outreach data collection tools</b><br>Develop standardized data collection forms, surveys, and databases to capture relevant information from outreach activities. Ensure tools are user-friendly, culturally sensitive, and compliant with GDPR regulations.<br><b>Resources needed:</b><br><ul><li>Community Outreach Coordinator</li><li>Data Analyst</li><li>GDPR Compliance Officer</li><li>Communications Specialist</li></ul>",

    },
    {
      "id": "dd5ff25c-4b64-44e1-826a-7332205f8c80",
      "text": "Train outreach teams on data collection",
      "custom_tooltip": "<b>Train outreach teams on data collection</b><br>Provide comprehensive training to outreach teams on data collection procedures, including proper use of data collection tools, ethical considerations, and data privacy requirements. Conduct pilot testing to ensure understanding and proficiency.<br><b>Resources needed:</b><br><ul><li>Community Outreach Coordinator</li><li>Data Analyst</li><li>Training Specialist</li></ul>",

    },
    {
      "id": "2b7e75db-e272-4639-8a55-cb04d177c97b",
      "text": "Implement data quality control measures",
      "custom_tooltip": "<b>Implement data quality control measures</b><br>Establish procedures for verifying the accuracy and completeness of outreach data, including regular data audits, cross-validation checks, and feedback mechanisms. Address any data quality issues promptly and effectively.<br><b>Resources needed:</b><br><ul><li>Data Analyst</li><li>Community Outreach Coordinator</li><li>Program Manager</li></ul>",
      "start_date": "2027-04-03",
      "duration": 2.0,
      "progress": 0,
      "open": true,

    },
    {
      "id": "9b6c3518-a689-45d6-9ee5-469c8adabc92",
      "text": "Analyze Data and Generate Reports",
      "custom_tooltip": "<b>Analyze Data and Generate Reports</b>",

    {
      "id": "b38123b0-f54c-43cd-a907-a56af8d79f10",
      "text": "Clean and validate collected data",
      "custom_tooltip": "<b>Clean and validate collected data</b><br>Objective: Ensure data quality for analysis.\nScope: Review and correct inconsistencies, errors, and missing values in the collected data.\nSteps: 1. Import data into analysis software. 2. Identify and correct errors. 3. Handle missing data appropriately. 4. Validate data against expected ranges.\nDeliverables: Cleaned and validated datasets.<br><b>Resources needed:</b><br><ul><li>Data analyst</li><li>Data validation tools</li><li>Data cleaning scripts</li></ul>",
      "start_date": "2027-04-05",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "9b6c3518-a689-45d6-9ee5-469c8adabc92 SS",
      "parent": "9b6c3518-a689-45d6-9ee5-469c8adabc92"
    },
    {
      "id": "09132fb8-afb6-4a17-98b2-de85b46b2407",
      "text": "Perform statistical analysis",
      "custom_tooltip": "<b>Perform statistical analysis</b><br>Objective: Extract meaningful insights from the data.\nScope: Apply appropriate statistical methods to identify trends, correlations, and significant findings.\nSteps: 1. Select appropriate statistical tests. 2. Run statistical analyses using software. 3. Interpret results and identify key findings.\nDeliverables: Statistical analysis results and interpretations.<br><b>Resources needed:</b><br><ul><li>Statistician</li><li>Statistical software (e.g., R, SPSS)</li><li>Data analysis plan</li></ul>",
      "start_date": "2027-04-07",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "b38123b0-f54c-43cd-a907-a56af8d79f10 FS",
      "parent": "9b6c3518-a689-45d6-9ee5-469c8adabc92"
    },
    {
      "id": "5d0c44b5-c54a-4d20-b6df-6ea775f7e3c3",
      "text": "Visualize data for report clarity",
      "custom_tooltip": "<b>Visualize data for report clarity</b><br>Objective: Create clear and informative visualizations to communicate findings effectively.\nScope: Develop charts, graphs, and other visual aids to present data in an accessible manner.\nSteps: 1. Select appropriate visualization types. 2. Create visualizations using software. 3. Review visualizations for clarity and accuracy.\nDeliverables: Data visualizations (charts, graphs, etc.).<br><b>Resources needed:</b><br><ul><li>Data visualization specialist</li><li>Data visualization software (e.g., Tableau, Power BI)</li><li>Reporting guidelines</li></ul>",
      "start_date": "2027-04-09",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "09132fb8-afb6-4a17-98b2-de85b46b2407 FS",
      "parent": "9b6c3518-a689-45d6-9ee5-469c8adabc92"
    },
    {
      "id": "957f7a6d-efe8-4812-859b-dedbb815fd45",
      "text": "Write and review draft reports",
      "custom_tooltip": "<b>Write and review draft reports</b><br>Objective: Prepare comprehensive reports summarizing the findings and recommendations.\nScope: Document the methodology, results, and conclusions of the analysis in a clear and concise manner.\nSteps: 1. Write draft reports. 2. Review reports for accuracy and completeness. 3. Incorporate feedback and revise reports.\nDeliverables: Draft reports.<br><b>Resources needed:</b><br><ul><li>Report writer</li><li>Subject matter experts</li><li>Report template</li></ul>",
      "start_date": "2027-04-11",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "5d0c44b5-c54a-4d20-b6df-6ea775f7e3c3 FS",
      "parent": "9b6c3518-a689-45d6-9ee5-469c8adabc92"
    },
    {
      "id": "407720ae-5dcf-46a9-bf34-858edde1ff0c",
      "text": "Finalize and disseminate reports",
      "custom_tooltip": "<b>Finalize and disseminate reports</b><br>Objective: Publish and distribute the final reports to relevant stakeholders.\nScope: Ensure reports are accurate, complete, and accessible to the intended audience.\nSteps: 1. Finalize reports based on feedback. 2. Obtain necessary approvals. 3. Disseminate reports to stakeholders.\nDeliverables: Finalized and disseminated reports.<br><b>Resources needed:</b><br><ul><li>Project manager</li><li>Stakeholder list</li><li>Dissemination plan</li></ul>",
      "start_date": "2027-04-13",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "9b6c3518-a689-45d6-9ee5-469c8adabc92 FF, 957f7a6d-efe8-4812-859b-dedbb815fd45 FS",
      "parent": "9b6c3518-a689-45d6-9ee5-469c8adabc92"
    },

    {
      "id": "48912c97-caab-49e6-bb69-28a9b5d90d2a",
      "text": "Prepare Stakeholder Meeting Materials",
      "custom_tooltip": "<b>Prepare Stakeholder Meeting Materials</b><br>Objective: Compile all necessary documents and presentations for the stakeholder meetings.\nScope: Gather project updates, data analysis reports, and proposed corrective actions.\nSteps: 1. Collect relevant data and reports. 2. Create presentation slides. 3. Review materials with the project team. 4. Finalize and distribute materials to stakeholders.\nDeliverables: Meeting agenda, presentation slides, data analysis reports.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Data Analyst</li><li>Communications Specialist</li></ul>",

    {
      "id": "3f68f0ce-6eeb-43ef-9d46-03d83db676a9",
      "text": "Schedule Stakeholder Meetings",
      "custom_tooltip": "<b>Schedule Stakeholder Meetings</b><br>Objective: Coordinate and schedule meetings with key stakeholders to present project progress and discuss corrective actions.\nScope: Identify key stakeholders, determine meeting frequency, and secure meeting times.\nSteps: 1. Identify key stakeholders. 2. Determine meeting frequency and duration. 3. Send out meeting invitations. 4. Confirm attendance and finalize meeting schedule.\nDeliverables: Meeting schedule, confirmed attendee list.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Project Coordinator</li></ul>",
      "start_date": "2027-04-16",
      "duration": 1.0,
      "progress": 0,
      "open": true,
      "meta": "48912c97-caab-49e6-bb69-28a9b5d90d2a FS",
      "parent": "08f49e89-e995-4662-a4ea-53ef92ee0789"
    },
    {
      "id": "9f834885-5b35-409e-b086-6d0b71ca0594",
      "text": "Facilitate Stakeholder Meetings",
      "custom_tooltip": "<b>Facilitate Stakeholder Meetings</b><br>Objective: Conduct stakeholder meetings to present project findings, discuss corrective actions, and gather feedback.\nScope: Prepare meeting agenda, facilitate discussions, and document key decisions.\nSteps: 1. Review meeting agenda. 2. Present project findings and proposed corrective actions. 3. Facilitate discussions and gather feedback. 4. Document key decisions and action items.\nDeliverables: Meeting minutes, action item list.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Subject Matter Experts</li></ul>",
      "start_date": "2027-04-17",
      "duration": 1.0,
      "progress": 0,
      "open": true,
      "meta": "3f68f0ce-6eeb-43ef-9d46-03d83db676a9 FS",
      "parent": "08f49e89-e995-4662-a4ea-53ef92ee0789"
    },
    {
      "id": "84715abb-34b8-4492-83ac-fecd367fba1a",
      "text": "Document Stakeholder Feedback",
      "custom_tooltip": "<b>Document Stakeholder Feedback</b><br>Objective: Accurately record and organize all feedback received from stakeholders during the meetings.\nScope: Capture comments, suggestions, and concerns raised by stakeholders.\nSteps: 1. Take detailed notes during the meetings. 2. Transcribe and organize notes. 3. Summarize key feedback points. 4. Share feedback summary with the project team.\nDeliverables: Meeting notes, feedback summary report.<br><b>Resources needed:</b><br><ul><li>Project Coordinator</li><li>Project Manager</li></ul>",
      "start_date": "2027-04-18",
      "duration": 1.0,
      "progress": 0,
      "open": true,
      "meta": "08f49e89-e995-4662-a4ea-53ef92ee0789 FF, 9f834885-5b35-409e-b086-6d0b71ca0594 FS",

    },
    {
      "id": "35a15ea4-f546-4aaf-bcab-8815820b8c35",
      "text": "Implement Corrective Actions (as needed)",
      "custom_tooltip": "<b>Implement Corrective Actions (as needed)</b>",
      "progress": 0,
      "open": true,
      "meta": "8a43ebb1-1731-4cc0-9855-6e5180e02c42 FF, 08f49e89-e995-4662-a4ea-53ef92ee0789 FS",

    {
      "id": "db3d030c-f35c-42f6-95c9-61164432dfd3",
      "text": "Identify Root Cause of Issues",
      "custom_tooltip": "<b>Identify Root Cause of Issues</b><br>Analyze data and reports to pinpoint the underlying causes of identified problems or deviations from the project plan. This involves reviewing performance metrics, conducting interviews with stakeholders, and examining relevant documentation to understand the factors contributing to the issue.<br><b>Resources needed:</b><br><ul><li>Data Analyst</li><li>Project Manager</li><li>Subject Matter Experts</li></ul>",
      "start_date": "2027-04-19",
      "duration": 1.0,
      "progress": 0,
      "open": true,
      "meta": "35a15ea4-f546-4aaf-bcab-8815820b8c35 SS",
      "parent": "35a15ea4-f546-4aaf-bcab-8815820b8c35"
    },
    {
      "id": "92b8cfd6-5773-44ed-99e6-ae7069c19623",
      "text": "Develop Corrective Action Plan",
      "custom_tooltip": "<b>Develop Corrective Action Plan</b><br>Create a detailed plan outlining the specific steps required to address the identified root causes. This includes defining clear objectives, assigning responsibilities, establishing timelines, and identifying necessary resources. The plan should be realistic, measurable, and aligned with the overall project goals.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Team Leads</li><li>Subject Matter Experts</li></ul>",
      "start_date": "2027-04-20",
      "duration": 1.0,
      "progress": 0,
      "open": true,
      "meta": "db3d030c-f35c-42f6-95c9-61164432dfd3 FS",
      "parent": "35a15ea4-f546-4aaf-bcab-8815820b8c35"
    },
    {
      "id": "8b712991-a876-4d23-98b7-188a780c1d63",
      "text": "Implement Corrective Actions",
      "custom_tooltip": "<b>Implement Corrective Actions</b><br>Execute the corrective action plan by carrying out the defined steps. This may involve making changes to processes, procedures, or resource allocation. Regular monitoring and tracking of progress are essential to ensure that the actions are effective and on schedule.<br><b>Resources needed:</b><br><ul><li>Project Team</li><li>Contractors</li><li>Volunteers</li></ul>",
      "start_date": "2027-04-21",
      "duration": 1.0,
      "progress": 0,
      "open": true,
      "meta": "92b8cfd6-5773-44ed-99e6-ae7069c19623 FS",
      "parent": "35a15ea4-f546-4aaf-bcab-8815820b8c35"
    },
    {
      "id": "a48b51ed-9a38-46e4-b8fe-daf75a63a306",
      "text": "Monitor and Evaluate Effectiveness",
      "custom_tooltip": "<b>Monitor and Evaluate Effectiveness</b><br>Continuously track the impact of the implemented corrective actions on the identified issues. This involves collecting data, analyzing performance metrics, and gathering feedback from stakeholders. The evaluation should determine whether the actions are achieving the desired results and whether any further adjustments are needed.<br><b>Resources needed:</b><br><ul><li>Data Analyst</li><li>Project Manager</li><li>Stakeholders</li></ul>",
      "start_date": "2027-04-22",
      "duration": 1.0,
      "progress": 0,
      "open": true,
      "meta": "35a15ea4-f546-4aaf-bcab-8815820b8c35 FF, 8b712991-a876-4d23-98b7-188a780c1d63 FS",
      "parent": "35a15ea4-f546-4aaf-bcab-8815820b8c35"
    },

      "text": "Gather all project documentation",
      "custom_tooltip": "<b>Gather all project documentation</b><br>Collect all relevant documents, including project plans, reports, meeting minutes, and correspondence.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Team Members</li></ul>",

      "id": "2b2af1c9-9dee-4099-9301-c736f58a897a",
      "text": "Organize and index documents",
      "custom_tooltip": "<b>Organize and index documents</b><br>Organize the collected documents into a logical structure and create an index for easy retrieval.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Document Controller</li></ul>",

    {
      "id": "f0d93bd8-9486-4ca8-b344-49ed50c87014",
      "text": "Verify completeness of documentation",
      "custom_tooltip": "<b>Verify completeness of documentation</b><br>Review the organized documents to ensure that all required information is present and accurate.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Quality Assurance Team</li></ul>",

    {
      "id": "55f2b8a5-bb47-4c2f-8390-c5cdc4c7b422",
      "text": "Obtain sign-off on documentation",
      "custom_tooltip": "<b>Obtain sign-off on documentation</b><br>Submit the finalized documentation to relevant stakeholders for review and approval.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Stakeholders</li></ul>",

    {
      "id": "7f7fbd99-1588-4912-9cf0-bf0853cec994",
      "text": "Schedule stakeholder interviews",
      "custom_tooltip": "<b>Schedule stakeholder interviews</b><br>Objective: Arrange interviews with key stakeholders to gather feedback on project performance.\nScope: Identify and contact stakeholders, schedule interview times, and prepare interview questions.\nSteps: 1. Identify key stakeholders. 2. Draft interview questions. 3. Contact stakeholders to schedule interviews. 4. Confirm interview appointments.\nDeliverables: Interview schedule.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Project Coordinator</li></ul>",
      "start_date": "2027-04-27",
      "duration": 1.0,
      "progress": 0,
      "open": true,
      "meta": "4c81e4b8-3ba9-43aa-b7f9-793b10f7fe2e SS",
      "parent": "4c81e4b8-3ba9-43aa-b7f9-793b10f7fe2e"
    },
    {
      "id": "cc3b3698-ec5d-43af-8a09-1190d2675d52",
      "text": "Conduct stakeholder interviews",
      "custom_tooltip": "<b>Conduct stakeholder interviews</b><br>Objective: Conduct interviews with stakeholders to gather feedback on project successes, challenges, and lessons learned.\nScope: Conduct scheduled interviews, document responses, and ensure confidentiality.\nSteps: 1. Conduct interviews according to schedule. 2. Take detailed notes during interviews. 3. Ensure confidentiality of responses. 4. Thank stakeholders for their participation.\nDeliverables: Interview notes.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Project Coordinator</li></ul>",
      "start_date": "2027-04-28",
      "duration": 1.0,
      "progress": 0,
      "open": true,
      "meta": "7f7fbd99-1588-4912-9cf0-bf0853cec994 FS",
      "parent": "4c81e4b8-3ba9-43aa-b7f9-793b10f7fe2e"
    },
    {
      "id": "34bfaae9-d8a7-409b-9731-cd17ba9bd56e",
      "text": "Analyze interview data",
      "custom_tooltip": "<b>Analyze interview data</b><br>Objective: Analyze the collected interview data to identify key themes, trends, and insights related to project performance.\nScope: Review interview notes, categorize responses, and identify recurring themes.\nSteps: 1. Review interview notes. 2. Categorize responses based on key themes. 3. Identify trends and insights. 4. Summarize findings.\nDeliverables: Data analysis report.<br><b>Resources needed:</b><br><ul><li>Data Analyst</li><li>Project Manager</li></ul>",
      "start_date": "2027-04-29",
      "duration": 1.0,
      "progress": 0,
      "open": true,
      "meta": "cc3b3698-ec5d-43af-8a09-1190d2675d52 FS",
      "parent": "4c81e4b8-3ba9-43aa-b7f9-793b10f7fe2e"
    },
    {
      "id": "586f37b8-a38f-44c7-99a8-f273baf87a4e",
      "text": "Draft post-project review document",
      "custom_tooltip": "<b>Draft post-project review document</b><br>Objective: Prepare a comprehensive post-project review document summarizing project performance, lessons learned, and recommendations for future projects.\nScope: Compile findings from data analysis, document key project metrics, and develop recommendations.\nSteps: 1. Compile findings from data analysis. 2. Document key project metrics. 3. Develop recommendations for future projects. 4. Draft the post-project review document.\nDeliverables: Draft post-project review document.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Data Analyst</li></ul>",
      "start_date": "2027-04-30",
      "duration": 1.0,
      "progress": 0,
      "open": true,
      "meta": "34bfaae9-d8a7-409b-9731-cd17ba9bd56e FS",
      "parent": "4c81e4b8-3ba9-43aa-b7f9-793b10f7fe2e"
    },
    {
      "id": "4966f21f-ca3f-495d-9153-147744c0c0d0",
      "text": "Obtain feedback on review document",
      "custom_tooltip": "<b>Obtain feedback on review document</b><br>Objective: Circulate the draft post-project review document to stakeholders for feedback and revisions.\nScope: Distribute the document, collect feedback, and incorporate revisions.\nSteps: 1. Distribute the draft document to stakeholders. 2. Collect feedback and comments. 3. Incorporate revisions based on feedback. 4. Finalize the post-project review document.\nDeliverables: Final post-project review document.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Project Coordinator</li></ul>",
      "start_date": "2027-05-01",
      "duration": 1.0,
      "progress": 0,
      "open": true,
      "meta": "4c81e4b8-3ba9-43aa-b7f9-793b10f7fe2e FF, 586f37b8-a38f-44c7-99a8-f273baf87a4e FS",
      "parent": "4c81e4b8-3ba9-43aa-b7f9-793b10f7fe2e"
    },
    {
      "id": "d6a56221-accc-46f2-8a1e-fc44e3ac3a74",
      "text": "Disseminate Project Findings",
      "custom_tooltip": "<b>Disseminate Project Findings</b>",
      "progress": 0,

      "meta": "4c81e4b8-3ba9-43aa-b7f9-793b10f7fe2e FS",

    {
      "id": "5584cee2-6c6f-4873-b9c2-45291a767930",
      "text": "Prepare dissemination materials",
      "custom_tooltip": "<b>Prepare dissemination materials</b><br>Develop a concise summary of project findings, including key outcomes, lessons learned, and recommendations. Create visually appealing presentations, reports, and infographics suitable for different audiences.<br><b>Resources needed:</b><br><ul><li>Communications Specialist</li><li>Data Analyst</li><li>Graphic Designer</li></ul>",
      "start_date": "2027-05-02",
      "duration": 1.0,
      "progress": 0,
      "open": true,
      "meta": "d6a56221-accc-46f2-8a1e-fc44e3ac3a74 SS",
      "parent": "d6a56221-accc-46f2-8a1e-fc44e3ac3a74"
    },
    {
      "id": "fa10206c-e69b-4aea-94ba-977f6566b9b3",
      "text": "Identify target audiences",
      "custom_tooltip": "<b>Identify target audiences</b><br>Determine the key stakeholders who should receive the project findings, including municipal staff, healthcare providers, NGOs, community leaders, and the general public. Tailor dissemination strategies to reach each audience effectively.<br><b>Resources needed:</b><br><ul><li>Community Outreach Coordinator</li><li>Program Manager</li></ul>",
      "start_date": "2027-05-03",
      "duration": 1.0,
      "progress": 0,
      "open": true,
      "meta": "5584cee2-6c6f-4873-b9c2-45291a767930 FS",
      "parent": "d6a56221-accc-46f2-8a1e-fc44e3ac3a74"
    },
    {
      "id": "edc277e2-f60a-4141-872a-246996e37515",
      "text": "Select dissemination channels",
      "custom_tooltip": "<b>Select dissemination channels</b><br>Choose appropriate channels for sharing project findings, such as public presentations, community forums, social media, websites, newsletters, and publications. Consider the reach and effectiveness of each channel for different audiences.<br><b>Resources needed:</b><br><ul><li>Communications Specialist</li><li>Program Manager</li></ul>",
      "start_date": "2027-05-04",
      "duration": 1.0,
      "progress": 0,
      "open": true,
      "meta": "fa10206c-e69b-4aea-94ba-977f6566b9b3 FS",
      "parent": "d6a56221-accc-46f2-8a1e-fc44e3ac3a74"
    },
    {
      "id": "531beb70-5ba6-40c3-9928-6862506b675a",
      "text": "Obtain approvals for dissemination",
      "custom_tooltip": "<b>Obtain approvals for dissemination</b><br>Submit dissemination materials to relevant authorities for review and approval, ensuring compliance with data privacy regulations and organizational policies. Address any feedback or concerns raised during the approval process.<br><b>Resources needed:</b><br><ul><li>Program Manager</li><li>Legal Counsel</li></ul>",
      "start_date": "2027-05-05",
      "duration": 1.0,
      "progress": 0,
      "open": true,
      "meta": "edc277e2-f60a-4141-872a-246996e37515 FS",
      "parent": "d6a56221-accc-46f2-8a1e-fc44e3ac3a74"
    },
    {
      "id": "b6e3419b-fdb1-4ff5-8ce3-32b9e6749eb0",
      "text": "Distribute project findings",
      "custom_tooltip": "<b>Distribute project findings</b><br>Implement the dissemination plan, sharing project findings through selected channels. Monitor the reach and impact of dissemination efforts, collecting feedback from stakeholders to inform future projects.<br><b>Resources needed:</b><br><ul><li>Communications Specialist</li><li>Community Outreach Coordinator</li></ul>",
      "start_date": "2027-05-06",
      "duration": 1.0,
      "progress": 0,
      "open": true,
      "meta": "d6a56221-accc-46f2-8a1e-fc44e3ac3a74 FF, 531beb70-5ba6-40c3-9928-6862506b675a FS",
      "parent": "d6a56221-accc-46f2-8a1e-fc44e3ac3a74"
    },
    {
      "id": "03e7206e-2eb4-4f98-a2cd-b9956332735a",
      "text": "Archive Project Materials",
      "custom_tooltip": "<b>Archive Project Materials</b>",
      "progress": 0,
      "open": true,
      "meta": "0cc162ed-c2b4-43bd-b479-ac79693eeb1a FF, d6a56221-accc-46f2-8a1e-fc44e3ac3a74 FS",
      "parent": "0cc162ed-c2b4-43bd-b479-ac79693eeb1a",
      "type": "project"
    },
    {
      "id": "221cad22-acb9-4e08-b539-8e3c1f0e6d60",
      "text": "Identify Archive Location",
      "custom_tooltip": "<b>Identify Archive Location</b><br>Determine the physical or digital location where project materials will be stored long-term. This includes assessing storage capacity, security measures, and accessibility protocols.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>IT Support</li><li>Records Management</li></ul>",
      "start_date": "2027-05-07",
      "duration": 1.0,
      "progress": 0,
      "open": true,
      "meta": "03e7206e-2eb4-4f98-a2cd-b9956332735a SS",
      "parent": "03e7206e-2eb4-4f98-a2cd-b9956332735a"
    },
    {
      "id": "639576ab-6149-4c4a-911a-779cc9132e71",
      "text": "Organize Project Materials",
      "custom_tooltip": "<b>Organize Project Materials</b><br>Sort and categorize all project-related documents, data, and physical assets. This includes creating a logical filing system, labeling items clearly, and ensuring that all materials are easily retrievable.<br><b>Resources needed:</b><br><ul><li>Project Team</li><li>Administrative Assistant</li></ul>",
      "start_date": "2027-05-08",
      "duration": 1.0,
      "progress": 0,
      "open": true,
      "meta": "221cad22-acb9-4e08-b539-8e3c1f0e6d60 FS",
      "parent": "03e7206e-2eb4-4f98-a2cd-b9956332735a"
    },
    {
      "id": "dea9a28b-ee76-4c37-9ac1-61244b0008ce",
      "text": "Label Archive Contents",
      "custom_tooltip": "<b>Label Archive Contents</b><br>Create descriptive labels for all archived materials, including file names, folder names, and physical storage containers. Labels should be consistent, accurate, and easily understood by anyone accessing the archive.<br><b>Resources needed:</b><br><ul><li>Project Team</li><li>Administrative Assistant</li></ul>",
      "start_date": "2027-05-09",
      "duration": 1.0,
      "progress": 0,
      "open": true,
      "meta": "639576ab-6149-4c4a-911a-779cc9132e71 FS",
      "parent": "03e7206e-2eb4-4f98-a2cd-b9956332735a"
    },
    {
      "id": "229e49cf-7dcf-4c70-b566-61f38022bb6d",
      "text": "Backup Digital Data",
      "custom_tooltip": "<b>Backup Digital Data</b><br>Create a backup copy of all digital project data and store it in a secure location separate from the primary archive. This includes verifying the integrity of the backup and testing the restoration process.<br><b>Resources needed:</b><br><ul><li>IT Support</li><li>Data Analyst</li></ul>",
      "start_date": "2027-05-10",
      "duration": 1.0,
      "progress": 0,
      "open": true,
      "meta": "03e7206e-2eb4-4f98-a2cd-b9956332735a FF, dea9a28b-ee76-4c37-9ac1-61244b0008ce FS",
