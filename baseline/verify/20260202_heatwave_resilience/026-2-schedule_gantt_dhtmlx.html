ision-making processes for the project. This includes defining the criteria for making decisions, the individuals or groups responsible for making decisions, and the process for escalating issues.\n\nResources needed:\n\u2022 Project Manager\n\u2022 Stakeholder Representatives\n\u2022 Decision-Making Framework Template\",3/7/2026,3/9/2026,0,4a42237b-1fe8-47eb-b68c-17c490306bf5,PlanExe\nf81fb67a-251a-43c1-8e61-e7e030393071,Develop Communication Plan,\"Develop Communication Plan\n\nDescription:\nDevelop a communication plan that outlines how information will be shared with stakeholders throughout the project lifecycle. This includes the frequency of communication, the channels of communication, and the types of information that will be shared.\n\nResources needed:\n\u2022 Project Manager\n\u2022 Communication Plan Template\n\u2022 Stakeholder List\",3/9/2026,3/11/2026,0,ac68518c-3098-41d0-b543-21bd84eb067e,PlanExe\n902160d8-03b4-42fd-ad2f-b3d00fa775ad,Develop Detailed Project Schedule,,3/11/2026,3/21/2026,0,ac68518c-3098-41d0-b543-21bd84eb067e,PlanExe\ne6045fd7-e770-4a59-a27a-9bd19c921e34,Define Task Dependencies and Sequencing,\"Define Task Dependencies and Sequencing\n\nDescription:\nIdentify all tasks, their dependencies, and the optimal sequence for execution. This involves creating a dependency diagram and determining the critical path.\n\nResources needed:\n\u2022 Project Manager\n\u2022 Team Leads\n\u2022 Scheduling Software\",3/11/2026,3/13/2026,0,902160d8-03b4-42fd-ad2f-b3d00fa775ad,PlanExe\n2540de3c-ed96-4ba6-9302-1a4fb6e487f2,Estimate Task Durations and Resource Needs,\"Estimate Task Durations and Resource Needs\n\nDescription:\nEstimate the time required to complete each task and the resources (personnel, equipment, materials) needed. This includes considering potential risks and uncertainties.\n\nResources needed:\n\u2022 Project Manager\n\u2022 Subject Matter Experts\n\u2022 Historical Data\",3/13/2026,3/15/2026,0,e6045fd7-e770-4a59-a27a-9bd19c921e34,PlanExe\n9566ff46-5ca8-425c-b3b1-915cb6e1d0f3,Develop Initial Project Schedule Draft,\"Develop Initial Project Schedule Draft\n\nDescription:\nCreate a preliminary project schedule based on the task dependencies, durations, and resource availability. This involves using scheduling software to generate a Gantt chart or similar visualization.\n\nResources needed:\n\u2022 Project Manager\n\u2022 Scheduling Software\",3/15/2026,3/17/2026,0,2540de3c-ed96-4ba6-9302-1a4fb6e487f2,PlanExe\n23a84fb3-2f7d-46ac-9202-886caa1f5bef,Review and Refine Project Schedule,\"Review and Refine Project Schedule\n\nDescription:\nReview the initial project schedule with stakeholders to identify potential issues, constraints, or opportunities for optimization. Refine the schedule based on feedback and incorporate any necessary adjustments.\n\nResources needed:\n\u2022 Project Manager\n\u2022 Stakeholders\n\u2022 Team Leads\",3/17/2026,3/19/2026,0,9566ff46-5ca8-425c-b3b1-915cb6e1d0f3,PlanExe\n19ab7224-fea3-45b7-a6f8-5b5259a99b18,Finalize and Baseline Project Schedule,\"Finalize and Baseline Project Schedule\n\nDescription:\nFinalize the project schedule after incorporating all feedback and adjustments. Baseline the schedule to provide a reference point for tracking progress and managing changes.\n\nResources needed:\n\u2022 Project Manager\n\u2022 Project Sponsor\",3/19/2026,3/21/2026,0,902160d8-03b4-42fd-ad2f-b3d00fa775ad,PlanExe\n4b77ae74-aa8e-4005-a6bb-042878ce1a8b,Define Data Acquisition Strategy (GDPR Compliance),,3/21/2026,3/31/2026,0,902160d8-03b4-42fd-ad2f-b3d00fa775ad,PlanExe\n5efe4c73-25c1-4365-8cae-c2f79576f710,Identify Applicable GDPR Regulations,\"Identify Applicable GDPR Regulations\n\nDescription:\nObjective: Determine all relevant GDPR articles and guidelines impacting data collection, processing, and storage for the heatwave response program.\nScope: Review GDPR documentation, consult legal databases, and engage with a GDPR compliance expert.\nSteps:\n1.  Review the project's data collection and usage plan.\n2.  Identify the types of personal data being collected (e.g., health data, location data).\n3.  Research relevant GDPR articles pertaining to the processing of sensitive data.\n4.  Document all applicable GDPR requirements.\nDeliverables: A comprehensive list of GDPR articles and guidelines relevant to the project.\n\nResources needed:\n\u2022 Project Manager\n\u2022 GDPR Compliance Expert\n\u2022 Legal Counsel\n\u2022 Data Analyst\",3/21/2026,3/23/2026,0,4b77ae74-aa8e-4005-a6bb-042878ce1a8b,PlanExe\ndaab0347-b04b-40e4-9439-277df2db5128,Assess Data Collection Methods,\"Assess Data Collection Methods\n\nDescription:\nObjective: Evaluate existing and proposed data collection methods for compliance with GDPR principles, including data minimization, purpose limitation, and storage limitation.\nScope: Analyze data collection forms, processes, and systems to identify potential compliance gaps.\nSteps:\n1.  Map all data collection points and processes.\n2.  Assess the necessity and proportionality of each data element collected.\n3.  Identify potential risks related to data security and privacy.\n4.  Document findings and recommendations for improvement.\nDeliverables: A report outlining the assessment of data collection methods and recommendations for GDPR compliance.\n\nResources needed:\n\u2022 Data Analyst\n\u2022 GDPR Compliance Expert\n\u2022 Project Manager\",3/23/2026,3/25/2026,0,5efe4c73-25c1-4365-8cae-c2f79576f710,PlanExe\na77a7b73-cf95-4a99-8288-8304ff2ac9ef,Develop GDPR Compliance Plan,\"Develop GDPR Compliance Plan\n\nDescription:\nObjective: Create a detailed plan outlining the steps necessary to ensure GDPR compliance throughout the project lifecycle.\nScope: Define specific actions, timelines, and responsibilities for addressing identified compliance gaps.\nSteps:\n1.  Prioritize compliance gaps based on risk level.\n2.  Develop specific action plans for each gap, including data security measures, consent mechanisms, and data subject rights procedures.\n3.  Assign responsibilities and timelines for implementation.\n4.  Document the GDPR compliance plan.\nDeliverables: A comprehensive GDPR compliance plan with actionable steps and timelines.\n\nResources needed:\n\u2022 Project Manager\n\u2022 GDPR Compliance Expert\n\u2022 Legal Counsel\n\u2022 Data Analyst\",3/25/2026,3/27/2026,0,daab0347-b04b-40e4-9439-277df2db5128,PlanExe\n50f4a194-f134-416c-840d-11fba983f781,Implement Data Security Measures,\"Implement Data Security Measures\n\nDescription:\nObjective: Implement technical and organizational measures to protect personal data from unauthorized access, use, or disclosure, in accordance with GDPR requirements.\nScope: Implement data encryption, access controls, data anonymization techniques, and data breach response procedures.\nSteps:\n1.  Implement data encryption at rest and in transit.\n2.  Establish strict access controls based on the principle of least privilege.\n3.  Implement data anonymization or pseudonymization techniques where appropriate.\n4.  Develop and test a data breach response plan.\nDeliverables: Implemented data security measures and a documented data breach response plan.\n\nResources needed:\n\u2022 IT Security Specialist\n\u2022 Data Analyst\n\u2022 GDPR Compliance Expert\",3/27/2026,3/29/2026,0,a77a7b73-cf95-4a99-8288-8304ff2ac9ef,PlanExe\nf7013fcf-e1fd-4d29-b8c0-727572d272c7,Establish Data Subject Rights Procedures,\"Establish Data Subject Rights Procedures\n\nDescription:\nObjective: Establish clear procedures for handling data subject requests, including the right to access, rectify, erase, restrict processing, and data portability, in compliance with GDPR requirements.\nScope: Develop processes for verifying data subject identity, responding to requests within the required timeframe, and documenting all actions taken.\nSteps:\n1.  Develop a data subject request form and submission process.\n2.  Establish procedures for verifying data subject identity.\n3.  Develop templates for responding to different types of data subject requests.\n4.  Train staff on data subject rights procedures.\nDeliverables: Documented data subject rights procedures and trained staff.\n\nResources needed:\n\u2022 Project Manager\n\u2022 GDPR Compliance Expert\n\u2022 Legal Counsel\n\u2022 Community Outreach Coordinator\",3/29/2026,3/31/2026,0,4b77ae74-aa8e-4005-a6bb-042878ce1a8b,PlanExe\nf723a552-736d-4f65-8c87-8f73a8ec059e,Define Workforce Mobilization Strategy,,3/31/2026,4/15/2026,0,4b77ae74-aa8e-4005-a6bb-042878ce1a8b,PlanExe\n4510e80a-76a6-473a-8ee0-e5c11e2fd694,Identify Volunteer Roles and Responsibilities,\"Identify Volunteer Roles and Responsibilities\n\nDescription:\nDefine specific roles for volunteers (outreach, cooling center support, transport), outlining responsibilities, required skills, and time commitments for each role. This ensures clear expectations and efficient task allocation.\n\nResources needed:\n\u2022 Program Manager\n\u2022 Community Outreach Coordinator\",3/31/2026,4/3/2026,0,f723a552-736d-4f65-8c87-8f73a8ec059e,PlanExe\n2aec2c43-12fd-43f9-8010-69addf31cb31,Develop Volunteer Recruitment Plan,\"Develop Volunteer Recruitment Plan\n\nDescription:\nCreate a detailed plan for recruiting volunteers, including target demographics, recruitment channels (online platforms, community events, partnerships with NGOs), and messaging strategies to attract suitable candidates.\n\nResources needed:\n\u2022 Community Outreach Coordinator\n\u2022 Communications Specialist\",4/3/2026,4/6/2026,0,4510e80a-76a6-473a-8ee0-e5c11e2fd694,PlanExe\nf2c32050-5d5a-495d-b2e6-56064ca85cc5,Design Volunteer Training Program,\"Design Volunteer Training Program\n\nDescription:\nDevelop a comprehensive training program covering heatwave safety, program protocols, communication skills, cultural sensitivity, and emergency procedures. Include both online and in-person training modules.\n\nResources needed:\n\u2022 Training Specialist\n\u2022 Healthcare Professional\n\u2022 Program Manager\",4/6/2026,4/9/2026,0,2aec2c43-12fd-43f9-8010-69addf31cb31,PlanExe\n3726fd29-1bde-4a04-aa96-3d2e43dfe24a,Establish Volunteer Management System,\"Establish Volunteer Management System\n\nDescription:\nImplement a system for managing volunteers, including registration, scheduling, communication, tracking hours, providing support, and recognizing contributions. This ensures efficient coordination and volunteer satisfaction.\n\nResources needed:\n\u2022 Volunteer Coordinator\n\u2022 IT Support\",4/9/2026,4/12/2026,0,f2c32050-5d5a-495d-b2e6-56064ca85cc5,PlanExe\n1465e36d-c3d9-4fe1-8974-f98cfa9ff5ca,Define Contractor Roles and Responsibilities,\"Define Contractor Roles and Responsibilities\n\nDescription:\nClearly define the roles and responsibilities of contractors involved in the project, including cooling center operations, home intervention installations, and transportation services. This ensures accountability and efficient service delivery.\n\nResources needed:\n\u2022 Program Manager\n\u2022 Procurement Specialist\",4/12/2026,4/15/2026,0,f723a552-736d-4f65-8c87-8f73a8ec059e,PlanExe\nfe414185-0435-4f20-a7b0-3503e9b57dab,Define Targeted Outreach Strategy,,4/15/2026,4/25/2026,0,f723a552-736d-4f65-8c87-8f73a8ec059e,PlanExe\nc8d968dd-883d-4c0f-8486-cee25fb9b984,Identify vulnerable populations and locations,\"Identify vulnerable populations and locations\n\nDescription:\nIdentify specific vulnerable populations (elderly, low-income, etc.) and their geographic locations within Thessaloniki. This involves analyzing demographic data, consulting with local NGOs, and mapping high-risk areas.\n\nResources needed:\n\u2022 Demographic data\n\u2022 GIS software\n\u2022 Community outreach coordinator\n\u2022 Local NGO contacts\",4/15/2026,4/17/2026,0,fe414185-0435-4f20-a7b0-3503e9b57dab,PlanExe\nf800f4bd-62c7-4123-a9c4-eea92defb998,Develop outreach materials and messaging,\"Develop outreach materials and messaging\n\nDescription:\nCreate culturally sensitive and accessible outreach materials (flyers, posters, social media content) in multiple languages. Craft clear and concise messaging about heatwave risks and available resources.\n\nResources needed:\n\u2022 Communications specialist\n\u2022 Graphic designer\n\u2022 Translator\n\u2022 Cultural competency trainer\",4/17/2026,4/19/2026,0,c8d968dd-883d-4c0f-8486-cee25fb9b984,PlanExe\n8699b6f8-b179-4489-832f-9a42ce7b8d4e,Establish outreach channels and partnerships,\"Establish outreach channels and partnerships\n\nDescription:\nIdentify and establish effective outreach channels (community events, social services, healthcare providers). Partner with trusted community organizations to reach vulnerable populations.\n\nResources needed:\n\u2022 Community outreach coordinator\n\u2022 Local NGO contacts\n\u2022 Healthcare provider contacts\n\u2022 Community event calendar\",4/19/2026,4/21/2026,0,f800f4bd-62c7-4123-a9c4-eea92defb998,PlanExe\n8c1917e2-d694-4fde-aab0-a3f38f934cac,Train outreach workers and volunteers,\"Train outreach workers and volunteers\n\nDescription:\nProvide training to outreach workers and volunteers on heatwave risks, program resources, communication techniques, and cultural sensitivity.\n\nResources needed:\n\u2022 Training materials\n\u2022 Trainers\n\u2022 Volunteer coordinator\n\u2022 Outreach workers\",4/21/2026,4/23/2026,0,8699b6f8-b179-4489-832f-9a42ce7b8d4e,PlanExe\ned5cef5f-7150-4e76-8659-c646b7dfc9e3,Implement and track outreach activities,\"Implement and track outreach activities\n\nDescription:\nExecute the outreach plan, track the number of residents contacted, and monitor enrollment rates in the program. Collect feedback from residents on outreach methods.\n\nResources needed:\n\u2022 Outreach workers\n\u2022 Volunteers\n\u2022 Tracking system\n\u2022 Data analyst\",4/23/2026,4/25/2026,0,fe414185-0435-4f20-a7b0-3503e9b57dab,PlanExe\n66b32b0f-0c4d-4579-b838-09c321698fb4,Define Resource Allocation Model,,4/25/2026,5/5/2026,0,fe414185-0435-4f20-a7b0-3503e9b57dab,PlanExe\n5ba1cf37-090d-4750-88be-de5258925cfa,Assess current resource allocation,\"Assess current resource allocation\n\nDescription:\nAnalyze existing resource distribution across project activities to identify potential inefficiencies and areas for improvement. This includes reviewing budget allocations, staffing assignments, and equipment utilization.\n\nResources needed:\n\u2022 Project Manager\n\u2022 Financial Analyst\n\u2022 Data Analyst\",4/25/2026,4/27/2026,0,66b32b0f-0c4d-4579-b838-09c321698fb4,PlanExe\n811ee237-62e7-4634-9eba-e9a30f0271d3,Identify key resource constraints,\"Identify key resource constraints\n\nDescription:\nDetermine the critical resource limitations that could impact project success, such as funding limitations, staffing shortages, or equipment availability. This involves conducting a resource capacity assessment and identifying potential bottlenecks.\n\nResources needed:\n\u2022 Project Manager\n\u2022 Resource Manager\n\u2022 Stakeholders\",4/27/2026,4/29/2026,0,5ba1cf37-090d-4750-88be-de5258925cfa,PlanExe\n4f24e815-42b9-4cad-acbc-b3011e7b3fee,Develop resource allocation scenarios,\"Develop resource allocation scenarios\n\nDescription:\nCreate alternative resource allocation plans that address identified constraints and optimize resource utilization. This includes exploring different funding models, staffing strategies, and equipment procurement options.\n\nResources needed:\n\u2022 Project Manager\n\u2022 Financial Analyst\n\u2022 Operations Manager\",4/29/2026,5/1/2026,0,811ee237-62e7-4634-9eba-e9a30f0271d3,PlanExe\n4f6fef54-e7a1-414d-a288-12854dbc904d,Evaluate and select optimal model,\"Evaluate and select optimal model\n\nDescription:\nAssess the feasibility, cost-effectiveness, and impact of each resource allocation scenario. This involves conducting a cost-benefit analysis, risk assessment, and stakeholder consultation to select the most appropriate model.\n\nResources needed:\n\u2022 Project Manager\n\u2022 Stakeholders\n\u2022 Financial Analyst\",5/1/2026,5/3/2026,0,4f24e815-42b9-4cad-acbc-b3011e7b3fee,PlanExe\nc876a419-a145-4261-afe8-df16f1a1802c,Document and communicate allocation model,\"Document and communicate allocation model\n\nDescription:\nCreate a detailed resource allocation plan that outlines the selected model, including budget allocations, staffing assignments, and equipment distribution. Communicate the plan to all relevant stakeholders and obtain their approval.\n\nResources needed:\n\u2022 Project Manager\n\u2022 Communications Specialist\n\u2022 Stakeholders\",5/3/2026,5/5/2026,0,66b32b0f-0c4d-4579-b838-09c321698fb4,PlanExe\n0c4bf00b-11a2-48fb-9a1d-5044b23aec0c,Define Proactive Health Coordination Strategy,,5/5/2026,5/15/2026,0,10e3c465-d3ea-4fb6-8cda-4e1a05e1ceab,PlanExe\n12b74aa7-b2c8-4fdf-ae41-a11d74750351,Identify key healthcare stakeholders (1),\"Identify key healthcare stakeholders\n\nDescription:\nIdentify hospitals, clinics, and primary care physicians in Thessaloniki that serve vulnerable populations. Determine points of contact and establish initial communication.\n\nResources needed:\n\u2022 Project Manager\n\u2022 Community Outreach Coordinator\",5/5/2026,5/7/2026,0,0c4bf00b-11a2-48fb-9a1d-5044b23aec0c,PlanExe\n83846b9d-6e4c-4ba4-94e7-52bee94bd40b,Develop heat-related illness protocols,\"Develop heat-related illness protocols\n\nDescription:\nCreate standardized protocols for healthcare providers to identify, treat, and report heat-related illnesses. Ensure protocols align with national guidelines and are culturally sensitive.\n\nResources needed:\n\u2022 Medical Consultant\n\u2022 Healthcare System Coordinator\",5/7/2026,5/9/2026,0,12b74aa7-b2c8-4fdf-ae41-a11d74750351,PlanExe\ndf75b9c3-7c5e-4e2e-b2ff-704c896ae164,Establish communication channels,\"Establish communication channels\n\nDescription:\nSet up secure and reliable communication channels between the program and healthcare providers. This includes phone lines, email lists, and potentially a secure online platform for data sharing (GDPR compliant).\n\nResources needed:\n\u2022 IT Specialist\n\u2022 Healthcare System Coordinator\",5/9/2026,5/11/2026,0,83846b9d-6e4c-4ba4-94e7-52bee94bd40b,PlanExe\nd35a9ff4-b2ed-4b7c-9945-1704e7744703,Conduct healthcare provider training,\"Conduct healthcare provider training\n\nDescription:\nProvide training sessions for healthcare providers on the heat response program, heat-related illness protocols, and data reporting procedures. Offer continuing education credits to incentivize participation.\n\nResources needed:\n\u2022 Medical Consultant\n\u2022 Training Coordinator\",5/11/2026,5/13/2026,0,df75b9c3-7c5e-4e2e-b2ff-704c896ae164,PlanExe\n5ef6191f-ae09-4944-82fa-fb2455f3da0b,Integrate program into healthcare workflows (1),\"Integrate program into healthcare workflows\n\nDescription:\nWork with healthcare providers to integrate the heat response program into their existing workflows. This may involve modifying intake forms, updating electronic health records, and establishing referral pathways.\n\nResources needed:\n\u2022 Healthcare System Coordinator\n\u2022 IT Specialist\",5/13/2026,5/15/2026,0,0c4bf00b-11a2-48fb-9a1d-5044b23aec0c,PlanExe\n4579fe9b-b0c8-4a2f-98ab-ca2d94436708,Partnership & Resource Procurement,,5/15/2026,8/15/2026,0,10e3c465-d3ea-4fb6-8cda-4e1a05e1ceab,PlanExe\n1c8419bb-5c51-466a-9f23-fc384e905703,Establish Partnerships with Local NGOs,,5/15/2026,5/23/2026,0,4579fe9b-b0c8-4a2f-98ab-ca2d94436708,PlanExe\nb4d2e621-b8b7-4720-b52d-5a14de0b996c,Identify potential NGO partners,\"Identify potential NGO partners\n\nDescription:\nObjective: Identify local NGOs with experience in public health, community outreach, and vulnerable population support.\nScope: Research and compile a list of NGOs operating in Thessaloniki that align with the project's goals.\nSteps: 1. Conduct online research. 2. Consult with local authorities. 3. Review NGO websites and reports. 4. Create a shortlist of potential partners.\nDeliverables: A list of potential NGO partners with contact information and a brief description of their relevant experience.\n\nResources needed:\n\u2022 Project Manager\n\u2022 Community Outreach Coordinator\n\u2022 Researcher\",5/15/2026,5/17/2026,0,1c8419bb-5c51-466a-9f23-fc384e905703,PlanExe\n04ab485b-06b6-4a86-a045-10edf069e632,Assess NGO capacity and alignment,\"Assess NGO capacity and alignment\n\nDescription:\nObjective: Evaluate the capacity and alignment of shortlisted NGOs with the project's objectives and requirements.\nScope: Assess the NGOs' resources, expertise, and willingness to participate in the heat response program.\nSteps: 1. Send out questionnaires to shortlisted NGOs. 2. Conduct interviews with key personnel. 3. Review their past performance and financial stability. 4. Assess their understanding of GDPR compliance.\nDeliverables: A detailed assessment report for each shortlisted NGO, including their capacity, alignment, and potential contributions to the project.\n\nResources needed:\n\u2022 Project Manager\n\u2022 Community Outreach Coordinator\n\u2022 GDPR Compliance Officer\",5/17/2026,5/19/2026,0,b4d2e621-b8b7-4720-b52d-5a14de0b996c,PlanExe\n212529f4-1c6f-42c8-8618-04957f491b46,Negotiate partnership agreements,\"Negotiate partnership agreements\n\nDescription:\nObjective: Negotiate and finalize partnership agreements with selected NGOs, outlining roles, responsibilities, and resource allocation.\nScope: Develop legally sound and mutually beneficial agreements that ensure effective collaboration and accountability.\nSteps: 1. Draft partnership agreement templates. 2. Conduct negotiation meetings with selected NGOs. 3. Revise agreements based on feedback. 4. Obtain legal review and approval.\nDeliverables: Signed partnership agreements with selected NGOs, clearly defining roles, responsibilities, and resource allocation.\n\nResources needed:\n\u2022 Project Manager\n\u2022 Legal Counsel\n\u2022 Community Outreach Coordinator\",5/19/2026,5/21/2026,0,04ab485b-06b6-4a86-a045-10edf069e632,PlanExe\nd1bb7d7c-8857-473e-b308-70afc32fcba3,Establish communication protocols (1),\"Establish communication protocols\n\nDescription:\nObjective: Establish clear communication protocols with partner NGOs to ensure effective information sharing and coordination.\nScope: Define communication channels, reporting requirements, and escalation procedures for addressing issues and resolving conflicts.\nSteps: 1. Develop a communication plan. 2. Conduct training sessions for NGO staff. 3. Establish regular meetings and reporting schedules. 4. Implement a system for tracking and resolving issues.\nDeliverables: A documented communication plan and established communication channels with partner NGOs.\n\nResources needed:\n\u2022 Project Manager\n\u2022 Community Outreach Coordinator\n\u2022 Communications Specialist\",5/21/2026,5/23/2026,0,1c8419bb-5c51-466a-9f23-fc384e905703,PlanExe\n8b10a98f-9381-42f8-8a51-63718dae9410,Establish Partnerships with Healthcare Providers,,5/23/2026,6/2/2026,0,1c8419bb-5c51-466a-9f23-fc384e905703,PlanExe\n58c3639b-70a2-45ac-8729-46812ac32dee,Identify Key Healthcare Stakeholders (2),\"Identify Key Healthcare Stakeholders\n\nDescription:\nIdentify key individuals and departments within hospitals, emergency services, and primary care facilities to engage with the program. This includes understanding their roles, responsibilities, and existing workflows related to heatwave response.\n\nResources needed:\n\u2022 Project Manager\n\u2022 Community Outreach Coordinator\n\u2022 Healthcare Liaison\",5/23/2026,5/25/2026,0,8b10a98f-9381-42f8-8a51-63718dae9410,PlanExe\n81109f1f-abe1-4115-9a24-a5bffbc3e7a5,Develop Partnership Agreements,\"Develop Partnership Agreements\n\nDescription:\nCreate formal partnership agreements outlining the roles, responsibilities, and data sharing protocols for each healthcare provider. Ensure compliance with GDPR and other relevant regulations.\n\nResources needed:\n\u2022 Project Manager\n\u2022 Legal Counsel\n\u2022 Healthcare Liaison\",5/25/2026,5/27/2026,0,58c3639b-70a2-45ac-8729-46812ac32dee,PlanExe\n6f7e1516-4ad2-4a74-93c4-f78c50c04c5a,Establish Communication Protocols (2),\"Establish Communication Protocols\n\nDescription:\nDefine clear communication channels and protocols for sharing information about heat alerts, patient referrals, and program updates between the program and healthcare providers. This includes establishing contact lists, communication schedules, and escalation procedures.\n\nResources needed:\n\u2022 Project Manager\n\u2022 IT Specialist\n\u2022 Healthcare Liaison\",5/27/2026,5/29/2026,0,81109f1f-abe1-4115-9a24-a5bffbc3e7a5,PlanExe\naa402e02-ffaa-45f1-959d-5beeec3929e3,Conduct Training for Healthcare Staff (1),\"Conduct Training for Healthcare Staff\n\nDescription:\nProvide training to healthcare staff on heat-related illnesses, program services, and referral procedures. This includes developing training materials, scheduling training sessions, and tracking attendance.\n\nResources needed:\n\u2022 Healthcare Liaison\n\u2022 Medical Experts\n\u2022 Training Coordinator\",5/29/2026,5/31/2026,0,6f7e1516-4ad2-4a74-93c4-f78c50c04c5a,PlanExe\na2ec0418-af8d-4791-a22c-c33077273d6c,Integrate Program into Healthcare Workflows (2),\"Integrate Program into Healthcare Workflows\n\nDescription:\nWork with healthcare providers to integrate the heatwave response program into their existing workflows. This includes developing referral forms, updating patient intake procedures, and providing access to program resources.\n\nResources needed:\n\u2022 Healthcare Liaison\n\u2022 IT Specialist\n\u2022 Healthcare Providers\",5/31/2026,6/2/2026,0,8b10a98f-9381-42f8-8a51-63718dae9410,PlanExe\n6056cc0a-a753-463f-946a-f8049d1068f0,Establish Partnerships with Transport Services,,6/2/2026,6/14/2026,0,8b10a98f-9381-42f8-8a51-63718dae9410,PlanExe\n067fbbfd-b15d-45cb-82f9-d8efb96a736b,Identify potential transport service providers,\"Identify potential transport service providers\n\nDescription:\nResearch and identify a pool of potential taxi/transport service providers in Thessaloniki that meet the program's requirements (e.g., accessibility, availability, cost).\n\nResources needed:\n\u2022 Project Manager\n\u2022 Procurement Specialist\n\u2022 Research Assistant\",6/2/2026,6/5/2026,0,6056cc0a-a753-463f-946a-f8049d1068f0,PlanExe\na0ef3f0c-3a6b-461d-a9bc-e7d569ad02f5,Assess provider capabilities and compliance,\"Assess provider capabilities and compliance\n\nDescription:\nEvaluate the identified transport providers based on their capacity, vehicle accessibility, insurance coverage, driver qualifications, and compliance with relevant regulations.\n\nResources needed:\n\u2022 Procurement Specialist\n\u2022 Legal Counsel\n\u2022 Accessibility Consultant\",6/5/2026,6/8/2026,0,067fbbfd-b15d-45cb-82f9-d8efb96a736b,PlanExe\n0c1ba7f9-e156-454e-b30d-1e037aae3f75,Negotiate contract terms and service level agreements,\"Negotiate contract terms and service level agreements\n\nDescription:\nNegotiate contract terms with selected transport providers, including pricing, service availability, response times, data privacy (GDPR compliance), and service level agreements (SLAs).\n\nResources needed:\n\u2022 Project Manager\n\u2022 Procurement Specialist\n\u2022 Legal Counsel\",6/8/2026,6/11/2026,0,a0ef3f0c-3a6b-461d-a9bc-e7d569ad02f5,PlanExe\nd4fcbefe-0988-46dd-b7c6-3874446e15bc,Formalize agreements with transport providers,\"Formalize agreements with transport providers\n\nDescription:\nFinalize and execute partnership agreements with the chosen taxi/transport providers, ensuring all legal and contractual requirements are met. Establish communication protocols and reporting mechanisms.\n\nResources needed:\n\u2022 Project Manager\n\u2022 Legal Counsel\n\u2022 Administrative Assistant\",6/11/2026,6/14/2026,0,6056cc0a-a753-463f-946a-f8049d1068f0,PlanExe\nbf843028-3811-4956-be63-9f83bb5e2d17,Procure Cooling Center Equipment,,6/14/2026,7/4/2026,0,6056cc0a-a753-463f-946a-f8049d1068f0,PlanExe\n720d46b7-dfbc-4ccd-92ac-c52f6db7923c,Define Cooling Center Equipment Specifications,\"Define Cooling Center Equipment Specifications\n\nDescription:\nDetermine the specific requirements for cooling center equipment, including fans, water dispensers, seating, and any other necessary items. This involves considering factors such as capacity, energy efficiency, durability, and compliance with safety standards.\n\nResources needed:\n\u2022 Project Manager\n\u2022 Facilities Manager\n\u2022 Health and Safety Officer\",6/14/2026,6/18/2026,0,bf843028-3811-4956-be63-9f83bb5e2d17,PlanExe\n7382410f-7d59-4d57-a2b6-0879fd1de50f,Identify Potential Equipment Suppliers,\"Identify Potential Equipment Suppliers\n\nDescription:\nResearch and identify potential suppliers of cooling center equipment. This includes gathering information on their product offerings, pricing, delivery timelines, and reputation. Prioritize suppliers with a proven track record of providing high-quality equipment and reliable service.\n\nResources needed:\n\u2022 Procurement Specialist\n\u2022 Research Assistant\",6/18/2026,6/22/2026,0,720d46b7-dfbc-4ccd-92ac-c52f6db7923c,PlanExe\nf8c92ce0-c030-4dd8-bbbf-a803678d6853,Obtain Quotes and Evaluate Proposals,\"Obtain Quotes and Evaluate Proposals\n\nDescription:\nRequest quotes from multiple suppliers for the required cooling center equipment. Evaluate the proposals based on factors such as price, quality, delivery timeline, warranty, and supplier reputation. Conduct a thorough cost-benefit analysis to determine the most suitable option.\n\nResources needed:\n\u2022 Procurement Specialist\n\u2022 Project Manager\",6/22/2026,6/26/2026,0,7382410f-7d59-4d57-a2b6-0879fd1de50f,PlanExe\n68fd87bd-81b3-4ba4-a7c8-72326bf62ff8,Finalize Purchase Orders and Contracts,\"Finalize Purchase Orders and Contracts\n\nDescription:\nPrepare and finalize purchase orders or contracts with the selected equipment suppliers. Ensure that the contracts clearly outline the equipment specifications, delivery terms, payment schedule, warranty provisions, and any other relevant details. Obtain legal review of the contracts to ensure compliance with applicable laws and regulations.\n\nResources needed:\n\u2022 Procurement Specialist\n\u2022 Legal Counsel\n\u2022 Project Manager\",6/26/2026,6/30/2026,0,f8c92ce0-c030-4dd8-bbbf-a803678d6853,PlanExe\nb61325cf-9460-4f03-804e-13b4bf491c61,Coordinate Equipment Delivery and Installation,\"Coordinate Equipment Delivery and Installation\n\nDescription:\nCoordinate the delivery and installation of the cooling center equipment at the designated locations. This involves working closely with the suppliers, facilities managers, and installation teams to ensure that the equipment is delivered on time and installed correctly. Conduct inspections to verify that the equipment meets the required specifications and is functioning properly.\n\nResources needed:\n\u2022 Logistics Coordinator\n\u2022 Facilities Manager\n\u2022 Installation Team\",6/30/2026,7/4/2026,0,bf843028-3811-4956-be63-9f83bb5e2d17,PlanExe\n770b8213-7040-4d97-bbe7-eccbb0ed50ee,Procure Home Intervention Supplies,,7/4/2026,7/19/2026,0,bf843028-3811-4956-be63-9f83bb5e2d17,PlanExe\n327c80b3-e466-437b-9b03-f8a442667591,Research and select suppliers,\"Research and select suppliers\n\nDescription:\nIdentify potential suppliers for home intervention supplies (shading kits, blinds, fans, hydration supplies, thermometers/hygrometers). Evaluate suppliers based on cost, quality, and delivery time.\n\nResources needed:\n\u2022 Procurement specialist\n\u2022 Project manager\",7/4/2026,7/7/2026,0,770b8213-7040-4d97-bbe7-eccbb0ed50ee,PlanExe\nbb07ad8a-278a-4565-b755-bf8814a21127,Negotiate contracts with suppliers,\"Negotiate contracts with suppliers\n\nDescription:\nNegotiate pricing, delivery schedules, and payment terms with selected suppliers. Ensure contracts include quality guarantees and contingency plans for supply chain disruptions.\n\nResources needed:\n\u2022 Procurement specialist\n\u2022 Legal counsel\",7/7/2026,7/10/2026,0,327c80b3-e466-437b-9b03-f8a442667591,PlanExe\ncff7edc6-d9d9-4b08-9908-8936257350d3,Establish inventory management system,\"Establish inventory management system\n\nDescription:\nSet up a system for tracking inventory levels, managing storage, and ensuring timely distribution of home intervention supplies. This includes defining storage locations and transportation logistics.\n\nResources needed:\n\u2022 Logistics coordinator\n\u2022 Inventory management software\",7/10/2026,7/13/2026,0,bb07ad8a-278a-4565-b755-bf8814a21127,PlanExe\nd39b1534-26b1-4132-896b-eb78d37b6982,Coordinate delivery and storage,\"Coordinate delivery and storage\n\nDescription:\nOversee the delivery of home intervention supplies to designated storage locations. Ensure proper storage conditions to prevent damage or spoilage.\n\nResources needed:\n\u2022 Logistics coordinator\n\u2022 Warehouse staff\",7/13/2026,7/16/2026,0,cff7edc6-d9d9-4b08-9908-8936257350d3,PlanExe\n6fe301a2-9605-44d4-b3a8-111ebb2936cd,Quality control and inspection,\"Quality control and inspection\n\nDescription:\nInspect delivered supplies to ensure they meet quality standards and specifications. Address any discrepancies or defects with suppliers.\n\nResources needed:\n\u2022 Quality control inspector\n\u2022 Procurement specialist\",7/16/2026,7/19/2026,0,770b8213-7040-4d97-bbe7-eccbb0ed50ee,PlanExe\nbb5dccac-138c-4784-af2e-185e350fb7d1,Procure Communication Materials,,7/19/2026,8/3/2026,0,770b8213-7040-4d97-bbe7-eccbb0ed50ee,PlanExe\ne9303dc8-39d6-4738-9b8d-56f11f7c3a94,Design Communication Materials,\"Design Communication Materials\n\nDescription:\nCreate visually appealing and informative flyers, posters, and digital graphics for the heatwave response program. Ensure materials are culturally sensitive and accessible to diverse audiences. Involve graphic designers and communication specialists.\n\nResources needed:\n\u2022 Graphic designers\n\u2022 Communication specialists\n\u2022 Translation services\n\u2022 Design software\",7/19/2026,7/22/2026,0,bb5dccac-138c-4784-af2e-185e350fb7d1,PlanExe\n4d01ae28-8c47-4105-8f88-a9ae2427d92b,Translate Materials into Multiple Languages,\"Translate Materials into Multiple Languages\n\nDescription:\nTranslate all communication materials into languages spoken by significant vulnerable populations in Thessaloniki, including Greek, Arabic, and other relevant languages. Use professional translation services to ensure accuracy and cultural appropriateness.\n\nResources needed:\n\u2022 Translation services\n\u2022 Reviewers fluent in target languages\",7/22/2026,7/25/2026,0,e9303dc8-39d6-4738-9b8d-56f11f7c3a94,PlanExe\n2bf16f6c-c0e6-4ad5-9858-7e6ee4bb3245,Procure Printing Services,\"Procure Printing Services\n\nDescription:\nObtain quotes from multiple printing vendors for flyers and posters. Select a vendor based on cost, quality, and turnaround time. Ensure the vendor can handle large print runs and deliver materials to designated locations.\n\nResources needed:\n\u2022 Procurement specialist\n\u2022 Printing vendors\",7/25/2026,7/28/2026,0,4d01ae28-8c47-4105-8f88-a9ae2427d92b,PlanExe\nda9ccb57-d7c1-4d52-a2c0-97c88bf3088b,Set Up SMS Platform,\"Set Up SMS Platform\n\nDescription:\nSelect and configure an SMS platform for sending heat alert messages to enrolled residents. Ensure the platform is reliable, scalable, and GDPR-compliant. Integrate the platform with the program's database of vulnerable residents.\n\nResources needed:\n\u2022 IT specialist\n\u2022 SMS platform provider\n\u2022 Data security expert\",7/28/2026,7/31/2026,0,2bf16f6c-c0e6-4ad5-9858-7e6ee4bb3245,PlanExe\n6d762985-3d0f-4228-8168-419a118f2040,Distribute Communication Materials,\"Distribute Communication Materials\n\nDescription:\nDistribute flyers and posters to cooling centers, community centers, healthcare facilities, and other locations frequented by vulnerable populations. Coordinate with outreach teams to distribute materials during home visits and community events.\n\nResources needed:\n\u2022 Outreach teams\n\u2022 Volunteers\n\u2022 Transportation\",7/31/2026,8/3/2026,0,bb5dccac-138c-4784-af2e-185e350fb7d1,PlanExe\nb9e5f811-cc46-493d-8a70-205700add6cb,Contract Handyperson Services,,8/3/2026,8/15/2026,0,4579fe9b-b0c8-4a2f-98ab-ca2d94436708,PlanExe\na928f5be-3990-4a0b-bd5d-784ce4fea6d5,Identify potential handyperson services,\"Identify potential handyperson services\n\nDescription:\nObjective: Identify qualified and reliable handyperson services in Thessaloniki.\nScope: Research local services, check online reviews, and gather contact information.\nSteps: 1. Online search. 2. Check business directories. 3. Contact local community centers for recommendations. 4. Compile a list of at least 10 potential services.\nDeliverables: A list of potential handyperson services with contact information and preliminary ratings.\n\nResources needed:\n\u2022 Project Manager\n\u2022 Internet access\n\u2022 Phone\",8/3/2026,8/6/2026,0,b9e5f811-cc46-493d-8a70-205700add6cb,PlanExe\n71884ef9-15c1-46fe-882b-786cd31695a2,Vet handyperson services qualifications,\"Vet handyperson services qualifications\n\nDescription:\nObjective: Verify the qualifications, licenses, and insurance of potential handyperson services.\nScope: Check licenses, insurance coverage, and references.\nSteps: 1. Contact each service on the list. 2. Request copies of licenses and insurance. 3. Verify licenses with relevant authorities. 4. Check references from previous clients.\nDeliverables: A list of vetted handyperson services with verified qualifications.\n\nResources needed:\n\u2022 Project Manager\n\u2022 Administrative Assistant\n\u2022 Phone\n\u2022 Access to licensing databases\",8/6/2026,8/9/2026,0,a928f5be-3990-4a0b-bd5d-784ce4fea6d5,PlanExe\nba94c46b-3554-482e-83a1-af81b6c03ed5,Negotiate service agreements and rates,\"Negotiate service agreements community centers, and other potential sites.\nSteps: 1. Review demographic data to identify areas with high concentrations of vulnerable populations. 2. Conduct site visits to assess suitability. 3. Evaluate accessibility for individuals with mobility limitations. 4. Assess available amenities (e.g., restrooms, water fountains).\nDeliverables: A list of potential cooling center locations with detailed site assessments.\n\nResources needed:\n\u2022 GIS data\n\u2022 Community Outreach Coordinator\n\u2022 Municipal Staff\n\u2022 Accessibility Consultant\",8/15/2026,8/21/2026,0,6b539ce1-7546-449d-bc5a-48df1ff31396,PlanExe\na3667025-1fba-46cd-b992-1d4f01275ed7,Secure agreements for cooling center use,\"Secure agreements for cooling center use\n\nDescription:\nObjective: Obtain formal agreements for the use of selected cooling center locations.\nScope: This includes negotiating terms of use, securing necessary permits, and addressing liability concerns.\nSteps: 1. Negotiate terms of use with property owners or managers. 2. Obtain necessary permits from local authorities. 3. Address liability concerns through insurance or waivers. 4. Draft and finalize formal agreements.\nDeliverables: Signed agreements for the use of cooling center locations.\n\nResources needed:\n\u2022 Program Manager\n\u2022 Legal Counsel\n\u2022 Municipal Staff\",8/21/2026,8/27/2026,0,9fc51057-c435-47da-ab3f-36854c148121,PlanExe\n284b0129-b81a-4a96-bf4b-c7565322bf95,Equip cooling centers with necessary supplies,\"Equip cooling centers with necessary supplies\n\nDescription:\nObjective: Equip cooling centers with essential supplies to ensure a safe and comfortable environment for users.\nScope: This includes procuring fans, water dispensers, seating, and first-aid supplies.\nSteps: 1. Develop a list of required supplies. 2. Obtain quotes from suppliers. 3. Procure supplies and arrange for delivery. 4. Install equipment and organize supplies.\nDeliverables: Fully equipped cooling centers with necessary outreach coordinator\",9/20/2026,10/2/2026,0,26a9d8c7-e11f-4675-b6b1-9ae4937fe49c,PlanExe\ne7221cae-d345-471c-af1b-754b280da3ae,Train outreach teams,\"Train outreach teams\n\nDescription:\nProvide training to outreach teams on effective communication strategies, heatwave safety information, and program enrollment procedures.\n\nResources needed:\n\u2022 Training materials\n\u2022 Trainers\n\u2022 Community outreach coordinator\n\u2022 Healthcare professionals\",10/2/2026,10/14/2026,0,788c483c-e250-49d3-936a-640ce2c54912,PlanExe\n41ebe5ba-45fe-418a-a180-90840791ec2d,Conduct community events,\"Conduct community events\n\nDescription:\nOrganize community events in high-risk areas to raise awareness about the program and enroll vulnerable residents. Provide information, resources, and incentives.\n\nResources needed:\n\u2022 Event organizers\n\u2022 Volunteers\n\u2022 Outreach materials\n\u2022 Venue\n\u2022 Incentives\",10/14/2026,10/26/2026,0,e7221cae-d345-471c-af1b-754b280da3ae,PlanExe\n352040c9-c5d2-4bb5-b8d9-1712530d3876,Track outreach efforts and enrollment,\"Track outreach efforts and enrollment\n\nDescription:\nMonitor and track outreach activities, contact success rates, and program enrollment numbers to assess the effectiveness of outreach strategies and make adjustments as needed.\n\nResources needed:\n\u2022 Data analyst\n\u2022 Database\n\u2022 Community outreach coordinator\n\u2022 Reporting tools\",10/26/2026,11/7/2026,0,774c6721-89f5-4a79-9a83-31b2af97f101,PlanExe\n16e1d13b-99ca-4781-86c0-afcbec7dd769,Implement Home Interventions,,11/7/2026,1/21/2027,0,774c6721-89f5-4a79-9a83-31b2af97f101,PlanExe\n1c9627ef-b3a0-44ff-8a46-ab932330f0f4,Assess Home Suitability for Interventions,\"Assess Home Suitability for Interventions\n\nDescription:\nConduct pre-installation assessments to determine the suitability of homes for different interventions, considering factors like housing type, insulation, and resident needs. This includes scheduling appointments, performing on-site evaluations, and documenting findings.\n\nResources needed:\n\u2022 Handyperson\n\u2022 Community Outreach Coordinator\n\u2022 Assessment Checklist\",11/7/2026,11/22/2026,0,16e1d13b-99ca-4781-86c0-afcbec7dd769,PlanExe\nbbda9e6c-ba8e-4115-b82a-4bab2a7b77ff,Schedule Home Intervention Installations,\"Schedule Home Intervention Installations\n\nDescription:\nCoordinate with residents to schedule installation appointments, taking into account their availability and preferences. This involves contacting residents, confirming appointments, and managing the installation schedule.\n\nResources needed:\n\u2022 Community Outreach Coordinator\n\u2022 Scheduling Software\n\u2022 Transportation\",11/22/2026,12/7/2026,0,1c9627ef-b3a0-44ff-8a46-ab932330f0f4,PlanExe\n498eab3d-b187-41e8-b2d6-a10a17dee099,Install Home Intervention Supplies,\"Install Home Intervention Supplies\n\nDescription:\nInstall the selected home intervention supplies, such as shading kits, reflective blinds, and window fans, according to the assessment findings and manufacturer instructions. This includes transporting supplies, performing the installation, and ensuring proper functionality.\n\nResources needed:\n\u2022 Handyperson\n\u2022 Installation Tools\n\u2022 Home Intervention Supplies\",12/7/2026,12/22/2026,0,bbda9e6c-ba8e-4115-b82a-4bab2a7b77ff,PlanExe\n9cc4eba6-35d7-4b09-9c60-48cd42a67ea6,Provide Residents Usage Instructions,\"Provide Residents Usage Instructions\n\nDescription:\nEducate residents on the proper use and maintenance of the installed interventions, ensuring they understand how to maximize their effectiveness and safety. This includes providing written instructions, demonstrating usage techniques, and answering questions.\n\nResources needed:\n\u2022 Community Outreach Coordinator\n\u2022 Instruction Manuals\n\u2022 Demonstration Materials\",12/22/2026,1/6/2027,0,498eab3d-b187-41e8-b2d6-a10a17dee099,PlanExe\n08f427b0-bc15-4ed4-a66d-b7db8b8e844f,Collect Post-Intervention Feedback,\ ources needed:\n\u2022 Data Analyst\n\u2022 Occupational Health Specialist\n\u2022 Community Outreach Coordinator\",2/8/2027,2/10/2027,0,b89f4838-4de9-462e-aff3-01a7496693ee,PlanExe\n00d60a2b-3fa5-4191-bfe1-0c878b401dc1,Execute Public Communications Campaign,,2/10/2027,2/26/2027,0,bcec75a7-c131-4e8d-a001-512991977bfd,PlanExe\n65be03e2-3d8e-4120-8c19-bf8359b33ddc,Develop key messages and communication plan,\"Develop key messages and communication plan\n\nDescription:\nDefine target audiences, craft clear and concise messages about heatwave risks and protective measures, and develop a comprehensive communication plan outlining channels, timing, and responsibilities.\n\nResources needed:\n\u2022 Communications Specialist\n\u2022 Public Health Expert\n\u2022 Community Outreach Coordinator\",2/10/2027,2/14/2027,0,00d60a2b-3fa5-4191-bfe1-0c878b401dc1,PlanExe\n89fa7711-da2b-4aa5-9567-eb9cf3907012,Create multilingual communication materials,\"Create multilingual communication materials\n\nDescription:\nDesign and produce flyers, posters, social media content, and other communication materials in multiple languages to reach diverse populations. Ensure materials are culturally appropriate and accessible.\n\nResources needed:\n\u2022 Graphic Designer\n\u2022 Translator\n\u2022 Communications Specialist\",2/14/2027,2/18/2027,0,65be03e2-3d8e-4120-8c19-bf8359b33ddc,PlanExe\n7174949d-31c1-4048-b429-45a484af2e73,Disseminate information through multiple channels,\"Disseminate information through multiple channels\n\nDescription:\nDistribute communication materials through various channels, including social media, local media outlets, community events, healthcare providers, and partner organizations. Track reach and engagement.\n\nResources needed:\n\u2022 Communications Specialist\n\u2022 Community Outreach Coordinator\n\u2022 Volunteers\",2/18/2027,2/22/2027,0,89fa7711-da2b-4aa5-9567-eb9cf3907012,PlanExe\n52daf3d4-058d-4c3e-b96b-b75484b4fb10,Monitor and address misinformation,\"Monitor and address misinformation\n\nDescription:\nActively monitor social media and other channels for misinformation related to heatwaves and protective measures. Develop strategies to counter misinformation and provide accurate information.\n\nResources needed:\n\u2022 Communications Specialist\n\u2022 Social Media Manager\n\u2022 Public Health Expert\",2/22/2027,2/26/2027,0,00d60a2b-3fa5-4191-bfe1-0c878b401dc1,PlanExe\n8a43ebb1-1731-4cc0-9855-6e5180e02c42,\"Monitoring, Evaluation & Reporting\",,2/26/2027,4/23/2027,0,bcec75a7-c131-4e8d-a001-512991977bfd,PlanExe\nf74ae510-801e-4039-8fdd-63083b43c4f1,Collect Data on Cooling Center Utilization,,2/26/2027,3/13/2027,0,8a43ebb1-1731-4cc0-9855-6e5180e02c42,PlanExe\n865423bd-fa0e-4374-a522-9e87a9a683f6,Define Cooling Center Data Points,\"Define Cooling Center Data Points\n\nDescription:\nDetermine specific data points to collect (e.g., user demographics, utilization times, feedback).\n\nResources needed:\n\u2022 Data Analyst\n\u2022 Cooling Center Manager\",2/26/2027,3/1/2027,0,f74ae510-801e-4039-8fdd-63083b43c4f1,PlanExe\n8edce09c-6a47-4a3f-a139-b2e9f17b586d,Develop Data Collection Forms/Protocols,\"Develop Data Collection Forms/Protocols\n\nDescription:\nCreate standardized forms and protocols for collecting data at cooling centers.\n\nResources needed:\n\u2022 Data Analyst\n\u2022 Community Outreach Coordinator\",3/1/2027,3/4/2027,0,865423bd-fa0e-4374-a522-9e87a9a683f6,PlanExe\n657abc6d-05f3-46c5-b5e7-0ca8bbb44afa,Train Staff on Data Collection,\"Train Staff on Data Collection\n\nDescription:\nTrain cooling center staff and volunteers on proper data collection procedures.\n\nResources needed:\n\u2022 Community Outreach Coordinator\n\u2022 Cooling Center Manager\",3/4/2027,3/7/2027,0,8edce09c-6a47-4a3f-a139-b2e9f17b586d,PlanExe\n5336e4c9-47bb-4370-a424-e7d5b0b9b6f6,Implement Data Collection at Centers,\"Implement Data Collection at Centers\n\nDescription:\nDeploy data collection forms and protocols at all operational coo -4de8-a523-a750a1c38740,Administer Resident Satisfaction Surveys,\"Administer Resident Satisfaction Surveys\n\nDescription:\nConduct surveys to assess resident satisfaction with the installed home interventions and gather feedback.\n\nResources needed:\n\u2022 Community Outreach Coordinator\n\u2022 Survey Forms\n\u2022 Tablet/Computer\",3/22/2027,3/25/2027,0,f1e2744b-c460-4c52-94be-c4a2a2e93a7f,PlanExe\na4576ebd-0933-474e-a435-fe4f4f725099,Analyze Temperature Data and Survey Results,\"Analyze Temperature Data and Survey Results\n\nDescription:\nAnalyze collected temperature data and survey responses to determine the effectiveness of home interventions.\n\nResources needed:\n\u2022 Data Analyst\n\u2022 Statistical Software\n\u2022 Spreadsheet Software\",3/25/2027,3/28/2027,0,0ef84f6b-5829-4c02-8d0d-f6ae15168f4f,PlanExe\n2f2ec516-923f-448f-b628-098fa29afe5d,Collect Data on Outreach Effectiveness,,3/28/2027,4/5/2027,0,0ef84f6b-5829-4c02-8d0d-f6ae15168f4f,PlanExe\nacc5b4b5-9cdf-4606-a102-f7f55a284da4,Define outreach data collection metrics,\"Define outreach data collection metrics\n\nDescription:\nEstablish specific, measurable, achievable, relevant, and time-bound (SMART) metrics for evaluating outreach effectiveness. This includes defining key performance indicators (KPIs) such as contact success rate, enrollment rate, and referral rate.\n\nResources needed:\n\u2022 Community Outreach Coordinator\n\u2022 Data Analyst\n\u2022 Program Manager\",3/28/2027,3/30/2027,0,2f2ec516-923f-448f-b628-098fa29afe5d,PlanExe\n59d5d98f-58d2-4d12-a0f9-bb5d04c514a6,Design outreach data collection tools,\"Design outreach data collection tools\n\nDescription:\nDevelop standardized data collection forms, surveys, and databases to capture relevant information from outreach activities. Ensure tools are user-friendly, culturally sensitive, and compliant with GDPR regulations.\n\nResources needed:\n\u2022 Community Outreach Coordinator\n\u2022 Data Analyst\n\u2022 GDPR Compliance Officer\n\u2022 Communications Specialist\",3/30/2027,4/1/2027,0,acc5b4b5-9cdf-4606-a102-f7f55a284da4,PlanExe\ndd5ff25c-4b64-44e1-826a-7332205f8c80,Train outreach teams on data collection,\"Train outreach teams on data collection\n\nDescription:\nProvide comprehensive training to outreach teams on data collection procedures, including proper use of data collection tools, ethical considerations, and data privacy requirements. Conduct pilot testing to ensure understanding and proficiency.\n\nResources needed:\n\u2022 Community Outreach Coordinator\n\u2022 Data Analyst\n\u2022 Training Specialist\",4/1/2027,4/3/2027,0,59d5d98f-58d2-4d12-a0f9-bb5d04c514a6,PlanExe\n2b7e75db-e272-4639-8a55-cb04d177c97b,Implement data quality control measures,\"Implement data quality control measures\n\nDescription:\nEstablish procedures for verifying the accuracy and completeness of outreach data, including regular data audits, cross-validation checks, and feedback mechanisms. Address any data quality issues promptly and effectively.\n\nResources needed:\n\u2022 Data Analyst\n\u2022 Community Outreach Coordinator\n\u2022 Program Manager\",4/3/2027,4/5/2027,0,2f2ec516-923f-448f-b628-098fa29afe5d,PlanExe\n9b6c3518-a689-45d6-9ee5-469c8adabc92,Analyze Data and Generate Reports,,4/5/2027,4/15/2027,0,2f2ec516-923f-448f-b628-098fa29afe5d,PlanExe\nb38123b0-f54c-43cd-a907-a56af8d79f10,Clean and validate collected data,\"Clean and validate collected data\n\nDescription:\nObjective: Ensure data quality for analysis.\nScope: Review and correct inconsistencies, errors, and missing values in the collected data.\nSteps: 1. Import data into analysis software. 2. Identify and correct errors. 3. Handle missing data appropriately. 4. Validate data against expected ranges.\nDeliverables: Cleaned and validated datasets.\n\nResources needed:\n\u2022 Data analyst\n\u2022 Data validation tools\n\u2022 Data cleaning scripts\",4/5/2027,4/7/2027,0,9b6c3518-a689-45d6-9ee5-469c8adabc92,PlanExe\n09132fb8-afb6-4a17-98b2-de85b46b2407,Perform statistical analysis,\"Perform statistical analysis\n\nDescription:\nObjective: Extract meaningful insights from the data.\nScope: Apply appropriate statistical methods to identify trends, correlations, and significant findings.\nSteps: 1. Select appropriate statistical tests. 2. Run statistical analyses using software. 3. Interpret results and identify key findings.\nDeliverables: Statistical analysis results and interpretations.\n\nResources needed:\n\u2022 Statistician\n\u2022 Statistical software (e.g., R, SPSS)\n\u2022 Data analysis plan\",4/7/2027,4/9/2027,0,b38123b0-f54c-43cd-a907-a56af8d79f10,PlanExe\n5d0c44b5-c54a-4d20-b6df-6ea775f7e3c3,Visualize data for report clarity,\"Visualize data for report clarity\n\nDescription:\nObjective: Create clear and informative visualizations to communicate findings effectively.\nScope: Develop charts, graphs, and other visual aids to present data in an accessible manner.\nSteps: 1. Select appropriate visualization types. 2. Create visualizations using software. 3. Review visualizations for clarity and accuracy.\nDeliverables: Data visualizations (charts, graphs, etc.).\n\nResources needed:\n\u2022 Data visualization specialist\n\u2022 Data visualization software (e.g., Tableau, Power BI)\n\u2022 Reporting guidelines\",4/9/2027,4/11/2027,0,09132fb8-afb6-4a17-98b2-de85b46b2407,PlanExe\n957f7a6d-efe8-4812-859b-dedbb815fd45,Write and review draft reports,\"Write and review draft reports\n\nDescription:\nObjective: Prepare comprehensive reports summarizing the findings and recommendations.\nScope: Document the methodology, results, and conclusions of the analysis in a clear and concise manner.\nSteps: 1. Write draft reports. 2. Review reports for accuracy and completeness. 3. Incorporate feedback and revise reports.\nDeliverables: Draft reports.\n\nResources needed:\n\u2022 Report writer\n\u2022 Subject matter experts\n\u2022 Report template\",4/11/2027,4/13/2027,0,5d0c44b5-c54a-4d20-b6df-6ea775f7e3c3,PlanExe\n407720ae th stakeholders, and examining relevant documentation to understand the factors contributing to the issue.\n\nResources needed:\n\u2022 Data Analyst\n\u2022 Project Manager\n\u2022 Subject Matter Experts\",4/19/2027,4/20/2027,0,35a15ea4-f546-4aaf-bcab-8815820b8c35,PlanExe\n92b8cfd6-5773-44ed-99e6-ae7069c19623,Develop Corrective Action Plan,\"Develop Corrective Action Plan\n\nDescription:\nCreate a detailed plan outlining the specific steps required to address the identified root causes. This includes defining clear objectives, assigning responsibilities, establishing timelines, and identifying necessary resources. The plan should be realistic, measurable, and aligned with the overall project goals.\n\nResources needed:\n\u2022 Project Manager\n\u2022 Team Leads\n\u2022 Subject Matter Experts\",4/20/2027,4/21/2027,0,db3d030c-f35c-42f6-95c9-61164432dfd3,PlanExe\n8b712991-a876-4d23-98b7-188a780c1d63,Implement Corrective Actions,\"Implement Corrective Actions\n\nDescription:\nExecute the corrective action plan by carrying out the defined steps. This may involve making changes to processes, procedures, or resource allocation. Regular monitoring and tracking of progress are essential to ensure that the actions are effective and on schedule.\n\nResources needed:\n\u2022 Project Team\n\u2022 Contractors\n\u2022 Volunteers\",4/21/2027,4/22/2027,0,92b8cfd6-5773-44ed-99e6-ae7069c19623,PlanExe\na48b51ed-9a38-46e4-b8fe-daf75a63a306,Monitor and Evaluate Effectiveness,\"Monitor and Evaluate Effectiveness\n\nDescription:\nContinuously track the impact of the implemented corrective actions on the identified issues. This involves collecting data, analyzing performance metrics, and gathering feedback from stakeholders. The evaluation should determine whether the actions are achieving the desired results and whether any further adjustments are needed.\n\nResources needed:\n\u2022 Data Analyst\n\u2022 Project Manager\n\u2022 Stakeholders\",4/22/2027,4/23/2027,0,35a15ea4-f546-4aaf-bcab-8       "text": "Implement Data Security Measures",
      "custom_tooltip": "<b>Implement Data Security Measures</b><br>Objective: Implement technical and organizational measures to protect personal data from unauthorized access, use, or disclosure, in accordance with GDPR requirements.\nScope: Implement data encryption, access controls, data anonymization techniques, and data breach response procedures.\nSteps:\n1.  Implement data encryption at rest and in transit.\n2.  Establish strict access controls based on the principle of least privilege.\n3.  Implement data anonymization or pseudonymization techniques where appropriate.\n4.  Develop and test a data breach response plan.\nDeliverables: Implemented data security measures and a documented data breach response plan.<br><b>Resources needed:</b><br><ul><li>IT Security Specialist</li><li>Data Analyst</li><li>GDPR Compliance Expert</li></ul>",
      "start_date": "2026-03-27",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "a77a7b73-cf95-4a99-8288-8304ff2ac9ef FS",
      "parent": "4b77ae74-aa8e-4005-a6bb-042878ce1a8b"
    },
    {
      "id": "f7013fcf-e1fd-4d29-b8c0-727572d272c7",
      "text": "Establish Data Subject Rights Procedures",
      "custom_tooltip": "<b>Establish Data Subject Rights Procedures</b><br>Objective: Establish clear procedures for handling data subject requests, including the right to access, rectify, erase, restrict processing, and data portability, in compliance with GDPR requirements.\nScope: Develop processes for verifying data subject identity, responding to requests within the required timeframe, and documenting all actions taken.\nSteps:\n1.  Develop a data subject request form and submission process.\n2.  Establish procedures for verifying data subject identity.\n3.  Develop templates for responding to different types of data subject requests.\n4.  Train staff on data subject rights procedures.\nDeliverables: Documented data subject rights procedures and trained staff.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>GDPR Compliance Expert</li><li>Legal Counsel</li><li>Community Outreach Coordinator</li></ul>",
      "start_date": "2026-03-29",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "4b77ae74-aa8e-4005-a6bb-042878ce1a8b FF, 50f4a194-f134-416c-840d-11fba983f781 FS",
      "parent": "4b77ae74-aa8e-4005-a6bb-042878ce1a8b"
    },

    {
      "id": "4510e80a-76a6-473a-8ee0-e5c11e2fd694",
      "text": "Identify Volunteer Roles and Responsibilities",
      "custom_tooltip": "<b>Identify Volunteer Roles and Responsibilities</b><br>Define specific roles for volunteers (outreach, cooling center support, transport), outlining responsibilities, required skills, and time commitments for each role. This ensures clear expectations and efficient task allocation.<br><b>Resources needed:</b><br><ul><li>Program Manager</li><li>Community Outreach Coordinator</li></ul>",
      "start_date": "2026-03-31",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "f723a552-736d-4f65-8c87-8f73a8ec059e SS",

    },
    {
      "id": "2aec2c43-12fd-43f9-8010-69addf31cb31",
      "text": "Develop Volunteer Recruitment Plan",
      "custom_tooltip": "<b>Develop Volunteer Recruitment Plan</b><br>Create a detailed plan for recruiting volunteers, including target demographics, recruitment channels (online platforms, community events, partnerships with NGOs), and messaging strategies to attract suitable candidates.<br><b>Resources needed:</b><br><ul><li>Community Outreach Coordinator</li><li>Communications Specialist</li></ul>",
      "start_date": "2026-04-03",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "4510e80a-76a6-473a-8ee0-e5c11e2fd694 FS",
      "parent": "f723a552-736d-4f65-8c87-8f73a8ec059e"
    },
    {
      "id": "f2c32050-5d5a-495d-b2e6-56064ca85cc5",
      "text": "Design Volunteer Training Program",
      "custom_tooltip": "<b>Design Volunteer Training Program</b><br>Develop a comprehensive training program covering heatwave safety, program protocols, communication skills, cultural sensitivity, and emergency procedures. Include both online and in-person training modules.<br><b>Resources needed:</b><br><ul><li>Training Specialist</li><li>Healthcare Professional</li><li>Program Manager</li></ul>",
      "start_date": "2026-04-06",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "2aec2c43-12fd-43f9-8010-69addf31cb31 FS",

    },
    {
      "id": "3726fd29-1bde-4a04-aa96-3d2e43dfe24a",
      "text": "Establish Volunteer Management System",
      "custom_tooltip": "<b>Establish Volunteer Management System</b><br>Implement a system for managing volunteers, including registration, scheduling, communication, tracking hours, providing support, and recognizing contributions. This ensures efficient coordination and volunteer satisfaction.<br><b>Resources needed:</b><br><ul><li>Volunteer Coordinator</li><li>IT Support</li></ul>",
      "start_date": "2026-04-09",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "f2c32050-5d5a-495d-b2e6-56064ca85cc5 FS",
      "parent": "f723a552-736d-4f65-8c87-8f73a8ec059e"
    },
    {
      "id": "1465e36d-c3d9-4fe1-8974-f98cfa9ff5ca",
      "text": "Define Contractor Roles and Responsibilities",
      "custom_tooltip": "<b>Define Contractor Roles and Responsibilities</b><br>Clearly define the roles and responsibilities of contractors involved in the project, including cooling center operations, home intervention installations, and transportation services. This ensures accountability and efficient service delivery.<br><b>Resources needed:</b><br><ul><li>Program Manager</li><li>Procurement Specialist</li></ul>",

    {
      "id": "c8d968dd-883d-4c0f-8486-cee25fb9b984",
      "text": "Identify vulnerable populations and locations",
      "custom_tooltip": "<b>Identify vulnerable populations and locations</b><br>Identify specific vulnerable populations (elderly, low-income, etc.) and their geographic locations within Thessaloniki. This involves analyzing demographic data, consulting with local NGOs, and mapping high-risk areas.<br><b>Resources needed:</b><br><ul><li>Demographic data</li><li>GIS software</li><li>Community outreach coordinator</li><li>Local NGO contacts</li></ul>",

    },
    {
      "id": "f800f4bd-62c7-4123-a9c4-eea92defb998",
      "text": "Develop outreach materials and messaging",
      "custom_tooltip": "<b>Develop outreach materials and messaging</b><br>Create culturally sensitive and accessible outreach materials (flyers, posters, social media content) in multiple languages. Craft clear and concise messaging about heatwave risks and available resources.<br><b>Resources needed:</b><br><ul><li>Communications specialist</li><li>Graphic designer</li><li>Translator</li><li>Cultural competency trainer</li></ul>",

      "meta": "c8d968dd-883d-4c0f-8486-cee25fb9b984 FS",

    },
    {
      "id": "8699b6f8-b179-4489-832f-9a42ce7b8d4e",
      "text": "Establish outreach channels and partnerships",
      "custom_tooltip": "<b>Establish outreach channels and partnerships</b><br>Identify and establish effective outreach channels (community events, social services, healthcare providers). Partner with trusted community organizations to reach vulnerable populations.<br><b>Resources needed:</b><br><ul><li>Community outreach coordinator</li><li>Local NGO contacts</li><li>Healthcare provider contacts</li><li>Community event calendar</li></ul>",

      "duration": 2.0,

    },

      "id": "8c1917e2-d694-4fde-aab0-a3f38f934cac",
      "text": "Train outreach workers and volunteers",
      "custom_tooltip": "<b>Train outreach workers and volunteers</b><br>Provide training to outreach workers and volunteers on heatwave risks, program resources, communication techniques, and cultural sensitivity.<br><b>Resources needed:</b><br><ul><li>Training materials</li><li>Trainers</li><li>Volunteer coordinator</li><li>Outreach workers</li></ul>",

    },
    {
      "id": "ed5cef5f-7150-4e76-8659-c646b7dfc9e3",
      "text": "Implement and track outreach activities",
      "custom_tooltip": "<b>Implement and track outreach activities</b><br>Execute the outreach plan, track the number of residents contacted, and monitor enrollment rates in the program. Collect feedback from residents on outreach methods.<br><b>Resources needed:</b><br><ul><li>Outreach workers</li><li>Volunteers</li><li>Tracking system</li><li>Data analyst</li></ul>",

      "id": "5ba1cf37-090d-4750-88be-de5258925cfa",
      "text": "Assess current resource allocation",
      "custom_tooltip": "<b>Assess current resource allocation</b><br>Analyze existing resource distribution across project activities to identify potential inefficiencies and areas for improvement. This includes reviewing budget allocations, staffing assignments, and equipment utilization.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Financial Analyst</li><li>Data Analyst</li></ul>",

      "duration": 2.0,

    {
      "id": "811ee237-62e7-4634-9eba-e9a30f0271d3",
      "text": "Identify key resource constraints",
      "custom_tooltip": "<b>Identify key resource constraints</b><br>Determine the critical resource limitations that could impact project success, such as funding limitations, staffing shortages, or equipment availability. This involves conducting a resource capacity assessment and identifying potential bottlenecks.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Resource Manager</li><li>Stakeholders</li></ul>",

      "duration": 2.0,

    {
      "id": "4f24e815-42b9-4cad-acbc-b3011e7b3fee",
      "text": "Develop resource allocation scenarios",
      "custom_tooltip": "<b>Develop resource allocation scenarios</b><br>Create alternative resource allocation plans that address identified constraints and optimize resource utilization. This includes exploring different funding models, staffing strategies, and equipment procurement options.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Financial Analyst</li><li>Operations Manager</li></ul>",
      "start_date": "2026-04-29",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "811ee237-62e7-4634-9eba-e9a30f0271d3 FS",
      "parent": "66b32b0f-0c4d-4579-b838-09c321698fb4"
    },
    {
      "id": "4f6fef54-e7a1-414d-a288-12854dbc904d",
      "text": "Evaluate and select optimal model",
      "custom_tooltip": "<b>Evaluate and select optimal model</b><br>Assess the feasibility, cost-effectiveness, and impact of each resource allocation scenario. This involves conducting a cost-benefit analysis, risk assessment, and stakeholder consultation to select the most appropriate model.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Stakeholders</li><li>Financial Analyst</li></ul>",
      "start_date": "2026-05-01",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "4f24e815-42b9-4cad-acbc-b3011e7b3fee FS",
      "parent": "66b32b0f-0c4d-4579-b838-09c321698fb4"
    },
    {
      "id": "c876a419-a145-4261-afe8-df16f1a1802c",
      "text": "Document and communicate allocation model",
      "custom_tooltip": "<b>Document and communicate allocation model</b><br>Create a detailed resource allocation plan that outlines the selected model, including budget allocations, staffing assignments, and equipment distribution. Communicate the plan to all relevant stakeholders and obtain their approval.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Communications Specialist</li><li>Stakeholders</li></ul>",
      "start_date": "2026-05-03",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "66b32b0f-0c4d-4579-b838-09c321698fb4 FF, 4f6fef54-e7a1-414d-a288-12854dbc904d FS",

    },

    {
      "id": "12b74aa7-b2c8-4fdf-ae41-a11d74750351",
      "text": "Identify key healthcare stakeholders",
      "custom_tooltip": "<b>Identify key healthcare stakeholders</b><br>Identify hospitals, clinics, and primary care physicians in Thessaloniki that serve vulnerable populations. Determine points of contact and establish initial communication.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Community Outreach Coordinator</li></ul>",
      "start_date": "2026-05-05",
      "duration": 2.0,

      "open": true,

    },
    {
      "id": "83846b9d-6e4c-4ba4-94e7-52bee94bd40b",
      "text": "Develop heat-related illness protocols",
      "custom_tooltip": "<b>Develop heat-related illness protocols</b><br>Create standardized protocols for healthcare providers to identify, treat, and report heat-related illnesses. Ensure protocols align with national guidelines and are culturally sensitive.<br><b>Resources needed:</b><br><ul><li>Medical Consultant</li><li>Healthcare System Coordinator</li></ul>",
      "start_date": "2026-05-07",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "12b74aa7-b2c8-4fdf-ae41-a11d74750351 FS",
      "parent": "0c4bf00b-11a2-48fb-9a1d-5044b23aec0c"
    },
    {
      "id": "df75b9c3-7c5e-4e2e-b2ff-704c896ae164",
      "text": "Establish communication channels",
      "custom_tooltip": "<b>Establish communication channels</b><br>Set up secure and reliable communication channels between the program and healthcare providers. This includes phone lines, email lists, and potentially a secure online platform for data sharing (GDPR compliant).<br><b>Resources needed:</b><br><ul><li>IT Specialist</li><li>Healthcare System Coordinator</li></ul>",
      "start_date": "2026-05-09",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "83846b9d-6e4c-4ba4-94e7-52bee94bd40b FS",
      "parent": "0c4bf00b-11a2-48fb-9a1d-5044b23aec0c"
    },
    {
      "id": "d35a9ff4-b2ed-4b7c-9945-1704e7744703",
      "text": "Conduct healthcare provider training",
      "custom_tooltip": "<b>Conduct healthcare provider training</b><br>Provide training sessions for healthcare providers on the heat response program, heat-related illness protocols, and data reporting procedures. Offer continuing education credits to incentivize participation.<br><b>Resources needed:</b><br><ul><li>Medical Consultant</li><li>Training Coordinator</li></ul>",
      "start_date": "2026-05-11",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "df75b9c3-7c5e-4e2e-b2ff-704c896ae164 FS",
      "parent": "0c4bf00b-11a2-48fb-9a1d-5044b23aec0c"
    },
    {
      "id": "5ef6191f-ae09-4944-82fa-fb2455f3da0b",
      "text": "Integrate program into healthcare workflows",
      "custom_tooltip": "<b>Integrate program into healthcare workflows</b><br>Work with healthcare providers to integrate the heat response program into their existing workflows. This may involve modifying intake forms, updating electronic health records, and establishing referral pathways.<br><b>Resources needed:</b><br><ul><li>Healthcare System Coordinator</li><li>IT Specialist</li></ul>",
      "start_date": "2026-05-13",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "0c4bf00b-11a2-48fb-9a1d-5044b23aec0c FF, d35a9ff4-b2ed-4b7c-9945-1704e7744703 FS",
      "parent": "0c4bf00b-11a2-48fb-9a1d-5044b23aec0c"
    },

      "type": "project"

    {
      "id": "1c8419bb-5c51-466a-9f23-fc384e905703",
      "text": "Establish Partnerships with Local NGOs",
      "custom_tooltip": "<b>Establish Partnerships with Local NGOs</b>",
      "progress": 0,
      "open": true,
      "meta": "4579fe9b-b0c8-4a2f-98ab-ca2d94436708 SS",
      "parent": "4579fe9b-b0c8-4a2f-98ab-ca2d94436708",
