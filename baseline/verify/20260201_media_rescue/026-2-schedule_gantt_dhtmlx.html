    {
      "id": "9465a1b4-cc84-4343-b932-016de351bdb6",
      "text": "Identify potential archive partners",
      "custom_tooltip": "<b>Identify potential archive partners</b><br>Identify archives with relevant media collections and assess their suitability for partnership based on factors like collection size, preservation needs, and logistical feasibility.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Archival Specialist</li><li>Research Assistant</li></ul>",
      "start_date": "2029-12-28",
      "duration": 15.0,
      "progress": 0,
      "open": true,
      "meta": "04761026-a684-40e5-98c6-e9e30454075a SS",
      "parent": "04761026-a684-40e5-98c6-e9e30454075a"
    },
    {
      "id": "c129db5e-1e54-4e02-8fc2-6821afb69e25",
      "text": "Initial outreach and needs assessment",
      "custom_tooltip": "<b>Initial outreach and needs assessment</b><br>Contact potential archive partners to introduce the project, understand their digitization needs, and gauge their interest in collaboration. Conduct preliminary assessments of their collections and facilities.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Archival Specialist</li><li>Communication Specialist</li></ul>",
      "start_date": "2030-01-12",
      "duration": 15.0,
      "progress": 0,
      "open": true,
      "meta": "9465a1b4-cc84-4343-b932-016de351bdb6 FS",
      "parent": "04761026-a684-40e5-98c6-e9e30454075a"
    },
    {
      "id": "f9b77cbf-7660-4dd5-a33e-e308c65c8ee4",
      "text": "Negotiate partnership agreements",
      "custom_tooltip": "<b>Negotiate partnership agreements</b><br>Negotiate the terms of partnership agreements with selected archives, including data access protocols, liability clauses, operational procedures, and data sharing arrangements. Ensure compliance with legal and ethical guidelines.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Legal Counsel</li><li>Archival Specialist</li></ul>",
      "start_date": "2030-01-27",
      "duration": 15.0,
      "progress": 0,
      "open": true,
      "meta": "c129db5e-1e54-4e02-8fc2-6821afb69e25 FS",
      "parent": "04761026-a684-40e5-98c6-e9e30454075a"
    },
    {
      "id": "db5bf154-5bef-4c4a-951e-d06427f52d16",
      "text": "Formalize partnership agreements",
      "custom_tooltip": "<b>Formalize partnership agreements</b><br>Finalize and execute partnership agreements with selected archives, ensuring that all parties understand their roles and responsibilities. Establish clear communication channels and reporting mechanisms.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Legal Counsel</li><li>Archive Representatives</li></ul>",
      "start_date": "2030-02-11",
      "duration": 15.0,
      "progress": 0,
      "open": true,
      "meta": "04761026-a684-40e5-98c6-e9e30454075a FF, f9b77cbf-7660-4dd5-a33e-e308c65c8ee4 FS",
      "parent": "04761026-a684-40e5-98c6-e9e30454075a"
    },
    {
      "id": "f1263ece-6dc6-4895-89a6-c36ac837ea5d",
      "text": "Deploy MIUs to Archive Locations",
      "custom_tooltip": "<b>Deploy MIUs to Archive Locations</b>",
      "progress": 0,
      "open": true,
      "meta": "04761026-a684-40e5-98c6-e9e30454075a FS",
      "parent": "4ac62742-d3c1-4d82-8a98-ff8bc468c20a",
      "type": "project"
    },
    {
      "id": "e980a51b-3598-430b-bf0d-87abe1d31b3f",
      "text": "Conduct Site Surveys at Archive Locations",
      "custom_tooltip": "<b>Conduct Site Surveys at Archive Locations</b><br>Objective: Assess the suitability of archive locations for MIU deployment.\nScope: Evaluate power availability, space constraints, environmental conditions, and accessibility.\nSteps: Schedule site visits, gather data using checklists and measurements, document findings with photos and reports.\nDeliverables: Site survey reports for each archive location.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Logistics Coordinator</li><li>Electrical Engineer</li><li>HVAC Technician</li></ul>",
      "start_date": "2030-02-26",
      "duration": 8.0,
      "progress": 0,
      "open": true,
      "meta": "f1263ece-6dc6-4895-89a6-c36ac837ea5d SS",
      "parent": "f1263ece-6dc6-4895-89a6-c36ac837ea5d"
    },
    {
      "id": "401ac4f3-2a59-40fa-aae4-4f3f87011fe1",
      "text": "Develop MIU Transportation Plan",
      "custom_tooltip": "<b>Develop MIU Transportation Plan</b><br>Objective: Create a detailed plan for transporting MIUs to archive locations.\nScope: Determine transportation routes, select appropriate transportation methods, and secure necessary permits.\nSteps: Research transportation options, obtain quotes from transportation providers, and develop a transportation schedule.\nDeliverables: MIU transportation plan.<br><b>Resources needed:</b><br><ul><li>Logistics Coordinator</li><li>Transportation Specialist</li><li>Permitting Specialist</li></ul>",
      "start_date": "2030-03-06",
      "duration": 8.0,
      "progress": 0,
      "open": true,
      "meta": "e980a51b-3598-430b-bf0d-87abe1d31b3f FS",
      "parent": "f1263ece-6dc6-4895-89a6-c36ac837ea5d"
    },
    {
      "id": "da6b5bc0-cb74-4045-ad0c-e6dac831d119",
      "text": "Prepare Archive Locations for MIU Arrival",
      "custom_tooltip": "<b>Prepare Archive Locations for MIU Arrival</b><br>Objective: Ensure archive locations are ready to receive and operate MIUs.\nScope: Coordinate site preparation activities, including power upgrades, space clearing, and environmental control.\nSteps: Communicate with archive staff, schedule site preparation work, and inspect completed work.\nDeliverables: Prepared archive locations.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Archive Staff</li><li>Electrical Contractor</li><li>HVAC Contractor</li></ul>",
      "start_date": "2030-03-14",
      "duration": 8.0,
      "progress": 0,
      "open": true,
      "meta": "401ac4f3-2a59-40fa-aae4-4f3f87011fe1 FS",
      "parent": "f1263ece-6dc6-4895-89a6-c36ac837ea5d"
    },
    {
      "id": "8b86286b-d5fb-4a8c-9192-01d7a3ed7494",
      "text": "Install and Test MIU Systems On-Site",
      "custom_tooltip": "<b>Install and Test MIU Systems On-Site</b><br>Objective: Install and test all MIU systems at archive locations.\nScope: Connect power, climate control, and network systems. Verify proper operation of all equipment.\nSteps: Unpack and position MIUs, connect utilities, run diagnostic tests, and troubleshoot any issues.\nDeliverables: Operational MIUs at archive locations.<br><b>Resources needed:</b><br><ul><li>MIU Technicians</li><li>Electrical Engineer</li><li>Network Engineer</li><li>Robotics Engineer</li></ul>",
      "start_date": "2030-03-22",
      "duration": 8.0,
      "progress": 0,
      "open": true,
      "meta": "f1263ece-6dc6-4895-89a6-c36ac837ea5d FF, da6b5bc0-cb74-4045-ad0c-e6dac831d119 FS",
      "parent": "f1263ece-6dc6-4895-89a6-c36ac837ea5d"
    },
    {
      "id": "23226846-4b47-4fe0-a184-4cfede45f22d",
      "text": "Manage MIU Logistics and Maintenance",
      "custom_tooltip": "<b>Manage MIU Logistics and Maintenance</b>",
      "progress": 0,
      "open": true,
      "meta": "f1263ece-6dc6-4895-89a6-c36ac837ea5d FS",
      "parent": "4ac62742-d3c1-4d82-8a98-ff8bc468c20a",
      "type": "project"
    },
    {
      "id": "14d45197-2f80-43c9-96cb-863607c99b01",
      "text": "Track MIU location and status",
      "custom_tooltip": "<b>Track MIU location and status</b><br>Implement a system to track the location and operational status of each MIU in the field. This includes GPS tracking, sensor data monitoring (temperature, humidity, power), and regular status updates from on-site personnel.<br><b>Resources needed:</b><br><ul><li>Logistics Coordinator</li><li>IT Support</li><li>MIU Crew</li></ul>",
      "start_date": "2030-03-30",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "23226846-4b47-4fe0-a184-4cfede45f22d SS",
      "parent": "23226846-4b47-4fe0-a184-4cfede45f22d"
    },
    {
      "id": "defb0b89-dffe-4cbe-a420-779c5d783394",
      "text": "Schedule routine maintenance",
      "custom_tooltip": "<b>Schedule routine maintenance</b><br>Develop and execute a schedule for routine maintenance of each MIU, including equipment calibration, filter replacement, and software updates. This schedule should be based on equipment manufacturer recommendations and operational data.<br><b>Resources needed:</b><br><ul><li>Maintenance Engineer</li><li>MIU Crew</li><li>Parts Inventory Manager</li></ul>",
      "start_date": "2030-04-02",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "14d45197-2f80-43c9-96cb-863607c99b01 FS",
      "parent": "23226846-4b47-4fe0-a184-4cfede45f22d"
    },
    {
      "id": "468563e7-9234-4c62-adea-bc2b529aaa1c",
      "text": "Respond to equipment failures",
      "custom_tooltip": "<b>Respond to equipment failures</b><br>Establish a process for responding to equipment failures in the field, including troubleshooting, parts replacement, and repair. This process should include remote support, on-site visits, and escalation procedures.<br><b>Resources needed:</b><br><ul><li>Maintenance Engineer</li><li>MIU Crew</li><li>Parts Inventory Manager</li><li>Remote Support Technician</li></ul>",
      "start_date": "2030-04-05",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "defb0b89-dffe-4cbe-a420-779c5d783394 FS",
      "parent": "23226846-4b47-4fe0-a184-4cfede45f22d"
    },
    {
      "id": "23cf0ae4-534d-4b60-8014-6ac2dfc58286",
      "text": "Manage parts inventory and logistics",
      "custom_tooltip": "<b>Manage parts inventory and logistics</b><br>Maintain an inventory of spare parts for each MIU, and manage the logistics of delivering parts to the field as needed. This includes tracking inventory levels, ordering parts, and coordinating shipping and delivery.<br><b>Resources needed:</b><br><ul><li>Parts Inventory Manager</li><li>Logistics Coordinator</li><li>Procurement Specialist</li></ul>",
      "start_date": "2030-04-08",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "468563e7-9234-4c62-adea-bc2b529aaa1c FS",
      "parent": "23226846-4b47-4fe0-a184-4cfede45f22d"
    },
    {
      "id": "59bc0523-1641-47b8-a10f-aeb0a73fd341",
      "text": "Optimize MIU deployment schedule",
      "custom_tooltip": "<b>Optimize MIU deployment schedule</b><br>Analyze MIU utilization data and adjust the deployment schedule to maximize digitization throughput and minimize downtime. This includes identifying bottlenecks, reallocating resources, and coordinating with archive partners.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Logistics Coordinator</li><li>Data Analyst</li></ul>",
      "start_date": "2030-04-11",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "23226846-4b47-4fe0-a184-4cfede45f22d FF, 23cf0ae4-534d-4b60-8014-6ac2dfc58286 FS",
      "parent": "23226846-4b47-4fe0-a184-4cfede45f22d"
    },
    {
      "id": "305780c9-635d-4859-a912-bcf944f92d63",
      "text": "Monitor and Report on Digitization Progress",
      "custom_tooltip": "<b>Monitor and Report on Digitization Progress</b>",
      "progress": 0,
      "open": true,
      "meta": "4ac62742-d3c1-4d82-8a98-ff8bc468c20a FF, 23226846-4b47-4fe0-a184-4cfede45f22d FS",
      "parent": "4ac62742-d3c1-4d82-8a98-ff8bc468c20a",
      "type": "project"
    },
    {
      "id": "1f98ce6b-db2e-493a-9e18-c33f8d426808",
      "text": "Collect Digitization Metrics",
      "custom_tooltip": "<b>Collect Digitization Metrics</b><br>Gather data on items digitized, data recovered, and processing time for each MIU.<br><b>Resources needed:</b><br><ul><li>MIU Crew</li><li>Data Analyst</li></ul>",
      "start_date": "2030-04-14",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "305780c9-635d-4859-a912-bcf944f92d63 SS",
      "parent": "305780c9-635d-4859-a912-bcf944f92d63"
    },
    {
      "id": "ccd6aead-2d27-4fc7-9e05-3d77056d61a9",
      "text": "Analyze Digitization Performance",
      "custom_tooltip": "<b>Analyze Digitization Performance</b><br>Evaluate the efficiency and effectiveness of each MIU based on collected metrics.<br><b>Resources needed:</b><br><ul><li>Data Analyst</li><li>Project Manager</li></ul>",
      "start_date": "2030-04-18",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "1f98ce6b-db2e-493a-9e18-c33f8d426808 FS",
      "parent": "305780c9-635d-4859-a912-bcf944f92d63"
    },
    {
      "id": "f8112e1b-0d96-4366-9630-d20784b650ce",
      "text": "Generate Progress Reports",
      "custom_tooltip": "<b>Generate Progress Reports</b><br>Create regular reports summarizing digitization progress, challenges, and recommendations.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Data Analyst</li></ul>",
      "start_date": "2030-04-22",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "ccd6aead-2d27-4fc7-9e05-3d77056d61a9 FS",
      "parent": "305780c9-635d-4859-a912-bcf944f92d63"
    },
    {
      "id": "1b701825-289e-4130-9df4-74320af81643",
      "text": "Communicate with Stakeholders",
      "custom_tooltip": "<b>Communicate with Stakeholders</b><br>Share progress reports and updates with archives, funding organizations, and other stakeholders.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>MIU Crew</li></ul>",
      "start_date": "2030-04-26",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "305780c9-635d-4859-a912-bcf944f92d63 FF, f8112e1b-0d96-4366-9630-d20784b650ce FS",
      "parent": "305780c9-635d-4859-a912-bcf944f92d63"
    },
    {
      "id": "73c1d9b3-8ace-40fb-8eff-b940de5ab67a",
      "text": "Review and Quality Assurance",
      "custom_tooltip": "<b>Review and Quality Assurance</b>",
      "progress": 0,
      "open": true,
      "meta": "4ac62742-d3c1-4d82-8a98-ff8bc468c20a FS",
      "parent": "c6af0a21-854d-4792-bd24-ad839e3bb179",
      "type": "project"
    },
    {
      "id": "3ff6053f-86d6-468a-9a35-dc2795165b9d",
      "text": "Establish Review Workflow",
      "custom_tooltip": "<b>Establish Review Workflow</b>",
      "progress": 0,
      "open": true,
      "meta": "73c1d9b3-8ace-40fb-8eff-b940de5ab67a SS",
      "parent": "73c1d9b3-8ace-40fb-8eff-b940de5ab67a",
      "type": "project"
    },
    {
      "id": "760984ad-7eee-4752-8120-3edf98221171",
      "text": "Define review scope and criteria",
      "custom_tooltip": "<b>Define review scope and criteria</b><br>Clearly define the scope of the review process, including the types of media to be reviewed, the specific aspects to be evaluated (e.g., image quality, data accuracy, metadata completeness), and the acceptance criteria for each aspect.<br><b>Resources needed:</b><br><ul><li>Review team lead</li><li>Archival experts</li><li>Legal counsel</li></ul>",
      "start_date": "2030-04-30",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "3ff6053f-86d6-468a-9a35-dc2795165b9d SS",
      "parent": "3ff6053f-86d6-468a-9a35-dc2795165b9d"
    },
    {
      "id": "de82c609-a0d2-414b-97e6-b12285122a13",
      "text": "Document review process and guidelines",
      "custom_tooltip": "<b>Document review process and guidelines</b><br>Create a comprehensive document outlining the entire review process, including step-by-step instructions, checklists, and examples. This document should also include detailed guidelines for each review criterion, ensuring consistency and objectivity.<br><b>Resources needed:</b><br><ul><li>Technical writer</li><li>Review team lead</li><li>Archival experts</li></ul>",
      "start_date": "2030-05-02",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "760984ad-7eee-4752-8120-3edf98221171 FS",
      "parent": "3ff6053f-86d6-468a-9a35-dc2795165b9d"
    },
    {
      "id": "626e25d6-98ed-4e46-b337-2bbf70b02955",
      "text": "Establish communication channels",
      "custom_tooltip": "<b>Establish communication channels</b><br>Set up clear communication channels between reviewers, project managers, and other stakeholders to facilitate efficient feedback and issue resolution. This may include regular meetings, email lists, or a dedicated communication platform.<br><b>Resources needed:</b><br><ul><li>Project manager</li><li>IT support</li></ul>",
      "start_date": "2030-05-04",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "de82c609-a0d2-414b-97e6-b12285122a13 FS",
      "parent": "3ff6053f-86d6-468a-9a35-dc2795165b9d"
    },
    {
      "id": "a302e962-a0e2-40ee-aca2-c038a9b74b62",
      "text": "Develop a review tracking system",
      "custom_tooltip": "<b>Develop a review tracking system</b><br>Implement a system for tracking the progress of each review, including the status, reviewer assignments, and any issues identified. This system should also allow for generating reports and analyzing review data to identify trends and areas for improvement.<br><b>Resources needed:</b><br><ul><li>Database administrator</li><li>Software developer</li><li>Review team lead</li></ul>",
      "start_date": "2030-05-06",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "3ff6053f-86d6-468a-9a35-dc2795165b9d FF, 626e25d6-98ed-4e46-b337-2bbf70b02955 FS",
      "parent": "3ff6053f-86d6-468a-9a35-dc2795165b9d"
    },
    {
      "id": "c1a803ba-e1c7-4947-be28-4af22c31d99c",
      "text": "Train Human Reviewers",
      "custom_tooltip": "<b>Train Human Reviewers</b>",
      "progress": 0,
      "open": true,
      "meta": "3ff6053f-86d6-468a-9a35-dc2795165b9d FS",
      "parent": "73c1d9b3-8ace-40fb-8eff-b940de5ab67a",
      "type": "project"
    },
    {
      "id": "bde51532-fe25-4241-8860-2533a438a895",
      "text": "Develop Reviewer Training Materials",
      "custom_tooltip": "<b>Develop Reviewer Training Materials</b><br>Create comprehensive training materials covering media formats, digitization standards, and quality control procedures. Include examples of common errors and best practices.<br><b>Resources needed:</b><br><ul><li>Digitization Specialist</li><li>Archivist</li><li>Training Specialist</li></ul>",
      "start_date": "2030-05-08",
      "duration": 8.0,
      "progress": 0,
      "open": true,
      "meta": "c1a803ba-e1c7-4947-be28-4af22c31d99c SS",
      "parent": "c1a803ba-e1c7-4947-be28-4af22c31d99c"
    },
    {
      "id": "d92902ab-1823-41a5-9887-b11bad780ac5",
      "text": "Conduct Initial Training Sessions",
      "custom_tooltip": "<b>Conduct Initial Training Sessions</b><br>Organize and conduct initial training sessions for human reviewers. Cover the training materials, provide hands-on exercises, and answer questions.<br><b>Resources needed:</b><br><ul><li>Training Specialist</li><li>Digitization Specialist</li><li>Reviewers</li></ul>",
      "start_date": "2030-05-16",
      "duration": 8.0,
      "progress": 0,
      "open": true,
      "meta": "bde51532-fe25-4241-8860-2533a438a895 FS",
      "parent": "c1a803ba-e1c7-4947-be28-4af22c31d99c"
    },
    {
      "id": "2cf9befb-2d89-4da5-b819-29258bae384f",
      "text": "Implement Ongoing Support and Mentoring",
      "custom_tooltip": "<b>Implement Ongoing Support and Mentoring</b><br>Provide ongoing support and mentoring to human reviewers. Establish communication channels for questions and feedback, and offer regular refresher training sessions.<br><b>Resources needed:</b><br><ul><li>Senior Reviewers</li><li>Digitization Specialist</li></ul>",
      "start_date": "2030-05-24",
      "duration": 8.0,
      "progress": 0,
      "open": true,
      "meta": "d92902ab-1823-41a5-9887-b11bad780ac5 FS",
      "parent": "c1a803ba-e1c7-4947-be28-4af22c31d99c"
    },
    {
      "id": "f0e9890a-56e5-4025-8c82-b97e0c93b02c",
      "text": "Evaluate Reviewer Performance",
      "custom_tooltip": "<b>Evaluate Reviewer Performance</b><br>Regularly evaluate reviewer performance to identify areas for improvement. Provide constructive feedback and adjust training as needed.<br><b>Resources needed:</b><br><ul><li>Quality Assurance Manager</li><li>Senior Reviewers</li></ul>",
      "start_date": "2030-06-01",
      "duration": 8.0,
      "progress": 0,
      "open": true,
      "meta": "c1a803ba-e1c7-4947-be28-4af22c31d99c FF, 2cf9befb-2d89-4da5-b819-29258bae384f FS",
      "parent": "c1a803ba-e1c7-4947-be28-4af22c31d99c"
    },
    {
      "id": "29b90364-0931-4e50-84c2-60a3fd8bb5a5",
      "text": "Implement Quality Control Procedures",
      "custom_tooltip": "<b>Implement Quality Control Procedures</b>",
      "progress": 0,
      "open": true,
      "meta": "c1a803ba-e1c7-4947-be28-4af22c31d99c FS",
      "parent": "73c1d9b3-8ace-40fb-8eff-b940de5ab67a",
      "type": "project"
    },
    {
      "id": "ab96d587-32e9-446a-bfb8-5f0346d7848c",
      "text": "Document QC procedures",
      "custom_tooltip": "<b>Document QC procedures</b><br>Create detailed, written documentation of all quality control procedures to ensure consistency and clarity.<br><b>Resources needed:</b><br><ul><li>Quality Assurance Manager</li><li>Technical Writer</li></ul>",
      "start_date": "2030-06-09",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "29b90364-0931-4e50-84c2-60a3fd8bb5a5 SS",
      "parent": "29b90364-0931-4e50-84c2-60a3fd8bb5a5"
    },
    {
      "id": "44fe3a47-16d6-48a7-a63e-d412084828aa",
      "text": "Train personnel on QC",
      "custom_tooltip": "<b>Train personnel on QC</b><br>Provide comprehensive training to all personnel involved in the digitization process on the established quality control procedures.<br><b>Resources needed:</b><br><ul><li>Quality Assurance Manager</li><li>Training Coordinator</li></ul>",
      "start_date": "2030-06-13",
      "duration": 4.0,
      "progress": 0,

    {
      "id": "b4725809-7897-4416-8e13-f94a5bfc5d00",
      "text": "Identify Applicable Regulations and Standards",
      "custom_tooltip": "<b>Identify Applicable Regulations and Standards</b><br>Objective: Determine all relevant regulatory requirements and compliance standards for the project.\nScope: Research and document all applicable regulations, including data privacy laws (GDPR, CCPA), environmental regulations, and electrical safety codes.\nSteps: Consult with legal experts, review relevant legislation, and document findings.\nDeliverables: A comprehensive list of applicable regulations and standards.<br><b>Resources needed:</b><br><ul><li>Legal Counsel</li><li>Compliance Officer</li><li>Project Manager</li></ul>",
      "start_date": "2030-08-24",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "89afa1d5-4ac7-498e-8029-f5937d5bac8f SS",
      "parent": "89afa1d5-4ac7-498e-8029-f5937d5bac8f"
    },
    {
      "id": "6f5c0389-f4c0-4ae1-9e3a-bfa430092910",
      "text": "Assess Current Compliance Status",
      "custom_tooltip": "<b>Assess Current Compliance Status</b><br>Objective: Evaluate the project&#x27;s current compliance status against identified regulations and standards.\nScope: Conduct a gap analysis to identify areas where the project is not currently compliant.\nSteps: Review project documentation, conduct internal audits, and identify compliance gaps.\nDeliverables: A gap analysis report outlining areas of non-compliance.<br><b>Resources needed:</b><br><ul><li>Compliance Officer</li><li>Auditors</li><li>Project Team</li></ul>",
      "start_date": "2030-08-26",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "b4725809-7897-4416-8e13-f94a5bfc5d00 FS",
      "parent": "89afa1d5-4ac7-498e-8029-f5937d5bac8f"
    },
    {
      "id": "564955b4-932b-4459-909a-bfd3af792fb7",
      "text": "Develop Compliance Action Plan",
      "custom_tooltip": "<b>Develop Compliance Action Plan</b><br>Objective: Create a detailed plan to address identified compliance gaps.\nScope: Develop specific actions to achieve compliance with all applicable regulations and standards.\nSteps: Define tasks, assign responsibilities, and establish timelines for each action.\nDeliverables: A comprehensive compliance action plan with tasks, responsibilities, and timelines.<br><b>Resources needed:</b><br><ul><li>Compliance Officer</li><li>Legal Counsel</li><li>Project Manager</li><li>Subject Matter Experts</li></ul>",
      "start_date": "2030-08-28",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "6f5c0389-f4c0-4ae1-9e3a-bfa430092910 FS",
      "parent": "89afa1d5-4ac7-498e-8029-f5937d5bac8f"
    },
    {
      "id": "4b1fe18f-beeb-49e9-b07b-e8e3271a5622",
      "text": "Implement Compliance Measures",
      "custom_tooltip": "<b>Implement Compliance Measures</b><br>Objective: Execute the compliance action plan and implement necessary measures.\nScope: Implement the actions outlined in the compliance action plan.\nSteps: Execute tasks, track progress, and address any issues that arise.\nDeliverables: Documentation of implemented compliance measures.<br><b>Resources needed:</b><br><ul><li>Project Team</li><li>Compliance Officer</li><li>Subject Matter Experts</li></ul>",
      "start_date": "2030-08-30",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "564955b4-932b-4459-909a-bfd3af792fb7 FS",
      "parent": "89afa1d5-4ac7-498e-8029-f5937d5bac8f"
    },
    {
      "id": "e04cdc79-7f2e-4c67-9ffe-20bdc3a2b9f0",
      "text": "Monitor and Maintain Compliance",
      "custom_tooltip": "<b>Monitor and Maintain Compliance</b><br>Objective: Continuously monitor and maintain compliance with all applicable regulations and standards.\nScope: Establish ongoing monitoring processes and address any new or changing regulations.\nSteps: Conduct regular audits, update compliance documentation, and provide ongoing training.\nDeliverables: A compliance monitoring and maintenance plan.<br><b>Resources needed:</b><br><ul><li>Compliance Officer</li><li>Auditors</li><li>Project Team</li><li>Legal Counsel</li></ul>",

      "id": "3ebbf11b-810d-4ea8-8bf6-fa258d94491b",
      "text": "Define Data Access Requirements",
      "custom_tooltip": "<b>Define Data Access Requirements</b><br>Gather and document the specific requirements for the data access platform, including user roles, access levels, data formats, and security protocols. This involves consulting with stakeholders to understand their needs and expectations.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Data Architect</li><li>Security Specialist</li><li>Stakeholders</li></ul>",

    {
      "id": "0778ca30-0773-4776-ab79-aa76f7984435",
      "text": "Design Platform Architecture",
      "custom_tooltip": "<b>Design Platform Architecture</b><br>Develop the technical architecture for the data access platform, including the selection of appropriate technologies, infrastructure components, and data storage solutions. This involves considering scalability, performance, security, and maintainability.<br><b>Resources needed:</b><br><ul><li>Data Architect</li><li>Software Engineers</li><li>Infrastructure Engineer</li><li>Security Specialist</li></ul>",

    {
      "id": "9912ddba-e62d-499d-97db-93903349c05d",
      "text": "Develop Platform User Interface",
      "custom_tooltip": "<b>Develop Platform User Interface</b><br>Design and develop the user interface for the data access platform, ensuring a user-friendly and intuitive experience. This involves creating wireframes, mockups, and prototypes, and conducting user testing to gather feedback.<br><b>Resources needed:</b><br><ul><li>UI/UX Designer</li><li>Frontend Developers</li><li>User Testers</li></ul>",

    {
      "id": "4a15444a-b79c-402a-8f6a-7321207056d1",
      "text": "Implement Data Access Controls",
      "custom_tooltip": "<b>Implement Data Access Controls</b><br>Implement robust data access controls to ensure that only authorized users can access sensitive data. This involves configuring authentication mechanisms, authorization rules, and data encryption techniques.<br><b>Resources needed:</b><br><ul><li>Security Specialist</li><li>Backend Developers</li><li>Database Administrator</li></ul>",
      "start_date": "2030-10-09",
      "duration": 12.0,
      "progress": 0,
      "open": true,
      "meta": "9912ddba-e62d-499d-97db-93903349c05d FS",

    },
    {
      "id": "0e273827-d7f4-42ed-af22-385016b11203",
      "text": "Test and Deploy Platform",
      "custom_tooltip": "<b>Test and Deploy Platform</b><br>Conduct thorough testing of the data access platform to ensure that it meets all requirements and performs as expected. This involves creating test cases, executing tests, and fixing any bugs or issues. Once testing is complete, deploy the platform to a production environment.<br><b>Resources needed:</b><br><ul><li>QA Testers</li><li>DevOps Engineer</li><li>Software Engineers</li></ul>",
      "start_date": "2030-10-21",
      "duration": 12.0,
      "progress": 0,
      "open": true,
      "meta": "f70cc17b-f1c9-4916-b443-2e184b5dfb13 FF, 4a15444a-b79c-402a-8f6a-7321207056d1 FS",
      "parent": "f70cc17b-f1c9-4916-b443-2e184b5dfb13"
    },

      "custom_tooltip": "<b>Establish Data Licensing Model</b>",

    {
      "id": "8b6548a5-c26d-449b-ae9b-8d6029653811",
      "text": "Research existing data licensing models",
      "custom_tooltip": "<b>Research existing data licensing models</b><br>Objective: Identify suitable data licensing models for the digitized archival content.\nScope: Research Creative Commons, Open Data Commons, and other relevant licenses.\nSteps: 1. Identify key stakeholders. 2. Review existing licensing models. 3. Document findings.\nDeliverables: Report on suitable licensing models.<br><b>Resources needed:</b><br><ul><li>Legal counsel</li><li>Data governance specialist</li><li>Archival expert</li></ul>",
      "start_date": "2030-11-02",
      "duration": 8.0,
      "progress": 0,
      "open": true,
      "meta": "4b49ccd6-f865-4fe6-a493-69fd0cfdb590 SS",
      "parent": "4b49ccd6-f865-4fe6-a493-69fd0cfdb590"
    },
    {
      "id": "1a9b5405-a6b7-44b6-aef4-955ff30bb831",
      "text": "Define data usage terms and conditions",
      "custom_tooltip": "<b>Define data usage terms and conditions</b><br>Objective: Establish clear terms and conditions for data access and usage.\nScope: Define permitted uses, restrictions, attribution requirements, and liability disclaimers.\nSteps: 1. Consult with legal counsel. 2. Draft terms and conditions. 3. Obtain stakeholder approval.\nDeliverables: Data usage terms and conditions document.<br><b>Resources needed:</b><br><ul><li>Legal counsel</li><li>Data governance specialist</li><li>Stakeholders</li></ul>",
      "start_date": "2030-11-10",
      "duration": 8.0,
      "progress": 0,
      "open": true,
      "meta": "8b6548a5-c26d-449b-ae9b-8d6029653811 FS",
      "parent": "4b49ccd6-f865-4fe6-a493-69fd0cfdb590"
    },
    {
      "id": "13721146-4fdd-4dbe-b116-95d64919d56f",
      "text": "Draft data licensing agreement templates",
      "custom_tooltip": "<b>Draft data licensing agreement templates</b><br>Objective: Create standardized data licensing agreement templates for different usage scenarios.\nScope: Develop templates for commercial and non-commercial use, research purposes, and educational use.\nSteps: 1. Adapt existing templates. 2. Customize for project needs. 3. Obtain legal review.\nDeliverables: Data licensing agreement templates.<br><b>Resources needed:</b><br><ul><li>Legal counsel</li><li>Data governance specialist</li></ul>",
      "start_date": "2030-11-18",
      "duration": 8.0,
      "progress": 0,
      "open": true,
      "meta": "1a9b5405-a6b7-44b6-aef4-955ff30bb831 FS",
      "parent": "4b49ccd6-f865-4fe6-a493-69fd0cfdb590"
    },
    {
      "id": "47dec448-375a-4ec5-83bf-e21745942763",
      "text": "Obtain stakeholder approval on licensing model",
      "custom_tooltip": "<b>Obtain stakeholder approval on licensing model</b><br>Objective: Secure approval from key stakeholders on the selected data licensing model and agreement templates.\nScope: Present the proposed licensing model to stakeholders, address concerns, and obtain formal approval.\nSteps: 1. Schedule stakeholder meetings. 2. Present licensing model. 3. Address concerns. 4. Obtain approval.\nDeliverables: Signed approval document from stakeholders.<br><b>Resources needed:</b><br><ul><li>Project manager</li><li>Data governance specialist</li><li>Stakeholders</li></ul>",
      "start_date": "2030-11-26",
      "duration": 8.0,
      "progress": 0,
      "open": true,
      "meta": "4b49ccd6-f865-4fe6-a493-69fd0cfdb590 FF, 13721146-4fdd-4dbe-b116-95d64919d56f FS",

    },

    {
      "id": "80feb22f-ebcc-4388-be1d-44193f681a37",
      "text": "Design Data-as-a-Service API",
      "custom_tooltip": "<b>Design Data-as-a-Service API</b><br>Define the API endpoints, data formats, and authentication mechanisms for the Data-as-a-Service platform. This includes specifying the data retrieval methods, request parameters, and response structures. Ensure the API is scalable, secure, and well-documented.<br><b>Resources needed:</b><br><ul><li>Software Architects</li><li>API Developers</li><li>Security Experts</li></ul>",
      "start_date": "2030-12-04",
      "duration": 15.0,
      "progress": 0,
      "open": true,
      "meta": "5decea0c-85d2-4fef-b82f-be203ca94ee3 SS",
      "parent": "5decea0c-85d2-4fef-b82f-be203ca94ee3"
    },
    {
      "id": "40778e7a-22f4-4ab5-bcdf-66b1445b80c9",
      "text": "Develop Data Transformation Pipelines",
      "custom_tooltip": "<b>Develop Data Transformation Pipelines</b><br>Create the necessary data transformation pipelines to convert the raw digitized data into a standardized format suitable for consumption via the Data-as-a-Service platform. This includes data cleaning, normalization, and enrichment processes. Ensure data quality and consistency.<br><b>Resources needed:</b><br><ul><li>Data Engineers</li><li>ETL Developers</li><li>Data Quality Analysts</li></ul>",
      "start_date": "2030-12-19",
      "duration": 15.0,
      "progress": 0,
      "open": true,
      "meta": "80feb22f-ebcc-4388-be1d-44193f681a37 FS",
      "parent": "5decea0c-85d2-4fef-b82f-be203ca94ee3"
    },
    {
      "id": "5f631aa9-5b10-4024-8d8f-94312e1983b1",
      "text": "Integrate with Archive Systems",
      "custom_tooltip": "<b>Integrate with Archive Systems</b><br>Integrate the Data-as-a-Service platform with existing archive systems to enable seamless data retrieval and delivery. This includes establishing secure connections, mapping data fields, and handling data synchronization. Ensure compatibility and data integrity.<br><b>Resources needed:</b><br><ul><li>Integration Specialists</li><li>Database Administrators</li><li>Security Engineers</li></ul>",
      "start_date": "2031-01-03",
      "duration": 15.0,
      "progress": 0,
      "open": true,
      "meta": "40778e7a-22f4-4ab5-bcdf-66b1445b80c9 FS",
      "parent": "5decea0c-85d2-4fef-b82f-be203ca94ee3"
    },
    {
      "id": "6865252d-7f7c-45ec-b273-848373a1920e",
      "text": "Implement Security and Access Controls",
      "custom_tooltip": "<b>Implement Security and Access Controls</b><br>Implement robust security and access controls to protect the digitized data and ensure compliance with data privacy regulations. This includes user authentication, authorization, and data encryption. Ensure data security and confidentiality.<br><b>Resources needed:</b><br><ul><li>Security Engineers</li><li>Identity Management Specialists</li><li>Compliance Officers</li></ul>",
      "start_date": "2031-01-18",
      "duration": 15.0,
      "progress": 0,
      "open": true,
      "meta": "5decea0c-85d2-4fef-b82f-be203ca94ee3 FF, 5f631aa9-5b10-4024-8d8f-94312e1983b1 FS",

    {

    {
      "id": "cc3528e7-eecd-4087-8716-e445de31137f",
      "text": "Schedule Post-Project Review Meeting",
      "custom_tooltip": "<b>Schedule Post-Project Review Meeting</b><br>Objective: Schedule a meeting with all key stakeholders to review the project&#x27;s performance and outcomes.\nScope: Identify and invite all relevant stakeholders, determine a suitable date and time, and secure a meeting location or virtual platform.\nSteps: 1. Identify key stakeholders. 2. Send out meeting invitations with proposed dates and times. 3. Confirm attendance and finalize the meeting schedule. 4. Book a meeting room or set up a virtual meeting platform.\nDeliverables: A confirmed meeting schedule with all key stakeholders in attendance.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Project Coordinator</li><li>Stakeholders</li></ul>",
      "start_date": "2031-05-15",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "7ca18ed3-c0c1-4d1f-b35a-4a391efdded1 SS",
      "parent": "7ca18ed3-c0c1-4d1f-b35a-4a391efdded1"
    },
    {
      "id": "aa3441fa-6350-447c-869f-0f1cf3212785",
      "text": "Gather Project Documentation",
      "custom_tooltip": "<b>Gather Project Documentation</b><br>Objective: Collect all relevant project documentation to facilitate the post-project review.\nScope: Compile all project plans, reports, meeting minutes, deliverables, and other relevant documents.\nSteps: 1. Identify all sources of project documentation. 2. Collect and organize the documents in a central repository. 3. Ensure that all documents are complete and up-to-date.\nDeliverables: A complete and organized collection of project documentation.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Project Team Members</li><li>Document Management System</li></ul>",
      "start_date": "2031-05-17",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "cc3528e7-eecd-4087-8716-e445de31137f FS",
      "parent": "7ca18ed3-c0c1-4d1f-b35a-4a391efdded1"
    },
    {
      "id": "e20d5322-c451-446f-8fd9-144cbe03e994",
      "text": "Prepare Review Presentation",
      "custom_tooltip": "<b>Prepare Review Presentation</b><br>Objective: Create a presentation summarizing the project&#x27;s key achievements, challenges, and lessons learned.\nScope: Develop a concise and informative presentation that covers all relevant aspects of the project.\nSteps: 1. Review project documentation and identify key highlights. 2. Create presentation slides with relevant data and visuals. 3. Practice the presentation to ensure a smooth delivery.\nDeliverables: A well-prepared presentation summarizing the project&#x27;s performance.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Project Team Members</li><li>Presentation Software</li></ul>",
      "start_date": "2031-05-19",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "aa3441fa-6350-447c-869f-0f1cf3212785 FS",
      "parent": "7ca18ed3-c0c1-4d1f-b35a-4a391efdded1"
    },
    {
      "id": "5e8e9c3c-bac5-461c-b005-780ce25c8583",
      "text": "Facilitate Review Discussion",
      "custom_tooltip": "<b>Facilitate Review Discussion</b><br>Objective: Lead the post-project review meeting and facilitate a productive discussion among stakeholders.\nScope: Guide the discussion, encourage participation, and capture key insights and lessons learned.\nSteps: 1. Present the project summary and key findings. 2. Facilitate a discussion on the project&#x27;s successes and challenges. 3. Capture key lessons learned and recommendations for future projects.\nDeliverables: A productive post-project review meeting with valuable insights and lessons learned captured.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Facilitator</li><li>Note-taker</li></ul>",
      "start_date": "2031-05-21",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "e20d5322-c451-446f-8fd9-144cbe03e994 FS",
      "parent": "7ca18ed3-c0c1-4d1f-b35a-4a391efdded1"
    },
    {
      "id": "1e425243-fc50-4abb-89a1-3d752ccc36db",
      "text": "Document Lessons Learned",
      "custom_tooltip": "<b>Document Lessons Learned</b><br>Objective: Document the key lessons learned from the project and create a report for future reference.\nScope: Compile all insights and recommendations from the post-project review into a comprehensive report.\nSteps: 1. Review the notes and recordings from the post-project review meeting. 2. Summarize the key lessons learned and recommendations. 3. Create a report that can be used to improve future projects.\nDeliverables: A comprehensive report documenting the lessons learned from the project.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Project Team Members</li><li>Report Writing Software</li></ul>",
      "start_date": "2031-05-23",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "7ca18ed3-c0c1-4d1f-b35a-4a391efdded1 FF, 5e8e9c3c-bac5-461c-b005-780ce25c8583 FS",
      "parent": "7ca18ed3-c0c1-4d1f-b35a-4a391efdded1"
    },
    {

    {
      "id": "2eefcf54-b8a6-4798-9ad2-70ed97ec86a4",
      "text": "Identify all project data for archival",
      "custom_tooltip": "<b>Identify all project data for archival</b><br>Objective: Locate and catalog all project-related data.\nScope: Includes documents, datasets, code, and communications.\nSteps: Review project repositories, consult with team members, create a data inventory.\nDeliverables: A comprehensive list of project data.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Data Manager</li><li>Team Members</li></ul>",
      "start_date": "2031-05-25",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "d19a8cdd-8bc1-49d1-b978-7138b40d3cb0 SS",

    },
    {
      "id": "e990f7e6-df2e-4d21-aadb-8d255fbdc3d4",
      "text": "Prepare data for long-term storage",
      "custom_tooltip": "<b>Prepare data for long-term storage</b><br>Objective: Ensure data is in a suitable format for archival.\nScope: Includes data cleaning, format conversion, and metadata creation.\nSteps: Validate data integrity, convert to archival formats (e.g., PDF/A, TIFF), add descriptive metadata.\nDeliverables: Archival-ready data packages.<br><b>Resources needed:</b><br><ul><li>Data Manager</li><li>Archivist</li><li>Data Conversion Tools</li></ul>",
      "start_date": "2031-05-27",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "2eefcf54-b8a6-4798-9ad2-70ed97ec86a4 FS",
      "parent": "d19a8cdd-8bc1-49d1-b978-7138b40d3cb0"
    },
    {
      "id": "c07fa349-a375-4e38-a58f-9a87e205e01a",
      "text": "Transfer data to archival system",
      "custom_tooltip": "<b>Transfer data to archival system</b><br>Objective: Move data to the designated archival storage.\nScope: Includes physical or digital transfer, verification of data integrity.\nSteps: Copy data to archival media (e.g., tape, cloud storage), verify transfer success, document transfer process.\nDeliverables: Data safely stored in the archival system.<br><b>Resources needed:</b><br><ul><li>Data Manager</li><li>IT Support</li><li>Archival Storage System</li></ul>",
      "start_date": "2031-05-29",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "e990f7e6-df2e-4d21-aadb-8d255fbdc3d4 FS",
      "parent": "d19a8cdd-8bc1-49d1-b978-7138b40d3cb0"
    },
    {
      "id": "bfecae17-d453-4fb2-9426-2379eee46cdd",
      "text": "Verify data integrity in archive",
      "custom_tooltip": "<b>Verify data integrity in archive</b><br>Objective: Confirm data is accessible and uncorrupted in the archive.\nScope: Includes testing data retrieval and verifying checksums.\nSteps: Retrieve sample data, calculate checksums, compare with original checksums.\nDeliverables: Confirmation of data integrity in the archive.<br><b>Resources needed:</b><br><ul><li>Data Manager</li><li>Archivist</li><li>Data Verification Tools</li></ul>",
      "start_date": "2031-05-31",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "d19a8cdd-8bc1-49d1-b978-7138b40d3cb0 FF, c07fa349-a375-4e38-a58f-9a87e205e01a FS",
      "parent": "d19a8cdd-8bc1-49d1-b978-7138b40d3cb0"
    },
    {
      "id": "dd41da1f-c925-4760-a5f6-58d92a6e28c5",
      "text": "Decommission MIUs",
      "custom_tooltip": "<b>Decommission MIUs</b>",
      "progress": 0,
      "open": true,
      "meta": "d19a8cdd-8bc1-49d1-b978-7138b40d3cb0 FS",
      "parent": "e96638a1-8fd3-4b19-8ef6-2b7b3877d853",
      "type": "project"
    },
    {
      "id": "5a189013-92ba-4e1d-b7df-ccb0824d390a",
      "text": "Assess MIU Condition and Inventory",
      "custom_tooltip": "<b>Assess MIU Condition and Inventory</b><br>Objective: Determine the current state of each MIU and its contents. Scope: Physical inspection of each MIU, cataloging equipment, identifying hazardous materials. Steps: Conduct visual inspection, record equipment serial numbers, document any damage, identify and label hazardous materials. Deliverables: Condition report for each MIU, inventory list of equipment and materials.<br><b>Resources needed:</b><br><ul><li>Maintenance Engineer</li><li>Inventory Manager</li><li>Environmental Safety Officer</li></ul>",
      "start_date": "2031-06-02",
      "duration": 5.0,
      "progress": 0,
      "open": true,
      "meta": "dd41da1f-c925-4760-a5f6-58d92a6e28c5 SS",
      "parent": "dd41da1f-c925-4760-a5f6-58d92a6e28c5"
    },
    {
      "id": "27128122-e332-4fea-b8b0-13a6d9d25644",
      "text": "Develop Decommissioning Plan",
      "custom_tooltip": "<b>Develop Decommissioning Plan</b><br>Objective: Create a detailed plan for safely and efficiently decommissioning the MIUs. Scope: Identify disposal options, estimate costs, comply with environmental regulations. Steps: Research disposal methods, obtain quotes from contractors, prepare environmental impact assessment. Deliverables: Decommissioning plan document, cost estimate, environmental compliance report.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Environmental Consultant</li><li>Legal Counsel</li></ul>",
      "start_date": "2031-06-07",
      "duration": 5.0,
      "progress": 0,
      "open": true,
      "meta": "5a189013-92ba-4e1d-b7df-ccb0824d390a FS",
      "parent": "dd41da1f-c925-4760-a5f6-58d92a6e28c5"
    },
    {
      "id": "f2442d39-c497-4d40-9656-4b18bb86c9d6",
      "text": "Secure Disposal or Repurposing Agreements",
      "custom_tooltip": "<b>Secure Disposal or Repurposing Agreements</b><br>Objective: Finalize agreements for the disposal or repurposing of the MIUs. Scope: Negotiate contracts, obtain necessary permits, coordinate logistics. Steps: Contact disposal facilities, negotiate contract terms, apply for permits. Deliverables: Signed disposal or repurposing agreements, permits, logistics plan.<br><b>Resources needed:</b><br><ul><li>Contracts Manager</li><li>Permitting Specialist</li><li>Logistics Coordinator</li></ul>",
      "start_date": "2031-06-12",
      "duration": 5.0,
      "progress": 0,
      "open": true,
      "meta": "27128122-e332-4fea-b8b0-13a6d9d25644 FS",
      "parent": "dd41da1f-c925-4760-a5f6-58d92a6e28c5"
    },
    {
      "id": "618cb070-9752-4287-a614-649c4802d7c3",
      "text": "Execute MIU Decommissioning",
      "custom_tooltip": "<b>Execute MIU Decommissioning</b><br>Objective: Physically decommission the MIUs according to the approved plan. Scope: Remove equipment, dispose of hazardous materials, transport containers. Steps: Disconnect utilities, remove equipment, package hazardous materials, transport containers to disposal site. Deliverables: Decommissioned MIUs, disposal manifests, site cleanup report.<br><b>Resources needed:</b><br><ul><li>Decommissioning Crew</li><li>Hazardous Materials Handler</li><li>Transportation Company</li></ul>",
      "start_date": "2031-06-17",
      "duration": 5.0,

    function zoomFit() {
        const tasks = gantt.getTaskByTime();
        if (tasks.length > 0) {
            const firstTask = tasks[0];
            const lastTask = tasks[tasks.length - 1];
            gantt.showDate(firstTask.start_date);
            
            // Calculate total duration in days
            const startDate = new Date(firstTask.start_date);
            const endDate = new Date(lastTask.end_date);
            const durationDays = (endDate - startDate) / (1000 * 60 * 60 * 24);
            
            // Choose appropriate scale based on duration
            if (durationDays > 3650) { // More than 10 years
                gantt.config.scale_unit = "year";
                gantt.config.step = 10;
                gantt.config.subscales = [
                    {unit: "year", step: 1, date: "%Y"}
                ];
            } else if (durationDays > 365) { // More than 1 year
                gantt.config.scale_unit = "year";
                gantt.config.step = 1;
                gantt.config.subscales = [
                    {unit: "month", step: 1, date: "%M"}
                ];
            } else if (durationDays > 30) { // More than 1 month
                gantt.config.scale_unit = "month";
                gantt.config.step = 1;
                gantt.config.subscales = [
                    {unit: "day", step: 1, date: "%d"}
                ];
            } else if (durationDays > 7) { // More than 1 week
                gantt.config.scale_unit = "week";
                gantt.config.step = 1;
                gantt.config.subscales = [
                    {unit: "day", step: 1, date: "%d"}
                ];
            } else {
                gantt.config.scale_unit = "day";
                gantt.config.step = 1;
                gantt.config.subscales = [];
            }
            gantt.render();
        }
    }

    function zoomIn() {
        const currentUnit = gantt.config.scale_unit;
        const currentStep = gantt.config.step;
        
        if (currentUnit === "year" && currentStep === 10) {
            gantt.config.scale_unit = "year";
            gantt.config.step = 1;
            gantt.config.subscales = [
                {unit: "month", step: 1, date: "%M"}
            ];
        } else if (currentUnit === "year") {
            gantt.config.scale_unit = "month";
            gantt.config.step = 1;
            gantt.config.subscales = [
                {unit: "day", step: 1, date: "%d"}
            ];
        } else if (currentUnit === "month") {
            gantt.config.scale_unit = "week";
            gantt.config.step = 1;
            gantt.config.subscales = [
                {unit: "day", step: 1, date: "%d"}
            ];
        } else if (currentUnit === "week") {
            gantt.config.scale_unit = "day";
            gantt.config.step = 1;
            gantt.config.subscales = [];
        }
        gantt.render();
    }

    function zoomOut() {
        const currentUnit = gantt.config.scale_unit;
        const currentStep = gantt.config.step;
        
        if (currentUnit === "day") {
            gantt.config.scale_unit = "week";
            gantt.config.step = 1;
            gantt.config.subscales = [
                {unit: "day", step: 1, date: "%d"}
            ];
        } else if (currentUnit === "week") {
            gantt.config.scale_unit = "month";
            gantt.config.step = 1;
            gantt.config.subscales = [
                {unit: "day", step: 1, date: "%d"}
            ];
        } else if (currentUnit === "month") {
            gantt.config.scale_unit = "year";
            gantt.config.step = 1;
            gantt.config.subscales = [
                {unit: "month", step: 1, date: "%M"}
            ];
        } else if (currentUnit === "year") {
            gantt.config.scale_unit = "year";
            gantt.config.step = 10;
            gantt.config.subscales = [
                {unit: "year", step: 1, date: "%Y"}
            ];
        }
        gantt.render();
    }

    function downloadCSV() {
        if (GANTT_DATA_CSV === null) {
            return;
        }
        const blob = new Blob([GANTT_DATA_CSV], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        const url = URL.createObjectURL(blob);
        link.setAttribute('href', url);
        link.setAttribute('download', GANTT_FILENAME_CSV);
        link.style.visibility = 'hidden';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    // Gantt Initialization
    gantt.config.readonly = true;
    gantt.config.date_format = "%Y-%m-%d";
    gantt.config.scale_unit = "month";
    gantt.config.step = 1;
    gantt.config.subscales = [
        {unit: "day", step: 1, date: "%d"}
    ];

    gantt.config.columns = [
        {name:"text", label:"Task name", width:"*", tree:true},
        // {name:"start_date", label:"Start time", align: "center"},
        // {name:"duration", label:"Duration", align: "center"}
    ];

    gantt.templates.task_class = function(start, end, task) {
        if (task.type === "project") {
            return "project-task";
        }
        return "";
    };

    gantt.templates.tooltip_text = function(start, end, task) {
        return task.custom_tooltip || "No tooltip";
    };
    
	gantt.plugins({
		tooltip: true
	});
	gantt.attachEvent("onGanttReady", function(){
		var tooltips = gantt.ext.tooltips;
		tooltips.tooltip.setViewport(gantt.$task_data);
	});
    gantt.init("gantt_container");
    gantt.parse(GANTT_DATA_DHTMLX);

    // Hide the export to CSV button if there is no CSV data
    if (GANTT_DATA_CSV === null) {
        document.getElementById('exportToCSVButton').style.display = 'none';
    }

    document.getElementById('zoomFitButton').addEventListener('click', zoomFit);
    document.getElementById('zoomInButton').addEventListener('click', zoomIn);
    document.getElementById('zoomOutButton').addEventListener('click', zoomOut);
    document.getElementById('exportToCSVButton').addEventListener('click', downloadCSV);
</script>
