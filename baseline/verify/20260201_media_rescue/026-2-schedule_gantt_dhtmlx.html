    {
      "id": "d9a30a18-c049-4ed2-bb4f-8404be56dd38",
      "text": "Define Equipment Placement and Workflow",
      "custom_tooltip": "<b>Define Equipment Placement and Workflow</b><br>Determine the optimal placement of all equipment within the container to maximize workflow efficiency and minimize space constraints. Consider ergonomics and accessibility for operators.<br><b>Resources needed:</b><br><ul><li>Industrial Designer</li><li>Ergonomics Specialist</li><li>Process Engineer</li></ul>",
      "start_date": "2026-06-27",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "435c1d6e-0509-452b-8925-a651e9235306 SS",
      "parent": "435c1d6e-0509-452b-8925-a651e9235306"
    },
    {
      "id": "26982c9f-f25f-49d2-8021-9532a1ea9fdd",
      "text": "Develop Detailed Container Layout Drawings",
      "custom_tooltip": "<b>Develop Detailed Container Layout Drawings</b><br>Create detailed 2D and 3D drawings of the container layout, including precise dimensions, equipment specifications, and utility connections. Ensure compliance with safety and regulatory requirements.<br><b>Resources needed:</b><br><ul><li>CAD Technician</li><li>Draftsperson</li><li>Electrical Engineer</li><li>HVAC Engineer</li></ul>",
      "start_date": "2026-06-30",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "d9a30a18-c049-4ed2-bb4f-8404be56dd38 FS",
      "parent": "435c1d6e-0509-452b-8925-a651e9235306"
    },
    {
      "id": "93ab2ee9-a5f5-4c5b-8439-cfb8d2d6fee7",
      "text": "Simulate Container Environment and Usage",
      "custom_tooltip": "<b>Simulate Container Environment and Usage</b><br>Use simulation software to model the container environment, including temperature, humidity, and airflow. Simulate equipment operation and operator movements to identify potential issues and optimize the layout.<br><b>Resources needed:</b><br><ul><li>Simulation Engineer</li><li>Environmental Engineer</li><li>Process Engineer</li></ul>",
      "start_date": "2026-07-03",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "26982c9f-f25f-49d2-8021-9532a1ea9fdd FS",
      "parent": "435c1d6e-0509-452b-8925-a651e9235306"
    },
    {
      "id": "2ab8b40a-9772-416c-9547-f182e0990a09",
      "text": "Review Layout with Stakeholders",
      "custom_tooltip": "<b>Review Layout with Stakeholders</b><br>Present the container layout drawings and simulation results to key stakeholders, including operators, maintenance personnel, and project managers. Gather feedback and incorporate necessary revisions.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Industrial Designer</li><li>Operators</li><li>Maintenance Personnel</li></ul>",
      "start_date": "2026-07-06",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "435c1d6e-0509-452b-8925-a651e9235306 FF, 93ab2ee9-a5f5-4c5b-8439-cfb8d2d6fee7 FS",
      "parent": "435c1d6e-0509-452b-8925-a651e9235306"
    },

      "id": "6e59c0ee-f736-4d8f-bfcf-b28ee682d627",
      "text": "Procure Container and Equipment",
      "custom_tooltip": "<b>Procure Container and Equipment</b>",
      "progress": 0,
      "open": true,
      "meta": "435c1d6e-0509-452b-8925-a651e9235306 FS",
      "parent": "7dd194cc-0799-4f37-8f3b-fbc277979404",
      "type": "project"
    },
    {
      "id": "0a386a56-4bd8-4493-ab51-46ee161b5db5",
      "text": "Identify and Vet Potential Suppliers",
      "custom_tooltip": "<b>Identify and Vet Potential Suppliers</b><br>Objective: Identify and vet potential suppliers for the container, vintage equipment, robotic loading systems, climate control, power systems, and connectivity solutions.\nScope: Research and identify at least three potential suppliers for each major equipment category. Evaluate suppliers based on factors such as price, availability, reputation, and compliance with relevant standards.\nSteps:\n1. Conduct online research to identify potential suppliers.\n2. Contact suppliers to request quotes and information.\n3. Evaluate supplier proposals based on pre-defined criteria.\n4. Conduct reference checks and site visits (if necessary).\nDeliverables: A list of vetted suppliers for each major equipment category.<br><b>Resources needed:</b><br><ul><li>Procurement Specialist</li><li>Engineering Team</li><li>Legal Counsel</li></ul>",
      "start_date": "2026-07-09",
      "duration": 15.0,
      "progress": 0,
      "open": true,
      "meta": "6e59c0ee-f736-4d8f-bfcf-b28ee682d627 SS",
      "parent": "6e59c0ee-f736-4d8f-bfcf-b28ee682d627"
    },
    {
      "id": "2e11abce-bf80-4c88-83d2-aad5b7146650",
      "text": "Negotiate Contracts and Secure Agreements",
      "custom_tooltip": "<b>Negotiate Contracts and Secure Agreements</b><br>Objective: Negotiate contracts with selected suppliers and secure agreements for the procurement of the container, vintage equipment, robotic loading systems, climate control, power systems, and connectivity solutions.\nScope: Negotiate favorable contract terms with selected suppliers, including pricing, delivery schedules, payment terms, and warranty provisions. Ensure that contracts comply with all relevant legal and regulatory requirements.\nSteps:\n1. Develop contract templates.\n2. Negotiate contract terms with suppliers.\n3. Obtain legal review of contracts.\n4. Finalize and execute contracts.\nDeliverables: Signed contracts with selected suppliers.<br><b>Resources needed:</b><br><ul><li>Procurement Specialist</li><li>Legal Counsel</li><li>Project Manager</li></ul>",
      "start_date": "2026-07-24",
      "duration": 15.0,
      "progress": 0,
      "open": true,
      "meta": "0a386a56-4bd8-4493-ab51-46ee161b5db5 FS",
      "parent": "6e59c0ee-f736-4d8f-bfcf-b28ee682d627"
    },
    {
      "id": "ef6dfe8b-96d2-465b-ac88-0a116779b8ab",
      "text": "Manage Equipment Delivery and Logistics",
      "custom_tooltip": "<b>Manage Equipment Delivery and Logistics</b><br>Objective: Manage the delivery and logistics of the container, vintage equipment, robotic loading systems, climate control, power systems, and connectivity solutions to the designated integration site.\nScope: Coordinate with suppliers to ensure timely delivery of equipment. Manage transportation, storage, and handling of equipment to prevent damage or loss. Ensure that all necessary documentation is in place for customs clearance and import/export compliance.\nSteps:\n1. Develop a logistics plan.\n2. Coordinate with suppliers on delivery schedules.\n3. Arrange for transportation and storage of equipment.\n4. Track equipment shipments.\n5. Inspect equipment upon arrival.\nDeliverables: Equipment delivered to the integration site in good condition.<br><b>Resources needed:</b><br><ul><li>Logistics Coordinator</li><li>Procurement Specialist</li><li>Warehouse Staff</li></ul>",
      "start_date": "2026-08-08",
      "duration": 15.0,
      "progress": 0,
      "open": true,
      "meta": "2e11abce-bf80-4c88-83d2-aad5b7146650 FS",
      "parent": "6e59c0ee-f736-4d8f-bfcf-b28ee682d627"
    },
    {
      "id": "b5a1228c-80f2-46a8-848c-8863c29c857e",
      "text": "Verify Equipment Compliance and Specifications",
      "custom_tooltip": "<b>Verify Equipment Compliance and Specifications</b><br>Objective: Verify that the delivered container, vintage equipment, robotic loading systems, climate control, power systems, and connectivity solutions comply with specified requirements and specifications.\nScope: Conduct inspections and testing to ensure that equipment meets performance standards, safety regulations, and compatibility requirements. Address any discrepancies or issues with suppliers.\nSteps:\n1. Develop inspection checklists.\n2. Conduct equipment inspections.\n3. Perform functional testing.\n4. Document inspection results.\n5. Resolve any issues with suppliers.\nDeliverables: Verification reports confirming equipment compliance.<br><b>Resources needed:</b><br><ul><li>Engineering Team</li><li>Quality Assurance Specialist</li><li>Procurement Specialist</li></ul>",
      "start_date": "2026-08-23",
      "duration": 15.0,
      "progress": 0,
      "open": true,
      "meta": "6e59c0ee-f736-4d8f-bfcf-b28ee682d627 FF, ef6dfe8b-96d2-465b-ac88-0a116779b8ab FS",
      "parent": "6e59c0ee-f736-4d8f-bfcf-b28ee682d627"
    },
    {
      "id": "1617d922-077e-4b2a-b96c-62a3657c24bf",
      "text": "Integrate Robotic Loading Systems",
      "custom_tooltip": "<b>Integrate Robotic Loading Systems</b>",
      "progress": 0,
      "open": true,

    {
      "id": "32a7cf63-d16c-4230-b306-cbc0c8aee843",
      "text": "Design Robotic Loading System Interface",
      "custom_tooltip": "<b>Design Robotic Loading System Interface</b><br>Design the interface between the robotic loading system and the vintage equipment. This includes defining communication protocols, data formats, and control signals. Deliverables: Interface specification document, communication protocol definition.<br><b>Resources needed:</b><br><ul><li>Robotics Engineer</li><li>Electrical Engineer</li><li>Software Engineer</li></ul>",
      "start_date": "2026-09-07",
      "duration": 15.0,
      "progress": 0,
      "open": true,
      "meta": "1617d922-077e-4b2a-b96c-62a3657c24bf SS",
      "parent": "1617d922-077e-4b2a-b96c-62a3657c24bf"
    },
    {
      "id": "9a61ebe1-a011-4610-af7f-9c0bbfd9bbc2",
      "text": "Configure Robotic Arm for Media Handling",
      "custom_tooltip": "<b>Configure Robotic Arm for Media Handling</b><br>Configure the robotic arm for precise and gentle handling of various media types (tapes, films, cards). This includes programming movement sequences, adjusting grip force, and calibrating sensors. Deliverables: Robotic arm configuration files, calibration reports.<br><b>Resources needed:</b><br><ul><li>Robotics Technician</li><li>Software Engineer</li></ul>",
      "start_date": "2026-09-22",
      "duration": 15.0,
      "progress": 0,
      "open": true,
      "meta": "32a7cf63-d16c-4230-b306-cbc0c8aee843 FS",
      "parent": "1617d922-077e-4b2a-b96c-62a3657c24bf"
    },
    {
      "id": "4a308a16-90f3-4735-a207-41503cfb5ed0",
      "text": "Test Robotic Loading System Integration",
      "custom_tooltip": "<b>Test Robotic Loading System Integration</b><br>Conduct thorough testing of the integrated robotic loading system with the vintage equipment. This includes testing loading and unloading sequences, error handling, and safety mechanisms. Deliverables: Test reports, error logs.<br><b>Resources needed:</b><br><ul><li>Robotics Engineer</li><li>Electrical Engineer</li><li>Test Engineer</li></ul>",
      "start_date": "2026-10-07",
      "duration": 15.0,
      "progress": 0,
      "open": true,
      "meta": "9a61ebe1-a011-4610-af7f-9c0bbfd9bbc2 FS",
      "parent": "1617d922-077e-4b2a-b96c-62a3657c24bf"
    },
    {
      "id": "0a7bcd47-09ac-437c-b289-48c95034cf41",
      "text": "Optimize Loading System for Speed and Reliability",
      "custom_tooltip": "<b>Optimize Loading System for Speed and Reliability</b><br>Optimize the robotic loading system for maximum speed and reliability while minimizing the risk of damage to the media. This includes fine-tuning movement parameters, adjusting sensor thresholds, and implementing error recovery routines. Deliverables: Performance reports, optimized configuration files.<br><b>Resources needed:</b><br><ul><li>Robotics Engineer</li><li>Software Engineer</li><li>Vintage Equipment Specialist</li></ul>",
      "start_date": "2026-10-22",
      "duration": 15.0,
      "progress": 0,
      "open": true,
      "meta": "1617d922-077e-4b2a-b96c-62a3657c24bf FF, 4a308a16-90f3-4735-a207-41503cfb5ed0 FS",
      "parent": "1617d922-077e-4b2a-b96c-62a3657c24bf"
    },

    {
      "id": "7f1e040e-3669-407e-b4c1-04068bd8cc13",
      "text": "Select AI workstation hardware",
      "custom_tooltip": "<b>Select AI workstation hardware</b><br>Choose appropriate GPUs, CPUs, and memory configurations for AI signal processing workloads. Consider power consumption and cooling requirements.<br><b>Resources needed:</b><br><ul><li>AI Engineer</li><li>Hardware Specialist</li><li>Budget</li></ul>",

    {
      "id": "c994918e-5d4c-4845-9c67-7ac4eb372df4",
      "text": "Install AI software and libraries",
      "custom_tooltip": "<b>Install AI software and libraries</b><br>Set up the operating system, install necessary AI frameworks (TensorFlow, PyTorch), and configure libraries for signal processing and data analysis.<br><b>Resources needed:</b><br><ul><li>AI Engineer</li><li>System Administrator</li></ul>",

    },
    {
      "id": "9ae2c7e1-ef35-4282-8f00-ef880b8a7231",
      "text": "Integrate with vintage equipment I/O",
      "custom_tooltip": "<b>Integrate with vintage equipment I/O</b><br>Develop interfaces to receive signal data from vintage equipment and transmit processed data for storage and archival.<br><b>Resources needed:</b><br><ul><li>AI Engineer</li><li>Electrical Engineer</li><li>Vintage Equipment Specialist</li></ul>",
      "start_date": "2027-01-05",

      "progress": 0,
      "open": true,

    },
    {
      "id": "d9fa0cb8-7ecf-4531-b3c2-6b658a860674",
      "text": "Test and optimize workstation performance",
      "custom_tooltip": "<b>Test and optimize workstation performance</b><br>Run benchmark tests to evaluate the performance of the AI workstation and optimize configurations for speed and accuracy.<br><b>Resources needed:</b><br><ul><li>AI Engineer</li><li>Performance Analyst</li></ul>",
      "start_date": "2027-02-04",
      "duration": 30.0,
      "progress": 0,
      "open": true,

      "parent": "54f9ce69-8c92-4a2d-9c7f-a9e8cc023b44"
    },
    {
      "id": "59a8b1f8-ca5c-4c68-a39e-e4d6b39d9c87",
      "text": "Install Climate Control and Power Systems",
      "custom_tooltip": "<b>Install Climate Control and Power Systems</b>",
      "progress": 0,
      "open": true,
      "meta": "54f9ce69-8c92-4a2d-9c7f-a9e8cc023b44 FS",
      "parent": "7dd194cc-0799-4f37-8f3b-fbc277979404",
      "type": "project"
    },
    {
      "id": "f7bafaaa-d643-4bab-ac43-58c7077ae140",
      "text": "Plan climate control system installation",
      "custom_tooltip": "<b>Plan climate control system installation</b><br>Define the installation plan, including placement of units, ductwork routing, and control system integration.  Objective: Create a detailed plan for the physical installation of the climate control system. Scope: Covers all aspects of the physical installation, excluding electrical and power connections. Steps: Review container layout, determine optimal unit placement, design ductwork, plan control system integration, document the plan. Deliverables: Installation plan document.<br><b>Resources needed:</b><br><ul><li>HVAC Engineer</li><li>Container Design Specialist</li><li>Project Manager</li></ul>",
      "start_date": "2027-03-06",
      "duration": 6.0,
      "progress": 0,
      "open": true,
      "meta": "59a8b1f8-ca5c-4c68-a39e-e4d6b39d9c87 SS",
      "parent": "59a8b1f8-ca5c-4c68-a39e-e4d6b39d9c87"
    },
    {
      "id": "3e940fdf-e2e4-48f2-9778-5b345adca5c9",
      "text": "Install climate control units and ductwork",
      "custom_tooltip": "<b>Install climate control units and ductwork</b><br>Physically install the climate control units, ductwork, and related components within the container. Objective: Install the climate control system according to the installation plan. Scope: Includes the physical installation of all climate control components. Steps: Prepare container for installation, mount climate control units, install ductwork, connect components, test the installation. Deliverables: Installed climate control system.<br><b>Resources needed:</b><br><ul><li>HVAC Technician</li><li>Construction Crew</li><li>Project Manager</li></ul>",
      "start_date": "2027-03-12",
      "duration": 6.0,
      "progress": 0,
      "open": true,
      "meta": "f7bafaaa-d643-4bab-ac43-58c7077ae140 FS",
      "parent": "59a8b1f8-ca5c-4c68-a39e-e4d6b39d9c87"
    },
    {
      "id": "91d9f0e8-6b72-42ab-9665-c44c0912a034",
      "text": "Plan power system installation",
      "custom_tooltip": "<b>Plan power system installation</b><br>Define the installation plan for the power system, including wiring, grounding, and safety measures. Objective: Create a detailed plan for the electrical installation. Scope: Covers all aspects of the electrical installation, including wiring, grounding, and safety. Steps: Review container layout, determine wiring routes, plan grounding system, plan safety measures, document the plan. Deliverables: Power system installation plan document.<br><b>Resources needed:</b><br><ul><li>Electrical Engineer</li><li>Container Design Specialist</li><li>Project Manager</li></ul>",
      "start_date": "2027-03-18",
      "duration": 6.0,
      "progress": 0,
      "open": true,
      "meta": "3e940fdf-e2e4-48f2-9778-5b345adca5c9 FS",
      "parent": "59a8b1f8-ca5c-4c68-a39e-e4d6b39d9c87"
    },
    {
      "id": "6ad72849-83d7-45e2-a8d7-34f535915440",
      "text": "Install power systems and electrical wiring",
      "custom_tooltip": "<b>Install power systems and electrical wiring</b><br>Physically install the power system, including wiring, grounding, and safety components. Objective: Install the power system according to the installation plan. Scope: Includes the physical installation of all electrical components. Steps: Prepare container for installation, install wiring, install grounding system, install safety components, test the installation. Deliverables: Installed power system.<br><b>Resources needed:</b><br><ul><li>Electrician</li><li>Construction Crew</li><li>Project Manager</li></ul>",
      "start_date": "2027-03-24",
      "duration": 6.0,
      "progress": 0,
      "open": true,
      "meta": "91d9f0e8-6b72-42ab-9665-c44c0912a034 FS",
      "parent": "59a8b1f8-ca5c-4c68-a39e-e4d6b39d9c87"
    },
    {
      "id": "7c3be4e5-21e4-4d3b-bc73-51eff72f21c3",
      "text": "Test and commission systems",
      "custom_tooltip": "<b>Test and commission systems</b><br>Test the climate control and power systems to ensure proper functionality and safety. Objective: Verify the correct operation of both systems. Scope: Includes testing all aspects of both systems. Steps: Power up systems, test functionality, verify safety measures, document test results. Deliverables: Test report.<br><b>Resources needed:</b><br><ul><li>HVAC Technician</li><li>Electrician</li><li>Electrical Engineer</li><li>HVAC Engineer</li><li>Project Manager</li></ul>",
      "start_date": "2027-03-30",
      "duration": 6.0,
      "progress": 0,
      "open": true,
      "meta": "59a8b1f8-ca5c-4c68-a39e-e4d6b39d9c87 FF, 6ad72849-83d7-45e2-a8d7-34f535915440 FS",
      "parent": "59a8b1f8-ca5c-4c68-a39e-e4d6b39d9c87"
    },
    {
      "id": "99dfc1bb-f5a8-4f11-a327-d871add53b2b",
      "text": "Establish Connectivity Solutions",
      "custom_tooltip": "<b>Establish Connectivity Solutions</b>",
      "progress": 0,
      "open": true,
      "meta": "7dd194cc-0799-4f37-8f3b-fbc277979404 FF, 59a8b1f8-ca5c-4c68-a39e-e4d6b39d9c87 FS",
      "parent": "7dd194cc-0799-4f37-8f3b-fbc277979404",
      "type": "project"
    },
    {
      "id": "06edc772-72b4-4c8d-9391-b4684744db24",
      "text": "Assess Connectivity Needs and Options",
      "custom_tooltip": "<b>Assess Connectivity Needs and Options</b><br>Objective: Determine the optimal connectivity solution for each MIU deployment location, considering bandwidth requirements, reliability, and cost.\nScope: Evaluate satellite, fiber, and other connectivity options. Assess the availability and cost of each option at potential deployment sites.\nSteps: 1. Conduct site surveys to assess connectivity infrastructure. 2. Research available connectivity providers and their service offerings. 3. Analyze bandwidth requirements for digitization and data transfer. 4. Develop a cost-benefit analysis for each connectivity option.\nDeliverables: A report outlining the recommended connectivity solution for each MIU deployment location.<br><b>Resources needed:</b><br><ul><li>Network Engineer</li><li>Telecommunications Specialist</li><li>Site Survey Team</li></ul>",
      "start_date": "2027-04-05",
      "duration": 15.0,
      "progress": 0,
      "open": true,
      "meta": "99dfc1bb-f5a8-4f11-a327-d871add53b2b SS",
      "parent": "99dfc1bb-f5a8-4f11-a327-d871add53b2b"
    },
    {
      "id": "d2ce86fa-d3ae-44db-ac5d-3ce4d1992976",
      "text": "Negotiate Connectivity Agreements",
      "custom_tooltip": "<b>Negotiate Connectivity Agreements</b><br>Objective: Secure favorable connectivity agreements with selected providers, ensuring reliable and cost-effective service.\nScope: Negotiate contracts with satellite and fiber providers. Establish service level agreements (SLAs) to guarantee uptime and performance.\nSteps: 1. Prepare requests for proposals (RFPs) for connectivity services. 2. Evaluate proposals and select preferred providers. 3. Negotiate contract terms and SLAs. 4. Obtain legal review of contracts.\nDeliverables: Signed connectivity agreements with selected providers.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Contract Negotiator</li><li>Legal Counsel</li></ul>",
      "start_date": "2027-04-20",
      "duration": 15.0,
      "progress": 0,
      "open": true,
      "meta": "06edc772-72b4-4c8d-9391-b4684744db24 FS",
      "parent": "99dfc1bb-f5a8-4f11-a327-d871add53b2b"
    },
    {
      "id": "27d185ba-573e-41ab-b748-c062f73dc8b5",
      "text": "Install and Configure Connectivity Equipment",
      "custom_tooltip": "<b>Install and Configure Connectivity Equipment</b><br>Objective: Install and configure connectivity equipment at each MIU deployment location, ensuring seamless data transfer.\nScope: Install satellite dishes, fiber optic cables, and other necessary equipment. Configure network settings and security protocols.\nSteps: 1. Coordinate with connectivity providers to schedule installation. 2. Install and configure connectivity equipment. 3. Test connectivity and data transfer speeds. 4. Troubleshoot any connectivity issues.\nDeliverables: Fully functional connectivity at each MIU deployment location.<br><b>Resources needed:</b><br><ul><li>Network Technician</li><li>Installation Crew</li><li>Connectivity Provider Technicians</li></ul>",
      "start_date": "2027-05-05",
      "duration": 15.0,
      "progress": 0,
      "open": true,
      "meta": "d2ce86fa-d3ae-44db-ac5d-3ce4d1992976 FS",

    {
      "id": "f74fc42e-1892-420d-965c-6632c54447c3",
      "text": "Test and Validate Connectivity Performance",
      "custom_tooltip": "<b>Test and Validate Connectivity Performance</b><br>Objective: Verify that the installed connectivity solutions meet the required performance standards for data transfer and remote access.\nScope: Conduct thorough testing of bandwidth, latency, and reliability. Validate that the connectivity supports the digitization workflow and remote monitoring capabilities.\nSteps: 1. Develop a testing plan with specific performance metrics. 2. Conduct baseline tests to establish initial performance levels. 3. Simulate typical digitization workloads to assess performance under load. 4. Document test results and identify any areas for improvement.\nDeliverables: A comprehensive report validating the connectivity performance at each MIU location.<br><b>Resources needed:</b><br><ul><li>Network Engineer</li><li>Quality Assurance Tester</li><li>Data Analyst</li></ul>",
      "start_date": "2027-05-20",
      "duration": 15.0,
      "progress": 0,

    },

      "id": "c217bf40-e5af-41c8-9e0e-500b6d78e2db",
      "text": "Acquire and Refurbish Vintage Equipment",
      "custom_tooltip": "<b>Acquire and Refurbish Vintage Equipment</b>",
      "progress": 0,
      "open": true,
      "meta": "7edc8284-6416-4080-9f46-c1b45444e375 SS",

    {
      "id": "93f7928a-af91-4b73-8e81-4fce245d989c",
      "text": "Identify potential vintage equipment sources",
      "custom_tooltip": "<b>Identify potential vintage equipment sources</b><br>Objective: Identify potential sources for acquiring vintage equipment.\nScope: Research online marketplaces, antique shops, collectors, and other potential sources.\nSteps: 1. Conduct online searches. 2. Contact antique shops and collectors. 3. Attend relevant auctions and events. 4. Document potential sources and their offerings.\nDeliverables: A list of potential vintage equipment sources with contact information and equipment availability.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Vintage Equipment Specialist</li><li>Researcher</li></ul>",
      "start_date": "2027-06-04",
      "duration": 45.0,
      "progress": 0,
      "open": true,
      "meta": "c217bf40-e5af-41c8-9e0e-500b6d78e2db SS",
      "parent": "c217bf40-e5af-41c8-9e0e-500b6d78e2db"
    },
    {
      "id": "97a1eee7-d501-40ea-8b5d-e43166fd570e",
      "text": "Assess condition of acquired equipment",
      "custom_tooltip": "<b>Assess condition of acquired equipment</b><br>Objective: Evaluate the condition of acquired vintage equipment.\nScope: Inspect equipment for damage, functionality, and completeness.\nSteps: 1. Visually inspect equipment for physical damage. 2. Test equipment functionality where possible. 3. Document any issues or missing parts. 4. Determine the level of refurbishment required.\nDeliverables: A condition report for each piece of acquired vintage equipment, including photos and a list of required repairs.<br><b>Resources needed:</b><br><ul><li>Vintage Equipment Specialist</li><li>Maintenance Engineer</li></ul>",
      "start_date": "2027-07-19",
      "duration": 45.0,
      "progress": 0,
      "open": true,
      "meta": "93f7928a-af91-4b73-8e81-4fce245d989c FS",
      "parent": "c217bf40-e5af-41c8-9e0e-500b6d78e2db"
    },
    {
      "id": "9990ca73-b29a-4f0e-bc19-202ab41a8b06",
      "text": "Develop refurbishment plan for each unit",
      "custom_tooltip": "<b>Develop refurbishment plan for each unit</b><br>Objective: Create a detailed refurbishment plan for each piece of vintage equipment.\nScope: Outline the steps required to restore the equipment to working order.\nSteps: 1. Identify required repairs and parts replacements. 2. Estimate the cost of refurbishment. 3. Develop a timeline for completing the refurbishment. 4. Document the refurbishment plan.\nDeliverables: A detailed refurbishment plan for each piece of vintage equipment, including a list of required parts, cost estimates, and a timeline.<br><b>Resources needed:</b><br><ul><li>Vintage Equipment Specialist</li><li>Maintenance Engineer</li><li>Project Manager</li></ul>",
      "start_date": "2027-09-02",
      "duration": 45.0,
      "progress": 0,
      "open": true,
      "meta": "97a1eee7-d501-40ea-8b5d-e43166fd570e FS",
      "parent": "c217bf40-e5af-41c8-9e0e-500b6d78e2db"
    },
    {
      "id": "3c537c22-b355-49f0-af79-8d4dc137933c",
      "text": "Execute refurbishment and testing",
      "custom_tooltip": "<b>Execute refurbishment and testing</b><br>Objective: Refurbish the vintage equipment according to the refurbishment plan.\nScope: Perform repairs, replace parts, and test equipment functionality.\nSteps: 1. Procure necessary parts and materials. 2. Perform repairs and replacements. 3. Test equipment functionality. 4. Document the refurbishment process.\nDeliverables: Refurbished vintage equipment that meets the required functionality standards.<br><b>Resources needed:</b><br><ul><li>Maintenance Engineer</li><li>Technician</li></ul>",
      "start_date": "2027-10-17",
      "duration": 45.0,
      "progress": 0,
      "open": true,
      "meta": "c217bf40-e5af-41c8-9e0e-500b6d78e2db FF, 9990ca73-b29a-4f0e-bc19-202ab41a8b06 FS",
      "parent": "c217bf40-e5af-41c8-9e0e-500b6d78e2db"
    },

      "custom_tooltip": "<b>Establish Parts Inventory</b>",

      "type": "project"

    {
      "id": "68437073-b30f-4069-9858-93f4f7bc912a",
      "text": "Identify critical vintage equipment parts",
      "custom_tooltip": "<b>Identify critical vintage equipment parts</b><br>Objective: Determine which parts are most crucial for maintaining vintage equipment.\nScope: Analyze equipment manuals, consult with engineers, and review maintenance records.\nSteps: 1. Review equipment documentation. 2. Interview maintenance personnel. 3. Prioritize parts based on failure rates and availability.\nDeliverables: A list of critical parts with estimated usage rates.<br><b>Resources needed:</b><br><ul><li>Vintage Equipment Maintenance Specialist</li><li>Engineering Training Program Coordinator</li><li>Maintenance Engineer</li></ul>",
      "start_date": "2027-12-01",
      "duration": 15.0,
      "progress": 0,
      "open": true,
      "meta": "3bf42b20-0ba6-4441-b9ca-732fcd853b71 SS",
      "parent": "3bf42b20-0ba6-4441-b9ca-732fcd853b71"
    },
    {
      "id": "b8dfdf98-418a-4375-a849-a23b46e6bd51",
      "text": "Source potential parts suppliers",
      "custom_tooltip": "<b>Source potential parts suppliers</b><br>Objective: Identify and evaluate potential suppliers for vintage equipment parts.\nScope: Research online marketplaces, contact vintage equipment collectors, and explore 3D printing options.\nSteps: 1. Search online databases. 2. Contact potential suppliers. 3. Evaluate suppliers based on price, availability, and reliability.\nDeliverables: A list of potential suppliers with contact information and pricing estimates.<br><b>Resources needed:</b><br><ul><li>Parts Acquisition and Inventory Manager</li><li>Procurement Specialist</li></ul>",
      "start_date": "2027-12-16",
      "duration": 15.0,
      "progress": 0,
      "open": true,
      "meta": "68437073-b30f-4069-9858-93f4f7bc912a FS",
      "parent": "3bf42b20-0ba6-4441-b9ca-732fcd853b71"
    },
    {
      "id": "dede2eac-39e1-401e-b23c-d8ad3e74042f",
      "text": "Establish parts inventory management system",
      "custom_tooltip": "<b>Establish parts inventory management system</b><br>Objective: Implement a system for tracking and managing the parts inventory.\nScope: Select inventory management software, define inventory levels, and establish reordering procedures.\nSteps: 1. Choose inventory management software. 2. Define minimum and maximum inventory levels. 3. Establish reordering procedures.\nDeliverables: An operational parts inventory management system.<br><b>Resources needed:</b><br><ul><li>Parts Acquisition and Inventory Manager</li><li>IT Support</li></ul>",
      "start_date": "2027-12-31",
      "duration": 15.0,
      "progress": 0,
      "open": true,
      "meta": "b8dfdf98-418a-4375-a849-a23b46e6bd51 FS",
      "parent": "3bf42b20-0ba6-4441-b9ca-732fcd853b71"
    },
    {
      "id": "de0fba3a-891e-4dd7-81f6-1db456b2e3b8",
      "text": "Acquire initial stock of critical parts",
      "custom_tooltip": "<b>Acquire initial stock of critical parts</b><br>Objective: Purchase an initial stock of critical vintage equipment parts.\nScope: Place orders with selected suppliers, track shipments, and inspect parts upon arrival.\nSteps: 1. Place orders with suppliers. 2. Track shipments. 3. Inspect parts upon arrival.\nDeliverables: An initial stock of critical parts stored in the inventory management system.<br><b>Resources needed:</b><br><ul><li>Parts Acquisition and Inventory Manager</li><li>Procurement Specialist</li><li>Warehouse Personnel</li></ul>",
      "start_date": "2028-01-15",
      "duration": 15.0,
      "progress": 0,

    {
      "id": "d878dca5-0d67-400c-ab48-bd8cbb712d58",
      "text": "Curriculum Development and Material Creation",
      "custom_tooltip": "<b>Curriculum Development and Material Creation</b><br>Develop a comprehensive training curriculum covering vintage equipment maintenance, repair, and troubleshooting. Create training materials, including manuals, videos, and interactive simulations.<br><b>Resources needed:</b><br><ul><li>Retired Engineers</li><li>Training Program Coordinator</li><li>Technical Writers</li><li>Video Production Team</li></ul>",
      "start_date": "2028-01-30",

      "progress": 0,

    },
    {
      "id": "73ada818-29f4-47a9-9397-bb7f7fcfb823",
      "text": "Recruit and Onboard Trainees",
      "custom_tooltip": "<b>Recruit and Onboard Trainees</b><br>Recruit qualified engineers and technicians for the training program. Conduct background checks and security clearances. Onboard trainees and provide them with necessary resources and support.<br><b>Resources needed:</b><br><ul><li>HR Department</li><li>Training Program Coordinator</li><li>Recruiters</li></ul>",
      "start_date": "2028-02-23",
      "duration": 24.0,
      "progress": 0,
      "open": true,
      "meta": "d878dca5-0d67-400c-ab48-bd8cbb712d58 FS",

    },
    {
      "id": "9d8e4d4b-ac4e-4511-a357-2ad5189af2d6",
      "text": "Conduct Hands-On Training Sessions",
      "custom_tooltip": "<b>Conduct Hands-On Training Sessions</b><br>Organize and conduct hands-on training sessions on vintage equipment maintenance and repair. Provide trainees with opportunities to work on real equipment and gain practical experience.<br><b>Resources needed:</b><br><ul><li>Retired Engineers</li><li>Training Program Coordinator</li><li>Vintage Equipment</li><li>Workshop Facilities</li></ul>",
      "start_date": "2028-03-18",
      "duration": 24.0,
      "progress": 0,
      "open": true,
      "meta": "73ada818-29f4-47a9-9397-bb7f7fcfb823 FS",
      "parent": "2ca6321d-6383-41f7-8ad2-870e3f8cb18d"
    },
    {
      "id": "6f9dc41f-644e-4e77-90b8-949d37c4b5ad",
      "text": "Assess Trainee Performance and Provide Feedback",
      "custom_tooltip": "<b>Assess Trainee Performance and Provide Feedback</b><br>Assess trainee performance through quizzes, exams, and practical assessments. Provide trainees with constructive feedback and guidance to improve their skills and knowledge.<br><b>Resources needed:</b><br><ul><li>Retired Engineers</li><li>Training Program Coordinator</li></ul>",
      "start_date": "2028-04-11",
      "duration": 24.0,
      "progress": 0,
      "open": true,
      "meta": "9d8e4d4b-ac4e-4511-a357-2ad5189af2d6 FS",
      "parent": "2ca6321d-6383-41f7-8ad2-870e3f8cb18d"
    },
    {
      "id": "f4b5e301-5bec-4d38-8d6d-2fed645da34c",
      "text": "Evaluate and Improve Training Program",
      "custom_tooltip": "<b>Evaluate and Improve Training Program</b><br>Evaluate the effectiveness of the training program through surveys, interviews, and performance data. Identify areas for improvement and make necessary adjustments to the curriculum and training methods.<br><b>Resources needed:</b><br><ul><li>Training Program Coordinator</li><li>Feedback Analysis Team</li></ul>",

      "duration": 24.0,
      "progress": 0,
      "open": true,

      "id": "0c0790f6-4c51-4381-99ff-ad1e850c940e",
      "text": "Gather equipment performance data",
      "custom_tooltip": "<b>Gather equipment performance data</b><br>Collect historical performance data from vintage equipment to establish baseline metrics for predictive maintenance.<br><b>Resources needed:</b><br><ul><li>Maintenance technicians</li><li>Data analysts</li><li>Equipment logs</li></ul>",

      "id": "be264cad-0977-4eb8-a8e4-03139d1c92f9",
      "text": "Select predictive maintenance software",
      "custom_tooltip": "<b>Select predictive maintenance software</b><br>Evaluate and select appropriate predictive maintenance software based on compatibility with vintage equipment and data analysis capabilities.<br><b>Resources needed:</b><br><ul><li>IT specialists</li><li>Maintenance engineers</li><li>Software vendors</li></ul>",
      "start_date": "2028-06-04",
      "duration": 6.0,
      "progress": 0,

    },
    {
      "id": "dec13302-5967-4dd2-b805-ed7306a877ef",
      "text": "Install sensors on vintage equipment",
      "custom_tooltip": "<b>Install sensors on vintage equipment</b><br>Install sensors on vintage equipment to collect real-time data for predictive maintenance analysis.<br><b>Resources needed:</b><br><ul><li>Electrical engineers</li><li>Maintenance technicians</li><li>Sensors</li></ul>",

      "id": "b0cd9ca7-43fb-4114-9fa8-4293f2a327a3",
      "text": "Develop predictive models",
      "custom_tooltip": "<b>Develop predictive models</b><br>Develop predictive models based on historical and real-time data to identify potential equipment failures.<br><b>Resources needed:</b><br><ul><li>Data scientists</li><li>AI specialists</li><li>Predictive maintenance software</li></ul>",
      "start_date": "2028-06-16",
      "duration": 6.0,
      "progress": 0,

    },

      "id": "db07655c-26c0-48b2-b269-d599eb03e6d2",
      "text": "Implement maintenance schedule",
      "custom_tooltip": "<b>Implement maintenance schedule</b><br>Implement a maintenance schedule based on the predictions generated by the predictive models.<br><b>Resources needed:</b><br><ul><li>Maintenance technicians</li><li>Maintenance engineers</li><li>Predictive maintenance software</li></ul>",

      "duration": 6.0,

      "text": "Manage Equipment Obsolescence",
      "custom_tooltip": "<b>Manage Equipment Obsolescence</b>",
      "progress": 0,
      "open": true,
      "meta": "7edc8284-6416-4080-9f46-c1b45444e375 FF, e0b35dcf-6dfc-4afa-b0d9-ecf4d0886019 FS",

    {
      "id": "6a848ecd-8a82-4fd1-a390-cc9948e4555a",
      "text": "Monitor Technology Trends and Forecast Obsolescence",
      "custom_tooltip": "<b>Monitor Technology Trends and Forecast Obsolescence</b><br>Objective: Proactively identify potential obsolescence issues with vintage equipment. Scope: Track technology advancements, component availability, and emerging data formats. Steps: Regularly review industry publications, attend conferences, and consult with technology experts. Deliverables: Quarterly reports on potential obsolescence risks and mitigation strategies.<br><b>Resources needed:</b><br><ul><li>Technology Analyst</li><li>Vintage Equipment Specialist</li></ul>",
      "start_date": "2028-06-28",
      "duration": 23.0,
      "progress": 0,
      "open": true,
      "meta": "6b77bdef-9af8-4225-b701-1836dc0a4a4b SS",
      "parent": "6b77bdef-9af8-4225-b701-1836dc0a4a4b"
    },
    {
      "id": "ddf9e871-0a51-4257-88b9-3d41f7c7ef19",
      "text": "Reverse Engineering and Parts Replication",
      "custom_tooltip": "<b>Reverse Engineering and Parts Replication</b><br>Objective: Develop capabilities to replicate obsolete parts. Scope: Identify critical parts at risk of obsolescence, reverse engineer designs, and explore 3D printing or CNC machining options. Steps: Acquire sample parts, create CAD models, and test replicated parts. Deliverables: Library of CAD models for critical parts and a process for manufacturing replacements.<br><b>Resources needed:</b><br><ul><li>Mechanical Engineer</li><li>CAD Designer</li><li>3D Printing Technician</li><li>CNC Machinist</li></ul>",
      "start_date": "2028-07-21",
      "duration": 23.0,
      "progress": 0,
      "open": true,
      "meta": "6a848ecd-8a82-4fd1-a390-cc9948e4555a FS",
      "parent": "6b77bdef-9af8-4225-b701-1836dc0a4a4b"
    },
    {
      "id": "918a0b81-d3c5-4e60-9f0b-fa1c30dcb6e9",
      "text": "Adaptable Digitization Method Research",
      "custom_tooltip": "<b>Adaptable Digitization Method Research</b><br>Objective: Investigate digitization methods that can handle future data formats. Scope: Research emerging digitization technologies, data storage formats, and metadata standards. Steps: Conduct literature reviews, attend workshops, and pilot test new technologies. Deliverables: Report on adaptable digitization methods and recommendations for implementation.<br><b>Resources needed:</b><br><ul><li>Archival Specialist</li><li>Data Scientist</li><li>Technology Researcher</li></ul>",
      "start_date": "2028-08-13",
      "duration": 23.0,
      "progress": 0,
      "open": true,
      "meta": "ddf9e871-0a51-4257-88b9-3d41f7c7ef19 FS",
      "parent": "6b77bdef-9af8-4225-b701-1836dc0a4a4b"
    },
    {
      "id": "edcba88f-740a-4d5f-b1f3-fa09c08602ae",
      "text": "Establish Reverse Engineering Partnerships",
      "custom_tooltip": "<b>Establish Reverse Engineering Partnerships</b><br>Objective: Partner with reverse engineering specialists. Scope: Identify and vet potential partners with expertise in reverse engineering vintage equipment. Steps: Contact potential partners, evaluate their capabilities, and negotiate partnership agreements. Deliverables: List of qualified reverse engineering partners and signed partnership agreements.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Legal Counsel</li><li>Procurement Specialist</li></ul>",
      "start_date": "2028-09-05",
      "duration": 23.0,
      "progress": 0,
      "open": true,
      "meta": "6b77bdef-9af8-4225-b701-1836dc0a4a4b FF, 918a0b81-d3c5-4e60-9f0b-fa1c30dcb6e9 FS",

    },

      "text": "Develop AI Signal Processing Algorithms",

    {
      "id": "6f35ceff-3d09-4566-95bb-b735f2ed991c",
      "text": "Gather archival media samples",
      "custom_tooltip": "<b>Gather archival media samples</b><br>Collect diverse samples of magnetic tapes, film reels, and punch cards to represent the range of media to be digitized. This includes identifying media with varying levels of degradation and signal quality.<br><b>Resources needed:</b><br><ul><li>Archival staff</li><li>Project manager</li></ul>",
      "start_date": "2028-09-28",

      "id": "d35bef0a-ba9b-4e41-8c1f-a284a5faaa49",
      "text": "Develop base AI models",
      "custom_tooltip": "<b>Develop base AI models</b><br>Develop initial AI models for signal processing, noise reduction, and format identification. This involves selecting appropriate algorithms and training them on a subset of the collected media samples.<br><b>Resources needed:</b><br><ul><li>AI developers</li><li>Signal processing engineers</li><li>Computational resources</li></ul>",

    {
      "id": "849d3999-d523-4f27-aeb4-6eeb20b302fb",
      "text": "Test AI models and refine",
      "custom_tooltip": "<b>Test AI models and refine</b><br>Test the performance of the AI models on a separate set of media samples. Evaluate accuracy, processing speed, and identify areas for improvement. Refine the models based on the test results.<br><b>Resources needed:</b><br><ul><li>AI developers</li><li>Signal processing engineers</li><li>Human reviewers</li></ul>",
      "start_date": "2028-11-13",

    },
    {
      "id": "ac1654ba-6592-4e81-a108-a8d0c04e4bf5",
      "text": "Implement bias detection methods",
      "custom_tooltip": "<b>Implement bias detection methods</b><br>Implement methods to detect and mitigate bias in the AI models. This includes analyzing the training data for potential biases and adjusting the algorithms to ensure fair and accurate processing across all media types.<br><b>Resources needed:</b><br><ul><li>AI developers</li><li>AI ethics consultant</li><li>Data scientists</li></ul>",

      "custom_tooltip": "<b>Prepare AI pre-screening environment</b><br>Set up the necessary hardware and software environment for AI pre-screening, including installing required libraries and configuring access to data storage.<br><b>Resources needed:</b><br><ul><li>AI Developers</li><li>IT Support</li><li>Hardware Resources</li></ul>",

      "text": "Test AI pre-screening algorithms",
      "custom_tooltip": "<b>Test AI pre-screening algorithms</b><br>Run the AI pre-screening algorithms on a sample dataset of archival materials to evaluate their performance and identify areas for improvement.<br><b>Resources needed:</b><br><ul><li>AI Developers</li><li>Archival Material Samples</li><li>Testing Environment</li></ul>",

      "text": "Refine AI pre-screening algorithms",
      "custom_tooltip": "<b>Refine AI pre-screening algorithms</b><br>Based on the results of the testing, refine the AI pre-screening algorithms to improve their accuracy and efficiency.<br><b>Resources needed:</b><br><ul><li>AI Developers</li><li>Archival Material Samples</li><li>Testing Environment</li></ul>",

      "custom_tooltip": "<b>Integrate AI pre-screening into workflow</b><br>Integrate the AI pre-screening algorithms into the overall digitization workflow, ensuring that they are seamlessly integrated with other processes.<br><b>Resources needed:</b><br><ul><li>AI Developers</li><li>Workflow Engineers</li><li>IT Support</li></ul>",

      "id": "fa195e14-13fe-4adf-94f1-fe6847d2c147",

    {
      "id": "3ab21c6c-b610-4e21-841c-8df1f81edaca",
      "text": "Define Metadata Schema Requirements",
      "custom_tooltip": "<b>Define Metadata Schema Requirements</b><br>Objective: Determine the specific metadata elements required for effective archival and retrieval.\nScope: Identify necessary fields, controlled vocabularies, and data types.\nSteps: Consult with archivists, data scientists, and end-users; review existing metadata standards; document requirements.\nDeliverables: A detailed document outlining the metadata schema requirements.<br><b>Resources needed:</b><br><ul><li>Archivists</li><li>Data Scientists</li><li>Metadata Specialists</li></ul>",
      "start_date": "2029-04-28",
      "duration": 12.0,
      "progress": 0,
      "open": true,
      "meta": "fa195e14-13fe-4adf-94f1-fe6847d2c147 SS",

    },
    {
      "id": "8a8e778e-c75f-4015-8250-c3b84ff161be",
      "text": "Develop Metadata Extraction Rules",
      "custom_tooltip": "<b>Develop Metadata Extraction Rules</b><br>Objective: Create rules for automatically extracting metadata from digitized media.\nScope: Define algorithms and techniques for identifying and extracting relevant metadata elements.\nSteps: Analyze media formats; develop extraction algorithms; test and refine rules.\nDeliverables: A set of documented metadata extraction rules.<br><b>Resources needed:</b><br><ul><li>AI Developers</li><li>Software Engineers</li><li>Metadata Specialists</li></ul>",
      "start_date": "2029-05-10",
      "duration": 12.0,
      "progress": 0,
      "open": true,
      "meta": "3ab21c6c-b610-4e21-841c-8df1f81edaca FS",
      "parent": "fa195e14-13fe-4adf-94f1-fe6847d2c147"
    },
    {
      "id": "5b805132-fb7d-4b73-8cd5-0550670bbebc",
      "text": "Implement Metadata Ingestion Pipeline",
      "custom_tooltip": "<b>Implement Metadata Ingestion Pipeline</b><br>Objective: Build a pipeline for ingesting extracted metadata into the archival system.\nScope: Design and implement a system for automatically importing and validating metadata.\nSteps: Develop data transformation scripts; integrate with archival system; test and deploy pipeline.\nDeliverables: A functional metadata ingestion pipeline.<br><b>Resources needed:</b><br><ul><li>Software Engineers</li><li>Database Administrators</li><li>System Administrators</li></ul>",
      "start_date": "2029-05-22",
      "duration": 12.0,
      "progress": 0,
      "open": true,
      "meta": "8a8e778e-c75f-4015-8250-c3b84ff161be FS",
      "parent": "fa195e14-13fe-4adf-94f1-fe6847d2c147"
    },
    {
      "id": "a50f5d09-e854-498c-a46d-a8bbb3b3a3c6",
      "text": "Test and Validate Metadata Quality",
      "custom_tooltip": "<b>Test and Validate Metadata Quality</b><br>Objective: Ensure the accuracy and completeness of extracted metadata.\nScope: Develop and execute test cases to validate metadata quality.\nSteps: Create test datasets; run extraction pipeline; compare results to expected values; document findings.\nDeliverables: A report on metadata quality and recommendations for improvement.<br><b>Resources needed:</b><br><ul><li>Quality Assurance Specialists</li><li>Metadata Specialists</li><li>Archivists</li></ul>",
      "start_date": "2029-06-03",
      "duration": 12.0,
      "progress": 0,

      "text": "Develop Data Storage and Archival Strategy",
      "custom_tooltip": "<b>Develop Data Storage and Archival Strategy</b>",
      "progress": 0,
      "open": true,
      "meta": "fa195e14-13fe-4adf-94f1-fe6847d2c147 FS",

    {
      "id": "9d0e9931-ce3e-47e5-8bfd-c2161aad49fb",
      "text": "Define Data Archival Requirements",
      "custom_tooltip": "<b>Define Data Archival Requirements</b><br>Objective: Clearly define the requirements for long-term data archival, including retention periods, access controls, and data integrity standards.\nScope: This includes identifying all relevant regulatory requirements, stakeholder needs, and technical constraints.\nSteps: 1. Conduct stakeholder interviews. 2. Review relevant regulations. 3. Document archival requirements.\nDeliverables: A comprehensive document outlining data archival requirements.<br><b>Resources needed:</b><br><ul><li>Data Governance Officer</li><li>Legal Counsel</li><li>Archival Expert</li></ul>",
      "start_date": "2029-06-15",
      "duration": 19.0,
      "progress": 0,
      "open": true,
      "meta": "d4d21b46-3054-4da4-9f0a-460bb2a40902 SS",
      "parent": "d4d21b46-3054-4da4-9f0a-460bb2a40902"
    },
    {
      "id": "83172439-e209-4b52-99ef-dbe8dafd5dc3",
      "text": "Evaluate Archival Storage Options",
      "custom_tooltip": "<b>Evaluate Archival Storage Options</b><br>Objective: Evaluate different data storage options for long-term archival, considering factors such as cost, scalability, security, and durability.\nScope: This includes evaluating both on-premise and cloud-based storage solutions, as well as different archival formats and technologies.\nSteps: 1. Research available storage options. 2. Conduct a cost-benefit analysis. 3. Evaluate security and durability features.\nDeliverables: A report comparing different archival storage options.<br><b>Resources needed:</b><br><ul><li>IT Architect</li><li>Data Storage Specialist</li><li>Financial Analyst</li></ul>",
      "start_date": "2029-07-04",
      "duration": 19.0,
      "progress": 0,
      "open": true,
      "meta": "9d0e9931-ce3e-47e5-8bfd-c2161aad49fb FS",
      "parent": "d4d21b46-3054-4da4-9f0a-460bb2a40902"
    },
    {
      "id": "5c2fc899-5d83-47be-9833-075b2674c011",
      "text": "Select Archival Formats and Technologies",
      "custom_tooltip": "<b>Select Archival Formats and Technologies</b><br>Objective: Select appropriate archival formats and technologies that ensure long-term data preservation and accessibility.\nScope: This includes considering factors such as format stability, metadata support, and compatibility with future technologies.\nSteps: 1. Research archival formats and technologies. 2. Conduct compatibility testing. 3. Select appropriate formats and technologies.\nDeliverables: A document outlining the selected archival formats and technologies.<br><b>Resources needed:</b><br><ul><li>Archival Expert</li><li>IT Architect</li><li>Data Migration Specialist</li></ul>",
      "start_date": "2029-07-23",
      "duration": 19.0,
      "progress": 0,
      "open": true,
      "meta": "83172439-e209-4b52-99ef-dbe8dafd5dc3 FS",
      "parent": "d4d21b46-3054-4da4-9f0a-460bb2a40902"
    },
    {
      "id": "3489d41d-076c-4077-a744-259eee11465c",
      "text": "Develop Data Migration Plan",
      "custom_tooltip": "<b>Develop Data Migration Plan</b><br>Objective: Develop a detailed plan for migrating data to the selected archival storage solution.\nScope: This includes defining data migration procedures, timelines, and quality control measures.\nSteps: 1. Define data migration procedures. 2. Develop a migration timeline. 3. Establish quality control measures.\nDeliverables: A comprehensive data migration plan.<br><b>Resources needed:</b><br><ul><li>Data Migration Specialist</li><li>Project Manager</li><li>IT Architect</li></ul>",
      "start_date": "2029-08-11",
      "duration": 19.0,
      "progress": 0,
      "open": true,
      "meta": "d4d21b46-3054-4da4-9f0a-460bb2a40902 FF, 5c2fc899-5d83-47be-9833-075b2674c011 FS",
      "parent": "d4d21b46-3054-4da4-9f0a-460bb2a40902"
    },
    {
      "id": "d7853a4c-e989-4cb8-b1b3-c97587b74d46",
      "text": "Implement Data Security Measures",
      "custom_tooltip": "<b>Implement Data Security Measures</b>",
      "progress": 0,
      "open": true,
      "meta": "f7a92535-3803-4457-a276-93e753a3bcda FF, d4d21b46-3054-4da4-9f0a-460bb2a40902 FS",

    },
    {
      "id": "d6b5151a-0042-4e4e-ba37-436970b91d67",
      "text": "Identify Data Security Requirements",
      "custom_tooltip": "<b>Identify Data Security Requirements</b><br>Objective: Determine all applicable data security standards and regulations (e.g., GDPR, CCPA, HIPAA) relevant to the project.\nScope: Review legal and regulatory requirements, consult with legal experts, and identify specific security controls.\nSteps: Research applicable regulations, conduct a gap analysis, and document security requirements.\nDeliverables: A comprehensive list of data security requirements.<br><b>Resources needed:</b><br><ul><li>Data Security Specialist</li><li>Legal Counsel</li><li>Compliance Officer</li></ul>",
      "start_date": "2029-08-30",
      "duration": 15.0,
      "progress": 0,
      "open": true,
      "meta": "d7853a4c-e989-4cb8-b1b3-c97587b74d46 SS",
      "parent": "d7853a4c-e989-4cb8-b1b3-c97587b74d46"
    },
    {
      "id": "f28a41c5-49a0-43ee-8892-edf4aff785e0",
      "text": "Select Encryption Methods",
      "custom_tooltip": "<b>Select Encryption Methods</b><br>Objective: Choose appropriate encryption methods for data at rest and in transit.\nScope: Evaluate different encryption algorithms, key management strategies, and hardware/software solutions.\nSteps: Research encryption options, conduct performance testing, and select suitable methods.\nDeliverables: A detailed encryption plan.<br><b>Resources needed:</b><br><ul><li>Cryptography Expert</li><li>Security Engineer</li><li>System Administrator</li></ul>",
      "start_date": "2029-09-14",
      "duration": 15.0,
      "progress": 0,
      "open": true,
      "meta": "d6b5151a-0042-4e4e-ba37-436970b91d67 FS",
      "parent": "d7853a4c-e989-4cb8-b1b3-c97587b74d46"
    },
    {
      "id": "d700d40f-4716-4fbd-ae05-c9dcde5442a9",
      "text": "Implement Access Controls",
      "custom_tooltip": "<b>Implement Access Controls</b><br>Objective: Establish and enforce access controls to protect sensitive data.\nScope: Define user roles and permissions, implement authentication and authorization mechanisms, and monitor access activity.\nSteps: Develop access control policies, configure access control systems, and conduct security audits.\nDeliverables: A secure access control system.<br><b>Resources needed:</b><br><ul><li>Security Architect</li><li>System Administrator</li><li>Database Administrator</li></ul>",
      "start_date": "2029-09-29",
      "duration": 15.0,
      "progress": 0,
      "open": true,
      "meta": "f28a41c5-49a0-43ee-8892-edf4aff785e0 FS",
      "parent": "d7853a4c-e989-4cb8-b1b3-c97587b74d46"
    },
    {
      "id": "c45f4e52-9253-4a49-9578-fb0c13a1f40d",
      "text": "Conduct Security Audits and Testing",
      "custom_tooltip": "<b>Conduct Security Audits and Testing</b><br>Objective: Regularly assess the effectiveness of data security measures.\nScope: Perform vulnerability scans, penetration testing, and security audits to identify weaknesses and ensure compliance.\nSteps: Schedule and conduct security assessments, analyze results, and implement remediation measures.\nDeliverables: Security audit reports and remediation plans.<br><b>Resources needed:</b><br><ul><li>Security Auditor</li><li>Penetration Tester</li><li>Security Analyst</li></ul>",
      "start_date": "2029-10-14",
      "duration": 15.0,
      "progress": 0,
      "open": true,
      "meta": "d7853a4c-e989-4cb8-b1b3-c97587b74d46 FF, d700d40f-4716-4fbd-ae05-c9dcde5442a9 FS",
      "parent": "d7853a4c-e989-4cb8-b1b3-c97587b74d46"
    },

      "meta": "f7a92535-3803-4457-a276-93e753a3bcda FS",
      "parent": "c6af0a21-854d-4792-bd24-ad839e3bb179",
      "type": "project"

    {
      "id": "c55f3216-1776-499d-8be2-28b70b795142",
      "text": "Secure Permits and Licenses",
      "custom_tooltip": "<b>Secure Permits and Licenses</b>",
      "progress": 0,
      "open": true,
      "meta": "4ac62742-d3c1-4d82-8a98-ff8bc468c20a SS",

    {
      "id": "7797bfc0-9302-42e0-a5e7-d1bde655912a",
      "text": "Identify Required Permits and Licenses",
      "custom_tooltip": "<b>Identify Required Permits and Licenses</b><br>Objective: Determine all necessary permits and licenses for MIU deployment at various archive locations.\nScope: Research federal, state, and local regulations related to building permits, electrical permits, data transfer permits, hazardous materials handling permits, and environmental regulations.\nSteps: 1. Consult with legal experts and regulatory agencies. 2. Create a comprehensive list of required permits and licenses. 3. Document specific requirements for each permit.\nDeliverables: A detailed list of required permits and licenses with associated requirements.<br><b>Resources needed:</b><br><ul><li>Legal Counsel</li><li>Regulatory Compliance Specialist</li><li>Project Manager</li></ul>",
      "start_date": "2029-10-29",
      "duration": 15.0,
      "progress": 0,
      "open": true,
      "meta": "c55f3216-1776-499d-8be2-28b70b795142 SS",
      "parent": "c55f3216-1776-499d-8be2-28b70b795142"
    },
    {
      "id": "88c4d58f-3f31-4e00-bde3-ce50bc5801d9",
      "text": "Prepare Permit Applications",
      "custom_tooltip": "<b>Prepare Permit Applications</b><br>Objective: Prepare all necessary documentation for permit applications.\nScope: Gather required information, complete application forms, and compile supporting documents.\nSteps: 1. Collect site-specific information for each deployment location. 2. Complete permit application forms accurately and thoroughly. 3. Gather supporting documents, such as site plans, equipment specifications, and safety certifications.\nDeliverables: Completed permit applications with all required supporting documentation.<br><b>Resources needed:</b><br><ul><li>Project Coordinator</li><li>Engineering Team</li><li>Permit Specialist</li></ul>",
      "start_date": "2029-11-13",
      "duration": 15.0,
      "progress": 0,
      "open": true,
      "meta": "7797bfc0-9302-42e0-a5e7-d1bde655912a FS",
      "parent": "c55f3216-1776-499d-8be2-28b70b795142"
    },
    {
      "id": "7aac0b75-34cd-455a-bbe4-376880b2b579",
      "text": "Submit Permit Applications",
      "custom_tooltip": "<b>Submit Permit Applications</b><br>Objective: Submit permit applications to the appropriate regulatory agencies.\nScope: Ensure timely submission of applications and track their progress.\nSteps: 1. Identify the correct regulatory agency for each permit. 2. Submit applications according to agency guidelines. 3. Track application status and respond to any inquiries from the agency.\nDeliverables: Confirmation of permit application submission and tracking information.<br><b>Resources needed:</b><br><ul><li>Project Coordinator</li><li>Permit Specialist</li></ul>",
      "start_date": "2029-11-28",
      "duration": 15.0,
      "progress": 0,
      "open": true,
      "meta": "88c4d58f-3f31-4e00-bde3-ce50bc5801d9 FS",
      "parent": "c55f3216-1776-499d-8be2-28b70b795142"
    },
    {
      "id": "ec21d26b-0779-4355-bf6e-0aea2b368048",
      "text": "Follow Up and Obtain Approvals",
      "custom_tooltip": "<b>Follow Up and Obtain Approvals</b><br>Objective: Follow up with regulatory agencies to obtain permit approvals.\nScope: Respond to agency inquiries, provide additional information as needed, and expedite the approval process.\nSteps: 1. Monitor application status and respond to agency inquiries promptly. 2. Provide additional information or documentation as requested. 3. Escalate issues to senior management if necessary.\nDeliverables: Approved permits and licenses for MIU deployment.<br><b>Resources needed:</b><br><ul><li>Permit Specialist</li><li>Project Manager</li><li>Legal Counsel</li></ul>",
      "start_date": "2029-12-13",
      "duration": 15.0,
      "progress": 0,
      "open": true,
      "meta": "c55f3216-1776-499d-8be2-28b70b795142 FF, 7aac0b75-34cd-455a-bbe4-376880b2b579 FS",
      "parent": "c55f3216-1776-499d-8be2-28b70b795142"
    },
    {

      "text": "Establish Partnerships with Archives",
      "custom_tooltip": "<b>Establish Partnerships with Archives</b>",
      "progress": 0,
      "open": true,
      "meta": "c55f3216-1776-499d-8be2-28b70b795142 FS",
