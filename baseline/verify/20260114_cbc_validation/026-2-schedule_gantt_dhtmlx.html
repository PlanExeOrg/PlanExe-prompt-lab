    {
      "id": "79801a1d-0335-4557-8b78-5a1f9714e408",
      "text": "Define Thermal Load Profiles",
      "custom_tooltip": "<b>Define Thermal Load Profiles</b><br>Establish realistic thermal load profiles based on space environment simulations and mission requirements. This includes defining temperature ranges, gradients, and transient thermal events.<br><b>Resources needed:</b><br><ul><li>Thermal Engineer</li><li>Simulation Software</li><li>Space Environment Data</li></ul>",
      "start_date": "2027-02-03",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "fcb2224a-1b6c-46b5-b694-bd5120d9e87f SS",
      "parent": "fcb2224a-1b6c-46b5-b694-bd5120d9e87f"
    },
    {
      "id": "52cc81c8-a003-4c21-b14a-31d15105d08d",
      "text": "Define Dynamic Load Profiles",
      "custom_tooltip": "<b>Define Dynamic Load Profiles</b><br>Establish realistic dynamic load profiles based on launch vehicle specifications and on-orbit operational conditions. This includes defining vibration frequencies, amplitudes, and shock events.<br><b>Resources needed:</b><br><ul><li>Vibration Test Engineer</li><li>Simulation Software</li><li>Launch Vehicle Data</li></ul>",
      "start_date": "2027-02-07",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "79801a1d-0335-4557-8b78-5a1f9714e408 FS",
      "parent": "fcb2224a-1b6c-46b5-b694-bd5120d9e87f"
    },
    {
      "id": "2dde597e-e73d-4181-a8d5-5f7fe6d47447",
      "text": "Monitor System Performance Under Load",
      "custom_tooltip": "<b>Monitor System Performance Under Load</b><br>Implement a real-time monitoring system to track key performance metrics (Strehl ratio, wavefront error, phasing accuracy) during thermal and dynamic loading. This includes selecting appropriate sensors, data acquisition systems, and analysis software.<br><b>Resources needed:</b><br><ul><li>Metrology Specialist</li><li>Instrumentation Engineer</li><li>Data Acquisition System</li></ul>",
      "start_date": "2027-02-11",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "52cc81c8-a003-4c21-b14a-31d15105d08d FS",
      "parent": "fcb2224a-1b6c-46b5-b694-bd5120d9e87f"
    },
    {
      "id": "dda63055-d345-4db0-b6c6-f57d4a92387f",
      "text": "Analyze Stability Data",
      "custom_tooltip": "<b>Analyze Stability Data</b><br>Analyze the data collected during thermal and dynamic loading to assess the system&#x27;s stability and identify any potential instabilities or performance degradation. This includes performing frequency analysis, time-domain analysis, and statistical analysis.<br><b>Resources needed:</b><br><ul><li>Control Systems Engineer</li><li>Data Analysis Software</li><li>Statistical Analysis Tools</li></ul>",
      "start_date": "2027-02-15",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "2dde597e-e73d-4181-a8d5-5f7fe6d47447 FS",
      "parent": "fcb2224a-1b6c-46b5-b694-bd5120d9e87f"
    },
    {
      "id": "d5de4ed4-44a8-42f4-91d2-3fa7233b508a",
      "text": "Document Stability Test Results",
      "custom_tooltip": "<b>Document Stability Test Results</b><br>Prepare a comprehensive report documenting the test setup, procedures, results, and conclusions of the system stability assessment. This includes presenting the data in a clear and concise manner, highlighting any potential issues, and recommending corrective actions.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Technical Writer</li><li>Data Visualization Tools</li></ul>",
      "start_date": "2027-02-19",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "fcb2224a-1b6c-46b5-b694-bd5120d9e87f FF, dda63055-d345-4db0-b6c6-f57d4a92387f FS",
      "parent": "fcb2224a-1b6c-46b5-b694-bd5120d9e87f"
    },
    {
      "id": "ee00d41f-72e5-4413-b9c0-ffbccab20900",
      "text": "Calibrate Metrology Equipment",
      "custom_tooltip": "<b>Calibrate Metrology Equipment</b>",
      "progress": 0,
      "open": true,
      "meta": "fcb2224a-1b6c-46b5-b694-bd5120d9e87f FS",
      "parent": "680df026-d205-4fa8-b087-94678ec8994e",
      "type": "project"
    },
    {
      "id": "04d86bb7-cdf2-4bc9-9dce-cbce816f458c",
      "text": "Prepare calibration standards and references",
      "custom_tooltip": "<b>Prepare calibration standards and references</b><br>Gather and prepare all necessary calibration standards and reference materials required for calibrating the metrology equipment. This includes verifying the accuracy and traceability of the standards.<br><b>Resources needed:</b><br><ul><li>Metrology Specialist</li><li>Calibration Technician</li><li>Calibration Standards</li></ul>",
      "start_date": "2027-02-23",
      "duration": 1.0,
      "progress": 0,
      "open": true,
      "meta": "ee00d41f-72e5-4413-b9c0-ffbccab20900 SS",
      "parent": "ee00d41f-72e5-4413-b9c0-ffbccab20900"
    },
    {
      "id": "1633aa99-3069-434a-a3a2-8e0d8aff0519",
      "text": "Perform initial equipment calibration",
      "custom_tooltip": "<b>Perform initial equipment calibration</b><br>Conduct a thorough initial calibration of all metrology equipment according to manufacturer specifications and established calibration procedures. Document all calibration results and any adjustments made.<br><b>Resources needed:</b><br><ul><li>Metrology Specialist</li><li>Calibration Technician</li><li>Calibration Software</li></ul>",
      "start_date": "2027-02-24",
      "duration": 1.0,
      "progress": 0,
      "open": true,
      "meta": "04d86bb7-cdf2-4bc9-9dce-cbce816f458c FS",
      "parent": "ee00d41f-72e5-4413-b9c0-ffbccab20900"
    },
    {
      "id": "7255a62a-9e83-4eb9-8be9-f38ac5de633a",
      "text": "Validate calibration with reference measurements",
      "custom_tooltip": "<b>Validate calibration with reference measurements</b><br>Validate the accuracy of the calibration by performing reference measurements on known artifacts or standards. Compare the measured values with the certified values and assess the measurement uncertainty.<br><b>Resources needed:</b><br><ul><li>Metrology Specialist</li><li>Calibration Technician</li><li>Reference Artifacts</li></ul>",
      "start_date": "2027-02-25",
      "duration": 1.0,
      "progress": 0,
      "open": true,
      "meta": "1633aa99-3069-434a-a3a2-8e0d8aff0519 FS",
      "parent": "ee00d41f-72e5-4413-b9c0-ffbccab20900"
    },
    {
      "id": "e907a638-5b2f-4a55-9b63-696d74c4647a",
      "text": "Document calibration procedures and results",
      "custom_tooltip": "<b>Document calibration procedures and results</b><br>Create detailed documentation of the calibration procedures used, including step-by-step instructions, equipment settings, and environmental conditions. Record all calibration results, uncertainties, and any deviations from the standard procedures.<br><b>Resources needed:</b><br><ul><li>Metrology Specialist</li><li>Technical Writer</li></ul>",
      "start_date": "2027-02-26",
      "duration": 1.0,
      "progress": 0,
      "open": true,
      "meta": "ee00d41f-72e5-4413-b9c0-ffbccab20900 FF, 7255a62a-9e83-4eb9-8be9-f38ac5de633a FS",
      "parent": "ee00d41f-72e5-4413-b9c0-ffbccab20900"
    },
    {
      "id": "106f3aa9-7f7b-41e7-af8e-c7bc3a917855",
      "text": "Analyze Metrology Data",
      "custom_tooltip": "<b>Analyze Metrology Data</b>",
      "progress": 0,
      "open": true,
      "meta": "ee00d41f-72e5-4413-b9c0-ffbccab20900 FS",
      "parent": "680df026-d205-4fa8-b087-94678ec8994e",
      "type": "project"
    },
    {
      "id": "8fc52780-8c4a-4c5e-b179-d342acac9cce",
      "text": "Identify Calibration Standards and Procedures",
      "custom_tooltip": "<b>Identify Calibration Standards and Procedures</b><br>Identify the appropriate calibration standards and procedures for each piece of metrology equipment. This includes researching NIST-traceable standards and manufacturer-recommended calibration methods.<br><b>Resources needed:</b><br><ul><li>Metrology Specialist</li><li>Instrumentation Engineer</li></ul>",
      "start_date": "2027-02-27",
      "duration": 1.0,
      "progress": 0,
      "open": true,
      "meta": "106f3aa9-7f7b-41e7-af8e-c7bc3a917855 SS",
      "parent": "106f3aa9-7f7b-41e7-af8e-c7bc3a917855"
    },
    {
      "id": "8288d1b7-b683-4416-b48a-4ca6fb28809b",
      "text": "Schedule Calibration Services",
      "custom_tooltip": "<b>Schedule Calibration Services</b><br>Schedule calibration services with accredited calibration labs or internal calibration facilities. Coordinate schedules to minimize downtime and ensure timely completion of calibration activities.<br><b>Resources needed:</b><br><ul><li>Metrology Specialist</li><li>Procurement Specialist</li></ul>",
      "start_date": "2027-02-28",
      "duration": 1.0,
      "progress": 0,
      "open": true,
      "meta": "8fc52780-8c4a-4c5e-b179-d342acac9cce FS",
      "parent": "106f3aa9-7f7b-41e7-af8e-c7bc3a917855"
    },
    {
      "id": "605333c7-a244-4544-a29b-84fead877b2b",
      "text": "Perform Pre-Calibration Checks",
      "custom_tooltip": "<b>Perform Pre-Calibration Checks</b><br>Before sending equipment for calibration, perform pre-calibration checks to verify functionality and identify any potential issues that may affect the calibration process.<br><b>Resources needed:</b><br><ul><li>Metrology Specialist</li><li>Instrumentation Engineer</li></ul>",
      "start_date": "2027-03-01",
      "duration": 1.0,
      "progress": 0,
      "open": true,
      "meta": "8288d1b7-b683-4416-b48a-4ca6fb28809b FS",
      "parent": "106f3aa9-7f7b-41e7-af8e-c7bc3a917855"
    },
    {
      "id": "b5f9b098-0216-4190-831a-c6e4d56463d7",
      "text": "Execute Calibration Procedures",
      "custom_tooltip": "<b>Execute Calibration Procedures</b><br>Execute the calibration procedures according to established protocols. This includes connecting the equipment to calibration standards, taking measurements, and recording data.<br><b>Resources needed:</b><br><ul><li>Metrology Specialist</li><li>Calibration Technician</li></ul>",
      "start_date": "2027-03-02",
      "duration": 1.0,
      "progress": 0,
      "open": true,
      "meta": "605333c7-a244-4544-a29b-84fead877b2b FS",
      "parent": "106f3aa9-7f7b-41e7-af8e-c7bc3a917855"
    },
    {
      "id": "96af5b20-6d3a-45cf-be9c-572a2b6e5555",
      "text": "Analyze Calibration Data and Generate Reports",
      "custom_tooltip": "<b>Analyze Calibration Data and Generate Reports</b><br>Analyze the calibration data to determine the accuracy and uncertainty of the metrology equipment. Generate calibration reports documenting the calibration results and any corrective actions taken.<br><b>Resources needed:</b><br><ul><li>Metrology Specialist</li><li>Data Analyst</li></ul>",
      "start_date": "2027-03-03",
      "duration": 1.0,
      "progress": 0,
      "open": true,
      "meta": "106f3aa9-7f7b-41e7-af8e-c7bc3a917855 FF, b5f9b098-0216-4190-831a-c6e4d56463d7 FS",
      "parent": "106f3aa9-7f7b-41e7-af8e-c7bc3a917855"
    },
    {
      "id": "b2fb9de9-1f31-4508-bc6d-83e29af7d661",
      "text": "Optimize Alignment Procedures",
      "custom_tooltip": "<b>Optimize Alignment Procedures</b>",
      "progress": 0,
      "open": true,
      "meta": "680df026-d205-4fa8-b087-94678ec8994e FF, 106f3aa9-7f7b-41e7-af8e-c7bc3a917855 FS",
      "parent": "680df026-d205-4fa8-b087-94678ec8994e",
      "type": "project"
    },
    {
      "id": "add59824-bfb9-426f-9411-f522c1ce2d67",
      "text": "Define Alignment Optimization Metrics",
      "custom_tooltip": "<b>Define Alignment Optimization Metrics</b><br>Establish quantifiable metrics (e.g., Strehl ratio, wavefront error) to evaluate the effectiveness of alignment procedures. Define acceptable ranges for each metric.<br><b>Resources needed:</b><br><ul><li>Metrology Specialist</li><li>Lead Optical Engineer</li></ul>",
      "start_date": "2027-03-04",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "b2fb9de9-1f31-4508-bc6d-83e29af7d661 SS",
      "parent": "b2fb9de9-1f31-4508-bc6d-83e29af7d661"
    },
    {
      "id": "812ac4f4-0ed9-4b01-858a-14bffef73cac",
      "text": "Develop Automated Alignment Script",
      "custom_tooltip": "<b>Develop Automated Alignment Script</b><br>Create a script to automate the alignment process, incorporating feedback from metrology data. The script should be able to adjust optical elements to optimize alignment metrics.<br><b>Resources needed:</b><br><ul><li>Control Systems Engineer</li><li>Metrology and Instrumentation Specialist</li></ul>",
      "start_date": "2027-03-06",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "add59824-bfb9-426f-9411-f522c1ce2d67 FS",
      "parent": "b2fb9de9-1f31-4508-bc6d-83e29af7d661"
    },
    {
      "id": "d96a1055-5c02-44ad-b9e2-9eec501c4433",
      "text": "Test Alignment Procedures Under Load",
      "custom_tooltip": "<b>Test Alignment Procedures Under Load</b><br>Evaluate the performance of the alignment procedures under thermal and dynamic loading conditions. Identify any limitations or instabilities.<br><b>Resources needed:</b><br><ul><li>Vibration Test Specialist</li><li>Thermal/Structural Analysis Engineer</li><li>Metrology and Instrumentation Specialist</li></ul>",
      "start_date": "2027-03-08",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "812ac4f4-0ed9-4b01-858a-14bffef73cac FS",
      "parent": "b2fb9de9-1f31-4508-bc6d-83e29af7d661"
    },
    {
      "id": "f833fbfb-b0bd-45e5-b05d-f3da7e7cc9d5",
      "text": "Refine Alignment Procedures Based on Results",
      "custom_tooltip": "<b>Refine Alignment Procedures Based on Results</b><br>Iteratively improve the alignment procedures based on the test results. Address any identified limitations or instabilities. Document the final alignment procedures.<br><b>Resources needed:</b><br><ul><li>Metrology Specialist</li><li>Lead Optical Engineer</li><li>Control Systems Engineer</li></ul>",
      "start_date": "2027-03-10",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "b2fb9de9-1f31-4508-bc6d-83e29af7d661 FF, d96a1055-5c02-44ad-b9e2-9eec501c4433 FS",
      "parent": "b2fb9de9-1f31-4508-bc6d-83e29af7d661"
    },
    {
      "id": "76c22245-3944-41b4-8b54-3446793f879b",
      "text": "Scaling Model Validation",
      "custom_tooltip": "<b>Scaling Model Validation</b>",
      "progress": 0,
      "open": true,
      "meta": "680df026-d205-4fa8-b087-94678ec8994e FS",
      "parent": "a76e5dca-69db-48ef-9f02-0b22301fe8b4",
      "type": "project"
    },
    {
      "id": "9c8045d2-c03e-4436-b665-9e843c4a532a",
      "text": "Develop Thermal-Structural-Optical (TSO) Scaling Model",
      "custom_tooltip": "<b>Develop Thermal-Structural-Optical (TSO) Scaling Model</b>",
      "progress": 0,
      "open": true,
      "meta": "76c22245-3944-41b4-8b54-3446793f879b SS",
      "parent": "76c22245-3944-41b4-8b54-3446793f879b",
      "type": "project"
    },
    {
      "id": "48e1efd4-0376-45f5-86a5-cfa87876c27c",
      "text": "Define TSO Model Parameters",
      "custom_tooltip": "<b>Define TSO Model Parameters</b><br>Identify key parameters for thermal, structural, and optical behavior. Determine parameter ranges and sensitivities.<br><b>Resources needed:</b><br><ul><li>Thermal Engineer</li><li>Structural Engineer</li><li>Optical Engineer</li><li>Modeling Specialist</li></ul>",
      "start_date": "2027-03-12",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "9c8045d2-c03e-4436-b665-9e843c4a532a SS",
      "parent": "9c8045d2-c03e-4436-b665-9e843c4a532a"
    },
    {
      "id": "f3714e39-3ce9-4a45-ac4a-7ed7c8017578",
      "text": "Develop Finite Element Analysis (FEA) Model",
      "custom_tooltip": "<b>Develop Finite Element Analysis (FEA) Model</b><br>Create a detailed FEA model of the optical engine and mechanical mount. Incorporate thermal and structural properties.<br><b>Resources needed:</b><br><ul><li>Structural Engineer</li><li>FEA Specialist</li><li>CAD Designer</li></ul>",
      "start_date": "2027-03-16",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "48e1efd4-0376-45f5-86a5-cfa87876c27c FS",
      "parent": "9c8045d2-c03e-4436-b665-9e843c4a532a"
    },
    {
      "id": "dd34356a-7a9a-4748-b2db-7ee3b0913d5c",
      "text": "Develop Optical Simulation Model",
      "custom_tooltip": "<b>Develop Optical Simulation Model</b><br>Create an optical simulation model using Zemax or similar software. Model wavefront propagation and Strehl ratio.<br><b>Resources needed:</b><br><ul><li>Optical Engineer</li><li>Simulation Specialist</li></ul>",
      "start_date": "2027-03-20",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "f3714e39-3ce9-4a45-ac4a-7ed7c8017578 FS",
      "parent": "9c8045d2-c03e-4436-b665-9e843c4a532a"
    },
    {
      "id": "f9c8902a-ec45-44c4-a362-2576b2d8c2bc",
      "text": "Integrate Thermal, Structural, Optical Models",
      "custom_tooltip": "<b>Integrate Thermal, Structural, Optical Models</b><br>Couple the FEA and optical models to simulate TSO effects. Develop a scaling methodology for larger apertures.<br><b>Resources needed:</b><br><ul><li>Thermal Engineer</li><li>Structural Engineer</li><li>Optical Engineer</li><li>Modeling Specialist</li></ul>",
      "start_date": "2027-03-24",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "dd34356a-7a9a-4748-b2db-7ee3b0913d5c FS",
      "parent": "9c8045d2-c03e-4436-b665-9e843c4a532a"
    },
    {
      "id": "c865d0bc-a75f-4231-86c7-049dab857168",
      "text": "Calibrate and Validate Sub-Models",
      "custom_tooltip": "<b>Calibrate and Validate Sub-Models</b><br>Calibrate individual thermal, structural and optical models against existing data. Validate sub-models before integration.<br><b>Resources needed:</b><br><ul><li>Thermal Engineer</li><li>Structural Engineer</li><li>Optical Engineer</li><li>Metrology Specialist</li></ul>",
      "start_date": "2027-03-28",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "9c8045d2-c03e-4436-b665-9e843c4a532a FF, f9c8902a-ec45-44c4-a362-2576b2d8c2bc FS",
      "parent": "9c8045d2-c03e-4436-b665-9e843c4a532a"
    },
    {
      "id": "99448242-bbeb-4760-b5f0-944a2b83c4b5",
      "text": "Validate TSO Model with Experimental Data",
      "custom_tooltip": "<b>Validate TSO Model with Experimental Data</b>",
      "progress": 0,
      "open": true,
      "meta": "9c8045d2-c03e-4436-b665-9e843c4a532a FS",
      "parent": "76c22245-3944-41b4-8b54-3446793f879b",
      "type": "project"
    },
    {
      "id": "a3547db4-dc1c-49ce-be04-7eae12a0e2d8",
      "text": "Define Validation Metrics and Acceptance Criteria",
      "custom_tooltip": "<b>Define Validation Metrics and Acceptance Criteria</b><br>Establish specific, measurable, achievable, relevant, and time-bound (SMART) metrics for validating the TSO model against experimental data. Define clear acceptance criteria for determining whether the model is sufficiently accurate.<br><b>Resources needed:</b><br><ul><li>Lead Optical Engineer</li><li>Thermal/Structural Analysis Engineer</li><li>Project Manager</li></ul>",
      "start_date": "2027-04-01",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "99448242-bbeb-4760-b5f0-944a2b83c4b5 SS",
      "parent": "99448242-bbeb-4760-b5f0-944a2b83c4b5"
    },
    {
      "id": "7c789764-8899-47cd-8fa7-c7acb5465ebe",
      "text": "Design Validation Experiments",
      "custom_tooltip": "<b>Design Validation Experiments</b><br>Develop a detailed experimental plan for validating the TSO model. This includes selecting appropriate test conditions, defining measurement procedures, and identifying necessary instrumentation.<br><b>Resources needed:</b><br><ul><li>Metrology and Instrumentation Specialist</li><li>Thermal/Structural Analysis Engineer</li><li>Lead Optical Engineer</li></ul>",
      "start_date": "2027-04-04",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "a3547db4-dc1c-49ce-be04-7eae12a0e2d8 FS",
      "parent": "99448242-bbeb-4760-b5f0-944a2b83c4b5"
    },
    {
      "id": "1cdba41f-8e03-4d15-bd1a-34b7a82c8dd9",
      "text": "Execute Validation Experiments",
      "custom_tooltip": "<b>Execute Validation Experiments</b><br>Conduct the validation experiments according to the experimental plan. This includes setting up the experiment, collecting data, and monitoring the system&#x27;s performance.<br><b>Resources needed:</b><br><ul><li>Vibration Test Specialist</li><li>Metrology and Instrumentation Specialist</li><li>Technicians</li></ul>",
      "start_date": "2027-04-07",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "7c789764-8899-47cd-8fa7-c7acb5465ebe FS",
      "parent": "99448242-bbeb-4760-b5f0-944a2b83c4b5"
    },
    {
      "id": "f51d7244-999c-4a20-8403-0c28483ae5b0",
      "text": "Compare Model Predictions with Experimental Data",
      "custom_tooltip": "<b>Compare Model Predictions with Experimental Data</b><br>Compare the TSO model predictions with the experimental data. This includes analyzing the data, calculating the validation metrics, and assessing whether the acceptance criteria are met.<br><b>Resources needed:</b><br><ul><li>Thermal/Structural Analysis Engineer</li><li>Lead Optical Engineer</li><li>Data Analyst</li></ul>",
      "start_date": "2027-04-10",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "1cdba41f-8e03-4d15-bd1a-34b7a82c8dd9 FS",
      "parent": "99448242-bbeb-4760-b5f0-944a2b83c4b5"
    },
    {
      "id": "975395b6-a0b7-4cdd-a42c-ce70e7b40a8e",
      "text": "Document Validation Results and Findings",
      "custom_tooltip": "<b>Document Validation Results and Findings</b><br>Prepare a detailed report documenting the validation experiments, the data analysis, and the comparison between the model predictions and the experimental data. Include a discussion of the strengths and limitations of the TSO model.<br><b>Resources needed:</b><br><ul><li>Lead Optical Engineer</li><li>Thermal/Structural Analysis Engineer</li><li>Technical Writer</li></ul>",
      "start_date": "2027-04-13",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "99448242-bbeb-4760-b5f0-944a2b83c4b5 FF, f51d7244-999c-4a20-8403-0c28483ae5b0 FS",
      "parent": "99448242-bbeb-4760-b5f0-944a2b83c4b5"
    },
    {
      "id": "0e56b0fd-a55f-42c9-9f33-2439f9ade07f",
      "text": "Characterize Boundary Conditions",
      "custom_tooltip": "<b>Characterize Boundary Conditions</b>",
      "progress": 0,
      "open": true,
      "meta": "99448242-bbeb-4760-b5f0-944a2b83c4b5 FS",
      "parent": "76c22245-3944-41b4-8b54-3446793f879b",
      "type": "project"
    },
    {
      "id": "6c988210-2c5a-479e-a31d-486bf3e6c4ec",
      "text": "Define Boundary Condition Measurement Plan",
      "custom_tooltip": "<b>Define Boundary Condition Measurement Plan</b><br>Develop a detailed plan outlining the types of boundary conditions to measure (thermal, mechanical), the sensors to use, and the measurement locations. This plan should also include calibration procedures and data acquisition methods.<br><b>Resources needed:</b><br><ul><li>Thermal Engineer</li><li>Mechanical Engineer</li><li>Metrology Specialist</li></ul>",
      "start_date": "2027-04-16",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "0e56b0fd-a55f-42c9-9f33-2439f9ade07f SS",
      "parent": "0e56b0fd-a55f-42c9-9f33-2439f9ade07f"
    },
    {
      "id": "af67c7ee-728d-4a2f-be64-802a04ab8377",
      "text": "Select and Procure Sensors",
      "custom_tooltip": "<b>Select and Procure Sensors</b><br>Identify and procure appropriate sensors for measuring thermal and mechanical boundary conditions. Consider factors such as accuracy, resolution, range, and environmental compatibility. Ensure sensors are calibrated and traceable to national standards.<br><b>Resources needed:</b><br><ul><li>Procurement Specialist</li><li>Thermal Engineer</li><li>Mechanical Engineer</li></ul>",
      "start_date": "2027-04-18",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "6c988210-2c5a-479e-a31d-486bf3e6c4ec FS",
      "parent": "0e56b0fd-a55f-42c9-9f33-2439f9ade07f"
    },
    {
      "id": "6fe1a7ff-6abf-442e-8f51-c4abc91f133c",
      "text": "Design and Fabricate Sensor Mounting Fixtures",
      "custom_tooltip": "<b>Design and Fabricate Sensor Mounting Fixtures</b><br>Design and fabricate custom mounting fixtures to securely attach sensors to the test article and ensure accurate measurements. Consider factors such as thermal conductivity, mechanical stability, and ease of installation and removal.<br><b>Resources needed:</b><br><ul><li>Mechanical Engineer</li><li>CAD Designer</li><li>Machinist</li></ul>",
      "start_date": "2027-04-20",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "af67c7ee-728d-4a2f-be64-802a04ab8377 FS",
      "parent": "0e56b0fd-a55f-42c9-9f33-2439f9ade07f"
    },
    {
      "id": "167f5a9e-6256-4f8b-9c06-2e65026cfd7f",
      "text": "Conduct Boundary Condition Measurements",
      "custom_tooltip": "<b>Conduct Boundary Condition Measurements</b><br>Install sensors and mounting fixtures on the test article. Perform measurements of thermal and mechanical boundary conditions under various operating conditions. Record data using a data acquisition system.<br><b>Resources needed:</b><br><ul><li>Thermal Engineer</li><li>Mechanical Engineer</li><li>Metrology Specialist</li></ul>",
      "start_date": "2027-04-22",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "6fe1a7ff-6abf-442e-8f51-c4abc91f133c FS",
      "parent": "0e56b0fd-a55f-42c9-9f33-2439f9ade07f"
    },
    {
      "id": "e055485d-9d78-4d48-a743-2d1d65d3a5e3",
      "text": "Analyze and Validate Measurement Data",
      "custom_tooltip": "<b>Analyze and Validate Measurement Data</b><br>Analyze the measured boundary condition data to ensure accuracy and consistency. Compare the data with theoretical predictions and historical data. Identify and resolve any discrepancies or anomalies.<br><b>Resources needed:</b><br><ul><li>Thermal Engineer</li><li>Mechanical Engineer</li><li>Data Analyst</li></ul>",
      "start_date": "2027-04-24",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "0e56b0fd-a55f-42c9-9f33-2439f9ade07f FF, 167f5a9e-6256-4f8b-9c06-2e65026cfd7f FS",
      "parent": "0e56b0fd-a55f-42c9-9f33-2439f9ade07f"
    },
    {
      "id": "61f5dfb8-fbfd-47b5-ac55-feaf7a554824",
      "text": "Predict Performance for Larger Aperture Sizes",
      "custom_tooltip": "<b>Predict Performance for Larger Aperture Sizes</b>",
      "progress": 0,
      "open": true,
      "meta": "0e56b0fd-a55f-42c9-9f33-2439f9ade07f FS",
      "parent": "76c22245-3944-41b4-8b54-3446793f879b",
      "type": "project"
    },
    {
      "id": "782154c7-570b-418e-9c2b-09f9a6bd98fc",
      "text": "Define Aperture Size and Configuration",
      "custom_tooltip": "<b>Define Aperture Size and Configuration</b><br>Specify the exact aperture size (e.g., diameter, number of tiles) and configuration (e.g., hexagonal, circular) for the larger aperture system to be simulated. This includes defining the spacing between tiles and any obscurations within the aperture.<br><b>Resources needed:</b><br><ul><li>Optical Engineer</li><li>System Architect</li></ul>",
      "start_date": "2027-04-26",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "61f5dfb8-fbfd-47b5-ac55-feaf7a554824 SS",
      "parent": "61f5dfb8-fbfd-47b5-ac55-feaf7a554824"
    },
    {
      "id": "138158a3-cc11-4a33-a739-9b0489396f63",
      "text": "Develop High-Fidelity Simulation Model",
      "custom_tooltip": "<b>Develop High-Fidelity Simulation Model</b><br>Create a detailed simulation model of the larger aperture system using appropriate software tools (e.g., Zemax, Code V, ANSYS). This model should incorporate all relevant optical, thermal, and structural effects, including wavefront aberrations, thermal distortions, and mechanical stresses.<br><b>Resources needed:</b><br><ul><li>Optical Engineer</li><li>Thermal/Structural Analysis Engineer</li><li>Simulation Software</li></ul>",
      "start_date": "2027-04-30",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "782154c7-570b-418e-9c2b-09f9a6bd98fc FS",
      "parent": "61f5dfb8-fbfd-47b5-ac55-feaf7a554824"
    },
    {
      "id": "7b5913a2-3281-406c-8939-8c081228c569",
      "text": "Simulate Performance Under Various Conditions",
      "custom_tooltip": "<b>Simulate Performance Under Various Conditions</b><br>Run simulations of the larger aperture system under a range of operating conditions, including different thermal loads, vibration levels, and atmospheric turbulence profiles. Collect data on key performance metrics such as Strehl ratio, beam quality, and power throughput.<br><b>Resources needed:</b><br><ul><li>Optical Engineer</li><li>Simulation Software</li><li>High-Performance Computing Resources</li></ul>",
      "start_date": "2027-05-04",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "138158a3-cc11-4a33-a739-9b0489396f63 FS",
      "parent": "61f5dfb8-fbfd-47b5-ac55-feaf7a554824"
    },
    {
      "id": "dc26141d-6f18-45c3-a5e0-446d5f39b290",
      "text": "Analyze Simulation Results and Identify Trends",
      "custom_tooltip": "<b>Analyze Simulation Results and Identify Trends</b><br>Analyze the simulation data to identify trends and relationships between operating conditions and system performance. Determine the sensitivity of the system to different parameters and identify potential bottlenecks or limitations.<br><b>Resources needed:</b><br><ul><li>Optical Engineer</li><li>Data Analyst</li></ul>",
      "start_date": "2027-05-08",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "7b5913a2-3281-406c-8939-8c081228c569 FS",
      "parent": "61f5dfb8-fbfd-47b5-ac55-feaf7a554824"
    },
    {
      "id": "54aab071-66ea-489b-8ba6-5aecc3cf965c",
      "text": "Document Simulation Setup and Results",
      "custom_tooltip": "<b>Document Simulation Setup and Results</b><br>Prepare a detailed report documenting the simulation setup, including the model parameters, operating conditions, and simulation results. This report should include figures, tables, and graphs to illustrate the key findings and conclusions.<br><b>Resources needed:</b><br><ul><li>Optical Engineer</li><li>Technical Writer</li></ul>",
      "start_date": "2027-05-12",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "61f5dfb8-fbfd-47b5-ac55-feaf7a554824 FF, dc26141d-6f18-45c3-a5e0-446d5f39b290 FS",
      "parent": "61f5dfb8-fbfd-47b5-ac55-feaf7a554824"
    },
    {
      "id": "cb6dde33-6f7b-4451-8c15-9c17ee535831",
      "text": "Refine Scaling Model Based on Validation Results",
      "custom_tooltip": "<b>Refine Scaling Model Based on Validation Results</b>",
      "progress": 0,
      "open": true,
      "meta": "76c22245-3944-41b4-8b54-3446793f879b FF, 61f5dfb8-fbfd-47b5-ac55-feaf7a554824 FS",
      "parent": "76c22245-3944-41b4-8b54-3446793f879b",
      "type": "project"
    },
    {
      "id": "bf0e4b3e-1962-4fc0-b519-2c538e4b074c",
      "text": "Compare model predictions to validation results",
      "custom_tooltip": "<b>Compare model predictions to validation results</b><br>Compare the scaling model predictions with the experimental validation results to identify discrepancies and areas for improvement. This involves analyzing the differences between the predicted and measured Strehl ratio and wall-plug efficiency for various aperture sizes and operating conditions.<br><b>Resources needed:</b><br><ul><li>Thermal/Structural Analysis Engineer</li><li>Lead Optical Engineer</li><li>Data Analyst</li></ul>",
      "start_date": "2027-05-16",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "cb6dde33-6f7b-4451-8c15-9c17ee535831 SS",
      "parent": "cb6dde33-6f7b-4451-8c15-9c17ee535831"
    },
    {
      "id": "f6d2443e-a1cd-482f-ab08-c2ec8358dee8",
      "text": "Identify sources of discrepancies in model",
      "custom_tooltip": "<b>Identify sources of discrepancies in model</b><br>Analyze the discrepancies between the scaling model predictions and experimental validation results to identify the root causes of the differences. This may involve examining the model assumptions, material properties, boundary conditions, and numerical methods to pinpoint the sources of error.<br><b>Resources needed:</b><br><ul><li>Thermal/Structural Analysis Engineer</li><li>Lead Optical Engineer</li><li>Modeling Expert</li></ul>",
      "start_date": "2027-05-19",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "bf0e4b3e-1962-4fc0-b519-2c538e4b074c FS",
      "parent": "cb6dde33-6f7b-4451-8c15-9c17ee535831"
    },
    {
      "id": "2d9868a7-9970-45d6-ac08-69bc1fc2a808",
      "text": "Adjust model parameters based on analysis",
      "custom_tooltip": "<b>Adjust model parameters based on analysis</b><br>Adjust the parameters of the scaling model based on the analysis of the discrepancies between the model predictions and experimental validation results. This may involve modifying the material properties, boundary conditions, or numerical methods to improve the accuracy of the model.<br><b>Resources needed:</b><br><ul><li>Thermal/Structural Analysis Engineer</li><li>Lead Optical Engineer</li><li>Modeling Expert</li></ul>",
      "start_date": "2027-05-22",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "f6d2443e-a1cd-482f-ab08-c2ec8358dee8 FS",
      "parent": "cb6dde33-6f7b-4451-8c15-9c17ee535831"
    },
    {
      "id": "607d95f4-17f1-4de2-a783-6e844be69218",
      "text": "Re-validate refined scaling model",
      "custom_tooltip": "<b>Re-validate refined scaling model</b><br>Re-validate the refined scaling model with the experimental validation results to ensure that the adjustments have improved the accuracy of the model. This involves comparing the predictions of the refined model with the experimental data and assessing the level of agreement.<br><b>Resources needed:</b><br><ul><li>Thermal/Structural Analysis Engineer</li><li>Lead Optical Engineer</li><li>Data Analyst</li></ul>",
      "start_date": "2027-05-25",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "2d9868a7-9970-45d6-ac08-69bc1fc2a808 FS",
      "parent": "cb6dde33-6f7b-4451-8c15-9c17ee535831"
    },
    {
      "id": "47dbeb88-252a-4e3c-9f05-50b298f0419e",
      "text": "Document model refinement process and results",
      "custom_tooltip": "<b>Document model refinement process and results</b><br>Document the entire model refinement process, including the analysis of the discrepancies, the adjustments made to the model parameters, and the results of the re-validation. This documentation should provide a clear and concise record of the model refinement process and the improvements achieved.<br><b>Resources needed:</b><br><ul><li>Thermal/Structural Analysis Engineer</li><li>Lead Optical Engineer</li><li>Technical Writer</li></ul>",
      "start_date": "2027-05-28",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "cb6dde33-6f7b-4451-8c15-9c17ee535831 FF, 607d95f4-17f1-4de2-a783-6e844be69218 FS",
      "parent": "cb6dde33-6f7b-4451-8c15-9c17ee535831"
    },

    {
      "id": "840e98a4-118e-457a-af10-b2e059ac97ba",
      "text": "Gather Raw Data for Progress Reports",
      "custom_tooltip": "<b>Gather Raw Data for Progress Reports</b><br>Collect all relevant data points from ongoing experiments, simulations, and analyses. This includes Strehl ratio measurements, wall-plug efficiency data, vibration test results, metrology data, and scaling model predictions. Ensure data is properly formatted and stored in a central repository.<br><b>Resources needed:</b><br><ul><li>Optical Engineer</li><li>Thermal/Structural Analysis Engineer</li><li>Metrology and Instrumentation Specialist</li><li>Data Analyst</li></ul>",

      "duration": 2.0,

    {
      "id": "5be37568-d45e-48a7-b18b-20a45c41639c",
      "text": "Analyze Data and Identify Key Trends",
      "custom_tooltip": "<b>Analyze Data and Identify Key Trends</b><br>Perform statistical analysis on the collected data to identify key trends, anomalies, and deviations from expected performance. Calculate relevant metrics, such as mean, standard deviation, and correlation coefficients. Visualize data using charts and graphs to facilitate interpretation.<br><b>Resources needed:</b><br><ul><li>Data Analyst</li><li>Optical Engineer</li><li>Thermal/Structural Analysis Engineer</li></ul>",
      "start_date": "2027-06-02",
      "duration": 2.0,
      "progress": 0,

    },
    {
      "id": "d7cb63fb-6b96-414c-9e4e-ae2948a72d30",
      "text": "Document Findings and Prepare Report Draft",
      "custom_tooltip": "<b>Document Findings and Prepare Report Draft</b><br>Summarize the key findings from the data analysis in a clear and concise manner. Prepare a draft progress report that includes a description of the experimental setup, data collection methods, analysis techniques, and key results. Include relevant charts, graphs, and tables to support the findings.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Technical Writer</li><li>Data Analyst</li></ul>",
      "start_date": "2027-06-04",
      "duration": 2.0,
      "progress": 0,

    },

      "id": "c4a85617-5891-42cd-86ca-fefb52c926ae",
      "text": "Review and Revise Report Draft",
      "custom_tooltip": "<b>Review and Revise Report Draft</b><br>Circulate the draft progress report to relevant stakeholders for review and feedback. Incorporate feedback from stakeholders to improve the clarity, accuracy, and completeness of the report. Address any questions or concerns raised by stakeholders.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Optical Engineer</li><li>Thermal/Structural Analysis Engineer</li><li>Stakeholders</li></ul>",
      "start_date": "2027-06-06",
      "duration": 2.0,
      "progress": 0,
      "open": true,

    },
    {
      "id": "9e66101a-704e-4af9-a896-31ff7627668d",
      "text": "Finalize and Submit Progress Report",
      "custom_tooltip": "<b>Finalize and Submit Progress Report</b><br>Finalize the progress report based on the feedback received from stakeholders. Ensure that the report is properly formatted and meets all requirements. Submit the report to the funding agency and other relevant stakeholders.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Technical Writer</li></ul>",
      "start_date": "2027-06-08",
      "duration": 2.0,
      "progress": 0,
      "open": true,

    {
      "id": "980e846c-5933-4f29-920c-6c5d78494efb",
      "text": "Compile and Analyze Validation Data",
      "custom_tooltip": "<b>Compile and Analyze Validation Data</b><br>Gather all relevant data from performance target validation, vibration qualification, metrology accuracy validation, and scaling model validation. Analyze the data to identify trends, anomalies, and key findings.<br><b>Resources needed:</b><br><ul><li>Data Analyst</li><li>Lead Optical Engineer</li><li>Thermal/Structural Analysis Engineer</li><li>Metrology and Instrumentation Specialist</li></ul>",
      "start_date": "2027-06-27",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "19330697-ed65-41c6-938b-2fda512b4172 FS",
      "parent": "43e2308f-9e91-406f-90e2-4ccab0371e67"
    },
    {
      "id": "9b838212-0c20-4d31-bd5d-79f997a9dc2e",
      "text": "Draft Report Sections and Summaries",
      "custom_tooltip": "<b>Draft Report Sections and Summaries</b><br>Write the individual sections of the final validation report, including introductions, methodology descriptions, results presentations, and conclusions. Prepare executive summaries for each section.<br><b>Resources needed:</b><br><ul><li>Technical Writer</li><li>Lead Optical Engineer</li><li>Thermal/Structural Analysis Engineer</li><li>Metrology and Instrumentation Specialist</li></ul>",
      "start_date": "2027-06-29",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "980e846c-5933-4f29-920c-6c5d78494efb FS",
      "parent": "43e2308f-9e91-406f-90e2-4ccab0371e67"
    },
    {
      "id": "c68b0dc2-568a-4127-bb03-1dcfa16e6494",
      "text": "Review and Edit Draft Report",
      "custom_tooltip": "<b>Review and Edit Draft Report</b><br>Conduct a thorough review of the draft report to ensure accuracy, clarity, and completeness. Incorporate feedback from stakeholders and make necessary revisions.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Lead Optical Engineer</li><li>Thermal/Structural Analysis Engineer</li><li>Metrology and Instrumentation Specialist</li><li>External Reviewer (Optional)</li></ul>",
      "start_date": "2027-07-01",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "9b838212-0c20-4d31-bd5d-79f997a9dc2e FS",
      "parent": "43e2308f-9e91-406f-90e2-4ccab0371e67"
    },
    {
      "id": "b4bf8820-f33f-47d0-8b51-a479aaa5b2c0",
      "text": "Finalize and Publish Validation Report",
      "custom_tooltip": "<b>Finalize and Publish Validation Report</b><br>Format the report according to established guidelines, obtain final approvals, and publish the report in a designated repository. Distribute the report to relevant stakeholders.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Technical Writer</li><li>Document Control Specialist</li></ul>",
      "start_date": "2027-07-03",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "43e2308f-9e91-406f-90e2-4ccab0371e67 FF, c68b0dc2-568a-4127-bb03-1dcfa16e6494 FS",
      "parent": "43e2308f-9e91-406f-90e2-4ccab0371e67"
    },
    {
      "id": "fb934d72-8079-4624-a424-3096e87c68d3",
      "text": "Present Findings to Stakeholders",
      "custom_tooltip": "<b>Present Findings to Stakeholders</b>",
      "progress": 0,
      "open": true,
      "meta": "43e2308f-9e91-406f-90e2-4ccab0371e67 FS",
      "parent": "d50ee4c9-a757-419c-9297-1b6bdb5e9b7b",
      "type": "project"
    },
    {
      "id": "dc93b537-8922-4740-be24-58b54c642ef7",
      "text": "Prepare presentation materials",
      "custom_tooltip": "<b>Prepare presentation materials</b><br>Develop a comprehensive slide deck summarizing the project&#x27;s goals, methodology, key findings, and conclusions. Include visual aids such as charts, graphs, and images to effectively communicate complex information.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Lead Optical Engineer</li><li>Thermal/Structural Analysis Engineer</li><li>Metrology and Instrumentation Specialist</li></ul>",
      "start_date": "2027-07-05",
      "duration": 1.0,
      "progress": 0,
      "open": true,
      "meta": "fb934d72-8079-4624-a424-3096e87c68d3 SS",
      "parent": "fb934d72-8079-4624-a424-3096e87c68d3"
    },
    {
      "id": "17a8e7a3-c998-4049-af40-ef9f2d82e6bb",
      "text": "Schedule stakeholder presentation",
      "custom_tooltip": "<b>Schedule stakeholder presentation</b><br>Coordinate with stakeholders to find a mutually convenient time for the presentation. Send out meeting invitations with a detailed agenda and relevant background information.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Administrative Assistant</li></ul>",
      "start_date": "2027-07-06",
      "duration": 1.0,
      "progress": 0,
      "open": true,
      "meta": "dc93b537-8922-4740-be24-58b54c642ef7 FS",
      "parent": "fb934d72-8079-4624-a424-3096e87c68d3"
    },
    {
      "id": "60a2dc91-e910-4760-bc73-42f0763dea10",
      "text": "Rehearse presentation delivery",
      "custom_tooltip": "<b>Rehearse presentation delivery</b><br>Conduct a practice run of the presentation to ensure smooth delivery and effective time management. Solicit feedback from colleagues to identify areas for improvement.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Lead Optical Engineer</li><li>Thermal/Structural Analysis Engineer</li></ul>",
      "start_date": "2027-07-07",
      "duration": 1.0,
      "progress": 0,
      "open": true,
      "meta": "17a8e7a3-c998-4049-af40-ef9f2d82e6bb FS",
      "parent": "fb934d72-8079-4624-a424-3096e87c68d3"
    },
    {
      "id": "8b2e9f76-97d7-415f-82af-4a43b3061b7a",
      "text": "Deliver stakeholder presentation",
      "custom_tooltip": "<b>Deliver stakeholder presentation</b><br>Present the project findings to stakeholders, addressing any questions or concerns they may have. Ensure that all key messages are clearly communicated and understood.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Lead Optical Engineer</li><li>Thermal/Structural Analysis Engineer</li><li>Metrology and Instrumentation Specialist</li></ul>",
      "start_date": "2027-07-08",
      "duration": 1.0,
      "progress": 0,
      "open": true,
      "meta": "60a2dc91-e910-4760-bc73-42f0763dea10 FS",
      "parent": "fb934d72-8079-4624-a424-3096e87c68d3"
    },
    {
      "id": "3085470a-62df-4fe3-b9dd-d5efeecc6216",
      "text": "Address stakeholder feedback",
      "custom_tooltip": "<b>Address stakeholder feedback</b><br>Document any feedback received from stakeholders during the presentation. Develop a plan to address any concerns or suggestions raised, and communicate the plan to stakeholders.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Lead Optical Engineer</li></ul>",
      "start_date": "2027-07-09",
      "duration": 1.0,
      "progress": 0,
      "open": true,
      "meta": "fb934d72-8079-4624-a424-3096e87c68d3 FF, 8b2e9f76-97d7-415f-82af-4a43b3061b7a FS",
      "parent": "fb934d72-8079-4624-a424-3096e87c68d3"
    },
    {
      "id": "cede399a-8202-4ea6-8207-6990febcc901",
      "text": "Archive Project Data",
      "custom_tooltip": "<b>Archive Project Data</b>",
      "progress": 0,
      "open": true,
      "meta": "d50ee4c9-a757-419c-9297-1b6bdb5e9b7b FF, fb934d72-8079-4624-a424-3096e87c68d3 FS",
      "parent": "d50ee4c9-a757-419c-9297-1b6bdb5e9b7b",
      "type": "project"
    },
    {
      "id": "326ed068-b167-4031-8ab1-9f2fa975a51f",
      "text": "Organize Project Data for Archiving",
      "custom_tooltip": "<b>Organize Project Data for Archiving</b><br>Objective: Structure project data for easy retrieval. Scope: Organize all documents, test results, and reports. Steps: Create a folder structure, label files, and remove duplicates. Deliverables: Organized project data.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Data Analyst</li><li>IT Support</li></ul>",
      "start_date": "2027-07-10",
      "duration": 1.0,
      "progress": 0,
      "open": true,
      "meta": "cede399a-8202-4ea6-8207-6990febcc901 SS",
      "parent": "cede399a-8202-4ea6-8207-6990febcc901"
    },
    {
      "id": "0fb772c0-35c3-467c-af3e-b4311ce79d24",
      "text": "Backup Project Data to Secure Storage",
      "custom_tooltip": "<b>Backup Project Data to Secure Storage</b><br>Objective: Ensure data preservation. Scope: Copy all project data to a secure storage location. Steps: Select storage medium, initiate backup, and verify completion. Deliverables: Backed-up project data.<br><b>Resources needed:</b><br><ul><li>IT Support</li><li>Data Analyst</li></ul>",
      "start_date": "2027-07-11",
      "duration": 1.0,
      "progress": 0,
      "open": true,
      "meta": "326ed068-b167-4031-8ab1-9f2fa975a51f FS",
      "parent": "cede399a-8202-4ea6-8207-6990febcc901"
    },
    {
      "id": "a7ec2ef4-cfad-4a5a-a8f4-4767fcc63eb2",
      "text": "Verify Data Integrity After Archiving",
      "custom_tooltip": "<b>Verify Data Integrity After Archiving</b><br>Objective: Confirm data accuracy after backup. Scope: Check data integrity in the archive. Steps: Run checksums, compare files, and validate data. Deliverables: Verified data integrity.<br><b>Resources needed:</b><br><ul><li>Data Analyst</li><li>IT Support</li></ul>",
      "start_date": "2027-07-12",
      "duration": 1.0,
      "progress": 0,
      "open": true,
      "meta": "0fb772c0-35c3-467c-af3e-b4311ce79d24 FS",
      "parent": "cede399a-8202-4ea6-8207-6990febcc901"
    },
    {
      "id": "66a0df43-07fa-4e0c-b93a-f9f3ba47bdb0",
      "text": "Document Archiving Process and Location",
      "custom_tooltip": "<b>Document Archiving Process and Location</b><br>Objective: Record archiving details. Scope: Document the archiving process and storage location. Steps: Write a procedure, note storage details, and store the document. Deliverables: Archiving documentation.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Data Analyst</li></ul>",
      "start_date": "2027-07-13",
      "duration": 1.0,
      "progress": 0,
      "open": true,
      "meta": "cede399a-8202-4ea6-8207-6990febcc901 FF, a7ec2ef4-cfad-4a5a-a8f4-4767fcc63eb2 FS",
      "parent": "cede399a-8202-4ea6-8207-6990febcc901"
    }

    function zoomFit() {
        const tasks = gantt.getTaskByTime();
        if (tasks.length > 0) {
            const firstTask = tasks[0];
            const lastTask = tasks[tasks.length - 1];
            gantt.showDate(firstTask.start_date);
            
            // Calculate total duration in days
            const startDate = new Date(firstTask.start_date);
            const endDate = new Date(lastTask.end_date);
            const durationDays = (endDate - startDate) / (1000 * 60 * 60 * 24);
            
            // Choose appropriate scale based on duration
            if (durationDays > 3650) { // More than 10 years
                gantt.config.scale_unit = "year";
                gantt.config.step = 10;
                gantt.config.subscales = [
                    {unit: "year", step: 1, date: "%Y"}
                ];
            } else if (durationDays > 365) { // More than 1 year
                gantt.config.scale_unit = "year";
                gantt.config.step = 1;
                gantt.config.subscales = [
                    {unit: "month", step: 1, date: "%M"}
                ];
            } else if (durationDays > 30) { // More than 1 month
                gantt.config.scale_unit = "month";
                gantt.config.step = 1;
                gantt.config.subscales = [
                    {unit: "day", step: 1, date: "%d"}
                ];
            } else if (durationDays > 7) { // More than 1 week
                gantt.config.scale_unit = "week";
                gantt.config.step = 1;
                gantt.config.subscales = [
                    {unit: "day", step: 1, date: "%d"}
                ];
            } else {
                gantt.config.scale_unit = "day";
                gantt.config.step = 1;
                gantt.config.subscales = [];
            }
            gantt.render();
        }
    }

    function zoomIn() {
        const currentUnit = gantt.config.scale_unit;
        const currentStep = gantt.config.step;
        
        if (currentUnit === "year" && currentStep === 10) {
            gantt.config.scale_unit = "year";
            gantt.config.step = 1;
            gantt.config.subscales = [
                {unit: "month", step: 1, date: "%M"}
            ];
        } else if (currentUnit === "year") {
            gantt.config.scale_unit = "month";
            gantt.config.step = 1;
            gantt.config.subscales = [
                {unit: "day", step: 1, date: "%d"}
            ];
        } else if (currentUnit === "month") {
            gantt.config.scale_unit = "week";
            gantt.config.step = 1;
            gantt.config.subscales = [
                {unit: "day", step: 1, date: "%d"}
            ];
        } else if (currentUnit === "week") {
            gantt.config.scale_unit = "day";
            gantt.config.step = 1;
            gantt.config.subscales = [];
        }
        gantt.render();
    }

    function zoomOut() {
        const currentUnit = gantt.config.scale_unit;
        const currentStep = gantt.config.step;
        
        if (currentUnit === "day") {
            gantt.config.scale_unit = "week";
            gantt.config.step = 1;
            gantt.config.subscales = [
                {unit: "day", step: 1, date: "%d"}
            ];
        } else if (currentUnit === "week") {
            gantt.config.scale_unit = "month";
            gantt.config.step = 1;
            gantt.config.subscales = [
                {unit: "day", step: 1, date: "%d"}
            ];
        } else if (currentUnit === "month") {
            gantt.config.scale_unit = "year";
            gantt.config.step = 1;
            gantt.config.subscales = [
                {unit: "month", step: 1, date: "%M"}
            ];
        } else if (currentUnit === "year") {
            gantt.config.scale_unit = "year";
            gantt.config.step = 10;
            gantt.config.subscales = [
                {unit: "year", step: 1, date: "%Y"}
            ];
        }
        gantt.render();
    }

    function downloadCSV() {
        if (GANTT_DATA_CSV === null) {
            return;
        }
        const blob = new Blob([GANTT_DATA_CSV], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        const url = URL.createObjectURL(blob);
        link.setAttribute('href', url);
        link.setAttribute('download', GANTT_FILENAME_CSV);
        link.style.visibility = 'hidden';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    // Gantt Initialization
    gantt.config.readonly = true;
    gantt.config.date_format = "%Y-%m-%d";
    gantt.config.scale_unit = "month";
    gantt.config.step = 1;
    gantt.config.subscales = [
        {unit: "day", step: 1, date: "%d"}
    ];

    gantt.config.columns = [
        {name:"text", label:"Task name", width:"*", tree:true},
        // {name:"start_date", label:"Start time", align: "center"},
        // {name:"duration", label:"Duration", align: "center"}
    ];

    gantt.templates.task_class = function(start, end, task) {
        if (task.type === "project") {
            return "project-task";
        }
        return "";
    };

    gantt.templates.tooltip_text = function(start, end, task) {
        return task.custom_tooltip || "No tooltip";
    };
    
	gantt.plugins({
		tooltip: true
	});
	gantt.attachEvent("onGanttReady", function(){
		var tooltips = gantt.ext.tooltips;
		tooltips.tooltip.setViewport(gantt.$task_data);
	});
    gantt.init("gantt_container");
    gantt.parse(GANTT_DATA_DHTMLX);

    // Hide the export to CSV button if there is no CSV data
    if (GANTT_DATA_CSV === null) {
        document.getElementById('exportToCSVButton').style.display = 'none';
    }

    document.getElementById('zoomFitButton').addEventListener('click', zoomFit);
    document.getElementById('zoomInButton').addEventListener('click', zoomIn);
    document.getElementById('zoomOutButton').addEventListener('click', zoomOut);
    document.getElementById('exportToCSVButton').addEventListener('click', downloadCSV);
</script>
