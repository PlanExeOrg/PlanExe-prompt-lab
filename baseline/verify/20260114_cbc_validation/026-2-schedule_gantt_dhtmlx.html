      "custom_tooltip": "<b>Create Risk Response Plan</b><br>Document all identified risks, their probability and impact, and the corresponding mitigation strategies in a comprehensive risk response plan. This plan will serve as a guide for managing risks throughout the project lifecycle.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Risk Management Specialist</li><li>Documentation Specialist</li></ul>",
      "start_date": "2026-03-07",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "3b636f7d-96f8-4889-8092-a0a8f4a79a92 FS",
      "parent": "e19829ed-3f87-4952-b417-1d39bf3a4bc4"
    },
    {
      "id": "98657968-7bcd-4098-b509-b0ecbf6f33ee",
      "text": "Establish Contingency Reserves",
      "custom_tooltip": "<b>Establish Contingency Reserves</b><br>Determine the appropriate level of contingency reserves (budget and schedule) to address potential cost overruns or schedule delays resulting from unforeseen risks. This involves analyzing the potential impact of high-priority risks and allocating sufficient resources to mitigate them.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Financial Analyst</li><li>Risk Management Specialist</li></ul>",
      "start_date": "2026-03-10",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "e19829ed-3f87-4952-b417-1d39bf3a4bc4 FF, 220a1d9f-93de-4e9c-b230-b7b68055efd9 FS",

    },

      "id": "d3e14716-f2fd-4b2d-b7f0-16854d41e640",
      "text": "Define Optical Engine Specifications",
      "custom_tooltip": "<b>Define Optical Engine Specifications</b><br>Establish detailed performance requirements for the optical engine, including power, wavelength, beam quality, and efficiency.  Document these specifications for vendor communication.<br><b>Resources needed:</b><br><ul><li>Optical Engineer</li><li>Project Manager</li></ul>",

      "duration": 12.0,

    {
      "id": "da31a8b7-70ee-458d-9e06-8c998e5b2067",
      "text": "Identify and Evaluate Potential Vendors",
      "custom_tooltip": "<b>Identify and Evaluate Potential Vendors</b><br>Research and identify potential vendors capable of supplying the required optical engine and mechanical mount. Evaluate vendors based on technical capabilities, experience, cost, and lead time.<br><b>Resources needed:</b><br><ul><li>Procurement Specialist</li><li>Optical Engineer</li><li>Mechanical Engineer</li></ul>",
      "start_date": "2026-03-25",
      "duration": 12.0,
      "progress": 0,

    },
    {
      "id": "6e39fd55-0d43-489e-8296-0e845ceeb2db",
      "text": "Prepare and Issue Request for Proposal (RFP)",
      "custom_tooltip": "<b>Prepare and Issue Request for Proposal (RFP)</b><br>Develop a comprehensive RFP outlining the project requirements, technical specifications, and evaluation criteria. Issue the RFP to selected vendors and manage the proposal submission process.<br><b>Resources needed:</b><br><ul><li>Procurement Specialist</li><li>Optical Engineer</li><li>Mechanical Engineer</li><li>Project Manager</li></ul>",
      "start_date": "2026-04-06",
      "duration": 12.0,
      "progress": 0,
      "open": true,
      "meta": "da31a8b7-70ee-458d-9e06-8c998e5b2067 FS",

    },
    {
      "id": "b43c228f-4de8-4850-90cb-98a09be28052",
      "text": "Evaluate Proposals and Select Vendor",
      "custom_tooltip": "<b>Evaluate Proposals and Select Vendor</b><br>Evaluate vendor proposals based on technical merit, cost, schedule, and compliance with requirements. Conduct vendor interviews and site visits as needed. Select the preferred vendor for the optical engine and mechanical mount.<br><b>Resources needed:</b><br><ul><li>Procurement Specialist</li><li>Optical Engineer</li><li>Mechanical Engineer</li><li>Project Manager</li></ul>",
      "start_date": "2026-04-18",
      "duration": 12.0,
      "progress": 0,
      "open": true,
      "meta": "6e39fd55-0d43-489e-8296-0e845ceeb2db FS",

    },
    {
      "id": "4bc7c7af-c265-4d66-acab-d98fc76ef72d",
      "text": "Negotiate and Award Contract",
      "custom_tooltip": "<b>Negotiate and Award Contract</b><br>Negotiate contract terms and conditions with the selected vendor, including pricing, delivery schedule, payment terms, and warranty. Award the contract and establish a formal agreement.<br><b>Resources needed:</b><br><ul><li>Procurement Specialist</li><li>Legal Counsel</li><li>Project Manager</li></ul>",
      "start_date": "2026-04-30",
      "duration": 12.0,
      "progress": 0,
      "open": true,

      "id": "79915ce0-9393-4cf3-bcf4-bd33bb7e8b10",

      "custom_tooltip": "<b>Procure Vibration and Thermal Testing Equipment</b>",

    {
      "id": "e9d78739-fcf7-48ca-9c8d-347844902d9a",
      "text": "Define Equipment Specifications",
      "custom_tooltip": "<b>Define Equipment Specifications</b><br>Determine the precise specifications for the vibration and thermal testing equipment, including frequency range, force limits, temperature range, and control accuracy. This will ensure the equipment meets the project&#x27;s validation requirements.<br><b>Resources needed:</b><br><ul><li>Thermal Engineer</li><li>Vibration Test Specialist</li><li>Metrology Specialist</li></ul>",

      "progress": 0,
      "open": true,

    },
    {
      "id": "6f793d05-e2cb-4185-9ffb-d342b9f25f2c",
      "text": "Identify Potential Equipment Suppliers",
      "custom_tooltip": "<b>Identify Potential Equipment Suppliers</b><br>Research and identify potential suppliers of vibration and thermal testing equipment. Evaluate suppliers based on their reputation, product quality, technical support, and pricing.<br><b>Resources needed:</b><br><ul><li>Procurement Specialist</li><li>Project Manager</li></ul>",
      "start_date": "2026-05-18",
      "duration": 6.0,
      "progress": 0,
      "open": true,
      "meta": "e9d78739-fcf7-48ca-9c8d-347844902d9a FS",
      "parent": "79915ce0-9393-4cf3-bcf4-bd33bb7e8b10"
    },
    {
      "id": "227e5254-c962-4bea-86ee-51fbcd80442c",
      "text": "Evaluate and Select Equipment",
      "custom_tooltip": "<b>Evaluate and Select Equipment</b><br>Evaluate the proposals from potential suppliers and select the equipment that best meets the project&#x27;s technical and budgetary requirements. Consider factors such as performance, reliability, maintainability, and cost.<br><b>Resources needed:</b><br><ul><li>Thermal Engineer</li><li>Vibration Test Specialist</li><li>Procurement Specialist</li><li>Project Manager</li></ul>",
      "start_date": "2026-05-24",
      "duration": 6.0,
      "progress": 0,
      "open": true,
      "meta": "6f793d05-e2cb-4185-9ffb-d342b9f25f2c FS",
      "parent": "79915ce0-9393-4cf3-bcf4-bd33bb7e8b10"
    },
    {
      "id": "c4f378a1-74e6-419f-889f-12cbfa6c6ce7",
      "text": "Negotiate Contracts and Place Orders",
      "custom_tooltip": "<b>Negotiate Contracts and Place Orders</b><br>Negotiate contracts with the selected suppliers and place orders for the vibration and thermal testing equipment. Ensure that the contracts include clear specifications, delivery schedules, and warranty terms.<br><b>Resources needed:</b><br><ul><li>Procurement Specialist</li><li>Legal Counsel</li><li>Project Manager</li></ul>",
      "start_date": "2026-05-30",
      "duration": 6.0,
      "progress": 0,
      "open": true,
      "meta": "227e5254-c962-4bea-86ee-51fbcd80442c FS",
      "parent": "79915ce0-9393-4cf3-bcf4-bd33bb7e8b10"
    },
    {
      "id": "c069030b-22d4-4fa4-a066-fd52b0a35e21",
      "text": "Coordinate Equipment Delivery and Installation",
      "custom_tooltip": "<b>Coordinate Equipment Delivery and Installation</b><br>Coordinate the delivery and installation of the vibration and thermal testing equipment. Ensure that the equipment is properly installed and calibrated before use.<br><b>Resources needed:</b><br><ul><li>Thermal Engineer</li><li>Vibration Test Specialist</li><li>Facilities Personnel</li><li>Project Manager</li></ul>",
      "start_date": "2026-06-05",
      "duration": 6.0,
      "progress": 0,
      "open": true,
      "meta": "79915ce0-9393-4cf3-bcf4-bd33bb7e8b10 FF, c4f378a1-74e6-419f-889f-12cbfa6c6ce7 FS",

    },
    {
      "id": "88f0aa35-3ea5-435a-af11-587018888a21",

      "custom_tooltip": "<b>Procure Metrology and Instrumentation Equipment</b>",

    },
    {
      "id": "a616b919-9f66-4637-9b7f-7d0001a78ee4",
      "text": "Define Metrology Equipment Requirements",
      "custom_tooltip": "<b>Define Metrology Equipment Requirements</b><br>Clearly define the specifications and performance requirements for all metrology and instrumentation equipment needed for the project. This includes accuracy, resolution, range, and environmental operating conditions.<br><b>Resources needed:</b><br><ul><li>Metrology Specialist</li><li>Lead Optical Engineer</li><li>Project Manager</li></ul>",

      "meta": "88f0aa35-3ea5-435a-af11-587018888a21 SS",

    },
    {
      "id": "7381d57e-15d1-4f26-9d90-373ff6a398f7",
      "text": "Identify Potential Equipment Suppliers",
      "custom_tooltip": "<b>Identify Potential Equipment Suppliers</b><br>Research and identify potential suppliers of metrology and instrumentation equipment that meet the defined requirements. Consider factors such as reputation, product quality, lead times, and cost.<br><b>Resources needed:</b><br><ul><li>Procurement Specialist</li><li>Metrology Specialist</li></ul>",

    {
      "id": "3398c424-68cc-449a-b433-925fffe7c685",
      "text": "Evaluate and Select Equipment",
      "custom_tooltip": "<b>Evaluate and Select Equipment</b><br>Evaluate the proposals from different suppliers based on technical specifications, cost, and delivery schedule. Select the equipment that best meets the project&#x27;s needs and budget.<br><b>Resources needed:</b><br><ul><li>Metrology Specialist</li><li>Lead Optical Engineer</li><li>Procurement Specialist</li><li>Project Manager</li></ul>",
      "start_date": "2026-06-19",
      "duration": 4.0,

      "parent": "88f0aa35-3ea5-435a-af11-587018888a21"
    },
    {
      "id": "3dd12dd9-cbda-46e2-b9c5-adf24dcff009",
      "text": "Negotiate Contracts and Place Orders",
      "custom_tooltip": "<b>Negotiate Contracts and Place Orders</b><br>Negotiate contracts with the selected suppliers, ensuring favorable terms and conditions. Place orders for the required metrology and instrumentation equipment.<br><b>Resources needed:</b><br><ul><li>Procurement Specialist</li><li>Legal Counsel</li><li>Project Manager</li></ul>",

      "meta": "3398c424-68cc-449a-b433-925fffe7c685 FS",

    },
    {
      "id": "f882d81a-3361-48dc-aa96-8b49d6404b60",
      "text": "Track Delivery and Inspect Equipment",
      "custom_tooltip": "<b>Track Delivery and Inspect Equipment</b><br>Monitor the delivery of the ordered equipment and conduct thorough inspections upon arrival to ensure that it meets the specified requirements and is free from damage.<br><b>Resources needed:</b><br><ul><li>Metrology Specialist</li><li>Procurement Specialist</li></ul>",
      "start_date": "2026-06-27",
      "duration": 4.0,
      "progress": 0,
      "open": true,

    },
    {
      "id": "0f04251a-73d9-4f95-944b-6d51fc5ea12a",
      "text": "Component Qualification Testing",
      "custom_tooltip": "<b>Component Qualification Testing</b>",
      "progress": 0,
      "open": true,
      "meta": "88f0aa35-3ea5-435a-af11-587018888a21 FS",
      "parent": "17c684f2-c7a9-4ca9-b3eb-9d5d704fe4a5",
      "type": "project"
    },
    {
      "id": "a0dd231e-7242-4620-b16d-ea596d00bed1",
      "text": "Plan Component Qualification Tests",
      "custom_tooltip": "<b>Plan Component Qualification Tests</b><br>Develop a detailed test plan outlining the specific tests to be performed on each component, including thermal cycling, vibration testing, and radiation exposure. Define acceptance criteria and data collection methods.<br><b>Resources needed:</b><br><ul><li>Reliability Engineer</li><li>Test Engineer</li><li>Component Specifications</li></ul>",
      "start_date": "2026-07-01",
      "duration": 6.0,
      "progress": 0,
      "open": true,
      "meta": "0f04251a-73d9-4f95-944b-6d51fc5ea12a SS",
      "parent": "0f04251a-73d9-4f95-944b-6d51fc5ea12a"
    },
    {
      "id": "de85adc9-a84b-4d05-9384-cec396fbb59e",
      "text": "Perform Thermal Cycling Tests",
      "custom_tooltip": "<b>Perform Thermal Cycling Tests</b><br>Subject components to repeated cycles of high and low temperatures to simulate the thermal stresses of space environment. Monitor component performance and record any failures or degradation.<br><b>Resources needed:</b><br><ul><li>Thermal Chamber</li><li>Test Engineer</li><li>Data Acquisition System</li></ul>",
      "start_date": "2026-07-07",
      "duration": 6.0,
      "progress": 0,
      "open": true,
      "meta": "a0dd231e-7242-4620-b16d-ea596d00bed1 FS",
      "parent": "0f04251a-73d9-4f95-944b-6d51fc5ea12a"
    },
    {
      "id": "83de25c3-29bb-4f85-a47a-d06d559f1673",
      "text": "Conduct Vibration Tests",
      "custom_tooltip": "<b>Conduct Vibration Tests</b><br>Expose components to vibration profiles simulating launch and operational conditions. Monitor component performance and record any failures or degradation.<br><b>Resources needed:</b><br><ul><li>Vibration Table</li><li>Test Engineer</li><li>Accelerometers</li></ul>",
      "start_date": "2026-07-13",
      "duration": 6.0,
      "progress": 0,
      "open": true,
      "meta": "de85adc9-a84b-4d05-9384-cec396fbb59e FS",
      "parent": "0f04251a-73d9-4f95-944b-6d51fc5ea12a"
    },
    {
      "id": "e873b04f-220b-41e5-9f96-410abdadb671",
      "text": "Analyze Component Test Data",
      "custom_tooltip": "<b>Analyze Component Test Data</b><br>Analyze the data collected during thermal cycling and vibration testing to determine component failure rates, performance degradation, and compliance with acceptance criteria. Prepare a test report summarizing the results.<br><b>Resources needed:</b><br><ul><li>Reliability Engineer</li><li>Data Analysis Software</li><li>Test Data</li></ul>",
      "start_date": "2026-07-19",
      "duration": 6.0,
      "progress": 0,
      "open": true,
      "meta": "83de25c3-29bb-4f85-a47a-d06d559f1673 FS",
      "parent": "0f04251a-73d9-4f95-944b-6d51fc5ea12a"
    },
    {
      "id": "00010cba-81f9-4e6f-98ef-c70a550c13db",
      "text": "Radiation Exposure Testing",
      "custom_tooltip": "<b>Radiation Exposure Testing</b><br>Expose components to radiation levels expected in the space environment. Monitor component performance and record any failures or degradation due to radiation effects.<br><b>Resources needed:</b><br><ul><li>Radiation Source</li><li>Radiation Specialist</li><li>Dosimeters</li></ul>",
      "start_date": "2026-07-25",
      "duration": 6.0,
      "progress": 0,
      "open": true,
      "meta": "0f04251a-73d9-4f95-944b-6d51fc5ea12a FF, e873b04f-220b-41e5-9f96-410abdadb671 FS",
      "parent": "0f04251a-73d9-4f95-944b-6d51fc5ea12a"
    },
    {
      "id": "cdcc307d-5015-402d-b885-84f966db58c5",
      "text": "Bakeout and Contamination Certification",
      "custom_tooltip": "<b>Bakeout and Contamination Certification</b>",
      "progress": 0,
      "open": true,
      "meta": "17c684f2-c7a9-4ca9-b3eb-9d5d704fe4a5 FF, 0f04251a-73d9-4f95-944b-6d51fc5ea12a FS",
      "parent": "17c684f2-c7a9-4ca9-b3eb-9d5d704fe4a5",
      "type": "project"
    },
    {
      "id": "c15c78cd-b5a6-44ef-98c5-0b4d21933d11",
      "text": "Prepare for bakeout and contamination certification",
      "custom_tooltip": "<b>Prepare for bakeout and contamination certification</b><br>Objective: Prepare the system and vacuum chamber for bakeout and contamination certification.\nScope: Includes cleaning, inspection, and preparation of documentation.\nSteps: Clean all components, inspect for contamination, prepare documentation for certification.\nDeliverables: Clean system, completed documentation.<br><b>Resources needed:</b><br><ul><li>Cleanroom personnel</li><li>Vacuum chamber technician</li><li>Quality assurance specialist</li></ul>",
      "start_date": "2026-07-31",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "cdcc307d-5015-402d-b885-84f966db58c5 SS",
      "parent": "cdcc307d-5015-402d-b885-84f966db58c5"
    },
    {
      "id": "bf00245d-0540-44b7-847f-f120ea261361",
      "text": "Perform bakeout of the optical system",
      "custom_tooltip": "<b>Perform bakeout of the optical system</b><br>Objective: Remove volatile contaminants from the optical system.\nScope: Includes setting up the vacuum chamber, monitoring temperature and pressure, and ensuring proper ventilation.\nSteps: Set up vacuum chamber, heat system to bakeout temperature, monitor pressure, cool down system.\nDeliverables: Baked-out optical system.<br><b>Resources needed:</b><br><ul><li>Vacuum chamber technician</li><li>Thermal engineer</li><li>Optical engineer</li></ul>",
      "start_date": "2026-08-04",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "c15c78cd-b5a6-44ef-98c5-0b4d21933d11 FS",
      "parent": "cdcc307d-5015-402d-b885-84f966db58c5"
    },
    {
      "id": "c3f25f8f-b343-4900-ac40-9390057493f1",
      "text": "Conduct contamination monitoring during bakeout",
      "custom_tooltip": "<b>Conduct contamination monitoring during bakeout</b><br>Objective: Monitor contamination levels during the bakeout process.\nScope: Includes using residual gas analyzers (RGA) and other monitoring equipment to track contaminant levels.\nSteps: Install RGA, monitor contaminant levels, analyze data.\nDeliverables: Contamination monitoring data.<br><b>Resources needed:</b><br><ul><li>Contamination control specialist</li><li>Vacuum chamber technician</li><li>Data analyst</li></ul>",
      "start_date": "2026-08-08",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "bf00245d-0540-44b7-847f-f120ea261361 FS",
      "parent": "cdcc307d-5015-402d-b885-84f966db58c5"
    },
    {
      "id": "a12cd151-217b-4b66-b53d-203d82f249fc",
      "text": "Obtain contamination certification",
      "custom_tooltip": "<b>Obtain contamination certification</b><br>Objective: Obtain certification that the system meets contamination requirements.\nScope: Includes submitting documentation, undergoing inspection, and receiving certification.\nSteps: Submit documentation, undergo inspection, receive certification.\nDeliverables: Contamination certification document.<br><b>Resources needed:</b><br><ul><li>Quality assurance specialist</li><li>Project manager</li></ul>",
      "start_date": "2026-08-12",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "cdcc307d-5015-402d-b885-84f966db58c5 FF, c3f25f8f-b343-4900-ac40-9390057493f1 FS",
      "parent": "cdcc307d-5015-402d-b885-84f966db58c5"
    },

      "id": "4ebaf94c-841d-4615-ad21-a1c40f791976",
      "text": "System Integration and Setup",
      "custom_tooltip": "<b>System Integration and Setup</b>",
      "progress": 0,
      "open": true,
      "meta": "17c684f2-c7a9-4ca9-b3eb-9d5d704fe4a5 FS",
      "parent": "a76e5dca-69db-48ef-9f02-0b22301fe8b4",
      "type": "project"
    },
    {
      "id": "461036fc-330a-4d62-8110-ef8ba86c1b4e",
      "text": "Integrate Optical Engine with Mechanical Mount",
      "custom_tooltip": "<b>Integrate Optical Engine with Mechanical Mount</b>",
      "progress": 0,
      "open": true,
      "meta": "4ebaf94c-841d-4615-ad21-a1c40f791976 SS",

      "type": "project"

    {
      "id": "daee4314-ac06-4a13-b1d4-1388eef38a38",
      "text": "Align optical engine to mechanical mount",
      "custom_tooltip": "<b>Align optical engine to mechanical mount</b><br>Precisely align the optical engine with the mechanical mount to ensure optimal beam propagation and stability. This involves using precision alignment tools and techniques to minimize misalignment errors.<br><b>Resources needed:</b><br><ul><li>Optical Engineer</li><li>Mechanical Engineer</li><li>Alignment tools</li><li>Cleanroom environment</li></ul>",
      "start_date": "2026-08-16",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "461036fc-330a-4d62-8110-ef8ba86c1b4e SS",
      "parent": "461036fc-330a-4d62-8110-ef8ba86c1b4e"
    },
    {
      "id": "0d45452d-0b39-4edd-a399-1a4f0fdc431a",
      "text": "Secure optical engine to mechanical mount",
      "custom_tooltip": "<b>Secure optical engine to mechanical mount</b><br>Securely fasten the optical engine to the mechanical mount to prevent movement or vibration during testing. This involves using appropriate fasteners and torque specifications to ensure a robust and stable connection.<br><b>Resources needed:</b><br><ul><li>Mechanical Engineer</li><li>Technician</li><li>Fasteners</li><li>Torque wrench</li></ul>",
      "start_date": "2026-08-18",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "daee4314-ac06-4a13-b1d4-1388eef38a38 FS",
      "parent": "461036fc-330a-4d62-8110-ef8ba86c1b4e"
    },
    {
      "id": "d50d8feb-2222-497e-9d92-2bebfe372613",
      "text": "Verify interface compatibility",
      "custom_tooltip": "<b>Verify interface compatibility</b><br>Verify the compatibility of the optical engine and mechanical mount interfaces to ensure proper integration and functionality. This involves checking for mechanical fit, electrical connectivity, and communication protocols.<br><b>Resources needed:</b><br><ul><li>Optical Engineer</li><li>Electrical Engineer</li><li>Mechanical Engineer</li><li>Interface specifications</li><li>Testing equipment</li></ul>",
      "start_date": "2026-08-20",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "0d45452d-0b39-4edd-a399-1a4f0fdc431a FS",
      "parent": "461036fc-330a-4d62-8110-ef8ba86c1b4e"
    },
    {
      "id": "2e447a3f-51f6-4d8f-ba4a-fafb35e89a93",
      "text": "Perform initial optical performance check",
      "custom_tooltip": "<b>Perform initial optical performance check</b><br>Conduct an initial optical performance check after integration to verify basic functionality and alignment. This involves measuring beam quality, power output, and pointing stability to ensure that the system is operating as expected.<br><b>Resources needed:</b><br><ul><li>Optical Engineer</li><li>Metrology Specialist</li><li>Optical power meter</li><li>Beam profiler</li><li>Optical spectrum analyzer</li></ul>",
      "start_date": "2026-08-22",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "461036fc-330a-4d62-8110-ef8ba86c1b4e FF, d50d8feb-2222-497e-9d92-2bebfe372613 FS",
      "parent": "461036fc-330a-4d62-8110-ef8ba86c1b4e"
    },

      "id": "8b56b035-9436-4d6d-9ed3-d43758b4d85f",
      "text": "Set Up Vibration and Thermal Testing Environment",
      "custom_tooltip": "<b>Set Up Vibration and Thermal Testing Environment</b>",

      "open": true,
      "meta": "461036fc-330a-4d62-8110-ef8ba86c1b4e FS",

      "type": "project"
    },
    {
      "id": "e123f61d-8516-447d-b180-dc5ad87665da",
      "text": "Define Vibration and Thermal Test Requirements",
      "custom_tooltip": "<b>Define Vibration and Thermal Test Requirements</b><br>Establish specific requirements for vibration and thermal testing, including frequency ranges, temperature profiles, and acceptable tolerances. This involves reviewing project specifications, consulting with engineering teams, and defining test parameters.<br><b>Resources needed:</b><br><ul><li>Vibration Test Engineer</li><li>Thermal Engineer</li><li>Project Manager</li></ul>",
      "start_date": "2026-08-24",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "8b56b035-9436-4d6d-9ed3-d43758b4d85f SS",
      "parent": "8b56b035-9436-4d6d-9ed3-d43758b4d85f"
    },
    {
      "id": "1087b7b4-a0e6-4062-ba6a-10d48b50a6bc",
      "text": "Select Vibration and Thermal Testing Equipment",
      "custom_tooltip": "<b>Select Vibration and Thermal Testing Equipment</b><br>Identify and select appropriate vibration and thermal testing equipment based on the defined requirements. This includes researching available equipment, evaluating performance specifications, and considering factors such as cost, availability, and compatibility.<br><b>Resources needed:</b><br><ul><li>Vibration Test Engineer</li><li>Thermal Engineer</li><li>Procurement Specialist</li></ul>",
      "start_date": "2026-08-27",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "e123f61d-8516-447d-b180-dc5ad87665da FS",
      "parent": "8b56b035-9436-4d6d-9ed3-d43758b4d85f"
    },
    {
      "id": "afeff4de-93a6-491b-9cea-cca10024f936",
      "text": "Prepare Test Site and Safety Protocols",
      "custom_tooltip": "<b>Prepare Test Site and Safety Protocols</b><br>Prepare the test site for vibration and thermal testing, ensuring that all safety protocols are in place. This includes setting up the testing equipment, implementing safety measures, and conducting safety training for personnel.<br><b>Resources needed:</b><br><ul><li>Vibration Test Engineer</li><li>Thermal Engineer</li><li>Safety Officer</li><li>Technicians</li></ul>",
      "start_date": "2026-08-30",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "1087b7b4-a0e6-4062-ba6a-10d48b50a6bc FS",
      "parent": "8b56b035-9436-4d6d-9ed3-d43758b4d85f"
    },
    {
      "id": "a8f9df34-d475-4a55-949c-54ed66122782",
      "text": "Calibrate Vibration and Thermal Equipment",
      "custom_tooltip": "<b>Calibrate Vibration and Thermal Equipment</b><br>Calibrate the selected vibration and thermal testing equipment to ensure accurate and reliable measurements. This involves using calibration standards, following calibration procedures, and documenting the calibration results.<br><b>Resources needed:</b><br><ul><li>Metrology Specialist</li><li>Vibration Test Engineer</li><li>Thermal Engineer</li></ul>",
      "start_date": "2026-09-02",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "8b56b035-9436-4d6d-9ed3-d43758b4d85f FF, afeff4de-93a6-491b-9cea-cca10024f936 FS",

    {
      "id": "65b7e46e-0457-476b-8d1d-1cc7501333f9",
      "text": "Plan Metrology System Installation",
      "custom_tooltip": "<b>Plan Metrology System Installation</b><br>Define the installation process, identify potential challenges, and create a detailed plan for installing the metrology and instrumentation systems.<br><b>Resources needed:</b><br><ul><li>Metrology Specialist</li><li>Instrumentation Engineer</li><li>System Integration Engineer</li></ul>",

      "meta": "ee3bef73-f12b-425e-88da-91aa502807cc SS",

    },
    {
      "id": "c2d4b987-0d37-41b3-a229-d4e28e483675",
      "text": "Prepare Installation Site",
      "custom_tooltip": "<b>Prepare Installation Site</b><br>Ensure the installation site meets the requirements for the metrology and instrumentation systems, including power, network connectivity, and environmental controls.<br><b>Resources needed:</b><br><ul><li>Technician</li><li>Facilities Engineer</li><li>Instrumentation Engineer</li></ul>",
      "start_date": "2026-09-06",

      "progress": 0,

    },
    {
      "id": "4c602167-630b-4c98-b585-6d236c189e68",
      "text": "Install Hardware Components",
      "custom_tooltip": "<b>Install Hardware Components</b><br>Physically install the metrology and instrumentation hardware components, including sensors, controllers, and data acquisition systems.<br><b>Resources needed:</b><br><ul><li>Technician</li><li>Instrumentation Engineer</li><li>Metrology Specialist</li></ul>",
      "start_date": "2026-09-07",
      "duration": 1.0,
      "progress": 0,
      "open": true,
      "meta": "c2d4b987-0d37-41b3-a229-d4e28e483675 FS",
      "parent": "ee3bef73-f12b-425e-88da-91aa502807cc"
    },
    {
      "id": "a8b92a74-e56c-43ec-9e94-3c961c7bb540",
      "text": "Integrate Software and Data Acquisition",
      "custom_tooltip": "<b>Integrate Software and Data Acquisition</b><br>Install and configure the software required for the metrology and instrumentation systems, and integrate it with the data acquisition system.<br><b>Resources needed:</b><br><ul><li>Software Engineer</li><li>Instrumentation Engineer</li><li>Data Acquisition Specialist</li></ul>",
      "start_date": "2026-09-08",
      "duration": 1.0,
      "progress": 0,
      "open": true,
      "meta": "4c602167-630b-4c98-b585-6d236c189e68 FS",
      "parent": "ee3bef73-f12b-425e-88da-91aa502807cc"
    },
    {
      "id": "e61f5d10-f863-451e-9185-daef96181088",
      "text": "Test and Verify Installation",
      "custom_tooltip": "<b>Test and Verify Installation</b><br>Test and verify the installation of the metrology and instrumentation systems to ensure they are functioning correctly and meeting performance requirements.<br><b>Resources needed:</b><br><ul><li>Metrology Specialist</li><li>Instrumentation Engineer</li><li>System Integration Engineer</li></ul>",
      "start_date": "2026-09-09",
      "duration": 1.0,
      "progress": 0,
      "open": true,

    {
      "id": "542df90d-1b25-4654-8a5c-3b10e62c9f37",
      "text": "Calibrate Metrology Equipment",
      "custom_tooltip": "<b>Calibrate Metrology Equipment</b>",
      "progress": 0,
      "open": true,
      "meta": "ee3bef73-f12b-425e-88da-91aa502807cc FS",

    {
      "id": "74bc83d4-ebf2-4518-9db5-4cca77331090",
      "text": "Define Calibration Requirements",
      "custom_tooltip": "<b>Define Calibration Requirements</b><br>Establish specific calibration requirements for each piece of metrology equipment based on its intended use and accuracy requirements. This includes identifying calibration standards, frequency of calibration, and acceptable tolerances.<br><b>Resources needed:</b><br><ul><li>Metrology Specialist</li><li>Instrumentation Engineer</li></ul>",
      "start_date": "2026-09-10",
      "duration": 1.0,
      "progress": 0,
      "open": true,
      "meta": "542df90d-1b25-4654-8a5c-3b10e62c9f37 SS",
      "parent": "542df90d-1b25-4654-8a5c-3b10e62c9f37"
    },
    {
      "id": "4b9ebedd-78d2-4e3b-a0ce-1150ef62802e",
      "text": "Schedule Calibration Services",
      "custom_tooltip": "<b>Schedule Calibration Services</b><br>Coordinate with internal or external calibration labs to schedule calibration services for all metrology equipment. This includes reserving time slots, arranging for equipment transportation, and ensuring that calibration certificates are provided.<br><b>Resources needed:</b><br><ul><li>Procurement Specialist</li><li>Project Manager</li></ul>",
      "start_date": "2026-09-11",
      "duration": 1.0,
      "progress": 0,
      "open": true,
      "meta": "74bc83d4-ebf2-4518-9db5-4cca77331090 FS",
      "parent": "542df90d-1b25-4654-8a5c-3b10e62c9f37"
    },
    {
      "id": "751309c3-a0fd-439d-9d8e-39c084d84662",
      "text": "Perform Initial Calibration Checks",
      "custom_tooltip": "<b>Perform Initial Calibration Checks</b><br>Conduct initial calibration checks on all metrology equipment upon receipt from the supplier or after maintenance. This involves comparing measurements against known standards and verifying that the equipment meets the specified accuracy requirements.<br><b>Resources needed:</b><br><ul><li>Metrology Specialist</li><li>Instrumentation Engineer</li></ul>",
      "start_date": "2026-09-12",
      "duration": 1.0,
      "progress": 0,
      "open": true,
      "meta": "4b9ebedd-78d2-4e3b-a0ce-1150ef62802e FS",
      "parent": "542df90d-1b25-4654-8a5c-3b10e62c9f37"
    },
    {
      "id": "d34ffe97-e34a-473e-8ca9-b98aefa5d599",
      "text": "Document Calibration Procedures",
      "custom_tooltip": "<b>Document Calibration Procedures</b><br>Create detailed documentation of all calibration procedures, including the steps involved, the equipment used, the calibration standards, and the acceptance criteria. This documentation will serve as a reference for future calibration activities and audits.<br><b>Resources needed:</b><br><ul><li>Metrology Specialist</li><li>Technical Writer</li></ul>",
      "start_date": "2026-09-13",
      "duration": 1.0,
      "progress": 0,
      "open": true,
      "meta": "751309c3-a0fd-439d-9d8e-39c084d84662 FS",
      "parent": "542df90d-1b25-4654-8a5c-3b10e62c9f37"
    },
    {
      "id": "feb5dd3f-f022-4d14-a35e-0daef6443b4a",
      "text": "Maintain Calibration Records",
      "custom_tooltip": "<b>Maintain Calibration Records</b><br>Establish a system for maintaining accurate and up-to-date calibration records for all metrology equipment. This includes tracking calibration dates, calibration certificates, and any maintenance or repairs performed on the equipment.<br><b>Resources needed:</b><br><ul><li>Data Management Specialist</li><li>Project Manager</li></ul>",
      "start_date": "2026-09-14",
      "duration": 1.0,
      "progress": 0,
      "open": true,
      "meta": "542df90d-1b25-4654-8a5c-3b10e62c9f37 FF, d34ffe97-e34a-473e-8ca9-b98aefa5d599 FS",
      "parent": "542df90d-1b25-4654-8a5c-3b10e62c9f37"
    },
    {
      "id": "a54c96d0-bf44-4029-b91f-7654c3a3b660",
      "text": "Implement Laser Safety Interlock System",
      "custom_tooltip": "<b>Implement Laser Safety Interlock System</b>",
      "progress": 0,
      "open": true,
      "meta": "4ebaf94c-841d-4615-ad21-a1c40f791976 FF, 542df90d-1b25-4654-8a5c-3b10e62c9f37 FS",
      "parent": "4ebaf94c-841d-4615-ad21-a1c40f791976",

    },
    {
      "id": "1b1d385f-556f-4ebe-a6b2-58ee5d9bf3af",
      "text": "Design Laser Safety Interlock System",
      "custom_tooltip": "<b>Design Laser Safety Interlock System</b><br>Develop a detailed design for the laser safety interlock system, including sensor placement, wiring diagrams, and control logic. This design must meet all applicable safety standards and regulations.<br><b>Resources needed:</b><br><ul><li>Laser Safety Officer</li><li>Electrical Engineer</li><li>Control Systems Engineer</li></ul>",
      "start_date": "2026-09-15",
      "duration": 1.0,
      "progress": 0,
      "open": true,
      "meta": "a54c96d0-bf44-4029-b91f-7654c3a3b660 SS",
      "parent": "a54c96d0-bf44-4029-b91f-7654c3a3b660"
    },
    {
      "id": "531fffba-cb7f-4087-a93e-87dd798d5e00",
      "text": "Procure Interlock System Components",
      "custom_tooltip": "<b>Procure Interlock System Components</b><br>Purchase all necessary components for the laser safety interlock system, including sensors, relays, wiring, and control panels. Ensure that all components meet the required specifications and safety standards.<br><b>Resources needed:</b><br><ul><li>Procurement Specialist</li><li>Electrical Engineer</li></ul>",
      "start_date": "2026-09-16",
      "duration": 1.0,
      "progress": 0,
      "open": true,
      "meta": "1b1d385f-556f-4ebe-a6b2-58ee5d9bf3af FS",
      "parent": "a54c96d0-bf44-4029-b91f-7654c3a3b660"
    },
    {
      "id": "96b9eb7e-b547-444d-922c-60a69185f1f0",
      "text": "Install and Wire Interlock System",
      "custom_tooltip": "<b>Install and Wire Interlock System</b><br>Install and wire all components of the laser safety interlock system according to the design specifications. Ensure that all connections are secure and properly grounded.<br><b>Resources needed:</b><br><ul><li>Electrical Engineer</li><li>Technician</li></ul>",
      "start_date": "2026-09-17",
      "duration": 1.0,
      "progress": 0,
      "open": true,
      "meta": "531fffba-cb7f-4087-a93e-87dd798d5e00 FS",
      "parent": "a54c96d0-bf44-4029-b91f-7654c3a3b660"
    },
    {
      "id": "fe9bc3a5-9206-4e19-b539-1282d399e37b",
      "text": "Test and Validate Interlock System",
      "custom_tooltip": "<b>Test and Validate Interlock System</b><br>Thoroughly test and validate the laser safety interlock system to ensure that it functions correctly and meets all safety requirements. Document all test results and obtain approval from the Laser Safety Officer.<br><b>Resources needed:</b><br><ul><li>Laser Safety Officer</li><li>Electrical Engineer</li><li>Technician</li></ul>",
      "start_date": "2026-09-18",
      "duration": 1.0,
      "progress": 0,
      "open": true,
      "meta": "96b9eb7e-b547-444d-922c-60a69185f1f0 FS",
      "parent": "a54c96d0-bf44-4029-b91f-7654c3a3b660"
    },
    {
      "id": "f38ce26e-4e3d-41e7-9d2e-a306b67ec9cf",
      "text": "Document Interlock System Procedures",
      "custom_tooltip": "<b>Document Interlock System Procedures</b><br>Create detailed documentation for the laser safety interlock system, including operating procedures, maintenance schedules, and troubleshooting guides. Ensure that all personnel are properly trained on the system&#x27;s operation and safety protocols.<br><b>Resources needed:</b><br><ul><li>Laser Safety Officer</li><li>Technical Writer</li></ul>",
      "start_date": "2026-09-19",
      "duration": 1.0,
      "progress": 0,
      "open": true,
      "meta": "a54c96d0-bf44-4029-b91f-7654c3a3b660 FF, fe9bc3a5-9206-4e19-b539-1282d399e37b FS",
      "parent": "a54c96d0-bf44-4029-b91f-7654c3a3b660"
    },

      "id": "07665461-cd2c-494c-ab86-789a20b20dff",
      "text": "Performance Target Validation",
      "custom_tooltip": "<b>Performance Target Validation</b>",
      "progress": 0,
      "open": true,
      "meta": "4ebaf94c-841d-4615-ad21-a1c40f791976 FS",
      "parent": "a76e5dca-69db-48ef-9f02-0b22301fe8b4",

    {
      "id": "9786ee78-4a5f-440b-8ee9-fa3692548798",
      "text": "Conduct Baseline Performance Measurements",
      "custom_tooltip": "<b>Conduct Baseline Performance Measurements</b>",
      "progress": 0,
      "open": true,
      "meta": "07665461-cd2c-494c-ab86-789a20b20dff SS",
      "parent": "07665461-cd2c-494c-ab86-789a20b20dff",
      "type": "project"
    },
    {
      "id": "1971634b-a9e9-4481-891f-9ca38f65e06c",
      "text": "Prepare metrology equipment for baseline tests",
      "custom_tooltip": "<b>Prepare metrology equipment for baseline tests</b><br>Objective: Ensure all metrology equipment is calibrated and ready for accurate baseline performance measurements.\nScope: Includes laser interferometers, power meters, and any other relevant instruments.\nSteps: Power on equipment, perform calibration checks, verify alignment, and record calibration data.\nDeliverables: Calibrated metrology equipment and documented calibration data.<br><b>Resources needed:</b><br><ul><li>Metrology Specialist</li><li>Instrumentation Technician</li></ul>",
      "start_date": "2026-09-20",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "9786ee78-4a5f-440b-8ee9-fa3692548798 SS",
      "parent": "9786ee78-4a5f-440b-8ee9-fa3692548798"
    },
    {
      "id": "3414dc04-be10-493e-bf40-4b41deba8e13",
      "text": "Establish stable environmental conditions",
      "custom_tooltip": "<b>Establish stable environmental conditions</b><br>Objective: Create a stable and controlled environment to minimize external influences on baseline measurements.\nScope: Includes temperature, humidity, and vibration control within the testing chamber.\nSteps: Activate temperature control system, monitor humidity levels, engage vibration isolation system, and record environmental data.\nDeliverables: Stable environmental conditions and documented environmental data.<br><b>Resources needed:</b><br><ul><li>Thermal Engineer</li><li>Vibration Test Specialist</li></ul>",
      "start_date": "2026-09-22",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "1971634b-a9e9-4481-891f-9ca38f65e06c FS",
      "parent": "9786ee78-4a5f-440b-8ee9-fa3692548798"
    },
    {
      "id": "7ac9f329-9860-4955-8336-6df424872ab6",
      "text": "Acquire initial system alignment data",
      "custom_tooltip": "<b>Acquire initial system alignment data</b><br>Objective: Record the initial alignment state of the optical system before any thermal or vibration loading.\nScope: Includes beam alignment, phasing, and wavefront error measurements.\nSteps: Perform initial alignment using alignment lasers, measure phasing accuracy, measure wavefront error, and record all alignment data.\nDeliverables: Initial system alignment data and documented alignment procedures.<br><b>Resources needed:</b><br><ul><li>Lead Optical Engineer</li><li>Metrology Specialist</li></ul>",
      "start_date": "2026-09-24",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "3414dc04-be10-493e-bf40-4b41deba8e13 FS",
      "parent": "9786ee78-4a5f-440b-8ee9-fa3692548798"
    },
    {
      "id": "34c3e552-d0f7-48df-bb35-56c81cf94c40",
      "text": "Document baseline measurement procedures",
      "custom_tooltip": "<b>Document baseline measurement procedures</b><br>Objective: Create a detailed record of the procedures used to obtain baseline performance measurements.\nScope: Includes step-by-step instructions, equipment settings, and data acquisition parameters.\nSteps: Write detailed procedures, review procedures with team members, and finalize the documentation.\nDeliverables: Documented baseline measurement procedures.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Lead Optical Engineer</li></ul>",
      "start_date": "2026-09-26",
      "duration": 2.0,
      "progress": 0,

      "meta": "9786ee78-4a5f-440b-8ee9-fa3692548798 FF, 7ac9f329-9860-4955-8336-6df424872ab6 FS",

      "id": "404f9072-6764-4b31-95a3-1eb2bf14e7cb",
      "text": "Perform Thermal Loading Tests",
      "custom_tooltip": "<b>Perform Thermal Loading Tests</b>",

    {
      "id": "efb990b2-9428-4cb5-93a2-df9ea95afeee",
      "text": "Design Thermal Loading Test Setup",
      "custom_tooltip": "<b>Design Thermal Loading Test Setup</b><br>Design the setup for applying controlled thermal loads to the system, including the heat injection system, heat rejection interface, and temperature sensors. Define the range of thermal loads to be applied and the duration of each test. Deliverables: Detailed design drawings and specifications for the thermal loading test setup.<br><b>Resources needed:</b><br><ul><li>Thermal Engineer</li><li>Mechanical Engineer</li><li>CAD Designer</li></ul>",
      "start_date": "2026-09-28",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "404f9072-6764-4b31-95a3-1eb2bf14e7cb SS",
      "parent": "404f9072-6764-4b31-95a3-1eb2bf14e7cb"
    },
    {
      "id": "c35e94ba-4774-43da-995a-07e096de64bb",
      "text": "Implement Thermal Control System",
      "custom_tooltip": "<b>Implement Thermal Control System</b><br>Implement a closed-loop thermal control system to maintain precise temperature gradients and prevent thermal runaway. This includes selecting and integrating temperature controllers, sensors, and actuators. Deliverables: Functional thermal control system with documented performance characteristics.<br><b>Resources needed:</b><br><ul><li>Control Systems Engineer</li><li>Thermal Engineer</li><li>Instrumentation Specialist</li></ul>",
      "start_date": "2026-10-01",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "efb990b2-9428-4cb5-93a2-df9ea95afeee FS",
      "parent": "404f9072-6764-4b31-95a3-1eb2bf14e7cb"
    },
    {
      "id": "5a949cf8-bb60-4d65-a67e-b2c78ae2ec46",
      "text": "Calibrate Temperature Sensors",
      "custom_tooltip": "<b>Calibrate Temperature Sensors</b><br>Calibrate all temperature sensors used in the thermal loading tests to ensure accurate temperature measurements. This includes performing a multi-point calibration and documenting the calibration results. Deliverables: Calibrated temperature sensors with documented calibration curves.<br><b>Resources needed:</b><br><ul><li>Metrology Specialist</li><li>Instrumentation Specialist</li></ul>",
      "start_date": "2026-10-04",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "c35e94ba-4774-43da-995a-07e096de64bb FS",
      "parent": "404f9072-6764-4b31-95a3-1eb2bf14e7cb"
    },
    {
      "id": "d625f146-6625-467c-b4d4-a818cd7dce88",
      "text": "Execute Thermal Loading Tests",
      "custom_tooltip": "<b>Execute Thermal Loading Tests</b><br>Execute the thermal loading tests according to the test plan, applying the specified thermal loads and monitoring the system&#x27;s performance. This includes recording temperature data, Strehl ratio, and wall-plug efficiency. Deliverables: Raw data from the thermal loading tests.<br><b>Resources needed:</b><br><ul><li>Thermal Engineer</li><li>Optical Engineer</li><li>Test Technician</li></ul>",
      "start_date": "2026-10-07",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "5a949cf8-bb60-4d65-a67e-b2c78ae2ec46 FS",
      "parent": "404f9072-6764-4b31-95a3-1eb2bf14e7cb"
    },
    {
      "id": "bc88ccd3-c7c0-4f94-994f-7d709ab4628c",
      "text": "Analyze Thermal Test Data",
      "custom_tooltip": "<b>Analyze Thermal Test Data</b><br>Analyze the data from the thermal loading tests to determine the system&#x27;s performance under various thermal conditions. This includes calculating Strehl ratio, wall-plug efficiency, and thermal gradients. Deliverables: Report summarizing the results of the thermal loading tests.<br><b>Resources needed:</b><br><ul><li>Data Analyst</li><li>Thermal Engineer</li><li>Optical Engineer</li></ul>",
      "start_date": "2026-10-10",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "404f9072-6764-4b31-95a3-1eb2bf14e7cb FF, d625f146-6625-467c-b4d4-a818cd7dce88 FS",
      "parent": "404f9072-6764-4b31-95a3-1eb2bf14e7cb"
    },
    {
      "id": "3aca0181-c780-4549-802b-f153d26045c9",
      "text": "Perform Vibration Loading Tests",
      "custom_tooltip": "<b>Perform Vibration Loading Tests</b>",
      "progress": 0,
      "open": true,
      "meta": "404f9072-6764-4b31-95a3-1eb2bf14e7cb FS",

    {
      "id": "34226a23-e82c-4d8b-9d0f-d295ad77799b",
      "text": "Prepare Vibration Test Setup",
      "custom_tooltip": "<b>Prepare Vibration Test Setup</b><br>Objective: Configure the vibration testing equipment for accurate and controlled vibration loading.\nScope: Includes mounting the system, connecting sensors, and verifying equipment calibration.\nSteps: 1. Mount the system on the shaker table. 2. Connect accelerometers and other sensors. 3. Calibrate the vibration shaker. 4. Verify sensor connections and data acquisition system.\nDeliverables: A fully configured and calibrated vibration test setup.<br><b>Resources needed:</b><br><ul><li>Vibration Test Specialist</li><li>Mechanical Engineer</li><li>Instrumentation Technician</li></ul>",
      "start_date": "2026-10-13",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "3aca0181-c780-4549-802b-f153d26045c9 SS",
      "parent": "3aca0181-c780-4549-802b-f153d26045c9"
    },
    {
      "id": "6c6dd273-3f79-4fe9-9f34-43bd57e49961",
      "text": "Define Vibration Loading Parameters",
      "custom_tooltip": "<b>Define Vibration Loading Parameters</b><br>Objective: Determine the appropriate vibration levels and frequencies to simulate the space environment.\nScope: Includes analyzing launch and operational vibration data and defining test profiles.\nSteps: 1. Review launch and operational vibration data. 2. Define vibration test profiles (frequency, amplitude, duration). 3. Obtain approval from the project manager.\nDeliverables: Approved vibration test profiles.<br><b>Resources needed:</b><br><ul><li>Vibration Test Specialist</li><li>Thermal/Structural Analysis Engineer</li></ul>",
      "start_date": "2026-10-16",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "34226a23-e82c-4d8b-9d0f-d295ad77799b FS",
      "parent": "3aca0181-c780-4549-802b-f153d26045c9"
    },
    {
      "id": "2e515120-31bd-41f2-a69a-1dd5e2351a01",
      "text": "Execute Vibration Loading Tests",
      "custom_tooltip": "<b>Execute Vibration Loading Tests</b><br>Objective: Subject the system to the defined vibration loading profiles.\nScope: Includes running the vibration shaker and monitoring system performance.\nSteps: 1. Run the vibration shaker according to the test profiles. 2. Monitor system alignment, phasing, and Strehl ratio. 3. Record accelerometer data.\nDeliverables: Vibration test data.<br><b>Resources needed:</b><br><ul><li>Vibration Test Specialist</li><li>Metrology and Instrumentation Specialist</li></ul>",
      "start_date": "2026-10-19",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "6c6dd273-3f79-4fe9-9f34-43bd57e49961 FS",
      "parent": "3aca0181-c780-4549-802b-f153d26045c9"
    },
    {
      "id": "413a26e8-2f65-4bc7-ac65-919d5367c2f7",
      "text": "Analyze Vibration Test Data",
      "custom_tooltip": "<b>Analyze Vibration Test Data</b><br>Objective: Analyze the vibration test data to assess the system&#x27;s performance under vibration.\nScope: Includes processing accelerometer data, evaluating system alignment and phasing, and assessing Strehl ratio degradation.\nSteps: 1. Process accelerometer data. 2. Evaluate system alignment and phasing changes. 3. Assess Strehl ratio degradation. 4. Document findings.\nDeliverables: Vibration test data analysis report.<br><b>Resources needed:</b><br><ul><li>Vibration Test Specialist</li><li>Thermal/Structural Analysis Engineer</li><li>Metrology and Instrumentation Specialist</li></ul>",
      "start_date": "2026-10-22",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "3aca0181-c780-4549-802b-f153d26045c9 FF, 2e515120-31bd-41f2-a69a-1dd5e2351a01 FS",
      "parent": "3aca0181-c780-4549-802b-f153d26045c9"
    },
    {
      "id": "23f32991-ce2b-49e7-9fdc-da1ffdaf74b2",
      "text": "Measure Strehl Ratio and Wall-Plug Efficiency",
      "custom_tooltip": "<b>Measure Strehl Ratio and Wall-Plug Efficiency</b>",
      "progress": 0,
      "open": true,
      "meta": "3aca0181-c780-4549-802b-f153d26045c9 FS",
      "parent": "07665461-cd2c-494c-ab86-789a20b20dff",
      "type": "project"
    },
    {
      "id": "1541b74b-1f4f-480b-a9ea-3f14ecb1b2bd",
      "text": "Calibrate power meters and optical sensors",
      "custom_tooltip": "<b>Calibrate power meters and optical sensors</b><br>Ensure accurate power and efficiency measurements by calibrating all relevant metrology equipment. This includes power meters, optical spectrum analyzers, and any other sensors used to measure optical power or wavelength.<br><b>Resources needed:</b><br><ul><li>Metrology Specialist</li><li>Calibration Technician</li><li>Power Meters</li><li>Optical Spectrum Analyzer</li><li>Calibration Standards</li></ul>",
      "start_date": "2026-10-25",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "23f32991-ce2b-49e7-9fdc-da1ffdaf74b2 SS",
      "parent": "23f32991-ce2b-49e7-9fdc-da1ffdaf74b2"
    },
    {
      "id": "cd8f0e9a-4ccc-46e8-a4cd-b6c1ac2d4185",
      "text": "Measure input power to the optical engine",
      "custom_tooltip": "<b>Measure input power to the optical engine</b><br>Accurately measure the electrical power supplied to the optical engine. This involves using calibrated power meters and voltage probes to determine the input power with high precision.<br><b>Resources needed:</b><br><ul><li>Electrical Engineer</li><li>Power Meters</li><li>Voltage Probes</li><li>Data Acquisition System</li></ul>",
      "start_date": "2026-10-28",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "1541b74b-1f4f-480b-a9ea-3f14ecb1b2bd FS",
      "parent": "23f32991-ce2b-49e7-9fdc-da1ffdaf74b2"
    },
    {
      "id": "a5ec31e0-e8a1-4a59-8809-49062ce52a92",
      "text": "Measure output optical power and spectrum",
      "custom_tooltip": "<b>Measure output optical power and spectrum</b><br>Measure the total optical power output from the coherent beam combining system. Also, characterize the spectral content of the output beam to ensure proper beam combining and minimize unwanted spectral components.<br><b>Resources needed:</b><br><ul><li>Optical Engineer</li><li>Optical Power Meter</li><li>Optical Spectrum Analyzer</li><li>Beam Profiler</li></ul>",
      "start_date": "2026-10-31",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "cd8f0e9a-4ccc-46e8-a4cd-b6c1ac2d4185 FS",
      "parent": "23f32991-ce2b-49e7-9fdc-da1ffdaf74b2"
    },
    {
      "id": "6a3abee2-7416-4cc3-99a4-c6f44a966764",
      "text": "Calculate Strehl ratio from wavefront data",
      "custom_tooltip": "<b>Calculate Strehl ratio from wavefront data</b><br>Determine the Strehl ratio by analyzing the wavefront data obtained from interferometric measurements. This involves processing the data to extract the wavefront error and calculating the Strehl ratio based on the Marechal approximation or other appropriate methods.<br><b>Resources needed:</b><br><ul><li>Metrology Specialist</li><li>Data Analysis Software</li><li>Wavefront Sensor</li><li>Computer</li></ul>",
      "start_date": "2026-11-03",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "a5ec31e0-e8a1-4a59-8809-49062ce52a92 FS",
      "parent": "23f32991-ce2b-49e7-9fdc-da1ffdaf74b2"
    },
    {
      "id": "993de2e9-1bd7-4495-b9c3-9172844725bb",
      "text": "Calculate wall-plug efficiency",
      "custom_tooltip": "<b>Calculate wall-plug efficiency</b><br>Calculate the wall-plug efficiency by dividing the total optical power output by the electrical power input. This calculation will provide a measure of the system&#x27;s overall energy conversion efficiency.<br><b>Resources needed:</b><br><ul><li>Data Analysis Software</li><li>Spreadsheet Software</li><li>Electrical Engineer</li><li>Optical Engineer</li></ul>",
      "start_date": "2026-11-06",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "23f32991-ce2b-49e7-9fdc-da1ffdaf74b2 FF, 6a3abee2-7416-4cc3-99a4-c6f44a966764 FS",
      "parent": "23f32991-ce2b-49e7-9fdc-da1ffdaf74b2"
    },
    {
      "id": "9775d38c-062d-4f7f-9640-1af44e276eab",
      "text": "Analyze Performance Data",
      "custom_tooltip": "<b>Analyze Performance Data</b>",
      "progress": 0,
      "open": true,
      "meta": "07665461-cd2c-494c-ab86-789a20b20dff FF, 23f32991-ce2b-49e7-9fdc-da1ffdaf74b2 FS",
      "parent": "07665461-cd2c-494c-ab86-789a20b20dff",
      "type": "project"
    },
    {
      "id": "afe4dc6b-30bf-498b-a07f-b2623257942c",
      "text": "Calibrate power meters and detectors",
      "custom_tooltip": "<b>Calibrate power meters and detectors</b><br>Ensure accurate power measurements by calibrating all power meters and detectors used in the wall-plug efficiency measurement setup. This includes verifying calibration against NIST-traceable standards.<br><b>Resources needed:</b><br><ul><li>Metrology Specialist</li><li>Calibration Equipment</li><li>Power Meters</li><li>Detectors</li></ul>",
      "start_date": "2026-11-09",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "9775d38c-062d-4f7f-9640-1af44e276eab SS",
      "parent": "9775d38c-062d-4f7f-9640-1af44e276eab"
    },
    {
      "id": "9d3ea4a2-306b-4faf-b42c-3b7e746b5326",
      "text": "Measure laser output power",
      "custom_tooltip": "<b>Measure laser output power</b><br>Measure the total laser output power before the beam combining optics. This measurement serves as the input power for the wall-plug efficiency calculation. Record data at multiple operating points.<br><b>Resources needed:</b><br><ul><li>Optical Engineer</li><li>Power Meter</li><li>Data Acquisition System</li></ul>",
      "start_date": "2026-11-11",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "afe4dc6b-30bf-498b-a07f-b2623257942c FS",
      "parent": "9775d38c-062d-4f7f-9640-1af44e276eab"
    },
    {
      "id": "cd422403-07e3-4fe4-85a4-cc3a14df8c09",
      "text": "Measure combined beam power",
      "custom_tooltip": "<b>Measure combined beam power</b><br>Measure the power of the combined beam after the beam combining optics. This measurement represents the useful output power of the system. Record data at multiple operating points.<br><b>Resources needed:</b><br><ul><li>Optical Engineer</li><li>Power Meter</li><li>Data Acquisition System</li></ul>",
      "start_date": "2026-11-13",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "9d3ea4a2-306b-4faf-b42c-3b7e746b5326 FS",
      "parent": "9775d38c-062d-4f7f-9640-1af44e276eab"
    },
    {
      "id": "2c3a824f-745c-4bf4-ab25-d6480efae5e9",
      "text": "Measure electrical power consumption",
      "custom_tooltip": "<b>Measure electrical power consumption</b><br>Measure the total electrical power consumed by the laser system, including the laser diodes, cooling system, and control electronics. Record data at multiple operating points.<br><b>Resources needed:</b><br><ul><li>Electrical Engineer</li><li>Power Analyzer</li><li>Data Acquisition System</li></ul>",
      "start_date": "2026-11-15",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "cd422403-07e3-4fe4-85a4-cc3a14df8c09 FS",
      "parent": "9775d38c-062d-4f7f-9640-1af44e276eab"
    },
    {
      "id": "7d1b820f-13f0-4bee-a68a-fd13844c5ee3",
      "text": "Calculate Strehl ratio from wavefront data",
      "custom_tooltip": "<b>Calculate Strehl ratio from wavefront data</b><br>Acquire wavefront data using the metrology system and calculate the Strehl ratio. This involves processing the wavefront data to remove noise and aberrations, and then calculating the Strehl ratio based on the residual wavefront error.<br><b>Resources needed:</b><br><ul><li>Metrology Specialist</li><li>Optical Engineer</li><li>Wavefront Sensor</li><li>Data Processing Software</li></ul>",
      "start_date": "2026-11-17",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "9775d38c-062d-4f7f-9640-1af44e276eab FF, 2c3a824f-745c-4bf4-ab25-d6480efae5e9 FS",
      "parent": "9775d38c-062d-4f7f-9640-1af44e276eab"
    },
    {
      "id": "16d41163-1c12-41cc-808e-00aaa404a336",
      "text": "Vibration Qualification Validation",
      "custom_tooltip": "<b>Vibration Qualification Validation</b>",
      "progress": 0,
      "open": true,
      "meta": "07665461-cd2c-494c-ab86-789a20b20dff FS",
      "parent": "a76e5dca-69db-48ef-9f02-0b22301fe8b4",
      "type": "project"
    },
    {
      "id": "eb5088d8-fdb1-48c4-9fed-23855c52cf28",
      "text": "Develop Vibration Test Profiles",
      "custom_tooltip": "<b>Develop Vibration Test Profiles</b>",
      "progress": 0,
      "open": true,
      "meta": "16d41163-1c12-41cc-808e-00aaa404a336 SS",
      "parent": "16d41163-1c12-41cc-808e-00aaa404a336",
      "type": "project"

    {
      "id": "9b16c1cf-4ab2-4c8e-b364-8c3a670f71f8",
      "text": "Define Launch and Operational Vibration Specs",
      "custom_tooltip": "<b>Define Launch and Operational Vibration Specs</b><br>Establish the vibration levels and frequencies the system will experience during launch and in-space operation. This involves reviewing launch vehicle specifications, mission profiles, and spacecraft dynamics models.<br><b>Resources needed:</b><br><ul><li>Vibration Test Specialist</li><li>Systems Engineer</li><li>Structural Dynamics Expert</li></ul>",
      "start_date": "2026-11-19",
      "duration": 1.0,
      "progress": 0,
      "open": true,
      "meta": "eb5088d8-fdb1-48c4-9fed-23855c52cf28 SS",
      "parent": "eb5088d8-fdb1-48c4-9fed-23855c52cf28"
    },
    {
      "id": "d9356b92-ba24-450e-a7b9-68600d85433b",
      "text": "Develop Preliminary Test Profile",
      "custom_tooltip": "<b>Develop Preliminary Test Profile</b><br>Create an initial vibration test profile based on the defined vibration specifications. This profile will include frequency ranges, acceleration levels, and duration of the test.<br><b>Resources needed:</b><br><ul><li>Vibration Test Specialist</li><li>Structural Dynamics Expert</li></ul>",
      "start_date": "2026-11-20",
      "duration": 1.0,
      "progress": 0,
      "open": true,
      "meta": "9b16c1cf-4ab2-4c8e-b364-8c3a670f71f8 FS",
      "parent": "eb5088d8-fdb1-48c4-9fed-23855c52cf28"
    },
    {
      "id": "86d1d277-862c-4e19-bacd-cc79b795833f",
      "text": "Simulate System Response to Test Profile",
      "custom_tooltip": "<b>Simulate System Response to Test Profile</b><br>Use FEA models to simulate the system&#x27;s response to the preliminary vibration test profile. This will help identify potential resonances and areas of high stress.<br><b>Resources needed:</b><br><ul><li>Thermal/Structural Analysis Engineer</li><li>Vibration Test Specialist</li></ul>",
      "start_date": "2026-11-21",
      "duration": 1.0,
      "progress": 0,
      "open": true,
      "meta": "d9356b92-ba24-450e-a7b9-68600d85433b FS",
      "parent": "eb5088d8-fdb1-48c4-9fed-23855c52cf28"
    },
    {
      "id": "0475f96c-98f6-4a64-b42b-5c78a4bed8ee",
      "text": "Refine Test Profile Based on Simulation",
      "custom_tooltip": "<b>Refine Test Profile Based on Simulation</b><br>Adjust the vibration test profile based on the simulation results. This may involve modifying frequency ranges, acceleration levels, or duration to avoid resonances and ensure adequate testing.<br><b>Resources needed:</b><br><ul><li>Vibration Test Specialist</li><li>Thermal/Structural Analysis Engineer</li><li>Structural Dynamics Expert</li></ul>",
      "start_date": "2026-11-22",
      "duration": 1.0,
      "progress": 0,
      "open": true,
      "meta": "86d1d277-862c-4e19-bacd-cc79b795833f FS",
      "parent": "eb5088d8-fdb1-48c4-9fed-23855c52cf28"
    },
    {
      "id": "346f26ac-a855-4172-ab94-4bccb97b6cfd",
      "text": "Validate Test Profile with Component Surveys",
      "custom_tooltip": "<b>Validate Test Profile with Component Surveys</b><br>Conduct preliminary vibration surveys on critical components to validate the refined test profile and identify any component-specific vibration sensitivities.<br><b>Resources needed:</b><br><ul><li>Vibration Test Specialist</li><li>Component Suppliers</li></ul>",
      "start_date": "2026-11-23",
      "duration": 1.0,
      "progress": 0,
      "open": true,
      "meta": "eb5088d8-fdb1-48c4-9fed-23855c52cf28 FF, 0475f96c-98f6-4a64-b42b-5c78a4bed8ee FS",
      "parent": "eb5088d8-fdb1-48c4-9fed-23855c52cf28"
    },

      "text": "Perform Vibration Testing",
      "custom_tooltip": "<b>Perform Vibration Testing</b>",
      "progress": 0,
      "open": true,
      "meta": "eb5088d8-fdb1-48c4-9fed-23855c52cf28 FS",
      "parent": "16d41163-1c12-41cc-808e-00aaa404a336",
      "type": "project"
    },
    {
      "id": "a65c7a0d-5070-4ec1-acab-044a56a76914",
      "text": "Prepare vibration test setup and fixtures",
      "custom_tooltip": "<b>Prepare vibration test setup and fixtures</b><br>Objective: Ensure the system is properly mounted and secured for vibration testing.\nScope: Includes designing and fabricating custom fixtures, verifying alignment, and ensuring proper grounding.\nSteps: Design fixtures, fabricate fixtures, verify alignment, secure system, check grounding.\nDeliverables: Securely mounted system ready for vibration testing.<br><b>Resources needed:</b><br><ul><li>Mechanical Engineer</li><li>Technician</li><li>Vibration Test Specialist</li></ul>",

    {
      "id": "5f4d8f80-17a8-4ab6-97e0-1e875a532dd1",
      "text": "Calibrate vibration shaker and control system",
      "custom_tooltip": "<b>Calibrate vibration shaker and control system</b><br>Objective: Ensure accurate and reliable vibration input during testing.\nScope: Includes calibrating the vibration shaker, verifying control system performance, and validating sensor accuracy.\nSteps: Calibrate shaker, verify control system, validate sensors, document calibration.\nDeliverables: Calibrated vibration system with documented performance.<br><b>Resources needed:</b><br><ul><li>Vibration Test Specialist</li><li>Control Systems Engineer</li><li>Metrology Specialist</li></ul>",

    {
      "id": "f98ebdac-8e40-4443-8a8b-a784fe4ab49b",
      "text": "Run preliminary vibration survey",
      "custom_tooltip": "<b>Run preliminary vibration survey</b><br>Objective: Identify system resonances and optimize test parameters.\nScope: Includes performing a low-level vibration sweep, analyzing frequency response, and adjusting test profiles.\nSteps: Perform vibration sweep, analyze response, adjust profiles, document findings.\nDeliverables: Optimized vibration test profiles based on system characteristics.<br><b>Resources needed:</b><br><ul><li>Vibration Test Specialist</li><li>Thermal/Structural Analysis Engineer</li></ul>",

    {
      "id": "54879f63-40bf-423d-b783-2e8e53ebc3f2",
      "text": "Execute full vibration test per profiles",
      "custom_tooltip": "<b>Execute full vibration test per profiles</b><br>Objective: Subject the system to the specified vibration environment.\nScope: Includes running the vibration test according to the developed profiles, monitoring system performance, and recording data.\nSteps: Run vibration test, monitor performance, record data, document observations.\nDeliverables: Vibration test data and observations of system performance.<br><b>Resources needed:</b><br><ul><li>Vibration Test Specialist</li><li>Technician</li><li>Metrology and Instrumentation Specialist</li></ul>",

    },

      "id": "12ae6e73-6c36-442e-8335-44cbf7409a55",
      "text": "Inspect system post-vibration",
      "custom_tooltip": "<b>Inspect system post-vibration</b><br>Objective: Assess any damage or degradation after vibration testing.\nScope: Includes visual inspection, functional testing, and metrology measurements.\nSteps: Visual inspection, functional testing, metrology measurements, document findings.\nDeliverables: Report on system condition after vibration testing.<br><b>Resources needed:</b><br><ul><li>Mechanical Engineer</li><li>Lead Optical Engineer</li><li>Metrology and Instrumentation Specialist</li></ul>",

    {
      "id": "797cc2ec-2f42-4876-9525-2b848bd3c099",
      "text": "Prepare vibration data for analysis",
      "custom_tooltip": "<b>Prepare vibration data for analysis</b><br>Objective: Organize and format vibration test data for efficient analysis.\nScope: Include accelerometer data, system alignment data, and Strehl ratio measurements.\nSteps: 1. Convert data to a compatible format. 2. Synchronize data streams. 3. Remove noise and artifacts.\nDeliverables: Cleaned and synchronized vibration test data.<br><b>Resources needed:</b><br><ul><li>Vibration Test Specialist</li><li>Data Analyst</li></ul>",
      "start_date": "2026-12-14",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "b9cd7c07-2ba6-4e4b-a9b3-bd9eccd7f5fb SS",
      "parent": "b9cd7c07-2ba6-4e4b-a9b3-bd9eccd7f5fb"
    },
    {
      "id": "784938d8-c4e3-464b-8374-aebcb02ac701",
      "text": "Identify dominant vibration modes",
      "custom_tooltip": "<b>Identify dominant vibration modes</b><br>Objective: Determine the primary vibration frequencies affecting system performance.\nScope: Analyze frequency spectra to identify resonant peaks.\nSteps: 1. Perform FFT analysis. 2. Identify peak frequencies. 3. Correlate frequencies with system components.\nDeliverables: List of dominant vibration modes and their frequencies.<br><b>Resources needed:</b><br><ul><li>Vibration Test Specialist</li><li>Data Analyst</li></ul>",
      "start_date": "2026-12-17",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "797cc2ec-2f42-4876-9525-2b848bd3c099 FS",
      "parent": "b9cd7c07-2ba6-4e4b-a9b3-bd9eccd7f5fb"
    },
    {
      "id": "4a55c66b-0def-48a6-8bec-d14252dde9c2",
      "text": "Correlate vibration with optical performance",
      "custom_tooltip": "<b>Correlate vibration with optical performance</b><br>Objective: Determine the impact of vibration on Strehl ratio and system alignment.\nScope: Analyze the relationship between vibration amplitude and optical performance metrics.\nSteps: 1. Plot Strehl ratio vs. vibration amplitude. 2. Plot alignment error vs. vibration amplitude. 3. Calculate correlation coefficients.\nDeliverables: Correlation coefficients and plots showing the relationship between vibration and optical performance.<br><b>Resources needed:</b><br><ul><li>Vibration Test Specialist</li><li>Data Analyst</li><li>Metrology Specialist</li></ul>",
      "start_date": "2026-12-20",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "784938d8-c4e3-464b-8374-aebcb02ac701 FS",
      "parent": "b9cd7c07-2ba6-4e4b-a9b3-bd9eccd7f5fb"
    },
    {
      "id": "753a1454-c2e1-4ea2-b260-aa9905a2624d",
      "text": "Validate FEA model with test data",
      "custom_tooltip": "<b>Validate FEA model with test data</b><br>Objective: Compare FEA model predictions with experimental vibration data.\nScope: Validate the model&#x27;s accuracy in predicting structural response to vibration.\nSteps: 1. Compare FEA mode shapes with experimental mode shapes. 2. Compare FEA frequencies with experimental frequencies. 3. Adjust FEA model parameters to improve agreement.\nDeliverables: Validated FEA model.<br><b>Resources needed:</b><br><ul><li>Thermal/Structural Analysis Engineer</li><li>Vibration Test Specialist</li></ul>",
      "start_date": "2026-12-23",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "4a55c66b-0def-48a6-8bec-d14252dde9c2 FS",
      "parent": "b9cd7c07-2ba6-4e4b-a9b3-bd9eccd7f5fb"
    },
    {
      "id": "daa539c0-a661-4203-bf6e-0910f60874b8",
      "text": "Document vibration data analysis results",
      "custom_tooltip": "<b>Document vibration data analysis results</b><br>Objective: Create a comprehensive report summarizing the vibration data analysis results.\nScope: Include data processing methods, analysis results, and conclusions.\nSteps: 1. Write a detailed description of the data analysis methods. 2. Present the analysis results in a clear and concise manner. 3. Draw conclusions based on the analysis results.\nDeliverables: Vibration data analysis report.<br><b>Resources needed:</b><br><ul><li>Vibration Test Specialist</li><li>Data Analyst</li></ul>",
      "start_date": "2026-12-26",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "b9cd7c07-2ba6-4e4b-a9b3-bd9eccd7f5fb FF, 753a1454-c2e1-4ea2-b260-aa9905a2624d FS",

    },

      "text": "Mitigate Control-Structure Interaction (CSI) Instabilities",
      "custom_tooltip": "<b>Mitigate Control-Structure Interaction (CSI) Instabilities</b>",

      "open": true,

    {
      "id": "5819d4ac-99ab-447b-baab-2c3fdca8bbc0",
      "text": "Identify CSI Instability Frequencies",
      "custom_tooltip": "<b>Identify CSI Instability Frequencies</b><br>Determine the frequencies at which control-structure interaction (CSI) instabilities are occurring. This involves analyzing vibration test data and FEA models to pinpoint resonant frequencies and modes that are causing instability.<br><b>Resources needed:</b><br><ul><li>Vibration Test Specialist</li><li>Control Systems Engineer</li><li>FEA Analyst</li><li>Data Analysis Software</li></ul>",
      "start_date": "2026-12-29",
      "duration": 5.0,
      "progress": 0,
      "open": true,
      "meta": "f41d1a02-93b7-49fe-abad-315b695a459f SS",
      "parent": "f41d1a02-93b7-49fe-abad-315b695a459f"
    },
    {
      "id": "b9887bbd-cfab-4628-b30a-8cb7d24e12ff",
      "text": "Design Notch Filters for CSI Mitigation",
      "custom_tooltip": "<b>Design Notch Filters for CSI Mitigation</b><br>Design and implement notch filters in the control system to attenuate the frequencies identified as causing CSI instabilities. This requires careful selection of filter parameters to avoid degrading overall system performance.<br><b>Resources needed:</b><br><ul><li>Control Systems Engineer</li><li>Signal Processing Software</li><li>Simulation Tools</li></ul>",
      "start_date": "2027-01-03",
      "duration": 5.0,
      "progress": 0,
      "open": true,
      "meta": "5819d4ac-99ab-447b-baab-2c3fdca8bbc0 FS",
      "parent": "f41d1a02-93b7-49fe-abad-315b695a459f"
    },
    {
      "id": "a9cdbaf7-ef43-45a6-8a77-29391afc4342",
      "text": "Implement and Test Control Algorithms",
      "custom_tooltip": "<b>Implement and Test Control Algorithms</b><br>Implement advanced control algorithms designed to actively damp or suppress CSI instabilities. This may involve adaptive control techniques or model-based control strategies.<br><b>Resources needed:</b><br><ul><li>Control Systems Engineer</li><li>Software Development Tools</li><li>Real-time Control System</li></ul>",
      "start_date": "2027-01-08",
      "duration": 5.0,
      "progress": 0,
      "open": true,
      "meta": "b9887bbd-cfab-4628-b30a-8cb7d24e12ff FS",
      "parent": "f41d1a02-93b7-49fe-abad-315b695a459f"
    },
    {
      "id": "d0456825-c184-4585-9702-b454e82391f0",
      "text": "Iterate Testing and Refine Mitigation",
      "custom_tooltip": "<b>Iterate Testing and Refine Mitigation</b><br>Conduct iterative testing of the implemented mitigation strategies under various vibration conditions. Refine the notch filter parameters and control algorithms based on the test results to optimize performance and stability.<br><b>Resources needed:</b><br><ul><li>Vibration Test Specialist</li><li>Control Systems Engineer</li><li>Metrology Specialist</li><li>Vibration Testing Equipment</li></ul>",
      "start_date": "2027-01-13",
      "duration": 5.0,
      "progress": 0,
      "open": true,
      "meta": "f41d1a02-93b7-49fe-abad-315b695a459f FF, a9cdbaf7-ef43-45a6-8a77-29391afc4342 FS",
      "parent": "f41d1a02-93b7-49fe-abad-315b695a459f"
    },

    {
      "id": "0623ca74-cfc7-4296-be1d-3ba8aba3150b",
      "text": "Setup Interferometer for Phasing Measurement",
      "custom_tooltip": "<b>Setup Interferometer for Phasing Measurement</b><br>Objective: Prepare the interferometer for accurate phasing accuracy measurements.\nScope: Includes alignment, calibration, and stabilization of the interferometer.\nSteps: Align the interferometer optics, calibrate the path length difference, stabilize the interferometer against vibrations and thermal drift.\nDeliverables: A calibrated and stable interferometer ready for phasing measurements.<br><b>Resources needed:</b><br><ul><li>Metrology Specialist</li><li>Optical Engineer</li><li>Interferometer</li><li>Vibration Isolation Table</li></ul>",
      "start_date": "2027-01-18",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "9f24da7e-5d3c-4a9e-9714-79e384a54943 SS",
      "parent": "9f24da7e-5d3c-4a9e-9714-79e384a54943"
    },
    {
      "id": "c8496e37-686f-414e-8f25-2183232b47c4",
      "text": "Measure Phasing Accuracy at Target Wavelength",
      "custom_tooltip": "<b>Measure Phasing Accuracy at Target Wavelength</b><br>Objective: Obtain accurate phasing accuracy measurements at the target wavelength.\nScope: Includes data acquisition, signal processing, and error analysis.\nSteps: Acquire interference fringes, process the data to extract the phase information, analyze the data to determine the phasing accuracy, quantify measurement uncertainty.\nDeliverables: Phasing accuracy measurements with associated uncertainty.<br><b>Resources needed:</b><br><ul><li>Metrology Specialist</li><li>Data Acquisition System</li><li>Signal Processing Software</li><li>Laser Source</li></ul>",
      "start_date": "2027-01-22",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "0623ca74-cfc7-4296-be1d-3ba8aba3150b FS",
      "parent": "9f24da7e-5d3c-4a9e-9714-79e384a54943"
    },
    {
      "id": "ee5eefb7-d6f0-4986-962c-c8bfb3aace83",
      "text": "Measure Wavefront Error with Interferometer",
      "custom_tooltip": "<b>Measure Wavefront Error with Interferometer</b><br>Objective: Quantify the wavefront error of the combined beam.\nScope: Includes data acquisition, wavefront reconstruction, and error analysis.\nSteps: Acquire interference fringes, reconstruct the wavefront from the data, analyze the wavefront to determine the wavefront error, quantify measurement uncertainty.\nDeliverables: Wavefront error measurements with associated uncertainty.<br><b>Resources needed:</b><br><ul><li>Metrology Specialist</li><li>Optical Engineer</li><li>Wavefront Reconstruction Software</li><li>Interferometer</li></ul>",
      "start_date": "2027-01-26",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "c8496e37-686f-414e-8f25-2183232b47c4 FS",
      "parent": "9f24da7e-5d3c-4a9e-9714-79e384a54943"
    },
    {
      "id": "9e1a6d96-91fb-4705-b20a-68a6ab35ebac",
      "text": "Analyze and Validate Measurement Data",
      "custom_tooltip": "<b>Analyze and Validate Measurement Data</b><br>Objective: Validate the accuracy and reliability of the phasing accuracy and wavefront error measurements.\nScope: Includes data analysis, error analysis, and comparison with simulation results.\nSteps: Analyze the data for systematic errors, compare the measurements with simulation results, validate the accuracy of the measurements, document the validation process.\nDeliverables: Validated phasing accuracy and wavefront error measurements.<br><b>Resources needed:</b><br><ul><li>Metrology Specialist</li><li>Optical Engineer</li><li>Data Analysis Software</li><li>Simulation Data</li></ul>",
      "start_date": "2027-01-30",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "9f24da7e-5d3c-4a9e-9714-79e384a54943 FF, ee5eefb7-d6f0-4986-962c-c8bfb3aace83 FS",
      "parent": "9f24da7e-5d3c-4a9e-9714-79e384a54943"
    },
    {
      "id": "fcb2224a-1b6c-46b5-b694-bd5120d9e87f",
      "text": "Assess System Stability Under Thermal and Dynamic Loads",
      "custom_tooltip": "<b>Assess System Stability Under Thermal and Dynamic Loads</b>",

      "open": true,
