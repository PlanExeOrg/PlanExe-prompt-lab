    {
      "id": "c83828b1-7385-4f0f-abe5-b637d9fa0dfc",
      "text": "Define Donation Sweep Thresholds",
      "custom_tooltip": "<b>Define Donation Sweep Thresholds</b><br>Establish the exact quantitative metrics and conditions under which the project team is authorized to deploy the contingency budget (up to DKK 200,000) to increase the consumer donation incentive above the baseline DKK 5 rate during Q4. This requires aligning consumer elasticity data with the overall budget ceiling.<br><b>Resources needed:</b><br><ul><li>Behavioral Economics Modeler</li><li>Financial Controller</li><li>Incentive &amp; Consumer Compliance Specialist</li></ul>",
      "start_date": "2027-04-16",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "8cef95be-1bd9-42ae-b3bb-97c69db0e37a SS",
      "parent": "8cef95be-1bd9-42ae-b3bb-97c69db0e37a"
    },
    {
      "id": "a0cd386a-8ee3-4c6b-9460-0663cb4d3f0f",
      "text": "Finance Sign-Off on Sweep Mechanism",
      "custom_tooltip": "<b>Finance Sign-Off on Sweep Mechanism</b><br>Present the two pre-modeled donation sweep scenarios (based on achieved Q3 recovery rates) to Arla Finance leadership. Secure formal, written commitment and authorization for the mechanism, specifying the process for accessing the contingency funds without requiring emergency re-approval.<br><b>Resources needed:</b><br><ul><li>Financial Controller</li><li>Arla Foods Programme Owner</li><li>Legal Counsel</li></ul>",
      "start_date": "2027-04-19",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "c83828b1-7385-4f0f-abe5-b637d9fa0dfc FS",
      "parent": "8cef95be-1bd9-42ae-b3bb-97c69db0e37a"
    },
    {
      "id": "b4fda2db-b228-4ae5-b06a-5273349e23ef",
      "text": "Document Final Donation Calculation Formula",
      "custom_tooltip": "<b>Document Final Donation Calculation Formula</b><br>Produce the final, legally binding documentation detailing how the total DKK 500,000 minimum donation (and any subsequent authorized uplift funds) will be calculated based on validated crate returns and transferred to the Arla Foundation at year-end. This must align with Foundation reporting requirements.<br><b>Resources needed:</b><br><ul><li>Arla Foundation Liaison</li><li>Financial Controller</li><li>Legal Counsel</li></ul>",
      "start_date": "2027-04-22",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "8cef95be-1bd9-42ae-b3bb-97c69db0e37a FF, a0cd386a-8ee3-4c6b-9460-0663cb4d3f0f FS",

    {

      "text": "Calibrate Tiered Incentive Structure Based on Q2 Pilot Results",
      "custom_tooltip": "<b>Calibrate Tiered Incentive Structure Based on Q2 Pilot Results</b>",

      "open": true,
      "meta": "92725e98-ad52-4f5d-b14e-9051701f1db3 FF, 8cef95be-1bd9-42ae-b3bb-97c69db0e37a FS",

    {
      "id": "19c81ef9-e251-4a6f-92c5-338a9a353ce2",
      "text": "Define Q2 pilot success thresholds",
      "custom_tooltip": "<b>Define Q2 pilot success thresholds</b><br>Establish clear, quantitative &#x27;pass/fail&#x27; benchmarks for consumer participation rate, contamination levels, and digital tool usage based on defined Q1 targets. These thresholds will determine if the incentive structure is validated or requires immediate high-level revision.<br><b>Resources needed:</b><br><ul><li>Incentive Specialist</li><li>Financial Controller</li><li>Data Analyst</li></ul>",
      "start_date": "2027-04-25",
      "duration": 9.0,
      "progress": 0,
      "open": true,
      "meta": "d30717a3-8191-4821-9a8c-0b98fb224bda SS",

    },
    {
      "id": "09180184-b66d-42a1-86a1-58f6e0a5bd0f",
      "text": "Develop backup incentive strategy contingency",
      "custom_tooltip": "<b>Develop backup incentive strategy contingency</b><br>Design two pre-modeled alternative incentive structures (e.g., increasing the donation amount or adding a secondary reward mechanism) that can be swiftly deployed if pilot results indicate the static DKK 5 incentive fails critically.<br><b>Resources needed:</b><br><ul><li>Behavioral Economics Modeler</li><li>Legal Counsel</li><li>Arla Foundation Liaison</li></ul>",
      "start_date": "2027-05-04",
      "duration": 9.0,
      "progress": 0,
      "open": true,
      "meta": "19c81ef9-e251-4a6f-92c5-338a9a353ce2 FS",

    },
    {
      "id": "447af68b-69fb-4a29-bb2f-1fb37897a9b6",
      "text": "Formalize budget sweep authorization trigger",
      "custom_tooltip": "<b>Formalize budget sweep authorization trigger</b><br>Define the precise, documented trigger (e.g., volume tracking falling X% below forecast for Y consecutive weeks) that authorizes the immediate unlocking of contingency funds to boost the consumer incentive during Q3/Q4.<br><b>Resources needed:</b><br><ul><li>Financial Controller</li><li>Project Sponsor</li><li>Legal Counsel</li></ul>",

      "progress": 0,

      "id": "8aa7ae63-f693-49dd-9960-f97465aafb2b",
      "text": "Focus group testing of core narrative",
      "custom_tooltip": "<b>Focus group testing of core narrative</b><br>Conduct focus groups using diverse consumer segments to rigorously test the &#x27;Garden Furniture&#x27; narrative&#x27;s impact, clarity, and potential for negative backlash, ensuring alignment with Arla Foundation values.<br><b>Resources needed:</b><br><ul><li>External Focus Group Moderator</li><li>Consumer Panel Access</li><li>Pre-tested Messaging Scripts</li></ul>",

    {
      "id": "8e0cf02a-d2da-42f0-8ffe-d210e96bae67",
      "text": "Secure legal/brand collateral sign-off",
      "custom_tooltip": "<b>Secure legal/brand collateral sign-off</b><br>Obtain formal, written sign-off from Arla Legal and Brand teams on the final provocative marketing creative and all associated public-facing content, ensuring regulatory compliance prior to production.<br><b>Resources needed:</b><br><ul><li>Arla Legal Counsel Time</li><li>Arla Brand Manager Time</li><li>Finalized Creative Assets (Print/Digital)</li></ul>",

    {
      "id": "68009c1c-1c29-416a-8d82-8c0b179ac837",
      "text": "Pre-order/pre-production of physical assets",
      "custom_tooltip": "<b>Pre-order/pre-production of physical assets</b><br>Place final binding orders for all required physical campaign materials (signage, drop-off bins, instructional posters) based on finalized content, adhering to long lead times for high-volume outdoor printing.<br><b>Resources needed:</b><br><ul><li>Procurement Specialist</li><li>Printing and Signage Vendor Contracts</li></ul>",
      "start_date": "2027-06-11",
      "duration": 10.0,
      "progress": 0,

    {
      "id": "78969824-b731-4682-9f22-99167558d9ce",
      "text": "Design high-contrast visual guide",
      "custom_tooltip": "<b>Design high-contrast visual guide</b><br>Develop the structure and visual assets for the digital identification guide. This must focus on high-contrast, easy-to-read graphical representation of acceptable vs. unacceptable crates, optimized for smartphone viewing to ensure clarity across diverse consumer and retail staff segments.<br><b>Resources needed:</b><br><ul><li>Digital Designer</li><li>Content Strategist</li><li>Brand Reviewer</li></ul>",
      "start_date": "2027-06-21",
      "duration": 7.0,
      "progress": 0,
      "open": true,
      "meta": "ee6c7642-152f-4384-872f-7fe2430e229b SS",
      "parent": "ee6c7642-152f-4384-872f-7fe2430e229b"
    },
    {
      "id": "cffa7f3b-c678-414c-95ed-d0a6c5e3b3a3",
      "text": "Test guide readability with users",
      "custom_tooltip": "<b>Test guide readability with users</b><br>Conduct usability testing focused on visual clarity and comprehension speed. Test the guide with both target consumers and frontline supermarket staff to identify and resolve comprehension friction points before national launch.<br><b>Resources needed:</b><br><ul><li>Usability Testing Panel (Consumers + Staff)</li><li>Digital Engagement Architect</li></ul>",
      "start_date": "2027-06-28",
      "duration": 7.0,
      "progress": 0,
      "open": true,
      "meta": "78969824-b731-4682-9f22-99167558d9ce FS",
      "parent": "ee6c7642-152f-4384-872f-7fe2430e229b"
    },
    {
      "id": "11c7e598-f87b-4bc2-b2e7-339bcd7fb53b",
      "text": "Integrate guide with QR verification tool",
      "custom_tooltip": "<b>Integrate guide with QR verification tool</b><br>Ensure the finalized visual guide is seamlessly integrated into the user flow of the QR-code &#x27;Killer Application.&#x27; The guide should be the default resource presented immediately after a user scans an unsuccessful code or before the final return confirmation.<br><b>Resources needed:</b><br><ul><li>Software Developer</li><li>Systems Integrator</li><li>UX Tester</li></ul>",
      "start_date": "2027-07-05",
      "duration": 7.0,
      "progress": 0,
      "open": true,
      "meta": "cffa7f3b-c678-414c-95ed-d0a6c5e3b3a3 FS",
      "parent": "ee6c7642-152f-4384-872f-7fe2430e229b"
    },
    {
      "id": "319c368e-640b-4a87-9a9d-f83fab4eb7e0",
      "text": "Final compliance sign-off for assets",
      "custom_tooltip": "<b>Final compliance sign-off for assets</b><br>Secure final written approval from Legal, Brand, and the Arla Foundation communications team confirming that the visual identification guide meets all regulatory, branding, and partnership messaging standards prior to mass production/deployment.<br><b>Resources needed:</b><br><ul><li>Legal Counsel</li><li>Brand Manager</li><li>Arla Foundation Liaison</li></ul>",
      "start_date": "2027-07-12",
      "duration": 7.0,
      "progress": 0,
      "open": true,
      "meta": "ee6c7642-152f-4384-872f-7fe2430e229b FF, 11c7e598-f87b-4bc2-b2e7-339bcd7fb53b FS",
      "parent": "ee6c7642-152f-4384-872f-7fe2430e229b"
    },
    {
      "id": "47f7b204-8bd2-4102-800c-0ba25703a213",
      "text": "Develop and Test QR-Code 'Killer Application' Verification Tool",
      "custom_tooltip": "<b>Develop and Test QR-Code &#x27;Killer Application&#x27; Verification Tool</b>",
      "progress": 0,
      "open": true,
      "meta": "ee6c7642-152f-4384-872f-7fe2430e229b FS",
      "parent": "19334c50-dd99-4e21-bcd2-38f3a6bb115e",
      "type": "project"
    },
    {
      "id": "4e3975fc-48fe-49bf-914e-92120a3bd5d5",
      "text": "Integrate QR code verification tool APIs",
      "custom_tooltip": "<b>Integrate QR code verification tool APIs</b><br>Identify and secure necessary API access documentation from major retail partners (e.g., POS or loyalty system providers) required for the QR code verification system&#x27;s technical hook-in. This must be done before full development commences.<br><b>Resources needed:</b><br><ul><li>System Architect</li><li>Retail Technical Liaisons</li><li>Preliminary API documentation from retailers</li></ul>",
      "start_date": "2027-07-19",
      "duration": 7.0,
      "progress": 0,
      "open": true,
      "meta": "47f7b204-8bd2-4102-800c-0ba25703a213 SS",

    },
    {
      "id": "1021f5c9-3f27-4c29-9940-65d1c4879d72",
      "text": "Develop frictionless verification software",
      "custom_tooltip": "<b>Develop frictionless verification software</b><br>Design and build the web-app or SMS-based verification workflow accessible via the QR code. Focus on a &#x27;no-download&#x27; path achieving a high success rate for immediate logging of the return.<br><b>Resources needed:</b><br><ul><li>Lead Developer</li><li>UX/UI Designer</li><li>Cloud hosting infrastructure</li></ul>",
      "start_date": "2027-07-26",
      "duration": 7.0,
      "progress": 0,
      "open": true,
      "meta": "4e3975fc-48fe-49bf-914e-92120a3bd5d5 FS",

    },
    {
      "id": "9212fcfa-f36f-42b4-b2e1-5d98dc7d1441",
      "text": "Run integration spike and feasibility test",
      "custom_tooltip": "<b>Run integration spike and feasibility test</b><br>Conduct a dedicated one-week technical spike session where the verification tool is tested end-to-end against simulated retail back-ends using secured credentials, focusing solely on data integrity and latency.<br><b>Resources needed:</b><br><ul><li>System Architect</li><li>QA Tester</li><li>Simulated retail environment access</li></ul>",
      "start_date": "2027-08-02",
      "duration": 7.0,
      "progress": 0,

      "text": "Finalize tool readiness for Q2 Pilot",
      "custom_tooltip": "<b>Finalize tool readiness for Q2 Pilot</b><br>Ensure the integrated QR code verification tool meets all internal standards for stability, security, and user-friendliness, preparing all deployment artifacts for the Q2 pilot launch.<br><b>Resources needed:</b><br><ul><li>Reverse Logistics Lead</li><li>Digital Engagement Architect</li><li>Security Auditor</li></ul>",

    {
      "id": "7a5ca5c5-5e0f-4580-bb8c-910aa34eaaad",
      "text": "Pilot incentive testing and communication",
      "custom_tooltip": "<b>Pilot incentive testing and communication</b><br>Execute the collection and incentive mechanism within the Q2 pilot zones. This involves tracking consumer participation, monitoring the use of the physical and digital guides, and ensuring the local communication strategy is effective at driving initial volume.<br><b>Resources needed:</b><br><ul><li>Pilot Zone Field Support Teams</li><li>Local Marketing Coordinators</li><li>Tracking software for DKK 5 donations</li></ul>",
      "start_date": "2027-08-16",
      "duration": 15.0,
      "progress": 0,

    {
      "id": "5dd33bdd-97f8-47cf-89d5-795ac67b1451",
      "text": "Audit pilot performance metrics",
      "custom_tooltip": "<b>Audit pilot performance metrics</b><br>Conduct a detailed audit of data collected during the Q2 pilot. Focus on key measurements: consumer participation rate, contamination levels, efficacy of the in-store collection points, and consumer feedback on ease-of-use for digital tools.<br><b>Resources needed:</b><br><ul><li>QA Triage Auditors</li><li>Data Analyst</li><li>Consumer Feedback Specialist</li></ul>",
      "start_date": "2027-08-31",
      "duration": 15.0,
      "progress": 0,

      "meta": "7a5ca5c5-5e0f-4580-bb8c-910aa34eaaad FS",

    },
    {
      "id": "3087b439-2407-4fdb-8f01-f6eba01d10af",
      "text": "Adjust national rollout strategy",
      "custom_tooltip": "<b>Adjust national rollout strategy</b><br>Implement mandatory procedural changes and strategy calibration based on the quantitative and qualitative findings from the pilot audit. This includes finalizing the incentive structure, revising training materials for retail partners, and approving the final national marketing rollout plan.<br><b>Resources needed:</b><br><ul><li>Cross-functional Learning Review Board</li><li>Training Material Developer</li><li>Project Manager</li></ul>",
      "start_date": "2027-09-15",
      "duration": 15.0,
      "progress": 0,
      "open": true,

    },

    {
      "id": "ff1917c9-bf8d-4233-97e1-c65e620445fe",
      "text": "Hyper-local pilot communication",
      "custom_tooltip": "<b>Hyper-local pilot communication</b><br>Develop and execute hyper-local digital communication campaigns targeting consumers exclusively within the defined Q2 pilot zones to ensure high initial awareness and participation rates in collection activities.<br><b>Resources needed:</b><br><ul><li>Digital Marketing Specialist</li><li>Local Campaign Budget (Pilot)</li><li>Pilot Zone Mapping Data</li></ul>",
      "start_date": "2027-09-30",
      "duration": 8.0,
      "progress": 0,
      "open": true,
      "meta": "eadd23e5-1511-4e5d-9d97-fcc014b09729 SS",

    },
    {
      "id": "19914bc4-82ad-4815-90f7-f8aa5414b4f3",
      "text": "Small-scale collection setup",
      "custom_tooltip": "<b>Small-scale collection setup</b><br>Establish the initial, small-scale reverse logistics network tailored for the pilot, including temporary micro-sort locations and scheduling high-frequency collection runs using minimal, dedicated contracted transport.<br><b>Resources needed:</b><br><ul><li>Logistics Coordinator</li><li>Dedicated Small-Volume Transport Contract</li><li>Pilot Area Site Permits</li></ul>",
      "start_date": "2027-10-08",
      "duration": 8.0,
      "progress": 0,
      "open": true,
      "meta": "ff1917c9-bf8d-4233-97e1-c65e620445fe FS",

    },
    {
      "id": "1046a863-9f18-4aa5-a47e-e709cc4ef863",
      "text": "Rigorous pilot QA auditing",
      "custom_tooltip": "<b>Rigorous pilot QA auditing</b><br>Implement immediate and rigorous contamination auditing on all pilot volume using designated QA personnel. Establish daily synchronization meetings between pilot logistics and QA hub management to adjust throughput rates based on initial contamination findings.<br><b>Resources needed:</b><br><ul><li>QA Triage Personnel</li><li>Contamination Audit Checklists</li><li>Pilot Logistics Lead</li></ul>",
      "start_date": "2027-10-16",
      "duration": 8.0,
      "progress": 0,
      "open": true,
      "meta": "19914bc4-82ad-4815-90f7-f8aa5414b4f3 FS",
      "parent": "eadd23e5-1511-4e5d-9d97-fcc014b09729"
    },
    {
      "id": "c833a5bb-48e1-4438-b984-7716dc46d357",
      "text": "Pilot procedural refinement",
      "custom_tooltip": "<b>Pilot procedural refinement</b><br>Conduct a formal &#x27;Lessons Learned&#x27; review board immediately after the pilot phase. This must result in defined procedural changes for identification or sorting, authorized for national rollout implementation with a potential one-week pause in national ramp-up if critical changes are mandated.<br><b>Resources needed:</b><br><ul><li>Cross-functional Review Board (Operations, QA, Legal)</li><li>Procedural Manual Template</li><li>Decision Sign-off Authority</li></ul>",
      "start_date": "2027-10-24",
      "duration": 8.0,
      "progress": 0,
      "open": true,
      "meta": "eadd23e5-1511-4e5d-9d97-fcc014b09729 FF, 1046a863-9f18-4aa5-a47e-e709cc4ef863 FS",
      "parent": "eadd23e5-1511-4e5d-9d97-fcc014b09729"
    },
    {
      "id": "7163ed2b-a81e-4861-9ced-76b06e1b001b",
      "text": "Audit Pilot Performance Against Identification and Compliance Metrics",
      "custom_tooltip": "<b>Audit Pilot Performance Against Identification and Compliance Metrics</b>",
      "progress": 0,
      "open": true,
      "meta": "eadd23e5-1511-4e5d-9d97-fcc014b09729 FS",
      "parent": "39caf833-1344-49b6-a26a-b40e7dae4903",
      "type": "project"
    },
    {
      "id": "b4280465-7485-4d3c-a055-caac0678ca12",
      "text": "Quantify Pilot Contamination Rates",
      "custom_tooltip": "<b>Quantify Pilot Contamination Rates</b><br>Establish precise contamination levels found in pilot returns, categorizing by source (e.g., foreign material, unacceptable cleaning residues). This requires immediate, rigorous QA triage auditing on all pilot volume using designated Level 1 sorting personnel.<br><b>Resources needed:</b><br><ul><li>Designated QA Triage Personnel</li><li>QA Hub Contamination Audit Forms</li><li>Basic Sorting Equipment</li></ul>",
      "start_date": "2027-11-01",
      "duration": 5.0,
      "progress": 0,
      "open": true,
      "meta": "7163ed2b-a81e-4861-9ced-76b06e1b001b SS",
      "parent": "7163ed2b-a81e-4861-9ced-76b06e1b001b"
    },
    {
      "id": "90558c06-7979-4005-bce7-765079554975",
      "text": "Audit QA Throughput Versus Plan",
      "custom_tooltip": "<b>Audit QA Throughput Versus Plan</b><br>Compare the actual processing speed (crates cleaned/inspected per hour) achieved during the pilot against the required throughput rates necessary for the full national launch to meet volume targets. Identify the primary bottleneck (cleaning, inspection, or storage).<br><b>Resources needed:</b><br><ul><li>Reverse Logistics Lead</li><li>QA Hub Operations Manager</li><li>Pilot Throughput Monitoring Dashboard</li></ul>",
      "start_date": "2027-11-06",
      "duration": 5.0,
      "progress": 0,
      "open": true,
      "meta": "b4280465-7485-4d3c-a055-caac0678ca12 FS",
      "parent": "7163ed2b-a81e-4861-9ced-76b06e1b001b"
    },
    {
      "id": "5e737590-fd36-4b23-9d45-6737cb56e3ec",
      "text": "Adjust Operational Procedures Based on Audit",
      "custom_tooltip": "<b>Adjust Operational Procedures Based on Audit</b><br>Based on the throughput audit and contamination findings, formulate mandatory procedural adjustments for QA Hub management, including revised cleaning protocols or staffing coefficients required for the national scale-up.<br><b>Resources needed:</b><br><ul><li>Circular Economy Consultant</li><li>QA Hub System Architect</li><li>Cleaning Agent Certification Lead</li></ul>",
      "start_date": "2027-11-11",
      "duration": 5.0,
      "progress": 0,
      "open": true,
      "meta": "90558c06-7979-4005-bce7-765079554975 FS",
      "parent": "7163ed2b-a81e-4861-9ced-76b06e1b001b"
    },
    {
      "id": "58c954cf-09de-43a4-9c44-a8864335cb90",
      "text": "Formalize Learning Sign-off",
      "custom_tooltip": "<b>Formalize Learning Sign-off</b><br>Conduct a documented review meeting with all workstream leads (Logistics, QA, Consumer Incentive) to formally approve the revised operational procedures and sign off that all critical pilot shortcomings have been addressed prior to commencing national rollout preparation.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Workstream Leads (cross-functional)</li><li>Meeting Minutes &amp; Action Tracker</li></ul>",
      "start_date": "2027-11-16",
      "duration": 5.0,
      "progress": 0,
      "open": true,
      "meta": "7163ed2b-a81e-4861-9ced-76b06e1b001b FF, 5e737590-fd36-4b23-9d45-6737cb56e3ec FS",
      "parent": "7163ed2b-a81e-4861-9ced-76b06e1b001b"
    },
    {
      "id": "ec07c54a-ea0b-4218-81d0-6bb1fb2d9010",
      "text": "Obtain EPA Reuse Certification (Dependency Check)",
      "custom_tooltip": "<b>Obtain EPA Reuse Certification (Dependency Check)</b>",
      "progress": 0,
      "open": true,
      "meta": "7163ed2b-a81e-4861-9ced-76b06e1b001b FS",

      "type": "project"
    },
    {
      "id": "d6aafd2e-c08e-441d-80e3-223e877bc5a2",
      "text": "Submit pilot cleaning data proactively",
      "custom_tooltip": "<b>Submit pilot cleaning data proactively</b><br>Proactively submit the preliminary data documenting the efficiency and efficacy of the utilized cleaning agents during the Q2 pilot phase to the Danish EPA. This aims to preemptively address potential queries or requests for supplementary testing data related to contamination efficacy, ensuring the reuse certification stays on track.<br><b>Resources needed:</b><br><ul><li>Regulatory &amp; Compliance Assessor</li><li>Circular Economy Consultant (Expert 1)</li><li>Pilot Cleaning Performance Data</li></ul>",
      "start_date": "2027-11-21",
      "duration": 12.0,
      "progress": 0,
      "open": true,
      "meta": "ec07c54a-ea0b-4218-81d0-6bb1fb2d9010 SS",
      "parent": "ec07c54a-ea0b-4218-81d0-6bb1fb2d9010"
    },
    {
      "id": "cc2ab9b4-7e7c-4955-b1a8-b11156e4cfe3",
      "text": "Prepare contingency cleaning protocol",
      "custom_tooltip": "<b>Prepare contingency cleaning protocol</b><br>Develop an alternative, low-volume cleaning protocol suitable only for pilot-scale material processing. This is a contingency measure designed to ensure the operational audit (QA Hub processing) can still proceed even if the final, preferred EPA reuse certification is delayed past the dependency date.<br><b>Resources needed:</b><br><ul><li>Reverse Logistics &amp; QA Operations Lead</li><li>Cleaning Agents Technical Specialist</li><li>QA Hub Operations Team</li></ul>",
      "start_date": "2027-12-03",
      "duration": 12.0,
      "progress": 0,
      "open": true,
      "meta": "d6aafd2e-c08e-441d-80e3-223e877bc5a2 FS",
      "parent": "ec07c54a-ea0b-4218-81d0-6bb1fb2d9010"
    },
    {
      "id": "b275357e-84e6-4c9f-ac82-e17311e9638c",
      "text": "Address EPA feedback and secure certification",
      "custom_tooltip": "<b>Address EPA feedback and secure certification</b><br>Manage all subsequent communication and documentation required by the Danish EPA following the initial submission review. This includes responding to requests for clarification and securing the final, written reuse certification sign-off by the established dependency date.<br><b>Resources needed:</b><br><ul><li>Regulatory &amp; Compliance Assessor</li><li>Legal Counsel</li><li>Danish Environmental Protection Agency (EPA)</li></ul>",
      "start_date": "2027-12-15",
      "duration": 12.0,
      "progress": 0,
      "open": true,
      "meta": "ec07c54a-ea0b-4218-81d0-6bb1fb2d9010 FF, cc2ab9b4-7e7c-4955-b1a8-b11156e4cfe3 FS",
      "parent": "ec07c54a-ea0b-4218-81d0-6bb1fb2d9010"
    },
    {
      "id": "99ff4470-1682-46cc-b8e9-57d8575ffd1a",
      "text": "Implement Q2 Learnings into Full National Rollout Procedures",
      "custom_tooltip": "<b>Implement Q2 Learnings into Full National Rollout Procedures</b>",
      "progress": 0,
      "open": true,
      "meta": "39caf833-1344-49b6-a26a-b40e7dae4903 FF, ec07c54a-ea0b-4218-81d0-6bb1fb2d9010 FS",
      "parent": "39caf833-1344-49b6-a26a-b40e7dae4903",
      "type": "project"
    },
    {
      "id": "ae2a8b3e-1cbc-4be3-a252-ebfa0cc2115e",
      "text": "Finalize Pilot Learning Review Board",
      "custom_tooltip": "<b>Finalize Pilot Learning Review Board</b><br>Convene a dedicated, cross-functional review board including leads from Logistics, QA, Marketing, and Finance. The board&#x27;s mandate is to analyze all data collected during the Q2 pilot phase to synthesize actionable insights regarding consumer behavior, operational efficiency, and contamination rates. This must include members authorized to mandate changes to national rollout procedures.<br><b>Resources needed:</b><br><ul><li>Cross-functional management team (Director/Senior Manager Level)</li><li>Pilot Data Analyst Report</li><li>Steering Committee Authority</li></ul>",
      "start_date": "2027-12-27",
      "duration": 5.0,
      "progress": 0,
      "open": true,
      "meta": "99ff4470-1682-46cc-b8e9-57d8575ffd1a SS",
      "parent": "99ff4470-1682-46cc-b8e9-57d8575ffd1a"
    },
    {
      "id": "5af77046-4602-4a35-a3f7-a8242a3fe9b2",
      "text": "Implement Critical Procedural Changes",
      "custom_tooltip": "<b>Implement Critical Procedural Changes</b><br>Based on the Review Board&#x27;s findings, immediately revise and update all standard operating procedures (SOPs), training manuals, and visual guides for the national rollout. Focus on incorporating necessary adjustments to identification clarity, triage protocols, and logistics handoffs to prevent recurrence of pilot-identified errors. Ensure all changes are cost-assessed before approval.<br><b>Resources needed:</b><br><ul><li>SOP Writers/Technical Manual Authors</li><li>QA Hub Operations Lead</li><li>Budget Steward (for cost assessment)</li></ul>",
      "start_date": "2028-01-01",
      "duration": 5.0,
      "progress": 0,
      "open": true,
      "meta": "ae2a8b3e-1cbc-4be3-a252-ebfa0cc2115e FS",
      "parent": "99ff4470-1682-46cc-b8e9-57d8575ffd1a"
    },
    {
      "id": "27934b0d-4102-49d1-b209-4b43aeec826f",
      "text": "Mandate and Execute Rollout Pause Decision",
      "custom_tooltip": "<b>Mandate and Execute Rollout Pause Decision</b><br>If the Review Board identifies any Tier 1 critical procedural flaws that fundamentally compromise the 40% recovery target or regulatory compliance (e.g., unexpected contamination risk), the Project Manager must formally recommend and enforce a mandatory pause on the national launch timeline. This task includes formal communication of the timeline slip and the required corrective actions to all upper management sponsors.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Executive Sponsor Approval</li><li>Formal Communication Templates</li></ul>",
      "start_date": "2028-01-06",
      "duration": 5.0,
      "progress": 0,
      "open": true,
      "meta": "5af77046-4602-4a35-a3f7-a8242a3fe9b2 FS",
      "parent": "99ff4470-1682-46cc-b8e9-57d8575ffd1a"
    },
    {
      "id": "8f3afa96-115d-438c-8e98-c43f26786093",
      "text": "Validate Updated Training Materials",
      "custom_tooltip": "<b>Validate Updated Training Materials</b><br>Distribute the revised SOPs and training materials to all contracted QA Hub staff, 3rd-party logistics partners, and key retail liaisons. Conduct rapid refresher training sessions (virtual or on-site) to ensure 100% compliance with new procedures before the Q3 national launch moves forward. Track completion rates per stakeholder group.<br><b>Resources needed:</b><br><ul><li>Training Coordinator</li><li>HSE/Compliance Officer</li><li>Digital Training Platform Access</li></ul>",
      "start_date": "2028-01-11",
      "duration": 5.0,
      "progress": 0,
      "open": true,
      "meta": "99ff4470-1682-46cc-b8e9-57d8575ffd1a FF, 27934b0d-4102-49d1-b209-4b43aeec826f FS",
      "parent": "99ff4470-1682-46cc-b8e9-57d8575ffd1a"
    },
    {
      "id": "cb2483f9-ffd0-4d69-9d07-3d4a6bd34b93",
      "text": "National Rollout and Supply Chain Integration",
      "custom_tooltip": "<b>National Rollout and Supply Chain Integration</b>",
      "progress": 0,
      "open": true,
      "meta": "83e3eb61-0e53-4a94-9e79-281eec7ead03 FF, 39caf833-1344-49b6-a26a-b40e7dae4903 FS",
      "parent": "83e3eb61-0e53-4a94-9e79-281eec7ead03",
      "type": "project"
    },
    {
      "id": "e693acfa-75f3-4dfe-97cb-f4525f476b67",
      "text": "Execute Nationwide Campaign Launch (Q3 Start)",
      "custom_tooltip": "<b>Execute Nationwide Campaign Launch (Q3 Start)</b>",
      "progress": 0,
      "open": true,
      "meta": "cb2483f9-ffd0-4d69-9d07-3d4a6bd34b93 SS",
      "parent": "cb2483f9-ffd0-4d69-9d07-3d4a6bd34b93",
      "type": "project"
    },
    {
      "id": "bcc2257a-8980-48f9-b6e4-fbf0ff4a2b36",
      "text": "Pre-schedule National Launch Communications",
      "custom_tooltip": "<b>Pre-schedule National Launch Communications</b><br>Finalize deadlines and required data exchange formats for all distribution centers and key retail/municipal partners 14 days prior to the official Q3 national launch kickoff date. This ensures logistical readiness across all collection channels simultaneously.<br><b>Resources needed:</b><br><ul><li>Logistics Coordinator</li><li>Stakeholder Relations Manager</li><li>Distribution Center Contacts</li></ul>",
      "start_date": "2028-01-16",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "e693acfa-75f3-4dfe-97cb-f4525f476b67 SS",
      "parent": "e693acfa-75f3-4dfe-97cb-f4525f476b67"
    },
    {
      "id": "b9052ee0-9040-4a54-80b7-8c6f157f9ef1",
      "text": "Buffer Initial Retailer Onboarding Support",
      "custom_tooltip": "<b>Buffer Initial Retailer Onboarding Support</b><br>Mobilize Field Support teams in high-visibility launch zones to provide immediate, on-site assistance to supermarket staff managing the initial influx of returns and validating in-store signage setup. This mitigates initial operational friction.<br><b>Resources needed:</b><br><ul><li>Field Support Specialists (3 Teams)</li><li>Training Manuals</li><li>Travel Budget</li></ul>",
      "start_date": "2028-01-18",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "bcc2257a-8980-48f9-b6e4-fbf0ff4a2b36 FS",
      "parent": "e693acfa-75f3-4dfe-97cb-f4525f476b67"
    },
    {
      "id": "e74137b4-ab10-47bd-b8fa-da3dccde967d",
      "text": "Monitor Q3 Initial Recovery Rate Against Forecast",
      "custom_tooltip": "<b>Monitor Q3 Initial Recovery Rate Against Forecast</b><br>Establish a daily tracking dashboard to compare actual crate volumes collected from Municipal and Retail channels against the pre-launch quarterly recovery forecast. Set clear escalation paths for immediate management notification if tracking falls below 90% of the target rate.<br><b>Resources needed:</b><br><ul><li>Data Analyst</li><li>Project Management Software</li><li>Executive Reporting Template</li></ul>",
      "start_date": "2028-01-20",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "b9052ee0-9040-4a54-80b7-8c6f157f9ef1 FS",
      "parent": "e693acfa-75f3-4dfe-97cb-f4525f476b67"
    },
    {
      "id": "0a2b6aef-e65d-431d-ba44-4cd2862525c2",
      "text": "Execute Initial Retailer Compliance Audits",
      "custom_tooltip": "<b>Execute Initial Retailer Compliance Audits</b><br>Conduct rapid, remote compliance checks on a sample (30%) of participating supermarkets one week post-launch to verify correct application of in-store signage and proper handling procedures, addressing early signs of non-adherence.<br><b>Resources needed:</b><br><ul><li>Field Support Specialists</li><li>Compliance Checklist Tool</li></ul>",
      "start_date": "2028-01-22",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "e693acfa-75f3-4dfe-97cb-f4525f476b67 FF, e74137b4-ab10-47bd-b8fa-da3dccde967d FS",

    {
      "id": "d9f2ecd3-a68a-4f2c-bcb1-e174cc06b745",
      "text": "Manage Daily QA Hub Triage and Cleaning Operations",
      "custom_tooltip": "<b>Manage Daily QA Hub Triage and Cleaning Operations</b>",
      "progress": 0,
      "open": true,
      "meta": "e693acfa-75f3-4dfe-97cb-f4525f476b67 FS",
      "parent": "cb2483f9-ffd0-4d69-9d07-3d4a6bd34b93",
      "type": "project"
    },
    {
      "id": "cfbd6002-5214-45cc-8236-2e4955a1a12f",
      "text": "Daily QA Triage Auditing Protocol",
      "custom_tooltip": "<b>Daily QA Triage Auditing Protocol</b><br>Establish a daily, structured audit schedule specifically for material received from different collection streams (municipal vs. retail) to pinpoint sources of contamination immediately post-pilot. Objective: Maintain contamination below 2% to ensure processing efficiency.<br><b>Resources needed:</b><br><ul><li>QA Hub Lead</li><li>Dedicated Triage Auditors</li><li>Contamination Tracking Spreadsheet</li></ul>",
      "start_date": "2028-01-24",
      "duration": 19.0,
      "progress": 0,
      "open": true,
      "meta": "d9f2ecd3-a68a-4f2c-bcb1-e174cc06b745 SS",
      "parent": "d9f2ecd3-a68a-4f2c-bcb1-e174cc06b745"
    },
    {
      "id": "02780fa3-4b84-4df2-bbb1-a02bdf39dabf",
      "text": "Adjust Cleaning Protocols Post-Audit",
      "custom_tooltip": "<b>Adjust Cleaning Protocols Post-Audit</b><br>Based on daily contamination reports, revise the concentration of cleaning agents or the frequency of manual sorting for high-risk batches. This requires rapid decision-making power integrated into the daily shift structure.<br><b>Resources needed:</b><br><ul><li>Chemical Engineer Consultant</li><li>QA Hub Supervisors</li><li>Inventory of Cleaning Agents</li></ul>",
      "start_date": "2028-02-12",
      "duration": 19.0,
      "progress": 0,
      "open": true,
      "meta": "cfbd6002-5214-45cc-8236-2e4955a1a12f FS",
      "parent": "d9f2ecd3-a68a-4f2c-bcb1-e174cc06b745"
    },
    {
      "id": "3e87c714-69ae-4b82-a978-02109e5d1d9f",
      "text": "Synchronization Meetings for Throughput",
      "custom_tooltip": "<b>Synchronization Meetings for Throughput</b><br>Hold mandatory, brief (15-minute) weekly synchronization meetings between the Logistics Lead and the QA Hub Management team to compare actual material throughput against the required daily processing rate needed to meet the annual target.<br><b>Resources needed:</b><br><ul><li>Logistics Manager</li><li>QA Operations Coordinator</li><li>Performance Dashboard Access</li></ul>",
      "start_date": "2028-03-02",
      "duration": 19.0,
      "progress": 0,
      "open": true,
      "meta": "02780fa3-4b84-4df2-bbb1-a02bdf39dabf FS",
      "parent": "d9f2ecd3-a68a-4f2c-bcb1-e174cc06b745"
    },
    {
      "id": "391bd96a-5c7f-4458-8946-54610aaeeafa",
      "text": "Adjusting Sorting Capacity Ratios",
      "custom_tooltip": "<b>Adjusting Sorting Capacity Ratios</b><br>If contamination or volume variance persists over three consecutive weeks, adjust the internal labor allocation within the QA hubs (shifting staff from inspection to primary cleaning) to align with the reality of inbound material quality.<br><b>Resources needed:</b><br><ul><li>FTE Staffing Coordinator</li><li>HR Liaison</li><li>Weekly Performance Reports</li></ul>",
      "start_date": "2028-03-21",
      "duration": 19.0,
      "progress": 0,
      "open": true,
      "meta": "d9f2ecd3-a68a-4f2c-bcb1-e174cc06b745 FF, 3e87c714-69ae-4b82-a978-02109e5d1d9f FS",
      "parent": "d9f2ecd3-a68a-4f2c-bcb1-e174cc06b745"
    },
    {
      "id": "b9e28795-8991-4145-b354-7d7b2ea8caf9",
      "text": "Conduct System Integration Test: RTSDR to Arla Procurement",
      "custom_tooltip": "<b>Conduct System Integration Test: RTSDR to Arla Procurement</b>",
      "progress": 0,
      "open": true,
      "meta": "d9f2ecd3-a68a-4f2c-bcb1-e174cc06b745 FS",
      "parent": "cb2483f9-ffd0-4d69-9d07-3d4a6bd34b93",
      "type": "project"
    },
    {
      "id": "6846f830-ded4-44b6-87c9-c414d308cf92",
      "text": "Define RTSDR Data Structure",
      "custom_tooltip": "<b>Define RTSDR Data Structure</b><br>Collaborate with Procurement to finalize the exact data fields, format (e.g., CSV, API structure), and required metadata for the &#x27;Ready-to-Deploy Stock Report&#x27; (RTSDR) based on recovered crate volume readiness.<br><b>Resources needed:</b><br><ul><li>QA Hub Logistics Lead</li><li>Procurement &amp; Asset Lifecycle Liaison</li><li>Data Architect</li></ul>",
      "start_date": "2028-04-09",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "b9e28795-8991-4145-b354-7d7b2ea8caf9 SS",
      "parent": "b9e28795-8991-4145-b354-7d7b2ea8caf9"
    },
    {
      "id": "d5d71f9c-5ae6-413d-adfe-4f0e005c573f",
      "text": "Integrate RTSDR with ERP System",
      "custom_tooltip": "<b>Integrate RTSDR with ERP System</b><br>Conduct technical spike/dry run to integrate the output of the QA Hub tracking system with Arla Procurement&#x27;s main ERP forecasting software, ensuring data mapping accuracy for production planning.<br><b>Resources needed:</b><br><ul><li>IT Systems Integrator</li><li>Procurement ERP Specialist</li><li>QA Hub Data Manager</li></ul>",
      "start_date": "2028-04-12",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "6846f830-ded4-44b6-87c9-c414d308cf92 FS",
      "parent": "b9e28795-8991-4145-b354-7d7b2ea8caf9"
    },
    {
      "id": "6a1a2d4a-40a7-426e-a8e8-9e2ca41517b9",
      "text": "Finalize Data Exchange Protocol",
      "custom_tooltip": "<b>Finalize Data Exchange Protocol</b><br>Formally establish, document, and secure written agreement on the exact timing, frequency (monthly), and error handling protocol for the &#x27;Ready-to-Deploy Stock Report&#x27; exchange, meeting the September 3rd dependency.<br><b>Resources needed:</b><br><ul><li>Financial Controller</li><li>Procurement Liaison</li><li>Legal Counsel</li></ul>",
      "start_date": "2028-04-15",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "d5d71f9c-5ae6-413d-adfe-4f0e005c573f FS",
      "parent": "b9e28795-8991-4145-b354-7d7b2ea8caf9"
    },
    {
      "id": "ad46bca7-9090-441e-9869-cba52f7aaa67",
      "text": "Conduct Synchronization Meeting",
      "custom_tooltip": "<b>Conduct Synchronization Meeting</b><br>Hold the first formal, mandatory monthly synchronization meeting between QA Hub Logistics and Arla Procurement post-protocol signing to review initial Q3 data integrity and confirm readiness for Q4 supply chain adjustments.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Logistics Team Lead</li><li>Procurement Manager</li></ul>",
      "start_date": "2028-04-18",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "b9e28795-8991-4145-b354-7d7b2ea8caf9 FF, 6a1a2d4a-40a7-426e-a8e8-9e2ca41517b9 FS",
      "parent": "b9e28795-8991-4145-b354-7d7b2ea8caf9"
    },
    {
      "id": "4f81ea08-6155-44f0-adbe-b70b203b85d5",
      "text": "Execute Q4 Incentive Uplift if Volume Targets are Lagging",
      "custom_tooltip": "<b>Execute Q4 Incentive Uplift if Volume Targets are Lagging</b>",
      "progress": 0,
      "open": true,
      "meta": "b9e28795-8991-4145-b354-7d7b2ea8caf9 FS",
      "parent": "cb2483f9-ffd0-4d69-9d07-3d4a6bd34b93",
      "type": "project"
    },
    {
      "id": "d688aaad-d17c-4755-9b40-196da168ba4c",
      "text": "Set volume performance thresholds now",
      "custom_tooltip": "<b>Set volume performance thresholds now</b><br>Establish clear quantitative volume performance thresholds for the end of Q3. These thresholds must define the exact level of recovery (e.g., 34% target vs. 30% actual) that triggers the need for an immediate incentive adjustment. This requires defining success metrics derived from the pilot phase.<br><b>Resources needed:</b><br><ul><li>Financial Controller</li><li>Incentive Specialist</li><li>Quantitative Analyst</li></ul>",
      "start_date": "2028-04-21",
      "duration": 7.0,
      "progress": 0,
      "open": true,
      "meta": "4f81ea08-6155-44f0-adbe-b70b203b85d5 SS",
      "parent": "4f81ea08-6155-44f0-adbe-b70b203b85d5"
    },
    {
      "id": "dff2f63e-4db0-4383-b1ec-463833f360f4",
      "text": "Model and pre-approve Q4 incentive uplift scenarios",
      "custom_tooltip": "<b>Model and pre-approve Q4 incentive uplift scenarios</b><br>Develop two distinct, pre-tested financial scenarios for boosting the DKK 5 incentive (e.g., Scenario A: Increase to DKK 7; Scenario B: Introduce match voucher). These scenarios should project the required budget increase and expected volume lift to ensure they are ready for instantaneous deployment.<br><b>Resources needed:</b><br><ul><li>Behavioral Economist</li><li>Financial Controller</li><li>Legal Counsel</li></ul>",
      "start_date": "2028-04-28",
      "duration": 7.0,
      "progress": 0,
      "open": true,
      "meta": "d688aaad-d17c-4755-9b40-196da168ba4c FS",
      "parent": "4f81ea08-6155-44f0-adbe-b70b203b85d5"
    },
    {
      "id": "afa03ddf-0436-4f2a-8bd2-4c71be2c65c8",
      "text": "Secure leadership authorization for potential deployment",
      "custom_tooltip": "<b>Secure leadership authorization for potential deployment</b><br>Present the modeled Q4 uplift scenarios (set in Step 2) to Arla Finance and Executive Steering Committee by October 1st. Obtain explicit, binding authorization to deploy the necessary contingency budget funds immediately if the Q3 performance threshold is breached.<br><b>Resources needed:</b><br><ul><li>Project Director</li><li>Executive Sponsor</li><li>Budget Steward</li></ul>",
      "start_date": "2028-05-05",
      "duration": 7.0,
      "progress": 0,
      "open": true,
      "meta": "dff2f63e-4db0-4383-b1ec-463833f360f4 FS",
      "parent": "4f81ea08-6155-44f0-adbe-b70b203b85d5"
    },
    {
      "id": "752e1f04-196b-467e-bfd1-cef9dc8b36a5",
      "text": "Execute confirmed Q4 incentive increase rapidly",
      "custom_tooltip": "<b>Execute confirmed Q4 incentive increase rapidly</b><br>If the Q3 performance threshold is breached (as documented in Step 1), immediately activate the pre-approved Q4 incentive uplift scenario chosen in Step 2. Communicate the temporary incentive increase across all channels and implement within 7 days.<br><b>Resources needed:</b><br><ul><li>Incentive Specialist</li><li>PR &amp; Marketing Team</li><li>Retail Supply Chain Specialist</li></ul>",
      "start_date": "2028-05-12",
      "duration": 7.0,
      "progress": 0,
      "open": true,
      "meta": "4f81ea08-6155-44f0-adbe-b70b203b85d5 FF, afa03ddf-0436-4f2a-8bd2-4c71be2c65c8 FS",
      "parent": "4f81ea08-6155-44f0-adbe-b70b203b85d5"
    },
    {
      "id": "df1b9848-2f4a-4c93-858d-4261e3d6f6e1",
      "text": "Complete Final Donation Transfer to Arla Foundation (Year-End)",
      "custom_tooltip": "<b>Complete Final Donation Transfer to Arla Foundation (Year-End)</b>",
      "progress": 0,
      "open": true,
      "meta": "cb2483f9-ffd0-4d69-9d07-3d4a6bd34b93 FF, 4f81ea08-6155-44f0-adbe-b70b203b85d5 FS",
      "parent": "cb2483f9-ffd0-4d69-9d07-3d4a6bd34b93",
      "type": "project"
    },
    {
      "id": "ed46fbc4-9377-4209-8795-91a96e2bc91a",
      "text": "Finalize Q4 Performance Data",
      "custom_tooltip": "<b>Finalize Q4 Performance Data</b><br>Compile all official performance metrics from the campaign, including finalized crate recovery volume, verified CO2 reduction data, and audited social media impression counts, ensuring all data sources are reconciled.<br><b>Resources needed:</b><br><ul><li>QA Hub Audit Lead</li><li>Financial Controller</li><li>Digital Analytics Specialist</li></ul>",
      "start_date": "2028-05-19",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "df1b9848-2f4a-4c93-858d-4261e3d6f6e1 SS",
      "parent": "df1b9848-2f4a-4c93-858d-4261e3d6f6e1"
    },
    {
      "id": "7aa43b70-4220-43cc-a91f-160beba5ca00",
      "text": "Conduct Final Donation Calculation Audit",
      "custom_tooltip": "<b>Conduct Final Donation Calculation Audit</b><br>Verify the total invoiced donation amount based on the final, audited volume and the fixed 5 DKK per-unit rate. This requires reconciliation between the QA Hub output report and the Financial ledger to prevent discrepancies.<br><b>Resources needed:</b><br><ul><li>Financial Controller</li><li>Arla Foundation Liaison</li></ul>",
      "start_date": "2028-05-21",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "ed46fbc4-9377-4209-8795-91a96e2bc91a FS",
      "parent": "df1b9848-2f4a-4c93-858d-4261e3d6f6e1"
    },
    {
      "id": "a6f12988-2e8f-4224-8a5f-723eb5273240",
      "text": "Approve Final Transfer Documentation",
      "custom_tooltip": "<b>Approve Final Transfer Documentation</b><br>Secure mandatory sign-off from Arla Finance and the Head of CSR on the final donation figure and the required legal documentation for the transfer of funds to the Arla Foundation.<br><b>Resources needed:</b><br><ul><li>Head of CSR</li><li>Arla Finance Signatory</li><li>Legal Counsel</li></ul>",
      "start_date": "2028-05-23",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "7aa43b70-4220-43cc-a91f-160beba5ca00 FS",
      "parent": "df1b9848-2f4a-4c93-858d-4261e3d6f6e1"
    },
    {
      "id": "895f67dc-940a-4815-a7bb-23b71f2715b1",
      "text": "Execute Funds Transfer and Acknowledge Receipt",
      "custom_tooltip": "<b>Execute Funds Transfer and Acknowledge Receipt</b><br>Initiate the official banking transfer of the finalized DKK amount to the Arla Foundation account, and obtain formal written acknowledgment confirming successful receipt and allocation.<br><b>Resources needed:</b><br><ul><li>Treasury Department</li><li>Arla Foundation Accounting Team</li></ul>",
      "start_date": "2028-05-25",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "df1b9848-2f4a-4c93-858d-4261e3d6f6e1 FF, a6f12988-2e8f-4224-8a5f-723eb5273240 FS",
      "parent": "df1b9848-2f4a-4c93-858d-4261e3d6f6e1"
    }

    function zoomFit() {
        const tasks = gantt.getTaskByTime();
        if (tasks.length > 0) {
            const firstTask = tasks[0];
            const lastTask = tasks[tasks.length - 1];
            gantt.showDate(firstTask.start_date);
            
            // Calculate total duration in days
            const startDate = new Date(firstTask.start_date);
            const endDate = new Date(lastTask.end_date);
            const durationDays = (endDate - startDate) / (1000 * 60 * 60 * 24);
            
            // Choose appropriate scale based on duration
            if (durationDays > 3650) { // More than 10 years
                gantt.config.scale_unit = "year";
                gantt.config.step = 10;
                gantt.config.subscales = [
                    {unit: "year", step: 1, date: "%Y"}
                ];
            } else if (durationDays > 365) { // More than 1 year
                gantt.config.scale_unit = "year";
                gantt.config.step = 1;
                gantt.config.subscales = [
                    {unit: "month", step: 1, date: "%M"}
                ];
            } else if (durationDays > 30) { // More than 1 month
                gantt.config.scale_unit = "month";
                gantt.config.step = 1;
                gantt.config.subscales = [
                    {unit: "day", step: 1, date: "%d"}
                ];
            } else if (durationDays > 7) { // More than 1 week
                gantt.config.scale_unit = "week";
                gantt.config.step = 1;
                gantt.config.subscales = [
                    {unit: "day", step: 1, date: "%d"}
                ];
            } else {
                gantt.config.scale_unit = "day";
                gantt.config.step = 1;
                gantt.config.subscales = [];
            }
            gantt.render();
        }
    }

    function zoomIn() {
        const currentUnit = gantt.config.scale_unit;
        const currentStep = gantt.config.step;
        
        if (currentUnit === "year" && currentStep === 10) {
            gantt.config.scale_unit = "year";
            gantt.config.step = 1;
            gantt.config.subscales = [
                {unit: "month", step: 1, date: "%M"}
            ];
        } else if (currentUnit === "year") {
            gantt.config.scale_unit = "month";
            gantt.config.step = 1;
            gantt.config.subscales = [
                {unit: "day", step: 1, date: "%d"}
            ];
        } else if (currentUnit === "month") {
            gantt.config.scale_unit = "week";
            gantt.config.step = 1;
            gantt.config.subscales = [
                {unit: "day", step: 1, date: "%d"}
            ];
        } else if (currentUnit === "week") {
            gantt.config.scale_unit = "day";
            gantt.config.step = 1;
            gantt.config.subscales = [];
        }
        gantt.render();
    }

    function zoomOut() {
        const currentUnit = gantt.config.scale_unit;
        const currentStep = gantt.config.step;
        
        if (currentUnit === "day") {
            gantt.config.scale_unit = "week";
            gantt.config.step = 1;
            gantt.config.subscales = [
                {unit: "day", step: 1, date: "%d"}
            ];
        } else if (currentUnit === "week") {
            gantt.config.scale_unit = "month";
            gantt.config.step = 1;
            gantt.config.subscales = [
                {unit: "day", step: 1, date: "%d"}
            ];
        } else if (currentUnit === "month") {
            gantt.config.scale_unit = "year";
            gantt.config.step = 1;
            gantt.config.subscales = [
                {unit: "month", step: 1, date: "%M"}
            ];
        } else if (currentUnit === "year") {
            gantt.config.scale_unit = "year";
            gantt.config.step = 10;
            gantt.config.subscales = [
                {unit: "year", step: 1, date: "%Y"}
            ];
        }
        gantt.render();
    }

    function downloadCSV() {
        if (GANTT_DATA_CSV === null) {
            return;
        }
        const blob = new Blob([GANTT_DATA_CSV], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        const url = URL.createObjectURL(blob);
        link.setAttribute('href', url);
        link.setAttribute('download', GANTT_FILENAME_CSV);
        link.style.visibility = 'hidden';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    // Gantt Initialization
    gantt.config.readonly = true;
    gantt.config.date_format = "%Y-%m-%d";
    gantt.config.scale_unit = "month";
    gantt.config.step = 1;
    gantt.config.subscales = [
        {unit: "day", step: 1, date: "%d"}
    ];

    gantt.config.columns = [
        {name:"text", label:"Task name", width:"*", tree:true},
        // {name:"start_date", label:"Start time", align: "center"},
        // {name:"duration", label:"Duration", align: "center"}
    ];

    gantt.templates.task_class = function(start, end, task) {
        if (task.type === "project") {
            return "project-task";
        }
        return "";
    };

    gantt.templates.tooltip_text = function(start, end, task) {
        return task.custom_tooltip || "No tooltip";
    };
    
	gantt.plugins({
		tooltip: true
	});
	gantt.attachEvent("onGanttReady", function(){
		var tooltips = gantt.ext.tooltips;
		tooltips.tooltip.setViewport(gantt.$task_data);
	});
    gantt.init("gantt_container");
    gantt.parse(GANTT_DATA_DHTMLX);

    // Hide the export to CSV button if there is no CSV data
    if (GANTT_DATA_CSV === null) {
        document.getElementById('exportToCSVButton').style.display = 'none';
    }

    document.getElementById('zoomFitButton').addEventListener('click', zoomFit);
    document.getElementById('zoomInButton').addEventListener('click', zoomIn);
    document.getElementById('zoomOutButton').addEventListener('click', zoomOut);
    document.getElementById('exportToCSVButton').addEventListener('click', downloadCSV);
</script>
<!--HTML_BODY_SCRIPT_END-->
</body>
</html>
