<script type="module">
    // When `null`, the "Export to CSV" button is hidden.
    // When a string, it's the CSV data, eg: `"hello;csv;world"` and the button is shown.
    const GANTT_DATA_CSV = "project_key,project_name,project_description,project_start_date,project_end_date,project_progress,project_parent,originating_department\n66e9fe4a-de85-4279-a82b-ab94b8f485d3,Euro Adoption,\"Euro Adoption\n\nFinal deliverable:\nEuro Currency\",1/29/2026,8/29/2032,0,,PlanExe\n61d9b325-717a-4e45-a320-9153cf48a5fa,Political & Legal Feasibility Assessment,,1/29/2026,5/28/2026,0,66e9fe4a-de85-4279-a82b-ab94b8f485d3,PlanExe\ne1ff86d1-6c34-4300-b25f-bdad3926ba19,Analyze EU Treaty Options,,1/29/2026,2/22/2026,0,61d9b325-717a-4e45-a320-9153cf48a5fa,PlanExe\n1a8f5202-aaf8-4018-89bb-2d8f4d4593b0,Identify Relevant EU Treaties,\"Identify Relevant EU Treaties\n\nDescription:\nObjective: Identify all EU treaties potentially relevant to Denmark's euro adoption. Scope: Review all major EU treaties, including the Treaty on European Union (TEU) and the Treaty on the Functioning of the European Union (TFEU). Steps: 1. Conduct a keyword search of EU treaties. 2. Consult with EU law experts. 3. Compile a list of potentially relevant treaties. Deliverables: A list of potentially relevant EU treaties.\n\nResources needed:\n\u2022 EU Law Specialists\n\u2022 Legal Researchers\n\u2022 Treaty Databases\",1/29/2026,2/4/2026,0,e1ff86d1-6c34-4300-b25f-bdad3926ba19,PlanExe\ne999205e-0532-4cfc-a63f-a6630b0836b4,Analyze Treaty Opt-Out Clauses,\"Analyze Treaty Opt-Out Clauses\n\nDescription:\nObjective: Analyze the opt-out clauses within relevant EU treaties to determine their implications for Denmark's euro adoption. Scope: Examine the specific wording of opt-out clauses and their potential impact on the legal pathway. Steps: 1. Identify opt-out clauses in relevant treaties. 2. Analyze the legal implications of each clause. 3. Assess the feasibility of lifting the opt-out. Deliverables: A report on the implications of treaty opt-out clauses.\n\nResources needed:\n\u2022 EU Law Specialists\n\u2022 Legal Researchers\n\u2022 Treaty Databases\",2/4/2026,2/10/2026,0,1a8f5202-aaf8-4018-89bb-2d8f4d4593b0,PlanExe\ne4d8c76a-9223-4cf4-923f-ed1b2158d85f,Assess Treaty Amendment Requirements,\"Assess Treaty Amendment Requirements\n\nDescription:\nObjective: Determine if treaty amendments are necessary for Denmark's euro adoption. Scope: Evaluate the existing legal framework and identify any gaps that require treaty amendments. Steps: 1. Compare the existing legal framework with the requirements for euro adoption. 2. Identify any gaps that require treaty amendments. 3. Assess the feasibility of treaty amendments. Deliverables: A report on treaty amendment requirements.\n\nResources needed:\n\u2022 EU Law Specialists\n\u2022 Legal Researchers\n\u2022 Treaty Databases\",2/10/2026,2/16/2026,0,e999205e-0532-4cfc-a63f-a6630b0836b4,PlanExe\n742a408a-a7c7-4b7a-ae04-1b812bc0bd0d,Evaluate Legal Precedents,\"Evaluate Legal Precedents\n\nDescription:\nObjective: Evaluate legal precedents related to euro adoption by other EU member states. Scope: Research relevant case law and legal opinions to identify potential legal challenges and opportunities. Steps: 1. Conduct a search for relevant case law and legal opinions. 2. Analyze the legal precedents. 3. Assess the implications for Denmark's euro adoption. Deliverables: A report on relevant legal precedents.\n\nResources needed:\n\u2022 EU Law Specialists\n\u2022 Legal Researchers\n\u2022 Legal Databases\",2/16/2026,2/22/2026,0,e1ff86d1-6c34-4300-b25f-bdad3926ba19,PlanExe\n66d47056-b361-46f1-bdbb-1ec8b9edc370,Assess Legal Pathway Feasibility,,2/22/2026,3/26/2026,0,e1ff86d1-6c34-4300-b25f-bdad3926ba19,PlanExe\n01eab282-c75d-4a1b-97c4-e91dff6dc46b,Research existing legal precedents,\"Research existing legal precedents\n\nDescription:\nObjective: Identify relevant legal precedents within the EU and Denmark that could impact the feasibility of different legal pathways for euro adoption.\nScope: Review EU case law, Danish constitutional law, and relevant international agreements.\nSteps: 1. Conduct a comprehensive search of legal databases. 2. Analyze key cases and legal opinions. 3. Summarize findings and identify potential legal challenges.\nDeliverables: A report summarizing relevant legal precedents and their potential impact.\n\nResources needed:\n\u2022 EU law specialists\n\u2022 Legal researchers\n\u2022 Legal databases (LexisNexis, Westlaw)\",2/22/2026,3/2/2026,0,66d47056-b361-46f1-bdbb-1ec8b9edc370,PlanExe\n8b2498ac-1ef9-4db6-a325-62edd9354a6e,Analyze constitutional implications,\"Analyze constitutional implications\n\nDescription:\nObjective: Assess the potential constitutional implications of adopting the euro in Denmark, considering the existing opt-out clause and any necessary amendments.\nScope: Review the Danish constitution, relevant legal scholarship, and potential amendment options.\nSteps: 1. Consult with constitutional law experts. 2. Analyze potential conflicts with existing constitutional provisions. 3. Develop recommendations for addressing constitutional concerns.\nDeliverables: A legal opinion on the constitutional implications of euro adoption.\n\nResources needed:\n\u2022 Constitutional law experts\n\u2022 Legal scholars\n\u2022 Ministry of Justice officials\",3/2/2026,3/10/2026,0,01eab282-c75d-4a1b-97c4-e91dff6dc46b,PlanExe\ne58bc8e0-addf-497a-9f3d-ea1cd539c79a,Assess EU treaty compatibility,\"Assess EU treaty compatibility\n\nDescription:\nObjective: Determine the compatibility of different legal pathways with existing EU treaties and regulations.\nScope: Review relevant EU treaties, regulations, and directives.\nSteps: 1. Consult with EU law specialists. 2. Analyze potential conflicts with EU law. 3. Develop recommendations for ensuring compliance with EU law.\nDeliverables: A report assessing the compatibility of different legal pathways with EU treaties.\n\nResources needed:\n\u2022 EU law specialists\n\u2022 EU negotiation team\n\u2022 European Commission representatives\",3/10/2026,3/18/2026,0,8b2498ac-1ef9-4db6-a325-62edd9354a6e,PlanExe\nae7cb101-f0cb-427b-a490-41d25bfe1ab0,Identify potential legal challenges,\"Identify potential legal challenges\n\nDescription:\nObjective: Identify potential legal challenges to the chosen legal pathway and develop mitigation strategies.\nScope: Review relevant legal precedents, consult with legal experts, and analyze potential legal risks.\nSteps: 1. Conduct a risk assessment of potential legal challenges. 2. Develop mitigation strategies for each identified risk. 3. Consult with legal experts on the feasibility of mitigation strategies.\nDeliverables: A risk assessment report with mitigation strategies.\n\nResources needed:\n\u2022 Legal experts\n\u2022 Risk management specialists\n\u2022 Ministry of Justice officials\",3/18/2026,3/26/2026,0,66d47056-b361-46f1-bdbb-1ec8b9edc370,PlanExe\n9b1c31be-a5ea-4ba5-bbf6-4ccb6b2810ae,Evaluate Political Support within EU,,3/26/2026,4/27/2026,0,66d47056-b361-46f1-bdbb-1ec8b9edc370,PlanExe\nd226b525-78bd-4441-b9ad-dea445e2e9a1,Analyze Political Landscape in EU,\"Analyze Political Landscape in EU\n\nDescription:\nObjective: Understand the current political climate within the EU and identify key influencers and potential allies for Denmark's euro adoption. Scope: Research political parties, key figures, and their stances on euro adoption. Steps: Review EU parliamentary records, conduct interviews with political analysts, and analyze media coverage. Deliverables: A report summarizing the political landscape and identifying potential allies and obstacles.\n\nResources needed:\n\u2022 Political analysts\n\u2022 EU experts\n\u2022 Research staff\",3/26/2026,4/3/2026,0,9b1c31be-a5ea-4ba5-bbf6-4ccb6b2810ae,PlanExe\n36e58a74-5aea-4891-9af5-c618dd8948c0,Identify Key Decision-Makers in EU,\"Identify Key Decision-Makers in EU\n\nDescription:\nObjective: Identify the individuals and committees within the EU who will be involved in the decision-making process regarding Denmark's euro adoption. Scope: Map out the EU's decision-making structure and identify key players. Steps: Review EU organizational charts, consult with EU experts, and attend relevant EU meetings. Deliverables: A list of key decision-makers and their contact information.\n\nResources needed:\n\u2022 EU experts\n\u2022 Lobbyists\n\u2022 Research staff\",4/3/2026,4/11/2026,0,d226b525-78bd-4441-b9ad-dea445e2e9a1,PlanExe\n6c4b7e83-a02b-4419-939d-d90025487914,Assess Support for Euro Adoption,\"Assess Support for Euro Adoption\n\nDescription:\nObjective: Gauge the level of support for Denmark's euro adoption among EU member states and institutions. Scope: Conduct surveys and interviews to assess the sentiment towards Denmark's euro adoption. Steps: Develop survey questionnaires, conduct interviews with EU officials, and analyze survey results. Deliverables: A report summarizing the level of support for Denmark's euro adoption.\n\nResources needed:\n\u2022 Pollsters\n\u2022 EU experts\n\u2022 Research staff\",4/11/2026,4/19/2026,0,36e58a74-5aea-4891-9af5-c618dd8948c0,PlanExe\nbe30af0f-93e6-48b6-b2be-94660c75d375,Develop Persuasion Strategies for EU,\"Develop Persuasion Strategies for EU\n\nDescription:\nObjective: Develop strategies to persuade EU member states and institutions to support Denmark's euro adoption. Scope: Identify key arguments and develop persuasive messaging. Steps: Conduct research on the benefits of Denmark's euro adoption, develop persuasive messaging, and prepare presentations. Deliverables: A set of persuasion strategies and messaging materials.\n\nResources needed:\n\u2022 Communication experts\n\u2022 EU experts\n\u2022 Political strategists\",4/19/2026,4/27/2026,0,9b1c31be-a5ea-4ba5-bbf6-4ccb6b2810ae,PlanExe\n3df5a89f-bee0-4a88-b92d-011784b41610,Develop Referendum Framing Strategies,,4/27/2026,5/13/2026,0,9b1c31be-a5ea-4ba5-bbf6-4ccb6b2810ae,PlanExe\n9ba1f7cd-c66a-403c-816c-c85b99b8a501,Research Effective Framing Techniques,\"Research Effective Framing Techniques\n\nDescription:\nObjective: Identify framing techniques that resonate with the Danish public regarding euro adoption.\nScope: Review academic literature, analyze past campaigns, and conduct preliminary surveys.\nSteps: 1. Literature review. 2. Analyze successful/unsuccessful campaigns. 3. Conduct surveys. 4. Summarize findings.\nDeliverables: Report on effective framing techniques.\n\nResources needed:\n\u2022 Political scientists\n\u2022 Communication experts\n\u2022 Survey analysts\",4/27/2026,5/1/2026,0,3df5a89f-bee0-4a88-b92d-011784b41610,PlanExe\n9c3760fe-8962-4c06-b013-9001044d7e19,Develop Initial Framing Narratives,\"Develop Initial Framing Narratives\n\nDescription:\nObjective: Create several initial framing narratives for euro adoption.\nScope: Develop narratives based on research findings, targeting different demographics.\nSteps: 1. Brainstorm narratives. 2. Draft narratives. 3. Review narratives. 4. Refine narratives.\nDeliverables: Draft framing narratives.\n\nResources needed:\n\u2022 Communication experts\n\u2022 Political strategists\n\u2022 Writers\",5/1/2026,5/5/2026,0,9ba1f7cd-c66a-403c-816c-c85b99b8a501,PlanExe\n69bcd29a-3303-412c-bf27-1a87c4a867aa,Test Framing Narratives with Focus Groups,\"Test Framing Narratives with Focus Groups\n\nDescription:\nObjective: Test the effectiveness of the framing narratives with focus groups.\nScope: Conduct focus groups with diverse participants to gauge reactions to the narratives.\nSteps: 1. Recruit participants. 2. Conduct focus groups. 3. Analyze feedback. 4. Revise narratives.\nDeliverables: Focus group feedback report.\n\nResources needed:\n\u2022 Focus group facilitators\n\u2022 Recruiters\n\u2022 Analysts\",5/5/2026,5/9/2026,0,9c3760fe-8962-4c06-b013-9001044d7e19,PlanExe\n405a9611-da6a-481f-b931-e3809898c9ee,Refine Framing Based on Focus Groups,\"Refine Framing Based on Focus Groups\n\nDescription:\nObjective: Refine the framing narratives based on feedback from focus groups.\nScope: Revise narratives to address concerns and enhance appeal.\nSteps: 1. Review feedback. 2. Revise narratives. 3. Obtain approval. 4. Finalize narratives.\nDeliverables: Finalized framing narratives.\n\nResources needed:\n\u2022 Communication experts\n\u2022 Political strategists\n\u2022 Writers\",5/9/2026,5/13/2026,0,3df5a89f-bee0-4a88-b92d-011784b41610,PlanExe\n10e5d1b8-0bce-4d52-aede-3120ab6e7a53,Conduct Initial Public Opinion Polling,,5/13/2026,5/28/2026,0,61d9b325-717a-4e45-a320-9153cf48a5fa,PlanExe\n1a7dba7d-cd9a-4db6-89c2-4edc898a55c7,Design Initial Survey Instrument,\"Design Initial Survey Instrument\n\nDescription:\nDevelop a comprehensive survey instrument to gauge public opinion on euro adoption. This includes defining key questions, response scales, and demographic variables to ensure accurate and reliable data collection.\n\nResources needed:\n\u2022 Survey methodologist\n\u2022 Political scientist\n\u2022 Data analyst\",5/13/2026,5/16/2026,0,10e5d1b8-0bce-4d52-aede-3120ab6e7a53,PlanExe\n62ecae63-0dbe-4723-9729-a3b897b1ce07,Pilot Test Survey Instrument,\"Pilot Test Survey Instrument\n\nDescription:\nConduct a pilot test of the survey instrument with a small sample of the target population to identify any potential issues with question clarity, response options, or survey flow. Revise the instrument based on feedback from the pilot test.\n\nResources needed:\n\u2022 Survey participants\n\u2022 Data analyst\n\u2022 Survey methodologist\",5/16/2026,5/19/2026,0,1a7dba7d-cd9a-4db6-89c2-4edc898a55c7,PlanExe\n24dfb8dc-b2f3-4b30-9b5d-790071baf6c7,Administer Initial Public Opinion Poll,\"Administer Initial Public Opinion Poll\n\nDescription:\nAdminister the revised survey instrument to a representative sample of the Danish public. This includes selecting a sampling methodology, recruiting participants, and collecting data through online, phone, or in-person surveys.\n\nResources needed:\n\u2022 Polling agency\n\u2022 Survey administrators\n\u2022 Data collection software\",5/19/2026,5/22/2026,0,62ecae63-0dbe-4723-9729-a3b897b1ce07,PlanExe\na5e9cd86-8911-4ddd-9ff7-134b54145d8b,Analyze Initial Poll Results,\"Analyze Initial Poll Results\n\nDescription:\nAnalyze the data collected from the initial public opinion poll to assess overall support for euro adoption, identify key demographic trends, and uncover any major concerns or misconceptions about the euro. Prepare a report summarizing the findings.\n\nResources needed:\n\u2022 Data analyst\n\u2022 Statistician\n\u2022 Report writer\",5/22/2026,5/25/2026,0,24dfb8dc-b2f3-4b30-9b5d-790071baf6c7,PlanExe\n1cb3e07f-167d-45b1-9502-72827d934a7f,Disseminate Initial Findings,\"Disseminate Initial Findings\n\nDescription:\nShare the findings from the initial public opinion poll with key stakeholders, including government officials, policymakers, and the public. This may involve presenting the results at meetings, publishing reports, and issuing press releases.\n\nResources needed:\n\u2022 Public relations specialist\n\u2022 Government liaison\n\u2022 Communication team\",5/25/2026,5/28/2026,0,10e5d1b8-0bce-4d52-aede-3120ab6e7a53,PlanExe\nd4c3e8d6-71b5-4906-a7d4-904f0559a528,EU Negotiation & Legal Implementation,,5/28/2026,9/24/2027,0,61d9b325-717a-4e45-a320-9153cf48a5fa,PlanExe\n1c794f36-9a65-4673-a1ec-1d442d551b71,Negotiate Legal Pathway with EU,,5/28/2026,11/24/2026,0,d4c3e8d6-71b5-4906-a7d4-904f0559a528,PlanExe\n4d637ec9-b3c9-472c-9362-780c466ea94b,Define Denmark's Negotiation Objectives,\"Define Denmark's Negotiation Objectives\n\nDescription:\nClearly articulate Denmark's goals and priorities for euro adoption within the EU framework. This includes defining acceptable legal pathways, desired transition timelines, and any specific conditions or safeguards Denmark seeks to secure during negotiations.\n\nResources needed:\n\u2022 Ministry of Finance\n\u2022 Legal Advisory Team\n\u2022 EU Negotiation Team\n\u2022 Economic Advisory Council\",5/28/2026,7/3/2026,0,1c794f36-9a65-4673-a1ec-1d442d551b71,PlanExe\n1d9ed4a0-4931-40c2-83b0-464d9e8d9237,Research EU Member State Positions,\"Research EU Member State Positions\n\nDescription:\nGather intelligence on the positions and priorities of key EU member states regarding Denmark's euro adoption. Identify potential allies and opponents, and understand their motivations and concerns. This will inform Denmark's negotiation strategy and help anticipate potential roadblocks.\n\nResources needed:\n\u2022 EU Negotiation Team\n\u2022 Political Analysts\n\u2022 Intelligence Agencies\",7/3/2026,8/8/2026,0,4d637ec9-b3c9-472c-9362-780c466ea94b,PlanExe\nb26c5b0f-03e7-48c6-ae48-19ff2acb783e,Develop Negotiation Strategy & Tactics,\"Develop Negotiation Strategy & Tactics\n\nDescription:\nFormulate a comprehensive negotiation strategy outlining Denmark's approach to securing a favorable agreement with the EU. This includes defining negotiation tactics, identifying potential compromises, and developing fallback positions in case of disagreements.\n\nResources needed:\n\u2022 EU Negotiation Team\n\u2022 Legal Advisory Team\n\u2022 Experienced Negotiators\",8/8/2026,9/13/2026,0,1d9ed4a0-4931-40c2-83b0-464d9e8d9237,PlanExe\n719d6663-142b-4686-9482-bb57fc7391c6,Conduct Preliminary Talks with EU Officials,\"Conduct Preliminary Talks with EU Officials\n\nDescription:\nEngage in informal discussions with key EU officials to gauge their receptiveness to Denmark's proposals and identify potential areas of common ground. This will help build relationships and pave the way for formal negotiations.\n\nResources needed:\n\u2022 EU Negotiation Team\n\u2022 High-Level Diplomats\",9/13/2026,10/19/2026,0,b26c5b0f-03e7-48c6-ae48-19ff2acb783e,PlanExe\nf39c9b26-cdbf-4795-9d7b-8d5edecc04c8,Prepare Detailed Legal & Economic Impact Assessments,\"Prepare Detailed Legal & Economic Impact Assessments\n\nDescription:\nDevelop comprehensive legal and economic impact assessments to support Denmark's negotiation position. These assessments should demonstrate the benefits of euro adoption for both Denmark and the EU, and address any potential concerns or risks.\n\nResources needed:\n\u2022 Legal Advisory Team\n\u2022 Economic Advisory Council\n\u2022 Independent Experts\",10/19/2026,11/24/2026,0,1c794f36-9a65-4673-a1ec-1d442d551b71,PlanExe\n2a341622-ec8f-42b1-ab16-b5ddbf5c0637,Draft Legal Amendments & Protocols,,11/24/2026,2/8/2027,0,1c794f36-9a65-4673-a1ec-1d442d551b71,PlanExe\n4e64488c-9e94-4cbc-9e9e-453a99c87810,Research existing Danish laws,\"Research existing Danish laws\n\nDescription:\nObjective: Identify Danish laws that need amendment or replacement to align with Eurozone regulations.\nScope: Review all relevant legislation, including financial, monetary, and commercial laws.\nSteps: 1. Compile a list of Danish laws potentially affected by euro adoption. 2. Analyze each law to determine necessary changes. 3. Document findings.\nDeliverables: A comprehensive report detailing required legal changes.\n\nResources needed:\n\u2022 Legal researchers\n\u2022 Legal database access\n\u2022 EU law experts\",11/24/2026,12/13/2026,0,2a341622-ec8f-42b1-ab16-b5ddbf5c0637,PlanExe\n177b3a63-44cd-4e77-9a92-bfc2fc4f6f64,Draft amendments to Danish laws,\"Draft amendments to Danish laws\n\nDescription:\nObjective: Prepare draft amendments to Danish laws identified in the research phase.\nScope: Create specific legal language for each amendment, ensuring compliance with EU law.\nSteps: 1. Draft proposed amendments for each identified law. 2. Review drafts for legal accuracy and consistency. 3. Revise drafts based on feedback.\nDeliverables: Draft legal amendments ready for parliamentary review.\n\nResources needed:\n\u2022 Legal drafters\n\u2022 EU law experts\n\u2022 Parliamentary counsel\",12/13/2026,1/1/2027,0,4e64488c-9e94-4cbc-9e9e-453a99c87810,PlanExe\nb981245a-97ce-4497-be0f-d6b4cf4d928e,Draft protocols for EU treaties,\"Draft protocols for EU treaties\n\nDescription:\nObjective: Develop protocols to existing EU treaties to accommodate Denmark's euro adoption, considering its opt-out.\nScope: Define the specific legal framework for Denmark's participation in the Eurozone.\nSteps: 1. Analyze EU treaties to identify relevant clauses. 2. Draft protocols outlining Denmark's specific conditions. 3. Review protocols with EU legal experts.\nDeliverables: Draft protocols for EU treaty amendments.\n\nResources needed:\n\u2022 EU law specialists\n\u2022 Treaty experts\n\u2022 Negotiators\",1/1/2027,1/20/2027,0,177b3a63-44cd-4e77-9a92-bfc2fc4f6f64,PlanExe\n822bf657-11f5-4ed6-bcb6-c935d2d5281e,Consult with legal stakeholders,\"Consult with legal stakeholders\n\nDescription:\nObjective: Gather feedback on draft amendments and protocols from relevant stakeholders.\nScope: Engage with government agencies, legal experts, and the public to ensure broad support.\nSteps: 1. Distribute draft documents to stakeholders. 2. Organize consultation meetings and forums. 3. Collect and analyze feedback.\nDeliverables: A summary report of stakeholder feedback and proposed revisions.\n\nResources needed:\n\u2022 Legal team\n\u2022 Communication specialists\n\u2022 Stakeholder engagement managers\",1/20/2027,2/8/2027,0,2a341622-ec8f-42b1-ab16-b5ddbf5c0637,PlanExe\ndb652336-b47c-4aee-b740-8a3af0ce6679,Secure EU Agreement on Legal Framework,,2/8/2027,6/24/2027,0,2a341622-ec8f-42b1-ab16-b5ddbf5c0637,PlanExe\n2f6dbd7f-5e13-4c0d-a6f0-550a0e3e2f0a,Analyze potential legal challenges,\"Analyze potential legal challenges\n\nDescription:\nIdentify potential legal challenges to the EU agreement, including grounds for challenge, potential plaintiffs, and likely outcomes. This involves reviewing the agreement for ambiguities, inconsistencies, or conflicts with existing laws.\n\nResources needed:\n\u2022 EU law specialists\n\u2022 Legal researchers\n\u2022 Legal database access\",2/8/2027,3/14/2027,0,db652336-b47c-4aee-b740-8a3af0ce6679,PlanExe\nbd542d01-b43b-40d8-9c2f-e45f4771b50f,Develop legal defense strategies,\"Develop legal defense strategies\n\nDescription:\nFormulate strategies to defend the EU agreement against potential legal challenges. This includes identifying legal precedents, preparing legal arguments, and developing alternative legal interpretations.\n\nResources needed:\n\u2022 Senior legal counsel\n\u2022 Litigation experts\n\u2022 Legal research team\",3/14/2027,4/17/2027,0,2f6dbd7f-5e13-4c0d-a6f0-550a0e3e2f0a,PlanExe\n23b7c23d-f938-44f5-a9d0-6200dacd5aba,Engage with stakeholders on legal concerns,\"Engage with stakeholders on legal concerns\n\nDescription:\nCommunicate with stakeholders, including government officials, legal experts, and the public, to address their concerns about the legal aspects of the EU agreement. This involves providing clear and concise explanations of the agreement's legal implications.\n\nResources needed:\n\u2022 Public relations team\n\u2022 Legal communication specialists\n\u2022 Government liaison officers\",4/17/2027,5/21/2027,0,bd542d01-b43b-40d8-9c2f-e45f4771b50f,PlanExe\nbb16ef0d-242b-47c2-a857-362d4be892a6,Prepare legal documentation,\"Prepare legal documentation\n\nDescription:\nPrepare all necessary legal documentation to support the EU agreement, including legal opinions, briefs, and affidavits. This involves ensuring that all documentation is accurate, complete, and compliant with relevant legal standards.\n\nResources needed:\n\u2022 Legal writers\n\u2022 Document specialists\n\u2022 Legal proofreaders\",5/21/2027,6/24/2027,0,db652336-b47c-4aee-b740-8a3af0ce6679,PlanExe\nb0a094f2-289f-43b4-af1a-51a3c65b679e,Address Legal Challenges,,6/24/2027,9/24/2027,0,d4c3e8d6-71b5-4906-a7d4-904f0559a528,PlanExe\nba2e0b36-9b09-4de3-b21b-0acca73abc76,Prepare for potential legal challenges,\"Prepare for potential legal challenges\n\nDescription:\nObjective: Anticipate and prepare responses to potential legal challenges to the euro adoption process.\nScope: Identify potential legal arguments against adoption, research relevant case law, and develop counter-arguments.\nSteps: Consult with legal experts, analyze relevant legislation, draft legal briefs.\nDeliverables: A comprehensive legal strategy document outlining potential challenges and responses.\n\nResources needed:\n\u2022 Legal experts\n\u2022 Legal researchers\n\u2022 EU law specialists\",6/24/2027,7/17/2027,0,b0a094f2-289f-43b4-af1a-51a3c65b679e,PlanExe\n64525c2d-94fa-407b-94a0-574b04556655,Engage with legal stakeholders,\"Engage with legal stakeholders\n\nDescription:\nObjective: Proactively engage with key legal stakeholders to address concerns and build consensus.\nScope: Identify relevant legal organizations, schedule meetings, and present legal arguments in favor of adoption.\nSteps: Prepare presentation materials, conduct stakeholder meetings, document feedback.\nDeliverables: Meeting summaries and a stakeholder engagement report.\n\nResources needed:\n\u2022 Legal representatives\n\u2022 Communication specialists\n\u2022 Stakeholder engagement managers\",7/17/2027,8/9/2027,0,ba2e0b36-9b09-4de3-b21b-0acca73abc76,PlanExe\ndd6cd67d-1cd9-4f9a-b038-c2630995f148,Develop legal communication strategy,\"Develop legal communication strategy\n\nDescription:\nObjective: Create a clear and concise communication strategy to address public concerns about the legal aspects of euro adoption.\nScope: Identify key messages, target audiences, and communication channels.\nSteps: Draft press releases, prepare FAQs, develop social media content.\nDeliverables: A comprehensive legal communication plan.\n\nResources needed:\n\u2022 Communication specialists\n\u2022 Legal experts\n\u2022 Public relations professionals\",8/9/2027,9/1/2027,0,64525c2d-94fa-407b-94a0-574b04556655,PlanExe\n98b460cd-02ec-4088-b325-1f2b9ee7791a,Monitor legal developments,\"Monitor legal developments\n\nDescription:\nObjective: Continuously monitor legal developments that could impact the euro adoption process.\nScope: Track relevant court cases, legislative changes, and legal opinions.\nSteps: Subscribe to legal news services, attend legal conferences, and consult  social media posts. Ensure materials are visually appealing, easy to understand, and consistent with the overall campaign messaging. Translate materials into multiple languages as needed.\n\nResources needed:\n\u2022 Graphic designers\n\u2022 Video producers\n\u2022 Copywriters\n\u2022 Translators\",11/23/2027,12/23/2027,0,1d93e7d3-792a-4351-9840-c2b7a856f5e7,PlanExe\n178b1be0-b940-4538-9565-c029b7df2edb,Train campaign spokespeople,\"Train campaign spokespeople\n\nDescription:\nPrepare campaign spokespeople to effectively communicate the benefits of euro adoption to the public and media. Provide training on key messages, Q&A techniques, and media relations. Select spokespeople who are credible, articulate, and relatable to the Danish public.\n\nResources needed:\n\u2022 Communication trainers\n\u2022 Media coaches\n\u2022 Public speaking experts\n\u2022 Key campaign personnel\",12/23/2027,1/22/2028,0,b0154d39-d04c-41e7-865d-8aa00688d0a4,PlanExe\n538f3fa3-d2f8-4eb0-a66e-e905e0f3b4e5,Address Public Concerns & Misconceptions,,1/22/2028,4/23/2028,0,b0154d39-d04c-41e7-865d-8aa00688d0a4,PlanExe\n9a58583e-e550-4af7-8728-a1e67846f702,Identify Key Public Concerns,\"Identify Key Public Concerns\n\nDescription:\nObjective: Determine the most pressing concerns and misconceptions the public holds regarding euro adoption.\nScope: Analyze existing polling data, conduct new surveys, and organize focus groups to gather comprehensive data on public sentiment.\nSteps: 1. Review existing public opinion data. 2. Design and administer new surveys. 3. Conduct focus groups with diverse demographics. 4. Analyze collected data to identify key concerns.\nDeliverables: A report outlining the top public concerns and misconceptions about euro adoption.\n\nResources needed:\n\u2022 Polling agencies\n\u2022 Survey design experts\n\u2022 Focus group facilitators\n\u2022 Data analysts\",1/22/2028,2/14/2028,0,538f3fa3-d2f8-4eb0-a66e-e905e0f3b4e5,PlanExe\n0934c7a3-9beb-4ec8-810c-64e422f650d1,Develop Targeted Messaging,\"Develop Targeted Messaging\n\nDescription:\nObjective: Create clear, concise, and persuasive messages that directly address the identified public concerns.\nScope: Develop a range of messages tailored to different demographic groups and communication channels.\nSteps: 1. Review the report on key public concerns. 2. Develop draft messages addressing each concern. 3. Test messages with target audiences. 4. Refine messages based on feedback.\nDeliverables: A set of targeted messages addressing key public concerns, ready for use in the public awareness campaign.\n\nResources needed:\n\u2022 Communication specialists\n\u2022 Copywriters\n\u2022 Marketing experts\n\u2022 Public relations professionals\",2/14/2028,3/8/2028,0,9a58583e-e550-4af7-8728-a1e67846f702,PlanExe\n91781659-f055-4186-8a98-dc4fe4c63fb7,Disseminate Information Effectively,\"Disseminate Information Effectively\n\nDescription:\nObjective: Ensure that the targeted messages reach the intended audiences through appropriate channels.\nScope: Utilize a multi-channel communication strategy, including traditional media, social media, and community outreach.\nSteps: 1. Identify the most effective communication channels for each target audience. 2. Develop a dissemination plan. 3. Implement the plan, monitoring reach and engagement. 4. Adjust the plan as needed based on performance.\nDeliverables: A comprehensive dissemination plan and ongoing monitoring of its effectiveness.\n\nResources needed:\n\u2022 Media buyers\n\u2022 Social media managers\n\u2022 Community outreach coordinators\n\u2022 Public relations professionals\",3/8/2028,3/31/2028,0,0934c7a3-9beb-4ec8-810c-64e422f650d1,PlanExe\n94f2a324-9f31-4ee5-a839-bc15ec43f611,Monitor Message Impact and Adjust,\"Monitor Message Impact and Adjust\n\nDescription:\nObjective: Track the effectiveness of the messaging campaign and make adjustments as needed to maximize its impact.\nScope: Continuously monitor public sentiment and engagement with the messages.\nSteps: 1. Track media coverage and social media activity. 2. Conduct regular surveys to gauge public opinion. 3. Analyze data to identify areas for improvement. 4. Adjust messaging and dissemination strategies based on the analysis.\nDeliverables: Regular reports on message impact and recommendations for adjustments.\n\nResources needed:\n\u2022 Data analysts\n\u2022 Public opinion researchers\n\u2022 Communication specialists\n\u2022 Marketing experts\",3/31/2028,4/23/2028,0,538f3fa3-d2f8-4eb0-a66e-e905e0f3b4e5,PlanExe\n697f6cd2-c620-448d-9b57-893466fbd42f,Conduct Targeted Outreach to Key Demographics,,4/23/2028,6/22/2028,0,538f3fa3-d2f8-4eb0-a66e-e905e0f3b4e5,PlanExe\n9072aa2d-eebf-41be-bf3f-ecf120ab4ceb,Identify Key Demographic Groups,\"Identify Key Demographic Groups\n\nDescription:\nDefine the specific demographic groups to target based on factors like age, income, location, and political affiliation. Analyze existing data and conduct preliminary research to understand their current views on euro adoption and their specific concerns.\n\nResources needed:\n\u2022 Market research analysts\n\u2022 Demographic data\n\u2022 Polling data\n\u2022 Statistical software\",4/23/2028,5/5/2028,0,697f6cd2-c620-448d-9b57-893466fbd42f,PlanExe\n31e3098a-9afd-4bca-9e89-dd098f0610ff,Tailor Messaging for Each Demographic,\"Tailor Messaging for Each Demographic\n\nDescription:\nDevelop targeted messaging that addresses the specific concerns and interests of each demographic group. This involves crafting different narratives and communication strategies that resonate with their values and priorities. Ensure messaging is culturally sensitive and avoids alienating any particular group.\n\nResources needed:\n\u2022 Communication specialists\n\u2022 Copywriters\n\u2022 Graphic designers\n\u2022 Focus groups\",5/5/2028,5/17/2028,0,9072aa2d-eebf-41be-bf3f-ecf120ab4ceb,PlanExe\ne8d77597-6fec-41b9-9276-2cfdb798b164,Select Appropriate Outreach Channels,\"Select Appropriate Outreach Channels\n\nDescription:\nDetermine the most effective channels for reaching each demographic group. This may include traditional media (TV, radio, newspapers), digital platforms (social media, online advertising), community events, and partnerships with local organizations. Consider the media consumption habits and preferences of each target audience.\n\nResources needed:\n\u2022 Media planners\n\u2022 Digital marketing specialists\n\u2022 Community outreach coordinators\n\u2022 Advertising budget\",5/17/2028,5/29/2028,0,31e3098a-9afd-4bca-9e89-dd098f0610ff,PlanExe\n61135926-e091-4ae4-8aa2-6a88da275e0b,Execute Targeted Outreach Campaigns,\"Execute Targeted Outreach Campaigns\n\nDescription:\nImplement the outreach campaigns using the tailored messaging and selected channels. This involves creating and distributing content, organizing events, and engaging with community leaders. Monitor the effectiveness of the campaigns and make adjustments as needed based on feedback and data analysis.\n\nResources needed:\n\u2022 Marketing team\n\u2022 Public relations team\n\u2022 Event organizers\n\u2022 Volunteers\",5/29/2028,6/10/2028,0,e8d77597-6fec-41b9-9276-2cfdb798b164,PlanExe\nddbe30b6-6196-4d5d-b4c3-27cde3323e2b,Monitor and Evaluate Campaign Impact,\"Monitor and Evaluate Campaign Impact\n\nDescription:\nTrack the impact of the targeted outreach campaigns on public opinion within each demographic group. This involves conducting surveys, analyzing social media sentiment, and monitoring media coverage. Use the data to assess the effectiveness of the campaigns and identify areas for improvement.\n\nResources needed:\n\u2022 Data analysts\n\u2022 Polling agencies\n\u2022 Social media monitoring tools\n\u2022 Reporting software\",6/10/2028,6/22/2028,0,697f6cd2-c620-448d-9b57-893466fbd42f,PlanExe\n8131cd06-84c1-4a80-897b-334013f58363,Manage External Perception,,6/22/2028,7/22/2028,0,697f6cd2-c620-448d-9b57-893466fbd42f,PlanExe\nb1605a4d-13da-479a-bd43-a821f91c8a10,Monitor media coverage of euro adoption,\"Monitor media coverage of euro adoption\n\nDescription:\nContinuously track news articles, opinion pieces, and social media discussions related to Denmark's potential euro adoption to identify emerging narratives and public sentiment.\n\nResources needed:\n\u2022 Media monitoring software\n\u2022 Communication specialists\n\u2022 Social media analysts\",6/22/2028,6/28/2028,0,8131cd06-84c1-4a80-897b-334013f58363,PlanExe\naba0fe23-2d51-4a2b-8717-ca2a2e546fca,Identify key influencers and stakeholders,\"Identify key influencers and stakeholders\n\nDescription:\nPinpoint individuals and organizations with significant influence on public opinion regarding euro adoption, including politicians, economists, business leaders, and advocacy groups.\n\nResources needed:\n\u2022 Political analysts\n\u2022 Public relations experts\n\u2022 Stakeholder database\",6/28/2028,7/4/2028,0,b1605a4d-13da-479a-bd43-a821f91c8a10,PlanExe\ne929d58e-65c2-4db9-bfcb-99382ee42083,Develop proactive communication strategies,\"Develop proactive communication strategies\n\nDescription:\nCreate targeted messaging and communication plans to address potential misinformation, counter negative narratives, and promote accurate information about the benefits and implications of euro adoption.\n\nResources needed:\n\u2022 Communication strategists\n\u2022 Public relations specialists\n\u2022 Content creators\",7/4/2028,7/10/2028,0,aba0fe23-2d51-4a2b-8717-ca2a2e546fca,PlanExe\nedad5620-990c-4638-adea-dd1708423713,Engage with journalists and media outlets,\"Engage with journalists and media outlets\n\nDescription:\nEstablish relationships with journalists and media outlets to ensure balanced and accurate reporting on euro adoption, provide expert commentary, and proactively address any concerns or questions.\n\nResources needed:\n\u2022 Media relations specialists\n\u2022 Spokespersons\n\u2022 Press release distribution channels\",7/10/2028,7/16/2028,0,e929d58e-65c2-4db9-bfcb-99382ee42083,PlanExe\n99850cdf-bbd3-43e1-b5b0-78e040bf468f,Manage social media presence and engagement,\"Manage social media presence and engagement\n\nDescription:\nMaintain an active and informative presence on social media platforms to engage with the public, answer questions, address concerns, and counter misinformation related to euro adoption.\n\nResources needed:\n\u2022 Social media managers\n\u2022 Community moderators\n\u2022 Content creators\",7/16/2028,7/22/2028,0,8131cd06-84c1-4a80-897b-334013f58363,PlanExe\n4a674b91-b84b-44b3-a2d4-73593bd0c355,Execute Referendum Vote,,7/22/2028,7/27/2028,0,c676420e-5432-4d26-ae1e-78d6de2ec57e,PlanExe\n530ba97b-0199-4f2a-b6a4-4625b59336c4,Finalize Polling Station Logistics,\"Finalize Polling Station Logistics\n\nDescription:\nConfirm locations, staffing, and equipment for all polling stations. Ensure accessibility and security protocols are in place.\n\nResources needed:\n\u2022 Logistics coordinator\n\u2022 Security personnel\n\u2022 Volunteers\",7/22/2028,7/23/2028,0,4a674b91-b84b-44b3-a2d4-73593bd0c355,PlanExe\nb6bacd31-0a29-4bc4-b956-136116775e88,Distribute Voter Information Materials,\"Distribute Voter Information Materials\n\nDescription:\nEnsure all registered voters receive information on polling locations, voting procedures, and candidate information.\n\nResources needed:\n\u2022 Postal service\n\u2022 Volunteers\n\u2022 Communication team\",7/23/2028,7/24/2028,0,530ba97b-0199-4f2a-b6a4-4625b59336c4,PlanExe\n315e933b-23e0-4922-afb6-56e23573358b,Oversee Voting Process,\"Oversee Voting Process\n\nDescription:\nMonitor polling stations to ensure fair and transparent voting procedures. Address any issues or complaints that arise.\n\nResources needed:\n\u2022 Election officials\n\u2022 Observers\n\u2022 Security personnel\",7/24/2028,7/25/2028,0,b6bacd31-0a29-4bc4-b956-136116775e88,PlanExe\na9a5a554-1fe4-478a-9c36-7e7424f0e120,Count Ballots and Report Results,\"Count Ballots and Report Results\n\nDescription:\nAccurately count all ballots and report the results to the appropriate authorities. Maintain chain of custody for all ballots.\n\nResources needed:\n\u2022 Election officials\n\u2022 Data entry personnel\n\u2022 Auditors\",7/25/2028,7/26/2028,0,315e933b-23e0-4922-afb6-56e23573358b,PlanExe\n5395e4b9-ddcb-42ea-b698-2a9be24682d3,Secure Ballot Storage Post-Election,\"Secure Ballot Storage Post-Election\n\nDescription:\nEnsure secure storage of all ballots and election materials for the required retention period.\n\nResources needed:\n\u2022 Security personnel\n\u2022 Storage facility\n\u2022 Records management team\",7/26/2028,7/27/2028,0,4a674b91-b84b-44b3-a2d4-73593bd0c355,PlanExe\n6420f271-0505-40e0-8b5b-2016a675f00b,Economic & Financial Transition Planning,,7/27/2028,5/12/2029,0,c676420e-5432-4d26-ae1e-78d6de2ec57e,PlanExe\n34bc2c6c-041a-43df-9732-649776bbf803,Develop Economic Transition Plan,,7/27/2028,10/27/2028,0,6420f271-0505-40e0-8b5b-2016a675f00b,PlanExe\nefcc4426-38ad-403f-bb43-4383fc8bdcfa,Analyze historical economic data,\"Analyze historical economic data\n\nDescription:\nObjective: Gather and analyze historical economic data to understand Denmark's economic performance and identify potential vulnerabilities.\nScope: Collection of data on GDP, inflation, unemployment, interest rates, and exchange rates.\nSteps: 1. Identify relevant data sources. 2. Collect data from national and international databases. 3. Analyze data using statistical methods.\nDeliverables: A report summarizing historical economic trends and potential risks.\n\nResources needed:\n\u2022 Economists\n\u2022 Data analysts\n\u2022 Statistical software\",7/27/2028,8/19/2028,0,34bc2c6c-041a-43df-9732-649776bbf803,PlanExe\n3890c841-240a-43a9-8d45-99d8822f4e49,Forecast economic impact of euro adoption,\"Forecast economic impact of euro adoption\n\nDescription:\nObjective: Develop economic forecasts to predict the impact of euro adoption on the Danish economy.\nScope: Modeling the effects of euro adoption on GDP, inflation, unemployment, and trade.\nSteps: 1. Develop macroeconomic models. 2. Simulate different scenarios. 3. Analyze the results and identify potential impacts.\nDeliverables: A report presenting economic forecasts and potential impacts of euro adoption.\n\nResources needed:\n\u2022 Economists\n\u2022 Macroeconomic modelers\n\u2022 Simulation software\",8/19/2028,9/11/2028,0,efcc4426-38ad-403f-bb43-4383fc8bdcfa,PlanExe\n70753074-ef4d-45ad-8e78-e37cca64ca80,Assess impact on key sectors,\"Assess impact on key sectors\n\nDescription:\nObjective: Assess the impact of euro adoption on key sectors of the Danish economy, such as finance, trade, and tourism.\nScope: Analyzing the effects of euro adoption on sector-specific performance and competitiveness.\nSteps: 1. Identify key sectors. 2. Collect data on sector-specific performance. 3. Analyze the data and identify potential impacts.\nDeliverables: A report summarizing the impact of euro adoption on key sectors.\n\nResources needed:\n\u2022 Sector specialists\n\u2022 Economists\n\u2022 Industry data\",9/11/2028,10/4/2028,0,3890c841-240a-43a9-8d45-99d8822f4e49,PlanExe\n2719f332-1db4-47c3-9521-f76a11e8f8db,Develop transition strategies,\"Develop transition strategies\n\nDescription:\nObjective: Develop transition strategies to mitigate potential negative impacts and maximize the benefits of euro adoption.\nScope: Designing policies and measures to support businesses and consumers during the transition.\nSteps: 1. Identify potential challenges. 2. Develop mitigation strategies. 3. Consult with stakeholders.\nDeliverables: A report outlining transition strategies and implementation plans.\n\nResources needed:\n\u2022 Policy advisors\n\u2022 Economists\n\u2022 Stakeholder representatives\",10/4/2028,10/27/2028,0,34bc2c6c-041a-43df-9732-649776bbf803,PlanExe\nc73a588a-1b2a-433e-972a-a63f05d525fc,Establish Financial Sector Conversion Strategy,,10/27/2028,12/26/2028,0,34bc2c6c-041a-43df-9732-649776bbf803,PlanExe\n9a56c9d8-0f3d-42a5-9edd-a8d629552372,Analyze current financial systems,\"Analyze current financial systems\n\nDescription:\nObjective: Understand the current state of Danish financial systems. Scope: Identify all relevant systems and their functionalities. Steps: Conduct interviews with key stakeholders, review system documentation, and perform gap analysis. Deliverables: A report outlining the current state of financial systems.\n\nResources needed:\n\u2022 Financial analysts\n\u2022 IT specialists\n\u2022 Project manager\",10/27/2028,11/11/2028,0,c73a588a-1b2a-433e-972a-a63f05d525fc,PlanExe\n3914957f-ce77-4f01-9112-ef58b03c38e4,Define euro conversion requirements,\"Define euro conversion requirements\n\nDescription:\nObjective: Determine the specific requirements for converting financial systems to the euro. Scope: Identify necessary changes to IT systems, accounting practices, and regulatory compliance. Steps: Consult with EU experts, review relevant regulations, and conduct impact assessments. Deliverables: A detailed list of euro conversion requirements.\n\nResources needed:\n\u2022 EU law specialists\n\u2022 Financial regulators\n\u2022 IT architects\",11/11/2028,11/26/2028,0,9a56c9d8-0f3d-42a5-9edd-a8d629552372,PlanExe\n54b931ad-8a40-43ae-acb1-c06393d90500,Develop conversion strategy options,\"Develop conversion strategy options\n\nDescription:\nObjective: Create multiple strategies for converting financial systems to the euro. Scope: Consider different approaches, timelines, and resource allocations. Steps: Brainstorm potential strategies, evaluate their feasibility, and assess their risks and benefits. Deliverables: A report outlining several conversion strategy options.\n\nResources needed:\n\u2022 Strategy consultants\n\u2022 Financial experts\n\u2022 Risk analysts\",11/26/2028,12/11/2028,0,3914957f-ce77-4f01-9112-ef58b03c38e4,PlanExe\n82b3c148-0a7c-4739-8a8e-aa386eba7680,Evaluate and select best strategy,\"Evaluate and select best strategy\n\nDescription:\nObjective: Choose the most appropriate conversion strategy. Scope: Consider factors such as cost, risk, and impact on financial institutions. Steps: Conduct a cost-benefit analysis, assess stakeholder preferences, and make a final decision. Deliverables: A selected euro conversion strategy.\n\nResources needed:\n\u2022 Decision-makers\n\u2022 Financial analysts\n\u2022 Stakeholder representatives\",12/11/2028,12/26/2028,0,c73a588a-1b2a-433e-972a-a63f05d525fc,PlanExe\n90c41a0f-b067-4aff-af3d-afa2f54c1ac8,Assess IT System Upgrade Requirements,,12/26/2028,2/9/2029,0,c73a588a-1b2a-433e-972a-a63f05d525fc,PlanExe\n790e2b6a-778e-4ddd-a753-0a4dd25153bb,Inventory current IT systems,\"Inventory current IT systems\n\nDescription:\nDocument all existing IT systems used by the bank, including hardware, software, and network infrastructure. Identify systems that will be impacted by the euro conversion.\n\nResources needed:\n\u2022 IT architects\n\u2022 System administrators\n\u2022 Database administrators\",12/26/2028,1/4/2029,0,90c41a0f-b067-4aff-af3d-afa2f54c1ac8,PlanExe\neabd33e8-6df3-4e24-b8c9-ab991aeacada,Assess euro compatibility,\"Assess euro compatibility\n\nDescription:\nEvaluate the compatibility of existing IT systems with the euro. Identify necessary upgrades, patches, or replacements to ensure seamless euro transactions.\n\nResources needed:\n\u2022 IT architects\n\u2022 Software developers\n\u2022 Euro conversion specialists\",1/4/2029,1/13/2029,0,790e2b6a-778e-4ddd-a753-0a4dd25153bb,PlanExe\n161c8080-37c3-4451-82d7-cc28c2adbbf2,Estimate upgrade costs,\"Estimate upgrade costs\n\nDescription:\nDevelop a detailed cost estimate for upgrading or replacing incompatible IT systems. Include hardware, software, labor, and training costs.\n\nResources needed:\n\u2022 Cost estimators\n\u2022 IT architects\n\u2022 Procurement specialists\",1/13/2029,1/22/2029,0,eabd33e8-6df3-4e24-b8c9-ab991aeacada,PlanExe\nc0d3b6c3-ddc6-4c7f-b773-2d1f7987801c,Prioritize system upgrades,\"Prioritize system upgrades\n\nDescription:\nRank IT system upgrades based on criticality and impact on euro conversion. Focus on systems that handle core banking functions and customer transactions.\n\nResources needed:\n\u2022 IT managers\n\u2022 Business analysts\n\u2022 Risk assessment specialists\",1/22/2029,1/31/2029,0,161c8080-37c3-4451-82d7-cc28c2adbbf2,PlanExe\n95fd0528-a8e8-4442-9da5-52c32f0c7cdc,Document upgrade requirements,\"Document upgrade requirements\n\nDescription:\nCreate detailed documentation outlining the specific requirements for each IT system upgrade. Include technical specifications, functional requirements, and testing procedures.\n\nResources needed:\n\u2022 Technical writers\n\u2022 System analysts\n\u2022 Software developers\",1/31/2029,2/9/2029,0,90c41a0f-b067-4aff-af3d-afa2f54c1ac8,PlanExe\nfd963aaf-a6dd-42d1-9b15-6bd85a595546,Develop Risk Mitigation Framework,,2/9/2029,4/10/2029,0,90c41a0f-b067-4aff-af3d-afa2f54c1ac8,PlanExe\n4c8fb881-5776-4242-8e47-0b442daa2b06,Identify potential economic shock scenarios (1),\"Identify potential economic shock scenarios\n\nDescription:\nDefine a range of plausible economic shock scenarios that could impact Denmark during the euro adoption process. This includes global recessions, financial crises, and unexpected changes in trade relationships. Objective is to create a comprehensive set of scenarios for risk assessment.\n\nResources needed:\n\u2022 Economists\n\u2022 Financial analysts\n\u2022 Scenario planning experts\",2/9/2029,2/24/2029,0,fd963aaf-a6dd-42d1-9b15-6bd85a595546,PlanExe\nbfa39f0f-bd73-485e-bdef-1c7babe6dd9f,Assess likelihood and impact of each shock,\"Assess likelihood and impact of each shock\n\nDescription:\nEvaluate the probability of occurrence and potential impact of each identified economic shock scenario on the Danish economy. This involves quantitative analysis using economic models and qualitative assessments based on expert judgment. Deliverable: A risk matrix prioritizing scenarios based on likelihood and impact.\n\nResources needed:\n\u2022 Econometricians\n\u2022 Risk management specialists\n\u2022 Data analysts\",2/24/2029,3/11/2029,0,4c8fb881-5776-4242-8e47-0b442daa2b06,PlanExe\n5b3ddf13-4173-43db-b8be-37a40c368073,Develop mitigation strategies for key risks,\"Develop mitigation strategies for key risks\n\nDescription:\nDesign specific mitigation strategies to address the most significant economic risks identified. These strategies may include fiscal policies, monetary policies, and financial regulations. Objective: To create a set of actionable plans to minimize the negative impacts of potential economic shocks.\n\nResources needed:\n\u2022 Policy advisors\n\u2022 Central bank officials\n\u2022 Regulatory experts\",3/11/2029,3/26/2029,0,bfa39f0f-bd73-485e-bdef-1c7babe6dd9f,PlanExe\n72dd56b2-4208-4c8e-89f0-0502e8741e7c,Establish early warning indicators,\"Establish early warning indicators\n\nDescription:\nIdentify key economic indicators that can provide early warnings of potential economic shocks. This involves selecting relevant data points and establishing monitoring systems to track these indicators. Deliverable: A dashboard of early warning indicators with defined thresholds and alert mechanisms.\n\nResources needed:\n\u2022 Data scientists\n\u2022 Economic forecasters\n\u2022 IT specialists\",3/26/2029,4/10/2029,0,fd963aaf-a6dd-42d1-9b15-6bd85a595546,PlanExe\n678c8803-7fe2-40c3-b215-0cfa91ec1575,Define Financial System Transition Approach,,4/10/2029,5/12/2029,0,6420f271-0505-40e0-8b5b-2016a675f00b,PlanExe\n3e844de1-4c45-49cc-bfd3-3bdae49af536,Identify potential economic shock scenarios (2),\"Identify potential economic shock scenarios\n\nDescription:\nObjective: Define a range of plausible economic shock scenarios that could impact Denmark during the euro adoption process.\nScope: Global economic downturn, financial crisis, trade war, unexpected inflation surge, etc.\nSteps: Review historical economic data, consult with economists, analyze current geopolitical risks, develop scenario narratives.\nDeliverables: A documented list of economic shock scenarios with detailed descriptions and potential impacts.\n\nResources needed:\n\u2022 Economists\n\u2022 Financial analysts\n\u2022 Risk management specialists\n\u2022 Economic data sources\",4/10/2029,4/18/2029,0,678c8803-7fe2-40c3-b215-0cfa91ec1575,PlanExe\n2b99ba04-399c-4153-b6b8-a917689e14dd,Assess impact of shocks on key indicators,\"Assess impact of shocks on key indicators\n\nDescription:\nObjective: Evaluate the potential impact of each identified economic shock scenario on key economic indicators.\nScope: GDP growth, inflation, unemployment, interest rates, exchange rates, government debt.\nSteps: Use economic modeling tools, conduct stress tests, analyze historical data, consult with experts.\nDeliverables: A report detailing the projected impact of each economic shock scenario on key economic indicators.\n\nResources needed:\n\u2022 Econometricians\n\u2022 Economic modeling software\n\u2022 Historical economic data\n\u2022 Financial analysts\",4/18/2029,4/26/2029,0,3e844de1-4c45-49cc-bfd3-3bdae49af536,PlanExe\n87e41c1e-548c-437a-bb83-8af584006b1a,Develop mitigation strategies for each shock,\"Develop mitigation strategies for each shock\n\nDescription:\nObjective: Create specific mitigation strategies to address the potential negative impacts of each economic shock scenario.\nScope: Fiscal policy adjustments, monetary policy interventions, financial regulations, international cooperation.\nSteps: Brainstorm potential mitigation measures, evaluate their effectiveness, assess their feasibility, develop detailed action plans.\nDeliverables: A comprehensive risk mitigation framework with specific strategies for each economic shock scenario.\n\nResources needed:\n\u2022 Policy advisors\n\u2022 Central bank officials\n\u2022 Financial regulators\n\u2022 International relations experts\",4/26/2029,5/4/2029,0,2b99ba04-399c-4153-b6b8-a917689e14dd,PlanExe\n16ff48a0-5af9-482e-ac6a-f3b43852f771,Document risk mitigation framework,\"Document risk mitigation framework\n\nDescription:\nObjective: Compile all identified risks, impact assessments, and mitigation strategies into a comprehensive and easily accessible document.\nScope: The document should cover all identified economic shock scenarios and their corresponding mitigation plans.\nSteps: Organize information logically, write clear and concise descriptions, create visual aids, ensure consistency and accuracy.\nDeliverables: A well-documented risk mitigation framework for managing economic shocks during euro adoption.\n\nResources needed:\n\u2022 Technical writers\n\u2022 Project managers\n\u2022 Document management system\",5/4/2029,5/12/2029,0,678c8803-7fe2-40c3-b215-0cfa91ec1575,PlanExe\ne2ed1b09-6ebd-4df8-951a-53251e28f435,Financial System Conversion & Implementation,,5/12/2029,11/13/2031,0,6420f271-0505-40e0-8b5b-2016a675f00b,PlanExe\n6cee11fe-190f-441a-9bc5-d4ccd10ebb7d,Upgrade Bank IT Systems,,5/12/2029,2/6/2030,0,e2ed1b09-6ebd-4df8-951a-53251e28f435,PlanExe\nfbcb121f-0669-4df8-b5e5-4934aded2a03,Assess current banking IT infrastructure,\"Assess current banking IT infrastructure\n\nDescription:\nEvaluate existing IT systems for euro compatibility. Identify necessary upgrades and modifications. Document findings in a detailed report.\n\nResources needed:\n\u2022 IT architects\n\u2022 System analysts\n\u2022 Security experts\",5/12/2029,7/5/2029,0,6cee11fe-190f-441a-9bc5-d4ccd10ebb7d,PlanExe\n60a60939-eca7-4b41-8315-931540076c44,Develop detailed upgrade specifications,\"Develop detailed upgrade specifications\n\nDescription:\nCreate comprehensive technical specifications for all required IT system upgrades. Include hardware, software, and security requirements. Ensure compliance with ECB regulations.\n\nResources needed:\n\u2022 IT engineers\n\u2022 Software developers\n\u2022 Compliance officers\",7/5/2029,8/28/2029,0,fbcb121f-0669-4df8-b5e5-4934aded2a03,PlanExe\n162180ee-fa5b-43d6-9da2-92518583b412,Select vendors and negotiate contracts,\"Select vendors and negotiate contracts\n\nDescription:\nIdentify and evaluate potential vendors for IT system upgrades. Negotiate contracts that meet budget and timeline requirements. Ensure service level agreements are in place.\n\nResources needed:\n\u2022 Procurement specialists\n\u2022 Legal counsel\n\u2022 Project managers\",8/28/2029,10/21/2029,0,60a60939-eca7-4b41-8315-931540076c44,PlanExe\n8f519621-a0e0-4c6b-be9b-a20c10b90bf2,Implement and test IT system upgrades,\"Implement and test IT system upgrades\n\nDescription:\nInstall and configure new hardware and software. Conduct thorough testing to ensure functionality and security. Address any issues identified during testing.\n\nResources needed:\n\u2022 IT technicians\n\u2022 Software testers\n\u2022 Security analysts\",10/21/2029,12/14/2029,0,162180ee-fa5b-43d6-9da2-92518583b412,PlanExe\ne678ed3f-8a5e-4553-b6f4-a865c93e8f3c,Train bank staff on new systems,\"Train bank staff on new systems\n\nDescription:\nDevelop and deliver training programs for bank staff on the upgraded IT systems. Provide ongoing support and documentation.\n\nResources needed:\n\u2022 Training specialists\n\u2022 Technical writers\n\u2022 Support staff\",12/14/2029,2/6/2030,0,6cee11fe-190f-441a-9bc5-d4ccd10ebb7d,PlanExe\n6d88dbe4-a1d1-4533-b41b-44e9680e6e02,Convert Payment Systems,,2/6/2030,8/5/2030,0,6cee11fe-190f-441a-9bc5-d4ccd10ebb7d,PlanExe\n130350c3-0fbb-41d8-bd57-f12f906e9c92,Assess Payment System Compatibility,\"Assess Payment System Compatibility\n\nDescription:\nEvaluate existing payment systems (credit cards, mobile payments, online banking) for compatibility with the euro. Identify necessary modifications or upgrades.\n\nResources needed:\n\u2022 Payment system analysts\n\u2022 IT specialists\n\u2022 Financial consultants\",2/6/2030,3/14/2030,0,6d88dbe4-a1d1-4533-b41b-44e9680e6e02,PlanExe\nbdd981f1-db36-45e6-9668-bffb38ccac55,Develop ey and Focus Group Data,\"Synthesize Survey and Focus Group Data\n\nDescription:\nIntegrate the quantitative data from the surveys with the qualitative data from the focus groups to provide a holistic understanding of public perception and satisfaction. Identify key themes and insights.\n\nResources needed:\n\u2022 Data analysts\n\u2022 Qualitative researchers\n\u2022 Report writers\",7/28/2032,8/9/2032,0,67861153-7f22-44ef-b66a-d3a71c96fdc3,PlanExe\nbbfef4a0-a6b3-4512-9055-cf2574ec23ed,Identify Lessons Learned,,8/9/2032,8/29/2032,0,f98093fe-4e8f-43ad-9b92-b81518f32ce4,PlanExe\n2b6af566-8bc0-4dd5-8b60-7df738bf50b3,Gather stakeholder feedback on the process,\"Gather stakeholder feedback on the process\n\nDescription:\nCollect feedback from key stakeholders (government officials, financial institutions, public representatives) regarding their experiences and perceptions of the euro adoption process. This includes identifying areas of satisfaction, dissatisfaction, and suggestions for improvement.\n\nResources needed:\n\u2022 Project Manager\n\u2022 Survey Team\n\u2022 Interviewers\",8/9/2032,8/14/2032,0,bbfef4a0-a6b3-4512-9055-cf2574ec23ed,PlanExe\n448f52ea-e55b-47a5-b195-46b3abec2cdc,Analyze survey and interview data,\"Analyze survey and interview data\n\nDescription:\nAnalyze the collected survey and interview data to identify key themes, trends, and insights related to the euro adoption process. This includes quantifying satisfaction levels, identifying common challenges, and uncovering unexpected outcomes.\n\nResources needed:\n\u2022 Data Analyst\n\u2022 Statistician\n\u2022 Report Writer\",8/14/2032,8/19/2032,0,2b6af566-8bc0-4dd5-8b60-7df738bf50b3,PlanExe\n51a85f0e-f4f2-4152-9b51-389242703617,Document lessons learned and best practices,\"Document lessons learned and best practices\n\nDescription:\nDocument the lessons learned and best practices identified during the euro adoption process. This includes creating a comprehensive report that summarizes the key find     {
      "id": "01eab282-c75d-4a1b-97c4-e91dff6dc46b",
      "text": "Research existing legal precedents",
      "custom_tooltip": "<b>Research existing legal precedents</b><br>Objective: Identify relevant legal precedents within the EU and Denmark that could impact the feasibility of different legal pathways for euro adoption.\nScope: Review EU case law, Danish constitutional law, and relevant international agreements.\nSteps: 1. Conduct a comprehensive search of legal databases. 2. Analyze key cases and legal opinions. 3. Summarize findings and identify potential legal challenges.\nDeliverables: A report summarizing relevant legal precedents and their potential impact.<br><b>Resources needed:</b><br><ul><li>EU law specialists</li><li>Legal researchers</li><li>Legal databases (LexisNexis, Westlaw)</li></ul>",
      "start_date": "2026-02-22",
      "duration": 8.0,
      "progress": 0,
      "open": true,

    },
    {
      "id": "8b2498ac-1ef9-4db6-a325-62edd9354a6e",
      "text": "Analyze constitutional implications",
      "custom_tooltip": "<b>Analyze constitutional implications</b><br>Objective: Assess the potential constitutional implications of adopting the euro in Denmark, considering the existing opt-out clause and any necessary amendments.\nScope: Review the Danish constitution, relevant legal scholarship, and potential amendment options.\nSteps: 1. Consult with constitutional law experts. 2. Analyze potential conflicts with existing constitutional provisions. 3. Develop recommendations for addressing constitutional concerns.\nDeliverables: A legal opinion on the constitutional implications of euro adoption.<br><b>Resources needed:</b><br><ul><li>Constitutional law experts</li><li>Legal scholars</li><li>Ministry of Justice officials</li></ul>",
      "start_date": "2026-03-02",
      "duration": 8.0,
      "progress": 0,
      "open": true,
      "meta": "01eab282-c75d-4a1b-97c4-e91dff6dc46b FS",
      "parent": "66d47056-b361-46f1-bdbb-1ec8b9edc370"
    },
    {
      "id": "e58bc8e0-addf-497a-9f3d-ea1cd539c79a",
      "text": "Assess EU treaty compatibility",
      "custom_tooltip": "<b>Assess EU treaty compatibility</b><br>Objective: Determine the compatibility of different legal pathways with existing EU treaties and regulations.\nScope: Review relevant EU treaties, regulations, and directives.\nSteps: 1. Consult with EU law specialists. 2. Analyze potential conflicts with EU law. 3. Develop recommendations for ensuring compliance with EU law.\nDeliverables: A report assessing the compatibility of different legal pathways with EU treaties.<br><b>Resources needed:</b><br><ul><li>EU law specialists</li><li>EU negotiation team</li><li>European Commission representatives</li></ul>",
      "start_date": "2026-03-10",
      "duration": 8.0,
      "progress": 0,
      "open": true,
      "meta": "8b2498ac-1ef9-4db6-a325-62edd9354a6e FS",
      "parent": "66d47056-b361-46f1-bdbb-1ec8b9edc370"
    },
    {
      "id": "ae7cb101-f0cb-427b-a490-41d25bfe1ab0",
      "text": "Identify potential legal challenges",
      "custom_tooltip": "<b>Identify potential legal challenges</b><br>Objective: Identify potential legal challenges to the chosen legal pathway and develop mitigation strategies.\nScope: Review relevant legal precedents, consult with legal experts, and analyze potential legal risks.\nSteps: 1. Conduct a risk assessment of potential legal challenges. 2. Develop mitigation strategies for each identified risk. 3. Consult with legal experts on the feasibility of mitigation strategies.\nDeliverables: A risk assessment report with mitigation strategies.<br><b>Resources needed:</b><br><ul><li>Legal experts</li><li>Risk management specialists</li><li>Ministry of Justice officials</li></ul>",
      "start_date": "2026-03-18",
      "duration": 8.0,
      "progress": 0,
      "open": true,

      "custom_tooltip": "<b>Evaluate Political Support within EU</b>",

    {
      "id": "d226b525-78bd-4441-b9ad-dea445e2e9a1",
      "text": "Analyze Political Landscape in EU",
      "custom_tooltip": "<b>Analyze Political Landscape in EU</b><br>Objective: Understand the current political climate within the EU and identify key influencers and potential allies for Denmark&#x27;s euro adoption. Scope: Research political parties, key figures, and their stances on euro adoption. Steps: Review EU parliamentary records, conduct interviews with political analysts, and analyze media coverage. Deliverables: A report summarizing the political landscape and identifying potential allies and obstacles.<br><b>Resources needed:</b><br><ul><li>Political analysts</li><li>EU experts</li><li>Research staff</li></ul>",
      "start_date": "2026-03-26",
      "duration": 8.0,
      "progress": 0,

    {
      "id": "36e58a74-5aea-4891-9af5-c618dd8948c0",
      "text": "Identify Key Decision-Makers in EU",
      "custom_tooltip": "<b>Identify Key Decision-Makers in EU</b><br>Objective: Identify the individuals and committees within the EU who will be involved in the decision-making process regarding Denmark&#x27;s euro adoption. Scope: Map out the EU&#x27;s decision-making structure and identify key players. Steps: Review EU organizational charts, consult with EU experts, and attend relevant EU meetings. Deliverables: A list of key decision-makers and their contact information.<br><b>Resources needed:</b><br><ul><li>EU experts</li><li>Lobbyists</li><li>Research staff</li></ul>",
      "start_date": "2026-04-03",

    },
    {
      "id": "6c4b7e83-a02b-4419-939d-d90025487914",
      "text": "Assess Support for Euro Adoption",
      "custom_tooltip": "<b>Assess Support for Euro Adoption</b><br>Objective: Gauge the level of support for Denmark&#x27;s euro adoption among EU member states and institutions. Scope: Conduct surveys and interviews to assess the sentiment towards Denmark&#x27;s euro adoption. Steps: Develop survey questionnaires, conduct interviews with EU officials, and analyze survey results. Deliverables: A report summarizing the level of support for Denmark&#x27;s euro adoption.<br><b>Resources needed:</b><br><ul><li>Pollsters</li><li>EU experts</li><li>Research staff</li></ul>",
      "start_date": "2026-04-11",
      "duration": 8.0,

    },
    {
      "id": "be30af0f-93e6-48b6-b2be-94660c75d375",
      "text": "Develop Persuasion Strategies for EU",
      "custom_tooltip": "<b>Develop Persuasion Strategies for EU</b><br>Objective: Develop strategies to persuade EU member states and institutions to support Denmark&#x27;s euro adoption. Scope: Identify key arguments and develop persuasive messaging. Steps: Conduct research on the benefits of Denmark&#x27;s euro adoption, develop persuasive messaging, and prepare presentations. Deliverables: A set of persuasion strategies and messaging materials.<br><b>Resources needed:</b><br><ul><li>Communication experts</li><li>EU experts</li><li>Political strategists</li></ul>",
      "start_date": "2026-04-19",

    {
      "id": "9ba1f7cd-c66a-403c-816c-c85b99b8a501",
      "text": "Research Effective Framing Techniques",
      "custom_tooltip": "<b>Research Effective Framing Techniques</b><br>Objective: Identify framing techniques that resonate with the Danish public regarding euro adoption.\nScope: Review academic literature, analyze past campaigns, and conduct preliminary surveys.\nSteps: 1. Literature review. 2. Analyze successful/unsuccessful campaigns. 3. Conduct surveys. 4. Summarize findings.\nDeliverables: Report on effective framing techniques.<br><b>Resources needed:</b><br><ul><li>Political scientists</li><li>Communication experts</li><li>Survey analysts</li></ul>",
      "start_date": "2026-04-27",

    {
      "id": "9c3760fe-8962-4c06-b013-9001044d7e19",
      "text": "Develop Initial Framing Narratives",
      "custom_tooltip": "<b>Develop Initial Framing Narratives</b><br>Objective: Create several initial framing narratives for euro adoption.\nScope: Develop narratives based on research findings, targeting different demographics.\nSteps: 1. Brainstorm narratives. 2. Draft narratives. 3. Review narratives. 4. Refine narratives.\nDeliverables: Draft framing narratives.<br><b>Resources needed:</b><br><ul><li>Communication experts</li><li>Political strategists</li><li>Writers</li></ul>",
      "start_date": "2026-05-01",

      "progress": 0,

    },
    {
      "id": "69bcd29a-3303-412c-bf27-1a87c4a867aa",
      "text": "Test Framing Narratives with Focus Groups",
      "custom_tooltip": "<b>Test Framing Narratives with Focus Groups</b><br>Objective: Test the effectiveness of the framing narratives with focus groups.\nScope: Conduct focus groups with diverse participants to gauge reactions to the narratives.\nSteps: 1. Recruit participants. 2. Conduct focus groups. 3. Analyze feedback. 4. Revise narratives.\nDeliverables: Focus group feedback report.<br><b>Resources needed:</b><br><ul><li>Focus group facilitators</li><li>Recruiters</li><li>Analysts</li></ul>",
      "start_date": "2026-05-05",
      "duration": 4.0,

    {
      "id": "405a9611-da6a-481f-b931-e3809898c9ee",
      "text": "Refine Framing Based on Focus Groups",
      "custom_tooltip": "<b>Refine Framing Based on Focus Groups</b><br>Objective: Refine the framing narratives based on feedback from focus groups.\nScope: Revise narratives to address concerns and enhance appeal.\nSteps: 1. Review feedback. 2. Revise narratives. 3. Obtain approval. 4. Finalize narratives.\nDeliverables: Finalized framing narratives.<br><b>Resources needed:</b><br><ul><li>Communication experts</li><li>Political strategists</li><li>Writers</li></ul>",

      "id": "1a7dba7d-cd9a-4db6-89c2-4edc898a55c7",
      "text": "Design Initial Survey Instrument",
      "custom_tooltip": "<b>Design Initial Survey Instrument</b><br>Develop a comprehensive survey instrument to gauge public opinion on euro adoption. This includes defining key questions, response scales, and demographic variables to ensure accurate and reliable data collection.<br><b>Resources needed:</b><br><ul><li>Survey methodologist</li><li>Political scientist</li><li>Data analyst</li></ul>",
      "start_date": "2026-05-13",

    },
    {
      "id": "62ecae63-0dbe-4723-9729-a3b897b1ce07",
      "text": "Pilot Test Survey Instrument",
      "custom_tooltip": "<b>Pilot Test Survey Instrument</b><br>Conduct a pilot test of the survey instrument with a small sample of the target population to identify any potential issues with question clarity, response options, or survey flow. Revise the instrument based on feedback from the pilot test.<br><b>Resources needed:</b><br><ul><li>Survey participants</li><li>Data analyst</li><li>Survey methodologist</li></ul>",
      "start_date": "2026-05-16",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "1a7dba7d-cd9a-4db6-89c2-4edc898a55c7 FS",

    },
    {
      "id": "24dfb8dc-b2f3-4b30-9b5d-790071baf6c7",
      "text": "Administer Initial Public Opinion Poll",
      "custom_tooltip": "<b>Administer Initial Public Opinion Poll</b><br>Administer the revised survey instrument to a representative sample of the Danish public. This includes selecting a sampling methodology, recruiting participants, and collecting data through online, phone, or in-person surveys.<br><b>Resources needed:</b><br><ul><li>Polling agency</li><li>Survey administrators</li><li>Data collection software</li></ul>",
      "start_date": "2026-05-19",
      "duration": 3.0,
      "progress": 0,

      "meta": "62ecae63-0dbe-4723-9729-a3b897b1ce07 FS",

    },
    {
      "id": "a5e9cd86-8911-4ddd-9ff7-134b54145d8b",
      "text": "Analyze Initial Poll Results",
      "custom_tooltip": "<b>Analyze Initial Poll Results</b><br>Analyze the data collected from the initial public opinion poll to assess overall support for euro adoption, identify key demographic trends, and uncover any major concerns or misconceptions about the euro. Prepare a report summarizing the findings.<br><b>Resources needed:</b><br><ul><li>Data analyst</li><li>Statistician</li><li>Report writer</li></ul>",
      "start_date": "2026-05-22",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "24dfb8dc-b2f3-4b30-9b5d-790071baf6c7 FS",

    },
    {
      "id": "1cb3e07f-167d-45b1-9502-72827d934a7f",
      "text": "Disseminate Initial Findings",
      "custom_tooltip": "<b>Disseminate Initial Findings</b><br>Share the findings from the initial public opinion poll with key stakeholders, including government officials, policymakers, and the public. This may involve presenting the results at meetings, publishing reports, and issuing press releases.<br><b>Resources needed:</b><br><ul><li>Public relations specialist</li><li>Government liaison</li><li>Communication team</li></ul>",

    {
      "id": "4d637ec9-b3c9-472c-9362-780c466ea94b",
      "text": "Define Denmark's Negotiation Objectives",
      "custom_tooltip": "<b>Define Denmark&#x27;s Negotiation Objectives</b><br>Clearly articulate Denmark&#x27;s goals and priorities for euro adoption within the EU framework. This includes defining acceptable legal pathways, desired transition timelines, and any specific conditions or safeguards Denmark seeks to secure during negotiations.<br><b>Resources needed:</b><br><ul><li>Ministry of Finance</li><li>Legal Advisory Team</li><li>EU Negotiation Team</li><li>Economic Advisory Council</li></ul>",

      "meta": "1c794f36-9a65-4673-a1ec-1d442d551b71 SS",
      "parent": "1c794f36-9a65-4673-a1ec-1d442d551b71"
    },
    {
      "id": "1d9ed4a0-4931-40c2-83b0-464d9e8d9237",
      "text": "Research EU Member State Positions",
      "custom_tooltip": "<b>Research EU Member State Positions</b><br>Gather intelligence on the positions and priorities of key EU member states regarding Denmark&#x27;s euro adoption. Identify potential allies and opponents, and understand their motivations and concerns. This will inform Denmark&#x27;s negotiation strategy and help anticipate potential roadblocks.<br><b>Resources needed:</b><br><ul><li>EU Negotiation Team</li><li>Political Analysts</li><li>Intelligence Agencies</li></ul>",
      "start_date": "2026-07-03",
      "duration": 36.0,
      "progress": 0,
      "open": true,
      "meta": "4d637ec9-b3c9-472c-9362-780c466ea94b FS",
      "parent": "1c794f36-9a65-4673-a1ec-1d442d551b71"
    },
    {
      "id": "b26c5b0f-03e7-48c6-ae48-19ff2acb783e",
      "text": "Develop Negotiation Strategy & Tactics",
      "custom_tooltip": "<b>Develop Negotiation Strategy &amp; Tactics</b><br>Formulate a comprehensive negotiation strategy outlining Denmark&#x27;s approach to securing a favorable agreement with the EU. This includes defining negotiation tactics, identifying potential compromises, and developing fallback positions in case of disagreements.<br><b>Resources needed:</b><br><ul><li>EU Negotiation Team</li><li>Legal Advisory Team</li><li>Experienced Negotiators</li></ul>",
      "start_date": "2026-08-08",
      "duration": 36.0,
      "progress": 0,
      "open": true,
      "meta": "1d9ed4a0-4931-40c2-83b0-464d9e8d9237 FS",
      "parent": "1c794f36-9a65-4673-a1ec-1d442d551b71"
    },
    {
      "id": "719d6663-142b-4686-9482-bb57fc7391c6",
      "text": "Conduct Preliminary Talks with EU Officials",
      "custom_tooltip": "<b>Conduct Preliminary Talks with EU Officials</b><br>Engage in informal discussions with key EU officials to gauge their receptiveness to Denmark&#x27;s proposals and identify potential areas of common ground. This will help build relationships and pave the way for formal negotiations.<br><b>Resources needed:</b><br><ul><li>EU Negotiation Team</li><li>High-Level Diplomats</li></ul>",
      "start_date": "2026-09-13",
      "duration": 36.0,
      "progress": 0,
      "open": true,
      "meta": "b26c5b0f-03e7-48c6-ae48-19ff2acb783e FS",
      "parent": "1c794f36-9a65-4673-a1ec-1d442d551b71"
    },
    {
      "id": "f39c9b26-cdbf-4795-9d7b-8d5edecc04c8",
      "text": "Prepare Detailed Legal & Economic Impact Assessments",
      "custom_tooltip": "<b>Prepare Detailed Legal &amp; Economic Impact Assessments</b><br>Develop comprehensive legal and economic impact assessments to support Denmark&#x27;s negotiation position. These assessments should demonstrate the benefits of euro adoption for both Denmark and the EU, and address any potential concerns or risks.<br><b>Resources needed:</b><br><ul><li>Legal Advisory Team</li><li>Economic Advisory Council</li><li>Independent Experts</li></ul>",
      "start_date": "2026-10-19",
      "duration": 36.0,
      "progress": 0,
      "open": true,
      "meta": "1c794f36-9a65-4673-a1ec-1d442d551b71 FF, 719d6663-142b-4686-9482-bb57fc7391c6 FS",
      "parent": "1c794f36-9a65-4673-a1ec-1d442d551b71"
    },

      "id": "2a341622-ec8f-42b1-ab16-b5ddbf5c0637",
      "text": "Draft Legal Amendments & Protocols",
      "custom_tooltip": "<b>Draft Legal Amendments &amp; Protocols</b>",

      "meta": "1c794f36-9a65-4673-a1ec-1d442d551b71 FS",

    {
      "id": "4e64488c-9e94-4cbc-9e9e-453a99c87810",
      "text": "Research existing Danish laws",
      "custom_tooltip": "<b>Research existing Danish laws</b><br>Objective: Identify Danish laws that need amendment or replacement to align with Eurozone regulations.\nScope: Review all relevant legislation, including financial, monetary, and commercial laws.\nSteps: 1. Compile a list of Danish laws potentially affected by euro adoption. 2. Analyze each law to determine necessary changes. 3. Document findings.\nDeliverables: A comprehensive report detailing required legal changes.<br><b>Resources needed:</b><br><ul><li>Legal researchers</li><li>Legal database access</li><li>EU law experts</li></ul>",
      "start_date": "2026-11-24",
      "duration": 19.0,
      "progress": 0,
      "open": true,
      "meta": "2a341622-ec8f-42b1-ab16-b5ddbf5c0637 SS",

    },
    {
      "id": "177b3a63-44cd-4e77-9a92-bfc2fc4f6f64",
      "text": "Draft amendments to Danish laws",
      "custom_tooltip": "<b>Draft amendments to Danish laws</b><br>Objective: Prepare draft amendments to Danish laws identified in the research phase.\nScope: Create specific legal language for each amendment, ensuring compliance with EU law.\nSteps: 1. Draft proposed amendments for each identified law. 2. Review drafts for legal accuracy and consistency. 3. Revise drafts based on feedback.\nDeliverables: Draft legal amendments ready for parliamentary review.<br><b>Resources needed:</b><br><ul><li>Legal drafters</li><li>EU law experts</li><li>Parliamentary counsel</li></ul>",
      "start_date": "2026-12-13",

      "progress": 0,

    {
      "id": "b981245a-97ce-4497-be0f-d6b4cf4d928e",
      "text": "Draft protocols for EU treaties",
      "custom_tooltip": "<b>Draft protocols for EU treaties</b><br>Objective: Develop protocols to existing EU treaties to accommodate Denmark&#x27;s euro adoption, considering its opt-out.\nScope: Define the specific legal framework for Denmark&#x27;s participation in the Eurozone.\nSteps: 1. Analyze EU treaties to identify relevant clauses. 2. Draft protocols outlining Denmark&#x27;s specific conditions. 3. Review protocols with EU legal experts.\nDeliverables: Draft protocols for EU treaty amendments.<br><b>Resources needed:</b><br><ul><li>EU law specialists</li><li>Treaty experts</li><li>Negotiators</li></ul>",
      "start_date": "2027-01-01",
      "duration": 19.0,
      "progress": 0,
      "open": true,
      "meta": "177b3a63-44cd-4e77-9a92-bfc2fc4f6f64 FS",

    },
    {
      "id": "822bf657-11f5-4ed6-bcb6-c935d2d5281e",
      "text": "Consult with legal stakeholders",
      "custom_tooltip": "<b>Consult with legal stakeholders</b><br>Objective: Gather feedback on draft amendments and protocols from relevant stakeholders.\nScope: Engage with government agencies, legal experts, and the public to ensure broad support.\nSteps: 1. Distribute draft documents to stakeholders. 2. Organize consultation meetings and forums. 3. Collect and analyze feedback.\nDeliverables: A summary report of stakeholder feedback and proposed revisions.<br><b>Resources needed:</b><br><ul><li>Legal team</li><li>Communication specialists</li><li>Stakeholder engagement managers</li></ul>",

      "id": "2f6dbd7f-5e13-4c0d-a6f0-550a0e3e2f0a",
      "text": "Analyze potential legal challenges",
      "custom_tooltip": "<b>Analyze potential legal challenges</b><br>Identify potential legal challenges to the EU agreement, including grounds for challenge, potential plaintiffs, and likely outcomes. This involves reviewing the agreement for ambiguities, inconsistencies, or conflicts with existing laws.<br><b>Resources needed:</b><br><ul><li>EU law specialists</li><li>Legal researchers</li><li>Legal database access</li></ul>",

    {
      "id": "bd542d01-b43b-40d8-9c2f-e45f4771b50f",
      "text": "Develop legal defense strategies",
      "custom_tooltip": "<b>Develop legal defense strategies</b><br>Formulate strategies to defend the EU agreement against potential legal challenges. This includes identifying legal precedents, preparing legal arguments, and developing alternative legal interpretations.<br><b>Resources needed:</b><br><ul><li>Senior legal counsel</li><li>Litigation experts</li><li>Legal research team</li></ul>",
