    {
      "id": "23b7c23d-f938-44f5-a9d0-6200dacd5aba",
      "text": "Engage with stakeholders on legal concerns",
      "custom_tooltip": "<b>Engage with stakeholders on legal concerns</b><br>Communicate with stakeholders, including government officials, legal experts, and the public, to address their concerns about the legal aspects of the EU agreement. This involves providing clear and concise explanations of the agreement&#x27;s legal implications.<br><b>Resources needed:</b><br><ul><li>Public relations team</li><li>Legal communication specialists</li><li>Government liaison officers</li></ul>",

    {
      "id": "bb16ef0d-242b-47c2-a857-362d4be892a6",
      "text": "Prepare legal documentation",
      "custom_tooltip": "<b>Prepare legal documentation</b><br>Prepare all necessary legal documentation to support the EU agreement, including legal opinions, briefs, and affidavits. This involves ensuring that all documentation is accurate, complete, and compliant with relevant legal standards.<br><b>Resources needed:</b><br><ul><li>Legal writers</li><li>Document specialists</li><li>Legal proofreaders</li></ul>",

    {
      "id": "ba2e0b36-9b09-4de3-b21b-0acca73abc76",
      "text": "Prepare for potential legal challenges",
      "custom_tooltip": "<b>Prepare for potential legal challenges</b><br>Objective: Anticipate and prepare responses to potential legal challenges to the euro adoption process.\nScope: Identify potential legal arguments against adoption, research relevant case law, and develop counter-arguments.\nSteps: Consult with legal experts, analyze relevant legislation, draft legal briefs.\nDeliverables: A comprehensive legal strategy document outlining potential challenges and responses.<br><b>Resources needed:</b><br><ul><li>Legal experts</li><li>Legal researchers</li><li>EU law specialists</li></ul>",

    {
      "id": "64525c2d-94fa-407b-94a0-574b04556655",
      "text": "Engage with legal stakeholders",
      "custom_tooltip": "<b>Engage with legal stakeholders</b><br>Objective: Proactively engage with key legal stakeholders to address concerns and build consensus.\nScope: Identify relevant legal organizations, schedule meetings, and present legal arguments in favor of adoption.\nSteps: Prepare presentation materials, conduct stakeholder meetings, document feedback.\nDeliverables: Meeting summaries and a stakeholder engagement report.<br><b>Resources needed:</b><br><ul><li>Legal representatives</li><li>Communication specialists</li><li>Stakeholder engagement managers</li></ul>",

    {
      "id": "dd6cd67d-1cd9-4f9a-b038-c2630995f148",
      "text": "Develop legal communication strategy",
      "custom_tooltip": "<b>Develop legal communication strategy</b><br>Objective: Create a clear and concise communication strategy to address public concerns about the legal aspects of euro adoption.\nScope: Identify key messages, target audiences, and communication channels.\nSteps: Draft press releases, prepare FAQs, develop social media content.\nDeliverables: A comprehensive legal communication plan.<br><b>Resources needed:</b><br><ul><li>Communication specialists</li><li>Legal experts</li><li>Public relations professionals</li></ul>",
      "start_date": "2027-08-09",

    },
    {
      "id": "98b460cd-02ec-4088-b325-1f2b9ee7791a",
      "text": "Monitor legal developments",
      "custom_tooltip": "<b>Monitor legal developments</b><br>Objective: Continuously monitor legal developments that could impact the euro adoption process.\nScope: Track relevant court cases, legislative changes, and legal opinions.\nSteps: Subscribe to legal news services, attend legal conferences, and consult with legal experts.\nDeliverables: Regular legal updates and risk assessments.<br><b>Resources needed:</b><br><ul><li>Legal researchers</li><li>Legal analysts</li><li>Subscription to legal news services</li></ul>",

    {
      "id": "155589b2-d6e7-4426-8839-68a62b8e69bf",
      "text": "Develop campaign messaging",
      "custom_tooltip": "<b>Develop campaign messaging</b><br>Craft clear, concise, and persuasive messages highlighting the benefits of euro adoption for different segments of the Danish population. Focus on economic stability, reduced transaction costs, and increased international influence. Ensure messaging is factually accurate and addresses common concerns.<br><b>Resources needed:</b><br><ul><li>Communication specialists</li><li>Economists</li><li>Political scientists</li><li>Public opinion researchers</li></ul>",
      "start_date": "2027-09-24",

      "parent": "b0154d39-d04c-41e7-865d-8aa00688d0a4"
    },
    {
      "id": "1d93e7d3-792a-4351-9840-c2b7a856f5e7",
      "text": "Select communication channels",
      "custom_tooltip": "<b>Select communication channels</b><br>Identify the most effective channels for reaching target audiences, including television, radio, print media, social media, online advertising, and community events. Consider the reach, cost, and credibility of each channel. Prioritize channels that are widely used and trusted by the Danish public.<br><b>Resources needed:</b><br><ul><li>Media planners</li><li>Marketing specialists</li><li>Social media managers</li><li>Public relations professionals</li></ul>",
      "start_date": "2027-10-24",
      "duration": 30.0,
      "progress": 0,
      "open": true,
      "meta": "155589b2-d6e7-4426-8839-68a62b8e69bf FS",
      "parent": "b0154d39-d04c-41e7-865d-8aa00688d0a4"
    },
    {
      "id": "db266a5a-193c-4fc1-ba70-7235abb77888",
      "text": "Create campaign materials",
      "custom_tooltip": "<b>Create campaign materials</b><br>Produce high-quality campaign materials, including videos, infographics, brochures, website content, and social media posts. Ensure materials are visually appealing, easy to understand, and consistent with the overall campaign messaging. Translate materials into multiple languages as needed.<br><b>Resources needed:</b><br><ul><li>Graphic designers</li><li>Video producers</li><li>Copywriters</li><li>Translators</li></ul>",
      "start_date": "2027-11-23",
      "duration": 30.0,
      "progress": 0,
      "open": true,
      "meta": "1d93e7d3-792a-4351-9840-c2b7a856f5e7 FS",

    },
    {
      "id": "178b1be0-b940-4538-9565-c029b7df2edb",
      "text": "Train campaign spokespeople",
      "custom_tooltip": "<b>Train campaign spokespeople</b><br>Prepare campaign spokespeople to effectively communicate the benefits of euro adoption to the public and media. Provide training on key messages, Q&amp;A techniques, and media relations. Select spokespeople who are credible, articulate, and relatable to the Danish public.<br><b>Resources needed:</b><br><ul><li>Communication trainers</li><li>Media coaches</li><li>Public speaking experts</li><li>Key campaign personnel</li></ul>",

    {
      "id": "538f3fa3-d2f8-4eb0-a66e-e905e0f3b4e5",
      "text": "Address Public Concerns & Misconceptions",
      "custom_tooltip": "<b>Address Public Concerns &amp; Misconceptions</b>",
      "progress": 0,
      "open": true,
      "meta": "b0154d39-d04c-41e7-865d-8aa00688d0a4 FS",
      "parent": "c676420e-5432-4d26-ae1e-78d6de2ec57e",
      "type": "project"
    },
    {
      "id": "9a58583e-e550-4af7-8728-a1e67846f702",
      "text": "Identify Key Public Concerns",
      "custom_tooltip": "<b>Identify Key Public Concerns</b><br>Objective: Determine the most pressing concerns and misconceptions the public holds regarding euro adoption.\nScope: Analyze existing polling data, conduct new surveys, and organize focus groups to gather comprehensive data on public sentiment.\nSteps: 1. Review existing public opinion data. 2. Design and administer new surveys. 3. Conduct focus groups with diverse demographics. 4. Analyze collected data to identify key concerns.\nDeliverables: A report outlining the top public concerns and misconceptions about euro adoption.<br><b>Resources needed:</b><br><ul><li>Polling agencies</li><li>Survey design experts</li><li>Focus group facilitators</li><li>Data analysts</li></ul>",
      "start_date": "2028-01-22",
      "duration": 23.0,
      "progress": 0,
      "open": true,
      "meta": "538f3fa3-d2f8-4eb0-a66e-e905e0f3b4e5 SS",
      "parent": "538f3fa3-d2f8-4eb0-a66e-e905e0f3b4e5"
    },
    {
      "id": "0934c7a3-9beb-4ec8-810c-64e422f650d1",
      "text": "Develop Targeted Messaging",
      "custom_tooltip": "<b>Develop Targeted Messaging</b><br>Objective: Create clear, concise, and persuasive messages that directly address the identified public concerns.\nScope: Develop a range of messages tailored to different demographic groups and communication channels.\nSteps: 1. Review the report on key public concerns. 2. Develop draft messages addressing each concern. 3. Test messages with target audiences. 4. Refine messages based on feedback.\nDeliverables: A set of targeted messages addressing key public concerns, ready for use in the public awareness campaign.<br><b>Resources needed:</b><br><ul><li>Communication specialists</li><li>Copywriters</li><li>Marketing experts</li><li>Public relations professionals</li></ul>",
      "start_date": "2028-02-14",
      "duration": 23.0,
      "progress": 0,
      "open": true,
      "meta": "9a58583e-e550-4af7-8728-a1e67846f702 FS",
      "parent": "538f3fa3-d2f8-4eb0-a66e-e905e0f3b4e5"
    },
    {
      "id": "91781659-f055-4186-8a98-dc4fe4c63fb7",
      "text": "Disseminate Information Effectively",
      "custom_tooltip": "<b>Disseminate Information Effectively</b><br>Objective: Ensure that the targeted messages reach the intended audiences through appropriate channels.\nScope: Utilize a multi-channel communication strategy, including traditional media, social media, and community outreach.\nSteps: 1. Identify the most effective communication channels for each target audience. 2. Develop a dissemination plan. 3. Implement the plan, monitoring reach and engagement. 4. Adjust the plan as needed based on performance.\nDeliverables: A comprehensive dissemination plan and ongoing monitoring of its effectiveness.<br><b>Resources needed:</b><br><ul><li>Media buyers</li><li>Social media managers</li><li>Community outreach coordinators</li><li>Public relations professionals</li></ul>",
      "start_date": "2028-03-08",
      "duration": 23.0,
      "progress": 0,
      "open": true,
      "meta": "0934c7a3-9beb-4ec8-810c-64e422f650d1 FS",
      "parent": "538f3fa3-d2f8-4eb0-a66e-e905e0f3b4e5"
    },
    {
      "id": "94f2a324-9f31-4ee5-a839-bc15ec43f611",
      "text": "Monitor Message Impact and Adjust",
      "custom_tooltip": "<b>Monitor Message Impact and Adjust</b><br>Objective: Track the effectiveness of the messaging campaign and make adjustments as needed to maximize its impact.\nScope: Continuously monitor public sentiment and engagement with the messages.\nSteps: 1. Track media coverage and social media activity. 2. Conduct regular surveys to gauge public opinion. 3. Analyze data to identify areas for improvement. 4. Adjust messaging and dissemination strategies based on the analysis.\nDeliverables: Regular reports on message impact and recommendations for adjustments.<br><b>Resources needed:</b><br><ul><li>Data analysts</li><li>Public opinion researchers</li><li>Communication specialists</li><li>Marketing experts</li></ul>",
      "start_date": "2028-03-31",
      "duration": 23.0,
      "progress": 0,
      "open": true,
      "meta": "538f3fa3-d2f8-4eb0-a66e-e905e0f3b4e5 FF, 91781659-f055-4186-8a98-dc4fe4c63fb7 FS",
      "parent": "538f3fa3-d2f8-4eb0-a66e-e905e0f3b4e5"
    },
    {
      "id": "697f6cd2-c620-448d-9b57-893466fbd42f",
      "text": "Conduct Targeted Outreach to Key Demographics",
      "custom_tooltip": "<b>Conduct Targeted Outreach to Key Demographics</b>",
      "progress": 0,
      "open": true,
      "meta": "538f3fa3-d2f8-4eb0-a66e-e905e0f3b4e5 FS",
      "parent": "c676420e-5432-4d26-ae1e-78d6de2ec57e",
      "type": "project"
    },
    {
      "id": "9072aa2d-eebf-41be-bf3f-ecf120ab4ceb",
      "text": "Identify Key Demographic Groups",
      "custom_tooltip": "<b>Identify Key Demographic Groups</b><br>Define the specific demographic groups to target based on factors like age, income, location, and political affiliation. Analyze existing data and conduct preliminary research to understand their current views on euro adoption and their specific concerns.<br><b>Resources needed:</b><br><ul><li>Market research analysts</li><li>Demographic data</li><li>Polling data</li><li>Statistical software</li></ul>",
      "start_date": "2028-04-23",
      "duration": 12.0,
      "progress": 0,
      "open": true,
      "meta": "697f6cd2-c620-448d-9b57-893466fbd42f SS",
      "parent": "697f6cd2-c620-448d-9b57-893466fbd42f"
    },
    {
      "id": "31e3098a-9afd-4bca-9e89-dd098f0610ff",
      "text": "Tailor Messaging for Each Demographic",
      "custom_tooltip": "<b>Tailor Messaging for Each Demographic</b><br>Develop targeted messaging that addresses the specific concerns and interests of each demographic group. This involves crafting different narratives and communication strategies that resonate with their values and priorities. Ensure messaging is culturally sensitive and avoids alienating any particular group.<br><b>Resources needed:</b><br><ul><li>Communication specialists</li><li>Copywriters</li><li>Graphic designers</li><li>Focus groups</li></ul>",
      "start_date": "2028-05-05",
      "duration": 12.0,
      "progress": 0,
      "open": true,
      "meta": "9072aa2d-eebf-41be-bf3f-ecf120ab4ceb FS",
      "parent": "697f6cd2-c620-448d-9b57-893466fbd42f"
    },
    {
      "id": "e8d77597-6fec-41b9-9276-2cfdb798b164",
      "text": "Select Appropriate Outreach Channels",
      "custom_tooltip": "<b>Select Appropriate Outreach Channels</b><br>Determine the most effective channels for reaching each demographic group. This may include traditional media (TV, radio, newspapers), digital platforms (social media, online advertising), community events, and partnerships with local organizations. Consider the media consumption habits and preferences of each target audience.<br><b>Resources needed:</b><br><ul><li>Media planners</li><li>Digital marketing specialists</li><li>Community outreach coordinators</li><li>Advertising budget</li></ul>",
      "start_date": "2028-05-17",
      "duration": 12.0,
      "progress": 0,
      "open": true,
      "meta": "31e3098a-9afd-4bca-9e89-dd098f0610ff FS",
      "parent": "697f6cd2-c620-448d-9b57-893466fbd42f"
    },
    {
      "id": "61135926-e091-4ae4-8aa2-6a88da275e0b",
      "text": "Execute Targeted Outreach Campaigns",
      "custom_tooltip": "<b>Execute Targeted Outreach Campaigns</b><br>Implement the outreach campaigns using the tailored messaging and selected channels. This involves creating and distributing content, organizing events, and engaging with community leaders. Monitor the effectiveness of the campaigns and make adjustments as needed based on feedback and data analysis.<br><b>Resources needed:</b><br><ul><li>Marketing team</li><li>Public relations team</li><li>Event organizers</li><li>Volunteers</li></ul>",
      "start_date": "2028-05-29",
      "duration": 12.0,
      "progress": 0,
      "open": true,
      "meta": "e8d77597-6fec-41b9-9276-2cfdb798b164 FS",
      "parent": "697f6cd2-c620-448d-9b57-893466fbd42f"
    },
    {
      "id": "ddbe30b6-6196-4d5d-b4c3-27cde3323e2b",
      "text": "Monitor and Evaluate Campaign Impact",
      "custom_tooltip": "<b>Monitor and Evaluate Campaign Impact</b><br>Track the impact of the targeted outreach campaigns on public opinion within each demographic group. This involves conducting surveys, analyzing social media sentiment, and monitoring media coverage. Use the data to assess the effectiveness of the campaigns and identify areas for improvement.<br><b>Resources needed:</b><br><ul><li>Data analysts</li><li>Polling agencies</li><li>Social media monitoring tools</li><li>Reporting software</li></ul>",
      "start_date": "2028-06-10",
      "duration": 12.0,

      "text": "Monitor media coverage of euro adoption",
      "custom_tooltip": "<b>Monitor media coverage of euro adoption</b><br>Continuously track news articles, opinion pieces, and social media discussions related to Denmark&#x27;s potential euro adoption to identify emerging narratives and public sentiment.<br><b>Resources needed:</b><br><ul><li>Media monitoring software</li><li>Communication specialists</li><li>Social media analysts</li></ul>",

      "text": "Develop proactive communication strategies",
      "custom_tooltip": "<b>Develop proactive communication strategies</b><br>Create targeted messaging and communication plans to address potential misinformation, counter negative narratives, and promote accurate information about the benefits and implications of euro adoption.<br><b>Resources needed:</b><br><ul><li>Communication strategists</li><li>Public relations specialists</li><li>Content creators</li></ul>",

      "custom_tooltip": "<b>Engage with journalists and media outlets</b><br>Establish relationships with journalists and media outlets to ensure balanced and accurate reporting on euro adoption, provide expert commentary, and proactively address any concerns or questions.<br><b>Resources needed:</b><br><ul><li>Media relations specialists</li><li>Spokespersons</li><li>Press release distribution channels</li></ul>",

      "custom_tooltip": "<b>Manage social media presence and engagement</b><br>Maintain an active and informative presence on social media platforms to engage with the public, answer questions, address concerns, and counter misinformation related to euro adoption.<br><b>Resources needed:</b><br><ul><li>Social media managers</li><li>Community moderators</li><li>Content creators</li></ul>",

      "id": "530ba97b-0199-4f2a-b6a4-4625b59336c4",
      "text": "Finalize Polling Station Logistics",
      "custom_tooltip": "<b>Finalize Polling Station Logistics</b><br>Confirm locations, staffing, and equipment for all polling stations. Ensure accessibility and security protocols are in place.<br><b>Resources needed:</b><br><ul><li>Logistics coordinator</li><li>Security personnel</li><li>Volunteers</li></ul>",

      "text": "Distribute Voter Information Materials",
      "custom_tooltip": "<b>Distribute Voter Information Materials</b><br>Ensure all registered voters receive information on polling locations, voting procedures, and candidate information.<br><b>Resources needed:</b><br><ul><li>Postal service</li><li>Volunteers</li><li>Communication team</li></ul>",

      "id": "315e933b-23e0-4922-afb6-56e23573358b",
      "text": "Oversee Voting Process",
      "custom_tooltip": "<b>Oversee Voting Process</b><br>Monitor polling stations to ensure fair and transparent voting procedures. Address any issues or complaints that arise.<br><b>Resources needed:</b><br><ul><li>Election officials</li><li>Observers</li><li>Security personnel</li></ul>",

      "id": "a9a5a554-1fe4-478a-9c36-7e7424f0e120",
      "text": "Count Ballots and Report Results",
      "custom_tooltip": "<b>Count Ballots and Report Results</b><br>Accurately count all ballots and report the results to the appropriate authorities. Maintain chain of custody for all ballots.<br><b>Resources needed:</b><br><ul><li>Election officials</li><li>Data entry personnel</li><li>Auditors</li></ul>",

      "text": "Secure Ballot Storage Post-Election",
      "custom_tooltip": "<b>Secure Ballot Storage Post-Election</b><br>Ensure secure storage of all ballots and election materials for the required retention period.<br><b>Resources needed:</b><br><ul><li>Security personnel</li><li>Storage facility</li><li>Records management team</li></ul>",

    {
      "id": "efcc4426-38ad-403f-bb43-4383fc8bdcfa",
      "text": "Analyze historical economic data",
      "custom_tooltip": "<b>Analyze historical economic data</b><br>Objective: Gather and analyze historical economic data to understand Denmark&#x27;s economic performance and identify potential vulnerabilities.\nScope: Collection of data on GDP, inflation, unemployment, interest rates, and exchange rates.\nSteps: 1. Identify relevant data sources. 2. Collect data from national and international databases. 3. Analyze data using statistical methods.\nDeliverables: A report summarizing historical economic trends and potential risks.<br><b>Resources needed:</b><br><ul><li>Economists</li><li>Data analysts</li><li>Statistical software</li></ul>",
      "start_date": "2028-07-27",
      "duration": 23.0,
      "progress": 0,
      "open": true,
      "meta": "34bc2c6c-041a-43df-9732-649776bbf803 SS",
      "parent": "34bc2c6c-041a-43df-9732-649776bbf803"
    },
    {
      "id": "3890c841-240a-43a9-8d45-99d8822f4e49",
      "text": "Forecast economic impact of euro adoption",
      "custom_tooltip": "<b>Forecast economic impact of euro adoption</b><br>Objective: Develop economic forecasts to predict the impact of euro adoption on the Danish economy.\nScope: Modeling the effects of euro adoption on GDP, inflation, unemployment, and trade.\nSteps: 1. Develop macroeconomic models. 2. Simulate different scenarios. 3. Analyze the results and identify potential impacts.\nDeliverables: A report presenting economic forecasts and potential impacts of euro adoption.<br><b>Resources needed:</b><br><ul><li>Economists</li><li>Macroeconomic modelers</li><li>Simulation software</li></ul>",
      "start_date": "2028-08-19",
      "duration": 23.0,
      "progress": 0,
      "open": true,
      "meta": "efcc4426-38ad-403f-bb43-4383fc8bdcfa FS",
      "parent": "34bc2c6c-041a-43df-9732-649776bbf803"
    },
    {
      "id": "70753074-ef4d-45ad-8e78-e37cca64ca80",
      "text": "Assess impact on key sectors",
      "custom_tooltip": "<b>Assess impact on key sectors</b><br>Objective: Assess the impact of euro adoption on key sectors of the Danish economy, such as finance, trade, and tourism.\nScope: Analyzing the effects of euro adoption on sector-specific performance and competitiveness.\nSteps: 1. Identify key sectors. 2. Collect data on sector-specific performance. 3. Analyze the data and identify potential impacts.\nDeliverables: A report summarizing the impact of euro adoption on key sectors.<br><b>Resources needed:</b><br><ul><li>Sector specialists</li><li>Economists</li><li>Industry data</li></ul>",
      "start_date": "2028-09-11",
      "duration": 23.0,
      "progress": 0,
      "open": true,
      "meta": "3890c841-240a-43a9-8d45-99d8822f4e49 FS",
      "parent": "34bc2c6c-041a-43df-9732-649776bbf803"
    },
    {
      "id": "2719f332-1db4-47c3-9521-f76a11e8f8db",
      "text": "Develop transition strategies",
      "custom_tooltip": "<b>Develop transition strategies</b><br>Objective: Develop transition strategies to mitigate potential negative impacts and maximize the benefits of euro adoption.\nScope: Designing policies and measures to support businesses and consumers during the transition.\nSteps: 1. Identify potential challenges. 2. Develop mitigation strategies. 3. Consult with stakeholders.\nDeliverables: A report outlining transition strategies and implementation plans.<br><b>Resources needed:</b><br><ul><li>Policy advisors</li><li>Economists</li><li>Stakeholder representatives</li></ul>",
      "start_date": "2028-10-04",
      "duration": 23.0,
      "progress": 0,
      "open": true,
      "meta": "34bc2c6c-041a-43df-9732-649776bbf803 FF, 70753074-ef4d-45ad-8e78-e37cca64ca80 FS",
      "parent": "34bc2c6c-041a-43df-9732-649776bbf803"
    },

    {
      "id": "9a56c9d8-0f3d-42a5-9edd-a8d629552372",
      "text": "Analyze current financial systems",
      "custom_tooltip": "<b>Analyze current financial systems</b><br>Objective: Understand the current state of Danish financial systems. Scope: Identify all relevant systems and their functionalities. Steps: Conduct interviews with key stakeholders, review system documentation, and perform gap analysis. Deliverables: A report outlining the current state of financial systems.<br><b>Resources needed:</b><br><ul><li>Financial analysts</li><li>IT specialists</li><li>Project manager</li></ul>",
      "start_date": "2028-10-27",
      "duration": 15.0,
      "progress": 0,
      "open": true,
      "meta": "c73a588a-1b2a-433e-972a-a63f05d525fc SS",
      "parent": "c73a588a-1b2a-433e-972a-a63f05d525fc"
    },
    {
      "id": "3914957f-ce77-4f01-9112-ef58b03c38e4",
      "text": "Define euro conversion requirements",
      "custom_tooltip": "<b>Define euro conversion requirements</b><br>Objective: Determine the specific requirements for converting financial systems to the euro. Scope: Identify necessary changes to IT systems, accounting practices, and regulatory compliance. Steps: Consult with EU experts, review relevant regulations, and conduct impact assessments. Deliverables: A detailed list of euro conversion requirements.<br><b>Resources needed:</b><br><ul><li>EU law specialists</li><li>Financial regulators</li><li>IT architects</li></ul>",
      "start_date": "2028-11-11",
      "duration": 15.0,
      "progress": 0,
      "open": true,
      "meta": "9a56c9d8-0f3d-42a5-9edd-a8d629552372 FS",
      "parent": "c73a588a-1b2a-433e-972a-a63f05d525fc"
    },
    {
      "id": "54b931ad-8a40-43ae-acb1-c06393d90500",
      "text": "Develop conversion strategy options",
      "custom_tooltip": "<b>Develop conversion strategy options</b><br>Objective: Create multiple strategies for converting financial systems to the euro. Scope: Consider different approaches, timelines, and resource allocations. Steps: Brainstorm potential strategies, evaluate their feasibility, and assess their risks and benefits. Deliverables: A report outlining several conversion strategy options.<br><b>Resources needed:</b><br><ul><li>Strategy consultants</li><li>Financial experts</li><li>Risk analysts</li></ul>",
      "start_date": "2028-11-26",
      "duration": 15.0,
      "progress": 0,
      "open": true,
      "meta": "3914957f-ce77-4f01-9112-ef58b03c38e4 FS",
      "parent": "c73a588a-1b2a-433e-972a-a63f05d525fc"
    },
    {
      "id": "82b3c148-0a7c-4739-8a8e-aa386eba7680",
      "text": "Evaluate and select best strategy",
      "custom_tooltip": "<b>Evaluate and select best strategy</b><br>Objective: Choose the most appropriate conversion strategy. Scope: Consider factors such as cost, risk, and impact on financial institutions. Steps: Conduct a cost-benefit analysis, assess stakeholder preferences, and make a final decision. Deliverables: A selected euro conversion strategy.<br><b>Resources needed:</b><br><ul><li>Decision-makers</li><li>Financial analysts</li><li>Stakeholder representatives</li></ul>",
      "start_date": "2028-12-11",
      "duration": 15.0,
      "progress": 0,
      "open": true,
      "meta": "c73a588a-1b2a-433e-972a-a63f05d525fc FF, 54b931ad-8a40-43ae-acb1-c06393d90500 FS",
      "parent": "c73a588a-1b2a-433e-972a-a63f05d525fc"
    },
    {
      "id": "90c41a0f-b067-4aff-af3d-afa2f54c1ac8",

      "custom_tooltip": "<b>Assess IT System Upgrade Requirements</b>",

    {
      "id": "790e2b6a-778e-4ddd-a753-0a4dd25153bb",
      "text": "Inventory current IT systems",
      "custom_tooltip": "<b>Inventory current IT systems</b><br>Document all existing IT systems used by the bank, including hardware, software, and network infrastructure. Identify systems that will be impacted by the euro conversion.<br><b>Resources needed:</b><br><ul><li>IT architects</li><li>System administrators</li><li>Database administrators</li></ul>",
      "start_date": "2028-12-26",
      "duration": 9.0,
      "progress": 0,
      "open": true,
      "meta": "90c41a0f-b067-4aff-af3d-afa2f54c1ac8 SS",
      "parent": "90c41a0f-b067-4aff-af3d-afa2f54c1ac8"
    },
    {
      "id": "eabd33e8-6df3-4e24-b8c9-ab991aeacada",
      "text": "Assess euro compatibility",
      "custom_tooltip": "<b>Assess euro compatibility</b><br>Evaluate the compatibility of existing IT systems with the euro. Identify necessary upgrades, patches, or replacements to ensure seamless euro transactions.<br><b>Resources needed:</b><br><ul><li>IT architects</li><li>Software developers</li><li>Euro conversion specialists</li></ul>",
      "start_date": "2029-01-04",
      "duration": 9.0,
      "progress": 0,
      "open": true,
      "meta": "790e2b6a-778e-4ddd-a753-0a4dd25153bb FS",
      "parent": "90c41a0f-b067-4aff-af3d-afa2f54c1ac8"
    },
    {
      "id": "161c8080-37c3-4451-82d7-cc28c2adbbf2",
      "text": "Estimate upgrade costs",
      "custom_tooltip": "<b>Estimate upgrade costs</b><br>Develop a detailed cost estimate for upgrading or replacing incompatible IT systems. Include hardware, software, labor, and training costs.<br><b>Resources needed:</b><br><ul><li>Cost estimators</li><li>IT architects</li><li>Procurement specialists</li></ul>",
      "start_date": "2029-01-13",
      "duration": 9.0,
      "progress": 0,
      "open": true,
      "meta": "eabd33e8-6df3-4e24-b8c9-ab991aeacada FS",
      "parent": "90c41a0f-b067-4aff-af3d-afa2f54c1ac8"
    },
    {
      "id": "c0d3b6c3-ddc6-4c7f-b773-2d1f7987801c",
      "text": "Prioritize system upgrades",
      "custom_tooltip": "<b>Prioritize system upgrades</b><br>Rank IT system upgrades based on criticality and impact on euro conversion. Focus on systems that handle core banking functions and customer transactions.<br><b>Resources needed:</b><br><ul><li>IT managers</li><li>Business analysts</li><li>Risk assessment specialists</li></ul>",
      "start_date": "2029-01-22",
      "duration": 9.0,
      "progress": 0,
      "open": true,
      "meta": "161c8080-37c3-4451-82d7-cc28c2adbbf2 FS",
      "parent": "90c41a0f-b067-4aff-af3d-afa2f54c1ac8"
    },
    {
      "id": "95fd0528-a8e8-4442-9da5-52c32f0c7cdc",
      "text": "Document upgrade requirements",
      "custom_tooltip": "<b>Document upgrade requirements</b><br>Create detailed documentation outlining the specific requirements for each IT system upgrade. Include technical specifications, functional requirements, and testing procedures.<br><b>Resources needed:</b><br><ul><li>Technical writers</li><li>System analysts</li><li>Software developers</li></ul>",
      "start_date": "2029-01-31",
      "duration": 9.0,
      "progress": 0,
      "open": true,
      "meta": "90c41a0f-b067-4aff-af3d-afa2f54c1ac8 FF, c0d3b6c3-ddc6-4c7f-b773-2d1f7987801c FS",
      "parent": "90c41a0f-b067-4aff-af3d-afa2f54c1ac8"
    },
    {
      "id": "fd963aaf-a6dd-42d1-9b15-6bd85a595546",
      "text": "Develop Risk Mitigation Framework",
      "custom_tooltip": "<b>Develop Risk Mitigation Framework</b>",
      "progress": 0,
      "open": true,
      "meta": "90c41a0f-b067-4aff-af3d-afa2f54c1ac8 FS",
      "parent": "6420f271-0505-40e0-8b5b-2016a675f00b",
      "type": "project"
    },
    {
      "id": "4c8fb881-5776-4242-8e47-0b442daa2b06",
      "text": "Identify potential economic shock scenarios",
      "custom_tooltip": "<b>Identify potential economic shock scenarios</b><br>Define a range of plausible economic shock scenarios that could impact Denmark during the euro adoption process. This includes global recessions, financial crises, and unexpected changes in trade relationships. Objective is to create a comprehensive set of scenarios for risk assessment.<br><b>Resources needed:</b><br><ul><li>Economists</li><li>Financial analysts</li><li>Scenario planning experts</li></ul>",
      "start_date": "2029-02-09",
      "duration": 15.0,
      "progress": 0,
      "open": true,
      "meta": "fd963aaf-a6dd-42d1-9b15-6bd85a595546 SS",
      "parent": "fd963aaf-a6dd-42d1-9b15-6bd85a595546"
    },
    {
      "id": "bfa39f0f-bd73-485e-bdef-1c7babe6dd9f",
      "text": "Assess likelihood and impact of each shock",
      "custom_tooltip": "<b>Assess likelihood and impact of each shock</b><br>Evaluate the probability of occurrence and potential impact of each identified economic shock scenario on the Danish economy. This involves quantitative analysis using economic models and qualitative assessments based on expert judgment. Deliverable: A risk matrix prioritizing scenarios based on likelihood and impact.<br><b>Resources needed:</b><br><ul><li>Econometricians</li><li>Risk management specialists</li><li>Data analysts</li></ul>",
      "start_date": "2029-02-24",
      "duration": 15.0,
      "progress": 0,
      "open": true,
      "meta": "4c8fb881-5776-4242-8e47-0b442daa2b06 FS",
      "parent": "fd963aaf-a6dd-42d1-9b15-6bd85a595546"
    },
    {
      "id": "5b3ddf13-4173-43db-b8be-37a40c368073",
      "text": "Develop mitigation strategies for key risks",
      "custom_tooltip": "<b>Develop mitigation strategies for key risks</b><br>Design specific mitigation strategies to address the most significant economic risks identified. These strategies may include fiscal policies, monetary policies, and financial regulations. Objective: To create a set of actionable plans to minimize the negative impacts of potential economic shocks.<br><b>Resources needed:</b><br><ul><li>Policy advisors</li><li>Central bank officials</li><li>Regulatory experts</li></ul>",
      "start_date": "2029-03-11",
      "duration": 15.0,
      "progress": 0,
      "open": true,

      "id": "72dd56b2-4208-4c8e-89f0-0502e8741e7c",
      "text": "Establish early warning indicators",
      "custom_tooltip": "<b>Establish early warning indicators</b><br>Identify key economic indicators that can provide early warnings of potential economic shocks. This involves selecting relevant data points and establishing monitoring systems to track these indicators. Deliverable: A dashboard of early warning indicators with defined thresholds and alert mechanisms.<br><b>Resources needed:</b><br><ul><li>Data scientists</li><li>Economic forecasters</li><li>IT specialists</li></ul>",

    {
      "id": "3e844de1-4c45-49cc-bfd3-3bdae49af536",
      "text": "Identify potential economic shock scenarios",
      "custom_tooltip": "<b>Identify potential economic shock scenarios</b><br>Objective: Define a range of plausible economic shock scenarios that could impact Denmark during the euro adoption process.\nScope: Global economic downturn, financial crisis, trade war, unexpected inflation surge, etc.\nSteps: Review historical economic data, consult with economists, analyze current geopolitical risks, develop scenario narratives.\nDeliverables: A documented list of economic shock scenarios with detailed descriptions and potential impacts.<br><b>Resources needed:</b><br><ul><li>Economists</li><li>Financial analysts</li><li>Risk management specialists</li><li>Economic data sources</li></ul>",
      "start_date": "2029-04-10",
      "duration": 8.0,
      "progress": 0,
      "open": true,
      "meta": "678c8803-7fe2-40c3-b215-0cfa91ec1575 SS",
      "parent": "678c8803-7fe2-40c3-b215-0cfa91ec1575"
    },
    {
      "id": "2b99ba04-399c-4153-b6b8-a917689e14dd",
      "text": "Assess impact of shocks on key indicators",
      "custom_tooltip": "<b>Assess impact of shocks on key indicators</b><br>Objective: Evaluate the potential impact of each identified economic shock scenario on key economic indicators.\nScope: GDP growth, inflation, unemployment, interest rates, exchange rates, government debt.\nSteps: Use economic modeling tools, conduct stress tests, analyze historical data, consult with experts.\nDeliverables: A report detailing the projected impact of each economic shock scenario on key economic indicators.<br><b>Resources needed:</b><br><ul><li>Econometricians</li><li>Economic modeling software</li><li>Historical economic data</li><li>Financial analysts</li></ul>",
      "start_date": "2029-04-18",
      "duration": 8.0,
      "progress": 0,
      "open": true,
      "meta": "3e844de1-4c45-49cc-bfd3-3bdae49af536 FS",
      "parent": "678c8803-7fe2-40c3-b215-0cfa91ec1575"
    },
    {
      "id": "87e41c1e-548c-437a-bb83-8af584006b1a",
      "text": "Develop mitigation strategies for each shock",
      "custom_tooltip": "<b>Develop mitigation strategies for each shock</b><br>Objective: Create specific mitigation strategies to address the potential negative impacts of each economic shock scenario.\nScope: Fiscal policy adjustments, monetary policy interventions, financial regulations, international cooperation.\nSteps: Brainstorm potential mitigation measures, evaluate their effectiveness, assess their feasibility, develop detailed action plans.\nDeliverables: A comprehensive risk mitigation framework with specific strategies for each economic shock scenario.<br><b>Resources needed:</b><br><ul><li>Policy advisors</li><li>Central bank officials</li><li>Financial regulators</li><li>International relations experts</li></ul>",
      "start_date": "2029-04-26",
      "duration": 8.0,
      "progress": 0,
      "open": true,
      "meta": "2b99ba04-399c-4153-b6b8-a917689e14dd FS",

    },
    {
      "id": "16ff48a0-5af9-482e-ac6a-f3b43852f771",
      "text": "Document risk mitigation framework",
      "custom_tooltip": "<b>Document risk mitigation framework</b><br>Objective: Compile all identified risks, impact assessments, and mitigation strategies into a comprehensive and easily accessible document.\nScope: The document should cover all identified economic shock scenarios and their corresponding mitigation plans.\nSteps: Organize information logically, write clear and concise descriptions, create visual aids, ensure consistency and accuracy.\nDeliverables: A well-documented risk mitigation framework for managing economic shocks during euro adoption.<br><b>Resources needed:</b><br><ul><li>Technical writers</li><li>Project managers</li><li>Document management system</li></ul>",
      "start_date": "2029-05-04",
      "duration": 8.0,
      "progress": 0,
      "open": true,

      "custom_tooltip": "<b>Assess current banking IT infrastructure</b><br>Evaluate existing IT systems for euro compatibility. Identify necessary upgrades and modifications. Document findings in a detailed report.<br><b>Resources needed:</b><br><ul><li>IT architects</li><li>System analysts</li><li>Security experts</li></ul>",

      "custom_tooltip": "<b>Develop detailed upgrade specifications</b><br>Create comprehensive technical specifications for all required IT system upgrades. Include hardware, software, and security requirements. Ensure compliance with ECB regulations.<br><b>Resources needed:</b><br><ul><li>IT engineers</li><li>Software developers</li><li>Compliance officers</li></ul>",

      "id": "162180ee-fa5b-43d6-9da2-92518583b412",
      "text": "Select vendors and negotiate contracts",
      "custom_tooltip": "<b>Select vendors and negotiate contracts</b><br>Identify and evaluate potential vendors for IT system upgrades. Negotiate contracts that meet budget and timeline requirements. Ensure service level agreements are in place.<br><b>Resources needed:</b><br><ul><li>Procurement specialists</li><li>Legal counsel</li><li>Project managers</li></ul>",

      "id": "8f519621-a0e0-4c6b-be9b-a20c10b90bf2",
      "text": "Implement and test IT system upgrades",
      "custom_tooltip": "<b>Implement and test IT system upgrades</b><br>Install and configure new hardware and software. Conduct thorough testing to ensure functionality and security. Address any issues identified during testing.<br><b>Resources needed:</b><br><ul><li>IT technicians</li><li>Software testers</li><li>Security analysts</li></ul>",

      "text": "Train bank staff on new systems",
      "custom_tooltip": "<b>Train bank staff on new systems</b><br>Develop and deliver training programs for bank staff on the upgraded IT systems. Provide ongoing support and documentation.<br><b>Resources needed:</b><br><ul><li>Training specialists</li><li>Technical writers</li><li>Support staff</li></ul>",

      "id": "130350c3-0fbb-41d8-bd57-f12f906e9c92",
      "text": "Assess Payment System Compatibility",
      "custom_tooltip": "<b>Assess Payment System Compatibility</b><br>Evaluate existing payment systems (credit cards, mobile payments, online banking) for compatibility with the euro. Identify necessary modifications or upgrades.<br><b>Resources needed:</b><br><ul><li>Payment system analysts</li><li>IT specialists</li><li>Financial consultants</li></ul>",

      "id": "bdd981f1-db36-45e6-9668-bffb38ccac55",
      "text": "Develop Conversion Protocols",
      "custom_tooltip": "<b>Develop Conversion Protocols</b><br>Create detailed protocols for converting payment systems to handle euro transactions. Include specifications for data formats, security measures, and transaction processing.<br><b>Resources needed:</b><br><ul><li>Payment system architects</li><li>Security experts</li><li>Software developers</li></ul>",

      "id": "54cd2b0a-ac5c-4ea8-9462-ec5ddf55b14a",
      "text": "Test Euro Payment Functionality",
      "custom_tooltip": "<b>Test Euro Payment Functionality</b><br>Conduct thorough testing of converted payment systems to ensure accurate euro transactions, security, and compliance with regulations. Simulate various transaction scenarios.<br><b>Resources needed:</b><br><ul><li>Testing team</li><li>Quality assurance engineers</li><li>Security auditors</li></ul>",
      "start_date": "2030-04-19",

    {
      "id": "efa6c9ef-416f-4b11-8c84-cb3127737d0d",
      "text": "Train Payment System Personnel",
      "custom_tooltip": "<b>Train Payment System Personnel</b><br>Provide training to payment system personnel on the new euro payment procedures, system functionalities, and security protocols. Ensure they are proficient in handling euro transactions.<br><b>Resources needed:</b><br><ul><li>Training specialists</li><li>Payment system experts</li><li>Documentation specialists</li></ul>",

      "id": "e1652fef-390f-4628-acd0-06df743124c7",
      "text": "Coordinate with Payment Providers",
      "custom_tooltip": "<b>Coordinate with Payment Providers</b><br>Collaborate with payment providers (banks, credit card companies, mobile payment platforms) to ensure a smooth transition to euro payments. Address any concerns or technical issues.<br><b>Resources needed:</b><br><ul><li>Project managers</li><li>Communication specialists</li><li>Payment system liaisons</li></ul>",

      "custom_tooltip": "<b>Finalize transition plan details</b><br>Refine the financial system transition approach, including specific timelines, responsibilities, and communication protocols. This involves incorporating feedback from stakeholders and addressing any outstanding concerns.<br><b>Resources needed:</b><br><ul><li>Financial analysts</li><li>Project managers</li><li>Communication specialists</li></ul>",

    {
      "id": "e7eb4f21-22a9-4424-8848-f01bcad5569e",
      "text": "Communicate transition plan to stakeholders",
      "custom_tooltip": "<b>Communicate transition plan to stakeholders</b><br>Disseminate the finalized financial system transition approach to all relevant stakeholders, including financial institutions, government agencies, and the public. This involves creating clear and concise communication materials and conducting outreach activities.<br><b>Resources needed:</b><br><ul><li>Communication specialists</li><li>Public relations team</li><li>Stakeholder engagement managers</li></ul>",

    },
    {
      "id": "ce6ed8bf-cfb0-4526-a28a-5f3a588cbd9c",
      "text": "Establish monitoring and feedback mechanisms",
      "custom_tooltip": "<b>Establish monitoring and feedback mechanisms</b><br>Set up systems to monitor the implementation of the financial system transition approach and gather feedback from stakeholders. This involves establishing key performance indicators (KPIs) and creating channels for communication and feedback.<br><b>Resources needed:</b><br><ul><li>Data analysts</li><li>Project managers</li><li>Stakeholder engagement managers</li></ul>",
      "start_date": "2030-09-04",

    },
    {
      "id": "37c60ed6-b0e0-424b-bb77-1bc80be10b7e",
      "text": "Address regulatory alignment issues",
      "custom_tooltip": "<b>Address regulatory alignment issues</b><br>Identify and resolve any regulatory alignment issues that may arise during the implementation of the financial system transition approach. This involves working with regulatory bodies to ensure compliance and address any potential conflicts.<br><b>Resources needed:</b><br><ul><li>Legal experts</li><li>Regulatory compliance officers</li><li>Financial analysts</li></ul>",

    {
      "id": "45e4f0b4-c180-46be-93d3-284d76e05f6b",
      "text": "Conduct Stress Tests",
      "custom_tooltip": "<b>Conduct Stress Tests</b><br>Perform stress tests on financial institutions to evaluate their resilience to adverse economic scenarios.<br><b>Resources needed:</b><br><ul><li>Financial modelers</li><li>Risk management experts</li><li>Economic scenarios</li></ul>",

      "id": "3ec600c8-d56d-4bb5-acd2-e4e8fcfddbe2",
      "text": "Assess Regulatory Compliance",
      "custom_tooltip": "<b>Assess Regulatory Compliance</b><br>Evaluate the compliance of financial institutions with relevant regulations and guidelines to ensure stability.<br><b>Resources needed:</b><br><ul><li>Compliance officers</li><li>Legal experts</li><li>Regulatory frameworks</li></ul>",

      "id": "c1536ede-09a5-46c5-83c0-5fef0b7336bb",
      "text": "Report Stability Assessment",
      "custom_tooltip": "<b>Report Stability Assessment</b><br>Prepare and disseminate reports on the overall stability of the financial system, highlighting potential risks and vulnerabilities.<br><b>Resources needed:</b><br><ul><li>Report writers</li><li>Communication specialists</li><li>Assessment data</li></ul>",

      "id": "5dd7d801-36f9-44fd-9341-bf787b893bb9",
      "text": "Establish Exchange Rate and Procedures",
      "custom_tooltip": "<b>Establish Exchange Rate and Procedures</b><br>Define the official exchange rate between DKK and EUR. Develop clear and simple procedures for currency exchange at banks and exchange offices. Publish guidelines for businesses on handling the transition.<br><b>Resources needed:</b><br><ul><li>Economists</li><li>Financial analysts</li><li>Legal experts</li><li>Communication specialists</li></ul>",

    {
      "id": "946ae5be-088b-4ad7-ad6e-1c3ccd8093c1",
      "text": "Coordinate Logistics for Cash Conversion",
      "custom_tooltip": "<b>Coordinate Logistics for Cash Conversion</b><br>Plan the physical movement of DKK and EUR banknotes and coins. Coordinate with banks, security companies, and the central bank to ensure a secure and efficient process. Establish temporary exchange points.<br><b>Resources needed:</b><br><ul><li>Logistics experts</li><li>Security personnel</li><li>Bank staff</li><li>Central bank representatives</li></ul>",
      "start_date": "2031-07-28",
      "duration": 27.0,

    {
      "id": "3dd8f791-9c6e-4e57-8f3f-65c22165453c",
      "text": "Communicate Exchange Details to the Public",
      "custom_tooltip": "<b>Communicate Exchange Details to the Public</b><br>Launch a public awareness campaign to inform citizens about the exchange rate, procedures, and deadlines. Use various media channels to reach all segments of the population. Address common questions and concerns.<br><b>Resources needed:</b><br><ul><li>Communication specialists</li><li>Public relations team</li><li>Marketing professionals</li><li>Translators</li></ul>",
      "start_date": "2031-08-24",
      "duration": 27.0,

    },
    {
      "id": "08fbd277-9fd5-4774-913e-c65359135cab",
      "text": "Manage DKK Withdrawal and Destruction",
      "custom_tooltip": "<b>Manage DKK Withdrawal and Destruction</b><br>Oversee the withdrawal of DKK banknotes and coins from circulation. Implement a secure process for destroying the withdrawn currency. Monitor the amount of DKK remaining in circulation.<br><b>Resources needed:</b><br><ul><li>Central bank staff</li><li>Security personnel</li><li>Accounting professionals</li><li>Logistics experts</li></ul>",
      "start_date": "2031-09-20",
      "duration": 27.0,
      "progress": 0,
      "open": true,
      "meta": "3dd8f791-9c6e-4e57-8f3f-65c22165453c FS",
      "parent": "45fd5d95-687b-43a5-a04c-9b33acc18978"
    },
    {
      "id": "e969102a-951e-485d-982e-8e97f9cef685",
      "text": "Monitor Exchange Process and Address Issues",
      "custom_tooltip": "<b>Monitor Exchange Process and Address Issues</b><br>Track the progress of the currency exchange process. Identify and resolve any problems or bottlenecks. Provide support to banks and exchange offices. Address public complaints and concerns.<br><b>Resources needed:</b><br><ul><li>Project managers</li><li>Customer service representatives</li><li>Bank liaison officers</li><li>Financial analysts</li></ul>",
      "start_date": "2031-10-17",
      "duration": 27.0,
      "progress": 0,
      "open": true,

    {
      "id": "8e0d0bd6-1f07-4886-8b5d-fce084c9d29e",
      "text": "Monitor Economic Performance",
      "custom_tooltip": "<b>Monitor Economic Performance</b>",

    {
      "id": "45c8064f-07bd-48d9-b4d8-49d2ca65c1ea",
      "text": "Gather key economic indicators data",
      "custom_tooltip": "<b>Gather key economic indicators data</b><br>Collect data on GDP, inflation, unemployment, and trade balance before and after euro adoption.<br><b>Resources needed:</b><br><ul><li>Economists</li><li>Data analysts</li><li>Statistical software</li></ul>",
      "start_date": "2031-11-13",
      "duration": 30.0,
      "progress": 0,
      "open": true,
      "meta": "8e0d0bd6-1f07-4886-8b5d-fce084c9d29e SS",
      "parent": "8e0d0bd6-1f07-4886-8b5d-fce084c9d29e"
    },
    {
      "id": "c61167d8-7fcb-4b31-b11c-26181d2a4251",
      "text": "Analyze impact on key sectors",
      "custom_tooltip": "<b>Analyze impact on key sectors</b><br>Assess the effects of euro adoption on specific industries like tourism, manufacturing, and finance.<br><b>Resources needed:</b><br><ul><li>Industry experts</li><li>Economic analysts</li><li>Research reports</li></ul>",
      "start_date": "2031-12-13",
      "duration": 30.0,
      "progress": 0,
      "open": true,
      "meta": "45c8064f-07bd-48d9-b4d8-49d2ca65c1ea FS",

    },
    {
      "id": "81922092-0393-4b85-9b95-4be1325f6116",
      "text": "Compare Denmark to other Eurozone nations",
      "custom_tooltip": "<b>Compare Denmark to other Eurozone nations</b><br>Benchmark Denmark&#x27;s economic performance against other countries that have adopted the euro.<br><b>Resources needed:</b><br><ul><li>Economists</li><li>Comparative data</li><li>Statistical analysis tools</li></ul>",
      "start_date": "2032-01-12",
      "duration": 30.0,
      "progress": 0,
      "open": true,
      "meta": "c61167d8-7fcb-4b31-b11c-26181d2a4251 FS",
      "parent": "8e0d0bd6-1f07-4886-8b5d-fce084c9d29e"
    },
    {
      "id": "8c1f98af-2122-4078-9d56-26a44ce1130b",
      "text": "Assess long-term economic trends",
      "custom_tooltip": "<b>Assess long-term economic trends</b><br>Evaluate the sustained impact of euro adoption on Denmark&#x27;s economic growth and stability over time.<br><b>Resources needed:</b><br><ul><li>Economists</li><li>Longitudinal data</li><li>Forecasting models</li></ul>",
      "start_date": "2032-02-11",
      "duration": 30.0,
      "progress": 0,
      "open": true,
      "meta": "8e0d0bd6-1f07-4886-8b5d-fce084c9d29e FF, 81922092-0393-4b85-9b95-4be1325f6116 FS",

    {
      "id": "37fc968c-1efe-49a6-bfd6-a27ce1b98ba4",
      "text": "Evaluate Financial System Stability",
      "custom_tooltip": "<b>Evaluate Financial System Stability</b>",
      "progress": 0,
      "open": true,
      "meta": "8e0d0bd6-1f07-4886-8b5d-fce084c9d29e FS",

    {
      "id": "278b0906-a26e-4239-8724-4cc17cc7fa2b",
      "text": "Collect Financial Institution Data",
      "custom_tooltip": "<b>Collect Financial Institution Data</b><br>Gather relevant financial data from banks and other institutions to assess their stability and performance post-euro adoption. This includes balance sheets, transaction volumes, and risk assessments.<br><b>Resources needed:</b><br><ul><li>Data analysts</li><li>Financial analysts</li><li>Database administrators</li><li>Regulatory compliance officers</li></ul>",
      "start_date": "2032-03-12",
      "duration": 18.0,
      "progress": 0,
      "open": true,
      "meta": "37fc968c-1efe-49a6-bfd6-a27ce1b98ba4 SS",
      "parent": "37fc968c-1efe-49a6-bfd6-a27ce1b98ba4"
    },
    {
      "id": "f4ad2339-3caa-479a-b16a-3b4ef1e02de1",
      "text": "Analyze Key Financial Indicators",
      "custom_tooltip": "<b>Analyze Key Financial Indicators</b><br>Analyze key financial indicators such as capital adequacy ratios, liquidity ratios, and asset quality to identify potential vulnerabilities and assess the overall health of the financial system.<br><b>Resources needed:</b><br><ul><li>Financial analysts</li><li>Economists</li><li>Statistical software</li><li>Reporting tools</li></ul>",
      "start_date": "2032-03-30",
      "duration": 18.0,
      "progress": 0,
      "open": true,
      "meta": "278b0906-a26e-4239-8724-4cc17cc7fa2b FS",
      "parent": "37fc968c-1efe-49a6-bfd6-a27ce1b98ba4"
    },
    {
      "id": "57682091-4fcc-4462-9c0d-fca2063caac1",
      "text": "Conduct Stress Tests on Banks",
      "custom_tooltip": "<b>Conduct Stress Tests on Banks</b><br>Perform stress tests on major banks to evaluate their resilience to adverse economic scenarios and assess their ability to withstand potential shocks to the financial system.<br><b>Resources needed:</b><br><ul><li>Financial modelers</li><li>Risk management experts</li><li>Scenario planning software</li><li>Supervisory staff</li></ul>",
      "start_date": "2032-04-17",
      "duration": 18.0,
      "progress": 0,
      "open": true,
      "meta": "f4ad2339-3caa-479a-b16a-3b4ef1e02de1 FS",
      "parent": "37fc968c-1efe-49a6-bfd6-a27ce1b98ba4"
    },
    {
      "id": "a1f28aa9-9375-41ac-863a-ac5ed43cea82",
      "text": "Assess Regulatory Compliance",
      "custom_tooltip": "<b>Assess Regulatory Compliance</b><br>Evaluate the compliance of financial institutions with relevant regulations and supervisory requirements to ensure they are operating within established guidelines and maintaining adequate risk management practices.<br><b>Resources needed:</b><br><ul><li>Regulatory compliance officers</li><li>Legal experts</li><li>Auditors</li><li>Compliance monitoring systems</li></ul>",
      "start_date": "2032-05-05",
      "duration": 18.0,
      "progress": 0,
      "open": true,
      "meta": "57682091-4fcc-4462-9c0d-fca2063caac1 FS",
      "parent": "37fc968c-1efe-49a6-bfd6-a27ce1b98ba4"
    },
    {
      "id": "67c813ed-d4bc-4834-a761-430f20c60bf6",
      "text": "Report on Financial System Stability",
      "custom_tooltip": "<b>Report on Financial System Stability</b><br>Prepare a comprehensive report summarizing the findings of the financial stability assessment, highlighting key risks and vulnerabilities, and recommending appropriate policy measures to mitigate potential threats.<br><b>Resources needed:</b><br><ul><li>Report writers</li><li>Editors</li><li>Graphic designers</li><li>Publishing platform</li></ul>",
      "start_date": "2032-05-23",
      "duration": 18.0,
      "progress": 0,
      "open": true,
      "meta": "37fc968c-1efe-49a6-bfd6-a27ce1b98ba4 FF, a1f28aa9-9375-41ac-863a-ac5ed43cea82 FS",
      "parent": "37fc968c-1efe-49a6-bfd6-a27ce1b98ba4"
    },
    {
      "id": "67861153-7f22-44ef-b66a-d3a71c96fdc3",
      "text": "Assess Public Perception & Satisfaction",
      "custom_tooltip": "<b>Assess Public Perception &amp; Satisfaction</b>",
      "progress": 0,
      "open": true,
      "meta": "37fc968c-1efe-49a6-bfd6-a27ce1b98ba4 FS",
      "parent": "f98093fe-4e8f-43ad-9b92-b81518f32ce4",
      "type": "project"
    },
    {
      "id": "7e6f6c9b-0170-4808-a933-f355f4889bf2",
      "text": "Design Public Perception Survey",
      "custom_tooltip": "<b>Design Public Perception Survey</b><br>Develop a comprehensive survey instrument to gauge public opinion on euro adoption, covering key concerns and satisfaction levels. Include questions on economic impact, financial system stability, and overall sentiment.<br><b>Resources needed:</b><br><ul><li>Survey methodologist</li><li>Economist</li><li>Public opinion analyst</li></ul>",
      "start_date": "2032-06-10",
      "duration": 12.0,
      "progress": 0,
      "open": true,
      "meta": "67861153-7f22-44ef-b66a-d3a71c96fdc3 SS",
      "parent": "67861153-7f22-44ef-b66a-d3a71c96fdc3"
    },
    {
      "id": "554d9610-88d1-488c-9590-55164baf81fa",
      "text": "Conduct Public Opinion Surveys",
      "custom_tooltip": "<b>Conduct Public Opinion Surveys</b><br>Administer the designed survey to a representative sample of the Danish population. Ensure adequate sample size and demographic representation to obtain statistically significant results.<br><b>Resources needed:</b><br><ul><li>Polling agency</li><li>Data analysts</li><li>Survey administrators</li></ul>",
      "start_date": "2032-06-22",
      "duration": 12.0,
      "progress": 0,
      "open": true,
      "meta": "7e6f6c9b-0170-4808-a933-f355f4889bf2 FS",
      "parent": "67861153-7f22-44ef-b66a-d3a71c96fdc3"
    },
    {
      "id": "ddf9e7db-70e5-4ece-a1cb-3e8e76925c87",
      "text": "Analyze Survey Data and Report",
      "custom_tooltip": "<b>Analyze Survey Data and Report</b><br>Analyze the collected survey data to identify key trends, concerns, and satisfaction levels related to euro adoption. Prepare a comprehensive report summarizing the findings and highlighting areas for improvement.<br><b>Resources needed:</b><br><ul><li>Data analysts</li><li>Report writers</li><li>Economists</li></ul>",
      "start_date": "2032-07-04",
      "duration": 12.0,
      "progress": 0,
      "open": true,
      "meta": "554d9610-88d1-488c-9590-55164baf81fa FS",
      "parent": "67861153-7f22-44ef-b66a-d3a71c96fdc3"
    },
    {
      "id": "b7534185-24d8-496f-947f-ecc19e7d1c30",
      "text": "Conduct Focus Groups",
      "custom_tooltip": "<b>Conduct Focus Groups</b><br>Organize and conduct focus groups with diverse segments of the Danish population to gather qualitative data on their perceptions and experiences with euro adoption. Explore underlying reasons for satisfaction or dissatisfaction.<br><b>Resources needed:</b><br><ul><li>Focus group facilitators</li><li>Note takers</li><li>Qualitative data analysts</li></ul>",
      "start_date": "2032-07-16",
      "duration": 12.0,
      "progress": 0,
      "open": true,
      "meta": "ddf9e7db-70e5-4ece-a1cb-3e8e76925c87 FS",
      "parent": "67861153-7f22-44ef-b66a-d3a71c96fdc3"
    },
    {
      "id": "4cbb36b2-edfc-467b-b538-f0d53f13932b",
      "text": "Synthesize Survey and Focus Group Data",
      "custom_tooltip": "<b>Synthesize Survey and Focus Group Data</b><br>Integrate the quantitative data from the surveys with the qualitative data from the focus groups to provide a holistic understanding of public perception and satisfaction. Identify key themes and insights.<br><b>Resources needed:</b><br><ul><li>Data analysts</li><li>Qualitative researchers</li><li>Report writers</li></ul>",
      "start_date": "2032-07-28",
      "duration": 12.0,
      "progress": 0,
      "open": true,
      "meta": "67861153-7f22-44ef-b66a-d3a71c96fdc3 FF, b7534185-24d8-496f-947f-ecc19e7d1c30 FS",
      "parent": "67861153-7f22-44ef-b66a-d3a71c96fdc3"
    },
    {
      "id": "bbfef4a0-a6b3-4512-9055-cf2574ec23ed",
      "text": "Identify Lessons Learned",
      "custom_tooltip": "<b>Identify Lessons Learned</b>",
      "progress": 0,
      "open": true,
      "meta": "f98093fe-4e8f-43ad-9b92-b81518f32ce4 FF, 67861153-7f22-44ef-b66a-d3a71c96fdc3 FS",
      "parent": "f98093fe-4e8f-43ad-9b92-b81518f32ce4",
      "type": "project"
    },
    {
      "id": "2b6af566-8bc0-4dd5-8b60-7df738bf50b3",
      "text": "Gather stakeholder feedback on the process",
      "custom_tooltip": "<b>Gather stakeholder feedback on the process</b><br>Collect feedback from key stakeholders (government officials, financial institutions, public representatives) regarding their experiences and perceptions of the euro adoption process. This includes identifying areas of satisfaction, dissatisfaction, and suggestions for improvement.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Survey Team</li><li>Interviewers</li></ul>",
      "start_date": "2032-08-09",
      "duration": 5.0,
      "progress": 0,
      "open": true,
      "meta": "bbfef4a0-a6b3-4512-9055-cf2574ec23ed SS",
      "parent": "bbfef4a0-a6b3-4512-9055-cf2574ec23ed"
    },
    {
      "id": "448f52ea-e55b-47a5-b195-46b3abec2cdc",
      "text": "Analyze survey and interview data",
      "custom_tooltip": "<b>Analyze survey and interview data</b><br>Analyze the collected survey and interview data to identify key themes, trends, and insights related to the euro adoption process. This includes quantifying satisfaction levels, identifying common challenges, and uncovering unexpected outcomes.<br><b>Resources needed:</b><br><ul><li>Data Analyst</li><li>Statistician</li><li>Report Writer</li></ul>",
      "start_date": "2032-08-14",
      "duration": 5.0,
      "progress": 0,
      "open": true,
      "meta": "2b6af566-8bc0-4dd5-8b60-7df738bf50b3 FS",
      "parent": "bbfef4a0-a6b3-4512-9055-cf2574ec23ed"
    },
    {
      "id": "51a85f0e-f4f2-4152-9b51-389242703617",
      "text": "Document lessons learned and best practices",
      "custom_tooltip": "<b>Document lessons learned and best practices</b><br>Document the lessons learned and best practices identified during the euro adoption process. This includes creating a comprehensive report that summarizes the key findings, recommendations, and actionable steps for future currency transitions.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Report Writer</li><li>Editor</li></ul>",
      "start_date": "2032-08-19",
      "duration": 5.0,
      "progress": 0,
      "open": true,
      "meta": "448f52ea-e55b-47a5-b195-46b3abec2cdc FS",
      "parent": "bbfef4a0-a6b3-4512-9055-cf2574ec23ed"
    },
    {
      "id": "b7431abe-5b90-4c95-a779-d541569b01c7",
      "text": "Disseminate findings to relevant parties",
      "custom_tooltip": "<b>Disseminate findings to relevant parties</b><br>Share the lessons learned report with relevant stakeholders, including government agencies, financial institutions, and international organizations. This ensures that the knowledge gained from the Danish euro adoption process is accessible and can inform future currency transitions.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Communication Team</li><li>Distribution Channels</li></ul>",
      "start_date": "2032-08-24",
      "duration": 5.0,
      "progress": 0,
      "open": true,
      "meta": "bbfef4a0-a6b3-4512-9055-cf2574ec23ed FF, 51a85f0e-f4f2-4152-9b51-389242703617 FS",
      "parent": "bbfef4a0-a6b3-4512-9055-cf2574ec23ed"
    }

    function zoomFit() {
        const tasks = gantt.getTaskByTime();
        if (tasks.length > 0) {
            const firstTask = tasks[0];
            const lastTask = tasks[tasks.length - 1];
            gantt.showDate(firstTask.start_date);
            
            // Calculate total duration in days
            const startDate = new Date(firstTask.start_date);
            const endDate = new Date(lastTask.end_date);
            const durationDays = (endDate - startDate) / (1000 * 60 * 60 * 24);
            
            // Choose appropriate scale based on duration
            if (durationDays > 3650) { // More than 10 years
                gantt.config.scale_unit = "year";
                gantt.config.step = 10;
                gantt.config.subscales = [
                    {unit: "year", step: 1, date: "%Y"}
                ];
            } else if (durationDays > 365) { // More than 1 year
                gantt.config.scale_unit = "year";
                gantt.config.step = 1;
                gantt.config.subscales = [
                    {unit: "month", step: 1, date: "%M"}
                ];
            } else if (durationDays > 30) { // More than 1 month
                gantt.config.scale_unit = "month";
                gantt.config.step = 1;
                gantt.config.subscales = [
                    {unit: "day", step: 1, date: "%d"}
                ];
            } else if (durationDays > 7) { // More than 1 week
                gantt.config.scale_unit = "week";
                gantt.config.step = 1;
                gantt.config.subscales = [
                    {unit: "day", step: 1, date: "%d"}
                ];
            } else {
                gantt.config.scale_unit = "day";
                gantt.config.step = 1;
                gantt.config.subscales = [];
            }
            gantt.render();
        }
    }

    function zoomIn() {
        const currentUnit = gantt.config.scale_unit;
        const currentStep = gantt.config.step;
        
        if (currentUnit === "year" && currentStep === 10) {
            gantt.config.scale_unit = "year";
            gantt.config.step = 1;
            gantt.config.subscales = [
                {unit: "month", step: 1, date: "%M"}
            ];
        } else if (currentUnit === "year") {
            gantt.config.scale_unit = "month";
            gantt.config.step = 1;
            gantt.config.subscales = [
                {unit: "day", step: 1, date: "%d"}
            ];
        } else if (currentUnit === "month") {
            gantt.config.scale_unit = "week";
            gantt.config.step = 1;
            gantt.config.subscales = [
                {unit: "day", step: 1, date: "%d"}
            ];
        } else if (currentUnit === "week") {
            gantt.config.scale_unit = "day";
            gantt.config.step = 1;
            gantt.config.subscales = [];
        }
        gantt.render();
    }

    function zoomOut() {
        const currentUnit = gantt.config.scale_unit;
        const currentStep = gantt.config.step;
        
        if (currentUnit === "day") {
            gantt.config.scale_unit = "week";
            gantt.config.step = 1;
            gantt.config.subscales = [
                {unit: "day", step: 1, date: "%d"}
            ];
        } else if (currentUnit === "week") {
            gantt.config.scale_unit = "month";
            gantt.config.step = 1;
            gantt.config.subscales = [
                {unit: "day", step: 1, date: "%d"}
            ];
        } else if (currentUnit === "month") {
            gantt.config.scale_unit = "year";
            gantt.config.step = 1;
            gantt.config.subscales = [
                {unit: "month", step: 1, date: "%M"}
            ];
        } else if (currentUnit === "year") {
            gantt.config.scale_unit = "year";
            gantt.config.step = 10;
            gantt.config.subscales = [
                {unit: "year", step: 1, date: "%Y"}
            ];
        }
        gantt.render();
    }

    function downloadCSV() {
        if (GANTT_DATA_CSV === null) {
            return;
        }
        const blob = new Blob([GANTT_DATA_CSV], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        const url = URL.createObjectURL(blob);
        link.setAttribute('href', url);
        link.setAttribute('download', GANTT_FILENAME_CSV);
        link.style.visibility = 'hidden';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    // Gantt Initialization
    gantt.config.readonly = true;
    gantt.config.date_format = "%Y-%m-%d";
    gantt.config.scale_unit = "month";
    gantt.config.step = 1;
    gantt.config.subscales = [
        {unit: "day", step: 1, date: "%d"}
    ];

    gantt.config.columns = [
        {name:"text", label:"Task name", width:"*", tree:true},
        // {name:"start_date", label:"Start time", align: "center"},
        // {name:"duration", label:"Duration", align: "center"}
    ];

    gantt.templates.task_class = function(start, end, task) {
        if (task.type === "project") {
            return "project-task";
        }
        return "";
    };

    gantt.templates.tooltip_text = function(start, end, task) {
        return task.custom_tooltip || "No tooltip";
    };
    
	gantt.plugins({
		tooltip: true
	});
	gantt.attachEvent("onGanttReady", function(){
		var tooltips = gantt.ext.tooltips;
		tooltips.tooltip.setViewport(gantt.$task_data);
	});
    gantt.init("gantt_container");
    gantt.parse(GANTT_DATA_DHTMLX);

    // Hide the export to CSV button if there is no CSV data
    if (GANTT_DATA_CSV === null) {
        document.getElementById('exportToCSVButton').style.display = 'none';
    }

    document.getElementById('zoomFitButton').addEventListener('click', zoomFit);
    document.getElementById('zoomInButton').addEventListener('click', zoomIn);
    document.getElementById('zoomOutButton').addEventListener('click', zoomOut);
    document.getElementById('exportToCSVButton').addEventListener('click', downloadCSV);
</script>
