    {
      "id": "ef65f5ae-e946-4492-9369-608d3c8eb9a7",
      "text": "Refine business plan and value proposition",
      "custom_tooltip": "<b>Refine business plan and value proposition</b><br>Objective: Strengthen the project&#x27;s business plan and clearly articulate the value proposition of Clear English to potential funders.\nScope: Review and update the business plan, focusing on financial projections and the benefits of Clear English.\nSteps: 1. Review the existing business plan. 2. Update financial projections based on current data and market trends. 3. Refine the value proposition to highlight the benefits of Clear English for different stakeholders. 4. Document changes in the business plan.\nResources Needed: [&#x27;Project Manager&#x27;, &#x27;Marketing Strategist&#x27;, &#x27;Financial Advisor&#x27;]<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Marketing Strategist</li><li>Financial Advisor</li></ul>",

    {
      "id": "48ae8e8f-6a40-45e8-b531-48a8b5c4ee03",
      "text": "Engage potential funding partners",
      "custom_tooltip": "<b>Engage potential funding partners</b><br>Objective: Build relationships with potential funding partners and secure commitments for future funding.\nScope: Conduct outreach to grant organizations, investors, and other potential funders.\nSteps: 1. Identify key contacts at target funding organizations. 2. Prepare presentation materials highlighting the project&#x27;s goals and impact. 3. Schedule meetings with potential funders. 4. Follow up with funders to answer questions and address concerns.\nResources Needed: [&#x27;Community Engagement Coordinator&#x27;, &#x27;Funding and Licensing Manager&#x27;, &#x27;Project Manager&#x27;]<br><b>Resources needed:</b><br><ul><li>Community Engagement Coordinator</li><li>Funding and Licensing Manager</li><li>Project Manager</li></ul>",

      "custom_tooltip": "<b>Gather User Feedback and Usage Data</b><br>Collect user feedback from various channels (forums, surveys, support tickets) and analyze usage data to identify areas for improvement in the Clear English standard.<br><b>Resources needed:</b><br><ul><li>Community Manager</li><li>Data Analyst</li><li>Survey Tools</li><li>Analytics Platform</li></ul>",

      "custom_tooltip": "<b>Prioritize and Categorize Feedback</b><br>Categorize and prioritize collected feedback based on frequency, impact, and feasibility of implementation. Identify recurring themes and critical issues.<br><b>Resources needed:</b><br><ul><li>Linguist</li><li>Project Manager</li><li>Community Manager</li><li>Data Analysis Tools</li></ul>",

      "custom_tooltip": "<b>Implement and Test Standard Updates</b><br>Implement approved updates to the Clear English standard, documentation, and learning materials. Conduct thorough testing to ensure quality and consistency.<br><b>Resources needed:</b><br><ul><li>Technical Writer</li><li>Linguist</li><li>Software Developer</li><li>Testing Environment</li></ul>",

      "custom_tooltip": "<b>Communicate Updates to Stakeholders</b><br>Communicate updates to the Clear English standard to stakeholders, including users, educators, and developers. Provide clear documentation and support for adopting the changes.<br><b>Resources needed:</b><br><ul><li>Community Manager</li><li>Technical Writer</li><li>Marketing Specialist</li><li>Communication Channels</li></ul>",

    {
      "id": "3da360f9-1a92-40a2-82b3-28f8f3d872fe",
      "text": "Track licensing agreements and revenue",
      "custom_tooltip": "<b>Track licensing agreements and revenue</b><br>Establish a system to accurately track all licensing agreements, associated revenue, and payment schedules. This includes setting up databases, spreadsheets, or specialized software to manage the data.<br><b>Resources needed:</b><br><ul><li>Licensing Manager</li><li>Accountant</li><li>Database Administrator</li></ul>",

    {
      "id": "a55d831f-120a-44a8-9300-6bfaffea6076",
      "text": "Negotiate licensing agreement terms",
      "custom_tooltip": "<b>Negotiate licensing agreement terms</b><br>Lead negotiations with potential licensees to establish mutually beneficial licensing terms, including royalty rates, usage rights, and duration of the agreement. Ensure compliance with legal and ethical standards.<br><b>Resources needed:</b><br><ul><li>Licensing Manager</li><li>Legal Counsel</li><li>Negotiation Specialist</li></ul>",
      "start_date": "2028-07-08",

      "progress": 0,

      "meta": "3da360f9-1a92-40a2-82b3-28f8f3d872fe FS",

    {
      "id": "2b0f084f-fb4b-4903-9ba3-dc79c705c9ce",
      "text": "Enforce licensing agreement compliance",
      "custom_tooltip": "<b>Enforce licensing agreement compliance</b><br>Monitor licensee compliance with the terms of the licensing agreements, including usage rights, payment schedules, and quality control measures. Take appropriate action to address any violations or breaches of contract.<br><b>Resources needed:</b><br><ul><li>Licensing Manager</li><li>Legal Counsel</li><li>Auditor</li></ul>",
      "start_date": "2028-07-16",
      "duration": 8.0,
      "progress": 0,
      "open": true,
      "meta": "a55d831f-120a-44a8-9300-6bfaffea6076 FS",
      "parent": "66fde011-0b5a-40ba-9368-e16eb57fa561"

    {
      "id": "f1a57f74-62ca-44e1-93b5-c809c6297c03",
      "text": "Process royalty payments and reporting",
      "custom_tooltip": "<b>Process royalty payments and reporting</b><br>Establish a process for receiving and processing royalty payments from licensees, generating accurate royalty reports, and distributing payments to relevant stakeholders. Ensure compliance with tax regulations and accounting standards.<br><b>Resources needed:</b><br><ul><li>Accountant</li><li>Licensing Manager</li><li>Financial Analyst</li></ul>",

    {
      "id": "0e13f2e0-e7bd-4f56-9797-65b1defc7efd",
      "text": "Validate Governance and Editorial Control",
      "custom_tooltip": "<b>Validate Governance and Editorial Control</b>",
      "progress": 0,
      "open": true,
      "meta": "5e99e625-6775-4c2a-9d1b-8e342519ae82 FF, 66fde011-0b5a-40ba-9368-e16eb57fa561 FS",

      "type": "project"
    },
    {
      "id": "dbab3cb6-2324-4bb8-be33-5b0694df5329",
      "text": "Review Governance Charter and Processes",
      "custom_tooltip": "<b>Review Governance Charter and Processes</b><br>Objective: Ensure the governance charter and decision-making processes are clearly defined and effectively implemented.\nScope: Review the existing governance charter, decision-making workflows, and communication protocols.\nSteps: 1. Gather all relevant governance documents. 2. Analyze the clarity and completeness of the charter. 3. Assess the efficiency of decision-making processes. 4. Identify any gaps or areas for improvement.\nDeliverables: A report summarizing the review findings and recommendations for improvement.<br><b>Resources needed:</b><br><ul><li>Governance and Standards Liaison</li><li>Legal Advisor</li><li>Project Manager</li></ul>",
      "start_date": "2028-08-01",
      "duration": 5.0,
      "progress": 0,
      "open": true,
      "meta": "0e13f2e0-e7bd-4f56-9797-65b1defc7efd SS",
      "parent": "0e13f2e0-e7bd-4f56-9797-65b1defc7efd"
    },
    {
      "id": "67ff1a11-ff15-4389-bbba-870a2aca7bff",
      "text": "Assess Editorial Board Performance",
      "custom_tooltip": "<b>Assess Editorial Board Performance</b><br>Objective: Evaluate the performance of the editorial board in maintaining consistent editorial standards and resolving linguistic disputes.\nScope: Assess the board&#x27;s effectiveness in reviewing and approving linguistic rules, resolving conflicts, and ensuring consistency across the Clear English standard.\nSteps: 1. Review meeting minutes and decision logs. 2. Analyze the consistency of editorial decisions. 3. Gather feedback from board members and stakeholders. 4. Identify any areas where the board&#x27;s performance can be improved.\nDeliverables: A performance assessment report with recommendations for enhancing the board&#x27;s effectiveness.<br><b>Resources needed:</b><br><ul><li>Governance and Standards Liaison</li><li>Community Engagement Coordinator</li><li>Lead Linguist</li></ul>",
      "start_date": "2028-08-06",
      "duration": 5.0,
      "progress": 0,
      "open": true,
      "meta": "dbab3cb6-2324-4bb8-be33-5b0694df5329 FS",
      "parent": "0e13f2e0-e7bd-4f56-9797-65b1defc7efd"
    },
    {
      "id": "553c3471-ec5a-4ae9-a83d-10baa7a4afe8",
      "text": "Analyze User Feedback on Governance",
      "custom_tooltip": "<b>Analyze User Feedback on Governance</b><br>Objective: Gather and analyze user feedback on the governance structure and editorial control mechanisms.\nScope: Collect feedback from stakeholders regarding their satisfaction with the governance structure, their perception of fairness and transparency, and their suggestions for improvement.\nSteps: 1. Design and distribute a survey to stakeholders. 2. Conduct focus groups with representative user groups. 3. Analyze the survey and focus group data to identify key themes and concerns. 4. Prepare a report summarizing the feedback and recommendations.\nDeliverables: A user feedback report with actionable insights for improving governance and editorial control.<br><b>Resources needed:</b><br><ul><li>Community Engagement Coordinator</li><li>Usability and Assessment Expert</li><li>Project Manager</li></ul>",
      "start_date": "2028-08-11",
      "duration": 5.0,
      "progress": 0,
      "open": true,
      "meta": "67ff1a11-ff15-4389-bbba-870a2aca7bff FS",
      "parent": "0e13f2e0-e7bd-4f56-9797-65b1defc7efd"
    },
    {
      "id": "0aebcf4b-15ab-42d8-94c2-2446798172d3",
      "text": "Verify Editorial Standards Consistency",
      "custom_tooltip": "<b>Verify Editorial Standards Consistency</b><br>Objective: Ensure that the editorial standards are consistently applied across all aspects of the Clear English standard.\nScope: Review the application of editorial standards in the reference dictionary, learning materials, and documentation.\nSteps: 1. Select a sample of entries from the reference dictionary. 2. Review a selection of learning materials. 3. Examine the standard documentation. 4. Assess whether the editorial standards have been consistently applied.\nDeliverables: A report on the consistency of editorial standards with recommendations.<br><b>Resources needed:</b><br><ul><li>Lead Linguist</li><li>Technical Writer</li><li>Governance and Standards Liaison</li></ul>",
      "start_date": "2028-08-16",
      "duration": 5.0,
      "progress": 0,
      "open": true,
      "meta": "0e13f2e0-e7bd-4f56-9797-65b1defc7efd FF, 553c3471-ec5a-4ae9-a83d-10baa7a4afe8 FS",
      "parent": "0e13f2e0-e7bd-4f56-9797-65b1defc7efd"
    }

    function zoomFit() {
        const tasks = gantt.getTaskByTime();
        if (tasks.length > 0) {
            const firstTask = tasks[0];
            const lastTask = tasks[tasks.length - 1];
            gantt.showDate(firstTask.start_date);
            
            // Calculate total duration in days
            const startDate = new Date(firstTask.start_date);
            const endDate = new Date(lastTask.end_date);
            const durationDays = (endDate - startDate) / (1000 * 60 * 60 * 24);
            
            // Choose appropriate scale based on duration
            if (durationDays > 3650) { // More than 10 years
                gantt.config.scale_unit = "year";
                gantt.config.step = 10;
                gantt.config.subscales = [
                    {unit: "year", step: 1, date: "%Y"}
                ];
            } else if (durationDays > 365) { // More than 1 year
                gantt.config.scale_unit = "year";
                gantt.config.step = 1;
                gantt.config.subscales = [
                    {unit: "month", step: 1, date: "%M"}
                ];
            } else if (durationDays > 30) { // More than 1 month
                gantt.config.scale_unit = "month";
                gantt.config.step = 1;
                gantt.config.subscales = [
                    {unit: "day", step: 1, date: "%d"}
                ];
            } else if (durationDays > 7) { // More than 1 week
                gantt.config.scale_unit = "week";
                gantt.config.step = 1;
                gantt.config.subscales = [
                    {unit: "day", step: 1, date: "%d"}
                ];
            } else {
                gantt.config.scale_unit = "day";
                gantt.config.step = 1;
                gantt.config.subscales = [];
            }
            gantt.render();
        }
    }

    function zoomIn() {
        const currentUnit = gantt.config.scale_unit;
        const currentStep = gantt.config.step;
        
        if (currentUnit === "year" && currentStep === 10) {
            gantt.config.scale_unit = "year";
            gantt.config.step = 1;
            gantt.config.subscales = [
                {unit: "month", step: 1, date: "%M"}
            ];
        } else if (currentUnit === "year") {
            gantt.config.scale_unit = "month";
            gantt.config.step = 1;
            gantt.config.subscales = [
                {unit: "day", step: 1, date: "%d"}
            ];
        } else if (currentUnit === "month") {
            gantt.config.scale_unit = "week";
            gantt.config.step = 1;
            gantt.config.subscales = [
                {unit: "day", step: 1, date: "%d"}
            ];
        } else if (currentUnit === "week") {
            gantt.config.scale_unit = "day";
            gantt.config.step = 1;
            gantt.config.subscales = [];
        }
        gantt.render();
    }

    function zoomOut() {
        const currentUnit = gantt.config.scale_unit;
        const currentStep = gantt.config.step;
        
        if (currentUnit === "day") {
            gantt.config.scale_unit = "week";
            gantt.config.step = 1;
            gantt.config.subscales = [
                {unit: "day", step: 1, date: "%d"}
            ];
        } else if (currentUnit === "week") {
            gantt.config.scale_unit = "month";
            gantt.config.step = 1;
            gantt.config.subscales = [
                {unit: "day", step: 1, date: "%d"}
            ];
        } else if (currentUnit === "month") {
            gantt.config.scale_unit = "year";
            gantt.config.step = 1;
            gantt.config.subscales = [
                {unit: "month", step: 1, date: "%M"}
            ];
        } else if (currentUnit === "year") {
            gantt.config.scale_unit = "year";
            gantt.config.step = 10;
            gantt.config.subscales = [
                {unit: "year", step: 1, date: "%Y"}
            ];
        }
        gantt.render();
    }

    function downloadCSV() {
        if (GANTT_DATA_CSV === null) {
            return;
        }
        const blob = new Blob([GANTT_DATA_CSV], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        const url = URL.createObjectURL(blob);
        link.setAttribute('href', url);
        link.setAttribute('download', GANTT_FILENAME_CSV);
        link.style.visibility = 'hidden';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    // Gantt Initialization
    gantt.config.readonly = true;
    gantt.config.date_format = "%Y-%m-%d";
    gantt.config.scale_unit = "month";
    gantt.config.step = 1;
    gantt.config.subscales = [
        {unit: "day", step: 1, date: "%d"}
    ];

    gantt.config.columns = [
        {name:"text", label:"Task name", width:"*", tree:true},
        // {name:"start_date", label:"Start time", align: "center"},
        // {name:"duration", label:"Duration", align: "center"}
    ];

    gantt.templates.task_class = function(start, end, task) {
        if (task.type === "project") {
            return "project-task";
        }
        return "";
    };

    gantt.templates.tooltip_text = function(start, end, task) {
        return task.custom_tooltip || "No tooltip";
    };
    
	gantt.plugins({
		tooltip: true
	});
	gantt.attachEvent("onGanttReady", function(){
		var tooltips = gantt.ext.tooltips;
		tooltips.tooltip.setViewport(gantt.$task_data);
	});
    gantt.init("gantt_container");
    gantt.parse(GANTT_DATA_DHTMLX);

    // Hide the export to CSV button if there is no CSV data
    if (GANTT_DATA_CSV === null) {
        document.getElementById('exportToCSVButton').style.display = 'none';
    }

    document.getElementById('zoomFitButton').addEventListener('click', zoomFit);
    document.getElementById('zoomInButton').addEventListener('click', zoomIn);
    document.getElementById('zoomOutButton').addEventListener('click', zoomOut);
    document.getElementById('exportToCSVButton').addEventListener('click', downloadCSV);
</script>
