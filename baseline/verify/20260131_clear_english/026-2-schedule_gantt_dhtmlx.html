    const GANTT_DATA_CSV = "project_key,project_name,project_description,project_start_date,project_end_date,project_progress,project_parent,originating_department\ne4f656b7-9c8e-4fa1-af6f-1c3719229008,Clear English,\"Clear English\n\nFinal deliverable:\nStandard Language\",1/31/2026,8/21/2028,0,,PlanExe\n9769e703-2f11-42a1-9749-fd72580b824f,Project Initiation and Planning,,1/31/2026,4/27/2026,0,e4f656b7-9c8e-4fa1-af6f-1c3719229008,PlanExe\n49af8593-64b2-4c1f-a7e4-4a03a8a976ae,Secure Project Funding,,1/31/2026,3/4/2026,0,9769e703-2f11-42a1-9749-fd72580b824f,PlanExe\n60f6c834-51ea-4f1a-b28e-5ec403593e6a,Identify potential funding sources,\"Identify potential funding sources\n\nDescription:\nResearch and identify potential grant opportunities, investors, and other funding sources relevant to the Clear English project.\n\nResources needed:\n\u2022 Funding and Licensing Manager\n\u2022 Research Assistant\",1/31/2026,2/8/2026,0,49af8593-64b2-4c1f-a7e4-4a03a8a976ae,PlanExe\nae3e308a-f02b-4a4a-9f73-b917d0bad6ab,Prepare grant proposals and applications,\"Prepare grant proposals and applications\n\nDescription:\nDevelop compelling grant proposals and applications tailored to specific funding opportunities, highlighting the project's goals, impact, and sustainability.\n\nResources needed:\n\u2022 Grant Writer\n\u2022 Project Manager\n\u2022 Linguistic Experts\",2/8/2026,2/16/2026,0,60f6c834-51ea-4f1a-b28e-5ec403593e6a,PlanExe\n5c9ba7d1-1dd5-42fa-8b93-ca818d1a8b1b,Engage with potential funders,\"Engage with potential funders\n\nDescription:\nEstablish communication and build relationships with potential funders, presenting the Clear English project and addressing their questions and concerns.\n\nResources needed:\n\u2022 Project Manager\n\u2022 Funding and Licensing Manager\n\u2022 Community Engagement Coordinator\",2/16/2026,2/24/2026,0,ae3e308a-f02b-4a4a-9f73-b917d0bad6ab,PlanExe\n89fb206a-34d4-4efb-86d7-456ec0bd79f9,Negotiate funding agreements,\"Negotiate funding agreements\n\nDescription:\nNegotiate the terms and conditions of funding agreements with successful applicants, ensuring alignment with the project's goals and objectives.\n\nResources needed:\n\u2022 Legal Counsel\n\u2022 Project Manager\n\u2022 Funding and Licensing Manager\",2/24/2026,3/4/2026,0,49af8593-64b2-4c1f-a7e4-4a03a8a976ae,PlanExe\nc53e44f9-311a-46ee-8210-db2cefdf997b,Establish Editorial Board and Linguistic Review Process,,3/4/2026,3/20/2026,0,49af8593-64b2-4c1f-a7e4-4a03a8a976ae,PlanExe\n991b80dc-5598-484a-aecc-b999f7c315e3,Identify Potential Board Members,\"Identify Potential Board Members\n\nDescription:\nIdentify and research potential candidates for the editorial board, considering expertise, experience, and diversity.\n\nResources needed:\n\u2022 Project Manager\n\u2022 Linguist\n\u2022 Researcher\",3/4/2026,3/8/2026,0,c53e44f9-311a-46ee-8210-db2cefdf997b,PlanExe\n294c11cf-2202-4e5e-9742-e62f9ca57804,Define Board Member Selection Criteria (1),\"Define Board Member Selection Criteria\n\nDescription:\nEstablish clear and objective criteria for selecting editorial board members, including expertise in linguistics, education, and technical writing.\n\nResources needed:\n\u2022 Project Manager\n\u2022 Linguist\n\u2022 Stakeholders\",3/8/2026,3/12/2026,0,991b80dc-5598-484a-aecc-b999f7c315e3,PlanExe\n676c332e-753b-410a-bdae-377b5d880a7b,Develop Review Process Documentation,\"Develop Review Process Documentation\n\nDescription:\nCreate detailed documentation outlining the linguistic review process, including submission guidelines, review criteria, and decision-making protocols.\n\nResources needed:\n\u2022 Technical Writer\n\u2022 Linguist\n\u2022 Project Manager\",3/12/2026,3/16/2026,0,294c11cf-2202-4e5e-9742-e62f9ca57804,PlanExe\n78cc8f71-3998-4184-bed6-75a3029349f4,Establish Communication Protocols (1),\"Establish Communication Protocols\n\nDescription:\nDefine clear communication channels and protocols for the editorial board and linguistic review process, ensuring efficient and transparent communication.\n\nResources needed:\n\u2022 Project Manager\n\u2022 Communication Specialist\",3/16/2026,3/20/2026,0,c53e44f9-311a-46ee-8210-db2cefdf997b,PlanExe\n4544e20d-ecc8-400f-a048-bd05d0ce179b,Define Project Scope and Objectives,,3/20/2026,3/30/2026,0,c53e44f9-311a-46ee-8210-db2cefdf997b,PlanExe\nc8a5782f-fcd0-45f5-86e5-d4191e029928,Identify Key Stakeholders (1),\"Identify Key Stakeholders\n\nDescription:\nIdentify all individuals, groups, or organizations that have an interest in the project or may be affected by its outcome. This includes internal teams, external partners, regulatory bodies, and potential users of Clear English. Create a stakeholder register with contact information, roles, and levels of influence.\n\nResources needed:\n\u2022 Project Manager\n\u2022 Community Engagement Coordinator\n\u2022 Stakeholder Analysis Template\",3/20/2026,3/22/2026,0,4544e20d-ecc8-400f-a048-bd05d0ce179b,PlanExe\n52e2d75b-b7b3-433e-a727-26aea22665b3,Define Project Goals and Objectives,\"Define Project Goals and Objectives\n\nDescription:\nClearly articulate the overall goals of the Clear English project and break them down into specific, measurable, achievable, relevant, and time-bound (SMART) objectives. This includes defining the scope of linguistic changes, target audience, and desired outcomes. Document these goals and objectives in a project charter.\n\nResources needed:\n\u2022 Lead Linguist\n\u2022 Project Manager\n\u2022 Editorial Board\n\u2022 Project Charter Template\",3/22/2026,3/24/2026,0,c8a5782f-fcd0-45f5-86e5-d4191e029928,PlanExe\n7dda0192-5640-40da-ac93-7fe96564b9f7,Determine Project Deliverables,\"Determine Project Deliverables\n\nDescription:\nIdentify the tangible outputs of the project, such as the Clear English standard, reference dictionary, style guide, pilot curriculum, and public licensing policy. Define the specifications and acceptance criteria for each deliverable. Create a deliverables register.\n\nResources needed:\n\u2022 Project Manager\n\u2022 Technical Writer\n\u2022 Deliverables Register Template\",3/24/2026,3/26/2026,0,52e2d75b-b7b3-433e-a727-26aea22665b3,PlanExe\n511135ce-401a-4f9e-94bc-75de6ef2f83f,Establish Project Success Criteria,\"Establish Project Success Criteria\n\nDescription:\nDefine the metrics that will be used to measure the success of the project, such as comprehension speed, ordinal error rate, pronunciation consistency, and learner retention. Establish baseline measurements and target values for each metric. Document the success criteria in the project charter.\n\nResources needed:\n\u2022 Usability and Assessment Expert\n\u2022 Project Manager\n\u2022 Project Charter Template\",3/26/2026,3/28/2026,0,7dda0192-5640-40da-ac93-7fe96564b9f7,PlanExe\n9de97b06-84f8-44b3-91b3-fb1de379dfa2,Document Scope Assumptions and Constraints,\"Document Scope Assumptions and Constraints\n\nDescription:\nIdentify any assumptions that are being made about the project scope, such as the availability of resources, the cooperation of stakeholders, or the stability of the linguistic landscape. Document any constraints that may limit the project scope, such as budget limitations, time constraints, or regulatory requirements. Create a scope management plan.\n\nResources needed:\n\u2022 Project Manager\n\u2022 Editorial Board\n\u2022 Scope Management Plan Template\",3/28/2026,3/30/2026,0,4544e20d-ecc8-400f-a048-bd05d0ce179b,PlanExe\n8dd93a5f-dcd3-4aba-8b1f-7290ab964bb6,Develop Project Management Plan,,3/30/2026,4/9/2026,0,4544e20d-ecc8-400f-a048-bd05d0ce179b,PlanExe\n90d91b6e-737c-4ed5-a899-bd204967cc6d,Define Project Scope Management Approach,\"Define Project Scope Management Approach\n\nDescription:\nEstablish the methodology for managing the project's scope, including how changes will be handled and controlled.\n\nResources needed:\n\u2022 Project Manager\n\u2022 Stakeholders\n\u2022 Business Analyst\",3/30/2026,4/1/2026,0,8dd93a5f-dcd3-4aba-8b1f-7290ab964bb6,PlanExe\nf2d93c92-679b-48fb-9dd3-4784fc3a3510,Create Project Schedule,\"Create Project Schedule\n\nDescription:\nDevelop a detailed project schedule outlining all tasks, dependencies, and timelines using project management software.\n\nResources needed:\n\u2022 Project Manager\n\u2022 Project Team\n\u2022 Project Management Software\",4/1/2026,4/3/2026,0,90d91b6e-737c-4ed5-a899-bd204967cc6d,PlanExe\nbe42a9ff-bdf4-40d5-86fd-896fd549c0b2,Allocate Resources to Tasks,\"Allocate Resources to Tasks\n\nDescription:\nAssign specific resources (personnel, equipment, budget) to each task in the project schedule.\n\nResources needed:\n\u2022 Project Manager\n\u2022 Resource Manager\n\u2022 Budgeting Tools\",4/3/2026,4/5/2026,0,f2d93c92-679b-48fb-9dd3-4784fc3a3510,PlanExe\na0659513-715d-4000-9da7-6c248e9229ee,Establish Communication Plan,\"Establish Communication Plan\n\nDescription:\nDefine how project information will be communicated to stakeholders, including frequency, channels, and responsible parties.\n\nResources needed:\n\u2022 Project Manager\n\u2022 Communication Specialist\n\u2022 Stakeholders\",4/5/2026,4/7/2026,0,be42a9ff-bdf4-40d5-86fd-896fd549c0b2,PlanExe\n5ab57612-8034-42fe-beae-1839b8ccd64f,Document Project Management Processes,\"Document Project Management Processes\n\nDescription:\nCreate documentation outlining all project management processes, including scope management, schedule management, resource allocation, and communication.\n\nResources needed:\n\u2022 Project Manager\n\u2022 Technical Writer\n\u2022 Project Team\",4/7/2026,4/9/2026,0,8dd93a5f-dcd3-4aba-8b1f-7290ab964bb6,PlanExe\nd64071c7-3eae-4386-84d9-a33df37532ea,Conduct Stakeholder Analysis,,4/9/2026,4/17/2026,0,8dd93a5f-dcd3-4aba-8b1f-7290ab964bb6,PlanExe\ncc2bc94b-223a-4a44-ba3d-168626b0793a,Identify Key Stakeholders (2),\"Identify Key Stakeholders\n\nDescription:\nDetermine all individuals, groups, or organizations that have an interest in or may be affected by the Clear English project. This includes linguists, educators, technical writers, ESL publishers, standards organizations, and potential users.\n\nResources needed:\n\u2022 Project Manager\n\u2022 Community Engagement Coordinator\n\u2022 Research Assistant\",4/9/2026,4/11/2026,0,d64071c7-3eae-4386-84d9-a33df37532ea,PlanExe\n0aa3e6f8-85dc-4578-984a-bd61575572e0,Assess Stakeholder Influence and Interest,\"Assess Stakeholder Influence and Interest\n\nDescription:\nEvaluate the level of influence and interest each stakeholder has in the project. This will help prioritize engagement efforts and tailor communication strategies to address their specific needs and concerns.\n\nResources needed:\n\u2022 Project Manager\n\u2022 Community Engagement Coordinator\n\u2022 Stakeholder Analysis Template\",4/11/2026,4/13/2026,0,cc2bc94b-223a-4a44-ba3d-168626b0793a,PlanExe\n008e5902-880d-445b-b025-872a8fecf2fe,Develop Stakeholder Engagement Plan,\"Develop Stakeholder Engagement Plan\n\nDescription:\nCreate a detailed plan outlining how to effectively engage with each stakeholder group throughout the project lifecycle. This includes defining communication channels, frequency of updates, and methods for gathering feedback.\n\nResources needed:\n\u2022 Project Manager\n\u2022 Community Engagement Coordinator\n\u2022 Communication Specialist\",4/13/2026,4/15/2026,0,0aa3e6f8-85dc-4578-984a-bd61575572e0,PlanExe\n333d0d1e-6f8d-4b2a-8c4b-87cbc8485ac5,Document Stakeholder Requirements,\"Document Stakeholder Requirements\n\nDescription:\nGather and document the specific requirements, expectations, and concerns of each stakeholder group. This information will be used to inform project decisions and ensure that the Clear English standard meets the needs of its intended users.\n\nResources needed:\n\u2022 Project Manager\n\u2022 Community Engagement Coordinator\n\u2022 Technical Writer\",4/15/2026,4/17/2026,0,d64071c7-3eae-4386-84d9-a33df37532ea,PlanExe\nfc3ed79f-4391-4df9-8bbf-15f367948a5a,Perform Risk Assessment,,4/17/2026,4/27/2026,0,9769e703-2f11-42a1-9749-fd72580b824f,PlanExe\n76e2efbe-2ab3-4fdf-9ad1-351bc2d24e9f,Identify Potential Risks,\"Identify Potential Risks\n\nDescription:\nIdentify all potential risks that could impact the project, including technical, financial, and operational risks. This involves brainstorming sessions, reviewing project documentation, and consulting with subject matter experts.\n\nResources needed:\n\u2022 Project Manager\n\u2022 Subject Matter Experts\n\u2022 Risk Management Specialist\",4/17/2026,4/19/2026,0,fc3ed79f-4391-4df9-8bbf-15f367948a5a,PlanExe\na9d42da2-ba11-439c-9d26-23dc31691636,Assess Risk Probability and Impact,\"Assess Risk Probability and Impact\n\nDescription:\nEvaluate the likelihood of each identified risk occurring and the potential impact on the project's timeline, budget, and deliverables. This involves using qualitative and quantitative risk assessment techniques.\n\nResources needed:\n\u2022 Project Manager\n\u2022 Risk Management Specialist\n\u2022 Data Analyst\",4/19/2026,4/21/2026,0,76e2efbe-2ab3-4fdf-9ad1-351bc2d24e9f,PlanExe\n5da9fc90-a252-41b7-b656-693fe4206dd7,Prioritize Risks,\"Prioritize Risks\n\nDescription:\nRank the identified risks based on their probability and impact scores to determine which risks require the most attention and mitigation efforts. This involves creating a risk matrix and using a risk scoring system.\n\nResources needed:\n\u2022 Project Manager\n\u2022 Risk Management Specialist\",4/21/2026,4/23/2026,0,a9d42da2-ba11-439c-9d26-23dc31691636,PlanExe\n5fb29f61-0758-4d92-8a5e-23687284e9a7,Develop Mitigation Strategies,\"Develop Mitigation Strategies\n\nDescription:\nDevelop specific mitigation strategies for each high-priority risk, outlining actions to reduce the likelihood or impact of the risk. This involves brainstorming potential solutions, evaluating their feasibility, and documenting the chosen strategies.\n\nResources needed:\n\u2022 Project Manager\n\u2022 Subject Matter Experts\n\u2022 Risk Management Specialist\",4/23/2026,4/25/2026,0,5da9fc90-a252-41b7-b656-693fe4206dd7,PlanExe\n5c38238f-8b0c-4f9f-90d3-a07c68f22540,Document Risk Assessment Results,\"Document Risk Assessment Results\n\nDescription:\nDocument the entire risk assessment process, including the identified risks, their probability and impact scores, prioritization, and mitigation strategies. This involves creating a risk register and maintaining it throughout the project lifecycle.\n\nResources needed:\n\u2022 Project Manager\n\u2022 Risk Management Specialist\n\u2022 Technical Writer\",4/25/2026,4/27/2026,0,fc3ed79f-4391-4df9-8bbf-15f367948a5a,PlanExe\n3bb43e3e-050d-4565-9354-e6f60b5c1016,Linguistic Rule Design and Corpus Creation,,4/27/2026,4/29/2027,0,9769e703-2f11-42a1-9749-fd72580b824f,PlanExe\n7d0093c2-9805-4431-8359-1ab0900bbff3,Define Rules for Ordinals,,4/27/2026,5/13/2026,0,3bb43e3e-050d-4565-9354-e6f60b5c1016,PlanExe\n9c715326-120e-42be-9e16-084c8f62d583,Research ordinal usage in English,\"Research ordinal usage in English\n\nDescription:\nAnalyze how ordinals are currently used in various contexts (written, spoken, formal, informal) to identify inconsistencies and patterns.\n\nResources needed:\n\u2022 Linguists\n\u2022 Corpus linguist\n\u2022 Data analyst\",4/27/2026,5/1/2026,0,7d0093c2-9805-4431-8359-1ab0900bbff3,PlanExe\n88ce8056-4230-4792-baa4-9aaff59323d9,Develop initial ordinal rule proposals,\"Develop initial ordinal rule proposals\n\nDescription:\nBased on the research, create several potential rule sets for standardizing ordinals in Clear English, considering simplicity, consistency, and intelligibility.\n\nResources needed:\n\u2022 Linguists\n\u2022 Editorial board\",5/1/2026,5/5/2026,0,9c715326-120e-42be-9e16-084c8f62d583,PlanExe\n13317444-9cbe-4ddc-a5e7-140ca49184b4,Evaluate rule proposals for clarity,\"Evaluate rule proposals for clarity\n\nDescription:\nAssess the clarity and ease of understanding of each rule set through cognitive testing and expert review, focusing on potential ambiguities and edge cases.\n\nResources needed:\n\u2022 Usability testers\n\u2022 ESL educators\n\u2022 Linguists\",5/5/2026,5/9/2026,0,88ce8056-4230-4792-baa4-9aaff59323d9,PlanExe\n3619a651-efa9-479f-92c2-148735950ac2,Refine and finalize ordinal rules,\"Refine and finalize ordinal rules\n\nDescription:\nIncorporate feedback from the evaluation phase to refine the most promising rule set, ensuring it aligns with the overall goals of Clear English and is readily understandable.\n\nResources needed:\n\u2022 Linguists\n\u2022 Editorial board\n\u2022 Technical writer\",5/9/2026,5/13/2026,0,7d0093c2-9805-4431-8359-1ab0900bbff3,PlanExe\n8ab857b9-eb5e-4e10-9838-1bfca16aee58,Define Rules for Spelling-to-Sound,,5/13/2026,6/12/2026,0,7d0093c2-9805-4431-8359-1ab0900bbff3,PlanExe\nc2fd3a0c-adf8-4371-a5e0-169b987b3036,Research existing English phonetic systems,\"Research existing English phonetic systems\n\nDescription:\nObjective: Thoroughly investigate established phonetic systems used for English. Scope: Review IPA, ARPABET, and other relevant systems. Steps: Literature review, online research, expert consultation. Deliverables: Summary report of findings.\n\nResources needed:\n\u2022 Linguist\n\u2022 Phonetician\n\u2022 Research assistant\",5/13/2026,5/19/2026,0,8ab857b9-eb5e-4e10-9838-1bfca16aee58,PlanExe\na3876607-9ff3-43d4-9eee-26e79e8e9e95,Analyze spelling-to-sound inconsistencies,\"Analyze spelling-to-sound inconsistencies\n\nDescription:\nObjective: Identify and categorize common inconsistencies in English spelling-to-sound correspondences. Scope: Focus on frequently occurring exceptions and ambiguous cases. Steps: Corpus analysis, rule extraction, exception listing. Deliverables: Database of inconsistencies.\n\nResources needed:\n\u2022 Corpus linguist\n\u2022 Data analyst\n\u2022 Computational linguist\",5/19/2026,5/25/2026,0,c2fd3a0c-adf8-4371-a5e0-169b987b3036,PlanExe\nd56d6344-7b00-4bb2-a7ce-4272934447d3,Develop Clear English phonetic rules,\"Develop Clear English phonetic rules\n\nDescription:\nObjective: Create a set of consistent and unambiguous spelling-to-sound rules for Clear English. Scope: Cover all common English phonemes and graphemes. Steps: Rule design, testing, refinement. Deliverables: Rule set document.\n\nResources needed:\n\u2022 Linguist\n\u2022 Phonetician\n\u2022 ESL educator\",5/25/2026,5/31/2026,0,a3876607-9ff3-43d4-9eee-26e79e8e9e95,PlanExe\ne01cb5f2-4921-4dac-a151-d1ae748344e3,Test rules with text-to-speech engine,\"Test rules with text-to-speech engine\n\nDescription:\nObjective: Evaluate the effectiveness of the Clear English phonetic rules using a text-to-speech engine. Scope: Assess pronunciation accuracy and naturalness. Steps: Rule implementation, text input, audio output analysis. Deliverables: Evaluation report.\n\nResources needed:\n\u2022 Technical writer\n\u2022 Software developer\n\u2022 Usability tester\",5/31/2026,6/6/2026,0,d56d6344-7b00-4bb2-a7ce-4272934447d3,PlanExe\n8d1bac09-df9b-4ef8-955f-29b075ca8719,Refine rules based on testing feedback,\"Refine rules based on testing feedback\n\nDescription:\nObjective: Improve the Clear English phonetic rules based on the results of text-to-speech testing and expert feedback. Scope: Address identified errors and inconsistencies. Steps: Rule revision, re-testing, validation. Deliverables: Final rule set.\n\nResources needed:\n\u2022 Linguist\n\u2022 Phonetician\n\u2022 ESL educator\",6/6/2026,6/12/2026,0,8ab857b9-eb5e-4e10-9838-1bfca16aee58,PlanExe\neaaadbd7-1bfc-4201-b123-695064d02b4c,Define Rules for Morphology,,6/12/2026,7/18/2026,0,8ab857b9-eb5e-4e10-9838-1bfca16aee58,PlanExe\nf19a356f-14a0-4861-866b-89d480bde365,Identify Irregular Verbs and Nouns,\"Identify Irregular Verbs and Nouns\n\nDescription:\nObjective: Identify common irregular verbs and nouns in English.\nScope: Focus on the most frequently used irregular forms.\nSteps: Analyze a corpus of English text, consult linguistic resources, and create a list of target words.\nDeli 6bd8c0949f,Conduct Comparative Analysis,\"Conduct Comparative Analysis\n\nDescription:\nObjective: Compare outcomes between control and experimental groups.\nScope: Statistical tests to determine significant differences.\nSteps: Select appropriate statistical tests (t-tests, ANOVA), perform tests, interpret results.\nDeliverables: Report on comparative analysis findings.\n\nResources needed:\n\u2022 Statistician\n\u2022 Statistical Software\n\u2022 Comparative Analysis Plan\",9/14/2027,9/18/2027,0,e72bc37f-32ca-4257-a9be-fd5da4b676f6,PlanExe\nb3b1ca22-aa28-402b-82cc-3345e06a6afc,Interpret Results and Draw Conclusions,\"Interpret Results and Draw Conclusions\n\nDescription:\nObjective: Understand the implications of the data analysis.\nScope: Interpret statistical findings in the context of Clear English.\nSteps: Review analysis reports, discuss findings with stakeholders, formulate conclusions.\nDeliverables: Interpretation of results and conclusions report.\n\nResources needed:\n\u2022 Linguist\n\u2022 Statistician\n\u2022 Project Manager\n\u2022 Stakeholder Feedback\",9/18/2027,9/22/2027,0,ee608d6f-6b39-44c7-9b03-22921e51bb4d,PlanExe\n6dd44764-b8a4-44df-bbd9-acea3df4d967,Refine Learning Materials and Assessments,,9/22/2027,10/12/2027,0,71bdc3e6-f4b9-4846-9bc7-2284b3a0363a,PlanExe\nf9e57a4c-6026-419b-9479-4fa8214a7693,Prepare data for statistical analysis,\"Prepare data for statistical analysis\n\nDescription:\nObjective: Clean, format, and prepare pilot data for statistical analysis.\nScope: Includes data from all pilot cohorts on comprehension, pronunciation, and learner retention.\nSteps: Data cleaning, outlier removal, formatting for statistical software.\nDeliverables: Cleaned and formatted data files.\n\nResources needed:\n\u2022 Statistical software (e.g., R, SPSS)\n\u2022 Data analyst\n\u2022 Spreadsheet software (e.g., Excel, Google Sheets)\",9/22/2027,9/27/2027,0,6dd44764-b8a4-44df-bbd9-acea3df4d967,PlanExe\ndc16f02a-c719-466e-a414-7b5552f07524,Conduct descriptive statistical analysis,\"Conduct descriptive statistical analysis\n\nDescription:\nObjective: Calculate descriptive statistics (mean, median, standard deviation) for key metrics.\nScope: Includes comprehension speed, ordinal error rate, pronunciation consistency, and learner retention.\nSteps: Calculate descriptive statistics for each metric, create summary tables.\nDeliverables: Summary tables of descriptive statistics.\n\nResources needed:\n\u2022 Statistical software\n\u2022 Data analyst\",9/27/2027,10/2/2027,0,f9e57a4c-6026-419b-9479-4fa8214a7693,PlanExe\n43190a36-bbf1-4238-92ba-6f422999cb27,Perform inferential statistical tests,\"Perform inferential statistical tests\n\nDescription:\nObjective: Conduct inferential statistical tests (t-tests, ANOVA) to compare results across groups.\nScope: Includes comparing performance of different cohorts or learning materials.\nSteps: Select appropriate statistical tests, conduct tests, interpret results.\nDeliverables: Statistical test results and interpretations.\n\nResources needed:\n\u2022 Statistical software\n\u2022 Data analyst\n\u2022 Linguist\",10/2/2027,10/7/2027,0,dc16f02a-c719-466e-a414-7b5552f07524,PlanExe\n83984028-6029-4531-887b-5feb92b699a8,Visualize data and create reports,\"Visualize data and create reports\n\nDescription:\nObjective: Create visualizations (graphs, charts) to present key findings.\nScope: Includes visualizing trends in comprehension, pronunciation, and learner retention.\nSteps: Create visualizations, write a report summarizing the findings.\nDeliverables: Visualizations and a summary report.\n\nResources needed:\n\u2022 Data visualization software (e.g., Tableau, matplotlib)\n\u2022 Technical writer\n\u2022 Data analyst\",10/7/2027,10/12/2027,0,6dd44764-b8a4-44df-bbd9-acea3df4d967,PlanExe\n077a032a-2831-4a50-a7b5-34df4795c80a,Standard Launch and Public Licensing,,10/12/2027,5/15/2028,0,71bdc3e6-f4b9-4846-9bc7-2284b3a0363a,PlanExe\n96c73e1f-f6f3-4b95-8c39-23ebc7433661,Develop Public f-1b6efc1e2318,Define Adoption Metrics and Targets,\"Define Adoption Metrics and Targets\n\nDescription:\nEstablish specific, measurable, achievable, relevant, and time-bound (SMART) metrics for adoption across different user groups (e.g., ESL learners, technical writers). Set realistic targets for adoption rates within the project timeline.\n\nResources needed:\n\u2022 Project Manager\n\u2022 Community Engagement Coordinator\n\u2022 Assessment Specialist\",2/13/2028,2/28/2028,0,6bd7243b-bd4a-47fe-96de-beba534d178f,PlanExe\n6da5294e-055a-47ff-ad63-a9c48f6567f4,Identify Key User Groups and Pathways,\"Identify Key User Groups and Pathways\n\nDescription:\nSegment potential users into distinct groups (e.g., ESL programs, technical writing teams, K-12 schools). Map out the specific steps and resources required for each group to adopt Clear English.\n\nResources needed:\n\u2022 Marketing Strategist\n\u2022 Community Engagement Coordinator\n\u2022 Technical Writer\",2/28/2028,3/14/2028,0,c4d40790-6e25-47b8-830f-1b6efc1e2318,PlanExe\ndcf7b9d3-0bcf-417c-885a-b9e264d5aa79,Engage Early Adopters and Gather Feedback,\"Engage Early Adopters and Gather Feedback\n\nDescription:\nRecruit a small group of early adopters from each user group to pilot Clear English. Collect feedback on their experiences, including ease of use, perceived benefits, and any challenges encountered.\n\nResources needed:\n\u2022 Community Engagement Coordinator\n\u2022 Usability Tester\n\u2022 Assessment Specialist\",3/14/2028,3/29/2028,0,6da5294e-055a-47ff-ad63-a9c48f6567f4,PlanExe\nc0499dbd-861b-4c30-8359-0303d7cb733a,Analyze Adoption Data and Refine Strategy,\"Analyze Adoption Data and Refine Strategy\n\nDescription:\nAnalyze the data collected from early adopters to identify areas for improvement in the adoption pathway. Refine the strategy based on the feedback and insights gained.\n\nResources needed:\n\u2022 Project Manager\n\u2022 Assessment Specialist\n\u2022 Lead Linguist\",3/29/2028,4/13/2028,0,6  update the business plan, focusing on financial projections and the benefits of Clear English.\nSteps: 1. Review the existing business plan. 2. Update financial projections based on current data and market trends. 3. Refine the value proposition to highlight the benefits of Clear English for different stakeholders. 4. Document changes in the business plan.\nResources Needed: ['Project Manager', 'Marketing Strategist', 'Financial Advisor']\n\nResources needed:\n\u2022 Project Manager\n\u2022 Marketing Strategist\n\u2022 Financial Advisor\",4/29/2028,5/7/2028,0,cf3b5675-3957-45f4-a400-8614cbe66b57,PlanExe\n48ae8e8f-6a40-45e8-b531-48a8b5c4ee03,Engage potential funding partners,\"Engage potential funding partners\n\nDescription:\nObjective: Build relationships with potential funding partners and secure commitments for future funding.\nScope: Conduct outreach to grant organizations, investors, and other potential funders.\nSteps: 1. Identify key contacts at target funding organizations. 2. Prepare presentation materials highlighting the project's goals and impact. 3. Schedule meetings with potential funders. 4. Follow up with funders to answer questions and address concerns.\nResources Needed: ['Community Engagement Coordinator', 'Funding and Licensing Manager', 'Project Manager']\n\nResources needed:\n\u2022 Community Engagement Coordinator\n\u2022 Funding and Licensing Manager\n\u2022 Project Manager\",5/7/2028,5/15/2028,0,6b975dd0-7f2a-4a19-b05d-6b7571935a88,PlanExe\n5e99e625-6775-4c2a-9d1b-8e342519ae82,Governance and Maintenance,,5/15/2028,8/21/2028,0,e4f656b7-9c8e-4fa1-af6f-1c3719229008,PlanExe\nc24b99e9-21e9-440d-a162-bd75aa7a9f6c,Establish Governance Structure,,5/15/2028,6/16/2028,0,5e99e625-6775-4c2a-9d1b-8e342519ae82,PlanExe\n511948a0-8a6f-4178-be1e-06b52afba263,Define Board Member Selection Criteria (2),\"Define Board Member Selection Criteria\n\nDescription:\nEstablish clear criteria for selecting members of the governance board, including expertise, stakeholder representation, and commitment to the project's goals. This involves researching best practices for board composition and developing a transparent selection process.\n\nResources needed:\n\u2022 Governance Expert\n\u2022 Project Manager\n\u2022 Stakeholder Representatives\",5/15/2028,5/23/2028,0,c24b99e9-21e9-440d-a162-bd75aa7a9f6c,PlanExe\ndd6c0537-ba0c-4799-afde-34bd78535b7b,Draft Governance Charter and Bylaws,\"Draft Governance Charter and Bylaws\n\nDescription:\nDevelop a comprehensive governance charter outlining the board's roles, responsibilities, decision-making processes, and conflict resolution mechanisms. This includes drafting bylaws that define the board's structure, membership, and operating procedures.\n\nResources needed:\n\u2022 Legal Counsel\n\u2022 Governance Expert\n\u2022 Project Manager\",5/23/2028,5/31/2028,0,511948a0-8a6f-4178-be1e-06b52afba263,PlanExe\ncfa7cb24-2aa4-4b98-9a5c-93801d243f27,Establish Communication Protocols (2),\"Establish Communication Protocols\n\nDescription:\nDefine clear communication protocols for the governance board, including meeting schedules, reporting requirements, and channels for disseminating information to stakeholders. This involves developing a communication plan that ensures transparency and accountability.\n\nResources needed:\n\u2022 Project Manager\n\u2022 Communication Specialist\n\u2022 Stakeholder Representatives\",5/31/2028,6/8/2028,0,dd6c0537-ba0c-4799-afde-34bd78535b7b,PlanExe\n74ed0951-c873-4f6c-af0c-c7fce5476f25,Secure Stakeholder Approval of Structure,\"Secure Stakeholder Approval of Structure\n\nDescription:\nPresent the proposed governance structure to key stakeholders for review and approval. This involves conducting presentations, soliciting feedback, and incorporating suggestions to ensure buy-in and support for the governance framework.\n\nResources needed:\n\u2022 Project Manager\n\u2022 Stakeholder Representatives\n\u2022 Governance Expert\",6/8/2028,6/16/2028,0,c24b99e9-21e9-440d-a162-bd75aa7a9f6c,PlanExe\n3ad49ee9-7898-4e1c-96aa-7630dee4c9fb,Monitor Standard Usage and Feedback,,6/16/2028,6/20/2028,0,c24b99e9-21e9-440d-a162-bd75aa7a9f6c,PlanExe\n43861d72-0863-4dcd-8043-1b9f2a0edb15,Establish Feedback Collection Channels,\"Establish Feedback Collection Channels\n\nDescription:\nSet up various channels for collecting user feedback, including online forms, email, and social media monitoring.\n\nResources needed:\n\u2022 Web developers\n\u2022 Community managers\n\u2022 IT support\",6/16/2028,6/17/2028,0,3ad49ee9-7898-4e1c-96aa-7630dee4c9fb,PlanExe\n3385aa4c-810d-400c-b9ac-2d352335c008,Track Clear English Usage Metrics,\"Track Clear English Usage Metrics\n\nDescription:\nImplement tools and processes to track the usage of Clear English across different platforms and user groups.\n\nResources needed:\n\u2022 Data analysts\n\u2022 Software engineers\n\u2022 Analytics tools\",6/17/2028,6/18/2028,0,43861d72-0863-4dcd-8043-1b9f2a0edb15,PlanExe\na1d2e66f-fcbc-4b26-aec3-8d252973a528,Analyze User Feedback and Usage Data,\"Analyze User Feedback and Usage Data\n\nDescription:\nRegularly analyze user feedback and usage data to identify areas for improvement and potential issues.\n\nResources needed:\n\u2022 Linguists\n\u2022 Data analysts\n\u2022 Usability experts\",6/18/2028,6/19/2028,0,3385aa4c-810d-400c-b9ac-2d352335c008,PlanExe\nb54fd0c0-8b6c-4958-a5d4-d8fe184d6512,Report on Usage and Feedback Trends,\"Report on Usage and Feedback Trends\n\nDescription:\nPrepare regular reports summarizing usage trends and user feedback for stakeholders.\n\nResources needed:\n\u2022 Data analysts\n\u2022 Project manager\n\u2022 Communication specialist\",6/19/2028,6/20/2028,0,3ad49ee9-7898-4e1c-96aa-7630dee4c9fb,PlanExe\nf3be490c-e406-44f4-b920-c4d70f64b36f,Update Standard Based on Feedback,,6/20/2028,6/30/2028,0,3ad49ee9-7898-4e1c-96aa-7630dee4c9fb,PlanExe\nac4abb3c-dc8f-480d-9d69-5fa3a978daaa,Gather User Feedback and Usage Data,\"Gather User Feedback and Usage Data\n\nDescription:\nCollect user feedback from various channels (forums, surveys, support tickets) and analyze usage data to identify areas for improvement in the Clear English standard.\n\nResources needed:\n\u2022 Community Manager\n\u2022 Data Analyst\n\u2022 Survey Tools\n\u2022 Analytics Platform\",6/20/2028,6/22/2028,0,f3be490c-e406-44f4-b920-c4d70f64b36f,PlanExe\nab6a2bb9-8e20-4c78-a256-0bbad7d303b8,Prioritize and Categorize Feedback,\"Prioritize and Categorize Feedback\n\nDescription:\nCategorize and prioritize collected feedback based on frequency, impact, and feasibility of implementation. Identify recurring themes and critical issues.\n\nResources needed:\n\u2022 Linguist\n\u2022 Project Manager\n\u2022 Community Manager\n\u2022 Data Analysis Tools\",6/22/2028,6/24/2028,0,ac4abb3c-dc8f-480d-9d69-5fa3a978daaa,PlanExe\n811b5676-f237-4757-9799-75c95386d9bb,Assess Impact of Proposed Changes,\"Assess Impact of Proposed Changes\n\nDescription:\nEvaluate the potential impact of proposed changes on intelligibility, learnability, and consistency of the Clear English standard. Consider potential trade-offs.\n\nResources needed:\n\u2022 Linguist\n\u2022 ESL Educator\n\u2022 Usability Tester\n\u2022 Corpus Analysis Tools\",6/24/2028,6/26/2028,0,ab6a2bb9-8e20-4c78-a256-0bbad7d303b8,PlanExe\n1dc595d2-e171-4d8c-9995-c0743f4ab03b,Implement and Test Standard Updates,\"Implement and Test Standard Updates\n\nDescription:\nImplement approved updates to the Clear English standard, documentation, and learning materials. Conduct thorough testing to ensure quality and consistency.\n\nResources needed:\n\u2022 Technical Writer\n\u2022 Linguist\n\u2022 Software Developer\n\u2022 Testing Environment\",6/26/2028,6/28/2028,0,811b5676-f237-4757-9799-75c95386d9bb,PlanExe\n95bef403-b6d4-4ee6-be2b-6670ba47151c,Communicate Updates to Stakeholders,\"Communicate Updates to Stakeholders\n\nDescription:\nCommunicate updates to the Clear English standard to stakeholders, including users, educators, and developers. Provide clear documentation and support for adopting the changes.\n\nResources needed:\n\u2022 Community Manager\n\u2022 Technical Writer\n\u2022 Marketing Specialist\n\u2022 Communication Channels\",6/28/2028,6/30/2028,0,f3be490c-e406-44f4-b920-c4d70f64b36f,PlanExe\n66fde011-0b5a-40ba-9368-e16eb57fa561,Manage Licensing and Revenue,,6/30/2028,8/1/2028,0,f3be490c-e406-44f4-b920-c4d70f64b36f,PlanExe\n3da360f9-1a92-40a2-82b3-28f8f3d872fe,Track licensing agreements and revenue,\"Track licensing agreements and revenue\n\nDescription:\nEstablish a system to accurately track all licensing agreements, associated revenue, and payment schedules. This includes setting up databases, spreadsheets, or specialized software to manage the data.\n\nResources needed:\n\u2022 Licensing Manager\n\u2022 Accountant\n\u2022 Database Administrator\",6/30/2028,7/8/2028,0,66fde011-0b5a-40ba-9368-e16eb57fa561,PlanExe\na55d831f-120a-44a8-9300-6bfaffea6076,Negotiate licensing agreement terms,\"Negotiate licensing agreement terms\n\nDescription:\nLead negotiations with potential licensees to establish mutually beneficial licensing terms, including royalty rates, usage rights, and duration of the agreement. Ensure compliance with legal and ethical standards.\n\nResources needed:\n\u2022 Licensing Manager\n\u2022 Legal Counsel\n\u2022 Negotiation Specialist\",7/8/2028,7/16/2028,0,3da360f9-1a92-40a2-82b3-28f8f3d872fe,PlanExe\n2b0f084f-fb4b-4903-9ba3-dc79c705c9ce,Enforce licensing agreement compliance,\"Enforce licensing agreement compliance\n\nDescription:\nMonitor licensee compliance with the terms of the licensing agreements, including usage rights, payment schedules, and quality control measures. Take appropriate action to address any violations or breaches of contract.\n\nResources needed:\n\u2022 Licensing Manager\n\u2022 Legal Counsel\n\u2022 Auditor\",7/16/2028,7/24/2028,0,a55d831f-120a-44a8-9300-6bfaffea6076,PlanExe\nf1a57f74-62ca-44e1-93b5-c809c6297c03,Process royalty payments and reporting,\"Process royalty payments and reporting\n\nDescription:\nEstablish a process for receiving and processing royalty payments from licensees, generating accurate royalty reports, and distributing payments to relevant stakeholders. Ensure compliance with tax regulations and accounting standards.\n\nResources needed:\n\u2022 Accountant\n\u2022 Licensing Manager\n\u2022 Financial Analyst\",7/24/2028,8/1/2028,0,66fde011-0b5a-40ba-9368-e16eb57fa561,PlanExe\n0e13f2e0-e7bd-4f56-9797-65b1defc7efd,Validate Governance and Editorial Control,,8/1/2028,8/21/2028,0,5e99e625-6775-4c2a-9d1b-8e342519ae82,PlanExe\ndbab3cb6-2324-4bb8-be33-5b0694df5329,Review Governance Charter and Processes,\"Review Governance Charter and Processes\n\nDescription:\nObjective: Ensure the governance charter and decision-making processes are clearly defined and effectively implemented.\nScope: Review the existing governance charter, decision-making workflows, and communication protocols.\nSteps: 1. Gather all relevant governance documents. 2. Analyze the clarity and completeness of the charter. 3. Assess the efficiency of decision-making processes. 4. Identify any gaps or areas for improvement.\nDeliverables: A report summarizing the review findings and recommendations for improvement.\n\nResources needed:\n\u2022 Governance and Standards Liaison\n\u2022 Legal Advisor\n\u2022 Project Manager\",8/1/2028,8/6/2028,0,0e13f2e0-e7bd-4f56-9797-65b1defc7efd,PlanExe\n67ff1a11-ff15-4389-bbba-870a2aca7bff,Assess Editorial Board Performance,\"Assess Editorial Board Performance\n\nDescription:\nObjective: Evaluate the performance of the editorial board in maintaining consistent editorial standards and resolving linguistic disputes.\nScope: Assess the board's effectiveness in reviewing and approving linguistic rules, resolving conflicts, and ensuring consistency across the Clear English standard.\nSteps: 1. Review meeting minutes and decision logs. 2. Analyze the consistency of editorial decisions. 3. Gather feedback from board members and stakeholders. 4. Identify any areas where the board's performance can be improved.\nDeliverables: A performance assessment report with recommendations for enhancing the board's effectiveness.\n\nResources needed:\n\u2022 Governance and Standards Liaison\n\u2022 Community Engagement Coordinator\n\u2022 Lead Linguist\",8/6/2028,8/11/2028,0,dbab3cb6-2324-4bb8-be33-5b0694df5329,PlanExe\n553c3471-ec5a-4ae9-a83d-10baa7a4afe8,Analyze User Feedback on Governance,\"Analyze User Feedback on Governance\n\nDescription:\nObjective: Gather and analyze user feedback on the governance structure and editorial control mechanisms.\nScope: Collect feedback from stakeholders regarding their satisfaction with the governance structure, their perception of fairness and transparency, and their suggestions for improvement.\nSteps: 1. Design and distribute a survey to stakeholders. 2. Conduct focus groups with representative user groups. 3. Analyze the survey and focus group data to identify key themes and concerns. 4. Prepare a report summarizing the feedback and recommendations.\nDeliverables: A user feedback report with actionable insights for improving governance and editorial control.\n\nResources needed:\n\u2022 Community Engagement Coordinator\n\u2022 Usability and Assessment Expert\n\u2022 Project Manager\",8/11/2028,8/16/2028,0,67ff1a11-ff15-4389-bbba-870a2aca7bff,PlanExe\n0aebcf4b-15ab-42d8-94c2-2446798172d3,Verify Editorial Standards Consistency,\"Verify Editorial Standards Consistency\n\nDescription:\nObjective: Ensure that the editorial standards are consistently applied across all aspects of the Clear English standard.\nScope: Review the application of editorial standards in the reference dictionary, learning materials, and documentation.\nSteps: 1. Select a sample of entries from the reference dictionary. 2. Review a selection of learning materials. 3. Examine the standard documentation. 4. Assess whether the editorial standards have been consistently applied.\nDeliverables: A report on the consistency of editorial standards with recommendations.\n\nResources needed:\n\u2022 Lead Linguist\n\u2022 Technical Writer\n\u2022 Governance and Standards Liaison\",8/16/2028,8/21/2028,0,0e13f2e0-e7bd-4f56-9797-65b1defc7efd,PlanExe\n";

      "text": "Identify Key Stakeholders",
      "custom_tooltip": "<b>Identify Key Stakeholders</b><br>Identify all individuals, groups, or organizations that have an interest in the project or may be affected by its outcome. This includes internal teams, external partners, regulatory bodies, and potential users of Clear English. Create a stakeholder register with contact information, roles, and levels of influence.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Community Engagement Coordinator</li><li>Stakeholder Analysis Template</li></ul>",

    {
      "id": "52e2d75b-b7b3-433e-a727-26aea22665b3",
      "text": "Define Project Goals and Objectives",
      "custom_tooltip": "<b>Define Project Goals and Objectives</b><br>Clearly articulate the overall goals of the Clear English project and break them down into specific, measurable, achievable, relevant, and time-bound (SMART) objectives. This includes defining the scope of linguistic changes, target audience, and desired outcomes. Document these goals and objectives in a project charter.<br><b>Resources needed:</b><br><ul><li>Lead Linguist</li><li>Project Manager</li><li>Editorial Board</li><li>Project Charter Template</li></ul>",

    {
      "id": "7dda0192-5640-40da-ac93-7fe96564b9f7",
      "text": "Determine Project Deliverables",
      "custom_tooltip": "<b>Determine Project Deliverables</b><br>Identify the tangible outputs of the project, such as the Clear English standard, reference dictionary, style guide, pilot curriculum, and public licensing policy. Define the specifications and acceptance criteria for each deliverable. Create a deliverables register.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Technical Writer</li><li>Deliverables Register Template</li></ul>",

    {
      "id": "511135ce-401a-4f9e-94bc-75de6ef2f83f",
      "text": "Establish Project Success Criteria",
      "custom_tooltip": "<b>Establish Project Success Criteria</b><br>Define the metrics that will be used to measure the success of the project, such as comprehension speed, ordinal error rate, pronunciation consistency, and learner retention. Establish baseline measurements and target values for each metric. Document the success criteria in the project charter.<br><b>Resources needed:</b><br><ul><li>Usability and Assessment Expert</li><li>Project Manager</li><li>Project Charter Template</li></ul>",

      "id": "76e2efbe-2ab3-4fdf-9ad1-351bc2d24e9f",
      "text": "Identify Potential Risks",
      "custom_tooltip": "<b>Identify Potential Risks</b><br>Identify all potential risks that could impact the project, including technical, financial, and operational risks. This involves brainstorming sessions, reviewing project documentation, and consulting with subject matter experts.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Subject Matter Experts</li><li>Risk Management Specialist</li></ul>",

    {
      "id": "a9d42da2-ba11-439c-9d26-23dc31691636",
      "text": "Assess Risk Probability and Impact",
      "custom_tooltip": "<b>Assess Risk Probability and Impact</b><br>Evaluate the likelihood of each identified risk occurring and the potential impact on the project&#x27;s timeline, budget, and deliverables. This involves using qualitative and quantitative risk assessment techniques.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Risk Management Specialist</li><li>Data Analyst</li></ul>",

    },
    {
      "id": "5da9fc90-a252-41b7-b656-693fe4206dd7",
      "text": "Prioritize Risks",
      "custom_tooltip": "<b>Prioritize Risks</b><br>Rank the identified risks based on their probability and impact scores to determine which risks require the most attention and mitigation efforts. This involves creating a risk matrix and using a risk scoring system.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Risk Management Specialist</li></ul>",

    {
      "id": "5fb29f61-0758-4d92-8a5e-23687284e9a7",
      "text": "Develop Mitigation Strategies",
      "custom_tooltip": "<b>Develop Mitigation Strategies</b><br>Develop specific mitigation strategies for each high-priority risk, outlining actions to reduce the likelihood or impact of the risk. This involves brainstorming potential solutions, evaluating their feasibility, and documenting the chosen strategies.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Subject Matter Experts</li><li>Risk Management Specialist</li></ul>",

    {
      "id": "5c38238f-8b0c-4f9f-90d3-a07c68f22540",
      "text": "Document Risk Assessment Results",
      "custom_tooltip": "<b>Document Risk Assessment Results</b><br>Document the entire risk assessment process, including the identified risks, their probability and impact scores, prioritization, and mitigation strategies. This involves creating a risk register and maintaining it throughout the project lifecycle.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Risk Management Specialist</li><li>Technical Writer</li></ul>",

    {
      "id": "9c715326-120e-42be-9e16-084c8f62d583",
      "text": "Research ordinal usage in English",
      "custom_tooltip": "<b>Research ordinal usage in English</b><br>Analyze how ordinals are currently used in various contexts (written, spoken, formal, informal) to identify inconsistencies and patterns.<br><b>Resources needed:</b><br><ul><li>Linguists</li><li>Corpus linguist</li><li>Data analyst</li></ul>",
      "start_date": "2026-04-27",
      "duration": 4.0,

      "meta": "7d0093c2-9805-4431-8359-1ab0900bbff3 SS",

    {
      "id": "88ce8056-4230-4792-baa4-9aaff59323d9",
      "text": "Develop initial ordinal rule proposals",
      "custom_tooltip": "<b>Develop initial ordinal rule proposals</b><br>Based on the research, create several potential rule sets for standardizing ordinals in Clear English, considering simplicity, consistency, and intelligibility.<br><b>Resources needed:</b><br><ul><li>Linguists</li><li>Editorial board</li></ul>",
      "start_date": "2026-05-01",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "9c715326-120e-42be-9e16-084c8f62d583 FS",

    },
    {
      "id": "13317444-9cbe-4ddc-a5e7-140ca49184b4",
      "text": "Evaluate rule proposals for clarity",
      "custom_tooltip": "<b>Evaluate rule proposals for clarity</b><br>Assess the clarity and ease of understanding of each rule set through cognitive testing and expert review, focusing on potential ambiguities and edge cases.<br><b>Resources needed:</b><br><ul><li>Usability testers</li><li>ESL educators</li><li>Linguists</li></ul>",
      "start_date": "2026-05-05",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "88ce8056-4230-4792-baa4-9aaff59323d9 FS",
      "parent": "7d0093c2-9805-4431-8359-1ab0900bbff3"
    },
    {
      "id": "3619a651-efa9-479f-92c2-148735950ac2",
      "text": "Refine and finalize ordinal rules",
      "custom_tooltip": "<b>Refine and finalize ordinal rules</b><br>Incorporate feedback from the evaluation phase to refine the most promising rule set, ensuring it aligns with the overall goals of Clear English and is readily understandable.<br><b>Resources needed:</b><br><ul><li>Linguists</li><li>Editorial board</li><li>Technical writer</li></ul>",

    {
      "id": "c2fd3a0c-adf8-4371-a5e0-169b987b3036",
      "text": "Research existing English phonetic systems",
      "custom_tooltip": "<b>Research existing English phonetic systems</b><br>Objective: Thoroughly investigate established phonetic systems used for English. Scope: Review IPA, ARPABET, and other relevant systems. Steps: Literature review, online research, expert consultation. Deliverables: Summary report of findings.<br><b>Resources needed:</b><br><ul><li>Linguist</li><li>Phonetician</li><li>Research assistant</li></ul>",
      "start_date": "2026-05-13",
      "duration": 6.0,
      "progress": 0,
      "open": true,
      "meta": "8ab857b9-eb5e-4e10-9838-1bfca16aee58 SS",
      "parent": "8ab857b9-eb5e-4e10-9838-1bfca16aee58"
    },
    {
      "id": "a3876607-9ff3-43d4-9eee-26e79e8e9e95",
      "text": "Analyze spelling-to-sound inconsistencies",
      "custom_tooltip": "<b>Analyze spelling-to-sound inconsistencies</b><br>Objective: Identify and categorize common inconsistencies in English spelling-to-sound correspondences. Scope: Focus on frequently occurring exceptions and ambiguous cases. Steps: Corpus analysis, rule extraction, exception listing. Deliverables: Database of inconsistencies.<br><b>Resources needed:</b><br><ul><li>Corpus linguist</li><li>Data analyst</li><li>Computational linguist</li></ul>",

      "text": "Develop Clear English phonetic rules",
      "custom_tooltip": "<b>Develop Clear English phonetic rules</b><br>Objective: Create a set of consistent and unambiguous spelling-to-sound rules for Clear English. Scope: Cover all common English phonemes and graphemes. Steps: Rule design, testing, refinement. Deliverables: Rule set document.<br><b>Resources needed:</b><br><ul><li>Linguist</li><li>Phonetician</li><li>ESL educator</li></ul>",

      "text": "Test rules with text-to-speech engine",
      "custom_tooltip": "<b>Test rules with text-to-speech engine</b><br>Objective: Evaluate the effectiveness of the Clear English phonetic rules using a text-to-speech engine. Scope: Assess pronunciation accuracy and naturalness. Steps: Rule implementation, text input, audio output analysis. Deliverables: Evaluation report.<br><b>Resources needed:</b><br><ul><li>Technical writer</li><li>Software developer</li><li>Usability tester</li></ul>",

      "custom_tooltip": "<b>Refine rules based on testing feedback</b><br>Objective: Improve the Clear English phonetic rules based on the results of text-to-speech testing and expert feedback. Scope: Address identified errors and inconsistencies. Steps: Rule revision, re-testing, validation. Deliverables: Final rule set.<br><b>Resources needed:</b><br><ul><li>Linguist</li><li>Phonetician</li><li>ESL educator</li></ul>",

      "text": "Identify Irregular Verbs and Nouns",
      "custom_tooltip": "<b>Identify Irregular Verbs and Nouns</b><br>Objective: Identify common irregular verbs and nouns in English.\nScope: Focus on the most frequently used irregular forms.\nSteps: Analyze a corpus of English text, consult linguistic resources, and create a list of target words.\nDeliverables: A comprehensive list of irregular verbs and nouns.<br><b>Resources needed:</b><br><ul><li>Linguist</li><li>Corpus Linguistics Software</li><li>English Dictionaries</li></ul>",

      "id": "d1685d88-2f9f-4ff2-b345-1d08d92192be",
      "text": "Develop Regularization Rules",
      "custom_tooltip": "<b>Develop Regularization Rules</b><br>Objective: Create rules for regularizing irregular verbs and nouns.\nScope: Ensure rules are consistent and easy to apply.\nSteps: Define rules for verb conjugation and noun pluralization, test rules on sample texts, and refine rules based on feedback.\nDeliverables: A set of clear and consistent regularization rules.<br><b>Resources needed:</b><br><ul><li>Linguist</li><li>Technical Writer</li><li>Rule Engine Software</li></ul>",

      "id": "9e006ae9-e458-422c-9dac-5216bdf5a959",
      "text": "Assess Impact on Intelligibility",
      "custom_tooltip": "<b>Assess Impact on Intelligibility</b><br>Objective: Evaluate the impact of regularization on language comprehension.\nScope: Measure comprehension levels of regularized vs. irregular forms.\nSteps: Conduct comprehension tests with native and non-native speakers, analyze test results, and identify potential issues.\nDeliverables: A report on the impact of regularization on intelligibility.<br><b>Resources needed:</b><br><ul><li>Usability Tester</li><li>Assessment Specialist</li><li>Test Participants</li></ul>",

      "custom_tooltip": "<b>Identify Key Learning Objectives</b><br>Define the specific learning outcomes for each module, aligning with Clear English principles and target audience needs.<br><b>Resources needed:</b><br><ul><li>Linguists</li><li>Educators</li><li>Curriculum Development Specialists</li></ul>",
      "start_date": "2027-04-29",
      "duration": 12.0,
      "progress": 0,
      "open": true,
      "meta": "e0086771-9114-4070-832c-0e567760a94b SS",
      "parent": "e0086771-9114-4070-832c-0e567760a94b"
    },
    {
      "id": "c9aa0fb0-275f-45d3-b751-e9295607e864",
      "text": "Design Module Structure and Content",
      "custom_tooltip": "<b>Design Module Structure and Content</b><br>Develop a logical and engaging module structure, incorporating Clear English rules and examples, and creating interactive exercises.<br><b>Resources needed:</b><br><ul><li>Educators</li><li>Technical Writers</li><li>Graphic Designers</li></ul>",
      "start_date": "2027-05-11",
      "duration": 12.0,
      "progress": 0,
      "open": true,
      "meta": "75d6a207-b0c0-40e2-812f-315596b219b6 FS",
      "parent": "e0086771-9114-4070-832c-0e567760a94b"
    },
    {
      "id": "af223cfa-d5e6-4004-8864-9b75f8c7a9c2",
      "text": "Develop Exercises and Activities",
      "custom_tooltip": "<b>Develop Exercises and Activities</b><br>Create a variety of exercises and activities to reinforce learning, including quizzes, games, and real-world application scenarios.<br><b>Resources needed:</b><br><ul><li>Educators</li><li>Assessment Specialists</li><li>Technical Writers</li></ul>",
      "start_date": "2027-05-23",
      "duration": 12.0,
      "progress": 0,
      "open": true,
      "meta": "c9aa0fb0-275f-45d3-b751-e9295607e864 FS",

    },
    {
      "id": "1fd5b8a5-b06a-401a-824b-f18a25f4d3de",
      "text": "Review and Revise Materials",
      "custom_tooltip": "<b>Review and Revise Materials</b><br>Conduct thorough reviews of all learning materials, incorporating feedback from linguists, educators, and target audience representatives.<br><b>Resources needed:</b><br><ul><li>Linguists</li><li>Educators</li><li>Usability Testers</li></ul>",
      "start_date": "2027-06-04",
      "duration": 12.0,
      "progress": 0,
      "open": true,
      "meta": "e0086771-9114-4070-832c-0e567760a94b FF, af223cfa-d5e6-4004-8864-9b75f8c7a9c2 FS",

    },
    {
      "id": "4177bc52-95e5-49dd-91bf-dd96ffc49dda",
      "text": "Develop Assessments",
      "custom_tooltip": "<b>Develop Assessments</b>",
      "progress": 0,
      "open": true,
      "meta": "e0086771-9114-4070-832c-0e567760a94b FS",
      "parent": "71bdc3e6-f4b9-4846-9bc7-2284b3a0363a",
      "type": "project"
    },
    {
      "id": "136a6d5f-b687-4684-8ffc-0fb2282e3904",
      "text": "Define Assessment Objectives and Criteria",
      "custom_tooltip": "<b>Define Assessment Objectives and Criteria</b><br>Clearly define the learning outcomes and skills that the assessments will measure. Establish specific, measurable, achievable, relevant, and time-bound (SMART) criteria for evaluating student performance.<br><b>Resources needed:</b><br><ul><li>Assessment Specialist</li><li>Linguists</li><li>Educators</li></ul>",
      "start_date": "2027-06-16",
      "duration": 6.0,
      "progress": 0,
      "open": true,
      "meta": "4177bc52-95e5-49dd-91bf-dd96ffc49dda SS",
      "parent": "4177bc52-95e5-49dd-91bf-dd96ffc49dda"
    },
    {
      "id": "7cc24c5a-7af2-4dec-937d-79dcbef441f2",
      "text": "Design Assessment Instruments",
      "custom_tooltip": "<b>Design Assessment Instruments</b><br>Develop a variety of assessment instruments, such as quizzes, tests, writing prompts, and oral presentations, that align with the defined objectives and criteria. Ensure that the instruments are appropriate for the target audience and learning context.<br><b>Resources needed:</b><br><ul><li>Assessment Specialist</li><li>Technical Writers</li><li>Educators</li></ul>",
      "start_date": "2027-06-22",
      "duration": 6.0,
      "progress": 0,
      "open": true,
      "meta": "136a6d5f-b687-4684-8ffc-0fb2282e3904 FS",
      "parent": "4177bc52-95e5-49dd-91bf-dd96ffc49dda"
    },
    {
      "id": "5ec4a55f-797a-409c-8ead-780d62450452",
      "text": "Pilot Test Assessments",
      "custom_tooltip": "<b>Pilot Test Assessments</b><br>Conduct pilot testing of the assessment instruments with a small group of learners to identify any issues with clarity, validity, or reliability. Gather feedback from learners and educators to refine the instruments.<br><b>Resources needed:</b><br><ul><li>Usability Testers</li><li>Educators</li><li>Assessment Specialist</li></ul>",
      "start_date": "2027-06-28",
      "duration": 6.0,
      "progress": 0,
      "open": true,
      "meta": "7cc24c5a-7af2-4dec-937d-79dcbef441f2 FS",
      "parent": "4177bc52-95e5-49dd-91bf-dd96ffc49dda"
    },
    {
      "id": "40abdf2b-4e88-4927-bd6c-a19c1a9485d0",
      "text": "Establish Scoring Rubrics and Guidelines",
      "custom_tooltip": "<b>Establish Scoring Rubrics and Guidelines</b><br>Develop clear and consistent scoring rubrics and guidelines for evaluating student performance on the assessment instruments. Ensure that the rubrics are aligned with the assessment objectives and criteria.<br><b>Resources needed:</b><br><ul><li>Assessment Specialist</li><li>Educators</li><li>Linguists</li></ul>",
      "start_date": "2027-07-04",
      "duration": 6.0,
      "progress": 0,
      "open": true,
      "meta": "5ec4a55f-797a-409c-8ead-780d62450452 FS",
      "parent": "4177bc52-95e5-49dd-91bf-dd96ffc49dda"
    },
    {
      "id": "8b80418c-6660-4542-88d1-626749971c86",
      "text": "Ensure Assessment Validity and Reliability",
      "custom_tooltip": "<b>Ensure Assessment Validity and Reliability</b><br>Implement measures to ensure the validity and reliability of the assessments, such as using multiple assessment methods, conducting statistical analysis, and seeking expert review. Address any issues identified during pilot testing or analysis.<br><b>Resources needed:</b><br><ul><li>Assessment Specialist</li><li>Statistical Analyst</li><li>Linguists</li></ul>",
      "start_date": "2027-07-10",
      "duration": 6.0,
      "progress": 0,
      "open": true,
      "meta": "4177bc52-95e5-49dd-91bf-dd96ffc49dda FF, 40abdf2b-4e88-4927-bd6c-a19c1a9485d0 FS",
      "parent": "4177bc52-95e5-49dd-91bf-dd96ffc49dda"
    },
    {
      "id": "c8f92683-a620-41bb-9396-9ea48f2c5f41",
      "text": "Recruit Pilot Cohorts",
      "custom_tooltip": "<b>Recruit Pilot Cohorts</b>",
      "progress": 0,
      "open": true,
      "meta": "4177bc52-95e5-49dd-91bf-dd96ffc49dda FS",
      "parent": "71bdc3e6-f4b9-4846-9bc7-2284b3a0363a",
      "type": "project"
    },
    {
      "id": "175e02ba-86eb-4254-a4dc-03b62cb30fa3",
      "text": "Define Pilot Cohort Selection Criteria",
      "custom_tooltip": "<b>Define Pilot Cohort Selection Criteria</b><br>Establish clear criteria for selecting participants, including demographics, language proficiency, and learning goals. This ensures a representative and suitable cohort for testing.<br><b>Resources needed:</b><br><ul><li>Linguists</li><li>Educators</li><li>Assessment Specialists</li></ul>",
      "start_date": "2027-07-16",
      "duration": 8.0,
      "progress": 0,
      "open": true,
      "meta": "c8f92683-a620-41bb-9396-9ea48f2c5f41 SS",
      "parent": "c8f92683-a620-41bb-9396-9ea48f2c5f41"
    },
    {
      "id": "9c791a72-586c-4494-93c5-cc9324507820",
      "text": "Identify and Contact Potential Participants",
      "custom_tooltip": "<b>Identify and Contact Potential Participants</b><br>Research and identify potential participants through ESL programs, community centers, and online platforms. Contact them with information about the pilot program and recruitment process.<br><b>Resources needed:</b><br><ul><li>Community Engagement Coordinator</li><li>Marketing Strategist</li></ul>",
      "start_date": "2027-07-24",
      "duration": 8.0,
      "progress": 0,
      "open": true,
      "meta": "175e02ba-86eb-4254-a4dc-03b62cb30fa3 FS",
      "parent": "c8f92683-a620-41bb-9396-9ea48f2c5f41"
    },
    {
      "id": "b26d9518-bc88-4b9d-a93b-822f61e6e09b",
      "text": "Screen and Enroll Participants",
      "custom_tooltip": "<b>Screen and Enroll Participants</b><br>Screen potential participants based on the defined criteria. Enroll eligible participants and obtain informed consent for participation in the pilot program.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Recruitment Assistant</li></ul>",
      "start_date": "2027-08-01",
      "duration": 8.0,
      "progress": 0,
      "open": true,
      "meta": "9c791a72-586c-4494-93c5-cc9324507820 FS",
      "parent": "c8f92683-a620-41bb-9396-9ea48f2c5f41"
    },
    {
      "id": "a4bb9fc2-2347-47b6-9e1a-c8c51d96daae",
      "text": "Schedule Pilot Sessions",
      "custom_tooltip": "<b>Schedule Pilot Sessions</b><br>Coordinate with participants to schedule pilot sessions at convenient times and locations. Ensure adequate resources and facilities are available for each session.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Administrative Assistant</li></ul>",
      "start_date": "2027-08-09",
      "duration": 8.0,
      "progress": 0,
      "open": true,
      "meta": "c8f92683-a620-41bb-9396-9ea48f2c5f41 FF, b26d9518-bc88-4b9d-a93b-822f61e6e09b FS",
      "parent": "c8f92683-a620-41bb-9396-9ea48f2c5f41"
    },
    {
      "id": "e24c9014-d88b-47e3-b961-5396675dd5b6",
      "text": "Conduct Usability Testing",
      "custom_tooltip": "<b>Conduct Usability Testing</b>",
      "progress": 0,
      "open": true,
      "meta": "c8f92683-a620-41bb-9396-9ea48f2c5f41 FS",
      "parent": "71bdc3e6-f4b9-4846-9bc7-2284b3a0363a",
      "type": "project"
    },
    {
      "id": "3fd65bb5-85dc-45af-a325-7ac86783c576",
      "text": "Plan usability testing sessions",
      "custom_tooltip": "<b>Plan usability testing sessions</b><br>Define the scope and objectives of the usability testing, identify target users, and develop a detailed test plan.<br><b>Resources needed:</b><br><ul><li>Usability expert</li><li>Project manager</li><li>Recruitment coordinator</li></ul>",
      "start_date": "2027-08-17",
      "duration": 5.0,
      "progress": 0,
      "open": true,
      "meta": "e24c9014-d88b-47e3-b961-5396675dd5b6 SS",
      "parent": "e24c9014-d88b-47e3-b961-5396675dd5b6"
    },
    {
      "id": "0edce598-fa3d-49c6-a13f-4e678f7b6bf5",
      "text": "Prepare testing environment and materials",
      "custom_tooltip": "<b>Prepare testing environment and materials</b><br>Set up the testing environment, prepare testing materials (e.g., prototypes, scenarios, tasks), and ensure that all necessary equipment is available and functioning properly.<br><b>Resources needed:</b><br><ul><li>Usability expert</li><li>Technical support</li><li>Learning materials</li></ul>",
      "start_date": "2027-08-22",
      "duration": 5.0,
      "progress": 0,
      "open": true,
      "meta": "3fd65bb5-85dc-45af-a325-7ac86783c576 FS",
      "parent": "e24c9014-d88b-47e3-b961-5396675dd5b6"
    },
    {
      "id": "7b585856-a8fe-41e9-aca5-2e768ee95564",
      "text": "Conduct usability testing sessions",
      "custom_tooltip": "<b>Conduct usability testing sessions</b><br>Facilitate usability testing sessions with participants, observe their interactions with the learning materials, and collect data on their performance and feedback.<br><b>Resources needed:</b><br><ul><li>Usability expert</li><li>Note-taker</li><li>Participants</li></ul>",
      "start_date": "2027-08-27",
      "duration": 5.0,
      "progress": 0,
      "open": true,
      "meta": "0edce598-fa3d-49c6-a13f-4e678f7b6bf5 FS",
      "parent": "e24c9014-d88b-47e3-b961-5396675dd5b6"
    },
    {
      "id": "c9fd0c9a-e31a-4a91-91e3-6620d153b89d",
      "text": "Analyze usability testing data",
      "custom_tooltip": "<b>Analyze usability testing data</b><br>Analyze the data collected during the usability testing sessions, identify usability issues and areas for improvement, and prepare a report summarizing the findings.<br><b>Resources needed:</b><br><ul><li>Usability expert</li><li>Data analyst</li></ul>",
      "start_date": "2027-09-01",
      "duration": 5.0,
      "progress": 0,
      "open": true,
      "meta": "e24c9014-d88b-47e3-b961-5396675dd5b6 FF, 7b585856-a8fe-41e9-aca5-2e768ee95564 FS",
      "parent": "e24c9014-d88b-47e3-b961-5396675dd5b6"
    },
    {
      "id": "ee608d6f-6b39-44c7-9b03-22921e51bb4d",
      "text": "Analyze Pilot Data",
      "custom_tooltip": "<b>Analyze Pilot Data</b>",
      "progress": 0,
      "open": true,
      "meta": "e24c9014-d88b-47e3-b961-5396675dd5b6 FS",
      "parent": "71bdc3e6-f4b9-4846-9bc7-2284b3a0363a",
      "type": "project"
    },
    {
      "id": "e2119460-f72f-4acb-baee-7458aca478c2",
      "text": "Clean and Prepare Pilot Data",
      "custom_tooltip": "<b>Clean and Prepare Pilot Data</b><br>Objective: Ensure data quality for accurate analysis.\nScope: Data cleaning, validation, and formatting.\nSteps: Remove duplicates, correct errors, standardize formats.\nDeliverables: Cleaned and prepared dataset.<br><b>Resources needed:</b><br><ul><li>Data Analyst</li><li>Data Cleaning Software</li><li>Spreadsheet Software</li></ul>",
      "start_date": "2027-09-06",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "ee608d6f-6b39-44c7-9b03-22921e51bb4d SS",
      "parent": "ee608d6f-6b39-44c7-9b03-22921e51bb4d"
    },
    {
      "id": "e72bc37f-32ca-4257-a9be-fd5da4b676f6",
      "text": "Perform Descriptive Statistical Analysis",
      "custom_tooltip": "<b>Perform Descriptive Statistical Analysis</b><br>Objective: Summarize key characteristics of the pilot data.\nScope: Calculate descriptive statistics (mean, median, standard deviation).\nSteps: Use statistical software to generate descriptive statistics for relevant variables.\nDeliverables: Summary report of descriptive statistics.<br><b>Resources needed:</b><br><ul><li>Statistician</li><li>Statistical Software (e.g., R, SPSS)</li><li>Data Analysis Plan</li></ul>",
      "start_date": "2027-09-10",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "e2119460-f72f-4acb-baee-7458aca478c2 FS",
      "parent": "ee608d6f-6b39-44c7-9b03-22921e51bb4d"
    },
    {
      "id": "1416ca27-286e-4281-80a7-cd6bd8c0949f",
      "text": "Conduct Comparative Analysis",
      "custom_tooltip": "<b>Conduct Comparative Analysis</b><br>Objective: Compare outcomes between control and experimental groups.\nScope: Statistical tests to determine significant differences.\nSteps: Select appropriate statistical tests (t-tests, ANOVA), perform tests, interpret results.\nDeliverables: Report on comparative analysis findings.<br><b>Resources needed:</b><br><ul><li>Statistician</li><li>Statistical Software</li><li>Comparative Analysis Plan</li></ul>",
      "start_date": "2027-09-14",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "e72bc37f-32ca-4257-a9be-fd5da4b676f6 FS",
      "parent": "ee608d6f-6b39-44c7-9b03-22921e51bb4d"
    },
    {
      "id": "b3b1ca22-aa28-402b-82cc-3345e06a6afc",
      "text": "Interpret Results and Draw Conclusions",
      "custom_tooltip": "<b>Interpret Results and Draw Conclusions</b><br>Objective: Understand the implications of the data analysis.\nScope: Interpret statistical findings in the context of Clear English.\nSteps: Review analysis reports, discuss findings with stakeholders, formulate conclusions.\nDeliverables: Interpretation of results and conclusions report.<br><b>Resources needed:</b><br><ul><li>Linguist</li><li>Statistician</li><li>Project Manager</li><li>Stakeholder Feedback</li></ul>",
      "start_date": "2027-09-18",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "ee608d6f-6b39-44c7-9b03-22921e51bb4d FF, 1416ca27-286e-4281-80a7-cd6bd8c0949f FS",
      "parent": "ee608d6f-6b39-44c7-9b03-22921e51bb4d"
    },
    {
      "id": "6dd44764-b8a4-44df-bbd9-acea3df4d967",
      "text": "Refine Learning Materials and Assessments",
      "custom_tooltip": "<b>Refine Learning Materials and Assessments</b>",
      "progress": 0,
      "open": true,
      "meta": "71bdc3e6-f4b9-4846-9bc7-2284b3a0363a FF, ee608d6f-6b39-44c7-9b03-22921e51bb4d FS",
      "parent": "71bdc3e6-f4b9-4846-9bc7-2284b3a0363a",
      "type": "project"
    },
    {
      "id": "f9e57a4c-6026-419b-9479-4fa8214a7693",
      "text": "Prepare data for statistical analysis",
      "custom_tooltip": "<b>Prepare data for statistical analysis</b><br>Objective: Clean, format, and prepare pilot data for statistical analysis.\nScope: Includes data from all pilot cohorts on comprehension, pronunciation, and learner retention.\nSteps: Data cleaning, outlier removal, formatting for statistical software.\nDeliverables: Cleaned and formatted data files.<br><b>Resources needed:</b><br><ul><li>Statistical software (e.g., R, SPSS)</li><li>Data analyst</li><li>Spreadsheet software (e.g., Excel, Google Sheets)</li></ul>",
      "start_date": "2027-09-22",
      "duration": 5.0,
      "progress": 0,
      "open": true,
      "meta": "6dd44764-b8a4-44df-bbd9-acea3df4d967 SS",
      "parent": "6dd44764-b8a4-44df-bbd9-acea3df4d967"
    },
    {
      "id": "dc16f02a-c719-466e-a414-7b5552f07524",
      "text": "Conduct descriptive statistical analysis",
      "custom_tooltip": "<b>Conduct descriptive statistical analysis</b><br>Objective: Calculate descriptive statistics (mean, median, standard deviation) for key metrics.\nScope: Includes comprehension speed, ordinal error rate, pronunciation consistency, and learner retention.\nSteps: Calculate descriptive statistics for each metric, create summary tables.\nDeliverables: Summary tables of descriptive statistics.<br><b>Resources needed:</b><br><ul><li>Statistical software</li><li>Data analyst</li></ul>",
      "start_date": "2027-09-27",
      "duration": 5.0,
      "progress": 0,
      "open": true,
      "meta": "f9e57a4c-6026-419b-9479-4fa8214a7693 FS",
      "parent": "6dd44764-b8a4-44df-bbd9-acea3df4d967"
    },
    {
      "id": "43190a36-bbf1-4238-92ba-6f422999cb27",
      "text": "Perform inferential statistical tests",
      "custom_tooltip": "<b>Perform inferential statistical tests</b><br>Objective: Conduct inferential statistical tests (t-tests, ANOVA) to compare results across groups.\nScope: Includes comparing performance of different cohorts or learning materials.\nSteps: Select appropriate statistical tests, conduct tests, interpret results.\nDeliverables: Statistical test results and interpretations.<br><b>Resources needed:</b><br><ul><li>Statistical software</li><li>Data analyst</li><li>Linguist</li></ul>",
      "start_date": "2027-10-02",
      "duration": 5.0,
      "progress": 0,
      "open": true,
      "meta": "dc16f02a-c719-466e-a414-7b5552f07524 FS",
      "parent": "6dd44764-b8a4-44df-bbd9-acea3df4d967"
    },
    {
      "id": "83984028-6029-4531-887b-5feb92b699a8",
      "text": "Visualize data and create reports",
      "custom_tooltip": "<b>Visualize data and create reports</b><br>Objective: Create visualizations (graphs, charts) to present key findings.\nScope: Includes visualizing trends in comprehension, pronunciation, and learner retention.\nSteps: Create visualizations, write a report summarizing the findings.\nDeliverables: Visualizations and a summary report.<br><b>Resources needed:</b><br><ul><li>Data visualization software (e.g., Tableau, matplotlib)</li><li>Technical writer</li><li>Data analyst</li></ul>",
      "start_date": "2027-10-07",
      "duration": 5.0,
      "progress": 0,
      "open": true,
      "meta": "6dd44764-b8a4-44df-bbd9-acea3df4d967 FF, 43190a36-bbf1-4238-92ba-6f422999cb27 FS",
      "parent": "6dd44764-b8a4-44df-bbd9-acea3df4d967"
    },

      "type": "project"

      "text": "Develop Public Licensing Policy",
      "custom_tooltip": "<b>Develop Public Licensing Policy</b>",

    {
      "id": "5954d009-0b8c-4893-b6fb-59fb0beffe89",
      "text": "Research existing open source licenses",
      "custom_tooltip": "<b>Research existing open source licenses</b><br>Objective: Identify suitable open-source licenses for Clear English.\nScope: Review licenses like MIT, Apache 2.0, GPL, Creative Commons.\nSteps: 1. Research common open-source licenses. 2. Analyze their terms and conditions. 3. Assess their compatibility with Clear English goals.\nDeliverables: A report summarizing suitable open-source licenses.<br><b>Resources needed:</b><br><ul><li>Legal counsel</li><li>Licensing expert</li><li>Researcher</li></ul>",
      "start_date": "2027-10-12",
      "duration": 8.0,
      "progress": 0,
      "open": true,
      "meta": "96c73e1f-f6f3-4b95-8c39-23ebc7433661 SS",
      "parent": "96c73e1f-f6f3-4b95-8c39-23ebc7433661"
    },
    {
      "id": "ccdf72ef-abb9-4601-b2c3-bdaba6163a8b",
      "text": "Define licensing terms and conditions",
      "custom_tooltip": "<b>Define licensing terms and conditions</b><br>Objective: Establish the specific terms and conditions for using Clear English.\nScope: Define usage rights, restrictions, attribution requirements, and commercial use policies.\nSteps: 1. Determine the desired level of openness. 2. Draft licensing terms based on research. 3. Review terms with legal counsel.\nDeliverables: A draft of the licensing terms and conditions.<br><b>Resources needed:</b><br><ul><li>Legal counsel</li><li>Licensing expert</li><li>Project manager</li></ul>",
      "start_date": "2027-10-20",
      "duration": 8.0,
      "progress": 0,
      "open": true,
      "meta": "5954d009-0b8c-4893-b6fb-59fb0beffe89 FS",

    {
      "id": "44797be3-5a85-4e73-96f5-b40f358aff98",
      "text": "Consult stakeholders on licensing policy",
      "custom_tooltip": "<b>Consult stakeholders on licensing policy</b><br>Objective: Gather feedback from stakeholders on the proposed licensing policy.\nScope: Solicit input from educators, developers, and the general public.\nSteps: 1. Prepare a summary of the proposed licensing policy. 2. Conduct surveys and focus groups. 3. Analyze feedback and identify areas for improvement.\nDeliverables: A report summarizing stakeholder feedback.<br><b>Resources needed:</b><br><ul><li>Community engagement coordinator</li><li>Survey specialist</li><li>Project manager</li></ul>",
      "start_date": "2027-10-28",

    },
    {
      "id": "9a122194-6c71-418d-9aa1-30a46f31dfb9",
      "text": "Draft the public licensing policy document",
      "custom_tooltip": "<b>Draft the public licensing policy document</b><br>Objective: Create a comprehensive and legally sound licensing policy document.\nScope: Incorporate feedback from stakeholders and legal counsel.\nSteps: 1. Revise the draft licensing terms based on feedback. 2. Format the document for public release. 3. Obtain final approval from legal counsel.\nDeliverables: A final public licensing policy document.<br><b>Resources needed:</b><br><ul><li>Legal counsel</li><li>Technical writer</li><li>Project manager</li></ul>",

      "custom_tooltip": "<b>Draft Core Linguistic Rules Section</b><br>Write the section detailing the rules for ordinals, spelling-to-sound, morphology, and homographs. Ensure clarity, consistency, and accuracy in the presentation of these rules.<br><b>Resources needed:</b><br><ul><li>Lead Linguist</li><li>Technical Writer</li><li>Plain Language Expert</li></ul>",

      "text": "Create Examples and Illustrations",
      "custom_tooltip": "<b>Create Examples and Illustrations</b><br>Develop examples and illustrations to demonstrate the application of Clear English rules. These examples should be relevant, easy to understand, and representative of real-world usage.<br><b>Resources needed:</b><br><ul><li>Technical Writer</li><li>Illustrator</li><li>ESL Educator</li></ul>",

      "custom_tooltip": "<b>Engage with Key Influencers and Stakeholders</b><br>Identify and engage with influential figures in linguistics, education, and technical writing to promote Clear English and build credibility. Seek endorsements and partnerships.<br><b>Resources needed:</b><br><ul><li>Community Engagement Coordinator</li><li>Project Manager</li></ul>",

    {
      "id": "c4d40790-6e25-47b8-830f-1b6efc1e2318",
      "text": "Define Adoption Metrics and Targets",
      "custom_tooltip": "<b>Define Adoption Metrics and Targets</b><br>Establish specific, measurable, achievable, relevant, and time-bound (SMART) metrics for adoption across different user groups (e.g., ESL learners, technical writers). Set realistic targets for adoption rates within the project timeline.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Community Engagement Coordinator</li><li>Assessment Specialist</li></ul>",

      "id": "6da5294e-055a-47ff-ad63-a9c48f6567f4",
      "text": "Identify Key User Groups and Pathways",
      "custom_tooltip": "<b>Identify Key User Groups and Pathways</b><br>Segment potential users into distinct groups (e.g., ESL programs, technical writing teams, K-12 schools). Map out the specific steps and resources required for each group to adopt Clear English.<br><b>Resources needed:</b><br><ul><li>Marketing Strategist</li><li>Community Engagement Coordinator</li><li>Technical Writer</li></ul>",

      "custom_tooltip": "<b>Engage Early Adopters and Gather Feedback</b><br>Recruit a small group of early adopters from each user group to pilot Clear English. Collect feedback on their experiences, including ease of use, perceived benefits, and any challenges encountered.<br><b>Resources needed:</b><br><ul><li>Community Engagement Coordinator</li><li>Usability Tester</li><li>Assessment Specialist</li></ul>",

      "text": "Analyze current funding sources and stability",
      "custom_tooltip": "<b>Analyze current funding sources and stability</b><br>Objective: Assess the reliability and sustainability of existing funding streams.\nScope: Review grant agreements, licensing contracts, and other financial documents.\nSteps: 1. Identify all current funding sources. 2. Evaluate the terms and conditions of each funding agreement. 3. Assess the financial stability of each funding source. 4. Document findings in a report.\nResources Needed: [&#x27;Funding and Licensing Manager&#x27;, &#x27;Financial Advisor&#x27;]<br><b>Resources needed:</b><br><ul><li>Funding and Licensing Manager</li><li>Financial Advisor</li></ul>",

      "text": "Explore alternative funding opportunities",
      "custom_tooltip": "<b>Explore alternative funding opportunities</b><br>Objective: Identify potential new funding sources to diversify the project&#x27;s financial base.\nScope: Research grant opportunities, potential investors, and other funding avenues.\nSteps: 1. Research relevant grant databases and funding organizations. 2. Identify potential investors or sponsors. 3. Evaluate the eligibility criteria and application requirements for each opportunity. 4. Document findings in a report.\nResources Needed: [&#x27;Funding and Licensing Manager&#x27;, &#x27;Project Manager&#x27;]<br><b>Resources needed:</b><br><ul><li>Funding and Licensing Manager</li><li>Project Manager</li></ul>",
