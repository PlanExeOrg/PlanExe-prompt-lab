<script type="module">
    // When `null`, the "Export to CSV" button is hidden.
    // When a string, it's the CSV data, eg: `"hello;csv;world"` and the button is shown.
    const GANTT_DATA_CSV = "project_key,project_name,project_description,project_start_date,project_end_date,project_progress,project_parent,originating_department\nc0116ebd-d576-42fa-a84b-dfa64afc7411,Nuuk Clay Workshop,\"Nuuk Clay Workshop\n\nFinal deliverable:\nOperational Workshop\",2/15/2026,4/1/2029,0,,PlanExe\nd17ed687-82b9-414c-9a67-12e0227663ea,Establish Supply Chain Resilience,,2/15/2026,5/30/2026,0,c0116ebd-d576-42fa-a84b-dfa64afc7411,PlanExe\n5a995d64-8915-48ae-8d66-f730f056f211,Conduct Arctic Shipping Risk Assessment,,2/15/2026,3/22/2026,0,d17ed687-82b9-414c-9a67-12e0227663ea,PlanExe\n9eb63024-a557-417c-98f7-4e3124efa4b1,Collect Historical Shipping Data,\"Collect Historical Shipping Data\n\nDescription:\nGather historical shipping delay data for Nuuk Harbour from 2018 to 2025, including ice blockage frequency, duration, and average customs clearance times. Use the Danish Maritime Authority (DMA) API to extract logs and compile a dataset for risk analysis.\n\nResources needed:\n\u2022 Danish Maritime Authority API access\n\u2022 Project Manager\n\u2022 Supply Chain Coordinator\n\u2022 Data analyst with Python skills\",2/15/2026,2/22/2026,0,5a995d64-8915-48ae-8d66-f730f056f211,PlanExe\n3d358e7c-7386-49b7-96ef-dd2e6dcabaa5,Run Risk Modeling Simulation,\"Run Risk Modeling Simulation\n\nDescription:\nUse Pandas and Matplotlib in Python to analyze collected shipping data, map delay patterns by month, and simulate the probability of >4-week delays due to storms or ice. Validate results against Greenlandic Port Authority reports.\n\nResources needed:\n\u2022 Python environment with Pandas and Matplotlib\n\u2022 Data analyst\n\u2022 Supply Chain Coordinator\n\u2022 Project Manager\",2/22/2026,3/1/2026,0,9eb63024-a557-417c-98f7-4e3124efa4b1,PlanExe\nc3a04676-4288-4432-aecf-e5a7cf6cbb1b,Validate with Arctic Logistics Expert,\"Validate with Arctic Logistics Expert\n\nDescription:\nEngage a supply chain analyst specializing in Arctic logistics to review the risk model. Submit findings to the Danish Maritime Authority for cross-verification and present results to the Inuit Cultural Heritage Council for cultural context on shipping disruptions.\n\nResources needed:\n\u2022 Arctic logistics expert\n\u2022 Inuit Cultural Heritage Council representative\n\u2022 Danish Maritime Authority contact\n\u2022 Project Manager\",3/1/2026,3/8/2026,0,3d358e7c-7386-49b7-96ef-dd2e6dcabaa5,PlanExe\n76ac3bb8-d40a-44ca-846e-fe54eb78fb47,Finalize Emergency Air Freight Plan,\"Finalize Emergency Air Freight Plan\n\nDescription:\nSimulate emergency air freight response time using Nordic Cargo\u2019s transit data (72-hour max). Confirm integration capability with real-time Arctic shipping alerts and document contingency protocols for rapid activation.\n\nResources needed:\n\u2022 Nordic Cargo contact\n\u2022 IoT monitoring system integrator\n\u2022 Supply Chain Coordinator\n\u2022 Financial Analyst\",3/8/2026,3/15/2026,0,c3a04676-4288-4432-aecf-e5a7cf6cbb1b,PlanExe\na2af4fad-d7fa-46e5-9b26-f6552e6a83df,Produce Final Risk Assessment Report,\"Produce Final Risk Assessment Report\n\nDescription:\nCompile all findings into a validated Arctic shipping risk assessment report by March 31, 2026. Include a 90% confidence interval for winter delay probabilities and recommendations for biannual import scheduling aligned with navigation windows.\n\nResources needed:\n\u2022 Project Manager\n\u2022 Supply Chain Coordinator\n\u2022 Financial Analyst\n\u2022 Legal Advisor (for contract alignment)\",3/15/2026,3/22/2026,0,5a995d64-8915-48ae-8d66-f730f056f211,PlanExe\n19f11ff5-cee2-4d81-9127-ee8010d3b0d8,Finalize Quarterly Clay Shipment Contract with Danish Supplier,,3/22/2026,4/15/2026,0,5a995d64-8915-48ae-8d66-f730f056f211,PlanExe\nee01930e-be4e-4ce6-afec-93290aee8246,Finalize Clay Contract,\"Finalize Clay Contract\n\nDescription:\nNegotiate and sign a quarterly clay shipment contract with the Danish supplier, ensuring terms include weather-related delay clauses, delivery windows, and compliance with Greenlandic import regulations. This includes preparing bilingual (Danish/Greenlandic) documentation, conducting legal review, and securing approval from the project manager and financial analyst.\n\nResources needed:\n\u2022 Project Manager\n\u2022 Financial Analyst\n\u2022 Legal Advisor\n\u2022 Supply Chain Coordinator\n\u2022 Bilingual contract templates\",3/22/2026,3/28/2026,0,19f11ff5-cee2-4d81-9127-ee8010d3b0d8,PlanExe\n02aa7053-48f6-4aae-bd37-5f8a8a8a6c1a,Validate Supplier Terms,\"Validate Supplier Terms\n\nDescription:\nReview and confirm all contract terms with the Danish supplier, including pricing stability, minimum order volumes, and contingency plans for Arctic shipping disruptions. Conduct a joint verification session with the supply chain coordinator and logistics lead to ensure alignment with risk mitigation strategies.\n\nResources needed:\n\u2022 Supply Chain Coordinator\n\u2022 Logistics Lead\n\u2022 Danish Supplier Representative\n\u2022 Project Manager\",3/28/2026,4/3/2026,0,ee01930e-be4e-4ce6-afec-93290aee8246,PlanExe\ne1eebc2f-6011-4837-8eac-188806c8d785,Secure Bilingual Documentation,\"Secure Bilingual Documentation\n\nDescription:\nPrepare and finalize all contract documents in both Danish and Greenlandic, ensuring legal accuracy and cultural appropriateness. Submit to the advisory council for feedback and obtain formal sign-off before execution.\n\nResources needed:\n\u2022 Cultural Liaison\n\u2022 Legal Advisor\n\u2022 Bilingual Translator\n\u2022 Project Manager\",4/3/2026,4/9/2026,0,02aa7053-48f6-4aae-bd37-5f8a8a8a6c1a,PlanExe\n9f45255b-b605-45a6-9a31-7cd56174b9bd,Execute Contract Signing,\"Execute Contract Signing\n\nDescription:\nConduct the official signing of the clay shipment agreement with the Danish supplier, recording the event with digital documentation and distributing signed copies to all stakeholders. Confirm that the contract is stored in the central compliance repository with version control.\n\nResources needed:\n\u2022 Project Manager\n\u2022 Legal Advisor\n\u2022 Supplier Representative\n\u2022 Digital Document Manager\",4/9/2026,4/15/2026,0,19f11ff5-cee2-4d81-9127-ee8010d3b0d8,PlanExe\n3daca572-d862-4143-87d9-d71c2aa83552,Secure Emergency Air Freight Agreement with Nordic Cargo,,4/15/2026,4/27/2026,0,19f11ff5-cee2-4d81-9127-ee8010d3b0d8,PlanExe\n3580f8ee-9f9e-451b-80e0-a02583f8aeaa,Secure Emergency Air Freight (1),\"Secure Emergency Air Freight\n\nDescription:\nFinalize a pre-negotiated agreement with Nordic Cargo for emergency air freight during high-risk winter months. This includes confirming guaranteed delivery slots, defining trigger conditions for activation (e.g., >4-week shipping delay), and integrating the service into the real-time monitoring system. Ensure all terms are aligned with the project\u2019s risk mitigation strategy and budget.\n\nResources needed:\n\u2022 Supply Chain Coordinator\n\u2022 Project Manager\n\u2022 Legal Advisor\n\u2022 Nordic Cargo representative\",4/15/2026,4/19/2026,0,3daca572-d862-4143-87d9-d71c2aa83552,PlanExe\n6b45f690-68a6-4a53-af73-260d03d5e950,Establish Buffer Stock Protocol,\"Establish Buffer Stock Protocol\n\nDescription:\nProcure and store a 50 kg buffer stock of clay in advance of the first shipment. Develop a protocol for tracking inventory levels, triggering reorders, and managing usage during supply disruptions. Coordinate with the Danish supplier and Nordic Cargo to ensure seamless replenishment if needed.\n\nResources needed:\n\u2022 Logistics Coordinator\n\u2022 Facility Manager\n\u2022 Supplier Liaison\n\u2022 Inventory Management System\",4/19/2026,4/23/2026,0,3580f8ee-9f9e-451b-80e0-a02583f8aeaa,PlanExe\n6dfba2b9-77bf-4359-aa95-927351e8225f,Integrate Real-Time Monitoring,\"Integrate Real-Time Monitoring\n\nDescription:\nDeploy and configure IoT sensors and data integration tools to monitor Arctic shipping alerts in real time. Set up automated alerts based on predefined thresholds (e.g., ice blockage, storm warnings) and link them to the digital shift calendar and emergency response protocols. Conduct a dry-run simulation to validate system responsiveness.\n\nResources needed:\n\u2022 IT Specialist\n\u2022 IoT Sensor Technician\n\u2022 Digital Dashboard Developer\n\u2022 Supply Chain Coordinator\",4/23/2026,4/27/2026,0,3daca572-d862-4143-87d9-d71c2aa83552,PlanExe\n078447db-3e8f-4d03-9af9-caa41a002997,Establish Buffer Stock of 50 kg Clay,,4/27/2026,5/12/2026,0,3daca572-d862-4143-87d9-d71c2aa83552,PlanExe\n24531f4e-0bd9-4c9c-a753-34edad9c5b0a,Secure 50 kg Clay Buffer,\"Secure 50 kg Clay Buffer\n\nDescription:\nProcure and store a 50 kg buffer stock of clay to mitigate supply chain disruptions. This includes coordinating with the Danish supplier for pre-shipment, ensuring customs documentation is ready, and verifying delivery timelines. The buffer must be on-site by July 15, 2026, to support the soft launch.\n\nResources needed:\n\u2022 Supply Chain Coordinator\n\u2022 Logistics Coordinator\n\u2022 Danish Supplier (K\u00f8ge Keramik)\n\u2022 Customs Documentation Team\",4/27/2026,5/2/2026,0,078447db-3e8f-4d03-9af9-caa41a002997,PlanExe\n931fe2b8-0efc-4cf8-ad20-9ec0928916ce,Verify Customs Clearance Process,\"Verify Customs Clearance Process\n\nDescription:\nConfirm that all import documentation for clay shipments is prepared in both Danish and Greenlandic, and validate clearance times at Nuuk Port using historical data and port authority reports. Establish a real-time tracking protocol to flag delays exceeding 48 hours.\n\nResources needed:\n\u2022 Logistics Coordinator\n\u2022 Port Authority Liaison\n\u2022 Customs Compliance Officer\n\u2022 Translation Specialist\",5/2/2026,5/7/2026,0,24531f4e-0bd9-4c9c-a753-34edad9c5b0a,PlanExe\n6b43c37c-e950-4af9-a429-026abae095ec,Integrate Real-Time Tracking System,\"Integrate Real-Time Tracking System\n\nDescription:\nDeploy and test the IoT-based shipping alert system using the Danish Maritime Authority API and Nordic Cargo\u2019s transit data. Ensure alerts are visible via the digital dashboard and trigger automated responses when delays exceed 72 hours.\n\nResources needed:\n\u2022 IT Systems Engineer\n\u2022 IoT Sensor Technician\n\u2022 Digital Dashboard Developer\n\u2022 Nordic Cargo Representative\",5/7/2026,5/12/2026,0,078447db-3e8f-4d03-9af9-caa41a002997,PlanExe\n86e405a4-f334-48de-a1de-2d6168d7bd87,Integrate Real-Time Shipping Alert Monitoring System,,5/12/2026,5/30/2026,0,d17ed687-82b9-414c-9a67-12e0227663ea,PlanExe\n35aca9d3-9651-48fe-a7ad-9fac3641234d,Secure Emergency Air Freight (2),\"Secure Emergency Air Freight\n\nDescription:\nFinalize and lock in a dedicated emergency air freight agreement with Nordic Cargo for high-risk winter periods, ensuring rapid response to Arctic shipping disruptions. This includes confirming transit times (max 72 hours), pricing, and capacity guarantees. The agreement must be signed and active before any clay shipments are scheduled.\n\nResources needed:\n\u2022 Supply Chain Coordinator\n\u2022 Legal Advisor\n\u2022 Nordic Cargo Contract Manager\",5/12/2026,5/18/2026,0,86e405a4-f334-48de-a1de-2d6168d7bd87,PlanExe\ndc6552d0-4056-41cf-8d80-a7665bb90fc1,Establish Buffer Stock of Clay,\"Establish Buffer Stock of Clay\n\nDescription:\nProcure and store a 50 kg buffer stock of clay to bridge potential supply chain gaps caused by ice blockages, storms, or customs delays. This involves coordinating with the Danish supplier for pre-shipment delivery, verifying quality, and securing storage in climate-controlled conditions within the workshop space.\n\nResources needed:\n\u2022 Logistics Coordinator\n\u2022 Clay Supplier Contact\n\u2022 Facility Manager\n\u2022 Quality Control Specialist\",5/18/2026,5/24/2026,0,35aca9d3-9651-48fe-a7ad-9fac3641234d,PlanExe\na7edf1a0-afa0-49e1-8963-4ac419646e16,Integrate Real-Time Shipping Alerts,\"Integrate Real-Time Shipping Alerts\n\nDescription:\nDeploy and integrate an IoT-based real-time shipping alert monitoring system using data from the Danish Maritime Authority API. Configure automated alerts for delays exceeding 48 hours, and ensure all relevant staff receive notifications via mobile and digital dashboards. Conduct a test simulation to validate system responsiveness.\n\nResources needed:\n\u2022 IT Technician\n\u2022 Danish Maritime Authority API Access\n\u2022 Digital Dashboard Platform\n\u2022 Project Manager\",5/24/2026,5/30/2026,0,86e405a4-f334-48de-a1de-2d6168d7bd87,PlanExe\n37442b7a-472c-4529-94a1-bc991b188f65,Design and Implement Energy-Efficient Facility,,5/30/2026,8/6/2026,0,d17ed687-82b9-414c-9a67-12e0227663ea,PlanExe\n55f500f0-6a99-4a3f-addb-16211e2700d5,Conduct Winter Thermal Load Simulation Using EnergyPlus,,5/30/2026,6/20/2026,0,37442b7a-472c-4529-94a1-bc991b188f65,PlanExe\nd780ef39-f1a2-4c1f-ba42-0732304db4fe,Run EnergyPlus Simulation,\"Run EnergyPlus Simulation\n\nDescription:\nConduct a dynamic thermal load simulation using EnergyPlus software with real-world boundary conditions, including Nuuk's extreme winter temperatures (-20\u00b0C), 90% occupancy levels, and peak kiln operation. Input verified Greenlandic meteorological data from the Danish Meteorological Institute to model temperature gradients, humidity, CO\u2082 buildup, and energy consumption across drying zones and workspaces. Validate results against physical sensor readings from a mock workshop setup in December 2025.\n\nResources needed:\n\u2022 EnergyPlus software license\n\u2022 Arctic-certified building specialist\n\u2022 Historical climate data (Danish Meteorological Institute)\n\u2022 Mock workshop setup with temporary heating systems\n\u2022 Digital modeling technician\",5/30/2026,6/6/2026,0,55f500f0-6a99-4a3f-addb-16211e2700d5,PlanExe\nfd660e06-b11e-46bc-ae46-5fea791dff68,Validate Thermal Model Output,\"Validate Thermal Model Output\n\nDescription:\nPerform statistical regression analysis to compare simulation outputs from EnergyPlus with real-time sensor data collected during the December 2025 mock test. Identify discrepancies in thermal stability, humidity control, and energy usage. Adjust input parameters as needed and confirm that all zones remain within safe operating parameters (\u00b15\u00b0C variance) under 90% winter occupancy. Document findings for inclusion in the Winter Thermal Readiness Report.\n\nResources needed:\n\u2022 Statistical analysis tools (Python/Pandas/Matplotlib)\n\u2022 Data analyst\n\u2022 IoT sensor data logs\n\u2022 Simulation validation checklist\n\u2022 Bilingual technical report template\",6/6/2026,6/13/2026,0,d780ef39-f1a2-4c1f-ba42-0732304db4fe,PlanExe\n6e9f2aac-269c-438d-9c49-7661348ce8bc,Secure Expert Audit & Sign-Off,\"Secure Expert Audit & Sign-Off\n\nDescription:\nEngage an Arctic-certified building engineer to audit the EnergyPlus model and final thermal assessment. Review the simulation methodology, input assumptions, and output reliability. Obtain formal sign-off confirming the facility\u2019s thermal readiness for year-round operation. Submit the signed report to the National Labour Inspectorate (Greenland) for compliance review and ensure alignment with NFPA and Bygningsreglementet standards.\n\nResources needed:\n\u2022 Arctic-certified building engineer\n\u2022 Compliance review checklist\n\u2022 Signed audit confirmation form\n\u2022 National Labour Inspectorate contact point\n\u2022 Digital submission platform\",6/13/2026,6/20/2026,0,55f500f0-6a99-4a3f-addb-16211e2700d5,PlanExe\n007d8d24-e074-408e-9560-a8f321a8ea54,\"Install Passive Solar Design Elements (South-Facing Windows, Thermal Mass Walls)\",,6/20/2026,7/10/2026,0,55f500f0-6a99-4a3f-addb-16211e2700d5,PlanExe\n2f85a0b3-30e2-42ec-bc73-67d64205f2fe,Source and order materials,\"Source and order materials\n\nDescription:\nProcure south-facing windows and thermal mass wall materials from Danish suppliers with guaranteed delivery timelines. Confirm shipping schedules with Nordic Cargo to ensure on-time arrival during the favorable weather window (late spring/early summer). Prioritize pre-fabricated, modular components to minimize on-site installation time.\n\nResources needed:\n\u2022 Local logistics coordinator\n\u2022 Project manager\n\u2022 Supplier contact list\n\u2022 Emergency air freight contract\",6/20/2026,6/24/2026,0,007d8d24-e074-408e-9560-a8f321a8ea54,PlanExe\n8119e483-0979-446a-b2bc-786d351cc57d,Schedule installation window,\"Schedule installation window\n\nDescription:\nCoordinate with certified Arctic contractors to schedule installation during the optimal weather period (late spring/early summer) when snow and ice are minimal. Include a 5-day buffer for potential weather-related delays and confirm site readiness through pre-installation inspections.\n\nResources needed:\n\u2022 Certified Arctic building specialist\n\u2022 Construction crew\n\u2022 Site access permit\n\u2022 Weather forecast monitoring tool\",6/24/2026,6/28/2026,0,2f85a0b3-30e2-42ec-bc73-67d64205f2fe,PlanExe\n86b45a74-8e67-4bfd-9e2e-16225e2434a4,Conduct pre-installation site checks,\"Conduct pre-installation site checks\n\nDescription:\nPerform thorough site assessments before installation begins to verify structural integrity, foundation stability, and alignment with design plans. Document any discrepancies and resolve them prior to material delivery to prevent rework or delays.\n\nResources needed:\n\u2022 Facility manager\n\u2022 Structural engineer\n\u2022 Digital inspection checklist\n\u2022 Camera for documentation\",6/28/2026,7/2/2026,0,8119e483-0979-446a-b2bc-786d351cc57d,PlanExe\nee947e52-2ca9-4043-a9e4-493e119f5def,Install solar elements and thermal walls,\"Install solar elements and thermal walls\n\nDescription:\nExecute the physical installation of south-facing windows and thermal mass walls according to the approved design. Ensure all work complies with Arctic building standards and is documented for compliance audits. Conduct a post-installation quality review with the safety officer.\n\nResources needed:\n\u2022 Construction crew\n\u2022 Thermal mass materials\n\u2022 Window installation kits\n\u2022 Safety officer\",7/2/2026,7/6/2026,0,86b45a74-8e67-4bfd-9e2e-16225e2434a4,PlanExe\n82f1fc5a-c21d-448e-8fcd-dd52925a8476,Verify compliance and document work,\"Verify compliance and document work\n\nDescription:\nAfter installation, conduct a formal verification check against the project\u2019s thermal performance goals and building code requirements. Record all installation details, photos, and test results in the digital compliance log for future audit purposes.\n\nResources needed:\n\u2022 Certified Arctic building specialist\n\u2022 Digital documentation platform\n\u2022 Compliance checklist\n\u2022 Bilingual sign-off forms\",7/6/2026,7/10/2026,0,007d8d24-e074-408e-9560-a8f321a8ea54,PlanExe\nff83ada1-0c17-449b-b913-19fe47e9fdff,\"Deploy IoT Environmental Monitoring Sensors (Temp, Humidity, CO\u2082)\",,7/10/2026,7/19/2026,0,007d8d24-e074-408e-9560-a8f321a8ea54,PlanExe\nd9078311-98a2-45d4-b3c0-3cfcdadb8d15,Deploy IoT Sensors,\"Deploy IoT Sensors\n\nDescription:\nInstall temperature, humidity, and CO\u2082 sensors in the workshop space to monitor environmental conditions. Ensure all sensors are calibrated and connected to the central data platform. Conduct a test run for 48 hours to verify real-time data transmission and alert thresholds.\n\nResources needed:\n\u2022 IoT sensor kits (temperature, humidity, CO\u2082)\n\u2022 Network connectivity hardware (Wi-Fi access points or cellular modems)\n\u2022 Data integration platform (e.g., Airtable, custom dashboard)\n\u2022 On-site technician with IoT setup experience\n\u2022 Bilingual installation checklist\",7/10/2026,7/13/2026,0,ff83ada1-0c17-449b-b913-19fe47e9fdff,PlanExe\na8ed9093-64c4-4da7-9750-51075f50320f,Test Sensor Integration,\"Test Sensor Integration\n\nDescription:\nValidate that all sensors are correctly transmitting data to the monitoring system. Confirm that alerts trigger at predefined thresholds (e.g., high CO\u2082, extreme humidity). Perform a simulated failure test to ensure system resilience and response protocols.\n\nResources needed:\n\u2022 Digital monitoring dashboard\n\u2022 Test scenarios (simulated environmental changes)\n\u2022 IT support specialist\n\u2022 Safety Officer for protocol verification\n\u2022 Logbook for recording integration issues\",7/13/2026,7/16/2026,0,d9078311-98a2-45d4-b3c0-3cfcdadb8d15,PlanExe\nde293425-e6ad-430f-a7a9-e87e68fe8d90,Train Staff on Sensor Use,\"Train Staff on Sensor Use\n\nDescription:\nConduct hands-on training sessions for all staff and instructors on interpreting sensor data, responding to alerts, and using the dashboard during daily operations. Provide bilingual (Danish/Greenlandic) user guides and quick-reference cards.\n\nResources needed:\n\u2022 Training materials (bilingual PDFs and videos)\n\u2022 Trainer (technical or facility manager)\n\u2022 Workshop space for training session\n\u2022 Digital shift calendar for scheduling\n\u2022 Feedback forms for post-training evaluation\",7/16/2026,7/19/2026,0,ff83ada1-0c17-449b-b913-19fe47e9fdff,PlanExe\ne1fc9b0e-d456-447f-ac64-cabf886708a8,Complete Pre-Fit-Out Thermal Audit and Safety Training Rollout,,7/19/2026,7/31/2026,0,ff83ada1-0c17-449b-b913-19fe47e9fdff,PlanExe\n97d9cab9-d1c9-4de8-96d5-89bb8ac380d3,Conduct Thermal Audit (1),\"Conduct Thermal Audit\n\nDescription:\nPerform a comprehensive pre-fit-out thermal audit of the workshop space using verified Arctic climate data and input from a certified Arctic building specialist. The audit will assess heat retention, insulation effectiveness, and identify potential weaknesses in the passive solar design under extreme winter conditions. Results will inform necessary upgrades to insulation and heating systems before fit-out begins.\n\nResources needed:\n\u2022 Certified Arctic building specialist\n\u2022 Thermal modeling software (EnergyPlus)\n\u2022 Historical weather data from Danish Meteorological Institute\n\u2022 On-site measurement tools (thermal cameras, hygrometers)\n\u2022 Digital documentation platform for audit reports\",7/19/2026,7/23/2026,0,e1fc9b0e-d456-447f-ac64-cabf886708a8,PlanExe\nec814677-e59d-4b28-9662-71fd287d6c03,Roll Out Safety Training,\"Roll Out Safety Training\n\nDescription:\nDevelop and deliver mandatory safety training for all staff and future instructors, covering fire safety, kiln operation, material handling, emergency procedures, and compliance with Greenlandic Health and Safety at Work Act. Training will be bilingual (Danish/Greenlandic), include hands-on drills, and be integrated into onboarding via the digital shift calendar. Completion will be tracked and required before any operational activity.\n\nResources needed:\n\u2022 Safety Officer\n\u2022 Bilingual safety training materials\n\u2022 Training venue and equipment\n\u2022 Digital shift calendar access\n\u2022 Record-keeping system for training logs\",7/23/2026,7/27/2026,0,97d9cab9-d1c9-4de8-96d5-89bb8ac380d3,PlanExe\n7ce97fe1-f367-45cc-9698-30f35cf0d31d,Verify Compliance Readiness,\"Verify Compliance Readiness\n\nDescription:\nEnsure all documentation and systems are ready for regulatory review by Nuuk Municipality. This includes verifying that safety training records, liability waivers, incident logs, and bilingual documentation are complete and accessible. Conduct a mock compliance check with the Katuaq Cultural Centre Oversight Committee to identify gaps and ensure alignment with Building Code Compliance Certificate and Fire Safety Certification requirements.\n\nResources needed:\n\u2022 Compliance liaison\n\u2022 Digital tracking system for records\n\u2022 Bilingual documentation templates\n\u2022 Mock audit checklist\n\u2022 Access to oversight committee members\",7/27/2026,7/31/2026,0,e1fc9b0e-d456-447f-ac64-cabf886708a8,PlanExe\n2c7637d1-0052-4a8b-9db4-93011da00f4c,Implement 'Thermal Curfew' Protocol for Peak Winter Use,,7/31/2026,8/6/2026,0,37442b7a-472c-4529-94a1-bc991b188f65,PlanExe\neec7cc9e-2666-4908-93f3-8b79ea9af09d,Co-Develop Curfew Policy,\"Co-Develop Curfew Policy\n\nDescription:\nCollaborate with instructors and volunteers to design a clear, enforceable 'thermal curfew' protocol for peak winter use. Conduct a joint workshop to gather input on timing, enforcement methods, and user concerns. Ensure the policy aligns with safety standards and operational needs while minimizing disruption to course schedules.\n\nResources needed:\n\u2022 Instructors\n\u2022 Volunteers\n\u2022 Safety Officer\n\u2022 Digital shift calendar\n\u2022 Bilingual signage templates\",7/31/2026,8/2/2026,0,2c7637d1-0052-4a8b-9db4-93011da00f4c,PlanExe\n8d513742-ca11-4faf-afbe-6a8361d0fb61,Pilot Thermal Curfew Phase,\"Pilot Thermal Curfew Phase\n\nDescription:\nImplement a phased pilot of the thermal curfew protocol during winter months using real-time IoT sensor alerts. Monitor compliance, collect feedback from users, and adjust alert thresholds and communication strategies based on actual usage patterns and environmental data.\n\nResources needed:\n\u2022 IoT environmental monitoring sensors\n\u2022 Digital shift calendar\n\u2022 Safety Officer\n\u2022 Facility Manager\n\u2022 Data integration platform\",8/2/2026,8/4/2026,0,eec7cc9e-2666-4908-93f3-8b79ea9af09d,PlanExe\nd5ee91f5-46ee-4d7e-aa1e-d79c2c560f65,Integrate Curfew into Daily Operations,\"Integrate Curfew into Daily Operations\n\nDescription:\nEmbed the thermal curfew into routine operations by updating digital dashboards, displaying bilingual signage at entry points, and including a mandatory orientation session before each winter session. Ensure all staff understand enforcement procedures and are trained to respond to alerts.\n\nResources needed:\n\u2022 Bilingual signage\n\u2022 Digital shift calendar\n\u2022 Real-time tracking dashboard\n\u2022 Safety Officer\n\u2022 Training materials\",8/4/2026,8/6/2026,0,2c7637d1-0052-4a8b-9db4-93011da00f4c,PlanExe\n248a0bcd-9e33-45f3-8a52-7138fcfdb319,Build Instructor Resilience Network,,8/6/2026,11/19/2026,0,37442b7a-472c-4529-94a1-bc991b188f65,PlanExe\n722892ab-573f-4456-904f-78ff0150e511,Develop Rotating Instructor Schedule with Cross-Training Plan,,8/6/2026,8/27/2026,0,248a0bcd-9e33-45f3-8a52-7138fcfdb319,PlanExe\n0e6b02fd-1085-4996-9990-0ff017a98ad3,Develop Rotating Schedule,\"Develop Rotating Schedule\n\nDescription:\nCreate a rotating instructor schedule that ensures consistent course coverage by assigning overlapping teaching hours and built-in backup periods. Include mandatory cross-training modules for all instructors in at least two core skill areas (hand-building and wheel-throwing) to maintain operational resilience. Use the digital shift calendar to coordinate availability, flag conflicts early, and ensure all instructors confirm their schedules at least 30 days in advance.\n\nResources needed:\n\u2022 Digital shift calendar platform\n\u2022 Project manager\n\u2022 Instructor coordinator\n\u2022 Bilingual scheduling templates\",8/6/2026,8/13/2026,0,722892ab-573f-4456-904f-78ff0150e511,PlanExe\nb65080ea-d00e-4948-acdf-339c53b6bd32,Implement Cross-Training Plan,\"Implement Cross-Training Plan\n\nDescription:\nDesign and deliver a structured cross-training program where each part-time instructor is trained in at least two core competencies\u2014hand-building and wheel-throwing\u2014by experienced peers. Track progress via the real-time dashboard, conduct bi-weekly check-ins to address gaps, and require certification before independent teaching eligibility. Ensure all training materials are available in both Danish and Greenlandic.\n\nResources needed:\n\u2022 Cross-training curriculum\n\u2022 Senior instructors as trainers\n\u2022 Real-time tracking dashboard\n\u2022 Bilingual training materials\",8/13/2026,8/20/2026,0,0e6b02fd-1085-4996-9990-0ff017a98ad3,PlanExe\nf0c707ad-9ab2-4027-8a7f-065a2a7aa2a0,Ensure Full Coverage Readiness,\"Ensure Full Coverage Readiness\n\nDescription:\nVerify that all instructors have completed cross-training, signed liability waivers, and passed safety certification prior to any session. Confirm 100% staff availability through the digital shift calendar with no unassigned time slots. Conduct a dry-run simulation of a full week\u2019s programming to test coverage under absences, using backup instructors from the rotating roster to fill gaps without disruption.\n\nResources needed:\n\u2022 Digital shift calendar\n\u2022 Safety officer\n\u2022 Backup instructor roster\n\u2022 Simulation testing protocol\",8/20/2026,8/27/2026,0,722892ab-573f-4456-904f-78ff0150e511,PlanExe\n71b1909a-1121-47c8-b91f-83110fe9bec7,Launch Peer Mentorship Program for Senior-Junior Instructors,,8/27/2026,9/28/2026,0,722892ab-573f-4456-904f-78ff0150e511,PlanExe\n28578a01-1b9b-4577-bdee-ba19d46821e0,Design Mentorship Structure,\"Design Mentorship Structure\n\nDescription:\nDefine the framework for the peer mentorship program, including pairing criteria, duration of mentorship cycles, and expected outcomes. Develop a standardized toolkit with discussion guides, feedback forms, and milestone checklists to ensure consistency across all mentor-mentee relationships.\n\nResources needed:\n\u2022 Project Manager\n\u2022 Cultural Liaison\n\u2022 Human Resources Lead\n\u2022 Digital Platform (e.g., Google Workspace, Notion)\",8/27/2026,9/4/2026,0,71b1909a-1121-47c8-b91f-83110fe9bec7,PlanExe\n325160d0-c507-44ef-9de1-5f8c2e853263,Identify and Onboard Mentors,\"Identify and Onboard Mentors\n\nDescription:\nRecruit senior instructors and experienced local artists to serve as mentors. Conduct interviews to assess suitability, confirm availability, and sign formal agreements outlining roles, responsibilities, and compensation (if applicable). Ensure all participants receive initial orientation on cultural protocols and program expectations.\n\nResources needed:\n\u2022 Cultural Liaison\n\u2022 Safety Officer\n\u2022 HR Lead\n\u2022 Bilingual Recruitment Materials\",9/4/2026,9/12/2026,0,28578a01-1b9b-4577-bdee-ba19d46821e0,PlanExe\nd19b0b77-fe12-4314-b44c-1ad86d4480a6,Launch Pilot Mentorship Cycle,\"Launch Pilot Mentorship Cycle\n\nDescription:\nBegin a trial mentorship program with 3\u20135 junior instructors or apprentices. Facilitate initial pairings, schedule regular check-ins, and collect real-time feedback using digital tools. Use this pilot to refine the structure, address challenges, and validate the effectiveness of the program before full rollout.\n\nResources needed:\n\u2022 Facility Manager\n\u2022 Digital Shift Calendar\n\u2022 Feedback Collection Tools (Google Forms, Notion)\n\u2022 Mentorship Toolkit\",9/12/2026,9/20/2026,0,325160d0-c507-44ef-9de1-5f8c2e853263,PlanExe\ne0027894-96e6-43d4-a6bb-d1507f267c8a,Evaluate and Scale Program (1),\"Evaluate and Scale Program\n\nDescription:\nAfter the pilot, conduct a comprehensive review of participant satisfaction, skill development progress, and program impact. Gather input from mentors, mentees, and the advisory council. Finalize improvements and expand the program to include all new instructors, ensuring integration into the broader teaching fellowship model.\n\nResources needed:\n\u2022 Project Manager\n\u2022 Advisory Council\n\u2022 Data Analyst\n\u2022 Bi-Monthly Survey System\",9/20/2026,9/28/2026,0,71b1909a-1121-47c8-b91f-83110fe9bec7,PlanExe\n84b5890e-fde8-432b-961a-a6d678b29b47,Redesign Volunteer Instructor Program as Community Teaching Fellowship,,9/28/2026,10/23/2026,0,71b1909a-1121-47c8-b91f-83110fe9bec7,PlanExe\n36b5db04-599b-49c0-ac16-d13287dc3254,Develop Fellowship Charter,\"Develop Fellowship Charter\n\nDescription:\nCreate a formal document outlining the roles, responsibilities, benefits, and expectations for the Community Teaching Fellowship. Include recognition pathways, skill credits, and structured onboarding procedures to ensure clarity and inclusivity. The charter must be co-developed with community leaders and approved by the advisory council.\n\nResources needed:\n\u2022 Cultural Liaison\n\u2022 Legal Advisor\n\u2022 Project Manager\n\u2022 Community Leaders\",9/28/2026,10/3/2026,0,84b5890e-fde8-432b-961a-a6d678b29b47,PlanExe\n0dd2d2dd-943f-4552-aeb9-b19bb76ea9a5,Design Training Curriculum,\"Design Training Curriculum\n\nDescription:\nDevelop a comprehensive 12-hour certification program covering safety protocols, cultural sensitivity, teaching fundamentals, and emergency response. Use tools like Canva and Google Forms to create interactive modules. Include role-playing scenarios to simulate real-world challenges and ensure all content is available in both Danish and Greenlandic.\n\nResources needed:\n\u2022 Safety Officer\n\u2022 Cultural Liaison\n\u2022 Human Resources Lead\n\u2022 Training Specialist\",10/3/2026,10/8/2026,0,36b5db04-599b-49c0-ac16-d13287dc3254,PlanExe\nc80ce3f0-09a2-4b51-8e99-8da6523e080c,Implement Onboarding System,\"Implement Onboarding System\n\nDescription:\nBuild a digital onboarding kit with bilingual (Danish/Greenlandic) materials, including welcome guides, liability waiver templates, and training schedules. Test the system with a group of retired artists through a dry-run session to validate usability and gather feedback before full rollout.\n\nResources needed:\n\u2022 Digital Platform Specialist\n\u2022 Cultural Liaison\n\u2022 Facility Manager\n\u2022 Retired Artists\",10/8/2026,10/13/2026,0,0dd2d2dd-943f-4552-aeb9-b19bb76ea9a5,PlanExe\n35036b89-1aef-49bd-ba79-360645dccbc3,Secure Insurance & Waivers,\"Secure Insurance & Waivers\n\nDescription:\nFinalize and execute a $500,000 general liability insurance policy for volunteers. Develop and distribute legally compliant liability waivers that are signed by all participants. Ensure all documentation is bilingual and stored securely in a centralized digital system with automated tracking.\n\nResources needed:\n\u2022 Insurance Provider\n\u2022 Legal Advisor\n\u2022 Safety Officer\n\u2022 Compliance Coordinator\",10/13/2026,10/18/2026,0,c80ce3f0-09a2-4b51-8e99-8da6523e080c,PlanExe\nd47a9504-1cd4-49e6-9ceb-0a4b898334ba,Launch Certification Program,\"Launch Certification Program\n\nDescription:\nRoll out the fully operational 'Community Teaching Fellowship' by conducting the first live training session via Zoom. Use badge.io to issue digital badges upon completion. Track participation, certifications, and waiver submissions in a shared Notion dashboard to confirm 100% compliance before any instructor-led sessions begin.\n\nResources needed:\n\u2022 Volunteer Management Specialist\n\u2022 Technical Support Lead\n\u2022 Advisory Council\n\u2022 Digital Dashboard\",10/18/2026,10/23/2026,0,84b5890e-fde8-432b-961a-a6d678b29b47,PlanExe\n4f582103-5e0d-487b-a6d6-ec386234fb45,Implement Digital Shift Calendar and Real-Time Tracking Dashboard,,10/23/2026,11/7/2026,0,84b5890e-fde8-432b-961a-a6d678b29b47,PlanExe\nf7d97fbc-b462-4f6d-b205-60a421433763,Set up cloud platform,\"Set up cloud platform\n\nDescription:\nConfigure a reliable cloud-based scheduling system using Google Workspace and Airtable to support real-time collaboration. This includes setting up user accounts, defining access roles, creating templates for shift calendars, and integrating with existing project management tools. Ensure the platform is accessible offline and supports bilingual (Danish/Greenlandic) interfaces.\n\nResources needed:\n\u2022 Cloud platform administrator\n\u2022 Digital shift calendar software (Google Workspace + Airtable)\n\u2022 Bilingual UI designer\n\u2022 Technical liaison for troubleshooting\",10/23/2026,10/26/2026,0,4f582103-5e0d-487b-a6d6-ec386234fb45,PlanExe\n75c91d5c-cafb-47c3-b193-dd957154ead7,Develop digital onboarding workflow,\"Develop digital onboarding workflow\n\nDescription:\nCreate a standardized onboarding process for instructors and volunteers using Canva and Google Forms. Include multilingual forms for consent, training schedules, and safety protocols. Integrate automated reminders and progress tracking into the digital dashboard to ensure timely completion of all onboarding steps.\n\nResources needed:\n\u2022 Onboarding content developer\n\u2022 Canva design specialist\n\u2022 Google Forms expert\n\u2022 Digital dashboard integrator\",10/26/2026,10/29/2026,0,f7d97fbc-b462-4f6d-b205-60a421433763,PlanExe\n878a22e0-f045-4362-8ce3-12dadf4f483c,Test system integration and usability,\"Test system integration and usability\n\nDescription:\nConduct a pilot test with one instructor and two volunteers to validate the functionality of the digital shift calendar and real-time tracking dashboard. Identify bugs, usability issues, and communication gaps. Gather feedback through structured interviews and refine the system before full rollout.\n\nResources needed:\n\u2022 Pilot participants (instructors and volunteers)\n\u2022 Usability tester\n\u2022 Feedback coordinator\n\u2022 Technical support lead\",10/29/2026,11/1/2026,0,75c91d5c-cafb-47c3-b193-dd957154ead7,PlanExe\n3ddb1919-7dd2-49cf-a497-d2043fa33ba6,Train staff on digital tools,\"Train staff on digital tools\n\nDescription:\nDeliver hands-on training sessions for all staff and instructors on how to use the digital shift calendar and real-time tracking dashboard. Cover navigation, scheduling, conflict resolution, and data entry. Provide bilingual training materials and conduct follow-up check-ins to reinforce learning.\n\nResources needed:\n\u2022 Trainer (HR or tech lead)\n\u2022 Bilingual training materials\n\u2022 Training venue and equipment\n\u2022 Follow-up facilitator\",11/1/2026,11/4/2026,0,878a22e0-f045-4362-8ce3-12dadf4f483c,PlanExe\nbdba13c2-9832-4b72-b73b-ffa3356225a8,Roll out system to full team,\"Roll out system to full team\n\nDescription:\nDeploy the digital shift calendar and real-time tracking dashboard to all staff and instructors. Monitor initial usage for at least one week, address any technical or procedural issues promptly, and confirm that all users are actively engaged and compliant with the new system.\n\nResources needed:\n\u2022 Project manager\n\u2022 IT support technician\n\u2022 Digital dashboard monitor\n\u2022 Compliance officer\",11/4/2026,11/7/2026,0,4f582103-5e0d-487b-a6d6-ec386234fb45,PlanExe\n81667548-d46c-4197-8574-3915bf2df3d6,Conduct Monthly Safety Drills with Full Staff Participation,,11/7/2026,11/19/2026,0,248a0bcd-9e33-45f3-8a52-7138fcfdb319,PlanExe\nee1c5c85-ee58-40dd-80a8-ebcb2f2921b9,Schedule Monthly Drills,\"Schedule Monthly Drills\n\nDescription:\nOrganize and conduct monthly safety drills involving all staff to reinforce emergency protocols, team readiness, and compliance with operational procedures. Ensure drills are held on the first Friday of each month, integrated into the rotating instructor schedule, and include real-time feedback collection for continuous improvement.\n\nResources needed:\n\u2022 Safety Officer\n\u2022 Digital Shift Calendar\n\u2022 Bilingual Safety Briefings\n\u2022 Instructors and Volunteers\",11/7/2026,11/11/2026,0,81667548-d46c-4197-8574-3915bf2df3d6,PlanExe\n92ad12c8-3841-4421-8cd4-5c21546e395c,Integrate Drill Participation in Performance Reviews,\"Integrate Drill Participation in Performance Reviews\n\nDescription:\nEmbed participation in monthly safety drills as a formal component of staff performance evaluations. Use the digital shift calendar to track attendance and ensure accountability by linking drill completion to performance metrics and professional development records.\n\nResources needed:\n\u2022 Project Manager\n\u2022 Digital Shift Calendar\n\u2022 Performance Review Templates\n\u2022 Safety Officer\",11/11/2026,11/15/2026,0,ee1c5c85-ee58-40dd-80a8-ebcb2f2921b9,PlanExe\nac123fba-66b8-43c0-858c-2516c0547b88,Conduct Drill Orientation Before Each Session,\"Conduct Drill Orientation Before Each Session\n\nDescription:\nDeliver a brief orientation session before every monthly safety drill to remind participants of protocols, roles, and objectives. Use bilingual (Danish/Greenlandic) materials and display clear signage at entry points to reinforce awareness and reduce confusion during drills.\n\nResources needed:\n\u2022 Safety Officer\n\u2022 Bilingual Signage\n\u2022 Orientation Scripts\n\u2022 Instructors\",11/15/2026,11/19/2026,0,81667548-d46c-4197-8574-3915bf2df3d6,PlanExe\n955c800a-6f73-42f5-b96c-71d4244bff9f,Embed Cultural Anchoring Framework,,11/19/2026,4/13/2027,0,248a0bcd-9e33-45f3-8a52-7138fcfdb319,PlanExe\n00291540-5289-4c88-b776-7897f764a344,Form Advisory Council with Elders and Local Artists,,11/19/2026,12/10/2026,0,955c800a-6f73-42f5-b96c-71d4244bff9f,PlanExe\nf1d3758c-6ca5-4dae-866a-555837a500f3,Form Advisory Council,\"Form Advisory Council\n\nDescription:\nEstablish a formal advisory council comprising elders and local artists to guide cultural content, ensure community ownership, and provide ongoing feedback. This includes scheduling initial meetings, defining roles and responsibilities, and creating a communication protocol for regular engagement.\n\nResources needed:\n\u2022 Cultural Liaison\n\u2022 Local Community Leaders\n\u2022 Bilingual Meeting Facilitator\n\u2022 Digital Collaboration Platform (e.g., Notion or Zoom)\",11/19/2026,11/26/2026,0,00291540-5289-4c88-b776-7897f764a344,PlanExe\n1ad168cd-1dc4-4978-a4ec-7c85cb140f73,Co-Develop CIPR Framework,\"Co-Develop CIPR Framework\n\nDescription:\nCollaboratively draft the Community Intellectual Property Rights (CIPR) framework through participatory workshops with elders, artists, and legal advisors. Define rules for access, consent, representation, and co-creation of traditional motifs and narratives, ensuring alignment with Inuit cultural values and Greenlandic legal standards.\n\nResources needed:\n\u2022 Indigenous Research Ethics Consultant\n\u2022 Legal Advisor\n\u2022 Cultural Liaison\n\u2022 Drafting Tools (Notion, Google Docs)\",11/26/2026,12/3/2026,0,f1d3758c-6ca5-4dae-866a-555837a500f3,PlanExe\n80a43429-894f-49a0-8570-7e490cee4fb9,Obtain Formal Approval,\"Obtain Formal Approval\n\nDescription:\nSubmit the finalized CIPR framework to the Inuit Cultural Heritage Council for official endorsement. Secure written consent from elders and artists on all culturally sensitive content, including approved and restricted motifs, and document all agreements in both Danish and Greenlandic.\n\nResources needed:\n\u2022 Inuit Cultural Heritage Council\n\u2022 Legal Advisor\n\u2022 Cultural Liaison\n\u2022 Signed Consent Templates\",12/3/2026,12/10/2026,0,00291540-5289-4c88-b776-7897f764a344,PlanExe\n57b658c3-c8bc-4124-89bd-5c043c809676,Finalize and Obtain Approval of Community Intellectual Property Rights (CIPR) Framework,,12/10/2026,1/11/2027,0,00291540-5289-4c88-b776-7897f764a344,PlanExe\n59b6354a-61a2-43f5-9d4c-678f5c4083cb,Draft CIPR Framework,\"Draft CIPR Framework\n\nDescription:\nDevelop a preliminary version of the Community Intellectual Property Rights (CIPR) framework through collaborative workshops with elders, local artists, and legal advisors. Define core principles such as consent protocols, access tiers, and cultural ownership boundaries. Ensure all documentation is drafted in both Danish and Greenlandic to support inclusive participation.\n\nResources needed:\n\u2022 Cultural Liaison\n\u2022 Legal Advisor\n\u2022 Indigenous Research Ethics Consultant\n\u2022 Bilingual workshop facilitators\n\u2022 Notion or similar digital collaboration tool\",12/10/2026,12/18/2026,0,57b658c3-c8bc-4124-89bd-5c043c809676,PlanExe\n55d5b113-610d-47d1-b9e4-5cc2660eabd2,Conduct Cultural Review Workshop,\"Conduct Cultural Review Workshop\n\nDescription:\nHost a virtual or in-person workshop with elders and local artists to review the draft CIPR framework. Gather feedback on content sensitivity, representation accuracy, and community alignment. Use structured discussion guides and recording tools to document consensus and dissent, ensuring all input is formally captured.\n\nResources needed:\n\u2022 Elders and Local Artists (advisory council members)\n\u2022 Cultural Liaison\n\u2022 Facilitator trained in Indigenous consultation methods\n\u2022 Recording equipment and transcription services\n\u2022 Bilingual meeting materials\",12/18/2026,12/26/2026,0,59b6354a-61a2-43f5-9d4c-678f5c4083cb,PlanExe\n866e4850-c54c-4458-8407-67dd9cbbe345,Finalize Consent Protocols,\"Finalize Consent Protocols\n\nDescription:\nRefine the CIPR framework based on feedback from the cultural review workshop. Finalize templates for written consent forms, approval workflows, and tiered access rules. Ensure all documents are legally sound, culturally respectful, and compliant with Greenlandic IP and labor laws.\n\nResources needed:\n\u2022 Legal Advisor\n\u2022 Cultural Liaison\n\u2022 National Labour Inspectorate (Greenland)\n\u2022 Inuit Cultural Heritage Council\n\u2022 Digital form platform (e.g., Notion, Google Forms)\",12/26/2026,1/3/2027,0,55d5b113-610d-47d1-b9e4-5cc2660eabd2,PlanExe\n8f2104d5-c695-4d2e-95e5-90cb0fd96721,Obtain Formal Endorsement,\"Obtain Formal Endorsement\n\nDescription:\nSubmit the finalized CIPR framework to the Inuit Cultural Heritage Council for formal approval. Present findings, consent records, and community feedback. Secure a signed agreement and official list of approved and restricted motifs before any public-facing cultural programming begins.\n\nResources needed:\n\u2022 Inuit Cultural Heritage Council\n\u2022 Project Manager\n\u2022 Cultural Liaison\n\u2022 Legal Advisor\n\u2022 Signed agreement template and notarization services\",1/3/2027,1/11/2027,0,57b658c3-c8bc-4124-89bd-5c043c809676,PlanExe\n33640969-b1e5-46db-a6d7-59b9523d924c,Co-Host Quarterly Exhibitions with Katuaq Cultural Centre,,1/11/2027,2/12/2027,0,57b658c3-c8bc-4124-89bd-5c043c809676,PlanExe\n4573fc14-d85f-4737-b34d-f3d38acddc18,Finalize CIPR Framework,\"Finalize CIPR Framework\n\nDescription:\nDevelop and secure formal approval of a Community Intellectual Property Rights (CIPR) framework with the Inuit Cultural Heritage Council. This includes drafting principles, creating consent templates in both Danish and Greenlandic, establishing a decision-making hierarchy for cultural content, and obtaining written agreement on approved and restricted motifs. The framework must ensure community sovereignty over traditional narratives and prevent cultural appropriation.\n\nResources needed:\n\u2022 Cultural Liaison\n\u2022 Project Manager\n\u2022 Legal Advisor\n\u2022 Indigenous Research Ethics Consultant\n\u2022 Inuit Cultural Heritage Council\n\u2022 Bilingual documentation tools (Notion, Canva)\n\u2022 Digital consent form templates\",1/11/2027,1/19/2027,0,33640969-b1e5-46db-a6d7-59b9523d924c,PlanExe\naf45eb66-5729-4199-97c4-a9405f88cb8c,Secure Community Consent,\"Secure Community Consent\n\nDescription:\nObtain written consent from elders and local artists for all traditional motifs, stories, and cultural representations to be used in courses, exhibitions, and digital content. Conduct virtual or in-person consultations using culturally appropriate methods, record feedback, and document approvals with clear signatures or digital attestations in both Danish and Greenlandic.\n\nResources needed:\n\u2022 Cultural Liaison\n\u2022 Elders and Artists (Advisory Council)\n\u2022 Bilingual facilitators\n\u2022 Consent documentation templates\n\u2022 Recording devices and secure digital storage\",1/19/2027,1/27/2027,0,4573fc14-d85f-4737-b34d-f3d38acddc18,PlanExe\n95a9f4e4-9f15-4f8c-9466-c15e32250b18,Establish Approval Workflow,\"Establish Approval Workflow\n\nDescription:\nDesign and implement a standardized, transparent workflow for reviewing and approving cultural content before public use. Define roles (e.g., advisory council, legal review, safety officer), set clear timelines, and integrate the process into the project\u2019s digital dashboard. Ensure all submissions are tracked, reviewed, and documented with version control.\n\nResources needed:\n\u2022 Project Manager\n\u2022 Cultural Liaison\n\u2022 Legal Advisor\n\u2022 Digital workflow platform (e.g., Notion, Airtable)\n\u2022 Approval checklist template\n\u2022 Bilingual communication materials\",1/27/2027,2/4/2027,0,af45eb66-5729-4199-97c4-a9405f88cb8c,PlanExe\n311967e2-25ba-47a5-b8c6-cbd175285a6a,Integrate CIPR into Curriculum,\"Integrate CIPR into Curriculum\n\nDescription:\nEmbed the finalized CIPR framework into beginner courses by co-designing modules with elders and artists. Ensure all course content involving traditional forms or narratives is pre-approved, includes proper attribution, and reflects community input. Train instructors on cultural protocols and compliance requirements.\n\nResources needed:\n\u2022 Four Part-Time Instructors\n\u2022 Cultural Liaison\n\u2022 Elders and Local Artists\n\u2022 Curriculum development toolkit\n\u2022 Bilingual training materials\n\u2022 Digital shift calendar\",2/4/2027,2/12/2027,0,33640969-b1e5-46db-a6d7-59b9523d924c,PlanExe\n466d26da-b322-4e72-9a1f-88a6b6065e76,Integrate Traditional Forms and Narratives into Beginner Courses,,2/12/2027,3/24/2027,0,33640969-b1e5-46db-a6d7-59b9523d924c,PlanExe\nafaa9795-0c5e-4cfd-899e-8f8642a943bc,Finalize Cultural Content,\"Finalize Cultural Content\n\nDescription:\nCollaborate with elders and local artists through the advisory council to review and approve traditional forms, narratives, and motifs for inclusion in beginner courses. Ensure all content aligns with community values and cultural protocols, with written consent obtained for each element before integration.\n\nResources needed:\n\u2022 Advisory council (elders and artists)\n\u2022 Cultural Liaison\n\u2022 Bilingual documentation tools\n\u2022 Consent form templates\",2/12/2027,2/20/2027,0,466d26da-b322-4e72-9a1f-88a6b6065e76,PlanExe\n22f54e2c-12f1-4ac3-aeff-c01035c0fb7e,Develop Pedagogical Framework,\"Develop Pedagogical Framework\n\nDescription:\nDesign beginner course modules that integrate approved traditional content into accessible, age-appropriate lessons. Include hands-on activities, storytelling components, and safety guidelines, ensuring alignment with both educational standards and cultural integrity.\n\nResources needed:\n\u2022 Four part-time instructors\n\u2022 Cultural Liaison\n\u2022 Curriculum development toolkit\n\u2022 Digital course builder (e.g., Notion or Google Docs)\",2/20/2027,2/28/2027,0,afaa9795-0c5e-4cfd-899e-8f8642a943bc,PlanExe\n7def817f-d5c1-4391-91e9-7e9acfb22152,Conduct Pilot Course Review,\"Conduct Pilot Course Review\n\nDescription:\nHost a trial session with a small group of community members, including youth and elders, to test the course structure, content clarity, and cultural sensitivity. Gather feedback using bilingual surveys and adjust the curriculum based on input.\n\nResources needed:\n\u2022 Pilot participants (10\u201315 people)\n\u2022 Facility manager\n\u2022 Bilingual survey forms\n\u2022 Feedback analysis tool\",2/28/2027,3/8/2027,0,22f54e2c-12f1-4ac3-aeff-c01035c0fb7e,PlanExe\n3c0c41a4-7339-47f2-85f7-5ff6dc8b263e,Integrate Feedback and Finalize Curriculum,\"Integrate Feedback and Finalize Curriculum\n\nDescription:\nCompile feedback from the pilot session, revise course materials accordingly, and obtain final sign-off from the advisory council. Ensure all changes are documented and version-controlled for transparency and future reference.\n\nResources needed:\n\u2022 Advisory council\n\u2022 Project manager\n\u2022 Digital document repository\n\u2022 Version control system\",3/8/2027,3/16/2027,0,7def817f-d5c1-4391-91e9-7e9acfb22152,PlanExe\n91b382ff-62dc-4fd9-822d-ffc8f4b5ce50,Train Instructors on Cultural Integration,\"Train Instructors on Cultural Integration\n\nDescription:\nDeliver a mandatory training session for all instructors on the cultural context, ethical use of traditional content, and teaching protocols. Use role-playing scenarios and real examples to reinforce understanding and ensure consistent delivery across sessions.\n\nResources needed:\n\u2022 Instructors\n\u2022 Cultural Liaison\n\u2022 Training materials (bilingual)\n\u2022 Digital training platform\",3/16/2027,3/24/2027,0,466d26da-b322-4e72-9a1f-88a6b6065e76,PlanExe\n9662c55b-6978-490d-8697-27b628054d06,Ensure All Communications and Signage Are Bilingual (Danish/Greenlandic),,3/24/2027,4/13/2027,0,955c800a-6f73-42f5-b96c-71d4244bff9f,PlanExe\n37c25e45-70c9-4911-b25d-cf79c061ee0e,Finalize bilingual signage,\"Finalize bilingual signage\n\nDescription:\nDevelop and finalize all physical and digital signage in both Danish and Greenlandic, ensuring linguistic accuracy and cultural appropriateness. This includes safety warnings, course instructions, facility maps, and exhibition labels. Collaborate with a certified Greenlandic language specialist and a local cultural liaison to review each piece before production.\n\nResources needed:\n\u2022 Certified Greenlandic language specialist\n\u2022 Local cultural liaison\n\u2022 Graphic designer\n\u2022 Bilingual translation software\n\u2022 Print and installation materials\",3/24/2027,3/28/2027,0,9662c55b-6978-490d-8697-27b628054d06,PlanExe\ncb561866-61fe-44ad-9a79-a4cc9a36fb00,Review cultural sensitivity,\"Review cultural sensitivity\n\nDescription:\nConduct a thorough review of all signage content with the advisory council of elders and local artists to ensure no cultural misrepresentation or offense. Address feedback promptly and incorporate revisions into final designs. Maintain a documented approval trail for compliance and transparency.\n\nResources needed:\n\u2022 Advisory council (elders and artists)\n\u2022 Cultural liaison\n\u2022 Project manager\n\u2022 Digital documentation platform\",3/28/2027,4/1/2027,0,37c25e45-70c9-4911-b25d-cf79c061ee0e,PlanExe\ndb08927c-ea38-456d-9471-27413729b1d4,Produce and install signage,\"Produce and install signage\n\nDescription:\nManufacture and install all finalized signage throughout the workshop, including entry points, kiln zones, drying areas, and exhibition spaces. Ensure placement adheres to safety standards and visibility requirements. Use weather-resistant materials suitable for Arctic conditions.\n\nResources needed:\n\u2022 Signage production team\n\u2022 Installation crew\n\u2022 Weather-resistant mounting hardware\n\u2022 Safety harnesses and tools\",4/1/2027,4/5/2027,0,cb561866-61fe-44ad-9a79-a4cc9a36fb00,PlanExe\ne726a0b7-5835-43a3-b475-7350163877a9,Verify compliance with regulations,\"Verify compliance with regulations\n\nDescription:\nConfirm that all signage meets regulatory requirements under the Greenlander Health and Safety at Work Act and bilingual documentation mandates. Submit final installations to the National Labour Inspectorate (Greenland) for formal verification and obtain written confirmation of compliance.\n\nResources needed:\n\u2022 Safety Officer\n\u2022 Legal advisor\n\u2022 National Labour Inspectorate contact\n\u2022 Compliance checklist\",4/5/2027,4/9/2027,0,db08927c-ea38-456d-9471-27413729b1d4,PlanExe\nd448100a-1ac3-4590-9293-bd8d39a45e1e,Train staff on signage use,\"Train staff on signage use\n\nDescription:\nConduct a mandatory training session for all instructors and staff on the meaning, location, and purpose of each signage element. Include real-time scenarios where staff must interpret signs during simulated emergencies or visitor inquiries. Track attendance and comprehension via digital quiz.\n\nResources needed:\n\u2022 Safety Officer\n\u2022 Training materials (bilingual)\n\u2022 Digital quiz platform\n\u2022 Instructors and staff\",4/9/2027,4/13/2027,0,9662c55b-6978-490d-8697-27b628054d06,PlanExe\n59d1e4fb-5761-4e90-8d9c-3233ffaef27d,Develop Material Adaptation Strategy,,4/13/2027,8/13/2027,0,955c800a-6f73-42f5-b96c-71d4244bff9f,PlanExe\n121599ca-354b-47fe-8bcf-4ae69faffb43,Conduct Material Co-Creation Working Group Trials with Locally Sourced Minerals,,4/13/2027,5/8/2027,0,59d1e4fb-5761-4e90-8d9c-3233ffaef27d,PlanExe\nfb8eb40f-e29f-45b4-97b1-6eaf1aecc668,Source Local Minerals,\"Source Local Minerals\n\nDescription:\nIdentify and secure access to viable local mineral sources such as glacial sand and volcanic ash through partnerships with Greenlandic geologists, mining cooperatives, and community leaders. Conduct initial feasibility assessments and obtain pre-approval from the advisory council for material sourcing.\n\nResources needed:\n\u2022 Greenlandic geologist\n\u2022 Local mining cooperative contact\n\u2022 Cultural liaison\n\u2022 Advisory council members\",4/13/2027,4/18/2027,0,121599ca-354b-47fe-8bcf-4ae69faffb43,PlanExe\n6cb69dfc-dcb1-46df-b62c-03ba184b8967,Prepare Blended Clay Batches,\"Prepare Blended Clay Batches\n\nDescription:\nCreate 10 small batches of blended clay using varying ratios (70% imported clay, 30% local minerals). Document each batch with precise measurements and label them for tracking. Store samples in controlled conditions to prevent contamination or degradation.\n\nResources needed:\n\u2022 Clay mixing station\n\u2022 Digital scale\n\u2022 Bilingual field notebooks\n\u2022 Labeling materials\",4/18/2027,4/23/2027,0,fb8eb40f-e29f-45b4-97b1-6eaf1aecc668,PlanExe\n498d11bf-94f4-4f8e-9ef3-ce635c65f030,Conduct Firing Tests,\"Conduct Firing Tests\n\nDescription:\nFire each blended clay batch at standard temperatures (1000\u00b0C\u20131200\u00b0C) using modular kilns. Monitor and record shrinkage rate, weight loss, structural integrity, and cracking incidence post-firing. Compare results against baseline imported clay performance.\n\nResources needed:\n\u2022 Modular kiln\n\u2022 Temperature monitoring equipment\n\u2022 Digital calipers\n\u2022 Safety gear\",4/23/2027,4/28/2027,0,6cb69dfc-dcb1-46df-b62c-03ba184b8967,PlanExe\n462b1230-1e8b-44f9-8476-cdc9739570e1,Gather Cultural Feedback (1),\"Gather Cultural Feedback\n\nDescription:\nHost a joint review session with elders and local artisans to interpret test results. Present findings in both Danish and Greenlandic, allowing for open discussion on authenticity, usability, and cultural appropriateness of the blended materials. Record consensus or concerns in bilingual minutes.\n\nResources needed:\n\u2022 Meeting space with audio recording\n\u2022 Bilingual facilitator\n\u2022 Visual aids (photos, samples)\n\u2022 Note-taking tools\",4/28/2027,5/3/2027,0,498d11bf-94f4-4f8e-9ef3-ce635c65f030,PlanExe\n146e37ce-2632-4b24-b7a1-fed9d183938b,Finalize Trial Report,\"Finalize Trial Report\n\nDescription:\nCompile all data\u2014including technical measurements, firing outcomes, and cultural feedback\u2014into a joint technical-oral report. Include recommendations for approved ratios, forbidden materials, and next steps for full-scale production. Obtain unanimous approval from the Material Co-Creation Working Group before publication.\n\nResources needed:\n\u2022 Materials scientist\n\u2022 Cultural liaison\n\u2022 Document editor\n\u2022 Digital publishing platform\",5/3/2027,5/8/2027,0,121599ca-354b-47fe-8bcf-4ae69faffb43,PlanExe\n3c1b408a-dda2-4dab-abc2-c69fba579d0b,Analyze Firing Behavior and Compatibility of Blended Clays,,5/8/2027,6/9/2027,0,121599ca-354b-47fe-8bcf-4ae69faffb43,PlanExe\n66aee857-38d9-4e2f-800a-0ef77f06e5da,Test Blended Clay Firing,\"Test Blended Clay Firing\n\nDescription:\nConduct controlled firing tests on 10 batches of blended clay (70% imported, 30% local minerals) at standard temperatures (1000\u00b0C\u20131200\u00b0C) to evaluate shrinkage rate, weight loss, structural integrity, and cracking incidence. Record results in bilingual field notebooks (Danish/Greenlandic) and analyze for consistency with traditional ceramic standards.\n\nResources needed:\n\u2022 Modular kilns\n\u2022 Blended clay samples\n\u2022 Digital calipers and scales\n\u2022 Bilingual field notebooks\n\u2022 Greenlandic Materials Scientist\",5/8/2027,5/16/2027,0,3c1b408a-dda2-4dab-abc2-c69fba579d0b,PlanExe\n74e08830-9057-407a-9fa5-06e626d75f63,Analyze Mineral Compatibility,\"Analyze Mineral Compatibility\n\nDescription:\nPerform chemical and thermal analysis of locally sourced glacial sand and volcanic ash to assess compatibility with standard kiln processes. Compare results against known ceramic benchmarks from K\u00f8ge Keramik and evaluate potential for long-term durability and aesthetic consistency.\n\nResources needed:\n\u2022 Laboratory testing equipment\n\u2022 Greenlandic Materials Scientist\n\u2022 K\u00f8ge Keramik technical data\n\u2022 Chemical analysis reports\",5/16/2027,5/24/2027,0,66aee857-38d9-4e2f-800a-0ef77f06e5da,PlanExe\nee04af93-a8d2-4baf-a2f2-42abb61e1154,Validate with Elders and Artisans,\"Validate with Elders and Artisans\n\nDescription:\nHost a joint review session with elders and local artisans to interpret test results, assess material authenticity, and provide cultural feedback. Document consensus or concerns regarding the use of blended materials in community-led projects and co-creation initiatives.\n\nResources needed:\n\u2022 Meeting space with audiovisual support\n\u2022 Elders and artisans from advisory council\n\u2022 Bilingual facilitator\n\u2022 Recording and note-taking tools\",5/24/2027,6/1/2027,0,74e08830-9057-407a-9fa5-06e626d75f63,PlanExe\n848a1105-40d6-482e-a550-5d8aefe14b54,Finalize Material Approval,\"Finalize Material Approval\n\nDescription:\nCompile test data, expert analysis, and community feedback into a formal report. Obtain unanimous approval from the Material Co-Creation Working Group and update the CIPR framework to include approved materials and usage guidelines.\n\nResources needed:\n\u2022 Draft report template\n\u2022 Material Co-Creation Working Group\n\u2022 Cultural Liaison\n\u2022 Legal Advisor\",6/1/2027,6/9/2027,0,3c1b408a-dda2-4dab-abc2-c69fba579d0b,PlanExe\n8db53cb3-6774-4c69-bded-4614fa2795f7,Publish Joint Technical-Oral Report on Trial Results,,6/9/2027,7/9/2027,0,3c1b408a-dda2-4dab-abc2-c69fba579d0b,PlanExe\n11e26c9a-55f1-4d8b-adaf-7121fa64ceb6,Conduct Trial Testing,\"Conduct Trial Testing\n\nDescription:\nPerform controlled tests on blended clay samples using varying ratios of imported clay and locally sourced glacial sand or volcanic ash. Fire samples at standard temperatures (1000\u00b0C\u20131200\u00b0C) to evaluate shrinkage rate, weight loss, structural integrity, and firing stability. Record results in bilingual field notebooks (Danish/Greenlandic) for accurate documentation.\n\nResources needed:\n\u2022 Blended clay samples (10 batches)\n\u2022 Modular kilns\n\u2022 Digital measuring tools (calipers, scales)\n\u2022 Bilingual field notebooks\n\u2022 Materials Scientist\",6/9/2027,6/19/2027,0,8db53cb3-6774-4c69-bded-4614fa2795f7,PlanExe\nc4df5534-42e1-460f-bada-abfed57e1a40,Gather Cultural Feedback (2),\"Gather Cultural Feedback\n\nDescription:\nOrganize a joint review session with elders and local artisans to interpret trial results, assess material authenticity, and provide cultural insights. Use the feedback to determine whether the blended materials align with traditional practices and community values.\n\nResources needed:\n\u2022 Elders and local artisans\n\u2022 Cultural Liaison\n\u2022 Bilingual facilitator\n\u2022 Meeting space and recording equipment\",6/19/2027,6/29/2027,0,11e26c9a-55f1-4d8b-adaf-7121fa64ceb6,PlanExe\nf8096e54-2836-41b1-85d5-63f5b475fbf0,Finalize Approval Process,\"Finalize Approval Process\n\nDescription:\nCompile all trial data, observations, and cultural feedback into a comprehensive report. Present the findings to the Material Co-Creation Working Group for consensus approval. Ensure unanimous agreement before any new materials are used in production.\n\nResources needed:\n\u2022 Technical-oral report template\n\u2022 Material Co-Creation Working Group\n\u2022 Facility Manager\n\u2022 Cultural Liaison\",6/29/2027,7/9/2027,0,8db53cb3-6774-4c69-bded-4614fa2795f7,PlanExe\n95c5afbf-21a7-4fb6-9922-68fbecc5ddeb,Establish Partnership with Greenlandic Artisan Collectives for Material Sourcing,,7/9/2027,7/29/2027,0,8db53cb3-6774-4c69-bded-4614fa2795f7,PlanExe\n83a54783-b74c-4b98-88b8-43e2ea557939,Secure Mineral Access,\"Secure Mineral Access\n\nDescription:\nEstablish formal agreements with local geologists and mining cooperatives to identify and secure access to viable glacial sand and volcanic ash sources in Greenland. Conduct initial site assessments and pre-negotiate terms for sustainable, community-approved extraction.\n\nResources needed:\n\u2022 Local geologist\n\u2022 Mining cooperative liaison\n\u2022 Legal advisor (Greenlandic law)\n\u2022 Community liaison\",7/9/2027,7/13/2027,0,95c5afbf-21a7-4fb6-9922-68fbecc5ddeb,PlanExe\n0dc30bb7-52da-4dee-9633-4cce64cfe314,Conduct Initial Air Freight Trials,\"Conduct Initial Air Freight Trials\n\nDescription:\nTest the feasibility of transporting small-scale mineral samples from remote Greenlandic regions via emergency air freight. Validate transit times, customs clearance efficiency, and packaging integrity under Arctic conditions.\n\nResources needed:\n\u2022 Nordic Cargo logistics coordinator\n\u2022 Air freight specialist\n\u2022 Packaging engineer\n\u2022 Customs documentation officer\",7/13/2027,7/17/2027,0,83a54783-b74c-4b98-88b8-43e2ea557939,PlanExe\nbacbbd66-dd7d-4086-80aa-d2a9309994fd,Co-Design Sourcing Protocols,\"Co-Design Sourcing Protocols\n\nDescription:\nHost a participatory workshop with elders, artisans, and local collectives to co-develop ethical and culturally respectful sourcing protocols. Define roles, responsibilities, consent mechanisms, and benefit-sharing models for material collection.\n\nResources needed:\n\u2022 Cultural liaison\n\u2022 Facilitator (bilingual)\n\u2022 Advisory council members\n\u2022 Note-taker (bilingual)\",7/17/2027,7/21/2027,0,0dc30bb7-52da-4dee-9633-4cce64cfe314,PlanExe\n925c4bcd-0d75-4140-b606-afeb3653e09d,Finalize Partnership Agreements,\"Finalize Partnership Agreements\n\nDescription:\nDraft and sign bilingual (Danish/Greenlandic) contracts with selected artisan collectives, including clauses on intellectual property, fair compensation, and long-term collaboration. Ensure all agreements are revi edule Flexible Session Times,\"Schedule Flexible Session Times\n\nDescription:\nCreate a rotating schedule of evening and weekend sessions to accommodate diverse participant availability, including working adults and families. Use the digital shift calendar to coordinate instructor availability and avoid conflicts. Ensure at least three session slots per week are available during winter months.\n\nResources needed:\n\u2022 Digital Shift Calendar\n\u2022 Safety Officer\n\u2022 Instructors (Rotating Schedule)\n\u2022 Project Manager\",8/19/2027,8/25/2027,0,80b09cd8-4fbd-4aef-8528-9cd2c55a84b2,PlanExe\n89f163e4-cbd6-4dd6-8193-c9ddcec13cd9,Launch Targeted Community Outreach,\"Launch Targeted Community Outreach\n\nDescription:\nExecute a multi-channel outreach campaign using schools, radio stations, social media in Greenlandic, and community bulletin boards to promote 'Winter Pottery Nights'. Include incentives such as free materials or raffle prizes to boost initial attendance. Track response rates via bi-monthly surveys.\n\nResources needed:\n\u2022 Community Liaison\n\u2022 Marketing Coordinator\n\u2022 Bilingual Communication Materials\n\u2022 Local Influencers\",8/25/2027,8/31/2027,0,83787ee6-ed28-4b41-8a94-fe06e06f2fcf,PlanExe\n429f1a3d-262a-4162-8a83-4e5ebd624213,Prepare Indoor Event Infrastructure,\"Prepare Indoor Event Infrastructure\n\nDescription:\nEnsure the workshop space is equipped for winter use with adequate heating, lighting, seating, and safety signage. Conduct a pre-event safety check with the Safety Officer and verify all emergency exits and fire equipment are accessible. Install temporary insulation if needed for thermal comfort.\n\nResources needed:\n\u2022 Facility Manager\n\u2022 Safety Officer\n\u2022 Thermal Insulation Supplies\n\u2022 Emergency Equipment Checklist\",8/31/2027,9/6/2027,0,89f163e4-cbd6-4dd6-8193-c9ddcec13cd9,PlanExe\nf5e53537-e2ed-465c-bdf1-5d1c2b7f58e1,Conduct Pilot Test with Small Group,\"Conduct Pilot Test with Small Group\n\
