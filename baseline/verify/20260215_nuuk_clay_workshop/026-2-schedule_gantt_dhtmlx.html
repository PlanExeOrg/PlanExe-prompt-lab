ources needed:\n\u2022 Tourism Board liaison\n\u2022 Hotel partnership coordinator\n\u2022 Marketing lead\n\u2022 Bilingual promotional materials\n\u2022 Digital booking system integration\",11/4/2027,11/13/2027,0,188581ae-519c-4343-9b6e-591d8c8852c4,PlanExe\n71e07b8b-2c96-42f6-8015-ef3e5be31147,Integrate Demand Forecasting,\"Integrate Demand Forecasting\n\nDescription:\nUse historical attendance data from soft-launch events and real-time tracking dashboards to forecast winter demand. Adjust program capacity and staffing levels accordingly. Implement monthly review cycles with stakeholders to adapt programming based on actual utilization and feedback.\n\nResources needed:\n\u2022 Data analyst (rotating role)\n\u2022 Digital dashboard\n\u2022 Monthly review meeting facilitator\n\u2022 Stakeholder input from advisory council\n\u2022 Real-time sensor data\",11/13/2027,11/22/2027,0,aa71182d-2e46-4fe3-89cc-0dff373568f9,PlanExe\nacc39b31-ff2a-4ef8-963a-ddecf87a5200,Evaluate Program Success,\"Evaluate Program Success\n\nDescription:\nConduct a comprehensive evaluation of winter program performance after the first season. Measure attendance, participant satisfaction, revenue generation, and community impact. Publish findings in a public report and use results to inform future seasonal programming strategies.\n\nResources needed:\n\u2022 Project Manager\n\u2022 Survey specialist\n\u2022 Bi-monthly survey tools\n\u2022 Public reporting platform\n\u2022 Advisory Council representatives\",11/22/2027,12/1/2027,0,897a8351-c043-4098-82a8-9577eb939fd9,PlanExe\nbc60ec27-9a82-4741-9288-1df223aadc54,Align Programming with Seasonal Demand Patterns Using Forecast Data,,12/1/2027,12/22/2027,0,897a8351-c043-4098-82a8-9577eb939fd9,PlanExe\n6fa04c28-4457-4ad3-863e-dec746576d00,Analyze seasonal demand patterns,\"Analyze seasonal demand patterns\n\nDescription:\nCollect and analyze historical attendance data from similar cultural programs in Nuuk, focusing on winter and summer trends. Use surveys and community feedback to identify peak and off-peak periods. Develop a baseline forecast model for program utilization across seasons.\n\nResources needed:\n\u2022 Historical attendance records\n\u2022 Community survey tools\n\u2022 Data analyst\n\u2022 Bilingual survey templates\",12/1/2027,12/8/2027,0,bc60ec27-9a82-4741-9288-1df223aadc54,PlanExe\n1636bfbb-830e-4d29-b941-ba721474705c,Map programming to demand cycles,\"Map programming to demand cycles\n\nDescription:\nAlign course offerings and event schedules with seasonal demand forecasts. Design winter-specific programs (e.g., 'Winter Pottery Nights') and summer micro-courses to match expected participation levels. Ensure staffing and material availability are synchronized with these cycles.\n\nResources needed:\n\u2022 Digital shift calendar\n\u2022 Instructor team\n\u2022 Seasonal programming planner\n\u2022 Real-time tracking dashboard\",12/8/2027,12/15/2027,0,6fa04c28-4457-4ad3-863e-dec746576d00,PlanExe\n05e56a95-9cc8-4df3-9934-dead8a836919,Implement dynamic scheduling adjustments,\"Implement dynamic scheduling adjustments\n\nDescription:\nEstablish a process to adjust session frequency, class size, and instructor assignments based on real-time utilization data. Use IoT sensor outputs and booking system metrics to trigger automatic alerts when demand exceeds or falls below thresholds.\n\nResources needed:\n\u2022 IoT environmental monitoring sensors\n\u2022 Digital shift calendar\n\u2022 Real-time tracking dashboard\n\u2022 Project manager\",12/15/2027,12/22/2027,0,bc60ec27-9a82-4741-9288-1df223aadc54,PlanExe\nb1128f26-2b64-4b11-bf16-95ec7aedc381,Evaluate Attendance and Utilization Metrics Monthly,,12/22/2027,1/11/2028,0,a7f9551a-9328-43e9-9a3c-acbbbfb39887,PlanExe\n151f0694-dc04-4969-b18d-50a06783e2e7,Collect attendance data,\"Collect attendance data\n\nDescription:\nGather real-time attendance and utilization metrics from IoT sensors, digital dashboards, and user feedback systems to assess program performance. Focus on winter and summer participation trends, session occupancy rates, and demographic breakdowns. Ensure data is collected consistently across all programs and stored in a centralized, bilingual (Danish/Greenlandic) database for analysis.\n\nResources needed:\n\u2022 IoT environmental monitoring sensors\n\u2022 Digital shift calendar and real-time tracking dashboard\n\u2022 Bi-monthly survey templates\n\u2022 Data analyst (rotating role among instructors)\n\u2022 Bilingual communication materials\",12/22/2027,12/27/2027,0,b1128f26-2b64-4b11-bf16-95ec7aedc381,PlanExe\n2ffa6f89-53e9-44a0-b358-fd1ccfa3fdab,Analyze seasonal patterns,\"Analyze seasonal patterns\n\nDescription:\nUse historical and real-time data to identify seasonal demand fluctuations in workshop usage, particularly during peak summer tourism and winter months. Apply statistical modeling to forecast future attendance based on past trends, weather conditions, and community engagement levels. Generate visual reports showing utilization gaps and overcapacity risks.\n\nResources needed:\n\u2022 Historical attendance records\n\u2022 Statistical analysis software (e.g., Python/Pandas)\n\u2022 Real-time tracking dashboard\n\u2022 Project manager\n\u2022 Data analyst (rotating role)\",12/27/2027,1/1/2028,0,151f0694-dc04-4969-b18d-50a06783e2e7,PlanExe\n7b1107dc-be2f-4cad-9333-2a95f9961756,Adjust programming accordingly,\"Adjust programming accordingly\n\nDescription:\nRevise course schedules, class sizes, and event offerings based on the insights from attendance and utilization analysis. Implement targeted adjustments such as increasing winter programming capacity, launching micro-courses during summer peaks, or reconfiguring open-studio hours to match demand. Ensure changes are communicated clearly through bilingual channels and aligned with stakeholder feedback loops.\n\nResources needed:\n\u2022 Rotating instructor schedule\n\u2022 Digital shift calendar\n\u2022 Marketing and outreach team\n\u2022 Advisory council\n\u2022 Bilingual signage and digital content\",1/1/2028,1/6/2028,0,2ffa6f89-53e9-44a0-b358-fd1ccfa3fdab,PlanExe\n71bd54a3-39ac-482e-8c70-0aac314476ac,Review and refine models quarterly,\"Review and refine models quarterly\n\nDescription:\nConduct a formal quarterly review of attendance and utilization data with key stakeholders including the Clay Workshop Manager, logistics coordinator, finance liaison, and safety officer. Evaluate the effectiveness of current programming adjustments, identify emerging trends, and update forecasting models. Document decisions and actions taken to ensure transparency and continuous improvement.\n\nResources needed:\n\u2022 Quarterly review meeting agenda\n\u2022 Performance dashboard\n\u2022 Meeting minutes template\n\u2022 Stakeholder representatives\n\u2022 Compliance and reporting tools\",1/6/2028,1/11/2028,0,b1128f26-2b64-4b11-bf16-95ec7aedc381,PlanExe\n8730af61-7cdf-4844-88c0-d746ef7d41c0,Launch Hybrid Access & Revenue Architecture,,1/11/2028,4/23/2028,0,a7f9551a-9328-43e9-9a3c-acbbbfb39887,PlanExe\nbc1aed5d-bf67-4810-a947-72064ee79380,Design 'Clay Pass' Membership for Residents,,1/11/2028,2/5/2028,0,8730af61-7cdf-4844-88c0-d746ef7d41c0,PlanExe\n7af737f8-cbd8-49d9-95b7-8611bed44e0c,Define Membership Tiers,\"Define Membership Tiers\n\nDescription:\nDevelop clear, tiered membership levels for the 'Clay Pass' with distinct benefits (e.g., basic access, priority booking, exclusive events) based on resident feedback and budget constraints. Include pricing structures aligned with local income levels and ensure all tiers are accessible to diverse community members.\n\nResources needed:\n\u2022 Project Manager\n\u2022 Community Liaison\n\u2022 Financial Analyst\n\u2022 Bilingual Survey Tools\",1/11/2028,1/16/2028,0,bc1aed5d-bf67-4810-a947-72064ee79380,PlanExe\nf1d9a0b1-49e6-452f-8629-bae23b97db34,Validate Pricing Strategy,\"Validate Pricing Strategy\n\nDescription:\nConduct focus groups with local residents to test proposed pricing tiers and benefits, gather feedback on perceived value, and refine the offering before launch. Use real-time survey data to adjust tiers and messaging to maximize uptake and inclusivity.\n\nResources needed:\n\u2022 Community Liaison\n\u2022 Research Coordinator\n\u2022 Digital Survey Platform\n\u2022 Facilitation Materials in Danish/Greenlandic\",1/16/2028,1/21/2028,0,7af737f8-cbd8-49d9-95b7-8611bed44e0c,PlanExe\n19e3bf08-3556-42ec-b941-61cd46e6436c,Design Onboarding Experience,\"Design Onboarding Experience\n\nDescription:\nCreate a welcoming, multilingual onboarding process for new 'Clay Pass' members, including digital sign-up, orientation video, welcome kit, and access to introductory workshops. Ensure materials are available in both Danish and Greenlandic and reflect cultural sensitivity.\n\nResources needed:\n\u2022 Digital Designer\n\u2022 Content Writer\n\u2022 Multilingual Translator\n\u2022 Video Production Team\",1/21/2028,1/26/2028,0,f1d9a0b1-49e6-452f-8629-bae23b97db34,PlanExe\ne6b546a5-807f-4dc3-9143-092ea08e2ea5,Integrate with Booking System,\"Integrate with Booking System\n\nDescription:\nImplement the 'Clay Pass' membership tiers into the online booking platform with automated access controls, tier-specific privileges, and real-time availability tracking. Conduct usability testing with diverse users to ensure clarity and accessibility.\n\nResources needed:\n\u2022 Software Developer\n\u2022 IT Integration Specialist\n\u2022 User Experience Tester\n\u2022 Digital Dashboard Platform\",1/26/2028,1/31/2028,0,19e3bf08-3556-42ec-b941-61cd46e6436c,PlanExe\n46f9d0e7-592b-4b6a-9c6d-b5fb6d4ab976,Launch Soft-Tiered Trial Version,\"Launch Soft-Tiered Trial Version\n\nDescription:\nRoll out a pilot version of the 'Clay Pass' with flexible access and limited benefits to test demand, collect user feedback, and identify operational bottlenecks. Monitor participation rates and adjust the model based on early insights before full launch.\n\nResources needed:\n\u2022 Project Manager\n\u2022 Instructor Lead\n\u2022 Data Analyst\n\u2022 Feedback Collection Tools\",1/31/2028,2/5/2028,0,bc1aed5d-bf67-4810-a947-72064ee79380,PlanExe\nb4cf0033-edf1-4b03-84bf-bf1a1e92c51b,Create 'Tourist Experience Package' Sold via Hotel Partnerships,,2/5/2028,3/6/2028,0,bc1aed5d-bf67-4810-a947-72064ee79380,PlanExe\n7ee46b42-86c7-4c4b-a592-a335588834fc,Design Tourist Package,\"Design Tourist Package\n\nDescription:\nDevelop a structured, culturally immersive ceramic experience package tailored for summer tourists, including session duration (1\u20132 hours), materials included, instructor roles, and pricing tiers. Collaborate with hotel partners to align with their booking systems and promotional calendars. Ensure all content reflects local traditions and is co-approved by the advisory council.\n\nResources needed:\n\u2022 Project Manager\n\u2022 Tourism Coordinator\n\u2022 Cultural Liaison\n\u2022 Hotel Partners (key representatives)\n\u2022 Digital Booking Platform Access\",2/5/2028,2/11/2028,0,b4cf0033-edf1-4b03-84bf-bf1a1e92c51b,PlanExe\nd6b1366f-195c-4b5a-8d47-ef777f20199f,Finalize Hotel Partnership Contracts,\"Finalize Hotel Partnership Contracts\n\nDescription:\nNegotiate and sign formal agreements with at least three hotel partners to distribute the tourist experience package. Define commission structures, booking caps, promotional responsibilities, and cancellation policies. Ensure contracts are bilingual (Danish/Greenlandic) and compliant with Greenlandic commercial laws.\n\nResources needed:\n\u2022 Legal Advisor\n\u2022 Project Manager\n\u2022 Hotel Partners (legal/operations teams)\n\u2022 Bilingual Contract Templates\n\u2022 Compliance Reviewer\",2/11/2028,2/17/2028,0,7ee46b42-86c7-4c4b-a592-a335588834fc,PlanExe\ne65fb23b-9834-4fd0-95d4-b7d9abf032b1,Integrate Package into Booking System,\"Integrate Package into Booking System\n\nDescription:\nImplement the tourist experience package into the online booking platform with tiered pricing, real-time availability tracking, and automated confirmation emails. Test the integration with sample bookings to ensure seamless user experience across devices and languages. Validate that capacity alerts trigger when limits are reached.\n\nResources needed:\n\u2022 Tech Lead\n\u2022 Digital Platform Developer\n\u2022 Booking System Administrator\n\u2022 QA Tester (bilingual)\n\u2022 Instructor Scheduler\",2/17/2028,2/23/2028,0,d6b1366f-195c-4b5a-8d47-ef777f20199f,PlanExe\n8e07bcd7-e2f3-4967-830b-bb026d1a8e8c,Launch Pilot Tourist Program,\"Launch Pilot Tourist Program\n\nDescription:\nHost a small-scale trial of the tourist experience package with a group of 10\u201315 guests during early August 2026. Gather feedback via post-session surveys and real-time observations. Use insights to refine session flow, materials, and staff training before full rollout.\n\nResources needed:\n\u2022 Four Part-Time Instructors\n\u2022 Safety Officer\n\u2022 Local Logistics Coordinator\n\u2022 Survey Tools (digital and printed)\n\u2022 Feedback Collection Kit\",2/23/2028,2/29/2028,0,e65fb23b-9834-4fd0-95d4-b7d9abf032b1,PlanExe\n63cd5c8b-bd67-465f-956b-50f1e3f7b595,Promote Packages via Hotel Channels,\"Promote Packages via Hotel Channels\n\nDescription:\nDistribute branded promotional materials (brochures, digital banners, QR codes) to partner hotels. Train front-desk staff on how to explain and book the experience. Coordinate joint marketing campaigns (e.g., social media posts, welcome kits) to drive visibility and bookings during peak season.\n\nResources needed:\n\u2022 Marketing Specialist\n\u2022 Hotel Partners (front desk & concierge teams)\n\u2022 Graphic Designer\n\u2022 Social Media Manager\n\u2022 Bilingual Promotional Materials\",2/29/2028,3/6/2028,0,b4cf0033-edf1-4b03-84bf-bf1a1e92c51b,PlanExe\nec363d30-c0f3-4428-90b2-bed86123623c,Implement Pay-What-You-Can Model for Winter Months,,3/6/2028,3/22/2028,0,b4cf0033-edf1-4b03-84bf-bf1a1e92c51b,PlanExe\n87a353a3-e0c7-43fc-9946-1a7588595a6e,Pilot Pay-What-You-Can Model,\"Pilot Pay-What-You-Can Model\n\nDescription:\nTest the pay-what-you-can pricing model with a small group of local residents during a winter session to evaluate uptake, perceived value, and revenue impact. Gather feedback on pricing thresholds and messaging through post-session surveys and informal discussions.\n\nResources needed:\n\u2022 Local residents (10\u201315 participants)\n\u2022 Digital survey tool (bilingual)\n\u2022 Instructor for session facilitation\n\u2022 Facility manager for logistics\n\u2022 Revenue analyst for data tracking\",3/6/2028,3/10/2028,0,ec363d30-c0f3-4428-90b2-bed86123623c,PlanExe\n77074a53-845d-410a-a7de-5b0dd2ec5e1b,Integrate Flexible Pricing into Booking System,\"Integrate Flexible Pricing into Booking System\n\nDescription:\nConfigure the online booking platform to support tiered and flexible pricing options, including real-time capacity alerts and automated payment processing. Ensure the system is accessible in both Danish and Greenlandic and includes clear instructions for users.\n\nResources needed:\n\u2022 Software developer or IT specialist\n\u2022 Online booking platform administrator\n\u2022 Bilingual UX designer\n\u2022 Payment gateway provider\n\u2022 Digital shift calendar integration team\",3/10/2028,3/14/2028,0,87a353a3-e0c7-43fc-9946-1a7588595a6e,PlanExe\na2d962ff-7434-43cd-8d15-6dc9919a0fa2,Train Staff on Consistent Implementation,\"Train Staff on Consistent Implementation\n\nDescription:\nConduct a mandatory training session for all instructors and front-desk staff on how to apply the pay-what-you-can model consistently, including guidelines for handling payments, managing exceptions, and communicating the policy clearly to participants.\n\nResources needed:\n\u2022 Safety Officer\n\u2022 Project Manager\n\u2022 Training materials (bilingual)\n\u2022 Digital shift calendar\n\u2022 Instructor cohort\",3/14/2028,3/18/2028,0,77074a53-845d-410a-a7de-5b0dd2ec5e1b,PlanExe\nf779ea54-3744-4b89-9924-38e20e6638a4,Monitor Participation and Revenue Metrics,\"Monitor Participation and Revenue Metrics\n\nDescription:\nTrack key performance indicators such as session attendance, average contribution per participant, and overall revenue during the pilot phase. Use real-time dashboard data to identify trends and adjust the model based on early insights.\n\nResources needed:\n\u2022 Digital dashboard\n\u2022 Revenue analyst\n\u2022 IoT sensor data (for occupancy tracking)\n\u2022 Bi-monthly review meeting facilitator\n\u2022 Data visualization tools\",3/18/2028,3/22/2028,0,ec363d30-c0f3-4428-90b2-bed86123623c,PlanExe\n2b2f21bd-7ba4-459b-87ca-3c6b85bb1f38,Integrate Tiered Pricing into Online Booking System,,3/22/2028,4/11/2028,0,ec363d30-c0f3-4428-90b2-bed86123623c,PlanExe\n2ab0f6f3-4a84-47e6-ae70-60fdd6c1632a,Integrate Tiered Pricing,\"Integrate Tiered Pricing\n\nDescription:\nImplement a tiered pricing model into the online booking system to support flexible access for residents and tourists. This includes configuring price tiers based on session type, duration, and user category (e.g., resident, tourist, youth). Ensure compatibility with payment gateways, test functionality across devices, and validate that real-time capacity alerts are triggered when limits are reached. Finalize integration before soft launch.\n\nResources needed:\n\u2022 Digital platform developer\n\u2022 Payment gateway API access\n\u2022 Online booking system administrator\n\u2022 Bilingual UI/UX designer\",3/22/2028,3/27/2028,0,2b2f21bd-7ba4-459b-87ca-3c6b85bb1f38,PlanExe\nedf6afa0-e720-4a30-94b5-ea3e341bd387,Test Booking System Functionality,\"Test Booking System Functionality\n\nDescription:\nConduct end-to-end testing of the online booking system with all pricing tiers, including edge cases such as overbooking, expired sessions, and multi-user reservations. Use a sandbox environment to simulate real-world usage patterns. Validate that automated reminders, capacity alerts, and payment confirmations function correctly. Document issues and coordinate fixes with the tech team.\n\nResources needed:\n\u2022 QA tester\n\u2022 System administrator\n\u2022 Development lead\n\u2022 Project manager\",3/27/2028,4/1/2028,0,2ab0f6f3-4a84-47e6-ae70-60fdd6c1632a,PlanExe\nd9b74eec-7e2e-4352-9035-afbb1404a11f,Train Staff on Pricing Model,\"Train Staff on Pricing Model\n\nDescription:\nProvide comprehensive training to all instructors and front-desk staff on how to explain and apply the tiered pricing model, including the pay-what-you-can option during winter months. Deliver bilingual training materials, conduct role-playing scenarios, and verify understanding through quizzes. Ensure all staff can confidently handle customer inquiries and resolve pricing-related disputes.\n\nResources needed:\n\u2022 Training coordinator\n\u2022 Bilingual instructor\n\u2022 Safety officer\n\u2022 Digital shift calendar administrator\",4/1/2028,4/6/2028,0,edf6afa0-e720-4a30-94b5-ea3e341bd387,PlanExe\nb9a454cd-9d3c-47a7-a0a9-5edc911b57ec,Validate Revenue Predictability,\"Validate Revenue Predictability\n\nDescription:\nMonitor initial booking data after implementation to assess revenue predictability. Analyze trends in participation by user group, time of day, and season. Use dashboard metrics to identify underperforming tiers or unexpected demand spikes. Adjust pricing models quarterly based on performance data and stakeholder feedback.\n\nResources needed:\n\u2022 Revenue analyst (rotating role)\n\u2022 Data visualization specialist\n\u2022 Project manager\n\u2022 Digital dashboard\",4/6/2028,4/11/2028,0,2b2f21bd-7ba4-459b-87ca-3c6b85bb1f38,PlanExe\n8a4b9e20-bc97-4ad8-9ebd-054b2d20561a,Monitor Revenue Predictability and Adjust Models Quarterly,,4/11/2028,4/23/2028,0,8730af61-7cdf-4844-88c0-d746ef7d41c0,PlanExe\n9c448982-5f6c-4cb3-b9a9-5c0fe41dfd7e,Automate data aggregation,\"Automate data aggregation\n\nDescription:\nSet up automated data collection from IoT sensors and digital dashboards to ensure continuous monitoring of revenue, attendance, and utilization metrics. Integrate weekly export schedules into the system to provide consistent, real-time insights for decision-making.\n\nResources needed:\n\u2022 Digital dashboard platform (e.g., Airtable or Notion)\n\u2022 Tech lead for system integration\n\u2022 IoT sensor data feed access\",4/11/2028,4/15/2028,0,8a4b9e20-bc97-4ad8-9ebd-054b2d20561a,PlanExe\n25155bce-078a-4f18-a9e7-916109b1f745,Assign rotating revenue analyst,\"Assign rotating revenue analyst\n\nDescription:\nDesignate a rotating role among instructors to oversee revenue performance on a monthly basis. This individual will review aggregated data, identify trends, and prepare reports for stakeholder meetings, ensuring consistent accountability and transparency.\n\nResources needed:\n\u2022 Instructors (rotating)\n\u2022 Revenue tracking template\n\u2022 Monthly review meeting schedule\",4/15/2028,4/19/2028,0,9c448982-5f6c-4cb3-b9a9-5c0fe41dfd7e,PlanExe\n6a54c4fb-9f86-49f1-8f8f-1fb7ac920ee8,Conduct quarterly review meetings,\"Conduct quarterly review meetings\n\nDescription:\nHold structured quarterly meetings with key stakeholders\u2014including the Clay Workshop Manager, Logistics Coordinator, and Finance Liaison\u2014to evaluate performance data, discuss challenges, and approve adjustments to pricing models and programming based on actual utilization and feedback.\n\nResources needed:\n\u2022 Meeting facilitator\n\u2022 Agenda template\n\u2022 Stakeholder list (manager, logistics coordinator, finance liaison)\",4/19/2028,4/23/2028,0,8a4b9e20-bc97-4ad8-9ebd-054b2d20561a,PlanExe\nf8b3bc49-b977-46c9-90ab-5a694903f58e,Activate Community Co-Creation Ecosystem,,4/23/2028,9/8/2028,0,8730af61-7cdf-4844-88c0-d746ef7d41c0,PlanExe\n444b1760-a047-4dcc-99f7-052e00f497aa,Host First 'Community Pottery Day' with Public Installation Project,,4/23/2028,5/18/2028,0,f8b3bc49-b977-46c9-90ab-5a694903f58e,PlanExe\n380c47ac-141f-4a09-8e2d-a98fc6dbd832,Plan Community Pottery Day,\"Plan Community Pottery Day\n\nDescription:\nDefine event scope, select location, draft timeline, and coordinate with local artists and elders for content approval. Include logistics for public installation project, ensure bilingual communication, and schedule pre-event promotion through schools, radio, and social media.\n\nResources needed:\n\u2022 Cultural Liaison\n\u2022 Facility Manager\n\u2022 Local Artists and Elders\n\u2022 Marketing Coordinator\n\u2022 Bilingual Communication Materials\",4/23/2028,4/28/2028,0,444b1760-a047-4dcc-99f7-052e00f497aa,PlanExe\n5e0c260f-1771-4c73-8b10-2026977b0b12,Secure Materials and Equipment,\"Secure Materials and Equipment\n\nDescription:\nProcure clay, tools, and installation materials in advance; confirm availability of drying racks and ventilation systems. Ensure all items are delivered on time with buffer stock for weather-related delays, and verify compatibility with the workshop\u2019s thermal and safety standards.\n\nResources needed:\n\u2022 Local Logistics Coordinator\n\u2022 Materials Scientist\n\u2022 Supply Chain Coordinator\n\u2022 Kiln Technician\n\u2022 Emergency Air Freight Contact\",4/28/2028,5/3/2028,0,380c47ac-141f-4a09-8e2d-a98fc6dbd832,PlanExe\n4edb93f3-1022-4187-a765-2253faa4f913,Organize Public Installation Project,\"Organize Public Installation Project\n\nDescription:\nDesign and build a collaborative public artwork using community-contributed pieces. Conduct on-site assembly with volunteers, ensure structural safety, and integrate cultural motifs approved by the advisory council. Document process with photos and videos for digital archive.\n\nResources needed:\n\u2022 Artistic Lead\n\u2022 Safety Officer\n\u2022 Community Volunteers\n\u2022 Construction Crew\n\u2022 Digital Documentation Team\",5/3/2028,5/8/2028,0,5e0c260f-1771-4c73-8b10-2026977b0b12,PlanExe\n8280e099-7351-48fe-b3d5-1c877e8a4c6a,Execute Event and Promote Engagement,\"Execute Event and Promote Engagement\n\nDescription:\nRun the 'Community Pottery Day' with guided activities, live demonstrations, and interactive stations. Facilitate elder-led storytelling sessions, distribute free materials to participants, and collect real-time feedback via bilingual surveys. Broadcast event highlights on local media and social platforms.\n\nResources needed:\n\u2022 Four Part-Time Instructors\n\u2022 Youth Apprentices\n\u2022 Event Coordinator\n\u2022 Media Liaison\n\u2022 Bi-Monthly Survey Tools\",5/8/2028,5/13/2028,0,4edb93f3-1022-4187-a765-2253faa4f913,PlanExe\nb7081e25-e313-43f3-84f1-9488bb45493e,Evaluate and Archive Outcomes,\"Evaluate and Archive Outcomes\n\nDescription:\nReview attendance data, survey responses, and incident logs post-event. Compile a joint report with elders and artists summarizing community impact, lessons learned, and recommendations for future co-creation events. Upload final artworks and documentation to public digital platform and physical display locations.\n\nResources needed:\n\u2022 Project Manager\n\u2022 Cultural Liaison\n\u2022 Data Analyst\n\u2022 Inuit Cultural Heritage Council\n\u2022 Digital Archivist\",5/13/2028,5/18/2028,0,444b1760-a047-4dcc-99f7-052e00f497aa,PlanExe\n8335a69d-118f-47ed-a1a2-841cefa523f0,Launch Youth Apprenticeship Track with School Partnerships,,5/18/2028,7/2/2028,0,444b1760-a047-4dcc-99f7-052e00f497aa,PlanExe\nb23381b4-2fe4-478e-8c4a-13b3d185bacd,Secure School Partnerships,\"Secure School Partnerships\n\nDescription:\nEstablish formal agreements with local schools to integrate the youth apprenticeship track into their curricula. This includes identifying key stakeholders (principals, teachers, guidance counselors), scheduling initial meetings, drafting partnership memorandums in both Danish and Greenlandic, and aligning program timelines with academic calendars to ensure seamless participation.\n\nResources needed:\n\u2022 Project Manager\n\u2022 Cultural Liaison\n\u2022 School Liaison Officer\n\u2022 Bilingual legal advisor\n\u2022 Digital collaboration tools (e.g., Google Workspace)\",5/18/2028,5/27/2028,0,8335a69d-118f-47ed-a1a2-841cefa523f0,PlanExe\n92b55914-cf87-411e-ad0e-9a5b2ce026c1,Develop Apprenticeship Curriculum,\"Develop Apprenticeship Curriculum\n\nDescription:\nDesign a structured, culturally grounded curriculum for youth apprentices that blends technical ceramic skills with intergenerational storytelling and community co-creation. The curriculum must include learning modules on hand-building, wheel-throwing, material sourcing, safety protocols, and cultural context, all delivered in bilingual (Danish/Greenlandic) materials with visual aids and hands-on activities.\n\nResources needed:\n\u2022 Four Part-Time Instructors\n\u2022 Cultural Liaison\n\u2022 Youth Engagement Coordinator\n\u2022 Bilingual instructional designer\n\u2022 Digital content creation tools\",5/27/2028,6/5/2028,0,b23381b4-2fe4-478e-8c4a-13b3d185bacd,PlanExe\n6574c625-17c8-4af2-a460-27f075481f89,Implement Mentorship Framework,\"Implement Mentorship Framework\n\nDescription:\nCreate a rotating peer mentorship system pairing experienced instructors with apprentices, ensuring consistent guidance and skill transfer. Define clear roles, expectations, and evaluation criteria for mentors and mentees. Conduct a pilot mentorship cycle with a small group of apprentices to test structure, timing, and feedback mechanisms before full rollout.\n\nResources needed:\n\u2022 Safety Officer\n\u2022 Human Resources Lead\n\u2022 Facility Manager\n\u2022 Mentorship toolkit (guides, feedback forms)\n\u2022 Digital tracking dashboard\",6/5/2028,6/14/2028,0,92b55914-cf87-411e-ad0e-9a5b2ce026c1,PlanExe\n779fbbc6-b8ff-4ce7-82be-75c543646860,Launch Pilot Apprenticeship Cohort,\"Launch Pilot Apprenticeship Cohort\n\nDescription:\nRun a trial 6-week apprenticeship program with 10\u201312 youth participants from local schools. Deliver the curriculum in a hybrid format (in-person at workshop + virtual check-ins), collect real-time feedback via bi-weekly surveys, and assess skill progression through milestone projects. Use results to refine the program before scaling.\n\nResources needed:\n\u2022 Clay Workshop Manager\n\u2022 Instructors (cross-trained)\n\u2022 Youth Apprentices\n\u2022 Bilingual facilitators\n\u2022 IoT monitoring sensors for activity tracking\",6/14/2028,6/23/2028,0,6574c625-17c8-4af2-a460-27f075481f89,PlanExe\n88964c43-3850-40ff-a7ac-c530efb42a1f,Evaluate and Scale Program (2),\"Evaluate and Scale Program\n\nDescription:\nAnalyze data from the pilot cohort\u2014including attendance, skill development, participant satisfaction, and instructor feedback\u2014to identify strengths and gaps. Adjust the curriculum, mentorship model, and logistics accordingly. Finalize a scalable framework for annual recruitment and launch the full youth apprenticeship track by September 2026.\n\nResources needed:\n\u2022 Project Manager\n\u2022 Data Analyst\n\u2022 Advisory Council\n\u2022 Bi-monthly survey tools\n\u2022 Stakeholder review meeting platform\",6/23/2028,7/2/2028,0,8335a69d-118f-47ed-a1a2-841cefa523f0,PlanExe\n1379669b-9bd3-4ec5-b102-e91d9f11be38,Introduce AI-Assisted Design Tools with Cultural Context Guidance,,7/2/2028,7/30/2028,0,8335a69d-118f-47ed-a1a2-841cefa523f0,PlanExe\n8b3d7837-f82d-40d8-bba1-97fc44154bca,Co-Create AI Tools,\"Co-Create AI Tools\n\nDescription:\nCollaborate with elders and local artists to develop culturally relevant training datasets for AI-assisted design tools. Pilot the tool with a small group of instructors, ensuring alignment with traditional practices and community values. Address technical integration challenges and provide hands-on workshops to build trust and familiarity among staff.\n\nResources needed:\n\u2022 Local artists and elders\n\u2022 Greenlandic Materials Scientist\n\u2022 AI software developer\n\u2022 Bilingual facilitator\n\u2022 Digital workshop space\",7/2/2028,7/9/2028,0,1379669b-9bd3-4ec5-b102-e91d9f11be38,PlanExe\n55de2ade-3f00-42cb-b1ca-91d4cb1ba8ee,Integrate Cultural Context,\"Integrate Cultural Context\n\nDescription:\nEmbed cultural narratives and design principles into the AI tool's framework through co-design sessions. Ensure all AI-generated suggestions respect sacred motifs and oral histories. Validate content with the advisory council before full deployment to prevent misrepresentation.\n\nResources needed:\n\u2022 Inuit Cultural Heritage Council\n\u2022 Cultural Liaison\n\u2022 AI ethics consultant\n\u2022 Bilingual documentation team\n\u2022 Digital feedback platform\",7/9/2028,7/16/2028,0,8b3d7837-f82d-40d8-bba1-97fc44154bca,PlanExe\n5c01199b-eb93-4a51-a393-5d13c7a0f47f,Test with Instructors,\"Test with Instructors\n\nDescription:\nConduct a controlled pilot of the AI-assisted design tool with four part-time instructors using real project scenarios. Gather feedback on usability, cultural appropriateness, and technical performance. Refine the tool based on observed challenges and instructor input.\n\nResources needed:\n\u2022 Four part-time instructors\n\u2022 Digital testing environment\n\u2022 Feedback forms (bilingual)\n\u2022 Project manager\n\u2022 Technical support lead\",7/16/2028,7/23/2028,0,55de2ade-3f00-42cb-b1ca-91d4cb1ba8ee,PlanExe\n410c565b-6ab0-44e8-8d6c-41c94162dd95,Finalize Tool Deployment Plan,\"Finalize Tool Deployment Plan\n\nDescription:\nDevelop a rollout strategy for the AI-assisted design tool, including training modules, access protocols, and integration with existing workflows. Secure formal approval from the advisory council and safety officer. Prepare documentation in both Danish and Greenlandic for all users.\n\nResources needed:\n\u2022 Safety Officer\n\u2022 Project Manager\n\u2022 Legal Advisor\n\u2022 Training materials designer\n\u2022 Digital dashboard administrator\",7/23/2028,7/30/2028,0,1379669b-9bd3-4ec5-b102-e91d9f11be38,PlanExe\n196534ca-3cae-4643-b947-5f1ee5fc2e8d,Establish Feedback Loops with Community through Bi-Monthly Surveys,,7/30/2028,8/15/2028,0,1379669b-9bd3-4ec5-b102-e91d9f11be38,PlanExe\n66361d63-4ad2-44cb-8c70-1e9369256653,Conduct Community Surveys,\"Conduct Community Surveys\n\nDescription:\nGather feedback from local residents, elders, and artists through bi-monthly surveys to assess engagement, identify cultural sensitivities, and evaluate the impact of co-created content. Use bilingual (Danish/Greenlandic) digital and printed forms distributed via schools, community centers, and social media. Incentivize participation with small rewards like free workshop vouchers to improve response rates.\n\nResources needed:\n\u2022 Bilingual survey templates\n\u2022 Digital survey platform (e.g., Google Forms, Notion)\n\u2022 Printed survey materials\n\u2022 Community outreach coordinator\n\u2022 Incentive budget for participants\",7/30/2028,8/3/2028,0,196534ca-3cae-4643-b947-5f1ee5fc2e8d,PlanExe\n6e9a33e2-cc4c-482b-b29c-17bedc800209,Host Feedback Review Workshops,\"Host Feedback Review Workshops\n\nDescription:\nOrganize quarterly in-person or virtual workshops with community stakeholders\u2014including elders, youth apprentices, and local artists\u2014to review survey results, discuss concerns, and co-develop action plans. Ensure all sessions are facilitated by a cultural liaison, conducted in both Danish and Greenlandic, and documented with minutes and visual summaries for transparency.\n\nResources needed:\n\u2022 Facilitation team (cultural liaison, project manager)\n\u2022 Meeting space or virtual platform (Zoom/Teams)\n\u2022 Bilingual facilitation materials\n\u2022 Minutes and summary documentation tools\n\u2022 Refreshments and honorariums for participants\",8/3/2028,8/7/2028,0,66361d63-4ad2-44cb-8c70-1e9369256653,PlanExe\n46c13fdd-d8b3-401f-bc0c-8fabce2a31c1,Integrate Feedback into Programming,\"Integrate Feedback into Programming\n\nDescription:\nUpdate course content, exhibition themes, and operational policies based on validated community input. Implement changes through iterative cycles: analyze feedback, prioritize actions, revise materials, pilot adjustments, and re-survey to measure improvement. Maintain a public dashboard showing how feedback led to real changes to build trust.\n\nResources needed:\n\u2022 Project manager\n\u2022 Curriculum development team\n\u2022 Digital dashboard platform\n\u2022 Feedback analysis tools\n\u2022 Communication specialist for public updates\",8/7/2028,8/11/2028,0,6e9a33e2-cc4c-482b-b29c-17bedc800209,PlanExe\n94d6f210-2724-467d-a04a-ba75f252277f,Publish Transparent Feedback Reports,\"Publish Transparent Feedback Reports\n\nDescription:\nCreate and distribute bi-monthly public reports summarizing survey findings, workshop outcomes, and implemented changes. Include data visualizations, quotes from community members, and clear timelines. Share via email newsletters, social media, Katuaq Cultural Centre bulletin boards, and school networks to ensure broad accessibility.\n\nResources needed:\n\u2022 Report design tools (Canva, Adobe InDesign)\n\u2022 Multilingual copywriters\n\u2022 Newsletter distribution system\n\u2022 Public display materials (posters, digital screens)\n\u2022 Community liaison for dissemination\",8/11/2028,8/15/2028,0,196534ca-3cae-4643-b947-5f1ee5fc2e8d,PlanExe\n6eb014ec-ba1e-41ae-aa39-79803a16ef41,Publish Co-Created Artworks in Public Spaces and Digital Platforms,,8/15/2028,9/8/2028,0,f8b3bc49-b977-46c9-90ab-5a694903f58e,PlanExe\n43e0a852-3381-49ee-9fa5-fb247158aad4,Finalize Artwork Approval,\"Finalize Artwork Approval\n\nDescription:\nEstablish a formal review process with the Inuit Cultural Heritage Council and advisory council to approve all co-created artworks for public display, ensuring cultural sensitivity and community consent. This includes verifying that no restricted motifs or narratives are included and confirming alignment with the CIPR framework.\n\nResources needed:\n\u2022 Cultural Liaison\n\u2022 Inuit Cultural Heritage Council\n\u2022 Advisory Council\n\u2022 Bilingual documentation tools\",8/15/2028,8/21/2028,0,6eb014ec-ba1e-41ae-aa39-79803a16ef41,PlanExe\nb197413c-94a4-4068-8367-5f2730ec7299,Schedule Installation Logistics,\"Schedule Installation Logistics\n\nDescription:\nPlan and coordinate the physical installation of co-created artworks in public spaces (e.g., Katuaq Cultural Centre, Nuuk Center) during favorable weather windows (spring/summer). Secure transport contracts with local providers, confirm weather-resilient mounting solutions, and ensure all materials are pre-approved by the advisory council.\n\nResources needed:\n\u2022 Local logistics coordinator\n\u2022 Transport provider\n\u2022 Installation team\n\u2022 Weather forecast data\",8/21/2028,8/27/2028,0,43e0a852-3381-49ee-9fa5-fb247158aad4,PlanExe\n8ead6b2b-6a86-4815-8b83-d462b819b052,Publish Digital Archive,\"Publish Digital Archive\n\nDescription:\nCreate and launch a bilingual (Danish/Greenlandic) digital archive of co-created artworks, including metadata such as artist names, cultural context, creation date, and approval status. Ensure the platform is accessible via mobile and desktop, supports multimedia, and integrates with the public dashboard for transparency.\n\nResources needed:\n\u2022 Digital archivist\n\u2022 Web developer\n\u2022 Bilingual content manager\n\u2022 Cloud hosting service\",8/27/2028,9/2/2028,0,b197413c-94a4-4068-8367-5f2730ec7299,PlanExe\n002f91ad-a04a-49ab-bc4e-6451352c34ab,Host Community Viewing Event,\"Host Community Viewing Event\n\nDescription:\nOrganize a public event to unveil the co-created artworks in both physical and digital formats. Invite elders, artists, youth apprentices, and residents to participate in guided tours, storytelling sessions, and feedback discussions. Use this opportunity to reinforce community ownership and celebrate cultural collaboration.\n\nResources needed:\n\u2022 Event coordinator\n\u2022 Facility space\n\u2022 Bilingual signage\n\u2022 Audio-visual equipment\",9/2/2028,9/8/2028,0,6eb014ec-ba1e-41ae-aa39-79803a16ef41,PlanExe\n07827060-b275-4773-a9ac-629b6f5ff467,Ensure Regulatory Compliance and Stakeholder Engagement,,9/8/2028,12/2/2028,0,f8b3bc49-b977-46c9-90ab-5a694903f58e,PlanExe\n2e6f29b3-d7ad-47a9-9de1-f540013231eb,\"Submit All Permit Applications in Danish and Greenlandic by April 20, 2026\",,9/8/2028,9/28/2028,0,07827060-b275-4773-a9ac-629b6f5ff467,PlanExe\n0748867a-c89a-4451-81b5-bf2bc1d80c91,Finalize Permit Documentation,\"Finalize Permit Documentation\n\nDescription:\nCompile and verify all required documentation for Nuuk Municipality permits, including bilingual (Danish/Greenlandic) submissions. Ensure compliance with Building Code, Fire Safety, Environmental Protection, and Noise Control regulations. Prepare digital and physical copies for submission by April 20, 2026.\n\nResources needed:\n\u2022 Project Manager\n\u2022 Legal Advisor\n\u2022 Bilingual Administrative Assistant\n\u2022 Certified Arctic Building Specialist\n\u2022 Digital Document Repository\",9/8/2028,9/12/2028,0,2e6f29b3-d7ad-47a9-9de1-f540013231eb,PlanExe\n78625bf9-e9ed-46fe-81e4-8dcf5312627c,Conduct Pre-Submission Review,\"Conduct Pre-Submission Review\n\nDescription:\nPerform an internal audit of all permit documents using checklists aligned with NFPA, Bygningsreglementet, and Greenlandic Health and Safety at Work Act. Engage the Katuaq Cultural Centre Oversight Committee for feedback on cultural and community-related aspects of the application.\n\nResources needed:\n\u2022 Safety Officer\n\u2022 Facility Manager\n\u2022 Cultural Liaison\n\u2022 Compliance Checklist Template\n\u2022 Meeting Facilitator\",9/12/2028,9/16/2028,0,0748867a-c89a-4451-81b5-bf2bc1d80c91,PlanExe\ne720d1d2-b6f5-4d1a-8eed-89652dec2a59,Submit Applications to Nuuk Municipality,\"Submit Applications to Nuuk Municipality\n\nDescription:\nDeliver all completed permit applications in both Danish and Greenlandic to Nuuk Municipality Planning Department by the deadline. Track submission confirmation and initiate follow-up protocol if no acknowledgment is received within 48 hours.\n\nResources needed:\n\u2022 Project Manager\n\u2022 Logistics Coordinator\n\u2022 Nuuk Municipality Contact List\n\u2022 Proof of Delivery System\",9/16/2028,9/20/2028,0,78625bf9-e9ed-46fe-81e4-8dcf5312627c,PlanExe\n0705e8ad-97e9-41a4-a467-4d170411007c,Coordinate Follow-Up with Regulatory Bodies,\"Coordinate Follow-Up with Regulatory Bodies\n\nDescription:\nSchedule and conduct proactive check-ins with Nuuk Municipality planning officials and other regulatory bodies to monitor application status. Address any feedback or missing items promptly to avoid delays in approval timeline.\n\nResources needed:\n\u2022 Regulatory Liaison\n\u2022 Calendar Integration Tool\n\u2022 Communication Log\n\u2022 Stakeholder Contact Database\",9/20/2028,9/24/2028,0,e720d1d2-b6f5-4d1a-8eed-89652dec2a59,PlanExe\naa4cd3ca-9802-4ff5-ad45-feda0af16791,Prepare for Potential Revisions,\"Prepare for Potential Revisions\n\nDescription:\nDevelop a contingency plan for anticipated revisions based on past municipal review patterns. Maintain editable versions of all documents and assign a dedicated team member to manage updates and resubmissions if required.\n\nResources needed:\n\u2022 Document Management System\n\u2022 Revision Tracker\n\u2022 Backup Legal Reviewer\n\u2022 Flexible Timeline Buffer\",9/24/2028,9/28/2028,0,2e6f29b3-d7ad-47a9-9de1-f540013231eb,PlanExe\nde656ef5-e6de-4587-94ec-871e9d4df59b,Conduct Pre-Opening Thermal and Safety Audits with Certified Arctic Specialist,,9/28/2028,10/18/2028,0,2e6f29b3-d7ad-47a9-9de1-f540013231eb,PlanExe\nfd6de37a-e73e-415a-b0a9-fc150f2c7743,Conduct Thermal Audit (2),\"Conduct Thermal Audit\n\nDescription:\nPerform a comprehensive pre-opening thermal audit of the facility using certified Arctic building standards. This includes assessing insulation integrity, thermal mass performance, and heat retention across all zones under simulated winter conditions (-20\u00b0C). The audit must validate that indoor temperatures remain within \u00b15\u00b0C of target parameters during peak occupancy (90%) and identify any necessary upgrades before fit-out completion.\n\nResources needed:\n\u2022 Certified Arctic building specialist\n\u2022 Thermal imaging equipment\n\u2022 EnergyPlus simulation software\n\u2022 Bilingual audit report template\",9/28/2028,10/2/2028,0,de656ef5-e6de-4587-94ec-871e9d4df59b,PlanExe\nef895845-13e6-49d6-be2d-e15802f6301f,Verify Safety Compliance,\"Verify Safety Compliance\n\nDescription:\nEnsure all safety systems meet Greenlandic Health and Safety at Work Act and International Fire Safety Codes (NFPA 80, NFPA 101). Conduct on-site inspections of ventilation, fire suppression systems, emergency exits, and kiln operation protocols. Document findings and implement corrective actions prior to certification submission.\n\nResources needed:\n\u2022 Safety Officer\n\u2022 Fire safety inspector\n\u2022 Building code compliance checklist\n\u2022 Emergency response plan documentation\",10/2/2028,10/6/2028,0,fd6de37a-e73e-415a-b0a9-fc150f2c7743,PlanExe\n08ca2fa0-b297-49f4-88a8-cdca629054f9,Prepare Compliance Documentation (1),\"Prepare Compliance Documentation\n\nDescription:\nCompile and finalize all required documentation for Nuuk Municipality review, including bilingual (Danish/Greenlandic) versions of the Building Code Compliance Certificate application, Fire Safety Inspection Report, Environmental Protection Act Registration, and Noise Control Permit. Ensure all forms are signed, notarized, and submitted by April 20, 2026.\n\nResources needed:\n\u2022 Project Manager\n\u2022 Legal Advisor\n\u2022 Bilingual document templates\n\u2022 Digital filing system with version control\",10/6/2028,10/10/2028,0,ef895845-13e6-49d6-be2d-e15802f6301f,PlanExe\n2e14291f-1d56-493f-b30c-5d8020692e70,Schedule Regulatory Review Meeting,\"Schedule Regulatory Review Meeting\n\nDescription:\nCoordinate with Nuuk Municipality Planning Department and Katuaq Cultural Centre Oversight Committee to schedule a formal review meeting one week before the final compliance audit. Present preliminary findings, address feedback, and confirm readiness for inspection. Use this opportunity to resolve any outstanding concerns proactively.\n\nResources needed:\n\u2022 Regulatory liaison\n\u2022 Meeting agenda and presentation materials\n\u2022 Minutes recording tool\n\u2022 Stakeholder contact list\",10/10/2028,10/14/2028,0,08ca2fa0-b297-49f4-88a8-cdca629054f9,PlanExe\n7d467e41-70a7-4e3b-af67-7c780a464e0f,Finalize Audit Readiness Package,\"Finalize Audit Readiness Package\n\nDescription:\nAssemble a complete audit readiness package containing all verified records: thermal load data, safety inspection reports, training logs, liability waivers, incident logs, and digital dashboards. Conduct a dry run with internal staff to simulate the audit process and ensure full compliance with all requirements before official submission.\n\nResources needed:\n\u2022 Compliance champion\n\u2022 Digital tracking dashboard\n\u2022 Audit checklist\n\u2022 Internal review team\",10/14/2028,10/18/2028,0,de656ef5-e6de-4587-94ec-871e9d4df59b,PlanExe\ne064f302-6662-409b-ab28-ea8b2deaddfa,Obtain Building Code Compliance Certificate and Fire Safety Certification,,10/18/2028,11/7/2028,0,de656ef5-e6de-4587-94ec-871e9d4df59b,PlanExe\nf65bcec8-c59d-442c-a049-a72dec4bf5f8,Prepare Compliance Documentation (2),\"Prepare Compliance Documentation\n\nDescription:\nGather and compile all required documents for regulatory compliance, including safety training records, liability waiver forms, incident logs, and certification proofs. Ensure all materials are bilingual (Danish/Greenlandic) and organized in a centralized digital repository with version control.\n\nResources needed:\n\u2022 Safety Officer\n\u2022 Digital Shift Calendar\n\u2022 Bilingual Documentation Templates\n\u2022 Centralized Digital Repository (e.g., Notion or Google Drive)\",10/18/2028,10/22/2028,0 the project\u2019s readiness dashboard.\n\nResources needed:\n\u2022 Project Manager\n\u2022 Final Approval Confirmation\n\u2022 Real-Time Tracking Dashboard\",11/3/2028,11/7/2028,0,e064f302-6662-409b-ab28-ea8b2deaddfa,PlanExe\nc5c72c04-1b52-4cc1-a006-f0602d2e1bdb,Schedule Compliance Audit with Nuuk Municipality One Week Before Opening,,11/7/2028,11/22/2028,0,e064f302-6662-409b-ab28-ea8b2deaddfa,PlanExe\n807f7b9c-c3e1-465c-824a-518d3259b914,Establish Digital Tracking System (1),\"Establish Digital Tracking System\n\nDescription:\nSet up a centralized digital platform to record and monitor safety training completion, liability waiver submissions, and incident logs. Ensure the system supports bilingual (Danish/Greenlandic) input, automated reminders for deadlines, and real-time access for the Safety Officer and project manager. Integrate with the digital shift calendar to flag overdue entries.\n\nResources needed:\n\u2022 Digital tracking software (e.g., Notion or Airtable)\n\u2022 Safety Officer\n\u2022 Project Manager\n\u2022 Bilingual administrative support\",11/7/2028,11/10/2028,0,c5c72c04-1b52-4cc1-a006-f0602d2e1bdb,PlanExe\nf98d83f8-1f15-4c4d-8c80-20f53e973095,Develop Standardized Documentation Protocols,\"Develop Standardized Documentation Protocols\n\nDescription:\nCreate clear, step-by-step guidelines for staff on how to log safety training, submit liability waivers, and report incidents. Include templates in both Danish and Greenlandic, define roles and responsibilities, and specify retention periods. Distribute protocols via onboarding materials and post them in visible areas within the workshop.\n\nResources needed:\n\u2022 Legal Advisor\n\u2022 Cultural Liaison\n\u2022 Safety Officer\n\u2022 Bilingual documentation templates\",11/10/2028,11/13/2028,0,807f7b9c-c3e1-465c-824a-518d3259b914,PlanExe\nca8b0177-e8a4-4a88-b2e8-e8b0a12a7f66,Conduct Staff Training on Compliance Procedures,\"Conduct Staff Training on Compliance Procedures\n\nDescription:\nOrganize m       "custom_tooltip": "<b>Integrate Real-Time Shipping Alerts</b><br>Deploy and integrate an IoT-based real-time shipping alert monitoring system using data from the Danish Maritime Authority API. Configure automated alerts for delays exceeding 48 hours, and ensure all relevant staff receive notifications via mobile and digital dashboards. Conduct a test simulation to validate system responsiveness.<br><b>Resources needed:</b><br><ul><li>IT Technician</li><li>Danish Maritime Authority API Access</li><li>Digital Dashboard Platform</li><li>Project Manager</li></ul>",

      "text": "Conduct Winter Thermal Load Simulation Using EnergyPlus",
      "custom_tooltip": "<b>Conduct Winter Thermal Load Simulation Using EnergyPlus</b>",

    {
      "id": "d780ef39-f1a2-4c1f-ba42-0732304db4fe",
      "text": "Run EnergyPlus Simulation",
      "custom_tooltip": "<b>Run EnergyPlus Simulation</b><br>Conduct a dynamic thermal load simulation using EnergyPlus software with real-world boundary conditions, including Nuuk&#x27;s extreme winter temperatures (-20\u00b0C), 90% occupancy levels, and peak kiln operation. Input verified Greenlandic meteorological data from the Danish Meteorological Institute to model temperature gradients, humidity, CO\u2082 buildup, and energy consumption across drying zones and workspaces. Validate results against physical sensor readings from a mock workshop setup in December 2025.<br><b>Resources needed:</b><br><ul><li>EnergyPlus software license</li><li>Arctic-certified building specialist</li><li>Historical climate data (Danish Meteorological Institute)</li><li>Mock workshop setup with temporary heating systems</li><li>Digital modeling technician</li></ul>",
      "start_date": "2026-05-30",
      "duration": 7.0,
      "progress": 0,
      "open": true,
      "meta": "55f500f0-6a99-4a3f-addb-16211e2700d5 SS",
      "parent": "55f500f0-6a99-4a3f-addb-16211e2700d5"
    },
    {
      "id": "fd660e06-b11e-46bc-ae46-5fea791dff68",
      "text": "Validate Thermal Model Output",
      "custom_tooltip": "<b>Validate Thermal Model Output</b><br>Perform statistical regression analysis to compare simulation outputs from EnergyPlus with real-time sensor data collected during the December 2025 mock test. Identify discrepancies in thermal stability, humidity control, and energy usage. Adjust input parameters as needed and confirm that all zones remain within safe operating parameters (\u00b15\u00b0C variance) under 90% winter occupancy. Document findings for inclusion in the Winter Thermal Readiness Report.<br><b>Resources needed:</b><br><ul><li>Statistical analysis tools (Python/Pandas/Matplotlib)</li><li>Data analyst</li><li>IoT sensor data logs</li><li>Simulation validation checklist</li><li>Bilingual technical report template</li></ul>",
      "start_date": "2026-06-06",
      "duration": 7.0,
      "progress": 0,
      "open": true,
      "meta": "d780ef39-f1a2-4c1f-ba42-0732304db4fe FS",
      "parent": "55f500f0-6a99-4a3f-addb-16211e2700d5"
    },
    {
      "id": "6e9f2aac-269c-438d-9c49-7661348ce8bc",
      "text": "Secure Expert Audit & Sign-Off",
      "custom_tooltip": "<b>Secure Expert Audit &amp; Sign-Off</b><br>Engage an Arctic-certified building engineer to audit the EnergyPlus model and final thermal assessment. Review the simulation methodology, input assumptions, and output reliability. Obtain formal sign-off confirming the facility\u2019s thermal readiness for year-round operation. Submit the signed report to the National Labour Inspectorate (Greenland) for compliance review and ensure alignment with NFPA and Bygningsreglementet standards.<br><b>Resources needed:</b><br><ul><li>Arctic-certified building engineer</li><li>Compliance review checklist</li><li>Signed audit confirmation form</li><li>National Labour Inspectorate contact point</li><li>Digital submission platform</li></ul>",
      "start_date": "2026-06-13",
      "duration": 7.0,
      "progress": 0,
      "open": true,
      "meta": "55f500f0-6a99-4a3f-addb-16211e2700d5 FF, fd660e06-b11e-46bc-ae46-5fea791dff68 FS",
      "parent": "55f500f0-6a99-4a3f-addb-16211e2700d5"
    },

    {
      "id": "2f85a0b3-30e2-42ec-bc73-67d64205f2fe",
      "text": "Source and order materials",
      "custom_tooltip": "<b>Source and order materials</b><br>Procure south-facing windows and thermal mass wall materials from Danish suppliers with guaranteed delivery timelines. Confirm shipping schedules with Nordic Cargo to ensure on-time arrival during the favorable weather window (late spring/early summer). Prioritize pre-fabricated, modular components to minimize on-site installation time.<br><b>Resources needed:</b><br><ul><li>Local logistics coordinator</li><li>Project manager</li><li>Supplier contact list</li><li>Emergency air freight contract</li></ul>",

      "progress": 0,

      "meta": "007d8d24-e074-408e-9560-a8f321a8ea54 SS",

    {
      "id": "8119e483-0979-446a-b2bc-786d351cc57d",
      "text": "Schedule installation window",
      "custom_tooltip": "<b>Schedule installation window</b><br>Coordinate with certified Arctic contractors to schedule installation during the optimal weather period (late spring/early summer) when snow and ice are minimal. Include a 5-day buffer for potential weather-related delays and confirm site readiness through pre-installation inspections.<br><b>Resources needed:</b><br><ul><li>Certified Arctic building specialist</li><li>Construction crew</li><li>Site access permit</li><li>Weather forecast monitoring tool</li></ul>",

    },
    {
      "id": "86b45a74-8e67-4bfd-9e2e-16225e2434a4",
      "text": "Conduct pre-installation site checks",
      "custom_tooltip": "<b>Conduct pre-installation site checks</b><br>Perform thorough site assessments before installation begins to verify structural integrity, foundation stability, and alignment with design plans. Document any discrepancies and resolve them prior to material delivery to prevent rework or delays.<br><b>Resources needed:</b><br><ul><li>Facility manager</li><li>Structural engineer</li><li>Digital inspection checklist</li><li>Camera for documentation</li></ul>",
      "start_date": "2026-06-28",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "8119e483-0979-446a-b2bc-786d351cc57d FS",

    {
      "id": "ee947e52-2ca9-4043-a9e4-493e119f5def",
      "text": "Install solar elements and thermal walls",
      "custom_tooltip": "<b>Install solar elements and thermal walls</b><br>Execute the physical installation of south-facing windows and thermal mass walls according to the approved design. Ensure all work complies with Arctic building standards and is documented for compliance audits. Conduct a post-installation quality review with the safety officer.<br><b>Resources needed:</b><br><ul><li>Construction crew</li><li>Thermal mass materials</li><li>Window installation kits</li><li>Safety officer</li></ul>",
      "start_date": "2026-07-02",
      "duration": 4.0,
      "progress": 0,
      "open": true,

    {
      "id": "82f1fc5a-c21d-448e-8fcd-dd52925a8476",
      "text": "Verify compliance and document work",
      "custom_tooltip": "<b>Verify compliance and document work</b><br>After installation, conduct a formal verification check against the project\u2019s thermal performance goals and building code requirements. Record all installation details, photos, and test results in the digital compliance log for future audit purposes.<br><b>Resources needed:</b><br><ul><li>Certified Arctic building specialist</li><li>Digital documentation platform</li><li>Compliance checklist</li><li>Bilingual sign-off forms</li></ul>",

    {
      "id": "d9078311-98a2-45d4-b3c0-3cfcdadb8d15",
      "text": "Deploy IoT Sensors",
      "custom_tooltip": "<b>Deploy IoT Sensors</b><br>Install temperature, humidity, and CO\u2082 sensors in the workshop space to monitor environmental conditions. Ensure all sensors are calibrated and connected to the central data platform. Conduct a test run for 48 hours to verify real-time data transmission and alert thresholds.<br><b>Resources needed:</b><br><ul><li>IoT sensor kits (temperature, humidity, CO\u2082)</li><li>Network connectivity hardware (Wi-Fi access points or cellular modems)</li><li>Data integration platform (e.g., Airtable, custom dashboard)</li><li>On-site technician with IoT setup experience</li><li>Bilingual installation checklist</li></ul>",
      "start_date": "2026-07-10",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "ff83ada1-0c17-449b-b913-19fe47e9fdff SS",

    {
      "id": "a8ed9093-64c4-4da7-9750-51075f50320f",
      "text": "Test Sensor Integration",
      "custom_tooltip": "<b>Test Sensor Integration</b><br>Validate that all sensors are correctly transmitting data to the monitoring system. Confirm that alerts trigger at predefined thresholds (e.g., high CO\u2082, extreme humidity). Perform a simulated failure test to ensure system resilience and response protocols.<br><b>Resources needed:</b><br><ul><li>Digital monitoring dashboard</li><li>Test scenarios (simulated environmental changes)</li><li>IT support specialist</li><li>Safety Officer for protocol verification</li><li>Logbook for recording integration issues</li></ul>",
      "start_date": "2026-07-13",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "d9078311-98a2-45d4-b3c0-3cfcdadb8d15 FS",
      "parent": "ff83ada1-0c17-449b-b913-19fe47e9fdff"
    },
    {
      "id": "de293425-e6ad-430f-a7a9-e87e68fe8d90",
      "text": "Train Staff on Sensor Use",
      "custom_tooltip": "<b>Train Staff on Sensor Use</b><br>Conduct hands-on training sessions for all staff and instructors on interpreting sensor data, responding to alerts, and using the dashboard during daily operations. Provide bilingual (Danish/Greenlandic) user guides and quick-reference cards.<br><b>Resources needed:</b><br><ul><li>Training materials (bilingual PDFs and videos)</li><li>Trainer (technical or facility manager)</li><li>Workshop space for training session</li><li>Digital shift calendar for scheduling</li><li>Feedback forms for post-training evaluation</li></ul>",
      "start_date": "2026-07-16",

      "open": true,

      "id": "e1fc9b0e-d456-447f-ac64-cabf886708a8",
      "text": "Complete Pre-Fit-Out Thermal Audit and Safety Training Rollout",
      "custom_tooltip": "<b>Complete Pre-Fit-Out Thermal Audit and Safety Training Rollout</b>",

    {
      "id": "97d9cab9-d1c9-4de8-96d5-89bb8ac380d3",
      "text": "Conduct Thermal Audit",
      "custom_tooltip": "<b>Conduct Thermal Audit</b><br>Perform a comprehensive pre-fit-out thermal audit of the workshop space using verified Arctic climate data and input from a certified Arctic building specialist. The audit will assess heat retention, insulation effectiveness, and identify potential weaknesses in the passive solar design under extreme winter conditions. Results will inform necessary upgrades to insulation and heating systems before fit-out begins.<br><b>Resources needed:</b><br><ul><li>Certified Arctic building specialist</li><li>Thermal modeling software (EnergyPlus)</li><li>Historical weather data from Danish Meteorological Institute</li><li>On-site measurement tools (thermal cameras, hygrometers)</li><li>Digital documentation platform for audit reports</li></ul>",
      "start_date": "2026-07-19",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "e1fc9b0e-d456-447f-ac64-cabf886708a8 SS",
      "parent": "e1fc9b0e-d456-447f-ac64-cabf886708a8"
    },
    {
      "id": "ec814677-e59d-4b28-9662-71fd287d6c03",
      "text": "Roll Out Safety Training",
      "custom_tooltip": "<b>Roll Out Safety Training</b><br>Develop and deliver mandatory safety training for all staff and future instructors, covering fire safety, kiln operation, material handling, emergency procedures, and compliance with Greenlandic Health and Safety at Work Act. Training will be bilingual (Danish/Greenlandic), include hands-on drills, and be integrated into onboarding via the digital shift calendar. Completion will be tracked and required before any operational activity.<br><b>Resources needed:</b><br><ul><li>Safety Officer</li><li>Bilingual safety training materials</li><li>Training venue and equipment</li><li>Digital shift calendar access</li><li>Record-keeping system for training logs</li></ul>",
      "start_date": "2026-07-23",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "97d9cab9-d1c9-4de8-96d5-89bb8ac380d3 FS",
      "parent": "e1fc9b0e-d456-447f-ac64-cabf886708a8"
    },
    {
      "id": "7ce97fe1-f367-45cc-9698-30f35cf0d31d",
      "text": "Verify Compliance Readiness",
      "custom_tooltip": "<b>Verify Compliance Readiness</b><br>Ensure all documentation and systems are ready for regulatory review by Nuuk Municipality. This includes verifying that safety training records, liability waivers, incident logs, and bilingual documentation are complete and accessible. Conduct a mock compliance check with the Katuaq Cultural Centre Oversight Committee to identify gaps and ensure alignment with Building Code Compliance Certificate and Fire Safety Certification requirements.<br><b>Resources needed:</b><br><ul><li>Compliance liaison</li><li>Digital tracking system for records</li><li>Bilingual documentation templates</li><li>Mock audit checklist</li><li>Access to oversight committee members</li></ul>",
      "start_date": "2026-07-27",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "e1fc9b0e-d456-447f-ac64-cabf886708a8 FF, ec814677-e59d-4b28-9662-71fd287d6c03 FS",
      "parent": "e1fc9b0e-d456-447f-ac64-cabf886708a8"
    },
    {
      "id": "2c7637d1-0052-4a8b-9db4-93011da00f4c",
      "text": "Implement 'Thermal Curfew' Protocol for Peak Winter Use",
      "custom_tooltip": "<b>Implement &#x27;Thermal Curfew&#x27; Protocol for Peak Winter Use</b>",
      "progress": 0,
      "open": true,
      "meta": "37442b7a-472c-4529-94a1-bc991b188f65 FF, e1fc9b0e-d456-447f-ac64-cabf886708a8 FS",
      "parent": "37442b7a-472c-4529-94a1-bc991b188f65",
      "type": "project"
    },
    {
      "id": "eec7cc9e-2666-4908-93f3-8b79ea9af09d",
      "text": "Co-Develop Curfew Policy",
      "custom_tooltip": "<b>Co-Develop Curfew Policy</b><br>Collaborate with instructors and volunteers to design a clear, enforceable &#x27;thermal curfew&#x27; protocol for peak winter use. Conduct a joint workshop to gather input on timing, enforcement methods, and user concerns. Ensure the policy aligns with safety standards and operational needs while minimizing disruption to course schedules.<br><b>Resources needed:</b><br><ul><li>Instructors</li><li>Volunteers</li><li>Safety Officer</li><li>Digital shift calendar</li><li>Bilingual signage templates</li></ul>",
      "start_date": "2026-07-31",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "2c7637d1-0052-4a8b-9db4-93011da00f4c SS",
      "parent": "2c7637d1-0052-4a8b-9db4-93011da00f4c"
    },
    {
      "id": "8d513742-ca11-4faf-afbe-6a8361d0fb61",
      "text": "Pilot Thermal Curfew Phase",
      "custom_tooltip": "<b>Pilot Thermal Curfew Phase</b><br>Implement a phased pilot of the thermal curfew protocol during winter months using real-time IoT sensor alerts. Monitor compliance, collect feedback from users, and adjust alert thresholds and communication strategies based on actual usage patterns and environmental data.<br><b>Resources needed:</b><br><ul><li>IoT environmental monitoring sensors</li><li>Digital shift calendar</li><li>Safety Officer</li><li>Facility Manager</li><li>Data integration platform</li></ul>",
      "start_date": "2026-08-02",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "eec7cc9e-2666-4908-93f3-8b79ea9af09d FS",
      "parent": "2c7637d1-0052-4a8b-9db4-93011da00f4c"
    },
    {
      "id": "d5ee91f5-46ee-4d7e-aa1e-d79c2c560f65",
      "text": "Integrate Curfew into Daily Operations",
      "custom_tooltip": "<b>Integrate Curfew into Daily Operations</b><br>Embed the thermal curfew into routine operations by updating digital dashboards, displaying bilingual signage at entry points, and including a mandatory orientation session before each winter session. Ensure all staff understand enforcement procedures and are trained to respond to alerts.<br><b>Resources needed:</b><br><ul><li>Bilingual signage</li><li>Digital shift calendar</li><li>Real-time tracking dashboard</li><li>Safety Officer</li><li>Training materials</li></ul>",
      "start_date": "2026-08-04",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "2c7637d1-0052-4a8b-9db4-93011da00f4c FF, 8d513742-ca11-4faf-afbe-6a8361d0fb61 FS",
      "parent": "2c7637d1-0052-4a8b-9db4-93011da00f4c"
    },

    {
      "id": "722892ab-573f-4456-904f-78ff0150e511",
      "text": "Develop Rotating Instructor Schedule with Cross-Training Plan",
      "custom_tooltip": "<b>Develop Rotating Instructor Schedule with Cross-Training Plan</b>",

    {
      "id": "0e6b02fd-1085-4996-9990-0ff017a98ad3",
      "text": "Develop Rotating Schedule",
      "custom_tooltip": "<b>Develop Rotating Schedule</b><br>Create a rotating instructor schedule that ensures consistent course coverage by assigning overlapping teaching hours and built-in backup periods. Include mandatory cross-training modules for all instructors in at least two core skill areas (hand-building and wheel-throwing) to maintain operational resilience. Use the digital shift calendar to coordinate availability, flag conflicts early, and ensure all instructors confirm their schedules at least 30 days in advance.<br><b>Resources needed:</b><br><ul><li>Digital shift calendar platform</li><li>Project manager</li><li>Instructor coordinator</li><li>Bilingual scheduling templates</li></ul>",
      "start_date": "2026-08-06",
      "duration": 7.0,
      "progress": 0,
      "open": true,
      "meta": "722892ab-573f-4456-904f-78ff0150e511 SS",

    },
    {
      "id": "b65080ea-d00e-4948-acdf-339c53b6bd32",
      "text": "Implement Cross-Training Plan",
      "custom_tooltip": "<b>Implement Cross-Training Plan</b><br>Design and deliver a structured cross-training program where each part-time instructor is trained in at least two core competencies\u2014hand-building and wheel-throwing\u2014by experienced peers. Track progress via the real-time dashboard, conduct bi-weekly check-ins to address gaps, and require certification before independent teaching eligibility. Ensure all training materials are available in both Danish and Greenlandic.<br><b>Resources needed:</b><br><ul><li>Cross-training curriculum</li><li>Senior instructors as trainers</li><li>Real-time tracking dashboard</li><li>Bilingual training materials</li></ul>",
      "start_date": "2026-08-13",
      "duration": 7.0,
      "progress": 0,
      "open": true,
      "meta": "0e6b02fd-1085-4996-9990-0ff017a98ad3 FS",
      "parent": "722892ab-573f-4456-904f-78ff0150e511"
    },
    {
      "id": "f0c707ad-9ab2-4027-8a7f-065a2a7aa2a0",
      "text": "Ensure Full Coverage Readiness",
      "custom_tooltip": "<b>Ensure Full Coverage Readiness</b><br>Verify that all instructors have completed cross-training, signed liability waivers, and passed safety certification prior to any session. Confirm 100% staff availability through the digital shift calendar with no unassigned time slots. Conduct a dry-run simulation of a full week\u2019s programming to test coverage under absences, using backup instructors from the rotating roster to fill gaps without disruption.<br><b>Resources needed:</b><br><ul><li>Digital shift calendar</li><li>Safety officer</li><li>Backup instructor roster</li><li>Simulation testing protocol</li></ul>",
      "start_date": "2026-08-20",
      "duration": 7.0,
      "progress": 0,
      "open": true,
      "meta": "722892ab-573f-4456-904f-78ff0150e511 FF, b65080ea-d00e-4948-acdf-339c53b6bd32 FS",
      "parent": "722892ab-573f-4456-904f-78ff0150e511"
    },
    {
      "id": "71b1909a-1121-47c8-b91f-83110fe9bec7",
      "text": "Launch Peer Mentorship Program for Senior-Junior Instructors",
      "custom_tooltip": "<b>Launch Peer Mentorship Program for Senior-Junior Instructors</b>",

    {
      "id": "28578a01-1b9b-4577-bdee-ba19d46821e0",
      "text": "Design Mentorship Structure",
      "custom_tooltip": "<b>Design Mentorship Structure</b><br>Define the framework for the peer mentorship program, including pairing criteria, duration of mentorship cycles, and expected outcomes. Develop a standardized toolkit with discussion guides, feedback forms, and milestone checklists to ensure consistency across all mentor-mentee relationships.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Cultural Liaison</li><li>Human Resources Lead</li><li>Digital Platform (e.g., Google Workspace, Notion)</li></ul>",
      "start_date": "2026-08-27",
      "duration": 8.0,
      "progress": 0,
      "open": true,
      "meta": "71b1909a-1121-47c8-b91f-83110fe9bec7 SS",

    },
    {
      "id": "325160d0-c507-44ef-9de1-5f8c2e853263",
      "text": "Identify and Onboard Mentors",
      "custom_tooltip": "<b>Identify and Onboard Mentors</b><br>Recruit senior instructors and experienced local artists to serve as mentors. Conduct interviews to assess suitability, confirm availability, and sign formal agreements outlining roles, responsibilities, and compensation (if applicable). Ensure all participants receive initial orientation on cultural protocols and program expectations.<br><b>Resources needed:</b><br><ul><li>Cultural Liaison</li><li>Safety Officer</li><li>HR Lead</li><li>Bilingual Recruitment Materials</li></ul>",
      "start_date": "2026-09-04",
      "duration": 8.0,
      "progress": 0,
      "open": true,
      "meta": "28578a01-1b9b-4577-bdee-ba19d46821e0 FS",
      "parent": "71b1909a-1121-47c8-b91f-83110fe9bec7"
    },
    {
      "id": "d19b0b77-fe12-4314-b44c-1ad86d4480a6",
      "text": "Launch Pilot Mentorship Cycle",
      "custom_tooltip": "<b>Launch Pilot Mentorship Cycle</b><br>Begin a trial mentorship program with 3\u20135 junior instructors or apprentices. Facilitate initial pairings, schedule regular check-ins, and collect real-time feedback using digital tools. Use this pilot to refine the structure, address challenges, and validate the effectiveness of the program before full rollout.<br><b>Resources needed:</b><br><ul><li>Facility Manager</li><li>Digital Shift Calendar</li><li>Feedback Collection Tools (Google Forms, Notion)</li><li>Mentorship Toolkit</li></ul>",
      "start_date": "2026-09-12",
      "duration": 8.0,
      "progress": 0,
      "open": true,
      "meta": "325160d0-c507-44ef-9de1-5f8c2e853263 FS",

    },
    {
      "id": "e0027894-96e6-43d4-a6bb-d1507f267c8a",
      "text": "Evaluate and Scale Program",
      "custom_tooltip": "<b>Evaluate and Scale Program</b><br>After the pilot, conduct a comprehensive review of participant satisfaction, skill development progress, and program impact. Gather input from mentors, mentees, and the advisory council. Finalize improvements and expand the program to include all new instructors, ensuring integration into the broader teaching fellowship model.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Advisory Council</li><li>Data Analyst</li><li>Bi-Monthly Survey System</li></ul>",
      "start_date": "2026-09-20",
      "duration": 8.0,
      "progress": 0,
      "open": true,
      "meta": "71b1909a-1121-47c8-b91f-83110fe9bec7 FF, d19b0b77-fe12-4314-b44c-1ad86d4480a6 FS",
      "parent": "71b1909a-1121-47c8-b91f-83110fe9bec7"
    },

      "custom_tooltip": "<b>Redesign Volunteer Instructor Program as Community Teaching Fellowship</b>",

    {
      "id": "36b5db04-599b-49c0-ac16-d13287dc3254",
      "text": "Develop Fellowship Charter",
      "custom_tooltip": "<b>Develop Fellowship Charter</b><br>Create a formal document outlining the roles, responsibilities, benefits, and expectations for the Community Teaching Fellowship. Include recognition pathways, skill credits, and structured onboarding procedures to ensure clarity and inclusivity. The charter must be co-developed with community leaders and approved by the advisory council.<br><b>Resources needed:</b><br><ul><li>Cultural Liaison</li><li>Legal Advisor</li><li>Project Manager</li><li>Community Leaders</li></ul>",
      "start_date": "2026-09-28",

    },
    {
      "id": "0dd2d2dd-943f-4552-aeb9-b19bb76ea9a5",
      "text": "Design Training Curriculum",
      "custom_tooltip": "<b>Design Training Curriculum</b><br>Develop a comprehensive 12-hour certification program covering safety protocols, cultural sensitivity, teaching fundamentals, and emergency response. Use tools like Canva and Google Forms to create interactive modules. Include role-playing scenarios to simulate real-world challenges and ensure all content is available in both Danish and Greenlandic.<br><b>Resources needed:</b><br><ul><li>Safety Officer</li><li>Cultural Liaison</li><li>Human Resources Lead</li><li>Training Specialist</li></ul>",
      "start_date": "2026-10-03",
      "duration": 5.0,
      "progress": 0,

    },
    {
      "id": "c80ce3f0-09a2-4b51-8e99-8da6523e080c",
      "text": "Implement Onboarding System",
      "custom_tooltip": "<b>Implement Onboarding System</b><br>Build a digital onboarding kit with bilingual (Danish/Greenlandic) materials, including welcome guides, liability waiver templates, and training schedules. Test the system with a group of retired artists through a dry-run session to validate usability and gather feedback before full rollout.<br><b>Resources needed:</b><br><ul><li>Digital Platform Specialist</li><li>Cultural Liaison</li><li>Facility Manager</li><li>Retired Artists</li></ul>",
      "start_date": "2026-10-08",
      "duration": 5.0,
      "progress": 0,
      "open": true,
      "meta": "0dd2d2dd-943f-4552-aeb9-b19bb76ea9a5 FS",
      "parent": "84b5890e-fde8-432b-961a-a6d678b29b47"
    },
    {
      "id": "35036b89-1aef-49bd-ba79-360645dccbc3",
      "text": "Secure Insurance & Waivers",
      "custom_tooltip": "<b>Secure Insurance &amp; Waivers</b><br>Finalize and execute a $500,000 general liability insurance policy for volunteers. Develop and distribute legally compliant liability waivers that are signed by all participants. Ensure all documentation is bilingual and stored securely in a centralized digital system with automated tracking.<br><b>Resources needed:</b><br><ul><li>Insurance Provider</li><li>Legal Advisor</li><li>Safety Officer</li><li>Compliance Coordinator</li></ul>",
      "start_date": "2026-10-13",
      "duration": 5.0,
      "progress": 0,
      "open": true,
      "meta": "c80ce3f0-09a2-4b51-8e99-8da6523e080c FS",
      "parent": "84b5890e-fde8-432b-961a-a6d678b29b47"
    },
    {
      "id": "d47a9504-1cd4-49e6-9ceb-0a4b898334ba",
      "text": "Launch Certification Program",
      "custom_tooltip": "<b>Launch Certification Program</b><br>Roll out the fully operational &#x27;Community Teaching Fellowship&#x27; by conducting the first live training session via Zoom. Use badge.io to issue digital badges upon completion. Track participation, certifications, and waiver submissions in a shared Notion dashboard to confirm 100% compliance before any instructor-led sessions begin.<br><b>Resources needed:</b><br><ul><li>Volunteer Management Specialist</li><li>Technical Support Lead</li><li>Advisory Council</li><li>Digital Dashboard</li></ul>",
      "start_date": "2026-10-18",
      "duration": 5.0,
      "progress": 0,
      "open": true,

      "custom_tooltip": "<b>Implement Digital Shift Calendar and Real-Time Tracking Dashboard</b>",

    {
      "id": "f7d97fbc-b462-4f6d-b205-60a421433763",
      "text": "Set up cloud platform",
      "custom_tooltip": "<b>Set up cloud platform</b><br>Configure a reliable cloud-based scheduling system using Google Workspace and Airtable to support real-time collaboration. This includes setting up user accounts, defining access roles, creating templates for shift calendars, and integrating with existing project management tools. Ensure the platform is accessible offline and supports bilingual (Danish/Greenlandic) interfaces.<br><b>Resources needed:</b><br><ul><li>Cloud platform administrator</li><li>Digital shift calendar software (Google Workspace + Airtable)</li><li>Bilingual UI designer</li><li>Technical liaison for troubleshooting</li></ul>",

      "meta": "4f582103-5e0d-487b-a6d6-ec386234fb45 SS",

    {
      "id": "75c91d5c-cafb-47c3-b193-dd957154ead7",
      "text": "Develop digital onboarding workflow",
      "custom_tooltip": "<b>Develop digital onboarding workflow</b><br>Create a standardized onboarding process for instructors and volunteers using Canva and Google Forms. Include multilingual forms for consent, training schedules, and safety protocols. Integrate automated reminders and progress tracking into the digital dashboard to ensure timely completion of all onboarding steps.<br><b>Resources needed:</b><br><ul><li>Onboarding content developer</li><li>Canva design specialist</li><li>Google Forms expert</li><li>Digital dashboard integrator</li></ul>",
      "start_date": "2026-10-26",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "f7d97fbc-b462-4f6d-b205-60a421433763 FS",

    },
    {
      "id": "878a22e0-f045-4362-8ce3-12dadf4f483c",
      "text": "Test system integration and usability",
      "custom_tooltip": "<b>Test system integration and usability</b><br>Conduct a pilot test with one instructor and two volunteers to validate the functionality of the digital shift calendar and real-time tracking dashboard. Identify bugs, usability issues, and communication gaps. Gather feedback through structured interviews and refine the system before full rollout.<br><b>Resources needed:</b><br><ul><li>Pilot participants (instructors and volunteers)</li><li>Usability tester</li><li>Feedback coordinator</li><li>Technical support lead</li></ul>",
      "start_date": "2026-10-29",
      "duration": 3.0,

      "meta": "75c91d5c-cafb-47c3-b193-dd957154ead7 FS",

    },
    {
      "id": "3ddb1919-7dd2-49cf-a497-d2043fa33ba6",
      "text": "Train staff on digital tools",
      "custom_tooltip": "<b>Train staff on digital tools</b><br>Deliver hands-on training sessions for all staff and instructors on how to use the digital shift calendar and real-time tracking dashboard. Cover navigation, scheduling, conflict resolution, and data entry. Provide bilingual training materials and conduct follow-up check-ins to reinforce learning.<br><b>Resources needed:</b><br><ul><li>Trainer (HR or tech lead)</li><li>Bilingual training materials</li><li>Training venue and equipment</li><li>Follow-up facilitator</li></ul>",
      "start_date": "2026-11-01",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "878a22e0-f045-4362-8ce3-12dadf4f483c FS",
