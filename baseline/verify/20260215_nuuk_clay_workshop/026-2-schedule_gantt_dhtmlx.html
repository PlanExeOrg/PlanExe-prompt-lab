    },
    {
      "id": "bdba13c2-9832-4b72-b73b-ffa3356225a8",
      "text": "Roll out system to full team",
      "custom_tooltip": "<b>Roll out system to full team</b><br>Deploy the digital shift calendar and real-time tracking dashboard to all staff and instructors. Monitor initial usage for at least one week, address any technical or procedural issues promptly, and confirm that all users are actively engaged and compliant with the new system.<br><b>Resources needed:</b><br><ul><li>Project manager</li><li>IT support technician</li><li>Digital dashboard monitor</li><li>Compliance officer</li></ul>",
      "start_date": "2026-11-04",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "4f582103-5e0d-487b-a6d6-ec386234fb45 FF, 3ddb1919-7dd2-49cf-a497-d2043fa33ba6 FS",
      "parent": "4f582103-5e0d-487b-a6d6-ec386234fb45"
    },
    {
      "id": "81667548-d46c-4197-8574-3915bf2df3d6",
      "text": "Conduct Monthly Safety Drills with Full Staff Participation",
      "custom_tooltip": "<b>Conduct Monthly Safety Drills with Full Staff Participation</b>",

      "open": true,
      "meta": "248a0bcd-9e33-45f3-8a52-7138fcfdb319 FF, 4f582103-5e0d-487b-a6d6-ec386234fb45 FS",

    {
      "id": "ee1c5c85-ee58-40dd-80a8-ebcb2f2921b9",
      "text": "Schedule Monthly Drills",
      "custom_tooltip": "<b>Schedule Monthly Drills</b><br>Organize and conduct monthly safety drills involving all staff to reinforce emergency protocols, team readiness, and compliance with operational procedures. Ensure drills are held on the first Friday of each month, integrated into the rotating instructor schedule, and include real-time feedback collection for continuous improvement.<br><b>Resources needed:</b><br><ul><li>Safety Officer</li><li>Digital Shift Calendar</li><li>Bilingual Safety Briefings</li><li>Instructors and Volunteers</li></ul>",
      "start_date": "2026-11-07",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "81667548-d46c-4197-8574-3915bf2df3d6 SS",
      "parent": "81667548-d46c-4197-8574-3915bf2df3d6"
    },
    {
      "id": "92ad12c8-3841-4421-8cd4-5c21546e395c",
      "text": "Integrate Drill Participation in Performance Reviews",
      "custom_tooltip": "<b>Integrate Drill Participation in Performance Reviews</b><br>Embed participation in monthly safety drills as a formal component of staff performance evaluations. Use the digital shift calendar to track attendance and ensure accountability by linking drill completion to performance metrics and professional development records.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Digital Shift Calendar</li><li>Performance Review Templates</li><li>Safety Officer</li></ul>",
      "start_date": "2026-11-11",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "ee1c5c85-ee58-40dd-80a8-ebcb2f2921b9 FS",
      "parent": "81667548-d46c-4197-8574-3915bf2df3d6"
    },
    {
      "id": "ac123fba-66b8-43c0-858c-2516c0547b88",
      "text": "Conduct Drill Orientation Before Each Session",
      "custom_tooltip": "<b>Conduct Drill Orientation Before Each Session</b><br>Deliver a brief orientation session before every monthly safety drill to remind participants of protocols, roles, and objectives. Use bilingual (Danish/Greenlandic) materials and display clear signage at entry points to reinforce awareness and reduce confusion during drills.<br><b>Resources needed:</b><br><ul><li>Safety Officer</li><li>Bilingual Signage</li><li>Orientation Scripts</li><li>Instructors</li></ul>",
      "start_date": "2026-11-15",
      "duration": 4.0,
      "progress": 0,
      "open": true,

    {
      "id": "f1d3758c-6ca5-4dae-866a-555837a500f3",
      "text": "Form Advisory Council",
      "custom_tooltip": "<b>Form Advisory Council</b><br>Establish a formal advisory council comprising elders and local artists to guide cultural content, ensure community ownership, and provide ongoing feedback. This includes scheduling initial meetings, defining roles and responsibilities, and creating a communication protocol for regular engagement.<br><b>Resources needed:</b><br><ul><li>Cultural Liaison</li><li>Local Community Leaders</li><li>Bilingual Meeting Facilitator</li><li>Digital Collaboration Platform (e.g., Notion or Zoom)</li></ul>",
      "start_date": "2026-11-19",
      "duration": 7.0,
      "progress": 0,
      "open": true,
      "meta": "00291540-5289-4c88-b776-7897f764a344 SS",

    },
    {
      "id": "1ad168cd-1dc4-4978-a4ec-7c85cb140f73",
      "text": "Co-Develop CIPR Framework",
      "custom_tooltip": "<b>Co-Develop CIPR Framework</b><br>Collaboratively draft the Community Intellectual Property Rights (CIPR) framework through participatory workshops with elders, artists, and legal advisors. Define rules for access, consent, representation, and co-creation of traditional motifs and narratives, ensuring alignment with Inuit cultural values and Greenlandic legal standards.<br><b>Resources needed:</b><br><ul><li>Indigenous Research Ethics Consultant</li><li>Legal Advisor</li><li>Cultural Liaison</li><li>Drafting Tools (Notion, Google Docs)</li></ul>",
      "start_date": "2026-11-26",
      "duration": 7.0,
      "progress": 0,
      "open": true,
      "meta": "f1d3758c-6ca5-4dae-866a-555837a500f3 FS",
      "parent": "00291540-5289-4c88-b776-7897f764a344"
    },
    {
      "id": "80a43429-894f-49a0-8570-7e490cee4fb9",
      "text": "Obtain Formal Approval",
      "custom_tooltip": "<b>Obtain Formal Approval</b><br>Submit the finalized CIPR framework to the Inuit Cultural Heritage Council for official endorsement. Secure written consent from elders and artists on all culturally sensitive content, including approved and restricted motifs, and document all agreements in both Danish and Greenlandic.<br><b>Resources needed:</b><br><ul><li>Inuit Cultural Heritage Council</li><li>Legal Advisor</li><li>Cultural Liaison</li><li>Signed Consent Templates</li></ul>",
      "start_date": "2026-12-03",
      "duration": 7.0,
      "progress": 0,
      "open": true,
      "meta": "00291540-5289-4c88-b776-7897f764a344 FF, 1ad168cd-1dc4-4978-a4ec-7c85cb140f73 FS",
      "parent": "00291540-5289-4c88-b776-7897f764a344"
    },
    {
      "id": "57b658c3-c8bc-4124-89bd-5c043c809676",
      "text": "Finalize and Obtain Approval of Community Intellectual Property Rights (CIPR) Framework",
      "custom_tooltip": "<b>Finalize and Obtain Approval of Community Intellectual Property Rights (CIPR) Framework</b>",
      "progress": 0,

      "meta": "00291540-5289-4c88-b776-7897f764a344 FS",

    {
      "id": "59b6354a-61a2-43f5-9d4c-678f5c4083cb",
      "text": "Draft CIPR Framework",
      "custom_tooltip": "<b>Draft CIPR Framework</b><br>Develop a preliminary version of the Community Intellectual Property Rights (CIPR) framework through collaborative workshops with elders, local artists, and legal advisors. Define core principles such as consent protocols, access tiers, and cultural ownership boundaries. Ensure all documentation is drafted in both Danish and Greenlandic to support inclusive participation.<br><b>Resources needed:</b><br><ul><li>Cultural Liaison</li><li>Legal Advisor</li><li>Indigenous Research Ethics Consultant</li><li>Bilingual workshop facilitators</li><li>Notion or similar digital collaboration tool</li></ul>",
      "start_date": "2026-12-10",
      "duration": 8.0,
      "progress": 0,
      "open": true,
      "meta": "57b658c3-c8bc-4124-89bd-5c043c809676 SS",
      "parent": "57b658c3-c8bc-4124-89bd-5c043c809676"
    },
    {
      "id": "55d5b113-610d-47d1-b9e4-5cc2660eabd2",
      "text": "Conduct Cultural Review Workshop",
      "custom_tooltip": "<b>Conduct Cultural Review Workshop</b><br>Host a virtual or in-person workshop with elders and local artists to review the draft CIPR framework. Gather feedback on content sensitivity, representation accuracy, and community alignment. Use structured discussion guides and recording tools to document consensus and dissent, ensuring all input is formally captured.<br><b>Resources needed:</b><br><ul><li>Elders and Local Artists (advisory council members)</li><li>Cultural Liaison</li><li>Facilitator trained in Indigenous consultation methods</li><li>Recording equipment and transcription services</li><li>Bilingual meeting materials</li></ul>",
      "start_date": "2026-12-18",
      "duration": 8.0,
      "progress": 0,
      "open": true,
      "meta": "59b6354a-61a2-43f5-9d4c-678f5c4083cb FS",
      "parent": "57b658c3-c8bc-4124-89bd-5c043c809676"
    },
    {
      "id": "866e4850-c54c-4458-8407-67dd9cbbe345",
      "text": "Finalize Consent Protocols",
      "custom_tooltip": "<b>Finalize Consent Protocols</b><br>Refine the CIPR framework based on feedback from the cultural review workshop. Finalize templates for written consent forms, approval workflows, and tiered access rules. Ensure all documents are legally sound, culturally respectful, and compliant with Greenlandic IP and labor laws.<br><b>Resources needed:</b><br><ul><li>Legal Advisor</li><li>Cultural Liaison</li><li>National Labour Inspectorate (Greenland)</li><li>Inuit Cultural Heritage Council</li><li>Digital form platform (e.g., Notion, Google Forms)</li></ul>",
      "start_date": "2026-12-26",
      "duration": 8.0,
      "progress": 0,
      "open": true,
      "meta": "55d5b113-610d-47d1-b9e4-5cc2660eabd2 FS",
      "parent": "57b658c3-c8bc-4124-89bd-5c043c809676"
    },
    {
      "id": "8f2104d5-c695-4d2e-95e5-90cb0fd96721",
      "text": "Obtain Formal Endorsement",
      "custom_tooltip": "<b>Obtain Formal Endorsement</b><br>Submit the finalized CIPR framework to the Inuit Cultural Heritage Council for formal approval. Present findings, consent records, and community feedback. Secure a signed agreement and official list of approved and restricted motifs before any public-facing cultural programming begins.<br><b>Resources needed:</b><br><ul><li>Inuit Cultural Heritage Council</li><li>Project Manager</li><li>Cultural Liaison</li><li>Legal Advisor</li><li>Signed agreement template and notarization services</li></ul>",
      "start_date": "2027-01-03",
      "duration": 8.0,
      "progress": 0,
      "open": true,
      "meta": "57b658c3-c8bc-4124-89bd-5c043c809676 FF, 866e4850-c54c-4458-8407-67dd9cbbe345 FS",
      "parent": "57b658c3-c8bc-4124-89bd-5c043c809676"
    },
    {
      "id": "33640969-b1e5-46db-a6d7-59b9523d924c",
      "text": "Co-Host Quarterly Exhibitions with Katuaq Cultural Centre",
      "custom_tooltip": "<b>Co-Host Quarterly Exhibitions with Katuaq Cultural Centre</b>",
      "progress": 0,
      "open": true,
      "meta": "57b658c3-c8bc-4124-89bd-5c043c809676 FS",
      "parent": "955c800a-6f73-42f5-b96c-71d4244bff9f",
      "type": "project"
    },
    {
      "id": "4573fc14-d85f-4737-b34d-f3d38acddc18",
      "text": "Finalize CIPR Framework",
      "custom_tooltip": "<b>Finalize CIPR Framework</b><br>Develop and secure formal approval of a Community Intellectual Property Rights (CIPR) framework with the Inuit Cultural Heritage Council. This includes drafting principles, creating consent templates in both Danish and Greenlandic, establishing a decision-making hierarchy for cultural content, and obtaining written agreement on approved and restricted motifs. The framework must ensure community sovereignty over traditional narratives and prevent cultural appropriation.<br><b>Resources needed:</b><br><ul><li>Cultural Liaison</li><li>Project Manager</li><li>Legal Advisor</li><li>Indigenous Research Ethics Consultant</li><li>Inuit Cultural Heritage Council</li><li>Bilingual documentation tools (Notion, Canva)</li><li>Digital consent form templates</li></ul>",
      "start_date": "2027-01-11",
      "duration": 8.0,
      "progress": 0,
      "open": true,
      "meta": "33640969-b1e5-46db-a6d7-59b9523d924c SS",
      "parent": "33640969-b1e5-46db-a6d7-59b9523d924c"
    },
    {
      "id": "af45eb66-5729-4199-97c4-a9405f88cb8c",
      "text": "Secure Community Consent",
      "custom_tooltip": "<b>Secure Community Consent</b><br>Obtain written consent from elders and local artists for all traditional motifs, stories, and cultural representations to be used in courses, exhibitions, and digital content. Conduct virtual or in-person consultations using culturally appropriate methods, record feedback, and document approvals with clear signatures or digital attestations in both Danish and Greenlandic.<br><b>Resources needed:</b><br><ul><li>Cultural Liaison</li><li>Elders and Artists (Advisory Council)</li><li>Bilingual facilitators</li><li>Consent documentation templates</li><li>Recording devices and secure digital storage</li></ul>",
      "start_date": "2027-01-19",
      "duration": 8.0,
      "progress": 0,
      "open": true,
      "meta": "4573fc14-d85f-4737-b34d-f3d38acddc18 FS",
      "parent": "33640969-b1e5-46db-a6d7-59b9523d924c"
    },
    {
      "id": "95a9f4e4-9f15-4f8c-9466-c15e32250b18",
      "text": "Establish Approval Workflow",
      "custom_tooltip": "<b>Establish Approval Workflow</b><br>Design and implement a standardized, transparent workflow for reviewing and approving cultural content before public use. Define roles (e.g., advisory council, legal review, safety officer), set clear timelines, and integrate the process into the project\u2019s digital dashboard. Ensure all submissions are tracked, reviewed, and documented with version control.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Cultural Liaison</li><li>Legal Advisor</li><li>Digital workflow platform (e.g., Notion, Airtable)</li><li>Approval checklist template</li><li>Bilingual communication materials</li></ul>",
      "start_date": "2027-01-27",
      "duration": 8.0,
      "progress": 0,
      "open": true,
      "meta": "af45eb66-5729-4199-97c4-a9405f88cb8c FS",
      "parent": "33640969-b1e5-46db-a6d7-59b9523d924c"
    },
    {
      "id": "311967e2-25ba-47a5-b8c6-cbd175285a6a",
      "text": "Integrate CIPR into Curriculum",
      "custom_tooltip": "<b>Integrate CIPR into Curriculum</b><br>Embed the finalized CIPR framework into beginner courses by co-designing modules with elders and artists. Ensure all course content involving traditional forms or narratives is pre-approved, includes proper attribution, and reflects community input. Train instructors on cultural protocols and compliance requirements.<br><b>Resources needed:</b><br><ul><li>Four Part-Time Instructors</li><li>Cultural Liaison</li><li>Elders and Local Artists</li><li>Curriculum development toolkit</li><li>Bilingual training materials</li><li>Digital shift calendar</li></ul>",
      "start_date": "2027-02-04",
      "duration": 8.0,
      "progress": 0,
      "open": true,
      "meta": "33640969-b1e5-46db-a6d7-59b9523d924c FF, 95a9f4e4-9f15-4f8c-9466-c15e32250b18 FS",
      "parent": "33640969-b1e5-46db-a6d7-59b9523d924c"
    },
    {
      "id": "466d26da-b322-4e72-9a1f-88a6b6065e76",
      "text": "Integrate Traditional Forms and Narratives into Beginner Courses",
      "custom_tooltip": "<b>Integrate Traditional Forms and Narratives into Beginner Courses</b>",
      "progress": 0,
      "open": true,
      "meta": "33640969-b1e5-46db-a6d7-59b9523d924c FS",
      "parent": "955c800a-6f73-42f5-b96c-71d4244bff9f",
      "type": "project"
    },
    {
      "id": "afaa9795-0c5e-4cfd-899e-8f8642a943bc",
      "text": "Finalize Cultural Content",
      "custom_tooltip": "<b>Finalize Cultural Content</b><br>Collaborate with elders and local artists through the advisory council to review and approve traditional forms, narratives, and motifs for inclusion in beginner courses. Ensure all content aligns with community values and cultural protocols, with written consent obtained for each element before integration.<br><b>Resources needed:</b><br><ul><li>Advisory council (elders and artists)</li><li>Cultural Liaison</li><li>Bilingual documentation tools</li><li>Consent form templates</li></ul>",
      "start_date": "2027-02-12",
      "duration": 8.0,
      "progress": 0,
      "open": true,
      "meta": "466d26da-b322-4e72-9a1f-88a6b6065e76 SS",
      "parent": "466d26da-b322-4e72-9a1f-88a6b6065e76"
    },
    {
      "id": "22f54e2c-12f1-4ac3-aeff-c01035c0fb7e",
      "text": "Develop Pedagogical Framework",
      "custom_tooltip": "<b>Develop Pedagogical Framework</b><br>Design beginner course modules that integrate approved traditional content into accessible, age-appropriate lessons. Include hands-on activities, storytelling components, and safety guidelines, ensuring alignment with both educational standards and cultural integrity.<br><b>Resources needed:</b><br><ul><li>Four part-time instructors</li><li>Cultural Liaison</li><li>Curriculum development toolkit</li><li>Digital course builder (e.g., Notion or Google Docs)</li></ul>",
      "start_date": "2027-02-20",
      "duration": 8.0,
      "progress": 0,
      "open": true,
      "meta": "afaa9795-0c5e-4cfd-899e-8f8642a943bc FS",
      "parent": "466d26da-b322-4e72-9a1f-88a6b6065e76"
    },
    {
      "id": "7def817f-d5c1-4391-91e9-7e9acfb22152",
      "text": "Conduct Pilot Course Review",
      "custom_tooltip": "<b>Conduct Pilot Course Review</b><br>Host a trial session with a small group of community members, including youth and elders, to test the course structure, content clarity, and cultural sensitivity. Gather feedback using bilingual surveys and adjust the curriculum based on input.<br><b>Resources needed:</b><br><ul><li>Pilot participants (10\u201315 people)</li><li>Facility manager</li><li>Bilingual survey forms</li><li>Feedback analysis tool</li></ul>",
      "start_date": "2027-02-28",
      "duration": 8.0,
      "progress": 0,
      "open": true,
      "meta": "22f54e2c-12f1-4ac3-aeff-c01035c0fb7e FS",
      "parent": "466d26da-b322-4e72-9a1f-88a6b6065e76"
    },
    {
      "id": "3c0c41a4-7339-47f2-85f7-5ff6dc8b263e",
      "text": "Integrate Feedback and Finalize Curriculum",
      "custom_tooltip": "<b>Integrate Feedback and Finalize Curriculum</b><br>Compile feedback from the pilot session, revise course materials accordingly, and obtain final sign-off from the advisory council. Ensure all changes are documented and version-controlled for transparency and future reference.<br><b>Resources needed:</b><br><ul><li>Advisory council</li><li>Project manager</li><li>Digital document repository</li><li>Version control system</li></ul>",
      "start_date": "2027-03-08",
      "duration": 8.0,
      "progress": 0,
      "open": true,
      "meta": "7def817f-d5c1-4391-91e9-7e9acfb22152 FS",
      "parent": "466d26da-b322-4e72-9a1f-88a6b6065e76"
    },
    {
      "id": "91b382ff-62dc-4fd9-822d-ffc8f4b5ce50",
      "text": "Train Instructors on Cultural Integration",
      "custom_tooltip": "<b>Train Instructors on Cultural Integration</b><br>Deliver a mandatory training session for all instructors on the cultural context, ethical use of traditional content, and teaching protocols. Use role-playing scenarios and real examples to reinforce understanding and ensure consistent delivery across sessions.<br><b>Resources needed:</b><br><ul><li>Instructors</li><li>Cultural Liaison</li><li>Training materials (bilingual)</li><li>Digital training platform</li></ul>",
      "start_date": "2027-03-16",
      "duration": 8.0,
      "progress": 0,
      "open": true,
      "meta": "466d26da-b322-4e72-9a1f-88a6b6065e76 FF, 3c0c41a4-7339-47f2-85f7-5ff6dc8b263e FS",
      "parent": "466d26da-b322-4e72-9a1f-88a6b6065e76"
    },
    {
      "id": "9662c55b-6978-490d-8697-27b628054d06",
      "text": "Ensure All Communications and Signage Are Bilingual (Danish/Greenlandic)",
      "custom_tooltip": "<b>Ensure All Communications and Signage Are Bilingual (Danish/Greenlandic)</b>",
      "progress": 0,
      "open": true,
      "meta": "955c800a-6f73-42f5-b96c-71d4244bff9f FF, 466d26da-b322-4e72-9a1f-88a6b6065e76 FS",
      "parent": "955c800a-6f73-42f5-b96c-71d4244bff9f",
      "type": "project"
    },
    {
      "id": "37c25e45-70c9-4911-b25d-cf79c061ee0e",
      "text": "Finalize bilingual signage",
      "custom_tooltip": "<b>Finalize bilingual signage</b><br>Develop and finalize all physical and digital signage in both Danish and Greenlandic, ensuring linguistic accuracy and cultural appropriateness. This includes safety warnings, course instructions, facility maps, and exhibition labels. Collaborate with a certified Greenlandic language specialist and a local cultural liaison to review each piece before production.<br><b>Resources needed:</b><br><ul><li>Certified Greenlandic language specialist</li><li>Local cultural liaison</li><li>Graphic designer</li><li>Bilingual translation software</li><li>Print and installation materials</li></ul>",
      "start_date": "2027-03-24",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "9662c55b-6978-490d-8697-27b628054d06 SS",
      "parent": "9662c55b-6978-490d-8697-27b628054d06"
    },
    {
      "id": "cb561866-61fe-44ad-9a79-a4cc9a36fb00",
      "text": "Review cultural sensitivity",
      "custom_tooltip": "<b>Review cultural sensitivity</b><br>Conduct a thorough review of all signage content with the advisory council of elders and local artists to ensure no cultural misrepresentation or offense. Address feedback promptly and incorporate revisions into final designs. Maintain a documented approval trail for compliance and transparency.<br><b>Resources needed:</b><br><ul><li>Advisory council (elders and artists)</li><li>Cultural liaison</li><li>Project manager</li><li>Digital documentation platform</li></ul>",
      "start_date": "2027-03-28",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "37c25e45-70c9-4911-b25d-cf79c061ee0e FS",
      "parent": "9662c55b-6978-490d-8697-27b628054d06"
    },
    {
      "id": "db08927c-ea38-456d-9471-27413729b1d4",
      "text": "Produce and install signage",
      "custom_tooltip": "<b>Produce and install signage</b><br>Manufacture and install all finalized signage throughout the workshop, including entry points, kiln zones, drying areas, and exhibition spaces. Ensure placement adheres to safety standards and visibility requirements. Use weather-resistant materials suitable for Arctic conditions.<br><b>Resources needed:</b><br><ul><li>Signage production team</li><li>Installation crew</li><li>Weather-resistant mounting hardware</li><li>Safety harnesses and tools</li></ul>",
      "start_date": "2027-04-01",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "cb561866-61fe-44ad-9a79-a4cc9a36fb00 FS",
      "parent": "9662c55b-6978-490d-8697-27b628054d06"
    },
    {
      "id": "e726a0b7-5835-43a3-b475-7350163877a9",
      "text": "Verify compliance with regulations",
      "custom_tooltip": "<b>Verify compliance with regulations</b><br>Confirm that all signage meets regulatory requirements under the Greenlander Health and Safety at Work Act and bilingual documentation mandates. Submit final installations to the National Labour Inspectorate (Greenland) for formal verification and obtain written confirmation of compliance.<br><b>Resources needed:</b><br><ul><li>Safety Officer</li><li>Legal advisor</li><li>National Labour Inspectorate contact</li><li>Compliance checklist</li></ul>",
      "start_date": "2027-04-05",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "db08927c-ea38-456d-9471-27413729b1d4 FS",
      "parent": "9662c55b-6978-490d-8697-27b628054d06"
    },
    {
      "id": "d448100a-1ac3-4590-9293-bd8d39a45e1e",
      "text": "Train staff on signage use",
      "custom_tooltip": "<b>Train staff on signage use</b><br>Conduct a mandatory training session for all instructors and staff on the meaning, location, and purpose of each signage element. Include real-time scenarios where staff must interpret signs during simulated emergencies or visitor inquiries. Track attendance and comprehension via digital quiz.<br><b>Resources needed:</b><br><ul><li>Safety Officer</li><li>Training materials (bilingual)</li><li>Digital quiz platform</li><li>Instructors and staff</li></ul>",
      "start_date": "2027-04-09",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "9662c55b-6978-490d-8697-27b628054d06 FF, e726a0b7-5835-43a3-b475-7350163877a9 FS",
      "parent": "9662c55b-6978-490d-8697-27b628054d06"
    },
    {
      "id": "59d1e4fb-5761-4e90-8d9c-3233ffaef27d",
      "text": "Develop Material Adaptation Strategy",
      "custom_tooltip": "<b>Develop Material Adaptation Strategy</b>",
      "progress": 0,
      "open": true,
      "meta": "955c800a-6f73-42f5-b96c-71d4244bff9f FS",
      "parent": "c0116ebd-d576-42fa-a84b-dfa64afc7411",
      "type": "project"
    },
    {
      "id": "121599ca-354b-47fe-8bcf-4ae69faffb43",
      "text": "Conduct Material Co-Creation Working Group Trials with Locally Sourced Minerals",
      "custom_tooltip": "<b>Conduct Material Co-Creation Working Group Trials with Locally Sourced Minerals</b>",
      "progress": 0,
      "open": true,
      "meta": "59d1e4fb-5761-4e90-8d9c-3233ffaef27d SS",
      "parent": "59d1e4fb-5761-4e90-8d9c-3233ffaef27d",
      "type": "project"
    },
    {
      "id": "fb8eb40f-e29f-45b4-97b1-6eaf1aecc668",
      "text": "Source Local Minerals",
      "custom_tooltip": "<b>Source Local Minerals</b><br>Identify and secure access to viable local mineral sources such as glacial sand and volcanic ash through partnerships with Greenlandic geologists, mining cooperatives, and community leaders. Conduct initial feasibility assessments and obtain pre-approval from the advisory council for material sourcing.<br><b>Resources needed:</b><br><ul><li>Greenlandic geologist</li><li>Local mining cooperative contact</li><li>Cultural liaison</li><li>Advisory council members</li></ul>",
      "start_date": "2027-04-13",
      "duration": 5.0,
      "progress": 0,
      "open": true,
      "meta": "121599ca-354b-47fe-8bcf-4ae69faffb43 SS",
      "parent": "121599ca-354b-47fe-8bcf-4ae69faffb43"
    },
    {
      "id": "6cb69dfc-dcb1-46df-b62c-03ba184b8967",
      "text": "Prepare Blended Clay Batches",
      "custom_tooltip": "<b>Prepare Blended Clay Batches</b><br>Create 10 small batches of blended clay using varying ratios (70% imported clay, 30% local minerals). Document each batch with precise measurements and label them for tracking. Store samples in controlled conditions to prevent contamination or degradation.<br><b>Resources needed:</b><br><ul><li>Clay mixing station</li><li>Digital scale</li><li>Bilingual field notebooks</li><li>Labeling materials</li></ul>",
      "start_date": "2027-04-18",
      "duration": 5.0,
      "progress": 0,
      "open": true,
      "meta": "fb8eb40f-e29f-45b4-97b1-6eaf1aecc668 FS",
      "parent": "121599ca-354b-47fe-8bcf-4ae69faffb43"
    },
    {
      "id": "498d11bf-94f4-4f8e-9ef3-ce635c65f030",
      "text": "Conduct Firing Tests",
      "custom_tooltip": "<b>Conduct Firing Tests</b><br>Fire each blended clay batch at standard temperatures (1000\u00b0C\u20131200\u00b0C) using modular kilns. Monitor and record shrinkage rate, weight loss, structural integrity, and cracking incidence post-firing. Compare results against baseline imported clay performance.<br><b>Resources needed:</b><br><ul><li>Modular kiln</li><li>Temperature monitoring equipment</li><li>Digital calipers</li><li>Safety gear</li></ul>",
      "start_date": "2027-04-23",
      "duration": 5.0,
      "progress": 0,
      "open": true,
      "meta": "6cb69dfc-dcb1-46df-b62c-03ba184b8967 FS",
      "parent": "121599ca-354b-47fe-8bcf-4ae69faffb43"
    },
    {
      "id": "462b1230-1e8b-44f9-8476-cdc9739570e1",
      "text": "Gather Cultural Feedback",
      "custom_tooltip": "<b>Gather Cultural Feedback</b><br>Host a joint review session with elders and local artisans to interpret test results. Present findings in both Danish and Greenlandic, allowing for open discussion on authenticity, usability, and cultural appropriateness of the blended materials. Record consensus or concerns in bilingual minutes.<br><b>Resources needed:</b><br><ul><li>Meeting space with audio recording</li><li>Bilingual facilitator</li><li>Visual aids (photos, samples)</li><li>Note-taking tools</li></ul>",
      "start_date": "2027-04-28",
      "duration": 5.0,
      "progress": 0,
      "open": true,
      "meta": "498d11bf-94f4-4f8e-9ef3-ce635c65f030 FS",
      "parent": "121599ca-354b-47fe-8bcf-4ae69faffb43"
    },
    {
      "id": "146e37ce-2632-4b24-b7a1-fed9d183938b",
      "text": "Finalize Trial Report",
      "custom_tooltip": "<b>Finalize Trial Report</b><br>Compile all data\u2014including technical measurements, firing outcomes, and cultural feedback\u2014into a joint technical-oral report. Include recommendations for approved ratios, forbidden materials, and next steps for full-scale production. Obtain unanimous approval from the Material Co-Creation Working Group before publication.<br><b>Resources needed:</b><br><ul><li>Materials scientist</li><li>Cultural liaison</li><li>Document editor</li><li>Digital publishing platform</li></ul>",
      "start_date": "2027-05-03",
      "duration": 5.0,
      "progress": 0,
      "open": true,
      "meta": "121599ca-354b-47fe-8bcf-4ae69faffb43 FF, 462b1230-1e8b-44f9-8476-cdc9739570e1 FS",
      "parent": "121599ca-354b-47fe-8bcf-4ae69faffb43"
    },
    {
      "id": "3c1b408a-dda2-4dab-abc2-c69fba579d0b",
      "text": "Analyze Firing Behavior and Compatibility of Blended Clays",
      "custom_tooltip": "<b>Analyze Firing Behavior and Compatibility of Blended Clays</b>",
      "progress": 0,
      "open": true,
      "meta": "121599ca-354b-47fe-8bcf-4ae69faffb43 FS",
      "parent": "59d1e4fb-5761-4e90-8d9c-3233ffaef27d",
      "type": "project"
    },
    {
      "id": "66aee857-38d9-4e2f-800a-0ef77f06e5da",
      "text": "Test Blended Clay Firing",
      "custom_tooltip": "<b>Test Blended Clay Firing</b><br>Conduct controlled firing tests on 10 batches of blended clay (70% imported, 30% local minerals) at standard temperatures (1000\u00b0C\u20131200\u00b0C) to evaluate shrinkage rate, weight loss, structural integrity, and cracking incidence. Record results in bilingual field notebooks (Danish/Greenlandic) and analyze for consistency with traditional ceramic standards.<br><b>Resources needed:</b><br><ul><li>Modular kilns</li><li>Blended clay samples</li><li>Digital calipers and scales</li><li>Bilingual field notebooks</li><li>Greenlandic Materials Scientist</li></ul>",
      "start_date": "2027-05-08",
      "duration": 8.0,
      "progress": 0,
      "open": true,
      "meta": "3c1b408a-dda2-4dab-abc2-c69fba579d0b SS",
      "parent": "3c1b408a-dda2-4dab-abc2-c69fba579d0b"
    },
    {
      "id": "74e08830-9057-407a-9fa5-06e626d75f63",
      "text": "Analyze Mineral Compatibility",
      "custom_tooltip": "<b>Analyze Mineral Compatibility</b><br>Perform chemical and thermal analysis of locally sourced glacial sand and volcanic ash to assess compatibility with standard kiln processes. Compare results against known ceramic benchmarks from K\u00f8ge Keramik and evaluate potential for long-term durability and aesthetic consistency.<br><b>Resources needed:</b><br><ul><li>Laboratory testing equipment</li><li>Greenlandic Materials Scientist</li><li>K\u00f8ge Keramik technical data</li><li>Chemical analysis reports</li></ul>",
      "start_date": "2027-05-16",
      "duration": 8.0,
      "progress": 0,
      "open": true,
      "meta": "66aee857-38d9-4e2f-800a-0ef77f06e5da FS",
      "parent": "3c1b408a-dda2-4dab-abc2-c69fba579d0b"
    },
    {
      "id": "ee04af93-a8d2-4baf-a2f2-42abb61e1154",
      "text": "Validate with Elders and Artisans",
      "custom_tooltip": "<b>Validate with Elders and Artisans</b><br>Host a joint review session with elders and local artisans to interpret test results, assess material authenticity, and provide cultural feedback. Document consensus or concerns regarding the use of blended materials in community-led projects and co-creation initiatives.<br><b>Resources needed:</b><br><ul><li>Meeting space with audiovisual support</li><li>Elders and artisans from advisory council</li><li>Bilingual facilitator</li><li>Recording and note-taking tools</li></ul>",
      "start_date": "2027-05-24",
      "duration": 8.0,
      "progress": 0,
      "open": true,
      "meta": "74e08830-9057-407a-9fa5-06e626d75f63 FS",
      "parent": "3c1b408a-dda2-4dab-abc2-c69fba579d0b"
    },
    {
      "id": "848a1105-40d6-482e-a550-5d8aefe14b54",
      "text": "Finalize Material Approval",
      "custom_tooltip": "<b>Finalize Material Approval</b><br>Compile test data, expert analysis, and community feedback into a formal report. Obtain unanimous approval from the Material Co-Creation Working Group and update the CIPR framework to include approved materials and usage guidelines.<br><b>Resources needed:</b><br><ul><li>Draft report template</li><li>Material Co-Creation Working Group</li><li>Cultural Liaison</li><li>Legal Advisor</li></ul>",
      "start_date": "2027-06-01",
      "duration": 8.0,
      "progress": 0,
      "open": true,
      "meta": "3c1b408a-dda2-4dab-abc2-c69fba579d0b FF, ee04af93-a8d2-4baf-a2f2-42abb61e1154 FS",
      "parent": "3c1b408a-dda2-4dab-abc2-c69fba579d0b"
    },

      "id": "8db53cb3-6774-4c69-bded-4614fa2795f7",
      "text": "Publish Joint Technical-Oral Report on Trial Results",
      "custom_tooltip": "<b>Publish Joint Technical-Oral Report on Trial Results</b>",

    {
      "id": "11e26c9a-55f1-4d8b-adaf-7121fa64ceb6",
      "text": "Conduct Trial Testing",
      "custom_tooltip": "<b>Conduct Trial Testing</b><br>Perform controlled tests on blended clay samples using varying ratios of imported clay and locally sourced glacial sand or volcanic ash. Fire samples at standard temperatures (1000\u00b0C\u20131200\u00b0C) to evaluate shrinkage rate, weight loss, structural integrity, and firing stability. Record results in bilingual field notebooks (Danish/Greenlandic) for accurate documentation.<br><b>Resources needed:</b><br><ul><li>Blended clay samples (10 batches)</li><li>Modular kilns</li><li>Digital measuring tools (calipers, scales)</li><li>Bilingual field notebooks</li><li>Materials Scientist</li></ul>",
      "start_date": "2027-06-09",
      "duration": 10.0,
      "progress": 0,
      "open": true,
      "meta": "8db53cb3-6774-4c69-bded-4614fa2795f7 SS",
      "parent": "8db53cb3-6774-4c69-bded-4614fa2795f7"
    },
    {
      "id": "c4df5534-42e1-460f-bada-abfed57e1a40",
      "text": "Gather Cultural Feedback",
      "custom_tooltip": "<b>Gather Cultural Feedback</b><br>Organize a joint review session with elders and local artisans to interpret trial results, assess material authenticity, and provide cultural insights. Use the feedback to determine whether the blended materials align with traditional practices and community values.<br><b>Resources needed:</b><br><ul><li>Elders and local artisans</li><li>Cultural Liaison</li><li>Bilingual facilitator</li><li>Meeting space and recording equipment</li></ul>",
      "start_date": "2027-06-19",
      "duration": 10.0,
      "progress": 0,
      "open": true,
      "meta": "11e26c9a-55f1-4d8b-adaf-7121fa64ceb6 FS",
      "parent": "8db53cb3-6774-4c69-bded-4614fa2795f7"
    },
    {
      "id": "f8096e54-2836-41b1-85d5-63f5b475fbf0",
      "text": "Finalize Approval Process",
      "custom_tooltip": "<b>Finalize Approval Process</b><br>Compile all trial data, observations, and cultural feedback into a comprehensive report. Present the findings to the Material Co-Creation Working Group for consensus approval. Ensure unanimous agreement before any new materials are used in production.<br><b>Resources needed:</b><br><ul><li>Technical-oral report template</li><li>Material Co-Creation Working Group</li><li>Facility Manager</li><li>Cultural Liaison</li></ul>",
      "start_date": "2027-06-29",
      "duration": 10.0,
      "progress": 0,
      "open": true,
      "meta": "8db53cb3-6774-4c69-bded-4614fa2795f7 FF, c4df5534-42e1-460f-bada-abfed57e1a40 FS",

      "id": "95c5afbf-21a7-4fb6-9922-68fbecc5ddeb",

    {
      "id": "83a54783-b74c-4b98-88b8-43e2ea557939",
      "text": "Secure Mineral Access",
      "custom_tooltip": "<b>Secure Mineral Access</b><br>Establish formal agreements with local geologists and mining cooperatives to identify and secure access to viable glacial sand and volcanic ash sources in Greenland. Conduct initial site assessments and pre-negotiate terms for sustainable, community-approved extraction.<br><b>Resources needed:</b><br><ul><li>Local geologist</li><li>Mining cooperative liaison</li><li>Legal advisor (Greenlandic law)</li><li>Community liaison</li></ul>",
      "start_date": "2027-07-09",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "95c5afbf-21a7-4fb6-9922-68fbecc5ddeb SS",
      "parent": "95c5afbf-21a7-4fb6-9922-68fbecc5ddeb"
    },
    {
      "id": "0dc30bb7-52da-4dee-9633-4cce64cfe314",
      "text": "Conduct Initial Air Freight Trials",
      "custom_tooltip": "<b>Conduct Initial Air Freight Trials</b><br>Test the feasibility of transporting small-scale mineral samples from remote Greenlandic regions via emergency air freight. Validate transit times, customs clearance efficiency, and packaging integrity under Arctic conditions.<br><b>Resources needed:</b><br><ul><li>Nordic Cargo logistics coordinator</li><li>Air freight specialist</li><li>Packaging engineer</li><li>Customs documentation officer</li></ul>",
      "start_date": "2027-07-13",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "83a54783-b74c-4b98-88b8-43e2ea557939 FS",
      "parent": "95c5afbf-21a7-4fb6-9922-68fbecc5ddeb"
    },
    {
      "id": "bacbbd66-dd7d-4086-80aa-d2a9309994fd",
      "text": "Co-Design Sourcing Protocols",
      "custom_tooltip": "<b>Co-Design Sourcing Protocols</b><br>Host a participatory workshop with elders, artisans, and local collectives to co-develop ethical and culturally respectful sourcing protocols. Define roles, responsibilities, consent mechanisms, and benefit-sharing models for material collection.<br><b>Resources needed:</b><br><ul><li>Cultural liaison</li><li>Facilitator (bilingual)</li><li>Advisory council members</li><li>Note-taker (bilingual)</li></ul>",
      "start_date": "2027-07-17",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "0dc30bb7-52da-4dee-9633-4cce64cfe314 FS",
      "parent": "95c5afbf-21a7-4fb6-9922-68fbecc5ddeb"
    },
    {
      "id": "925c4bcd-0d75-4140-b606-afeb3653e09d",
      "text": "Finalize Partnership Agreements",
      "custom_tooltip": "<b>Finalize Partnership Agreements</b><br>Draft and sign bilingual (Danish/Greenlandic) contracts with selected artisan collectives, including clauses on intellectual property, fair compensation, and long-term collaboration. Ensure all agreements are reviewed by legal counsel and approved by the advisory council.<br><b>Resources needed:</b><br><ul><li>Legal advisor</li><li>Bilingual contract drafter</li><li>Advisory council chair</li><li>Project manager</li></ul>",
      "start_date": "2027-07-21",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "bacbbd66-dd7d-4086-80aa-d2a9309994fd FS",
      "parent": "95c5afbf-21a7-4fb6-9922-68fbecc5ddeb"
    },
    {
      "id": "9a68f957-3bad-41f9-b368-b54aa145a47e",
      "text": "Validate Supply Chain Readiness",
      "custom_tooltip": "<b>Validate Supply Chain Readiness</b><br>Confirm end-to-end readiness of the local material supply chain by simulating a full procurement cycle: from extraction authorization to delivery at the workshop. Identify bottlenecks and refine processes before full-scale sourcing begins.<br><b>Resources needed:</b><br><ul><li>Supply chain coordinator</li><li>Logistics lead</li><li>Safety officer</li><li>Digital dashboard analyst</li></ul>",
      "start_date": "2027-07-25",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "95c5afbf-21a7-4fb6-9922-68fbecc5ddeb FF, 925c4bcd-0d75-4140-b606-afeb3653e09d FS",
      "parent": "95c5afbf-21a7-4fb6-9922-68fbecc5ddeb"
    },
    {
      "id": "4fcd5d5d-5864-4d0a-8d4f-cde2f78d55d0",
      "text": "Begin Procurement of Locally Adapted Materials Only After Approval",
      "custom_tooltip": "<b>Begin Procurement of Locally Adapted Materials Only After Approval</b>",
      "progress": 0,
      "open": true,
      "meta": "59d1e4fb-5761-4e90-8d9c-3233ffaef27d FF, 95c5afbf-21a7-4fb6-9922-68fbecc5ddeb FS",
      "parent": "59d1e4fb-5761-4e90-8d9c-3233ffaef27d",

    },
    {
      "id": "1cb52fea-7acb-471a-9c92-db79f9fbb863",
      "text": "Finalize Material Sourcing",
      "custom_tooltip": "<b>Finalize Material Sourcing</b><br>Secure and confirm agreements with Greenlandic artisan collectives for the supply of locally sourced minerals, ensuring all partnerships are formalized with bilingual (Danish/Greenlandic) contracts. Verify that intellectual property rights and compensation terms are clearly defined and approved by the advisory council before any procurement begins.<br><b>Resources needed:</b><br><ul><li>Local artisan collectives</li><li>Bilingual legal advisor</li><li>Advisory council members</li><li>Digital collaboration platform</li></ul>",
      "start_date": "2027-07-29",
      "duration": 5.0,
      "progress": 0,
      "open": true,
      "meta": "4fcd5d5d-5864-4d0a-8d4f-cde2f78d55d0 SS",
      "parent": "4fcd5d5d-5864-4d0a-8d4f-cde2f78d55d0"
    },
    {
      "id": "5331b597-81e8-45e7-a7e4-5388be6b58bb",
      "text": "Validate Material Compatibility",
      "custom_tooltip": "<b>Validate Material Compatibility</b><br>Conduct laboratory and field testing of blended clay samples (70% imported, 30% local) to assess shrinkage rate, firing stability, and structural integrity at standard kiln temperatures (1000\u00b0C\u20131200\u00b0C). Record results in bilingual field notebooks and share findings with the Materials Scientist and Cultural Liaison for technical and cultural review.<br><b>Resources needed:</b><br><ul><li>Greenlandic Materials Scientist</li><li>Modular kilns</li><li>Blended clay samples</li><li>Bilingual field notebooks</li></ul>",
      "start_date": "2027-08-03",
      "duration": 5.0,
      "progress": 0,
      "open": true,
      "meta": "1cb52fea-7acb-471a-9c92-db79f9fbb863 FS",
      "parent": "4fcd5d5d-5864-4d0a-8d4f-cde2f78d55d0"
    },
    {
      "id": "f5b6b42d-508c-4242-ba70-904a0fbe9d9e",
      "text": "Obtain Community Approval",
      "custom_tooltip": "<b>Obtain Community Approval</b><br>Present trial results and proposed material use to the Material Co-Creation Working Group and elders for consensus. Ensure unanimous approval is documented through signed consent forms and a joint technical-oral report that integrates scientific data with oral history and cultural feedback.<br><b>Resources needed:</b><br><ul><li>Material Co-Creation Working Group</li><li>Elders and artisans</li><li>Cultural Liaison</li><li>Joint technical-oral report template</li></ul>",
      "start_date": "2027-08-08",
      "duration": 5.0,
      "progress": 0,
      "open": true,
      "meta": "4fcd5d5d-5864-4d0a-8d4f-cde2f78d55d0 FF, 5331b597-81e8-45e7-a7e4-5388be6b58bb FS",
      "parent": "4fcd5d5d-5864-4d0a-8d4f-cde2f78d55d0"
    },

      "text": "Launch Themed Winter Programs (e.g., 'Winter Pottery Nights')",
      "custom_tooltip": "<b>Launch Themed Winter Programs (e.g., &#x27;Winter Pottery Nights&#x27;)</b>",

    {
      "id": "80b09cd8-4fbd-4aef-8528-9cd2c55a84b2",
      "text": "Design Winter Program Themes",
      "custom_tooltip": "<b>Design Winter Program Themes</b><br>Develop engaging, culturally relevant themes for &#x27;Winter Pottery Nights&#x27; that align with local traditions and seasonal activities. Collaborate with elders and artists to ensure authenticity and community resonance. Finalize themes by mid-February 2026 to allow time for promotional planning.<br><b>Resources needed:</b><br><ul><li>Cultural Liaison</li><li>Facility Manager</li><li>Advisory Council (Elders &amp; Artists)</li><li>Digital Design Tools</li></ul>",
      "start_date": "2027-08-13",
      "duration": 6.0,
      "progress": 0,
      "open": true,
      "meta": "b594fd39-ad8e-4f2c-ae35-e6da20e0787e SS",
      "parent": "b594fd39-ad8e-4f2c-ae35-e6da20e0787e"
    },
    {
      "id": "83787ee6-ed28-4b41-8a94-fe06e06f2fcf",
      "text": "Schedule Flexible Session Times",
      "custom_tooltip": "<b>Schedule Flexible Session Times</b><br>Create a rotating schedule of evening and weekend sessions to accommodate diverse participant availability, including working adults and families. Use the digital shift calendar to coordinate instructor availability and avoid conflicts. Ensure at least three session slots per week are available during winter months.<br><b>Resources needed:</b><br><ul><li>Digital Shift Calendar</li><li>Safety Officer</li><li>Instructors (Rotating Schedule)</li><li>Project Manager</li></ul>",
      "start_date": "2027-08-19",
      "duration": 6.0,
      "progress": 0,
      "open": true,
      "meta": "80b09cd8-4fbd-4aef-8528-9cd2c55a84b2 FS",
      "parent": "b594fd39-ad8e-4f2c-ae35-e6da20e0787e"
    },
    {
      "id": "89f163e4-cbd6-4dd6-8193-c9ddcec13cd9",
      "text": "Launch Targeted Community Outreach",
      "custom_tooltip": "<b>Launch Targeted Community Outreach</b><br>Execute a multi-channel outreach campaign using schools, radio stations, social media in Greenlandic, and community bulletin boards to promote &#x27;Winter Pottery Nights&#x27;. Include incentives such as free materials or raffle prizes to boost initial attendance. Track response rates via bi-monthly surveys.<br><b>Resources needed:</b><br><ul><li>Community Liaison</li><li>Marketing Coordinator</li><li>Bilingual Communication Materials</li><li>Local Influencers</li></ul>",
      "start_date": "2027-08-25",
      "duration": 6.0,
      "progress": 0,
      "open": true,
      "meta": "83787ee6-ed28-4b41-8a94-fe06e06f2fcf FS",
      "parent": "b594fd39-ad8e-4f2c-ae35-e6da20e0787e"
    },
    {
      "id": "429f1a3d-262a-4162-8a83-4e5ebd624213",
      "text": "Prepare Indoor Event Infrastructure",
      "custom_tooltip": "<b>Prepare Indoor Event Infrastructure</b><br>Ensure the workshop space is equipped for winter use with adequate heating, lighting, seating, and safety signage. Conduct a pre-event safety check with the Safety Officer and verify all emergency exits and fire equipment are accessible. Install temporary insulation if needed for thermal comfort.<br><b>Resources needed:</b><br><ul><li>Facility Manager</li><li>Safety Officer</li><li>Thermal Insulation Supplies</li><li>Emergency Equipment Checklist</li></ul>",
      "start_date": "2027-08-31",
      "duration": 6.0,
      "progress": 0,
      "open": true,
      "meta": "89f163e4-cbd6-4dd6-8193-c9ddcec13cd9 FS",
      "parent": "b594fd39-ad8e-4f2c-ae35-e6da20e0787e"
    },
    {
      "id": "f5e53537-e2ed-465c-bdf1-5d1c2b7f58e1",
      "text": "Conduct Pilot Test with Small Group",
      "custom_tooltip": "<b>Conduct Pilot Test with Small Group</b><br>Host a trial run of the first &#x27;Winter Pottery Night&#x27; with a small group of 10\u201315 community members to test logistics, content flow, and participant feedback. Gather insights on timing, theme relevance, and experience quality. Use findings to refine the full-scale launch plan before August 1, 2026.<br><b>Resources needed:</b><br><ul><li>Instructors</li><li>Volunteer Coordinators</li><li>Feedback Collection Tools (Surveys, Notebooks)</li><li>Pilot Participant List</li></ul>",
      "start_date": "2027-09-06",
      "duration": 6.0,
      "progress": 0,
      "open": true,
      "meta": "b594fd39-ad8e-4f2c-ae35-e6da20e0787e FF, 429f1a3d-262a-4162-8a83-4e5ebd624213 FS",
      "parent": "b594fd39-ad8e-4f2c-ae35-e6da20e0787e"
    },
    {
      "id": "b66fe01e-75d5-40ea-bbc3-4f9fca793721",
      "text": "Design Micro-Courses for Tourists During Summer Peaks",
      "custom_tooltip": "<b>Design Micro-Courses for Tourists During Summer Peaks</b>",
      "progress": 0,
      "open": true,
      "meta": "b594fd39-ad8e-4f2c-ae35-e6da20e0787e FS",
      "parent": "a7f9551a-9328-43e9-9a3c-acbbbfb39887",
      "type": "project"
    },
    {
      "id": "a2049c84-0d11-4fab-b95f-5ee0b3195e2b",
      "text": "Design Micro-Courses",
      "custom_tooltip": "<b>Design Micro-Courses</b><br>Develop modular, short-duration micro-courses (1\u20132 hours) tailored for tourists during summer peaks. Focus on beginner-friendly experiences that highlight local clay traditions and techniques. Collaborate with instructors to ensure content is engaging, culturally respectful, and scalable. Finalize course structure, materials list, and session flow before pilot testing.<br><b>Resources needed:</b><br><ul><li>Four part-time instructors</li><li>Digital shift calendar</li><li>Bilingual curriculum templates</li><li>Marketing team input</li></ul>",
      "start_date": "2027-09-12",
      "duration": 7.0,
      "progress": 0,
      "open": true,
      "meta": "b66fe01e-75d5-40ea-bbc3-4f9fca793721 SS",
      "parent": "b66fe01e-75d5-40ea-bbc3-4f9fca793721"
    },
    {
      "id": "3772bc78-6f79-48ed-a48d-e1fb705e5abd",
      "text": "Partner with Hotel Providers",
      "custom_tooltip": "<b>Partner with Hotel Providers</b><br>Establish formal agreements with at least three hotel partners to co-promote tourist experience packages. Define package inclusions (e.g., workshop duration, materials, guided tour), pricing tiers, and distribution channels. Align contract terms with seasonal demand patterns and ensure clear communication protocols for booking and guest management.<br><b>Resources needed:</b><br><ul><li>Hotel partnerships coordinator</li><li>Legal advisor</li><li>Sales and marketing lead</li><li>Bilingual contract templates</li></ul>",
      "start_date": "2027-09-19",
      "duration": 7.0,
      "progress": 0,
      "open": true,
      "meta": "a2049c84-0d11-4fab-b95f-5ee0b3195e2b FS",
      "parent": "b66fe01e-75d5-40ea-bbc3-4f9fca793721"
    },
    {
      "id": "bac4b3bf-978b-4961-8919-bccd42938a56",
      "text": "Implement Real-Time Booking System",
      "custom_tooltip": "<b>Implement Real-Time Booking System</b><br>Integrate a flexible, real-time online booking system capable of handling dynamic pricing, capacity alerts, and multi-language support. Ensure the platform supports micro-course scheduling, instant confirmation, and automated reminders. Test with a small group of users to validate usability and reliability before full launch.<br><b>Resources needed:</b><br><ul><li>Software developer</li><li>IT systems lead</li><li>Online booking platform access</li><li>User testing participants</li></ul>",
      "start_date": "2027-09-26",
      "duration": 7.0,
      "progress": 0,
      "open": true,
      "meta": "3772bc78-6f79-48ed-a48d-e1fb705e5abd FS",
      "parent": "b66fe01e-75d5-40ea-bbc3-4f9fca793721"
    },
    {
      "id": "4e881315-7240-454b-bec5-6c51724a356e",
      "text": "Pilot-Test Summer Programs",
      "custom_tooltip": "<b>Pilot-Test Summer Programs</b><br>Run a trial of micro-courses with small groups of tourists during early summer to gather feedback on content, timing, logistics, and overall experience. Use insights to refine course delivery, adjust staffing needs, and optimize the booking system. Document outcomes and share results with stakeholders.<br><b>Resources needed:</b><br><ul><li>Instructors</li><li>Tourist volunteers</li><li>Feedback survey tools</li><li>Data analyst</li></ul>",
      "start_date": "2027-10-03",
      "duration": 7.0,
      "progress": 0,
      "open": true,
      "meta": "bac4b3bf-978b-4961-8919-bccd42938a56 FS",
      "parent": "b66fe01e-75d5-40ea-bbc3-4f9fca793721"
    },
    {
      "id": "aaed9b61-16a8-4224-9040-ae0ed3acb60b",
      "text": "Scale Based on Demand Data",
      "custom_tooltip": "<b>Scale Based on Demand Data</b><br>Analyze attendance and utilization metrics from the pilot phase to determine optimal course frequency, group size, and staffing levels. Adjust programming and marketing strategies accordingly to meet anticipated summer demand while maintaining quality and sustainability. Prepare for full-scale rollout by mid-summer.<br><b>Resources needed:</b><br><ul><li>Data analyst</li><li>Project manager</li><li>Real-time tracking dashboard</li><li>Stakeholder review committee</li></ul>",
      "start_date": "2027-10-10",
      "duration": 7.0,
      "progress": 0,
      "open": true,
      "meta": "b66fe01e-75d5-40ea-bbc3-4f9fca793721 FF, 4e881315-7240-454b-bec5-6c51724a356e FS",
      "parent": "b66fe01e-75d5-40ea-bbc3-4f9fca793721"
    },
    {
      "id": "897a8351-c043-4098-82a8-9577eb939fd9",
      "text": "Develop Rotating Artist-in-Residence Program",
      "custom_tooltip": "<b>Develop Rotating Artist-in-Residence Program</b>",
      "progress": 0,
      "open": true,
      "meta": "b66fe01e-75d5-40ea-bbc3-4f9fca793721 FS",
      "parent": "a7f9551a-9328-43e9-9a3c-acbbbfb39887",
      "type": "project"
    },
    {
      "id": "5752b0ed-ea29-47e1-9163-ea88ae98df81",
      "text": "Design Winter Programs",
      "custom_tooltip": "<b>Design Winter Programs</b><br>Create themed, engaging winter programs such as &#x27;Winter Pottery Nights&#x27; tailored to Nuuk&#x27;s seasonal rhythms. Focus on flexible scheduling (evening/weekend slots), cultural relevance, and community appeal. Incorporate incentives like free materials or raffles to boost initial participation. Align with local traditions and ensure accessibility for elders and youth.<br><b>Resources needed:</b><br><ul><li>Clay Workshop Manager</li><li>Cultural Liaison</li><li>Facility Manager</li><li>Local artists and elders (for consultation)</li><li>Digital shift calendar</li></ul>",
      "start_date": "2027-10-17",
      "duration": 9.0,
      "progress": 0,
      "open": true,
      "meta": "897a8351-c043-4098-82a8-9577eb939fd9 SS",

    {
      "id": "188581ae-519c-4343-9b6e-591d8c8852c4",
      "text": "Pilot Test Themed Sessions",
      "custom_tooltip": "<b>Pilot Test Themed Sessions</b><br>Run small-scale pilot sessions of the designed winter programs with a diverse group of participants including residents, elders, and youth. Gather real-time feedback on content, timing, and engagement. Use insights to refine program structure, themes, and delivery methods before full launch.<br><b>Resources needed:</b><br><ul><li>Four Part-Time Instructors</li><li>Community Co-Creation Working Group</li><li>Bilingual facilitators</li><li>IoT sensors for environmental monitoring</li><li>Feedback forms (digital and printed)</li></ul>",
      "start_date": "2027-10-26",
      "duration": 9.0,
      "progress": 0,
      "open": true,
      "meta": "5752b0ed-ea29-47e1-9163-ea88ae98df81 FS",
      "parent": "897a8351-c043-4098-82a8-9577eb939fd9"
    },
    {
      "id": "aa71182d-2e46-4fe3-89cc-0dff373568f9",
      "text": "Secure Seasonal Partnerships",
      "custom_tooltip": "<b>Secure Seasonal Partnerships</b><br>Establish formal agreements with at least three local hotels and tourism providers to co-promote and distribute the winter pottery experience packages. Ensure alignment on branding, pricing, and booking logistics. Use joint marketing materials and exclusive access perks to drive tourist interest.<br><b>Resources needed:</b><br><ul><li>Tourism Board liaison</li><li>Hotel partnership coordinator</li><li>Marketing lead</li><li>Bilingual promotional materials</li><li>Digital booking system integration</li></ul>",
      "start_date": "2027-11-04",
      "duration": 9.0,
      "progress": 0,
      "open": true,
      "meta": "188581ae-519c-4343-9b6e-591d8c8852c4 FS",
      "parent": "897a8351-c043-4098-82a8-9577eb939fd9"
    },
    {
      "id": "71e07b8b-2c96-42f6-8015-ef3e5be31147",
      "text": "Integrate Demand Forecasting",
      "custom_tooltip": "<b>Integrate Demand Forecasting</b><br>Use historical attendance data from soft-launch events and real-time tracking dashboards to forecast winter demand. Adjust program capacity and staffing levels accordingly. Implement monthly review cycles with stakeholders to adapt programming based on actual utilization and feedback.<br><b>Resources needed:</b><br><ul><li>Data analyst (rotating role)</li><li>Digital dashboard</li><li>Monthly review meeting facilitator</li><li>Stakeholder input from advisory council</li><li>Real-time sensor data</li></ul>",
      "start_date": "2027-11-13",
      "duration": 9.0,
      "progress": 0,
      "open": true,
      "meta": "aa71182d-2e46-4fe3-89cc-0dff373568f9 FS",
      "parent": "897a8351-c043-4098-82a8-9577eb939fd9"
    },
    {
      "id": "acc39b31-ff2a-4ef8-963a-ddecf87a5200",
      "text": "Evaluate Program Success",
      "custom_tooltip": "<b>Evaluate Program Success</b><br>Conduct a comprehensive evaluation of winter program performance after the first season. Measure attendance, participant satisfaction, revenue generation, and community impact. Publish findings in a public report and use results to inform future seasonal programming strategies.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Survey specialist</li><li>Bi-monthly survey tools</li><li>Public reporting platform</li><li>Advisory Council representatives</li></ul>",
      "start_date": "2027-11-22",
      "duration": 9.0,
      "progress": 0,
      "open": true,
      "meta": "897a8351-c043-4098-82a8-9577eb939fd9 FF, 71e07b8b-2c96-42f6-8015-ef3e5be31147 FS",
      "parent": "897a8351-c043-4098-82a8-9577eb939fd9"
    },

      "id": "bc60ec27-9a82-4741-9288-1df223aadc54",
      "text": "Align Programming with Seasonal Demand Patterns Using Forecast Data",
      "custom_tooltip": "<b>Align Programming with Seasonal Demand Patterns Using Forecast Data</b>",

      "type": "project"
    },
    {
      "id": "6fa04c28-4457-4ad3-863e-dec746576d00",
      "text": "Analyze seasonal demand patterns",
      "custom_tooltip": "<b>Analyze seasonal demand patterns</b><br>Collect and analyze historical attendance data from similar cultural programs in Nuuk, focusing on winter and summer trends. Use surveys and community feedback to identify peak and off-peak periods. Develop a baseline forecast model for program utilization across seasons.<br><b>Resources needed:</b><br><ul><li>Historical attendance records</li><li>Community survey tools</li><li>Data analyst</li><li>Bilingual survey templates</li></ul>",
      "start_date": "2027-12-01",
      "duration": 7.0,
      "progress": 0,
      "open": true,
      "meta": "bc60ec27-9a82-4741-9288-1df223aadc54 SS",

    },
    {
      "id": "1636bfbb-830e-4d29-b941-ba721474705c",
      "text": "Map programming to demand cycles",
      "custom_tooltip": "<b>Map programming to demand cycles</b><br>Align course offerings and event schedules with seasonal demand forecasts. Design winter-specific programs (e.g., &#x27;Winter Pottery Nights&#x27;) and summer micro-courses to match expected participation levels. Ensure staffing and material availability are synchronized with these cycles.<br><b>Resources needed:</b><br><ul><li>Digital shift calendar</li><li>Instructor team</li><li>Seasonal programming planner</li><li>Real-time tracking dashboard</li></ul>",
      "start_date": "2027-12-08",
      "duration": 7.0,
      "progress": 0,
      "open": true,
      "meta": "6fa04c28-4457-4ad3-863e-dec746576d00 FS",
      "parent": "bc60ec27-9a82-4741-9288-1df223aadc54"
    },
    {
      "id": "05e56a95-9cc8-4df3-9934-dead8a836919",
      "text": "Implement dynamic scheduling adjustments",
      "custom_tooltip": "<b>Implement dynamic scheduling adjustments</b><br>Establish a process to adjust session frequency, class size, and instructor assignments based on real-time utilization data. Use IoT sensor outputs and booking system metrics to trigger automatic alerts when demand exceeds or falls below thresholds.<br><b>Resources needed:</b><br><ul><li>IoT environmental monitoring sensors</li><li>Digital shift calendar</li><li>Real-time tracking dashboard</li><li>Project manager</li></ul>",
      "start_date": "2027-12-15",
      "duration": 7.0,
      "progress": 0,
      "open": true,
      "meta": "bc60ec27-9a82-4741-9288-1df223aadc54 FF, 1636bfbb-830e-4d29-b941-ba721474705c FS",
      "parent": "bc60ec27-9a82-4741-9288-1df223aadc54"
    },

      "id": "b1128f26-2b64-4b11-bf16-95ec7aedc381",
      "text": "Evaluate Attendance and Utilization Metrics Monthly",
      "custom_tooltip": "<b>Evaluate Attendance and Utilization Metrics Monthly</b>",

    {
      "id": "151f0694-dc04-4969-b18d-50a06783e2e7",
      "text": "Collect attendance data",
      "custom_tooltip": "<b>Collect attendance data</b><br>Gather real-time attendance and utilization metrics from IoT sensors, digital dashboards, and user feedback systems to assess program performance. Focus on winter and summer participation trends, session occupancy rates, and demographic breakdowns. Ensure data is collected consistently across all programs and stored in a centralized, bilingual (Danish/Greenlandic) database for analysis.<br><b>Resources needed:</b><br><ul><li>IoT environmental monitoring sensors</li><li>Digital shift calendar and real-time tracking dashboard</li><li>Bi-monthly survey templates</li><li>Data analyst (rotating role among instructors)</li><li>Bilingual communication materials</li></ul>",
      "start_date": "2027-12-22",
      "duration": 5.0,
      "progress": 0,
      "open": true,
      "meta": "b1128f26-2b64-4b11-bf16-95ec7aedc381 SS",
      "parent": "b1128f26-2b64-4b11-bf16-95ec7aedc381"
    },
    {
      "id": "2ffa6f89-53e9-44a0-b358-fd1ccfa3fdab",
      "text": "Analyze seasonal patterns",
      "custom_tooltip": "<b>Analyze seasonal patterns</b><br>Use historical and real-time data to identify seasonal demand fluctuations in workshop usage, particularly during peak summer tourism and winter months. Apply statistical modeling to forecast future attendance based on past trends, weather conditions, and community engagement levels. Generate visual reports showing utilization gaps and overcapacity risks.<br><b>Resources needed:</b><br><ul><li>Historical attendance records</li><li>Statistical analysis software (e.g., Python/Pandas)</li><li>Real-time tracking dashboard</li><li>Project manager</li><li>Data analyst (rotating role)</li></ul>",
      "start_date": "2027-12-27",
      "duration": 5.0,
      "progress": 0,
      "open": true,
      "meta": "151f0694-dc04-4969-b18d-50a06783e2e7 FS",
      "parent": "b1128f26-2b64-4b11-bf16-95ec7aedc381"
    },
    {
      "id": "7b1107dc-be2f-4cad-9333-2a95f9961756",
      "text": "Adjust programming accordingly",
      "custom_tooltip": "<b>Adjust programming accordingly</b><br>Revise course schedules, class sizes, and event offerings based on the insights from attendance and utilization analysis. Implement targeted adjustments such as increasing winter programming capacity, launching micro-courses during summer peaks, or reconfiguring open-studio hours to match demand. Ensure changes are communicated clearly through bilingual channels and aligned with stakeholder feedback loops.<br><b>Resources needed:</b><br><ul><li>Rotating instructor schedule</li><li>Digital shift calendar</li><li>Marketing and outreach team</li><li>Advisory council</li><li>Bilingual signage and digital content</li></ul>",
      "start_date": "2028-01-01",
      "duration": 5.0,
      "progress": 0,
      "open": true,
      "meta": "2ffa6f89-53e9-44a0-b358-fd1ccfa3fdab FS",
      "parent": "b1128f26-2b64-4b11-bf16-95ec7aedc381"
    },
    {
      "id": "71bd54a3-39ac-482e-8c70-0aac314476ac",
      "text": "Review and refine models quarterly",
      "custom_tooltip": "<b>Review and refine models quarterly</b><br>Conduct a formal quarterly review of attendance and utilization data with key stakeholders including the Clay Workshop Manager, logistics coordinator, finance liaison, and safety officer. Evaluate the effectiveness of current programming adjustments, identify emerging trends, and update forecasting models. Document decisions and actions taken to ensure transparency and continuous improvement.<br><b>Resources needed:</b><br><ul><li>Quarterly review meeting agenda</li><li>Performance dashboard</li><li>Meeting minutes template</li><li>Stakeholder representatives</li><li>Compliance and reporting tools</li></ul>",
      "start_date": "2028-01-06",
      "duration": 5.0,
      "progress": 0,
      "open": true,
      "meta": "b1128f26-2b64-4b11-bf16-95ec7aedc381 FF, 7b1107dc-be2f-4cad-9333-2a95f9961756 FS",
      "parent": "b1128f26-2b64-4b11-bf16-95ec7aedc381"
    },

    {
      "id": "bc1aed5d-bf67-4810-a947-72064ee79380",
      "text": "Design 'Clay Pass' Membership for Residents",
      "custom_tooltip": "<b>Design &#x27;Clay Pass&#x27; Membership for Residents</b>",

      "open": true,

    {
      "id": "7af737f8-cbd8-49d9-95b7-8611bed44e0c",
      "text": "Define Membership Tiers",
      "custom_tooltip": "<b>Define Membership Tiers</b><br>Develop clear, tiered membership levels for the &#x27;Clay Pass&#x27; with distinct benefits (e.g., basic access, priority booking, exclusive events) based on resident feedback and budget constraints. Include pricing structures aligned with local income levels and ensure all tiers are accessible to diverse community members.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Community Liaison</li><li>Financial Analyst</li><li>Bilingual Survey Tools</li></ul>",
      "start_date": "2028-01-11",
      "duration": 5.0,
      "progress": 0,
      "open": true,
      "meta": "bc1aed5d-bf67-4810-a947-72064ee79380 SS",
      "parent": "bc1aed5d-bf67-4810-a947-72064ee79380"
    },
    {
      "id": "f1d9a0b1-49e6-452f-8629-bae23b97db34",
      "text": "Validate Pricing Strategy",
      "custom_tooltip": "<b>Validate Pricing Strategy</b><br>Conduct focus groups with local residents to test proposed pricing tiers and benefits, gather feedback on perceived value, and refine the offering before launch. Use real-time survey data to adjust tiers and messaging to maximize uptake and inclusivity.<br><b>Resources needed:</b><br><ul><li>Community Liaison</li><li>Research Coordinator</li><li>Digital Survey Platform</li><li>Facilitation Materials in Danish/Greenlandic</li></ul>",
      "start_date": "2028-01-16",
      "duration": 5.0,
      "progress": 0,
      "open": true,
      "meta": "7af737f8-cbd8-49d9-95b7-8611bed44e0c FS",
      "parent": "bc1aed5d-bf67-4810-a947-72064ee79380"
    },
    {
      "id": "19e3bf08-3556-42ec-b941-61cd46e6436c",
      "text": "Design Onboarding Experience",
      "custom_tooltip": "<b>Design Onboarding Experience</b><br>Create a welcoming, multilingual onboarding process for new &#x27;Clay Pass&#x27; members, including digital sign-up, orientation video, welcome kit, and access to introductory workshops. Ensure materials are available in both Danish and Greenlandic and reflect cultural sensitivity.<br><b>Resources needed:</b><br><ul><li>Digital Designer</li><li>Content Writer</li><li>Multilingual Translator</li><li>Video Production Team</li></ul>",
      "start_date": "2028-01-21",
      "duration": 5.0,
      "progress": 0,
      "open": true,
      "meta": "f1d9a0b1-49e6-452f-8629-bae23b97db34 FS",
      "parent": "bc1aed5d-bf67-4810-a947-72064ee79380"
    },
    {
      "id": "e6b546a5-807f-4dc3-9143-092ea08e2ea5",
      "text": "Integrate with Booking System",
      "custom_tooltip": "<b>Integrate with Booking System</b><br>Implement the &#x27;Clay Pass&#x27; membership tiers into the online booking platform with automated access controls, tier-specific privileges, and real-time availability tracking. Conduct usability testing with diverse users to ensure clarity and accessibility.<br><b>Resources needed:</b><br><ul><li>Software Developer</li><li>IT Integration Specialist</li><li>User Experience Tester</li><li>Digital Dashboard Platform</li></ul>",
      "start_date": "2028-01-26",
      "duration": 5.0,
      "progress": 0,
      "open": true,
      "meta": "19e3bf08-3556-42ec-b941-61cd46e6436c FS",
      "parent": "bc1aed5d-bf67-4810-a947-72064ee79380"
    },
    {
      "id": "46f9d0e7-592b-4b6a-9c6d-b5fb6d4ab976",
      "text": "Launch Soft-Tiered Trial Version",
      "custom_tooltip": "<b>Launch Soft-Tiered Trial Version</b><br>Roll out a pilot version of the &#x27;Clay Pass&#x27; with flexible access and limited benefits to test demand, collect user feedback, and identify operational bottlenecks. Monitor participation rates and adjust the model based on early insights before full launch.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Instructor Lead</li><li>Data Analyst</li><li>Feedback Collection Tools</li></ul>",
      "start_date": "2028-01-31",
      "duration": 5.0,
      "progress": 0,
      "open": true,
      "meta": "bc1aed5d-bf67-4810-a947-72064ee79380 FF, e6b546a5-807f-4dc3-9143-092ea08e2ea5 FS",
      "parent": "bc1aed5d-bf67-4810-a947-72064ee79380"
    },
    {
      "id": "b4cf0033-edf1-4b03-84bf-bf1a1e92c51b",
      "text": "Create 'Tourist Experience Package' Sold via Hotel Partnerships",
      "custom_tooltip": "<b>Create &#x27;Tourist Experience Package&#x27; Sold via Hotel Partnerships</b>",
      "progress": 0,
      "open": true,
      "meta": "bc1aed5d-bf67-4810-a947-72064ee79380 FS",

    {
      "id": "7ee46b42-86c7-4c4b-a592-a335588834fc",
      "text": "Design Tourist Package",
      "custom_tooltip": "<b>Design Tourist Package</b><br>Develop a structured, culturally immersive ceramic experience package tailored for summer tourists, including session duration (1\u20132 hours), materials included, instructor roles, and pricing tiers. Collaborate with hotel partners to align with their booking systems and promotional calendars. Ensure all content reflects local traditions and is co-approved by the advisory council.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Tourism Coordinator</li><li>Cultural Liaison</li><li>Hotel Partners (key representatives)</li><li>Digital Booking Platform Access</li></ul>",
      "start_date": "2028-02-05",
      "duration": 6.0,
      "progress": 0,
      "open": true,
      "meta": "b4cf0033-edf1-4b03-84bf-bf1a1e92c51b SS",
      "parent": "b4cf0033-edf1-4b03-84bf-bf1a1e92c51b"
    },
    {
      "id": "d6b1366f-195c-4b5a-8d47-ef777f20199f",
      "text": "Finalize Hotel Partnership Contracts",
      "custom_tooltip": "<b>Finalize Hotel Partnership Contracts</b><br>Negotiate and sign formal agreements with at least three hotel partners to distribute the tourist experience package. Define commission structures, booking caps, promotional responsibilities, and cancellation policies. Ensure contracts are bilingual (Danish/Greenlandic) and compliant with Greenlandic commercial laws.<br><b>Resources needed:</b><br><ul><li>Legal Advisor</li><li>Project Manager</li><li>Hotel Partners (legal/operations teams)</li><li>Bilingual Contract Templates</li><li>Compliance Reviewer</li></ul>",
      "start_date": "2028-02-11",
      "duration": 6.0,
      "progress": 0,
      "open": true,
      "meta": "7ee46b42-86c7-4c4b-a592-a335588834fc FS",
      "parent": "b4cf0033-edf1-4b03-84bf-bf1a1e92c51b"
    },
    {
      "id": "e65fb23b-9834-4fd0-95d4-b7d9abf032b1",
      "text": "Integrate Package into Booking System",
      "custom_tooltip": "<b>Integrate Package into Booking System</b><br>Implement the tourist experience package into the online booking platform with tiered pricing, real-time availability tracking, and automated confirmation emails. Test the integration with sample bookings to ensure seamless user experience across devices and languages. Validate that capacity alerts trigger when limits are reached.<br><b>Resources needed:</b><br><ul><li>Tech Lead</li><li>Digital Platform Developer</li><li>Booking System Administrator</li><li>QA Tester (bilingual)</li><li>Instructor Scheduler</li></ul>",
      "start_date": "2028-02-17",
      "duration": 6.0,
      "progress": 0,
      "open": true,
      "meta": "d6b1366f-195c-4b5a-8d47-ef777f20199f FS",
      "parent": "b4cf0033-edf1-4b03-84bf-bf1a1e92c51b"
    },
    {
      "id": "8e07bcd7-e2f3-4967-830b-bb026d1a8e8c",
      "text": "Launch Pilot Tourist Program",
      "custom_tooltip": "<b>Launch Pilot Tourist Program</b><br>Host a small-scale trial of the tourist experience package with a group of 10\u201315 guests during early August 2026. Gather feedback via post-session surveys and real-time observations. Use insights to refine session flow, materials, and staff training before full rollout.<br><b>Resources needed:</b><br><ul><li>Four Part-Time Instructors</li><li>Safety Officer</li><li>Local Logistics Coordinator</li><li>Survey Tools (digital and printed)</li><li>Feedback Collection Kit</li></ul>",
      "start_date": "2028-02-23",
      "duration": 6.0,
      "progress": 0,
      "open": true,
      "meta": "e65fb23b-9834-4fd0-95d4-b7d9abf032b1 FS",
      "parent": "b4cf0033-edf1-4b03-84bf-bf1a1e92c51b"
    },
    {
      "id": "63cd5c8b-bd67-465f-956b-50f1e3f7b595",
      "text": "Promote Packages via Hotel Channels",
      "custom_tooltip": "<b>Promote Packages via Hotel Channels</b><br>Distribute branded promotional materials (brochures, digital banners, QR codes) to partner hotels. Train front-desk staff on how to explain and book the experience. Coordinate joint marketing campaigns (e.g., social media posts, welcome kits) to drive visibility and bookings during peak season.<br><b>Resources needed:</b><br><ul><li>Marketing Specialist</li><li>Hotel Partners (front desk &amp; concierge teams)</li><li>Graphic Designer</li><li>Social Media Manager</li><li>Bilingual Promotional Materials</li></ul>",
      "start_date": "2028-02-29",
      "duration": 6.0,
      "progress": 0,
      "open": true,
      "meta": "b4cf0033-edf1-4b03-84bf-bf1a1e92c51b FF, 8e07bcd7-e2f3-4967-830b-bb026d1a8e8c FS",
      "parent": "b4cf0033-edf1-4b03-84bf-bf1a1e92c51b"
    },
    {
      "id": "ec363d30-c0f3-4428-90b2-bed86123623c",
      "text": "Implement Pay-What-You-Can Model for Winter Months",
      "custom_tooltip": "<b>Implement Pay-What-You-Can Model for Winter Months</b>",

      "open": true,

    },
    {
      "id": "87a353a3-e0c7-43fc-9946-1a7588595a6e",
      "text": "Pilot Pay-What-You-Can Model",
      "custom_tooltip": "<b>Pilot Pay-What-You-Can Model</b><br>Test the pay-what-you-can pricing model with a small group of local residents during a winter session to evaluate uptake, perceived value, and revenue impact. Gather feedback on pricing thresholds and messaging through post-session surveys and informal discussions.<br><b>Resources needed:</b><br><ul><li>Local residents (10\u201315 participants)</li><li>Digital survey tool (bilingual)</li><li>Instructor for session facilitation</li><li>Facility manager for logistics</li><li>Revenue analyst for data tracking</li></ul>",
      "start_date": "2028-03-06",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "ec363d30-c0f3-4428-90b2-bed86123623c SS",
      "parent": "ec363d30-c0f3-4428-90b2-bed86123623c"
    },
    {
      "id": "77074a53-845d-410a-a7de-5b0dd2ec5e1b",
      "text": "Integrate Flexible Pricing into Booking System",
      "custom_tooltip": "<b>Integrate Flexible Pricing into Booking System</b><br>Configure the online booking platform to support tiered and flexible pricing options, including real-time capacity alerts and automated payment processing. Ensure the system is accessible in both Danish and Greenlandic and includes clear instructions for users.<br><b>Resources needed:</b><br><ul><li>Software developer or IT specialist</li><li>Online booking platform administrator</li><li>Bilingual UX designer</li><li>Payment gateway provider</li><li>Digital shift calendar integration team</li></ul>",
      "start_date": "2028-03-10",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "87a353a3-e0c7-43fc-9946-1a7588595a6e FS",
      "parent": "ec363d30-c0f3-4428-90b2-bed86123623c"
    },
    {
      "id": "a2d962ff-7434-43cd-8d15-6dc9919a0fa2",
      "text": "Train Staff on Consistent Implementation",
      "custom_tooltip": "<b>Train Staff on Consistent Implementation</b><br>Conduct a mandatory training session for all instructors and front-desk staff on how to apply the pay-what-you-can model consistently, including guidelines for handling payments, managing exceptions, and communicating the policy clearly to participants.<br><b>Resources needed:</b><br><ul><li>Safety Officer</li><li>Project Manager</li><li>Training materials (bilingual)</li><li>Digital shift calendar</li><li>Instructor cohort</li></ul>",
      "start_date": "2028-03-14",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "77074a53-845d-410a-a7de-5b0dd2ec5e1b FS",
      "parent": "ec363d30-c0f3-4428-90b2-bed86123623c"
    },
    {
      "id": "f779ea54-3744-4b89-9924-38e20e6638a4",
      "text": "Monitor Participation and Revenue Metrics",
      "custom_tooltip": "<b>Monitor Participation and Revenue Metrics</b><br>Track key performance indicators such as session attendance, average contribution per participant, and overall revenue during the pilot phase. Use real-time dashboard data to identify trends and adjust the model based on early insights.<br><b>Resources needed:</b><br><ul><li>Digital dashboard</li><li>Revenue analyst</li><li>IoT sensor data (for occupancy tracking)</li><li>Bi-monthly review meeting facilitator</li><li>Data visualization tools</li></ul>",
      "start_date": "2028-03-18",
      "duration": 4.0,
      "progress": 0,

      "parent": "ec363d30-c0f3-4428-90b2-bed86123623c"
    },
