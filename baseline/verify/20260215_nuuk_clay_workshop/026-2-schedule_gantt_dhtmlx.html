    {
      "id": "2ab0f6f3-4a84-47e6-ae70-60fdd6c1632a",
      "text": "Integrate Tiered Pricing",
      "custom_tooltip": "<b>Integrate Tiered Pricing</b><br>Implement a tiered pricing model into the online booking system to support flexible access for residents and tourists. This includes configuring price tiers based on session type, duration, and user category (e.g., resident, tourist, youth). Ensure compatibility with payment gateways, test functionality across devices, and validate that real-time capacity alerts are triggered when limits are reached. Finalize integration before soft launch.<br><b>Resources needed:</b><br><ul><li>Digital platform developer</li><li>Payment gateway API access</li><li>Online booking system administrator</li><li>Bilingual UI/UX designer</li></ul>",
      "start_date": "2028-03-22",
      "duration": 5.0,
      "progress": 0,
      "open": true,
      "meta": "2b2f21bd-7ba4-459b-87ca-3c6b85bb1f38 SS",
      "parent": "2b2f21bd-7ba4-459b-87ca-3c6b85bb1f38"
    },
    {
      "id": "edf6afa0-e720-4a30-94b5-ea3e341bd387",
      "text": "Test Booking System Functionality",
      "custom_tooltip": "<b>Test Booking System Functionality</b><br>Conduct end-to-end testing of the online booking system with all pricing tiers, including edge cases such as overbooking, expired sessions, and multi-user reservations. Use a sandbox environment to simulate real-world usage patterns. Validate that automated reminders, capacity alerts, and payment confirmations function correctly. Document issues and coordinate fixes with the tech team.<br><b>Resources needed:</b><br><ul><li>QA tester</li><li>System administrator</li><li>Development lead</li><li>Project manager</li></ul>",
      "start_date": "2028-03-27",
      "duration": 5.0,
      "progress": 0,
      "open": true,
      "meta": "2ab0f6f3-4a84-47e6-ae70-60fdd6c1632a FS",
      "parent": "2b2f21bd-7ba4-459b-87ca-3c6b85bb1f38"
    },
    {
      "id": "d9b74eec-7e2e-4352-9035-afbb1404a11f",
      "text": "Train Staff on Pricing Model",
      "custom_tooltip": "<b>Train Staff on Pricing Model</b><br>Provide comprehensive training to all instructors and front-desk staff on how to explain and apply the tiered pricing model, including the pay-what-you-can option during winter months. Deliver bilingual training materials, conduct role-playing scenarios, and verify understanding through quizzes. Ensure all staff can confidently handle customer inquiries and resolve pricing-related disputes.<br><b>Resources needed:</b><br><ul><li>Training coordinator</li><li>Bilingual instructor</li><li>Safety officer</li><li>Digital shift calendar administrator</li></ul>",
      "start_date": "2028-04-01",
      "duration": 5.0,
      "progress": 0,
      "open": true,
      "meta": "edf6afa0-e720-4a30-94b5-ea3e341bd387 FS",
      "parent": "2b2f21bd-7ba4-459b-87ca-3c6b85bb1f38"
    },
    {
      "id": "b9a454cd-9d3c-47a7-a0a9-5edc911b57ec",
      "text": "Validate Revenue Predictability",
      "custom_tooltip": "<b>Validate Revenue Predictability</b><br>Monitor initial booking data after implementation to assess revenue predictability. Analyze trends in participation by user group, time of day, and season. Use dashboard metrics to identify underperforming tiers or unexpected demand spikes. Adjust pricing models quarterly based on performance data and stakeholder feedback.<br><b>Resources needed:</b><br><ul><li>Revenue analyst (rotating role)</li><li>Data visualization specialist</li><li>Project manager</li><li>Digital dashboard</li></ul>",
      "start_date": "2028-04-06",
      "duration": 5.0,
      "progress": 0,
      "open": true,
      "meta": "2b2f21bd-7ba4-459b-87ca-3c6b85bb1f38 FF, d9b74eec-7e2e-4352-9035-afbb1404a11f FS",
      "parent": "2b2f21bd-7ba4-459b-87ca-3c6b85bb1f38"
    },
    {
      "id": "8a4b9e20-bc97-4ad8-9ebd-054b2d20561a",
      "text": "Monitor Revenue Predictability and Adjust Models Quarterly",
      "custom_tooltip": "<b>Monitor Revenue Predictability and Adjust Models Quarterly</b>",

    {
      "id": "9c448982-5f6c-4cb3-b9a9-5c0fe41dfd7e",
      "text": "Automate data aggregation",
      "custom_tooltip": "<b>Automate data aggregation</b><br>Set up automated data collection from IoT sensors and digital dashboards to ensure continuous monitoring of revenue, attendance, and utilization metrics. Integrate weekly export schedules into the system to provide consistent, real-time insights for decision-making.<br><b>Resources needed:</b><br><ul><li>Digital dashboard platform (e.g., Airtable or Notion)</li><li>Tech lead for system integration</li><li>IoT sensor data feed access</li></ul>",
      "start_date": "2028-04-11",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "8a4b9e20-bc97-4ad8-9ebd-054b2d20561a SS",
      "parent": "8a4b9e20-bc97-4ad8-9ebd-054b2d20561a"
    },
    {
      "id": "25155bce-078a-4f18-a9e7-916109b1f745",
      "text": "Assign rotating revenue analyst",
      "custom_tooltip": "<b>Assign rotating revenue analyst</b><br>Designate a rotating role among instructors to oversee revenue performance on a monthly basis. This individual will review aggregated data, identify trends, and prepare reports for stakeholder meetings, ensuring consistent accountability and transparency.<br><b>Resources needed:</b><br><ul><li>Instructors (rotating)</li><li>Revenue tracking template</li><li>Monthly review meeting schedule</li></ul>",
      "start_date": "2028-04-15",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "9c448982-5f6c-4cb3-b9a9-5c0fe41dfd7e FS",
      "parent": "8a4b9e20-bc97-4ad8-9ebd-054b2d20561a"
    },
    {
      "id": "6a54c4fb-9f86-49f1-8f8f-1fb7ac920ee8",
      "text": "Conduct quarterly review meetings",
      "custom_tooltip": "<b>Conduct quarterly review meetings</b><br>Hold structured quarterly meetings with key stakeholders\u2014including the Clay Workshop Manager, Logistics Coordinator, and Finance Liaison\u2014to evaluate performance data, discuss challenges, and approve adjustments to pricing models and programming based on actual utilization and feedback.<br><b>Resources needed:</b><br><ul><li>Meeting facilitator</li><li>Agenda template</li><li>Stakeholder list (manager, logistics coordinator, finance liaison)</li></ul>",
      "start_date": "2028-04-19",
      "duration": 4.0,
      "progress": 0,

      "custom_tooltip": "<b>Host First &#x27;Community Pottery Day&#x27; with Public Installation Project</b>",

    {
      "id": "380c47ac-141f-4a09-8e2d-a98fc6dbd832",
      "text": "Plan Community Pottery Day",
      "custom_tooltip": "<b>Plan Community Pottery Day</b><br>Define event scope, select location, draft timeline, and coordinate with local artists and elders for content approval. Include logistics for public installation project, ensure bilingual communication, and schedule pre-event promotion through schools, radio, and social media.<br><b>Resources needed:</b><br><ul><li>Cultural Liaison</li><li>Facility Manager</li><li>Local Artists and Elders</li><li>Marketing Coordinator</li><li>Bilingual Communication Materials</li></ul>",
      "start_date": "2028-04-23",
      "duration": 5.0,
      "progress": 0,
      "open": true,
      "meta": "444b1760-a047-4dcc-99f7-052e00f497aa SS",
      "parent": "444b1760-a047-4dcc-99f7-052e00f497aa"
    },
    {
      "id": "5e0c260f-1771-4c73-8b10-2026977b0b12",
      "text": "Secure Materials and Equipment",
      "custom_tooltip": "<b>Secure Materials and Equipment</b><br>Procure clay, tools, and installation materials in advance; confirm availability of drying racks and ventilation systems. Ensure all items are delivered on time with buffer stock for weather-related delays, and verify compatibility with the workshop\u2019s thermal and safety standards.<br><b>Resources needed:</b><br><ul><li>Local Logistics Coordinator</li><li>Materials Scientist</li><li>Supply Chain Coordinator</li><li>Kiln Technician</li><li>Emergency Air Freight Contact</li></ul>",
      "start_date": "2028-04-28",
      "duration": 5.0,
      "progress": 0,
      "open": true,
      "meta": "380c47ac-141f-4a09-8e2d-a98fc6dbd832 FS",
      "parent": "444b1760-a047-4dcc-99f7-052e00f497aa"
    },
    {
      "id": "4edb93f3-1022-4187-a765-2253faa4f913",
      "text": "Organize Public Installation Project",
      "custom_tooltip": "<b>Organize Public Installation Project</b><br>Design and build a collaborative public artwork using community-contributed pieces. Conduct on-site assembly with volunteers, ensure structural safety, and integrate cultural motifs approved by the advisory council. Document process with photos and videos for digital archive.<br><b>Resources needed:</b><br><ul><li>Artistic Lead</li><li>Safety Officer</li><li>Community Volunteers</li><li>Construction Crew</li><li>Digital Documentation Team</li></ul>",
      "start_date": "2028-05-03",
      "duration": 5.0,
      "progress": 0,
      "open": true,
      "meta": "5e0c260f-1771-4c73-8b10-2026977b0b12 FS",
      "parent": "444b1760-a047-4dcc-99f7-052e00f497aa"
    },
    {
      "id": "8280e099-7351-48fe-b3d5-1c877e8a4c6a",
      "text": "Execute Event and Promote Engagement",
      "custom_tooltip": "<b>Execute Event and Promote Engagement</b><br>Run the &#x27;Community Pottery Day&#x27; with guided activities, live demonstrations, and interactive stations. Facilitate elder-led storytelling sessions, distribute free materials to participants, and collect real-time feedback via bilingual surveys. Broadcast event highlights on local media and social platforms.<br><b>Resources needed:</b><br><ul><li>Four Part-Time Instructors</li><li>Youth Apprentices</li><li>Event Coordinator</li><li>Media Liaison</li><li>Bi-Monthly Survey Tools</li></ul>",
      "start_date": "2028-05-08",
      "duration": 5.0,
      "progress": 0,
      "open": true,
      "meta": "4edb93f3-1022-4187-a765-2253faa4f913 FS",
      "parent": "444b1760-a047-4dcc-99f7-052e00f497aa"
    },
    {
      "id": "b7081e25-e313-43f3-84f1-9488bb45493e",
      "text": "Evaluate and Archive Outcomes",
      "custom_tooltip": "<b>Evaluate and Archive Outcomes</b><br>Review attendance data, survey responses, and incident logs post-event. Compile a joint report with elders and artists summarizing community impact, lessons learned, and recommendations for future co-creation events. Upload final artworks and documentation to public digital platform and physical display locations.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Cultural Liaison</li><li>Data Analyst</li><li>Inuit Cultural Heritage Council</li><li>Digital Archivist</li></ul>",
      "start_date": "2028-05-13",
      "duration": 5.0,
      "progress": 0,
      "open": true,
      "meta": "444b1760-a047-4dcc-99f7-052e00f497aa FF, 8280e099-7351-48fe-b3d5-1c877e8a4c6a FS",
      "parent": "444b1760-a047-4dcc-99f7-052e00f497aa"
    },
    {
      "id": "8335a69d-118f-47ed-a1a2-841cefa523f0",
      "text": "Launch Youth Apprenticeship Track with School Partnerships",
      "custom_tooltip": "<b>Launch Youth Apprenticeship Track with School Partnerships</b>",
      "progress": 0,
      "open": true,
      "meta": "444b1760-a047-4dcc-99f7-052e00f497aa FS",
      "parent": "f8b3bc49-b977-46c9-90ab-5a694903f58e",
      "type": "project"
    },
    {
      "id": "b23381b4-2fe4-478e-8c4a-13b3d185bacd",
      "text": "Secure School Partnerships",
      "custom_tooltip": "<b>Secure School Partnerships</b><br>Establish formal agreements with local schools to integrate the youth apprenticeship track into their curricula. This includes identifying key stakeholders (principals, teachers, guidance counselors), scheduling initial meetings, drafting partnership memorandums in both Danish and Greenlandic, and aligning program timelines with academic calendars to ensure seamless participation.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Cultural Liaison</li><li>School Liaison Officer</li><li>Bilingual legal advisor</li><li>Digital collaboration tools (e.g., Google Workspace)</li></ul>",
      "start_date": "2028-05-18",
      "duration": 9.0,
      "progress": 0,
      "open": true,
      "meta": "8335a69d-118f-47ed-a1a2-841cefa523f0 SS",
      "parent": "8335a69d-118f-47ed-a1a2-841cefa523f0"
    },
    {
      "id": "92b55914-cf87-411e-ad0e-9a5b2ce026c1",
      "text": "Develop Apprenticeship Curriculum",
      "custom_tooltip": "<b>Develop Apprenticeship Curriculum</b><br>Design a structured, culturally grounded curriculum for youth apprentices that blends technical ceramic skills with intergenerational storytelling and community co-creation. The curriculum must include learning modules on hand-building, wheel-throwing, material sourcing, safety protocols, and cultural context, all delivered in bilingual (Danish/Greenlandic) materials with visual aids and hands-on activities.<br><b>Resources needed:</b><br><ul><li>Four Part-Time Instructors</li><li>Cultural Liaison</li><li>Youth Engagement Coordinator</li><li>Bilingual instructional designer</li><li>Digital content creation tools</li></ul>",
      "start_date": "2028-05-27",
      "duration": 9.0,
      "progress": 0,
      "open": true,
      "meta": "b23381b4-2fe4-478e-8c4a-13b3d185bacd FS",
      "parent": "8335a69d-118f-47ed-a1a2-841cefa523f0"
    },
    {
      "id": "6574c625-17c8-4af2-a460-27f075481f89",
      "text": "Implement Mentorship Framework",
      "custom_tooltip": "<b>Implement Mentorship Framework</b><br>Create a rotating peer mentorship system pairing experienced instructors with apprentices, ensuring consistent guidance and skill transfer. Define clear roles, expectations, and evaluation criteria for mentors and mentees. Conduct a pilot mentorship cycle with a small group of apprentices to test structure, timing, and feedback mechanisms before full rollout.<br><b>Resources needed:</b><br><ul><li>Safety Officer</li><li>Human Resources Lead</li><li>Facility Manager</li><li>Mentorship toolkit (guides, feedback forms)</li><li>Digital tracking dashboard</li></ul>",
      "start_date": "2028-06-05",
      "duration": 9.0,
      "progress": 0,
      "open": true,
      "meta": "92b55914-cf87-411e-ad0e-9a5b2ce026c1 FS",
      "parent": "8335a69d-118f-47ed-a1a2-841cefa523f0"
    },
    {
      "id": "779fbbc6-b8ff-4ce7-82be-75c543646860",
      "text": "Launch Pilot Apprenticeship Cohort",
      "custom_tooltip": "<b>Launch Pilot Apprenticeship Cohort</b><br>Run a trial 6-week apprenticeship program with 10\u201312 youth participants from local schools. Deliver the curriculum in a hybrid format (in-person at workshop + virtual check-ins), collect real-time feedback via bi-weekly surveys, and assess skill progression through milestone projects. Use results to refine the program before scaling.<br><b>Resources needed:</b><br><ul><li>Clay Workshop Manager</li><li>Instructors (cross-trained)</li><li>Youth Apprentices</li><li>Bilingual facilitators</li><li>IoT monitoring sensors for activity tracking</li></ul>",
      "start_date": "2028-06-14",
      "duration": 9.0,
      "progress": 0,
      "open": true,
      "meta": "6574c625-17c8-4af2-a460-27f075481f89 FS",
      "parent": "8335a69d-118f-47ed-a1a2-841cefa523f0"
    },
    {
      "id": "88964c43-3850-40ff-a7ac-c530efb42a1f",
      "text": "Evaluate and Scale Program",
      "custom_tooltip": "<b>Evaluate and Scale Program</b><br>Analyze data from the pilot cohort\u2014including attendance, skill development, participant satisfaction, and instructor feedback\u2014to identify strengths and gaps. Adjust the curriculum, mentorship model, and logistics accordingly. Finalize a scalable framework for annual recruitment and launch the full youth apprenticeship track by September 2026.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Data Analyst</li><li>Advisory Council</li><li>Bi-monthly survey tools</li><li>Stakeholder review meeting platform</li></ul>",
      "start_date": "2028-06-23",
      "duration": 9.0,
      "progress": 0,
      "open": true,
      "meta": "8335a69d-118f-47ed-a1a2-841cefa523f0 FF, 779fbbc6-b8ff-4ce7-82be-75c543646860 FS",
      "parent": "8335a69d-118f-47ed-a1a2-841cefa523f0"
    },
    {
      "id": "1379669b-9bd3-4ec5-b102-e91d9f11be38",
      "text": "Introduce AI-Assisted Design Tools with Cultural Context Guidance",
      "custom_tooltip": "<b>Introduce AI-Assisted Design Tools with Cultural Context Guidance</b>",
      "progress": 0,
      "open": true,
      "meta": "8335a69d-118f-47ed-a1a2-841cefa523f0 FS",
      "parent": "f8b3bc49-b977-46c9-90ab-5a694903f58e",
      "type": "project"
    },
    {
      "id": "8b3d7837-f82d-40d8-bba1-97fc44154bca",
      "text": "Co-Create AI Tools",
      "custom_tooltip": "<b>Co-Create AI Tools</b><br>Collaborate with elders and local artists to develop culturally relevant training datasets for AI-assisted design tools. Pilot the tool with a small group of instructors, ensuring alignment with traditional practices and community values. Address technical integration challenges and provide hands-on workshops to build trust and familiarity among staff.<br><b>Resources needed:</b><br><ul><li>Local artists and elders</li><li>Greenlandic Materials Scientist</li><li>AI software developer</li><li>Bilingual facilitator</li><li>Digital workshop space</li></ul>",
      "start_date": "2028-07-02",
      "duration": 7.0,
      "progress": 0,
      "open": true,
      "meta": "1379669b-9bd3-4ec5-b102-e91d9f11be38 SS",
      "parent": "1379669b-9bd3-4ec5-b102-e91d9f11be38"
    },
    {
      "id": "55de2ade-3f00-42cb-b1ca-91d4cb1ba8ee",
      "text": "Integrate Cultural Context",
      "custom_tooltip": "<b>Integrate Cultural Context</b><br>Embed cultural narratives and design principles into the AI tool&#x27;s framework through co-design sessions. Ensure all AI-generated suggestions respect sacred motifs and oral histories. Validate content with the advisory council before full deployment to prevent misrepresentation.<br><b>Resources needed:</b><br><ul><li>Inuit Cultural Heritage Council</li><li>Cultural Liaison</li><li>AI ethics consultant</li><li>Bilingual documentation team</li><li>Digital feedback platform</li></ul>",
      "start_date": "2028-07-09",
      "duration": 7.0,
      "progress": 0,
      "open": true,
      "meta": "8b3d7837-f82d-40d8-bba1-97fc44154bca FS",
      "parent": "1379669b-9bd3-4ec5-b102-e91d9f11be38"
    },
    {
      "id": "5c01199b-eb93-4a51-a393-5d13c7a0f47f",
      "text": "Test with Instructors",
      "custom_tooltip": "<b>Test with Instructors</b><br>Conduct a controlled pilot of the AI-assisted design tool with four part-time instructors using real project scenarios. Gather feedback on usability, cultural appropriateness, and technical performance. Refine the tool based on observed challenges and instructor input.<br><b>Resources needed:</b><br><ul><li>Four part-time instructors</li><li>Digital testing environment</li><li>Feedback forms (bilingual)</li><li>Project manager</li><li>Technical support lead</li></ul>",
      "start_date": "2028-07-16",
      "duration": 7.0,
      "progress": 0,
      "open": true,
      "meta": "55de2ade-3f00-42cb-b1ca-91d4cb1ba8ee FS",
      "parent": "1379669b-9bd3-4ec5-b102-e91d9f11be38"
    },
    {
      "id": "410c565b-6ab0-44e8-8d6c-41c94162dd95",
      "text": "Finalize Tool Deployment Plan",
      "custom_tooltip": "<b>Finalize Tool Deployment Plan</b><br>Develop a rollout strategy for the AI-assisted design tool, including training modules, access protocols, and integration with existing workflows. Secure formal approval from the advisory council and safety officer. Prepare documentation in both Danish and Greenlandic for all users.<br><b>Resources needed:</b><br><ul><li>Safety Officer</li><li>Project Manager</li><li>Legal Advisor</li><li>Training materials designer</li><li>Digital dashboard administrator</li></ul>",
      "start_date": "2028-07-23",
      "duration": 7.0,
      "progress": 0,
      "open": true,
      "meta": "1379669b-9bd3-4ec5-b102-e91d9f11be38 FF, 5c01199b-eb93-4a51-a393-5d13c7a0f47f FS",
      "parent": "1379669b-9bd3-4ec5-b102-e91d9f11be38"
    },
    {
      "id": "196534ca-3cae-4643-b947-5f1ee5fc2e8d",
      "text": "Establish Feedback Loops with Community through Bi-Monthly Surveys",
      "custom_tooltip": "<b>Establish Feedback Loops with Community through Bi-Monthly Surveys</b>",
      "progress": 0,
      "open": true,
      "meta": "1379669b-9bd3-4ec5-b102-e91d9f11be38 FS",

      "type": "project"
    },
    {
      "id": "66361d63-4ad2-44cb-8c70-1e9369256653",
      "text": "Conduct Community Surveys",
      "custom_tooltip": "<b>Conduct Community Surveys</b><br>Gather feedback from local residents, elders, and artists through bi-monthly surveys to assess engagement, identify cultural sensitivities, and evaluate the impact of co-created content. Use bilingual (Danish/Greenlandic) digital and printed forms distributed via schools, community centers, and social media. Incentivize participation with small rewards like free workshop vouchers to improve response rates.<br><b>Resources needed:</b><br><ul><li>Bilingual survey templates</li><li>Digital survey platform (e.g., Google Forms, Notion)</li><li>Printed survey materials</li><li>Community outreach coordinator</li><li>Incentive budget for participants</li></ul>",
      "start_date": "2028-07-30",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "196534ca-3cae-4643-b947-5f1ee5fc2e8d SS",
      "parent": "196534ca-3cae-4643-b947-5f1ee5fc2e8d"
    },
    {
      "id": "6e9a33e2-cc4c-482b-b29c-17bedc800209",
      "text": "Host Feedback Review Workshops",
      "custom_tooltip": "<b>Host Feedback Review Workshops</b><br>Organize quarterly in-person or virtual workshops with community stakeholders\u2014including elders, youth apprentices, and local artists\u2014to review survey results, discuss concerns, and co-develop action plans. Ensure all sessions are facilitated by a cultural liaison, conducted in both Danish and Greenlandic, and documented with minutes and visual summaries for transparency.<br><b>Resources needed:</b><br><ul><li>Facilitation team (cultural liaison, project manager)</li><li>Meeting space or virtual platform (Zoom/Teams)</li><li>Bilingual facilitation materials</li><li>Minutes and summary documentation tools</li><li>Refreshments and honorariums for participants</li></ul>",
      "start_date": "2028-08-03",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "66361d63-4ad2-44cb-8c70-1e9369256653 FS",
      "parent": "196534ca-3cae-4643-b947-5f1ee5fc2e8d"
    },
    {
      "id": "46c13fdd-d8b3-401f-bc0c-8fabce2a31c1",
      "text": "Integrate Feedback into Programming",
      "custom_tooltip": "<b>Integrate Feedback into Programming</b><br>Update course content, exhibition themes, and operational policies based on validated community input. Implement changes through iterative cycles: analyze feedback, prioritize actions, revise materials, pilot adjustments, and re-survey to measure improvement. Maintain a public dashboard showing how feedback led to real changes to build trust.<br><b>Resources needed:</b><br><ul><li>Project manager</li><li>Curriculum development team</li><li>Digital dashboard platform</li><li>Feedback analysis tools</li><li>Communication specialist for public updates</li></ul>",
      "start_date": "2028-08-07",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "6e9a33e2-cc4c-482b-b29c-17bedc800209 FS",
      "parent": "196534ca-3cae-4643-b947-5f1ee5fc2e8d"
    },
    {
      "id": "94d6f210-2724-467d-a04a-ba75f252277f",
      "text": "Publish Transparent Feedback Reports",
      "custom_tooltip": "<b>Publish Transparent Feedback Reports</b><br>Create and distribute bi-monthly public reports summarizing survey findings, workshop outcomes, and implemented changes. Include data visualizations, quotes from community members, and clear timelines. Share via email newsletters, social media, Katuaq Cultural Centre bulletin boards, and school networks to ensure broad accessibility.<br><b>Resources needed:</b><br><ul><li>Report design tools (Canva, Adobe InDesign)</li><li>Multilingual copywriters</li><li>Newsletter distribution system</li><li>Public display materials (posters, digital screens)</li><li>Community liaison for dissemination</li></ul>",
      "start_date": "2028-08-11",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "196534ca-3cae-4643-b947-5f1ee5fc2e8d FF, 46c13fdd-d8b3-401f-bc0c-8fabce2a31c1 FS",
      "parent": "196534ca-3cae-4643-b947-5f1ee5fc2e8d"
    },
    {
      "id": "6eb014ec-ba1e-41ae-aa39-79803a16ef41",
      "text": "Publish Co-Created Artworks in Public Spaces and Digital Platforms",
      "custom_tooltip": "<b>Publish Co-Created Artworks in Public Spaces and Digital Platforms</b>",
      "progress": 0,
      "open": true,
      "meta": "f8b3bc49-b977-46c9-90ab-5a694903f58e FF, 196534ca-3cae-4643-b947-5f1ee5fc2e8d FS",
      "parent": "f8b3bc49-b977-46c9-90ab-5a694903f58e",
      "type": "project"
    },
    {
      "id": "43e0a852-3381-49ee-9fa5-fb247158aad4",
      "text": "Finalize Artwork Approval",
      "custom_tooltip": "<b>Finalize Artwork Approval</b><br>Establish a formal review process with the Inuit Cultural Heritage Council and advisory council to approve all co-created artworks for public display, ensuring cultural sensitivity and community consent. This includes verifying that no restricted motifs or narratives are included and confirming alignment with the CIPR framework.<br><b>Resources needed:</b><br><ul><li>Cultural Liaison</li><li>Inuit Cultural Heritage Council</li><li>Advisory Council</li><li>Bilingual documentation tools</li></ul>",
      "start_date": "2028-08-15",
      "duration": 6.0,
      "progress": 0,
      "open": true,
      "meta": "6eb014ec-ba1e-41ae-aa39-79803a16ef41 SS",
      "parent": "6eb014ec-ba1e-41ae-aa39-79803a16ef41"
    },
    {
      "id": "b197413c-94a4-4068-8367-5f2730ec7299",
      "text": "Schedule Installation Logistics",
      "custom_tooltip": "<b>Schedule Installation Logistics</b><br>Plan and coordinate the physical installation of co-created artworks in public spaces (e.g., Katuaq Cultural Centre, Nuuk Center) during favorable weather windows (spring/summer). Secure transport contracts with local providers, confirm weather-resilient mounting solutions, and ensure all materials are pre-approved by the advisory council.<br><b>Resources needed:</b><br><ul><li>Local logistics coordinator</li><li>Transport provider</li><li>Installation team</li><li>Weather forecast data</li></ul>",
      "start_date": "2028-08-21",
      "duration": 6.0,
      "progress": 0,
      "open": true,
      "meta": "43e0a852-3381-49ee-9fa5-fb247158aad4 FS",
      "parent": "6eb014ec-ba1e-41ae-aa39-79803a16ef41"
    },
    {
      "id": "8ead6b2b-6a86-4815-8b83-d462b819b052",
      "text": "Publish Digital Archive",
      "custom_tooltip": "<b>Publish Digital Archive</b><br>Create and launch a bilingual (Danish/Greenlandic) digital archive of co-created artworks, including metadata such as artist names, cultural context, creation date, and approval status. Ensure the platform is accessible via mobile and desktop, supports multimedia, and integrates with the public dashboard for transparency.<br><b>Resources needed:</b><br><ul><li>Digital archivist</li><li>Web developer</li><li>Bilingual content manager</li><li>Cloud hosting service</li></ul>",
      "start_date": "2028-08-27",
      "duration": 6.0,
      "progress": 0,
      "open": true,
      "meta": "b197413c-94a4-4068-8367-5f2730ec7299 FS",
      "parent": "6eb014ec-ba1e-41ae-aa39-79803a16ef41"
    },
    {
      "id": "002f91ad-a04a-49ab-bc4e-6451352c34ab",
      "text": "Host Community Viewing Event",
      "custom_tooltip": "<b>Host Community Viewing Event</b><br>Organize a public event to unveil the co-created artworks in both physical and digital formats. Invite elders, artists, youth apprentices, and residents to participate in guided tours, storytelling sessions, and feedback discussions. Use this opportunity to reinforce community ownership and celebrate cultural collaboration.<br><b>Resources needed:</b><br><ul><li>Event coordinator</li><li>Facility space</li><li>Bilingual signage</li><li>Audio-visual equipment</li></ul>",
      "start_date": "2028-09-02",
      "duration": 6.0,
      "progress": 0,
      "open": true,
      "meta": "6eb014ec-ba1e-41ae-aa39-79803a16ef41 FF, 8ead6b2b-6a86-4815-8b83-d462b819b052 FS",
      "parent": "6eb014ec-ba1e-41ae-aa39-79803a16ef41"
    },

    {
      "id": "2e6f29b3-d7ad-47a9-9de1-f540013231eb",
      "text": "Submit All Permit Applications in Danish and Greenlandic by April 20, 2026",
      "custom_tooltip": "<b>Submit All Permit Applications in Danish and Greenlandic by April 20, 2026</b>",

    {
      "id": "0748867a-c89a-4451-81b5-bf2bc1d80c91",
      "text": "Finalize Permit Documentation",
      "custom_tooltip": "<b>Finalize Permit Documentation</b><br>Compile and verify all required documentation for Nuuk Municipality permits, including bilingual (Danish/Greenlandic) submissions. Ensure compliance with Building Code, Fire Safety, Environmental Protection, and Noise Control regulations. Prepare digital and physical copies for submission by April 20, 2026.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Legal Advisor</li><li>Bilingual Administrative Assistant</li><li>Certified Arctic Building Specialist</li><li>Digital Document Repository</li></ul>",
      "start_date": "2028-09-08",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "2e6f29b3-d7ad-47a9-9de1-f540013231eb SS",
      "parent": "2e6f29b3-d7ad-47a9-9de1-f540013231eb"
    },
    {
      "id": "78625bf9-e9ed-46fe-81e4-8dcf5312627c",
      "text": "Conduct Pre-Submission Review",
      "custom_tooltip": "<b>Conduct Pre-Submission Review</b><br>Perform an internal audit of all permit documents using checklists aligned with NFPA, Bygningsreglementet, and Greenlandic Health and Safety at Work Act. Engage the Katuaq Cultural Centre Oversight Committee for feedback on cultural and community-related aspects of the application.<br><b>Resources needed:</b><br><ul><li>Safety Officer</li><li>Facility Manager</li><li>Cultural Liaison</li><li>Compliance Checklist Template</li><li>Meeting Facilitator</li></ul>",
      "start_date": "2028-09-12",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "0748867a-c89a-4451-81b5-bf2bc1d80c91 FS",
      "parent": "2e6f29b3-d7ad-47a9-9de1-f540013231eb"
    },
    {
      "id": "e720d1d2-b6f5-4d1a-8eed-89652dec2a59",
      "text": "Submit Applications to Nuuk Municipality",
      "custom_tooltip": "<b>Submit Applications to Nuuk Municipality</b><br>Deliver all completed permit applications in both Danish and Greenlandic to Nuuk Municipality Planning Department by the deadline. Track submission confirmation and initiate follow-up protocol if no acknowledgment is received within 48 hours.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Logistics Coordinator</li><li>Nuuk Municipality Contact List</li><li>Proof of Delivery System</li></ul>",
      "start_date": "2028-09-16",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "78625bf9-e9ed-46fe-81e4-8dcf5312627c FS",
      "parent": "2e6f29b3-d7ad-47a9-9de1-f540013231eb"
    },
    {
      "id": "0705e8ad-97e9-41a4-a467-4d170411007c",
      "text": "Coordinate Follow-Up with Regulatory Bodies",
      "custom_tooltip": "<b>Coordinate Follow-Up with Regulatory Bodies</b><br>Schedule and conduct proactive check-ins with Nuuk Municipality planning officials and other regulatory bodies to monitor application status. Address any feedback or missing items promptly to avoid delays in approval timeline.<br><b>Resources needed:</b><br><ul><li>Regulatory Liaison</li><li>Calendar Integration Tool</li><li>Communication Log</li><li>Stakeholder Contact Database</li></ul>",
      "start_date": "2028-09-20",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "e720d1d2-b6f5-4d1a-8eed-89652dec2a59 FS",
      "parent": "2e6f29b3-d7ad-47a9-9de1-f540013231eb"
    },
    {
      "id": "aa4cd3ca-9802-4ff5-ad45-feda0af16791",
      "text": "Prepare for Potential Revisions",
      "custom_tooltip": "<b>Prepare for Potential Revisions</b><br>Develop a contingency plan for anticipated revisions based on past municipal review patterns. Maintain editable versions of all documents and assign a dedicated team member to manage updates and resubmissions if required.<br><b>Resources needed:</b><br><ul><li>Document Management System</li><li>Revision Tracker</li><li>Backup Legal Reviewer</li><li>Flexible Timeline Buffer</li></ul>",
      "start_date": "2028-09-24",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "2e6f29b3-d7ad-47a9-9de1-f540013231eb FF, 0705e8ad-97e9-41a4-a467-4d170411007c FS",
      "parent": "2e6f29b3-d7ad-47a9-9de1-f540013231eb"
    },
    {
      "id": "de656ef5-e6de-4587-94ec-871e9d4df59b",
      "text": "Conduct Pre-Opening Thermal and Safety Audits with Certified Arctic Specialist",
      "custom_tooltip": "<b>Conduct Pre-Opening Thermal and Safety Audits with Certified Arctic Specialist</b>",
      "progress": 0,
      "open": true,
      "meta": "2e6f29b3-d7ad-47a9-9de1-f540013231eb FS",
      "parent": "07827060-b275-4773-a9ac-629b6f5ff467",
      "type": "project"
    },
    {
      "id": "fd6de37a-e73e-415a-b0a9-fc150f2c7743",
      "text": "Conduct Thermal Audit",
      "custom_tooltip": "<b>Conduct Thermal Audit</b><br>Perform a comprehensive pre-opening thermal audit of the facility using certified Arctic building standards. This includes assessing insulation integrity, thermal mass performance, and heat retention across all zones under simulated winter conditions (-20\u00b0C). The audit must validate that indoor temperatures remain within \u00b15\u00b0C of target parameters during peak occupancy (90%) and identify any necessary upgrades before fit-out completion.<br><b>Resources needed:</b><br><ul><li>Certified Arctic building specialist</li><li>Thermal imaging equipment</li><li>EnergyPlus simulation software</li><li>Bilingual audit report template</li></ul>",
      "start_date": "2028-09-28",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "de656ef5-e6de-4587-94ec-871e9d4df59b SS",
      "parent": "de656ef5-e6de-4587-94ec-871e9d4df59b"
    },
    {
      "id": "ef895845-13e6-49d6-be2d-e15802f6301f",
      "text": "Verify Safety Compliance",
      "custom_tooltip": "<b>Verify Safety Compliance</b><br>Ensure all safety systems meet Greenlandic Health and Safety at Work Act and International Fire Safety Codes (NFPA 80, NFPA 101). Conduct on-site inspections of ventilation, fire suppression systems, emergency exits, and kiln operation protocols. Document findings and implement corrective actions prior to certification submission.<br><b>Resources needed:</b><br><ul><li>Safety Officer</li><li>Fire safety inspector</li><li>Building code compliance checklist</li><li>Emergency response plan documentation</li></ul>",
      "start_date": "2028-10-02",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "fd6de37a-e73e-415a-b0a9-fc150f2c7743 FS",
      "parent": "de656ef5-e6de-4587-94ec-871e9d4df59b"
    },
    {
      "id": "08ca2fa0-b297-49f4-88a8-cdca629054f9",
      "text": "Prepare Compliance Documentation",
      "custom_tooltip": "<b>Prepare Compliance Documentation</b><br>Compile and finalize all required documentation for Nuuk Municipality review, including bilingual (Danish/Greenlandic) versions of the Building Code Compliance Certificate application, Fire Safety Inspection Report, Environmental Protection Act Registration, and Noise Control Permit. Ensure all forms are signed, notarized, and submitted by April 20, 2026.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Legal Advisor</li><li>Bilingual document templates</li><li>Digital filing system with version control</li></ul>",
      "start_date": "2028-10-06",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "ef895845-13e6-49d6-be2d-e15802f6301f FS",
      "parent": "de656ef5-e6de-4587-94ec-871e9d4df59b"
    },
    {
      "id": "2e14291f-1d56-493f-b30c-5d8020692e70",
      "text": "Schedule Regulatory Review Meeting",
      "custom_tooltip": "<b>Schedule Regulatory Review Meeting</b><br>Coordinate with Nuuk Municipality Planning Department and Katuaq Cultural Centre Oversight Committee to schedule a formal review meeting one week before the final compliance audit. Present preliminary findings, address feedback, and confirm readiness for inspection. Use this opportunity to resolve any outstanding concerns proactively.<br><b>Resources needed:</b><br><ul><li>Regulatory liaison</li><li>Meeting agenda and presentation materials</li><li>Minutes recording tool</li><li>Stakeholder contact list</li></ul>",
      "start_date": "2028-10-10",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "08ca2fa0-b297-49f4-88a8-cdca629054f9 FS",
      "parent": "de656ef5-e6de-4587-94ec-871e9d4df59b"
    },
    {
      "id": "7d467e41-70a7-4e3b-af67-7c780a464e0f",
      "text": "Finalize Audit Readiness Package",
      "custom_tooltip": "<b>Finalize Audit Readiness Package</b><br>Assemble a complete audit readiness package containing all verified records: thermal load data, safety inspection reports, training logs, liability waivers, incident logs, and digital dashboards. Conduct a dry run with internal staff to simulate the audit process and ensure full compliance with all requirements before official submission.<br><b>Resources needed:</b><br><ul><li>Compliance champion</li><li>Digital tracking dashboard</li><li>Audit checklist</li><li>Internal review team</li></ul>",
      "start_date": "2028-10-14",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "de656ef5-e6de-4587-94ec-871e9d4df59b FF, 2e14291f-1d56-493f-b30c-5d8020692e70 FS",
      "parent": "de656ef5-e6de-4587-94ec-871e9d4df59b"
    },
    {
      "id": "e064f302-6662-409b-ab28-ea8b2deaddfa",
      "text": "Obtain Building Code Compliance Certificate and Fire Safety Certification",
      "custom_tooltip": "<b>Obtain Building Code Compliance Certificate and Fire Safety Certification</b>",
      "progress": 0,
      "open": true,
      "meta": "de656ef5-e6de-4587-94ec-871e9d4df59b FS",
      "parent": "07827060-b275-4773-a9ac-629b6f5ff467",
      "type": "project"
    },
    {
      "id": "f65bcec8-c59d-442c-a049-a72dec4bf5f8",
      "text": "Prepare Compliance Documentation",
      "custom_tooltip": "<b>Prepare Compliance Documentation</b><br>Gather and compile all required documents for regulatory compliance, including safety training records, liability waiver forms, incident logs, and certification proofs. Ensure all materials are bilingual (Danish/Greenlandic) and organized in a centralized digital repository with version control.<br><b>Resources needed:</b><br><ul><li>Safety Officer</li><li>Digital Shift Calendar</li><li>Bilingual Documentation Templates</li><li>Centralized Digital Repository (e.g., Notion or Google Drive)</li></ul>",
      "start_date": "2028-10-18",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "e064f302-6662-409b-ab28-ea8b2deaddfa SS",
      "parent": "e064f302-6662-409b-ab28-ea8b2deaddfa"
    },
    {
      "id": "3d25ebe4-5d39-4a3c-94ec-6746ea45e81f",
      "text": "Conduct Internal Compliance Audit",
      "custom_tooltip": "<b>Conduct Internal Compliance Audit</b><br>Perform a pre-submission review of all compliance records using checklists aligned with Greenlandic Health and Safety at Work Act and NFPA standards. Identify gaps and ensure all staff have completed mandatory training and signed waivers.<br><b>Resources needed:</b><br><ul><li>Compliance Champion (rotating role)</li><li>Checklist Template (bilingual)</li><li>Internal Audit Log</li></ul>",
      "start_date": "2028-10-22",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "f65bcec8-c59d-442c-a049-a72dec4bf5f8 FS",
      "parent": "e064f302-6662-409b-ab28-ea8b2deaddfa"
    },
    {
      "id": "5fffcbc2-f37e-4fe3-9f78-8201c8b4ada7",
      "text": "Submit Records to Nuuk Municipality",
      "custom_tooltip": "<b>Submit Records to Nuuk Municipality</b><br>Deliver all compiled compliance documentation to Nuuk Municipality in both Danish and Greenlandic by the deadline of April 20, 2026. Include confirmation of receipt and initiate follow-up protocol for any missing items or feedback.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Nuuk Municipality Liaison</li><li>Bilingual Submission Package</li><li>Tracking System for Submission Confirmation</li></ul>",
      "start_date": "2028-10-26",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "3d25ebe4-5d39-4a3c-94ec-6746ea45e81f FS",
      "parent": "e064f302-6662-409b-ab28-ea8b2deaddfa"
    },
    {
      "id": "92e660ac-5642-4db3-9bed-606053fbf8a1",
      "text": "Address Feedback and Resolve Gaps",
      "custom_tooltip": "<b>Address Feedback and Resolve Gaps</b><br>Respond promptly to any queries or deficiencies raised by Nuuk Municipality during the review process. Update records, re-submit corrected documents, and maintain a log of all communications and revisions.<br><b>Resources needed:</b><br><ul><li>Compliance Liaison</li><li>Updated Documentation Set</li><li>Communication Log</li></ul>",
      "start_date": "2028-10-30",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "5fffcbc2-f37e-4fe3-9f78-8201c8b4ada7 FS",
      "parent": "e064f302-6662-409b-ab28-ea8b2deaddfa"
    },
    {
      "id": "6014afda-1b0f-43f2-8594-b6593d990c38",
      "text": "Verify Final Compliance Status",
      "custom_tooltip": "<b>Verify Final Compliance Status</b><br>Confirm official acceptance of all compliance records through written confirmation from Nuuk Municipality. Document final approval status and integrate it into the project\u2019s readiness dashboard.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Final Approval Confirmation</li><li>Real-Time Tracking Dashboard</li></ul>",
      "start_date": "2028-11-03",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "e064f302-6662-409b-ab28-ea8b2deaddfa FF, 92e660ac-5642-4db3-9bed-606053fbf8a1 FS",
      "parent": "e064f302-6662-409b-ab28-ea8b2deaddfa"
    },
    {

      "text": "Schedule Compliance Audit with Nuuk Municipality One Week Before Opening",
      "custom_tooltip": "<b>Schedule Compliance Audit with Nuuk Municipality One Week Before Opening</b>",

    },
    {
      "id": "807f7b9c-c3e1-465c-824a-518d3259b914",
      "text": "Establish Digital Tracking System",
      "custom_tooltip": "<b>Establish Digital Tracking System</b><br>Set up a centralized digital platform to record and monitor safety training completion, liability waiver submissions, and incident logs. Ensure the system supports bilingual (Danish/Greenlandic) input, automated reminders for deadlines, and real-time access for the Safety Officer and project manager. Integrate with the digital shift calendar to flag overdue entries.<br><b>Resources needed:</b><br><ul><li>Digital tracking software (e.g., Notion or Airtable)</li><li>Safety Officer</li><li>Project Manager</li><li>Bilingual administrative support</li></ul>",

    {
      "id": "f98d83f8-1f15-4c4d-8c80-20f53e973095",
      "text": "Develop Standardized Documentation Protocols",
      "custom_tooltip": "<b>Develop Standardized Documentation Protocols</b><br>Create clear, step-by-step guidelines for staff on how to log safety training, submit liability waivers, and report incidents. Include templates in both Danish and Greenlandic, define roles and responsibilities, and specify retention periods. Distribute protocols via onboarding materials and post them in visible areas within the workshop.<br><b>Resources needed:</b><br><ul><li>Legal Advisor</li><li>Cultural Liaison</li><li>Safety Officer</li><li>Bilingual documentation templates</li></ul>",
      "start_date": "2028-11-10",
      "duration": 3.0,
      "progress": 0,

      "meta": "807f7b9c-c3e1-465c-824a-518d3259b914 FS",

    },
    {
      "id": "ca8b0177-e8a4-4a88-b2e8-e8b0a12a7f66",
      "text": "Conduct Staff Training on Compliance Procedures",
      "custom_tooltip": "<b>Conduct Staff Training on Compliance Procedures</b><br>Organize mandatory training sessions for all instructors and volunteers on how to use the digital tracking system and follow documentation protocols. Use role-playing scenarios to reinforce accountability and include a quiz to verify understanding. Record attendance and completion status in the system.<br><b>Resources needed:</b><br><ul><li>Safety Officer</li><li>Training materials (bilingual)</li><li>Digital tracking system</li><li>Instructors and volunteers</li></ul>",
      "start_date": "2028-11-13",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "f98d83f8-1f15-4c4d-8c80-20f53e973095 FS",
      "parent": "c5c72c04-1b52-4cc1-a006-f0602d2e1bdb"
    },
    {
      "id": "feb7f26c-d8a8-4ee5-bfc0-78235f6b36b0",
      "text": "Perform Bi-Weekly Compliance Audits",
      "custom_tooltip": "<b>Perform Bi-Weekly Compliance Audits</b><br>Implement a routine audit process where the rotating compliance champion reviews records every two weeks. Check for completeness, accuracy, and timeliness of training logs, waivers, and incident reports. Address gaps immediately and escalate recurring issues to the project manager.<br><b>Resources needed:</b><br><ul><li>Rotating compliance champion</li><li>Digital tracking system</li><li>Audit checklist (bilingual)</li><li>Project Manager</li></ul>",
      "start_date": "2028-11-16",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "ca8b0177-e8a4-4a88-b2e8-e8b0a12a7f66 FS",

    },
    {
      "id": "7208fd94-ebbe-496f-a855-782e6e8b20e7",
      "text": "Integrate Records into Final Compliance Audit",
      "custom_tooltip": "<b>Integrate Records into Final Compliance Audit</b><br>Ensure all safety training, waiver, and incident records are compiled and verified before the final compliance audit with Nuuk Municipality. Confirm that the digital system has full audit trails, backup copies are stored securely, and all documents are available in both Danish and Greenlandic for review.<br><b>Resources needed:</b><br><ul><li>Safety Officer</li><li>Project Manager</li><li>Digital tracking system</li><li>Compliance audit checklist</li></ul>",
      "start_date": "2028-11-19",

    {
      "id": "3cebe23e-3751-4dee-a346-6ce8134dbfbb",
      "text": "Establish Digital Tracking System",
      "custom_tooltip": "<b>Establish Digital Tracking System</b><br>Set up a centralized digital platform to log and monitor safety training completion, liability waiver submissions, and incident reports. Ensure the system supports bilingual (Danish/Greenlandic) input, automated reminders for upcoming deadlines, and real-time access for the Safety Officer and Clay Workshop Manager. Integrate with the existing digital shift calendar and conduct a pilot test with one instructor team.<br><b>Resources needed:</b><br><ul><li>Digital tracking software (e.g., Notion or Airtable)</li><li>Safety Officer</li><li>Clay Workshop Manager</li><li>Bilingual technical support</li></ul>",

    {
      "id": "4174b06c-8a5b-4778-b3ab-ea19c4aaa4f2",
      "text": "Develop Bilingual Documentation Templates",
      "custom_tooltip": "<b>Develop Bilingual Documentation Templates</b><br>Create standardized templates for safety training records, liability waivers, and incident logs in both Danish and Greenlandic. Include fields for date, participant name, role, training topic, signature, and notes. Validate templates with legal and cultural advisors to ensure compliance with Greenlandic labor and IP laws, and distribute them to all staff and volunteers.<br><b>Resources needed:</b><br><ul><li>Legal Advisor</li><li>Cultural Liaison</li><li>Project Manager</li><li>Bilingual documentation specialist</li></ul>",

    {
      "id": "12688067-7281-4bc4-811a-f15b792b20b9",
      "text": "Conduct Onboarding Compliance Check",
      "custom_tooltip": "<b>Conduct Onboarding Compliance Check</b><br>Implement a mandatory compliance check during instructor and volunteer onboarding. Verify that each individual has completed safety training, signed a liability waiver, and submitted required documentation through the digital system. Flag incomplete records immediately and prevent participation in any session until resolved.<br><b>Resources needed:</b><br><ul><li>Onboarding coordinator</li><li>Digital tracking system</li><li>Safety Officer</li><li>Instructors and volunteers</li></ul>",

    {
      "id": "a0f34647-904c-4016-9124-9c934f2215c2",
      "text": "Perform Bi-Weekly Audit of Records",
      "custom_tooltip": "<b>Perform Bi-Weekly Audit of Records</b><br>Schedule and execute bi-weekly audits of all safety, waiver, and incident records to ensure accuracy, completeness, and timeliness. Use the audit findings to identify gaps, provide feedback to staff, and update the tracking system as needed. Document audit results and share summaries with the Clay Workshop Manager and Safety Officer.<br><b>Resources needed:</b><br><ul><li>Safety Officer</li><li>Compliance champion (rotating role)</li><li>Digital tracking system</li><li>Audit checklist</li></ul>",

    },
    {
      "id": "7fee80a7-826c-4f5c-8ba7-3118bc4ad3de",
      "text": "Ensure Real-Time Compliance Visibility",
      "custom_tooltip": "<b>Ensure Real-Time Compliance Visibility</b><br>Integrate compliance status into the real-time dashboard used by the Clay Workshop Manager and Safety Officer. Display key metrics such as % of staff trained, % of waivers submitted, and number of open incident reports. Enable alerts for overdue items and allow instant access to full records during inspections or audits.<br><b>Resources needed:</b><br><ul><li>Digital dashboard (e.g., Airtable or Google Sheets)</li><li>IT liaison</li><li>Safety Officer</li><li>Clay Workshop Manager</li></ul>",

    {
      "id": "d5f4143f-516a-4811-8204-5dcfad0f8432",

    {
      "id": "740b6102-eddc-457c-9fcb-6e88c1ad84de",
      "text": "Finalize Lease Terms",
      "custom_tooltip": "<b>Finalize Lease Terms</b><br>Negotiate and finalize the lease agreement for a 120\u2013150 m\u00b2 commercial space near Katuaq Cultural Centre, ensuring all terms align with project needs including use restrictions, rent escalation clauses, and access rights. Coordinate with a local real estate advisor to expedite legal review and secure bilingual (Danish/Greenlandic) documentation.<br><b>Resources needed:</b><br><ul><li>Local real estate advisor</li><li>Legal counsel (Greenlandic/Danish)</li><li>Project manager</li><li>Bilingual contract templates</li></ul>",
      "start_date": "2028-12-02",
      "duration": 5.0,
      "progress": 0,
      "open": true,
      "meta": "d5f4143f-516a-4811-8204-5dcfad0f8432 SS",
      "parent": "d5f4143f-516a-4811-8204-5dcfad0f8432"
    },
    {
      "id": "86e8d180-2c8d-41cf-a28b-df02c79c5d5c",
      "text": "Conduct Site Inspection",
      "custom_tooltip": "<b>Conduct Site Inspection</b><br>Perform a physical site inspection to verify space suitability, assess structural integrity, confirm access routes, and evaluate proximity to utilities and public transport. Document findings and compare against project requirements for ventilation, lighting, and workflow layout.<br><b>Resources needed:</b><br><ul><li>Facility manager</li><li>Certified Arctic building specialist</li><li>Site inspection checklist</li><li>Digital camera and measuring tools</li></ul>",
      "start_date": "2028-12-07",
      "duration": 5.0,
      "progress": 0,
      "open": true,
      "meta": "740b6102-eddc-457c-9fcb-6e88c1ad84de FS",
      "parent": "d5f4143f-516a-4811-8204-5dcfad0f8432"
    },
    {
      "id": "40d09f18-d917-4389-817d-3cc64be90270",
      "text": "Secure Landlord Approval",
      "custom_tooltip": "<b>Secure Landlord Approval</b><br>Obtain formal written approval from the landlord for the intended use of the space as a clay workshop, including compliance with commercial zoning regulations. Submit a detailed operational plan and safety overview to address any concerns.<br><b>Resources needed:</b><br><ul><li>Project manager</li><li>Lease agreement draft</li><li>Operational plan document</li><li>Landlord communication liaison</li></ul>",
      "start_date": "2028-12-12",
      "duration": 5.0,
      "progress": 0,
      "open": true,
      "meta": "86e8d180-2c8d-41cf-a28b-df02c79c5d5c FS",
      "parent": "d5f4143f-516a-4811-8204-5dcfad0f8432"
    },
    {
      "id": "6a0f3bca-889a-4bc8-825b-366bcc5f0095",
      "text": "Register with Nuuk Municipality",
      "custom_tooltip": "<b>Register with Nuuk Municipality</b><br>Submit required documentation to Nuuk Municipality for official registration of the new commercial space, including proof of lease, business intent, and compliance with local planning and environmental standards. Track application status and respond promptly to feedback.<br><b>Resources needed:</b><br><ul><li>Nuuk Municipality liaison</li><li>Bilingual application forms</li><li>Lease agreement copy</li><li>Business registration documents</li></ul>",
      "start_date": "2028-12-17",
      "duration": 5.0,
      "progress": 0,
      "open": true,
      "meta": "40d09f18-d917-4389-817d-3cc64be90270 FS",
      "parent": "d5f4143f-516a-4811-8204-5dcfad0f8432"
    },
    {
      "id": "147ceba9-95b9-4b72-9c53-a84a47536f6c",
      "text": "Confirm Move-In Readiness",
      "custom_tooltip": "<b>Confirm Move-In Readiness</b><br>Verify that all pre-lease conditions are met, including finalizing utility connections, securing emergency access routes, and confirming availability of key personnel for handover. Conduct a dry-run walkthrough with the facility team to ensure readiness for fit-out phase.<br><b>Resources needed:</b><br><ul><li>Facility manager</li><li>Utility providers</li><li>Safety officer</li><li>Move-in checklist</li></ul>",
      "start_date": "2028-12-22",
      "duration": 5.0,
      "progress": 0,
      "open": true,
      "meta": "d5f4143f-516a-4811-8204-5dcfad0f8432 FF, 6a0f3bca-889a-4bc8-825b-366bcc5f0095 FS",
      "parent": "d5f4143f-516a-4811-8204-5dcfad0f8432"
    },
    {
      "id": "de3088ee-cfeb-4f03-bd04-25d2f8dd1511",
      "text": "Hire and Onboard Four Part-Time Instructors",
      "custom_tooltip": "<b>Hire and Onboard Four Part-Time Instructors</b>",
      "progress": 0,
      "open": true,
      "meta": "d5f4143f-516a-4811-8204-5dcfad0f8432 FS",
      "parent": "1749a87b-16d7-40fa-8683-e8d69b60fc6f",
      "type": "project"
    },
    {
      "id": "8efcb981-1f31-414f-b6a0-54f3df248f11",
      "text": "Recruit Instructors",
      "custom_tooltip": "<b>Recruit Instructors</b><br>Identify and attract four qualified part-time instructors with experience in hand-building and wheel-throwing. Conduct interviews, verify credentials, and assess cultural alignment with the project\u2019s values. Prioritize candidates with local ties or Greenlandic language skills to support community integration.<br><b>Resources needed:</b><br><ul><li>Recruitment coordinator</li><li>Bilingual job posting templates</li><li>Interview panel (Project Manager, Cultural Liaison)</li><li>Digital application platform</li></ul>",
      "start_date": "2028-12-27",
      "duration": 6.0,
      "progress": 0,
      "open": true,
      "meta": "de3088ee-cfeb-4f03-bd04-25d2f8dd1511 SS",
      "parent": "de3088ee-cfeb-4f03-bd04-25d2f8dd1511"
    },
    {
      "id": "46db0eb5-e3bd-40bd-8035-1f39591d7ebe",
      "text": "Conduct Onboarding Training",
      "custom_tooltip": "<b>Conduct Onboarding Training</b><br>Deliver a comprehensive onboarding program covering safety protocols, cultural content guidelines, teaching methodologies, and facility operations. Include mandatory training modules on Arctic-specific risks, liability waivers, and use of IoT monitoring systems. Ensure all instructors complete training at least two weeks before first course delivery.<br><b>Resources needed:</b><br><ul><li>Safety Officer</li><li>Training materials (bilingual)</li><li>Digital learning platform</li><li>Onboarding checklist and tracking system</li></ul>",
      "start_date": "2029-01-02",
      "duration": 6.0,
      "progress": 0,
      "open": true,
      "meta": "8efcb981-1f31-414f-b6a0-54f3df248f11 FS",
      "parent": "de3088ee-cfeb-4f03-bd04-25d2f8dd1511"
    },
    {
      "id": "66046989-d62f-4a62-b8b4-8e2f81f5e1eb",
      "text": "Finalize Instructor Contracts",
      "custom_tooltip": "<b>Finalize Instructor Contracts</b><br>Draft and execute formal employment agreements for all four part-time instructors. Include terms on compensation, scheduling flexibility, cross-training requirements, and compliance with safety and cultural policies. Ensure contracts are signed in both Danish and Greenlandic and stored securely in the digital records system.<br><b>Resources needed:</b><br><ul><li>Legal Advisor</li><li>Bilingual contract templates</li><li>HR liaison</li><li>Digital signature platform</li></ul>",
      "start_date": "2029-01-08",
      "duration": 6.0,
      "progress": 0,
      "open": true,
      "meta": "46db0eb5-e3bd-40bd-8035-1f39591d7ebe FS",
      "parent": "de3088ee-cfeb-4f03-bd04-25d2f8dd1511"
    },
    {
      "id": "9d05f8dc-9b3e-4d2b-9133-98448cdc8db0",
      "text": "Assign Rotating Schedules",
      "custom_tooltip": "<b>Assign Rotating Schedules</b><br>Develop and implement a rotating instructor schedule using the digital shift calendar. Ensure each instructor is cross-trained in at least two core skill areas (hand-building, wheel-throwing) and has backup coverage during absences. Test the schedule with a dry-run session to validate coverage and avoid conflicts.<br><b>Resources needed:</b><br><ul><li>Facility Manager</li><li>Digital shift calendar</li><li>Cross-training coordinator</li><li>Rotating schedule template</li></ul>",
      "start_date": "2029-01-14",
      "duration": 6.0,
      "progress": 0,
      "open": true,
      "meta": "66046989-d62f-4a62-b8b4-8e2f81f5e1eb FS",
      "parent": "de3088ee-cfeb-4f03-bd04-25d2f8dd1511"
    },
    {
      "id": "d7f44198-0fae-4d41-9e2f-de3fa6a8f320",
      "text": "Verify Staff Readiness",
      "custom_tooltip": "<b>Verify Staff Readiness</b><br>Confirm that all instructors have completed safety training, signed liability waivers, and passed a final readiness check. Conduct a pre-launch review with the Safety Officer and Project Manager to ensure full compliance. Document all verification steps for audit purposes.<br><b>Resources needed:</b><br><ul><li>Safety Officer</li><li>Compliance checklist</li><li>Digital verification dashboard</li><li>Project Manager</li></ul>",
      "start_date": "2029-01-20",
      "duration": 6.0,
      "progress": 0,
      "open": true,
      "meta": "de3088ee-cfeb-4f03-bd04-25d2f8dd1511 FF, 9d05f8dc-9b3e-4d2b-9133-98448cdc8db0 FS",
      "parent": "de3088ee-cfeb-4f03-bd04-25d2f8dd1511"
    },
    {
      "id": "cdf0bac9-9c4f-4332-8560-6438d65da866",
      "text": "Complete Fit-Out and Install Kilns, Worktables, Drying Racks, and Ventilation",
      "custom_tooltip": "<b>Complete Fit-Out and Install Kilns, Worktables, Drying Racks, and Ventilation</b>",
      "progress": 0,
      "open": true,
      "meta": "de3088ee-cfeb-4f03-bd04-25d2f8dd1511 FS",
      "parent": "1749a87b-16d7-40fa-8683-e8d69b60fc6f",
      "type": "project"
    },
    {
      "id": "9b24d84a-711c-47bb-b943-14d75b5826a3",
      "text": "Procure Key Equipment",
      "custom_tooltip": "<b>Procure Key Equipment</b><br>Order and confirm delivery of kilns, worktables, drying racks, and ventilation systems with guaranteed Arctic shipping timelines. Prioritize modular, pre-fabricated components to reduce on-site assembly time. Verify supplier reliability and include contingency clauses for weather-related delays.<br><b>Resources needed:</b><br><ul><li>Project manager</li><li>Local logistics coordinator</li><li>Supplier liaison</li><li>Digital shift calendar</li></ul>",
      "start_date": "2029-01-26",
      "duration": 6.0,
      "progress": 0,
      "open": true,
      "meta": "cdf0bac9-9c4f-4332-8560-6438d65da866 SS",
      "parent": "cdf0bac9-9c4f-4332-8560-6438d65da866"
    },
    {
      "id": "ae5afc31-a7a6-422c-8cee-67591cf52475",
      "text": "Schedule On-Site Installation",
      "custom_tooltip": "<b>Schedule On-Site Installation</b><br>Coordinate installation dates with certified Arctic contractors during favorable weather windows (late spring/early summer). Conduct pre-installation site checks for structural readiness and ensure all equipment is delivered in sequence to avoid bottlenecks.<br><b>Resources needed:</b><br><ul><li>Facility manager</li><li>Certified Arctic contractor</li><li>Safety officer</li><li>Construction crew</li></ul>",
      "start_date": "2029-02-01",
      "duration": 6.0,
      "progress": 0,
      "open": true,
      "meta": "9b24d84a-711c-47bb-b943-14d75b5826a3 FS",
      "parent": "cdf0bac9-9c4f-4332-8560-6438d65da866"
    },
    {
      "id": "67f07a47-ff70-4086-a34c-3e2d960891a6",
      "text": "Conduct Pre-Installation Inspections",
      "custom_tooltip": "<b>Conduct Pre-Installation Inspections</b><br>Perform detailed inspections of all equipment upon arrival to verify integrity, compliance with safety standards, and compatibility with the workshop layout. Document any defects or discrepancies immediately and initiate replacement or repair processes.<br><b>Resources needed:</b><br><ul><li>Facility manager</li><li>Safety officer</li><li>Technical inspector</li><li>Bilingual documentation team</li></ul>",
      "start_date": "2029-02-07",
      "duration": 6.0,
      "progress": 0,
      "open": true,
      "meta": "ae5afc31-a7a6-422c-8cee-67591cf52475 FS",
      "parent": "cdf0bac9-9c4f-4332-8560-6438d65da866"
    },
    {
      "id": "55a8184e-ea33-42b6-96f3-24ce77153d7d",
      "text": "Install and Test Systems",
      "custom_tooltip": "<b>Install and Test Systems</b><br>Execute installation of kilns, worktables, drying racks, and ventilation systems according to design specifications. Perform functional tests post-installation, including airflow verification, temperature control calibration, and structural stability checks.<br><b>Resources needed:</b><br><ul><li>Facility manager</li><li>Technical installer</li><li>Energy systems engineer</li><li>IoT sensor technician</li></ul>",
      "start_date": "2029-02-13",
      "duration": 6.0,
      "progress": 0,
      "open": true,
      "meta": "67f07a47-ff70-4086-a34c-3e2d960891a6 FS",
      "parent": "cdf0bac9-9c4f-4332-8560-6438d65da866"
    },
    {
      "id": "ae79f82c-dd8f-494a-a488-7b4e8283a734",
      "text": "Finalize Fit-Out Completion",
      "custom_tooltip": "<b>Finalize Fit-Out Completion</b><br>Complete all remaining fit-out tasks including final cleaning, safety signage placement, and integration of IoT environmental monitoring sensors. Conduct a full walkthrough with the safety officer and project manager to confirm operational readiness.<br><b>Resources needed:</b><br><ul><li>Facility manager</li><li>Safety officer</li><li>Cleaning crew</li><li>Digital dashboard administrator</li></ul>",
      "start_date": "2029-02-19",
      "duration": 6.0,
      "progress": 0,
      "open": true,
      "meta": "cdf0bac9-9c4f-4332-8560-6438d65da866 FF, 55a8184e-ea33-42b6-96f3-24ce77153d7d FS",
      "parent": "cdf0bac9-9c4f-4332-8560-6438d65da866"
    },
    {
      "id": "77392e7a-c4f2-4f3c-bb45-4846b1ad175f",
      "text": "Deliver First Course to Soft Launch Audience on August 1, 2026",
      "custom_tooltip": "<b>Deliver First Course to Soft Launch Audience on August 1, 2026</b>",
      "progress": 0,
      "open": true,
      "meta": "cdf0bac9-9c4f-4332-8560-6438d65da866 FS",
      "parent": "1749a87b-16d7-40fa-8683-e8d69b60fc6f",
      "type": "project"
    },
    {
      "id": "a3778f37-a450-4e7a-89b5-10685161033e",
      "text": "Finalize Instructor Coverage Plan",
      "custom_tooltip": "<b>Finalize Instructor Coverage Plan</b><br>Ensure all teaching sessions are covered by cross-trained instructors with backup availability. Develop a rotating schedule using the digital shift calendar, confirm instructor availability at least two weeks in advance, and assign backup instructors for each session to prevent cancellations due to absences.<br><b>Resources needed:</b><br><ul><li>Digital shift calendar</li><li>Rotating instructor schedule</li><li>Safety Officer</li><li>Clay Workshop Manager</li></ul>",
      "start_date": "2029-02-25",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "77392e7a-c4f2-4f3c-bb45-4846b1ad175f SS",
      "parent": "77392e7a-c4f2-4f3c-bb45-4846b1ad175f"
    },
    {
      "id": "0c0cc5e2-4b1d-46d8-b12a-2f8029fbe597",
      "text": "Verify Clay Buffer Stock On-Site",
      "custom_tooltip": "<b>Verify Clay Buffer Stock On-Site</b><br>Confirm that the 50 kg buffer stock of clay is physically present and stored properly before the soft launch. Conduct a visual and documentation check against delivery records and ensure it meets quality standards for immediate use.<br><b>Resources needed:</b><br><ul><li>50 kg buffer stock of clay</li><li>Inventory log</li><li>Facility Manager</li><li>Safety Officer</li></ul>",
      "start_date": "2029-02-27",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "a3778f37-a450-4e7a-89b5-10685161033e FS",
      "parent": "77392e7a-c4f2-4f3c-bb45-4846b1ad175f"
    },
    {
      "id": "22cc4234-ab65-4754-bb17-fc19b19e1c4d",
      "text": "Conduct Pre-Launch Dry Run",
      "custom_tooltip": "<b>Conduct Pre-Launch Dry Run</b><br>Simulate the first course delivery one week before August 1, 2026, to test staffing coverage, equipment functionality, material availability, and logistics. Identify and resolve any issues related to scheduling, communication, or supply chain gaps.<br><b>Resources needed:</b><br><ul><li>Full instructor team</li><li>Digital shift calendar</li><li>IoT monitoring system</li><li>Bilingual signage</li><li>Workshop space</li></ul>",
      "start_date": "2029-03-01",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "0c0cc5e2-4b1d-46d8-b12a-2f8029fbe597 FS",
      "parent": "77392e7a-c4f2-4f3c-bb45-4846b1ad175f"
    },
    {
      "id": "80c60267-0150-4fb4-8e5a-fd9fa66386d8",
      "text": "Validate Liability Waivers and Training Completion",
      "custom_tooltip": "<b>Validate Liability Waivers and Training Completion</b><br>Ensure all instructors and volunteers have signed liability waivers and completed mandatory safety training. Verify documentation through the digital tracking system and confirm no outstanding items remain before session delivery.<br><b>Resources needed:</b><br><ul><li>Liability waiver forms</li><li>Training completion logs</li><li>Digital dashboard</li><li>Safety Officer</li><li>Human Resources Lead</li></ul>",
      "start_date": "2029-03-03",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "22cc4234-ab65-4754-bb17-fc19b19e1c4d FS",
      "parent": "77392e7a-c4f2-4f3c-bb45-4846b1ad175f"
    },
    {
      "id": "fdcdc116-6fb4-4c3e-8aef-aaaa29e5ac28",
      "text": "Monitor Real-Time Environmental Conditions",
      "custom_tooltip": "<b>Monitor Real-Time Environmental Conditions</b><br>Use IoT sensors to continuously monitor temperature, humidity, and CO\u2082 levels during the dry run and soft launch. Trigger alerts if thresholds are breached and verify that the &#x27;thermal curfew&#x27; protocol is ready for activation.<br><b>Resources needed:</b><br><ul><li>IoT environmental monitoring sensors</li><li>Data integration platform</li><li>Facility Manager</li><li>Energy Systems Engineer</li></ul>",
      "start_date": "2029-03-05",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "77392e7a-c4f2-4f3c-bb45-4846b1ad175f FF, 80c60267-0150-4fb4-8e5a-fd9fa66386d8 FS",
      "parent": "77392e7a-c4f2-4f3c-bb45-4846b1ad175f"
    },
    {
      "id": "e6ac1ce4-e57f-4687-8fb4-47772bf6e944",
      "text": "Achieve 100% Session Coverage with No Cancellations Due to Supply or Staffing Issues",
      "custom_tooltip": "<b>Achieve 100% Session Coverage with No Cancellations Due to Supply or Staffing Issues</b>",
      "progress": 0,
      "open": true,
      "meta": "1749a87b-16d7-40fa-8683-e8d69b60fc6f FF, 77392e7a-c4f2-4f3c-bb45-4846b1ad175f FS",
      "parent": "1749a87b-16d7-40fa-8683-e8d69b60fc6f",
      "type": "project"
    },
    {
      "id": "65f02729-0b65-408b-9a51-24411437cec0",
      "text": "Enforce Training Completion",
      "custom_tooltip": "<b>Enforce Training Completion</b><br>Ensure all instructors and volunteers complete mandatory safety training and cultural protocols at least two weeks before the soft launch. Verify attendance records and digital badge completion via the real-time tracking dashboard. Conduct a final review with the Safety Officer to confirm readiness.<br><b>Resources needed:</b><br><ul><li>Safety Officer</li><li>Digital Shift Calendar</li><li>Real-Time Tracking Dashboard</li><li>Training Materials (Bilingual)</li></ul>",
      "start_date": "2029-03-07",
      "duration": 5.0,
      "progress": 0,
      "open": true,
      "meta": "e6ac1ce4-e57f-4687-8fb4-47772bf6e944 SS",
      "parent": "e6ac1ce4-e57f-4687-8fb4-47772bf6e944"
    },
    {
      "id": "5863ccbe-f04d-4447-a14c-f31e116df385",
      "text": "Verify Clay Buffer Stock",
      "custom_tooltip": "<b>Verify Clay Buffer Stock</b><br>Confirm that the 50 kg buffer stock of clay is physically present, stored properly, and verified as usable. Cross-check against shipment logs and IoT sensor data from the monitoring system to ensure no supply chain disruptions have occurred.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Local Logistics Coordinator</li><li>IoT Monitoring System</li><li>Clay Inventory Log</li></ul>",
      "start_date": "2029-03-12",
      "duration": 5.0,
      "progress": 0,
      "open": true,
      "meta": "65f02729-0b65-408b-9a51-24411437cec0 FS",
      "parent": "e6ac1ce4-e57f-4687-8fb4-47772bf6e944"
    },
    {
      "id": "4424d7aa-838c-48a4-a185-5f76a30ddb7a",
      "text": "Activate Backup Instructor Roster",
      "custom_tooltip": "<b>Activate Backup Instructor Roster</b><br>Implement a rotating backup instructor schedule using cross-trained staff. Use the digital shift calendar to auto-reassign sessions in case of last-minute absences. Conduct a dry-run simulation to test coverage and response time.<br><b>Resources needed:</b><br><ul><li>Clay Workshop Manager</li><li>Digital Shift Calendar</li><li>Rotating Instructor Roster</li><li>Cross-Trained Instructors</li></ul>",
      "start_date": "2029-03-17",
      "duration": 5.0,
      "progress": 0,
      "open": true,
      "meta": "5863ccbe-f04d-4447-a14c-f31e116df385 FS",
      "parent": "e6ac1ce4-e57f-4687-8fb4-47772bf6e944"
    },
    {
      "id": "c802000a-0c42-4cca-a9e9-910f35aff188",
      "text": "Conduct Pre-Launch Dry Run",
      "custom_tooltip": "<b>Conduct Pre-Launch Dry Run</b><br>Run a full-scale mock session on August 1, simulating course delivery, equipment use, and emergency response. Test staffing coverage, material availability, and communication flow. Document any issues and resolve them before the actual soft launch.<br><b>Resources needed:</b><br><ul><li>All Instructors</li><li>Volunteers</li><li>Facility Manager</li><li>Safety Officer</li><li>Digital Shift Calendar</li></ul>",
      "start_date": "2029-03-22",
      "duration": 5.0,
      "progress": 0,
      "open": true,
      "meta": "4424d7aa-838c-48a4-a185-5f76a30ddb7a FS",
      "parent": "e6ac1ce4-e57f-4687-8fb4-47772bf6e944"
    },
    {
      "id": "9a6e72f2-5e41-4e1a-be3e-848a09cc7eed",
      "text": "Finalize Liability Waivers",
      "custom_tooltip": "<b>Finalize Liability Waivers</b><br>Ensure 100% of staff and volunteers have signed liability waivers and that all documents are digitally logged and accessible. Confirm insurance coverage is active and linked to the project\u2019s general liability policy.<br><b>Resources needed:</b><br><ul><li>Legal Advisor</li><li>Human Resources Lead</li><li>Digital Documentation Platform</li><li>General Liability Insurance Policy</li></ul>",
      "start_date": "2029-03-27",
      "duration": 5.0,
      "progress": 0,
      "open": true,
      "meta": "e6ac1ce4-e57f-4687-8fb4-47772bf6e944 FF, c802000a-0c42-4cca-a9e9-910f35aff188 FS",

    function zoomFit() {
        const tasks = gantt.getTaskByTime();
        if (tasks.length > 0) {
            const firstTask = tasks[0];
            const lastTask = tasks[tasks.length - 1];
            gantt.showDate(firstTask.start_date);
            
            // Calculate total duration in days
            const startDate = new Date(firstTask.start_date);
            const endDate = new Date(lastTask.end_date);
            const durationDays = (endDate - startDate) / (1000 * 60 * 60 * 24);
            
            // Choose appropriate scale based on duration
            if (durationDays > 3650) { // More than 10 years
                gantt.config.scale_unit = "year";
                gantt.config.step = 10;
                gantt.config.subscales = [
                    {unit: "year", step: 1, date: "%Y"}
                ];
            } else if (durationDays > 365) { // More than 1 year
                gantt.config.scale_unit = "year";
                gantt.config.step = 1;
                gantt.config.subscales = [
                    {unit: "month", step: 1, date: "%M"}
                ];
            } else if (durationDays > 30) { // More than 1 month
                gantt.config.scale_unit = "month";
                gantt.config.step = 1;
                gantt.config.subscales = [
                    {unit: "day", step: 1, date: "%d"}
                ];
            } else if (durationDays > 7) { // More than 1 week
                gantt.config.scale_unit = "week";
                gantt.config.step = 1;
                gantt.config.subscales = [
                    {unit: "day", step: 1, date: "%d"}
                ];
            } else {
                gantt.config.scale_unit = "day";
                gantt.config.step = 1;
                gantt.config.subscales = [];
            }
            gantt.render();
        }
    }

    function zoomIn() {
        const currentUnit = gantt.config.scale_unit;
        const currentStep = gantt.config.step;
        
        if (currentUnit === "year" && currentStep === 10) {
            gantt.config.scale_unit = "year";
            gantt.config.step = 1;
            gantt.config.subscales = [
                {unit: "month", step: 1, date: "%M"}
            ];
        } else if (currentUnit === "year") {
            gantt.config.scale_unit = "month";
            gantt.config.step = 1;
            gantt.config.subscales = [
                {unit: "day", step: 1, date: "%d"}
            ];
        } else if (currentUnit === "month") {
            gantt.config.scale_unit = "week";
            gantt.config.step = 1;
            gantt.config.subscales = [
                {unit: "day", step: 1, date: "%d"}
            ];
        } else if (currentUnit === "week") {
            gantt.config.scale_unit = "day";
            gantt.config.step = 1;
            gantt.config.subscales = [];
        }
        gantt.render();
    }

    function zoomOut() {
        const currentUnit = gantt.config.scale_unit;
        const currentStep = gantt.config.step;
        
        if (currentUnit === "day") {
            gantt.config.scale_unit = "week";
            gantt.config.step = 1;
            gantt.config.subscales = [
                {unit: "day", step: 1, date: "%d"}
            ];
        } else if (currentUnit === "week") {
            gantt.config.scale_unit = "month";
            gantt.config.step = 1;
            gantt.config.subscales = [
                {unit: "day", step: 1, date: "%d"}
            ];
        } else if (currentUnit === "month") {
            gantt.config.scale_unit = "year";
            gantt.config.step = 1;
            gantt.config.subscales = [
                {unit: "month", step: 1, date: "%M"}
            ];
        } else if (currentUnit === "year") {
            gantt.config.scale_unit = "year";
            gantt.config.step = 10;
            gantt.config.subscales = [
                {unit: "year", step: 1, date: "%Y"}
            ];
        }
        gantt.render();
    }

    function downloadCSV() {
        if (GANTT_DATA_CSV === null) {
            return;
        }
        const blob = new Blob([GANTT_DATA_CSV], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        const url = URL.createObjectURL(blob);
        link.setAttribute('href', url);
        link.setAttribute('download', GANTT_FILENAME_CSV);
        link.style.visibility = 'hidden';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    // Gantt Initialization
    gantt.config.readonly = true;
    gantt.config.date_format = "%Y-%m-%d";
    gantt.config.scale_unit = "month";
    gantt.config.step = 1;
    gantt.config.subscales = [
        {unit: "day", step: 1, date: "%d"}
    ];

    gantt.config.columns = [
        {name:"text", label:"Task name", width:"*", tree:true},
        // {name:"start_date", label:"Start time", align: "center"},
        // {name:"duration", label:"Duration", align: "center"}
    ];

    gantt.templates.task_class = function(start, end, task) {
        if (task.type === "project") {
            return "project-task";
        }
        return "";
    };

    gantt.templates.tooltip_text = function(start, end, task) {
        return task.custom_tooltip || "No tooltip";
    };
    
	gantt.plugins({
		tooltip: true
	});
	gantt.attachEvent("onGanttReady", function(){
		var tooltips = gantt.ext.tooltips;
		tooltips.tooltip.setViewport(gantt.$task_data);
	});
    gantt.init("gantt_container");
    gantt.parse(GANTT_DATA_DHTMLX);

    // Hide the export to CSV button if there is no CSV data
    if (GANTT_DATA_CSV === null) {
        document.getElementById('exportToCSVButton').style.display = 'none';
    }

    document.getElementById('zoomFitButton').addEventListener('click', zoomFit);
    document.getElementById('zoomInButton').addEventListener('click', zoomIn);
    document.getElementById('zoomOutButton').addEventListener('click', zoomOut);
    document.getElementById('exportToCSVButton').addEventListener('click', downloadCSV);
</script>
