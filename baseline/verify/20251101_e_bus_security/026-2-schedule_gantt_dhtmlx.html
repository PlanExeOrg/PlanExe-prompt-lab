      "id": "4f351067-d505-4517-b8bc-013cc23968fa",
      "text": "Identify Critical E-Bus System Vulnerabilities",
      "custom_tooltip": "<b>Identify Critical E-Bus System Vulnerabilities</b><br>Objective: Identify vulnerabilities in e-bus systems. Scope: Review system architecture, communication protocols, and software. Steps: Conduct code reviews, penetration testing, and vulnerability scans. Deliverables: Vulnerability report.<br><b>Resources needed:</b><br><ul><li>Cybersecurity Experts</li><li>Penetration Testers</li><li>Security Auditing Tools</li></ul>",

    {
      "id": "68c440ca-d40f-4746-ba28-364369484e54",
      "text": "Analyze Potential Attack Vectors",
      "custom_tooltip": "<b>Analyze Potential Attack Vectors</b><br>Objective: Determine how attackers could exploit vulnerabilities. Scope: Model attack scenarios, assess impact. Steps: Threat modeling, attack simulation. Deliverables: Attack vector analysis report.<br><b>Resources needed:</b><br><ul><li>Cybersecurity Experts</li><li>Threat Intelligence Analysts</li><li>Simulation Tools</li></ul>",

    {
      "id": "2f074c19-8102-4b73-a988-3fe195ad7373",
      "text": "Assess Impact of Successful Attacks",
      "custom_tooltip": "<b>Assess Impact of Successful Attacks</b><br>Objective: Evaluate the consequences of successful attacks. Scope: Safety, operational, financial impact. Steps: Risk assessment, scenario planning. Deliverables: Impact assessment report.<br><b>Resources needed:</b><br><ul><li>Risk Management Specialists</li><li>E-Bus Operators</li><li>Financial Analysts</li></ul>",

      "id": "4f355c3f-6d13-4a55-8c47-484fbdf86e0f",
      "text": "Prioritize Vulnerabilities by Risk Level",
      "custom_tooltip": "<b>Prioritize Vulnerabilities by Risk Level</b><br>Objective: Rank vulnerabilities based on likelihood and impact. Scope: All identified vulnerabilities. Steps: Risk scoring, prioritization matrix. Deliverables: Prioritized vulnerability list.<br><b>Resources needed:</b><br><ul><li>Cybersecurity Experts</li><li>Risk Management Specialists</li></ul>",

    {
      "id": "1f2c6a57-6ea3-45e9-9610-a68d18f3f47f",
      "text": "Identify Critical System Vulnerabilities",
      "custom_tooltip": "<b>Identify Critical System Vulnerabilities</b><br>Objective: Identify vulnerabilities in e-bus systems that could be exploited for remote control or disruption.\nScope: Review system architecture, communication protocols, and software code.\nSteps: Conduct vulnerability scans, penetration testing, and code reviews.\nDeliverables: Vulnerability assessment report.<br><b>Resources needed:</b><br><ul><li>Cybersecurity experts</li><li>Penetration testers</li><li>Code reviewers</li><li>Vulnerability scanning tools</li></ul>",

    },
    {
      "id": "6ff6cde8-2c50-40fa-8f85-676f96ae1fdd",
      "text": "Prioritize Mitigation Strategies",
      "custom_tooltip": "<b>Prioritize Mitigation Strategies</b><br>Objective: Prioritize mitigation strategies based on risk level and feasibility.\nScope: Evaluate the impact and likelihood of identified vulnerabilities.\nSteps: Conduct risk assessments, cost-benefit analysis, and feasibility studies.\nDeliverables: Prioritized list of mitigation strategies.<br><b>Resources needed:</b><br><ul><li>Risk assessment specialists</li><li>Cybersecurity architects</li><li>Project managers</li></ul>",
      "start_date": "2025-12-23",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "1f2c6a57-6ea3-45e9-9610-a68d18f3f47f FS",
      "parent": "5a67935c-ee39-42a9-94b2-7f862982eddd"
    },
    {
      "id": "c1a732cf-19e0-46cc-a0ae-b7409814d0ec",
      "text": "Develop Detailed Mitigation Plans",
      "custom_tooltip": "<b>Develop Detailed Mitigation Plans</b><br>Objective: Develop detailed mitigation plans for prioritized vulnerabilities.\nScope: Define specific actions, timelines, and resources required for each mitigation strategy.\nSteps: Create implementation plans, assign responsibilities, and establish monitoring mechanisms.\nDeliverables: Detailed mitigation plans with timelines and resource allocation.<br><b>Resources needed:</b><br><ul><li>Cybersecurity engineers</li><li>System administrators</li><li>Project managers</li></ul>",
      "start_date": "2025-12-25",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "6ff6cde8-2c50-40fa-8f85-676f96ae1fdd FS",
      "parent": "5a67935c-ee39-42a9-94b2-7f862982eddd"
    },
    {
      "id": "f969c759-382f-440e-adc1-5c47fcd6fe8e",
      "text": "Implement Mitigation Measures",
      "custom_tooltip": "<b>Implement Mitigation Measures</b><br>Objective: Implement the mitigation measures according to the developed plans.\nScope: Execute the mitigation plans, track progress, and address any issues that arise.\nSteps: Deploy security patches, configure security controls, and implement security awareness training.\nDeliverables: Implemented mitigation measures and updated system documentation.<br><b>Resources needed:</b><br><ul><li>System administrators</li><li>Security engineers</li><li>Training personnel</li></ul>",
      "start_date": "2025-12-27",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "c1a732cf-19e0-46cc-a0ae-b7409814d0ec FS",
      "parent": "5a67935c-ee39-42a9-94b2-7f862982eddd"
    },
    {
      "id": "18848fde-5d89-490d-88fa-018c4c718651",
      "text": "Test and Validate Mitigation Effectiveness",
      "custom_tooltip": "<b>Test and Validate Mitigation Effectiveness</b><br>Objective: Test and validate the effectiveness of implemented mitigation measures.\nScope: Verify that the vulnerabilities have been successfully addressed and that the system is more secure.\nSteps: Conduct penetration testing, vulnerability scans, and security audits.\nDeliverables: Validation report with test results and recommendations.<br><b>Resources needed:</b><br><ul><li>Penetration testers</li><li>Security auditors</li><li>Cybersecurity experts</li></ul>",
      "start_date": "2025-12-29",
      "duration": 2.0,
      "progress": 0,
      "open": true,

    {
      "id": "462f2b16-ef51-4bb8-93a3-215b1349e6eb",
      "text": "Identify potential disruption scenarios",
      "custom_tooltip": "<b>Identify potential disruption scenarios</b><br>Objective: Identify a range of potential disruption scenarios that could impact the project.\nScope: Consider internal and external factors, including technical failures, supply chain disruptions, and geopolitical events.\nSteps: Brainstorm potential scenarios, research historical data, and consult with experts.\nDeliverables: A list of potential disruption scenarios with detailed descriptions.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Risk Analyst</li><li>Subject Matter Experts</li></ul>",
      "start_date": "2025-12-31",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "63ff2b40-7ff7-46da-87b8-e83c4142eaf3 SS",
      "parent": "63ff2b40-7ff7-46da-87b8-e83c4142eaf3"
    },
    {
      "id": "7dda274a-c81b-40fd-9ee3-efe510f82ab1",
      "text": "Develop fallback resource plans",
      "custom_tooltip": "<b>Develop fallback resource plans</b><br>Objective: Create detailed plans for securing alternative resources in case of disruptions.\nScope: Identify alternative suppliers, backup systems, and redundant infrastructure.\nSteps: Research alternative resources, negotiate contracts, and document procedures.\nDeliverables: A set of fallback resource plans with contact information and procedures.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Procurement Specialist</li><li>Technical Team</li></ul>",
      "start_date": "2026-01-02",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "462f2b16-ef51-4bb8-93a3-215b1349e6eb FS",
      "parent": "63ff2b40-7ff7-46da-87b8-e83c4142eaf3"
    },
    {
      "id": "987dbf1a-aa88-403b-a377-99c112a1f325",
      "text": "Document communication protocols",
      "custom_tooltip": "<b>Document communication protocols</b><br>Objective: Establish clear communication protocols for responding to disruptions.\nScope: Define roles and responsibilities, communication channels, and escalation procedures.\nSteps: Develop a communication plan, train personnel, and test the plan.\nDeliverables: A documented communication protocol with contact lists and procedures.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Communication Specialist</li><li>Stakeholders</li></ul>",
      "start_date": "2026-01-04",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "7dda274a-c81b-40fd-9ee3-efe510f82ab1 FS",
      "parent": "63ff2b40-7ff7-46da-87b8-e83c4142eaf3"
    },
    {
      "id": "f9c237b8-5bc0-4efd-967e-819cb988e02d",
      "text": "Test contingency plan effectiveness",
      "custom_tooltip": "<b>Test contingency plan effectiveness</b><br>Objective: Verify the effectiveness of the contingency plans through simulations and drills.\nScope: Conduct tabletop exercises, simulations, and live drills to test the plans.\nSteps: Plan and execute tests, collect data, and analyze results.\nDeliverables: A report on the effectiveness of the contingency plans with recommendations for improvement.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Technical Team</li><li>Security Team</li></ul>",
      "start_date": "2026-01-06",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "63ff2b40-7ff7-46da-87b8-e83c4142eaf3 FF, 987dbf1a-aa88-403b-a377-99c112a1f325 FS",
      "parent": "63ff2b40-7ff7-46da-87b8-e83c4142eaf3"
    },
    {

      "custom_tooltip": "<b>Geopolitical Risk Assessment</b>",
      "progress": 0,
      "open": true,
      "meta": "457a6d59-c04d-4f81-89ac-1f970d9d2691 FF, 63ff2b40-7ff7-46da-87b8-e83c4142eaf3 FS",

    {
      "id": "26259bd1-1a54-415a-821a-f3b88146a174",
      "text": "Identify Geopolitical Risk Factors",
      "custom_tooltip": "<b>Identify Geopolitical Risk Factors</b><br>Objective: Identify potential geopolitical events that could impact the e-bus project.\nScope: Analyze global political and economic trends, focusing on regions relevant to the e-bus supply chain and vendor relationships.\nSteps: Research geopolitical reports, consult with experts, and identify key risk factors.\nDeliverables: A list of identified geopolitical risk factors.<br><b>Resources needed:</b><br><ul><li>Geopolitical Risk Analyst</li><li>Research Analyst</li></ul>",
      "start_date": "2026-01-08",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "f1c15054-c4f4-4fa0-b5f7-c6ddf35ff758 SS",
      "parent": "f1c15054-c4f4-4fa0-b5f7-c6ddf35ff758"
    },
    {
      "id": "aacdd8b9-f7d4-498c-b614-5839e58b5eba",
      "text": "Assess Impact on Supply Chain",
      "custom_tooltip": "<b>Assess Impact on Supply Chain</b><br>Objective: Evaluate the potential impact of identified geopolitical risks on the e-bus supply chain.\nScope: Analyze the vulnerability of the supply chain to disruptions caused by geopolitical events.\nSteps: Map the supply chain, assess dependencies, and evaluate potential disruptions.\nDeliverables: A report assessing the impact of geopolitical risks on the supply chain.<br><b>Resources needed:</b><br><ul><li>Supply Chain Security Expert</li><li>Risk Analyst</li></ul>",
      "start_date": "2026-01-11",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "26259bd1-1a54-415a-821a-f3b88146a174 FS",
      "parent": "f1c15054-c4f4-4fa0-b5f7-c6ddf35ff758"
    },
    {
      "id": "86045834-c0b8-40b5-b2a6-3c3d791e5f27",
      "text": "Evaluate Vendor Relationships",
      "custom_tooltip": "<b>Evaluate Vendor Relationships</b><br>Objective: Assess the vulnerability of vendor relationships to geopolitical instability.\nScope: Analyze vendor ownership structures, political affiliations, and potential exposure to geopolitical risks.\nSteps: Conduct due diligence on vendors, assess their political connections, and evaluate potential risks.\nDeliverables: A report assessing the vulnerability of vendor relationships to geopolitical instability.<br><b>Resources needed:</b><br><ul><li>Vendor Liaison</li><li>Legal Counsel</li></ul>",
      "start_date": "2026-01-14",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "aacdd8b9-f7d4-498c-b614-5839e58b5eba FS",
      "parent": "f1c15054-c4f4-4fa0-b5f7-c6ddf35ff758"
    },
    {
      "id": "4311dc72-a6a6-46fc-a2a9-4aa45b3b13ac",
      "text": "Develop Mitigation Strategies",
      "custom_tooltip": "<b>Develop Mitigation Strategies</b><br>Objective: Develop strategies to mitigate the identified geopolitical risks.\nScope: Identify alternative suppliers, diversify the supply chain, and establish contingency plans.\nSteps: Research alternative suppliers, develop diversification plans, and create contingency plans.\nDeliverables: A plan to mitigate geopolitical risks.<br><b>Resources needed:</b><br><ul><li>Risk Manager</li><li>Supply Chain Security Expert</li></ul>",
      "start_date": "2026-01-17",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "f1c15054-c4f4-4fa0-b5f7-c6ddf35ff758 FF, 86045834-c0b8-40b5-b2a6-3c3d791e5f27 FS",

    },

      "id": "7b334f95-e627-4cb2-8303-47e2866c2096",

      "custom_tooltip": "<b>Assess Existing Vendor Relationships</b>",

      "meta": "3209776c-6609-470f-898b-3842f7f10724 SS",

    {
      "id": "c4440c38-67e4-4c75-b730-247ffe64e8cd",
      "text": "Gather vendor security documentation",
      "custom_tooltip": "<b>Gather vendor security documentation</b><br>Collect all relevant security policies, procedures, and certifications from existing e-bus vendors. This includes requesting documentation on their security practices, incident response plans, and vulnerability management processes.<br><b>Resources needed:</b><br><ul><li>Vendor Liaison</li><li>Contract Specialist</li></ul>",
      "start_date": "2026-01-20",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "7b334f95-e627-4cb2-8303-47e2866c2096 SS",
      "parent": "7b334f95-e627-4cb2-8303-47e2866c2096"
    },
    {
      "id": "858276c8-ac53-4cdc-9698-36a25da627a9",
      "text": "Evaluate vendor security posture",
      "custom_tooltip": "<b>Evaluate vendor security posture</b><br>Assess the security posture of each vendor based on the collected documentation and industry best practices. This involves identifying potential vulnerabilities, gaps in security controls, and areas for improvement.<br><b>Resources needed:</b><br><ul><li>Cybersecurity Analyst</li><li>Risk Assessor</li></ul>",
      "start_date": "2026-01-23",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "c4440c38-67e4-4c75-b730-247ffe64e8cd FS",
      "parent": "7b334f95-e627-4cb2-8303-47e2866c2096"
    },
    {
      "id": "6f3f0d12-c238-4b0b-a7e0-4d94a8fbdffb",
      "text": "Conduct vendor security interviews",
      "custom_tooltip": "<b>Conduct vendor security interviews</b><br>Conduct interviews with key personnel from each vendor to gain a deeper understanding of their security practices and address any questions or concerns raised during the documentation review. This includes interviewing their security officers, engineers, and project managers.<br><b>Resources needed:</b><br><ul><li>Vendor Liaison</li><li>Cybersecurity Expert</li></ul>",
      "start_date": "2026-01-26",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "858276c8-ac53-4cdc-9698-36a25da627a9 FS",
      "parent": "7b334f95-e627-4cb2-8303-47e2866c2096"
    },
    {
      "id": "43063045-ae36-46ec-82c3-0f856e7207cc",
      "text": "Analyze vendor contracts for security clauses",
      "custom_tooltip": "<b>Analyze vendor contracts for security clauses</b><br>Review existing contracts with e-bus vendors to identify any security-related clauses, such as data protection agreements, incident reporting requirements, and liability provisions. This involves working with legal counsel to ensure that the contracts adequately address the project&#x27;s security needs.<br><b>Resources needed:</b><br><ul><li>Contract Specialist</li><li>Legal Counsel</li></ul>",
      "start_date": "2026-01-29",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "7b334f95-e627-4cb2-8303-47e2866c2096 FF, 6f3f0d12-c238-4b0b-a7e0-4d94a8fbdffb FS",
      "parent": "7b334f95-e627-4cb2-8303-47e2866c2096"
    },
    {
      "id": "a24864bc-f812-4209-9599-d19980d513fa",
      "text": "Develop Vendor Relationship Strategy",
      "custom_tooltip": "<b>Develop Vendor Relationship Strategy</b>",
      "progress": 0,
      "open": true,
      "meta": "7b334f95-e627-4cb2-8303-47e2866c2096 FS",
      "parent": "3209776c-6609-470f-898b-3842f7f10724",
      "type": "project"
    },
    {
      "id": "0a3e7150-f557-4346-9179-9816e01f5aab",
      "text": "Define Vendor Relationship Goals",
      "custom_tooltip": "<b>Define Vendor Relationship Goals</b><br>Clearly articulate the desired outcomes from vendor relationships, aligning with project security objectives. This includes defining key performance indicators (KPIs) and success metrics for vendor performance.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Cybersecurity Architect</li><li>Risk &amp; Compliance Manager</li></ul>",
      "start_date": "2026-02-01",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "a24864bc-f812-4209-9599-d19980d513fa SS",
      "parent": "a24864bc-f812-4209-9599-d19980d513fa"
    },
    {
      "id": "2289a450-09de-42a1-bb9f-1996b111a7cf",
      "text": "Identify Key Vendor Stakeholders",
      "custom_tooltip": "<b>Identify Key Vendor Stakeholders</b><br>Map out the individuals and teams within each vendor organization who are critical to the project&#x27;s success. Understand their roles, responsibilities, and influence within their respective companies.<br><b>Resources needed:</b><br><ul><li>Vendor Liaison</li><li>Contract Specialist</li><li>Project Manager</li></ul>",
      "start_date": "2026-02-03",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "0a3e7150-f557-4346-9179-9816e01f5aab FS",
      "parent": "a24864bc-f812-4209-9599-d19980d513fa"
    },
    {
      "id": "55b5f02f-9274-4868-ac62-54666260aa8d",
      "text": "Analyze Vendor Motivations and Concerns",
      "custom_tooltip": "<b>Analyze Vendor Motivations and Concerns</b><br>Assess the factors that drive vendor behavior, including their business priorities, financial incentives, and potential concerns about the project&#x27;s security requirements. This analysis will inform the development of effective communication and negotiation strategies.<br><b>Resources needed:</b><br><ul><li>Risk &amp; Compliance Manager</li><li>Vendor Liaison</li><li>Geopolitical Risk Analyst</li></ul>",
      "start_date": "2026-02-05",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "2289a450-09de-42a1-bb9f-1996b111a7cf FS",
      "parent": "a24864bc-f812-4209-9599-d19980d513fa"
    },
    {
      "id": "5fc8aade-6d15-4ae7-83f6-5d757ea6bcf3",
      "text": "Develop Communication and Engagement Plan",
      "custom_tooltip": "<b>Develop Communication and Engagement Plan</b><br>Create a structured approach for communicating with vendors, including regular meetings, progress reports, and feedback sessions. This plan should address how to build trust, foster collaboration, and address any concerns or issues that may arise.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Vendor Liaison</li><li>Communication Specialist</li></ul>",

      "id": "7f6ecc57-389b-4614-874b-146ab2ddaf46",
      "text": "Establish Incentive and Accountability Mechanisms",
      "custom_tooltip": "<b>Establish Incentive and Accountability Mechanisms</b><br>Design a system of rewards and penalties to encourage vendor compliance with security requirements and project goals. This may include financial incentives, performance-based bonuses, or contractual penalties for non-compliance.<br><b>Resources needed:</b><br><ul><li>Contract Specialist</li><li>Legal Advisors</li><li>Project Manager</li></ul>",

    {
      "id": "64025544-c282-4eeb-afc8-c874e73cbe80",
      "text": "Review Current Procurement Policies",
      "custom_tooltip": "<b>Review Current Procurement Policies</b><br>Objective: Analyze existing procurement policies to identify areas for improvement regarding cybersecurity requirements.\nScope: Review all relevant procurement documents, including contracts, vendor agreements, and internal guidelines.\nSteps: 1. Gather all relevant procurement documents. 2. Identify gaps in cybersecurity requirements. 3. Document findings in a report.\nDeliverables: A report outlining gaps in current procurement policies.<br><b>Resources needed:</b><br><ul><li>Legal Counsel</li><li>Procurement Manager</li><li>Cybersecurity Expert</li></ul>",
      "start_date": "2026-02-11",

    },
    {
      "id": "78d8e574-f0e5-4b23-b45a-03c016cb8f2a",
      "text": "Define New Security Requirements",
      "custom_tooltip": "<b>Define New Security Requirements</b><br>Objective: Establish clear and enforceable security requirements for all vendors and procured products.\nScope: Define specific security standards, certifications, and testing procedures that vendors must meet.\nSteps: 1. Research industry best practices for cybersecurity. 2. Consult with cybersecurity experts to define specific requirements. 3. Document the new security requirements in a formal policy.\nDeliverables: A documented policy outlining new security requirements for vendors.<br><b>Resources needed:</b><br><ul><li>Cybersecurity Expert</li><li>Legal Counsel</li><li>Risk &amp; Compliance Manager</li></ul>",
      "start_date": "2026-02-16",
      "duration": 5.0,
      "progress": 0,
      "open": true,
      "meta": "64025544-c282-4eeb-afc8-c874e73cbe80 FS",
      "parent": "b03acdf7-cf0c-4ef5-aa3b-b4690c31c86a"
    },
    {
      "id": "fb614d0e-2d7b-4544-9bc6-8f61c78d372c",
      "text": "Develop Compliance Verification Process",
      "custom_tooltip": "<b>Develop Compliance Verification Process</b><br>Objective: Create a process for verifying vendor compliance with the new security requirements.\nScope: Define the steps for assessing vendor security posture, including audits, certifications, and penetration testing.\nSteps: 1. Define the criteria for assessing vendor compliance. 2. Develop a checklist for evaluating vendor security practices. 3. Establish a schedule for regular compliance checks.\nDeliverables: A documented process for verifying vendor compliance.<br><b>Resources needed:</b><br><ul><li>Cybersecurity Expert</li><li>Auditor</li><li>Procurement Manager</li></ul>",
      "start_date": "2026-02-21",
      "duration": 5.0,
      "progress": 0,
      "open": true,
      "meta": "78d8e574-f0e5-4b23-b45a-03c016cb8f2a FS",

    },
    {
      "id": "f159d6b3-7ef1-45f2-a88d-0911bf0639bc",
      "text": "Communicate Policy Changes to Stakeholders",
      "custom_tooltip": "<b>Communicate Policy Changes to Stakeholders</b><br>Objective: Inform all relevant stakeholders about the changes to procurement policies and security requirements.\nScope: Communicate the new policies to internal teams, vendors, and other relevant parties.\nSteps: 1. Prepare a communication plan. 2. Conduct training sessions for internal teams. 3. Distribute the new policies to vendors.\nDeliverables: A documented communication plan and evidence of policy dissemination.<br><b>Resources needed:</b><br><ul><li>Communication Specialist</li><li>Procurement Manager</li><li>Training Coordinator</li></ul>",

      "id": "aeae639f-1fbb-4fbb-aee0-b6761bd01289",
      "text": "Research alternative vendor capabilities",
      "custom_tooltip": "<b>Research alternative vendor capabilities</b><br>Objective: Identify vendors capable of meeting &#x27;no-remote-kill&#x27; requirements.\nScope: Review vendor websites, publications, and industry reports.\nSteps: 1. Define search criteria. 2. Conduct online research. 3. Compile a list of potential vendors.\nDeliverables: Vendor list with capability summaries.<br><b>Resources needed:</b><br><ul><li>Market Research Analyst</li><li>Cybersecurity Engineer</li></ul>",

      "open": true,
      "meta": "4bf81a33-6ea4-4b7a-9472-390a84ca5b9e SS",

    {
      "id": "5a1f30c1-a8c1-45bc-95fd-c1636eace289",
      "text": "Assess vendor security posture",
      "custom_tooltip": "<b>Assess vendor security posture</b><br>Objective: Evaluate the security practices of potential vendors.\nScope: Review security certifications, audit reports, and security policies.\nSteps: 1. Send security questionnaires. 2. Review vendor documentation. 3. Conduct security audits (if necessary).\nDeliverables: Vendor security assessment reports.<br><b>Resources needed:</b><br><ul><li>Cybersecurity Auditor</li><li>Security Analyst</li></ul>",
      "start_date": "2026-03-11",

      "id": "94f9709f-8691-410f-873d-ce191d0834cc",
      "text": "Evaluate vendor financial stability",
      "custom_tooltip": "<b>Evaluate vendor financial stability</b><br>Objective: Ensure the long-term viability of alternative vendors.\nScope: Review financial statements, credit ratings, and business plans.\nSteps: 1. Request financial information. 2. Analyze financial data. 3. Assess vendor stability.\nDeliverables: Vendor financial stability reports.<br><b>Resources needed:</b><br><ul><li>Financial Analyst</li><li>Risk Manager</li></ul>",

    },
    {
      "id": "2332d5c9-0ebe-4d55-bbb7-36942e2fc2e0",
      "text": "Evaluate vendor geopolitical risks",
      "custom_tooltip": "<b>Evaluate vendor geopolitical risks</b><br>Objective: Assess the geopolitical risks associated with each vendor.\nScope: Review vendor location, ownership, and political affiliations.\nSteps: 1. Research vendor background. 2. Analyze geopolitical factors. 3. Assess potential risks.\nDeliverables: Vendor geopolitical risk assessment reports.<br><b>Resources needed:</b><br><ul><li>Geopolitical Risk Analyst</li><li>Risk Manager</li></ul>",

      "id": "3ad1e25e-e6d5-4089-953b-851f800db93f",
      "text": "Define Security Requirements for Contracts",
      "custom_tooltip": "<b>Define Security Requirements for Contracts</b><br>Clearly define the &#x27;no-remote-kill&#x27; and other security requirements to be included in vendor contracts. This involves specifying technical standards, compliance certifications, and liability clauses.<br><b>Resources needed:</b><br><ul><li>Legal Advisors</li><li>Cybersecurity Experts</li><li>Contract Specialists</li></ul>",
      "start_date": "2026-04-04",

    {
      "id": "e8f46323-fcbe-4504-8fc5-5731024f0bc2",
      "text": "Develop Standard Contract Template",
      "custom_tooltip": "<b>Develop Standard Contract Template</b><br>Create a standard contract template incorporating the defined security requirements. This template will serve as the basis for negotiations with all vendors.<br><b>Resources needed:</b><br><ul><li>Legal Advisors</li><li>Contract Specialists</li></ul>",
      "start_date": "2026-04-12",

      "progress": 0,

    {
      "id": "0673b144-b202-4073-b823-dda39807ae6c",
      "text": "Negotiate Security Terms with Vendors",
      "custom_tooltip": "<b>Negotiate Security Terms with Vendors</b><br>Engage in negotiations with vendors to ensure they agree to the security requirements outlined in the contract template. This may involve addressing vendor concerns, clarifying requirements, and finding mutually acceptable solutions.<br><b>Resources needed:</b><br><ul><li>Vendor Liaison</li><li>Contract Specialists</li><li>Legal Advisors</li></ul>",
      "start_date": "2026-04-20",

    },
    {
      "id": "80826f82-721f-49b0-9564-9c93d4d0e3d8",
      "text": "Incorporate Security Attestation Requirements",
      "custom_tooltip": "<b>Incorporate Security Attestation Requirements</b><br>Ensure contracts include requirements for independent cyber attestations to verify the &#x27;no-remote-kill&#x27; design and other security features. Define the scope, frequency, and process for these attestations.<br><b>Resources needed:</b><br><ul><li>Cybersecurity Experts</li><li>Legal Advisors</li><li>Contract Specialists</li></ul>",
      "start_date": "2026-04-28",
      "duration": 8.0,
      "progress": 0,

      "meta": "0673b144-b202-4073-b823-dda39807ae6c FS",

      "id": "fb378624-a661-47e9-bf7f-bda531f3b0c5",
      "text": "Finalize and Execute Contracts",
      "custom_tooltip": "<b>Finalize and Execute Contracts</b><br>Review and finalize the contracts with vendors, ensuring all security requirements are accurately reflected. Obtain necessary approvals and execute the contracts.<br><b>Resources needed:</b><br><ul><li>Contract Specialists</li><li>Legal Advisors</li><li>Project Manager</li></ul>",

      "id": "63709283-90ac-4c73-a9c6-4256f29b215e",
      "text": "Conduct Technical Assessment of E-Bus Systems",
      "custom_tooltip": "<b>Conduct Technical Assessment of E-Bus Systems</b>",
      "progress": 0,

      "meta": "68d3ae52-4c41-4755-a24c-fe26a5e4b9eb SS",

    {
      "id": "94ad8761-9ff9-4457-a10f-328d3b1aa4b1",
      "text": "Identify E-Bus System Components",
      "custom_tooltip": "<b>Identify E-Bus System Components</b><br>Objective: Identify all critical hardware and software components within the e-bus systems. Scope: Includes identifying ECUs, communication buses (CAN, Ethernet), and software versions. Steps: Review vendor documentation, conduct physical inspection of e-buses, and use network analysis tools. Deliverables: A comprehensive list of all identified components.<br><b>Resources needed:</b><br><ul><li>E-Bus Systems Engineer</li><li>Cybersecurity Architect</li><li>Diagnostic Tools</li></ul>",
      "start_date": "2026-05-14",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "63709283-90ac-4c73-a9c6-4256f29b215e SS",
      "parent": "63709283-90ac-4c73-a9c6-4256f29b215e"
    },
    {
      "id": "43b427ad-c32e-4020-876c-8e9a95a3dedf",
      "text": "Analyze Network Architecture and Protocols",
      "custom_tooltip": "<b>Analyze Network Architecture and Protocols</b><br>Objective: Map the network architecture and communication protocols used within the e-bus systems. Scope: Includes identifying network segments, communication protocols (CAN, Ethernet, TCP/IP), and data flow patterns. Steps: Use network analysis tools (Wireshark), review vendor documentation, and conduct protocol reverse engineering. Deliverables: A detailed network architecture diagram and protocol specifications.<br><b>Resources needed:</b><br><ul><li>Network Engineer</li><li>Cybersecurity Analyst</li><li>Wireshark</li><li>Protocol Analyzers</li></ul>",
      "start_date": "2026-05-17",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "94ad8761-9ff9-4457-a10f-328d3b1aa4b1 FS",
      "parent": "63709283-90ac-4c73-a9c6-4256f29b215e"
    },
    {
      "id": "06dace1f-5cac-403d-a214-63f6d67b64b7",
      "text": "Assess Embedded Software Security",
      "custom_tooltip": "<b>Assess Embedded Software Security</b><br>Objective: Evaluate the security of the embedded software running on the e-bus systems. Scope: Includes identifying vulnerabilities, analyzing code for security flaws, and assessing the effectiveness of existing security measures. Steps: Conduct static and dynamic code analysis, perform vulnerability scanning, and review security configurations. Deliverables: A vulnerability assessment report and recommendations for security improvements.<br><b>Resources needed:</b><br><ul><li>Software Security Engineer</li><li>Cybersecurity Architect</li><li>Static Analysis Tools</li><li>Dynamic Analysis Tools</li></ul>",
      "start_date": "2026-05-20",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "43b427ad-c32e-4020-876c-8e9a95a3dedf FS",
      "parent": "63709283-90ac-4c73-a9c6-4256f29b215e"
    },
    {
      "id": "0f3aa5ae-3472-4339-a802-f873df2e0bd6",
      "text": "Document System Security Features",
      "custom_tooltip": "<b>Document System Security Features</b><br>Objective: Document existing security features implemented in the e-bus systems. Scope: Includes identifying access controls, encryption mechanisms, and intrusion detection systems. Steps: Review vendor documentation, conduct security audits, and perform penetration testing. Deliverables: A comprehensive security features documentation.<br><b>Resources needed:</b><br><ul><li>Cybersecurity Analyst</li><li>Security Auditor</li><li>Penetration Testing Tools</li></ul>",
      "start_date": "2026-05-23",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "63709283-90ac-4c73-a9c6-4256f29b215e FF, 06dace1f-5cac-403d-a214-63f6d67b64b7 FS",
      "parent": "63709283-90ac-4c73-a9c6-4256f29b215e"
    },
    {
      "id": "afd0a7d7-4081-4f78-8d63-c4d359263e00",
      "text": "Define 'No-Remote-Kill' Design Specifications",
      "custom_tooltip": "<b>Define &#x27;No-Remote-Kill&#x27; Design Specifications</b>",
      "progress": 0,
      "open": true,
      "meta": "63709283-90ac-4c73-a9c6-4256f29b215e FS",
      "parent": "68d3ae52-4c41-4755-a24c-fe26a5e4b9eb",
      "type": "project"
    },
    {
      "id": "410384b8-6d09-45c3-80e2-c990bf4ab213",
      "text": "Define 'No-Remote-Kill' Principles",
      "custom_tooltip": "<b>Define &#x27;No-Remote-Kill&#x27; Principles</b><br>Establish core principles for &#x27;no-remote-kill&#x27; design, focusing on complete isolation of critical systems. Define what constitutes a &#x27;kill switch&#x27; and acceptable levels of remote access.<br><b>Resources needed:</b><br><ul><li>Cybersecurity Architect</li><li>E-Bus Systems Engineer</li><li>Legal Advisors</li></ul>",
      "start_date": "2026-05-26",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "afd0a7d7-4081-4f78-8d63-c4d359263e00 SS",
      "parent": "afd0a7d7-4081-4f78-8d63-c4d359263e00"
    },
    {
      "id": "317b7661-22f8-413c-9857-953531eb5374",
      "text": "Identify Critical E-Bus Systems",
      "custom_tooltip": "<b>Identify Critical E-Bus Systems</b><br>Determine which e-bus systems are critical for safe operation (e.g., braking, steering, acceleration) and must be protected from remote interference.<br><b>Resources needed:</b><br><ul><li>E-Bus Systems Engineer</li><li>Cybersecurity Architect</li><li>E-bus Operators</li></ul>",
      "start_date": "2026-05-29",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "410384b8-6d09-45c3-80e2-c990bf4ab213 FS",
      "parent": "afd0a7d7-4081-4f78-8d63-c4d359263e00"
    },
    {
      "id": "82234524-67a3-4d89-ac50-5b1dd23f8f27",
      "text": "Specify Isolation Mechanisms",
      "custom_tooltip": "<b>Specify Isolation Mechanisms</b><br>Detail the technical mechanisms to achieve isolation, such as hardware firewalls, air gaps, or secure enclaves. Define requirements for independent power and communication.<br><b>Resources needed:</b><br><ul><li>Cybersecurity Architect</li><li>Hardware Security Expert</li><li>Engineers</li></ul>",
      "start_date": "2026-06-01",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "317b7661-22f8-413c-9857-953531eb5374 FS",
      "parent": "afd0a7d7-4081-4f78-8d63-c4d359263e00"
    },
    {
      "id": "391a2f68-ba03-46f4-8de7-1f91c897515c",
      "text": "Define Verification and Attestation Process",
      "custom_tooltip": "<b>Define Verification and Attestation Process</b><br>Establish a process for verifying and attesting that the &#x27;no-remote-kill&#x27; design is implemented correctly. Include penetration testing, code review, and third-party audits.<br><b>Resources needed:</b><br><ul><li>Cybersecurity Attestation &amp; Verification Specialist</li><li>Accredited Third-Party Auditor</li><li>Legal Advisors</li></ul>",
      "start_date": "2026-06-04",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "82234524-67a3-4d89-ac50-5b1dd23f8f27 FS",
      "parent": "afd0a7d7-4081-4f78-8d63-c4d359263e00"
    },
    {
      "id": "94d9548c-2ffc-4703-ab33-80162c6bd5dd",
      "text": "Document Design Specifications",
      "custom_tooltip": "<b>Document Design Specifications</b><br>Create a comprehensive document outlining the &#x27;no-remote-kill&#x27; design specifications, including diagrams, technical details, and verification procedures. Ensure clarity and completeness for vendors and auditors.<br><b>Resources needed:</b><br><ul><li>Cybersecurity Architect</li><li>Technical Writer</li><li>E-Bus Systems Engineer</li></ul>",
      "start_date": "2026-06-07",

      "progress": 0,
      "open": true,
      "meta": "afd0a7d7-4081-4f78-8d63-c4d359263e00 FF, 391a2f68-ba03-46f4-8de7-1f91c897515c FS",
      "parent": "afd0a7d7-4081-4f78-8d63-c4d359263e00"

    {
      "id": "0bfcefed-d5ff-445c-b9ad-114ef1d680b4",
      "text": "Identify Critical System Components",
      "custom_tooltip": "<b>Identify Critical System Components</b><br>Objective: Determine which e-bus systems are most critical to safety and operation.\nScope: Review system architecture diagrams, consult with engineers, and prioritize components based on criticality.\nSteps: 1. Review existing documentation. 2. Conduct interviews with engineers. 3. Prioritize components. 4. Document findings.\nDeliverables: List of critical system components.<br><b>Resources needed:</b><br><ul><li>E-Bus Systems Engineer</li><li>Cybersecurity Architect</li></ul>",
      "start_date": "2026-06-10",

      "meta": "43a5dfb3-cc1d-4e07-ba96-a07bc88facea SS",

    },
    {
      "id": "78e7e2bc-c999-47a6-accf-3630ed92b9e8",
      "text": "Map System Dependencies",
      "custom_tooltip": "<b>Map System Dependencies</b><br>Objective: Understand how critical system components interact with each other and external systems.\nScope: Create a dependency map showing data flows and control signals.\nSteps: 1. Analyze system architecture. 2. Identify data flows. 3. Map control signals. 4. Document dependencies.\nDeliverables: System dependency map.<br><b>Resources needed:</b><br><ul><li>E-Bus Systems Engineer</li><li>Cybersecurity Architect</li></ul>",

    {
      "id": "c2214173-8e30-4366-9ede-ddadabbe6cb3",
      "text": "Assess Isolation Feasibility",
      "custom_tooltip": "<b>Assess Isolation Feasibility</b><br>Objective: Evaluate the technical feasibility of isolating critical system components.\nScope: Determine the impact of isolation on system functionality and performance.\nSteps: 1. Conduct feasibility studies. 2. Analyze impact on functionality. 3. Assess performance implications. 4. Document findings.\nDeliverables: Feasibility assessment report.<br><b>Resources needed:</b><br><ul><li>E-Bus Systems Engineer</li><li>Cybersecurity Architect</li><li>Cybersecurity Testing Specialist</li></ul>",
      "start_date": "2026-06-14",

    },
    {
      "id": "254f1ed5-708f-4338-a5fa-dba524d6ac68",
      "text": "Define Isolation Depth Levels",
      "custom_tooltip": "<b>Define Isolation Depth Levels</b><br>Objective: Determine the appropriate level of isolation for each critical system component.\nScope: Balance security with functionality and performance.\nSteps: 1. Define isolation levels. 2. Evaluate security benefits. 3. Assess impact on functionality. 4. Optimize isolation depth.\nDeliverables: Defined isolation depth levels for each component.<br><b>Resources needed:</b><br><ul><li>Cybersecurity Architect</li><li>Risk &amp; Compliance Manager</li></ul>",

    {
      "id": "c5c21f8c-3003-43e5-81d2-60ab6d8d8c05",
      "text": "Identify Critical System Components",
      "custom_tooltip": "<b>Identify Critical System Components</b><br>Objective: Determine which e-bus systems are most critical for safe operation and require rollback capabilities.\nScope: Review system architecture diagrams, consult with engineers, and prioritize systems based on criticality.\nSteps: 1. Review system documentation. 2. Conduct interviews with engineers. 3. Prioritize systems based on safety impact.\nDeliverables: List of critical system components.<br><b>Resources needed:</b><br><ul><li>E-Bus Systems Engineer</li><li>Cybersecurity Architect</li></ul>",
      "start_date": "2026-06-18",

    {
      "id": "71b06683-55fa-4f6e-b167-ec9765b0f885",
      "text": "Analyze Existing Recovery Mechanisms",
      "custom_tooltip": "<b>Analyze Existing Recovery Mechanisms</b><br>Objective: Understand the current methods for restoring e-bus systems after a failure or cyberattack.\nScope: Review existing documentation, test recovery procedures, and identify limitations.\nSteps: 1. Review existing recovery documentation. 2. Test recovery procedures in a lab environment. 3. Identify gaps and limitations.\nDeliverables: Report on existing recovery mechanisms and their limitations.<br><b>Resources needed:</b><br><ul><li>E-Bus Systems Engineer</li><li>Cybersecurity Architect</li><li>Testing Team</li></ul>",
      "start_date": "2026-06-21",
      "duration": 3.0,
      "progress": 0,

      "meta": "c5c21f8c-3003-43e5-81d2-60ab6d8d8c05 FS",
      "parent": "3ca8b536-ecf7-4663-9d75-ccf5b580ba10"
    },
    {
      "id": "315912f2-8555-4667-bc16-844b40ec81b1",
      "text": "Design Automated Rollback Procedures",
      "custom_tooltip": "<b>Design Automated Rollback Procedures</b><br>Objective: Develop automated procedures for restoring critical systems to a known good state after a cyberattack.\nScope: Design procedures that minimize downtime and data loss.\nSteps: 1. Design automated rollback procedures. 2. Develop scripts for automated rollback. 3. Test rollback procedures in a simulated environment.\nDeliverables: Automated rollback procedures and scripts.<br><b>Resources needed:</b><br><ul><li>Cybersecurity Architect</li><li>Software Developer</li><li>Testing Team</li></ul>",
      "start_date": "2026-06-24",

      "meta": "71b06683-55fa-4f6e-b167-ec9765b0f885 FS",

    },
    {
      "id": "84193636-70a2-4079-b739-3b5c18b30691",
      "text": "Test Rollback Procedures and Document Results",
      "custom_tooltip": "<b>Test Rollback Procedures and Document Results</b><br>Objective: Verify the effectiveness of the rollback procedures and document the results.\nScope: Conduct thorough testing in a simulated environment and document any issues.\nSteps: 1. Conduct rollback testing in a simulated environment. 2. Document test results. 3. Address any issues identified during testing.\nDeliverables: Test report and updated rollback procedures.<br><b>Resources needed:</b><br><ul><li>Testing Team</li><li>Cybersecurity Architect</li><li>E-Bus Systems Engineer</li></ul>",

    {
      "id": "0a62acf7-5bc5-4391-b2f2-7d35265bd53d",
      "text": "Define Secure Gateway Requirements",
      "custom_tooltip": "<b>Define Secure Gateway Requirements</b><br>Objective: Clearly define the functional and security requirements for the secure gateway.\nScope: Requirements should cover authentication, authorization, traffic filtering, intrusion detection, and logging.\nSteps: 1. Review existing e-bus system architecture. 2. Identify critical data flows. 3. Define security policies. 4. Document requirements.\nDeliverables: Secure gateway requirements document.<br><b>Resources needed:</b><br><ul><li>Cybersecurity Architect</li><li>E-Bus Systems Engineer</li><li>Security Consultant</li></ul>",
      "start_date": "2026-06-30",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "22f414e1-96bf-400a-980c-5b7bc094c158 SS",

    },
    {
      "id": "f4907a84-3cc9-4018-a251-bde39e15319c",
      "text": "Evaluate Gateway Technology Options",
      "custom_tooltip": "<b>Evaluate Gateway Technology Options</b><br>Objective: Research and evaluate different secure gateway technologies and vendors.\nScope: Consider factors such as performance, scalability, security features, cost, and vendor reputation.\nSteps: 1. Identify potential gateway solutions. 2. Conduct vendor demos. 3. Perform technical evaluations. 4. Compare solutions.\nDeliverables: Technology evaluation report.<br><b>Resources needed:</b><br><ul><li>Cybersecurity Architect</li><li>Network Engineer</li><li>Procurement Specialist</li></ul>",
      "start_date": "2026-07-04",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "0a62acf7-5bc5-4391-b2f2-7d35265bd53d FS",
      "parent": "22f414e1-96bf-400a-980c-5b7bc094c158"
    },
    {
      "id": "c257f6b8-9c16-4243-a7d6-ca2b984ae4f5",
      "text": "Design Gateway Network Architecture",
      "custom_tooltip": "<b>Design Gateway Network Architecture</b><br>Objective: Design the network architecture for the secure gateway, including placement, configuration, and integration with existing e-bus systems.\nScope: Consider network segmentation, firewall rules, intrusion detection systems, and logging infrastructure.\nSteps: 1. Develop network diagrams. 2. Define network policies. 3. Configure network devices. 4. Test network connectivity.\nDeliverables: Network architecture diagram and configuration documentation.<br><b>Resources needed:</b><br><ul><li>Network Engineer</li><li>Cybersecurity Architect</li><li>E-Bus Systems Engineer</li></ul>",
      "start_date": "2026-07-08",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "f4907a84-3cc9-4018-a251-bde39e15319c FS",
      "parent": "22f414e1-96bf-400a-980c-5b7bc094c158"
    },
    {
      "id": "bee69f79-7633-4268-90e9-0d3f632c9b21",
      "text": "Develop Gateway Security Policies",
      "custom_tooltip": "<b>Develop Gateway Security Policies</b><br>Objective: Develop comprehensive security policies for the secure gateway, including access control, authentication, authorization, and data encryption.\nScope: Policies should align with industry best practices and regulatory requirements.\nSteps: 1. Review existing security policies. 2. Define new security policies. 3. Document security policies. 4. Implement security policies.\nDeliverables: Secure gateway security policy document.<br><b>Resources needed:</b><br><ul><li>Cybersecurity Architect</li><li>Security Consultant</li><li>Legal Advisor</li></ul>",
      "start_date": "2026-07-12",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "c257f6b8-9c16-4243-a7d6-ca2b984ae4f5 FS",

    },
    {
      "id": "1693a355-e830-4b7b-851f-bd8fdae7cc53",
      "text": "Test and Validate Gateway Security",
      "custom_tooltip": "<b>Test and Validate Gateway Security</b><br>Objective: Thoroughly test and validate the security of the secure gateway to ensure it meets the defined requirements.\nScope: Conduct penetration testing, vulnerability scanning, and security audits.\nSteps: 1. Develop test plan. 2. Conduct security testing. 3. Analyze test results. 4. Remediate vulnerabilities.\nDeliverables: Security test report.<br><b>Resources needed:</b><br><ul><li>Penetration Tester</li><li>Security Auditor</li><li>Cybersecurity Architect</li></ul>",
      "start_date": "2026-07-16",

      "open": true,

    {
      "id": "1ff7da65-41f5-4256-95d3-e5058dda9584",
      "text": "Prepare isolation measure specifications",
      "custom_tooltip": "<b>Prepare isolation measure specifications</b><br>Define detailed technical specifications for the isolation measures to be implemented, including hardware and software requirements, network configurations, and security protocols. This involves reviewing existing e-bus system documentation, consulting with cybersecurity experts, and developing a comprehensive set of specifications that meet the &#x27;no-remote-kill&#x27; design requirements.<br><b>Resources needed:</b><br><ul><li>Cybersecurity Architect</li><li>E-Bus Systems Engineer</li><li>Hardware Security Expert</li></ul>",
      "start_date": "2026-07-20",
      "duration": 6.0,
      "progress": 0,
      "open": true,
      "meta": "a46b73c4-9eb5-4f76-94e1-27ebb79f813b SS",
      "parent": "a46b73c4-9eb5-4f76-94e1-27ebb79f813b"
    },
    {
      "id": "1d7b1a77-6119-4d1e-9580-918bed0aef63",
      "text": "Acquire necessary isolation hardware/software",
      "custom_tooltip": "<b>Acquire necessary isolation hardware/software</b><br>Procure the hardware and software components required to implement the isolation measures, including secure gateways, network segmentation devices, and security software. This involves identifying suitable vendors, obtaining quotes, placing orders, and managing the procurement process to ensure timely delivery of the necessary components.<br><b>Resources needed:</b><br><ul><li>Procurement Specialist</li><li>Vendor Liaison</li><li>E-Bus Systems Engineer</li></ul>",
      "start_date": "2026-07-26",
      "duration": 6.0,
      "progress": 0,
      "open": true,
      "meta": "1ff7da65-41f5-4256-95d3-e5058dda9584 FS",
      "parent": "a46b73c4-9eb5-4f76-94e1-27ebb79f813b"
    },
    {
      "id": "69f5a372-4a56-4c76-9b41-1f2a52cd7c5e",
      "text": "Configure and test isolation measures",
      "custom_tooltip": "<b>Configure and test isolation measures</b><br>Configure and test the isolation measures in a lab environment to ensure they function as intended and do not introduce any new vulnerabilities. This involves installing and configuring the hardware and software components, conducting penetration testing and vulnerability assessments, and verifying that the isolation measures effectively prevent remote access to critical systems.<br><b>Resources needed:</b><br><ul><li>Cybersecurity Engineer</li><li>Penetration Tester</li><li>E-Bus Systems Engineer</li></ul>",
      "start_date": "2026-08-01",
      "duration": 6.0,
      "progress": 0,
      "open": true,
      "meta": "1d7b1a77-6119-4d1e-9580-918bed0aef63 FS",
      "parent": "a46b73c4-9eb5-4f76-94e1-27ebb79f813b"
    },
    {
      "id": "1d5b38f2-ce8d-4bbb-9910-baf285916d0a",
      "text": "Deploy isolation measures on e-buses",
      "custom_tooltip": "<b>Deploy isolation measures on e-buses</b><br>Deploy the isolation measures on the e-buses, following a phased approach to minimize disruption and ensure a smooth transition. This involves coordinating with e-bus operators, scheduling deployment activities, installing and configuring the isolation measures on each e-bus, and conducting post-deployment testing to verify functionality.<br><b>Resources needed:</b><br><ul><li>E-Bus Systems Engineer</li><li>Field Technician</li><li>E-Bus Operator</li></ul>",
      "start_date": "2026-08-07",
      "duration": 6.0,
      "progress": 0,
      "open": true,

    },
    {
      "id": "836289a5-5636-41f6-aae2-884f09b94931",
      "text": "Develop and Test Rollback Procedures",
      "custom_tooltip": "<b>Develop and Test Rollback Procedures</b>",
      "progress": 0,
      "open": true,
      "meta": "a46b73c4-9eb5-4f76-94e1-27ebb79f813b FS",

      "type": "project"

    {
      "id": "26ab1161-e7f3-49b5-805e-7ac612803bcc",
      "text": "Define Rollback Scope and Criteria",
      "custom_tooltip": "<b>Define Rollback Scope and Criteria</b><br>Determine which systems and data need to be included in the rollback procedure. Establish clear criteria for when a rollback should be initiated.<br><b>Resources needed:</b><br><ul><li>Cybersecurity Architect</li><li>E-Bus Systems Engineer</li><li>Risk &amp; Compliance Manager</li></ul>",
      "start_date": "2026-08-13",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "836289a5-5636-41f6-aae2-884f09b94931 SS",

    },
    {
      "id": "6967498e-ad20-4541-abed-7341f35cb127",
      "text": "Develop Detailed Rollback Procedures",
      "custom_tooltip": "<b>Develop Detailed Rollback Procedures</b><br>Create step-by-step instructions for performing the rollback, including specific commands, scripts, and configurations. Document all necessary dependencies and prerequisites.<br><b>Resources needed:</b><br><ul><li>E-Bus Systems Engineer</li><li>Cybersecurity Engineer</li><li>Technical Writer</li></ul>",
      "start_date": "2026-08-17",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "26ab1161-e7f3-49b5-805e-7ac612803bcc FS",
      "parent": "836289a5-5636-41f6-aae2-884f09b94931"
    },
    {
      "id": "c9fce3d3-50d7-4a7e-be42-c646bb858627",
      "text": "Set Up Test Environment",
      "custom_tooltip": "<b>Set Up Test Environment</b><br>Create a dedicated test environment that mirrors the production environment as closely as possible. Ensure that the test environment is isolated from the production environment to prevent accidental data corruption or system outages.<br><b>Resources needed:</b><br><ul><li>System Administrator</li><li>Network Engineer</li><li>Cybersecurity Engineer</li></ul>",
      "start_date": "2026-08-21",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "6967498e-ad20-4541-abed-7341f35cb127 FS",
      "parent": "836289a5-5636-41f6-aae2-884f09b94931"
    },
    {
      "id": "14311cb0-d6a8-42db-bdb9-e797535cc35c",
      "text": "Test Rollback Procedures",
      "custom_tooltip": "<b>Test Rollback Procedures</b><br>Execute the rollback procedures in the test environment. Verify that all systems and data are restored to the pre-incident state without data loss or corruption. Identify and resolve any issues or errors encountered during the testing process.<br><b>Resources needed:</b><br><ul><li>E-Bus Systems Engineer</li><li>Cybersecurity Engineer</li><li>Quality Assurance Tester</li></ul>",
      "start_date": "2026-08-25",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "c9fce3d3-50d7-4a7e-be42-c646bb858627 FS",
      "parent": "836289a5-5636-41f6-aae2-884f09b94931"
    },
    {
      "id": "ebf5e63e-654e-4b54-89fe-7b4ce0e175da",
      "text": "Document and Refine Rollback Procedures",
      "custom_tooltip": "<b>Document and Refine Rollback Procedures</b><br>Update the rollback procedures based on the results of the testing. Document any changes or refinements made to the procedures. Create a comprehensive rollback playbook that includes all necessary information and instructions.<br><b>Resources needed:</b><br><ul><li>Technical Writer</li><li>E-Bus Systems Engineer</li><li>Cybersecurity Engineer</li></ul>",
      "start_date": "2026-08-29",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "836289a5-5636-41f6-aae2-884f09b94931 FF, 14311cb0-d6a8-42db-bdb9-e797535cc35c FS",
      "parent": "836289a5-5636-41f6-aae2-884f09b94931"
    },
    {
      "id": "d9bc421b-5029-4006-83a1-3c134d9ead1d",
      "text": "Implement Secure Gateway",
      "custom_tooltip": "<b>Implement Secure Gateway</b>",
      "progress": 0,
      "open": true,
      "meta": "836289a5-5636-41f6-aae2-884f09b94931 FS",
      "parent": "2a32d000-fb17-4a3c-8b74-fed52b5dec55",
      "type": "project"
    },
    {
      "id": "adf739c5-8e9c-4ea6-b176-ffd3f2fba246",
      "text": "Configure gateway traffic filtering rules",
      "custom_tooltip": "<b>Configure gateway traffic filtering rules</b><br>Objective: Define and implement rules for the secure gateway to filter network traffic, preventing unauthorized access and malicious data from reaching critical e-bus systems.\nScope: This includes defining allowed protocols, ports, and IP addresses, as well as implementing intrusion detection and prevention mechanisms.\nSteps: 1. Analyze network traffic patterns of e-bus systems. 2. Define filtering rules based on security best practices and identified threats. 3. Configure the secure gateway with the defined rules. 4. Test the filtering rules to ensure they are effective and do not disrupt legitimate traffic.\nDeliverables: Documented filtering rules, configured secure gateway, test results.<br><b>Resources needed:</b><br><ul><li>Network Engineer</li><li>Cybersecurity Analyst</li><li>Secure Gateway Administrator</li></ul>",
      "start_date": "2026-09-02",
      "duration": 8.0,
      "progress": 0,
      "open": true,
      "meta": "d9bc421b-5029-4006-83a1-3c134d9ead1d SS",
      "parent": "d9bc421b-5029-4006-83a1-3c134d9ead1d"
    },
    {
      "id": "d77fb598-7cc5-411c-8a85-fa4ef7cf9ae1",
      "text": "Harden secure gateway operating system",
      "custom_tooltip": "<b>Harden secure gateway operating system</b><br>Objective: Secure the operating system of the secure gateway to prevent unauthorized access and exploitation of vulnerabilities.\nScope: This includes patching vulnerabilities, disabling unnecessary services, configuring strong authentication, and implementing access controls.\nSteps: 1. Identify the operating system of the secure gateway. 2. Apply the latest security patches. 3. Disable unnecessary services and ports. 4. Configure strong authentication mechanisms (e.g., multi-factor authentication). 5. Implement role-based access control.\nDeliverables: Hardened operating system configuration, documented security measures.<br><b>Resources needed:</b><br><ul><li>System Administrator</li><li>Cybersecurity Engineer</li></ul>",
      "start_date": "2026-09-10",
      "duration": 8.0,
      "progress": 0,
      "open": true,
      "meta": "adf739c5-8e9c-4ea6-b176-ffd3f2fba246 FS",
      "parent": "d9bc421b-5029-4006-83a1-3c134d9ead1d"
    },
    {
      "id": "ae17f3a4-8b4a-4fe7-956d-018fdff526d1",
      "text": "Test secure gateway security controls",
      "custom_tooltip": "<b>Test secure gateway security controls</b><br>Objective: Verify the effectiveness of the security controls implemented on the secure gateway.\nScope: This includes penetration testing, vulnerability scanning, and security audits.\nSteps: 1. Conduct penetration testing to identify vulnerabilities. 2. Perform vulnerability scanning to identify known weaknesses. 3. Conduct security audits to ensure compliance with security policies.\nDeliverables: Penetration testing report, vulnerability scan report, security audit report.<br><b>Resources needed:</b><br><ul><li>Penetration Tester</li><li>Security Auditor</li><li>Cybersecurity Analyst</li></ul>",

    {
      "id": "ac00523e-3309-47b6-aec8-3c68f992fc80",
      "text": "Integrate gateway with network infrastructure",
      "custom_tooltip": "<b>Integrate gateway with network infrastructure</b><br>Objective: Seamlessly integrate the secure gateway into the existing network infrastructure of the e-bus systems.\nScope: This includes configuring network settings, routing traffic through the gateway, and ensuring compatibility with existing devices.\nSteps: 1. Analyze the existing network infrastructure. 2. Configure network settings for the secure gateway. 3. Route traffic from e-bus systems through the gateway. 4. Test network connectivity and performance.\nDeliverables: Integrated secure gateway, network configuration documentation.<br><b>Resources needed:</b><br><ul><li>Network Engineer</li><li>System Administrator</li></ul>",

      "id": "7b417bb8-4ef7-4118-8e27-e6506e86f093",
      "text": "Plan penetration testing scope and rules",
      "custom_tooltip": "<b>Plan penetration testing scope and rules</b><br>Define the scope of the penetration test, including systems to be tested, testing methods, and rules of engagement. Objective: Ensure testing focuses on critical areas and avoids disruption. Scope: E-bus systems, network infrastructure, applications. Steps: Identify critical systems, define testing boundaries, establish communication protocols. Deliverables: Penetration testing plan.<br><b>Resources needed:</b><br><ul><li>Cybersecurity expert</li><li>E-bus systems engineer</li><li>Project manager</li></ul>",

      "id": "3bb12e7f-1db2-475e-a767-970700f9f67f",
      "text": "Prepare test environment and tools",
      "custom_tooltip": "<b>Prepare test environment and tools</b><br>Set up a controlled test environment that mirrors the production environment. Acquire and configure necessary penetration testing tools. Objective: Create a safe and realistic testing environment. Scope: Test environment, penetration testing tools. Steps: Build test environment, install testing tools, configure network access. Deliverables: Functional test environment.<br><b>Resources needed:</b><br><ul><li>System administrator</li><li>Network engineer</li><li>Cybersecurity expert</li></ul>",

      "id": "b73a0994-4dff-48ae-b958-a38fe208abe8",
      "text": "Execute penetration tests and document findings",
      "custom_tooltip": "<b>Execute penetration tests and document findings</b><br>Conduct penetration tests according to the defined plan. Document all vulnerabilities and security weaknesses discovered. Objective: Identify security flaws in e-bus systems. Scope: Penetration test results, vulnerability reports. Steps: Run tests, record findings, analyze results. Deliverables: Penetration test report.<br><b>Resources needed:</b><br><ul><li>Penetration tester</li><li>Security analyst</li></ul>",

      "id": "f9530f66-119f-4424-b5a3-d6c2252bbe74",
      "text": "Analyze test results and prioritize vulnerabilities",
      "custom_tooltip": "<b>Analyze test results and prioritize vulnerabilities</b><br>Analyze the penetration test results to determine the severity and impact of each vulnerability. Prioritize vulnerabilities for remediation based on risk. Objective: Determine the most critical security weaknesses. Scope: Vulnerability prioritization. Steps: Assess impact, calculate risk scores, rank vulnerabilities. Deliverables: Prioritized vulnerability list.<br><b>Resources needed:</b><br><ul><li>Security analyst</li><li>Risk manager</li><li>Cybersecurity expert</li></ul>",

      "text": "Report penetration test results and recommendations",
      "custom_tooltip": "<b>Report penetration test results and recommendations</b><br>Prepare a comprehensive penetration test report that includes a summary of findings, detailed descriptions of vulnerabilities, and recommendations for remediation. Objective: Communicate test results to stakeholders. Scope: Penetration test report. Steps: Write report, review findings, present recommendations. Deliverables: Final penetration test report.<br><b>Resources needed:</b><br><ul><li>Penetration tester</li><li>Security analyst</li><li>Project manager</li></ul>",

      "text": "Define Audit Scope and Objectives",
      "custom_tooltip": "<b>Define Audit Scope and Objectives</b><br>Clearly define the scope of the security audit, including the systems, networks, and applications to be audited. Establish specific objectives for the audit, such as identifying vulnerabilities, assessing compliance with security policies, and evaluating the effectiveness of security controls.<br><b>Resources needed:</b><br><ul><li>Cybersecurity Auditor</li><li>E-Bus Systems Engineer</li><li>Project Manager</li></ul>",

      "text": "Gather System Documentation and Information",
      "custom_tooltip": "<b>Gather System Documentation and Information</b><br>Collect relevant system documentation, including network diagrams, system configurations, security policies, and incident response plans. Gather information about the e-bus systems&#x27; architecture, communication protocols, and security features.<br><b>Resources needed:</b><br><ul><li>Cybersecurity Auditor</li><li>E-Bus Systems Engineer</li><li>Technical Writer</li></ul>",

      "text": "Conduct Vulnerability Scanning and Assessment",
      "custom_tooltip": "<b>Conduct Vulnerability Scanning and Assessment</b><br>Perform vulnerability scanning and assessment using automated tools and manual techniques to identify potential security weaknesses in the e-bus systems. Analyze the results of the scans and assessments to prioritize vulnerabilities based on their severity and potential impact.<br><b>Resources needed:</b><br><ul><li>Cybersecurity Auditor</li><li>Penetration Tester</li><li>Vulnerability Scanning Tools</li></ul>",

      "text": "Review Security Policies and Procedures",
      "custom_tooltip": "<b>Review Security Policies and Procedures</b><br>Evaluate the effectiveness of existing security policies and procedures in protecting the e-bus systems from cyber threats. Identify any gaps or weaknesses in the policies and procedures and recommend improvements.<br><b>Resources needed:</b><br><ul><li>Cybersecurity Auditor</li><li>Security Policy Expert</li><li>Legal Advisor</li></ul>",

      "id": "e3d44f9f-7adc-4053-a42d-d21774f3436d",
      "text": "Prepare and Present Audit Report",
      "custom_tooltip": "<b>Prepare and Present Audit Report</b><br>Document the findings of the security audit in a comprehensive report, including a summary of the audit scope and objectives, a description of the methodologies used, a list of identified vulnerabilities and weaknesses, and recommendations for remediation. Present the audit report to key stakeholders and discuss the findings and recommendations.<br><b>Resources needed:</b><br><ul><li>Cybersecurity Auditor</li><li>Technical Writer</li><li>Project Manager</li></ul>",

      "custom_tooltip": "<b>Assess Infrastructure and System Compatibility</b><br>Evaluate the existing infrastructure and systems of the e-buses to ensure compatibility with the planned security measures. Identify any potential conflicts or limitations that may impact the deployment process.<br><b>Resources needed:</b><br><ul><li>E-Bus Systems Engineer</li><li>Network Engineer</li><li>Cybersecurity Specialist</li></ul>",

      "custom_tooltip": "<b>Develop Detailed Deployment Schedule</b><br>Create a comprehensive deployment schedule that outlines the specific tasks, timelines, and resources required for each phase of the deployment. Coordinate with e-bus operators and other stakeholders to minimize disruptions to service.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>E-Bus Systems Engineer</li><li>E-Bus Operators</li></ul>",

      "text": "Prepare Communication and Training Materials",
      "custom_tooltip": "<b>Prepare Communication and Training Materials</b><br>Develop clear and concise communication materials to inform e-bus operators and other stakeholders about the upcoming deployment. Create training materials to educate operators on the new security measures and procedures.<br><b>Resources needed:</b><br><ul><li>Communication Specialist</li><li>Training Coordinator</li><li>Cybersecurity Expert</li></ul>",

      "id": "3bc6551d-0076-4592-9ea5-eb524bca63be",
      "text": "Develop Training Materials for E-Bus Operators",
      "custom_tooltip": "<b>Develop Training Materials for E-Bus Operators</b><br>Objective: Create comprehensive training materials covering new security measures.\nScope: Materials will include manuals, videos, and interactive modules.\nSteps: 1. Outline training topics. 2. Develop content. 3. Review and revise. 4. Finalize materials.\nDeliverables: Training manuals, videos, and interactive modules.<br><b>Resources needed:</b><br><ul><li>Training Specialist</li><li>Cybersecurity Expert</li><li>E-Bus Systems Engineer</li><li>Technical Writer</li></ul>",

    {
      "id": "7ba4ec3f-ddfd-49ba-a528-a2d42489679d",
      "text": "Schedule Training Sessions with E-Bus Operators",
      "custom_tooltip": "<b>Schedule Training Sessions with E-Bus Operators</b><br>Objective: Coordinate training sessions to accommodate operator schedules.\nScope: Schedule sessions for all operators across different regions.\nSteps: 1. Determine operator availability. 2. Create training schedule. 3. Communicate schedule to operators. 4. Confirm attendance.\nDeliverables: Training schedule and confirmed attendance list.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Training Coordinator</li><li>E-Bus Operators</li></ul>",

      "id": "b70c3fff-eee5-44a0-b5d1-1cc0e3ae0d4b",
      "text": "Conduct Hands-On Training on Security Procedures",
      "custom_tooltip": "<b>Conduct Hands-On Training on Security Procedures</b><br>Objective: Provide practical training on new security procedures.\nScope: Hands-on training covering isolation, rollback, and secure gateway usage.\nSteps: 1. Prepare training environment. 2. Conduct training sessions. 3. Provide hands-on exercises. 4. Answer operator questions.\nDeliverables: Completed training sessions and operator feedback.<br><b>Resources needed:</b><br><ul><li>Cybersecurity Expert</li><li>E-Bus Systems Engineer</li><li>Training Specialist</li><li>E-Bus Operators</li></ul>",

      "id": "8628a4a6-30a5-4dff-b896-edf8f4284d59",
      "text": "Assess Operator Understanding and Provide Support",
      "custom_tooltip": "<b>Assess Operator Understanding and Provide Support</b><br>Objective: Evaluate operator understanding and provide ongoing support.\nScope: Assess understanding through quizzes and practical exercises.\nSteps: 1. Develop assessment tools. 2. Conduct assessments. 3. Provide feedback and support. 4. Track operator progress.\nDeliverables: Assessment results and operator support records.<br><b>Resources needed:</b><br><ul><li>Training Specialist</li><li>Cybersecurity Expert</li><li>Project Manager</li></ul>",

      "id": "05dfd2ee-e1ee-4c66-ae90-42fb2e45ccb4",
      "text": "Prepare Copenhagen e-buses for security updates",
      "custom_tooltip": "<b>Prepare Copenhagen e-buses for security updates</b><br>Objective: Ready the pilot e-buses for the installation of new security measures.\nScope: Includes physical access arrangements, software backups, and pre-installation checks.\nSteps: Coordinate with e-bus operators, back up existing software configurations, verify system compatibility.\nDeliverables: Prepared e-buses ready for security measure implementation.<br><b>Resources needed:</b><br><ul><li>E-bus Systems Engineer</li><li>Cybersecurity Architect</li><li>E-bus Operators</li></ul>",

      "text": "Install isolation and secure gateway components",
      "custom_tooltip": "<b>Install isolation and secure gateway components</b><br>Objective: Implement the designed isolation measures and secure gateway on the Copenhagen pilot e-buses.\nScope: Includes hardware and software installation, configuration, and initial testing.\nSteps: Install hardware components, configure software settings, perform basic functionality tests.\nDeliverables: Operational isolation measures and secure gateway on pilot e-buses.<br><b>Resources needed:</b><br><ul><li>Cybersecurity Architect</li><li>Engineers</li><li>Technicians</li></ul>",

      "text": "Test security measures on Copenhagen e-buses",
      "custom_tooltip": "<b>Test security measures on Copenhagen e-buses</b><br>Objective: Validate the effectiveness of the implemented security measures.\nScope: Includes functional testing, penetration testing, and vulnerability scanning.\nSteps: Conduct functional tests, perform penetration tests, scan for vulnerabilities.\nDeliverables: Test results and reports on the effectiveness of the security measures.<br><b>Resources needed:</b><br><ul><li>Cybersecurity Experts</li><li>Penetration Testers</li><li>Security Auditors</li></ul>",

      "text": "Document implementation process and findings",

    {
      "id": "c43fe76c-27a1-4eb2-a78c-65cc24a9e6ae",
      "text": "Gather Pilot Program Data and Feedback",
      "custom_tooltip": "<b>Gather Pilot Program Data and Feedback</b><br>Collect data from the Copenhagen pilot program, including technical performance metrics, operator feedback, and security audit results. This data will be used to assess the effectiveness of the implemented security measures and identify areas for improvement.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Cybersecurity Analyst</li><li>E-Bus Operators</li></ul>",
      "start_date": "2026-11-26",

      "open": true,

    },
    {
      "id": "8a6978d2-c4bf-4c2f-8302-a4522e93d054",
      "text": "Analyze Pilot Program Results",
      "custom_tooltip": "<b>Analyze Pilot Program Results</b><br>Analyze the collected data to identify strengths and weaknesses of the implemented security measures. This includes assessing the effectiveness of the isolation measures, the rollback procedures, and the secure gateway architecture. Identify any vulnerabilities or areas where the security measures can be improved.<br><b>Resources needed:</b><br><ul><li>Cybersecurity Architect</li><li>Cybersecurity Analyst</li><li>Data Analyst</li></ul>",
      "start_date": "2026-11-28",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "c43fe76c-27a1-4eb2-a78c-65cc24a9e6ae FS",
      "parent": "8afa72b2-fdea-44b7-9ee1-9757dec1cc7e"
    },
    {
      "id": "3dda63fc-7084-4fdb-93a6-071b0ac7235b",
      "text": "Identify Lessons Learned and Best Practices",
      "custom_tooltip": "<b>Identify Lessons Learned and Best Practices</b><br>Document the lessons learned from the pilot program, including both successes and failures. Identify best practices for implementing the security measures in a national rollout. This documentation will be used to inform the national rollout plan and ensure that the security measures are implemented effectively.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Cybersecurity Architect</li><li>E-Bus Systems Engineer</li></ul>",
      "start_date": "2026-11-30",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "8a6978d2-c4bf-4c2f-8302-a4522e93d054 FS",

    },
    {
      "id": "65def55a-1d9a-46fb-a5c4-b3bf04bc5a00",
      "text": "Refine Security Measures and Procedures",
      "custom_tooltip": "<b>Refine Security Measures and Procedures</b><br>Based on the analysis of the pilot program results, refine the security measures and procedures. This may include making changes to the isolation measures, the rollback procedures, or the secure gateway architecture. Update the documentation to reflect the changes.<br><b>Resources needed:</b><br><ul><li>Cybersecurity Architect</li><li>E-Bus Systems Engineer</li><li>Cybersecurity Analyst</li></ul>",
      "start_date": "2026-12-02",
      "duration": 2.0,
      "progress": 0,
      "open": true,

    },
    {
      "id": "46e97230-4b3d-45d5-9782-deac83768806",
      "text": "Update National Rollout Plan",
      "custom_tooltip": "<b>Update National Rollout Plan</b><br>Update the national rollout plan based on the lessons learned from the pilot program and the refined security measures and procedures. This includes updating the timeline, the budget, and the resource allocation. Ensure that the national rollout plan is aligned with the overall project goals and objectives.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Cybersecurity Architect</li><li>E-Bus Systems Engineer</li></ul>",
      "start_date": "2026-12-04",
      "duration": 2.0,

      "id": "5952bbad-99b7-4817-8f1e-d99d6685eb3c",
      "text": "National Rollout",
      "custom_tooltip": "<b>National Rollout</b>",
      "progress": 0,
      "open": true,
      "meta": "daca942c-1e0b-43c2-8a84-40d061be27b6 FF, 8afa72b2-fdea-44b7-9ee1-9757dec1cc7e FS",

    {
      "id": "d318110b-fa89-4a48-8b41-9e3e7433cb3c",
      "text": "Finalize National Rollout Plan",
      "custom_tooltip": "<b>Finalize National Rollout Plan</b><br>Refine the national rollout plan based on the Copenhagen pilot program&#x27;s evaluation, incorporating lessons learned and addressing any identified issues. This includes adjusting timelines, resource allocation, and communication strategies.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>E-Bus Systems Engineer</li><li>Cybersecurity Architect</li><li>Training Coordinator</li></ul>",
      "start_date": "2026-12-06",
      "duration": 23.0,
      "progress": 0,
      "open": true,
      "meta": "5952bbad-99b7-4817-8f1e-d99d6685eb3c SS",

    },
    {
      "id": "71071393-3bdc-4afc-a8cd-fe41f140b2b1",
      "text": "Prepare Deployment Sites Nationally",
      "custom_tooltip": "<b>Prepare Deployment Sites Nationally</b><br>Coordinate with local transportation authorities and e-bus operators to prepare deployment sites across the nation. This involves ensuring necessary infrastructure is in place, scheduling deployment activities, and addressing any logistical challenges.<br><b>Resources needed:</b><br><ul><li>Deployment Team</li><li>Logistics Coordinator</li><li>Local Transportation Authorities</li><li>E-Bus Operators</li></ul>",
      "start_date": "2026-12-29",
      "duration": 23.0,
      "progress": 0,
      "open": true,
      "meta": "d318110b-fa89-4a48-8b41-9e3e7433cb3c FS",
      "parent": "5952bbad-99b7-4817-8f1e-d99d6685eb3c"
    },
    {
      "id": "242dcea9-8d3b-44c0-be4d-2bcf13b621b3",
      "text": "Execute Phased National Deployment",
      "custom_tooltip": "<b>Execute Phased National Deployment</b><br>Implement the security measures in a phased approach across the nation, starting with priority regions or e-bus fleets. This allows for continuous monitoring and adjustments based on real-world performance and feedback.<br><b>Resources needed:</b><br><ul><li>Deployment Team</li><li>Cybersecurity Experts</li><li>E-Bus Systems Engineers</li><li>Monitoring Team</li></ul>",
      "start_date": "2027-01-21",
      "duration": 23.0,
      "progress": 0,
      "open": true,
      "meta": "71071393-3bdc-4afc-a8cd-fe41f140b2b1 FS",
      "parent": "5952bbad-99b7-4817-8f1e-d99d6685eb3c"
    },
    {
      "id": "3027709d-144d-4684-be09-9080df203e9b",
      "text": "Provide Ongoing Support and Training",
      "custom_tooltip": "<b>Provide Ongoing Support and Training</b><br>Offer continuous support and training to e-bus operators and maintenance personnel throughout the national rollout. This ensures they are proficient in using the new security measures and can effectively respond to any security incidents.<br><b>Resources needed:</b><br><ul><li>Training Coordinator</li><li>Support Team</li><li>Cybersecurity Experts</li></ul>",
      "start_date": "2027-02-13",
      "duration": 23.0,
      "progress": 0,

    },

      "id": "d39ed46a-e57d-423b-b61e-d5f902f7e871",

      "custom_tooltip": "<b>Implement Security Monitoring Systems</b>",
