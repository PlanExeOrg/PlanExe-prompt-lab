    {
      "id": "b47dcdf7-8ad3-47ec-8120-e6e6470be61b",
      "text": "Identify security monitoring requirements",
      "custom_tooltip": "<b>Identify security monitoring requirements</b><br>Define the specific security monitoring needs for the e-bus systems, considering the &#x27;no-remote-kill&#x27; design and potential attack vectors. This includes identifying critical assets, data flows, and security events to monitor.<br><b>Resources needed:</b><br><ul><li>Cybersecurity Architect</li><li>E-Bus Systems Engineer</li><li>Risk &amp; Compliance Manager</li></ul>",
      "start_date": "2027-03-08",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "d39ed46a-e57d-423b-b61e-d5f902f7e871 SS",
      "parent": "d39ed46a-e57d-423b-b61e-d5f902f7e871"
    },
    {
      "id": "244f0b2d-10b0-4aa8-9681-0890d67064e5",
      "text": "Evaluate security monitoring tools",
      "custom_tooltip": "<b>Evaluate security monitoring tools</b><br>Assess available security monitoring tools (SIEM, IDS/IPS, log management) for suitability and compatibility with the e-bus systems. Consider factors such as performance, scalability, integration capabilities, and cost.<br><b>Resources needed:</b><br><ul><li>Cybersecurity Architect</li><li>Security Analyst</li><li>Procurement Specialist</li></ul>",
      "start_date": "2027-03-10",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "b47dcdf7-8ad3-47ec-8120-e6e6470be61b FS",
      "parent": "d39ed46a-e57d-423b-b61e-d5f902f7e871"
    },
    {
      "id": "1c33182f-b3a2-4a73-94c2-ac2a32e3bf0a",
      "text": "Design security monitoring architecture",
      "custom_tooltip": "<b>Design security monitoring architecture</b><br>Develop a detailed architecture for the security monitoring system, including sensor placement, data collection methods, data storage, and analysis workflows. Ensure the architecture supports real-time monitoring and incident detection.<br><b>Resources needed:</b><br><ul><li>Cybersecurity Architect</li><li>Network Engineer</li><li>Data Engineer</li></ul>",
      "start_date": "2027-03-12",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "244f0b2d-10b0-4aa8-9681-0890d67064e5 FS",
      "parent": "d39ed46a-e57d-423b-b61e-d5f902f7e871"
    },
    {
      "id": "6fef73b9-8fed-41ea-adcf-bfa61c74aa69",
      "text": "Configure and deploy monitoring tools",
      "custom_tooltip": "<b>Configure and deploy monitoring tools</b><br>Install, configure, and deploy the selected security monitoring tools according to the designed architecture. This includes setting up data sources, defining monitoring rules, and configuring alerts.<br><b>Resources needed:</b><br><ul><li>Security Engineer</li><li>System Administrator</li><li>Network Engineer</li></ul>",
      "start_date": "2027-03-14",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "1c33182f-b3a2-4a73-94c2-ac2a32e3bf0a FS",
      "parent": "d39ed46a-e57d-423b-b61e-d5f902f7e871"
    },
    {
      "id": "e9bfd12b-1ca1-4fb9-9564-2cdaa6dc2b89",
      "text": "Test and validate monitoring effectiveness",
      "custom_tooltip": "<b>Test and validate monitoring effectiveness</b><br>Conduct thorough testing to ensure the security monitoring system is functioning correctly and effectively detecting security events. This includes simulating attacks and verifying that alerts are generated as expected.<br><b>Resources needed:</b><br><ul><li>Security Analyst</li><li>Penetration Tester</li><li>Cybersecurity Architect</li></ul>",
      "start_date": "2027-03-16",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "d39ed46a-e57d-423b-b61e-d5f902f7e871 FF, 6fef73b9-8fed-41ea-adcf-bfa61c74aa69 FS",
      "parent": "d39ed46a-e57d-423b-b61e-d5f902f7e871"
    },
    {
      "id": "f4bb2aa8-a49d-4aa4-9b93-c67c939a7d86",
      "text": "Develop Incident Response Plan",
      "custom_tooltip": "<b>Develop Incident Response Plan</b>",
      "progress": 0,
      "open": true,
      "meta": "d39ed46a-e57d-423b-b61e-d5f902f7e871 FS",
      "parent": "d0f65b06-e9e6-4814-985c-28f034f4d7d6",
      "type": "project"
    },
    {
      "id": "18cf25af-7118-4e94-9620-d9265903c8a6",
      "text": "Define Incident Response Scenarios",
      "custom_tooltip": "<b>Define Incident Response Scenarios</b><br>Identify potential cyberattack scenarios relevant to e-bus systems, including ransomware, data breaches, and remote control hijacking.  Document the specific steps and potential impact of each scenario to inform the response plan.<br><b>Resources needed:</b><br><ul><li>Cybersecurity Architect</li><li>Incident Response Coordinator</li><li>E-Bus Systems Engineer</li><li>Threat Intelligence Analyst</li></ul>",
      "start_date": "2027-03-18",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "f4bb2aa8-a49d-4aa4-9b93-c67c939a7d86 SS",
      "parent": "f4bb2aa8-a49d-4aa4-9b93-c67c939a7d86"
    },
    {
      "id": "a609e6e0-409d-42e9-b8d2-6ef02805b5cf",
      "text": "Establish Communication Protocols",
      "custom_tooltip": "<b>Establish Communication Protocols</b><br>Define clear communication channels and escalation procedures for incident response.  Identify key stakeholders and their roles in the communication process.  Establish secure communication methods for internal and external communication during an incident.<br><b>Resources needed:</b><br><ul><li>Incident Response Coordinator</li><li>Project Manager</li><li>Legal Advisors</li><li>Public Relations Specialist</li></ul>",
      "start_date": "2027-03-22",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "18cf25af-7118-4e94-9620-d9265903c8a6 FS",
      "parent": "f4bb2aa8-a49d-4aa4-9b93-c67c939a7d86"
    },
    {
      "id": "fbad673b-c8ef-4dc9-8b0b-00beb9ae8421",
      "text": "Develop Containment and Eradication Strategies",
      "custom_tooltip": "<b>Develop Containment and Eradication Strategies</b><br>Outline specific steps for containing and eradicating cyber threats, including isolating affected systems, removing malware, and restoring data from backups.  Develop procedures for preserving evidence for forensic analysis.<br><b>Resources needed:</b><br><ul><li>Cybersecurity Architect</li><li>Incident Response Coordinator</li><li>Digital Forensics Specialist</li><li>E-Bus Systems Engineer</li></ul>",
      "start_date": "2027-03-26",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "a609e6e0-409d-42e9-b8d2-6ef02805b5cf FS",
      "parent": "f4bb2aa8-a49d-4aa4-9b93-c67c939a7d86"
    },
    {
      "id": "41797e9e-ffbd-48cb-b1a8-022871d5f8e0",
      "text": "Create Post-Incident Activity Procedures",
      "custom_tooltip": "<b>Create Post-Incident Activity Procedures</b><br>Define steps for post-incident analysis, including identifying the root cause of the incident, assessing the effectiveness of the response, and implementing corrective actions to prevent future incidents.  Establish procedures for documenting lessons learned and updating the incident response plan.<br><b>Resources needed:</b><br><ul><li>Incident Response Coordinator</li><li>Cybersecurity Architect</li><li>Risk &amp; Compliance Manager</li><li>Auditor</li></ul>",
      "start_date": "2027-03-30",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "f4bb2aa8-a49d-4aa4-9b93-c67c939a7d86 FF, fbad673b-c8ef-4dc9-8b0b-00beb9ae8421 FS",
      "parent": "f4bb2aa8-a49d-4aa4-9b93-c67c939a7d86"
    },
    {
      "id": "8db753ce-21c3-4255-b7f3-d1a91e2ff3e6",
      "text": "Establish Forensics Capabilities",
      "custom_tooltip": "<b>Establish Forensics Capabilities</b>",
      "progress": 0,
      "open": true,
      "meta": "f4bb2aa8-a49d-4aa4-9b93-c67c939a7d86 FS",
      "parent": "d0f65b06-e9e6-4814-985c-28f034f4d7d6",
      "type": "project"
    },
    {
      "id": "f697080f-4b8a-4e12-99d8-e052f23daa42",
      "text": "Select forensics tools and software",
      "custom_tooltip": "<b>Select forensics tools and software</b><br>Objective: Choose appropriate digital forensics tools. Scope: Evaluate and select software and hardware for data acquisition, analysis, and reporting. Steps: Research available tools, conduct trials, compare features, and make a selection. Deliverables: List of selected tools with justification.<br><b>Resources needed:</b><br><ul><li>Cybersecurity Analyst</li><li>Budget Approval Authority</li></ul>",
      "start_date": "2027-04-03",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "8db753ce-21c3-4255-b7f3-d1a91e2ff3e6 SS",
      "parent": "8db753ce-21c3-4255-b7f3-d1a91e2ff3e6"
    },
    {
      "id": "6729572d-7561-463a-a075-89b871c2d8f8",
      "text": "Establish secure data storage for forensics",
      "custom_tooltip": "<b>Establish secure data storage for forensics</b><br>Objective: Create a secure repository for forensic data. Scope: Design and implement a storage solution with appropriate access controls and encryption. Steps: Define storage requirements, select storage technology, configure access controls, and test security. Deliverables: Secure storage system with documented configuration.<br><b>Resources needed:</b><br><ul><li>System Administrator</li><li>Security Engineer</li></ul>",
      "start_date": "2027-04-05",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "f697080f-4b8a-4e12-99d8-e052f23daa42 FS",
      "parent": "8db753ce-21c3-4255-b7f3-d1a91e2ff3e6"
    },
    {
      "id": "47f3213e-b4fc-485f-a793-2eed6d2b74c0",
      "text": "Train personnel in digital forensics",
      "custom_tooltip": "<b>Train personnel in digital forensics</b><br>Objective: Equip personnel with forensics skills. Scope: Provide training on data acquisition, analysis, and reporting techniques. Steps: Develop training materials, conduct training sessions, and assess skills. Deliverables: Trained personnel with certification or documented skills.<br><b>Resources needed:</b><br><ul><li>Forensics Expert</li><li>Training Coordinator</li></ul>",
      "start_date": "2027-04-07",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "6729572d-7561-463a-a075-89b871c2d8f8 FS",
      "parent": "8db753ce-21c3-4255-b7f3-d1a91e2ff3e6"
    },
    {
      "id": "748097b3-977e-4841-9145-6d98f11fb08d",
      "text": "Document forensics procedures and policies",
      "custom_tooltip": "<b>Document forensics procedures and policies</b><br>Objective: Formalize forensics processes. Scope: Create written procedures for incident response, data acquisition, analysis, and reporting. Steps: Research best practices, draft procedures, review with stakeholders, and publish policies. Deliverables: Documented forensics procedures and policies.<br><b>Resources needed:</b><br><ul><li>Policy Writer</li><li>Legal Counsel</li><li>Cybersecurity Analyst</li></ul>",
      "start_date": "2027-04-09",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "8db753ce-21c3-4255-b7f3-d1a91e2ff3e6 FF, 47f3213e-b4fc-485f-a793-2eed6d2b74c0 FS",
      "parent": "8db753ce-21c3-4255-b7f3-d1a91e2ff3e6"
    },
    {
      "id": "cad6b541-f128-4ad2-877b-094c01310528",
      "text": "Conduct Regular Security Drills",
      "custom_tooltip": "<b>Conduct Regular Security Drills</b>",
      "progress": 0,
      "open": true,
      "meta": "8db753ce-21c3-4255-b7f3-d1a91e2ff3e6 FS",
      "parent": "d0f65b06-e9e6-4814-985c-28f034f4d7d6",
      "type": "project"
    },
    {
      "id": "ba1b0123-5959-45de-af1f-b734329bc764",
      "text": "Define Drill Scenarios and Objectives",
      "custom_tooltip": "<b>Define Drill Scenarios and Objectives</b><br>Clearly define the scope, objectives, and success criteria for each security drill. Develop realistic scenarios that simulate potential cyberattacks on e-bus systems.<br><b>Resources needed:</b><br><ul><li>Cybersecurity Architect</li><li>Incident Response Coordinator</li><li>E-Bus Systems Engineer</li></ul>",
      "start_date": "2027-04-11",
      "duration": 1.0,
      "progress": 0,
      "open": true,
      "meta": "cad6b541-f128-4ad2-877b-094c01310528 SS",
      "parent": "cad6b541-f128-4ad2-877b-094c01310528"
    },
    {
      "id": "6f64d0d1-e395-4e27-a4fe-1a54fef51772",
      "text": "Prepare Drill Materials and Logistics",
      "custom_tooltip": "<b>Prepare Drill Materials and Logistics</b><br>Create necessary documentation, tools, and resources for conducting the security drills. Coordinate logistics, including scheduling, location, and participant availability.<br><b>Resources needed:</b><br><ul><li>Incident Response Coordinator</li><li>Training Specialist</li><li>E-Bus Systems Engineer</li></ul>",
      "start_date": "2027-04-12",
      "duration": 1.0,
      "progress": 0,
      "open": true,
      "meta": "ba1b0123-5959-45de-af1f-b734329bc764 FS",
      "parent": "cad6b541-f128-4ad2-877b-094c01310528"
    },
    {
      "id": "23f47d47-fa2e-4351-826a-f0a4326c6d99",
      "text": "Conduct Security Drill and Gather Data",
      "custom_tooltip": "<b>Conduct Security Drill and Gather Data</b><br>Execute the security drill according to the defined scenario and objectives. Collect data on participant performance, system behavior, and incident response effectiveness.<br><b>Resources needed:</b><br><ul><li>Incident Response Team</li><li>E-Bus Operators</li><li>Cybersecurity Architect</li></ul>",
      "start_date": "2027-04-13",
      "duration": 1.0,
      "progress": 0,
      "open": true,
      "meta": "6f64d0d1-e395-4e27-a4fe-1a54fef51772 FS",

      "id": "982532fc-7121-43fc-a3c4-a5cbb9c48dde",
      "text": "Identify Relevant Threat Intelligence Sources",
      "custom_tooltip": "<b>Identify Relevant Threat Intelligence Sources</b><br>Objective: Identify and evaluate potential sources of threat intelligence relevant to the e-bus systems and the transportation industry.\nScope: Research and document available threat intelligence feeds, platforms, and providers.\nSteps: 1. Research industry-specific threat intelligence providers. 2. Evaluate the quality and relevance of available threat feeds. 3. Document the selection criteria and rationale for chosen sources.\nDeliverables: A list of recommended threat intelligence sources with evaluation reports.<br><b>Resources needed:</b><br><ul><li>Cybersecurity Analyst</li><li>Threat Intelligence Specialist</li></ul>",

    {
      "id": "864b448d-33cb-4df4-bfa7-f9fb547cd359",
      "text": "Automate Threat Data Collection and Processing",
      "custom_tooltip": "<b>Automate Threat Data Collection and Processing</b><br>Objective: Implement automated tools and processes for collecting, processing, and normalizing threat intelligence data.\nScope: Configure and integrate threat intelligence feeds with existing security systems.\nSteps: 1. Select and configure appropriate threat intelligence platforms (TIPs) or SIEM systems. 2. Develop automated scripts for data ingestion and normalization. 3. Test and validate the automated data processing pipeline.\nDeliverables: A functional automated threat intelligence data processing pipeline.<br><b>Resources needed:</b><br><ul><li>Security Engineer</li><li>Software Developer</li><li>SIEM Administrator</li></ul>",
      "start_date": "2027-04-18",

    {
      "id": "9f7edd68-712c-42d8-a73d-ca21929ad475",
      "text": "Analyze and Disseminate Threat Intelligence",
      "custom_tooltip": "<b>Analyze and Disseminate Threat Intelligence</b><br>Objective: Analyze collected threat intelligence data to identify relevant threats and vulnerabilities, and disseminate findings to relevant stakeholders.\nScope: Develop and implement processes for analyzing threat data and creating actionable intelligence reports.\nSteps: 1. Analyze threat data to identify relevant indicators of compromise (IOCs). 2. Create threat intelligence reports tailored to different stakeholder groups. 3. Disseminate reports through appropriate channels (e.g., email, dashboards).\nDeliverables: Regular threat intelligence reports and actionable security recommendations.<br><b>Resources needed:</b><br><ul><li>Cybersecurity Analyst</li><li>Threat Intelligence Specialist</li><li>Security Operations Center (SOC) Team</li></ul>",
      "start_date": "2027-04-20",

    {
      "id": "b1dc33ce-dfea-4bf2-a024-f84779d76c75",
      "text": "Integrate Threat Intelligence with Security Tools",
      "custom_tooltip": "<b>Integrate Threat Intelligence with Security Tools</b><br>Objective: Integrate threat intelligence data with existing security tools and systems to enhance threat detection and response capabilities.\nScope: Configure security tools to consume and utilize threat intelligence data.\nSteps: 1. Identify security tools that can benefit from threat intelligence integration (e.g., firewalls, intrusion detection systems). 2. Configure tools to consume threat intelligence feeds. 3. Test and validate the integration to ensure proper functionality.\nDeliverables: Integrated security tools that leverage threat intelligence data for enhanced threat detection and response.<br><b>Resources needed:</b><br><ul><li>Security Engineer</li><li>Network Engineer</li><li>System Administrator</li></ul>",

      "id": "2c9511c4-d12a-4c19-b0d3-db1520e2a2ac",
      "text": "Identify Personal Data Processing Activities",
      "custom_tooltip": "<b>Identify Personal Data Processing Activities</b><br>Objective: Identify all activities involving the processing of personal data within the e-bus systems.\nScope: Includes data collection, storage, usage, and sharing.\nSteps: Review system documentation, conduct interviews with stakeholders, and map data flows.\nDeliverables: A comprehensive list of personal data processing activities.<br><b>Resources needed:</b><br><ul><li>Data Privacy Consultant</li><li>E-Bus Systems Engineer</li><li>Legal Advisor</li></ul>",

    {
      "id": "d1113465-3c60-4ca1-8981-f1612d2844cf",
      "text": "Conduct Data Protection Impact Assessment (DPIA)",
      "custom_tooltip": "<b>Conduct Data Protection Impact Assessment (DPIA)</b><br>Objective: Assess the risks associated with personal data processing activities.\nScope: Evaluate the potential impact on data subjects&#x27; rights and freedoms.\nSteps: Analyze data processing activities, identify potential risks, and propose mitigation measures.\nDeliverables: A completed DPIA report.<br><b>Resources needed:</b><br><ul><li>Data Privacy Consultant</li><li>Legal Advisor</li><li>Risk &amp; Compliance Manager</li></ul>",

    {
      "id": "5f118d5c-d9bd-41ce-9128-5775144e1f07",
      "text": "Implement GDPR-Compliant Data Security Measures",
      "custom_tooltip": "<b>Implement GDPR-Compliant Data Security Measures</b><br>Objective: Implement technical and organizational measures to protect personal data.\nScope: Includes encryption, access controls, anonymization, and pseudonymization.\nSteps: Review existing security measures, identify gaps, and implement new measures.\nDeliverables: A documented set of GDPR-compliant data security measures.<br><b>Resources needed:</b><br><ul><li>Cybersecurity Architect</li><li>E-Bus Systems Engineer</li><li>Data Privacy Consultant</li></ul>",

    {
      "id": "ad732bd3-d7d9-47ae-a69b-fec3b8b4e596",
      "text": "Establish GDPR-Compliant Data Privacy Policy",
      "custom_tooltip": "<b>Establish GDPR-Compliant Data Privacy Policy</b><br>Objective: Develop a clear and transparent data privacy policy.\nScope: Includes information on data collection, usage, sharing, and data subjects&#x27; rights.\nSteps: Review existing policies, draft a new policy, and obtain legal review.\nDeliverables: A GDPR-compliant data privacy policy.<br><b>Resources needed:</b><br><ul><li>Legal Advisor</li><li>Data Privacy Consultant</li><li>Communication Specialist</li></ul>",

    {
      "id": "21da5768-c547-4f5d-9a5f-7a86a5ce950c",
      "text": "Train Personnel on GDPR Requirements",
      "custom_tooltip": "<b>Train Personnel on GDPR Requirements</b><br>Objective: Ensure that all personnel are aware of their GDPR obligations.\nScope: Includes training on data privacy principles, data security measures, and data subject rights.\nSteps: Develop training materials, conduct training sessions, and track training completion.\nDeliverables: Training records for all personnel.<br><b>Resources needed:</b><br><ul><li>Data Privacy Consultant</li><li>Training Specialist</li><li>HR Representative</li></ul>",

      "custom_tooltip": "<b>Engage GDPR Specialist</b><br>Hire a GDPR specialist with experience in transportation data to guide compliance efforts and ensure all data processing activities align with GDPR requirements.<br><b>Resources needed:</b><br><ul><li>GDPR Specialist</li><li>Legal Advisor</li></ul>",

      "custom_tooltip": "<b>Review Existing Data Practices</b><br>Analyze current data handling practices of e-bus operators to identify areas of non-compliance with GDPR and recommend necessary changes.<br><b>Resources needed:</b><br><ul><li>Data Analyst</li><li>Legal Advisor</li></ul>",

    {
      "id": "6eb0f41e-159d-41c0-8e4d-ba426e01bfe8",
      "text": "Research Danish Cybersecurity Regulations",
      "custom_tooltip": "<b>Research Danish Cybersecurity Regulations</b><br>Objective: Identify and document all relevant Danish cybersecurity regulations applicable to e-bus systems.\nScope: Includes laws, standards, and guidelines issued by Danish regulatory bodies.\nSteps: Review official government websites, consult legal experts, and document findings.\nDeliverables: A comprehensive list of applicable regulations.<br><b>Resources needed:</b><br><ul><li>Legal Counsel</li><li>Compliance Officer</li><li>Cybersecurity Expert</li></ul>",
      "start_date": "2027-05-19",

    {
      "id": "ecc1a920-db6c-4608-a855-e92ce59ec69c",
      "text": "Gap Analysis: Regulations vs. Current Practices",
      "custom_tooltip": "<b>Gap Analysis: Regulations vs. Current Practices</b><br>Objective: Compare current cybersecurity practices with the identified Danish regulations to identify gaps.\nScope: Includes a detailed assessment of existing security measures and their compliance with regulations.\nSteps: Conduct internal audits, review existing documentation, and identify areas of non-compliance.\nDeliverables: A gap analysis report outlining areas needing improvement.<br><b>Resources needed:</b><br><ul><li>Cybersecurity Expert</li><li>Compliance Officer</li><li>Auditor</li></ul>",
      "start_date": "2027-05-21",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "6eb0f41e-159d-41c0-8e4d-ba426e01bfe8 FS",

    },
    {
      "id": "9c591375-1183-41cf-ba18-8e0b6dfb197d",
      "text": "Develop Compliance Action Plan",
      "custom_tooltip": "<b>Develop Compliance Action Plan</b><br>Objective: Create a detailed action plan to address the identified gaps and ensure compliance with Danish cybersecurity regulations.\nScope: Includes specific tasks, timelines, and responsible parties for each action item.\nSteps: Prioritize gaps based on risk, define remediation steps, and assign responsibilities.\nDeliverables: A comprehensive compliance action plan.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Cybersecurity Expert</li><li>Compliance Officer</li></ul>",
      "start_date": "2027-05-23",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "ecc1a920-db6c-4608-a855-e92ce59ec69c FS",
      "parent": "5040bb0e-1277-4ced-99e4-864ed398262d"
    },
    {
      "id": "1bd0aa93-2e96-4934-85c9-c1b5cd649bb9",
      "text": "Implement Remediation Measures",
      "custom_tooltip": "<b>Implement Remediation Measures</b><br>Objective: Execute the compliance action plan by implementing the necessary remediation measures.\nScope: Includes technical and procedural changes to address the identified gaps.\nSteps: Deploy security controls, update policies, and train personnel.\nDeliverables: Implemented security measures and updated documentation.<br><b>Resources needed:</b><br><ul><li>Engineers</li><li>Technicians</li><li>Security Personnel</li></ul>",

      "duration": 2.0,
      "progress": 0,

      "custom_tooltip": "<b>Gather data for compliance reports</b><br>Collect all necessary data from various sources, including security logs, system configurations, and vendor documentation, to support the preparation of compliance reports.<br><b>Resources needed:</b><br><ul><li>Compliance Officer</li><li>Security Analyst</li><li>System Administrators</li></ul>",

      "text": "Draft compliance reports",
      "custom_tooltip": "<b>Draft compliance reports</b><br>Prepare draft compliance reports based on the collected data, ensuring that all required information is accurately presented and formatted according to regulatory guidelines.<br><b>Resources needed:</b><br><ul><li>Compliance Officer</li><li>Legal Counsel</li></ul>",

      "text": "Review draft reports internally",
      "custom_tooltip": "<b>Review draft reports internally</b><br>Conduct internal reviews of the draft compliance reports with relevant stakeholders, such as legal counsel and senior management, to ensure accuracy, completeness, and alignment with regulatory requirements.<br><b>Resources needed:</b><br><ul><li>Compliance Officer</li><li>Legal Counsel</li><li>Senior Management</li></ul>",

    {
      "id": "8276702f-8637-46ee-9e0a-1d67877dda4d",
      "text": "Revise reports based on feedback",
      "custom_tooltip": "<b>Revise reports based on feedback</b><br>Incorporate feedback from internal reviews into the compliance reports, making necessary revisions and updates to address any identified issues or concerns.<br><b>Resources needed:</b><br><ul><li>Compliance Officer</li><li>Security Analyst</li></ul>",

      "text": "Submit compliance reports",
      "custom_tooltip": "<b>Submit compliance reports</b><br>Submit the finalized compliance reports to the appropriate regulatory bodies, ensuring that all submission requirements are met and deadlines are adhered to.<br><b>Resources needed:</b><br><ul><li>Compliance Officer</li><li>Administrative Assistant</li></ul>",

    function zoomFit() {
        const tasks = gantt.getTaskByTime();
        if (tasks.length > 0) {
            const firstTask = tasks[0];
            const lastTask = tasks[tasks.length - 1];
            gantt.showDate(firstTask.start_date);
            
            // Calculate total duration in days
            const startDate = new Date(firstTask.start_date);
            const endDate = new Date(lastTask.end_date);
            const durationDays = (endDate - startDate) / (1000 * 60 * 60 * 24);
            
            // Choose appropriate scale based on duration
            if (durationDays > 3650) { // More than 10 years
                gantt.config.scale_unit = "year";
                gantt.config.step = 10;
                gantt.config.subscales = [
                    {unit: "year", step: 1, date: "%Y"}
                ];
            } else if (durationDays > 365) { // More than 1 year
                gantt.config.scale_unit = "year";
                gantt.config.step = 1;
                gantt.config.subscales = [
                    {unit: "month", step: 1, date: "%M"}
                ];
            } else if (durationDays > 30) { // More than 1 month
                gantt.config.scale_unit = "month";
                gantt.config.step = 1;
                gantt.config.subscales = [
                    {unit: "day", step: 1, date: "%d"}
                ];
            } else if (durationDays > 7) { // More than 1 week
                gantt.config.scale_unit = "week";
                gantt.config.step = 1;
                gantt.config.subscales = [
                    {unit: "day", step: 1, date: "%d"}
                ];
            } else {
                gantt.config.scale_unit = "day";
                gantt.config.step = 1;
                gantt.config.subscales = [];
            }
            gantt.render();
        }
    }

    function zoomIn() {
        const currentUnit = gantt.config.scale_unit;
        const currentStep = gantt.config.step;
        
        if (currentUnit === "year" && currentStep === 10) {
            gantt.config.scale_unit = "year";
            gantt.config.step = 1;
            gantt.config.subscales = [
                {unit: "month", step: 1, date: "%M"}
            ];
        } else if (currentUnit === "year") {
            gantt.config.scale_unit = "month";
            gantt.config.step = 1;
            gantt.config.subscales = [
                {unit: "day", step: 1, date: "%d"}
            ];
        } else if (currentUnit === "month") {
            gantt.config.scale_unit = "week";
            gantt.config.step = 1;
            gantt.config.subscales = [
                {unit: "day", step: 1, date: "%d"}
            ];
        } else if (currentUnit === "week") {
            gantt.config.scale_unit = "day";
            gantt.config.step = 1;
            gantt.config.subscales = [];
        }
        gantt.render();
    }

    function zoomOut() {
        const currentUnit = gantt.config.scale_unit;
        const currentStep = gantt.config.step;
        
        if (currentUnit === "day") {
            gantt.config.scale_unit = "week";
            gantt.config.step = 1;
            gantt.config.subscales = [
                {unit: "day", step: 1, date: "%d"}
            ];
        } else if (currentUnit === "week") {
            gantt.config.scale_unit = "month";
            gantt.config.step = 1;
            gantt.config.subscales = [
                {unit: "day", step: 1, date: "%d"}
            ];
        } else if (currentUnit === "month") {
            gantt.config.scale_unit = "year";
            gantt.config.step = 1;
            gantt.config.subscales = [
                {unit: "month", step: 1, date: "%M"}
            ];
        } else if (currentUnit === "year") {
            gantt.config.scale_unit = "year";
            gantt.config.step = 10;
            gantt.config.subscales = [
                {unit: "year", step: 1, date: "%Y"}
            ];
        }
        gantt.render();
    }

    function downloadCSV() {
        if (GANTT_DATA_CSV === null) {
            return;
        }
        const blob = new Blob([GANTT_DATA_CSV], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        const url = URL.createObjectURL(blob);
        link.setAttribute('href', url);
        link.setAttribute('download', GANTT_FILENAME_CSV);
        link.style.visibility = 'hidden';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    // Gantt Initialization
    gantt.config.readonly = true;
    gantt.config.date_format = "%Y-%m-%d";
    gantt.config.scale_unit = "month";
    gantt.config.step = 1;
    gantt.config.subscales = [
        {unit: "day", step: 1, date: "%d"}
    ];

    gantt.config.columns = [
        {name:"text", label:"Task name", width:"*", tree:true},
        // {name:"start_date", label:"Start time", align: "center"},
        // {name:"duration", label:"Duration", align: "center"}
    ];

    gantt.templates.task_class = function(start, end, task) {
        if (task.type === "project") {
            return "project-task";
        }
        return "";
    };

    gantt.templates.tooltip_text = function(start, end, task) {
        return task.custom_tooltip || "No tooltip";
    };
    
	gantt.plugins({
		tooltip: true
	});
	gantt.attachEvent("onGanttReady", function(){
		var tooltips = gantt.ext.tooltips;
		tooltips.tooltip.setViewport(gantt.$task_data);
	});
    gantt.init("gantt_container");
    gantt.parse(GANTT_DATA_DHTMLX);

    // Hide the export to CSV button if there is no CSV data
    if (GANTT_DATA_CSV === null) {
        document.getElementById('exportToCSVButton').style.display = 'none';
    }

    document.getElementById('zoomFitButton').addEventListener('click', zoomFit);
    document.getElementById('zoomInButton').addEventListener('click', zoomIn);
    document.getElementById('zoomOutButton').addEventListener('click', zoomOut);
    document.getElementById('exportToCSVButton').addEventListener('click', downloadCSV);
</script>
