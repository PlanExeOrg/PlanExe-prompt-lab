      "type": "project"
    },
    {
      "id": "52559213-b755-41ea-8bd6-352afff0e09d",
      "text": "Identify potential adaptation triggers",
      "custom_tooltip": "<b>Identify potential adaptation triggers</b><br>Define specific events or conditions that would necessitate changes to the command structure. This includes changes in eruption intensity, environmental conditions, or resource availability. Objective: Establish clear criteria for adapting the command structure. Scope: Define triggers based on scientific data, operational constraints, and stakeholder input. Steps: Review existing data, consult with experts, and develop a trigger matrix. Deliverables: Trigger matrix document.<br><b>Resources needed:</b><br><ul><li>Volcanologists</li><li>Emergency managers</li><li>Data analysts</li></ul>",
      "start_date": "2026-10-02",
      "duration": 1.0,
      "progress": 0,
      "open": true,
      "meta": "cdb32941-90af-489c-a1bd-211c63bf52a1 SS",
      "parent": "cdb32941-90af-489c-a1bd-211c63bf52a1"
    },
    {
      "id": "3101f9d6-3cac-4fac-ad2a-52eb10871f48",
      "text": "Develop adaptable command structure models",
      "custom_tooltip": "<b>Develop adaptable command structure models</b><br>Create multiple command structure models that can be implemented based on the identified triggers. These models should outline roles, responsibilities, and communication channels for each scenario. Objective: Design flexible command structures. Scope: Develop models for various eruption scenarios and resource levels. Steps: Brainstorm potential structures, map roles and responsibilities, and document communication flows. Deliverables: Command structure model diagrams and documentation.<br><b>Resources needed:</b><br><ul><li>Organizational design experts</li><li>Emergency management specialists</li><li>Communication specialists</li></ul>",
      "start_date": "2026-10-03",
      "duration": 1.0,
      "progress": 0,
      "open": true,
      "meta": "52559213-b755-41ea-8bd6-352afff0e09d FS",
      "parent": "cdb32941-90af-489c-a1bd-211c63bf52a1"
    },
    {
      "id": "de03c9ef-1c05-4f3d-9824-984b219edab3",
      "text": "Establish communication protocols for adaptation",
      "custom_tooltip": "<b>Establish communication protocols for adaptation</b><br>Define clear communication protocols for notifying personnel and implementing changes to the command structure. This includes identifying key communication channels and establishing procedures for disseminating information. Objective: Ensure timely and effective communication during adaptation. Scope: Define protocols for various communication channels and stakeholder groups. Steps: Develop communication templates, identify key contacts, and test communication systems. Deliverables: Communication protocol document and contact list.<br><b>Resources needed:</b><br><ul><li>Communication specialists</li><li>IT support</li><li>Emergency managers</li></ul>",
      "start_date": "2026-10-04",
      "duration": 1.0,
      "progress": 0,
      "open": true,
      "meta": "3101f9d6-3cac-4fac-ad2a-52eb10871f48 FS",
      "parent": "cdb32941-90af-489c-a1bd-211c63bf52a1"
    },
    {
      "id": "2897c237-73e2-4040-97e1-f8d83cb05fb3",
      "text": "Conduct training on adaptable command structure",
      "custom_tooltip": "<b>Conduct training on adaptable command structure</b><br>Provide training to personnel on the different command structure models and communication protocols. This training should include simulations and exercises to prepare personnel for adapting to changing conditions. Objective: Prepare personnel for adaptable command. Scope: Train all relevant personnel on command structure models and communication protocols. Steps: Develop training materials, conduct training sessions, and evaluate training effectiveness. Deliverables: Training materials and training records.<br><b>Resources needed:</b><br><ul><li>Trainers</li><li>Simulation equipment</li><li>Emergency managers</li></ul>",
      "start_date": "2026-10-05",
      "duration": 1.0,
      "progress": 0,
      "open": true,
      "meta": "cdb32941-90af-489c-a1bd-211c63bf52a1 FF, de03c9ef-1c05-4f3d-9824-984b219edab3 FS",
      "parent": "cdb32941-90af-489c-a1bd-211c63bf52a1"
    },
    {
      "id": "859f5ec2-01ce-4001-af46-c8721193063a",
      "text": "Ashfall Mitigation",
      "custom_tooltip": "<b>Ashfall Mitigation</b>",
      "progress": 0,
      "open": true,
      "meta": "e9f43038-8c65-4121-906a-ed59b4c85cea FS",
      "parent": "f74a79bc-497f-4d79-9c7f-f968f50b2149",
      "type": "project"
    },
    {
      "id": "fbb0a579-0f12-455f-a70a-6e5fc18209b9",
      "text": "Develop Ashfall Mitigation Strategy",
      "custom_tooltip": "<b>Develop Ashfall Mitigation Strategy</b>",
      "progress": 0,
      "open": true,
      "meta": "859f5ec2-01ce-4001-af46-c8721193063a SS",
      "parent": "859f5ec2-01ce-4001-af46-c8721193063a",
      "type": "project"
    },
    {
      "id": "ee2226a6-aacf-4930-8bfe-12b20e16fc40",
      "text": "Research ash removal equipment options",
      "custom_tooltip": "<b>Research ash removal equipment options</b><br>Objective: Identify suitable ash removal equipment based on ashfall characteristics and infrastructure needs.\nScope: Research various types of equipment, including snowplows, street sweepers, vacuum trucks, and heavy machinery.\nSteps: 1. Gather data on ashfall properties (density, particle size). 2. Assess infrastructure vulnerabilities. 3. Research available equipment options. 4. Evaluate equipment performance and cost-effectiveness.\nDeliverables: A report summarizing suitable ash removal equipment options.<br><b>Resources needed:</b><br><ul><li>Civil engineers</li><li>Equipment specialists</li><li>Research analysts</li></ul>",
      "start_date": "2026-10-06",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "fbb0a579-0f12-455f-a70a-6e5fc18209b9 SS",
      "parent": "fbb0a579-0f12-455f-a70a-6e5fc18209b9"
    },
    {
      "id": "e71d060a-780c-45e0-9e43-3f22b44fc832",
      "text": "Assess equipment specifications and capacity",
      "custom_tooltip": "<b>Assess equipment specifications and capacity</b><br>Objective: Determine the required specifications and capacity of ash removal equipment.\nScope: Analyze the volume of ashfall expected and the area to be cleared.\nSteps: 1. Estimate ashfall volume based on eruption scenarios. 2. Calculate the area to be cleared. 3. Determine the required equipment capacity. 4. Evaluate equipment maneuverability and accessibility.\nDeliverables: A report outlining the required equipment specifications and capacity.<br><b>Resources needed:</b><br><ul><li>Civil engineers</li><li>Meteorologists</li><li>GIS specialists</li></ul>",
      "start_date": "2026-10-08",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "ee2226a6-aacf-4930-8bfe-12b20e16fc40 FS",
      "parent": "fbb0a579-0f12-455f-a70a-6e5fc18209b9"
    },
    {
      "id": "867afe69-25d0-4403-b89d-ed8b39bfdb9e",
      "text": "Evaluate vendor options and pricing",
      "custom_tooltip": "<b>Evaluate vendor options and pricing</b><br>Objective: Identify potential vendors and evaluate their pricing and availability.\nScope: Research equipment vendors and obtain quotes for ash removal equipment.\nSteps: 1. Identify potential equipment vendors. 2. Obtain quotes for various equipment options. 3. Evaluate vendor reputation and reliability. 4. Negotiate pricing and delivery terms.\nDeliverables: A report comparing vendor options and pricing.<br><b>Resources needed:</b><br><ul><li>Procurement specialists</li><li>Contract managers</li><li>Financial analysts</li></ul>",
      "start_date": "2026-10-10",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "e71d060a-780c-45e0-9e43-3f22b44fc832 FS",
      "parent": "fbb0a579-0f12-455f-a70a-6e5fc18209b9"
    },
    {
      "id": "47bd8fef-4602-462a-8305-852f244cd9d0",
      "text": "Secure equipment contracts and agreements",
      "custom_tooltip": "<b>Secure equipment contracts and agreements</b><br>Objective: Finalize contracts and agreements with selected equipment vendors.\nScope: Prepare and execute contracts for the procurement or lease of ash removal equipment.\nSteps: 1. Draft equipment contracts. 2. Review contracts with legal counsel. 3. Obtain necessary approvals. 4. Execute contracts with selected vendors.\nDeliverables: Signed contracts and agreements with equipment vendors.<br><b>Resources needed:</b><br><ul><li>Legal counsel</li><li>Contract managers</li><li>Procurement specialists</li></ul>",
      "start_date": "2026-10-12",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "867afe69-25d0-4403-b89d-ed8b39bfdb9e FS",
      "parent": "fbb0a579-0f12-455f-a70a-6e5fc18209b9"
    },
    {
      "id": "0fcbb183-fb38-492d-a0d6-42814000a531",
      "text": "Coordinate equipment delivery and staging",
      "custom_tooltip": "<b>Coordinate equipment delivery and staging</b><br>Objective: Coordinate the delivery and staging of ash removal equipment.\nScope: Arrange for the transportation and storage of equipment at designated staging areas.\nSteps: 1. Coordinate equipment delivery schedules. 2. Arrange for transportation to staging areas. 3. Secure staging areas. 4. Inspect equipment upon arrival.\nDeliverables: Ash removal equipment delivered and staged at designated locations.<br><b>Resources needed:</b><br><ul><li>Logistics coordinators</li><li>Transportation specialists</li><li>Warehouse personnel</li></ul>",
      "start_date": "2026-10-14",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "fbb0a579-0f12-455f-a70a-6e5fc18209b9 FF, 47bd8fef-4602-462a-8305-852f244cd9d0 FS",
      "parent": "fbb0a579-0f12-455f-a70a-6e5fc18209b9"
    },
    {
      "id": "c4201650-9932-477f-8c20-b00a83a92cf2",

      "custom_tooltip": "<b>Procure Ash Removal Equipment</b>",

    {
      "id": "ec2ac19c-28a0-4ab8-9012-2e96e415eda2",
      "text": "Identify Ash Removal Equipment Needs",
      "custom_tooltip": "<b>Identify Ash Removal Equipment Needs</b><br>Determine the specific types and quantities of ash removal equipment required based on the expected ashfall depth, area to be cleared, and types of surfaces to be cleaned (roads, roofs, etc.). This includes considering specialized equipment for sensitive areas like airports or hospitals.<br><b>Resources needed:</b><br><ul><li>Civil Engineers</li><li>Environmental Scientists</li><li>Logistics Specialists</li><li>GIS Data</li><li>Ashfall Prediction Models</li></ul>",
      "start_date": "2026-10-16",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "c4201650-9932-477f-8c20-b00a83a92cf2 SS",
      "parent": "c4201650-9932-477f-8c20-b00a83a92cf2"
    },
    {
      "id": "7c663b81-66ae-4cfc-808b-a0e92f53c520",
      "text": "Research and Evaluate Equipment Options",
      "custom_tooltip": "<b>Research and Evaluate Equipment Options</b><br>Conduct thorough research on available ash removal equipment, including snowplows, street sweepers, vacuum trucks, loaders, and specialized equipment for sensitive areas. Evaluate each option based on effectiveness, cost, availability, maintenance requirements, and environmental impact.<br><b>Resources needed:</b><br><ul><li>Procurement Specialists</li><li>Equipment Operators</li><li>Environmental Engineers</li><li>Technical Specifications</li><li>Vendor Catalogs</li></ul>",
      "start_date": "2026-10-18",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "ec2ac19c-28a0-4ab8-9012-2e96e415eda2 FS",
      "parent": "c4201650-9932-477f-8c20-b00a83a92cf2"
    },
    {
      "id": "70bccb8c-8c4b-45b3-9c9a-9f5c29230652",
      "text": "Assess Infrastructure Vulnerability to Ash",
      "custom_tooltip": "<b>Assess Infrastructure Vulnerability to Ash</b><br>Evaluate the vulnerability of critical infrastructure (power plants, water treatment facilities, communication networks, transportation hubs) to ashfall. This includes assessing the structural integrity of buildings, the sensitivity of equipment to ash contamination, and the potential for disruptions to essential services.<br><b>Resources needed:</b><br><ul><li>Structural Engineers</li><li>Electrical Engineers</li><li>Telecommunications Specialists</li><li>Infrastructure Maps</li><li>Ashfall Impact Data</li></ul>",
      "start_date": "2026-10-20",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "7c663b81-66ae-4cfc-808b-a0e92f53c520 FS",
      "parent": "c4201650-9932-477f-8c20-b00a83a92cf2"
    },
    {
      "id": "4a806d3a-74a1-4cc3-92ff-6302655522ba",
      "text": "Prioritize Equipment Procurement",
      "custom_tooltip": "<b>Prioritize Equipment Procurement</b><br>Based on the identified needs and infrastructure vulnerabilities, prioritize the procurement of ash removal equipment. This includes determining the optimal mix of equipment types, quantities, and delivery schedules to ensure timely and effective ash removal.<br><b>Resources needed:</b><br><ul><li>Emergency Management Planners</li><li>Budget Analysts</li><li>Logistics Coordinators</li><li>Risk Assessment Reports</li><li>Infrastructure Prioritization List</li></ul>",
      "start_date": "2026-10-22",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "70bccb8c-8c4b-45b3-9c9a-9f5c29230652 FS",
      "parent": "c4201650-9932-477f-8c20-b00a83a92cf2"
    },
    {
      "id": "63e2452d-caf1-43f4-89f5-79f149a75979",
      "text": "Secure Equipment Procurement Contracts",
      "custom_tooltip": "<b>Secure Equipment Procurement Contracts</b><br>Negotiate and secure contracts with equipment suppliers, ensuring favorable pricing, delivery terms, and maintenance agreements. This includes complying with all applicable procurement regulations and ensuring that the equipment meets the required specifications.<br><b>Resources needed:</b><br><ul><li>Contract Specialists</li><li>Legal Counsel</li><li>Procurement Officers</li><li>Vendor Agreements</li><li>Funding Approvals</li></ul>",
      "start_date": "2026-10-24",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "c4201650-9932-477f-8c20-b00a83a92cf2 FF, 4a806d3a-74a1-4cc3-92ff-6302655522ba FS",

    },
    {
      "id": "fb262393-0577-4d64-bcb5-5b93ddddb6a4",
      "text": "Identify Critical Infrastructure for Protection",
      "custom_tooltip": "<b>Identify Critical Infrastructure for Protection</b>",
      "progress": 0,

    {
      "id": "a10fcbd3-133b-4364-9a4b-41415d148f17",
      "text": "Gather Infrastructure Data",
      "custom_tooltip": "<b>Gather Infrastructure Data</b><br>Collect detailed data on critical infrastructure, including location, function, capacity, and condition. This includes reviewing existing documentation, conducting site visits, and consulting with infrastructure owners.<br><b>Resources needed:</b><br><ul><li>GIS specialists</li><li>Engineers</li><li>Inspectors</li><li>Database administrators</li></ul>",
      "start_date": "2026-10-26",
      "duration": 3.0,

    },
    {
      "id": "32ae3ae1-36a7-4fce-8071-589134ddabb6",
      "text": "Assess Infrastructure Vulnerability",
      "custom_tooltip": "<b>Assess Infrastructure Vulnerability</b><br>Evaluate the vulnerability of critical infrastructure to ashfall, considering factors such as structural integrity, exposure, and operational dependencies. This includes conducting vulnerability assessments, modeling ashfall impacts, and identifying potential failure points.<br><b>Resources needed:</b><br><ul><li>Structural engineers</li><li>Geologists</li><li>Risk assessment specialists</li><li>Modeling software</li></ul>",
      "start_date": "2026-10-29",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "a10fcbd3-133b-4364-9a4b-41415d148f17 FS",
      "parent": "fb262393-0577-4d64-bcb5-5b93ddddb6a4"
    },
    {
      "id": "fe008065-9f81-41b5-8a44-c45c1244e33a",
      "text": "Prioritize Infrastructure Protection",
      "custom_tooltip": "<b>Prioritize Infrastructure Protection</b><br>Develop a prioritized list of critical infrastructure for protection based on vulnerability, importance, and feasibility of mitigation measures. This includes establishing criteria for prioritization, conducting stakeholder consultations, and developing a consensus-based ranking.<br><b>Resources needed:</b><br><ul><li>Emergency managers</li><li>Infrastructure owners</li><li>Community representatives</li><li>Decision-making framework</li></ul>",
      "start_date": "2026-11-01",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "32ae3ae1-36a7-4fce-8071-589134ddabb6 FS",
      "parent": "fb262393-0577-4d64-bcb5-5b93ddddb6a4"
    },
    {
      "id": "81ecbb41-a449-4e53-9f9c-43b3b751f933",
      "text": "Document Protection Strategies",
      "custom_tooltip": "<b>Document Protection Strategies</b><br>Document specific protection strategies for each prioritized infrastructure asset, including ash removal procedures, structural reinforcement measures, and operational contingency plans. This includes developing detailed plans, creating training materials, and conducting drills.<br><b>Resources needed:</b><br><ul><li>Engineers</li><li>Emergency responders</li><li>Training specialists</li><li>Documentation software</li></ul>",
      "start_date": "2026-11-04",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "fb262393-0577-4d64-bcb5-5b93ddddb6a4 FF, fe008065-9f81-41b5-8a44-c45c1244e33a FS",
      "parent": "fb262393-0577-4d64-bcb5-5b93ddddb6a4"
    },

      "id": "22424763-7e4d-452d-b942-5295d577a780",
      "text": "Implement Long-Term Recovery Plan",
      "custom_tooltip": "<b>Implement Long-Term Recovery Plan</b>",

    {
      "id": "b8aaac8d-646c-4208-b19a-d7916adf4f4d",
      "text": "Establish Recovery Task Force",
      "custom_tooltip": "<b>Establish Recovery Task Force</b><br>Form a task force comprised of representatives from government agencies, community organizations, and private sector entities to oversee the implementation of the long-term recovery plan. This includes defining roles, responsibilities, and decision-making processes.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Government Liaisons</li><li>Community Representatives</li><li>Legal Counsel</li></ul>",
      "start_date": "2026-11-07",
      "duration": 110.0,
      "progress": 0,
      "open": true,
      "meta": "22424763-7e4d-452d-b942-5295d577a780 SS",

    },
    {
      "id": "31924e3a-345d-46c3-99ce-9886c42b1144",
      "text": "Prioritize Recovery Projects",
      "custom_tooltip": "<b>Prioritize Recovery Projects</b><br>Develop a framework for prioritizing recovery projects based on factors such as community needs, economic impact, and environmental sustainability. This includes establishing clear criteria for evaluating project proposals and allocating resources.<br><b>Resources needed:</b><br><ul><li>Economists</li><li>Urban Planners</li><li>Environmental Scientists</li><li>Community Leaders</li></ul>",
      "start_date": "2027-02-25",
      "duration": 110.0,
      "progress": 0,
      "open": true,
      "meta": "b8aaac8d-646c-4208-b19a-d7916adf4f4d FS",

    },
    {
      "id": "a955ea32-0213-4674-801c-10f898778ca7",
      "text": "Manage Resource Distribution",
      "custom_tooltip": "<b>Manage Resource Distribution</b><br>Establish a system for efficiently and equitably distributing resources to affected communities and individuals. This includes setting up distribution centers, coordinating logistics, and tracking resource allocation.<br><b>Resources needed:</b><br><ul><li>Logistics Coordinators</li><li>Supply Chain Managers</li><li>Volunteers</li><li>Transportation Vehicles</li></ul>",
      "start_date": "2027-06-15",
      "duration": 110.0,
      "progress": 0,
      "open": true,
      "meta": "31924e3a-345d-46c3-99ce-9886c42b1144 FS",

    },
    {
      "id": "b0afaf75-eec3-4ee6-9d93-1f26e0222949",
      "text": "Monitor Progress and Adjust Plan",
      "custom_tooltip": "<b>Monitor Progress and Adjust Plan</b><br>Regularly monitor the progress of recovery projects and adjust the long-term recovery plan as needed based on changing conditions and emerging needs. This includes collecting data, conducting evaluations, and engaging with stakeholders.<br><b>Resources needed:</b><br><ul><li>Data Analysts</li><li>Evaluation Specialists</li><li>Project Managers</li><li>Community Representatives</li></ul>",
      "start_date": "2027-10-03",
      "duration": 110.0,
      "progress": 0,
      "open": true,
      "meta": "a955ea32-0213-4674-801c-10f898778ca7 FS",

    },
    {
      "id": "0aab6a44-f239-4ae5-a85d-3756cbf534c6",
      "text": "Communicate Recovery Efforts",
      "custom_tooltip": "<b>Communicate Recovery Efforts</b><br>Maintain open and transparent communication with the public about the progress of recovery efforts. This includes providing regular updates, addressing concerns, and soliciting feedback.<br><b>Resources needed:</b><br><ul><li>Public Relations Specialists</li><li>Communication Officers</li><li>Community Liaisons</li><li>Website Developers</li></ul>",

      "id": "7d8001b9-0754-424b-aaf4-223feaba3ca9",

      "custom_tooltip": "<b>Secure Funding for Recovery Projects</b>",
      "progress": 0,

    {
      "id": "a711a3ad-38c1-41de-85d6-2698b01e7b64",
      "text": "Identify Potential Funding Sources",
      "custom_tooltip": "<b>Identify Potential Funding Sources</b><br>Research and identify all potential funding sources for long-term recovery projects, including federal, state, private, and philanthropic organizations. This involves reviewing grant databases, contacting relevant agencies, and assessing eligibility criteria.<br><b>Resources needed:</b><br><ul><li>Grant writer</li><li>Research analyst</li><li>Funding database access</li></ul>",
      "start_date": "2028-05-10",
      "duration": 24.0,
      "progress": 0,
      "open": true,
      "meta": "7d8001b9-0754-424b-aaf4-223feaba3ca9 SS",
      "parent": "7d8001b9-0754-424b-aaf4-223feaba3ca9"
    },
    {
      "id": "e203d4a1-d189-44ef-b427-6c43f8c731c1",
      "text": "Prepare Funding Proposals",
      "custom_tooltip": "<b>Prepare Funding Proposals</b><br>Develop comprehensive and persuasive funding proposals tailored to each identified funding source. This includes writing grant applications, preparing budget justifications, and gathering supporting documentation.<br><b>Resources needed:</b><br><ul><li>Grant writer</li><li>Budget analyst</li><li>Project manager</li></ul>",
      "start_date": "2028-06-03",
      "duration": 24.0,
      "progress": 0,
      "open": true,
      "meta": "a711a3ad-38c1-41de-85d6-2698b01e7b64 FS",
      "parent": "7d8001b9-0754-424b-aaf4-223feaba3ca9"
    },
    {
      "id": "807db08d-e864-4de7-83b2-1b1782dd55db",
      "text": "Lobby Key Decision-Makers",
      "custom_tooltip": "<b>Lobby Key Decision-Makers</b><br>Engage with key decision-makers at the federal, state, and local levels to advocate for funding for recovery projects. This involves scheduling meetings, presenting project proposals, and building relationships with influential stakeholders.<br><b>Resources needed:</b><br><ul><li>Government relations specialist</li><li>Project manager</li><li>Community liaison</li></ul>",
      "start_date": "2028-06-27",
      "duration": 24.0,
      "progress": 0,
      "open": true,
      "meta": "e203d4a1-d189-44ef-b427-6c43f8c731c1 FS",
      "parent": "7d8001b9-0754-424b-aaf4-223feaba3ca9"
    },
    {
      "id": "a44750af-dfdb-4f2b-bbbf-0a21aa096639",
      "text": "Manage Funding Applications",
      "custom_tooltip": "<b>Manage Funding Applications</b><br>Track the status of all funding applications, respond to inquiries from funding agencies, and provide updates to stakeholders. This involves maintaining a database of applications, monitoring deadlines, and coordinating with project teams.<br><b>Resources needed:</b><br><ul><li>Project coordinator</li><li>Administrative assistant</li><li>Database management software</li></ul>",
      "start_date": "2028-07-21",
      "duration": 24.0,
      "progress": 0,
      "open": true,
      "meta": "807db08d-e864-4de7-83b2-1b1782dd55db FS",
      "parent": "7d8001b9-0754-424b-aaf4-223feaba3ca9"
    },
    {
      "id": "b6b327d6-6480-4884-80e6-63950f9fc250",
      "text": "Negotiate Funding Agreements",
      "custom_tooltip": "<b>Negotiate Funding Agreements</b><br>Negotiate funding agreements with successful applicants to ensure that the terms and conditions are favorable to the recovery effort. This involves reviewing legal documents, consulting with legal counsel, and securing final approval from relevant authorities.<br><b>Resources needed:</b><br><ul><li>Legal counsel</li><li>Contract specialist</li><li>Project manager</li></ul>",
      "start_date": "2028-08-14",
      "duration": 24.0,
      "progress": 0,
      "open": true,
      "meta": "7d8001b9-0754-424b-aaf4-223feaba3ca9 FF, a44750af-dfdb-4f2b-bbbf-0a21aa096639 FS",
      "parent": "7d8001b9-0754-424b-aaf4-223feaba3ca9"
    },
    {
      "id": "3a9eabfc-68fc-4744-b9f7-f8ec2a896325",

      "custom_tooltip": "<b>Coordinate with Community Leaders</b>",
      "progress": 0,
      "open": true,
      "meta": "bda5ac04-0e4f-449a-8a58-21083c4fca2f FF, 7d8001b9-0754-424b-aaf4-223feaba3ca9 FS",
      "parent": "bda5ac04-0e4f-449a-8a58-21083c4fca2f",
      "type": "project"
    },
    {
      "id": "018ef0b7-c0d8-4b30-b3fa-9ee614fcb5df",
      "text": "Identify Key Community Leaders",
      "custom_tooltip": "<b>Identify Key Community Leaders</b><br>Identify influential individuals and representatives from diverse community segments (e.g., neighborhood associations, faith-based organizations, business groups, vulnerable population advocates).<br><b>Resources needed:</b><br><ul><li>Community Outreach Coordinator</li><li>Local Government Liaison</li><li>Demographic Data</li></ul>",
      "start_date": "2028-09-07",
      "duration": 12.0,
      "progress": 0,
      "open": true,
      "meta": "3a9eabfc-68fc-4744-b9f7-f8ec2a896325 SS",
      "parent": "3a9eabfc-68fc-4744-b9f7-f8ec2a896325"
    },
    {
      "id": "87b30bbc-2511-40be-9aab-e9b940617af3",
      "text": "Establish Communication Channels",
      "custom_tooltip": "<b>Establish Communication Channels</b><br>Create multiple communication channels (e.g., email lists, phone conferences, online forums, in-person meetings) to facilitate information sharing and feedback collection with community leaders.<br><b>Resources needed:</b><br><ul><li>Communication Specialist</li><li>IT Support</li><li>Meeting Facilities</li></ul>",
      "start_date": "2028-09-19",
      "duration": 12.0,
      "progress": 0,
      "open": true,
      "meta": "018ef0b7-c0d8-4b30-b3fa-9ee614fcb5df FS",
      "parent": "3a9eabfc-68fc-4744-b9f7-f8ec2a896325"
    },
    {
      "id": "808b902a-3e8e-4225-bebb-797adad73371",
      "text": "Schedule Initial Consultation Meetings",
      "custom_tooltip": "<b>Schedule Initial Consultation Meetings</b><br>Schedule and conduct initial meetings with community leaders to introduce the long-term recovery plan, solicit their input, and address any immediate concerns.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Community Outreach Coordinator</li><li>Meeting Facilitator</li></ul>",
      "start_date": "2028-10-01",
      "duration": 12.0,
      "progress": 0,
      "open": true,
      "meta": "87b30bbc-2511-40be-9aab-e9b940617af3 FS",
      "parent": "3a9eabfc-68fc-4744-b9f7-f8ec2a896325"
    },
    {
      "id": "fff054e4-33bc-421b-ad1c-8375dcc324a3",
      "text": "Gather Community Feedback",
      "custom_tooltip": "<b>Gather Community Feedback</b><br>Collect feedback from community leaders through surveys, interviews, and focus groups to understand their priorities, needs, and concerns regarding the recovery process.<br><b>Resources needed:</b><br><ul><li>Survey Tools</li><li>Interviewers</li><li>Focus Group Facilitator</li></ul>",
      "start_date": "2028-10-13",
      "duration": 12.0,
      "progress": 0,
      "open": true,
      "meta": "808b902a-3e8e-4225-bebb-797adad73371 FS",
      "parent": "3a9eabfc-68fc-4744-b9f7-f8ec2a896325"
    },
    {
      "id": "2bc89bd0-928b-4fed-8072-471b89b30ba9",
      "text": "Incorporate Feedback into Recovery Plan",
      "custom_tooltip": "<b>Incorporate Feedback into Recovery Plan</b><br>Analyze the collected feedback and incorporate it into the long-term recovery plan to ensure that the plan reflects the community&#x27;s needs and priorities.<br><b>Resources needed:</b><br><ul><li>Data Analyst</li><li>Recovery Plan Writer</li><li>Project Manager</li></ul>",

      "duration": 12.0,
      "progress": 0,

    function zoomFit() {
        const tasks = gantt.getTaskByTime();
        if (tasks.length > 0) {
            const firstTask = tasks[0];
            const lastTask = tasks[tasks.length - 1];
            gantt.showDate(firstTask.start_date);
            
            // Calculate total duration in days
            const startDate = new Date(firstTask.start_date);
            const endDate = new Date(lastTask.end_date);
            const durationDays = (endDate - startDate) / (1000 * 60 * 60 * 24);
            
            // Choose appropriate scale based on duration
            if (durationDays > 3650) { // More than 10 years
                gantt.config.scale_unit = "year";
                gantt.config.step = 10;
                gantt.config.subscales = [
                    {unit: "year", step: 1, date: "%Y"}
                ];
            } else if (durationDays > 365) { // More than 1 year
                gantt.config.scale_unit = "year";
                gantt.config.step = 1;
                gantt.config.subscales = [
                    {unit: "month", step: 1, date: "%M"}
                ];
            } else if (durationDays > 30) { // More than 1 month
                gantt.config.scale_unit = "month";
                gantt.config.step = 1;
                gantt.config.subscales = [
                    {unit: "day", step: 1, date: "%d"}
                ];
            } else if (durationDays > 7) { // More than 1 week
                gantt.config.scale_unit = "week";
                gantt.config.step = 1;
                gantt.config.subscales = [
                    {unit: "day", step: 1, date: "%d"}
                ];
            } else {
                gantt.config.scale_unit = "day";
                gantt.config.step = 1;
                gantt.config.subscales = [];
            }
            gantt.render();
        }
    }

    function zoomIn() {
        const currentUnit = gantt.config.scale_unit;
        const currentStep = gantt.config.step;
        
        if (currentUnit === "year" && currentStep === 10) {
            gantt.config.scale_unit = "year";
            gantt.config.step = 1;
            gantt.config.subscales = [
                {unit: "month", step: 1, date: "%M"}
            ];
        } else if (currentUnit === "year") {
            gantt.config.scale_unit = "month";
            gantt.config.step = 1;
            gantt.config.subscales = [
                {unit: "day", step: 1, date: "%d"}
            ];
        } else if (currentUnit === "month") {
            gantt.config.scale_unit = "week";
            gantt.config.step = 1;
            gantt.config.subscales = [
                {unit: "day", step: 1, date: "%d"}
            ];
        } else if (currentUnit === "week") {
            gantt.config.scale_unit = "day";
            gantt.config.step = 1;
            gantt.config.subscales = [];
        }
        gantt.render();
    }

    function zoomOut() {
        const currentUnit = gantt.config.scale_unit;
        const currentStep = gantt.config.step;
        
        if (currentUnit === "day") {
            gantt.config.scale_unit = "week";
            gantt.config.step = 1;
            gantt.config.subscales = [
                {unit: "day", step: 1, date: "%d"}
            ];
        } else if (currentUnit === "week") {
            gantt.config.scale_unit = "month";
            gantt.config.step = 1;
            gantt.config.subscales = [
                {unit: "day", step: 1, date: "%d"}
            ];
        } else if (currentUnit === "month") {
            gantt.config.scale_unit = "year";
            gantt.config.step = 1;
            gantt.config.subscales = [
                {unit: "month", step: 1, date: "%M"}
            ];
        } else if (currentUnit === "year") {
            gantt.config.scale_unit = "year";
            gantt.config.step = 10;
            gantt.config.subscales = [
                {unit: "year", step: 1, date: "%Y"}
            ];
        }
        gantt.render();
    }

    function downloadCSV() {
        if (GANTT_DATA_CSV === null) {
            return;
        }
        const blob = new Blob([GANTT_DATA_CSV], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        const url = URL.createObjectURL(blob);
        link.setAttribute('href', url);
        link.setAttribute('download', GANTT_FILENAME_CSV);
        link.style.visibility = 'hidden';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    // Gantt Initialization
    gantt.config.readonly = true;
    gantt.config.date_format = "%Y-%m-%d";
    gantt.config.scale_unit = "month";
    gantt.config.step = 1;
    gantt.config.subscales = [
        {unit: "day", step: 1, date: "%d"}
    ];

    gantt.config.columns = [
        {name:"text", label:"Task name", width:"*", tree:true},
        // {name:"start_date", label:"Start time", align: "center"},
        // {name:"duration", label:"Duration", align: "center"}
    ];

    gantt.templates.task_class = function(start, end, task) {
        if (task.type === "project") {
            return "project-task";
        }
        return "";
    };

    gantt.templates.tooltip_text = function(start, end, task) {
        return task.custom_tooltip || "No tooltip";
    };
    
	gantt.plugins({
		tooltip: true
	});
	gantt.attachEvent("onGanttReady", function(){
		var tooltips = gantt.ext.tooltips;
		tooltips.tooltip.setViewport(gantt.$task_data);
	});
    gantt.init("gantt_container");
    gantt.parse(GANTT_DATA_DHTMLX);

    // Hide the export to CSV button if there is no CSV data
    if (GANTT_DATA_CSV === null) {
        document.getElementById('exportToCSVButton').style.display = 'none';
    }

    document.getElementById('zoomFitButton').addEventListener('click', zoomFit);
    document.getElementById('zoomInButton').addEventListener('click', zoomIn);
    document.getElementById('zoomOutButton').addEventListener('click', zoomOut);
    document.getElementById('exportToCSVButton').addEventListener('click', downloadCSV);
</script>
