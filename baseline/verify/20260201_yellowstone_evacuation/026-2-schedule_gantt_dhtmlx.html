    const GANTT_DATA_CSV = "project_key,project_name,project_description,project_start_date,project_end_date,project_progress,project_parent,originating_department\nf74a79bc-497f-4d79-9c7f-f968f50b2149,Yellowstone Evacuation,\"Yellowstone Evacuation\n\nFinal deliverable:\nSafe Evacuation\",2/1/2026,11/6/2028,0,,PlanExe\nbee241f0-4aa5-41fc-8d68-ed3aeb9b7dc6,Project Initiation & Planning,,2/1/2026,3/1/2026,0,f74a79bc-497f-4d79-9c7f-f968f50b2149,PlanExe\n51e3aed6-132a-4ea5-b5d9-f4a7728cd9e4,Define Project Scope and Objectives,,2/1/2026,2/5/2026,0,bee241f0-4aa5-41fc-8d68-ed3aeb9b7dc6,PlanExe\nee690c20-6ce3-4bb5-836d-516e0ecb01f5,Gather Stakeholder Requirements,\"Gather Stakeholder Requirements\n\nDescription:\nCollect detailed requirements from all key stakeholders regarding evacuation procedures, resource allocation, and communication protocols. This involves conducting interviews, surveys, and workshops to ensure a comprehensive understanding of their needs and expectations.\n\nResources needed:\n\u2022 Project Manager\n\u2022 Business Analyst\n\u2022 Subject Matter Experts\",2/1/2026,2/2/2026,0,51e3aed6-132a-4ea5-b5d9-f4a7728cd9e4,PlanExe\n86568f7c-5ff6-4bc5-8a1e-585f0a094347,Document Project Objectives,\"Document Project Objectives\n\nDescription:\nCreate a clear and concise document outlining the specific, measurable, achievable, relevant, and time-bound (SMART) objectives of the Yellowstone evacuation project. This document will serve as a guiding principle for all subsequent project activities.\n\nResources needed:\n\u2022 Project Manager\n\u2022 Technical Writer\n\u2022 Stakeholder Representatives\",2/2/2026,2/3/2026,0,ee690c20-6ce3-4bb5-836d-516e0ecb01f5,PlanExe\n2c31b8d1-9055-469e-8444-ed29c2e791ca,Prioritize Project Objectives,\"Prioritize Project Objectives\n\nDescription:\nRank the project objectives based on their importance and impact on the overall success of the evacuation effort. This prioritization will help to focus resources and efforts on the most critical aspects of the project.\n\nResources needed:\n\u2022 Project Manager\n\u2022 Stakeholder Representatives\n\u2022 Risk Assessment Team\",2/3/2026,2/4/2026,0,86568f7c-5ff6-4bc5-8a1e-585f0a094347,PlanExe\n13d210ab-309d-4cda-bcc2-2acb7068a307,Define Project Scope Boundaries,\"Define Project Scope Boundaries\n\nDescription:\nClearly define the boundaries of the project, including the geographic area covered, the types of activities included, and the resources allocated. This will help to prevent scope creep and ensure that the project remains focused on its core objectives.\n\nResources needed:\n\u2022 Project Manager\n\u2022 Geographic Information System (GIS) Specialist\n\u2022 Emergency Management Expert\",2/4/2026,2/5/2026,0,51e3aed6-132a-4ea5-b5d9-f4a7728cd9e4,PlanExe\n2335f00b-553d-4c79-ad84-e4e4a5ab231e,Identify Stakeholders,,2/5/2026,2/9/2026,0,51e3aed6-132a-4ea5-b5d9-f4a7728cd9e4,PlanExe\nc22264c2-4ea2-42a7-a83b-6c9cb5444d1e,Identify Key Stakeholder Groups,\"Identify Key Stakeholder Groups\n\nDescription:\nIdentify all relevant stakeholder groups, including internal teams, external partners, regulatory bodies, and community representatives. Determine their roles, responsibilities, and levels of influence.\n\nResources needed:\n\u2022 Project Manager\n\u2022 Communication Specialist\n\u2022 Stakeholder Analysis Template\",2/5/2026,2/6/2026,0,2335f00b-553d-4c79-ad84-e4e4a5ab231e,PlanExe\nf8d01614-e3d5-4c4b-9f18-a5214c670552,Map Stakeholder Communication Preferences,\"Map Stakeholder Communication Preferences\n\nDescription:\nDetermine the preferred communication channels, frequency, and level of detail for each stakeholder group. Consider factors such as their technical expertise, time constraints, and cultural background.\n\nResources needed:\n\u2022 Communication Specialist\n\u2022 Survey Tools\n\u2022 Stakeholder Contact List\",2/6/2026,2/7/2026,0,c22264c2-4ea2-42a7-a83b-6c9cb5444d1e,PlanExe\n69e51038-7f4a-4650-80f8-74e83399eb70,Prioritize Stakeholder Engagement,\"Prioritize Stakeholder Engagement\n\nDescription:\nRank stakeholders based on their importance to the project's success and their level of influence. Focus engagement efforts on high-priority stakeholders to ensure their needs and concerns are addressed effectively.\n\nResources needed:\n\u2022 Project Manager\n\u2022 Stakeholder Analysis Template\n\u2022 Decision-Making Framework\",2/7/2026,2/8/2026,0,f8d01614-e3d5-4c4b-9f18-a5214c670552,PlanExe\n9436308d-44a7-4b54-9dca-bfcf574af2d9,Document Stakeholder Information,\"Document Stakeholder Information\n\nDescription:\nCreate a comprehensive stakeholder register that includes contact information, communication preferences, roles, responsibilities, and levels of influence. Maintain the register throughout the project lifecycle.\n\nResources needed:\n\u2022 Project Manager\n\u2022 Stakeholder Register Template\n\u2022 Data Management System\",2/8/2026,2/9/2026,0,2335f00b-553d-4c79-ad84-e4e4a5ab231e,PlanExe\ndef25511-37e4-46ce-9202-4b80b896c7ef,Develop Communication Plan,,2/9/2026,2/13/2026,0,2335f00b-553d-4c79-ad84-e4e4a5ab231e,PlanExe\n01a2e289-b319-449d-b417-c27f54a7111d,Identify Communication Channels and Stakeholders,\"Identify Communication Channels and Stakeholders\n\nDescription:\nObjective: Determine the most effective communication channels for reaching different stakeholder groups.\nScope: Identify all relevant stakeholders and their preferred communication methods.\nSteps: 1. Review stakeholder analysis. 2. Research available communication channels. 3. Map stakeholders to appropriate channels.\nDeliverables: List of communication channels and stakeholder mapping.\n\nResources needed:\n\u2022 Stakeholder analysis document\n\u2022 Communication specialist\n\u2022 Project manager\",2/9/2026,2/10/2026,0,def25511-37e4-46ce-9202-4b80b896c7ef,PlanExe\n43bda48f-5785-4316-ac8a-c1714a9a4993,Define Communication Objectives and Key Messages,\"Define Communication Objectives and Key Messages\n\nDescription:\nObjective: Establish clear communication objectives and craft key messages for each stakeholder group.\nScope: Define what needs to be communicated and the desired outcome of each communication.\nSteps: 1. Review project objectives. 2. Develop key messages for each stakeholder group. 3. Ensure messages are consistent and accurate.\nDeliverables: Communication objectives and key messages document.\n\nResources needed:\n\u2022 Project objectives document\n\u2022 Communication specialist\n\u2022 Subject matter experts\",2/10/2026,2/11/2026,0,01a2e289-b319-449d-b417-c27f54a7111d,PlanExe\ncfe07bdc-3612-4706-8fc6-091224a51a33,Develop Communication Schedule and Timeline,\"Develop Communication Schedule and Timeline\n\nDescription:\nObjective: Create a detailed communication schedule and timeline to ensure timely and effective communication.\nScope: Define when and how each communication will be delivered.\nSteps: 1. Identify key milestones and communication needs. 2. Develop a communication schedule. 3. Assign responsibilities for each communication task.\nDeliverables: Communication schedule and timeline document.\n\nResources needed:\n\u2022 Project schedule\n\u2022 Communication specialist\n\u2022 Project manager\",2/11/2026,2/12/2026,0,43bda48f-5785-4316-ac8a-c1714a9a4993,PlanExe\n0c7571ca-8c0c-4276-82d2-ab9aa1b3353d,Establish Feedback Mechanisms and Monitoring,\"Establish Feedback Mechanisms and Monitoring\n\nDescription:\nObjective: Implement feedback mechanisms to gather input from stakeholders and monitor the effectiveness of communication efforts.\nScope: Define how feedback will be collected and analyzed.\nSteps: 1. Develop feedback surveys and questionnaires. 2. Establish a process for collecting and analyzing feedback. 3. Monitor communication channels for stakeholder responses.\nDeliverables: Feedback mechanisms and monitoring plan.\n\nResources needed:\n\u2022 Communication specialist\n\u2022 Project manager\n\u2022 Data analyst\",2/12/2026,2/13/2026,0,def25511-37e4-46ce-9202-4b80b896c7ef,PlanExe\n2df0047f-b30e-4584-bca3-9242e29ee070,Establish Risk Management Plan,,2/13/2026,2/21/2026,0,def25511-37e4-46ce-9202-4b80b896c7ef,PlanExe\na498590a-00a9-4918-933e-cfca24d3ec94,Identify Potential Risks,\"Identify Potential Risks\n\nDescription:\nObjective: Identify all potential risks that could impact the project.\nScope: Consider all aspects of the project, including technical, logistical, financial, and regulatory risks.\nSteps: Conduct brainstorming sessions, review historical data, consult with experts.\nDeliverables: A comprehensive list of potential risks.\n\nResources needed:\n\u2022 Project Manager\n\u2022 Subject Matter Experts\n\u2022 Risk Management Software\",2/13/2026,2/15/2026,0,2df0047f-b30e-4584-bca3-9242e29ee070,PlanExe\nc6448065-076f-43f8-be41-e58d05700507,Assess Risk Probability and Impact,\"Assess Risk Probability and Impact\n\nDescription:\nObjective: Evaluate the likelihood and potential impact of each identified risk.\nScope: Quantify the probability and impact using a risk assessment matrix.\nSteps: Assign probability and impact scores to each risk, prioritize risks based on their overall score.\nDeliverables: A prioritized list of risks with associated probability and impact scores.\n\nResources needed:\n\u2022 Risk Analyst\n\u2022 Project Team\n\u2022 Risk Assessment Matrix\",2/15/2026,2/17/2026,0,a498590a-00a9-4918-933e-cfca24d3ec94,PlanExe\n57aad278-b376-41aa-90e2-420ac5d0d080,Develop Mitigation Strategies,\"Develop Mitigation Strategies\n\nDescription:\nObjective: Develop strategies to mitigate or eliminate the identified risks.\nScope: Identify specific actions to reduce the probability or impact of each risk.\nSteps: Brainstorm mitigation strategies, evaluate the cost and effectiveness of each strategy, assign responsibility for implementing each strategy.\nDeliverables: A detailed mitigation plan for each identified risk.\n\nResources needed:\n\u2022 Project Manager\n\u2022 Subject Matter Experts\n\u2022 Contingency Budget\",2/17/2026,2/19/2026,0,c6448065-076f-43f8-be41-e58d05700507,PlanExe\nb1b0141d-e22c-4b4c-86a9-fa78b6d48644,Document Risk Management Plan,\"Document Risk Management Plan\n\nDescription:\nObjective: Create a comprehensive risk management plan that documents all identified risks, their probability and impact, and the associated mitigation strategies.\nScope: The plan should be clear, concise, and easily accessible to all project stakeholders.\nSteps: Compile all risk assessment data, document mitigation strategies, create a risk register, obtain approval from project stakeholders.\nDeliverables: A complete and approved risk management plan.\n\nResources needed:\n\u2022 Project Manager\n\u2022 Technical Writer\n\u2022 Document Management System\",2/19/2026,2/21/2026,0,2df0047f-b30e-4584-bca3-9242e29ee070,PlanExe\nee298cf4-e281-4b53-80e8-d593b0ef0cde,Secure Initial Funding,,2/21/2026,3/1/2026,0,bee241f0-4aa5-41fc-8d68-ed3aeb9b7dc6,PlanExe\n4348bd0b-f638-4ff5-ae08-eab07edae133,Identify potential funding sources (1),\"Identify potential funding sources\n\nDescription:\nResearch and identify all potential funding sources, including government grants, private investors, and internal budget allocations. This involves reviewing eligibility criteria, application requirements, and funding timelines for each source.\n\nResources needed:\n\u2022 Grant writer\n\u2022 Financial analyst\n\u2022 Project manager\",2/21/2026,2/23/2026,0,ee298cf4-e281-4b53-80e8-d593b0ef0cde,PlanExe\nc3193204-833a-49d7-ad1b-1b2d0deee7c6,Prepare budget proposal,\"Prepare budget proposal\n\nDescription:\nDevelop a detailed budget proposal outlining all project expenses, including personnel costs, equipment purchases, resource procurement, and operational expenses. The proposal should include clear justifications for each expense and align with the project's scope and objectives.\n\nResources needed:\n\u2022 Financial analyst\n\u2022 Project manager\n\u2022 Subject matter experts\",2/23/2026,2/25/2026,0,4348bd0b-f638-4ff5-ae08-eab07edae133,PlanExe\n538694ea-3748-42f0-aeef-f7cfc7c763df,Submit funding applications,\"Submit funding applications\n\nDescription:\nPrepare and submit funding applications to identified funding sources, ensuring all application requirements are met and deadlines are adhered to. This includes completing application forms, gathering supporting documentation, and addressing any questions or concerns raised by funding agencies.\n\nResources needed:\n\u2022 Grant writer\n\u2022 Project manager\n\u2022 Legal counsel\",2/25/2026,2/27/2026,0,c3193204-833a-49d7-ad1b-1b2d0deee7c6,PlanExe\nd2c393a7-80b5-496e-bd10-8bcce3a97dba,Negotiate funding agreements (1),\"Negotiate funding agreements\n\nDescription:\nNegotiate funding agreements with selected funding sources, ensuring favorable terms and conditions for the project. This includes reviewing agreement documents, addressing any legal or financial concerns, and securing final approval from relevant stakeholders.\n\nResources needed:\n\u2022 Legal counsel\n\u2022 Financial analyst\n\u2022 Project manager\",2/27/2026,3/1/2026,0,ee298cf4-e281-4b53-80e8-d593b0ef0cde,PlanExe\n9d73ef4d-6cb4-438d-bbc3-1a34384005a9,Data Collection & Analysis,,3/1/2026,5/11/2026,0,bee241f0-4aa5-41fc-8d68-ed3aeb9b7dc6,PlanExe\na0afb907-3fd6-4aaa-9f26-166f2563b46a,Collect VEI-7 Escalation Data,,3/1/2026,3/11/2026,0,9d73ef4d-6cb4-438d-bbc3-1a34384005a9,PlanExe\neb2f4231-3869-4d2d-a256-d8ad8fb13d72,Gather USGS Yellowstone monitoring data,\"Gather USGS Yellowstone monitoring data\n\nDescription:\nCollect the latest data from the USGS on Yellowstone's volcanic activity, including seismic data, gas emissions, and ground deformation measurements. This data will be used to assess the current state of the caldera and to inform probabilistic eruption models.\n\nResources needed:\n\u2022 USGS Data Portal Access\n\u2022 Data Analyst\",3/1/2026,3/3/2026,0,a0afb907-3fd6-4aaa-9f26-166f2563b46a,PlanExe\na6b1dcb1-a6f5-4d6f-8aac-bc13519cca88,Run probabilistic eruption models,\"Run probabilistic eruption models\n\nDescription:\nUtilize VOLCALPUH or similar probabilistic hazard models to simulate VEI-7 eruption scenarios. Input the collected USGS data and generate probabilistic hazard maps showing potential ashfall dispersion, lahar flow paths, and pyroclastic flow hazard zones.\n\nResources needed:\n\u2022 VOLCALPUH Software\n\u2022 High-Performance Computing Resources\n\u2022 Volcanologist\n\u2022 GIS Specialist\",3/3/2026,3/5/2026,0,eb2f4231-3869-4d2d-a256-d8ad8fb13d72,PlanExe\n765ade08-cfd6-4090-b96e-70a925b099b6,Assess lahar flow paths,\"Assess lahar flow paths\n\nDescription:\nConduct detailed assessments of potential lahar flow paths using GIS software. Overlay the generated lahar flow paths on evacuation routes to identify areas at high risk and to inform evacuation planning.\n\nResources needed:\n\u2022 GIS Software\n\u2022 Geologist\n\u2022 Evacuation Route Maps\",3/5/2026,3/7/2026,0,a6b1dcb1-a6f5-4d6f-8aac-bc13519cca88,PlanExe\n613f9ce4-8dc6-409b-908d-3d6d9fac5c1f,Map pyroclastic flow hazards,\"Map pyroclastic flow hazards\n\nDescription:\nCreate hazard maps showing potential pyroclastic flow hazard zones based on the probabilistic eruption models. These maps will be used to identify areas that need to be evacuated and to inform emergency response planning.\n\nResources needed:\n\u2022 GIS Software\n\u2022 Volcanologist\n\u2022 Hazard Mapping Specialist\",3/7/2026,3/9/2026,0,765ade08-cfd6-4090-b96e-70a925b099b6,PlanExe\nd604fe04-0268-41f9-8149-acdc8b11e65a,Validate with expert volcanologists,\"Validate with expert volcanologists\n\nDescription:\nConsult with volcanologists experienced in probabilistic hazard modeling to validate the results of the simulations and assessments. Incorporate their feedback to refine the models and to ensure the accuracy of the hazard maps.\n\nResources needed:\n\u2022 Volcanologist Consultants\n\u2022 Expert Review Panel\",3/9/2026,3/11/2026,0,a0afb907-3fd6-4aaa-9f26-166f2563b46a,PlanExe\n59c4b3ba-7780-4edc-a290-1983d97b748b,Conduct Cybersecurity Risk Assessment,,3/11/2026,3/26/2026,0,a0afb907-3fd6-4aaa-9f26-166f2563b46a,PlanExe\n4b5749b0-6a3b-4cda-8220-12b687a667cf,Identify Critical Systems and Data,\"Identify Critical Systems and Data\n\nDescription:\nObjective: Determine the most vital communication and operational systems and data that require protection. Scope: Includes all systems used for emergency communication, resource allocation, evacuation coordination, and public information dissemination. Steps: Inventory all systems, classify data based on sensitivity and criticality, and document system architecture. Deliverables: A comprehensive list of critical systems and data with assigned criticality levels.\n\nResources needed:\n\u2022 IT Security Specialists\n\u2022 System Administrators\n\u2022 Data Analysts\",3/11/2026,3/14/2026,0,59c4b3ba-7780-4edc-a290-1983d97b748b,PlanExe\n07b56a15-5e40-4dc3-b415-fbe42f1da726,Perform Vulnerability Scanning and Penetration Testing,\"Perform Vulnerability Scanning and Penetration Testing\n\nDescription:\nObjective: Identify vulnerabilities in critical systems through automated scanning and manual penetration testing. Scope: Includes network infrastructure, servers, applications, and databases. Steps: Conduct vulnerability scans using tools like Nessus or OpenVAS, perform penetration testing using Metasploit or similar frameworks, and document identified vulnerabilities. Deliverables: A detailed report of identified vulnerabilities with severity ratings and recommended remediation steps.\n\nResources needed:\n\u2022 Cybersecurity Experts\n\u2022 Penetration Testers\n\u2022 Vulnerability Assessment Tools\",3/14/2026,3/17/2026,0,4b5749b0-6a3b-4cda-8220-12b687a667cf,PlanExe\ne12e3a6b-8eda-4a4e-8a66-e2cf51f3501e,Develop and Implement Security Measures,\"Develop and Implement Security Measures\n\nDescription:\nObjective: Implement security measures to mitigate identified vulnerabilities and protect critical systems and data. Scope: Includes implementing firewalls, intrusion detection systems, access controls, encryption, and security awareness training. Steps: Prioritize remediation based on vulnerability severity, implement security measures, and document implemented controls. Deliverables: A documented set of security measures implemented to protect critical systems and data.\n\nResources needed:\n\u2022 IT Security Specialists\n\u2022 System Administrators\n\u2022 Network Engineers\",3/17/2026,3/20/2026,0,07b56a15-5e40-4dc3-b415-fbe42f1da726,PlanExe\nbdd261b9-d108-40d5-a271-b760ee3333f2,Establish Incident Response Plan,\"Establish Incident Response Plan\n\nDescription:\nObjective: Develop a plan for responding to cybersecurity incidents. Scope: Includes procedures for detecting, analyzing, containing, eradicating, and recovering from incidents. Steps: Define roles and responsibilities, develop incident response procedures, and conduct tabletop exercises. Deliverables: A documented incident response plan with clear procedures and assigned responsibilities.\n\nResources needed:\n\u2022 Cybersecurity Experts\n\u2022 Incident Response Team\n\u2022 Legal Counsel\",3/20/2026,3/23/2026,0,e12e3a6b-8eda-4a4e-8a66-e2cf51f3501e,PlanExe\na7e5ee03-4ddc-4d84-b86f-55671253dbd6,Conduct Security Awareness Training,\"Conduct Security Awareness Training\n\nDescription:\nObjective: Train personnel on cybersecurity best practices and incident reporting procedures. Scope: Includes all personnel with access to critical systems and data. Steps: Develop training materials, conduct training sessions, and track training completion. Deliverables: A documented record of security awareness training completion for all relevant personnel.\n\nResources needed:\n\u2022 Cybersecurity Trainers\n\u2022 Training Materials\n\u2022 HR Personnel\",3/23/2026,3/26/2026,0,59c4b3ba-7780-4edc-a290-1983d97b748b,PlanExe\nbb2eee9c-cd94-455c-85bf-f74369afb9fa,Assess Vulnerable Population Needs,,3/26/2026,4/5/2026,0,59c4b3ba-7780-4edc-a290-1983d97b748b,PlanExe\nb3e64ca4-3cb7-474c-9ee5-d009300bd954,Identify vulnerable populations in Zone One,\"Identify vulnerable populations in Zone One\n\nDescription:\nObjective: Determine the number and location of vulnerable populations within Zone One.\nScope: Includes tourists, non-English speakers, people with disabilities, and those with medical needs.\nSteps: Analyze census data, tourist statistics, and disability registries. Consult with local community organizations.\nDeliverables: A detailed report on the distribution of vulnerable populations.\n\nResources needed:\n\u2022 GIS software\n\u2022 Demographic data\n\u2022 Community outreach coordinator\n\u2022 Translation services\",3/26/2026,3/28/2026,0,bb2eee9c-cd94-455c-85bf-f74369afb9fa,PlanExe\n63d54618-1aaa-4acd-bca7-368426dc4816,Assess accessibility of evacuation routes,\"Assess accessibility of evacuation routes\n\nDescription:\nObjective: Evaluate the accessibility of evacuation routes and shelters for people with disabilities.\nScope: Includes physical accessibility, communication accessibility, and transportation accessibility.\nSteps: Conduct site visits, review evacuation plans, and consult with disability advocacy groups.\nDeliverables: A report on the accessibility of evacuation routes and shelters, with recommendations for improvements.\n\nResources needed:\n\u2022 Accessibility experts\n\u2022 Transportation planners\n\u2022 Disability advocacy groups\n\u2022 GIS data\",3/28/2026,3/30/2026,0,b3e64ca4-3cb7-474c-9ee5-d009300bd954,PlanExe\nbd93a5e1-0e70-4dd9-bd2d-a5314cf13c16,Develop multilingual communication strategies,\"Develop multilingual communication strategies\n\nDescription:\nObjective: Create communication materials in multiple languages to reach non-English speakers.\nScope: Includes evacuation alerts, safety instructions, and resource information.\nSteps: Translate existing materials, develop new materials, and test their effectiveness with target audiences.\nDeliverables: Multilingual communication materials in print, audio, and video formats.\n\nResources needed:\n\u2022 Translators\n\u2022 Communication specialists\n\u2022 Language experts\n\u2022 Public address systems\",3/30/2026,4/1/2026,0,63d54618-1aaa-4acd-bca7-368426dc4816,PlanExe\n17c9f00f-29d6-4625-98d7-197cdb243f4e,Plan for specialized equipment needs,\"Plan for specialized equipment needs\n\nDescription:\nObjective: Identify and procure specialized equipment needed by vulnerable populations.\nScope: Includes wheelchairs, medical devices, and other assistive devices.\nSteps: Conduct needs assessments, identify suppliers, and secure funding.\nDeliverables: A stockpile of specialized equipment and a plan for its distribution.\n\nResources needed:\n\u2022 Medical personnel\n\u2022 Logistics specialists\n\u2022 Procurement officers\n\u2022 Funding sources\",4/1/2026,4/3/2026,0,bd93a5e1-0e70-4dd9-bd2d-a5314cf13c16,PlanExe\n5f7b2dea-83aa-4409-89b0-57060b20c258,Establish accessible transportation options,\"Establish accessible transportation options\n\nDescription:\nObjective: Ensure that transportation is available to all vulnerable populations.\nScope: Includes accessible buses, vans, and other vehicles.\nSteps: Coordinate with transportation providers, secure funding, and train drivers.\nDeliverables: A transportation plan that meets the needs of all vulnerable populations.\n\nResources needed:\n\u2022 Transportation providers\n\u2022 Logistics specialists\n\u2022 Funding sources\n\u2022 Trained drivers\",4/3/2026,4/5/2026,0,bb2eee9c-cd94-455c-85bf-f74369afb9fa,PlanExe\n9ddce8db-fa90-457e-8290-b7657045dc77,Develop Long-Term Recovery Plan,,4/5/2026,5/7/2026,0,bb2eee9c-cd94-455c-85bf-f74369afb9fa,PlanExe\n97209202-9831-4c55-be91-360fd3bd307c,Assess economic impact of eruption,\"Assess economic impact of eruption\n\nDescription:\nEvaluate the potential economic losses to the region due to the eruption, including tourism, agriculture, and other industries. This involves gathering data on pre-eruption economic activity, modeling the potential impacts of ashfall and other hazards, and identifying potential mitigation strategies.\n\nResources needed:\n\u2022 Economists\n\u2022 Data analysts\n\u2022 Economic modeling software\n\u2022 Regional economic data\",4/5/2026,4/13/2026,0,9ddce8db-fa90-457e-8290-b7657045dc77,PlanExe\n48147737-6550-48b7-aefa-3fa7b37d6b2a,Evaluate infrastructure damage scenarios,\"Evaluate infrastructure damage scenarios\n\nDescription:\nModel potential damage to critical infrastructure, including roads, bridges, power grids, and water systems. This involves using GIS software to overlay hazard maps on infrastructure maps, assessing the vulnerability of different infrastructure components, and developing damage scenarios based on different eruption intensities.\n\nResources needed:\n\u2022 GIS specialists\n\u2022 Engineers\n\u2022 Infrastructure maps\n\u2022 Hazard maps\n\u2022 Damage assessment models\",4/13/2026,4/21/2026,0,97209202-9831-4c55-be91-360fd3bd307c,PlanExe\nec51aaf0-7f24-4a43-bb7c-f434f8889d6e,Conduct community resilience assessments,\"Conduct community resilience assessments\n\nDescription:\nAssess the ability of local communities to cope with and recover from the eruption. This involves conducting surveys, focus groups, and interviews with community members to identify their strengths, weaknesses, and needs. It also involves evaluating the availability of social support networks and community resources.\n\nResources needed:\n\u2022 Social scientists\n\u2022 Community outreach specialists\n\u2022 Survey instruments\n\u2022 Focus group facilitators\n\u2022 Community resilience assessment tools\",4/21/2026,4/29/2026,0,48147737-6550-48b7-aefa-3fa7b37d6b2a,PlanExe\n386d71cf-c713-4383-8661-f87c7016e93c,Identify funding sources for recovery,\"Identify funding sources for recovery\n\nDescription:\nResearch and identify potential funding sources for long-term recovery projects, including federal, state, and private sources. This involves reviewing grant programs, contacting funding agencies, and developing funding proposals.\n\nResources needed:\n\u2022 Grant writers\n\u2022 Fundraising specialists\n\u2022 Funding databases\n\u2022 Grant application guidelines\",4/29/2026,5/7/2026,0,9ddce8db-fa90-457e-8290-b7657045dc77,PlanExe\n968d2545-7ce4-4827-9664-c3681705efbd,Establish Authority Transfer Protocol,,5/7/2026,5/11/2026,0,9d73ef4d-6cb4-438d-bbc3-1a34384005a9,PlanExe\nce75a0e4-20ed-4f5e-92fb-c6fbdd42335c,Identify Legal Requirements for Authority Transfer,\"Identify Legal Requirements for Authority Transfer\n\nDescription:\nObjective: Determine all legal and regulatory requirements for transferring authority during the emergency.\nScope: Review federal, state, and local laws, regulations, and emergency declarations.\nSteps: Research relevant legal frameworks, consult with legal experts, and document findings.\nDeliverables: A comprehensive list of legal requirements for authority transfer.\n\nResources needed:\n\u2022 Emergency Law Specialist\n\u2022 Legal Researchers\n\u2022 Legal Databases\",5/7/2026,5/8/2026,0,968d2545-7ce4-4827-9664-c3681705efbd,PlanExe\na7ed400e-a568-4536-b744-4d8844f6e59e,Draft Authority Transfer Protocols,\"Draft Authority Transfer Protocols\n\nDescription:\nObjective: Create clear and concise protocols for transferring authority between agencies and individuals.\nScope: Develop step-by-step procedures for different scenarios, including incapacitation of key personnel.\nSteps: Define trigger points for authority transfer, outline roles and responsibilities, and document communication procedures.\nDeliverables: A written protocol document outlining the authority transfer process.\n\nResources needed:\n\u2022 Emergency Law Specialist\n\u2022 Emergency Management Personnel\n\u2022 Legal Review Team\",5/8/2026,5/9/2026,0,ce75a0e4-20ed-4f5e-92fb-c6fbdd42335c,PlanExe\n3d394f78-1e92-42ef-90c1-c48cd064787c,Secure Legal Liaison Contact Information,\"Secure Legal Liaison Contact Information\n\nDescription:\nObjective: Compile a list of contact information for legal liaisons from relevant agencies.\nScope: Identify legal representatives from FEMA, state agencies, and local governments.\nSteps: Contact agencies to obtain contact information, verify accuracy, and maintain an updated list.\nDeliverables: A contact list of legal liaisons with phone numbers, email addresses, and agency affiliations.\n\nResources needed:\n\u2022 Administrative Assistant\n\u2022 Emergency Management Personnel\n\u2022 Agency Contacts\",5/9/2026,5/10/2026,0,a7ed400e-a568-4536-b744-4d8844f6e59e,PlanExe\n2a987d6e-1030-43c6-af24-fd30a6b5d737,Simulate Authority Transfer Scenarios,\"Simulate Authority Transfer Scenarios\n\nDescription:\nObjective: Test the effectiveness of the authority transfer protocols through simulations.\nScope: Conduct tabletop exercises and drills to identify potential weaknesses and areas for improvement.\nSteps: Develop realistic scenarios, involve key personnel, and evaluate the simulation results.\nDeliverables: A report summarizing the simulation findings and recommendations for protocol revisions.\n\nResources needed:\n\u2022 Emergency Law Specialist\n\u2022 Emergency Management Personnel\n\u2022 Simulation Facilitator\",5/10/2026,5/11/2026,0,968d2545-7ce4-4827-9664-c3681705efbd,PlanExe\n05ade5fb-1a2d-4c8b-87fb-1d9978b63b3a,Resource Stockpiling & Distribution,,5/11/2026,8/11/2026,0,9d73ef4d-6cb4-438d-bbc3-1a34384005a9,PlanExe\n0641b1dd-8fff-4eec-9bb1-ea7169cb0a39,Procure Essential Resources,,5/11/2026,7/10/2026,0,05ade5fb-1a2d-4c8b-87fb-1d9978b63b3a,PlanExe\n37396c01-a2c7-48a9-b4bd-a68dd2b071e2,Identify Bottled Water Suppliers,\"Identify Bottled Water Suppliers\n\nDescription:\nIdentify and vet potential bottled water suppliers capable of providing the required volume within the specified timeframe. This includes assessing their production capacity, storage facilities, and transportation capabilities.\n\nResources needed:\n\u2022 Procurement Specialist\n\u2022 Logistics Coordinator\",5/11/2026,5/23/2026,0,0641b1dd-8fff-4eec-9bb1-ea7169cb0a39,PlanExe\n175763ee-92cb-43da-803b-0f3d6a6fb35f,Negotiate Bottled Water Contracts,\"Negotiate Bottled Water Contracts\n\nDescription:\nNegotiate contracts with selected bottled water suppliers, ensuring favorable pricing, delivery schedules, and quality standards. This includes defining payment terms, liability clauses, and contingency plans for supply disruptions.\n\nResources needed:\n\u2022 Contract Lawyer\n\u2022 Procurement Specialist\",5/23/2026,6/4/2026,0,37396c01-a2c7-48a9-b4bd-a68dd2b071e2,PlanExe\n015ec381-2dea-46db-a8d4-fb8d3234654e,Secure N95 Respirator Supply,\"Secure N95 Respirator Supply\n\nDescription:\nIdentify and secure a reliable supply of N95 respirators, ensuring they meet NIOSH standards and are available in sufficient quantities for the entire evacuation zone. This includes verifying authenticity and storage conditions.\n\nResources needed:\n\u2022 Medical Supply Specialist\n\u2022 Procurement Specialist\",6/4/2026,6/16/2026,0,175763ee-92cb-43da-803b-0f3d6a6fb35f,PlanExe\n9476144b-b8db-4e32-80a3-e90c02b1fdc9,Finalize Respirator Contracts,\"Finalize Respirator Contracts\n\nDescription:\nNegotiate and finalize contracts with N95 respirator suppliers, ensuring timely delivery, appropriate sizing options, and clear instructions for proper usage. This includes addressing storage requirements and distribution logistics.\n\nResources needed:\n\u2022 Contract Lawyer\n\u2022 Medical Supply Specialist\",6/16/2026,6/28/2026,0,015ec381-2dea-46db-a8d4-fb8d3234654e,PlanExe\n54030f2d-c010-437d-88e6-ddbc389b4c03,Establish Fuel Supply Agreements,\"Establish Fuel Supply Agreements\n\nDescription:\nEstablish agreements with fuel suppliers to ensure a continuous supply of fuel for generators, emergency vehicles, and other critical equipment. This includes securing priority access and establishing backup fuel storage locations.\n\nResources needed:\n\u2022 Logistics Coordinator\n\u2022 Fuel Supply Specialist\",6/28/2026,7/10/2026,0,0641b1dd-8fff-4eec-9bb1-ea7169cb0a39,PlanExe\n6e3fed11-92b6-4fe1-867a-b112e3350f8a,Establish Distribution Centers,,7/10/2026,7/26/2026,0,0641b1dd-8fff-4eec-9bb1-ea7169cb0a39,PlanExe\n56626b3c-0aa9-44af-88d4-169dc77faabd,Identify potential distribution center locations,\"Identify potential distribution center locations\n\nDescription:\nObjective: Identify suitable locations for resource distribution centers.\nScope: Evaluate potential sites based on accessibility, size, security, and proximity to evacuation routes.\nSteps: 1. Review existing infrastructure maps. 2. Conduct site visits. 3. Assess suitability based on pre-defined criteria.\nDeliverables: List of potential distribution center locations with site assessments.\n\nResources needed:\n\u2022 Logistics Coordinator\n\u2022 GIS Specialist\n\u2022 Transportation Planner\",7/10/2026,7/14/2026,0,6e3fed11-92b6-4fe1-867a-b112e3350f8a,PlanExe\ndd746f6d-a961-40b2-b14c-0adf98e2d491,Negotiate agreements for center usage,\"Negotiate agreements for center usage\n\nDescription:\nObjective: Secure agreements for the use of identified distribution center locations.\nScope: Negotiate terms with property owners or managers, including lease agreements, access rights, and security protocols.\nSteps: 1. Contact property owners. 2. Present proposal for center usage. 3. Negotiate terms and conditions. 4. Finalize agreements.\nDeliverables: Signed agreements for distribution center locations.\n\nResources needed:\n\u2022 Legal Counsel\n\u2022 Contract Negotiator\n\u2022 Project Manager\",7/14/2026,7/18/2026,0,56626b3c-0aa9-44af-88d4-169dc77faabd,PlanExe\n696646d6-3d42-46b1-8891-e922117bb1a1,Prepare distribution center sites,\"Prepare distribution center sites\n\nDescription:\nObjective: Prepare distribution center sites for resource storage and distribution.\nScope: Set up storage areas, install security systems, and ensure adequate lighting and ventilation.\nSteps: 1. Clear and organize storage areas. 2. Install security systems. 3. Ensure adequate lighting and ventilation. 4. Set up communication systems.\nDeliverables: Fully operational distribution center sites.\n\nResources needed:\n\u2022 Construction Crew\n\u2022 Security Personnel\n\u2022 IT Technician\",7/18/2026,7/22/2026,0,dd746f6d-a961-40b2-b14c-0adf98e2d491,PlanExe\na7df02f5-8740-4158-acf8-e3898c4f8f81,Establish center staffing plan,\"Establish center staffing plan\n\nDescription:\nObjective: Develop a staffing plan for each distribution center.\nScope: Determine the number of personnel needed for each center, including managers, volunteers, and security staff.\nSteps: 1. Estimate personnel needs. 2. Recruit and train volunteers. 3. Assign roles and responsibilities. 4. Develop a shift schedule.\nDeliverables: Staffing plan for each distribution center.\n\nResources needed:\n\u2022 Human Resources Coordinator\n\u2022 Volunteer Coordinator\n\u2022 Training Specialist\",7/22/2026,7/26/2026,0,6e3fed11-92b6-4fe1-867a-b112e3350f8a,PlanExe\nea5af904-a843-4fc6-86b9-7a199c10759c,Develop Resource Prioritization Framework,,7/26/2026,8/3/2026,0,6e3fed11-92b6-4fe1-867a-b112e3350f8a,PlanExe\nbbfeb28a-7b7b-4615-a76f-92ea6bd0157c,Identify Critical Resource Needs,\"Identify Critical Resource Needs\n\nDescription:\nDetermine the specific resources required for different population segments (e.g., medical supplies, transportation, communication devices). This involves analyzing vulnerability assessments and historical data.\n\nResources needed:\n\u2022 Vulnerability assessment reports\n\u2022 Historical data on resource consumption\n\u2022 Subject matter experts (medical, logistics, communication)\",7/26/2026,7/28/2026,0,ea5af904-a843-4fc6-86b9-7a199c10759c,PlanExe\n63bccb36-8fed-439f-bab6-31afcaa6f4c1,Establish Prioritization Criteria,\"Establish Prioritization Criteria\n\nDescription:\nDefine the criteria for prioritizing resource allocation based on factors such as vulnerability, urgency, and impact. This includes developing a scoring system or decision-making framework.\n\nResources needed:\n\u2022 Ethical framework for resource allocation\n\u2022 Legal guidelines for emergency response\n\u2022 Stakeholder input (community representatives, emergency responders)\",7/28/2026,7/30/2026,0,bbfeb28a-7b7b-4615-a76f-92ea6bd0157c,PlanExe\nf21d8429-9f23-46ef-b86a-7a35e46c7f40,Develop Allocation Workflow,\"Develop Allocation Workflow\n\nDescription:\nCreate a step-by-step process for allocating resources based on the established criteria. This includes defining roles and responsibilities, communication protocols, and decision-making authority.\n\nResources needed:\n\u2022 Process mapping software\n\u2022 Communication plan\n\u2022 Organizational chart\",7/30/2026,8/1/2026,0,63bccb36-8fed-439f-bab6-31afcaa6f4c1,PlanExe\n609e6be6-7fcb-4745-a1af-0b8c3423319e,Document Prioritization Framework,\"Document Prioritization Framework\n\nDescription:\nCreate a comprehensive document outlining the prioritization criteria, allocation workflow, and supporting information. This document should be readily accessible to all stakeholders.\n\nResources needed:\n\u2022 Technical writer\n\u2022 Document management system\n\u2022 Approval process\",8/1/2026,8/3/2026,0,ea5af904-a843-4fc6-86b9-7a199c10759c,PlanExe\n40b2d5e5-fe40-4bd4-869c-e0bfc5b04042,Coordinate Logistics and Transportation,,8/3/2026,8/11/2026,0,05ade5fb-1a2d-4c8b-87fb-1d9978b63b3a,PlanExe\n5b999bbc-7726-49d4-9a7c-5779265e42ac,Establish Real-Time Traffic Monitoring System,\"Establish Real-Time Traffic Monitoring System\n\nDescription:\nObjective: Implement a system for monitoring traffic flow in real-time. Scope: Includes selecting a monitoring platform, installing sensors, and integrating data feeds. Steps: 1) Evaluate available traffic monitoring platforms. 2) Procure and install traffic sensors. 3) Integrate sensor data with the monitoring platform. 4) Test and calibrate the system. Deliverables: A fully functional real-time traffic monitoring system.\n\nResources needed:\n\u2022 Traffic engineers\n\u2022 Data analysts\n\u2022 Sensor technicians\n\u2022 Software developers\",8/3/2026,8/5/2026,0,40b2d5e5-fe40-4bd4-869c-e0bfc5b04042,PlanExe\n1f216773-8929-4a3d-849c-f003ede18432,Develop Contingency Plans for Road Closures,\"Develop Contingency Plans for Road Closures\n\nDescription:\nObjective: Create alternative routes and procedures for managing traffic in the event of road closures. Scope: Includes identifying potential road closure locations, designing alternative routes, and establishing communication protocols. Steps: 1) Identify potential road closure locations. 2) Design alternative routes. 3) Develop traffic management procedures for road closures. 4) Establish communication protocols with emergency responders. Deliverables: A comprehensive contingency plan for road closures.\n\nResources needed:\n\u2022 Traffic engineers\n\u2022 Emergency responders\n\u2022 GIS specialists\n\u2022 Communication specialists\",8/5/2026,8/7/2026,0,5b999bbc-7726-49d4-9a7c-5779265e42ac,PlanExe\nbe31cebb-bd1a-4651-97df-858355d2f668,Secure Priority Fuel Access for Emergency Vehicles,\"Secure Priority Fuel Access for Emergency Vehicles\n\nDescription:\nObjective: Ensure that emergency vehicles have priority access to fuel during the evacuation. Scope: Includes identifying fuel stations, establishing agreements, and implementing a tracking system. Steps: 1) Identify strategic fuel stations. 2) Establish agreements with fuel station owners. 3) Implement a tracking system for emergency vehicle fuel consumption. 4) Develop procedures for fuel distribution. Deliverables: A system for ensuring priority fuel access for emergency vehicles.\n\nResources needed:\n\u2022 Logistics coordinators\n\u2022 Fuel suppliers\n\u2022 Emergency responders\n\u2022 Tracking system developers\",8/7/2026,8/9/2026,0,1f216773-8929-4a3d-849c-f003ede18432,PlanExe\n0e640711-9b7b-40cb-97d4-4c546f03f176,Implement Centralized Logistics Management System,\"Implement Centralized Logistics Management System\n\nDescription:\nObjective: Implement a system for managing logistics and transportation in real-time. Scope: Includes selecting a management platform, integrating data feeds, and training personnel. Steps: 1) Evaluate available logistics management platforms. 2) Procure and implement the selected platform. 3) Integrate data feeds from various sources. 4) Train personnel on the system. Deliverables: A fully functional centralized logistics management system.\n\nResources needed:\n\u2022 Logistics specialists\n\u2022 IT specialists\n\u2022 Training personnel\n\u2022 Data analysts\",8/9/2026,8/11/2026,0,40b2d5e5-fe40-4bd4-869c-e0bfc5b04042,PlanExe\n70665391-383d-4d47-879a-d6650db1950f,Evacuation Planning & Execution,,8/11/2026,9/23/2026,0,05ade5fb-1a2d-4c8b-87fb-1d9978b63b3a,PlanExe\n1fa5824f-19d6-4ae1-9453-3c3e01d1f1fe,Define Evacuation Zones,,8/11/2026,8/19/2026,0,70665391-383d-4d47-879a-d6650db1950f,PlanExe\n2ee61c9e-49d6-4f2d-befe-a1fbee372db1,Gather geological data for zone mapping,\"Gather geological data for zone mapping\n\nDescription:\nCollect and analyze geological data, including volcanic hazard assessments, lahar flow paths, and pyroclastic flow hazard mapping, to inform the definition of evacuation zones.\n\nResources needed:\n\u2022 Geologists\n\u2022 GIS specialists\n\u2022 Volcanologists\n\u2022 USGS data\",8/11/2026,8/13/2026,0,1fa5824f-19d6-4ae1-9453-3c3e01d1f1fe,PlanExe\n49446a17-3fb5-423d-b485-9ec17546c6c2,Model ashfall dispersion for zone impact,\"Model ashfall dispersion for zone impact\n\nDescription:\nSimulate ashfall dispersion patterns using HYSPLIT or similar models to determine the potential impact on different areas and refine evacuation zone boundaries.\n\nResources needed:\n\u2022 Atmospheric scientists\n\u2022 Meteorologists\n\u2022 HYSPLIT software\n\u2022 Computational resources\",8/13/2026,8/15/2026,0,2ee61c9e-49d6-4f2d-befe-a1fbee372db1,PlanExe\n50cb4f0e-744e-49ed-a1c2-008d4f2d79b0,Define evacuation zone boundaries,\"Define evacuation zone boundaries\n\nDescription:\nBased on geological data and ashfall modeling, define the boundaries of evacuation zones, considering factors such as population density, infrastructure, and accessibility.\n\nResources needed:\n\u2022 Emergency managers\n\u2022 GIS specialists\n\u2022 Local government officials\n\u2022 Maps\",8/15/2026,8/17/2026,0,49446a17-3fb5-423d-b485-9ec17546c6c2,PlanExe\n5070781c-2a81-4540-87ea-6c5a080e24a4,Review and validate zone definitions,\"Review and validate zone definitions\n\nDescription:\nConsult with experts and stakeholders to review and validate the defined evacuation zone boundaries, ensuring they are accurate, feasible, and aligned with the overall evacuation plan.\n\nResources needed:\n\u2022 Volcanologists\n\u2022 Emergency managers\n\u2022 Local community representatives\n\u2022 Legal counsel\",8/17/2026,8/19/2026,0,1fa5824f-19d6-4ae1-9453-3c3e01d1f1fe,PlanExe\ndc8066c0-3083-43e6-8d1d-2eefb88cde24,Establish Evacuation Trigger Protocol,,8/19/2026,8/24/2026,0,1fa5824f-19d6-4ae1-9453-3c3e01d1f1fe,PlanExe\n0ade58d2-75b3-45d6-bff3-ab8bd3a9d23e,Define Eruption Intensity Thresholds,\"Define Eruption Intensity Thresholds\n\nDescription:\nEstablish specific, measurable criteria based on USGS data (seismic activity, gas emissions, ground deformation) that will trigger the evacuation order. This includes defining thresholds for VEI levels and associated evacuation zone expansions.\n\nResources needed:\n\u2022 Volcanologists\n\u2022 Geologists\n\u2022 USGS Data\n\u2022 Emergency Management Specialists\",8/19/2026,8/20/2026,0,dc8066c0-3083-43e6-8d1d-2eefb88cde24,PlanExe\n48e8887b-a022-473e-a69f-fef910a59c11,Establish Communication Channels Activation,\"Establish Communication Channels Activation\n\nDescription:\nDefine the specific communication channels (IPAWS, radio, social media) to be activated at each trigger level. This includes pre-scripted messages and dissemination protocols.\n\nResources needed:\n\u2022 Communication Specialists\n\u2022 IPAWS Access\n\u2022 Social Media Management Tools\n\u2022 Emergency Alert System\",8/20/2026,8/21/2026,0,0ade58d2-75b3-45d6-bff3-ab8bd3a9d23e,PlanExe\ndcb17520-2deb-4485-a0cc-b55f5c47dfa9,Formalize Authority Activation Chain,\"Formalize Authority Activation Chain\n\nDescription:\nDocument the chain of command and decision-making process for activating the evacuation order, including primary and secondary decision-makers and their respective responsibilities. This includes legal review and approval.\n\nResources needed:\n\u2022 Legal Counsel\n\u2022 Emergency Management Director\n\u2022 State Governor\n\u2022 FEMA Representatives\",8/21/2026,8/22/2026,0,48e8887b-a022-473e-a69f-fef910a59c11,PlanExe\n56edc134-3db2-4392-9c8e-7e285fc69099,Develop Protocol for False Alarms,\"Develop Protocol for False Alarms\n\nDescription:\nCreate a protocol for managing potential false alarms, including procedures for verifying the threat, communicating with the public, and standing down the evacuation order if necessary. This includes criteria for determining a false alarm.\n\nResources needed:\n\u2022 Public Relations Team\n\u2022 Volcanologists\n\u2022 Emergency Management Specialists\n\u2022 Communication Systems\",8/22/2026,8/23/2026,0,dcb17520-2deb-4485-a0cc-b55f5c47dfa9,PlanExe\n6ed2a18c-1c29-44c4-b492-718f13856b28,Document Evacuation Order Dissemination,\"Document Evacuation Order Dissemination\n\nDescription:\nDetail the specific steps for disseminating the evacuation order to the public, including the timing, methods, and content of the message. This includes multilingual support and accessibility considerations.\n\nResources needed:\n\u2022 Public Affairs Officer\n\u2022 Translation Services\n\u2022 Accessibility Experts\n\u2022 Communication Infrastructure\",8/23/2026,8/24/2026,0,dc8066c0-3083-43e6-8d1d-2eefb88cde24,PlanExe\nac17abf5-f7cf-4752-9b84-bdd796dad8d1,Develop Traffic Flow Optimization Strategy,,8/24/2026,9/3/2026,0,dc8066c0-3083-43e6-8d1d-2eefb88cde24,PlanExe\n9ab695ef-3b35-41f3-bd6c-dd4d0d8e25a1,Analyze current traffic patterns,\"Analyze current traffic patterns\n\nDescription:\nObjective: Understand existing traffic flow to identify bottlenecks. Scope: Review historical traffic data, conduct on-site observations, and analyze road network capacity. Steps: Collect traffic data, model traffic flow, and identify congestion points. Deliverables: Traffic flow analysis report.\n\nResources needed:\n\u2022 Traffic engineers\n\u2022 Data analysts\n\u2022 GIS software\n\u2022 Traffic counters\",8/24/2026,8/26/2026,0,ac17abf5-f7cf-4752-9b84-bdd796dad8d1,PlanExe\nf559778f-38a0-4318-90cf-b6853fecf0d9,Identify alternative evacuation routes,\"Identify alternative evacuation routes\n\nDescription:\nObjective: Determine viable alternative routes in case of primary route blockage. Scope: Evaluate secondary roads, assess bridge capacity, and identify potential detours. Steps: Map alternative routes, assess road conditions, and estimate travel times. Deliverables: Alternative evacuation route map.\n\nResources needed:\n\u2022 Civil engineers\n\u2022 GIS specialists\n\u2022 Road maintenance crews\n\u2022 Mapping software\",8/26/2026,8/28/2026,0,9ab695ef-3b35-41f3-bd6c-dd4d0d8e25a1,PlanExe\n5f8fc2f6-ecf5-416d-95cb-73b21abfdc43,Implement contraflow lane management,\"Implement contraflow lane management\n\nDescription:\nObjective: Optimize traffic flow by reversing lane directions. Scope: Design contraflow lane configurations, install signage, and train personnel. Steps: Plan contraflow routes, deploy signage, and conduct training exercises. Deliverables: Contraflow lane management plan.\n\nResources needed:\n\u2022 Traffic management specialists\n\u2022 Signage crews\n\u2022 Law enforcement\n\u2022 Traffic cones\",8/28/2026,8/30/2026,0,f559778f-38a0-4318-90cf-b6853fecf0d9,PlanExe\nbefbfde5-6321-43ba-a936-024836cf842d,Coordinate traffic control personnel,\"Coordinate traffic control personnel\n\nDescription:\nObjective: Ensure effective traffic management during evacuation. Scope: Deploy personnel at key intersections, establish communication protocols, and provide training. Steps: Assign personnel to locations, establish communication channels, and conduct training. Deliverables: Traffic control personnel deployment plan.\n\nResources needed:\n\u2022 Law enforcement\n\u2022 Traffic controllers\n\u2022 Communication equipment\n\u2022 Training materials\",8/30/2026,9/1/2026,0,5f8fc2f6-ecf5-416d-95cb-73b21abfdc43,PlanExe\n1ab6b739-3ff5-4669-a8f9-5f085e6aeff3,Simulate traffic flow under evacuation conditions,\"Simulate traffic flow under evacuation conditions\n\nDescription:\nObjective: Validate the effectiveness of the traffic flow optimization strategy. Scope: Model traffic flow with evacuation parameters, identify potential bottlenecks, and refine the plan. Steps: Input evacuation data into traffic model, run simulations, and analyze results. Deliverables: Traffic simulation report.\n\nResources needed:\n\u2022 Traffic modelers\n\u2022 Simulation software\n\u2022 Data analysts\n\u2022 High-performance computers\",9/1/2026,9/3/2026,0,ac17abf5-f7cf-4752-9b84-bdd796dad8d1,PlanExe\n5c9c360d-0d4e-4f4a-9220-18f4c4843246,Implement Public Communication Strategy,,9/3/2026,9/13/2026,0,ac17abf5-f7cf-4752-9b84-bdd796dad8d1,PlanExe\nd320f252-27d5-4052-879a-d023dbfa4590,Identify Target Audiences,\"Identify Target Audiences\n\nDescription:\nDefine specific groups (tourists, residents, non-English speakers) to tailor messaging.\n\nResources needed:\n\u2022 Demographic data\n\u2022 Communication specialists\",9/3/2026,9/5/2026,0,5c9c360d-0d4e-4f4a-9220-18f4c4843246,PlanExe\na2a2b811-1c3a-4ec8-839f-cb926e47f1bd,Craft Key Messages,\"Craft Key Messages\n\nDescription:\nDevelop clear, concise, and actionable messages for each target audience.\n\nResources needed:\n\u2022 Communication specialists\n\u2022 Volcanologists\n\u2022 Emergency managers\",9/5/2026,9/7/2026,0,d320f252-27d5-4052-879a-d023dbfa4590,PlanExe\n6b115bb3-98d1-4bdb-83f0-836a18c2c879,Select Communication Channels,\"Select Communication Channels\n\nDescription:\nDetermine the most effective channels (radio, TV, social media, IPAWS) for reaching each audience.\n\nResources needed:\n\u2022 Communication specialists\n\u2022 IT support\n\u2022 Emergency managers\",9/7/2026,9/9/2026,0,a2a2b811-1c3a-4ec8-839f-cb926e47f1bd,PlanExe\nb623cfcc-604f-42f2-bd56-1bf3fb891ada,Develop Multilingual Alerts,\"Develop Multilingual Alerts\n\nDescription:\nTranslate key messages into multiple languages to reach non-English speakers.\n\nResources needed:\n\u2022 Translators\n\u2022 Communication specialists\",9/9/2026,9/11/2026,0,6b115bb3-98d1-4bdb-83f0-836a18c2c879,PlanExe\n4cbc0f64-5066-44fc-8a2b-43d1cbfe2415,Monitor and Address Misinformation,\"Monitor and Address Misinformation\n\nDescription:\nActively monitor social media and other channels for misinformation and provide accurate updates.\n\nResources needed:\n\u2022 Social media monitoring tools\n\u2022 Communication specialists\",9/11/2026,9/13/2026,0,5c9c360d-0d4e-4f4a-9220-18f4c4843246,PlanExe\n4ffa5915-6ff3-48f6-8366-e1fbb95b6994,Conduct Evacuation Drills,,9/13/2026,9/23/2026,0,70665391-383d-4d47-879a-d6650db1950f,PlanExe\nfac5343f-11c1-4839-881c-2e9cb7dd58fc,Plan Evacuation Drill Scenarios,\"Plan Evacuation Drill Scenarios\n\nDescription:\nDevelop realistic evacuation drill scenarios that simulate various eruption conditions and logistical challenges. This includes defining objectives, scope, and key performance indicators (KPIs) for each drill.\n\nResources needed:\n\u2022 Emergency Management Specialists\n\u2022 Volcanologists\n\u2022 Logistics Coordinators\",9/13/2026,9/15/2026,0,4ffa5915-6ff3-48f6-8366-e1fbb95b6994,PlanExe\n7e87cf12-f940-494a-b7c7-49fc34b352de,Secure Drill Participation,\"Secure Drill Participation\n\nDescription:\nRecruit and engage participants from the public, emergency response agencies, and relevant organizations. This includes developing communication materials, offering incentives, and coordinating logistics for participant involvement.\n\nResources needed:\n\u2022 Public Affairs Officers\n\u2022 Community Outreach Coordinators\n\u2022 Volunteer Coordinators\",9/15/2026,9/17/2026,0,fac5343f-11c1-4839-881c-2e9cb7dd58fc,PlanExe\n87014429-83e3-43fe-9bc1-84194eb9bc64,Conduct Tabletop Exercise,\"Conduct Tabletop Exercise\n\nDescription:\nBefore a full-scale drill, conduct a tabletop exercise to validate the evacuation plan and identify potential gaps or weaknesses. This involves bringing together key stakeholders to discuss and simulate the evacuation process.\n\nResources needed:\n\u2022 Emergency Management Specialists\n\u2022 Agency Representatives\n\u2022 Facilitator\",9/17/2026,9/19/2026,0,7e87cf12-f940-494a-b7c7-49fc34b352de,PlanExe\n5ead3571-ef4d-4de1-b0ef-ab81f6b9694f,Execute Evacuation Drills,\"Execute Evacuation Drills\n\nDescription:\nImplement the planned evacuation drills, ensuring safety and adherence to established protocols. This includes setting up the drill environment, monitoring participant performance, and collecting data for evaluation.\n\nResources needed:\n\u2022 Emergency Responders\n\u2022 Safety Officers\n\u2022 Observers\",9/19/2026,9/21/2026,0,87014429-83e3-43fe-9bc1-84194eb9bc64,PlanExe\n420ef8ea-97b9-41f4-8fa6-cbe4a8d962ab,Analyze Drill Results and Improve Plan,\"Analyze Drill Results and Improve Plan\n\nDescription:\nEvaluate the results of the evacuation drills, identify areas for improvement, and update the evacuation plan accordingly. This includes documenting lessons learned, revising procedures, and conducting follow-up training.\n\nResources needed:\n\u2022 Emergency Management Specialists\n\u2022 Data Analysts\n\u2022 Training Coordinators\",9/21/2026,9/23/2026,0,4ffa5915-6ff3-48f6-8366-e1fbb95b6994,PlanExe\ne9f43038-8c65-4121-906a-ed59b4c85cea,Communication & Command Control,,9/23/2026,10/6/2026,0,70665391-383d-4d47-879a-d6650db1950f,PlanExe\n2b4ed5fe-c723-4b20-9d9c-6bf65e47cb94,Establish Communication Redundancy Strategy,,9/23/2026,9/27/2026,0,e9f43038-8c65-4121-906a-ed59b4c85cea,PlanExe\n380e299a-43ee-4eb5-9602-4a49e85bdbc5,Identify Communication System Dependencies,\"Identify Communication System Dependencies\n\nDescription:\nObjective: Map all dependencies for each communication system (IPAWS, satellite phones, radio). Scope: Identify hardware, software, network, and personnel dependencies. Steps: Review system documentation, conduct interviews with IT staff, create dependency diagrams. Deliverables: Dependency matrix for each system.\n\nResources needed:\n\u2022 IT Specialists\n\u2022 Communication Engineers\n\u2022 System Documentation\",9/23/2026,9/24/2026,0,2b4ed5fe-c723-4b20-9d9c-6bf65e47cb94,PlanExe\na898a644-8846-43b6-b024-71bf3be938d2,Assess System Interoperability,\"Assess System Interoperability\n\nDescription:\nObjective: Evaluate the ability of different communication systems to work together seamlessly. Scope: Test data exchange, voice communication, and system integration. Steps: Conduct interoperability testing, analyze test results, identify compatibility issues. Deliverables: Interoperability test report.\n\nResources needed:\n\u2022 Communication Technicians\n\u2022 Testing Equipment\n\u2022 Interoperability Protocols\",9/24/2026,9/25/2026,0,380e299a-43ee-4eb5-9602-4a49e85bdbc5,PlanExe\n7bc06333-1d83-4cbe-984c-38c4f0490380,Secure Satellite Phone Inventory,\"Secure Satellite Phone Inventory\n\nDescription:\nObjective: Ensure sufficient satellite phones are available and ready for deployment. Scope: Verify inventory, test functionality, and establish distribution protocols. Steps: Conduct inventory audit, test phone functionality, develop distribution plan. Deliverables: Satellite phone inventory report and distribution plan.\n\nResources needed:\n\u2022 Logistics Personnel\n\u2022 Satellite Phones\n\u2022 Inventory Management System\",9/25/2026,9/26/2026,0,a898a644-8846-43b6-b024-71bf3be938d2,PlanExe\nf54e3f8d-1aae-4d50-8ecb-3435636f0c22,Establish Backup Communication Protocols,\"Establish Backup Communication Protocols\n\nDescription:\nObjective: Define alternative communication methods in case primary systems fail. Scope: Identify backup systems (e.g., amateur radio, runners), develop communication protocols, and train personnel. Steps: Research backup systems, create communication protocols, conduct training exercises. Deliverables: Backup communication protocol document and training materials.\n\nResources needed:\n\u2022 Communication Experts\n\u2022 Training Staff\n\u2022 Backup Communication Equipment\",9/26/2026,9/27/2026,0,2b4ed5fe-c723-4b20-9d9c-6bf65e47cb94,PlanExe\ncc00671f-963e-41a6-b510-247c0eca7ebc,Define Command & Control Decentralization,,9/27/2026,10/2/2026,0,2b4ed5fe-c723-4b20-9d9c-6bf65e47cb94,PlanExe\ndd98842b-2646-42e2-a0d0-2beb1dc490f4,Identify Key Decision-Makers,\"Identify Key Decision-Makers\n\nDescription:\nObjective: Determine individuals with authority to transfer command.\nScope: Identify roles, responsibilities, and contact information.\nSteps: Review organizational charts, conduct interviews, document findings.\nDeliverables: List of key decision-makers with contact details.\n\nResources needed:\n\u2022 Project Manager\n\u2022 Legal Counsel\n\u2022 Emergency Management Specialist\",9/27/2026,9/28/2026,0,cc00671f-963e-41a6-b510-247c0eca7ebc,PlanExe\ndd0fc9f4-b8aa-4cff-b661-1c639ca6059c,Document Authority Transfer Scenarios,\"Document Authority Transfer Scenarios\n\nDescription:\nObjective: Define specific scenarios requiring command decentralization.\nScope: Identify potential triggers and corresponding actions.\nSteps: Conduct risk assessment, develop scenario matrix, document protocols.\nDeliverables: Authority transfer scenario documentation.\n\nResources needed:\n\u2022 Emergency Management Specialist\n\u2022 Risk Analyst\n\u2022 Legal Counsel\",9/28/2026,9/29/2026,0,dd98842b-2646-42e2-a0d0-2beb1dc490f4,PlanExe\n0fbc2659-4f3d-4897-be95-dcfdb92c4538,Establish Communication Protocols,\"Establish Communication Protocols\n\nDescription:\nObjective: Define communication methods during authority transfer.\nScope: Ensure seamless information flow between command levels.\nSteps: Develop communication plan, test communication systems, train personnel.\nDeliverables: Communication protocols and training materials.\n\nResources needed:\n\u2022 Communication Specialist\n\u2022 IT Support\n\u2022 Training Coordinator\",9/29/2026,9/30/2026,0,dd0fc9f4-b8aa-4cff-b661-1c639ca6059c,PlanExe\n4f346437-bb66-4932-b8b7-99af7ad98966,Develop Delegation of Authority Matrix,\"Develop Delegation of Authority Matrix\n\nDescription:\nObjective: Clearly define delegated powers during decentralization.\nScope: Specify responsibilities and decision-making authority.\nSteps: Create matrix, review with stakeholders, obtain approvals.\nDeliverables: Delegation of Authority Matrix.\n\nResources needed:\n\u2022 Project Manager\n\u2022 Legal Counsel\n\u2022 Emergency Management Specialist\",9/30/2026,10/1/2026,0,0fbc2659-4f3d-4897-be95-dcfdb92c4538,PlanExe\n78dbaf86-cf24-4a4a-8933-51f9ebab5cb4,Conduct Training on Decentralization,\"Conduct Training on Decentralization\n\nDescription:\nObjective: Prepare personnel for decentralized command roles.\nScope: Provide training on protocols, systems, and decision-making.\nSteps: Develop training materials, conduct workshops, evaluate effectiveness.\nDeliverables: Trained personnel and training records.\n\nResources needed:\n\u2022 Training Coordinator\n\u2022 Emergency Management Specialist\n\u2022 Subject Matter Experts\",10/1/2026,10/2/2026,0,cc00671f-963e-41a6-b510-247c0eca7ebc,PlanExe\ncdb32941-90af-489c-a1bd-211c63bf52a1,Develop Command Structure Adaptability,,10/2/2026,10/6/2026,0,e9f43038-8c65-4121-906a-ed59b4c85cea,PlanExe\n52559213-b755-41ea-8bd6-352afff0e09d,Identify potential adaptation triggers,\"Identify potential adaptation triggers\n\nDescription:\nDefine specific events or conditions that would necessitate changes to the command structure. This includes changes in eruption intensity, environmental conditions, or resource availability. Objective: Establish clear criteria for adapting the command structure. Scope: Define triggers based on scientific data, operational constraints, and stakeholder input. Steps: Review existing data, consult with experts, and develop a trigger matrix. Deliverables: Trigger matrix document.\n\nResources needed:\n\u2022 Volcanologists\n\u2022 Emergency managers\n\u2022 Data analysts\",10/2/2026,10/3/2026,0,cdb32941-90af-489c-a1bd-211c63bf52a1,PlanExe\n3101f9d6-3cac-4fac-ad2a-52eb10871f48,Develop adaptable command structure models,\"Develop adaptable command structure models\n\nDescription:\nCreate multiple command structure models that can be implemented based on the identified triggers. These models should outline roles, responsibilities, and communication channels for each scenario. Objective: Design flexible command structures. Scope: Develop models for various eruption scenarios and resource levels. Steps: Brainstorm potential structures, map roles and responsibilities, and document communication flows. Deliverables: Command structure model diagrams and documentation.\n\nResources needed:\n\u2022 Organizational design experts\n\u2022 Emergency management specialists\n\u2022 Communication specialists\",10/3/2026,10/4/2026,0,52559213-b755-41ea-8bd6-352afff0e09d,PlanExe\nde03c9ef-1c05-4f3d-9824-984b219edab3,Establish communication protocols for adaptation,\"Establish communication protocols for adaptation\n\nDescription:\nDefine clear communication protocols for notifying personnel and implementing changes to the command structure. This includes identifying key communication channels and establishing procedures for disseminating information. Objective: Ensure timely and effective communication during adaptation. Scope: Define protocols for various communication channels and stakeholder groups. Steps: Develop communication templates, identify key contacts, and test communication systems. Deliverables: Communication protocol document and contact list.\n\nResources needed:\n\u2022 Communication specialists\n\u2022 IT support\n\u2022 Emergency managers\",10/4/2026,10/5/2026,0,3101f9d6-3cac-4fac-ad2a-52eb10871f48,PlanExe\n2897c237-73e2-4040-97e1-f8d83cb05fb3,Conduct training on adaptable command structure,\"Conduct training on adaptable command structure\n\nDescription:\nProvide training to personnel on the different command structure models and communication protocols. This training should include simulations and exercises to prepare personnel for adapting to changing conditions. Objective: Prepare personnel for adaptable command. Scope: Train all relevant personnel on command structure models and communication protocols. Steps: Develop training materials, conduct training sessions, and evaluate training effectiveness. Deliverables: Training materials and training records.\n\nResources needed:\n\u2022 Trainers\n\u2022 Simulation equipment\n\u2022 Emergency managers\",10/5/2026,10/6/2026,0,cdb32941-90af-489c-a1bd-211c63bf52a1,PlanExe\n859f5ec2-01ce-4001-af46-c8721193063a,Ashfall Mitigation,,10/6/2026,11/7/2026,0,e9f43038-8c65-4121-906a-ed59b4c85cea,PlanExe\nfbb0a579-0f12-455f-a70a-6e5fc18209b9,Develop Ashfall Mitigation Strategy,,10/6/2026,10/16/2026,0,859f5ec2-01ce-4001-af46-c8721193063a,PlanExe\nee2226a6-aacf-4930-8bfe-12b20e16fc40,Research ash removal equipment options,\"Research ash removal equipment options\n\nDescription:\nObjective: Identify suitable ash removal equipment based on ashfall characteristics and infrastructure needs.\nScope: Research various types of equipment, including snowplows, street sweepers, vacuum trucks, and heavy machinery.\nSteps: 1. Gather data on ashfall properties (density, particle size). 2. Assess infrastructure vulnerabilities. 3. Research available equipment options. 4. Evaluate equipment performance and cost-effectiveness.\nDeliverables: A report summarizing suitable ash removal equipment options.\n\nResources needed:\n\u2022 Civil engineers\n\u2022 Equipment specialists\n\u2022 Research analysts\",10/6/2026,10/8/2026,0,fbb0a579-0f12-455f-a70a-6e5fc18209b9,PlanExe\ne71d060a-780c-45e0-9e43-3f22b44fc832,Assess equipment specifications and capacity,\"Assess equipment specifications and capacity\n\nDescription:\nObjective: Determine the required specifications and capacity of ash removal equipment.\nScope: Analyze the volume of ashfall expected and the area to be cleared.\nSteps: 1. Estimate ashfall volume based on eruption scenarios. 2. Calculate the area to be cleared. 3. Determine the required equipment capacity. 4. Evaluate equipment maneuverability and accessibility.\nDeliverables: A report outlining the required equipment specifications and capacity.\n\nResources needed:\n\u2022 Civil engineers\n\u2022 Meteorologists\n\u2022 GIS specialists\",10/8/2026,10/10/2026,0,ee2226a6-aacf-4930-8bfe-12b20e16fc40,PlanExe\n867afe69-25d0-4403-b89d-ed8b39bfdb9e,Evaluate vendor options and pricing,\"Evaluate vendor options and pricing\n\nDescription:\nObjective: Identify potential vendors and evaluate their pricing and availability.\nScope: Research equipment vendors and obtain quotes for ash removal equipment.\nSteps: 1. Identify potential equipment vendors. 2. Obtain quotes for various equipment options. 3. Evaluate vendor reputation and reliability. 4. Negotiate pricing and delivery terms.\nDeliverables: A report comparing vendor options and pricing.\n\nResources needed:\n\u2022 Procurement specialists\n\u2022 Contract managers\n\u2022 Financial analysts\",10/10/2026,10/12/2026,0,e71d060a-780c-45e0-9e43-3f22b44fc832,PlanExe\n47bd8fef-4602-462a-8305-852f244cd9d0,Secure equipment contracts and agreements,\"Secure equipment contracts and agreements\n\nDescription:\nObjective: Finalize contracts and agreements with selected equipment vendors.\nScope: Prepare and execute contracts for the procurement or lease of ash removal equipment.\nSteps: 1. Draft equipment contracts. 2. Review contracts with legal counsel. 3. Obtain necessary approvals. 4. Execute contracts with selected vendors.\nDeliverables: Signed contracts and agreements with equipment vendors.\n\nResources needed:\n\u2022 Legal counsel\n\u2022 Contract managers\n\u2022 Procurement specialists\",10/12/2026,10/14/2026,0,867afe69-25d0-4403-b89d-ed8b39bfdb9e,PlanExe\n0fcbb183-fb38-492d-a0d6-42814000a531,Coordinate equipment delivery and staging,\"Coordinate equipment delivery and staging\n\nDescription:\nObjective: Coordinate the delivery and staging of ash removal equipment.\nScope: Arrange for the transportation and storage of equipment at designated staging areas.\nSteps: 1. Coordinate equipment delivery schedules. 2. Arrange for transportation to staging areas. 3. Secure staging areas. 4. Inspect equipment upon arrival.\nDeliverables: Ash removal equipment delivered and staged at designated locations.\n\nResources needed:\n\u2022 Logistics coordinators\n\u2022 Transportation specialists\n\u2022 Warehouse personnel\",10/14/2026,10/16/2026,0,fbb0a579-0f12-455f-a70a-6e5fc18209b9,PlanExe\nc4201650-9932-477f-8c20-b00a83a92cf2,Procure Ash Removal Equipment,,10/16/2026,10/26/2026,0,fbb0a579-0f12-455f-a70a-6e5fc18209b9,PlanExe\nec2ac19c-28a0-4ab8-9012-2e96e415eda2,Identify Ash Removal Equipment Needs,\"Identify Ash Removal Equipment Needs\n\nDescription:\nDetermine the specific types and quantities of ash removal equipment required based on the expected ashfall depth, area to be cleared, and types of surfaces to be cleaned (roads, roofs, etc.). This includes considering specialized equipment for sensitive areas like airports or hospitals.\n\nResources needed:\n\u2022 Civil Engineers\n\u2022 Environmental Scientists\n\u2022 Logistics Specialists\n\u2022 GIS Data\n\u2022 Ashfall Prediction Models\",10/16/2026,10/18/2026,0,c4201650-9932-477f-8c20-b00a83a92cf2,PlanExe\n7c663b81-66ae-4cfc-808b-a0e92f53c520,Research and Evaluate Equipment Options,\"Research and Evaluate Equipment Options\n\nDescription:\nConduct thorough research on available ash removal equipment, including snowplows, street sweepers, vacuum trucks, loaders, and specialized equipment for sensitive areas. Evaluate each option based on effectiveness, cost, availability, maintenance requirements, and environmental impact.\n\nResources needed:\n\u2022 Procurement Specialists\n\u2022 Equipment Operators\n\u2022 Environmental Engineers\n\u2022 Technical Specifications\n\u2022 Vendor Catalogs\",10/18/2026,10/20/2026,0,ec2ac19c-28a0-4ab8-9012-2e96e415eda2,PlanExe\n70bccb8c-8c4b-45b3-9c9a-9f5c29230652,Assess Infrastructure Vulnerability to Ash,\"Assess Infrastructure Vulnerability to Ash\n\nDescription:\nEvaluate the vulnerability of critical infrastructure (power plants, water treatment facilities, communication networks, transportation hubs) to ashfall. This includes assessing the structural integrity of buildings, the sensitivity of equipment to ash contamination, and the potential for disruptions to essential services.\n\nResources needed:\n\u2022 Structural Engineers\n\u2022 Electrical Engineers\n\u2022 Telecommunications Specialists\n\u2022 Infrastructure Maps\n\u2022 Ashfall Impact Data\",10/20/2026,10/22/2026,0,7c663b81-66ae-4cfc-808b-a0e92f53c520,PlanExe\n4a806d3a-74a1-4cc3-92ff-6302655522ba,Prioritize Equipment Procurement,\"Prioritize Equipment Procurement\n\nDescription:\nBased on the identified needs and infrastructure vulnerabilities, prioritize the procurement of ash removal equipment. This includes determining the optimal mix of equipment types, quantities, and delivery schedules to ensure timely and effective ash removal.\n\nResources needed:\n\u2022 Emergency Management Planners\n\u2022 Budget Analysts\n\u2022 Logistics Coordinators\n\u2022 Risk Assessment Reports\n\u2022 Infrastructure Prioritization List\",10/22/2026,10/24/2026,0,70bccb8c-8c4b-45b3-9c9a-9f5c29230652,PlanExe\n63e2452d-caf1-43f4-89f5-79f149a75979,Secure Equipment Procurement Contracts,\"Secure Equipment Procurement Contracts\n\nDescription:\nNegotiate and secure contracts with equipment suppliers, ensuring favorable pricing, delivery terms, and maintenance agreements. This includes complying with all applicable procurement regulations and ensuring that the equipment meets the required specifications.\n\nResources needed:\n\u2022 Contract Specialists\n\u2022 Legal Counsel\n\u2022 Procurement Officers\n\u2022 Vendor Agreements\n\u2022 Funding Approvals\",10/24/2026,10/26/2026,0,c4201650-9932-477f-8c20-b00a83a92cf2,PlanExe\nfb262393-0577-4d64-bcb5-5b93ddddb6a4,Identify Critical Infrastructure for Protection,,10/26/2026,11/7/2026,0,859f5ec2-01ce-4001-af46-c8721193063a,PlanExe\na10fcbd3-133b-4364-9a4b-41415d148f17,Gather Infrastructure Data,\"Gather Infrastructure Data\n\nDescription:\nCollect detailed data on critical infrastructure, including location, function, capacity, and condition. This includes reviewing existing documentation, conducting site visits, and consulting with infrastructure owners.\n\nResources needed:\n\u2022 GIS specialists\n\u2022 Engineers\n\u2022 Inspectors\n\u2022 Database administrators\",10/26/2026,10/29/2026,0,fb262393-0577-4d64-bcb5-5b93ddddb6a4,PlanExe\n32ae3ae1-36a7-4fce-8071-589134ddabb6,Assess Infrastructure Vulnerability,\"Assess Infrastructure Vulnerability\n\nDescription:\nEvaluate the vulnerability of critical infrastructure to ashfall, considering factors such as structural integrity, exposure, and operational dependencies. This includes conducting vulnerability assessments, modeling ashfall impacts, and identifying potential failure points.\n\nResources needed:\n\u2022 Structural engineers\n\u2022 Geologists\n\u2022 Risk assessment specialists\n\u2022 Modeling software\",10/29/2026,11/1/2026,0,a10fcbd3-133b-4364-9a4b-41415d148f17,PlanExe\nfe008065-9f81-41b5-8a44-c45c1244e33a,Prioritize Infrastructure Protection,\"Prioritize Infrastructure Protection\n\nDescription:\nDevelop a prioritized list of critical infrastructure for protection based on vulnerability, importance, and feasibility of mitigation measures. This includes establishing criteria for prioritization, conducting stakeholder consultations, and developing a consensus-based ranking.\n\nResources needed:\n\u2022 Emergency managers\n\u2022 Infrastructure owners\n\u2022 Community representatives\n\u2022 Decision-making framework\",11/1/2026,11/4/2026,0,32ae3ae1-36a7-4fce-8071-589134ddabb6,PlanExe\n81ecbb41-a449-4e53-9f9c-43b3b751f933,Document Protection Strategies,\"Document Protection Strategies\n\nDescription:\nDocument specific protection strategies for each prioritized infrastructure asset, including ash removal procedures, structural reinforcement measures, and operational contingency plans. This includes developing detailed plans, creating training materials, and conducting drills.\n\nResources needed:\n\u2022 Engineers\n\u2022 Emergency responders\n\u2022 Training specialists\n\u2022 Documentation software\",11/4/2026,11/7/2026,0,fb262393-0577-4d64-bcb5-5b93ddddb6a4,PlanExe\nbda5ac04-0e4f-449a-8a58-21083c4fca2f,Long-Term Recovery,,11/7/2026,11/6/2028,0,f74a79bc-497f-4d79-9c7f-f968f50b2149,PlanExe\n22424763-7e4d-452d-b942-5295d577a780,Implement Long-Term Recovery Plan,,11/7/2026,5/10/2028,0,bda5ac04-0e4f-449a-8a58-21083c4fca2f,PlanExe\nb8aaac8d-646c-4208-b19a-d7916adf4f4d,Establish Recovery Task Force,\"Establish Recovery Task Force\n\nDescription:\nForm a task force comprised of representatives from government agencies, community organizations, and private sector entities to oversee the implementation of the long-term recovery plan. This includes defining roles, responsibilities, and decision-making processes.\n\nResources needed:\n\u2022 Project Manager\n\u2022 Government Liaisons\n\u2022 Community Representatives\n\u2022 Legal Counsel\",11/7/2026,2/25/2027,0,22424763-7e4d-452d-b942-5295d577a780,PlanExe\n31924e3a-345d-46c3-99ce-9886c42b1144,Prioritize Recovery Projects,\"Prioritize Recovery Projects\n\nDescription:\nDevelop a framework for prioritizing recovery projects based on factors such as community needs, economic impact, and environmental sustainability. This includes establishing clear criteria for evaluating project proposals and allocating resources.\n\nResources needed:\n\u2022 Economists\n\u2022 Urban Planners\n\u2022 Environmental Scientists\n\u2022 Community Leaders\",2/25/2027,6/15/2027,0,b8aaac8d-646c-4208-b19a-d7916adf4f4d,PlanExe\na955ea32-0213-4674-801c-10f898778ca7,Manage Resource Distribution,\"Manage Resource Distribution\n\nDescription:\nEstablish a system for efficiently and equitably distributing resources to affected communities and individuals. This includes setting up distribution centers, coordinating logistics, and tracking resource allocation.\n\nResources needed:\n\u2022 Logistics Coordinators\n\u2022 Supply Chain Managers\n\u2022 Volunteers\n\u2022 Transportation Vehicles\",6/15/2027,10/3/2027,0,31924e3a-345d-46c3-99ce-9886c42b1144,PlanExe\nb0afaf75-eec3-4ee6-9d93-1f26e0222949,Monitor Progress and Adjust Plan,\"Monitor Progress and Adjust Plan\n\nDescription:\nRegularly monitor the progress of recovery projects and adjust the long-term recovery plan as needed based on changing conditions and emerging needs. This includes collecting data, conducting evaluations, and engaging with stakeholders.\n\nResources needed:\n\u2022 Data Analysts\n\u2022 Evaluation Specialists\n\u2022 Project Managers\n\u2022 Community Representatives\",10/3/2027,1/21/2028,0,a955ea32-0213-4674-801c-10f898778ca7,PlanExe\n0aab6a44-f239-4ae5-a85d-3756cbf534c6,Communicate Recovery Efforts,\"Communicate Recovery Efforts\n\nDescription:\nMaintain open and transparent communication with the public about the progress of recovery efforts. This includes providing regular updates, addressing concerns, and soliciting feedback.\n\nResources needed:\n\u2022 Public Relations Specialists\n\u2022 Communication Officers\n\u2022 Community Liaisons\n\u2022 Website Developers\",1/21/2028,5/10/2028,0,22424763-7e4d-452d-b942-5295d577a780,PlanExe\n7d8001b9-0754-424b-aaf4-223feaba3ca9,Secure Funding for Recovery Projects,,5/10/2028,9/7/2028,0,22424763-7e4d-452d-b942-5295d577a780,PlanExe\na711a3ad-38c1-41de-85d6-2698b01e7b64,Identify Potential Funding Sources (2),\"Identify Potential Funding Sources\n\nDescription:\nResearch and identify all potential funding sources for long-term recovery projects, including federal, state, private, and philanthropic organizations. This involves reviewing grant databases, contacting relevant agencies, and assessing eligibility criteria.\n\nResources needed:\n\u2022 Grant writer\n\u2022 Research analyst\n\u2022 Funding database access\",5/10/2028,6/3/2028,0,7d8001b9-0754-424b-aaf4-223feaba3ca9,PlanExe\ne203d4a1-d189-44ef-b427-6c43f8c731c1,Prepare Funding Proposals,\"Prepare Funding Proposals\n\nDescription:\nDevelop comprehensive and persuasive funding proposals tailored to each identified funding source. This includes writing grant applications, preparing budget justifications, and gathering supporting documentation.\n\nResources needed:\n\u2022 Grant writer\n\u2022 Budget analyst\n\u2022 Project manager\",6/3/2028,6/27/2028,0,a711a3ad-38c1-41de-85d6-2698b01e7b64,PlanExe\n807db08d-e864-4de7-83b2-1b1782dd55db,Lobby Key Decision-Makers,\"Lobby Key Decision-Makers\n\nDescription:\nEngage with key decision-makers at the federal, state, and local levels to advocate for funding for recovery projects. This involves scheduling meetings, presenting project proposals, and building relationships with influential stakeholders.\n\nResources needed:\n\u2022 Government relations specialist\n\u2022 Project manager\n\u2022 Community liaison\",6/27/2028,7/21/2028,0,e203d4a1-d189-44ef-b427-6c43f8c731c1,PlanExe\na44750af-dfdb-4f2b-bbbf-0a21aa096639,Manage Funding Applications,\"Manage Funding Applications\n\nDescription:\nTrack the status of all funding applications, respond to inquiries from funding agencies, and provide updates to stakeholders. This involves maintaining a database of applications, monitoring deadlines, and coordinating with project teams.\n\nResources needed:\n\u2022 Project coordinator\n\u2022 Administrative assistant\n\u2022 Database management software\",7/21/2028,8/14/2028,0,807db08d-e864-4de7-83b2-1b1782dd55db,PlanExe\nb6b327d6-6480-4884-80e6-63950f9fc250,Negotiate Funding Agreements (2),\"Negotiate Funding Agreements\n\nDescription:\nNegotiate funding agreements with successful applicants to ensure that the terms and conditions are favorable to the recovery effort. This involves reviewing legal documents, consulting with legal counsel, and securing final approval from relevant authorities.\n\nResources needed:\n\u2022 Legal counsel\n\u2022 Contract specialist\n\u2022 Project manager\",8/14/2028,9/7/2028,0,7d8001b9-0754-424b-aaf4-223feaba3ca9,PlanExe\n3a9eabfc-68fc-4744-b9f7-f8ec2a896325,Coordinate with Community Leaders,,9/7/2028,11/6/2028,0,bda5ac04-0e4f-449a-8a58-21083c4fca2f,PlanExe\n018ef0b7-c0d8-4b30-b3fa-9ee614fcb5df,Identify Key Community Leaders,\"Identify Key Community Leaders\n\nDescription:\nIdentify influential individuals and representatives from diverse community segments (e.g., neighborhood associations, faith-based organizations, business groups, vulnerable population advocates).\n\nResources needed:\n\u2022 Community Outreach Coordinator\n\u2022 Local Government Liaison\n\u2022 Demographic Data\",9/7/2028,9/19/2028,0,3a9eabfc-68fc-4744-b9f7-f8ec2a896325,PlanExe\n87b30bbc-2511-40be-9aab-e9b940617af3,Establish Communication Channels,\"Establish Communication Channels\n\nDescription:\nCreate multiple communication channels (e.g., email lists, phone conferences, online forums, in-person meetings) to facilitate information sharing and feedback collection with community l
