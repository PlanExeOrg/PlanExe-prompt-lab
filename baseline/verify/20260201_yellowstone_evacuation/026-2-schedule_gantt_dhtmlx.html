eaders.\n\nResources needed:\n\u2022 Communication Specialist\n\u2022 IT Support\n\u2022 Meeting Facilities\",9/19/2028,10/1/2028,0,018ef0b7-c0d8-4b30-b3fa-9ee614fcb5df,PlanExe\n808b902a-3e8e-4225-bebb-797adad73371,Schedule Initial Consultation Meetings,\"Schedule Initial Consultation Meetings\n\nDescription:\nSchedule and conduct initial meetings with community leaders to introduce the long-term recovery plan, solicit their input, and address any immediate concerns.\n\nResources needed:\n\u2022 Project Manager\n\u2022 Community Outreach Coordinator\n\u2022 Meeting Facilitator\",10/1/2028,10/13/2028,0,87b30bbc-2511-40be-9aab-e9b940617af3,PlanExe\nfff054e4-33bc-421b-ad1c-8375dcc324a3,Gather Community Feedback,\"Gather Community Feedback\n\nDescription:\nCollect feedback from community leaders through surveys, interviews, and focus groups to understand their priorities, needs, and concerns regarding the recovery process.\n\nResources needed:\n\u2022 Survey Tools\n\u2022 Interviewers\n\u2022 Focus Group Facilitator\",10/13/2028,10/25/2028,0,808b902a-3e8e-4225-bebb-797adad73371,PlanExe\n2bc89bd0-928b-4fed-8072-471b89b30ba9,Incorporate Feedback into Recovery Plan,\"Incorporate Feedback into Recovery Plan\n\nDescription:\nAnalyze the collected feedback and incorporate it into the long-term recovery plan to ensure that the plan reflects the community's needs and priorities.\n\nResources needed:\n\u2022 Data Analyst\n\u2022 Recovery Plan Writer\n\u2022 Project Manager\",10/25/2028,11/6/2028,0,3a9eabfc-68fc-4744-b9f7-f8ec2a896325,PlanExe\n";

      "id": "2335f00b-553d-4c79-ad84-e4e4a5ab231e",
      "text": "Identify Stakeholders",
      "custom_tooltip": "<b>Identify Stakeholders</b>",

      "open": true,
      "meta": "51e3aed6-132a-4ea5-b5d9-f4a7728cd9e4 FS",

      "type": "project"

    {
      "id": "c22264c2-4ea2-42a7-a83b-6c9cb5444d1e",
      "text": "Identify Key Stakeholder Groups",
      "custom_tooltip": "<b>Identify Key Stakeholder Groups</b><br>Identify all relevant stakeholder groups, including internal teams, external partners, regulatory bodies, and community representatives. Determine their roles, responsibilities, and levels of influence.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Communication Specialist</li><li>Stakeholder Analysis Template</li></ul>",
      "start_date": "2026-02-05",
      "duration": 1.0,
      "progress": 0,
      "open": true,
      "meta": "2335f00b-553d-4c79-ad84-e4e4a5ab231e SS",
      "parent": "2335f00b-553d-4c79-ad84-e4e4a5ab231e"
    },
    {
      "id": "f8d01614-e3d5-4c4b-9f18-a5214c670552",
      "text": "Map Stakeholder Communication Preferences",
      "custom_tooltip": "<b>Map Stakeholder Communication Preferences</b><br>Determine the preferred communication channels, frequency, and level of detail for each stakeholder group. Consider factors such as their technical expertise, time constraints, and cultural background.<br><b>Resources needed:</b><br><ul><li>Communication Specialist</li><li>Survey Tools</li><li>Stakeholder Contact List</li></ul>",
      "start_date": "2026-02-06",
      "duration": 1.0,
      "progress": 0,
      "open": true,
      "meta": "c22264c2-4ea2-42a7-a83b-6c9cb5444d1e FS",
      "parent": "2335f00b-553d-4c79-ad84-e4e4a5ab231e"
    },
    {
      "id": "69e51038-7f4a-4650-80f8-74e83399eb70",
      "text": "Prioritize Stakeholder Engagement",
      "custom_tooltip": "<b>Prioritize Stakeholder Engagement</b><br>Rank stakeholders based on their importance to the project&#x27;s success and their level of influence. Focus engagement efforts on high-priority stakeholders to ensure their needs and concerns are addressed effectively.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Stakeholder Analysis Template</li><li>Decision-Making Framework</li></ul>",
      "start_date": "2026-02-07",
      "duration": 1.0,
      "progress": 0,
      "open": true,
      "meta": "f8d01614-e3d5-4c4b-9f18-a5214c670552 FS",
      "parent": "2335f00b-553d-4c79-ad84-e4e4a5ab231e"
    },
    {
      "id": "9436308d-44a7-4b54-9dca-bfcf574af2d9",
      "text": "Document Stakeholder Information",
      "custom_tooltip": "<b>Document Stakeholder Information</b><br>Create a comprehensive stakeholder register that includes contact information, communication preferences, roles, responsibilities, and levels of influence. Maintain the register throughout the project lifecycle.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Stakeholder Register Template</li><li>Data Management System</li></ul>",
      "start_date": "2026-02-08",
      "duration": 1.0,
      "progress": 0,
      "open": true,
      "meta": "2335f00b-553d-4c79-ad84-e4e4a5ab231e FF, 69e51038-7f4a-4650-80f8-74e83399eb70 FS",
      "parent": "2335f00b-553d-4c79-ad84-e4e4a5ab231e"
    },
    {
      "id": "def25511-37e4-46ce-9202-4b80b896c7ef",
      "text": "Develop Communication Plan",
      "custom_tooltip": "<b>Develop Communication Plan</b>",
      "progress": 0,
      "open": true,
      "meta": "2335f00b-553d-4c79-ad84-e4e4a5ab231e FS",
      "parent": "bee241f0-4aa5-41fc-8d68-ed3aeb9b7dc6",
      "type": "project"
    },
    {
      "id": "01a2e289-b319-449d-b417-c27f54a7111d",
      "text": "Identify Communication Channels and Stakeholders",
      "custom_tooltip": "<b>Identify Communication Channels and Stakeholders</b><br>Objective: Determine the most effective communication channels for reaching different stakeholder groups.\nScope: Identify all relevant stakeholders and their preferred communication methods.\nSteps: 1. Review stakeholder analysis. 2. Research available communication channels. 3. Map stakeholders to appropriate channels.\nDeliverables: List of communication channels and stakeholder mapping.<br><b>Resources needed:</b><br><ul><li>Stakeholder analysis document</li><li>Communication specialist</li><li>Project manager</li></ul>",
      "start_date": "2026-02-09",
      "duration": 1.0,
      "progress": 0,
      "open": true,
      "meta": "def25511-37e4-46ce-9202-4b80b896c7ef SS",
      "parent": "def25511-37e4-46ce-9202-4b80b896c7ef"
    },
    {
      "id": "43bda48f-5785-4316-ac8a-c1714a9a4993",
      "text": "Define Communication Objectives and Key Messages",
      "custom_tooltip": "<b>Define Communication Objectives and Key Messages</b><br>Objective: Establish clear communication objectives and craft key messages for each stakeholder group.\nScope: Define what needs to be communicated and the desired outcome of each communication.\nSteps: 1. Review project objectives. 2. Develop key messages for each stakeholder group. 3. Ensure messages are consistent and accurate.\nDeliverables: Communication objectives and key messages document.<br><b>Resources needed:</b><br><ul><li>Project objectives document</li><li>Communication specialist</li><li>Subject matter experts</li></ul>",
      "start_date": "2026-02-10",
      "duration": 1.0,
      "progress": 0,
      "open": true,
      "meta": "01a2e289-b319-449d-b417-c27f54a7111d FS",
      "parent": "def25511-37e4-46ce-9202-4b80b896c7ef"
    },
    {
      "id": "cfe07bdc-3612-4706-8fc6-091224a51a33",
      "text": "Develop Communication Schedule and Timeline",
      "custom_tooltip": "<b>Develop Communication Schedule and Timeline</b><br>Objective: Create a detailed communication schedule and timeline to ensure timely and effective communication.\nScope: Define when and how each communication will be delivered.\nSteps: 1. Identify key milestones and communication needs. 2. Develop a communication schedule. 3. Assign responsibilities for each communication task.\nDeliverables: Communication schedule and timeline document.<br><b>Resources needed:</b><br><ul><li>Project schedule</li><li>Communication specialist</li><li>Project manager</li></ul>",
      "start_date": "2026-02-11",
      "duration": 1.0,
      "progress": 0,
      "open": true,
      "meta": "43bda48f-5785-4316-ac8a-c1714a9a4993 FS",
      "parent": "def25511-37e4-46ce-9202-4b80b896c7ef"
    },
    {
      "id": "0c7571ca-8c0c-4276-82d2-ab9aa1b3353d",
      "text": "Establish Feedback Mechanisms and Monitoring",
      "custom_tooltip": "<b>Establish Feedback Mechanisms and Monitoring</b><br>Objective: Implement feedback mechanisms to gather input from stakeholders and monitor the effectiveness of communication efforts.\nScope: Define how feedback will be collected and analyzed.\nSteps: 1. Develop feedback surveys and questionnaires. 2. Establish a process for collecting and analyzing feedback. 3. Monitor communication channels for stakeholder responses.\nDeliverables: Feedback mechanisms and monitoring plan.<br><b>Resources needed:</b><br><ul><li>Communication specialist</li><li>Project manager</li><li>Data analyst</li></ul>",
      "start_date": "2026-02-12",
      "duration": 1.0,
      "progress": 0,
      "open": true,
      "meta": "def25511-37e4-46ce-9202-4b80b896c7ef FF, cfe07bdc-3612-4706-8fc6-091224a51a33 FS",
      "parent": "def25511-37e4-46ce-9202-4b80b896c7ef"
    },
    {
      "id": "2df0047f-b30e-4584-bca3-9242e29ee070",
      "text": "Establish Risk Management Plan",
      "custom_tooltip": "<b>Establish Risk Management Plan</b>",
      "progress": 0,
      "open": true,
      "meta": "def25511-37e4-46ce-9202-4b80b896c7ef FS",
      "parent": "bee241f0-4aa5-41fc-8d68-ed3aeb9b7dc6",
      "type": "project"
    },
    {
      "id": "a498590a-00a9-4918-933e-cfca24d3ec94",
      "text": "Identify Potential Risks",
      "custom_tooltip": "<b>Identify Potential Risks</b><br>Objective: Identify all potential risks that could impact the project.\nScope: Consider all aspects of the project, including technical, logistical, financial, and regulatory risks.\nSteps: Conduct brainstorming sessions, review historical data, consult with experts.\nDeliverables: A comprehensive list of potential risks.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Subject Matter Experts</li><li>Risk Management Software</li></ul>",
      "start_date": "2026-02-13",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "2df0047f-b30e-4584-bca3-9242e29ee070 SS",
      "parent": "2df0047f-b30e-4584-bca3-9242e29ee070"
    },
    {
      "id": "c6448065-076f-43f8-be41-e58d05700507",
      "text": "Assess Risk Probability and Impact",
      "custom_tooltip": "<b>Assess Risk Probability and Impact</b><br>Objective: Evaluate the likelihood and potential impact of each identified risk.\nScope: Quantify the probability and impact using a risk assessment matrix.\nSteps: Assign probability and impact scores to each risk, prioritize risks based on their overall score.\nDeliverables: A prioritized list of risks with associated probability and impact scores.<br><b>Resources needed:</b><br><ul><li>Risk Analyst</li><li>Project Team</li><li>Risk Assessment Matrix</li></ul>",
      "start_date": "2026-02-15",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "a498590a-00a9-4918-933e-cfca24d3ec94 FS",
      "parent": "2df0047f-b30e-4584-bca3-9242e29ee070"
    },
    {
      "id": "57aad278-b376-41aa-90e2-420ac5d0d080",
      "text": "Develop Mitigation Strategies",
      "custom_tooltip": "<b>Develop Mitigation Strategies</b><br>Objective: Develop strategies to mitigate or eliminate the identified risks.\nScope: Identify specific actions to reduce the probability or impact of each risk.\nSteps: Brainstorm mitigation strategies, evaluate the cost and effectiveness of each strategy, assign responsibility for implementing each strategy.\nDeliverables: A detailed mitigation plan for each identified risk.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Subject Matter Experts</li><li>Contingency Budget</li></ul>",
      "start_date": "2026-02-17",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "c6448065-076f-43f8-be41-e58d05700507 FS",
      "parent": "2df0047f-b30e-4584-bca3-9242e29ee070"
    },
    {
      "id": "b1b0141d-e22c-4b4c-86a9-fa78b6d48644",
      "text": "Document Risk Management Plan",
      "custom_tooltip": "<b>Document Risk Management Plan</b><br>Objective: Create a comprehensive risk management plan that documents all identified risks, their probability and impact, and the associated mitigation strategies.\nScope: The plan should be clear, concise, and easily accessible to all project stakeholders.\nSteps: Compile all risk assessment data, document mitigation strategies, create a risk register, obtain approval from project stakeholders.\nDeliverables: A complete and approved risk management plan.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Technical Writer</li><li>Document Management System</li></ul>",
      "start_date": "2026-02-19",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "2df0047f-b30e-4584-bca3-9242e29ee070 FF, 57aad278-b376-41aa-90e2-420ac5d0d080 FS",
      "parent": "2df0047f-b30e-4584-bca3-9242e29ee070"
    },
    {
      "id": "ee298cf4-e281-4b53-80e8-d593b0ef0cde",
      "text": "Secure Initial Funding",
      "custom_tooltip": "<b>Secure Initial Funding</b>",
      "progress": 0,
      "open": true,
      "meta": "bee241f0-4aa5-41fc-8d68-ed3aeb9b7dc6 FF, 2df0047f-b30e-4584-bca3-9242e29ee070 FS",
      "parent": "bee241f0-4aa5-41fc-8d68-ed3aeb9b7dc6",
      "type": "project"
    },
    {
      "id": "4348bd0b-f638-4ff5-ae08-eab07edae133",
      "text": "Identify potential funding sources",
      "custom_tooltip": "<b>Identify potential funding sources</b><br>Research and identify all potential funding sources, including government grants, private investors, and internal budget allocations. This involves reviewing eligibility criteria, application requirements, and funding timelines for each source.<br><b>Resources needed:</b><br><ul><li>Grant writer</li><li>Financial analyst</li><li>Project manager</li></ul>",
      "start_date": "2026-02-21",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "ee298cf4-e281-4b53-80e8-d593b0ef0cde SS",
      "parent": "ee298cf4-e281-4b53-80e8-d593b0ef0cde"
    },
    {
      "id": "c3193204-833a-49d7-ad1b-1b2d0deee7c6",
      "text": "Prepare budget proposal",
      "custom_tooltip": "<b>Prepare budget proposal</b><br>Develop a detailed budget proposal outlining all project expenses, including personnel costs, equipment purchases, resource procurement, and operational expenses. The proposal should include clear justifications for each expense and align with the project&#x27;s scope and objectives.<br><b>Resources needed:</b><br><ul><li>Financial analyst</li><li>Project manager</li><li>Subject matter experts</li></ul>",
      "start_date": "2026-02-23",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "4348bd0b-f638-4ff5-ae08-eab07edae133 FS",
      "parent": "ee298cf4-e281-4b53-80e8-d593b0ef0cde"
    },
    {
      "id": "538694ea-3748-42f0-aeef-f7cfc7c763df",
      "text": "Submit funding applications",
      "custom_tooltip": "<b>Submit funding applications</b><br>Prepare and submit funding applications to identified funding sources, ensuring all application requirements are met and deadlines are adhered to. This includes completing application forms, gathering supporting documentation, and addressing any questions or concerns raised by funding agencies.<br><b>Resources needed:</b><br><ul><li>Grant writer</li><li>Project manager</li><li>Legal counsel</li></ul>",
      "start_date": "2026-02-25",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "c3193204-833a-49d7-ad1b-1b2d0deee7c6 FS",
      "parent": "ee298cf4-e281-4b53-80e8-d593b0ef0cde"
    },
    {
      "id": "d2c393a7-80b5-496e-bd10-8bcce3a97dba",
      "text": "Negotiate funding agreements",
      "custom_tooltip": "<b>Negotiate funding agreements</b><br>Negotiate funding agreements with selected funding sources, ensuring favorable terms and conditions for the project. This includes reviewing agreement documents, addressing any legal or financial concerns, and securing final approval from relevant stakeholders.<br><b>Resources needed:</b><br><ul><li>Legal counsel</li><li>Financial analyst</li><li>Project manager</li></ul>",
      "start_date": "2026-02-27",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "ee298cf4-e281-4b53-80e8-d593b0ef0cde FF, 538694ea-3748-42f0-aeef-f7cfc7c763df FS",
      "parent": "ee298cf4-e281-4b53-80e8-d593b0ef0cde"
    },
    {
      "id": "9d73ef4d-6cb4-438d-bbc3-1a34384005a9",
      "text": "Data Collection & Analysis",
      "custom_tooltip": "<b>Data Collection &amp; Analysis</b>",
      "progress": 0,
      "open": true,
      "meta": "bee241f0-4aa5-41fc-8d68-ed3aeb9b7dc6 FS",
      "parent": "f74a79bc-497f-4d79-9c7f-f968f50b2149",
      "type": "project"
    },
    {
      "id": "a0afb907-3fd6-4aaa-9f26-166f2563b46a",
      "text": "Collect VEI-7 Escalation Data",
      "custom_tooltip": "<b>Collect VEI-7 Escalation Data</b>",
      "progress": 0,
      "open": true,
      "meta": "9d73ef4d-6cb4-438d-bbc3-1a34384005a9 SS",
      "parent": "9d73ef4d-6cb4-438d-bbc3-1a34384005a9",
      "type": "project"
    },
    {
      "id": "eb2f4231-3869-4d2d-a256-d8ad8fb13d72",
      "text": "Gather USGS Yellowstone monitoring data",
      "custom_tooltip": "<b>Gather USGS Yellowstone monitoring data</b><br>Collect the latest data from the USGS on Yellowstone&#x27;s volcanic activity, including seismic data, gas emissions, and ground deformation measurements. This data will be used to assess the current state of the caldera and to inform probabilistic eruption models.<br><b>Resources needed:</b><br><ul><li>USGS Data Portal Access</li><li>Data Analyst</li></ul>",
      "start_date": "2026-03-01",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "a0afb907-3fd6-4aaa-9f26-166f2563b46a SS",
      "parent": "a0afb907-3fd6-4aaa-9f26-166f2563b46a"
    },
    {
      "id": "a6b1dcb1-a6f5-4d6f-8aac-bc13519cca88",
      "text": "Run probabilistic eruption models",
      "custom_tooltip": "<b>Run probabilistic eruption models</b><br>Utilize VOLCALPUH or similar probabilistic hazard models to simulate VEI-7 eruption scenarios. Input the collected USGS data and generate probabilistic hazard maps showing potential ashfall dispersion, lahar flow paths, and pyroclastic flow hazard zones.<br><b>Resources needed:</b><br><ul><li>VOLCALPUH Software</li><li>High-Performance Computing Resources</li><li>Volcanologist</li><li>GIS Specialist</li></ul>",
      "start_date": "2026-03-03",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "eb2f4231-3869-4d2d-a256-d8ad8fb13d72 FS",
      "parent": "a0afb907-3fd6-4aaa-9f26-166f2563b46a"
    },
    {
      "id": "765ade08-cfd6-4090-b96e-70a925b099b6",
      "text": "Assess lahar flow paths",
      "custom_tooltip": "<b>Assess lahar flow paths</b><br>Conduct detailed assessments of potential lahar flow paths using GIS software. Overlay the generated lahar flow paths on evacuation routes to identify areas at high risk and to inform evacuation planning.<br><b>Resources needed:</b><br><ul><li>GIS Software</li><li>Geologist</li><li>Evacuation Route Maps</li></ul>",
      "start_date": "2026-03-05",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "a6b1dcb1-a6f5-4d6f-8aac-bc13519cca88 FS",
      "parent": "a0afb907-3fd6-4aaa-9f26-166f2563b46a"
    },
    {
      "id": "613f9ce4-8dc6-409b-908d-3d6d9fac5c1f",
      "text": "Map pyroclastic flow hazards",
      "custom_tooltip": "<b>Map pyroclastic flow hazards</b><br>Create hazard maps showing potential pyroclastic flow hazard zones based on the probabilistic eruption models. These maps will be used to identify areas that need to be evacuated and to inform emergency response planning.<br><b>Resources needed:</b><br><ul><li>GIS Software</li><li>Volcanologist</li><li>Hazard Mapping Specialist</li></ul>",
      "start_date": "2026-03-07",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "765ade08-cfd6-4090-b96e-70a925b099b6 FS",
      "parent": "a0afb907-3fd6-4aaa-9f26-166f2563b46a"
    },
    {
      "id": "d604fe04-0268-41f9-8149-acdc8b11e65a",
      "text": "Validate with expert volcanologists",
      "custom_tooltip": "<b>Validate with expert volcanologists</b><br>Consult with volcanologists experienced in probabilistic hazard modeling to validate the results of the simulations and assessments. Incorporate their feedback to refine the models and to ensure the accuracy of the hazard maps.<br><b>Resources needed:</b><br><ul><li>Volcanologist Consultants</li><li>Expert Review Panel</li></ul>",
      "start_date": "2026-03-09",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "a0afb907-3fd6-4aaa-9f26-166f2563b46a FF, 613f9ce4-8dc6-409b-908d-3d6d9fac5c1f FS",
      "parent": "a0afb907-3fd6-4aaa-9f26-166f2563b46a"
    },
    {
      "id": "59c4b3ba-7780-4edc-a290-1983d97b748b",
      "text": "Conduct Cybersecurity Risk Assessment",
      "custom_tooltip": "<b>Conduct Cybersecurity Risk Assessment</b>",
      "progress": 0,
      "open": true,
      "meta": "a0afb907-3fd6-4aaa-9f26-166f2563b46a FS",
      "parent": "9d73ef4d-6cb4-438d-bbc3-1a34384005a9",
      "type": "project"
    },
    {
      "id": "4b5749b0-6a3b-4cda-8220-12b687a667cf",
      "text": "Identify Critical Systems and Data",
      "custom_tooltip": "<b>Identify Critical Systems and Data</b><br>Objective: Determine the most vital communication and operational systems and data that require protection. Scope: Includes all systems used for emergency communication, resource allocation, evacuation coordination, and public information dissemination. Steps: Inventory all systems, classify data based on sensitivity and criticality, and document system architecture. Deliverables: A comprehensive list of critical systems and data with assigned criticality levels.<br><b>Resources needed:</b><br><ul><li>IT Security Specialists</li><li>System Administrators</li><li>Data Analysts</li></ul>",
      "start_date": "2026-03-11",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "59c4b3ba-7780-4edc-a290-1983d97b748b SS",
      "parent": "59c4b3ba-7780-4edc-a290-1983d97b748b"
    },
    {
      "id": "07b56a15-5e40-4dc3-b415-fbe42f1da726",
      "text": "Perform Vulnerability Scanning and Penetration Testing",
      "custom_tooltip": "<b>Perform Vulnerability Scanning and Penetration Testing</b><br>Objective: Identify vulnerabilities in critical systems through automated scanning and manual penetration testing. Scope: Includes network infrastructure, servers, applications, and databases. Steps: Conduct vulnerability scans using tools like Nessus or OpenVAS, perform penetration testing using Metasploit or similar frameworks, and document identified vulnerabilities. Deliverables: A detailed report of identified vulnerabilities with severity ratings and recommended remediation steps.<br><b>Resources needed:</b><br><ul><li>Cybersecurity Experts</li><li>Penetration Testers</li><li>Vulnerability Assessment Tools</li></ul>",
      "start_date": "2026-03-14",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "4b5749b0-6a3b-4cda-8220-12b687a667cf FS",
      "parent": "59c4b3ba-7780-4edc-a290-1983d97b748b"
    },
    {
      "id": "e12e3a6b-8eda-4a4e-8a66-e2cf51f3501e",
      "text": "Develop and Implement Security Measures",
      "custom_tooltip": "<b>Develop and Implement Security Measures</b><br>Objective: Implement security measures to mitigate identified vulnerabilities and protect critical systems and data. Scope: Includes implementing firewalls, intrusion detection systems, access controls, encryption, and security awareness training. Steps: Prioritize remediation based on vulnerability severity, implement security measures, and document implemented controls. Deliverables: A documented set of security measures implemented to protect critical systems and data.<br><b>Resources needed:</b><br><ul><li>IT Security Specialists</li><li>System Administrators</li><li>Network Engineers</li></ul>",
      "start_date": "2026-03-17",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "07b56a15-5e40-4dc3-b415-fbe42f1da726 FS",
      "parent": "59c4b3ba-7780-4edc-a290-1983d97b748b"
    },
    {
      "id": "bdd261b9-d108-40d5-a271-b760ee3333f2",
      "text": "Establish Incident Response Plan",
      "custom_tooltip": "<b>Establish Incident Response Plan</b><br>Objective: Develop a plan for responding to cybersecurity incidents. Scope: Includes procedures for detecting, analyzing, containing, eradicating, and recovering from incidents. Steps: Define roles and responsibilities, develop incident response procedures, and conduct tabletop exercises. Deliverables: A documented incident response plan with clear procedures and assigned responsibilities.<br><b>Resources needed:</b><br><ul><li>Cybersecurity Experts</li><li>Incident Response Team</li><li>Legal Counsel</li></ul>",
      "start_date": "2026-03-20",
      "duration": 3.0,
      "progress": 0,
      "open": true,

      "parent": "59c4b3ba-7780-4edc-a290-1983d97b748b"
    },
    {
      "id": "a7e5ee03-4ddc-4d84-b86f-55671253dbd6",
      "text": "Conduct Security Awareness Training",
      "custom_tooltip": "<b>Conduct Security Awareness Training</b><br>Objective: Train personnel on cybersecurity best practices and incident reporting procedures. Scope: Includes all personnel with access to critical systems and data. Steps: Develop training materials, conduct training sessions, and track training completion. Deliverables: A documented record of security awareness training completion for all relevant personnel.<br><b>Resources needed:</b><br><ul><li>Cybersecurity Trainers</li><li>Training Materials</li><li>HR Personnel</li></ul>",

    {
      "id": "b3e64ca4-3cb7-474c-9ee5-d009300bd954",
      "text": "Identify vulnerable populations in Zone One",
      "custom_tooltip": "<b>Identify vulnerable populations in Zone One</b><br>Objective: Determine the number and location of vulnerable populations within Zone One.\nScope: Includes tourists, non-English speakers, people with disabilities, and those with medical needs.\nSteps: Analyze census data, tourist statistics, and disability registries. Consult with local community organizations.\nDeliverables: A detailed report on the distribution of vulnerable populations.<br><b>Resources needed:</b><br><ul><li>GIS software</li><li>Demographic data</li><li>Community outreach coordinator</li><li>Translation services</li></ul>",
      "start_date": "2026-03-26",

      "meta": "bb2eee9c-cd94-455c-85bf-f74369afb9fa SS",

    },
    {
      "id": "63d54618-1aaa-4acd-bca7-368426dc4816",
      "text": "Assess accessibility of evacuation routes",
      "custom_tooltip": "<b>Assess accessibility of evacuation routes</b><br>Objective: Evaluate the accessibility of evacuation routes and shelters for people with disabilities.\nScope: Includes physical accessibility, communication accessibility, and transportation accessibility.\nSteps: Conduct site visits, review evacuation plans, and consult with disability advocacy groups.\nDeliverables: A report on the accessibility of evacuation routes and shelters, with recommendations for improvements.<br><b>Resources needed:</b><br><ul><li>Accessibility experts</li><li>Transportation planners</li><li>Disability advocacy groups</li><li>GIS data</li></ul>",
      "start_date": "2026-03-28",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "b3e64ca4-3cb7-474c-9ee5-d009300bd954 FS",

    },
    {
      "id": "bd93a5e1-0e70-4dd9-bd2d-a5314cf13c16",
      "text": "Develop multilingual communication strategies",
      "custom_tooltip": "<b>Develop multilingual communication strategies</b><br>Objective: Create communication materials in multiple languages to reach non-English speakers.\nScope: Includes evacuation alerts, safety instructions, and resource information.\nSteps: Translate existing materials, develop new materials, and test their effectiveness with target audiences.\nDeliverables: Multilingual communication materials in print, audio, and video formats.<br><b>Resources needed:</b><br><ul><li>Translators</li><li>Communication specialists</li><li>Language experts</li><li>Public address systems</li></ul>",
      "start_date": "2026-03-30",
      "duration": 2.0,

      "open": true,
      "meta": "63d54618-1aaa-4acd-bca7-368426dc4816 FS",

    },
    {
      "id": "17c9f00f-29d6-4625-98d7-197cdb243f4e",
      "text": "Plan for specialized equipment needs",
      "custom_tooltip": "<b>Plan for specialized equipment needs</b><br>Objective: Identify and procure specialized equipment needed by vulnerable populations.\nScope: Includes wheelchairs, medical devices, and other assistive devices.\nSteps: Conduct needs assessments, identify suppliers, and secure funding.\nDeliverables: A stockpile of specialized equipment and a plan for its distribution.<br><b>Resources needed:</b><br><ul><li>Medical personnel</li><li>Logistics specialists</li><li>Procurement officers</li><li>Funding sources</li></ul>",
      "start_date": "2026-04-01",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "bd93a5e1-0e70-4dd9-bd2d-a5314cf13c16 FS",

    },
    {
      "id": "5f7b2dea-83aa-4409-89b0-57060b20c258",
      "text": "Establish accessible transportation options",
      "custom_tooltip": "<b>Establish accessible transportation options</b><br>Objective: Ensure that transportation is available to all vulnerable populations.\nScope: Includes accessible buses, vans, and other vehicles.\nSteps: Coordinate with transportation providers, secure funding, and train drivers.\nDeliverables: A transportation plan that meets the needs of all vulnerable populations.<br><b>Resources needed:</b><br><ul><li>Transportation providers</li><li>Logistics specialists</li><li>Funding sources</li><li>Trained drivers</li></ul>",
      "start_date": "2026-04-03",
      "duration": 2.0,
      "progress": 0,

    },

      "text": "Develop Long-Term Recovery Plan",
      "custom_tooltip": "<b>Develop Long-Term Recovery Plan</b>",

      "type": "project"

    {
      "id": "97209202-9831-4c55-be91-360fd3bd307c",
      "text": "Assess economic impact of eruption",
      "custom_tooltip": "<b>Assess economic impact of eruption</b><br>Evaluate the potential economic losses to the region due to the eruption, including tourism, agriculture, and other industries. This involves gathering data on pre-eruption economic activity, modeling the potential impacts of ashfall and other hazards, and identifying potential mitigation strategies.<br><b>Resources needed:</b><br><ul><li>Economists</li><li>Data analysts</li><li>Economic modeling software</li><li>Regional economic data</li></ul>",
      "start_date": "2026-04-05",
      "duration": 8.0,
      "progress": 0,
      "open": true,
      "meta": "9ddce8db-fa90-457e-8290-b7657045dc77 SS",
      "parent": "9ddce8db-fa90-457e-8290-b7657045dc77"
    },
    {
      "id": "48147737-6550-48b7-aefa-3fa7b37d6b2a",
      "text": "Evaluate infrastructure damage scenarios",
      "custom_tooltip": "<b>Evaluate infrastructure damage scenarios</b><br>Model potential damage to critical infrastructure, including roads, bridges, power grids, and water systems. This involves using GIS software to overlay hazard maps on infrastructure maps, assessing the vulnerability of different infrastructure components, and developing damage scenarios based on different eruption intensities.<br><b>Resources needed:</b><br><ul><li>GIS specialists</li><li>Engineers</li><li>Infrastructure maps</li><li>Hazard maps</li><li>Damage assessment models</li></ul>",
      "start_date": "2026-04-13",
      "duration": 8.0,
      "progress": 0,
      "open": true,
      "meta": "97209202-9831-4c55-be91-360fd3bd307c FS",
      "parent": "9ddce8db-fa90-457e-8290-b7657045dc77"
    },
    {
      "id": "ec51aaf0-7f24-4a43-bb7c-f434f8889d6e",
      "text": "Conduct community resilience assessments",
      "custom_tooltip": "<b>Conduct community resilience assessments</b><br>Assess the ability of local communities to cope with and recover from the eruption. This involves conducting surveys, focus groups, and interviews with community members to identify their strengths, weaknesses, and needs. It also involves evaluating the availability of social support networks and community resources.<br><b>Resources needed:</b><br><ul><li>Social scientists</li><li>Community outreach specialists</li><li>Survey instruments</li><li>Focus group facilitators</li><li>Community resilience assessment tools</li></ul>",
      "start_date": "2026-04-21",
      "duration": 8.0,
      "progress": 0,
      "open": true,
      "meta": "48147737-6550-48b7-aefa-3fa7b37d6b2a FS",
      "parent": "9ddce8db-fa90-457e-8290-b7657045dc77"
    },
    {
      "id": "386d71cf-c713-4383-8661-f87c7016e93c",
      "text": "Identify funding sources for recovery",
      "custom_tooltip": "<b>Identify funding sources for recovery</b><br>Research and identify potential funding sources for long-term recovery projects, including federal, state, and private sources. This involves reviewing grant programs, contacting funding agencies, and developing funding proposals.<br><b>Resources needed:</b><br><ul><li>Grant writers</li><li>Fundraising specialists</li><li>Funding databases</li><li>Grant application guidelines</li></ul>",
      "start_date": "2026-04-29",
      "duration": 8.0,
      "progress": 0,
      "open": true,
      "meta": "9ddce8db-fa90-457e-8290-b7657045dc77 FF, ec51aaf0-7f24-4a43-bb7c-f434f8889d6e FS",

    {
      "id": "ce75a0e4-20ed-4f5e-92fb-c6fbdd42335c",
      "text": "Identify Legal Requirements for Authority Transfer",
      "custom_tooltip": "<b>Identify Legal Requirements for Authority Transfer</b><br>Objective: Determine all legal and regulatory requirements for transferring authority during the emergency.\nScope: Review federal, state, and local laws, regulations, and emergency declarations.\nSteps: Research relevant legal frameworks, consult with legal experts, and document findings.\nDeliverables: A comprehensive list of legal requirements for authority transfer.<br><b>Resources needed:</b><br><ul><li>Emergency Law Specialist</li><li>Legal Researchers</li><li>Legal Databases</li></ul>",
      "start_date": "2026-05-07",
      "duration": 1.0,
      "progress": 0,
      "open": true,
      "meta": "968d2545-7ce4-4827-9664-c3681705efbd SS",

    },
    {
      "id": "a7ed400e-a568-4536-b744-4d8844f6e59e",
      "text": "Draft Authority Transfer Protocols",
      "custom_tooltip": "<b>Draft Authority Transfer Protocols</b><br>Objective: Create clear and concise protocols for transferring authority between agencies and individuals.\nScope: Develop step-by-step procedures for different scenarios, including incapacitation of key personnel.\nSteps: Define trigger points for authority transfer, outline roles and responsibilities, and document communication procedures.\nDeliverables: A written protocol document outlining the authority transfer process.<br><b>Resources needed:</b><br><ul><li>Emergency Law Specialist</li><li>Emergency Management Personnel</li><li>Legal Review Team</li></ul>",
      "start_date": "2026-05-08",
      "duration": 1.0,
      "progress": 0,
      "open": true,
      "meta": "ce75a0e4-20ed-4f5e-92fb-c6fbdd42335c FS",
      "parent": "968d2545-7ce4-4827-9664-c3681705efbd"
    },
    {
      "id": "3d394f78-1e92-42ef-90c1-c48cd064787c",
      "text": "Secure Legal Liaison Contact Information",
      "custom_tooltip": "<b>Secure Legal Liaison Contact Information</b><br>Objective: Compile a list of contact information for legal liaisons from relevant agencies.\nScope: Identify legal representatives from FEMA, state agencies, and local governments.\nSteps: Contact agencies to obtain contact information, verify accuracy, and maintain an updated list.\nDeliverables: A contact list of legal liaisons with phone numbers, email addresses, and agency affiliations.<br><b>Resources needed:</b><br><ul><li>Administrative Assistant</li><li>Emergency Management Personnel</li><li>Agency Contacts</li></ul>",
      "start_date": "2026-05-09",
      "duration": 1.0,
      "progress": 0,
      "open": true,
      "meta": "a7ed400e-a568-4536-b744-4d8844f6e59e FS",
      "parent": "968d2545-7ce4-4827-9664-c3681705efbd"
    },
    {
      "id": "2a987d6e-1030-43c6-af24-fd30a6b5d737",
      "text": "Simulate Authority Transfer Scenarios",
      "custom_tooltip": "<b>Simulate Authority Transfer Scenarios</b><br>Objective: Test the effectiveness of the authority transfer protocols through simulations.\nScope: Conduct tabletop exercises and drills to identify potential weaknesses and areas for improvement.\nSteps: Develop realistic scenarios, involve key personnel, and evaluate the simulation results.\nDeliverables: A report summarizing the simulation findings and recommendations for protocol revisions.<br><b>Resources needed:</b><br><ul><li>Emergency Law Specialist</li><li>Emergency Management Personnel</li><li>Simulation Facilitator</li></ul>",
      "start_date": "2026-05-10",
      "duration": 1.0,
      "progress": 0,
      "open": true,

    },

    {
      "id": "37396c01-a2c7-48a9-b4bd-a68dd2b071e2",
      "text": "Identify Bottled Water Suppliers",
      "custom_tooltip": "<b>Identify Bottled Water Suppliers</b><br>Identify and vet potential bottled water suppliers capable of providing the required volume within the specified timeframe. This includes assessing their production capacity, storage facilities, and transportation capabilities.<br><b>Resources needed:</b><br><ul><li>Procurement Specialist</li><li>Logistics Coordinator</li></ul>",

    },
    {
      "id": "175763ee-92cb-43da-803b-0f3d6a6fb35f",
      "text": "Negotiate Bottled Water Contracts",
      "custom_tooltip": "<b>Negotiate Bottled Water Contracts</b><br>Negotiate contracts with selected bottled water suppliers, ensuring favorable pricing, delivery schedules, and quality standards. This includes defining payment terms, liability clauses, and contingency plans for supply disruptions.<br><b>Resources needed:</b><br><ul><li>Contract Lawyer</li><li>Procurement Specialist</li></ul>",
      "start_date": "2026-05-23",

      "progress": 0,
      "open": true,
      "meta": "37396c01-a2c7-48a9-b4bd-a68dd2b071e2 FS",
      "parent": "0641b1dd-8fff-4eec-9bb1-ea7169cb0a39"
    },
    {
      "id": "015ec381-2dea-46db-a8d4-fb8d3234654e",
      "text": "Secure N95 Respirator Supply",
      "custom_tooltip": "<b>Secure N95 Respirator Supply</b><br>Identify and secure a reliable supply of N95 respirators, ensuring they meet NIOSH standards and are available in sufficient quantities for the entire evacuation zone. This includes verifying authenticity and storage conditions.<br><b>Resources needed:</b><br><ul><li>Medical Supply Specialist</li><li>Procurement Specialist</li></ul>",
      "start_date": "2026-06-04",
      "duration": 12.0,
      "progress": 0,
      "open": true,
      "meta": "175763ee-92cb-43da-803b-0f3d6a6fb35f FS",

    },
    {
      "id": "9476144b-b8db-4e32-80a3-e90c02b1fdc9",
      "text": "Finalize Respirator Contracts",
      "custom_tooltip": "<b>Finalize Respirator Contracts</b><br>Negotiate and finalize contracts with N95 respirator suppliers, ensuring timely delivery, appropriate sizing options, and clear instructions for proper usage. This includes addressing storage requirements and distribution logistics.<br><b>Resources needed:</b><br><ul><li>Contract Lawyer</li><li>Medical Supply Specialist</li></ul>",
      "start_date": "2026-06-16",
      "duration": 12.0,
      "progress": 0,
      "open": true,
      "meta": "015ec381-2dea-46db-a8d4-fb8d3234654e FS",
      "parent": "0641b1dd-8fff-4eec-9bb1-ea7169cb0a39"
    },
    {
      "id": "54030f2d-c010-437d-88e6-ddbc389b4c03",
      "text": "Establish Fuel Supply Agreements",
      "custom_tooltip": "<b>Establish Fuel Supply Agreements</b><br>Establish agreements with fuel suppliers to ensure a continuous supply of fuel for generators, emergency vehicles, and other critical equipment. This includes securing priority access and establishing backup fuel storage locations.<br><b>Resources needed:</b><br><ul><li>Logistics Coordinator</li><li>Fuel Supply Specialist</li></ul>",

      "duration": 12.0,
      "progress": 0,
      "open": true,

    },

    },
    {
      "id": "56626b3c-0aa9-44af-88d4-169dc77faabd",
      "text": "Identify potential distribution center locations",
      "custom_tooltip": "<b>Identify potential distribution center locations</b><br>Objective: Identify suitable locations for resource distribution centers.\nScope: Evaluate potential sites based on accessibility, size, security, and proximity to evacuation routes.\nSteps: 1. Review existing infrastructure maps. 2. Conduct site visits. 3. Assess suitability based on pre-defined criteria.\nDeliverables: List of potential distribution center locations with site assessments.<br><b>Resources needed:</b><br><ul><li>Logistics Coordinator</li><li>GIS Specialist</li><li>Transportation Planner</li></ul>",
      "start_date": "2026-07-10",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "6e3fed11-92b6-4fe1-867a-b112e3350f8a SS",
      "parent": "6e3fed11-92b6-4fe1-867a-b112e3350f8a"
    },
    {
      "id": "dd746f6d-a961-40b2-b14c-0adf98e2d491",
      "text": "Negotiate agreements for center usage",
      "custom_tooltip": "<b>Negotiate agreements for center usage</b><br>Objective: Secure agreements for the use of identified distribution center locations.\nScope: Negotiate terms with property owners or managers, including lease agreements, access rights, and security protocols.\nSteps: 1. Contact property owners. 2. Present proposal for center usage. 3. Negotiate terms and conditions. 4. Finalize agreements.\nDeliverables: Signed agreements for distribution center locations.<br><b>Resources needed:</b><br><ul><li>Legal Counsel</li><li>Contract Negotiator</li><li>Project Manager</li></ul>",
      "start_date": "2026-07-14",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "56626b3c-0aa9-44af-88d4-169dc77faabd FS",
      "parent": "6e3fed11-92b6-4fe1-867a-b112e3350f8a"
    },
    {
      "id": "696646d6-3d42-46b1-8891-e922117bb1a1",
      "text": "Prepare distribution center sites",
      "custom_tooltip": "<b>Prepare distribution center sites</b><br>Objective: Prepare distribution center sites for resource storage and distribution.\nScope: Set up storage areas, install security systems, and ensure adequate lighting and ventilation.\nSteps: 1. Clear and organize storage areas. 2. Install security systems. 3. Ensure adequate lighting and ventilation. 4. Set up communication systems.\nDeliverables: Fully operational distribution center sites.<br><b>Resources needed:</b><br><ul><li>Construction Crew</li><li>Security Personnel</li><li>IT Technician</li></ul>",
      "start_date": "2026-07-18",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "dd746f6d-a961-40b2-b14c-0adf98e2d491 FS",
      "parent": "6e3fed11-92b6-4fe1-867a-b112e3350f8a"
    },
    {
      "id": "a7df02f5-8740-4158-acf8-e3898c4f8f81",
      "text": "Establish center staffing plan",
      "custom_tooltip": "<b>Establish center staffing plan</b><br>Objective: Develop a staffing plan for each distribution center.\nScope: Determine the number of personnel needed for each center, including managers, volunteers, and security staff.\nSteps: 1. Estimate personnel needs. 2. Recruit and train volunteers. 3. Assign roles and responsibilities. 4. Develop a shift schedule.\nDeliverables: Staffing plan for each distribution center.<br><b>Resources needed:</b><br><ul><li>Human Resources Coordinator</li><li>Volunteer Coordinator</li><li>Training Specialist</li></ul>",
      "start_date": "2026-07-22",

      "progress": 0,
      "open": true,

      "parent": "6e3fed11-92b6-4fe1-867a-b112e3350f8a"
    },
    {
      "id": "ea5af904-a843-4fc6-86b9-7a199c10759c",
      "text": "Develop Resource Prioritization Framework",
      "custom_tooltip": "<b>Develop Resource Prioritization Framework</b>",
      "progress": 0,

    {
      "id": "bbfeb28a-7b7b-4615-a76f-92ea6bd0157c",
      "text": "Identify Critical Resource Needs",
      "custom_tooltip": "<b>Identify Critical Resource Needs</b><br>Determine the specific resources required for different population segments (e.g., medical supplies, transportation, communication devices). This involves analyzing vulnerability assessments and historical data.<br><b>Resources needed:</b><br><ul><li>Vulnerability assessment reports</li><li>Historical data on resource consumption</li><li>Subject matter experts (medical, logistics, communication)</li></ul>",
      "start_date": "2026-07-26",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "ea5af904-a843-4fc6-86b9-7a199c10759c SS",

    },
    {
      "id": "63bccb36-8fed-439f-bab6-31afcaa6f4c1",
      "text": "Establish Prioritization Criteria",
      "custom_tooltip": "<b>Establish Prioritization Criteria</b><br>Define the criteria for prioritizing resource allocation based on factors such as vulnerability, urgency, and impact. This includes developing a scoring system or decision-making framework.<br><b>Resources needed:</b><br><ul><li>Ethical framework for resource allocation</li><li>Legal guidelines for emergency response</li><li>Stakeholder input (community representatives, emergency responders)</li></ul>",
      "start_date": "2026-07-28",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "bbfeb28a-7b7b-4615-a76f-92ea6bd0157c FS",

    },
    {
      "id": "f21d8429-9f23-46ef-b86a-7a35e46c7f40",
      "text": "Develop Allocation Workflow",
      "custom_tooltip": "<b>Develop Allocation Workflow</b><br>Create a step-by-step process for allocating resources based on the established criteria. This includes defining roles and responsibilities, communication protocols, and decision-making authority.<br><b>Resources needed:</b><br><ul><li>Process mapping software</li><li>Communication plan</li><li>Organizational chart</li></ul>",
      "start_date": "2026-07-30",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "63bccb36-8fed-439f-bab6-31afcaa6f4c1 FS",
      "parent": "ea5af904-a843-4fc6-86b9-7a199c10759c"
    },
    {
      "id": "609e6be6-7fcb-4745-a1af-0b8c3423319e",
      "text": "Document Prioritization Framework",
      "custom_tooltip": "<b>Document Prioritization Framework</b><br>Create a comprehensive document outlining the prioritization criteria, allocation workflow, and supporting information. This document should be readily accessible to all stakeholders.<br><b>Resources needed:</b><br><ul><li>Technical writer</li><li>Document management system</li><li>Approval process</li></ul>",

      "progress": 0,

    {
      "id": "5b999bbc-7726-49d4-9a7c-5779265e42ac",
      "text": "Establish Real-Time Traffic Monitoring System",
      "custom_tooltip": "<b>Establish Real-Time Traffic Monitoring System</b><br>Objective: Implement a system for monitoring traffic flow in real-time. Scope: Includes selecting a monitoring platform, installing sensors, and integrating data feeds. Steps: 1) Evaluate available traffic monitoring platforms. 2) Procure and install traffic sensors. 3) Integrate sensor data with the monitoring platform. 4) Test and calibrate the system. Deliverables: A fully functional real-time traffic monitoring system.<br><b>Resources needed:</b><br><ul><li>Traffic engineers</li><li>Data analysts</li><li>Sensor technicians</li><li>Software developers</li></ul>",
      "start_date": "2026-08-03",
      "duration": 2.0,

    },
    {
      "id": "1f216773-8929-4a3d-849c-f003ede18432",
      "text": "Develop Contingency Plans for Road Closures",
      "custom_tooltip": "<b>Develop Contingency Plans for Road Closures</b><br>Objective: Create alternative routes and procedures for managing traffic in the event of road closures. Scope: Includes identifying potential road closure locations, designing alternative routes, and establishing communication protocols. Steps: 1) Identify potential road closure locations. 2) Design alternative routes. 3) Develop traffic management procedures for road closures. 4) Establish communication protocols with emergency responders. Deliverables: A comprehensive contingency plan for road closures.<br><b>Resources needed:</b><br><ul><li>Traffic engineers</li><li>Emergency responders</li><li>GIS specialists</li><li>Communication specialists</li></ul>",
      "start_date": "2026-08-05",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "5b999bbc-7726-49d4-9a7c-5779265e42ac FS",

    },
    {
      "id": "be31cebb-bd1a-4651-97df-858355d2f668",
      "text": "Secure Priority Fuel Access for Emergency Vehicles",
      "custom_tooltip": "<b>Secure Priority Fuel Access for Emergency Vehicles</b><br>Objective: Ensure that emergency vehicles have priority access to fuel during the evacuation. Scope: Includes identifying fuel stations, establishing agreements, and implementing a tracking system. Steps: 1) Identify strategic fuel stations. 2) Establish agreements with fuel station owners. 3) Implement a tracking system for emergency vehicle fuel consumption. 4) Develop procedures for fuel distribution. Deliverables: A system for ensuring priority fuel access for emergency vehicles.<br><b>Resources needed:</b><br><ul><li>Logistics coordinators</li><li>Fuel suppliers</li><li>Emergency responders</li><li>Tracking system developers</li></ul>",
      "start_date": "2026-08-07",
      "duration": 2.0,
      "progress": 0,

      "meta": "1f216773-8929-4a3d-849c-f003ede18432 FS",

    },
    {
      "id": "0e640711-9b7b-40cb-97d4-4c546f03f176",
      "text": "Implement Centralized Logistics Management System",
      "custom_tooltip": "<b>Implement Centralized Logistics Management System</b><br>Objective: Implement a system for managing logistics and transportation in real-time. Scope: Includes selecting a management platform, integrating data feeds, and training personnel. Steps: 1) Evaluate available logistics management platforms. 2) Procure and implement the selected platform. 3) Integrate data feeds from various sources. 4) Train personnel on the system. Deliverables: A fully functional centralized logistics management system.<br><b>Resources needed:</b><br><ul><li>Logistics specialists</li><li>IT specialists</li><li>Training personnel</li><li>Data analysts</li></ul>",

    {
      "id": "2ee61c9e-49d6-4f2d-befe-a1fbee372db1",
      "text": "Gather geological data for zone mapping",
      "custom_tooltip": "<b>Gather geological data for zone mapping</b><br>Collect and analyze geological data, including volcanic hazard assessments, lahar flow paths, and pyroclastic flow hazard mapping, to inform the definition of evacuation zones.<br><b>Resources needed:</b><br><ul><li>Geologists</li><li>GIS specialists</li><li>Volcanologists</li><li>USGS data</li></ul>",
      "start_date": "2026-08-11",

      "open": true,
      "meta": "1fa5824f-19d6-4ae1-9453-3c3e01d1f1fe SS",

    },
    {
      "id": "49446a17-3fb5-423d-b485-9ec17546c6c2",
      "text": "Model ashfall dispersion for zone impact",
      "custom_tooltip": "<b>Model ashfall dispersion for zone impact</b><br>Simulate ashfall dispersion patterns using HYSPLIT or similar models to determine the potential impact on different areas and refine evacuation zone boundaries.<br><b>Resources needed:</b><br><ul><li>Atmospheric scientists</li><li>Meteorologists</li><li>HYSPLIT software</li><li>Computational resources</li></ul>",
      "start_date": "2026-08-13",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "2ee61c9e-49d6-4f2d-befe-a1fbee372db1 FS",

    },
    {
      "id": "50cb4f0e-744e-49ed-a1c2-008d4f2d79b0",
      "text": "Define evacuation zone boundaries",
      "custom_tooltip": "<b>Define evacuation zone boundaries</b><br>Based on geological data and ashfall modeling, define the boundaries of evacuation zones, considering factors such as population density, infrastructure, and accessibility.<br><b>Resources needed:</b><br><ul><li>Emergency managers</li><li>GIS specialists</li><li>Local government officials</li><li>Maps</li></ul>",
      "start_date": "2026-08-15",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "49446a17-3fb5-423d-b485-9ec17546c6c2 FS",

    },
    {
      "id": "5070781c-2a81-4540-87ea-6c5a080e24a4",
      "text": "Review and validate zone definitions",
      "custom_tooltip": "<b>Review and validate zone definitions</b><br>Consult with experts and stakeholders to review and validate the defined evacuation zone boundaries, ensuring they are accurate, feasible, and aligned with the overall evacuation plan.<br><b>Resources needed:</b><br><ul><li>Volcanologists</li><li>Emergency managers</li><li>Local community representatives</li><li>Legal counsel</li></ul>",
      "start_date": "2026-08-17",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "1fa5824f-19d6-4ae1-9453-3c3e01d1f1fe FF, 50cb4f0e-744e-49ed-a1c2-008d4f2d79b0 FS",

    },

    {
      "id": "0ade58d2-75b3-45d6-bff3-ab8bd3a9d23e",
      "text": "Define Eruption Intensity Thresholds",
      "custom_tooltip": "<b>Define Eruption Intensity Thresholds</b><br>Establish specific, measurable criteria based on USGS data (seismic activity, gas emissions, ground deformation) that will trigger the evacuation order. This includes defining thresholds for VEI levels and associated evacuation zone expansions.<br><b>Resources needed:</b><br><ul><li>Volcanologists</li><li>Geologists</li><li>USGS Data</li><li>Emergency Management Specialists</li></ul>",
      "start_date": "2026-08-19",
      "duration": 1.0,
      "progress": 0,
      "open": true,
      "meta": "dc8066c0-3083-43e6-8d1d-2eefb88cde24 SS",
      "parent": "dc8066c0-3083-43e6-8d1d-2eefb88cde24"
    },
    {
      "id": "48e8887b-a022-473e-a69f-fef910a59c11",
      "text": "Establish Communication Channels Activation",
      "custom_tooltip": "<b>Establish Communication Channels Activation</b><br>Define the specific communication channels (IPAWS, radio, social media) to be activated at each trigger level. This includes pre-scripted messages and dissemination protocols.<br><b>Resources needed:</b><br><ul><li>Communication Specialists</li><li>IPAWS Access</li><li>Social Media Management Tools</li><li>Emergency Alert System</li></ul>",
      "start_date": "2026-08-20",
      "duration": 1.0,
      "progress": 0,
      "open": true,
      "meta": "0ade58d2-75b3-45d6-bff3-ab8bd3a9d23e FS",
      "parent": "dc8066c0-3083-43e6-8d1d-2eefb88cde24"
    },
    {
      "id": "dcb17520-2deb-4485-a0cc-b55f5c47dfa9",
      "text": "Formalize Authority Activation Chain",
      "custom_tooltip": "<b>Formalize Authority Activation Chain</b><br>Document the chain of command and decision-making process for activating the evacuation order, including primary and secondary decision-makers and their respective responsibilities. This includes legal review and approval.<br><b>Resources needed:</b><br><ul><li>Legal Counsel</li><li>Emergency Management Director</li><li>State Governor</li><li>FEMA Representatives</li></ul>",
      "start_date": "2026-08-21",
      "duration": 1.0,
      "progress": 0,
      "open": true,
      "meta": "48e8887b-a022-473e-a69f-fef910a59c11 FS",
      "parent": "dc8066c0-3083-43e6-8d1d-2eefb88cde24"
    },
    {
      "id": "56edc134-3db2-4392-9c8e-7e285fc69099",
      "text": "Develop Protocol for False Alarms",
      "custom_tooltip": "<b>Develop Protocol for False Alarms</b><br>Create a protocol for managing potential false alarms, including procedures for verifying the threat, communicating with the public, and standing down the evacuation order if necessary. This includes criteria for determining a false alarm.<br><b>Resources needed:</b><br><ul><li>Public Relations Team</li><li>Volcanologists</li><li>Emergency Management Specialists</li><li>Communication Systems</li></ul>",
      "start_date": "2026-08-22",
      "duration": 1.0,
      "progress": 0,
      "open": true,
      "meta": "dcb17520-2deb-4485-a0cc-b55f5c47dfa9 FS",
      "parent": "dc8066c0-3083-43e6-8d1d-2eefb88cde24"
    },
    {
      "id": "6ed2a18c-1c29-44c4-b492-718f13856b28",
      "text": "Document Evacuation Order Dissemination",
      "custom_tooltip": "<b>Document Evacuation Order Dissemination</b><br>Detail the specific steps for disseminating the evacuation order to the public, including the timing, methods, and content of the message. This includes multilingual support and accessibility considerations.<br><b>Resources needed:</b><br><ul><li>Public Affairs Officer</li><li>Translation Services</li><li>Accessibility Experts</li><li>Communication Infrastructure</li></ul>",
      "start_date": "2026-08-23",
      "duration": 1.0,
      "progress": 0,
      "open": true,
      "meta": "dc8066c0-3083-43e6-8d1d-2eefb88cde24 FF, 56edc134-3db2-4392-9c8e-7e285fc69099 FS",

    },

    {
      "id": "9ab695ef-3b35-41f3-bd6c-dd4d0d8e25a1",
      "text": "Analyze current traffic patterns",
      "custom_tooltip": "<b>Analyze current traffic patterns</b><br>Objective: Understand existing traffic flow to identify bottlenecks. Scope: Review historical traffic data, conduct on-site observations, and analyze road network capacity. Steps: Collect traffic data, model traffic flow, and identify congestion points. Deliverables: Traffic flow analysis report.<br><b>Resources needed:</b><br><ul><li>Traffic engineers</li><li>Data analysts</li><li>GIS software</li><li>Traffic counters</li></ul>",
      "start_date": "2026-08-24",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "ac17abf5-f7cf-4752-9b84-bdd796dad8d1 SS",
      "parent": "ac17abf5-f7cf-4752-9b84-bdd796dad8d1"
    },
    {
      "id": "f559778f-38a0-4318-90cf-b6853fecf0d9",
      "text": "Identify alternative evacuation routes",
      "custom_tooltip": "<b>Identify alternative evacuation routes</b><br>Objective: Determine viable alternative routes in case of primary route blockage. Scope: Evaluate secondary roads, assess bridge capacity, and identify potential detours. Steps: Map alternative routes, assess road conditions, and estimate travel times. Deliverables: Alternative evacuation route map.<br><b>Resources needed:</b><br><ul><li>Civil engineers</li><li>GIS specialists</li><li>Road maintenance crews</li><li>Mapping software</li></ul>",
      "start_date": "2026-08-26",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "9ab695ef-3b35-41f3-bd6c-dd4d0d8e25a1 FS",
      "parent": "ac17abf5-f7cf-4752-9b84-bdd796dad8d1"
    },
    {
      "id": "5f8fc2f6-ecf5-416d-95cb-73b21abfdc43",
      "text": "Implement contraflow lane management",
      "custom_tooltip": "<b>Implement contraflow lane management</b><br>Objective: Optimize traffic flow by reversing lane directions. Scope: Design contraflow lane configurations, install signage, and train personnel. Steps: Plan contraflow routes, deploy signage, and conduct training exercises. Deliverables: Contraflow lane management plan.<br><b>Resources needed:</b><br><ul><li>Traffic management specialists</li><li>Signage crews</li><li>Law enforcement</li><li>Traffic cones</li></ul>",
      "start_date": "2026-08-28",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "f559778f-38a0-4318-90cf-b6853fecf0d9 FS",
      "parent": "ac17abf5-f7cf-4752-9b84-bdd796dad8d1"
    },
    {
      "id": "befbfde5-6321-43ba-a936-024836cf842d",
      "text": "Coordinate traffic control personnel",
      "custom_tooltip": "<b>Coordinate traffic control personnel</b><br>Objective: Ensure effective traffic management during evacuation. Scope: Deploy personnel at key intersections, establish communication protocols, and provide training. Steps: Assign personnel to locations, establish communication channels, and conduct training. Deliverables: Traffic control personnel deployment plan.<br><b>Resources needed:</b><br><ul><li>Law enforcement</li><li>Traffic controllers</li><li>Communication equipment</li><li>Training materials</li></ul>",
      "start_date": "2026-08-30",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "5f8fc2f6-ecf5-416d-95cb-73b21abfdc43 FS",
      "parent": "ac17abf5-f7cf-4752-9b84-bdd796dad8d1"
    },
    {
      "id": "1ab6b739-3ff5-4669-a8f9-5f085e6aeff3",
      "text": "Simulate traffic flow under evacuation conditions",
      "custom_tooltip": "<b>Simulate traffic flow under evacuation conditions</b><br>Objective: Validate the effectiveness of the traffic flow optimization strategy. Scope: Model traffic flow with evacuation parameters, identify potential bottlenecks, and refine the plan. Steps: Input evacuation data into traffic model, run simulations, and analyze results. Deliverables: Traffic simulation report.<br><b>Resources needed:</b><br><ul><li>Traffic modelers</li><li>Simulation software</li><li>Data analysts</li><li>High-performance computers</li></ul>",
      "start_date": "2026-09-01",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "ac17abf5-f7cf-4752-9b84-bdd796dad8d1 FF, befbfde5-6321-43ba-a936-024836cf842d FS",
      "parent": "ac17abf5-f7cf-4752-9b84-bdd796dad8d1"
    },

      "text": "Implement Public Communication Strategy",
      "custom_tooltip": "<b>Implement Public Communication Strategy</b>",
      "progress": 0,

      "meta": "ac17abf5-f7cf-4752-9b84-bdd796dad8d1 FS",

    },
    {
      "id": "d320f252-27d5-4052-879a-d023dbfa4590",
      "text": "Identify Target Audiences",
      "custom_tooltip": "<b>Identify Target Audiences</b><br>Define specific groups (tourists, residents, non-English speakers) to tailor messaging.<br><b>Resources needed:</b><br><ul><li>Demographic data</li><li>Communication specialists</li></ul>",

    },
    {
      "id": "a2a2b811-1c3a-4ec8-839f-cb926e47f1bd",
      "text": "Craft Key Messages",
      "custom_tooltip": "<b>Craft Key Messages</b><br>Develop clear, concise, and actionable messages for each target audience.<br><b>Resources needed:</b><br><ul><li>Communication specialists</li><li>Volcanologists</li><li>Emergency managers</li></ul>",

    },
    {
      "id": "6b115bb3-98d1-4bdb-83f0-836a18c2c879",
      "text": "Select Communication Channels",
      "custom_tooltip": "<b>Select Communication Channels</b><br>Determine the most effective channels (radio, TV, social media, IPAWS) for reaching each audience.<br><b>Resources needed:</b><br><ul><li>Communication specialists</li><li>IT support</li><li>Emergency managers</li></ul>",

      "text": "Develop Multilingual Alerts",
      "custom_tooltip": "<b>Develop Multilingual Alerts</b><br>Translate key messages into multiple languages to reach non-English speakers.<br><b>Resources needed:</b><br><ul><li>Translators</li><li>Communication specialists</li></ul>",

      "text": "Monitor and Address Misinformation",
      "custom_tooltip": "<b>Monitor and Address Misinformation</b><br>Actively monitor social media and other channels for misinformation and provide accurate updates.<br><b>Resources needed:</b><br><ul><li>Social media monitoring tools</li><li>Communication specialists</li></ul>",

    {
      "id": "fac5343f-11c1-4839-881c-2e9cb7dd58fc",
      "text": "Plan Evacuation Drill Scenarios",
      "custom_tooltip": "<b>Plan Evacuation Drill Scenarios</b><br>Develop realistic evacuation drill scenarios that simulate various eruption conditions and logistical challenges. This includes defining objectives, scope, and key performance indicators (KPIs) for each drill.<br><b>Resources needed:</b><br><ul><li>Emergency Management Specialists</li><li>Volcanologists</li><li>Logistics Coordinators</li></ul>",
      "start_date": "2026-09-13",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "4ffa5915-6ff3-48f6-8366-e1fbb95b6994 SS",

    },
    {
      "id": "7e87cf12-f940-494a-b7c7-49fc34b352de",
      "text": "Secure Drill Participation",
      "custom_tooltip": "<b>Secure Drill Participation</b><br>Recruit and engage participants from the public, emergency response agencies, and relevant organizations. This includes developing communication materials, offering incentives, and coordinating logistics for participant involvement.<br><b>Resources needed:</b><br><ul><li>Public Affairs Officers</li><li>Community Outreach Coordinators</li><li>Volunteer Coordinators</li></ul>",
      "start_date": "2026-09-15",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "fac5343f-11c1-4839-881c-2e9cb7dd58fc FS",
      "parent": "4ffa5915-6ff3-48f6-8366-e1fbb95b6994"
    },
    {
      "id": "87014429-83e3-43fe-9bc1-84194eb9bc64",
      "text": "Conduct Tabletop Exercise",
      "custom_tooltip": "<b>Conduct Tabletop Exercise</b><br>Before a full-scale drill, conduct a tabletop exercise to validate the evacuation plan and identify potential gaps or weaknesses. This involves bringing together key stakeholders to discuss and simulate the evacuation process.<br><b>Resources needed:</b><br><ul><li>Emergency Management Specialists</li><li>Agency Representatives</li><li>Facilitator</li></ul>",
      "start_date": "2026-09-17",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "7e87cf12-f940-494a-b7c7-49fc34b352de FS",
      "parent": "4ffa5915-6ff3-48f6-8366-e1fbb95b6994"
    },
    {
      "id": "5ead3571-ef4d-4de1-b0ef-ab81f6b9694f",
      "text": "Execute Evacuation Drills",
      "custom_tooltip": "<b>Execute Evacuation Drills</b><br>Implement the planned evacuation drills, ensuring safety and adherence to established protocols. This includes setting up the drill environment, monitoring participant performance, and collecting data for evaluation.<br><b>Resources needed:</b><br><ul><li>Emergency Responders</li><li>Safety Officers</li><li>Observers</li></ul>",
      "start_date": "2026-09-19",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "87014429-83e3-43fe-9bc1-84194eb9bc64 FS",
      "parent": "4ffa5915-6ff3-48f6-8366-e1fbb95b6994"
    },
    {
      "id": "420ef8ea-97b9-41f4-8fa6-cbe4a8d962ab",
      "text": "Analyze Drill Results and Improve Plan",
      "custom_tooltip": "<b>Analyze Drill Results and Improve Plan</b><br>Evaluate the results of the evacuation drills, identify areas for improvement, and update the evacuation plan accordingly. This includes documenting lessons learned, revising procedures, and conducting follow-up training.<br><b>Resources needed:</b><br><ul><li>Emergency Management Specialists</li><li>Data Analysts</li><li>Training Coordinators</li></ul>",
      "start_date": "2026-09-21",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "4ffa5915-6ff3-48f6-8366-e1fbb95b6994 FF, 5ead3571-ef4d-4de1-b0ef-ab81f6b9694f FS",

    {
      "id": "380e299a-43ee-4eb5-9602-4a49e85bdbc5",
      "text": "Identify Communication System Dependencies",
      "custom_tooltip": "<b>Identify Communication System Dependencies</b><br>Objective: Map all dependencies for each communication system (IPAWS, satellite phones, radio). Scope: Identify hardware, software, network, and personnel dependencies. Steps: Review system documentation, conduct interviews with IT staff, create dependency diagrams. Deliverables: Dependency matrix for each system.<br><b>Resources needed:</b><br><ul><li>IT Specialists</li><li>Communication Engineers</li><li>System Documentation</li></ul>",
      "start_date": "2026-09-23",

      "progress": 0,
      "open": true,
      "meta": "2b4ed5fe-c723-4b20-9d9c-6bf65e47cb94 SS",

    },
    {
      "id": "a898a644-8846-43b6-b024-71bf3be938d2",
      "text": "Assess System Interoperability",
      "custom_tooltip": "<b>Assess System Interoperability</b><br>Objective: Evaluate the ability of different communication systems to work together seamlessly. Scope: Test data exchange, voice communication, and system integration. Steps: Conduct interoperability testing, analyze test results, identify compatibility issues. Deliverables: Interoperability test report.<br><b>Resources needed:</b><br><ul><li>Communication Technicians</li><li>Testing Equipment</li><li>Interoperability Protocols</li></ul>",
      "start_date": "2026-09-24",
      "duration": 1.0,
      "progress": 0,
      "open": true,
      "meta": "380e299a-43ee-4eb5-9602-4a49e85bdbc5 FS",
      "parent": "2b4ed5fe-c723-4b20-9d9c-6bf65e47cb94"
    },
    {
      "id": "7bc06333-1d83-4cbe-984c-38c4f0490380",
      "text": "Secure Satellite Phone Inventory",
      "custom_tooltip": "<b>Secure Satellite Phone Inventory</b><br>Objective: Ensure sufficient satellite phones are available and ready for deployment. Scope: Verify inventory, test functionality, and establish distribution protocols. Steps: Conduct inventory audit, test phone functionality, develop distribution plan. Deliverables: Satellite phone inventory report and distribution plan.<br><b>Resources needed:</b><br><ul><li>Logistics Personnel</li><li>Satellite Phones</li><li>Inventory Management System</li></ul>",

    },
    {
      "id": "f54e3f8d-1aae-4d50-8ecb-3435636f0c22",
      "text": "Establish Backup Communication Protocols",
      "custom_tooltip": "<b>Establish Backup Communication Protocols</b><br>Objective: Define alternative communication methods in case primary systems fail. Scope: Identify backup systems (e.g., amateur radio, runners), develop communication protocols, and train personnel. Steps: Research backup systems, create communication protocols, conduct training exercises. Deliverables: Backup communication protocol document and training materials.<br><b>Resources needed:</b><br><ul><li>Communication Experts</li><li>Training Staff</li><li>Backup Communication Equipment</li></ul>",
      "start_date": "2026-09-26",
      "duration": 1.0,
      "progress": 0,
      "open": true,
      "meta": "2b4ed5fe-c723-4b20-9d9c-6bf65e47cb94 FF, 7bc06333-1d83-4cbe-984c-38c4f0490380 FS",

    {
      "id": "dd98842b-2646-42e2-a0d0-2beb1dc490f4",
      "text": "Identify Key Decision-Makers",
      "custom_tooltip": "<b>Identify Key Decision-Makers</b><br>Objective: Determine individuals with authority to transfer command.\nScope: Identify roles, responsibilities, and contact information.\nSteps: Review organizational charts, conduct interviews, document findings.\nDeliverables: List of key decision-makers with contact details.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Legal Counsel</li><li>Emergency Management Specialist</li></ul>",
      "start_date": "2026-09-27",
      "duration": 1.0,
      "progress": 0,
      "open": true,
      "meta": "cc00671f-963e-41a6-b510-247c0eca7ebc SS",
      "parent": "cc00671f-963e-41a6-b510-247c0eca7ebc"
    },
    {
      "id": "dd0fc9f4-b8aa-4cff-b661-1c639ca6059c",
      "text": "Document Authority Transfer Scenarios",
      "custom_tooltip": "<b>Document Authority Transfer Scenarios</b><br>Objective: Define specific scenarios requiring command decentralization.\nScope: Identify potential triggers and corresponding actions.\nSteps: Conduct risk assessment, develop scenario matrix, document protocols.\nDeliverables: Authority transfer scenario documentation.<br><b>Resources needed:</b><br><ul><li>Emergency Management Specialist</li><li>Risk Analyst</li><li>Legal Counsel</li></ul>",
      "start_date": "2026-09-28",
      "duration": 1.0,
      "progress": 0,
      "open": true,
      "meta": "dd98842b-2646-42e2-a0d0-2beb1dc490f4 FS",
      "parent": "cc00671f-963e-41a6-b510-247c0eca7ebc"
    },
    {
      "id": "0fbc2659-4f3d-4897-be95-dcfdb92c4538",
      "text": "Establish Communication Protocols",
      "custom_tooltip": "<b>Establish Communication Protocols</b><br>Objective: Define communication methods during authority transfer.\nScope: Ensure seamless information flow between command levels.\nSteps: Develop communication plan, test communication systems, train personnel.\nDeliverables: Communication protocols and training materials.<br><b>Resources needed:</b><br><ul><li>Communication Specialist</li><li>IT Support</li><li>Training Coordinator</li></ul>",
      "start_date": "2026-09-29",
      "duration": 1.0,
      "progress": 0,
      "open": true,
      "meta": "dd0fc9f4-b8aa-4cff-b661-1c639ca6059c FS",
      "parent": "cc00671f-963e-41a6-b510-247c0eca7ebc"
    },
    {
      "id": "4f346437-bb66-4932-b8b7-99af7ad98966",
      "text": "Develop Delegation of Authority Matrix",
      "custom_tooltip": "<b>Develop Delegation of Authority Matrix</b><br>Objective: Clearly define delegated powers during decentralization.\nScope: Specify responsibilities and decision-making authority.\nSteps: Create matrix, review with stakeholders, obtain approvals.\nDeliverables: Delegation of Authority Matrix.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Legal Counsel</li><li>Emergency Management Specialist</li></ul>",
      "start_date": "2026-09-30",
      "duration": 1.0,
      "progress": 0,
      "open": true,
      "meta": "0fbc2659-4f3d-4897-be95-dcfdb92c4538 FS",
      "parent": "cc00671f-963e-41a6-b510-247c0eca7ebc"
    },
    {
      "id": "78dbaf86-cf24-4a4a-8933-51f9ebab5cb4",
      "text": "Conduct Training on Decentralization",
      "custom_tooltip": "<b>Conduct Training on Decentralization</b><br>Objective: Prepare personnel for decentralized command roles.\nScope: Provide training on protocols, systems, and decision-making.\nSteps: Develop training materials, conduct workshops, evaluate effectiveness.\nDeliverables: Trained personnel and training records.<br><b>Resources needed:</b><br><ul><li>Training Coordinator</li><li>Emergency Management Specialist</li><li>Subject Matter Experts</li></ul>",
      "start_date": "2026-10-01",
      "duration": 1.0,
      "progress": 0,
      "open": true,
      "meta": "cc00671f-963e-41a6-b510-247c0eca7ebc FF, 4f346437-bb66-4932-b8b7-99af7ad98966 FS",
      "parent": "cc00671f-963e-41a6-b510-247c0eca7ebc"
    },
    {
      "id": "cdb32941-90af-489c-a1bd-211c63bf52a1",
      "text": "Develop Command Structure Adaptability",
      "custom_tooltip": "<b>Develop Command Structure Adaptability</b>",
      "progress": 0,
      "open": true,
      "meta": "e9f43038-8c65-4121-906a-ed59b4c85cea FF, cc00671f-963e-41a6-b510-247c0eca7ebc FS",
