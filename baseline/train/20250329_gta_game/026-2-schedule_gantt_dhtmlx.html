      "text": "Conduct Playtesting and Gather Feedback",
      "custom_tooltip": "<b>Conduct Playtesting and Gather Feedback</b><br>Conduct playtesting sessions with target audience to gather feedback on the morality system. This includes observing player behavior, collecting survey data, and conducting focus groups to understand player perceptions of the system&#x27;s fairness, engagement, and impact on the overall gameplay experience.<br><b>Resources needed:</b><br><ul><li>Community Liaison</li><li>Tester Coordinator</li><li>Game Designer</li></ul>",

      "custom_tooltip": "<b>Iterate and Refine Morality System</b><br>Based on playtesting feedback, iterate and refine the morality system to address any issues and improve its overall effectiveness. This includes adjusting the mechanics for tracking player morality, modifying the consequences of player actions, and enhancing the feedback provided to the player.<br><b>Resources needed:</b><br><ul><li>Gameplay Programmer</li><li>Game Designer</li><li>Narrative Director</li></ul>",

      "custom_tooltip": "<b>Conduct penetration testing</b><br>Simulate real-world attacks to identify vulnerabilities in the game&#x27;s code, network infrastructure, and server-side components. This includes testing for common web application vulnerabilities, such as SQL injection and cross-site scripting.<br><b>Resources needed:</b><br><ul><li>Penetration Testers</li><li>Security Engineers</li><li>Network Administrators</li></ul>",

      "text": "Perform vulnerability scanning",
      "custom_tooltip": "<b>Perform vulnerability scanning</b><br>Use automated tools to scan the game&#x27;s code and infrastructure for known vulnerabilities. This includes scanning for outdated software, misconfigurations, and other security weaknesses.<br><b>Resources needed:</b><br><ul><li>Security Engineers</li><li>System Administrators</li><li>Vulnerability Scanning Tools</li></ul>",

      "id": "5e247d11-35cb-4849-9d9e-844d1fa67857",
      "text": "Review ESRB/PEGI guidelines for compliance",
      "custom_tooltip": "<b>Review ESRB/PEGI guidelines for compliance</b><br>Objective: Ensure the game adheres to ESRB and PEGI rating guidelines.\nScope: Review all game content (narrative, gameplay, art) against ESRB and PEGI standards.\nSteps: 1. Obtain the latest ESRB and PEGI guidelines. 2. Conduct a thorough review of the game content. 3. Document any potential violations.\nDeliverables: Compliance report detailing any areas of concern.<br><b>Resources needed:</b><br><ul><li>Legal Counsel</li><li>Game Designers</li><li>Narrative Director</li><li>Art Director</li></ul>",
      "start_date": "2035-10-01",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "1f7c7d6c-194e-4cd7-9b2d-9fb8e7398d7b SS",

    },
    {
      "id": "096477a2-14c6-40da-ada1-bc6bcb0f7897",
      "text": "GDPR/CCPA data handling compliance review",
      "custom_tooltip": "<b>GDPR/CCPA data handling compliance review</b><br>Objective: Verify that the game&#x27;s data handling practices comply with GDPR and CCPA regulations.\nScope: Review all aspects of data collection, storage, and usage within the game.\nSteps: 1. Review GDPR and CCPA regulations. 2. Map data flows within the game. 3. Assess compliance with data privacy principles. 4. Document any non-compliance issues.\nDeliverables: Data handling compliance report.<br><b>Resources needed:</b><br><ul><li>Data Protection Officer</li><li>Software Engineers</li><li>Legal Counsel</li><li>Project Manager</li></ul>",
      "start_date": "2035-10-04",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "5e247d11-35cb-4849-9d9e-844d1fa67857 FS",
      "parent": "1f7c7d6c-194e-4cd7-9b2d-9fb8e7398d7b"
    },
    {
      "id": "47de4281-e05b-4b86-becf-28edb0c624e5",
      "text": "Implement data privacy features",
      "custom_tooltip": "<b>Implement data privacy features</b><br>Objective: Implement necessary features to ensure player data privacy.\nScope: Develop and integrate features such as data access requests, data deletion options, and consent management.\nSteps: 1. Design data privacy features. 2. Develop and test the features. 3. Integrate the features into the game. 4. Document the implementation.\nDeliverables: Implemented data privacy features.<br><b>Resources needed:</b><br><ul><li>Software Engineers</li><li>UI/UX Designers</li><li>QA Testers</li></ul>",
      "start_date": "2035-10-07",
      "duration": 3.0,

      "open": true,
      "meta": "096477a2-14c6-40da-ada1-bc6bcb0f7897 FS",

    },
    {
      "id": "996830f7-f8ca-4221-8db0-63701fd028cc",
      "text": "Document compliance procedures",
      "custom_tooltip": "<b>Document compliance procedures</b><br>Objective: Create comprehensive documentation of all compliance procedures.\nScope: Document all processes related to ESRB, PEGI, GDPR, and CCPA compliance.\nSteps: 1. Document existing compliance procedures. 2. Identify any gaps in documentation. 3. Create new documentation as needed. 4. Review and approve all documentation.\nDeliverables: Complete set of compliance documentation.<br><b>Resources needed:</b><br><ul><li>Technical Writers</li><li>Project Manager</li><li>Legal Counsel</li></ul>",

      "id": "7c3e9d72-86ab-47ef-a703-01d606933a04",
      "text": "Research Target Audience and Market Trends",
      "custom_tooltip": "<b>Research Target Audience and Market Trends</b><br>Conduct thorough research to identify the target audience, understand their preferences, and analyze current market trends in the gaming industry. This includes analyzing competitor marketing strategies and identifying potential opportunities.<br><b>Resources needed:</b><br><ul><li>Market Research Analyst</li><li>Data Analyst</li><li>Game Industry Expert</li></ul>",

    {
      "id": "6e7f9f59-0df4-45d4-a2fb-a1ab38db4693",
      "text": "Define Key Marketing Messages and Themes",
      "custom_tooltip": "<b>Define Key Marketing Messages and Themes</b><br>Based on the market research, define the key marketing messages and themes that will resonate with the target audience. This includes identifying the unique selling points of the game and crafting compelling narratives.<br><b>Resources needed:</b><br><ul><li>Marketing Manager</li><li>Creative Director</li><li>Narrative Designer</li></ul>",

    {
      "id": "3fe7f901-3f75-4dda-a9dd-628cbb2f8dab",
      "text": "Select Marketing Channels and Platforms",
      "custom_tooltip": "<b>Select Marketing Channels and Platforms</b><br>Determine the most effective marketing channels and platforms to reach the target audience. This includes evaluating the reach, cost, and engagement potential of various channels, such as social media, online advertising, influencer marketing, and traditional media.<br><b>Resources needed:</b><br><ul><li>Marketing Manager</li><li>Media Planner</li><li>Digital Marketing Specialist</li></ul>",

      "text": "Develop a Detailed Marketing Budget",
      "custom_tooltip": "<b>Develop a Detailed Marketing Budget</b><br>Create a detailed marketing budget that allocates resources to each marketing channel and activity. This includes estimating the cost of advertising, content creation, public relations, and other marketing expenses.<br><b>Resources needed:</b><br><ul><li>Marketing Manager</li><li>Financial Analyst</li><li>Project Manager</li></ul>",

      "custom_tooltip": "<b>Create a Marketing Timeline and Schedule</b><br>Develop a comprehensive marketing timeline and schedule that outlines the key marketing activities and milestones leading up to the game&#x27;s release. This includes setting deadlines for content creation, campaign launches, and media outreach.<br><b>Resources needed:</b><br><ul><li>Marketing Manager</li><li>Project Manager</li><li>Marketing Team</li></ul>",

      "id": "3ef3712e-94d0-4ee6-b371-0b9379d8b35f",
      "text": "Create marketing assets (trailers, screenshots)",
      "custom_tooltip": "<b>Create marketing assets (trailers, screenshots)</b><br>Develop compelling trailers, gameplay videos, and high-resolution screenshots showcasing the game&#x27;s key features and environments. This includes capturing in-game footage, editing, and adding visual effects.<br><b>Resources needed:</b><br><ul><li>Marketing team</li><li>Video editors</li><li>Graphic designers</li><li>Game capture specialists</li></ul>",

    {
      "id": "dcf85a12-5771-4837-a4d9-aa66f85675b9",
      "text": "Manage social media and community engagement",
      "custom_tooltip": "<b>Manage social media and community engagement</b><br>Create and curate engaging content for social media platforms (Twitter, Facebook, Instagram, YouTube, TikTok). Respond to community inquiries, moderate discussions, and run contests and giveaways to build hype and generate excitement.<br><b>Resources needed:</b><br><ul><li>Social media manager</li><li>Community manager</li><li>Content creators</li><li>Moderators</li></ul>",

    {
      "id": "17553e9a-ccec-49ab-bbf7-0c01c7d00ed7",
      "text": "Coordinate press releases and media outreach",
      "custom_tooltip": "<b>Coordinate press releases and media outreach</b><br>Draft and distribute press releases to gaming news outlets, websites, and influencers. Pitch story ideas and secure interviews with key members of the development team to generate positive media coverage.<br><b>Resources needed:</b><br><ul><li>PR manager</li><li>Communications specialist</li><li>Media relations team</li></ul>",

      "text": "Run paid advertising campaigns",
      "custom_tooltip": "<b>Run paid advertising campaigns</b><br>Plan and execute paid advertising campaigns on platforms like Google Ads, social media, and gaming websites. Optimize ad targeting and bidding strategies to maximize reach and conversions.<br><b>Resources needed:</b><br><ul><li>Marketing team</li><li>Advertising specialists</li><li>Data analysts</li></ul>",

      "id": "a58eb704-083c-4a73-8fa5-03e5018e7adb",
      "text": "Organize promotional events and partnerships",
      "custom_tooltip": "<b>Organize promotional events and partnerships</b><br>Plan and execute promotional events, such as game demos at conventions, online streams, and collaborations with other brands or influencers. Secure partnerships to cross-promote the game to new audiences.<br><b>Resources needed:</b><br><ul><li>Event planners</li><li>Partnerships manager</li><li>Marketing team</li></ul>",

      "custom_tooltip": "<b>Finalize Game Build and Master Discs</b><br>Compile the final game build, create master discs for distribution, and verify the integrity of the build.<br><b>Resources needed:</b><br><ul><li>Software Engineers</li><li>QA Testers</li><li>Build Engineers</li></ul>",

      "custom_tooltip": "<b>Submit Game for Platform Certification</b><br>Submit the game build to platform holders (Sony, Microsoft, Steam, etc.) for certification and approval.<br><b>Resources needed:</b><br><ul><li>Producers</li><li>Technical Directors</li><li>Compliance Team</li></ul>",

      "id": "e34e1028-bd41-44e3-92e2-73b95975ce4b",
      "text": "Prepare Digital Distribution Platforms",
      "custom_tooltip": "<b>Prepare Digital Distribution Platforms</b><br>Set up the game on digital distribution platforms (Steam, PlayStation Store, Xbox Marketplace, etc.) with appropriate metadata, pricing, and release dates.<br><b>Resources needed:</b><br><ul><li>Producers</li><li>Marketing Team</li><li>Platform Specialists</li></ul>",

    {
      "id": "74370eca-60db-4447-a01f-d0cb9d1c7110",
      "text": "Coordinate Physical Distribution Logistics",
      "custom_tooltip": "<b>Coordinate Physical Distribution Logistics</b><br>Manage the logistics of physical game distribution, including manufacturing, packaging, shipping, and retail partnerships.<br><b>Resources needed:</b><br><ul><li>Operations Manager</li><li>Logistics Team</li><li>Retail Partners</li></ul>",

    {
      "id": "d4ab7132-b76b-46ad-891c-a40723f902fb",
      "text": "Prepare Day-One Patch and Server Infrastructure",
      "custom_tooltip": "<b>Prepare Day-One Patch and Server Infrastructure</b><br>Develop and test a day-one patch to address any last-minute bugs or issues, and ensure the server infrastructure is ready to handle the expected player load.<br><b>Resources needed:</b><br><ul><li>Software Engineers</li><li>QA Testers</li><li>Server Engineers</li></ul>",

      "custom_tooltip": "<b>Finalize Game Build and Master Discs</b><br>Create the gold master build, verify its integrity, and prepare physical master discs for distribution.<br><b>Resources needed:</b><br><ul><li>Software Engineers</li><li>QA Testers</li><li>Build Engineers</li></ul>",

      "id": "cf3658f5-0046-4453-b44f-ad795990b152",
      "text": "Coordinate Launch Day Server Infrastructure",
      "custom_tooltip": "<b>Coordinate Launch Day Server Infrastructure</b><br>Ensure servers are properly configured, load balanced, and ready to handle launch day player traffic. Monitor server performance and address any issues.<br><b>Resources needed:</b><br><ul><li>Network Engineers</li><li>Server Administrators</li><li>DevOps Team</li></ul>",

    {
      "id": "997dc5f1-6f21-4d65-8611-6117451f9ac3",
      "text": "Prepare Customer Support Channels",
      "custom_tooltip": "<b>Prepare Customer Support Channels</b><br>Set up help desks, FAQs, and support staff to handle player inquiries and technical issues during launch.<br><b>Resources needed:</b><br><ul><li>Customer Support Team</li><li>Community Managers</li><li>Technical Support Staff</li></ul>",

      "duration": 1.0,
      "progress": 0,

    },
    {
      "id": "715d8192-5b77-4d00-8353-2d038c55c103",
      "text": "Coordinate with Platform Holders (Sony, Microsoft, PC)",
      "custom_tooltip": "<b>Coordinate with Platform Holders (Sony, Microsoft, PC)</b><br>Ensure the game is properly submitted and approved on all target platforms. Address any last-minute certification requirements.<br><b>Resources needed:</b><br><ul><li>Producers</li><li>Platform Liaisons</li><li>Legal Team</li></ul>",

    {
      "id": "fdeaa8d2-54d4-451b-b171-dd149cb261aa",
      "text": "Monitor Social Media and Community Forums",
      "custom_tooltip": "<b>Monitor Social Media and Community Forums</b><br>Track player sentiment, identify emerging issues, and respond to player feedback in real-time.<br><b>Resources needed:</b><br><ul><li>Community Managers</li><li>Social Media Team</li><li>PR Team</li></ul>",

    {
      "id": "25fc13c0-82c2-4305-8ba0-8bee93ab08c5",
      "text": "Analyze player reviews and feedback",
      "custom_tooltip": "<b>Analyze player reviews and feedback</b><br>Objective: Collect and analyze player reviews from various sources (e.g., Steam, Metacritic, forums) to identify common issues and sentiments. Scope: Cover all available player feedback channels. Steps: 1. Set up data collection tools. 2. Categorize and tag reviews. 3. Identify recurring themes. Deliverables: Summary report of player feedback.<br><b>Resources needed:</b><br><ul><li>Community Manager</li><li>Data Analyst</li><li>Sentiment Analysis Tools</li></ul>",
      "start_date": "2036-03-31",
      "duration": 12.0,
      "progress": 0,
      "open": true,
      "meta": "5637a107-2e73-46d7-886f-1302ce8ff460 SS",
      "parent": "5637a107-2e73-46d7-886f-1302ce8ff460"
    },
    {
      "id": "a6e248fc-e7bc-402e-b013-d4454dae615d",
      "text": "Monitor server performance and stability",
      "custom_tooltip": "<b>Monitor server performance and stability</b><br>Objective: Continuously monitor server performance metrics to identify and address any stability issues. Scope: Cover all game servers and related infrastructure. Steps: 1. Set up server monitoring tools. 2. Define performance thresholds. 3. Respond to alerts. Deliverables: Server performance reports and incident logs.<br><b>Resources needed:</b><br><ul><li>Server Engineers</li><li>Network Administrators</li><li>Monitoring Tools</li></ul>",
      "start_date": "2036-04-12",
      "duration": 12.0,
      "progress": 0,
      "open": true,
      "meta": "25fc13c0-82c2-4305-8ba0-8bee93ab08c5 FS",

    {
      "id": "d6241e4c-ea94-40cc-a4ae-55e21999a4c6",
      "text": "Address critical bugs and exploits",
      "custom_tooltip": "<b>Address critical bugs and exploits</b><br>Objective: Identify and fix critical bugs and exploits that affect gameplay or security. Scope: Cover all reported bugs and potential exploits. Steps: 1. Prioritize bug reports. 2. Investigate and reproduce bugs. 3. Develop and test fixes. Deliverables: Bug fixes and patch notes.<br><b>Resources needed:</b><br><ul><li>Programmers</li><li>QA Testers</li><li>Bug Tracking System</li></ul>",
      "start_date": "2036-04-24",
      "duration": 12.0,
      "progress": 0,
      "open": true,
      "meta": "a6e248fc-e7bc-402e-b013-d4454dae615d FS",
      "parent": "5637a107-2e73-46d7-886f-1302ce8ff460"
    },
    {
      "id": "1b9c7d4c-a1ab-4b88-94bc-738bead77c53",
      "text": "Adjust in-game economy parameters",
      "custom_tooltip": "<b>Adjust in-game economy parameters</b><br>Objective: Analyze in-game economy data and adjust parameters to maintain balance and prevent exploits. Scope: Cover all aspects of the in-game economy. Steps: 1. Collect and analyze economic data. 2. Identify imbalances. 3. Adjust parameters. Deliverables: Updated economy parameters and analysis reports.<br><b>Resources needed:</b><br><ul><li>Game Designers</li><li>Economists</li><li>Data Analysis Tools</li></ul>",
      "start_date": "2036-05-06",
      "duration": 12.0,
      "progress": 0,
      "open": true,
      "meta": "d6241e4c-ea94-40cc-a4ae-55e21999a4c6 FS",
      "parent": "5637a107-2e73-46d7-886f-1302ce8ff460"
    },
    {
      "id": "72760a59-f29f-4490-83bc-cfd0ff0c0cc2",
      "text": "Plan and prepare content adjustments",
      "custom_tooltip": "<b>Plan and prepare content adjustments</b><br>Objective: Develop contingency content updates to address player concerns and maintain engagement. Scope: Cover potential content updates based on player feedback. Steps: 1. Brainstorm content ideas. 2. Prioritize content based on feedback. 3. Develop content plans. Deliverables: Content update plans and schedules.<br><b>Resources needed:</b><br><ul><li>Game Designers</li><li>Content Creators</li><li>Community Manager</li></ul>",
      "start_date": "2036-05-18",
      "duration": 12.0,
      "progress": 0,

    {
      "id": "dab8c2c0-bb07-42f8-a2b0-586ea1a21e5e",
      "text": "Address Bugs and Issues",
      "custom_tooltip": "<b>Address Bugs and Issues</b>",
      "progress": 0,
      "open": true,
      "meta": "4d677867-250d-4792-918c-66014aa889f8 SS",
      "parent": "4d677867-250d-4792-918c-66014aa889f8",

    {
      "id": "e96d9c68-a3ac-429a-b40f-7c6ae8ade8d8",
      "text": "Triage and Prioritize Bug Reports",
      "custom_tooltip": "<b>Triage and Prioritize Bug Reports</b><br>Objective: Efficiently categorize and prioritize incoming bug reports based on severity, impact, and frequency.\nScope: Review all new bug reports, assign priority levels, and route to appropriate development teams.\nSteps: 1. Establish a bug triage team. 2. Define severity and impact criteria. 3. Implement a bug tracking system. 4. Conduct daily triage meetings. 5. Assign bugs to developers.\nDeliverables: Prioritized bug backlog.<br><b>Resources needed:</b><br><ul><li>QA Lead</li><li>Senior Developer</li><li>Bug Tracking System</li></ul>",
      "start_date": "2036-05-30",
      "duration": 18.0,
      "progress": 0,
      "open": true,
      "meta": "dab8c2c0-bb07-42f8-a2b0-586ea1a21e5e SS",
      "parent": "dab8c2c0-bb07-42f8-a2b0-586ea1a21e5e"
    },
    {
      "id": "9d89310e-879a-4f91-9c04-38dcfdb43a4b",
      "text": "Reproduce and Verify Bug Reports",
      "custom_tooltip": "<b>Reproduce and Verify Bug Reports</b><br>Objective: Confirm the existence and behavior of reported bugs in a controlled environment.\nScope: Attempt to reproduce bugs reported by testers and players, gather additional information, and document reproduction steps.\nSteps: 1. Set up a test environment. 2. Follow reproduction steps. 3. Document results. 4. Gather system information. 5. Verify bug behavior.\nDeliverables: Verified bug reports with reproduction steps.<br><b>Resources needed:</b><br><ul><li>QA Tester</li><li>Test Environment</li><li>Bug Tracking System</li></ul>",
      "start_date": "2036-06-17",
      "duration": 18.0,
      "progress": 0,
      "open": true,
      "meta": "e96d9c68-a3ac-429a-b40f-7c6ae8ade8d8 FS",
      "parent": "dab8c2c0-bb07-42f8-a2b0-586ea1a21e5e"
    },
    {
      "id": "123c5637-996d-4641-982d-25c5295f12d9",
      "text": "Develop and Test Bug Fixes",
      "custom_tooltip": "<b>Develop and Test Bug Fixes</b><br>Objective: Create and test solutions to address identified bugs.\nScope: Develop code fixes, conduct unit tests, and integrate fixes into the game build.\nSteps: 1. Analyze bug reports. 2. Develop code fixes. 3. Conduct unit tests. 4. Integrate fixes. 5. Test fixes in isolation.\nDeliverables: Code fixes and unit test results.<br><b>Resources needed:</b><br><ul><li>Software Engineer</li><li>Unit Testing Framework</li><li>Development Environment</li></ul>",
      "start_date": "2036-07-05",
      "duration": 18.0,
      "progress": 0,
      "open": true,
      "meta": "9d89310e-879a-4f91-9c04-38dcfdb43a4b FS",
      "parent": "dab8c2c0-bb07-42f8-a2b0-586ea1a21e5e"
    },
    {
      "id": "bcafb16f-f7da-411b-9de1-da6812772782",
      "text": "Integrate and Validate Bug Fixes",
      "custom_tooltip": "<b>Integrate and Validate Bug Fixes</b><br>Objective: Incorporate bug fixes into the main game build and validate their effectiveness.\nScope: Integrate code fixes, conduct regression testing, and verify that fixes do not introduce new issues.\nSteps: 1. Integrate code fixes. 2. Conduct regression testing. 3. Verify fix effectiveness. 4. Monitor for new issues. 5. Document validation results.\nDeliverables: Validated bug fixes integrated into the game build.<br><b>Resources needed:</b><br><ul><li>QA Tester</li><li>Software Engineer</li><li>Test Environment</li><li>Game Build</li></ul>",
      "start_date": "2036-07-23",
      "duration": 18.0,
      "progress": 0,
      "open": true,
      "meta": "123c5637-996d-4641-982d-25c5295f12d9 FS",
      "parent": "dab8c2c0-bb07-42f8-a2b0-586ea1a21e5e"
    },
    {
      "id": "aedcac43-12b5-4968-8635-e054d883c011",
      "text": "Document and Close Bug Reports",
      "custom_tooltip": "<b>Document and Close Bug Reports</b><br>Objective: Properly document the resolution of bugs and close out bug reports in the tracking system.\nScope: Update bug reports with fix details, verification results, and closure status.\nSteps: 1. Update bug reports. 2. Document fix details. 3. Verify closure criteria. 4. Close bug reports. 5. Archive bug reports.\nDeliverables: Closed bug reports with complete documentation.<br><b>Resources needed:</b><br><ul><li>QA Tester</li><li>Bug Tracking System</li></ul>",
      "start_date": "2036-08-10",
      "duration": 18.0,
      "progress": 0,
      "open": true,
      "meta": "dab8c2c0-bb07-42f8-a2b0-586ea1a21e5e FF, bcafb16f-f7da-411b-9de1-da6812772782 FS",
      "parent": "dab8c2c0-bb07-42f8-a2b0-586ea1a21e5e"
    },
    {
      "id": "59889a05-5215-44eb-b129-2c52c196a1c8",
      "text": "Develop and Release DLC Content",
      "custom_tooltip": "<b>Develop and Release DLC Content</b>",
      "progress": 0,
      "open": true,
      "meta": "dab8c2c0-bb07-42f8-a2b0-586ea1a21e5e FS",

    {
      "id": "2d8f32f4-7ebb-439c-9bc8-b82898bdfec8",
      "text": "Conceptualize DLC Themes and Storylines",
      "custom_tooltip": "<b>Conceptualize DLC Themes and Storylines</b><br>Brainstorm and develop compelling themes and storylines for the DLC, ensuring they align with the main game&#x27;s narrative and player expectations. Define the scope and objectives of each DLC pack.<br><b>Resources needed:</b><br><ul><li>Narrative Director</li><li>Lead Game Designer</li><li>Concept Artists</li></ul>",
      "start_date": "2036-08-28",
      "duration": 36.0,
      "progress": 0,
      "open": true,
      "meta": "59889a05-5215-44eb-b129-2c52c196a1c8 SS",
      "parent": "59889a05-5215-44eb-b129-2c52c196a1c8"
    },
    {
      "id": "0ab385af-012f-4da9-a4a4-0af4f16ba202",
      "text": "Design New Gameplay Mechanics and Features",
      "custom_tooltip": "<b>Design New Gameplay Mechanics and Features</b><br>Design and prototype new gameplay mechanics, weapons, vehicles, or other features that will be included in the DLC. Ensure these additions are balanced and integrate seamlessly with the existing game systems.<br><b>Resources needed:</b><br><ul><li>Game Designers</li><li>Gameplay Programmers</li><li>Level Designers</li></ul>",
      "start_date": "2036-10-03",
      "duration": 36.0,
      "progress": 0,
      "open": true,
      "meta": "2d8f32f4-7ebb-439c-9bc8-b82898bdfec8 FS",
      "parent": "59889a05-5215-44eb-b129-2c52c196a1c8"
    },
    {
      "id": "e018ab64-d32f-42f8-b655-03a270c86b41",
      "text": "Create New Assets and Environments",
      "custom_tooltip": "<b>Create New Assets and Environments</b><br>Develop new environments, characters, vehicles, weapons, and other assets required for the DLC. Optimize assets for performance and ensure they meet the game&#x27;s visual quality standards.<br><b>Resources needed:</b><br><ul><li>3D Artists</li><li>Texture Artists</li><li>Environment Artists</li><li>Animators</li></ul>",
      "start_date": "2036-11-08",
      "duration": 36.0,
      "progress": 0,
      "open": true,
      "meta": "0ab385af-012f-4da9-a4a4-0af4f16ba202 FS",
      "parent": "59889a05-5215-44eb-b129-2c52c196a1c8"
    },
    {
      "id": "582c6f26-6b10-4f7f-8727-5a2ba0da4f89",
      "text": "Implement and Test DLC Content",
      "custom_tooltip": "<b>Implement and Test DLC Content</b><br>Integrate the new assets, mechanics, and storylines into the game. Conduct thorough testing to identify and fix bugs, balance gameplay, and ensure a smooth player experience.<br><b>Resources needed:</b><br><ul><li>Gameplay Programmers</li><li>Level Designers</li><li>QA Testers</li></ul>",
      "start_date": "2036-12-14",
      "duration": 36.0,
      "progress": 0,
      "open": true,
      "meta": "e018ab64-d32f-42f8-b655-03a270c86b41 FS",
      "parent": "59889a05-5215-44eb-b129-2c52c196a1c8"
    },
    {
      "id": "a5d0c95b-6cb8-4428-89ca-24ab32870aad",
      "text": "Prepare and Release DLC",
      "custom_tooltip": "<b>Prepare and Release DLC</b><br>Prepare marketing materials, build the DLC package, and release it on all target platforms. Monitor player feedback and provide ongoing support.<br><b>Resources needed:</b><br><ul><li>Marketing Team</li><li>Build Engineers</li><li>Community Managers</li><li>Support Staff</li></ul>",
      "start_date": "2037-01-19",
      "duration": 36.0,
      "progress": 0,
      "open": true,
      "meta": "59889a05-5215-44eb-b129-2c52c196a1c8 FF, 582c6f26-6b10-4f7f-8727-5a2ba0da4f89 FS",
      "parent": "59889a05-5215-44eb-b129-2c52c196a1c8"
    },
    {
      "id": "87f7a742-465f-48af-9d79-ccb41687ae1e",
      "text": "Provide Ongoing Player Support",
      "custom_tooltip": "<b>Provide Ongoing Player Support</b>",
      "progress": 0,
      "open": true,
      "meta": "59889a05-5215-44eb-b129-2c52c196a1c8 FS",

    {
      "id": "95afb2e1-7a33-40de-a798-0497e4d8f56d",
      "text": "Triage incoming player support tickets",
      "custom_tooltip": "<b>Triage incoming player support tickets</b><br>Objective: Efficiently categorize and prioritize incoming player support tickets.\nScope: Includes all channels (email, forums, in-game).\nSteps: Review each ticket, assign severity, route to appropriate team.\nDeliverables: Prioritized queue of support tickets.<br><b>Resources needed:</b><br><ul><li>Support Team</li><li>Ticketing System</li></ul>",
      "start_date": "2037-02-24",
      "duration": 183.0,
      "progress": 0,
      "open": true,
      "meta": "87f7a742-465f-48af-9d79-ccb41687ae1e SS",
      "parent": "87f7a742-465f-48af-9d79-ccb41687ae1e"
    },
    {
      "id": "078b3180-d0d3-4538-9a55-cf82e5015487",
      "text": "Respond to player inquiries and issues",
      "custom_tooltip": "<b>Respond to player inquiries and issues</b><br>Objective: Provide timely and helpful responses to player inquiries and resolve technical issues.\nScope: Covers a wide range of topics, from gameplay questions to bug reports.\nSteps: Investigate issues, provide solutions, escalate complex problems.\nDeliverables: Resolved player issues, satisfied players.<br><b>Resources needed:</b><br><ul><li>Support Team</li><li>Knowledge Base</li></ul>",
      "start_date": "2037-08-26",
      "duration": 183.0,
      "progress": 0,
      "open": true,
      "meta": "95afb2e1-7a33-40de-a798-0497e4d8f56d FS",
      "parent": "87f7a742-465f-48af-9d79-ccb41687ae1e"
    },
    {
      "id": "6bc4053d-6be5-4884-9088-bc005ac135d0",
      "text": "Escalate complex issues to development team",
      "custom_tooltip": "<b>Escalate complex issues to development team</b><br>Objective: Ensure that complex technical issues are addressed by the development team.\nScope: Includes bugs, exploits, and other game-breaking problems.\nSteps: Gather detailed information, document steps to reproduce, submit to developers.\nDeliverables: Detailed bug reports for developers.<br><b>Resources needed:</b><br><ul><li>Support Team</li><li>Development Team</li><li>Bug Tracking System</li></ul>",
      "start_date": "2038-02-25",
      "duration": 183.0,
      "progress": 0,
      "open": true,
      "meta": "078b3180-d0d3-4538-9a55-cf82e5015487 FS",
      "parent": "87f7a742-465f-48af-9d79-ccb41687ae1e"
    },
    {
      "id": "f6a5cbeb-bbee-4eaa-b77a-01424d98c9c8",
      "text": "Monitor player sentiment and feedback",
      "custom_tooltip": "<b>Monitor player sentiment and feedback</b><br>Objective: Track player sentiment and identify emerging trends and issues.\nScope: Includes forums, social media, and in-game feedback.\nSteps: Monitor channels, analyze data, identify key themes.\nDeliverables: Reports on player sentiment and feedback.<br><b>Resources needed:</b><br><ul><li>Community Manager</li><li>Sentiment Analysis Tools</li></ul>",
      "start_date": "2038-08-27",
      "duration": 183.0,
      "progress": 0,
      "open": true,
      "meta": "87f7a742-465f-48af-9d79-ccb41687ae1e FF, 6bc4053d-6be5-4884-9088-bc005ac135d0 FS",

    },
    {
      "id": "c183a23c-1757-4ded-9200-34945bc91fa7",
      "text": "Monitor Player Feedback and Plan Updates",
      "custom_tooltip": "<b>Monitor Player Feedback and Plan Updates</b>",
      "progress": 0,
      "open": true,
      "meta": "4d677867-250d-4792-918c-66014aa889f8 FF, 87f7a742-465f-48af-9d79-ccb41687ae1e FS",
      "parent": "4d677867-250d-4792-918c-66014aa889f8",

    {
      "id": "1dcc7e1c-bad2-4b02-a350-eb32c333e6cc",
      "text": "Collect player feedback from multiple sources",
      "custom_tooltip": "<b>Collect player feedback from multiple sources</b><br>Gather player feedback from in-game surveys, forums, social media, and reviews to understand player sentiment and identify areas for improvement.<br><b>Resources needed:</b><br><ul><li>Community managers</li><li>Data analysts</li><li>Sentiment analysis tools</li></ul>",
      "start_date": "2039-02-26",
      "duration": 146.0,
      "progress": 0,
      "open": true,
      "meta": "c183a23c-1757-4ded-9200-34945bc91fa7 SS",
      "parent": "c183a23c-1757-4ded-9200-34945bc91fa7"
    },
    {
      "id": "6ff1be33-2119-48e1-964a-d95e17e4ad45",
      "text": "Analyze feedback and identify key trends",
      "custom_tooltip": "<b>Analyze feedback and identify key trends</b><br>Analyze the collected feedback to identify recurring themes, prioritize issues, and understand the impact of different gameplay elements on player satisfaction.<br><b>Resources needed:</b><br><ul><li>Data analysts</li><li>Game designers</li><li>Project managers</li></ul>",
      "start_date": "2039-07-22",
      "duration": 146.0,
      "progress": 0,
      "open": true,
      "meta": "1dcc7e1c-bad2-4b02-a350-eb32c333e6cc FS",
      "parent": "c183a23c-1757-4ded-9200-34945bc91fa7"
    },
    {
      "id": "be02e75e-08bc-4872-a5d0-222f0b370341",
      "text": "Prioritize updates based on player feedback",
      "custom_tooltip": "<b>Prioritize updates based on player feedback</b><br>Prioritize potential updates and changes based on the severity and frequency of reported issues, as well as the potential impact on player engagement and retention.<br><b>Resources needed:</b><br><ul><li>Game designers</li><li>Project managers</li><li>Lead programmers</li></ul>",
      "start_date": "2039-12-15",
      "duration": 146.0,
      "progress": 0,
      "open": true,
      "meta": "6ff1be33-2119-48e1-964a-d95e17e4ad45 FS",
      "parent": "c183a23c-1757-4ded-9200-34945bc91fa7"
    },
    {
      "id": "b30bcaa4-5754-4032-86fb-1510ab1ab6f4",
      "text": "Create update roadmap and communicate plans",
      "custom_tooltip": "<b>Create update roadmap and communicate plans</b><br>Develop a roadmap for future updates based on prioritized feedback and communicate these plans to the player community to manage expectations and build anticipation.<br><b>Resources needed:</b><br><ul><li>Community managers</li><li>Project managers</li><li>Marketing team</li></ul>",
      "start_date": "2040-05-09",
      "duration": 146.0,
      "progress": 0,
      "open": true,
      "meta": "be02e75e-08bc-4872-a5d0-222f0b370341 FS",
      "parent": "c183a23c-1757-4ded-9200-34945bc91fa7"
    },
    {
      "id": "b789eac8-d726-4adc-be85-bb39c3ef6773",
      "text": "Track update effectiveness and iterate",
      "custom_tooltip": "<b>Track update effectiveness and iterate</b><br>Monitor the impact of released updates on player satisfaction, engagement, and retention, and use this data to inform future updates and improvements.<br><b>Resources needed:</b><br><ul><li>Data analysts</li><li>Game designers</li><li>Community managers</li></ul>",
      "start_date": "2040-10-02",
      "duration": 146.0,
      "progress": 0,

    function zoomFit() {
        const tasks = gantt.getTaskByTime();
        if (tasks.length > 0) {
            const firstTask = tasks[0];
            const lastTask = tasks[tasks.length - 1];
            gantt.showDate(firstTask.start_date);
            
            // Calculate total duration in days
            const startDate = new Date(firstTask.start_date);
            const endDate = new Date(lastTask.end_date);
            const durationDays = (endDate - startDate) / (1000 * 60 * 60 * 24);
            
            // Choose appropriate scale based on duration
            if (durationDays > 3650) { // More than 10 years
                gantt.config.scale_unit = "year";
                gantt.config.step = 10;
                gantt.config.subscales = [
                    {unit: "year", step: 1, date: "%Y"}
                ];
            } else if (durationDays > 365) { // More than 1 year
                gantt.config.scale_unit = "year";
                gantt.config.step = 1;
                gantt.config.subscales = [
                    {unit: "month", step: 1, date: "%M"}
                ];
            } else if (durationDays > 30) { // More than 1 month
                gantt.config.scale_unit = "month";
                gantt.config.step = 1;
                gantt.config.subscales = [
                    {unit: "day", step: 1, date: "%d"}
                ];
            } else if (durationDays > 7) { // More than 1 week
                gantt.config.scale_unit = "week";
                gantt.config.step = 1;
                gantt.config.subscales = [
                    {unit: "day", step: 1, date: "%d"}
                ];
            } else {
                gantt.config.scale_unit = "day";
                gantt.config.step = 1;
                gantt.config.subscales = [];
            }
            gantt.render();
        }
    }

    function zoomIn() {
        const currentUnit = gantt.config.scale_unit;
        const currentStep = gantt.config.step;
        
        if (currentUnit === "year" && currentStep === 10) {
            gantt.config.scale_unit = "year";
            gantt.config.step = 1;
            gantt.config.subscales = [
                {unit: "month", step: 1, date: "%M"}
            ];
        } else if (currentUnit === "year") {
            gantt.config.scale_unit = "month";
            gantt.config.step = 1;
            gantt.config.subscales = [
                {unit: "day", step: 1, date: "%d"}
            ];
        } else if (currentUnit === "month") {
            gantt.config.scale_unit = "week";
            gantt.config.step = 1;
            gantt.config.subscales = [
                {unit: "day", step: 1, date: "%d"}
            ];
        } else if (currentUnit === "week") {
            gantt.config.scale_unit = "day";
            gantt.config.step = 1;
            gantt.config.subscales = [];
        }
        gantt.render();
    }

    function zoomOut() {
        const currentUnit = gantt.config.scale_unit;
        const currentStep = gantt.config.step;
        
        if (currentUnit === "day") {
            gantt.config.scale_unit = "week";
            gantt.config.step = 1;
            gantt.config.subscales = [
                {unit: "day", step: 1, date: "%d"}
            ];
        } else if (currentUnit === "week") {
            gantt.config.scale_unit = "month";
            gantt.config.step = 1;
            gantt.config.subscales = [
                {unit: "day", step: 1, date: "%d"}
            ];
        } else if (currentUnit === "month") {
            gantt.config.scale_unit = "year";
            gantt.config.step = 1;
            gantt.config.subscales = [
                {unit: "month", step: 1, date: "%M"}
            ];
        } else if (currentUnit === "year") {
            gantt.config.scale_unit = "year";
            gantt.config.step = 10;
            gantt.config.subscales = [
                {unit: "year", step: 1, date: "%Y"}
            ];
        }
        gantt.render();
    }

    function downloadCSV() {
        if (GANTT_DATA_CSV === null) {
            return;
        }
        const blob = new Blob([GANTT_DATA_CSV], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        const url = URL.createObjectURL(blob);
        link.setAttribute('href', url);
        link.setAttribute('download', GANTT_FILENAME_CSV);
        link.style.visibility = 'hidden';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    // Gantt Initialization
    gantt.config.readonly = true;
    gantt.config.date_format = "%Y-%m-%d";
    gantt.config.scale_unit = "month";
    gantt.config.step = 1;
    gantt.config.subscales = [
        {unit: "day", step: 1, date: "%d"}
    ];

    gantt.config.columns = [
        {name:"text", label:"Task name", width:"*", tree:true},
        // {name:"start_date", label:"Start time", align: "center"},
        // {name:"duration", label:"Duration", align: "center"}
    ];

    gantt.templates.task_class = function(start, end, task) {
        if (task.type === "project") {
            return "project-task";
        }
        return "";
    };

    gantt.templates.tooltip_text = function(start, end, task) {
        return task.custom_tooltip || "No tooltip";
    };
    
	gantt.plugins({
		tooltip: true
	});
	gantt.attachEvent("onGanttReady", function(){
		var tooltips = gantt.ext.tooltips;
		tooltips.tooltip.setViewport(gantt.$task_data);
	});
    gantt.init("gantt_container");
    gantt.parse(GANTT_DATA_DHTMLX);

    // Hide the export to CSV button if there is no CSV data
    if (GANTT_DATA_CSV === null) {
        document.getElementById('exportToCSVButton').style.display = 'none';
    }

    document.getElementById('zoomFitButton').addEventListener('click', zoomFit);
    document.getElementById('zoomInButton').addEventListener('click', zoomIn);
    document.getElementById('zoomOutButton').addEventListener('click', zoomOut);
    document.getElementById('exportToCSVButton').addEventListener('click', downloadCSV);
</script>
