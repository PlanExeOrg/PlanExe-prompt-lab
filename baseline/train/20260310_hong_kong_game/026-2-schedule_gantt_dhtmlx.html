    },
    {
      "id": "648a4bbc-4308-43fb-9737-f9de8e2cf704",
      "text": "Review Auditions and Shortlist Actors",
      "custom_tooltip": "<b>Review Auditions and Shortlist Actors</b><br>Review the audition tapes and performances of the actors who attended the initial casting calls. Create a shortlist of actors who are suitable for the supporting roles.<br><b>Resources needed:</b><br><ul><li>Director</li><li>Casting Director</li><li>Producers</li></ul>",
      "start_date": "2027-03-28",
      "duration": 6.0,
      "progress": 0,
      "open": true,
      "meta": "87a8761c-7353-4ee2-aa03-edb81c64b9d3 FS",
      "parent": "fd6a4e26-e68f-46e2-8913-e2ef91cbbb62"
    },
    {
      "id": "59b68b72-303c-44ca-b33d-be203a05535f",
      "text": "Conduct Callbacks and Chemistry Reads",
      "custom_tooltip": "<b>Conduct Callbacks and Chemistry Reads</b><br>Invite the shortlisted actors back for callbacks and chemistry reads with the lead actors. This will help determine the best fit for each supporting role and ensure good on-screen chemistry.<br><b>Resources needed:</b><br><ul><li>Director</li><li>Casting Director</li><li>Lead Actors</li><li>Audition Space</li></ul>",
      "start_date": "2027-04-03",
      "duration": 6.0,
      "progress": 0,
      "open": true,
      "meta": "648a4bbc-4308-43fb-9737-f9de8e2cf704 FS",
      "parent": "fd6a4e26-e68f-46e2-8913-e2ef91cbbb62"
    },
    {
      "id": "914b71dc-d2d6-4c48-9d26-b4ddc13db2d5",
      "text": "Finalize Supporting Cast Selection",
      "custom_tooltip": "<b>Finalize Supporting Cast Selection</b><br>Make the final selection of actors for the supporting roles based on their auditions, callbacks, and chemistry reads. Negotiate contracts and finalize agreements with the selected actors.<br><b>Resources needed:</b><br><ul><li>Director</li><li>Casting Director</li><li>Producers</li><li>Legal Counsel</li></ul>",
      "start_date": "2027-04-09",
      "duration": 6.0,
      "progress": 0,
      "open": true,
      "meta": "fd6a4e26-e68f-46e2-8913-e2ef91cbbb62 FF, 59b68b72-303c-44ca-b33d-be203a05535f FS",
      "parent": "fd6a4e26-e68f-46e2-8913-e2ef91cbbb62"
    },
    {
      "id": "c880fce9-fff5-4795-bc6d-a5b9eb2abbaa",
      "text": "Set Design and Construction",
      "custom_tooltip": "<b>Set Design and Construction</b>",
      "progress": 0,
      "open": true,
      "meta": "fd6a4e26-e68f-46e2-8913-e2ef91cbbb62 FS",
      "parent": "82f211f3-c501-460a-a229-db38de628e61",
      "type": "project"
    },
    {
      "id": "8464e684-fb82-46f0-8f69-c7c7bed30fb1",
      "text": "Finalize Set Designs",
      "custom_tooltip": "<b>Finalize Set Designs</b><br>Complete all set designs, incorporating director feedback and ensuring alignment with the film&#x27;s visual style. This includes detailed blueprints, 3D models, and material specifications.<br><b>Resources needed:</b><br><ul><li>Production Designer</li><li>Art Director</li><li>Set Designers</li><li>Director</li></ul>",
      "start_date": "2027-04-15",
      "duration": 12.0,
      "progress": 0,
      "open": true,
      "meta": "c880fce9-fff5-4795-bc6d-a5b9eb2abbaa SS",
      "parent": "c880fce9-fff5-4795-bc6d-a5b9eb2abbaa"
    },
    {
      "id": "66e6f564-93d1-451b-b4e7-6ef488273f15",
      "text": "Source Construction Materials",
      "custom_tooltip": "<b>Source Construction Materials</b><br>Identify and secure all necessary construction materials, including lumber, steel, paint, and decorative elements. Obtain quotes from multiple suppliers and negotiate favorable pricing.<br><b>Resources needed:</b><br><ul><li>Set Decorator</li><li>Construction Foreman</li><li>Purchasing Agent</li></ul>",
      "start_date": "2027-04-27",
      "duration": 12.0,
      "progress": 0,
      "open": true,
      "meta": "8464e684-fb82-46f0-8f69-c7c7bed30fb1 FS",
      "parent": "c880fce9-fff5-4795-bc6d-a5b9eb2abbaa"
    },
    {
      "id": "fb59231b-6584-4e98-aa09-991ef280af9e",
      "text": "Hire Construction Crew",
      "custom_tooltip": "<b>Hire Construction Crew</b><br>Recruit and hire a skilled construction crew, including carpenters, electricians, painters, and laborers. Conduct interviews, verify credentials, and negotiate contracts.<br><b>Resources needed:</b><br><ul><li>Construction Foreman</li><li>Production Manager</li><li>HR Representative</li></ul>",
      "start_date": "2027-05-09",
      "duration": 12.0,
      "progress": 0,
      "open": true,
      "meta": "66e6f564-93d1-451b-b4e7-6ef488273f15 FS",
      "parent": "c880fce9-fff5-4795-bc6d-a5b9eb2abbaa"
    },
    {
      "id": "b9946d38-0636-480f-bb05-e10fc6f8649a",
      "text": "Construct Sets",
      "custom_tooltip": "<b>Construct Sets</b><br>Oversee the construction of all sets according to the finalized designs and specifications. Ensure adherence to safety regulations and quality standards. Manage the construction schedule and budget.<br><b>Resources needed:</b><br><ul><li>Construction Foreman</li><li>Carpenters</li><li>Electricians</li><li>Painters</li><li>Laborers</li><li>Set Decorator</li></ul>",
      "start_date": "2027-05-21",
      "duration": 12.0,
      "progress": 0,
      "open": true,
      "meta": "fb59231b-6584-4e98-aa09-991ef280af9e FS",
      "parent": "c880fce9-fff5-4795-bc6d-a5b9eb2abbaa"
    },
    {
      "id": "dd06c4de-7c38-45b6-93d1-1018b734dede",
      "text": "Inspect and Approve Sets",
      "custom_tooltip": "<b>Inspect and Approve Sets</b><br>Conduct thorough inspections of all completed sets to ensure they meet the required standards for safety, functionality, and visual appeal. Obtain final approval from the director and production designer.<br><b>Resources needed:</b><br><ul><li>Director</li><li>Production Designer</li><li>Construction Foreman</li><li>Safety Inspector</li></ul>",
      "start_date": "2027-06-02",
      "duration": 12.0,
      "progress": 0,
      "open": true,
      "meta": "c880fce9-fff5-4795-bc6d-a5b9eb2abbaa FF, b9946d38-0636-480f-bb05-e10fc6f8649a FS",
      "parent": "c880fce9-fff5-4795-bc6d-a5b9eb2abbaa"
    },
    {
      "id": "3f0de406-07aa-4a99-8b1b-80a92c5c36d2",
      "text": "Costume Design and Fabrication",
      "custom_tooltip": "<b>Costume Design and Fabrication</b>",
      "progress": 0,
      "open": true,
      "meta": "c880fce9-fff5-4795-bc6d-a5b9eb2abbaa FS",
      "parent": "82f211f3-c501-460a-a229-db38de628e61",
      "type": "project"
    },
    {
      "id": "c2e29eec-c4ab-47da-91a2-e2fc550ecb84",
      "text": "Research Hong Kong fashion trends",
      "custom_tooltip": "<b>Research Hong Kong fashion trends</b><br>Research current and historical fashion trends in Hong Kong to inform costume design choices, ensuring authenticity and relevance to the setting.<br><b>Resources needed:</b><br><ul><li>Fashion researcher</li><li>Hong Kong cultural consultant</li><li>Online fashion databases</li></ul>",
      "start_date": "2027-06-14",
      "duration": 9.0,
      "progress": 0,
      "open": true,
      "meta": "3f0de406-07aa-4a99-8b1b-80a92c5c36d2 SS",
      "parent": "3f0de406-07aa-4a99-8b1b-80a92c5c36d2"
    },
    {
      "id": "9cadda32-d308-4507-ae05-67a551061e9d",
      "text": "Source fabrics and materials locally",
      "custom_tooltip": "<b>Source fabrics and materials locally</b><br>Identify and source fabrics, trims, and other materials from local suppliers in Hong Kong to support the local economy and ensure timely delivery.<br><b>Resources needed:</b><br><ul><li>Costume designer</li><li>Local sourcing agent</li><li>Fabric samples</li></ul>",
      "start_date": "2027-06-23",
      "duration": 9.0,
      "progress": 0,
      "open": true,
      "meta": "c2e29eec-c4ab-47da-91a2-e2fc550ecb84 FS",
      "parent": "3f0de406-07aa-4a99-8b1b-80a92c5c36d2"
    },
    {
      "id": "80a34ec9-12b0-43e8-acfa-3c9a05c9cf55",
      "text": "Design costumes for lead actors",
      "custom_tooltip": "<b>Design costumes for lead actors</b><br>Create detailed costume designs for the lead actors, considering their characters, the Hong Kong setting, and the overall visual style of the film.<br><b>Resources needed:</b><br><ul><li>Costume designer</li><li>Illustrator</li><li>Lead actors</li></ul>",
      "start_date": "2027-07-02",
      "duration": 9.0,
      "progress": 0,
      "open": true,
      "meta": "9cadda32-d308-4507-ae05-67a551061e9d FS",
      "parent": "3f0de406-07aa-4a99-8b1b-80a92c5c36d2"
    },
    {
      "id": "d3d00de5-7ca4-4a78-a196-e1f03c9855af",
      "text": "Fabricate and tailor costumes",
      "custom_tooltip": "<b>Fabricate and tailor costumes</b><br>Oversee the fabrication and tailoring of costumes, ensuring they fit the actors perfectly and meet the design specifications.<br><b>Resources needed:</b><br><ul><li>Tailors</li><li>Seamstresses</li><li>Costume supervisor</li></ul>",
      "start_date": "2027-07-11",
      "duration": 9.0,
      "progress": 0,
      "open": true,
      "meta": "80a34ec9-12b0-43e8-acfa-3c9a05c9cf55 FS",
      "parent": "3f0de406-07aa-4a99-8b1b-80a92c5c36d2"
    },
    {
      "id": "93d426a2-ceb5-4cc9-af78-cd58433c7e64",
      "text": "Conduct fittings and alterations",
      "custom_tooltip": "<b>Conduct fittings and alterations</b><br>Schedule and conduct costume fittings with the actors, making any necessary alterations to ensure a comfortable and flattering fit.<br><b>Resources needed:</b><br><ul><li>Costume designer</li><li>Tailors</li><li>Actors</li></ul>",
      "start_date": "2027-07-20",
      "duration": 9.0,
      "progress": 0,
      "open": true,
      "meta": "3f0de406-07aa-4a99-8b1b-80a92c5c36d2 FF, d3d00de5-7ca4-4a78-a196-e1f03c9855af FS",
      "parent": "3f0de406-07aa-4a99-8b1b-80a92c5c36d2"
    },
    {
      "id": "2c205f9e-e102-489f-9e88-9af526b5ab72",
      "text": "Secure Filming Permits",
      "custom_tooltip": "<b>Secure Filming Permits</b>",
      "progress": 0,
      "open": true,
      "meta": "3f0de406-07aa-4a99-8b1b-80a92c5c36d2 FS",
      "parent": "82f211f3-c501-460a-a229-db38de628e61",
      "type": "project"
    },
    {
      "id": "7802b753-3c30-46b6-b434-5534b291f766",
      "text": "Identify Key Filming Locations",
      "custom_tooltip": "<b>Identify Key Filming Locations</b><br>Objective: Identify all required filming locations in Hong Kong.\nScope: Research and document potential locations, considering accessibility, visual appeal, and logistical feasibility.\nSteps: 1. Review the script and identify location requirements. 2. Conduct online research and consult with location scouts. 3. Create a shortlist of potential locations for each scene. 4. Document each location with photos, descriptions, and contact information.\nDeliverables: A comprehensive list of potential filming locations with detailed information.<br><b>Resources needed:</b><br><ul><li>Location Scout</li><li>Script Supervisor</li><li>Transportation</li><li>Camera</li></ul>",
      "start_date": "2027-07-29",
      "duration": 6.0,
      "progress": 0,
      "open": true,
      "meta": "2c205f9e-e102-489f-9e88-9af526b5ab72 SS",
      "parent": "2c205f9e-e102-489f-9e88-9af526b5ab72"
    },
    {
      "id": "33106dad-ef84-4c64-bbdc-6ba92765aca2",
      "text": "Research Permit Requirements",
      "custom_tooltip": "<b>Research Permit Requirements</b><br>Objective: Understand the specific permit requirements for each identified filming location.\nScope: Research and document all necessary permits, licenses, and approvals required for filming in Hong Kong.\nSteps: 1. Contact the Hong Kong Film Development Council and other relevant government agencies. 2. Review online resources and legal documents. 3. Identify all required permits and their application processes. 4. Document the requirements for each permit, including fees, timelines, and required documentation.\nDeliverables: A detailed list of permit requirements for each filming location.<br><b>Resources needed:</b><br><ul><li>Permitting Specialist</li><li>Legal Counsel</li><li>Research Assistant</li></ul>",
      "start_date": "2027-08-04",
      "duration": 6.0,
      "progress": 0,
      "open": true,
      "meta": "7802b753-3c30-46b6-b434-5534b291f766 FS",
      "parent": "2c205f9e-e102-489f-9e88-9af526b5ab72"
    },
    {
      "id": "6872469f-d542-41c3-b28c-32e899a8face",
      "text": "Prepare Permit Applications",
      "custom_tooltip": "<b>Prepare Permit Applications</b><br>Objective: Prepare all necessary documentation for permit applications.\nScope: Gather and prepare all required documents for each permit application, ensuring accuracy and completeness.\nSteps: 1. Collect all required documents, such as location agreements, insurance certificates, and crew lists. 2. Complete the permit application forms accurately and thoroughly. 3. Review all documents for completeness and accuracy. 4. Prepare copies of all documents for submission.\nDeliverables: Complete and accurate permit application packages for each filming location.<br><b>Resources needed:</b><br><ul><li>Permitting Specialist</li><li>Administrative Assistant</li><li>Legal Counsel</li></ul>",
      "start_date": "2027-08-10",
      "duration": 6.0,
      "progress": 0,
      "open": true,
      "meta": "33106dad-ef84-4c64-bbdc-6ba92765aca2 FS",
      "parent": "2c205f9e-e102-489f-9e88-9af526b5ab72"
    },
    {
      "id": "6e82f7f2-aa82-4111-bc61-b5d221ee6bc9",
      "text": "Submit Permit Applications",
      "custom_tooltip": "<b>Submit Permit Applications</b><br>Objective: Submit the completed permit applications to the relevant government agencies.\nScope: Submit the permit applications and track their progress, ensuring timely approval.\nSteps: 1. Submit the permit applications to the appropriate government agencies. 2. Track the progress of each application. 3. Respond to any requests for additional information or clarification. 4. Follow up with the agencies to ensure timely approval.\nDeliverables: Confirmation of permit application submission and tracking of their progress.<br><b>Resources needed:</b><br><ul><li>Permitting Specialist</li><li>Administrative Assistant</li><li>Courier Service</li></ul>",
      "start_date": "2027-08-16",
      "duration": 6.0,
      "progress": 0,
      "open": true,
      "meta": "6872469f-d542-41c3-b28c-32e899a8face FS",
      "parent": "2c205f9e-e102-489f-9e88-9af526b5ab72"
    },
    {
      "id": "1311c07a-f89a-40bd-9f99-9bbe0020201c",
      "text": "Liaise with Government Agencies",
      "custom_tooltip": "<b>Liaise with Government Agencies</b><br>Objective: Maintain communication with government agencies throughout the permitting process.\nScope: Address any concerns or questions raised by the agencies and ensure compliance with all regulations.\nSteps: 1. Establish communication channels with the relevant government agencies. 2. Respond to any inquiries or requests for additional information. 3. Attend meetings with agency representatives as needed. 4. Ensure compliance with all regulations and requirements.\nDeliverables: Effective communication and collaboration with government agencies to facilitate permit approval.<br><b>Resources needed:</b><br><ul><li>Permitting Specialist</li><li>Legal Counsel</li><li>Public Relations</li></ul>",
      "start_date": "2027-08-22",
      "duration": 6.0,
      "progress": 0,
      "open": true,
      "meta": "2c205f9e-e102-489f-9e88-9af526b5ab72 FF, 6e82f7f2-aa82-4111-bc61-b5d221ee6bc9 FS",
      "parent": "2c205f9e-e102-489f-9e88-9af526b5ab72"
    },
    {
      "id": "3ff303c6-e295-4f23-9328-90be872f0ed5",
      "text": "Develop Storyboards and Shot Lists",
      "custom_tooltip": "<b>Develop Storyboards and Shot Lists</b>",
      "progress": 0,
      "open": true,
      "meta": "2c205f9e-e102-489f-9e88-9af526b5ab72 FS",
      "parent": "82f211f3-c501-460a-a229-db38de628e61",
      "type": "project"
    },
    {
      "id": "41404c5e-a0ab-44b1-a16d-17ff5fb5424f",
      "text": "Research Hong Kong Architectural Paranoia",
      "custom_tooltip": "<b>Research Hong Kong Architectural Paranoia</b><br>Research Hong Kong&#x27;s unique architectural landscape and how it can be used to heighten the stakes and create a sense of paranoia in the film. This includes studying specific locations, building designs, and urban planning elements that contribute to this feeling.<br><b>Resources needed:</b><br><ul><li>Location scout</li><li>Production designer</li><li>Screenwriter</li><li>Director</li></ul>",
      "start_date": "2027-08-28",
      "duration": 5.0,
      "progress": 0,
      "open": true,
      "meta": "3ff303c6-e295-4f23-9328-90be872f0ed5 SS",
      "parent": "3ff303c6-e295-4f23-9328-90be872f0ed5"
    },
    {
      "id": "8807b2e7-e326-4057-a38d-f6661e9bcf06",
      "text": "Develop Initial Storyboard Sketches",
      "custom_tooltip": "<b>Develop Initial Storyboard Sketches</b><br>Create initial storyboard sketches for key scenes, focusing on visual composition, camera angles, and character blocking. These sketches will serve as a visual guide for the director and cinematographer during filming.<br><b>Resources needed:</b><br><ul><li>Storyboard artist</li><li>Director</li><li>Cinematographer</li></ul>",
      "start_date": "2027-09-02",
      "duration": 5.0,
      "progress": 0,
      "open": true,
      "meta": "41404c5e-a0ab-44b1-a16d-17ff5fb5424f FS",
      "parent": "3ff303c6-e295-4f23-9328-90be872f0ed5"
    },
    {
      "id": "d6260b6b-e081-4a14-afcf-d43dc72c464b",
      "text": "Create Detailed Shot Lists",
      "custom_tooltip": "<b>Create Detailed Shot Lists</b><br>Develop detailed shot lists for each scene, specifying camera angles, lens choices, camera movements, and shot durations. The shot lists will ensure that all necessary footage is captured during filming.<br><b>Resources needed:</b><br><ul><li>Director</li><li>Cinematographer</li><li>Assistant director</li></ul>",
      "start_date": "2027-09-07",
      "duration": 5.0,
      "progress": 0,
      "open": true,
      "meta": "8807b2e7-e326-4057-a38d-f6661e9bcf06 FS",
      "parent": "3ff303c6-e295-4f23-9328-90be872f0ed5"
    },
    {
      "id": "cbfeae96-ecb8-48ab-94d6-a4bd140b224a",
      "text": "Pre-Visualize Complex Action Sequences",
      "custom_tooltip": "<b>Pre-Visualize Complex Action Sequences</b><br>Use pre-visualization software to create animated storyboards for complex action sequences. This will allow the director and cinematographer to experiment with different camera angles and movements before filming, saving time and money on set.<br><b>Resources needed:</b><br><ul><li>Pre-visualization artist</li><li>Director</li><li>Cinematographer</li><li>VFX supervisor</li></ul>",
      "start_date": "2027-09-12",
      "duration": 5.0,
      "progress": 0,
      "open": true,
      "meta": "d6260b6b-e081-4a14-afcf-d43dc72c464b FS",
      "parent": "3ff303c6-e295-4f23-9328-90be872f0ed5"
    },
    {
      "id": "f46c5eda-3547-4791-b7f7-f6dcc6643198",
      "text": "Review Storyboards with Key Crew",
      "custom_tooltip": "<b>Review Storyboards with Key Crew</b><br>Hold a meeting with the director, cinematographer, production designer, and other key crew members to review the storyboards and shot lists. This will ensure that everyone is on the same page regarding the visual style and execution of the film.<br><b>Resources needed:</b><br><ul><li>Director</li><li>Cinematographer</li><li>Production designer</li><li>Assistant director</li></ul>",
      "start_date": "2027-09-17",
      "duration": 5.0,
      "progress": 0,
      "open": true,
      "meta": "3ff303c6-e295-4f23-9328-90be872f0ed5 FF, cbfeae96-ecb8-48ab-94d6-a4bd140b224a FS",
      "parent": "3ff303c6-e295-4f23-9328-90be872f0ed5"
    },
    {
      "id": "c103c166-7676-46b3-ac57-6031cb04f1d3",
      "text": "Plan Geopolitical Risk Mitigation",
      "custom_tooltip": "<b>Plan Geopolitical Risk Mitigation</b>",
      "progress": 0,
      "open": true,
      "meta": "82f211f3-c501-460a-a229-db38de628e61 FF, 3ff303c6-e295-4f23-9328-90be872f0ed5 FS",
      "parent": "82f211f3-c501-460a-a229-db38de628e61",
      "type": "project"
    },
    {
      "id": "a27498f4-c1c3-4060-9061-b179c1c7d514",
      "text": "Identify potential geopolitical sensitivities",
      "custom_tooltip": "<b>Identify potential geopolitical sensitivities</b><br>Analyze the screenplay for scenes, dialogue, or themes that could be sensitive in Hong Kong&#x27;s political climate.<br><b>Resources needed:</b><br><ul><li>Screenplay</li><li>Geopolitical Risk Assessor</li><li>Hong Kong Cultural Liaison</li></ul>",
      "start_date": "2027-09-22",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "c103c166-7676-46b3-ac57-6031cb04f1d3 SS",
      "parent": "c103c166-7676-46b3-ac57-6031cb04f1d3"
    },
    {
      "id": "d29b6ae1-d8c6-456e-8962-c573984e46b3",
      "text": "Engage local risk assessment firm",
      "custom_tooltip": "<b>Engage local risk assessment firm</b><br>Hire a firm with expertise in Hong Kong&#x27;s political and security landscape to assess potential risks.<br><b>Resources needed:</b><br><ul><li>Producer</li><li>Legal Counsel</li><li>Budget</li></ul>",
      "start_date": "2027-09-25",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "a27498f4-c1c3-4060-9061-b179c1c7d514 FS",
      "parent": "c103c166-7676-46b3-ac57-6031cb04f1d3"
    },
    {
      "id": "3b0f54e2-b6c5-44d4-91c8-70064d4ad3a0",
      "text": "Develop contingency filming plans",
      "custom_tooltip": "<b>Develop contingency filming plans</b><br>Identify alternative filming locations and security protocols in case of unexpected political events.<br><b>Resources needed:</b><br><ul><li>Location Manager</li><li>Security Consultant</li><li>Producer</li></ul>",
      "start_date": "2027-09-28",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "d29b6ae1-d8c6-456e-8962-c573984e46b3 FS",
      "parent": "c103c166-7676-46b3-ac57-6031cb04f1d3"
    },
    {
      "id": "bf4a2155-2778-48ff-95db-0ff32cf3e74d",
      "text": "Establish communication protocols",

    {
      "id": "2b411db4-35e9-41b6-9dcf-fb098b0f5379",
      "text": "Ingest and Organize Daily Footage",
      "custom_tooltip": "<b>Ingest and Organize Daily Footage</b><br>Objective: Efficiently manage and catalog all footage received from the set each day.\nScope: Includes transferring footage, creating backups, and organizing it for easy access by the editor.\nSteps: 1. Receive footage from set. 2. Create multiple backups. 3. Organize footage into folders by scene and take. 4. Verify footage integrity.\nDeliverables: Organized and backed-up daily footage.<br><b>Resources needed:</b><br><ul><li>Data Wrangler</li><li>Storage Drives</li><li>Backup Software</li></ul>",
      "start_date": "2028-01-17",
      "duration": 27.0,
      "progress": 0,

      "meta": "0414ce06-eada-4234-b370-6c3223dcb1f3 SS",

    {
      "id": "5590bcfe-0ecf-4457-bd05-edf51f200cb7",
      "text": "Perform Initial Rough Cut Assembly",
      "custom_tooltip": "<b>Perform Initial Rough Cut Assembly</b><br>Objective: Assemble a preliminary rough cut of each scene based on the director&#x27;s notes and script.\nScope: Includes selecting the best takes, assembling them in sequence, and adding basic transitions.\nSteps: 1. Review director&#x27;s notes and script. 2. Select best takes for each shot. 3. Assemble shots into a scene sequence. 4. Add basic transitions.\nDeliverables: Rough cut assembly of each scene.<br><b>Resources needed:</b><br><ul><li>Film Editor</li><li>Editing Software</li><li>Director&#x27;s Notes</li><li>Script</li></ul>",
      "start_date": "2028-02-13",
      "duration": 27.0,
      "progress": 0,
      "open": true,
      "meta": "2b411db4-35e9-41b6-9dcf-fb098b0f5379 FS",
      "parent": "0414ce06-eada-4234-b370-6c3223dcb1f3"
    },
    {
      "id": "d365700d-0d56-4558-bb9f-ddce90c22540",
      "text": "Review and Refine Cuts with Director",
      "custom_tooltip": "<b>Review and Refine Cuts with Director</b><br>Objective: Collaborate with the director to review and refine the rough cuts, incorporating their feedback and vision.\nScope: Includes attending review sessions, making revisions based on feedback, and ensuring the cuts align with the overall narrative.\nSteps: 1. Schedule review sessions with the director. 2. Present rough cuts for review. 3. Incorporate director&#x27;s feedback. 4. Refine cuts based on feedback.\nDeliverables: Refined cuts approved by the director.<br><b>Resources needed:</b><br><ul><li>Film Editor</li><li>Director</li><li>Review Room</li><li>Editing Software</li></ul>",
      "start_date": "2028-03-11",
      "duration": 27.0,
      "progress": 0,
      "open": true,
      "meta": "5590bcfe-0ecf-4457-bd05-edf51f200cb7 FS",
      "parent": "0414ce06-eada-4234-b370-6c3223dcb1f3"
    },
    {
      "id": "7b5ba164-9e81-4a60-a9c8-730edf54bac1",
      "text": "Prepare and Export Review Cuts",
      "custom_tooltip": "<b>Prepare and Export Review Cuts</b><br>Objective: Prepare and export review cuts for the director and producers to review remotely.\nScope: Includes encoding the cuts in a suitable format, adding timecode and watermarks, and uploading them to a secure platform.\nSteps: 1. Encode cuts in a suitable format (e.g., H.264). 2. Add timecode and watermarks. 3. Upload cuts to a secure platform. 4. Notify director and producers.\nDeliverables: Review cuts available for remote viewing.<br><b>Resources needed:</b><br><ul><li>Film Editor</li><li>Encoding Software</li><li>Secure Platform</li><li>Internet Connection</li></ul>",
      "start_date": "2028-04-07",
      "duration": 27.0,
      "progress": 0,
      "open": true,
      "meta": "0414ce06-eada-4234-b370-6c3223dcb1f3 FF, d365700d-0d56-4558-bb9f-ddce90c22540 FS",
      "parent": "0414ce06-eada-4234-b370-6c3223dcb1f3"
    },

    {
      "id": "f7b948e0-4208-4fb0-bf03-a532f7834eb3",
      "text": "Coordinate transportation for cast and crew",
      "custom_tooltip": "<b>Coordinate transportation for cast and crew</b><br>Objective: Ensure timely and efficient transportation for all cast and crew members to and from filming locations.\nScope: Includes arranging vehicles, drivers, and schedules to accommodate varying needs and locations.\nSteps: 1. Determine transportation needs for each department. 2. Secure transportation contracts with reliable providers. 3. Create daily transportation schedules. 4. Monitor transportation logistics and address any issues.\nDeliverables: Transportation schedules, transportation contracts, daily transportation reports.<br><b>Resources needed:</b><br><ul><li>Transportation coordinator</li><li>Drivers</li><li>Vehicles</li><li>Scheduling software</li></ul>",
      "start_date": "2028-05-04",
      "duration": 27.0,
      "progress": 0,

    {
      "id": "528de048-aaee-4b5e-ba50-3c580e878755",
      "text": "Manage on-set catering and craft services",
      "custom_tooltip": "<b>Manage on-set catering and craft services</b><br>Objective: Provide adequate and timely meals and refreshments for all cast and crew members on set.\nScope: Includes selecting catering services, planning menus, and managing on-set food and beverage distribution.\nSteps: 1. Select catering service. 2. Plan daily menus. 3. Coordinate food delivery and setup. 4. Manage on-set craft services.\nDeliverables: Catering contracts, daily menus, on-set catering schedule, craft services inventory.<br><b>Resources needed:</b><br><ul><li>Catering manager</li><li>Catering staff</li><li>Craft services personnel</li><li>Food and beverages</li></ul>",

      "duration": 27.0,
      "progress": 0,

      "meta": "f7b948e0-4208-4fb0-bf03-a532f7834eb3 FS",
      "parent": "948cdb21-f6d1-4920-bdf8-c86c1641819f"
    },
    {
      "id": "85a9bd63-d8bc-4fa3-ba71-34c323a0a2e3",
      "text": "Secure and manage location permits",
      "custom_tooltip": "<b>Secure and manage location permits</b><br>Objective: Obtain and maintain all necessary permits for filming at designated locations.\nScope: Includes submitting permit applications, coordinating with local authorities, and ensuring compliance with permit regulations.\nSteps: 1. Identify required permits for each location. 2. Prepare and submit permit applications. 3. Coordinate with local authorities. 4. Ensure compliance with permit regulations.\nDeliverables: Location permits, permit compliance reports, communication logs with local authorities.<br><b>Resources needed:</b><br><ul><li>Permit coordinator</li><li>Legal counsel</li><li>Communication equipment</li><li>Local authority contacts</li></ul>",
      "start_date": "2028-06-27",
      "duration": 27.0,
      "progress": 0,
      "open": true,
      "meta": "528de048-aaee-4b5e-ba50-3c580e878755 FS",

    },
    {
      "id": "91050c1c-b2fa-48e3-a641-a9ff5422cc50",
      "text": "Address traffic and noise concerns",
      "custom_tooltip": "<b>Address traffic and noise concerns</b><br>Objective: Minimize disruption to local communities due to traffic and noise generated by filming activities.\nScope: Includes implementing traffic management plans, using noise reduction measures, and communicating with local residents.\nSteps: 1. Develop traffic management plans. 2. Implement noise reduction measures. 3. Communicate with local residents. 4. Address any complaints or concerns.\nDeliverables: Traffic management plans, noise reduction reports, community communication logs, complaint resolution records.<br><b>Resources needed:</b><br><ul><li>Traffic management personnel</li><li>Noise reduction equipment</li><li>Community liaison</li><li>Communication materials</li></ul>",

      "progress": 0,

      "id": "67be6cc4-52a8-4d73-b1fc-47abaf5f274f",
      "text": "Schedule Rehearsals with Key Actors",
      "custom_tooltip": "<b>Schedule Rehearsals with Key Actors</b><br>Coordinate rehearsal schedules with lead and supporting actors to ensure availability and commitment to the production timeline. Objective: To maximize rehearsal time and minimize scheduling conflicts.<br><b>Resources needed:</b><br><ul><li>Production Coordinator</li><li>Actors</li><li>Rehearsal Space</li></ul>",

    {
      "id": "8b886ee7-d7be-4dbb-8e85-27d3fff40baf",
      "text": "Facilitate Character Development Workshops",
      "custom_tooltip": "<b>Facilitate Character Development Workshops</b><br>Organize and lead character development workshops with the director and actors to explore character motivations, backstories, and relationships. Objective: To deepen understanding of roles.<br><b>Resources needed:</b><br><ul><li>Director</li><li>Actors</li><li>Acting Coach</li><li>Workshop Facilitator</li></ul>",

    {
      "id": "8675fd7f-ae0d-4906-b5ba-69763e2745bf",
      "text": "Address Performance Concerns Early",
      "custom_tooltip": "<b>Address Performance Concerns Early</b><br>Identify and address any performance concerns or creative differences between the director and actors through open communication and collaborative problem-solving. Objective: To resolve issues before filming.<br><b>Resources needed:</b><br><ul><li>Director</li><li>Actors</li><li>Producer</li><li>Acting Coach</li></ul>",

      "id": "bbf2e2d5-508d-46d2-8637-09f0d3c89d4e",
      "text": "Document Key Performance Decisions",
      "custom_tooltip": "<b>Document Key Performance Decisions</b><br>Maintain detailed records of all key performance decisions, including character interpretations, blocking, and emotional arcs, to ensure consistency throughout the production. Objective: To provide a reference for all.<br><b>Resources needed:</b><br><ul><li>Script Supervisor</li><li>Director</li><li>Actors</li></ul>",

      "custom_tooltip": "<b>Track Daily Production Progress</b><br>Monitor daily film production progress against the schedule. Identify any deviations or potential delays early on.<br><b>Resources needed:</b><br><ul><li>Production Manager</li><li>Assistant Directors</li><li>Daily Production Reports</li></ul>",

      "text": "Analyze Workflow Efficiency",
      "custom_tooltip": "<b>Analyze Workflow Efficiency</b><br>Evaluate the efficiency of various production workflows (e.g., camera setup, lighting, sound recording). Identify bottlenecks and areas for improvement.<br><b>Resources needed:</b><br><ul><li>Production Manager</li><li>Cinematographer</li><li>Gaffer</li><li>Sound Recordist</li></ul>",

      "id": "418cced9-5e2d-49d7-8a8c-9bdc329ed311",
      "text": "Address Equipment Issues Promptly",
      "custom_tooltip": "<b>Address Equipment Issues Promptly</b><br>Ensure that any equipment malfunctions or technical issues are addressed immediately to minimize downtime. Maintain a backup equipment inventory.<br><b>Resources needed:</b><br><ul><li>Technical Crew</li><li>Equipment Technicians</li><li>Backup Equipment</li></ul>",

      "id": "38bec1d5-e14d-4dcc-9fb5-1d51906305c6",
      "text": "Facilitate Communication Between Departments",
      "custom_tooltip": "<b>Facilitate Communication Between Departments</b><br>Establish clear communication channels and protocols between different departments (e.g., camera, sound, lighting, set design) to ensure smooth coordination.<br><b>Resources needed:</b><br><ul><li>Production Manager</li><li>Assistant Directors</li><li>Department Heads</li></ul>",

      "text": "Implement Corrective Actions",
      "custom_tooltip": "<b>Implement Corrective Actions</b><br>Based on the analysis of production progress and workflow efficiency, implement corrective actions to address any identified issues and improve overall productivity.<br><b>Resources needed:</b><br><ul><li>Production Manager</li><li>Director</li><li>Department Heads</li></ul>",

      "text": "Rough Cut Assembly",
      "custom_tooltip": "<b>Rough Cut Assembly</b><br>Assemble all usable footage into a preliminary rough cut, focusing on narrative structure and pacing. Objective: Create a first pass of the film&#x27;s sequence. Scope: All scenes shot during principal photography. Steps: Organize footage, sync audio, assemble scenes, review with director. Deliverables: Rough cut timeline.<br><b>Resources needed:</b><br><ul><li>Film Editor</li><li>Assistant Editor</li><li>Editing Software</li><li>Footage</li></ul>",

    {
      "id": "2ff3c0d6-cc32-48d1-8a10-707d8390bbca",
      "text": "Director's Cut Refinement",
      "custom_tooltip": "<b>Director&#x27;s Cut Refinement</b><br>Refine the rough cut based on the director&#x27;s feedback, focusing on performance, shot selection, and overall tone. Objective: Achieve the director&#x27;s initial vision for the film. Scope: Refine pacing, shot selection, and performance. Steps: Review rough cut with director, implement feedback, refine scene transitions, adjust pacing. Deliverables: Director&#x27;s cut timeline.<br><b>Resources needed:</b><br><ul><li>Film Editor</li><li>Director</li><li>Editing Software</li><li>Feedback</li></ul>",
      "start_date": "2028-09-08",
      "duration": 6.0,
      "progress": 0,
      "open": true,
      "meta": "e181307e-5262-4256-89ee-446f2f102ec3 FS",
      "parent": "71b6344b-bb81-40a3-846b-0095ed33cdf2"
    },
    {
      "id": "e355fc40-9bf1-4db9-8d8d-421bdd156dcd",
      "text": "Fine Cut and Polish",
      "custom_tooltip": "<b>Fine Cut and Polish</b><br>Polish the director&#x27;s cut, focusing on technical aspects such as audio syncing, visual continuity, and scene transitions. Objective: Prepare the film for visual effects and sound design. Scope: Technical refinement of the director&#x27;s cut. Steps: Sync audio, correct visual inconsistencies, refine scene transitions, optimize pacing. Deliverables: Fine cut timeline.<br><b>Resources needed:</b><br><ul><li>Film Editor</li><li>Assistant Editor</li><li>Editing Software</li><li>Technical Expertise</li></ul>",
      "start_date": "2028-09-14",
      "duration": 6.0,
      "progress": 0,
      "open": true,
      "meta": "2ff3c0d6-cc32-48d1-8a10-707d8390bbca FS",
      "parent": "71b6344b-bb81-40a3-846b-0095ed33cdf2"
    },
    {
      "id": "85a2a071-1e5d-4a40-b8ac-188e955ec2b8",
      "text": "Producer/Studio Review",
      "custom_tooltip": "<b>Producer/Studio Review</b><br>Present the fine cut to producers and studio executives for feedback and approval. Objective: Obtain final approval on the film&#x27;s edit. Scope: Review and approval of the fine cut. Steps: Schedule screening, present fine cut, gather feedback, implement approved changes. Deliverables: Approved fine cut timeline.<br><b>Resources needed:</b><br><ul><li>Film Editor</li><li>Producers</li><li>Studio Executives</li><li>Screening Room</li></ul>",
      "start_date": "2028-09-20",
      "duration": 6.0,
      "progress": 0,
      "open": true,
      "meta": "e355fc40-9bf1-4db9-8d8d-421bdd156dcd FS",
      "parent": "71b6344b-bb81-40a3-846b-0095ed33cdf2"
    },
    {
      "id": "26bb0a23-eff5-478e-9c6b-9d28c75c0481",
      "text": "Lock Picture",
      "custom_tooltip": "<b>Lock Picture</b><br>Finalize the picture edit, ensuring no further changes are made before moving on to visual effects and sound design. Objective: Freeze the picture edit for post-production. Scope: Final approval and locking of the picture edit. Steps: Implement final changes, obtain final approval, lock the timeline. Deliverables: Locked picture timeline.<br><b>Resources needed:</b><br><ul><li>Film Editor</li><li>Director</li><li>Producers</li><li>Studio Executives</li><li>Editing Software</li></ul>",
      "start_date": "2028-09-26",
      "duration": 6.0,
      "progress": 0,
      "open": true,
      "meta": "71b6344b-bb81-40a3-846b-0095ed33cdf2 FF, 85a2a071-1e5d-4a40-b8ac-188e955ec2b8 FS",
      "parent": "71b6344b-bb81-40a3-846b-0095ed33cdf2"

      "text": "Secure VFX artists and vendors",
      "custom_tooltip": "<b>Secure VFX artists and vendors</b><br>Contracting experienced VFX artists and vendors with expertise in the required effects.<br><b>Resources needed:</b><br><ul><li>VFX Producer</li><li>Legal Counsel</li><li>VFX Supervisor</li></ul>",

      "custom_tooltip": "<b>Create and integrate VFX elements</b><br>Developing and seamlessly integrating VFX elements into the film footage.<br><b>Resources needed:</b><br><ul><li>VFX Artists</li><li>Compositors</li><li>Technical Directors</li></ul>",

    {
      "id": "17af2c8a-2a7f-41d4-be5e-64d8b0806751",
      "text": "Gather Sound Effects and Foley",
      "custom_tooltip": "<b>Gather Sound Effects and Foley</b><br>Source and collect a library of sound effects and foley recordings that match the film&#x27;s action and environment. This includes recording new foley sounds and licensing existing sound effects.<br><b>Resources needed:</b><br><ul><li>Sound Designer</li><li>Foley Artist</li><li>Sound Effects Library</li></ul>",

    {
      "id": "8ba799ca-3a02-46cc-85f5-bd99fb5973d2",
      "text": "Design Soundscape",
      "custom_tooltip": "<b>Design Soundscape</b><br>Create a detailed soundscape for each scene, incorporating ambient sounds, foley effects, and dialogue to enhance the emotional impact and realism of the film.<br><b>Resources needed:</b><br><ul><li>Sound Designer</li><li>Director</li></ul>",

    {
      "id": "6d3a4652-26e6-4f64-936f-1bd6c7b38128",
      "text": "Mix and Master Audio",
      "custom_tooltip": "<b>Mix and Master Audio</b><br>Mix all audio elements, including dialogue, sound effects, foley, and music, to create a balanced and immersive sound experience. Master the final audio track for theatrical release.<br><b>Resources needed:</b><br><ul><li>Sound Mixer</li><li>Sound Engineer</li><li>Mixing Studio</li></ul>",
      "start_date": "2028-12-01",

      "progress": 0,
      "open": true,
      "meta": "8ba799ca-3a02-46cc-85f5-bd99fb5973d2 FS",

    {
      "id": "5ddfe518-29a8-4d7f-8208-266bc774880c",
      "text": "Review Sound Design with Director",
      "custom_tooltip": "<b>Review Sound Design with Director</b><br>Present the sound design and mix to the director for feedback and approval. Incorporate any necessary revisions to ensure the sound design aligns with the director&#x27;s vision.<br><b>Resources needed:</b><br><ul><li>Sound Designer</li><li>Sound Mixer</li><li>Director</li></ul>",

      "id": "3c7777a0-68e0-46d2-82e4-1c6415dab9c6",
      "text": "Composer Selection and Contract Negotiation",
      "custom_tooltip": "<b>Composer Selection and Contract Negotiation</b><br>Identify and select a suitable composer with experience in thriller scores. Negotiate contract terms, including fees, rights, and delivery schedules.<br><b>Resources needed:</b><br><ul><li>Producer</li><li>Director</li><li>Music Supervisor</li><li>Legal Counsel</li></ul>",

    {
      "id": "e3427745-a478-4058-95eb-06fc24272866",
      "text": "Theme Development and Composition",
      "custom_tooltip": "<b>Theme Development and Composition</b><br>Collaborate with the director to define the film&#x27;s musical themes and motifs. Compose and arrange the score, ensuring it complements the visuals and enhances the emotional impact.<br><b>Resources needed:</b><br><ul><li>Composer</li><li>Director</li><li>Music Supervisor</li></ul>",

      "duration": 6.0,

    {
      "id": "4a082bf8-b96f-485a-bb78-cb244d900636",
      "text": "Orchestration and Arrangement",
      "custom_tooltip": "<b>Orchestration and Arrangement</b><br>Orchestrate and arrange the composed music for the selected instruments. Prepare the score for recording.<br><b>Resources needed:</b><br><ul><li>Composer</li><li>Orchestrator</li><li>Arranger</li></ul>",
      "start_date": "2028-12-25",
      "duration": 6.0,
      "progress": 0,

    },
    {
      "id": "8922cdaf-5f5f-4a88-ade6-5ca5ce8cf343",
      "text": "Recording Session and Mixing",
      "custom_tooltip": "<b>Recording Session and Mixing</b><br>Schedule and conduct recording sessions with musicians. Mix and master the recorded music to achieve the desired sound quality and balance.<br><b>Resources needed:</b><br><ul><li>Composer</li><li>Musicians</li><li>Recording Engineer</li><li>Mixing Engineer</li><li>Recording Studio</li></ul>",
      "start_date": "2028-12-31",
      "duration": 6.0,

      "meta": "4a082bf8-b96f-485a-bb78-cb244d900636 FS",

    },
    {
      "id": "a76fbd0d-2052-4c2d-bb87-abcf92c37dbb",
      "text": "Final Music Delivery and Integration",
      "custom_tooltip": "<b>Final Music Delivery and Integration</b><br>Deliver the final music tracks to the post-production team. Integrate the score into the film&#x27;s soundtrack, ensuring seamless synchronization with the visuals.<br><b>Resources needed:</b><br><ul><li>Composer</li><li>Music Editor</li><li>Sound Designer</li></ul>",

    },

    {
      "id": "f45ce6f9-84ac-4392-95c2-c79d9fe5cad8",
      "text": "Compose thematic score",
      "custom_tooltip": "<b>Compose thematic score</b><br>Develop the main musical themes and motifs for the film, reflecting the psychological thriller aspects and Hong Kong setting. This includes creating variations for different scenes and emotional tones.<br><b>Resources needed:</b><br><ul><li>Composer</li><li>Music arranger</li><li>Synthesizers</li><li>DAW software</li></ul>",

    },
    {
      "id": "5e4d9569-1590-446d-81d8-c8d46b921a09",
      "text": "Record orchestral score",
      "custom_tooltip": "<b>Record orchestral score</b><br>Arrange and record the composed score with a live orchestra, ensuring high-quality audio capture and performance. This includes booking a recording studio, hiring musicians, and conducting the orchestra.<br><b>Resources needed:</b><br><ul><li>Orchestra</li><li>Conductor</li><li>Recording studio</li><li>Sound engineers</li><li>Microphones</li></ul>",
      "start_date": "2029-01-15",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "f45ce6f9-84ac-4392-95c2-c79d9fe5cad8 FS",

    },
    {
      "id": "ce2628f0-4354-4d5c-aaa8-18b44eb4061a",
      "text": "Integrate music with film",
      "custom_tooltip": "<b>Integrate music with film</b><br>Synchronize the recorded score with the film&#x27;s visuals, adjusting timing and levels to enhance the emotional impact of each scene. This includes working closely with the film editor and director to ensure seamless integration.<br><b>Resources needed:</b><br><ul><li>Composer</li><li>Film editor</li><li>Director</li><li>DAW software</li><li>Mixing console</li></ul>",
      "start_date": "2029-01-18",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "5e4d9569-1590-446d-81d8-c8d46b921a09 FS",
      "parent": "81a59102-3f49-45a2-8ae3-3229f692fe75"
    },
    {
      "id": "94636d52-3723-46b5-9c44-de5beb983f45",
      "text": "Master the final soundtrack",
      "custom_tooltip": "<b>Master the final soundtrack</b><br>Master the final soundtrack for optimal audio quality across different playback systems, ensuring consistent levels and dynamic range. This includes working with a mastering engineer to prepare the soundtrack for theatrical release and streaming platforms.<br><b>Resources needed:</b><br><ul><li>Mastering engineer</li><li>Mastering studio</li><li>Audio mastering software</li></ul>",
      "start_date": "2029-01-21",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "81a59102-3f49-45a2-8ae3-3229f692fe75 FF, ce2628f0-4354-4d5c-aaa8-18b44eb4061a FS",

    {
      "id": "36854915-a282-4eaa-96b4-3c81fe5529a7",
      "text": "Define Target Audience Segments",
      "custom_tooltip": "<b>Define Target Audience Segments</b><br>Identify and profile key audience segments (e.g., age, demographics, interests) to tailor marketing messages effectively. This includes researching audience preferences, viewing habits, and online behavior.<br><b>Resources needed:</b><br><ul><li>Market Research Analyst</li><li>Data Analyst</li><li>Marketing Strategist</li></ul>",
      "start_date": "2029-01-24",
      "duration": 6.0,
      "progress": 0,
      "open": true,
      "meta": "235913e2-7ef5-4985-83c5-668bd1e1d455 SS",

    },
    {
      "id": "3d0c4cbd-4745-45e2-8579-3a0720de30f9",
      "text": "Determine Key Marketing Messages",
      "custom_tooltip": "<b>Determine Key Marketing Messages</b><br>Craft compelling and concise marketing messages that highlight the film&#x27;s unique selling points and resonate with the target audience. This involves identifying the core themes, emotional hooks, and visual elements that will capture audience attention.<br><b>Resources needed:</b><br><ul><li>Copywriter</li><li>Creative Director</li><li>Marketing Strategist</li></ul>",
      "start_date": "2029-01-30",
      "duration": 6.0,
      "progress": 0,
      "open": true,
      "meta": "36854915-a282-4eaa-96b4-3c81fe5529a7 FS",
      "parent": "235913e2-7ef5-4985-83c5-668bd1e1d455"
    },
    {
      "id": "9ba67bf7-497c-4691-9fc2-f00d87f7f994",
      "text": "Select Optimal Marketing Channels",
      "custom_tooltip": "<b>Select Optimal Marketing Channels</b><br>Identify the most effective marketing channels (e.g., social media, online advertising, traditional media) to reach the target audience. This includes evaluating channel reach, cost-effectiveness, and engagement potential.<br><b>Resources needed:</b><br><ul><li>Media Planner</li><li>Digital Marketing Specialist</li><li>Marketing Strategist</li></ul>",
      "start_date": "2029-02-05",
      "duration": 6.0,
      "progress": 0,
      "open": true,
      "meta": "3d0c4cbd-4745-45e2-8579-3a0720de30f9 FS",

    },
    {
      "id": "06f7cfa8-69e4-40e2-a283-b44ed0bb3c91",
      "text": "Establish Marketing Budget Allocation",
      "custom_tooltip": "<b>Establish Marketing Budget Allocation</b><br>Allocate the marketing budget across different channels and activities based on their potential ROI and strategic importance. This involves prioritizing high-impact initiatives and optimizing resource allocation to maximize reach and engagement.<br><b>Resources needed:</b><br><ul><li>Financial Analyst</li><li>Marketing Strategist</li><li>Producer</li></ul>",

      "duration": 6.0,
      "progress": 0,
      "open": true,

      "text": "Design initial trailer concepts",
      "custom_tooltip": "<b>Design initial trailer concepts</b><br>Develop several trailer concepts showcasing different aspects of the film, targeting various audience segments. This includes identifying key scenes, music, and overall tone.<br><b>Resources needed:</b><br><ul><li>Director</li><li>Editor</li><li>Marketing team</li></ul>",

    {
      "id": "def79f97-a818-49cb-ac2b-1c80e5a5be14",
      "text": "Create draft trailer edits",
      "custom_tooltip": "<b>Create draft trailer edits</b><br>Edit together draft versions of the trailers based on the approved concepts. This involves selecting footage, adding music and sound effects, and creating a compelling narrative flow.<br><b>Resources needed:</b><br><ul><li>Editor</li><li>Sound designer</li><li>Music supervisor</li></ul>",
      "start_date": "2029-02-23",
      "duration": 6.0,
      "progress": 0,
      "open": true,
      "meta": "649c02c3-ddd7-453a-87da-283451cda81d FS",

    },
    {
      "id": "c298450e-a1a0-47a5-9c17-15d330b845fb",
      "text": "Design poster concepts",
      "custom_tooltip": "<b>Design poster concepts</b><br>Develop several poster concepts that capture the essence of the film and appeal to the target audience. This includes exploring different visual styles, typography, and imagery.<br><b>Resources needed:</b><br><ul><li>Graphic designer</li><li>Marketing team</li><li>Photographer</li></ul>",
      "start_date": "2029-03-01",
      "duration": 6.0,
      "progress": 0,
      "open": true,
      "meta": "def79f97-a818-49cb-ac2b-1c80e5a5be14 FS",
      "parent": "a15f2cfe-8b62-4476-ae67-f472b7331fa3"
    },
    {
      "id": "d0a3c500-d867-4835-aebb-66a5da71cee3",
      "text": "Refine trailer and poster designs",
      "custom_tooltip": "<b>Refine trailer and poster designs</b><br>Gather feedback on the draft trailers and poster concepts from key stakeholders (director, producers, distributors). Incorporate feedback and refine the designs to create final versions.<br><b>Resources needed:</b><br><ul><li>Director</li><li>Producer</li><li>Marketing team</li><li>Editor</li><li>Graphic designer</li></ul>",
      "start_date": "2029-03-07",
      "duration": 6.0,
      "progress": 0,
      "open": true,
      "meta": "c298450e-a1a0-47a5-9c17-15d330b845fb FS",
      "parent": "a15f2cfe-8b62-4476-ae67-f472b7331fa3"
    },
    {
      "id": "1f0fc4c6-a920-4690-bb66-5275aa21150b",
      "text": "Finalize marketing materials",
      "custom_tooltip": "<b>Finalize marketing materials</b><br>Prepare the final versions of the trailers and posters for distribution. This includes ensuring that all materials meet technical specifications and are approved by relevant authorities.<br><b>Resources needed:</b><br><ul><li>Marketing team</li><li>Legal counsel</li><li>Distributor</li></ul>",
      "start_date": "2029-03-13",
      "duration": 6.0,
      "progress": 0,
      "open": true,
      "meta": "a15f2cfe-8b62-4476-ae67-f472b7331fa3 FF, d0a3c500-d867-4835-aebb-66a5da71cee3 FS",

      "id": "5aec6b6a-e9cd-4c2a-b8c1-c49a235648cc",
      "text": "Secure Distribution Agreements",
      "custom_tooltip": "<b>Secure Distribution Agreements</b>",

    {
      "id": "a6579f9f-9bea-4a42-bf28-fa031cd8d9dc",
      "text": "Identify Key Distribution Partners",
      "custom_tooltip": "<b>Identify Key Distribution Partners</b><br>Research and identify potential distribution partners in key territories, including theatrical distributors, VOD platforms, and streaming services. Consider their track record, market reach, and alignment with the film&#x27;s target audience.<br><b>Resources needed:</b><br><ul><li>Distribution Strategist</li><li>Market Research Analyst</li></ul>",
      "start_date": "2029-03-19",
      "duration": 12.0,
      "progress": 0,
      "open": true,
      "meta": "5aec6b6a-e9cd-4c2a-b8c1-c49a235648cc SS",
      "parent": "5aec6b6a-e9cd-4c2a-b8c1-c49a235648cc"
    },
    {
      "id": "0e77df54-2319-4800-8494-d62cce30f9dd",
      "text": "Prepare Distribution Package",
      "custom_tooltip": "<b>Prepare Distribution Package</b><br>Assemble a comprehensive distribution package, including the film&#x27;s trailer, synopsis, key art, marketing materials, and financial projections. Tailor the package to the specific requirements of each potential distributor.<br><b>Resources needed:</b><br><ul><li>Marketing Team</li><li>Sales Team</li><li>Legal Counsel</li></ul>",
      "start_date": "2029-03-31",
      "duration": 12.0,
      "progress": 0,
      "open": true,
      "meta": "a6579f9f-9bea-4a42-bf28-fa031cd8d9dc FS",
      "parent": "5aec6b6a-e9cd-4c2a-b8c1-c49a235648cc"
    },
    {
      "id": "8131fd46-8be7-4263-9d6e-7af6bc2f8bbd",
      "text": "Negotiate Distribution Terms",
      "custom_tooltip": "<b>Negotiate Distribution Terms</b><br>Negotiate distribution terms with potential partners, including revenue sharing agreements, marketing commitments, release dates, and territorial rights. Secure the most favorable terms possible while maintaining flexibility.<br><b>Resources needed:</b><br><ul><li>Distribution Strategist</li><li>Legal Counsel</li><li>Financial Controller</li></ul>",
      "start_date": "2029-04-12",
      "duration": 12.0,
      "progress": 0,
      "open": true,
      "meta": "0e77df54-2319-4800-8494-d62cce30f9dd FS",
      "parent": "5aec6b6a-e9cd-4c2a-b8c1-c49a235648cc"
    },
    {
      "id": "789e08a6-d494-4d67-bbab-e934ce563321",
      "text": "Finalize Distribution Agreements",
      "custom_tooltip": "<b>Finalize Distribution Agreements</b><br>Finalize distribution agreements with selected partners, ensuring that all terms and conditions are clearly defined and legally binding. Obtain necessary approvals from all stakeholders.<br><b>Resources needed:</b><br><ul><li>Legal Counsel</li><li>Producer</li><li>Distribution Strategist</li></ul>",
      "start_date": "2029-04-24",
      "duration": 12.0,
      "progress": 0,
      "open": true,

    {
      "id": "a3aa90b9-3a03-4466-9bd1-94d89a0687de",
      "text": "Public Relations and Media Outreach",
      "custom_tooltip": "<b>Public Relations and Media Outreach</b>",

      "open": true,
      "meta": "5aec6b6a-e9cd-4c2a-b8c1-c49a235648cc FS",

    {
      "id": "b10c7753-03ba-48b4-92b3-93d359886943",
      "text": "Identify Key Media Outlets and Contacts",
      "custom_tooltip": "<b>Identify Key Media Outlets and Contacts</b><br>Research and compile a list of relevant media outlets (film critics, entertainment news sites, industry blogs) and their key contacts (editors, journalists, bloggers) in target markets.<br><b>Resources needed:</b><br><ul><li>Public Relations Specialist</li><li>Research Assistant</li><li>Media Database</li></ul>",
      "start_date": "2029-05-06",
      "duration": 6.0,
      "progress": 0,
      "open": true,
      "meta": "a3aa90b9-3a03-4466-9bd1-94d89a0687de SS",
      "parent": "a3aa90b9-3a03-4466-9bd1-94d89a0687de"
    },
    {
      "id": "6126bc25-72c6-462f-9934-e16fd1794b98",
      "text": "Craft Press Releases and Media Kits",
      "custom_tooltip": "<b>Craft Press Releases and Media Kits</b><br>Develop compelling press releases announcing key milestones (casting, filming, release date) and create comprehensive media kits with high-resolution images, trailers, and behind-the-scenes content.<br><b>Resources needed:</b><br><ul><li>Public Relations Specialist</li><li>Copywriter</li><li>Graphic Designer</li></ul>",
      "start_date": "2029-05-12",
      "duration": 6.0,
      "progress": 0,
      "open": true,
      "meta": "b10c7753-03ba-48b4-92b3-93d359886943 FS",
      "parent": "a3aa90b9-3a03-4466-9bd1-94d89a0687de"
    },
    {
      "id": "6e401092-64aa-4217-a974-04d721a68b2a",
      "text": "Pitch Stories to Media Outlets",
      "custom_tooltip": "<b>Pitch Stories to Media Outlets</b><br>Proactively pitch story ideas and exclusive content to media outlets to generate positive press coverage and build anticipation for the film&#x27;s release.<br><b>Resources needed:</b><br><ul><li>Public Relations Specialist</li><li>Media Database</li></ul>",
      "start_date": "2029-05-18",
      "duration": 6.0,
      "progress": 0,
      "open": true,
      "meta": "6126bc25-72c6-462f-9934-e16fd1794b98 FS",
      "parent": "a3aa90b9-3a03-4466-9bd1-94d89a0687de"
    },
    {
      "id": "acfa33a6-0366-4c72-b767-4149e2c5e223",
      "text": "Manage Media Interviews and Press Events",
      "custom_tooltip": "<b>Manage Media Interviews and Press Events</b><br>Coordinate media interviews with the director, cast, and producers, and organize press events (screenings, conferences) to promote the film and generate buzz.<br><b>Resources needed:</b><br><ul><li>Public Relations Specialist</li><li>Event Planner</li><li>Talent Coordinator</li></ul>",
      "start_date": "2029-05-24",
      "duration": 6.0,
      "progress": 0,
      "open": true,
      "meta": "6e401092-64aa-4217-a974-04d721a68b2a FS",
      "parent": "a3aa90b9-3a03-4466-9bd1-94d89a0687de"
    },
    {
      "id": "aced5456-75c0-4d3b-bbfb-c3b3cf6f80c3",
      "text": "Monitor Media Coverage and Sentiment",
      "custom_tooltip": "<b>Monitor Media Coverage and Sentiment</b><br>Track media coverage and online sentiment to assess the effectiveness of the PR campaign and identify any potential issues or opportunities.<br><b>Resources needed:</b><br><ul><li>Public Relations Specialist</li><li>Social Media Analyst</li><li>Media Monitoring Tools</li></ul>",
      "start_date": "2029-05-30",
      "duration": 6.0,
      "progress": 0,
      "open": true,
      "meta": "a3aa90b9-3a03-4466-9bd1-94d89a0687de FF, acfa33a6-0366-4c72-b767-4149e2c5e223 FS",
      "parent": "a3aa90b9-3a03-4466-9bd1-94d89a0687de"
    },

      "id": "cbf7dc14-64a3-4661-855c-e67ab0124ba9",
      "text": "Audience Engagement Campaign",
      "custom_tooltip": "<b>Audience Engagement Campaign</b>",

    {
      "id": "1ae7b42f-b6f5-4f48-952c-4e5a134ae879",
      "text": "Social Media Campaign Launch",
      "custom_tooltip": "<b>Social Media Campaign Launch</b><br>Launch targeted social media campaigns on platforms like Facebook, Instagram, and Twitter to generate buzz and engage potential viewers. This includes creating engaging content, running targeted ads, and monitoring social media sentiment.<br><b>Resources needed:</b><br><ul><li>Social Media Manager</li><li>Graphic Designer</li><li>Copywriter</li><li>Marketing Budget</li></ul>",
      "start_date": "2029-06-05",
      "duration": 9.0,
      "progress": 0,
      "open": true,
      "meta": "cbf7dc14-64a3-4661-855c-e67ab0124ba9 SS",
      "parent": "cbf7dc14-64a3-4661-855c-e67ab0124ba9"
    },
    {
      "id": "768de6c2-0e85-4525-b849-d4301e439e74",
      "text": "Influencer Marketing Collaboration",
      "custom_tooltip": "<b>Influencer Marketing Collaboration</b><br>Partner with relevant influencers in the film and entertainment space to promote the film to their followers. This involves identifying suitable influencers, negotiating collaboration terms, and managing the influencer campaign.<br><b>Resources needed:</b><br><ul><li>Influencer Marketing Manager</li><li>Budget for Influencer Fees</li><li>Legal Counsel</li></ul>",
      "start_date": "2029-06-14",
      "duration": 9.0,
      "progress": 0,
      "open": true,
      "meta": "1ae7b42f-b6f5-4f48-952c-4e5a134ae879 FS",
      "parent": "cbf7dc14-64a3-4661-855c-e67ab0124ba9"
    },
    {
      "id": "35171626-26b7-4fd7-9fb4-93e9687484eb",
      "text": "Interactive Content Creation",
      "custom_tooltip": "<b>Interactive Content Creation</b><br>Develop interactive content such as behind-the-scenes videos, Q&amp;A sessions with the cast and crew, and online games to engage audiences and provide a deeper connection to the film. This requires creative brainstorming, content production, and platform integration.<br><b>Resources needed:</b><br><ul><li>Content Creators</li><li>Video Editors</li><li>Web Developers</li><li>Interactive Platform</li></ul>",
      "start_date": "2029-06-23",
      "duration": 9.0,
      "progress": 0,
      "open": true,
      "meta": "768de6c2-0e85-4525-b849-d4301e439e74 FS",
      "parent": "cbf7dc14-64a3-4661-855c-e67ab0124ba9"
    },
    {
      "id": "d1758f23-28b2-48e9-8cd4-791d5b752f32",
      "text": "Online Contests and Giveaways",
      "custom_tooltip": "<b>Online Contests and Giveaways</b><br>Organize online contests and giveaways to generate excitement and reward audience participation. This includes designing contest rules, promoting the contests, and managing prize distribution.<br><b>Resources needed:</b><br><ul><li>Marketing Coordinator</li><li>Prizes</li><li>Contest Platform</li></ul>",
      "start_date": "2029-07-02",
      "duration": 9.0,
      "progress": 0,
      "open": true,
      "meta": "35171626-26b7-4fd7-9fb4-93e9687484eb FS",
      "parent": "cbf7dc14-64a3-4661-855c-e67ab0124ba9"
    },
    {
      "id": "eb2734e9-417f-4997-aacf-ec2511dd6811",
      "text": "Community Building and Management",
      "custom_tooltip": "<b>Community Building and Management</b><br>Build and manage online communities on platforms like Reddit and Discord to foster discussions about the film and create a sense of belonging among fans. This involves moderating discussions, responding to questions, and organizing community events.<br><b>Resources needed:</b><br><ul><li>Community Manager</li><li>Moderation Tools</li><li>Community Platform</li></ul>",
      "start_date": "2029-07-11",
      "duration": 9.0,
      "progress": 0,
      "open": true,
      "meta": "cbf7dc14-64a3-4661-855c-e67ab0124ba9 FF, d1758f23-28b2-48e9-8cd4-791d5b752f32 FS",
      "parent": "cbf7dc14-64a3-4661-855c-e67ab0124ba9"
    },

      "id": "4369de13-567a-4c4f-9e1f-36e191839f9a",

      "custom_tooltip": "<b>Coordinate Theatrical Release</b>",

    {
      "id": "83fe6cfa-4561-44e9-8ced-bf6475b78289",
      "text": "Negotiate with Theater Chains",
      "custom_tooltip": "<b>Negotiate with Theater Chains</b><br>Negotiate screening times, locations, and revenue sharing agreements with major theater chains in key territories.<br><b>Resources needed:</b><br><ul><li>Distribution Manager</li><li>Legal Counsel</li><li>Negotiation Specialist</li></ul>",
      "start_date": "2029-07-20",
      "duration": 5.0,
      "progress": 0,
      "open": true,
      "meta": "4369de13-567a-4c4f-9e1f-36e191839f9a SS",
      "parent": "4369de13-567a-4c4f-9e1f-36e191839f9a"
    },
    {
      "id": "1f6706b6-1dc5-459b-a57d-a6453f44f410",
      "text": "Coordinate Film Delivery to Theaters",
      "custom_tooltip": "<b>Coordinate Film Delivery to Theaters</b><br>Ensure timely and secure delivery of film prints or digital cinema packages (DCPs) to theaters.<br><b>Resources needed:</b><br><ul><li>Distribution Coordinator</li><li>Logistics Team</li><li>Technical Support</li></ul>",
      "start_date": "2029-07-25",
      "duration": 5.0,
      "progress": 0,
      "open": true,
      "meta": "83fe6cfa-4561-44e9-8ced-bf6475b78289 FS",

    },
    {
      "id": "250fb110-7c63-45b4-b0d4-e0ccd6f71c52",
      "text": "Plan Premiere Events",
      "custom_tooltip": "<b>Plan Premiere Events</b><br>Organize premiere events in key cities to generate buzz and attract media attention.<br><b>Resources needed:</b><br><ul><li>Public Relations Team</li><li>Event Planner</li><li>Marketing Team</li></ul>",
      "start_date": "2029-07-30",
      "duration": 5.0,
      "progress": 0,
      "open": true,
      "meta": "1f6706b6-1dc5-459b-a57d-a6453f44f410 FS",
      "parent": "4369de13-567a-4c4f-9e1f-36e191839f9a"
    },
    {
      "id": "90866ac3-6a87-494b-a092-a11bb4eec3bc",
      "text": "Monitor Box Office Performance",
      "custom_tooltip": "<b>Monitor Box Office Performance</b><br>Track daily box office revenue and adjust marketing strategies as needed to maximize ticket sales.<br><b>Resources needed:</b><br><ul><li>Data Analyst</li><li>Marketing Team</li><li>Distribution Manager</li></ul>",
      "start_date": "2029-08-04",
      "duration": 5.0,
      "progress": 0,
      "open": true,
      "meta": "250fb110-7c63-45b4-b0d4-e0ccd6f71c52 FS",
      "parent": "4369de13-567a-4c4f-9e1f-36e191839f9a"
    },
    {
      "id": "a056d467-dd2d-4135-8da7-966f4bdef3cf",
      "text": "Manage Theater Relations",
      "custom_tooltip": "<b>Manage Theater Relations</b><br>Maintain strong relationships with theater managers to ensure optimal screening conditions and address any issues that arise.<br><b>Resources needed:</b><br><ul><li>Distribution Manager</li><li>Theater Liaison</li><li>Customer Service Team</li></ul>",
      "start_date": "2029-08-09",
      "duration": 5.0,
      "progress": 0,
      "open": true,
      "meta": "4369de13-567a-4c4f-9e1f-36e191839f9a FF, 90866ac3-6a87-494b-a092-a11bb4eec3bc FS",
      "parent": "4369de13-567a-4c4f-9e1f-36e191839f9a"
    },
    {
      "id": "9fb20877-1b49-4911-8f3e-ddd612e4538f",
      "text": "Secure VOD and Streaming Deals",
      "custom_tooltip": "<b>Secure VOD and Streaming Deals</b>",
      "progress": 0,
      "open": true,
      "meta": "175375d2-f377-4ab3-af0e-b773d7a208ff FF, 4369de13-567a-4c4f-9e1f-36e191839f9a FS",
      "parent": "175375d2-f377-4ab3-af0e-b773d7a208ff",
      "type": "project"
    },
    {
      "id": "c1cdb8ba-b3ec-4924-9481-f4d3b6d9ef04",
      "text": "Identify Target VOD/Streaming Platforms",
      "custom_tooltip": "<b>Identify Target VOD/Streaming Platforms</b><br>Research and identify VOD and streaming platforms that align with the film&#x27;s target audience and genre. Consider factors such as platform reach, subscriber base, and content strategy.<br><b>Resources needed:</b><br><ul><li>Distribution Strategist</li><li>Market Research Analyst</li></ul>",
      "start_date": "2029-08-14",
      "duration": 15.0,
      "progress": 0,
      "open": true,
      "meta": "9fb20877-1b49-4911-8f3e-ddd612e4538f SS",
      "parent": "9fb20877-1b49-4911-8f3e-ddd612e4538f"
    },
    {
      "id": "710dfda2-72b4-4908-b512-0da4a89fe21a",
      "text": "Prepare Pitch Materials",
      "custom_tooltip": "<b>Prepare Pitch Materials</b><br>Develop a compelling pitch deck and marketing materials tailored to each target platform. Highlight the film&#x27;s unique selling points, target audience, and potential revenue streams.<br><b>Resources needed:</b><br><ul><li>Marketing Team</li><li>Sales Team</li><li>Graphic Designer</li></ul>",
      "start_date": "2029-08-29",
      "duration": 15.0,
      "progress": 0,
      "open": true,
      "meta": "c1cdb8ba-b3ec-4924-9481-f4d3b6d9ef04 FS",
      "parent": "9fb20877-1b49-4911-8f3e-ddd612e4538f"
    },
    {
      "id": "f1d7e531-c7c1-448e-a711-edd4f4751aa8",
      "text": "Negotiate Licensing Agreements",
      "custom_tooltip": "<b>Negotiate Licensing Agreements</b><br>Negotiate licensing agreements with VOD and streaming platforms, focusing on key terms such as revenue sharing, exclusivity, and marketing support. Secure legal review of all agreements.<br><b>Resources needed:</b><br><ul><li>Legal Counsel</li><li>Distribution Strategist</li><li>Negotiator</li></ul>",
      "start_date": "2029-09-13",
      "duration": 15.0,
      "progress": 0,
      "open": true,
      "meta": "710dfda2-72b4-4908-b512-0da4a89fe21a FS",
      "parent": "9fb20877-1b49-4911-8f3e-ddd612e4538f"
    },
    {
      "id": "dbeae54f-240f-4747-a4dd-38407a8100db",
      "text": "Finalize Delivery Specifications",
      "custom_tooltip": "<b>Finalize Delivery Specifications</b><br>Confirm technical delivery specifications with each platform and ensure the film meets all requirements for encoding, subtitles, and metadata. Coordinate delivery of the final film assets.<br><b>Resources needed:</b><br><ul><li>Post-Production Supervisor</li><li>Technical Team</li><li>Quality Control Specialist</li></ul>",
      "start_date": "2029-09-28",
      "duration": 15.0,
      "progress": 0,
      "open": true,

    function zoomFit() {
        const tasks = gantt.getTaskByTime();
        if (tasks.length > 0) {
            const firstTask = tasks[0];
            const lastTask = tasks[tasks.length - 1];
            gantt.showDate(firstTask.start_date);
            
            // Calculate total duration in days
            const startDate = new Date(firstTask.start_date);
            const endDate = new Date(lastTask.end_date);
            const durationDays = (endDate - startDate) / (1000 * 60 * 60 * 24);
            
            // Choose appropriate scale based on duration
            if (durationDays > 3650) { // More than 10 years
                gantt.config.scale_unit = "year";
                gantt.config.step = 10;
                gantt.config.subscales = [
                    {unit: "year", step: 1, date: "%Y"}
                ];
            } else if (durationDays > 365) { // More than 1 year
                gantt.config.scale_unit = "year";
                gantt.config.step = 1;
                gantt.config.subscales = [
                    {unit: "month", step: 1, date: "%M"}
                ];
            } else if (durationDays > 30) { // More than 1 month
                gantt.config.scale_unit = "month";
                gantt.config.step = 1;
                gantt.config.subscales = [
                    {unit: "day", step: 1, date: "%d"}
                ];
            } else if (durationDays > 7) { // More than 1 week
                gantt.config.scale_unit = "week";
                gantt.config.step = 1;
                gantt.config.subscales = [
                    {unit: "day", step: 1, date: "%d"}
                ];
            } else {
                gantt.config.scale_unit = "day";
                gantt.config.step = 1;
                gantt.config.subscales = [];
            }
            gantt.render();
        }
    }

    function zoomIn() {
        const currentUnit = gantt.config.scale_unit;
        const currentStep = gantt.config.step;
        
        if (currentUnit === "year" && currentStep === 10) {
            gantt.config.scale_unit = "year";
            gantt.config.step = 1;
            gantt.config.subscales = [
                {unit: "month", step: 1, date: "%M"}
            ];
        } else if (currentUnit === "year") {
            gantt.config.scale_unit = "month";
            gantt.config.step = 1;
            gantt.config.subscales = [
                {unit: "day", step: 1, date: "%d"}
            ];
        } else if (currentUnit === "month") {
            gantt.config.scale_unit = "week";
            gantt.config.step = 1;
            gantt.config.subscales = [
                {unit: "day", step: 1, date: "%d"}
            ];
        } else if (currentUnit === "week") {
            gantt.config.scale_unit = "day";
            gantt.config.step = 1;
            gantt.config.subscales = [];
        }
        gantt.render();
    }

    function zoomOut() {
        const currentUnit = gantt.config.scale_unit;
        const currentStep = gantt.config.step;
        
        if (currentUnit === "day") {
            gantt.config.scale_unit = "week";
            gantt.config.step = 1;
            gantt.config.subscales = [
                {unit: "day", step: 1, date: "%d"}
            ];
        } else if (currentUnit === "week") {
            gantt.config.scale_unit = "month";
            gantt.config.step = 1;
            gantt.config.subscales = [
                {unit: "day", step: 1, date: "%d"}
            ];
        } else if (currentUnit === "month") {
            gantt.config.scale_unit = "year";
            gantt.config.step = 1;
            gantt.config.subscales = [
                {unit: "month", step: 1, date: "%M"}
            ];
        } else if (currentUnit === "year") {
            gantt.config.scale_unit = "year";
            gantt.config.step = 10;
            gantt.config.subscales = [
                {unit: "year", step: 1, date: "%Y"}
            ];
        }
        gantt.render();
    }

    function downloadCSV() {
        if (GANTT_DATA_CSV === null) {
            return;
        }
        const blob = new Blob([GANTT_DATA_CSV], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        const url = URL.createObjectURL(blob);
        link.setAttribute('href', url);
        link.setAttribute('download', GANTT_FILENAME_CSV);
        link.style.visibility = 'hidden';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    // Gantt Initialization
    gantt.config.readonly = true;
    gantt.config.date_format = "%Y-%m-%d";
    gantt.config.scale_unit = "month";
    gantt.config.step = 1;
    gantt.config.subscales = [
        {unit: "day", step: 1, date: "%d"}
    ];

    gantt.config.columns = [
        {name:"text", label:"Task name", width:"*", tree:true},
        // {name:"start_date", label:"Start time", align: "center"},
        // {name:"duration", label:"Duration", align: "center"}
    ];

    gantt.templates.task_class = function(start, end, task) {
        if (task.type === "project") {
            return "project-task";
        }
        return "";
    };

    gantt.templates.tooltip_text = function(start, end, task) {
        return task.custom_tooltip || "No tooltip";
    };
    
	gantt.plugins({
		tooltip: true
	});
	gantt.attachEvent("onGanttReady", function(){
		var tooltips = gantt.ext.tooltips;
		tooltips.tooltip.setViewport(gantt.$task_data);
	});
    gantt.init("gantt_container");
    gantt.parse(GANTT_DATA_DHTMLX);

    // Hide the export to CSV button if there is no CSV data
    if (GANTT_DATA_CSV === null) {
        document.getElementById('exportToCSVButton').style.display = 'none';
    }

    document.getElementById('zoomFitButton').addEventListener('click', zoomFit);
    document.getElementById('zoomInButton').addEventListener('click', zoomIn);
    document.getElementById('zoomOutButton').addEventListener('click', zoomOut);
    document.getElementById('exportToCSVButton').addEventListener('click', downloadCSV);
