    const GANTT_DATA_CSV = "project_key,project_name,project_description,project_start_date,project_end_date,project_progress,project_parent,originating_department\nff827cb8-4d14-45c1-bb00-c79499f5222d,Hong Kong Game,\"Hong Kong Game\n\nFinal deliverable:\nTheatrical Release\",3/10/2026,10/13/2029,0,,PlanExe\ndfacbf8c-f552-45fd-b070-3ed3181efe1d,Project Initiation,,3/10/2026,2/20/2027,0,ff827cb8-4d14-45c1-bb00-c79499f5222d,PlanExe\n65cd5530-c423-4ce0-a52f-df6dc2d9aba2,Secure IP Rights,,3/10/2026,5/9/2026,0,dfacbf8c-f552-45fd-b070-3ed3181efe1d,PlanExe\n512bb346-0a0b-4135-bab1-76709bb5fc04,Identify Rights Holders,\"Identify Rights Holders\n\nDescription:\nDetermine the current rights holder of 'The Game' (Propaganda Films/PolyGram, now likely Universal) and their contact information. This involves title searches, copyright record reviews, and industry database research.\n\nResources needed:\n\u2022 Rights Acquisition Specialist\n\u2022 Legal Counsel\n\u2022 Industry Databases (IMDbPro, LexisNexis)\",3/10/2026,3/22/2026,0,65cd5530-c423-4ce0-a52f-df6dc2d9aba2,PlanExe\n9add1c86-c166-488c-8101-505f6b862dfe,Assess Rights Availability and Scope,\"Assess Rights Availability and Scope\n\nDescription:\nEvaluate the scope of rights available (remake, sequel, etc.) and any existing encumbrances or claims on the rights. This includes legal due diligence and consultation with entertainment lawyers.\n\nResources needed:\n\u2022 Legal Counsel\n\u2022 Rights Acquisition Specialist\n\u2022 Entertainment Lawyer (US & HK)\",3/22/2026,4/3/2026,0,512bb346-0a0b-4135-bab1-76709bb5fc04,PlanExe\nc7c7122b-7126-4893-ab61-55654ae56b2b,Negotiate Remake Rights,\"Negotiate Remake Rights\n\nDescription:\nNegotiate with the rights holder (Propaganda Films / PolyGram (Universal)) to secure remake rights for 'The Game'. This involves preparing a detailed valuation of the IP rights and exploring alternative acquisition strategies, including licensing options.\n\nResources needed:\n\u2022 Producer\n\u2022 Rights Acquisition Specialist\n\u2022 Legal Counsel\n\u2022 Negotiation Expert\",4/3/2026,4/15/2026,0,9add1c86-c166-488c-8101-505f6b862dfe,PlanExe\n6062b8b1-d215-4dfc-a0c1-c246e237df00,Draft Rights Agreement,\"Draft Rights Agreement\n\nDescription:\nDraft a legally sound rights agreement that clearly defines the scope of rights acquired, payment terms, and other relevant clauses. This requires collaboration between legal counsel and the rights holder.\n\nResources needed:\n\u2022 Legal Counsel\n\u2022 Rights Acquisition Specialist\",4/15/2026,4/27/2026,0,c7c7122b-7126-4893-ab61-55654ae56b2b,PlanExe\n62e8e54b-f7cc-4692-bf32-f646ec9bfb01,Finalize and Execute Agreement,\"Finalize and Execute Agreement\n\nDescription:\nFinalize the rights agreement based on feedback from all parties and execute the agreement. This includes obtaining necessary signatures and ensuring that all legal requirements are met.\n\nResources needed:\n\u2022 Producer\n\u2022 Legal Counsel\n\u2022 Rights Acquisition Specialist\",4/27/2026,5/9/2026,0,65cd5530-c423-4ce0-a52f-df6dc2d9aba2,PlanExe\n1937fa8f-c3cb-43fb-8d23-4cc693e1025c,Secure Funding,,5/9/2026,9/6/2026,0,65cd5530-c423-4ce0-a52f-df6dc2d9aba2,PlanExe\n4cf96d54-1c52-4486-a308-3d1e572331a5,Outline screenplay adaptation structure,\"Outline screenplay adaptation structure\n\nDescription:\nDevelop a detailed outline of the screenplay adaptation, including key plot points, character arcs, and thematic elements, ensuring it aligns with the Hong Kong setting and modern audience expectations.\n\nResources needed:\n\u2022 Screenwriter\n\u2022 Director\n\u2022 Producer\",5/9/2026,6/2/2026,0,1937fa8f-c3cb-43fb-8d23-4cc693e1025c,PlanExe\n1ff11111-a171-4add-a283-cf08d2d2c4ef,Research Hong Kong architectural paranoia (1),\"Research Hong Kong architectural paranoia\n\nDescription:\nConduct thorough research on Hong Kong's unique architectural landscape and its potential to heighten the psychological thriller elements of the story, focusing on claustrophobia, surveillance, and urban isolation.\n\nResources needed:\n\u2022 Screenwriter\n\u2022 Research Assistant\n\u2022 Hong Kong Cultural Consultant\",6/2/2026,6/26/2026,0,4cf96d54-1c52-4486-a308-3d1e572331a5,PlanExe\n1e39cab4-3bac-44c6-a934-794a667659d6,Write first draft of screenplay,\"Write first draft of screenplay\n\nDescription:\nBased on the outline and research, write the first draft of the screenplay, incorporating the Hong Kong setting, modern themes, and architectural paranoia elements, while adhering to the 'no smoking' policy.\n\nResources needed:\n\u2022 Screenwriter\",6/26/2026,7/20/2026,0,1ff11111-a171-4add-a283-cf08d2d2c4ef,PlanExe\n359425ee-88d0-47ea-9fe5-551e2127f8f6,Review and revise screenplay draft,\"Review and revise screenplay draft\n\nDescription:\nConduct a series of review sessions with the director, producer, and other key stakeholders to provide feedback on the first draft, followed by revisions to address concerns and improve the script's overall quality.\n\nResources needed:\n\u2022 Screenwriter\n\u2022 Director\n\u2022 Producer\n\u2022 Script Editor\",7/20/2026,8/13/2026,0,1e39cab4-3bac-44c6-a934-794a667659d6,PlanExe\nacdbd8f4-89a3-474d-84cc-4795a767dc1e,Finalize screenplay for production,\"Finalize screenplay for production\n\nDescription:\nIncorporate all feedback and revisions to create a final, polished screenplay that is ready for production, ensuring it meets all creative and technical requirements, including censorship guidelines and budget constraints.\n\nResources needed:\n\u2022 Screenwriter\n\u2022 Director\n\u2022 Producer\n\u2022 Legal Counsel\",8/13/2026,9/6/2026,0,1937fa8f-c3cb-43fb-8d23-4cc693e1025c,PlanExe\n1bf7cc14-3797-421e-9f62-ed33c52e4a55,Finalize Screenplay Adaptation,,9/6/2026,12/7/2026,0,1937fa8f-c3cb-43fb-8d23-4cc693e1025c,PlanExe\n316ed6f7-93d3-4f1d-a39b-c76dcb175236,Outline Hong Kong Adaptation,\"Outline Hong Kong Adaptation\n\nDescription:\nDevelop a detailed outline of the screenplay adaptation, focusing on how the original story will be adapted to a Hong Kong setting, including key plot points, character arcs, and thematic elements. This includes researching Hong Kong culture, architecture, and social dynamics to ensure authenticity and relevance.\n\nResources needed:\n\u2022 Screenwriter\n\u2022 Hong Kong Cultural Consultant\n\u2022 Director\",9/6/2026,9/29/2026,0,1bf7cc14-3797-421e-9f62-ed33c52e4a55,PlanExe\n5318c083-f987-4a3c-9c9f-f1d8cb6772c0,First Draft Screenplay,\"First Draft Screenplay\n\nDescription:\nWrite the first draft of the screenplay, incorporating the outline and research findings. This includes developing dialogue, action sequences, and scene descriptions that are appropriate for the Hong Kong setting and the updated storyline. Ensure the script adheres to the 'no smoking' policy.\n\nResources needed:\n\u2022 Screenwriter\n\u2022 Script Editing Software\",9/29/2026,10/22/2026,0,316ed6f7-93d3-4f1d-a39b-c76dcb175236,PlanExe\n5c520086-9597-409e-acbc-c5459e7b09d5,Feedback and Revision,\"Feedback and Revision\n\nDescription:\nGather feedback on the first draft from the director, producers, and other key stakeholders. Revise the screenplay based on this feedback, addressing any issues with plot, character development, pacing, or thematic consistency. This may involve multiple rounds of revisions.\n\nResources needed:\n\u2022 Screenwriter\n\u2022 Director\n\u2022 Producers\n\u2022 Script Editor\",10/22/2026,11/14/2026,0,5318c083-f987-4a3c-9c9f-f1d8cb6772c0,PlanExe\ne3402f39-970a-492c-8d77-b235cc33949b,Polish and Finalize Script,\"Polish and Finalize Script\n\nDescription:\nPolish the revised screenplay, focusing on dialogue, pacing, and overall flow. Ensure the script is ready for production, with clear scene descriptions, action sequences, and character motivations. Obtain final approval from the director and producers.\n\nResources needed:\n\u2022 Screenwriter\n\u2022 Script Editor\n\u2022 Director\n\u2022 Producers\",11/14/2026,12/7/2026,0,1bf7cc14-3797-421e-9f62-ed33c52e4a55,PlanExe\n47baa874-5487-4996-a1ab-f65577631fcd,Select Director,,12/7/2026,1/6/2027,0,1bf7cc14-3797-421e-9f62-ed33c52e4a55,PlanExe\n87288bd4-a113-425b-a774-e69a661ac759,Define Lead Actor Profile,\"Define Lead Actor Profile\n\nDescription:\nEstablish the specific characteristics, skills, and experience required for the lead actor role. This includes physical attributes, acting range, and suitability for the Hong Kong setting.\n\nResources needed:\n\u2022 Director\n\u2022 Producer\n\u2022 Casting Director\n\u2022 Screenwriter\",12/7/2026,12/13/2026,0,47baa874-5487-4996-a1ab-f65577631fcd,PlanExe\n9c5eeb53-507a-4dbc-90a2-21fb49768c58,Research Potential Lead Actors,\"Research Potential Lead Actors\n\nDescription:\nIdentify a pool of potential lead actors who meet the defined profile. This involves researching actors with relevant experience, reviewing their past performances, and assessing their availability.\n\nResources needed:\n\u2022 Casting Director\n\u2022 Research Assistant\n\u2022 Online Databases (IMDbPro, etc.)\",12/13/2026,12/19/2026,0,87288bd4-a113-425b-a774-e69a661ac759,PlanExe\n90e7d20c-13e0-4998-b18d-27f954f52f02,Conduct Auditions and Screen Tests (1),\"Conduct Auditions and Screen Tests\n\nDescription:\nOrganize and conduct auditions and screen tests for shortlisted actors. This includes providing actors with script excerpts, directing their performances, and evaluating their suitability for the role.\n\nResources needed:\n\u2022 Director\n\u2022 Casting Director\n\u2022 Audition Space\n\u2022 Camera Crew\n\u2022 Sound Equipment\",12/19/2026,12/25/2026,0,9c5eeb53-507a-4dbc-90a2-21fb49768c58,PlanExe\ncc89a3aa-df27-40d9-a163-c14b99a69cb1,Negotiate Contract Terms (1),\"Negotiate Contract Terms\n\nDescription:\nNegotiate contract terms with the selected lead actor's agent or representative. This includes salary, benefits, working conditions, and other relevant clauses.\n\nResources needed:\n\u2022 Producer\n\u2022 Legal Counsel\n\u2022 Agent/Representative\",12/25/2026,12/31/2026,0,90e7d20c-13e0-4998-b18d-27f954f52f02,PlanExe\n338ed60c-b307-4b1d-a851-66910d3d1c0a,Finalize Lead Actor Agreement,\"Finalize Lead Actor Agreement\n\nDescription:\nFinalize and execute the agreement with the lead actor, ensuring that all terms and conditions are clearly defined and agreed upon by both parties.\n\nResources needed:\n\u2022 Producer\n\u2022 Legal Counsel\n\u2022 Agent/Representative\n\u2022 Lead Actor\",12/31/2026,1/6/2027,0,47baa874-5487-4996-a1ab-f65577631fcd,PlanExe\n7a2c3c64-1c1a-4039-84c5-6dff814096bb,Cast Lead Actor,,1/6/2027,2/20/2027,0,dfacbf8c-f552-45fd-b070-3ed3181efe1d,PlanExe\ne33090b4-ee64-469f-8458-6deae5d38bcb,Identify potential lead actors,\"Identify potential lead actors\n\nDescription:\nResearch and compile a list of actors suitable for the lead role, considering their acting skills, marketability, and availability.\n\nResources needed:\n\u2022 Casting director\n\u2022 Producer\n\u2022 Director\n\u2022 IMDbPro\n\u2022 Talent agencies\",1/6/2027,1/15/2027,0,7a2c3c64-1c1a-4039-84c5-6dff814096bb,PlanExe\n80d64560-c8e7-4852-9fdd-dca3b90b646e,Contact agents and assess interest,\"Contact agents and assess interest\n\nDescription:\nReach out to the agents of potential lead actors to gauge their interest in the project and inquire about their availability and salary expectations.\n\nResources needed:\n\u2022 Casting director\n\u2022 Producer\n\u2022 Talent agencies\n\u2022 Legal counsel\",1/15/2027,1/24/2027,0,e33090b4-ee64-469f-8458-6deae5d38bcb,PlanExe\na33f062d-bc55-4291-88a6-cf29b3abc9f7,Conduct auditions and screen tests (2),\"Conduct auditions and screen tests\n\nDescription:\nOrganize and conduct auditions and screen tests for the most promising candidates to assess their suitability for the role and their chemistry with other actors.\n\nResources needed:\n\u2022 Casting director\n\u2022 Director\n\u2022 Producer\n\u2022 Audition space\n\u2022 Camera crew\",1/24/2027,2/2/2027,0,80d64560-c8e7-4852-9fdd-dca3b90b646e,PlanExe\n7b9cf203-4682-4972-b54a-e12db6bbf14a,Negotiate contract terms (2),\"Negotiate contract terms\n\nDescription:\nNegotiate contract terms with the chosen lead actor, including salary, schedule, and other relevant clauses.\n\nResources needed:\n\u2022 Producer\n\u2022 Legal counsel\n\u2022 Talent agent\",2/2/2027,2/11/2027,0,a33f062d-bc55-4291-88a6-cf29b3abc9f7,PlanExe\n8f59fafc-f6d4-48a9-af36-b3aa4fe8bb8a,Finalize and sign contract,\"Finalize and sign contract\n\nDescription:\nFinalize the contract with the lead actor and obtain all necessary signatures.\n\nResources needed:\n\u2022 Producer\n\u2022 Legal counsel\n\u2022 Talent agent\",2/11/2027,2/20/2027,0,7a2c3c64-1c1a-4039-84c5-6dff814096bb,PlanExe\n82f211f3-c501-460a-a229-db38de628e61,Pre-Production,,2/20/2027,10/4/2027,0,dfacbf8c-f552-45fd-b070-3ed3181efe1d,PlanExe\n14510b52-c1ea-4e81-98c7-4766e0473d4f,Location Scouting in Hong Kong,,2/20/2027,3/16/2027,0,82f211f3-c501-460a-a229-db38de628e61,PlanExe\n728e7fde-747b-4365-90f8-d02881dc6dd0,Identify Key Hong Kong Locations,\"Identify Key Hong Kong Locations\n\nDescription:\nObjective: Identify diverse locations that fit the film's aesthetic and narrative requirements.\nScope: Research and compile a list of potential filming locations, including urban, rural, and iconic landmarks.\nSteps: Conduct online research, consult with local experts, and create a database of potential locations with photos and descriptions.\nDeliverables: A comprehensive list of potential filming locations with detailed information.\n\nResources needed:\n\u2022 Location Scout\n\u2022 Research Assistant\n\u2022 Transportation\",2/20/2027,2/26/2027,0,14510b52-c1ea-4e81-98c7-4766e0473d4f,PlanExe\nc5defb23-d5e0-41f5-8086-3ba7da0e4d72,Assess Location Accessibility and Logistics,\"Assess Location Accessibility and Logistics\n\nDescription:\nObjective: Evaluate the feasibility of filming at each location, considering accessibility, permits, and logistical challenges.\nScope: Assess the accessibility of each location for equipment and crew, identify potential logistical challenges, and research permit requirements.\nSteps: Visit each location, assess accessibility, identify potential challenges, and research permit requirements.\nDeliverables: A report detailing the accessibility, logistical challenges, and permit requirements for each location.\n\nResources needed:\n\u2022 Location Scout\n\u2022 Logistics Coordinator\n\u2022 Permitting Specialist\n\u2022 Transportation\",2/26/2027,3/4/2027,0,728e7fde-747b-4365-90f8-d02881dc6dd0,PlanExe\ne1ada426-7814-4d24-9575-1472319a15dc,Negotiate Location Agreements and Fees,\"Negotiate Location Agreements and Fees\n\nDescription:\nObjective: Secure agreements with location owners and negotiate fees for filming.\nScope: Contact location owners, negotiate agreements, and secure permits for filming.\nSteps: Contact location owners, negotiate agreements, secure permits, and finalize contracts.\nDeliverables: Signed location agreements and permits.\n\nResources needed:\n\u2022 Producer\n\u2022 Location Manager\n\u2022 Legal Counsel\",3/4/2027,3/10/2027,0,c5defb23-d5e0-41f5-8086-3ba7da0e4d72,PlanExe\n734b4121-6140-43a1-8811-dc8d818bbbef,Photograph and Document Locations,\"Photograph and Document Locations\n\nDescription:\nObjective: Capture high-quality photos and videos of each location for pre-production planning.\nScope: Photograph and document each location, including interior and exterior shots, and create a virtual tour.\nSteps: Photograph and document each location, create a virtual tour, and compile a photo and video library.\nDeliverables: A comprehensive photo and video library of each location.\n\nResources needed:\n\u2022 Photographer\n\u2022 Videographer\n\u2022 Equipment\n\u2022 Location Scout\",3/10/2027,3/16/2027,0,14510b52-c1ea-4e81-98c7-4766e0473d4f,PlanExe\nfd6a4e26-e68f-46e2-8913-e2ef91cbbb62,Casting of Supporting Roles,,3/16/2027,4/15/2027,0,14510b52-c1ea-4e81-98c7-4766e0473d4f,PlanExe\n4e31ac3f-e846-4a13-9517-68fd3a79f96d,Define Supporting Role Requirements,\"Define Supporting Role Requirements\n\nDescription:\nClearly define the requirements for each supporting role, including character descriptions, acting experience, and any specific skills or attributes needed.\n\nResources needed:\n\u2022 Director\n\u2022 Casting Director\n\u2022 Screenwriter\",3/16/2027,3/22/2027,0,fd6a4e26-e68f-46e2-8913-e2ef91cbbb62,PlanExe\n87a8761c-7353-4ee2-aa03-edb81c64b9d3,Hold Initial Casting Calls,\"Hold Initial Casting Calls\n\nDescription:\nOrganize and conduct initial casting calls to audition actors for the supporting roles. This includes advertising the casting calls, reviewing submissions, and scheduling auditions.\n\nResources needed:\n\u2022 Casting Director\n\u2022 Casting Assistant\n\u2022 Audition Space\",3/22/2027,3/28/2027,0,4e31ac3f-e846-4a13-9517-68fd3a79f96d,PlanExe\n648a4bbc-4308-43fb-9737-f9de8e2cf704,Review Auditions and Shortlist Actors,\"Review Auditions and Shortlist Actors\n\nDescription:\nReview the audition tapes and performances of the actors who attended the initial casting calls. Create a shortlist of actors who are suitable for the supporting roles.\n\nResources needed:\n\u2022 Director\n\u2022 Casting Director\n\u2022 Producers\",3/28/2027,4/3/2027,0,87a8761c-7353-4ee2-aa03-edb81c64b9d3,PlanExe\n59b68b72-303c-44ca-b33d-be203a05535f,Conduct Callbacks and Chemistry Reads,\"Conduct Callbacks and Chemistry Reads\n\nDescription:\nInvite the shortlisted actors back for callbacks and chemistry reads with the lead actors. This will help determine the best fit for each supporting role and ensure good on-screen chemistry.\n\nResources needed:\n\u2022 Director\n\u2022 Casting Director\n\u2022 Lead Actors\n\u2022 Audition Space\",4/3/2027,4/9/2027,0,648a4bbc-4308-43fb-9737-f9de8e2cf704,PlanExe\n914b71dc-d2d6-4c48-9d26-b4ddc13db2d5,Finalize Supporting Cast Selection,\"Finalize Supporting Cast Selection\n\nDescription:\nMake the final selection of actors for the supporting roles based on their auditions, callbacks, and chemistry reads. Negotiate contracts and finalize agreements with the selected actors.\n\nResources needed:\n\u2022 Director\n\u2022 Casting Director\n\u2022 Producers\n\u2022 Legal Counsel\",4/9/2027,4/15/2027,0,fd6a4e26-e68f-46e2-8913-e2ef91cbbb62,PlanExe\nc880fce9-fff5-4795-bc6d-a5b9eb2abbaa,Set Design and Construction,,4/15/2027,6/14/2027,0,fd6a4e26-e68f-46e2-8913-e2ef91cbbb62,PlanExe\n8464e684-fb82-46f0-8f69-c7c7bed30fb1,Finalize Set Designs,\"Finalize Set Designs\n\nDescription:\nComplete all set designs, incorporating director feedback and ensuring alignment with the film's visual style. This includes detailed blueprints, 3D models, and material specifications.\n\nResources needed:\n\u2022 Production Designer\n\u2022 Art Director\n\u2022 Set Designers\n\u2022 Director\",4/15/2027,4/27/2027,0,c880fce9-fff5-4795-bc6d-a5b9eb2abbaa,PlanExe\n66e6f564-93d1-451b-b4e7-6ef488273f15,Source Construction Materials,\"Source Construction Materials\n\nDescription:\nIdentify and secure all necessary construction materials, including lumber, steel, paint, and decorative elements. Obtain quotes from multiple suppliers and negotiate favorable pricing.\n\nResources needed:\n\u2022 Set Decorator\n\u2022 Construction Foreman\n\u2022 Purchasing Agent\",4/27/2027,5/9/2027,0,8464e684-fb82-46f0-8f69-c7c7bed30fb1,PlanExe\nfb59231b-6584-4e98-aa09-991ef280af9e,Hire Construction Crew,\"Hire Construction Crew\n\nDescription:\nRecruit and hire a skilled construction crew, including carpenters, electricians, painters, and laborers. Conduct interviews, verify credentials, and negotiate contracts.\n\nResources needed:\n\u2022 Construction Foreman\n\u2022 Production Manager\n\u2022 HR Representative\",5/9/2027,5/21/2027,0,66e6f564-93d1-451b-b4e7-6ef488273f15,PlanExe\nb9946d38-0636-480f-bb05-e10fc6f8649a,Construct Sets,\"Construct Sets\n\nDescription:\nOversee the construction of all sets according to the finalized designs and specifications. Ensure adherence to safety regulations and quality standards. Manage the construction schedule and budget.\n\nResources needed:\n\u2022 Construction Foreman\n\u2022 Carpenters\n\u2022 Electricians\n\u2022 Painters\n\u2022 Laborers\n\u2022 Set Decorator\",5/21/2027,6/2/2027,0,fb59231b-6584-4e98-aa09-991ef280af9e,PlanExe\ndd06c4de-7c38-45b6-93d1-1018b734dede,Inspect and Approve Sets,\"Inspect and Approve Sets\n\nDescription:\nConduct thorough inspections of all completed sets to ensure they meet the required standards for safety, functionality, and visual appeal. Obtain final approval from the director and production designer.\n\nResources needed:\n\u2022 Director\n\u2022 Production Designer\n\u2022 Construction Foreman\n\u2022 Safety Inspector\",6/2/2027,6/14/2027,0,c880fce9-fff5-4795-bc6d-a5b9eb2abbaa,PlanExe\n3f0de406-07aa-4a99-8b1b-80a92c5c36d2,Costume Design and Fabrication,,6/14/2027,7/29/2027,0,c880fce9-fff5-4795-bc6d-a5b9eb2abbaa,PlanExe\nc2e29eec-c4ab-47da-91a2-e2fc550ecb84,Research Hong Kong fashion trends,\"Research Hong Kong fashion trends\n\nDescription:\nResearch current and historical fashion trends in Hong Kong to inform costume design choices, ensuring authenticity and relevance to the setting.\n\nResources needed:\n\u2022 Fashion researcher\n\u2022 Hong Kong cultural consultant\n\u2022 Online fashion databases\",6/14/2027,6/23/2027,0,3f0de406-07aa-4a99-8b1b-80a92c5c36d2,PlanExe\n9cadda32-d308-4507-ae05-67a551061e9d,Source fabrics and materials locally,\"Source fabrics and materials locally\n\nDescription:\nIdentify and source fabrics, trims, and other materials from local suppliers in Hong Kong to support the local economy and ensure timely delivery.\n\nResources needed:\n\u2022 Costume designer\n\u2022 Local sourcing agent\n\u2022 Fabric samples\",6/23/2027,7/2/2027,0,c2e29eec-c4ab-47da-91a2-e2fc550ecb84,PlanExe\n80a34ec9-12b0-43e8-acfa-3c9a05c9cf55,Design costumes for lead actors,\"Design costumes for lead actors\n\nDescription:\nCreate detailed costume designs for the lead actors, considering their characters, the Hong Kong setting, and the overall visual style of the film.\n\nResources needed:\n\u2022 Costume designer\n\u2022 Illustrator\n\u2022 Lead actors\",7/2/2027,7/11/2027,0,9cadda32-d308-4507-ae05-67a551061e9d,PlanExe\nd3d00de5-7ca4-4a78-a196-e1f03c9855af,Fabricate and tailor costumes,\"Fabricate and tailor costumes\n\nDescription:\nOversee the fabrication and tailoring of costumes, ensuring they fit the actors perfectly and meet the design specifications.\n\nResources needed:\n\u2022 Tailors\n\u2022 Seamstresses\n\u2022 Costume supervisor\",7/11/2027,7/20/2027,0,80a34ec9-12b0-43e8-acfa-3c9a05c9cf55,PlanExe\n93d426a2-ceb5-4cc9-af78-cd58433c7e64,Conduct fittings and alterations,\"Conduct fittings and alterations\n\nDescription:\nSchedule and conduct costume fittings with the actors, making any necessary alterations to ensure a comfortable and flattering fit.\n\nResources needed:\n\u2022 Costume designer\n\u2022 Tailors\n\u2022 Actors\",7/20/2027,7/29/2027,0,3f0de406-07aa-4a99-8b1b-80a92c5c36d2,PlanExe\n2c205f9e-e102-489f-9e88-9af526b5ab72,Secure Filming Permits,,7/29/2027,8/28/2027,0,3f0de406-07aa-4a99-8b1b-80a92c5c36d2,PlanExe\n7802b753-3c30-46b6-b434-5534b291f766,Identify Key Filming Locations,\"Identify Key Filming Locations\n\nDescription:\nObjective: Identify all required filming locations in Hong Kong.\nScope: Research and document potential locations, considering accessibility, visual appeal, and logistical feasibility.\nSteps: 1. Review the script and identify location requirements. 2. Conduct online research and consult with location scouts. 3. Create a shortlist of potential locations for each scene. 4. Document each location with photos, descriptions, and contact information.\nDeliverables: A comprehensive list of potential filming locations with detailed information.\n\nResources needed:\n\u2022 Location Scout\n\u2022 Script Supervisor\n\u2022 Transportation\n\u2022 Camera\",7/29/2027,8/4/2027,0,2c205f9e-e102-489f-9e88-9af526b5ab72,PlanExe\n33106dad-ef84-4c64-bbdc-6ba92765aca2,Research Permit Requirements,\"Research Permit Requirements\n\nDescription:\nObjective: Understand the specific permit requirements for each identified filming location.\nScope: Research and document all necessary permits, licenses, and approvals required for filming in Hong Kong.\nSteps: 1. Contact the Hong Kong Film Development Council and other relevant government agencies. 2. Review online resources and legal documents. 3. Identify all required permits and their application processes. 4. Document the requirements for each permit, including fees, timelines, and required documentation.\nDeliverables: A detailed list of permit requirements for each filming location.\n\nResources needed:\n\u2022 Permitting Specialist\n\u2022 Legal Counsel\n\u2022 Research Assistant\",8/4/2027,8/10/2027,0,7802b753-3c30-46b6-b434-5534b291f766,PlanExe\n6872469f-d542-41c3-b28c-32e899a8face,Prepare Permit Applications,\"Prepare Permit Applications\n\nDescription:\nObjective: Prepare all necessary documentation for permit applications.\nScope: Gather and prepare all required documents for each permit application, ensuring accuracy and completeness.\nSteps: 1. Collect all required documents, such as location agreements, insurance certificates, and crew lists. 2. Complete the permit application forms accurately and thoroughly. 3. Review all documents for completeness and accuracy. 4. Prepare copies of all documents for submission.\nDeliverables: Complete and accurate permit application packages for each filming location.\n\nResources needed:\n\u2022 Permitting Specialist\n\u2022 Administrative Assistant\n\u2022 Legal Counsel\",8/10/2027,8/16/2027,0,33106dad-ef84-4c64-bbdc-6ba92765aca2,PlanExe\n6e82f7f2-aa82-4111-bc61-b5d221ee6bc9,Submit Permit Applications,\"Submit Permit Applications\n\nDescription:\nObjective: Submit the completed permit applications to the relevant government agencies.\nScope: Submit the permit applications and track their progress, ensuring timely approval.\nSteps: 1. Submit the permit applications to the appropriate government agencies. 2. Track the progress of each application. 3. Respond to any requests for additional information or clarification. 4. Follow up with the agencies to ensure timely approval.\nDeliverables: Confirmation of permit application submission and tracking of their progress.\n\nResources needed:\n\u2022 Permitting Specialist\n\u2022 Administrative Assistant\n\u2022 Courier Service\",8/16/2027,8/22/2027,0,6872469f-d542-41c3-b28c-32e899a8face,PlanExe\n1311c07a-f89a-40bd-9f99-9bbe0020201c,Liaise with Government Agencies,\"Liaise with Government Agencies\n\nDescription:\nObjective: Maintain communication with government agencies throughout the permitting process.\nScope: Address any concerns or questions raised by the agencies and ensure compliance with all regulations.\nSteps: 1. Establish communication channels with the relevant government agencies. 2. Respond to any inquiries or requests for additional information. 3. Attend meetings with agency representatives as needed. 4. Ensure compliance with all regulations and requirements.\nDeliverables: Effective communication and collaboration with government agencies to facilitate permit approval.\n\nResources needed:\n\u2022 Permitting Specialist\n\u2022 Legal Counsel\n\u2022 Public Relations\",8/22/2027,8/28/2027,0,2c205f9e-e102-489f-9e88-9af526b5ab72,PlanExe\n3ff303c6-e295-4f23-9328-90be872f0ed5,Develop Storyboards and Shot Lists,,8/28/2027,9/22/2027,0,2c205f9e-e102-489f-9e88-9af526b5ab72,PlanExe\n41404c5e-a0ab-44b1-a16d-17ff5fb5424f,Research Hong Kong Architectural Paranoia (2),\"Research Hong Kong Architectural Paranoia\n\nDescription:\nResearch Hong Kong's unique architectural landscape and how it can be used to heighten the stakes and create a sense of paranoia in the film. This includes studying specific locations, building designs, and urban planning elements that contribute to this feeling.\n\nResources needed:\n\u2022 Location scout\n\u2022 Production designer\n\u2022 Screenwriter\n\u2022 Director\",8/28/2027,9/2/2027,0,3ff303c6-e295-4f23-9328-90be872f0ed5,PlanExe\n8807b2e7-e326-4057-a38d-f6661e9bcf06,Develop Initial Storyboard Sketches,\"Develop Initial Storyboard Sketches\n\nDescription:\nCreate initial storyboard sketches for key scenes, focusing on visual composition, camera angles, and character blocking. These sketches will serve as a visual guide for the director and cinematographer during filming.\n\nResources needed:\n\u2022 Storyboard artist\n\u2022 Director\n\u2022 Cinematographer\",9/2/2027,9/7/2027,0,41404c5e-a0ab-44b1-a16d-17ff5fb5424f,PlanExe\nd6260b6b-e081-4a14-afcf-d43dc72c464b,Create Detailed Shot Lists,\"Create Detailed Shot Lists\n\nDescription:\nDevelop detailed shot lists for each scene, specifying camera angles, lens choices, camera movements, and shot durations. The shot lists will ensure that all necessary footage is captured during filming.\n\nResources needed:\n\u2022 Director\n\u2022 Cinematographer\n\u2022 Assistant director\",9/7/2027,9/12/2027,0,8807b2e7-e326-4057-a38d-f6661e9bcf06,PlanExe\ncbfeae96-ecb8-48ab-94d6-a4bd140b224a,Pre-Visualize Complex Action Sequences,\"Pre-Visualize Complex Action Sequences\n\nDescription:\nUse pre-visualization software to create animated storyboards for complex action sequences. This will allow the director and cinematographer to experiment with different camera angles and movements before filming, saving time and money on set.\n\nResources needed:\n\u2022 Pre-visualization artist\n\u2022 Director\n\u2022 Cinematographer\n\u2022 VFX supervisor\",9/12/2027,9/17/2027,0,d6260b6b-e081-4a14-afcf-d43dc72c464b,PlanExe\nf46c5eda-3547-4791-b7f7-f6dcc6643198,Review Storyboards with Key Crew,\"Review Storyboards with Key Crew\n\nDescription:\nHold a meeting with the director, cinematographer, production designer, and other key crew members to review the storyboards and shot lists. This will ensure that everyone is on the same page regarding the visual style and execution of the film.\n\nResources needed:\n\u2022 Director\n\u2022 Cinematographer\n\u2022 Production designer\n\u2022 Assistant director\",9/17/2027,9/22/2027,0,3ff303c6-e295-4f23-9328-90be872f0ed5,PlanExe\nc103c166-7676-46b3-ac57-6031cb04f1d3,Plan Geopolitical Risk Mitigation,,9/22/2027,10/4/2027,0,82f211f3-c501-460a-a229-db38de628e61,PlanExe\na27498f4-c1c3-4060-9061-b179c1c7d514,Identify potential geopolitical sensitivities,\"Identify potential geopolitical sensitivities\n\nDescription:\nAnalyze the screenplay for scenes, dialogue, or themes that could be sensitive in Hong Kong's political climate.\n\nResources needed:\n\u2022 Screenplay\n\u2022 Geopolitical Risk Assessor\n\u2022 Hong Kong Cultural Liaison\",9/22/2027,9/25/2027,0,c103c166-7676-46b3-ac57-6031cb04f1d3,PlanExe\nd29b6ae1-d8c6-456e-8962-c573984e46b3,Engage local risk assessment firm,\"Engage local risk assessment firm\n\nDescription:\nHire a firm with expertise in Hong Kong's political and security landscape to assess potential risks.\n\nResources needed:\n\u2022 Producer\n\u2022 Legal Counsel\n\u2022 Budget\",9/25/2027,9/28/2027,0,a27498f4-c1c3-4060-9061-b179c1c7d514,PlanExe\n3b0f54e2-b6c5-44d4-91c8-70064d4ad3a0,Develop contingency filming plans,\"Develop contingency filming plans\n\nDescription:\nIdentify alternative filming locations and security protocols in case of unexpected political events.\n\nResources needed:\n\u2022 Location Manager\n\u2022 Security Consultant\n\u2022 Producer\",9/28/2027,10/1/2027,0,d29b6ae1-d8c6-456e-8962-c573984e46b3,PlanExe\nbf4a2155-2778-48ff-95db-0ff32cf3e74d,Establish communication protocols,\"Establish communication protocols\n\nDescription:\nCreate clear communication channels for disseminating information and responding to potential geopolitical incidents.\n\nResources needed:\n\u2022 Producer\n\u2022 Production Manager\n\u2022 Public Relations Team\",10/1/2027,10/4/2027,0,c103c166-7676-46b3-ac57-6031cb04f1d3,PlanExe\n4d2ea584-34f1-433c-abb9-d20910230fac,Production,,10/4/2027,9/2/2028,0,82f211f3-c501-460a-a229-db38de628e61,PlanExe\nc99b8ed2-2079-4c67-a2a8-e7ac73d14022,Principal Photography,,10/4/2027,1/17/2028,0,4d2ea584-34f1-433c-abb9-d20910230fac,PlanExe\n63d40a82-9d31-4009-a7af-fa2b384531fd,Coordinate Location Logistics,\"Coordinate Location Logistics\n\nDescription:\nManage transportation, catering, and security at each filming location to ensure smooth operations.\n\nResources needed:\n\u2022 Location Manager\n\u2022 Transportation Coordinator\n\u2022 Security Personnel\n\u2022 Catering Staff\",10/4/2027,10/25/2027,0,c99b8ed2-2079-4c67-a2a8-e7ac73d14022,PlanExe\nc582e752-8637-404e-9aac-d27a9675d6ca,Direct Actors and Capture Performances,\"Direct Actors and Capture Performances\n\nDescription:\nGuide actors to deliver compelling performances according to the script and director's vision.\n\nResources needed:\n\u2022 Director\n\u2022 Actors\n\u2022 Assistant Director\n\u2022 Script Supervisor\",10/25/2027,11/15/2027,0,63d40a82-9d31-4009-a7af-fa2b384531fd,PlanExe\n4c17c7d5-c4d9-4eab-b338-effba0f1c1f3,Operate Cameras and Lighting,\"Operate Cameras and Lighting\n\nDescription:\nSet up and operate cameras and lighting equipment to capture high-quality footage.\n\nResources needed:\n\u2022 Cinematographer\n\u2022 Camera Operators\n\u2022 Gaffer\n\u2022 Lighting Technicians\",11/15/2027,12/6/2027,0,c582e752-8637-404e-9aac-d27a9675d6ca,PlanExe\nad19a6bf-89e6-48b7-b547-2eb72d1335df,Record Sound and Dialogue,\"Record Sound and Dialogue\n\nDescription:\nCapture clear and crisp audio during filming, including dialogue and ambient sounds.\n\nResources needed:\n\u2022 Sound Recordist\n\u2022 Boom Operator\n\u2022 Sound Equipment\",12/6/2027,12/27/2027,0,4c17c7d5-c4d9-4eab-b338-effba0f1c1f3,PlanExe\n32157b9d-c072-4e1b-9e7a-cd06946ce3ec,Manage Set Operations and Safety,\"Manage Set Operations and Safety\n\nDescription:\nOversee all on-set activities, ensuring a safe and efficient working environment for the entire crew.\n\nResources needed:\n\u2022 Assistant Director\n\u2022 Production Assistants\n\u2022 Set Medics\n\u2022 Safety Officer\",12/27/2027,1/17/2028,0,c99b8ed2-2079-4c67-a2a8-e7ac73d14022,PlanExe\n0414ce06-eada-4234-b370-6c3223dcb1f3,Daily Film Review and Editing,,1/17/2028,5/4/2028,0,c99b8ed2-2079-4c67-a2a8-e7ac73d14022,PlanExe\n2b411db4-35e9-41b6-9dcf-fb098b0f5379,Ingest and Organize Daily Footage,\"Ingest and Organize Daily Footage\n\nDescription:\nObjective: Efficiently manage and catalog all footage received from the set each day.\nScope: Includes transferring footage, creating backups, and organizing it for easy access by the editor.\nSteps: 1. Receive footage from set. 2. Create multiple backups. 3. Organize footage into folders by scene and take. 4. Verify footage integrity.\nDeliverables: Organized and backed-up daily footage.\n\nResources needed:\n\u2022 Data Wrangler\n\u2022 Storage Drives\n\u2022 Backup Software\",1/17/2028,2/13/2028,0,0414ce06-eada-4234-b370-6c3223dcb1f3,PlanExe\n5590bcfe-0ecf-4457-bd05-edf51f200cb7,Perform Initial Rough Cut Assembly,\"Perform Initial Rough Cut Assembly\n\nDescription:\nObjective: Assemble a preliminary rough cut of each scene based on the director's notes and script.\nScope: Includes selecting the best takes, assembling them in sequence, and adding basic transitions.\nSteps: 1. Review director's notes and script. 2. Select best takes for each shot. 3. Assemble shots into a scene sequence. 4. Add basic transitions.\nDeliverables: Rough cut assembly of each scene.\n\nResources needed:\n\u2022 Film Editor\n\u2022 Editing Software\n\u2022 Director's Notes\n\u2022 Script\",2/13/2028,3/11/2028,0,2b411db4-35e9-41b6-9dcf-fb098b0f5379,PlanExe\nd365700d-0d56-4558-bb9f-ddce90c22540,Review and Refine Cuts with Director,\"Review and Refine Cuts with Director\n\nDescription:\nObjective: Collaborate with the director to review and refine the rough cuts, incorporating their feedback and vision.\nScope: Includes attending review sessions, making revisions based on feedback, and ensuring the cuts align with the overall narrative.\nSteps: 1. Schedule review sessions with the director. 2. Present rough cuts for review. 3. Incorporate director's feedback. 4. Refine cuts based on feedback.\nDeliverables: Refined cuts approved by the director.\n\nResources needed:\n\u2022 Film Editor\n\u2022 Director\n\u2022 Review Room\n\u2022 Editing Software\",3/11/2028,4/7/2028,0,5590bcfe-0ecf-4457-bd05-edf51f200cb7,PlanExe\n7b5ba164-9e81-4a60-a9c8-730edf54bac1,Prepare and Export Review Cuts,\"Prepare and Export Review Cuts\n\nDescription:\nObjective: Prepare and export review cuts for the director and producers to review remotely.\nScope: Includes encoding the cuts in a suitable format, adding timecode and watermarks, and uploading them to a secure platform.\nSteps: 1. Encode cuts in a suitable format (e.g., H.264). 2. Add timecode and watermarks. 3. Upload cuts to a secure platform. 4. Notify director and producers.\nDeliverables: Review cuts available for remote viewing.\n\nResources needed:\n\u2022 Film Editor\n\u2022 Encoding Software\n\u2022 Secure Platform\n\u2022 Internet Connection\",4/7/2028,5/4/2028,0,0414ce06-eada-4234-b370-6c3223dcb1f3,PlanExe\n948cdb21-f6d1-4920-bdf8-c86c1641819f,Manage On-Set Logistics,,5/4/2028,8/20/2028,0,0414ce06-eada-4234-b370-6c3223dcb1f3,PlanExe\nf7b948e0-4208-4fb0-bf03-a532f7834eb3,Coordinate transportation for cast and crew,\"Coordinate transportation for cast and crew\n\nDescription:\nObjective: Ensure timely and efficient transportation for all cast and crew members to and from filming locations.\nScope: Includes arranging vehicles, drivers, and schedules to accommodate varying needs and locations.\nSteps: 1. Determine transportation needs for each department. 2. Secure transportation contracts with reliable providers. 3. Create daily transportation schedules. 4. Monitor transportation logistics and address any issues.\nDeliverables: Transportation schedules, transportation contracts, daily transportation reports.\n\nResources needed:\n\u2022 Transportation coordinator\n\u2022 Drivers\n\u2022 Vehicles\n\u2022 Scheduling software\",5/4/2028,5/31/2028,0,948cdb21-f6d1-4920-bdf8-c86c1641819f,PlanExe\n528de048-aaee-4b5e-ba50-3c580e878755,Manage on-set catering and craft services,\"Manage on-set catering and craft services\n\nDescription:\nObjective: Provide adequate and timely meals and refreshments for all cast and crew members on set.\nScope: Includes selecting catering services, planning menus, and managing on-set food and beverage distribution.\nSteps: 1. Select catering service. 2. Plan daily menus. 3. Coordinate food delivery and setup. 4. Manage on-set craft services.\nDeliverables: Catering contracts, daily menus, on-set catering schedule, craft services inventory.\n\nResources needed:\n\u2022 Catering manager\n\u2022 Catering staff\n\u2022 Craft services personnel\n\u2022 Food and beverages\",5/31/2028,6/27/2028,0,f7b948e0-4208-4fb0-bf03-a532f7834eb3,PlanExe\n85a9bd63-d8bc-4fa3-ba71-34c323a0a2e3,Secure and manage location permits,\"Secure and manage location permits\n\nDescription:\nObjective: Obtain and maintain all necessary permits for filming at designated locations.\nScope: Includes submitting permit applications, coordinating with local authorities, and ensuring compliance with permit regulations.\nSteps: 1. Identify required permits for each location. 2. Prepare and submit permit applications. 3. Coordinate with local authorities. 4. Ensure compliance with permit regulations.\nDeliverables: Location permits, permit compliance reports, communication logs with local authorities.\n\nResources needed:\n\u2022 Permit coordinator\n\u2022 Legal counsel\n\u2022 Communication equipment\n\u2022 Local authority contacts\",6/27/2028,7/24/2028,0,528de048-aaee-4b5e-ba50-3c580e878755,PlanExe\n91050c1c-b2fa-48e3-a641-a9ff5422cc50,Address traffic and noise concerns,\"Address traffic and noise concerns\n\nDescription:\nObjective: Minimize disruption to local communities due to traffic and noise generated by filming activities.\nScope: Includes implementing traffic management plans, using noise reduction measures, and communicating with local residents.\nSteps: 1. Develop traffic management plans. 2. Implement noise reduction measures. 3. Communicate with local residents. 4. Address any complaints or concerns.\nDeliverables: Traffic management plans, noise reduction reports, community communication logs, complaint resolution records.\n\nResources needed:\n\u2022 Traffic management personnel\n\u2022 Noise reduction equipment\n\u2022 Community liaison\n\u2022 Communication materials\",7/24/2028,8/20/2028,0,948cdb21-f6d1-4920-bdf8-c86c1641819f,PlanExe\nc3885937-71d8-41f9-bc96-9c15735b4939,Ensure Talent Alignment,,8/20/2028,8/28/2028,0,948cdb21-f6d1-4920-bdf8-c86c1641819f,PlanExe\n67be6cc4-52a8-4d73-b1fc-47abaf5f274f,Schedule Rehearsals with Key Actors,\"Schedule Rehearsals with Key Actors\n\nDescription:\nCoordinate rehearsal schedules with lead and supporting actors to ensure availability and commitment to the production timeline. Objective: To maximize rehearsal time and minimize scheduling conflicts.\n\nResources needed:\n\u2022 Production Coordinator\n\u2022 Actors\n\u2022 Rehearsal Space\",8/20/2028,8/22/2028,0,c3885937-71d8-41f9-bc96-9c15735b4939,PlanExe\n8b886ee7-d7be-4dbb-8e85-27d3fff40baf,Facilitate Character Development Workshops,\"Facilitate Character Development Workshops\n\nDescription:\nOrganize and lead character development workshops with the director and actors to explore character motivations, backstories, and relationships. Objective: To deepen understanding of roles.\n\nResources needed:\n\u2022 Director\n\u2022 Actors\n\u2022 Acting Coach\n\u2022 Workshop Facilitator\",8/22/2028,8/24/2028,0,67be6cc4-52a8-4d73-b1fc-47abaf5f274f,PlanExe\n8675fd7f-ae0d-4906-b5ba-69763e2745bf,Address Performance Concerns Early,\"Address Performance Concerns Early\n\nDescription:\nIdentify and address any performance concerns or creative differences between the director and actors through open communication and collaborative problem-solving. Objective: To resolve issues before filming.\n\nResources needed:\n\u2022 Director\n\u2022 Actors\n\u2022 Producer\n\u2022 Acting Coach\",8/24/2028,8/26/2028,0,8b886ee7-d7be-4dbb-8e85-27d3fff40baf,PlanExe\nbbf2e2d5-508d-46d2-8637-09f0d3c89d4e,Document Key Performance Decisions,\"Document Key Performance Decisions\n\nDescription:\nMaintain detailed records of all key performance decisions, including character interpretations, blocking, and emotional arcs, to ensure consistency throughout the production. Objective: To provide a reference for all.\n\nResources needed:\n\u2022 Script Supervisor\n\u2022 Director\n\u2022 Actors\",8/26/2028,8/28/2028,0,c3885937-71d8-41f9-bc96-9c15735b4939,PlanExe\n20671d42-300c-4d2c-8baa-7df422239f7e,Monitor Production Efficiency,,8/28/2028,9/2/2028,0,4d2ea584-34f1-433c-abb9-d20910230fac,PlanExe\n136181ff-1354-4da2-8cba-2af23d82d43a,Track Daily Production Progress,\"Track Daily Production Progress\n\nDescription:\nMonitor daily film production progress against the schedule. Identify any deviations or potential delays early on.\n\nResources needed:\n\u2022 Production Manager\n\u2022 Assistant Directors\n\u2022 Daily Production Reports\",8/28/2028,8/29/2028,0,20671d42-300c-4d2c-8baa-7df422239f7e,PlanExe\n045a79df-57c9-4838-9758-bc59d9f7a342,Analyze Workflow Efficiency,\"Analyze Workflow Efficiency\n\nDescription:\nEvaluate the efficiency of various production workflows (e.g., camera setup, lighting, sound recording). Identify bottlenecks and areas for improvement.\n\nResources needed:\n\u2022 Production Manager\n\u2022 Cinematographer\n\u2022 Gaffer\n\u2022 Sound Recordist\",8/29/2028,8/30/2028,0,136181ff-1354-4da2-8cba-2af23d82d43a,PlanExe\n418cced9-5e2d-49d7-8a8c-9bdc329ed311,Address Equipment Issues Promptly,\"Address Equipment Issues Promptly\n\nDescription:\nEnsure that any equipment malfunctions or technical issues are addressed immediately to minimize downtime. Maintain a backup equipment inventory.\n\nResources needed:\n\u2022 Technical Crew\n\u2022 Equipment Technicians\n\u2022 Backup Equipment\",8/30/2028,8/31/2028,0,045a79df-57c9-4838-9758-bc59d9f7a342,PlanExe\n38bec1d5-e14d-4dcc-9fb5-1d51906305c6,Facilitate Communication Between Departments,\"Facilitate Communication Between Departments\n\nDescription:\nEstablish clear communication channels and protocols between different departments (e.g., camera, sound, lighting, set design) to ensure smooth coordination.\n\nResources needed:\n\u2022 Production Manager\n\u2022 Assistant Directors\n\u2022 Department Heads\",8/31/2028,9/1/2028,0,418cced9-5e2d-49d7-8a8c-9bdc329ed311,PlanExe\nf52b8b18-5dcc-488a-951e-517caf0d6124,Implement Corrective Actions,\"Implement Corrective Actions\n\nDescription:\nBased on the analysis of production progress and workflow efficiency, implement corrective actions to address any identified issues and improve overall productivity.\n\nResources needed:\n\u2022 Production Manager\n\u2022 Director\n\u2022 Department Heads\",9/1/2028,9/2/2028,0,20671d42-300c-4d2c-8baa-7df422239f7e,PlanExe\n6583840d-7928-4fff-bc82-78b6769bdac1,Post-Production,,9/2/2028,1/24/2029,0,4d2ea584-34f1-433c-abb9-d20910230fac,PlanExe\n71b6344b-bb81-40a3-846b-0095ed33cdf2,Film Editing,,9/2/2028,10/2/2028,0,6583840d-7928-4fff-bc82-78b6769bdac1,PlanExe\ne181307e-5262-4256-89ee-446f2f102ec3,Rough Cut Assembly,\"Rough Cut Assembly\n\nDescription:\nAssemble all usable footage into a preliminary rough cut, focusing on narrative structure and pacing. Objective: Create a first pass of the film's sequence. Scope: All scenes shot during principal photography. Steps: Organize footage, sync audio, assemble scenes, review with director. Deliverables: Rough cut timeline.\n\nResources needed:\n\u2022 Film Editor\n\u2022 Assistant Editor\n\u2022 Editing Software\n\u2022 Footage\",9/2/2028,9/8/2028,0,71b6344b-bb81-40a3-846b-0095ed33cdf2,PlanExe\n2ff3c0d6-cc32-48d1-8a10-707d8390bbca,Director's Cut Refinement,\"Director's Cut Refinement\n\nDescription:\nRefine the rough cut based on the director's feedback, focusing on performance, shot selection, and overall tone. Objective: Achieve the director's initial vision for the film. Scope: Refine pacing, shot selection, and performance. Steps: Review rough cut with director, implement feedback, refine scene transitions, adjust pacing. Deliverables: Director's cut timeline.\n\nResources needed:\n\u2022 Film Editor\n\u2022 Director\n\u2022 Editing Software\n\u2022 Feedback\",9/8/2028,9/14/2028,0,e181307e-5262-4256-89ee-446f2f102ec3,PlanExe\ne355fc40-9bf1-4db9-8d8d-421bdd156dcd,Fine Cut and Polish,\"Fine Cut and Polish\n\nDescription:\nPolish the director's cut, focusing on technical aspects such as audio syncing, visual continuity, and scene transitions. Objective: Prepare the film for visual effects and sound design. Scope: Technical refinement of the director's cut. Steps: Sync audio, correct visual inconsistencies, refine scene transitions, optimize pacing. Deliverables: Fine cut timeline.\n\nResources needed:\n\u2022 Film Editor\n\u2022 Assistant Editor\n\u2022 Editing Software\n\u2022 Technical Expertise\",9/14/2028,9/20/2028,0,2ff3c0d6-cc32-48d1-8a10-707d8390bbca,PlanExe\n85a2a071-1e5d-4a40-b8ac-188e955ec2b8,Producer/Studio Review,\"Producer/Studio Review\n\nDescription:\nPresent the fine cut to producers and studio executives for feedback and approval. Objective: Obtain final approval on the film's edit. Scope: Review and approval of the fine cut. Steps: Schedule screening, present fine cut, gather feedback, implement approved changes. Deliverables: Approved fine cut timeline.\n\nResources needed:\n\u2022 Film Editor\n\u2022 Producers\n\u2022 Studio Executives\n\u2022 Screening Room\",9/20/2028,9/26/2028,0,e355fc40-9bf1-4db9-8d8d-421bdd156dcd,PlanExe\n26bb0a23-eff5-478e-9c6b-9d28c75c0481,Lock Picture,\"Lock Picture\n\nDescription:\nFinalize the picture edit, ensuring no further changes are made before moving on to visual effects and sound design. Objective: Freeze the picture edit for post-production. Scope: Final approval and locking of the picture edit. Steps: Implement final changes, obtain final approval, lock the timeline. Deliverables: Locked picture timeline.\n\nResources needed:\n\u2022 Film Editor\n\u2022 Director\n\u2022 Producers\n\u2022 Studio Executives\n\u2022 Editing Software\",9/26/2028,10/2/2028,0,71b6344b-bb81-40a3-846b-0095ed33cdf2,PlanExe\nccc62e9f-107f-4888-a606-d2c3cb783ead,Visual Effects (VFX),,10/2/2028,11/19/2028,0,71b6344b-bb81-40a3-846b-0095ed33cdf2,PlanExe\n08bd8818-2e9e-4b6b-b9ee-dca5c9bf1d09,Plan VFX shots and budget,\"Plan VFX shots and budget\n\nDescription:\nDetailed planning of all VFX shots, including complexity assessment and budget allocation.\n\nResources needed:\n\u2022 VFX Supervisor\n\u2022 Director\n\u2022 Producer\n\u2022 Budget Controller\",10/2/2028,10/14/2028,0,ccc62e9f-107f-4888-a606-d2c3cb783ead,PlanExe\ne0bce260-0ae1-4f97-aac9-62f09f6cf461,Secure VFX artists and vendors,\"Secure VFX artists and vendors\n\nDescription:\nContracting experienced VFX artists and vendors with expertise in the required effects.\n\nResources needed:\n\u2022 VFX Producer\n\u2022 Legal Counsel\n\u2022 VFX Supervisor\",10/14/2028,10/26/2028,0,08bd8818-2e9e-4b6b-b9ee-dca5c9bf1d09,PlanExe\na5c99639-5ee3-4437-9ad1-3dfa3bfd5fcd,Create and integrate VFX elements,\"Create and integrate VFX elements\n\nDescription:\nDeveloping and seamlessly integrating VFX elements into the film footage.\n\nResources needed:\n\u2022 VFX Artists\n\u2022 Compositors\n\u2022 Technical Directors\",10/26/2028,11/7/2028,0,e0bce260-0ae1-4f97-aac9-62f09f6cf461,PlanExe\n6325b56e-e909-4f09-9ead-8be7410cad17,Review and approve VFX shots,\"Review and approve VFX shots\n\nDescription:\nRegular review and approval of VFX shots by the director and VFX supervisor.\n\nResources needed:\n\u2022 VFX Supervisor\n\u2022 Director\n\u2022 Producer\",11/7/2028,11/19/2028,0,ccc62e9f-107f-4888-a606-d2c3cb783ead,PlanExe\n18c14e75-8c54-44db-9a2c-cb698e83ebcb,Sound Design and Mixing,,11/19/2028,12/13/2028,0,ccc62e9f-107f-4888-a606-d2c3cb783ead,PlanExe\n17af2c8a-2a7f-41d4-be5e-64d8b0806751,Gather Sound Effects and Foley,\"Gather Sound Effects and Foley\n\nDescription:\nSource and collect a library of sound effects and foley recordings that match the film's action and environment. This includes recording new foley sounds and licensing existing sound effects.\n\nResources needed:\n\u2022 Sound Designer\n\u2022 Foley Artist\n\u2022 Sound Effects Library\",11/19/2028,11/25/2028,0,18c14e75-8c54-44db-9a2c-cb698e83ebcb,PlanExe\n8ba799ca-3a02-46cc-85f5-bd99fb5973d2,Design Soundscape,\"Design Soundscape\n\nDescription:\nCreate a detailed soundscape for each scene, incorporating ambient sounds, foley effects, and dialogue to enhance the emotional impact and realism of the film.\n\nResources needed:\n\u2022 Sound Designer\n\u2022 Director\",11/25/2028,12/1/2028,0,17af2c8a-2a7f-41d4-be5e-64d8b0806751,PlanExe\n6d3a4652-26e6-4f64-936f-1bd6c7b38128,Mix and Master Audio,\"Mix and Master Audio\n\nDescription:\nMix all audio elements, including dialogue, sound effects, foley, and music, to create a balanced and immersive sound experience. Master the final audio track for theatrical release.\n\nResources needed:\n\u2022 Sound Mixer\n\u2022 Sound Engineer\n\u2022 Mixing Studio\",12/1/2028,12/7/2028,0,8ba799ca-3a02-46cc-85f5-bd99fb5973d2,PlanExe\n5ddfe518-29a8-4d7f-8208-266bc774880c,Review Sound Design with Director,\"Review Sound Design with Director\n\nDescription:\nPresent the sound design and mix to the director for feedback and approval. Incorporate any necessary revisions to ensure the sound design aligns with the director's vision.\n\nResources needed:\n\u2022 Sound Designer\n\u2022 Sound Mixer\n\u2022 Director\",12/7/2028,12/13/2028,0,18c14e75-8c54-44db-9a2c-cb698e83ebcb,PlanExe\n54015134-b333-4cb6-b0fb-3832b0f52c49,Music Composition and Scoring,,12/13/2028,1/12/2029,0,18c14e75-8c54-44db-9a2c-cb698e83ebcb,PlanExe\n3c7777a0-68e0-46d2-82e4-1c6415dab9c6,Composer Selection and Contract Negotiation,\"Composer Selection and Contract Negotiation\n\nDescription:\nIdentify and select a suitable composer with experience in thriller scores. Negotiate contract terms, including fees, rights, and delivery schedules.\n\nResources needed:\n\u2022 Producer\n\u2022 Director\n\u2022 Music Supervisor\n\u2022 Legal Counsel\",12/13/2028,12/19/2028,0,54015134-b333-4cb6-b0fb-3832b0f52c49,PlanExe\ne3427745-a478-4058-95eb-06fc24272866,Theme Development and Composition,\"Theme Development and Composition\n\nDescription:\nCollaborate with the director to define the film's musical themes and motifs. Compose and arrange the score, ensuring it complements the visuals and enhances the emotional impact.\n\nResources needed:\n\u2022 Composer\n\u2022 Director\n\u2022 Music Supervisor\",12/19/2028,12/25/2028,0,3c7777a0-68e0-46d2-82e4-1c6415dab9c6,PlanExe\n4a082bf8-b96f-485a-bb78-cb244d900636,Orchestration and Arrangement,\"Orchestration and Arrangement\n\nDescription:\nOrchestrate and arrange the composed music for the selected instruments. Prepare the score for recording.\n\nResources needed:\n\u2022 Composer\n\u2022 Orchestrator\n\u2022 Arranger\",12/25/2028,12/31/2028,0,e3427745-a478-4058-95eb-06fc24272866,PlanExe\n8922cdaf-5f5f-4a88-ade6-5ca5ce8cf343,Recording Session and Mixing,\"Recording Session and Mixing\n\nDescription:\nSchedule and conduct recording sessions with musicians. Mix and master the recorded music to achieve the desired sound quality and balance.\n\nResources needed:\n\u2022 Composer\n\u2022 Musicians\n\u2022 Recording Engineer\n\u2022 Mixing Engineer\n\u2022 Recording Studio\",12/31/2028,1/6/2029,0,4a082bf8-b96f-485a-bb78-cb244d900636,PlanExe\na76fbd0d-2052-4c2d-bb87-abcf92c37dbb,Final Music Delivery and Integration,\"Final Music Delivery and Integration\n\nDescription:\nDeliver the final music tracks to the post-production team. Integrate the score into the film's soundtrack, ensuring seamless synchronization with the visuals.\n\nResources needed:\n\u2022 Composer\n\u2022 Music Editor\n\u2022 Sound Designer\",1/6/2029,1/12/2029,0,54015134-b333-4cb6-b0fb-3832b0f52c49,PlanExe\n81a59102-3f49-45a2-8ae3-3229f692fe75,Color Correction and Grading,,1/12/2029,1/24/2029,0,6583840d-7928-4fff-bc82-78b6769bdac1,PlanExe\nf45ce6f9-84ac-4392-95c2-c79d9fe5cad8,Compose thematic score,\"Compose thematic score\n\nDescription:\nDevelop the main musical themes and motifs for the film, reflecting the psychological thriller aspects and Hong Kong setting. This includes creating variations for different scenes and emotional tones.\n\nResources needed:\n\u2022 Composer\n\u2022 Music arranger\n\u2022 Synthesizers\n\u2022 DAW software\",1/12/2029,1/15/2029,0,81a59102-3f49-45a2-8ae3-3229f692fe75,PlanExe\n5e4d9569-1590-446d-81d8-c8d46b921a09,Record orchestral score,\"Record orchestral score\n\nDescription:\nArrange and record the composed score with a live orchestra, ensuring high-quality audio capture and performance. This includes booking a recording studio, hiring musicians, and conducting the orchestra.\n\nResources needed:\n\u2022 Orchestra\n\u2022 Conductor\n\u2022 Recording studio\n\u2022 Sound engineers\n\u2022 Microphones\",1/15/2029,1/18/2029,0,f45ce6f9-84ac-4392-95c2-c79d9fe5cad8,PlanExe\nce2628f0-4354-4d5c-aaa8-18b44eb4061a,Integrate music with film,\"Integrate music with film\n\nDescription:\nSynchronize the recorded score with the film's visuals, adjusting timing and levels to enhance the emotional impact of each scene. This includes working closely with the film editor and director to ensure seamless integration.\n\nResources needed:\n\u2022 Composer\n\u2022 Film editor\n\u2022 Director\n\u2022 DAW software\n\u2022 Mixing console\",1/18/2029,1/21/2029,0,5e4d9569-1590-446d-81d8-c8d46b921a09,PlanExe\n94636d52-3723-46b5-9c44-de5beb983f45,Master the final soundtrack,\"Master the final soundtrack\n\nDescription:\nMaster the final soundtrack for optimal audio quality across different playback systems, ensuring consistent levels and dynamic range. This includes working with a mastering engineer to prepare the soundtrack for theatrical release and streaming platforms.\n\nResources needed:\n\u2022 Mastering engineer\n\u2022 Mastering studio\n\u2022 Audio mastering software\",1/21/2029,1/24/2029,0,81a59102-3f49-45a2-8ae3-3229f692fe75,PlanExe\n175375d2-f377-4ab3-af0e-b773d7a208ff,Marketing and Distribution,,1/24/2029,10/13/2029,0,ff827cb8-4d14-45c1-bb00-c79499f5222d,PlanExe\n235913e2-7ef5-4985-83c5-668bd1e1d455,Develop Marketing Strategy,,1/24/2029,2/17/2029,0,175375d2-f377-4ab3-af0e-b773d7a208ff,PlanExe\n36854915-a282-4eaa-96b4-3c81fe5529a7,Define Target Audience Segments,\"Define Target Audience Segments\n\nDescription:\nIdentify and profile key audience segments (e.g., age, demographics, interests) to tailor marketing messages effectively. This includes researching audience preferences, viewing habits, and online behavior.\n\nResources needed:\n\u2022 Market Research Analyst\n\u2022 Data Analyst\n\u2022 Marketing Strategist\",1/24/2029,1/30/2029,0,235913e2-7ef5-4985-83c5-668bd1e1d455,PlanExe\n3d0c4cbd-4745-45e2-8579-3a0720de30f9,Determine Key Marketing Messages,\"Determine Key Marketing Messages\n\nDescription:\nCraft compelling and concise marketing messages that highlight the film's unique selling points and resonate with the target audience. This involves identifying the core themes, emotional hooks, and visual elements that will capture audience attention.\n\nResources needed:\n\u2022 Copywriter\n\u2022 Creative Director\n\u2022 Marketing Strategist\",1/30/2029,2/5/2029,0,36854915-a282-4eaa-96b4-3c81fe5529a7,PlanExe\n9ba67bf7-497c-4691-9fc2-f00d87f7f994,Select Optimal Marketing Channels,\"Select Optimal Marketing Channels\n\nDescr       "text": "Outline Hong Kong Adaptation",
      "custom_tooltip": "<b>Outline Hong Kong Adaptation</b><br>Develop a detailed outline of the screenplay adaptation, focusing on how the original story will be adapted to a Hong Kong setting, including key plot points, character arcs, and thematic elements. This includes researching Hong Kong culture, architecture, and social dynamics to ensure authenticity and relevance.<br><b>Resources needed:</b><br><ul><li>Screenwriter</li><li>Hong Kong Cultural Consultant</li><li>Director</li></ul>",

      "text": "First Draft Screenplay",
      "custom_tooltip": "<b>First Draft Screenplay</b><br>Write the first draft of the screenplay, incorporating the outline and research findings. This includes developing dialogue, action sequences, and scene descriptions that are appropriate for the Hong Kong setting and the updated storyline. Ensure the script adheres to the &#x27;no smoking&#x27; policy.<br><b>Resources needed:</b><br><ul><li>Screenwriter</li><li>Script Editing Software</li></ul>",

      "text": "Feedback and Revision",
      "custom_tooltip": "<b>Feedback and Revision</b><br>Gather feedback on the first draft from the director, producers, and other key stakeholders. Revise the screenplay based on this feedback, addressing any issues with plot, character development, pacing, or thematic consistency. This may involve multiple rounds of revisions.<br><b>Resources needed:</b><br><ul><li>Screenwriter</li><li>Director</li><li>Producers</li><li>Script Editor</li></ul>",

      "text": "Polish and Finalize Script",
      "custom_tooltip": "<b>Polish and Finalize Script</b><br>Polish the revised screenplay, focusing on dialogue, pacing, and overall flow. Ensure the script is ready for production, with clear scene descriptions, action sequences, and character motivations. Obtain final approval from the director and producers.<br><b>Resources needed:</b><br><ul><li>Screenwriter</li><li>Script Editor</li><li>Director</li><li>Producers</li></ul>",

    {
      "id": "728e7fde-747b-4365-90f8-d02881dc6dd0",
      "text": "Identify Key Hong Kong Locations",
      "custom_tooltip": "<b>Identify Key Hong Kong Locations</b><br>Objective: Identify diverse locations that fit the film&#x27;s aesthetic and narrative requirements.\nScope: Research and compile a list of potential filming locations, including urban, rural, and iconic landmarks.\nSteps: Conduct online research, consult with local experts, and create a database of potential locations with photos and descriptions.\nDeliverables: A comprehensive list of potential filming locations with detailed information.<br><b>Resources needed:</b><br><ul><li>Location Scout</li><li>Research Assistant</li><li>Transportation</li></ul>",
      "start_date": "2027-02-20",
      "duration": 6.0,
      "progress": 0,
      "open": true,
      "meta": "14510b52-c1ea-4e81-98c7-4766e0473d4f SS",

    },
    {
      "id": "c5defb23-d5e0-41f5-8086-3ba7da0e4d72",
      "text": "Assess Location Accessibility and Logistics",
      "custom_tooltip": "<b>Assess Location Accessibility and Logistics</b><br>Objective: Evaluate the feasibility of filming at each location, considering accessibility, permits, and logistical challenges.\nScope: Assess the accessibility of each location for equipment and crew, identify potential logistical challenges, and research permit requirements.\nSteps: Visit each location, assess accessibility, identify potential challenges, and research permit requirements.\nDeliverables: A report detailing the accessibility, logistical challenges, and permit requirements for each location.<br><b>Resources needed:</b><br><ul><li>Location Scout</li><li>Logistics Coordinator</li><li>Permitting Specialist</li><li>Transportation</li></ul>",
      "start_date": "2027-02-26",
      "duration": 6.0,
      "progress": 0,
      "open": true,
      "meta": "728e7fde-747b-4365-90f8-d02881dc6dd0 FS",
      "parent": "14510b52-c1ea-4e81-98c7-4766e0473d4f"
    },
    {
      "id": "e1ada426-7814-4d24-9575-1472319a15dc",
      "text": "Negotiate Location Agreements and Fees",
      "custom_tooltip": "<b>Negotiate Location Agreements and Fees</b><br>Objective: Secure agreements with location owners and negotiate fees for filming.\nScope: Contact location owners, negotiate agreements, and secure permits for filming.\nSteps: Contact location owners, negotiate agreements, secure permits, and finalize contracts.\nDeliverables: Signed location agreements and permits.<br><b>Resources needed:</b><br><ul><li>Producer</li><li>Location Manager</li><li>Legal Counsel</li></ul>",
      "start_date": "2027-03-04",
      "duration": 6.0,
      "progress": 0,
      "open": true,
      "meta": "c5defb23-d5e0-41f5-8086-3ba7da0e4d72 FS",
      "parent": "14510b52-c1ea-4e81-98c7-4766e0473d4f"
    },
    {
      "id": "734b4121-6140-43a1-8811-dc8d818bbbef",
      "text": "Photograph and Document Locations",
      "custom_tooltip": "<b>Photograph and Document Locations</b><br>Objective: Capture high-quality photos and videos of each location for pre-production planning.\nScope: Photograph and document each location, including interior and exterior shots, and create a virtual tour.\nSteps: Photograph and document each location, create a virtual tour, and compile a photo and video library.\nDeliverables: A comprehensive photo and video library of each location.<br><b>Resources needed:</b><br><ul><li>Photographer</li><li>Videographer</li><li>Equipment</li><li>Location Scout</li></ul>",

      "meta": "4e31ac3f-e846-4a13-9517-68fd3a79f96d FS",
