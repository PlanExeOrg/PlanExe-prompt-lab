    const GANTT_DATA_CSV = "project_key,project_name,project_description,project_start_date,project_end_date,project_progress,project_parent,originating_department\n04c97117-c848-4462-a345-72012d3048c9,Sovereign Identity,\"Sovereign Identity\n\nFinal deliverable:\nNeutral Framework\",3/8/2026,11/30/2027,0,,PlanExe\n5684f949-4096-4faa-a559-c2813cce24a3,Project Initiation & Planning,,3/8/2026,9/16/2026,0,04c97117-c848-4462-a345-72012d3048c9,PlanExe\ne9788c79-9efa-4408-80e3-33acbf9f1d2f,Secure Project Funding,,3/8/2026,5/7/2026,0,5684f949-4096-4faa-a559-c2813cce24a3,PlanExe\n58253600-3d98-493f-bad9-10f0685f387d,Identify Potential Funding Sources,\"Identify Potential Funding Sources\n\nDescription:\nResearch and identify potential funding sources, including EU grants, private foundations, and government programs, that align with the project's goals and objectives. This involves searching online databases, attending industry events, and networking with relevant organizations.\n\nResources needed:\n\u2022 Policy and Public-Affairs Coordinator\n\u2022 Lead Researcher\n\u2022 Grant Writer\",3/8/2026,3/23/2026,0,e9788c79-9efa-4408-80e3-33acbf9f1d2f,PlanExe\nd78e9950-e138-4f06-b4c6-4ece06dea7f6,Prepare Grant Proposals,\"Prepare Grant Proposals\n\nDescription:\nDevelop compelling grant proposals tailored to each identified funding source, highlighting the project's impact, feasibility, and alignment with the funder's priorities. This includes writing detailed project descriptions, budgets, and evaluation plans.\n\nResources needed:\n\u2022 Lead Researcher\n\u2022 Grant Writer\n\u2022 Financial Auditor\",3/23/2026,4/7/2026,0,58253600-3d98-493f-bad9-10f0685f387d,PlanExe\n04d31d52-1836-44c0-a951-56f54d5ff9ca,Engage with Funding Organizations,\"Engage with Funding Organizations\n\nDescription:\nEstablish communication channels with funding organizations, attend informational webinars, and network with program officers to build relationships and gather insights into their funding priorities and application processes.\n\nResources needed:\n\u2022 Policy and Public-Affairs Coordinator\n\u2022 Lead Researcher\",4/7/2026,4/22/2026,0,d78e9950-e138-4f06-b4c6-4ece06dea7f6,PlanExe\n7dd9631d-1c80-4333-93ca-96a1106084cd,Manage Currency Exchange Risks,\"Manage Currency Exchange Risks\n\nDescription:\nDevelop a strategy for managing currency exchange risks, including monitoring exchange rates, hedging currency fluctuations, and establishing DKK-specific accounting standards for grant management. Consult with a financial advisor specializing in currency risk management.\n\nResources needed:\n\u2022 Financial Auditor\n\u2022 Financial Advisor\n\u2022 Project Manager\",4/22/2026,5/7/2026,0,e9788c79-9efa-4408-80e3-33acbf9f1d2f,PlanExe\n6aeeb16e-57bb-4f60-a22d-b04bcf662a54,Establish Physical Base in Copenhagen,,5/7/2026,6/8/2026,0,e9788c79-9efa-4408-80e3-33acbf9f1d2f,PlanExe\n8cf0e8d3-c22d-469a-a1ab-bfd671c6b694,Identify potential office spaces in Copenhagen,\"Identify potential office spaces in Copenhagen\n\nDescription:\nObjective: Identify suitable office spaces in Copenhagen that meet the project's requirements.\nScope: Research and compile a list of potential office spaces, considering factors such as location, size, security, and accessibility.\nSteps: 1. Define the project's office space requirements. 2. Research available office spaces in Copenhagen using online resources and real estate agents. 3. Compile a list of potential office spaces with relevant details.\nDeliverables: A list of potential office spaces in Copenhagen with detailed information.\n\nResources needed:\n\u2022 Project Manager\n\u2022 Real Estate Agent\n\u2022 Administrative Assistant\",5/7/2026,5/15/2026,0,6aeeb16e-57bb-4f60-a22d-b04bcf662a54,PlanExe\nd1f31d17-262e-4da5-ac14-8cd3d3277617,Assess security requirements for workspace,\"Assess security requirements for workspace\n\nDescription:\nObjective: Determine the security requirements for the project's workspace.\nScope: Identify and document the security measures necessary to protect sensitive data and equipment.\nSteps: 1. Conduct a security risk assessment. 2. Identify security requirements based on the risk assessment. 3. Document the security requirements in a security plan.\nDeliverables: A security plan outlining the security requirements for the project's workspace.\n\nResources needed:\n\u2022 Security Expert\n\u2022 Technical Lead\n\u2022 Lead Researcher\",5/15/2026,5/23/2026,0,8cf0e8d3-c22d-469a-a1ab-bfd671c6b694,PlanExe\n988a120c-293d-4ba3-b63a-2c41f8f589dc,Negotiate lease terms for selected space,\"Negotiate lease terms for selected space\n\nDescription:\nObjective: Negotiate favorable lease terms for the selected office space.\nScope: Negotiate the lease agreement with the landlord, ensuring that the terms are acceptable to the project.\nSteps: 1. Review the lease agreement. 2. Identify areas for negotiation. 3. Negotiate the lease terms with the landlord. 4. Finalize the lease agreement.\nDeliverables: A finalized lease agreement for the selected office space.\n\nResources needed:\n\u2022 Project Manager\n\u2022 Legal Counsel\n\u2022 Real Estate Agent\",5/23/2026,5/31/2026,0,d1f31d17-262e-4da5-ac14-8cd3d3277617,PlanExe\n2940e67e-338f-4e4e-a442-3a6cd4723785,Prepare workspace for security-sensitive research,\"Prepare workspace for security-sensitive research\n\nDescription:\nObjective: Prepare the workspace to meet the security requirements for security-sensitive digital identity research.\nScope: Implement the necessary security measures to protect sensitive data and equipment.\nSteps: 1. Implement the security plan. 2. Install security systems and equipment. 3. Test the security systems and equipment.\nDeliverables: A secure workspace ready for security-sensitive digital identity research.\n\nResources needed:\n\u2022 Security Expert\n\u2022 Technical Lead\n\u2022 Engineer\n\u2022 Contractor\",5/31/2026,6/8/2026,0,6aeeb16e-57bb-4f60-a22d-b04bcf662a54,PlanExe\n69f4d01b-b7bd-4e83-89d9-bf196dc7f7df,Define Technical Definitions of Platform Neutrality and Fallback Access,,6/8/2026,6/28/2026,0,6aeeb16e-57bb-4f60-a22d-b04bcf662a54,PlanExe\n2f5c3216-558f-4686-900b-4306b42ae900,Research Platform Neutrality Definitions,\"Research Platform Neutrality Definitions\n\nDescription:\nObjective: Gather existing definitions of platform neutrality from various sources.\nScope: Review academic literature, industry standards, and regulatory documents.\nSteps: Search online databases, consult with experts, and analyze relevant publications.\nDeliverables: A comprehensive list of platform neutrality definitions.\n\nResources needed:\n\u2022 Lead Researcher\n\u2022 Regulatory and Compliance Specialist\",6/8/2026,6/13/2026,0,69f4d01b-b7bd-4e83-89d9-bf196dc7f7df,PlanExe\n40bbcfb5-e464-4820-ae15-b2f0478b52bb,Define Fallback Access Requirements,\"Define Fallback Access Requirements\n\nDescription:\nObjective: Establish technical requirements for fallback access paths.\nScope: Define authentication methods, security protocols, and user experience considerations.\nSteps: Analyze existing fallback mechanisms, consult with security experts, and develop detailed specifications.\nDeliverables: A document outlining the technical requirements for fallback access.\n\nResources needed:\n\u2022 Technical Lead\n\u2022 Engineer\n\u2022 Mobile security and authentication protocols expertise\",6/13/2026,6/18/2026,0,2f5c3216-558f-4686-900b-4306b42ae900,PlanExe\n494b7356-c158-4d61-a311-53305dd21720,Analyze AltID Technical Constraints,\"Analyze AltID Technical Constraints\n\nDescription:\nObjective: Understand the technical limitations and requirements of AltID.\nScope: Review AltID documentation, consult with Digitaliseringsstyrelsen, and analyze its architecture.\nSteps: Gather information from relevant stakeholders, conduct technical analysis, and document findings.\nDeliverables: A report summarizing AltID's technical constraints and requirements.\n\nResources needed:\n\u2022 Lead Researcher\n\u2022 Technical Lead\n\u2022 Regulatory and Compliance Specialist\",6/18/2026,6/23/2026,0,40bbcfb5-e464-4820-ae15-b2f0478b52bb,PlanExe\nc178a3be-dd45-4464-b764-df7463c418ac,Draft Technical Definitions Document,\"Draft Technical Definitions Document\n\nDescription:\nObjective: Create a consolidated document with precise technical definitions.\nScope: Combine research, requirements, and constraints into a single document.\nSteps: Synthesize information, draft definitions, and obtain feedback from stakeholders.\nDeliverables: A final technical definitions document for platform neutrality and fallback access.\n\nResources needed:\n\u2022 Lead Researcher\n\u2022 Technical Lead\n\u2022 Regulatory and Compliance Specialist\n\u2022 Policy and Public-Affairs Coordinator\",6/23/2026,6/28/2026,0,69f4d01b-b7bd-4e83-89d9-bf196dc7f7df,PlanExe\n870a5b4c-f42d-48ee-b463-5cf00d61393d,Develop Comprehensive Security Strategy,,6/28/2026,7/30/2026,0,69f4d01b-b7bd-4e83-89d9-bf196dc7f7df,PlanExe\n1e524d0a-48a0-4992-acd0-0175f215db30,Identify Security Risks and Threats,\"Identify Security Risks and Threats\n\nDescription:\nObjective: Identify potential security risks and threats to the project's digital identity framework.\nScope: Assess vulnerabilities in demonstrators, code repository, data storage, communication channels, and coalition building.\nSteps: Conduct threat modeling workshops, review existing security assessments, and consult with security experts.\nDeliverables: A comprehensive list of identified security risks and threats.\n\nResources needed:\n\u2022 Lead Researcher\n\u2022 Technical Lead\n\u2022 Security Review Specialist\",6/28/2026,7/6/2026,0,870a5b4c-f42d-48ee-b463-5cf00d61393d,PlanExe\n0f002bd9-809d-459a-b912-091f0a61b8ba,Develop Security Policies and Procedures,\"Develop Security Policies and Procedures\n\nDescription:\nObjective: Develop security policies and procedures to mitigate identified risks.\nScope: Create guidelines for secure coding practices, data storage, communication protocols, and incident response.\nSteps: Research industry best practices, adapt existing security policies, and consult with legal counsel.\nDeliverables: A documented set of security policies and procedures.\n\nResources needed:\n\u2022 Lead Researcher\n\u2022 Technical Lead\n\u2022 Security Review Specialist\n\u2022 Regulatory and Compliance Specialist\",7/6/2026,7/14/2026,0,1e524d0a-48a0-4992-acd0-0175f215db30,PlanExe\n532c8397-3df1-4b75-bffb-486c71a55af3,Implement Security Controls and Measures,\"Implement Security Controls and Measures\n\nDescription:\nObjective: Implement security controls and measures to protect project assets.\nScope: Configure firewalls, intrusion detection systems, access controls, and encryption mechanisms.\nSteps: Deploy security tools, configure security settings, and conduct security audits.\nDeliverables: A secure infrastructure with implemented security controls.\n\nResources needed:\n\u2022 Technical Lead\n\u2022 Engineer\n\u2022 Security Review Specialist\",7/14/2026,7/22/2026,0,0f002bd9-809d-459a-b912-091f0a61b8ba,PlanExe\ne09cd39e-f4cf-4180-9077-2f5f9b5d816f,Establish Incident Response Plan,\"Establish Incident Response Plan\n\nDescription:\nObjective: Create a plan for responding to security incidents.\nScope: Define roles and responsibilities, establish communication protocols, and develop procedures for incident containment and recovery.\nSteps: Research incident response best practices, adapt existing incident response plans, and conduct tabletop exercises.\nDeliverables: A documented incident response plan.\n\nResources needed:\n\u2022 Lead Researcher\n\u2022 Technical Lead\n\u2022 Security Review Specialist\n\u2022 Policy and Public-Affairs Coordinator\",7/22/2026,7/30/2026,0,870a5b4c-f42d-48ee-b463-5cf00d61393d,PlanExe\n845e209d-90ea-4313-92fa-6837fed213ca,Develop Alternative Scenarios and Intervention Points,,7/30/2026,8/15/2026,0,870a5b4c-f42d-48ee-b463-5cf00d61393d,PlanExe\n6e94a2c8-bf97-425c-9b60-d6fca79afbdd,Identify Alternative Legal Pathways,\"Identify Alternative Legal Pathways\n\nDescription:\nResearch and document alternative legal and regulatory pathways for promoting platform neutrality in Danish digital identity, beyond eIDAS2 and AltID.\n\nResources needed:\n\u2022 Regulatory and Compliance Specialist\n\u2022 Legal Counsel\",7/30/2026,8/3/2026,0,845e209d-90ea-4313-92fa-6837fed213ca,PlanExe\nba8066b2-c8c8-4ca3-9ba1-76db5eb0f1f7,Explore Unilateral Actions for Digital Sovereignty,\"Explore Unilateral Actions for Digital Sovereignty\n\nDescription:\nIdentify and analyze actions Denmark can take unilaterally to advance digital sovereignty in the digital identity space, independent of EU-level initiatives.\n\nResources needed:\n\u2022 Policy and Public-Affairs Coordinator\n\u2022 Lead Researcher\",8/3/2026,8/7/2026,0,6e94a2c8-bf97-425c-9b60-d6fca79afbdd,PlanExe\n47917541-aa78-4cbb-89cb-7ce158ecb0d3,Research Alternative Technical Standards,\"Research Alternative Technical Standards\n\nDescription:\nIdentify specific technical standards or open-source initiatives that Denmark could champion independently to promote platform neutrality and fallback access.\n\nResources needed:\n\u2022 Technical Lead\n\u2022 Engineer\",8/7/2026,8/11/2026,0,ba8066b2-c8c8-4ca3-9ba1-76db5eb0f1f7,PlanExe\n68c87288-f12b-4db6-bd57-9de993b2492f,Conduct Scenario Planning Workshops,\"Conduct Scenario Planning Workshops\n\nDescription:\nOrganize and facilitate scenario planning workshops with key stakeholders to explore alternative intervention points and potential fallback positions.\n\nResources needed:\n\u2022 Policy and Public-Affairs Coordinator\n\u2022 Lead Researcher\n\u2022 Workshop Facilitator\",8/11/2026,8/15/2026,0,845e209d-90ea-4313-92fa-6837fed213ca,PlanExe\n4f5f68af-1207-4252-a0f2-054765ccb987,Define Technical Standards and Certification Strategy,,8/15/2026,9/16/2026,0,5684f949-4096-4faa-a559-c2813cce24a3,PlanExe\n9db5800f-c4bf-457d-908b-72913db82610,Research relevant technical standards,\"Research relevant technical standards\n\nDescription:\nIdentify and analyze existing technical standards related to digital identity, authentication, and security protocols. This includes standards from organizations like ISO, ETSI, and W3C.\n\nResources needed:\n\u2022 Lead Researcher\n\u2022 Technical Lead\n\u2022 Regulatory and Compliance Specialist\",8/15/2026,8/23/2026,0,4f5f68af-1207-4252-a0f2-054765ccb987,PlanExe\n4e9990fc-2bcc-4c55-960d-32d8d7b69b75,Analyze eIDAS certification schemes,\"Analyze eIDAS certification schemes\n\nDescription:\nInvestigate existing eIDAS certification schemes and conformity assessment procedures to understand the requirements for certifying platform-neutral solutions. Identify gaps and potential challenges.\n\nResources needed:\n\u2022 Regulatory and Compliance Specialist\n\u2022 Technical Lead\",8/23/2026,8/31/2026,0,9db5800f-c4bf-457d-908b-72913db82610,PlanExe\nba83a385-3f8f-48d7-b8dc-ba1275345ce3,Engage with standards bodies,\"Engage with standards bodies\n\nDescription:\nEstablish communication channels with relevant standards bodies (e.g., ETSI, CEN/CENELEC) and technical working groups. Attend meetings, submit proposals, and participate in discussions to advocate for platform-neutral standards.\n\nResources needed:\n\u2022 Policy and Public-Affairs Coordinator\n\u2022 Lead Researcher\n\u2022 Technical Lead\",8/31/2026,9/8/2026,0,4e9990fc-2bcc-4c55-960d-32d8d7b69b75,PlanExe\nfd990824-100a-4f40-8c6b-575501306cb2,Develop certification strategy,\"Develop certification strategy\n\nDescription:\nFormulate a detailed strategy for certifying platform-neutral solutions under eIDAS, including identifying the necessary steps, resources, and timelines. Address assurance levels and conformity assessment requirements.\n\nResources needed:\n\u2022 Lead Researcher\n\u2022 Technical Lead\n\u2022 Regulatory and Compliance Specialist\n\u2022 Policy and Public-Affairs Coordinator\",9/8/2026,9/16/2026,0,4f5f68af-1207-4252-a0f2-054765ccb987,PlanExe\ndef01dd8-b255-45c9-ac06-49e4e7dc6199,Technical Feasibility Demonstrations,,9/16/2026,12/21/2026,0,5684f949-4096-4faa-a559-c2813cce24a3,PlanExe\n90d8943b-5b2d-4e30-adf1-bdf6b6953ec2,Develop FIDO2 Demonstrator on GrapheneOS,,9/16/2026,11/3/2026,0,def01dd8-b255-45c9-ac06-49e4e7dc6199,PlanExe\n004530d4-15c5-42ec-934b-c1366dc73b03,Set up GrapheneOS development environment,\"Set up GrapheneOS development environment\n\nDescription:\nObjective: Configure a secure and isolated development environment on GrapheneOS for FIDO2 implementation.\nScope: Includes installing necessary SDKs, libraries, and tools.\nSteps: 1. Install GrapheneOS on a test device. 2. Configure Android Studio or similar IDE. 3. Install FIDO2 libraries and dependencies. 4. Test the environment with a basic FIDO2 interaction.\nDeliverables: A fully functional development environment on GrapheneOS.\n\nResources needed:\n\u2022 Engineer\n\u2022 GrapheneOS device\n\u2022 Android Studio\",9/16/2026,9/28/2026,0,90d8943b-5b2d-4e30-adf1-bdf6b6953ec2,PlanExe\nb6a7f206-97a2-44c5-b050-a6dcb9d885f1,Implement FIDO2 authentication flow,\"Implement FIDO2 authentication flow\n\nDescription:\nObjective: Develop the core FIDO2 authentication flow within the GrapheneOS environment.\nScope: Covers registration, authentication, and key management.\nSteps: 1. Implement FIDO2 registration process. 2. Implement FIDO2 authentication process. 3. Securely store and manage FIDO2 keys. 4. Test the authentication flow with a test server.\nDeliverables: A functional FIDO2 authentication flow on GrapheneOS.\n\nResources needed:\n\u2022 Engineer\n\u2022 Mobile security expert\",9/28/2026,10/10/2026,0,004530d4-15c5-42ec-934b-c1366dc73b03,PlanExe\n0eb3c4f7-9b27-4883-acd3-7a277b0698e0,Integrate with test authentication server,\"Integrate with test authentication server\n\nDescription:\nObjective: Integrate the FIDO2 implementation with a test authentication server for verification.\nScope: Includes setting up the test server and configuring communication protocols.\nSteps: 1. Set up a test authentication server. 2. Configure communication between GrapheneOS device and server. 3. Test the FIDO2 authentication flow with the server. 4. Troubleshoot any integration issues.\nDeliverables: Successful integration with a test authentication server.\n\nResources needed:\n\u2022 Engineer\n\u2022 Web authentication expert\",10/10/2026,10/22/2026,0,b6a7f206-97a2-44c5-b050-a6dcb9d885f1,PlanExe\n63aa453f-1083-4561-a775-794d3ce62244,Secure FIDO2 implementation on GrapheneOS,\"Secure FIDO2 implementation on GrapheneOS\n\nDescription:\nObjective: Ensure the security of the FIDO2 implementation on GrapheneOS.\nScope: Includes vulnerability assessments, code reviews, and security hardening.\nSteps: 1. Conduct vulnerability assessments. 2. Perform code reviews. 3. Implement security hardening measures. 4. Test the security of the implementation.\nDeliverables: A secure FIDO2 implementation on GrapheneOS.\n\nResources needed:\n\u2022 Mobile security expert\n\u2022 Security review specialist\",10/22/2026,11/3/2026,0,90d8943b-5b2d-4e30-adf1-bdf6b6953ec2,PlanExe\nf5a2bd2e-738a-4b97-81ca-cbb65256305a,Develop Browser-Based Fallback Demonstrator,,11/3/2026,11/23/2026,0,90d8943b-5b2d-4e30-adf1-bdf6b6953ec2,PlanExe\n271cd7c6-9a76-4e01-85e5-318571a26388,Design Browser Fallback Authentication Flow,\"Design Browser Fallback Authentication Flow\n\nDescription:\nDefine the user experience and technical steps for the browser-based fallback authentication flow. This includes selecting appropriate authentication methods (e.g., OTP, email link), designing the user interface, and outlining the data flow between the browser, server, and any external services.\n\nResources needed:\n\u2022 Web Authentication Expert\n\u2022 UI/UX Designer\n\u2022 Security Architect\",11/3/2026,11/8/2026,0,f5a2bd2e-738a-4b97-81ca-cbb65256305a,PlanExe\n7c855acb-2aac-4397-813c-3525cb949a41,Implement Server-Side Fallback Logic,\"Implement Server-Side Fallback Logic\n\nDescription:\nDevelop the server-side components required to support the browser-based fallback authentication flow. This includes handling authentication requests, generating and verifying OTPs or email links, managing user sessions, and integrating with the existing authentication infrastructure.\n\nResources needed:\n\u2022 Backend Engineer\n\u2022 Security Engineer\n\u2022 Database Administrator\",11/8/2026,11/13/2026,0,271cd7c6-9a76-4e01-85e5-318571a26388,PlanExe\n73e05302-3536-4a47-82f4-10ae0d72d8a7,Develop Browser-Side Fallback Interface,\"Develop Browser-Side Fallback Interface\n\nDescription:\nCreate the user interface for the browser-based fallback authentication flow. This includes implementing the login form, OTP input fields, email link handling, and error messages. Ensure the interface is accessible, user-friendly, and secure.\n\nResources needed:\n\u2022 Frontend Engineer\n\u2022 UI/UX Designer\n\u2022 Accessibility Expert\",11/13/2026,11/18/2026,0,7c855acb-2aac-4397-813c-3525cb949a41,PlanExe\n96b0cac0-f7f6-4a93-ad47-2f4420b4597c,Test Browser Compatibility and Security,\"Test Browser Compatibility and Security\n\nDescription:\nThoroughly test the browser-based fallback authentication flow across different browsers (Chrome, Firefox, Safari, Edge) and operating systems (Windows, macOS, Linux). Conduct security testing to identify and address any vulnerabilities, such as XSS or CSRF attacks.\n\nResources needed:\n\u2022 Security Engineer\n\u2022 QA Tester\n\u2022 Browser Compatibility Specialist\",11/18/2026,11/23/2026,0,f5a2bd2e-738a-4b97-81ca-cbb65256305a,PlanExe\n26facecc-7632-46bc-8a16-e77685e0841e,Conduct External Security Review of Demonstrators,,11/23/2026,12/9/2026,0,f5a2bd2e-738a-4b97-81ca-cbb65256305a,PlanExe\nb7221d81-ebdc-4dfd-9191-bc56c03a2a02,Prepare demonstrators for security review,\"Prepare demonstrators for security review\n\nDescription:\nPackage the FIDO2 and browser-based demonstrators with necessary documentation for the external security review team. This includes code, architecture diagrams, and usage instructions.\n\nResources needed:\n\u2022 Technical Lead\n\u2022 Engineers/Contractors\",11/23/2026,11/27/2026,0,26facecc-7632-46bc-8a16-e77685e0841e,PlanExe\nd18a4efb-3b82-457b-abf3-c532d4740bca,Engage external security review firm,\"Engage external security review firm\n\nDescription:\nFinalize the contract with the selected external security firm. Provide them with access to the demonstrators and relevant documentation. Schedule kickoff meeting.\n\nResources needed:\n\u2022 Lead Researcher\n\u2022 Technical Lead\n\u2022 Budget for external security review\",11/27/2026,12/1/2026,0,b7221d81-ebdc-4dfd-9191-bc56c03a2a02,PlanExe\n2b6e221d-6aaf-4c8b-8911-104a2e9b464f,Address security review findings,\"Address security review findings\n\nDescription:\nReview the security review report and prioritize identified vulnerabilities. Develop and implement remediation plans for each vulnerability. Retest remediated code.\n\nResources needed:\n\u2022 Technical Lead\n\u2022 Engineers/Contractors\n\u2022 Security Review Specialist\",12/1/2026,12/5/2026,0,d18a4efb-3b82-457b-abf3-c532d4740bca,PlanExe\n01ed9177-859e-4839-aa3e-4031a309e2c6,Document security review process,\"Document security review process\n\nDescription:\nCreate a comprehensive report documenting the entire security review process, including the initial assessment, identified vulnerabilities, remediation steps, and retesting results.\n\nResources needed:\n\u2022 Technical Lead\n\u2022 Security Review Specialist\",12/5/2026,12/9/2026,0,26facecc-7632-46bc-8a16-e77685e0841e,PlanExe\n6cc750ea-ab0c-4c5f-a715-045ff9d18a23,Integrate Demonstrators with Test Environment,,12/9/2026,12/21/2026,0,def01dd8-b255-45c9-ac06-49e4e7dc6199,PlanExe\nabb74865-68b7-45c5-8990-c00f5088ca2b,Prepare Test Environment Configuration,\"Prepare Test Environment Configuration\n\nDescription:\nObjective: Configure the test environment to ement fixes. 3. Retest affected components. 4. Verify issue resolution.\nDeliverables: Resolved integration issues.\n\nResources needed:\n\u2022 Engineer\n\u2022 Technical Lead\",12/18/2026,12/21/2026,0,6cc750ea-ab0c-4c5f-a715-045ff9d18a23,PlanExe\nfb696a06-1829-4b3d-8107-f430813a9b20,Policy Advocacy & Coalition Building,,12/21/2026,6/3/2027,0,def01dd8-b255-45c9-ac06-49e4e7dc6199,PlanExe\n59acc572-ad22-42f7-94b6-1998e1e5cf97,Build Coalition of Support,,12/21/2026,2/19/2027,0,fb696a06-1829-4b3d-8107-f430813a9b20,PlanExe\n724a49b7-da44-4f46-b3f5-50de430d89d8,Identify Key Stakeholders for Coalition,\"Identify Key Stakeholders for Coalition\n\nDescription:\nObjective: Identify and prioritize key stakeholders (civil-society organizations, privacy advocates, academic researchers, security experts, contingency-planning stakeholders, and sympathetic members of Folketinget's digital policy committee) for building a coalition of support.\nScope: Research and compile a list of relevant organizations and individuals, assess their potential interest and influence, and prioritize outreach efforts.\nSteps: 1. Conduct online research to identify potential stakeholders. 2. Analyze their mission, activities, and past involvement in digital identity and related issues. 3. Assess their potential interest and influence based on their expertise, network, and resources. 4. Prioritize outreach efforts based on the assessment.\nDeliverables: A prioritized list of key stakeholders with contact information and a brief assessment of their potential interest and influence.\n\nResources needed:\n\u2022 Policy and Public-Affairs Coordinator\n\u2022 Lead Researcher\",12/21/2026,1/5/2027,0,59acc572-ad22-42f7-94b6-1998e1e5cf97,PlanExe\n3902e8fd-2412-474f-8069-9934b109af67,Develop Coalition Engagement Strategy,\"Develop Coalition Engagement Strategy\n\nDescription:\nObjective: Develop a comprehensive engagement strategy for building and maintaining a coalition of support.\nScope: Define the coalition's goals, identify shared interests, develop messaging, and establish communication channels.\nSteps: 1. Define the coalition's goals and objectives. 2. Identify shared interests among potential coalition members. 3. Develop compelling messaging that resonates with different stakeholders. 4. Establish clear communication channels and decision-making protocols. 5. Offer incentives for participation.\nDeliverables: A detailed coalition engagement strategy document outlining goals, messaging, communication channels, and incentives.\n\nResources needed:\n\u2022 Policy and Public-Affairs Coordinator\n\u2022 Lead Researcher\",1/5/2027,1/20/2027,0,724a49b7-da44-4f46-b3f5-50de430d89d8,PlanExe\n8eaf83ac-7b34-4fdd-9fa0-9f9ffe43adc6,Conduct Initial Outreach to Stakeholders,\"Conduct Initial Outreach to Stakeholders\n\nDescription:\nObjective: Initiate contact with key stakeholders to gauge their interest in joining the coalition.\nScope: Prepare outreach materials, schedule meetings, and conduct initial conversations.\nSteps: 1. Prepare outreach materials, including a brief overview of the project and the coalition's goals. 2. Schedule initial meetings with key stakeholders. 3. Conduct initial conversations to gauge their interest and address any concerns. 4. Follow up with stakeholders to provide additional information and answer questions.\nDeliverables: Records of initial outreach efforts, including meeting notes and follow-up communications.\n\nResources needed:\n\u2022 Policy and Public-Affairs Coordinator\n\u2022 Lead Researcher\",1/20/2027,2/4/2027,0,3902e8fd-2412-474f-8069-9934b109af67,PlanExe\ne7aacef4-37bd-4459-8d36-c29a2c449c37,Formalize Coalition Structure and Agreements,\"Formalize Coalition Structure and Agreements\n\nDescription:\nObjective: Establish a formal structure for the coalition and develop agreements outlining roles, responsibilities, and decision-making processes.\nScope: Define the coalition's governance structure, draft a memorandum of understanding, and establish communication protocols.\nSteps: 1. Define the coalition's governance structure (e.g., steering committee, working groups). 2. Draft a memorandum of understanding outlining roles, responsibilities, and decision-making processes. 3. Establish clear communication protocols for sharing information and coordinating activities. 4. Obtain formal agreement from coalition members.\nDeliverables: A signed memorandum of understanding and a documented governance structure.\n\nResources needed:\n\u2022 Policy and Public-Affairs Coordinator\n\u2022 Lead Researcher\n\u2022 Legal Counsel (limited)\",2/4/2027,2/19/2027,0,59acc572-ad22-42f7-94b6-1998e1e5cf97,PlanExe\n24a1310f-5a78-4b58-8ea4-f9cb72f0b70f,Develop Policy Advocacy Messaging,,2/19/2027,3/23/2027,0,59acc572-ad22-42f7-94b6-1998e1e5cf97,PlanExe\na414a7d3-6b12-4561-b497-b7adf8d50fc5,Research Digitaliseringsstyrelsen's policy priorities,\"Research Digitaliseringsstyrelsen's policy priorities\n\nDescription:\nObjective: Understand the current policy priorities of Digitaliseringsstyrelsen related to digital identity and platform neutrality.\nScope: Review publicly available documents, reports, and statements from Digitaliseringsstyrelsen.\nSteps: 1. Identify relevant documents. 2. Analyze the documents for key themes and priorities. 3. Summarize findings.\nDeliverables: A summary report outlining Digitaliseringsstyrelsen's policy priorities.\n\nResources needed:\n\u2022 Policy and Public-Affairs Coordinator\n\u2022 Lead Researcher\",2/19/2027,2/27/2027,0,24a1310f-5a78-4b58-8ea4-f9cb72f0b70f,PlanExe\nd8c0f57c-62a0-4e26-b17f-a2a3a4e568ab,Draft initial advocacy messaging,\"Draft initial advocacy messaging\n\nDescription:\nObjective: Develop initial advocacy messaging that highlights the benefits of platform neutrality and fallback access.\nScope: Craft compelling arguments tailored to Digitaliseringsstyrelsen's priorities.\nSteps: 1. Develop key messages. 2. Refine messaging based on research. 3. Create briefing materials.\nDeliverables: Draft advocacy messaging and briefing materials.\n\nResources needed:\n\u2022 Policy and Public-Affairs Coordinator\n\u2022 Lead Researcher\",2/27/2027,3/7/2027,0,a414a7d3-6b12-4561-b497-b7adf8d50fc5,PlanExe\nbd1ce63a-d45f-42db-b4a5-ef278bf58ce0,Refine messaging based on stakeholder feedback,\"Refine messaging based on stakeholder feedback\n\nDescription:\nObjective: Refine advocacy messaging based on feedback from coalition members and other stakeholders.\nScope: Incorporate feedback to strengthen the messaging and address potential concerns.\nSteps: 1. Share draft messaging with stakeholders. 2. Collect feedback. 3. Revise messaging based on feedback.\nDeliverables: Refined advocacy messaging.\n\nResources needed:\n\u2022 Policy and Public-Affairs Coordinator\n\u2022 Lead Researcher\n\u2022 Coalition Members\",3/7/2027,3/15/2027,0,d8c0f57c-62a0-4e26-b17f-a2a3a4e568ab,PlanExe\n2da7cfa5-c629-4fda-9833-27e5ad789ce8,Prepare presentation materials for Digitaliseringsstyrelsen,\"Prepare presentation materials for Digitaliseringsstyrelsen\n\nDescription:\nObjective: Prepare presentation materials for meetings with Digitaliseringsstyrelsen representatives.\nScope: Create a clear and concise presentation that effectively communicates the project's goals and benefits.\nSteps: 1. Develop presentation slides. 2. Practice the presentation. 3. Finalize presentation materials.\nDeliverables: Presentation materials for Digitaliseringsstyrelsen.\n\nResources needed:\n\u2022 Policy and Public-Affairs Coordinator\n\u2022 Lead Researcher\n\u2022 Technical Lead\",3/15/2027,3/23/2027,0,24a1310f-5a78-4b58-8ea4-f9cb72f0b70f,PlanExe\n79eeb071-7bf5-4336-831d-0f85990e013e,Engage with Digitaliseringsstyrelsen,,3/23/2027,4/24/2027,0,24a1310f-5a78-4b58-8ea4-f9cb72f0b70f,PlanExe\nbe5941e5-1926-429b-90a0-df1a273a0f5c,Identify Key Digitaliseringsstyrelsen Contacts,\"Identify Key Digitaliseringsstyrelsen Contacts\n\nDescription:\nIdentify individuals within Digitaliseringss 22 Policy and Public-Affairs Coordinator\n\u2022 Lead Researcher\n\u2022 Technical Lead\",5/18/2027,5/26/2027,0,113949e5-1723-4c22-af4f-f2ee90017e31,PlanExe\nf46fb567-b8f0-4c90-b519-3f6dfec3c9d8,Follow Up and Maintain Communication,\"Follow Up and Maintain Communication\n\nDescription:\nFollow up with the Digital Policy Committee members after the meetings to answer any remaining questions and maintain communication. This includes providing additional information, addressing concerns, and building relationships with the committee members.\n\nResources needed:\n\u2022 Policy and Public-Affairs Coordinator\",5/26/2027,6/3/2027,0,0db236ce-d540-4f35-971b-65fbd94acd4a,PlanExe\n2818c1ea-61d6-4225-bef2-1a9fdf606e90,Procurement Influence & Standards Engagement,,6/3/2027,10/5/2027,0,fb696a06-1829-4b3d-8107-f430813a9b20,PlanExe\nada98db8-a04d-4ba3-b5be-0510b22243a1,Analyze AltID Procurement Documents,,6/3/2027,6/15/2027,0,2818c1ea-61d6-4225-bef2-1a9fdf606e90,PlanExe\nfc4fa905-2d44-4b3e-b090-1f26e9f6c4f8,Identify relevant AltID procurement sources,\"Identify relevant AltID procurement sources\n\nDescription:\nObjective: Determine where AltID procurement documents are published or available.\nScope: Research official websites, databases, and contact relevant agencies.\nSteps: 1. Search Digitaliseringsstyrelsen website. 2. Contact relevant personnel. 3. Explore EU procurement databases.\nDeliverables: List of sources for procurement documents.\n\nResources needed:\n\u2022 Policy and Public-Affairs Coordinator\n\u2022 Lead Researcher\",6/3/2027,6/6/2027,0,ada98db8-a04d-4ba3-b5be-0510b22243a1,PlanExe\n26170a1d-c370-4142-8ecb-469253cefd83,Gather AltID procurement documents,\"Gather AltID procurement documents\n\nDescription:\nObjective: Collect all available AltID procurement documents from identified sources.\nScope: Obtain documents related to current and past procurement activities.\nSteps: 1. Download documents from online sources. 2. Request documents from contacts. 3. Organize documents in a central repository.\nDeliverables: Complete collection of AltID procurement documents.\n\nResources needed:\n\u2022 Policy and Public-Affairs Coordinator\n\u2022 Lead Researcher\",6/6/2027,6/9/2027,0,fc4fa905-2d44-4b3e-b090-1f26e9f6c4f8,PlanExe\n12bea96d-f828-416e-ae38-fdcfb1165346,Review documents for platform neutrality,\"Review documents for platform neutrality\n\nDescription:\nObjective: Identify sections related to platform requirements.\nScope: Analyze documents for mentions of platform neutrality, open standards, or vendor lock-in.\nSteps: 1. Scan documents for keywords. 2. Highlight relevant sections. 3. Summarize findings.\nDeliverables: Report on platform neutrality mentions.\n\nResources needed:\n\u2022 Regulatory and Compliance Specialist\n\u2022 Technical Lead\",6/9/2027,6/12/2027,0,26170a1d-c370-4142-8ecb-469253cefd83,PlanExe\ne3b83869-b5e9-4538-8cc0-e3c7e8dbd050,Assess completeness of documentation,\"Assess completeness of documentation\n\nDescription:\nObjective: Determine if the collected documents provide a complete picture of AltID procurement.\nScope: Identify any gaps in the documentation and plan to address them.\nSteps: 1. Compare documents against expected content. 2. Identify missing information. 3. Develop a plan to obtain missing documents.\nDeliverables: Report on documentation completeness.\n\nResources needed:\n\u2022 Lead Researcher\n\u2022 Policy and Public-Affairs Coordinator\",6/12/2027,6/15/2027,0,ada98db8-a04d-4ba3-b5be-0510b22243a1,PlanExe\n4a5dad17-0a9b-4948-a27f-bbd7baf5a6c6,Advocate for Platform-Neutral Language in Procurement Documents,,6/15/2027,7/5/2027,0,ada98db8-a04d-4ba3-b5be-0510b22243a1,PlanExe\n933d87c4-07de-4c03-9c23-de427d76efeb,Identify Key Procurement Requirements,\"Identify Key Procurement Requirements\n\nDescription:\nObjective: Determine the specific requirements and criteria outlined in the AltID procurement documents related to platform neutrality.\nScope: Review all relevant sections of the procurement documents, including technical specifications, evaluation criteria, and contractual terms.\nSteps: 1. Obtain the AltID procurement documents. 2. Identify sections related to platform compatibility, interoperability, and vendor lock-in. 3. Extract specific requirements and criteria related to platform neutrality.\nDeliverables: A summary of key procurement requirements related to platform neutrality.\n\nResources needed:\n\u2022 Regulatory and Compliance Specialist\n\u2022 Technical Lead\n\u2022 Procurement Lawyer\",6/15/2027,6/20/2027,0,4a5dad17-0a9b-4948-a27f-bbd7baf5a6c6,PlanExe\n0ee8ed98-72c1-4d51-b979-9dde22fc4d9b,Analyze Technical Specifications for Platform Bias,\"Analyze Technical Specifications for Platform Bias\n\nDescription:\nObjective: Analyze the technical specifications within the AltID procurement documents to identify potential biases towards specific platforms or technologies.\nScope: Examine the technical requirements for authentication methods, security protocols, and integration interfaces.\nSteps: 1. Review the technical specifications for authentication methods (e.g., FIDO2, WebAuthn). 2. Identify any requirements that favor specific platforms or vendors. 3. Assess the impact of these biases on platform neutrality.\nDeliverables: A report identifying potential platform biases in the technical specifications.\n\nResources needed:\n\u2022 Technical Lead\n\u2022 Engineer\n\u2022 Mobile Security Expert\",6/20/2027,6/25/2027,0,933d87c4-07de-4c03-9c23-de427d76efeb,PlanExe\ne336f171-2b20-436c-8298-1d26ace8d622,Assess Evaluation Criteria for Platform Neutrality,\"Assess Evaluation Criteria for Platform Neutrality\n\nDescription:\nObjective: Evaluate the evaluation criteria used in the AltID procurement process to determine if they adequately consider platform neutrality.\nScope: Review the criteria used to assess vendor proposals and identify any potential biases.\nSteps: 1. Review the evaluation criteria for technical merit, cost-effectiveness, and security. 2. Assess whether the criteria explicitly reward or penalize platform-neutral solutions. 3. Identify any gaps in the evaluation process related to platform neutrality.\nDeliverables: An assessment of the evaluation criteria's impact on platform neutrality.\n\nResources needed:\n\u2022 Regulatory and Compliance Specialist\n\u2022 Policy and Public-Affairs Coordinator\n\u2022 Procurement Lawyer\",6/25/2027,6/30/2027,0,0ee8ed98-72c1-4d51-b979-9dde22fc4d9b,PlanExe\na1abb0e8-d17d-454e-9606-5513c8407991,Draft Alternative Procurement Language,\"Draft Alternative Procurement Language\n\nDescription:\nObjective: Develop alternative procurement language that promotes platform neutrality and avoids vendor lock-in.\nScope: Create specific wording for technical specifications, evaluation criteria, and contractual terms.\nSteps: 1. Research best practices for platform-neutral procurement language. 2. Draft alternative wording for key sections of the AltID procurement documents. 3. Ensure that the language is clear, concise, and enforceable.\nDeliverables: A set of alternative procurement language recommendations.\n\nResources needed:\n\u2022 Policy and Public-Affairs Coordinator\n\u2022 Technical Lead\n\u2022 Procurement Lawyer\",6/30/2027,7/5/2027,0,4a5dad17-0a9b-4948-a27f-bbd7baf5a6c6,PlanExe\n242a1996-2eea-405f-afa6-b6b83b096128,Engage with EU Bodies and Technical Working Groups,,7/5/2027,8/6/2027,0,4a5dad17-0a9b-4948-a27f-bbd7baf5a6c6,PlanExe\nd4cff72a-b67d-47f1-b331-44bff8d104dc,Identify Key EU Contacts,\"Identify Key EU Contacts\n\nDescription:\nIdentify key individuals within relevant EU bodies and technical working groups. This involves researching the organizational structure of these bodies, identifying individuals with decision-making power or influence, and gathering their contact information.\n\nResources needed:\n\u2022 Policy and Public-Affairs Coordinator\n\u2022 Lead Researcher\",7/5/2027,7/13/2027,0,242a1996-2eea-405f-afa6-b6b83b096128,PlanEx       "custom_tooltip": "<b>Identify potential office spaces in Copenhagen</b><br>Objective: Identify suitable office spaces in Copenhagen that meet the project&#x27;s requirements.\nScope: Research and compile a list of potential office spaces, considering factors such as location, size, security, and accessibility.\nSteps: 1. Define the project&#x27;s office space requirements. 2. Research available office spaces in Copenhagen using online resources and real estate agents. 3. Compile a list of potential office spaces with relevant details.\nDeliverables: A list of potential office spaces in Copenhagen with detailed information.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Real Estate Agent</li><li>Administrative Assistant</li></ul>",

      "custom_tooltip": "<b>Assess security requirements for workspace</b><br>Objective: Determine the security requirements for the project&#x27;s workspace.\nScope: Identify and document the security measures necessary to protect sensitive data and equipment.\nSteps: 1. Conduct a security risk assessment. 2. Identify security requirements based on the risk assessment. 3. Document the security requirements in a security plan.\nDeliverables: A security plan outlining the security requirements for the project&#x27;s workspace.<br><b>Resources needed:</b><br><ul><li>Security Expert</li><li>Technical Lead</li><li>Lead Researcher</li></ul>",

      "custom_tooltip": "<b>Negotiate lease terms for selected space</b><br>Objective: Negotiate favorable lease terms for the selected office space.\nScope: Negotiate the lease agreement with the landlord, ensuring that the terms are acceptable to the project.\nSteps: 1. Review the lease agreement. 2. Identify areas for negotiation. 3. Negotiate the lease terms with the landlord. 4. Finalize the lease agreement.\nDeliverables: A finalized lease agreement for the selected office space.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Legal Counsel</li><li>Real Estate Agent</li></ul>",

      "text": "Research Platform Neutrality Definitions",
      "custom_tooltip": "<b>Research Platform Neutrality Definitions</b><br>Objective: Gather existing definitions of platform neutrality from various sources.\nScope: Review academic literature, industry standards, and regulatory documents.\nSteps: Search online databases, consult with experts, and analyze relevant publications.\nDeliverables: A comprehensive list of platform neutrality definitions.<br><b>Resources needed:</b><br><ul><li>Lead Researcher</li><li>Regulatory and Compliance Specialist</li></ul>",

      "custom_tooltip": "<b>Define Fallback Access Requirements</b><br>Objective: Establish technical requirements for fallback access paths.\nScope: Define authentication methods, security protocols, and user experience considerations.\nSteps: Analyze existing fallback mechanisms, consult with security experts, and develop detailed specifications.\nDeliverables: A document outlining the technical requirements for fallback access.<br><b>Resources needed:</b><br><ul><li>Technical Lead</li><li>Engineer</li><li>Mobile security and authentication protocols expertise</li></ul>",

      "text": "Analyze AltID Technical Constraints",
      "custom_tooltip": "<b>Analyze AltID Technical Constraints</b><br>Objective: Understand the technical limitations and requirements of AltID.\nScope: Review AltID documentation, consult with Digitaliseringsstyrelsen, and analyze its architecture.\nSteps: Gather information from relevant stakeholders, conduct technical analysis, and document findings.\nDeliverables: A report summarizing AltID&#x27;s technical constraints and requirements.<br><b>Resources needed:</b><br><ul><li>Lead Researcher</li><li>Technical Lead</li><li>Regulatory and Compliance Specialist</li></ul>",

      "text": "Draft Technical Definitions Document",
      "custom_tooltip": "<b>Draft Technical Definitions Document</b><br>Objective: Create a consolidated document with precise technical definitions.\nScope: Combine research, requirements, and constraints into a single document.\nSteps: Synthesize information, draft definitions, and obtain feedback from stakeholders.\nDeliverables: A final technical definitions document for platform neutrality and fallback access.<br><b>Resources needed:</b><br><ul><li>Lead Researcher</li><li>Technical Lead</li><li>Regulatory and Compliance Specialist</li><li>Policy and Public-Affairs Coordinator</li></ul>",

      "text": "Identify Security Risks and Threats",
      "custom_tooltip": "<b>Identify Security Risks and Threats</b><br>Objective: Identify potential security risks and threats to the project&#x27;s digital identity framework.\nScope: Assess vulnerabilities in demonstrators, code repository, data storage, communication channels, and coalition building.\nSteps: Conduct threat modeling workshops, review existing security assessments, and consult with security experts.\nDeliverables: A comprehensive list of identified security risks and threats.<br><b>Resources needed:</b><br><ul><li>Lead Researcher</li><li>Technical Lead</li><li>Security Review Specialist</li></ul>",

      "text": "Develop Security Policies and Procedures",
      "custom_tooltip": "<b>Develop Security Policies and Procedures</b><br>Objective: Develop security policies and procedures to mitigate identified risks.\nScope: Create guidelines for secure coding practices, data storage, communication protocols, and incident response.\nSteps: Research industry best practices, adapt existing security policies, and consult with legal counsel.\nDeliverables: A documented set of security policies and procedures.<br><b>Resources needed:</b><br><ul><li>Lead Researcher</li><li>Technical Lead</li><li>Security Review Specialist</li><li>Regulatory and Compliance Specialist</li></ul>",

      "text": "Implement Security Controls and Measures",
      "custom_tooltip": "<b>Implement Security Controls and Measures</b><br>Objective: Implement security controls and measures to protect project assets.\nScope: Configure firewalls, intrusion detection systems, access controls, and encryption mechanisms.\nSteps: Deploy security tools, configure security settings, and conduct security audits.\nDeliverables: A secure infrastructure with implemented security controls.<br><b>Resources needed:</b><br><ul><li>Technical Lead</li><li>Engineer</li><li>Security Review Specialist</li></ul>",

      "custom_tooltip": "<b>Establish Incident Response Plan</b><br>Objective: Create a plan for responding to security incidents.\nScope: Define roles and responsibilities, establish communication protocols, and develop procedures for incident containment and recovery.\nSteps: Research incident response best practices, adapt existing incident response plans, and conduct tabletop exercises.\nDeliverables: A documented incident response plan.<br><b>Resources needed:</b><br><ul><li>Lead Researcher</li><li>Technical Lead</li><li>Security Review Specialist</li><li>Policy and Public-Affairs Coordinator</li></ul>",

      "text": "Engage with standards bodies",
      "custom_tooltip": "<b>Engage with standards bodies</b><br>Establish communication channels with relevant standards bodies (e.g., ETSI, CEN/CENELEC) and technical working groups. Attend meetings, submit proposals, and participate in discussions to advocate for platform-neutral standards.<br><b>Resources needed:</b><br><ul><li>Policy and Public-Affairs Coordinator</li><li>Lead Researcher</li><li>Technical Lead</li></ul>",

      "custom_tooltip": "<b>Develop certification strategy</b><br>Formulate a detailed strategy for certifying platform-neutral solutions under eIDAS, including identifying the necessary steps, resources, and timelines. Address assurance levels and conformity assessment requirements.<br><b>Resources needed:</b><br><ul><li>Lead Researcher</li><li>Technical Lead</li><li>Regulatory and Compliance Specialist</li><li>Policy and Public-Affairs Coordinator</li></ul>",

      "id": "004530d4-15c5-42ec-934b-c1366dc73b03",
      "text": "Set up GrapheneOS development environment",
      "custom_tooltip": "<b>Set up GrapheneOS development environment</b><br>Objective: Configure a secure and isolated development environment on GrapheneOS for FIDO2 implementation.\nScope: Includes installing necessary SDKs, libraries, and tools.\nSteps: 1. Install GrapheneOS on a test device. 2. Configure Android Studio or similar IDE. 3. Install FIDO2 libraries and dependencies. 4. Test the environment with a basic FIDO2 interaction.\nDeliverables: A fully functional development environment on GrapheneOS.<br><b>Resources needed:</b><br><ul><li>Engineer</li><li>GrapheneOS device</li><li>Android Studio</li></ul>",

      "id": "b6a7f206-97a2-44c5-b050-a6dcb9d885f1",
      "text": "Implement FIDO2 authentication flow",
      "custom_tooltip": "<b>Implement FIDO2 authentication flow</b><br>Objective: Develop the core FIDO2 authentication flow within the GrapheneOS environment.\nScope: Covers registration, authentication, and key management.\nSteps: 1. Implement FIDO2 registration process. 2. Implement FIDO2 authentication process. 3. Securely store and manage FIDO2 keys. 4. Test the authentication flow with a test server.\nDeliverables: A functional FIDO2 authentication flow on GrapheneOS.<br><b>Resources needed:</b><br><ul><li>Engineer</li><li>Mobile security expert</li></ul>",

      "id": "0eb3c4f7-9b27-4883-acd3-7a277b0698e0",
      "text": "Integrate with test authentication server",
      "custom_tooltip": "<b>Integrate with test authentication server</b><br>Objective: Integrate the FIDO2 implementation with a test authentication server for verification.\nScope: Includes setting up the test server and configuring communication protocols.\nSteps: 1. Set up a test authentication server. 2. Configure communication between GrapheneOS device and server. 3. Test the FIDO2 authentication flow with the server. 4. Troubleshoot any integration issues.\nDeliverables: Successful integration with a test authentication server.<br><b>Resources needed:</b><br><ul><li>Engineer</li><li>Web authentication expert</li></ul>",

      "text": "Secure FIDO2 implementation on GrapheneOS",
      "custom_tooltip": "<b>Secure FIDO2 implementation on GrapheneOS</b><br>Objective: Ensure the security of the FIDO2 implementation on GrapheneOS.\nScope: Includes vulnerability assessments, code reviews, and security hardening.\nSteps: 1. Conduct vulnerability assessments. 2. Perform code reviews. 3. Implement security hardening measures. 4. Test the security of the implementation.\nDeliverables: A secure FIDO2 implementation on GrapheneOS.<br><b>Resources needed:</b><br><ul><li>Mobile security expert</li><li>Security review specialist</li></ul>",

      "id": "271cd7c6-9a76-4e01-85e5-318571a26388",
      "text": "Design Browser Fallback Authentication Flow",
      "custom_tooltip": "<b>Design Browser Fallback Authentication Flow</b><br>Define the user experience and technical steps for the browser-based fallback authentication flow. This includes selecting appropriate authentication methods (e.g., OTP, email link), designing the user interface, and outlining the data flow between the browser, server, and any external services.<br><b>Resources needed:</b><br><ul><li>Web Authentication Expert</li><li>UI/UX Designer</li><li>Security Architect</li></ul>",

    },
    {
      "id": "7c855acb-2aac-4397-813c-3525cb949a41",
      "text": "Implement Server-Side Fallback Logic",
      "custom_tooltip": "<b>Implement Server-Side Fallback Logic</b><br>Develop the server-side components required to support the browser-based fallback authentication flow. This includes handling authentication requests, generating and verifying OTPs or email links, managing user sessions, and integrating with the existing authentication infrastructure.<br><b>Resources needed:</b><br><ul><li>Backend Engineer</li><li>Security Engineer</li><li>Database Administrator</li></ul>",
      "start_date": "2026-11-08",

    },
    {
      "id": "73e05302-3536-4a47-82f4-10ae0d72d8a7",
      "text": "Develop Browser-Side Fallback Interface",
      "custom_tooltip": "<b>Develop Browser-Side Fallback Interface</b><br>Create the user interface for the browser-based fallback authentication flow. This includes implementing the login form, OTP input fields, email link handling, and error messages. Ensure the interface is accessible, user-friendly, and secure.<br><b>Resources needed:</b><br><ul><li>Frontend Engineer</li><li>UI/UX Designer</li><li>Accessibility Expert</li></ul>",
      "start_date": "2026-11-13",

      "id": "96b0cac0-f7f6-4a93-ad47-2f4420b4597c",
      "text": "Test Browser Compatibility and Security",
      "custom_tooltip": "<b>Test Browser Compatibility and Security</b><br>Thoroughly test the browser-based fallback authentication flow across different browsers (Chrome, Firefox, Safari, Edge) and operating systems (Windows, macOS, Linux). Conduct security testing to identify and address any vulnerabilities, such as XSS or CSRF attacks.<br><b>Resources needed:</b><br><ul><li>Security Engineer</li><li>QA Tester</li><li>Browser Compatibility Specialist</li></ul>",
      "start_date": "2026-11-18",

      "text": "Prepare demonstrators for security review",
      "custom_tooltip": "<b>Prepare demonstrators for security review</b><br>Package the FIDO2 and browser-based demonstrators with necessary documentation for the external security review team. This includes code, architecture diagrams, and usage instructions.<br><b>Resources needed:</b><br><ul><li>Technical Lead</li><li>Engineers/Contractors</li></ul>",

      "custom_tooltip": "<b>Engage external security review firm</b><br>Finalize the contract with the selected external security firm. Provide them with access to the demonstrators and relevant documentation. Schedule kickoff meeting.<br><b>Resources needed:</b><br><ul><li>Lead Researcher</li><li>Technical Lead</li><li>Budget for external security review</li></ul>",

      "text": "Address security review findings",
      "custom_tooltip": "<b>Address security review findings</b><br>Review the security review report and prioritize identified vulnerabilities. Develop and implement remediation plans for each vulnerability. Retest remediated code.<br><b>Resources needed:</b><br><ul><li>Technical Lead</li><li>Engineers/Contractors</li><li>Security Review Specialist</li></ul>",

      "text": "Document security review process",
      "custom_tooltip": "<b>Document security review process</b><br>Create a comprehensive report documenting the entire security review process, including the initial assessment, identified vulnerabilities, remediation steps, and retesting results.<br><b>Resources needed:</b><br><ul><li>Technical Lead</li><li>Security Review Specialist</li></ul>",

      "id": "abb74865-68b7-45c5-8990-c00f5088ca2b",
      "text": "Prepare Test Environment Configuration",
      "custom_tooltip": "<b>Prepare Test Environment Configuration</b><br>Objective: Configure the test environment to accurately simulate the target deployment environment.\nScope: Includes setting up necessary servers, databases, and network configurations.\nSteps: 1. Identify required test environment components. 2. Configure servers and databases. 3. Set up network configurations. 4. Verify environment setup.\nDeliverables: Configured test environment.<br><b>Resources needed:</b><br><ul><li>System Administrator</li><li>Network Engineer</li><li>Database Administrator</li></ul>",

      "text": "Adapt Demonstrators for Test Environment",
      "custom_tooltip": "<b>Adapt Demonstrators for Test Environment</b><br>Objective: Modify the demonstrators to function correctly within the test environment.\nScope: Includes adjusting configuration files, API endpoints, and data sources.\nSteps: 1. Identify necessary modifications. 2. Update configuration files. 3. Adjust API endpoints. 4. Verify demonstrator functionality.\nDeliverables: Adapted demonstrators.<br><b>Resources needed:</b><br><ul><li>Technical Lead</li><li>Engineer</li></ul>",

      "id": "3d51086d-3132-4d75-be38-f68ebe14486f",
      "text": "Execute Integration Tests",
      "custom_tooltip": "<b>Execute Integration Tests</b><br>Objective: Perform integration tests to ensure the demonstrators function correctly within the test environment.\nScope: Includes running predefined test cases and documenting results.\nSteps: 1. Prepare test cases. 2. Execute test cases. 3. Document test results. 4. Analyze test results.\nDeliverables: Test results and analysis.<br><b>Resources needed:</b><br><ul><li>Engineer</li><li>Technical Lead</li></ul>",

      "text": "Address Integration Issues",
      "custom_tooltip": "<b>Address Integration Issues</b><br>Objective: Resolve any issues identified during integration testing.\nScope: Includes debugging, code modifications, and retesting.\nSteps: 1. Identify root cause of issues. 2. Implement fixes. 3. Retest affected components. 4. Verify issue resolution.\nDeliverables: Resolved integration issues.<br><b>Resources needed:</b><br><ul><li>Engineer</li><li>Technical Lead</li></ul>",

    {
      "id": "724a49b7-da44-4f46-b3f5-50de430d89d8",
      "text": "Identify Key Stakeholders for Coalition",
      "custom_tooltip": "<b>Identify Key Stakeholders for Coalition</b><br>Objective: Identify and prioritize key stakeholders (civil-society organizations, privacy advocates, academic researchers, security experts, contingency-planning stakeholders, and sympathetic members of Folketinget&#x27;s digital policy committee) for building a coalition of support.\nScope: Research and compile a list of relevant organizations and individuals, assess their potential interest and influence, and prioritize outreach efforts.\nSteps: 1. Conduct online research to identify potential stakeholders. 2. Analyze their mission, activities, and past involvement in digital identity and related issues. 3. Assess their potential interest and influence based on their expertise, network, and resources. 4. Prioritize outreach efforts based on the assessment.\nDeliverables: A prioritized list of key stakeholders with contact information and a brief assessment of their potential interest and influence.<br><b>Resources needed:</b><br><ul><li>Policy and Public-Affairs Coordinator</li><li>Lead Researcher</li></ul>",
      "start_date": "2026-12-21",
      "duration": 15.0,
      "progress": 0,
      "open": true,
      "meta": "59acc572-ad22-42f7-94b6-1998e1e5cf97 SS",

    },
    {
      "id": "3902e8fd-2412-474f-8069-9934b109af67",
      "text": "Develop Coalition Engagement Strategy",
      "custom_tooltip": "<b>Develop Coalition Engagement Strategy</b><br>Objective: Develop a comprehensive engagement strategy for building and maintaining a coalition of support.\nScope: Define the coalition&#x27;s goals, identify shared interests, develop messaging, and establish communication channels.\nSteps: 1. Define the coalition&#x27;s goals and objectives. 2. Identify shared interests among potential coalition members. 3. Develop compelling messaging that resonates with different stakeholders. 4. Establish clear communication channels and decision-making protocols. 5. Offer incentives for participation.\nDeliverables: A detailed coalition engagement strategy document outlining goals, messaging, communication channels, and incentives.<br><b>Resources needed:</b><br><ul><li>Policy and Public-Affairs Coordinator</li><li>Lead Researcher</li></ul>",
      "start_date": "2027-01-05",
      "duration": 15.0,
      "progress": 0,
      "open": true,
      "meta": "724a49b7-da44-4f46-b3f5-50de430d89d8 FS",

    },
    {
      "id": "8eaf83ac-7b34-4fdd-9fa0-9f9ffe43adc6",
      "text": "Conduct Initial Outreach to Stakeholders",
      "custom_tooltip": "<b>Conduct Initial Outreach to Stakeholders</b><br>Objective: Initiate contact with key stakeholders to gauge their interest in joining the coalition.\nScope: Prepare outreach materials, schedule meetings, and conduct initial conversations.\nSteps: 1. Prepare outreach materials, including a brief overview of the project and the coalition&#x27;s goals. 2. Schedule initial meetings with key stakeholders. 3. Conduct initial conversations to gauge their interest and address any concerns. 4. Follow up with stakeholders to provide additional information and answer questions.\nDeliverables: Records of initial outreach efforts, including meeting notes and follow-up communications.<br><b>Resources needed:</b><br><ul><li>Policy and Public-Affairs Coordinator</li><li>Lead Researcher</li></ul>",
      "start_date": "2027-01-20",
      "duration": 15.0,
      "progress": 0,

      "meta": "3902e8fd-2412-474f-8069-9934b109af67 FS",

    },
    {
      "id": "e7aacef4-37bd-4459-8d36-c29a2c449c37",
      "text": "Formalize Coalition Structure and Agreements",
      "custom_tooltip": "<b>Formalize Coalition Structure and Agreements</b><br>Objective: Establish a formal structure for the coalition and develop agreements outlining roles, responsibilities, and decision-making processes.\nScope: Define the coalition&#x27;s governance structure, draft a memorandum of understanding, and establish communication protocols.\nSteps: 1. Define the coalition&#x27;s governance structure (e.g., steering committee, working groups). 2. Draft a memorandum of understanding outlining roles, responsibilities, and decision-making processes. 3. Establish clear communication protocols for sharing information and coordinating activities. 4. Obtain formal agreement from coalition members.\nDeliverables: A signed memorandum of understanding and a documented governance structure.<br><b>Resources needed:</b><br><ul><li>Policy and Public-Affairs Coordinator</li><li>Lead Researcher</li><li>Legal Counsel (limited)</li></ul>",
      "start_date": "2027-02-04",
      "duration": 15.0,
      "progress": 0,
      "open": true,
      "meta": "59acc572-ad22-42f7-94b6-1998e1e5cf97 FF, 8eaf83ac-7b34-4fdd-9fa0-9f9ffe43adc6 FS",

    },

      "id": "a414a7d3-6b12-4561-b497-b7adf8d50fc5",
      "text": "Research Digitaliseringsstyrelsen's policy priorities",
      "custom_tooltip": "<b>Research Digitaliseringsstyrelsen&#x27;s policy priorities</b><br>Objective: Understand the current policy priorities of Digitaliseringsstyrelsen related to digital identity and platform neutrality.\nScope: Review publicly available documents, reports, and statements from Digitaliseringsstyrelsen.\nSteps: 1. Identify relevant documents. 2. Analyze the documents for key themes and priorities. 3. Summarize findings.\nDeliverables: A summary report outlining Digitaliseringsstyrelsen&#x27;s policy priorities.<br><b>Resources needed:</b><br><ul><li>Policy and Public-Affairs Coordinator</li><li>Lead Researcher</li></ul>",

      "id": "d8c0f57c-62a0-4e26-b17f-a2a3a4e568ab",
      "text": "Draft initial advocacy messaging",
      "custom_tooltip": "<b>Draft initial advocacy messaging</b><br>Objective: Develop initial advocacy messaging that highlights the benefits of platform neutrality and fallback access.\nScope: Craft compelling arguments tailored to Digitaliseringsstyrelsen&#x27;s priorities.\nSteps: 1. Develop key messages. 2. Refine messaging based on research. 3. Create briefing materials.\nDeliverables: Draft advocacy messaging and briefing materials.<br><b>Resources needed:</b><br><ul><li>Policy and Public-Affairs Coordinator</li><li>Lead Researcher</li></ul>",

    {
      "id": "bd1ce63a-d45f-42db-b4a5-ef278bf58ce0",
      "text": "Refine messaging based on stakeholder feedback",
      "custom_tooltip": "<b>Refine messaging based on stakeholder feedback</b><br>Objective: Refine advocacy messaging based on feedback from coalition members and other stakeholders.\nScope: Incorporate feedback to strengthen the messaging and address potential concerns.\nSteps: 1. Share draft messaging with stakeholders. 2. Collect feedback. 3. Revise messaging based on feedback.\nDeliverables: Refined advocacy messaging.<br><b>Resources needed:</b><br><ul><li>Policy and Public-Affairs Coordinator</li><li>Lead Researcher</li><li>Coalition Members</li></ul>",

    },
    {
      "id": "2da7cfa5-c629-4fda-9833-27e5ad789ce8",
      "text": "Prepare presentation materials for Digitaliseringsstyrelsen",
      "custom_tooltip": "<b>Prepare presentation materials for Digitaliseringsstyrelsen</b><br>Objective: Prepare presentation materials for meetings with Digitaliseringsstyrelsen representatives.\nScope: Create a clear and concise presentation that effectively communicates the project&#x27;s goals and benefits.\nSteps: 1. Develop presentation slides. 2. Practice the presentation. 3. Finalize presentation materials.\nDeliverables: Presentation materials for Digitaliseringsstyrelsen.<br><b>Resources needed:</b><br><ul><li>Policy and Public-Affairs Coordinator</li><li>Lead Researcher</li><li>Technical Lead</li></ul>",

      "custom_tooltip": "<b>Identify Key Digitaliseringsstyrelsen Contacts</b><br>Identify individuals within Digitaliseringsstyrelsen who are most relevant to the project&#x27;s goals and have the authority to influence decisions related to digital identity and procurement.<br><b>Resources needed:</b><br><ul><li>Policy and Public-Affairs Coordinator</li><li>Lead Researcher</li></ul>",

      "custom_tooltip": "<b>Schedule Initial Introductory Meeting</b><br>Request and schedule an initial meeting with identified key contacts at Digitaliseringsstyrelsen to introduce the project, its goals, and its potential benefits for Danish digital identity.<br><b>Resources needed:</b><br><ul><li>Policy and Public-Affairs Coordinator</li><li>Lead Researcher</li></ul>",

    {
      "id": "fc4fa905-2d44-4b3e-b090-1f26e9f6c4f8",
      "text": "Identify relevant AltID procurement sources",
      "custom_tooltip": "<b>Identify relevant AltID procurement sources</b><br>Objective: Determine where AltID procurement documents are published or available.\nScope: Research official websites, databases, and contact relevant agencies.\nSteps: 1. Search Digitaliseringsstyrelsen website. 2. Contact relevant personnel. 3. Explore EU procurement databases.\nDeliverables: List of sources for procurement documents.<br><b>Resources needed:</b><br><ul><li>Policy and Public-Affairs Coordinator</li><li>Lead Researcher</li></ul>",

    {
      "id": "26170a1d-c370-4142-8ecb-469253cefd83",
      "text": "Gather AltID procurement documents",
      "custom_tooltip": "<b>Gather AltID procurement documents</b><br>Objective: Collect all available AltID procurement documents from identified sources.\nScope: Obtain documents related to current and past procurement activities.\nSteps: 1. Download documents from online sources. 2. Request documents from contacts. 3. Organize documents in a central repository.\nDeliverables: Complete collection of AltID procurement documents.<br><b>Resources needed:</b><br><ul><li>Policy and Public-Affairs Coordinator</li><li>Lead Researcher</li></ul>",
      "start_date": "2027-06-06",

    {
      "id": "12bea96d-f828-416e-ae38-fdcfb1165346",
      "text": "Review documents for platform neutrality",
      "custom_tooltip": "<b>Review documents for platform neutrality</b><br>Objective: Identify sections related to platform requirements.\nScope: Analyze documents for mentions of platform neutrality, open standards, or vendor lock-in.\nSteps: 1. Scan documents for keywords. 2. Highlight relevant sections. 3. Summarize findings.\nDeliverables: Report on platform neutrality mentions.<br><b>Resources needed:</b><br><ul><li>Regulatory and Compliance Specialist</li><li>Technical Lead</li></ul>",
      "start_date": "2027-06-09",
      "duration": 3.0,

    {
      "id": "e3b83869-b5e9-4538-8cc0-e3c7e8dbd050",
      "text": "Assess completeness of documentation",
      "custom_tooltip": "<b>Assess completeness of documentation</b><br>Objective: Determine if the collected documents provide a complete picture of AltID procurement.\nScope: Identify any gaps in the documentation and plan to address them.\nSteps: 1. Compare documents against expected content. 2. Identify missing information. 3. Develop a plan to obtain missing documents.\nDeliverables: Report on documentation completeness.<br><b>Resources needed:</b><br><ul><li>Lead Researcher</li><li>Policy and Public-Affairs Coordinator</li></ul>",

      "custom_tooltip": "<b>Advocate for Platform-Neutral Language in Procurement Documents</b>",

    {
      "id": "933d87c4-07de-4c03-9c23-de427d76efeb",
      "text": "Identify Key Procurement Requirements",
      "custom_tooltip": "<b>Identify Key Procurement Requirements</b><br>Objective: Determine the specific requirements and criteria outlined in the AltID procurement documents related to platform neutrality.\nScope: Review all relevant sections of the procurement documents, including technical specifications, evaluation criteria, and contractual terms.\nSteps: 1. Obtain the AltID procurement documents. 2. Identify sections related to platform compatibility, interoperability, and vendor lock-in. 3. Extract specific requirements and criteria related to platform neutrality.\nDeliverables: A summary of key procurement requirements related to platform neutrality.<br><b>Resources needed:</b><br><ul><li>Regulatory and Compliance Specialist</li><li>Technical Lead</li><li>Procurement Lawyer</li></ul>",
      "start_date": "2027-06-15",
      "duration": 5.0,
      "progress": 0,
      "open": true,
      "meta": "4a5dad17-0a9b-4948-a27f-bbd7baf5a6c6 SS",

    {
      "id": "0ee8ed98-72c1-4d51-b979-9dde22fc4d9b",
      "text": "Analyze Technical Specifications for Platform Bias",
      "custom_tooltip": "<b>Analyze Technical Specifications for Platform Bias</b><br>Objective: Analyze the technical specifications within the AltID procurement documents to identify potential biases towards specific platforms or technologies.\nScope: Examine the technical requirements for authentication methods, security protocols, and integration interfaces.\nSteps: 1. Review the technical specifications for authentication methods (e.g., FIDO2, WebAuthn). 2. Identify any requirements that favor specific platforms or vendors. 3. Assess the impact of these biases on platform neutrality.\nDeliverables: A report identifying potential platform biases in the technical specifications.<br><b>Resources needed:</b><br><ul><li>Technical Lead</li><li>Engineer</li><li>Mobile Security Expert</li></ul>",
      "start_date": "2027-06-20",
      "duration": 5.0,
      "progress": 0,
      "open": true,
      "meta": "933d87c4-07de-4c03-9c23-de427d76efeb FS",
      "parent": "4a5dad17-0a9b-4948-a27f-bbd7baf5a6c6"
    },
    {
      "id": "e336f171-2b20-436c-8298-1d26ace8d622",
      "text": "Assess Evaluation Criteria for Platform Neutrality",
      "custom_tooltip": "<b>Assess Evaluation Criteria for Platform Neutrality</b><br>Objective: Evaluate the evaluation criteria used in the AltID procurement process to determine if they adequately consider platform neutrality.\nScope: Review the criteria used to assess vendor proposals and identify any potential biases.\nSteps: 1. Review the evaluation criteria for technical merit, cost-effectiveness, and security. 2. Assess whether the criteria explicitly reward or penalize platform-neutral solutions. 3. Identify any gaps in the evaluation process related to platform neutrality.\nDeliverables: An assessment of the evaluation criteria&#x27;s impact on platform neutrality.<br><b>Resources needed:</b><br><ul><li>Regulatory and Compliance Specialist</li><li>Policy and Public-Affairs Coordinator</li><li>Procurement Lawyer</li></ul>",
      "start_date": "2027-06-25",
      "duration": 5.0,
      "progress": 0,
      "open": true,
      "meta": "0ee8ed98-72c1-4d51-b979-9dde22fc4d9b FS",
      "parent": "4a5dad17-0a9b-4948-a27f-bbd7baf5a6c6"
    },
    {
      "id": "a1abb0e8-d17d-454e-9606-5513c8407991",
      "text": "Draft Alternative Procurement Language",
      "custom_tooltip": "<b>Draft Alternative Procurement Language</b><br>Objective: Develop alternative procurement language that promotes platform neutrality and avoids vendor lock-in.\nScope: Create specific wording for technical specifications, evaluation criteria, and contractual terms.\nSteps: 1. Research best practices for platform-neutral procurement language. 2. Draft alternative wording for key sections of the AltID procurement documents. 3. Ensure that the language is clear, concise, and enforceable.\nDeliverables: A set of alternative procurement language recommendations.<br><b>Resources needed:</b><br><ul><li>Policy and Public-Affairs Coordinator</li><li>Technical Lead</li><li>Procurement Lawyer</li></ul>",
      "start_date": "2027-06-30",
      "duration": 5.0,
      "progress": 0,
      "open": true,
      "meta": "4a5dad17-0a9b-4948-a27f-bbd7baf5a6c6 FF, e336f171-2b20-436c-8298-1d26ace8d622 FS",
      "parent": "4a5dad17-0a9b-4948-a27f-bbd7baf5a6c6"

      "id": "a135391b-1989-400f-be34-24628cdba304",
      "text": "Prepare Persuasive Arguments",
      "custom_tooltip": "<b>Prepare Persuasive Arguments</b><br>Prepare well-researched and persuasive arguments for platform-neutral standards. This involves gathering evidence to support the benefits of platform neutrality, developing clear and concise messaging, and tailoring arguments to the specific concerns of different stakeholders.<br><b>Resources needed:</b><br><ul><li>Lead Researcher</li><li>Technical Lead</li><li>Policy and Public-Affairs Coordinator</li></ul>",

      "text": "Identify Key eIDAS2 Stakeholders",
      "custom_tooltip": "<b>Identify Key eIDAS2 Stakeholders</b><br>Identify and map key individuals and organizations involved in the eIDAS2 standardization process, including representatives from member states, industry, and academia. This will involve desk research, attending industry events, and networking with relevant contacts.<br><b>Resources needed:</b><br><ul><li>Policy and Public-Affairs Coordinator</li><li>Lead Researcher</li></ul>",

    {
      "id": "d3c37be4-2564-4479-88eb-c9958ae80d5a",
      "text": "Analyze eIDAS2 Draft Standards",
      "custom_tooltip": "<b>Analyze eIDAS2 Draft Standards</b><br>Thoroughly review and analyze the draft eIDAS2 standards to identify areas where platform-neutral approaches can be incorporated or strengthened. This will involve technical analysis, legal review, and consultation with experts.<br><b>Resources needed:</b><br><ul><li>Technical Lead</li><li>Regulatory and Compliance Specialist</li><li>Lead Researcher</li></ul>",

    {
      "id": "f60a8670-6cc3-427b-85fd-3c83c5959859",
      "text": "Develop Platform-Neutral Standard Proposals",
      "custom_tooltip": "<b>Develop Platform-Neutral Standard Proposals</b><br>Develop concrete proposals for incorporating platform-neutral standards into eIDAS2, including specific technical specifications and implementation guidelines. This will involve technical writing, collaboration with experts, and stakeholder consultation.<br><b>Resources needed:</b><br><ul><li>Technical Lead</li><li>Regulatory and Compliance Specialist</li><li>Policy and Public-Affairs Coordinator</li></ul>",

    {

      "text": "Present Proposals to eIDAS2 Working Groups",
      "custom_tooltip": "<b>Present Proposals to eIDAS2 Working Groups</b><br>Present the platform-neutral standard proposals to relevant eIDAS2 working groups and advocate for their adoption. This will involve preparing presentations, attending meetings, and engaging in discussions with stakeholders.<br><b>Resources needed:</b><br><ul><li>Policy and Public-Affairs Coordinator</li><li>Technical Lead</li><li>Lead Researcher</li></ul>",

    {
