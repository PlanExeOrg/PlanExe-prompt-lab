    {
      "id": "dc88ca39-5e4a-45ad-94eb-4be94d22650f",
      "text": "Publish Feasibility Report",
      "custom_tooltip": "<b>Publish Feasibility Report</b>",
      "progress": 0,
      "open": true,
      "meta": "22fd76fb-e29e-4f01-b67e-04c0910ea34c SS",
      "parent": "22fd76fb-e29e-4f01-b67e-04c0910ea34c",
      "type": "project"
    },
    {
      "id": "3565b10c-f7f9-459d-b58f-7c2465d7ed32",
      "text": "Synthesize research findings into report",
      "custom_tooltip": "<b>Synthesize research findings into report</b><br>Objective: Compile all research data, analysis, and demonstrator results into a cohesive and persuasive feasibility report.\nScope: Includes summarizing technical findings, regulatory analysis, policy recommendations, and financial implications.\nSteps: Review all project documentation, draft report sections, integrate findings, and ensure consistency.\nDeliverables: A complete draft of the feasibility report.<br><b>Resources needed:</b><br><ul><li>Lead Researcher</li><li>Technical Lead</li><li>Regulatory and Compliance Specialist</li><li>Policy and Public-Affairs Coordinator</li></ul>",
      "start_date": "2027-10-05",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "dc88ca39-5e4a-45ad-94eb-4be94d22650f SS",
      "parent": "dc88ca39-5e4a-45ad-94eb-4be94d22650f"
    },
    {
      "id": "19103b9c-5313-4e2e-bd4b-1d51bcc2a055",
      "text": "Obtain internal review and feedback",
      "custom_tooltip": "<b>Obtain internal review and feedback</b><br>Objective: Circulate the draft feasibility report among internal stakeholders for review and feedback.\nScope: Includes primary stakeholders (Lead Researcher, Technical Lead, etc.) and potentially key secondary stakeholders.\nSteps: Distribute the report, schedule review meetings, collect feedback, and document all comments.\nDeliverables: A consolidated list of feedback and suggested revisions.<br><b>Resources needed:</b><br><ul><li>Lead Researcher</li><li>Project Manager</li></ul>",
      "start_date": "2027-10-09",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "3565b10c-f7f9-459d-b58f-7c2465d7ed32 FS",
      "parent": "dc88ca39-5e4a-45ad-94eb-4be94d22650f"
    },
    {
      "id": "530f5678-94a7-4c18-9495-f0903d425f85",
      "text": "Incorporate feedback and revise report",
      "custom_tooltip": "<b>Incorporate feedback and revise report</b><br>Objective: Address all feedback received and revise the feasibility report accordingly.\nScope: Includes incorporating technical corrections, clarifying policy recommendations, and improving overall readability.\nSteps: Review feedback, prioritize revisions, implement changes, and ensure accuracy.\nDeliverables: A revised draft of the feasibility report.<br><b>Resources needed:</b><br><ul><li>Lead Researcher</li><li>Technical Lead</li><li>Regulatory and Compliance Specialist</li><li>Policy and Public-Affairs Coordinator</li></ul>",
      "start_date": "2027-10-13",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "19103b9c-5313-4e2e-bd4b-1d51bcc2a055 FS",
      "parent": "dc88ca39-5e4a-45ad-94eb-4be94d22650f"
    },
    {
      "id": "f64825de-bfc7-494f-b73a-b41e039033fa",
      "text": "Secure final approvals for publication",
      "custom_tooltip": "<b>Secure final approvals for publication</b><br>Objective: Obtain final approvals from relevant authorities for publishing the feasibility report.\nScope: Includes internal approvals (e.g., from the project sponsor) and potentially external approvals (e.g., from Digitaliseringsstyrelsen).\nSteps: Submit the revised report for approval, address any remaining concerns, and obtain formal sign-off.\nDeliverables: Formal approval to publish the feasibility report.<br><b>Resources needed:</b><br><ul><li>Lead Researcher</li><li>Policy and Public-Affairs Coordinator</li></ul>",
      "start_date": "2027-10-17",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "530f5678-94a7-4c18-9495-f0903d425f85 FS",
      "parent": "dc88ca39-5e4a-45ad-94eb-4be94d22650f"
    },
    {
      "id": "c94d0e46-4a10-4f4d-a8ed-8a857786348d",
      "text": "Publish and disseminate feasibility report",
      "custom_tooltip": "<b>Publish and disseminate feasibility report</b><br>Objective: Publish the final feasibility report and disseminate it to relevant stakeholders.\nScope: Includes publishing the report online, distributing it to key contacts, and promoting it through relevant channels.\nSteps: Prepare the report for publication, upload it to the project website, notify stakeholders, and track dissemination efforts.\nDeliverables: Published feasibility report and documented dissemination activities.<br><b>Resources needed:</b><br><ul><li>Policy and Public-Affairs Coordinator</li><li>Communications Specialist</li></ul>",
      "start_date": "2027-10-21",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "dc88ca39-5e4a-45ad-94eb-4be94d22650f FF, f64825de-bfc7-494f-b73a-b41e039033fa FS",
      "parent": "dc88ca39-5e4a-45ad-94eb-4be94d22650f"
    },

      "id": "cf49d695-57fa-4c55-b4f1-845db19015f6",
      "text": "Deliver Working Demonstrators",
      "custom_tooltip": "<b>Deliver Working Demonstrators</b>",

    {
      "id": "35b7eea0-7c39-480d-9465-7df140571764",
      "text": "Prepare Demonstrator Packaging",
      "custom_tooltip": "<b>Prepare Demonstrator Packaging</b><br>Package the FIDO2 and browser-based demonstrators for distribution, including all necessary files, documentation, and installation instructions. Ensure the packaging is user-friendly and secure.<br><b>Resources needed:</b><br><ul><li>Technical Lead</li><li>Engineer</li><li>Documentation Specialist</li></ul>",
      "start_date": "2027-10-25",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "cf49d695-57fa-4c55-b4f1-845db19015f6 SS",

    },
    {
      "id": "cd646bcb-6b9d-4828-801f-bc93d484e7f5",
      "text": "Test Demonstrator Deployment",
      "custom_tooltip": "<b>Test Demonstrator Deployment</b><br>Thoroughly test the deployment process of both demonstrators in a controlled environment to identify and resolve any issues. Verify that the demonstrators function as expected after deployment.<br><b>Resources needed:</b><br><ul><li>Technical Lead</li><li>Engineer</li><li>Security Review Specialist</li></ul>",
      "start_date": "2027-10-28",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "35b7eea0-7c39-480d-9465-7df140571764 FS",
      "parent": "cf49d695-57fa-4c55-b4f1-845db19015f6"
    },
    {
      "id": "273c6f22-8bd1-411d-abdc-534d31cfa0f9",
      "text": "Obtain Final Sign-Off",
      "custom_tooltip": "<b>Obtain Final Sign-Off</b><br>Obtain final sign-off from relevant stakeholders (e.g., Digitaliseringsstyrelsen, project sponsors) on the demonstrators, confirming that they meet the agreed-upon requirements and are ready for delivery.<br><b>Resources needed:</b><br><ul><li>Lead Researcher</li><li>Policy and Public-Affairs Coordinator</li></ul>",
      "start_date": "2027-10-31",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "cd646bcb-6b9d-4828-801f-bc93d484e7f5 FS",
      "parent": "cf49d695-57fa-4c55-b4f1-845db19015f6"
    },
    {
      "id": "8c194074-d963-4617-9161-eb6e840ff1fe",
      "text": "Deliver Demonstrators to Stakeholders",
      "custom_tooltip": "<b>Deliver Demonstrators to Stakeholders</b><br>Deliver the packaged demonstrators to the designated stakeholders, providing any necessary support or training. Ensure that stakeholders have the resources and information they need to effectively utilize the demonstrators.<br><b>Resources needed:</b><br><ul><li>Policy and Public-Affairs Coordinator</li><li>Technical Lead</li></ul>",
      "start_date": "2027-11-03",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "cf49d695-57fa-4c55-b4f1-845db19015f6 FF, 273c6f22-8bd1-411d-abdc-534d31cfa0f9 FS",
      "parent": "cf49d695-57fa-4c55-b4f1-845db19015f6"
    },

    {
      "id": "22ac4afb-8cce-4fea-b568-469d677e51ee",
      "text": "Create dissemination materials",
      "custom_tooltip": "<b>Create dissemination materials</b><br>Objective: Develop engaging and informative materials to communicate project findings.\nScope: Includes creating a project website, summary reports, presentations, and social media content.\nSteps: Design materials, write content, obtain approvals, and prepare for distribution.\nDeliverables: Website, reports, presentations, social media posts.<br><b>Resources needed:</b><br><ul><li>Policy and Public-Affairs Coordinator</li><li>Lead Researcher</li><li>Graphic designer</li><li>Web developer</li></ul>",
      "start_date": "2027-11-22",

      "open": true,
      "meta": "5d34ded8-d96a-45cb-b6c5-0c922a3469b4 SS",

    {
      "id": "da5d2e29-d360-41d3-874e-bba346a1262e",
      "text": "Identify target audiences",
      "custom_tooltip": "<b>Identify target audiences</b><br>Objective: Determine the key stakeholders to reach with project results.\nScope: Includes identifying relevant policymakers, industry experts, civil society organizations, and the general public.\nSteps: Conduct stakeholder analysis, prioritize audiences, and develop targeted messaging.\nDeliverables: List of target audiences with contact information and communication preferences.<br><b>Resources needed:</b><br><ul><li>Policy and Public-Affairs Coordinator</li><li>Lead Researcher</li></ul>",
      "start_date": "2027-11-24",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "22ac4afb-8cce-4fea-b568-469d677e51ee FS",
      "parent": "5d34ded8-d96a-45cb-b6c5-0c922a3469b4"
    },
    {
      "id": "c9a47bdd-de48-401c-87d3-849995d2b729",
      "text": "Distribute results through channels",
      "custom_tooltip": "<b>Distribute results through channels</b><br>Objective: Effectively disseminate project findings to target audiences.\nScope: Includes utilizing various communication channels such as email, social media, conferences, and publications.\nSteps: Schedule dissemination activities, send out materials, track engagement, and gather feedback.\nDeliverables: Dissemination schedule, email campaigns, social media posts, conference presentations, publications.<br><b>Resources needed:</b><br><ul><li>Policy and Public-Affairs Coordinator</li><li>Lead Researcher</li><li>Communications specialist</li></ul>",
      "start_date": "2027-11-26",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "da5d2e29-d360-41d3-874e-bba346a1262e FS",

    },
    {
      "id": "c11c251d-ca00-4d3d-9ea1-b31081106226",
      "text": "Monitor and evaluate impact",
      "custom_tooltip": "<b>Monitor and evaluate impact</b><br>Objective: Assess the effectiveness of dissemination efforts and measure the impact of project results.\nScope: Includes tracking website traffic, social media engagement, media coverage, and policy changes.\nSteps: Collect data, analyze results, and prepare an evaluation report.\nDeliverables: Evaluation report with key findings and recommendations.<br><b>Resources needed:</b><br><ul><li>Policy and Public-Affairs Coordinator</li><li>Lead Researcher</li><li>Data analyst</li></ul>",
      "start_date": "2027-11-28",
      "duration": 2.0,

    function zoomFit() {
        const tasks = gantt.getTaskByTime();
        if (tasks.length > 0) {
            const firstTask = tasks[0];
            const lastTask = tasks[tasks.length - 1];
            gantt.showDate(firstTask.start_date);
            
            // Calculate total duration in days
            const startDate = new Date(firstTask.start_date);
            const endDate = new Date(lastTask.end_date);
            const durationDays = (endDate - startDate) / (1000 * 60 * 60 * 24);
            
            // Choose appropriate scale based on duration
            if (durationDays > 3650) { // More than 10 years
                gantt.config.scale_unit = "year";
                gantt.config.step = 10;
                gantt.config.subscales = [
                    {unit: "year", step: 1, date: "%Y"}
                ];
            } else if (durationDays > 365) { // More than 1 year
                gantt.config.scale_unit = "year";
                gantt.config.step = 1;
                gantt.config.subscales = [
                    {unit: "month", step: 1, date: "%M"}
                ];
            } else if (durationDays > 30) { // More than 1 month
                gantt.config.scale_unit = "month";
                gantt.config.step = 1;
                gantt.config.subscales = [
                    {unit: "day", step: 1, date: "%d"}
                ];
            } else if (durationDays > 7) { // More than 1 week
                gantt.config.scale_unit = "week";
                gantt.config.step = 1;
                gantt.config.subscales = [
                    {unit: "day", step: 1, date: "%d"}
                ];
            } else {
                gantt.config.scale_unit = "day";
                gantt.config.step = 1;
                gantt.config.subscales = [];
            }
            gantt.render();
        }
    }

    function zoomIn() {
        const currentUnit = gantt.config.scale_unit;
        const currentStep = gantt.config.step;
        
        if (currentUnit === "year" && currentStep === 10) {
            gantt.config.scale_unit = "year";
            gantt.config.step = 1;
            gantt.config.subscales = [
                {unit: "month", step: 1, date: "%M"}
            ];
        } else if (currentUnit === "year") {
            gantt.config.scale_unit = "month";
            gantt.config.step = 1;
            gantt.config.subscales = [
                {unit: "day", step: 1, date: "%d"}
            ];
        } else if (currentUnit === "month") {
            gantt.config.scale_unit = "week";
            gantt.config.step = 1;
            gantt.config.subscales = [
                {unit: "day", step: 1, date: "%d"}
            ];
        } else if (currentUnit === "week") {
            gantt.config.scale_unit = "day";
            gantt.config.step = 1;
            gantt.config.subscales = [];
        }
        gantt.render();
    }

    function zoomOut() {
        const currentUnit = gantt.config.scale_unit;
        const currentStep = gantt.config.step;
        
        if (currentUnit === "day") {
            gantt.config.scale_unit = "week";
            gantt.config.step = 1;
            gantt.config.subscales = [
                {unit: "day", step: 1, date: "%d"}
            ];
        } else if (currentUnit === "week") {
            gantt.config.scale_unit = "month";
            gantt.config.step = 1;
            gantt.config.subscales = [
                {unit: "day", step: 1, date: "%d"}
            ];
        } else if (currentUnit === "month") {
            gantt.config.scale_unit = "year";
            gantt.config.step = 1;
            gantt.config.subscales = [
                {unit: "month", step: 1, date: "%M"}
            ];
        } else if (currentUnit === "year") {
            gantt.config.scale_unit = "year";
            gantt.config.step = 10;
            gantt.config.subscales = [
                {unit: "year", step: 1, date: "%Y"}
            ];
        }
        gantt.render();
    }

    function downloadCSV() {
        if (GANTT_DATA_CSV === null) {
            return;
        }
        const blob = new Blob([GANTT_DATA_CSV], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        const url = URL.createObjectURL(blob);
        link.setAttribute('href', url);
        link.setAttribute('download', GANTT_FILENAME_CSV);
        link.style.visibility = 'hidden';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    // Gantt Initialization
    gantt.config.readonly = true;
    gantt.config.date_format = "%Y-%m-%d";
    gantt.config.scale_unit = "month";
    gantt.config.step = 1;
    gantt.config.subscales = [
        {unit: "day", step: 1, date: "%d"}
    ];

    gantt.config.columns = [
        {name:"text", label:"Task name", width:"*", tree:true},
        // {name:"start_date", label:"Start time", align: "center"},
        // {name:"duration", label:"Duration", align: "center"}
    ];

    gantt.templates.task_class = function(start, end, task) {
        if (task.type === "project") {
            return "project-task";
        }
        return "";
    };

    gantt.templates.tooltip_text = function(start, end, task) {
        return task.custom_tooltip || "No tooltip";
    };
    
	gantt.plugins({
		tooltip: true
	});
	gantt.attachEvent("onGanttReady", function(){
		var tooltips = gantt.ext.tooltips;
		tooltips.tooltip.setViewport(gantt.$task_data);
	});
    gantt.init("gantt_container");
    gantt.parse(GANTT_DATA_DHTMLX);

    // Hide the export to CSV button if there is no CSV data
    if (GANTT_DATA_CSV === null) {
        document.getElementById('exportToCSVButton').style.display = 'none';
    }

    document.getElementById('zoomFitButton').addEventListener('click', zoomFit);
    document.getElementById('zoomInButton').addEventListener('click', zoomIn);
    document.getElementById('zoomOutButton').addEventListener('click', zoomOut);
    document.getElementById('exportToCSVButton').addEventListener('click', downloadCSV);
</script>
<!--HTML_BODY_SCRIPT_END-->
</body>
</html>
