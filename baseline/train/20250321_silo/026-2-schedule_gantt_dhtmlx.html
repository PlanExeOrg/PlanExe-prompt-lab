e8f4712c2,Source Replacement Parts and New Technologies,\"Source Replacement Parts and New Technologies\n\nDescription:\nIdentify and procure necessary replacement parts for existing systems, as well as research and evaluate new technologies that could improve silo operations and efficiency. This includes contacting vendors, comparing specifications, and negotiating contracts.\n\nResources needed:\n\u2022 Procurement Specialists\n\u2022 System Engineers\n\u2022 Technology Researchers\n\u2022 Vendor Database\",8/9/2059,11/27/2059,0,9263f8c1-ba46-4b37-a11d-7436ce3daa9e,PlanExe\n34978561-9cc2-4569-a61e-0d7389d3edf9,Schedule and Execute Maintenance/Upgrade Activities,\"Schedule and Execute Maintenance/Upgrade Activities\n\nDescription:\nDevelop a detailed schedule for maintenance and upgrade activities, taking into account system dependencies, resource availability, and potential disruptions to silo operations. Execute the schedule, ensuring all work is performed to required standards and safety protocols.\n\nResources needed:\n\u2022 Project Manager\n\u2022 Maintenance Technicians\n\u2022 System Engineers\n\u2022 Safety Inspectors\n\u2022 Construction Crew\",11/27/2059,3/16/2060,0,47d310a3-9ffd-460c-9ade-06ce8f4712c2,PlanExe\n8a6441de-756b-43e1-946e-e8aa7c3ff19e,Test and Validate System Improvements,\"Test and Validate System Improvements\n\nDescription:\nAfter maintenance or upgrades are completed, conduct thorough testing and validation to ensure that systems are functioning correctly and meeting performance targets. This includes running simulations, analyzing data, and obtaining sign-off from relevant stakeholders.\n\nResources needed:\n\u2022 System Engineers\n\u2022 Testing Specialists\n\u2022 Data Analysts\n\u2022 Quality Assurance Team\",3/16/2060,7/4/2060,0,34978561-9cc2-4569-a61e-0d7389d3edf9,PlanExe\nd1c12dbd-4df4-43ab-9e59-06534722e0ea,Document Changes and Update Procedures,\"Document Changes and Update Procedures\n\nDescription:\nUpdate all relevant documentation, including system manuals, operating procedures, and training materials, to reflect any changes made during maintenance or upgrade activities. Ensure that all personnel are trained on the updated procedures.\n\nResources needed:\n\u2022 Technical Writers\n\u2022 Training Specialists\n\u2022 System Engineers\n\u2022 Documentation Management System\",7/4/2060,10/22/2060,0,64989431-c5ae-469f-b8d5-a2cf8f223925,PlanExe\n2c6f7fa0-752e-4a5d-b2a5-b3af151dd5dd,Manage Resource Allocation,,10/22/2060,4/23/2062,0,64989431-c5ae-469f-b8d5-a2cf8f223925,PlanExe\n2f6fedd7-4f6c-4c8e-832c-5f61f82cd044,Assess Current Resource Levels and Consumption,\"Assess Current Resource Levels and Consumption\n\nDescription:\nObjective: Determine current resource stores and consumption rates.\nScope: Inventory all resources (food, water, energy, materials) and analyze usage patterns.\nSteps: 1. Conduct physical inventory. 2. Analyze historical consumption data. 3. Project future needs based on population and activities.\nDeliverables: Resource inventory report and consumption forecast.\n\nResources needed:\n\u2022 Resource Manager\n\u2022 Data Analyst\n\u2022 Inventory Specialist\",10/22/2060,3/8/2061,0,2c6f7fa0-752e-4a5d-b2a5-b3af151dd5dd,PlanExe\n7a706776-6145-4a7f-9792-21c8421c6378,Model Resource Flows and Dependencies,\"Model Resource Flows and Dependencies\n\nDescription:\nObjective: Understand the interdependencies of resource production, consumption, and recycling.\nScope: Create a system dynamics model of resource flows within the silo.\nSteps: 1. Map resource flows. 2. Identify critical dependencies. 3. Develop simulation model.\nDeliverables: Resource flow diagram and simulation model.\n\nResources needed:\n\u2022 System Dynamics Modeler\n\u2022 Environmental Engineer\n\u2022 Agricultural Specialist\",3/8/2061,7/23/2061,0,2f6fedd7-4f6c-4c8e-832c-5f61f82cd044,PlanExe\n7aafcdc6-fbdb-4beb-b0d7-1a4fe4bd14d5,Develop Resource Allocation Strategies (2),\"Develop Resource Allocation Strategies\n\nDescription:\nObjective: Create strategies for allocating resources based on priorities and constraints.\nScope: Define allocation rules and procedures for different scenarios.\nSteps: 1. Define resource allocation priorities. 2. Develop allocation rules. 3. Establish monitoring and enforcement mechanisms.\nDeliverables: Resource allocation plan and procedures.\n\nResources needed:\n\u2022 Resource Manager\n\u2022 Social Systems Planner\n\u2022 Governance Administrator\",7/23/2061,12/7/2061,0,7a706776-6145-4a7f-9792-21c8421c6378,PlanExe\n459e4838-ca33-4dd5-8732-ad677e0d24c9,Establish Contingency Plans for Shortages,\"Establish Contingency Plans for Shortages\n\nDescription:\nObjective: Prepare for potential resource shortages due to unforeseen events.\nScope: Identify potential shortage scenarios and develop mitigation strategies.\nSteps: 1. Identify potential shortage scenarios. 2. Develop mitigation strategies (e.g., rationing, alternative sources). 3. Establish emergency protocols.\nDeliverables: Resource shortage contingency plan.\n\nResources needed:\n\u2022 Risk Assessment Specialist\n\u2022 Resource Manager\n\u2022 Security Personnel\",12/7/2061,4/23/2062,0,2c6f7fa0-752e-4a5d-b2a5-b3af151dd5dd,PlanExe\n3a7c5706-47ce-43e1-986a-0ce526c70158,Enforce Social Controls,,4/23/2062,10/23/2063,0,be3e9ed8-3d2b-4202-a063-38403457f4a0,PlanExe\n327d7e97-6ab3-4931-9d16-569e05697392,Establish Control Monitoring System,\"Establish Control Monitoring System\n\nDescription:\nObjective: Create a system to monitor adherence to social controls.\nScope: Define metrics, select monitoring tools, and establish reporting procedures.\nSteps: 1. Define key performance indicators (KPIs) for social control adherence. 2. Select appropriate monitoring technologies (e.g., surveillance systems, data analytics). 3. Develop a reporting system for identifying and addressing violations. 4. Train personnel on monitoring procedures.\nDeliverables: Monitoring system operational, KPIs defined, reporting procedures documented.\n\nResources needed:\n\u2022 Social Control Administrator\n\u2022 Security Systems Engineer\n\u2022 Data Analyst\n\u2022 IT Support\",4/23/2062,9/7/2062,0,3a7c5706-47ce-43e1-986a-0ce526c70158,PlanExe\naedc0ee4-1da3-4a64-86f9-f5a0f55e8893,Develop Response Protocols for Violations,\"Develop Response Protocols for Violations\n\nDescription:\nObjective: Create protocols for addressing violations of social controls.\nScope: Define levels of violations, determine appropriate responses, and establish due process procedures.\nSteps: 1. Define a hierarchy of social control violations. 2. Develop corresponding response protocols (e.g., warnings, sanctions, re-education). 3. Establish a fair and transparent due process system for accused violators. 4. Train personnel on response protocols.\nDeliverables: Violation response protocols documented, due process procedures established.\n\nResources needed:\n\u2022 Social Control Administrator\n\u2022 Legal Counsel\n\u2022 Security Personnel\n\u2022 Ethical Oversight Committee\",9/7/2062,1/22/2063,0,327d7e97-6ab3-4931-9d16-569e05697392,PlanExe\ne33cae23-ab90-4d35-b9b7-20c7a2532334,Implement Feedback Mechanisms for Controls,\"Implement Feedback Mechanisms for Controls\n\nDescription:\nObjective: Establish channels for residents to provide feedback on social controls.\nScope: Create anonymous feedback systems, conduct regular surveys, and hold town hall meetings.\nSteps: 1. Implement an anonymous feedback system (e.g., suggestion boxes, online forms). 2. Conduct regular surveys to gauge resident satisfaction with social controls. 3. Organize town hall meetings for open discussion and feedback. 4. Analyze feedback and propose adjustments to social controls.\nDeliverables: Feedback mechanisms implemented, survey results analyzed, town hall meeting summaries documented.\n\nResources needed:\n\u2022 Social Control Administrator\n\u2022 Communication Specialist\n\u2022 Data Analyst\n\u2022 Ethical Oversight Committee\",1/22/2063,6/8/2063,0,aedc0ee4-1da3-4a64-86f9-f5a0f55e8893,PlanExe\nccd99c86-501e-4b1c-8861-067e781c7d84,Train Personnel on Control Enforcement,\"Train Personnel on Control Enforcement\n\nDescription:\nObjective: Train personnel on the proper enforcement of social controls.\nScope: Develop training materials, conduct workshops, and assess personnel competency.\nSteps: 1. Develop comprehensive training materials on social control policies and enforcement procedures. 2. Conduct workshops and simulations to train personnel on handling various scenarios. 3. Assess personnel competency through testing and performance evaluations. 4. Provide ongoing training and updates on social control policies.\nDeliverables: Training materials developed, personnel trained, competency assessments completed.\n\nResources needed:\n\u2022 Social Control Administrator\n\u2022 Security Personnel\n\u2022 Training Specialist\n\u2022 Psychologist\",6/8/2063,10/23/2063,0,3a7c5706-47ce-43e1-986a-0ce526c70158,PlanExe\n";

      "text": "Establish Communication and Reporting Plan",
      "custom_tooltip": "<b>Establish Communication and Reporting Plan</b><br>Define how project information will be communicated to stakeholders, including the frequency and format of reports. This ensures transparency and keeps everyone informed.<br><b>Resources needed:</b><br><ul><li>Communication Manager</li><li>Stakeholder List</li><li>Reporting Templates</li></ul>",
      "start_date": "2026-07-30",
      "duration": 12.0,
      "progress": 0,
      "open": true,
      "meta": "6995fb94-f9ba-409d-82f5-0dad3548b1ba FS",
      "parent": "9f8ff9bd-4043-48d9-8050-fc6f950e1fb9"
    },
    {
      "id": "59b71097-ab6f-4c5a-a78e-7118208987cd",
      "text": "Document Assumptions and Constraints",
      "custom_tooltip": "<b>Document Assumptions and Constraints</b><br>Identify and document all assumptions and constraints that may impact the project. This helps to manage expectations and mitigate potential risks.<br><b>Resources needed:</b><br><ul><li>Project Team</li><li>Risk Management Specialist</li><li>Documentation Software</li></ul>",
      "start_date": "2026-08-11",
      "duration": 12.0,
      "progress": 0,
      "open": true,
      "meta": "9f8ff9bd-4043-48d9-8050-fc6f950e1fb9 FF, 15ccccb8-6ab9-450c-9870-217e98e44fd6 FS",
      "parent": "9f8ff9bd-4043-48d9-8050-fc6f950e1fb9"
    },
    {
      "id": "7187beab-9df2-438f-8739-fe9679c8c529",
      "text": "Conduct Stakeholder Analysis",
      "custom_tooltip": "<b>Conduct Stakeholder Analysis</b>",
      "progress": 0,
      "open": true,
      "meta": "9f8ff9bd-4043-48d9-8050-fc6f950e1fb9 FS",
      "parent": "3e6fde01-144f-4d6e-b7eb-7d6d95a63d54",
      "type": "project"
    },
    {
      "id": "f1d48f16-4594-4366-8aeb-355201223f46",
      "text": "Identify Stakeholders and Their Interests",
      "custom_tooltip": "<b>Identify Stakeholders and Their Interests</b><br>Identify all individuals, groups, or organizations that may be affected by or have an interest in the project. Determine their level of influence, potential impact, and specific concerns related to the silo project. This includes internal teams, external regulatory bodies, local communities, and potential residents.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Communication Specialist</li><li>Legal Counsel</li></ul>",
      "start_date": "2026-08-23",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "7187beab-9df2-438f-8739-fe9679c8c529 SS",
      "parent": "7187beab-9df2-438f-8739-fe9679c8c529"
    },
    {
      "id": "b18ba618-c0e1-4a68-9cbd-bcb5808c0583",
      "text": "Assess Stakeholder Influence and Impact",
      "custom_tooltip": "<b>Assess Stakeholder Influence and Impact</b><br>Evaluate the level of influence each stakeholder group has on the project&#x27;s success. Determine the potential impact (positive or negative) they can exert. This assessment will inform the engagement strategy and prioritization of communication efforts.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Risk Assessment Specialist</li><li>Stakeholder Engagement Lead</li></ul>",
      "start_date": "2026-08-27",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "f1d48f16-4594-4366-8aeb-355201223f46 FS",
      "parent": "7187beab-9df2-438f-8739-fe9679c8c529"
    },
    {
      "id": "9c347dcc-ba1f-46f4-aaee-ea871fff4b00",
      "text": "Develop Stakeholder Engagement Strategy",
      "custom_tooltip": "<b>Develop Stakeholder Engagement Strategy</b><br>Create a comprehensive plan for engaging with each stakeholder group. This includes defining communication channels, frequency of updates, methods for addressing concerns, and strategies for building positive relationships. The strategy should be tailored to each stakeholder&#x27;s specific needs and interests.<br><b>Resources needed:</b><br><ul><li>Communication Specialist</li><li>Stakeholder Engagement Lead</li><li>Project Manager</li></ul>",
      "start_date": "2026-08-31",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "b18ba618-c0e1-4a68-9cbd-bcb5808c0583 FS",
      "parent": "7187beab-9df2-438f-8739-fe9679c8c529"
    },
    {
      "id": "d452ce57-d282-41ec-8e71-3e9f1c0ad9cf",
      "text": "Document Stakeholder Analysis Findings",
      "custom_tooltip": "<b>Document Stakeholder Analysis Findings</b><br>Compile all findings from the stakeholder analysis into a detailed report. This report should include a stakeholder matrix, assessment of influence and impact, engagement strategy, and a plan for ongoing monitoring and communication. The report will serve as a key reference document for the project team.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Documentation Specialist</li><li>Stakeholder Engagement Lead</li></ul>",
      "start_date": "2026-09-04",
      "duration": 4.0,
      "progress": 0,
      "open": true,
      "meta": "7187beab-9df2-438f-8739-fe9679c8c529 FF, 9c347dcc-ba1f-46f4-aaee-ea871fff4b00 FS",
      "parent": "7187beab-9df2-438f-8739-fe9679c8c529"
    },
    {
      "id": "7c04ebfa-a3a4-42ef-8b74-24dd7ce0c418",
      "text": "Perform Risk Assessment",
      "custom_tooltip": "<b>Perform Risk Assessment</b>",
      "progress": 0,
      "open": true,
      "meta": "3e6fde01-144f-4d6e-b7eb-7d6d95a63d54 FF, 7187beab-9df2-438f-8739-fe9679c8c529 FS",
      "parent": "3e6fde01-144f-4d6e-b7eb-7d6d95a63d54",
      "type": "project"
    },
    {
      "id": "c29d68c5-0d54-4d56-accd-aed5579405f0",
      "text": "Identify potential risks and their impact",
      "custom_tooltip": "<b>Identify potential risks and their impact</b><br>Objective: Identify all potential risks that could impact the project.\nScope: Cover all aspects of the project, including technical, financial, environmental, and social risks.\nSteps: Brainstorming sessions, review historical data, consult with experts.\nDeliverables: List of potential risks with impact assessment.<br><b>Resources needed:</b><br><ul><li>Project manager</li><li>Risk management specialist</li><li>Subject matter experts</li></ul>",
      "start_date": "2026-09-08",
      "duration": 8.0,
      "progress": 0,
      "open": true,
      "meta": "7c04ebfa-a3a4-42ef-8b74-24dd7ce0c418 SS",
      "parent": "7c04ebfa-a3a4-42ef-8b74-24dd7ce0c418"
    },
    {
      "id": "5a36b7a5-9475-4757-bfe8-31858ac35200",
      "text": "Assess probability and severity of risks",
      "custom_tooltip": "<b>Assess probability and severity of risks</b><br>Objective: Determine the likelihood and potential consequences of each identified risk.\nScope: Quantify the probability and severity of each risk using a risk matrix.\nSteps: Data analysis, expert judgment, simulation.\nDeliverables: Risk register with probability and severity ratings.<br><b>Resources needed:</b><br><ul><li>Risk management specialist</li><li>Data analyst</li><li>Subject matter experts</li></ul>",
      "start_date": "2026-09-16",
      "duration": 8.0,
      "progress": 0,
      "open": true,
      "meta": "c29d68c5-0d54-4d56-accd-aed5579405f0 FS",
      "parent": "7c04ebfa-a3a4-42ef-8b74-24dd7ce0c418"
    },
    {
      "id": "8658f123-a62a-47b4-a723-680141434ffb",
      "text": "Develop risk mitigation strategies",
      "custom_tooltip": "<b>Develop risk mitigation strategies</b><br>Objective: Create plans to reduce the probability or impact of high-priority risks.\nScope: Develop mitigation strategies for each risk identified as high priority.\nSteps: Brainstorming, cost-benefit analysis, plan development.\nDeliverables: Mitigation plans for each high-priority risk.<br><b>Resources needed:</b><br><ul><li>Project manager</li><li>Risk management specialist</li><li>Subject matter experts</li></ul>",
      "start_date": "2026-09-24",
      "duration": 8.0,
      "progress": 0,
      "open": true,
      "meta": "5a36b7a5-9475-4757-bfe8-31858ac35200 FS",
      "parent": "7c04ebfa-a3a4-42ef-8b74-24dd7ce0c418"
    },
    {
      "id": "1d23b401-ebbd-4da2-b429-400a2550cf94",
      "text": "Document risk assessment findings",
      "custom_tooltip": "<b>Document risk assessment findings</b><br>Objective: Compile all risk assessment information into a comprehensive report.\nScope: Document all identified risks, their probability and severity, and mitigation strategies.\nSteps: Data compilation, report writing, review.\nDeliverables: Risk assessment report.<br><b>Resources needed:</b><br><ul><li>Project manager</li><li>Risk management specialist</li><li>Technical writer</li></ul>",
      "start_date": "2026-10-02",
      "duration": 8.0,
      "progress": 0,
      "open": true,
      "meta": "7c04ebfa-a3a4-42ef-8b74-24dd7ce0c418 FF, 8658f123-a62a-47b4-a723-680141434ffb FS",
      "parent": "7c04ebfa-a3a4-42ef-8b74-24dd7ce0c418"
    },
    {

      "type": "project"

    {
      "id": "53440622-7540-404c-9e6a-58f452f4f1c3",
      "text": "Identify Potential Sites (Nevada, Siberia, Canada)",
      "custom_tooltip": "<b>Identify Potential Sites (Nevada, Siberia, Canada)</b>",
      "progress": 0,
      "open": true,
      "meta": "18a497be-277a-428c-ad85-8915f2034154 SS",

      "type": "project"
    },
    {
      "id": "25a9f33d-7193-4316-82ba-3c22d9d72a36",
      "text": "Research Nevada potential silo sites",
      "custom_tooltip": "<b>Research Nevada potential silo sites</b><br>Identify and document potential sites in Nevada based on publicly available geological data, land ownership records, and accessibility.<br><b>Resources needed:</b><br><ul><li>Geologist</li><li>GIS Analyst</li><li>Land Surveyor</li></ul>",
      "start_date": "2026-10-10",
      "duration": 15.0,
      "progress": 0,
      "open": true,
      "meta": "53440622-7540-404c-9e6a-58f452f4f1c3 SS",
      "parent": "53440622-7540-404c-9e6a-58f452f4f1c3"
    },
    {
      "id": "13483611-f258-4e06-8033-e844cc512dab",
      "text": "Research Siberia potential silo sites",
      "custom_tooltip": "<b>Research Siberia potential silo sites</b><br>Identify and document potential sites in Siberia based on available geological data, accessibility, and political stability assessments.<br><b>Resources needed:</b><br><ul><li>Geologist</li><li>Remote Sensing Specialist</li><li>Political Risk Analyst</li><li>Translator</li></ul>",
      "start_date": "2026-10-25",
      "duration": 15.0,
      "progress": 0,
      "open": true,
      "meta": "25a9f33d-7193-4316-82ba-3c22d9d72a36 FS",
      "parent": "53440622-7540-404c-9e6a-58f452f4f1c3"
    },
    {
      "id": "28f30692-b869-4c84-87cc-b135bf8be9b4",
      "text": "Research Canada potential silo sites",
      "custom_tooltip": "<b>Research Canada potential silo sites</b><br>Identify and document potential sites in the Canadian Northern Territories based on geological data, accessibility, and environmental impact considerations.<br><b>Resources needed:</b><br><ul><li>Geologist</li><li>Environmental Scientist</li><li>Logistics Coordinator</li></ul>",
      "start_date": "2026-11-09",
      "duration": 15.0,
      "progress": 0,
      "open": true,
      "meta": "13483611-f258-4e06-8033-e844cc512dab FS",
      "parent": "53440622-7540-404c-9e6a-58f452f4f1c3"
    },
    {
      "id": "ed8ddbf7-f8f8-4547-be80-e50fc339d945",
      "text": "Compile site data for comparison",
      "custom_tooltip": "<b>Compile site data for comparison</b><br>Gather all collected data for each potential site (Nevada, Siberia, Canada) into a standardized format for comparative analysis.<br><b>Resources needed:</b><br><ul><li>Data Analyst</li><li>Database Administrator</li></ul>",
      "start_date": "2026-11-24",
      "duration": 15.0,
      "progress": 0,
      "open": true,
      "meta": "53440622-7540-404c-9e6a-58f452f4f1c3 FF, 28f30692-b869-4c84-87cc-b135bf8be9b4 FS",
      "parent": "53440622-7540-404c-9e6a-58f452f4f1c3"
    },
    {
      "id": "603612d6-9200-4239-8aa2-76276047edf1",
      "text": "Conduct Geological Surveys and Analysis",
      "custom_tooltip": "<b>Conduct Geological Surveys and Analysis</b>",
      "progress": 0,
      "open": true,
      "meta": "53440622-7540-404c-9e6a-58f452f4f1c3 FS",
      "parent": "18a497be-277a-428c-ad85-8915f2034154",
      "type": "project"
    },
    {
      "id": "8f029c3d-b2b2-413e-b71a-0cf2beb5ca55",
      "text": "Gather existing geological data for sites",
      "custom_tooltip": "<b>Gather existing geological data for sites</b><br>Collect all available geological survey reports, maps, and data from public and private sources for Nevada, Siberia, and the Canadian Northern Territories. This includes data on soil composition, rock formations, seismic activity, and groundwater levels.<br><b>Resources needed:</b><br><ul><li>Geologists</li><li>Data analysts</li><li>Research assistants</li><li>Database access</li></ul>",
      "start_date": "2026-12-09",
      "duration": 24.0,
      "progress": 0,
      "open": true,
      "meta": "603612d6-9200-4239-8aa2-76276047edf1 SS",
      "parent": "603612d6-9200-4239-8aa2-76276047edf1"
    },
    {
      "id": "8315e008-c1db-4d5f-a1b0-99c3bb0def0f",
      "text": "Conduct preliminary remote sensing analysis",
      "custom_tooltip": "<b>Conduct preliminary remote sensing analysis</b><br>Utilize satellite imagery, aerial photography, and other remote sensing techniques to identify potential geological hazards, assess surface conditions, and map key geological features at each site. This will help prioritize areas for more detailed investigation.<br><b>Resources needed:</b><br><ul><li>Remote sensing specialists</li><li>GIS software</li><li>Satellite imagery subscriptions</li><li>Geological engineers</li></ul>",
      "start_date": "2027-01-02",
      "duration": 24.0,
      "progress": 0,
      "open": true,
      "meta": "8f029c3d-b2b2-413e-b71a-0cf2beb5ca55 FS",
      "parent": "603612d6-9200-4239-8aa2-76276047edf1"
    },
    {
      "id": "c287832f-e750-425e-b1e6-77a1fd34c062",
      "text": "Plan and execute on-site geological surveys",
      "custom_tooltip": "<b>Plan and execute on-site geological surveys</b><br>Develop detailed survey plans for each site, including the location of boreholes, seismic monitoring stations, and sampling points. Execute the surveys, collecting soil and rock samples, measuring groundwater levels, and monitoring seismic activity.<br><b>Resources needed:</b><br><ul><li>Geologists</li><li>Drilling equipment</li><li>Seismic monitoring equipment</li><li>Surveying equipment</li><li>Field technicians</li></ul>",
      "start_date": "2027-01-26",
      "duration": 24.0,
      "progress": 0,
      "open": true,
      "meta": "8315e008-c1db-4d5f-a1b0-99c3bb0def0f FS",
      "parent": "603612d6-9200-4239-8aa2-76276047edf1"
    },
    {
      "id": "85aa1f76-5f09-4d49-a222-03c867f36d9e",
      "text": "Analyze soil and rock samples in laboratory",
      "custom_tooltip": "<b>Analyze soil and rock samples in laboratory</b><br>Conduct laboratory testing of soil and rock samples to determine their physical and chemical properties, including strength, permeability, mineral composition, and potential for contamination. Analyze the data to assess the suitability of each site for underground construction.<br><b>Resources needed:</b><br><ul><li>Geotechnical engineers</li><li>Laboratory technicians</li><li>Laboratory equipment</li><li>Chemical reagents</li></ul>",
      "start_date": "2027-02-19",
      "duration": 24.0,
      "progress": 0,
      "open": true,
      "meta": "c287832f-e750-425e-b1e6-77a1fd34c062 FS",
      "parent": "603612d6-9200-4239-8aa2-76276047edf1"
    },
    {
      "id": "e37dd422-f546-437f-9f1f-668d3a59b1b5",
      "text": "Model subsurface conditions and stability",
      "custom_tooltip": "<b>Model subsurface conditions and stability</b><br>Use geological modeling software to create 3D models of the subsurface conditions at each site. Run simulations to assess the stability of the ground under different loading conditions, including the weight of the silo and potential seismic events.<br><b>Resources needed:</b><br><ul><li>Geological modelers</li><li>Geotechnical engineers</li><li>Geological modeling software</li><li>High-performance computing resources</li></ul>",
      "start_date": "2027-03-15",
      "duration": 24.0,
      "progress": 0,
      "open": true,
      "meta": "603612d6-9200-4239-8aa2-76276047edf1 FF, 85aa1f76-5f09-4d49-a222-03c867f36d9e FS",
      "parent": "603612d6-9200-4239-8aa2-76276047edf1"
    },
    {
      "id": "48e1327a-1f02-4440-857f-f86d5ea1fdef",
      "text": "Assess Seismic Activity and Groundwater Levels",
      "custom_tooltip": "<b>Assess Seismic Activity and Groundwater Levels</b>",
      "progress": 0,
      "open": true,
      "meta": "603612d6-9200-4239-8aa2-76276047edf1 FS",
      "parent": "18a497be-277a-428c-ad85-8915f2034154",
      "type": "project"
    },
    {
      "id": "1dbe8dac-f985-45e1-8b2e-1fbe8abbad7f",
      "text": "Gather historical seismic data",
      "custom_tooltip": "<b>Gather historical seismic data</b><br>Collect and analyze historical seismic activity data for the selected sites to assess potential risks.<br><b>Resources needed:</b><br><ul><li>Geologists</li><li>Seismologists</li><li>Data analysts</li></ul>",
      "start_date": "2027-04-08",
      "duration": 23.0,
      "progress": 0,
      "open": true,
      "meta": "48e1327a-1f02-4440-857f-f86d5ea1fdef SS",
      "parent": "48e1327a-1f02-4440-857f-f86d5ea1fdef"
    },
    {
      "id": "145e4fd0-1e9d-4fe5-ae06-1e5e7f81fa18",
      "text": "Install seismic monitoring equipment",
      "custom_tooltip": "<b>Install seismic monitoring equipment</b><br>Deploy advanced seismic monitoring equipment at each site to gather real-time data.<br><b>Resources needed:</b><br><ul><li>Geophysicists</li><li>Technicians</li><li>Equipment specialists</li></ul>",
      "start_date": "2027-05-01",
      "duration": 23.0,
      "progress": 0,
      "open": true,
      "meta": "1dbe8dac-f985-45e1-8b2e-1fbe8abbad7f FS",
      "parent": "48e1327a-1f02-4440-857f-f86d5ea1fdef"
    },
    {
      "id": "f7ae61a5-f33d-4f10-84a0-48dc45bbd58c",
      "text": "Analyze groundwater levels and flow",
      "custom_tooltip": "<b>Analyze groundwater levels and flow</b><br>Conduct hydrogeological surveys to determine groundwater levels, flow patterns, and potential impacts on construction.<br><b>Resources needed:</b><br><ul><li>Hydrogeologists</li><li>Environmental engineers</li><li>Drilling crew</li></ul>",
      "start_date": "2027-05-24",
      "duration": 23.0,
      "progress": 0,
      "open": true,
      "meta": "145e4fd0-1e9d-4fe5-ae06-1e5e7f81fa18 FS",
      "parent": "48e1327a-1f02-4440-857f-f86d5ea1fdef"
    },
    {
      "id": "26acf02f-14e2-47ce-8e62-e2e10fed5f72",
      "text": "Model seismic risk and groundwater impact",
      "custom_tooltip": "<b>Model seismic risk and groundwater impact</b><br>Develop computer models to simulate seismic risk and groundwater impact on the silo structure.<br><b>Resources needed:</b><br><ul><li>Geotechnical engineers</li><li>Software engineers</li><li>Simulation specialists</li></ul>",
      "start_date": "2027-06-16",
      "duration": 23.0,
      "progress": 0,
      "open": true,
      "meta": "48e1327a-1f02-4440-857f-f86d5ea1fdef FF, f7ae61a5-f33d-4f10-84a0-48dc45bbd58c FS",
      "parent": "48e1327a-1f02-4440-857f-f86d5ea1fdef"
    },
    {
      "id": "10b2812c-296a-4829-a784-a78f0ac18bdd",
      "text": "Evaluate Mineral Resource Availability",
      "custom_tooltip": "<b>Evaluate Mineral Resource Availability</b>",
      "progress": 0,
      "open": true,
      "meta": "48e1327a-1f02-4440-857f-f86d5ea1fdef FS",
      "parent": "18a497be-277a-428c-ad85-8915f2034154",
      "type": "project"
    },
    {
      "id": "5faf783c-1de6-46e2-bd69-be2e5b17e82d",
      "text": "Research mineral deposits in target regions",
      "custom_tooltip": "<b>Research mineral deposits in target regions</b><br>Objective: Identify potential sources of key minerals (iron, copper, etc.) within a reasonable distance of the potential silo sites.\nScope: Review geological surveys, mining reports, and academic literature for Nevada, Siberia, and the Canadian Northern Territories.\nSteps: 1. Define a list of essential minerals. 2. Search for relevant data sources. 3. Analyze data to estimate mineral quantities and accessibility. 4. Document findings in a report.\nDeliverables: A report summarizing mineral resource availability for each site.<br><b>Resources needed:</b><br><ul><li>Geologist</li><li>Mining Engineer</li><li>Data Analyst</li><li>Geographic Information System (GIS) software</li></ul>",
      "start_date": "2027-07-09",
      "duration": 15.0,
      "progress": 0,
      "open": true,
      "meta": "10b2812c-296a-4829-a784-a78f0ac18bdd SS",
      "parent": "10b2812c-296a-4829-a784-a78f0ac18bdd"
    },
    {
      "id": "53d1522d-e2b6-4261-af8d-a684cb1444ca",
      "text": "Assess mining feasibility and environmental impact",
      "custom_tooltip": "<b>Assess mining feasibility and environmental impact</b><br>Objective: Evaluate the feasibility of extracting minerals from identified deposits and assess the potential environmental impact of mining operations.\nScope: Consider factors such as mining methods, transportation costs, regulatory requirements, and potential environmental damage.\nSteps: 1. Research different mining techniques. 2. Estimate extraction costs. 3. Assess environmental regulations and permitting requirements. 4. Evaluate potential environmental risks (water contamination, habitat destruction). 5. Document findings in a report.\nDeliverables: A report assessing mining feasibility and environmental impact for each site.<br><b>Resources needed:</b><br><ul><li>Mining Engineer</li><li>Environmental Scientist</li><li>Regulatory Specialist</li><li>Cost Estimator</li></ul>",
      "start_date": "2027-07-24",
      "duration": 15.0,
      "progress": 0,
      "open": true,
      "meta": "5faf783c-1de6-46e2-bd69-be2e5b17e82d FS",
      "parent": "10b2812c-296a-4829-a784-a78f0ac18bdd"
    },
    {
      "id": "ce29e468-a3f3-4e9d-8838-13f0d2d6366d",
      "text": "Evaluate transportation logistics and costs",
      "custom_tooltip": "<b>Evaluate transportation logistics and costs</b><br>Objective: Determine the most efficient and cost-effective methods for transporting minerals to the silo construction site.\nScope: Consider factors such as distance, terrain, infrastructure availability, and transportation modes.\nSteps: 1. Identify potential transportation routes. 2. Evaluate transportation options (rail, road, air). 3. Estimate transportation costs. 4. Assess logistical challenges (permitting, security). 5. Document findings in a report.\nDeliverables: A report outlining transportation logistics and costs for each site.<br><b>Resources needed:</b><br><ul><li>Logistics Specialist</li><li>Transportation Engineer</li><li>Supply Chain Manager</li><li>Cost Analyst</li></ul>",
      "start_date": "2027-08-08",
      "duration": 15.0,
      "progress": 0,
      "open": true,
      "meta": "53d1522d-e2b6-4261-af8d-a684cb1444ca FS",
      "parent": "10b2812c-296a-4829-a784-a78f0ac18bdd"
    },
    {
      "id": "bdfd8d8d-b014-4e42-9527-77f98fce67f2",
      "text": "Analyze supply chain risks and mitigation strategies",
      "custom_tooltip": "<b>Analyze supply chain risks and mitigation strategies</b><br>Objective: Identify potential risks to the mineral supply chain and develop mitigation strategies to ensure a reliable supply of essential minerals.\nScope: Consider factors such as political instability, natural disasters, and supplier disruptions.\nSteps: 1. Identify potential supply chain risks. 2. Assess the likelihood and impact of each risk. 3. Develop mitigation strategies (diversification, stockpiling, insurance). 4. Document findings in a risk management plan.\nDeliverables: A risk management plan for the mineral supply chain.<br><b>Resources needed:</b><br><ul><li>Risk Management Specialist</li><li>Supply Chain Manager</li><li>Political Analyst</li><li>Insurance Specialist</li></ul>",
      "start_date": "2027-08-23",
      "duration": 15.0,
      "progress": 0,
      "open": true,
      "meta": "10b2812c-296a-4829-a784-a78f0ac18bdd FF, ce29e468-a3f3-4e9d-8838-13f0d2d6366d FS",
      "parent": "10b2812c-296a-4829-a784-a78f0ac18bdd"
    },
    {
      "id": "cdc11268-369e-47ea-8f93-178487e9ca15",
      "text": "Select Optimal Site",
      "custom_tooltip": "<b>Select Optimal Site</b>",
      "progress": 0,
      "open": true,
      "meta": "10b2812c-296a-4829-a784-a78f0ac18bdd FS",
      "parent": "18a497be-277a-428c-ad85-8915f2034154",
      "type": "project"
    },
    {
      "id": "dc6b6e83-ab10-4f4e-be58-ef138d91cd6b",
      "text": "Define Site Selection Criteria",
      "custom_tooltip": "<b>Define Site Selection Criteria</b><br>Establish clear and measurable criteria for evaluating potential sites based on geological stability, resource availability, environmental impact, and logistical feasibility. This includes defining acceptable ranges for seismic activity, groundwater levels, mineral resource quantities, and transportation costs.<br><b>Resources needed:</b><br><ul><li>Geotechnical Engineer</li><li>Environmental Scientist</li><li>Logistics Expert</li><li>Project Manager</li></ul>",
      "start_date": "2027-09-07",
      "duration": 45.0,
      "progress": 0,
      "open": true,
      "meta": "cdc11268-369e-47ea-8f93-178487e9ca15 SS",
      "parent": "cdc11268-369e-47ea-8f93-178487e9ca15"
    },
    {
      "id": "84ed4a0d-9c83-4f23-a653-795f2c0b01fd",
      "text": "Rank Sites Based on Criteria",
      "custom_tooltip": "<b>Rank Sites Based on Criteria</b><br>Apply the defined site selection criteria to rank the potential sites (Nevada, Siberia, Canada) based on their suitability. This involves assigning scores to each site for each criterion and calculating an overall score to determine the optimal site.<br><b>Resources needed:</b><br><ul><li>Data Analyst</li><li>Geotechnical Engineer</li><li>Environmental Scientist</li><li>Project Manager</li></ul>",
      "start_date": "2027-10-22",
      "duration": 45.0,
      "progress": 0,
      "open": true,
      "meta": "dc6b6e83-ab10-4f4e-be58-ef138d91cd6b FS",
      "parent": "cdc11268-369e-47ea-8f93-178487e9ca15"
    },
    {
      "id": "f05f0a76-6724-4334-ba17-d2bdd3229b8b",
      "text": "Conduct Sensitivity Analysis",
      "custom_tooltip": "<b>Conduct Sensitivity Analysis</b><br>Perform a sensitivity analysis to assess the impact of uncertainties in the data and assumptions on the site ranking. This involves varying the values of key parameters (e.g., seismic activity, resource availability) and observing the resulting changes in the site ranking.<br><b>Resources needed:</b><br><ul><li>Risk Assessment Specialist</li><li>Data Analyst</li><li>Geotechnical Engineer</li></ul>",
      "start_date": "2027-12-06",
      "duration": 45.0,
      "progress": 0,
      "open": true,
      "meta": "84ed4a0d-9c83-4f23-a653-795f2c0b01fd FS",
      "parent": "cdc11268-369e-47ea-8f93-178487e9ca15"
    },
    {
      "id": "ca42ef03-a003-43f9-82c6-cc2d6505d182",
      "text": "Present Site Selection Recommendation",
      "custom_tooltip": "<b>Present Site Selection Recommendation</b><br>Prepare a comprehensive report summarizing the site selection process, including the defined criteria, site rankings, sensitivity analysis results, and a recommendation for the optimal site. Present the recommendation to stakeholders for review and approval.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Geotechnical Engineer</li><li>Environmental Scientist</li><li>Communication Specialist</li></ul>",
      "start_date": "2028-01-20",
      "duration": 45.0,
      "progress": 0,
      "open": true,
      "meta": "cdc11268-369e-47ea-8f93-178487e9ca15 FF, f05f0a76-6724-4334-ba17-d2bdd3229b8b FS",
      "parent": "cdc11268-369e-47ea-8f93-178487e9ca15"
    },
    {
      "id": "2ad44743-04d5-4e5d-9517-82c9c2f28537",
      "text": "Acquire Land and Necessary Permits",
      "custom_tooltip": "<b>Acquire Land and Necessary Permits</b>",
      "progress": 0,
      "open": true,
      "meta": "18a497be-277a-428c-ad85-8915f2034154 FF, cdc11268-369e-47ea-8f93-178487e9ca15 FS",
      "parent": "18a497be-277a-428c-ad85-8915f2034154",
      "type": "project"
    },
    {
      "id": "ffe58eba-3e9e-4742-b3eb-9d4adb0b757a",
      "text": "Negotiate Land Acquisition Agreements",
      "custom_tooltip": "<b>Negotiate Land Acquisition Agreements</b><br>Negotiate with landowners in the selected optimal site to reach mutually agreeable terms for land acquisition. This includes determining fair market value, addressing any concerns or objections, and finalizing legal agreements.<br><b>Resources needed:</b><br><ul><li>Legal team</li><li>Real estate experts</li><li>Project manager</li><li>Negotiators</li></ul>",
      "start_date": "2028-03-05",
      "duration": 73.0,
      "progress": 0,
      "open": true,
      "meta": "2ad44743-04d5-4e5d-9517-82c9c2f28537 SS",
      "parent": "2ad44743-04d5-4e5d-9517-82c9c2f28537"
    },
    {
      "id": "937181e9-6322-4eb9-97e2-982c585d44cb",
      "text": "Prepare Environmental Impact Assessment",
      "custom_tooltip": "<b>Prepare Environmental Impact Assessment</b><br>Conduct a comprehensive environmental impact assessment (EIA) to identify potential environmental impacts of the silo construction project. This includes assessing impacts on air quality, water resources, soil, vegetation, wildlife, and cultural resources. The EIA will also identify mitigation measures to minimize or avoid adverse environmental effects.<br><b>Resources needed:</b><br><ul><li>Environmental scientists</li><li>Hydrologists</li><li>Ecologists</li><li>Geologists</li><li>Regulatory specialists</li></ul>",
      "start_date": "2028-05-17",
      "duration": 73.0,
      "progress": 0,
      "open": true,
      "meta": "ffe58eba-3e9e-4742-b3eb-9d4adb0b757a FS",
      "parent": "2ad44743-04d5-4e5d-9517-82c9c2f28537"
    },
    {
      "id": "1c58b111-1ab7-40b5-b2ad-381d7d1e3ada",
      "text": "Apply for Building and Land Use Permits",
      "custom_tooltip": "<b>Apply for Building and Land Use Permits</b><br>Prepare and submit applications for all necessary building permits and land use permits required for the silo construction project. This includes providing detailed project plans, environmental impact assessments, and other supporting documentation to regulatory agencies.<br><b>Resources needed:</b><br><ul><li>Permitting specialists</li><li>Engineers</li><li>Architects</li><li>Legal team</li><li>Project manager</li></ul>",
      "start_date": "2028-07-29",
      "duration": 73.0,
      "progress": 0,
      "open": true,
      "meta": "937181e9-6322-4eb9-97e2-982c585d44cb FS",
      "parent": "2ad44743-04d5-4e5d-9517-82c9c2f28537"
    },
    {
      "id": "8d193168-fe83-4e55-b6c1-0332556d91c5",
      "text": "Secure Hazardous Materials Handling Permit",
      "custom_tooltip": "<b>Secure Hazardous Materials Handling Permit</b><br>Identify and assess any hazardous materials that will be used or generated during the silo construction project. Develop a hazardous materials management plan and apply for the necessary permits to handle, store, and dispose of these materials safely and in compliance with all applicable regulations.<br><b>Resources needed:</b><br><ul><li>Hazardous materials specialists</li><li>Environmental health and safety professionals</li><li>Regulatory specialists</li><li>Legal team</li></ul>",
      "start_date": "2028-10-10",
      "duration": 73.0,
      "progress": 0,
      "open": true,
      "meta": "1c58b111-1ab7-40b5-b2ad-381d7d1e3ada FS",
      "parent": "2ad44743-04d5-4e5d-9517-82c9c2f28537"
    },
    {
      "id": "665689a5-fabd-48c8-b26f-4bbfa10f29dd",
      "text": "Obtain Security Clearance Approvals",
      "custom_tooltip": "<b>Obtain Security Clearance Approvals</b><br>Initiate the process of obtaining security clearances for all personnel who will be involved in the silo construction project. This includes conducting background checks, verifying credentials, and ensuring that all personnel meet the required security standards.<br><b>Resources needed:</b><br><ul><li>Security personnel</li><li>Human resources</li><li>Background check specialists</li><li>Government liaison</li></ul>",
      "start_date": "2028-12-22",
      "duration": 73.0,
      "progress": 0,
      "open": true,
      "meta": "2ad44743-04d5-4e5d-9517-82c9c2f28537 FF, 8d193168-fe83-4e55-b6c1-0332556d91c5 FS",
      "parent": "2ad44743-04d5-4e5d-9517-82c9c2f28537"
    },

      "custom_tooltip": "<b>Develop Architectural Blueprints</b>",

    {
      "id": "63a8fcbd-c1a3-4d40-b2f9-f55082018d73",
      "text": "Conceptual Design and Requirements Gathering",
      "custom_tooltip": "<b>Conceptual Design and Requirements Gathering</b><br>Define the overall architectural vision, gather specific requirements from stakeholders (residential, agricultural, industrial zones), and establish design criteria for underground construction.<br><b>Resources needed:</b><br><ul><li>Architect</li><li>Urban Planner</li><li>Stakeholder Representatives</li><li>Geotechnical Engineer</li></ul>",
      "start_date": "2029-03-05",
      "duration": 54.0,
      "progress": 0,
      "open": true,
      "meta": "ac20b08a-6f1e-43ab-af52-82eb72054e71 SS",

    },
    {
      "id": "b73262bf-128a-48ce-91bb-0e040b2daeaf",
      "text": "Develop Preliminary Schematics and Layouts",
      "custom_tooltip": "<b>Develop Preliminary Schematics and Layouts</b><br>Create initial schematics and layouts for the silo complex, including floor plans, section views, and 3D models. Consider spatial relationships, circulation patterns, and functional adjacencies.<br><b>Resources needed:</b><br><ul><li>Architect</li><li>CAD Technicians</li><li>Structural Engineer</li><li>MEP Engineer</li></ul>",
      "start_date": "2029-04-28",
      "duration": 54.0,
      "progress": 0,
      "open": true,
      "meta": "63a8fcbd-c1a3-4d40-b2f9-f55082018d73 FS",
      "parent": "ac20b08a-6f1e-43ab-af52-82eb72054e71"
    },
    {
      "id": "bf0bad6b-46be-4aec-b9af-b29097ac677d",
      "text": "Detailed Design of Residential Zones",
      "custom_tooltip": "<b>Detailed Design of Residential Zones</b><br>Develop detailed architectural designs for the residential zones, including apartment layouts, common areas, and amenities. Consider factors such as privacy, natural light, and ventilation.<br><b>Resources needed:</b><br><ul><li>Architect</li><li>Interior Designer</li><li>MEP Engineer</li><li>Accessibility Consultant</li></ul>",
      "start_date": "2029-06-21",
      "duration": 54.0,
      "progress": 0,
      "open": true,
      "meta": "b73262bf-128a-48ce-91bb-0e040b2daeaf FS",
      "parent": "ac20b08a-6f1e-43ab-af52-82eb72054e71"
    },
    {
      "id": "2b8a455e-fe0d-474b-a158-a5ae5921da2f",
      "text": "Design Agricultural and Industrial Zones",
      "custom_tooltip": "<b>Design Agricultural and Industrial Zones</b><br>Design the agricultural and industrial zones, including layouts for vertical farms, manufacturing facilities, and research labs. Consider factors such as environmental control, resource management, and safety.<br><b>Resources needed:</b><br><ul><li>Architect</li><li>Agricultural Engineer</li><li>Industrial Engineer</li><li>Environmental Engineer</li></ul>",
      "start_date": "2029-08-14",
      "duration": 54.0,
      "progress": 0,
      "open": true,
      "meta": "bf0bad6b-46be-4aec-b9af-b29097ac677d FS",
      "parent": "ac20b08a-6f1e-43ab-af52-82eb72054e71"
    },
    {
      "id": "4d744f47-45d5-4ec5-9150-afd8e69b53fd",
      "text": "Finalize Blueprints and Obtain Approvals",
      "custom_tooltip": "<b>Finalize Blueprints and Obtain Approvals</b><br>Refine the architectural blueprints based on feedback from stakeholders and engineering analyses. Obtain necessary approvals from regulatory agencies and prepare documentation for construction.<br><b>Resources needed:</b><br><ul><li>Architect</li><li>Project Manager</li><li>Permitting Specialist</li><li>Legal Counsel</li></ul>",
      "start_date": "2029-10-07",
      "duration": 54.0,
      "progress": 0,
      "open": true,
      "meta": "ac20b08a-6f1e-43ab-af52-82eb72054e71 FF, 2b8a455e-fe0d-474b-a158-a5ae5921da2f FS",
      "parent": "ac20b08a-6f1e-43ab-af52-82eb72054e71"
    },
    {
      "id": "bf3a202a-5b8f-4707-818c-8ec4cad87106",
      "text": "Design Structural Support Systems",
      "custom_tooltip": "<b>Design Structural Support Systems</b>",
      "progress": 0,
      "open": true,
      "meta": "ac20b08a-6f1e-43ab-af52-82eb72054e71 FS",
      "parent": "14fc7260-f170-43ec-a66a-344280f36f47",
      "type": "project"
    },
    {
      "id": "f603d12d-37fc-4a0d-a3d1-52a3846a618d",
      "text": "Geotechnical Investigation and Analysis",
      "custom_tooltip": "<b>Geotechnical Investigation and Analysis</b><br>Conduct detailed geotechnical investigations to determine soil properties, load-bearing capacity, and stability. Analyze data to inform structural design.<br><b>Resources needed:</b><br><ul><li>Geotechnical Engineers</li><li>Drilling Equipment</li><li>Laboratory Technicians</li><li>Geological Survey Data</li></ul>",
      "start_date": "2029-11-30",
      "duration": 73.0,
      "progress": 0,
      "open": true,
      "meta": "bf3a202a-5b8f-4707-818c-8ec4cad87106 SS",
      "parent": "bf3a202a-5b8f-4707-818c-8ec4cad87106"
    },
    {
      "id": "cb362d1a-9d25-4970-8447-4b26599c2823",
      "text": "Material Selection and Procurement",
      "custom_tooltip": "<b>Material Selection and Procurement</b><br>Select appropriate construction materials (concrete, steel, composites) based on strength, durability, and cost-effectiveness. Establish supply chains and procurement contracts.<br><b>Resources needed:</b><br><ul><li>Materials Engineers</li><li>Procurement Specialists</li><li>Suppliers</li><li>Logistics Coordinators</li></ul>",
      "start_date": "2030-02-11",
      "duration": 73.0,
      "progress": 0,
      "open": true,
      "meta": "f603d12d-37fc-4a0d-a3d1-52a3846a618d FS",
      "parent": "bf3a202a-5b8f-4707-818c-8ec4cad87106"
    },
    {
      "id": "787df0fe-960c-442a-be3d-0ed6d93b5e0f",
      "text": "Structural Modeling and Simulation",
      "custom_tooltip": "<b>Structural Modeling and Simulation</b><br>Develop detailed 3D models of the silo structure. Conduct simulations to analyze stress, strain, and deformation under various load conditions.<br><b>Resources needed:</b><br><ul><li>Structural Engineers</li><li>CAD Software</li><li>Simulation Software</li><li>High-Performance Computing Resources</li></ul>",
      "start_date": "2030-04-25",
      "duration": 73.0,
      "progress": 0,
      "open": true,
      "meta": "cb362d1a-9d25-4970-8447-4b26599c2823 FS",
      "parent": "bf3a202a-5b8f-4707-818c-8ec4cad87106"
    },
    {
      "id": "2cdc3431-727a-43b9-a9f6-a78dea76f9a7",
      "text": "Design Reinforcement and Support Systems",
      "custom_tooltip": "<b>Design Reinforcement and Support Systems</b><br>Design reinforcement strategies (rebar placement, post-tensioning) to ensure structural integrity. Design support systems for excavation and construction phases.<br><b>Resources needed:</b><br><ul><li>Structural Engineers</li><li>CAD Software</li><li>Construction Plans</li><li>Reinforcement Materials</li></ul>",
      "start_date": "2030-07-07",
      "duration": 73.0,
      "progress": 0,
      "open": true,
      "meta": "787df0fe-960c-442a-be3d-0ed6d93b5e0f FS",
      "parent": "bf3a202a-5b8f-4707-818c-8ec4cad87106"
    },
    {
      "id": "42503772-f465-4039-b095-d28cd63e0006",
      "text": "Implement Quality Control Procedures",
      "custom_tooltip": "<b>Implement Quality Control Procedures</b><br>Establish and implement rigorous quality control procedures for all stages of structural construction, including material testing, welding inspections, and concrete pouring.<br><b>Resources needed:</b><br><ul><li>Quality Control Inspectors</li><li>Testing Equipment</li><li>Construction Supervisors</li><li>Welding Inspectors</li></ul>",
      "start_date": "2030-09-18",
      "duration": 73.0,
      "progress": 0,
      "open": true,
      "meta": "bf3a202a-5b8f-4707-818c-8ec4cad87106 FF, 2cdc3431-727a-43b9-a9f6-a78dea76f9a7 FS",
      "parent": "bf3a202a-5b8f-4707-818c-8ec4cad87106"
    },
    {
      "id": "ece7d12e-f1d7-4d87-a1f4-f0f6806a962c",
      "text": "Design Life Support Systems (Air, Water, Food)",
      "custom_tooltip": "<b>Design Life Support Systems (Air, Water, Food)</b>",
      "progress": 0,
      "open": true,
      "meta": "bf3a202a-5b8f-4707-818c-8ec4cad87106 FS",
      "parent": "14fc7260-f170-43ec-a66a-344280f36f47",
      "type": "project"
    },
    {
      "id": "e8c491e0-41c1-47b0-8719-b2acb5a466a8",
      "text": "Design Air Purification and Circulation System",
      "custom_tooltip": "<b>Design Air Purification and Circulation System</b><br>Design the system for air filtration, CO2 removal, and oxygen replenishment. This includes specifying filters, scrubbers, and air circulation mechanisms to maintain breathable air quality.<br><b>Resources needed:</b><br><ul><li>Environmental Engineer</li><li>Mechanical Engineer</li><li>Air Quality Specialist</li></ul>",
      "start_date": "2030-11-30",
      "duration": 90.0,
      "progress": 0,
      "open": true,
      "meta": "ece7d12e-f1d7-4d87-a1f4-f0f6806a962c SS",
      "parent": "ece7d12e-f1d7-4d87-a1f4-f0f6806a962c"
    },
    {
      "id": "5860d1fb-c773-4277-8f44-675f2bd4c3f3",
      "text": "Design Water Recycling and Purification System",
      "custom_tooltip": "<b>Design Water Recycling and Purification System</b><br>Design the system for collecting, filtering, and purifying water for drinking, sanitation, and agriculture. This includes specifying filtration methods, chemical treatments, and storage solutions to ensure a sustainable water supply.<br><b>Resources needed:</b><br><ul><li>Chemical Engineer</li><li>Environmental Engineer</li><li>Hydrologist</li></ul>",
      "start_date": "2031-02-28",
      "duration": 90.0,
      "progress": 0,
      "open": true,
      "meta": "e8c491e0-41c1-47b0-8719-b2acb5a466a8 FS",
      "parent": "ece7d12e-f1d7-4d87-a1f4-f0f6806a962c"
    },
    {
      "id": "96839489-73fd-4cb0-a8c9-9599dafe959a",
      "text": "Design Food Production and Waste Recycling System",
      "custom_tooltip": "<b>Design Food Production and Waste Recycling System</b><br>Design the system for growing crops and raising livestock within the silo, as well as processing waste into fertilizer and other usable resources. This includes specifying agricultural techniques, waste management processes, and nutrient cycling strategies to ensure a sustainable food supply.<br><b>Resources needed:</b><br><ul><li>Agricultural Engineer</li><li>Biologist</li><li>Waste Management Specialist</li></ul>",
      "start_date": "2031-05-29",
      "duration": 90.0,
      "progress": 0,
      "open": true,
      "meta": "5860d1fb-c773-4277-8f44-675f2bd4c3f3 FS",
      "parent": "ece7d12e-f1d7-4d87-a1f4-f0f6806a962c"
    },
    {
      "id": "4cb94ef1-e5d3-4340-af16-6b40fe576848",
      "text": "Integrate Life Support Systems with Silo Infrastructure",
      "custom_tooltip": "<b>Integrate Life Support Systems with Silo Infrastructure</b><br>Ensure seamless integration of air, water, and food systems with the silo&#x27;s overall infrastructure, including power, HVAC, and control systems. This includes designing interfaces, communication protocols, and redundancy measures to ensure reliable operation.<br><b>Resources needed:</b><br><ul><li>Systems Engineer</li><li>Electrical Engineer</li><li>Construction Manager</li></ul>",
      "start_date": "2031-08-27",
      "duration": 90.0,
      "progress": 0,
      "open": true,
      "meta": "96839489-73fd-4cb0-a8c9-9599dafe959a FS",
      "parent": "ece7d12e-f1d7-4d87-a1f4-f0f6806a962c"
    },
    {
      "id": "7f73657a-75d3-4524-95b3-a1ea8dd02875",
      "text": "Model and Simulate System Performance",
      "custom_tooltip": "<b>Model and Simulate System Performance</b><br>Develop computer models and simulations to predict the performance of the integrated life support systems under various conditions, including power outages, equipment failures, and environmental changes. This includes validating models with real-world data and identifying potential vulnerabilities.<br><b>Resources needed:</b><br><ul><li>Simulation Engineer</li><li>Data Analyst</li><li>Environmental Scientist</li></ul>",
      "start_date": "2031-11-25",
      "duration": 90.0,
      "progress": 0,
      "open": true,
      "meta": "ece7d12e-f1d7-4d87-a1f4-f0f6806a962c FF, 4cb94ef1-e5d3-4340-af16-6b40fe576848 FS",
      "parent": "ece7d12e-f1d7-4d87-a1f4-f0f6806a962c"
    },

      "id": "0e98c35f-d97f-41dc-b342-8da2ab6671e2",
      "text": "Design Power Generation and Distribution Systems",
      "custom_tooltip": "<b>Design Power Generation and Distribution Systems</b>",

    },
    {
      "id": "4f2dc04c-1ae0-4f73-b1e4-4f8ddc09fcd3",
      "text": "Select Generator Technology and Vendors",
      "custom_tooltip": "<b>Select Generator Technology and Vendors</b><br>Identify suitable power generation technologies (e.g., nuclear, geothermal, solar) and potential vendors based on efficiency, reliability, and long-term sustainability.  Objective: Determine the optimal power source. Scope: Research various technologies, evaluate vendor proposals, and assess environmental impact. Steps: Literature review, vendor meetings, site visits, and comparative analysis. Deliverables: A detailed report with recommendations.<br><b>Resources needed:</b><br><ul><li>Power Systems Engineer</li><li>Environmental Consultant</li><li>Procurement Specialist</li></ul>",
      "start_date": "2032-02-23",

      "progress": 0,
      "open": true,
      "meta": "0e98c35f-d97f-41dc-b342-8da2ab6671e2 SS",
      "parent": "0e98c35f-d97f-41dc-b342-8da2ab6671e2"
    },
    {
      "id": "45ecc128-1ecb-46f8-af20-2ac8ebe22cf8",
      "text": "Design Power Distribution Network",
      "custom_tooltip": "<b>Design Power Distribution Network</b><br>Develop a detailed design for the power distribution network within the silo, including cabling, transformers, and backup power systems. Objective: Ensure reliable power delivery to all silo zones. Scope: Design the entire power grid, including redundancy and safety features. Steps: Load calculations, network modeling, equipment selection, and safety reviews. Deliverables: Detailed schematics and specifications.<br><b>Resources needed:</b><br><ul><li>Electrical Engineer</li><li>CAD Technician</li><li>Safety Inspector</li></ul>",
      "start_date": "2032-07-09",
      "duration": 137.0,
      "progress": 0,
      "open": true,
      "meta": "4f2dc04c-1ae0-4f73-b1e4-4f8ddc09fcd3 FS",
      "parent": "0e98c35f-d97f-41dc-b342-8da2ab6671e2"
    },
    {
      "id": "b7978ae1-3f9a-4ed4-a0a7-4d99edd15c13",
      "text": "Plan Integration with Life Support Systems",
      "custom_tooltip": "<b>Plan Integration with Life Support Systems</b><br>Coordinate with life support systems engineers to ensure seamless integration of power generation and distribution with air, water, and food systems. Objective: Guarantee continuous operation of life support. Scope: Integrate power with all critical life support functions. Steps: Joint design reviews, interface testing, and contingency planning. Deliverables: Integrated system design document.<br><b>Resources needed:</b><br><ul><li>Power Systems Engineer</li><li>Life Support Systems Engineer</li><li>Integration Specialist</li></ul>",
      "start_date": "2032-11-23",
      "duration": 137.0,
      "progress": 0,
      "open": true,
      "meta": "45ecc128-1ecb-46f8-af20-2ac8ebe22cf8 FS",
      "parent": "0e98c35f-d97f-41dc-b342-8da2ab6671e2"
    },
    {
      "id": "9610db51-87d9-4bab-b91c-11f2d9e02f77",
      "text": "Develop Emergency Power Backup Strategy",
      "custom_tooltip": "<b>Develop Emergency Power Backup Strategy</b><br>Design and implement a robust emergency power backup system to ensure continued operation during primary power failures. Objective: Maintain critical functions during outages. Scope: Design backup power, testing protocols, and maintenance schedules. Steps: Risk assessment, technology selection, system design, and testing. Deliverables: Emergency power plan.<br><b>Resources needed:</b><br><ul><li>Reliability Engineer</li><li>Emergency Management Specialist</li><li>Technician</li></ul>",
      "start_date": "2033-04-09",
      "duration": 137.0,
      "progress": 0,
      "open": true,
      "meta": "0e98c35f-d97f-41dc-b342-8da2ab6671e2 FF, b7978ae1-3f9a-4ed4-a0a7-4d99edd15c13 FS",

    {
      "id": "33f275bf-ae93-4f05-815f-b194f83a3f8a",
      "text": "Select waste processing technologies",
      "custom_tooltip": "<b>Select waste processing technologies</b><br>Evaluate and select appropriate waste processing technologies based on efficiency, cost, and environmental impact. This includes researching different methods like incineration, composting, anaerobic digestion, and pyrolysis, and choosing the best options for the silo&#x27;s specific needs.<br><b>Resources needed:</b><br><ul><li>Environmental Engineer</li><li>Waste Management Specialist</li><li>Cost Analyst</li></ul>",

      "open": true,
      "meta": "aecdc9b3-7b17-4b06-bfd0-70c61d951554 SS",

    },
    {
      "id": "bb9cff26-c72e-45b0-bbc1-11786536cc04",
      "text": "Design waste collection and sorting system",
      "custom_tooltip": "<b>Design waste collection and sorting system</b><br>Design an efficient waste collection and sorting system within the silo to separate recyclable materials from non-recyclable waste. This includes determining the optimal locations for collection points, designing a user-friendly sorting system, and ensuring proper handling of hazardous waste.<br><b>Resources needed:</b><br><ul><li>Industrial Engineer</li><li>Logistics Specialist</li><li>Environmental Engineer</li></ul>",
      "start_date": "2033-11-13",

      "meta": "33f275bf-ae93-4f05-815f-b194f83a3f8a FS",
      "parent": "aecdc9b3-7b17-4b06-bfd0-70c61d951554"
    },
    {
      "id": "8fb1c971-2d7b-4c43-a798-1586660b3631",
      "text": "Design recycling and processing facilities",
      "custom_tooltip": "<b>Design recycling and processing facilities</b><br>Design the layout and infrastructure for recycling and processing facilities within the silo. This includes determining the size and location of the facilities, selecting appropriate equipment, and ensuring proper ventilation and safety measures.<br><b>Resources needed:</b><br><ul><li>Architect</li><li>Mechanical Engineer</li><li>Chemical Engineer</li></ul>",
      "start_date": "2034-02-02",
      "duration": 81.0,
      "progress": 0,
      "open": true,
      "meta": "bb9cff26-c72e-45b0-bbc1-11786536cc04 FS",

    },
    {
      "id": "c143709d-5981-45df-8d23-dd0b8a614894",
      "text": "Plan for waste storage and disposal",
      "custom_tooltip": "<b>Plan for waste storage and disposal</b><br>Develop a plan for the storage and disposal of waste that cannot be recycled or processed within the silo. This includes determining the volume of waste that needs to be stored, designing a safe and secure storage facility, and exploring options for external disposal if necessary.<br><b>Resources needed:</b><br><ul><li>Environmental Engineer</li><li>Logistics Specialist</li><li>Regulatory Compliance Officer</li></ul>",
      "start_date": "2034-04-24",
      "duration": 81.0,
      "progress": 0,
      "open": true,
      "meta": "8fb1c971-2d7b-4c43-a798-1586660b3631 FS",

    {
      "id": "d955c029-4778-4489-9a33-1c00b5f5e77a",
      "text": "Integrate systems with life support",
      "custom_tooltip": "<b>Integrate systems with life support</b><br>Ensure the waste management and recycling systems are seamlessly integrated with the silo&#x27;s life support systems, including air and water purification. This includes designing systems to capture and reuse resources from waste, such as water and energy, and minimizing the environmental impact of waste disposal.<br><b>Resources needed:</b><br><ul><li>Systems Engineer</li><li>Environmental Engineer</li><li>Life Support Systems Engineer</li></ul>",

      "progress": 0,

    {
      "id": "a8fda2c9-1045-4784-9c03-cd0c3803cfdd",
      "text": "Select Security Technology Vendors",
      "custom_tooltip": "<b>Select Security Technology Vendors</b><br>Objective: Identify and select vendors for security hardware and software.\nScope: Research and evaluate potential vendors based on their product offerings, reputation, and cost-effectiveness.\nSteps: 1. Define security requirements. 2. Research potential vendors. 3. Evaluate vendor proposals. 4. Select vendors.\nDeliverables: List of selected security technology vendors.<br><b>Resources needed:</b><br><ul><li>Security Systems Engineer</li><li>Procurement Manager</li><li>IT Specialist</li></ul>",

    {
      "id": "44d32de7-997b-4f3a-a63f-82a656a63c83",
      "text": "Design Physical Security Infrastructure",
      "custom_tooltip": "<b>Design Physical Security Infrastructure</b><br>Objective: Design the physical security infrastructure for the silo.\nScope: Develop detailed plans for access control, surveillance, and perimeter security.\nSteps: 1. Assess physical security risks. 2. Design access control systems. 3. Design surveillance systems. 4. Design perimeter security measures.\nDeliverables: Physical security infrastructure design documents.<br><b>Resources needed:</b><br><ul><li>Security Systems Engineer</li><li>Architect</li><li>Construction Manager</li></ul>",
      "start_date": "2035-03-21",
      "duration": 169.0,
      "progress": 0,
      "open": true,
      "meta": "a8fda2c9-1045-4784-9c03-cd0c3803cfdd FS",

    },
    {
      "id": "8cd13838-863c-460f-9c50-3a95320f0250",
      "text": "Develop Cybersecurity Protocols",
      "custom_tooltip": "<b>Develop Cybersecurity Protocols</b><br>Objective: Develop cybersecurity protocols to protect the silo&#x27;s computer systems.\nScope: Create policies and procedures for network security, data protection, and incident response.\nSteps: 1. Assess cybersecurity risks. 2. Develop network security policies. 3. Develop data protection policies. 4. Develop incident response procedures.\nDeliverables: Cybersecurity protocols document.<br><b>Resources needed:</b><br><ul><li>IT Specialist</li><li>Cybersecurity Expert</li><li>Security Systems Engineer</li></ul>",
      "start_date": "2035-09-06",

    {
      "id": "46330f7c-4eec-41ee-903b-bea24f616ac6",
      "text": "Integrate Security Systems",
      "custom_tooltip": "<b>Integrate Security Systems</b><br>Objective: Integrate all security systems into a unified platform.\nScope: Ensure that all security systems work together seamlessly to provide comprehensive protection.\nSteps: 1. Develop integration plan. 2. Configure security systems. 3. Test system integration. 4. Deploy integrated security system.\nDeliverables: Integrated security system.<br><b>Resources needed:</b><br><ul><li>Security Systems Engineer</li><li>IT Specialist</li><li>Construction Manager</li></ul>",

    {
      "id": "f6948814-f1d1-4112-bc7a-4693cfb1a3dd",
      "text": "Define Internal Transportation Requirements",
      "custom_tooltip": "<b>Define Internal Transportation Requirements</b><br>Determine the specific needs for moving people and goods within the silo, considering capacity, speed, and safety. This includes analyzing traffic patterns, identifying key transport nodes, and defining performance metrics.<br><b>Resources needed:</b><br><ul><li>Logistics Engineer</li><li>Architect</li><li>Silo Operations Planner</li></ul>",
      "start_date": "2036-08-09",
      "duration": 110.0,
      "progress": 0,
      "open": true,
      "meta": "01c5194f-7304-4d78-a1a5-c4efaab2b961 SS",
      "parent": "01c5194f-7304-4d78-a1a5-c4efaab2b961"
    },
    {
      "id": "4eb367f6-60f0-4dd1-9136-9fac99c9ece6",
      "text": "Evaluate Transportation Technology Options",
      "custom_tooltip": "<b>Evaluate Transportation Technology Options</b><br>Research and compare different transportation technologies suitable for the silo environment, such as elevators, automated guided vehicles (AGVs), and monorails. Assess their feasibility, cost-effectiveness, and integration potential.<br><b>Resources needed:</b><br><ul><li>Mechanical Engineer</li><li>Electrical Engineer</li><li>Transportation Consultant</li></ul>",
      "start_date": "2036-11-27",
      "duration": 110.0,
      "progress": 0,
      "open": true,
      "meta": "f6948814-f1d1-4112-bc7a-4693cfb1a3dd FS",
      "parent": "01c5194f-7304-4d78-a1a5-c4efaab2b961"
    },
    {
      "id": "219cefbe-663e-43e7-9a5f-591a84cae921",
      "text": "Design Vertical Transportation Systems",
      "custom_tooltip": "<b>Design Vertical Transportation Systems</b><br>Develop detailed designs for elevators and other vertical transport systems, considering safety regulations, energy efficiency, and passenger comfort. This includes specifying elevator capacity, speed, and control systems.<br><b>Resources needed:</b><br><ul><li>Elevator Engineer</li><li>Structural Engineer</li><li>Safety Inspector</li></ul>",
      "start_date": "2037-03-17",
      "duration": 110.0,
      "progress": 0,
      "open": true,
      "meta": "4eb367f6-60f0-4dd1-9136-9fac99c9ece6 FS",
      "parent": "01c5194f-7304-4d78-a1a5-c4efaab2b961"
    },
    {
      "id": "5563e197-aab8-40e7-9035-42266d15d022",
      "text": "Design Horizontal Transportation Systems",
      "custom_tooltip": "<b>Design Horizontal Transportation Systems</b><br>Design horizontal transportation systems, such as AGVs or conveyor belts, for moving goods and materials within the silo. Consider factors like load capacity, route optimization, and integration with other systems.<br><b>Resources needed:</b><br><ul><li>Industrial Engineer</li><li>Automation Specialist</li><li>Logistics Manager</li></ul>",
      "start_date": "2037-07-05",
      "duration": 110.0,
      "progress": 0,
      "open": true,
      "meta": "219cefbe-663e-43e7-9a5f-591a84cae921 FS",
      "parent": "01c5194f-7304-4d78-a1a5-c4efaab2b961"
    },
    {
      "id": "de847584-8215-4f95-af72-e8bbf6ef02ad",
      "text": "Integrate Transportation with Silo Infrastructure",
      "custom_tooltip": "<b>Integrate Transportation with Silo Infrastructure</b><br>Ensure seamless integration of the transportation systems with the overall silo infrastructure, including power supply, control systems, and emergency exits. This involves coordinating with other engineering teams and conducting thorough testing.<br><b>Resources needed:</b><br><ul><li>Systems Integrator</li><li>Electrical Engineer</li><li>Construction Manager</li></ul>",

    {
      "id": "6cdd62c2-0dcf-4d24-b80f-dcb8187f750e",
      "text": "Excavation and Site Preparation",
      "custom_tooltip": "<b>Excavation and Site Preparation</b>",
      "progress": 0,
      "open": true,
      "meta": "2757302f-fbe6-409f-a6f4-73064e8cc845 SS",

    {
      "id": "dedbfb21-4d83-4821-bdfd-8bc5881ecb9a",
      "text": "Clear vegetation and topsoil removal",
      "custom_tooltip": "<b>Clear vegetation and topsoil removal</b><br>Objective: Prepare the site for excavation by removing all vegetation and topsoil. Scope: This includes clearing trees, shrubs, and grasses, as well as removing the top layer of soil to expose the underlying bedrock or subsoil. Steps: 1. Survey the site to identify vegetation and topsoil areas. 2. Use heavy machinery (e.g., bulldozers, excavators) to clear vegetation. 3. Remove topsoil and stockpile it for later use in landscaping. Deliverables: A cleared and leveled site ready for excavation.<br><b>Resources needed:</b><br><ul><li>Surveyors</li><li>Bulldozers</li><li>Excavators</li><li>Trucks</li><li>Construction crew</li></ul>",
      "start_date": "2038-02-10",
      "duration": 110.0,
      "progress": 0,
      "open": true,
      "meta": "6cdd62c2-0dcf-4d24-b80f-dcb8187f750e SS",
      "parent": "6cdd62c2-0dcf-4d24-b80f-dcb8187f750e"
    },
    {
      "id": "eef8ed2c-caeb-4fa4-854a-239d14c168ac",
      "text": "Drilling and blasting (if necessary)",
      "custom_tooltip": "<b>Drilling and blasting (if necessary)</b><br>Objective: Break up hard rock formations to facilitate excavation. Scope: This includes drilling holes in the rock and using explosives to fracture it. Steps: 1. Conduct a geological survey to identify rock formations. 2. Drill holes in the rock according to a predetermined pattern. 3. Load explosives into the holes and detonate them. 4. Remove the fractured rock. Deliverables: Fractured rock ready for removal.<br><b>Resources needed:</b><br><ul><li>Drilling rigs</li><li>Explosives experts</li><li>Explosives</li><li>Safety personnel</li><li>Excavators</li><li>Trucks</li></ul>",
      "start_date": "2038-05-31",
      "duration": 110.0,
      "progress": 0,
      "open": true,
      "meta": "dedbfb21-4d83-4821-bdfd-8bc5881ecb9a FS",
      "parent": "6cdd62c2-0dcf-4d24-b80f-dcb8187f750e"
    },
    {
      "id": "acb08b53-f4aa-47b0-a3de-e23a38b54b81",
      "text": "Excavate to initial depth",
      "custom_tooltip": "<b>Excavate to initial depth</b><br>Objective: Remove soil and rock to reach the desired initial depth for the silo structure. Scope: This includes excavating the site to the specified depth, ensuring proper slope stability, and managing groundwater. Steps: 1. Use excavators and trucks to remove soil and rock. 2. Implement slope stabilization measures (e.g., shoring, terracing) to prevent landslides. 3. Install dewatering systems to manage groundwater. Deliverables: An excavated site to the initial depth.<br><b>Resources needed:</b><br><ul><li>Excavators</li><li>Trucks</li><li>Shoring equipment</li><li>Dewatering pumps</li><li>Construction crew</li><li>Geotechnical engineers</li></ul>",
      "start_date": "2038-09-18",
      "duration": 110.0,
      "progress": 0,
      "open": true,
      "meta": "eef8ed2c-caeb-4fa4-854a-239d14c168ac FS",
      "parent": "6cdd62c2-0dcf-4d24-b80f-dcb8187f750e"
    },
    {
      "id": "d0591c34-a220-44e9-984d-7d96a55f7103",
      "text": "Implement ground stabilization measures",
      "custom_tooltip": "<b>Implement ground stabilization measures</b><br>Objective: Ensure the stability of the excavated site to prevent collapse or landslides. Scope: This includes implementing ground stabilization techniques such as soil nailing, shotcrete, or retaining walls. Steps: 1. Assess the soil and rock conditions to determine the appropriate stabilization method. 2. Install soil nails or apply shotcrete to reinforce the slopes. 3. Construct retaining walls if necessary. Deliverables: A stabilized excavated site.<br><b>Resources needed:</b><br><ul><li>Geotechnical engineers</li><li>Soil nailing equipment</li><li>Shotcrete equipment</li><li>Retaining wall materials</li><li>Construction crew</li></ul>",
      "start_date": "2039-01-06",
      "duration": 110.0,
      "progress": 0,
      "open": true,
      "meta": "acb08b53-f4aa-47b0-a3de-e23a38b54b81 FS",
      "parent": "6cdd62c2-0dcf-4d24-b80f-dcb8187f750e"
    },
    {
      "id": "9d5e7202-6549-4dc1-a051-bb6fac9d822e",
      "text": "Install initial dewatering system",
      "custom_tooltip": "<b>Install initial dewatering system</b><br>Objective: Manage groundwater levels during excavation and construction. Scope: This includes installing a dewatering system to lower the water table and prevent water from entering the excavation site. Steps: 1. Install well points or deep wells around the perimeter of the site. 2. Pump water from the wells to lower the water table. 3. Treat and discharge the water according to environmental regulations. Deliverables: A dewatered excavation site.<br><b>Resources needed:</b><br><ul><li>Hydrologists</li><li>Well drilling equipment</li><li>Pumps</li><li>Piping</li><li>Water treatment equipment</li><li>Construction crew</li></ul>",
      "start_date": "2039-04-26",
      "duration": 110.0,

      "text": "Pour Foundation for Walls and Floors",
      "custom_tooltip": "<b>Pour Foundation for Walls and Floors</b><br>Objective: Establish a stable base for the silo&#x27;s structural components. Scope: Pour concrete foundation for walls and floors. Steps: Prepare the ground, install rebar, pour concrete, and cure. Deliverables: Completed concrete foundation.<br><b>Resources needed:</b><br><ul><li>Concrete</li><li>Rebar</li><li>Construction crew</li><li>Concrete mixer</li><li>Formwork</li></ul>",

      "text": "Erect Walls and Install Reinforcements",
      "custom_tooltip": "<b>Erect Walls and Install Reinforcements</b><br>Objective: Construct the silo&#x27;s walls and ensure structural integrity. Scope: Erect walls and install reinforcements. Steps: Assemble wall forms, pour concrete, install steel reinforcements, and cure. Deliverables: Completed silo walls with reinforcements.<br><b>Resources needed:</b><br><ul><li>Concrete</li><li>Steel reinforcements</li><li>Construction crew</li><li>Crane</li><li>Wall forms</li></ul>",

      "custom_tooltip": "<b>Construct Floors and Ceilings</b><br>Objective: Build the silo&#x27;s floors and ceilings to create habitable levels. Scope: Construct floors and ceilings. Steps: Install floor supports, pour concrete, and cure. Deliverables: Completed silo floors and ceilings.<br><b>Resources needed:</b><br><ul><li>Concrete</li><li>Floor supports</li><li>Construction crew</li><li>Crane</li><li>Formwork</li></ul>",

      "custom_tooltip": "<b>Implement Quality Control Procedures</b><br>Objective: Ensure the structural integrity and safety of the silo. Scope: Implement quality control procedures. Steps: Conduct regular inspections, test concrete strength, and verify reinforcement placement. Deliverables: Quality control reports and certifications.<br><b>Resources needed:</b><br><ul><li>Quality control inspectors</li><li>Testing equipment</li><li>Inspection checklists</li><li>Engineering plans</li></ul>",

      "text": "Prepare Wall and Floor Surfaces",
      "custom_tooltip": "<b>Prepare Wall and Floor Surfaces</b><br>Objective: Ensure surfaces are ready for structural element installation. Scope: Cleaning, leveling, and applying protective coatings. Steps: Inspect surfaces, remove debris, apply coatings. Deliverables: Prepared surfaces.<br><b>Resources needed:</b><br><ul><li>Construction crew</li><li>Cleaning equipment</li><li>Coating materials</li><li>Inspection tools</li></ul>",

      "text": "Install Wall and Floor Reinforcements",
      "custom_tooltip": "<b>Install Wall and Floor Reinforcements</b><br>Objective: Install steel reinforcements within wall and floor structures. Scope: Cutting, bending, and securing rebar. Steps: Measure and cut rebar, position and tie rebar, inspect placement. Deliverables: Reinforced wall and floor structures.<br><b>Resources needed:</b><br><ul><li>Construction crew</li><li>Rebar</li><li>Cutting tools</li><li>Bending tools</li><li>Tie wire</li></ul>",

      "text": "Pour Concrete for Walls and Floors",
      "custom_tooltip": "<b>Pour Concrete for Walls and Floors</b><br>Objective: Pour concrete to form the structural walls and floors. Scope: Mixing, pouring, and curing concrete. Steps: Prepare concrete mix, pour concrete into forms, vibrate to remove air pockets, cure concrete. Deliverables: Concrete walls and floors.<br><b>Resources needed:</b><br><ul><li>Construction crew</li><li>Concrete mixer</li><li>Concrete</li><li>Forms</li><li>Vibrator</li><li>Curing compounds</li></ul>",

      "text": "Install Ceiling Support Structures",
      "custom_tooltip": "<b>Install Ceiling Support Structures</b><br>Objective: Install support structures for ceilings. Scope: Installing beams, hangers, and bracing. Steps: Measure and cut support members, install hangers, secure bracing. Deliverables: Ceiling support structures.<br><b>Resources needed:</b><br><ul><li>Construction crew</li><li>Support beams</li><li>Hangers</li><li>Bracing</li><li>Fasteners</li></ul>",

      "text": "Cure and Inspect Concrete Structures",
      "custom_tooltip": "<b>Cure and Inspect Concrete Structures</b><br>Objective: Ensure proper curing and structural integrity of concrete. Scope: Monitoring curing process, conducting inspections. Steps: Monitor temperature and humidity, inspect for cracks, perform strength tests. Deliverables: Inspected and cured concrete.<br><b>Resources needed:</b><br><ul><li>Inspection team</li><li>Curing compounds</li><li>Testing equipment</li><li>Monitoring equipment</li></ul>",

      "text": "Procure High-Efficiency Generators",
      "custom_tooltip": "<b>Procure High-Efficiency Generators</b><br>Objective: Acquire generators that meet the silo&#x27;s power demands with high efficiency.\nScope: Research, select, and purchase generators.\nSteps: Define power requirements, research generator models, evaluate vendors, negotiate contracts, and manage delivery.\nDeliverables: Operational high-efficiency generators.<br><b>Resources needed:</b><br><ul><li>Electrical Engineer</li><li>Procurement Specialist</li><li>Logistics Coordinator</li></ul>",

      "id": "e619c486-594c-43d2-99e9-c4acc17d508c",
      "text": "Install Generator Infrastructure",
      "custom_tooltip": "<b>Install Generator Infrastructure</b><br>Objective: Prepare the site and install the necessary infrastructure for the generators.\nScope: Construct foundations, connect fuel lines, and install cooling systems.\nSteps: Prepare site, pour concrete foundations, install fuel lines, install cooling systems, and conduct initial inspections.\nDeliverables: Ready-to-operate generator infrastructure.<br><b>Resources needed:</b><br><ul><li>Construction Crew</li><li>Mechanical Engineer</li><li>Plumbers</li><li>Electricians</li></ul>",

      "id": "8d839082-95e3-4ba8-9594-921bae37461f",
      "text": "Integrate Power Grid",
      "custom_tooltip": "<b>Integrate Power Grid</b><br>Objective: Connect the generators to the silo&#x27;s internal power grid.\nScope: Design and implement the electrical connections and control systems.\nSteps: Design electrical connections, install wiring and switchgear, program control systems, and conduct testing.\nDeliverables: Fully integrated and functional power grid.<br><b>Resources needed:</b><br><ul><li>Electrical Engineer</li><li>Control Systems Engineer</li><li>Electricians</li><li>Testing Technicians</li></ul>",
