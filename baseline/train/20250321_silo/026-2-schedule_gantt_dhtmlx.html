      "text": "Test Power System Performance",
      "custom_tooltip": "<b>Test Power System Performance</b><br>Objective: Verify the performance and reliability of the power generation system.\nScope: Conduct load testing, efficiency measurements, and safety checks.\nSteps: Conduct load testing, measure efficiency, perform safety checks, and document results.\nDeliverables: Performance report and system certification.<br><b>Resources needed:</b><br><ul><li>Electrical Engineer</li><li>Testing Technicians</li><li>Safety Inspectors</li></ul>",

      "custom_tooltip": "<b>Establish Fuel Supply Chain</b><br>Objective: Secure a reliable fuel supply for the generators (if applicable).\nScope: Identify fuel sources, negotiate contracts, and establish delivery logistics.\nSteps: Identify fuel sources, negotiate contracts, establish delivery logistics, and implement storage procedures.\nDeliverables: Secure and reliable fuel supply chain.<br><b>Resources needed:</b><br><ul><li>Logistics Coordinator</li><li>Procurement Specialist</li><li>Fuel Supplier</li></ul>",

      "custom_tooltip": "<b>Procure waste processing equipment</b><br>Objective: Acquire all necessary equipment for the waste management system.\nScope: Includes compactors, incinerators, recycling machinery, and bio-waste processors.\nSteps: Identify vendors, obtain quotes, negotiate contracts, and manage delivery.\nDeliverables: Signed contracts and delivered equipment.<br><b>Resources needed:</b><br><ul><li>Procurement Manager</li><li>Waste Management Engineer</li><li>Legal Counsel</li></ul>",

      "custom_tooltip": "<b>Procure Security System Components</b><br>Objective: Acquire all necessary hardware and software components for the security system.\nScope: Includes cameras, sensors, access control systems, servers, and network equipment.\nSteps: Identify vendors, obtain quotes, place orders, track shipments, and verify receipt of goods.\nDeliverables: Complete inventory of security system components.<br><b>Resources needed:</b><br><ul><li>Procurement Specialist</li><li>Security Systems Engineer</li><li>Logistics Coordinator</li></ul>",

      "custom_tooltip": "<b>Install Physical Security Infrastructure</b><br>Objective: Install physical security elements within the silo.\nScope: Includes installing cameras, sensors, access control points, and perimeter security measures.\nSteps: Prepare installation sites, mount equipment, connect wiring, and test functionality.\nDeliverables: Fully installed and operational physical security infrastructure.<br><b>Resources needed:</b><br><ul><li>Security Technicians</li><li>Electricians</li><li>Construction Crew</li></ul>",

      "text": "Configure Cybersecurity Systems",
      "custom_tooltip": "<b>Configure Cybersecurity Systems</b><br>Objective: Configure and deploy cybersecurity measures to protect the silo&#x27;s network and data.\nScope: Includes firewalls, intrusion detection systems, antivirus software, and access controls.\nSteps: Install software, configure settings, test security protocols, and monitor network traffic.\nDeliverables: Fully configured and operational cybersecurity systems.<br><b>Resources needed:</b><br><ul><li>Cybersecurity Engineers</li><li>Network Administrators</li><li>Software Developers</li></ul>",

      "text": "Integrate Security Systems",
      "custom_tooltip": "<b>Integrate Security Systems</b><br>Objective: Integrate all security components into a unified system.\nScope: Includes physical security, cybersecurity, and emergency response systems.\nSteps: Connect systems, configure data sharing, test interoperability, and train personnel.\nDeliverables: Fully integrated and operational security system.<br><b>Resources needed:</b><br><ul><li>Security Systems Engineer</li><li>Cybersecurity Engineers</li><li>Systems Integrator</li></ul>",

      "text": "Test and Validate Security Systems",
      "custom_tooltip": "<b>Test and Validate Security Systems</b><br>Objective: Verify the effectiveness of the security system.\nScope: Includes penetration testing, vulnerability assessments, and security audits.\nSteps: Conduct tests, analyze results, identify vulnerabilities, and implement corrective actions.\nDeliverables: Validated and certified security system.<br><b>Resources needed:</b><br><ul><li>Security Auditors</li><li>Penetration Testers</li><li>Security Systems Engineer</li></ul>",

    {
      "id": "8fee65f4-4afa-4911-aee7-04bd420527ef",
      "text": "Research social control models",
      "custom_tooltip": "<b>Research social control models</b><br>Objective: Identify various social control models applicable to a closed environment.\nScope: Research historical and contemporary examples of social control, including their effectiveness and ethical implications.\nSteps: Literature review, case study analysis, expert consultations.\nDeliverables: A comprehensive report on social control models.<br><b>Resources needed:</b><br><ul><li>Sociologist</li><li>Historian</li><li>Research assistant</li></ul>",
      "start_date": "2052-06-03",

    },
    {
      "id": "bf000af2-0d14-45af-b739-03948a0a34b8",
      "text": "Assess population acceptance of controls",
      "custom_tooltip": "<b>Assess population acceptance of controls</b><br>Objective: Determine the level of acceptance of different social control mechanisms by the potential silo population.\nScope: Conduct surveys, focus groups, and simulations to gauge public opinion and identify potential resistance.\nSteps: Develop survey instruments, recruit participants, analyze data.\nDeliverables: A report on population acceptance of social control mechanisms.<br><b>Resources needed:</b><br><ul><li>Survey specialist</li><li>Psychologist</li><li>Data analyst</li></ul>",
      "start_date": "2052-07-18",

    {
      "id": "7c907f37-6d60-4e0b-aac2-e2c459bb8aff",
      "text": "Develop social control implementation plan",
      "custom_tooltip": "<b>Develop social control implementation plan</b><br>Objective: Create a detailed plan for implementing the chosen social control mechanism within the silo.\nScope: Define specific policies, procedures, and technologies required for effective implementation.\nSteps: Develop policy documents, design implementation strategies, identify required resources.\nDeliverables: A comprehensive social control implementation plan.<br><b>Resources needed:</b><br><ul><li>Policy analyst</li><li>Security expert</li><li>Legal counsel</li></ul>",

    {
      "id": "5ae00eef-bb42-43ba-a4a9-afa687a16634",
      "text": "Evaluate ethical implications of controls",
      "custom_tooltip": "<b>Evaluate ethical implications of controls</b><br>Objective: Assess the ethical implications of the chosen social control mechanism and identify potential mitigation strategies.\nScope: Conduct ethical reviews, consult with ethicists, and develop guidelines for responsible implementation.\nSteps: Ethical review process, stakeholder consultations, development of ethical guidelines.\nDeliverables: An ethical impact assessment report.<br><b>Resources needed:</b><br><ul><li>Ethicist</li><li>Legal counsel</li><li>Stakeholder representatives</li></ul>",

    {
      "id": "e2417103-c179-40a1-849d-be496333d67c",
      "text": "Define Ethical Principles and Guidelines",
      "custom_tooltip": "<b>Define Ethical Principles and Guidelines</b><br>Establish a clear set of ethical principles and guidelines to govern all aspects of silo operations, including social control, resource allocation, and information management. This involves researching existing ethical frameworks, consulting with ethicists, and adapting principles to the unique context of the silo.<br><b>Resources needed:</b><br><ul><li>Ethicist</li><li>Legal Counsel</li><li>Social Scientist</li><li>Governance Planner</li></ul>",
      "start_date": "2052-11-30",
      "duration": 30.0,

    {
      "id": "99fd206a-5d9b-4246-958a-f1bbc7fbbbb6",
      "text": "Establish Independent Oversight Committee",
      "custom_tooltip": "<b>Establish Independent Oversight Committee</b><br>Create an independent committee responsible for monitoring and enforcing ethical compliance within the silo. This includes defining the committee&#x27;s mandate, selecting members with diverse backgrounds and expertise, and establishing procedures for reporting and investigating ethical concerns.<br><b>Resources needed:</b><br><ul><li>Governance Planner</li><li>Legal Counsel</li><li>Human Resources</li><li>Community Representatives</li></ul>",
      "start_date": "2052-12-30",

    },
    {
      "id": "7b3f5298-e4a3-4863-884c-46ccde641c10",
      "text": "Develop Whistleblower Protection Mechanisms",
      "custom_tooltip": "<b>Develop Whistleblower Protection Mechanisms</b><br>Implement mechanisms to protect individuals who report ethical violations from retaliation or reprisal. This includes establishing confidential reporting channels, providing legal protection for whistleblowers, and ensuring that all reports are thoroughly investigated.<br><b>Resources needed:</b><br><ul><li>Legal Counsel</li><li>Human Resources</li><li>Security Personnel</li><li>Governance Planner</li></ul>",

    },
    {
      "id": "f82f6c54-0218-4a11-a9ec-98fb006113d1",
      "text": "Conduct Regular Ethical Audits and Training",
      "custom_tooltip": "<b>Conduct Regular Ethical Audits and Training</b><br>Conduct periodic audits to assess ethical compliance and identify areas for improvement. Provide regular training to all silo inhabitants on ethical principles, reporting procedures, and whistleblower protection mechanisms.<br><b>Resources needed:</b><br><ul><li>Ethicist</li><li>Auditors</li><li>Training Specialists</li><li>Governance Planner</li></ul>",

      "custom_tooltip": "<b>Implement Surveillance Systems</b><br>Deploy surveillance technologies to monitor communication and information flow within the silo. Ensure compliance with privacy regulations.<br><b>Resources needed:</b><br><ul><li>Security Specialists</li><li>Surveillance Technicians</li><li>Legal Counsel</li></ul>",

      "custom_tooltip": "<b>Train Personnel on Info Control</b><br>Educate staff on the information control policies and procedures, including how to operate the filtering and surveillance systems.<br><b>Resources needed:</b><br><ul><li>Training Specialists</li><li>Security Personnel</li><li>System Administrators</li></ul>",

    {
      "id": "5a7a0585-68f7-495d-acde-2f1793ca9c71",
      "text": "Analyze current resource usage patterns",
      "custom_tooltip": "<b>Analyze current resource usage patterns</b><br>Objective: Understand current resource consumption within the silo. Scope: Analyze historical data on resource usage, identify key consumption drivers, and project future needs. Steps: Collect data, analyze trends, create consumption models. Deliverables: Resource consumption report.<br><b>Resources needed:</b><br><ul><li>Data analyst</li><li>Resource management specialist</li><li>Database administrator</li></ul>",

    },
    {
      "id": "a356fb27-76bc-4782-a327-6852728eecd3",
      "text": "Identify critical resource dependencies",
      "custom_tooltip": "<b>Identify critical resource dependencies</b><br>Objective: Determine which resources are most critical for silo operation. Scope: Identify dependencies between different resources, assess the impact of resource shortages, and prioritize resource allocation. Steps: Conduct dependency mapping, perform impact analysis, develop prioritization criteria. Deliverables: Resource dependency matrix.<br><b>Resources needed:</b><br><ul><li>Resource management specialist</li><li>System engineer</li><li>Risk assessment specialist</li></ul>",
      "start_date": "2054-01-28",
      "duration": 34.0,
      "progress": 0,

    },
    {
      "id": "884642c8-de4b-4c19-8262-9e7ae2ae2ad6",
      "text": "Develop resource allocation strategies",
      "custom_tooltip": "<b>Develop resource allocation strategies</b><br>Objective: Create strategies for allocating resources effectively. Scope: Develop allocation models, define allocation priorities, and establish allocation procedures. Steps: Model allocation scenarios, define allocation rules, document procedures. Deliverables: Resource allocation plan.<br><b>Resources needed:</b><br><ul><li>Resource management specialist</li><li>Economist</li><li>Policy analyst</li></ul>",
      "start_date": "2054-03-03",

      "progress": 0,
      "open": true,

    {
      "id": "8cf1f744-83e5-448d-a308-ebab8b6ad873",
      "text": "Establish monitoring and control mechanisms",
      "custom_tooltip": "<b>Establish monitoring and control mechanisms</b><br>Objective: Implement mechanisms for monitoring resource usage and controlling allocation. Scope: Develop monitoring systems, establish control procedures, and define reporting requirements. Steps: Design monitoring dashboards, implement control protocols, document reporting procedures. Deliverables: Resource monitoring and control system.<br><b>Resources needed:</b><br><ul><li>System administrator</li><li>Resource management specialist</li><li>Data analyst</li></ul>",

    {
      "id": "3fb8ccff-badf-4b0a-8e74-6be61354ee64",
      "text": "Analyze Current Resource Availability",
      "custom_tooltip": "<b>Analyze Current Resource Availability</b><br>Objective: Determine the current availability of key resources (water, food, energy, materials) within the silo. Scope: Assess existing stockpiles, production capacities, and potential external supply lines. Steps: Inventory existing resources, model production rates, and evaluate supply chain vulnerabilities. Deliverables: Resource availability report.<br><b>Resources needed:</b><br><ul><li>Resource Management Team</li><li>Data Analysts</li><li>Supply Chain Specialists</li></ul>",
      "start_date": "2054-05-10",
      "duration": 45.0,

      "open": true,
      "meta": "d0b35669-3d7a-4788-8404-1f1ccc3f3ceb SS",

    },
    {
      "id": "2fdf5508-66aa-4739-bf77-cd4a32c279f8",
      "text": "Model Resource Consumption Patterns",
      "custom_tooltip": "<b>Model Resource Consumption Patterns</b><br>Objective: Predict future resource consumption patterns based on population size, lifestyle, and industrial activities. Scope: Develop models for water, food, energy, and material consumption. Steps: Analyze historical data, simulate different consumption scenarios, and identify potential bottlenecks. Deliverables: Resource consumption model.<br><b>Resources needed:</b><br><ul><li>Data Scientists</li><li>Simulation Software</li><li>Population Demographics Data</li></ul>",
      "start_date": "2054-06-24",
      "duration": 45.0,
      "progress": 0,
      "open": true,
      "meta": "3fb8ccff-badf-4b0a-8e74-6be61354ee64 FS",

    },
    {
      "id": "97e93fd2-08b3-4b5b-9d40-7d19f2a8e06d",
      "text": "Establish Resource Allocation Priorities",
      "custom_tooltip": "<b>Establish Resource Allocation Priorities</b><br>Objective: Define clear priorities for resource allocation in different scenarios (e.g., normal operations, emergencies, shortages). Scope: Develop a resource allocation framework that balances competing needs and ensures equitable distribution. Steps: Conduct stakeholder consultations, develop allocation criteria, and establish decision-making processes. Deliverables: Resource allocation framework document.<br><b>Resources needed:</b><br><ul><li>Governance Committee</li><li>Ethical Oversight Committee</li><li>Community Representatives</li></ul>",
      "start_date": "2054-08-08",
      "duration": 45.0,
      "progress": 0,
      "open": true,
      "meta": "2fdf5508-66aa-4739-bf77-cd4a32c279f8 FS",

    },
    {
      "id": "01c82629-697a-4a2e-92bb-97317f2cc174",
      "text": "Develop Contingency Plans for Shortages",
      "custom_tooltip": "<b>Develop Contingency Plans for Shortages</b><br>Objective: Create contingency plans for addressing potential resource shortages due to unforeseen events (e.g., system failures, supply chain disruptions). Scope: Identify alternative resource sources, develop rationing strategies, and establish emergency protocols. Steps: Conduct risk assessments, identify alternative suppliers, and develop emergency response plans. Deliverables: Resource shortage contingency plans.<br><b>Resources needed:</b><br><ul><li>Risk Assessment Team</li><li>Emergency Response Team</li><li>Supply Chain Specialists</li></ul>",
      "start_date": "2054-09-22",

      "text": "Develop Social Control Enforcement Guidelines",
      "custom_tooltip": "<b>Develop Social Control Enforcement Guidelines</b><br>Create detailed guidelines for enforcing social controls, including procedures for addressing violations and maintaining order. This ensures consistent and fair application of rules.<br><b>Resources needed:</b><br><ul><li>Social Systems Planner</li><li>Security Officer</li><li>Legal Counsel</li></ul>",

      "text": "Implement Monitoring and Surveillance Systems",
      "custom_tooltip": "<b>Implement Monitoring and Surveillance Systems</b><br>Deploy and maintain the technological infrastructure for monitoring and surveillance, ensuring its effectiveness and compliance with ethical guidelines. This provides real-time data for social control enforcement.<br><b>Resources needed:</b><br><ul><li>Security Officer</li><li>IT Specialist</li><li>Surveillance Technician</li></ul>",

      "text": "Train Personnel on Social Control Procedures",
      "custom_tooltip": "<b>Train Personnel on Social Control Procedures</b><br>Provide comprehensive training to personnel responsible for enforcing social controls, ensuring they understand the guidelines and can apply them effectively. This builds capacity and promotes consistent enforcement.<br><b>Resources needed:</b><br><ul><li>Training Specialist</li><li>Social Systems Planner</li><li>Security Officer</li></ul>",

      "text": "Establish Feedback and Adjustment Mechanisms",
      "custom_tooltip": "<b>Establish Feedback and Adjustment Mechanisms</b><br>Create systems for gathering feedback from the population and adjusting social control measures as needed, ensuring they remain effective and acceptable. This promotes adaptability and reduces social unrest.<br><b>Resources needed:</b><br><ul><li>Social Systems Planner</li><li>Communication Specialist</li><li>Data Analyst</li></ul>",

    {
      "id": "b2ab972c-db6e-43cc-8451-4470979849dc",
      "text": "Inspect air filtration system components",
      "custom_tooltip": "<b>Inspect air filtration system components</b><br>Objective: Verify the integrity and functionality of all air filtration system components before testing.\nScope: Visual inspection of filters, blowers, sensors, and control systems.\nSteps: 1. Access each air filtration unit. 2. Check for physical damage or wear. 3. Verify sensor calibration. 4. Document findings.\nDeliverables: Inspection report with photos and notes.<br><b>Resources needed:</b><br><ul><li>HVAC Technician</li><li>Inspection tools</li><li>Calibration equipment</li><li>Documentation software</li></ul>",
      "start_date": "2055-03-06",

    {
      "id": "c363dbc6-86ee-445d-974f-e4546afe8ad4",
      "text": "Test air quality under load conditions",
      "custom_tooltip": "<b>Test air quality under load conditions</b><br>Objective: Evaluate the air filtration system&#x27;s performance under simulated occupancy conditions.\nScope: Measure air quality parameters (CO2, O2, particulate matter) at various occupancy levels.\nSteps: 1. Simulate different occupancy scenarios. 2. Monitor air quality sensors. 3. Record data. 4. Compare results to standards.\nDeliverables: Air quality test report with data analysis.<br><b>Resources needed:</b><br><ul><li>Environmental Engineer</li><li>Air quality monitoring equipment</li><li>Simulation software</li><li>Data analysis tools</li></ul>",
      "start_date": "2055-03-21",

    },
    {
      "id": "98afa08d-5713-48e4-bce8-05dffc1fddd0",
      "text": "Evaluate water purification system efficiency",
      "custom_tooltip": "<b>Evaluate water purification system efficiency</b><br>Objective: Assess the effectiveness of the water purification system in removing contaminants.\nScope: Analyze water samples for bacteria, chemicals, and other pollutants.\nSteps: 1. Collect water samples from various points in the system. 2. Send samples to a certified lab for analysis. 3. Review lab results. 4. Compare results to water quality standards.\nDeliverables: Water quality analysis report.<br><b>Resources needed:</b><br><ul><li>Water Treatment Specialist</li><li>Sampling equipment</li><li>Certified laboratory</li><li>Data analysis software</li></ul>",
      "start_date": "2055-04-05",
      "duration": 15.0,

    },
    {
      "id": "9f93a367-9e0d-4f77-8c73-c441b02f64e0",
      "text": "Verify closed-loop system integration",
      "custom_tooltip": "<b>Verify closed-loop system integration</b><br>Objective: Confirm that the air and water systems function effectively as a closed loop.\nScope: Monitor the interaction between the air and water systems to ensure balance and stability.\nSteps: 1. Run the systems in closed-loop mode. 2. Monitor key parameters (humidity, temperature, water levels). 3. Adjust system settings as needed. 4. Document system performance.\nDeliverables: Integrated system performance report.<br><b>Resources needed:</b><br><ul><li>Systems Engineer</li><li>Monitoring equipment</li><li>Control systems</li><li>Documentation software</li></ul>",

      "id": "9c2bae23-4ada-49d3-aa7c-9613122223c3",
      "text": "Inspect and Calibrate Generators",
      "custom_tooltip": "<b>Inspect and Calibrate Generators</b><br>Thoroughly inspect all generators for any signs of wear, damage, or malfunction. Calibrate each generator to ensure optimal performance and efficiency. Document all findings and adjustments.<br><b>Resources needed:</b><br><ul><li>Generator Technicians</li><li>Calibration Equipment</li><li>Inspection Tools</li><li>Maintenance Logs</li></ul>",

    {
      "id": "1dee9136-d0d5-4fda-a325-fe900b406c6f",
      "text": "Test Fuel Delivery Systems",
      "custom_tooltip": "<b>Test Fuel Delivery Systems</b><br>Test the fuel delivery systems to ensure a consistent and reliable fuel supply to the generators. Check for leaks, blockages, or other issues that could disrupt fuel flow. Verify fuel levels and storage capacity.<br><b>Resources needed:</b><br><ul><li>Fuel System Technicians</li><li>Testing Equipment</li><li>Fuel Storage Tanks</li><li>Fuel Supply Logs</li></ul>",

    {
      "id": "9ec3f482-29e3-4d1a-8e11-d103091faf5f",
      "text": "Simulate Power Load Scenarios",
      "custom_tooltip": "<b>Simulate Power Load Scenarios</b><br>Simulate various power load scenarios to assess the generators&#x27; ability to meet the silo&#x27;s energy demands under different conditions. Test the generators&#x27; response to sudden increases or decreases in power load. Analyze the results and identify any potential weaknesses.<br><b>Resources needed:</b><br><ul><li>Electrical Engineers</li><li>Simulation Software</li><li>Load Banks</li><li>Data Acquisition Systems</li></ul>",

    {
      "id": "c9b932d0-b94c-4b42-a47b-e5c0685995bf",
      "text": "Verify Backup Power Activation",
      "custom_tooltip": "<b>Verify Backup Power Activation</b><br>Verify that the backup power systems activate automatically and seamlessly in the event of a primary power failure. Test the transfer switches and other components to ensure a smooth transition to backup power. Document the activation process and response time.<br><b>Resources needed:</b><br><ul><li>Electrical Technicians</li><li>Transfer Switches</li><li>Backup Generators</li><li>Power Monitoring Systems</li></ul>",

    },
    {
      "id": "07861436-d9ee-48b1-9d4e-1c15b1571c51",
      "text": "Analyze Power Grid Integration",
      "custom_tooltip": "<b>Analyze Power Grid Integration</b><br>Analyze the integration of the power generation systems with the overall silo power grid. Check for compatibility issues, voltage fluctuations, or other problems that could affect the stability of the grid. Implement any necessary adjustments to ensure a reliable and efficient power supply.<br><b>Resources needed:</b><br><ul><li>Power Grid Engineers</li><li>Testing Equipment</li><li>Power Distribution Systems</li><li>Grid Monitoring Software</li></ul>",

    {
      "id": "f7a69aba-8ba2-4f43-8c11-b2abef6329de",
      "text": "Prepare Waste Stream Characterization Report",
      "custom_tooltip": "<b>Prepare Waste Stream Characterization Report</b><br>Objective: Accurately characterize the waste streams generated within the silo environment to inform the design and operation of the waste management system.\nScope: This includes identifying the types and quantities of waste generated by residential, agricultural, and industrial activities.\nSteps: Conduct waste audits, analyze waste samples, and compile a comprehensive report.\nDeliverables: A detailed waste stream characterization report.<br><b>Resources needed:</b><br><ul><li>Environmental Engineer</li><li>Waste Management Specialist</li><li>Laboratory Technicians</li><li>Data Analysts</li></ul>",

    {
      "id": "2519d6f5-7b93-437a-ad38-9a14dba4551b",
      "text": "Test Waste Processing Equipment Performance",
      "custom_tooltip": "<b>Test Waste Processing Equipment Performance</b><br>Objective: Evaluate the performance of selected waste processing equipment to ensure it meets the required efficiency and capacity.\nScope: This includes testing the equipment&#x27;s ability to process different types of waste, its energy consumption, and its maintenance requirements.\nSteps: Conduct bench-scale and pilot-scale testing of waste processing equipment.\nDeliverables: Performance data for each piece of equipment.<br><b>Resources needed:</b><br><ul><li>Mechanical Engineer</li><li>Chemical Engineer</li><li>Equipment Operators</li><li>Testing Facilities</li></ul>",

    },
    {
      "id": "86770d82-4ebd-4925-8284-b60f65a4f5a2",
      "text": "Simulate Biohazard Containment Procedures",
      "custom_tooltip": "<b>Simulate Biohazard Containment Procedures</b><br>Objective: Verify the effectiveness of biohazard containment procedures to prevent the release of harmful pathogens.\nScope: This includes simulating various scenarios, such as equipment failures and human errors, to assess the system&#x27;s resilience.\nSteps: Conduct simulations using computational models and physical mock-ups.\nDeliverables: A report on the effectiveness of biohazard containment procedures.<br><b>Resources needed:</b><br><ul><li>Biohazard Specialist</li><li>Simulation Software</li><li>Safety Personnel</li><li>Emergency Response Team</li></ul>",

    {
      "id": "6030e470-32e0-4c0f-8c43-cb05a592fd51",
      "text": "Validate Recycling Process Efficiency",
      "custom_tooltip": "<b>Validate Recycling Process Efficiency</b><br>Objective: Determine the efficiency of the recycling processes in recovering valuable materials from waste streams.\nScope: This includes measuring the recovery rates for different materials, the quality of the recycled products, and the environmental impact of the recycling processes.\nSteps: Conduct material balance studies and life cycle assessments.\nDeliverables: A report on the recycling process efficiency.<br><b>Resources needed:</b><br><ul><li>Materials Scientist</li><li>Recycling Technician</li><li>Environmental Analyst</li><li>Analytical Equipment</li></ul>",

      "text": "Develop Integrated Testing Scenarios",
      "custom_tooltip": "<b>Develop Integrated Testing Scenarios</b><br>Define comprehensive testing scenarios that simulate real-world operational conditions and potential failure modes. This includes defining input parameters, expected outputs, and acceptance criteria for each scenario.<br><b>Resources needed:</b><br><ul><li>Systems Engineer</li><li>Risk Assessment Specialist</li><li>Operational Staff</li></ul>",

      "text": "Conduct Component Compatibility Testing",
      "custom_tooltip": "<b>Conduct Component Compatibility Testing</b><br>Verify the compatibility of individual components and subsystems before integration. This involves testing interfaces, data exchange protocols, and power requirements to ensure seamless operation.<br><b>Resources needed:</b><br><ul><li>Electrical Engineer</li><li>Software Engineer</li><li>Mechanical Engineer</li></ul>",

      "id": "749980fa-8c4a-49b9-9660-e146463a7717",
      "text": "Execute Phased Integrated System Tests",
      "custom_tooltip": "<b>Execute Phased Integrated System Tests</b><br>Perform integrated system tests in a phased approach, starting with core systems and gradually incorporating additional components. This allows for early detection and resolution of integration issues.<br><b>Resources needed:</b><br><ul><li>Test Engineers</li><li>System Administrators</li><li>Security Specialists</li></ul>",
      "start_date": "2056-08-07",
      "duration": 24.0,
      "progress": 0,
      "open": true,
      "meta": "4040a627-20e7-43df-a153-23c691b669f1 FS",
      "parent": "5cb259e3-f2b5-44f3-a4fc-fb7812b92bc8"
    },
    {
      "id": "9176a567-ba77-4405-a95b-390bc5b84e66",
      "text": "Analyze Test Results and Identify Issues",
      "custom_tooltip": "<b>Analyze Test Results and Identify Issues</b><br>Thoroughly analyze test results to identify performance bottlenecks, integration conflicts, and potential failure points. Document all findings and prioritize issues for resolution.<br><b>Resources needed:</b><br><ul><li>Data Analysts</li><li>System Architects</li><li>Quality Assurance Team</li></ul>",
      "start_date": "2056-08-31",
      "duration": 24.0,
      "progress": 0,
      "open": true,
      "meta": "749980fa-8c4a-49b9-9660-e146463a7717 FS",
      "parent": "5cb259e3-f2b5-44f3-a4fc-fb7812b92bc8"
    },
    {
      "id": "409b1803-b0b9-4e6d-834c-3ce6e23339da",
      "text": "Implement Corrective Actions and Retest",
      "custom_tooltip": "<b>Implement Corrective Actions and Retest</b><br>Implement corrective actions to address identified issues and retest the affected systems to verify the effectiveness of the solutions. Document all changes and maintain a comprehensive audit trail.<br><b>Resources needed:</b><br><ul><li>Development Team</li><li>Configuration Management</li><li>Test Engineers</li></ul>",
      "start_date": "2056-09-24",
      "duration": 24.0,
      "progress": 0,
      "open": true,
      "meta": "5cb259e3-f2b5-44f3-a4fc-fb7812b92bc8 FF, 9176a567-ba77-4405-a95b-390bc5b84e66 FS",
      "parent": "5cb259e3-f2b5-44f3-a4fc-fb7812b92bc8"
    },
    {
      "id": "6cf4b65a-3b80-4e8a-accf-c922ec006b6d",
      "text": "Obtain Regulatory Approvals",
      "custom_tooltip": "<b>Obtain Regulatory Approvals</b>",
      "progress": 0,
      "open": true,
      "meta": "a278ffa5-eb07-4867-a700-f58fd82bf480 FF, 5cb259e3-f2b5-44f3-a4fc-fb7812b92bc8 FS",
      "parent": "a278ffa5-eb07-4867-a700-f58fd82bf480",
      "type": "project"
    },
    {
      "id": "88fed726-b3c8-4d18-a7bc-108d7ff006d5",
      "text": "Define Security System Requirements",
      "custom_tooltip": "<b>Define Security System Requirements</b><br>Objective: Clearly define the security requirements for the silo, including physical security, cybersecurity, and personnel security. Scope: This includes identifying assets to be protected, potential threats, and acceptable levels of risk. Steps: Conduct a risk assessment, identify applicable regulations and standards, and document the requirements in a security plan. Deliverables: A comprehensive security requirements document.<br><b>Resources needed:</b><br><ul><li>Security Architect</li><li>Risk Assessment Specialist</li><li>Cybersecurity Expert</li><li>Regulatory Compliance Officer</li></ul>",
      "start_date": "2056-10-18",
      "duration": 18.0,
      "progress": 0,
      "open": true,
      "meta": "6cf4b65a-3b80-4e8a-accf-c922ec006b6d SS",
      "parent": "6cf4b65a-3b80-4e8a-accf-c922ec006b6d"
    },
    {
      "id": "095a502b-f5b8-46ca-85c3-f26546544c10",
      "text": "Design Security System Architecture",
      "custom_tooltip": "<b>Design Security System Architecture</b><br>Objective: Design a security system architecture that meets the defined security requirements. Scope: This includes selecting appropriate security technologies, defining system interfaces, and developing a system design document. Steps: Evaluate different security technologies, design the system architecture, and document the design in a system design document. Deliverables: A detailed security system architecture design document.<br><b>Resources needed:</b><br><ul><li>Security Architect</li><li>Cybersecurity Engineer</li><li>Physical Security Specialist</li><li>Systems Engineer</li></ul>",
      "start_date": "2056-11-05",
      "duration": 18.0,
      "progress": 0,
      "open": true,
      "meta": "88fed726-b3c8-4d18-a7bc-108d7ff006d5 FS",
      "parent": "6cf4b65a-3b80-4e8a-accf-c922ec006b6d"
    },
    {
      "id": "b2d6b307-94e9-4c8c-8261-09e2b11dfe34",
      "text": "Procure Security System Components",
      "custom_tooltip": "<b>Procure Security System Components</b><br>Objective: Procure the necessary security system components. Scope: This includes identifying vendors, obtaining quotes, and placing orders for the selected components. Steps: Identify potential vendors, obtain quotes, evaluate proposals, and place orders. Deliverables: Purchase orders for all required security system components.<br><b>Resources needed:</b><br><ul><li>Procurement Specialist</li><li>Security Architect</li><li>Budget Analyst</li></ul>",
      "start_date": "2056-11-23",
      "duration": 18.0,
      "progress": 0,
      "open": true,
      "meta": "095a502b-f5b8-46ca-85c3-f26546544c10 FS",
      "parent": "6cf4b65a-3b80-4e8a-accf-c922ec006b6d"
    },
    {
      "id": "341ec68d-1bba-41ea-a804-3f3d7451ada2",
      "text": "Install Security System Hardware and Software",
      "custom_tooltip": "<b>Install Security System Hardware and Software</b><br>Objective: Install the security system hardware and software. Scope: This includes installing physical security devices, configuring network security devices, and installing security software. Steps: Install hardware, configure software, and test the installation. Deliverables: A fully installed and configured security system.<br><b>Resources needed:</b><br><ul><li>Security Technicians</li><li>Network Engineers</li><li>Software Engineers</li><li>Physical Security Installers</li></ul>",
      "start_date": "2056-12-11",
      "duration": 18.0,
      "progress": 0,
      "open": true,
      "meta": "b2d6b307-94e9-4c8c-8261-09e2b11dfe34 FS",
      "parent": "6cf4b65a-3b80-4e8a-accf-c922ec006b6d"
    },
    {
      "id": "03db6362-b493-4977-a909-b2e90e9d556b",
      "text": "Test and Validate Security System",
      "custom_tooltip": "<b>Test and Validate Security System</b><br>Objective: Test and validate the security system to ensure that it meets the defined requirements. Scope: This includes conducting functional testing, penetration testing, and vulnerability assessments. Steps: Develop test plans, conduct testing, and document the results. Deliverables: A security system test report.<br><b>Resources needed:</b><br><ul><li>Security Testers</li><li>Penetration Testers</li><li>Security Architect</li><li>Cybersecurity Engineer</li></ul>",
      "start_date": "2056-12-29",
      "duration": 18.0,
      "progress": 0,
      "open": true,
      "meta": "6cf4b65a-3b80-4e8a-accf-c922ec006b6d FF, 341ec68d-1bba-41ea-a804-3f3d7451ada2 FS",
      "parent": "6cf4b65a-3b80-4e8a-accf-c922ec006b6d"
    },
    {
      "id": "be3e9ed8-3d2b-4202-a063-38403457f4a0",
      "text": "Population and Operation",
      "custom_tooltip": "<b>Population and Operation</b>",
      "progress": 0,
      "open": true,
      "meta": "95b4a00e-cc92-4e6c-85bc-6e259c7d9675 FF, a278ffa5-eb07-4867-a700-f58fd82bf480 FS",
      "parent": "95b4a00e-cc92-4e6c-85bc-6e259c7d9675",
      "type": "project"
    },
    {
      "id": "abd8c268-359b-4254-9c04-1b6a4f7bab39",
      "text": "Select and Train Initial Population",
      "custom_tooltip": "<b>Select and Train Initial Population</b>",
      "progress": 0,
      "open": true,
      "meta": "be3e9ed8-3d2b-4202-a063-38403457f4a0 SS",
      "parent": "be3e9ed8-3d2b-4202-a063-38403457f4a0",
      "type": "project"
    },
    {
      "id": "77f5940a-53cc-493b-b937-9db2a4e9e746",
      "text": "Define Selection Criteria and Process",
      "custom_tooltip": "<b>Define Selection Criteria and Process</b><br>Establish clear criteria for selecting the initial population, including skills, psychological profiles, and adaptability to the silo environment. Define the application and interview process.<br><b>Resources needed:</b><br><ul><li>Social Systems Planner</li><li>Psychologist</li><li>HR Specialist</li></ul>",
      "start_date": "2057-01-16",
      "duration": 110.0,
      "progress": 0,
      "open": true,
      "meta": "abd8c268-359b-4254-9c04-1b6a4f7bab39 SS",
      "parent": "abd8c268-359b-4254-9c04-1b6a4f7bab39"
    },
    {
      "id": "dd63139e-69bf-490a-aeea-2490fc2b7f46",
      "text": "Recruit and Screen Potential Candidates",
      "custom_tooltip": "<b>Recruit and Screen Potential Candidates</b><br>Advertise the opportunity, collect applications, conduct initial screenings (background checks, skills assessments), and perform psychological evaluations.<br><b>Resources needed:</b><br><ul><li>HR Specialist</li><li>Psychologist</li><li>Security Personnel</li></ul>",
      "start_date": "2057-05-06",
      "duration": 110.0,
      "progress": 0,
      "open": true,
      "meta": "77f5940a-53cc-493b-b937-9db2a4e9e746 FS",
      "parent": "abd8c268-359b-4254-9c04-1b6a4f7bab39"
    },
    {
      "id": "d01b0bbc-574b-428b-a016-74ff49cc1caf",
      "text": "Conduct In-Depth Interviews and Assessments",
      "custom_tooltip": "<b>Conduct In-Depth Interviews and Assessments</b><br>Conduct multiple rounds of interviews, assess candidates&#x27; suitability for the silo environment, and evaluate their ability to adapt to the social control mechanisms.<br><b>Resources needed:</b><br><ul><li>Social Systems Planner</li><li>Psychologist</li><li>Interview Panel</li></ul>",
      "start_date": "2057-08-24",
      "duration": 110.0,
      "progress": 0,
      "open": true,
      "meta": "dd63139e-69bf-490a-aeea-2490fc2b7f46 FS",
      "parent": "abd8c268-359b-4254-9c04-1b6a4f7bab39"
    },
    {
      "id": "9816a64e-9067-446d-888a-59a5798fab16",
      "text": "Provide Comprehensive Training Program",
      "custom_tooltip": "<b>Provide Comprehensive Training Program</b><br>Develop and deliver a training program covering silo operations, social protocols, emergency procedures, and specialized skills required for their roles.<br><b>Resources needed:</b><br><ul><li>Training Coordinator</li><li>Subject Matter Experts</li><li>Security Personnel</li></ul>",
      "start_date": "2057-12-12",
      "duration": 110.0,
      "progress": 0,
      "open": true,
      "meta": "d01b0bbc-574b-428b-a016-74ff49cc1caf FS",
      "parent": "abd8c268-359b-4254-9c04-1b6a4f7bab39"
    },
    {
      "id": "0360b4c7-4d5d-4086-b01d-aa55b967404f",
      "text": "Final Selection and Onboarding",
      "custom_tooltip": "<b>Final Selection and Onboarding</b><br>Make final selection decisions, onboard the chosen individuals, provide necessary resources and support, and integrate them into the silo community.<br><b>Resources needed:</b><br><ul><li>HR Specialist</li><li>Social Systems Planner</li><li>Silo Management Team</li></ul>",
      "start_date": "2058-04-01",
      "duration": 110.0,
      "progress": 0,
      "open": true,
      "meta": "abd8c268-359b-4254-9c04-1b6a4f7bab39 FF, 9816a64e-9067-446d-888a-59a5798fab16 FS",
      "parent": "abd8c268-359b-4254-9c04-1b6a4f7bab39"
    },
    {
      "id": "ea68814c-ea0e-465c-a46e-c6efa1e6e849",
      "text": "Establish Operational Procedures",
      "custom_tooltip": "<b>Establish Operational Procedures</b>",
      "progress": 0,
      "open": true,
      "meta": "abd8c268-359b-4254-9c04-1b6a4f7bab39 FS",
      "parent": "be3e9ed8-3d2b-4202-a063-38403457f4a0",
      "type": "project"
    },
    {
      "id": "fb151868-4757-4943-a2e7-d290277ef96a",
      "text": "Develop Standard Operating Procedures (SOPs)",
      "custom_tooltip": "<b>Develop Standard Operating Procedures (SOPs)</b><br>Create detailed SOPs for all silo operations, covering areas like resource management, security protocols, emergency response, and social interaction guidelines. These SOPs will ensure consistent and efficient operation of the silo.<br><b>Resources needed:</b><br><ul><li>Operations Manager</li><li>Subject Matter Experts</li><li>Technical Writers</li></ul>",
      "start_date": "2058-07-20",
      "duration": 54.0,
      "progress": 0,
      "open": true,
      "meta": "ea68814c-ea0e-465c-a46e-c6efa1e6e849 SS",
      "parent": "ea68814c-ea0e-465c-a46e-c6efa1e6e849"
    },
    {
      "id": "a5cd6c79-4e93-49ea-a043-31c9d055e8e0",
      "text": "Establish Communication Channels and Protocols",
      "custom_tooltip": "<b>Establish Communication Channels and Protocols</b><br>Set up internal and external communication systems, including emergency communication protocols, reporting structures, and information dissemination methods. This ensures effective communication within the silo and with the outside world (if applicable).<br><b>Resources needed:</b><br><ul><li>Communication Specialist</li><li>IT Support</li><li>Security Personnel</li></ul>",
      "start_date": "2058-09-12",
      "duration": 54.0,
      "progress": 0,
      "open": true,
      "meta": "fb151868-4757-4943-a2e7-d290277ef96a FS",
      "parent": "ea68814c-ea0e-465c-a46e-c6efa1e6e849"
    },
    {
      "id": "7b7d4153-3fcc-42ca-80ea-3cee9dbd51fa",
      "text": "Implement Training Programs for Procedures",
      "custom_tooltip": "<b>Implement Training Programs for Procedures</b><br>Design and deliver training programs to familiarize the initial population with the established SOPs and communication protocols. This ensures that all residents are knowledgeable and capable of following the procedures.<br><b>Resources needed:</b><br><ul><li>Training Coordinator</li><li>Subject Matter Experts</li><li>Simulation Software</li></ul>",
      "start_date": "2058-11-05",
      "duration": 54.0,
      "progress": 0,
      "open": true,
      "meta": "a5cd6c79-4e93-49ea-a043-31c9d055e8e0 FS",
      "parent": "ea68814c-ea0e-465c-a46e-c6efa1e6e849"
    },
    {
      "id": "29ba07fd-aa6e-46fb-824c-6e1726849acf",
      "text": "Simulate Operational Scenarios and Drills",
      "custom_tooltip": "<b>Simulate Operational Scenarios and Drills</b><br>Conduct simulations and drills to test the effectiveness of the SOPs and communication protocols under various scenarios, such as emergencies, resource shortages, and security breaches. This identifies weaknesses and areas for improvement.<br><b>Resources needed:</b><br><ul><li>Operations Manager</li><li>Security Personnel</li><li>Simulation Software</li><li>Trained Personnel</li></ul>",
      "start_date": "2058-12-29",
      "duration": 54.0,
      "progress": 0,
      "open": true,
      "meta": "7b7d4153-3fcc-42ca-80ea-3cee9dbd51fa FS",
      "parent": "ea68814c-ea0e-465c-a46e-c6efa1e6e849"
    },
    {
      "id": "90197fcc-3b01-48d3-953e-2dadc0563578",
      "text": "Refine Procedures Based on Simulation Results",
      "custom_tooltip": "<b>Refine Procedures Based on Simulation Results</b><br>Analyze the results of the simulations and drills to identify areas where the SOPs and communication protocols need to be refined. Implement necessary changes to improve their effectiveness and address any identified weaknesses.<br><b>Resources needed:</b><br><ul><li>Operations Manager</li><li>Subject Matter Experts</li><li>Technical Writers</li></ul>",
      "start_date": "2059-02-21",
      "duration": 54.0,
      "progress": 0,
      "open": true,
      "meta": "ea68814c-ea0e-465c-a46e-c6efa1e6e849 FF, 29ba07fd-aa6e-46fb-824c-6e1726849acf FS",
      "parent": "ea68814c-ea0e-465c-a46e-c6efa1e6e849"
    },
    {
      "id": "ec82b474-2b75-437b-89e6-e840f614dbd4",
      "text": "Monitor System Performance",
      "custom_tooltip": "<b>Monitor System Performance</b>",
      "progress": 0,
      "open": true,
      "meta": "ea68814c-ea0e-465c-a46e-c6efa1e6e849 FS",
      "parent": "be3e9ed8-3d2b-4202-a063-38403457f4a0",
      "type": "project"
    },
    {
      "id": "44b02b84-17cf-4a6c-8362-efca2f9146bb",
      "text": "Collect System Performance Data",
      "custom_tooltip": "<b>Collect System Performance Data</b><br>Gather data from all silo systems (life support, power, security, etc.) to establish baseline performance metrics. This includes sensor readings, operational logs, and user feedback.<br><b>Resources needed:</b><br><ul><li>System Monitoring Technicians</li><li>Data Analysts</li><li>IT Infrastructure</li></ul>",
      "start_date": "2059-04-16",
      "duration": 1.0,
      "progress": 0,
      "open": true,
      "meta": "ec82b474-2b75-437b-89e6-e840f614dbd4 SS",
      "parent": "ec82b474-2b75-437b-89e6-e840f614dbd4"
    },
    {
      "id": "faa7e4ea-e0d7-438b-8040-67af82d9f9a6",
      "text": "Analyze Performance Trends",
      "custom_tooltip": "<b>Analyze Performance Trends</b><br>Analyze collected data to identify trends, anomalies, and potential performance bottlenecks. Use statistical methods and data visualization tools to gain insights into system behavior.<br><b>Resources needed:</b><br><ul><li>Data Analysts</li><li>System Engineers</li><li>Statistical Software</li></ul>",
      "start_date": "2059-04-17",
      "duration": 1.0,
      "progress": 0,
      "open": true,
      "meta": "44b02b84-17cf-4a6c-8362-efca2f9146bb FS",
      "parent": "ec82b474-2b75-437b-89e6-e840f614dbd4"
    },
    {
      "id": "815fefb0-a584-4e1f-a31c-9352ed0d1ddb",
      "text": "Identify Performance Deviations",
      "custom_tooltip": "<b>Identify Performance Deviations</b><br>Compare current system performance against established baselines and identify any significant deviations. Investigate the root causes of these deviations.<br><b>Resources needed:</b><br><ul><li>System Engineers</li><li>Performance Analysts</li><li>Diagnostic Tools</li></ul>",
      "start_date": "2059-04-18",
      "duration": 1.0,
      "progress": 0,
      "open": true,
      "meta": "faa7e4ea-e0d7-438b-8040-67af82d9f9a6 FS",
      "parent": "ec82b474-2b75-437b-89e6-e840f614dbd4"
    },
    {
      "id": "c8bfa2ad-ac2e-4827-a9c8-37a969047a57",
      "text": "Report Performance Issues",
      "custom_tooltip": "<b>Report Performance Issues</b><br>Document and report any identified performance issues to the relevant system owners and stakeholders. Provide recommendations for corrective actions.<br><b>Resources needed:</b><br><ul><li>Performance Analysts</li><li>Report Writers</li><li>Communication Tools</li></ul>",
      "start_date": "2059-04-19",
      "duration": 1.0,
      "progress": 0,
      "open": true,
      "meta": "815fefb0-a584-4e1f-a31c-9352ed0d1ddb FS",
      "parent": "ec82b474-2b75-437b-89e6-e840f614dbd4"
    },
    {
      "id": "8b8a1f07-4ac1-474d-aa43-41e4e0a4ef15",
      "text": "Implement Corrective Actions",
      "custom_tooltip": "<b>Implement Corrective Actions</b><br>Work with system owners to implement corrective actions to address identified performance issues. Monitor the effectiveness of these actions and make adjustments as needed.<br><b>Resources needed:</b><br><ul><li>System Engineers</li><li>Maintenance Technicians</li><li>Testing Equipment</li></ul>",
      "start_date": "2059-04-20",
      "duration": 1.0,
      "progress": 0,
      "open": true,
      "meta": "ec82b474-2b75-437b-89e6-e840f614dbd4 FF, c8bfa2ad-ac2e-4827-a9c8-37a969047a57 FS",
      "parent": "ec82b474-2b75-437b-89e6-e840f614dbd4"
    },
    {
      "id": "64989431-c5ae-469f-b8d5-a2cf8f223925",
      "text": "Maintain and Upgrade Systems",
      "custom_tooltip": "<b>Maintain and Upgrade Systems</b>",
      "progress": 0,
      "open": true,
      "meta": "ec82b474-2b75-437b-89e6-e840f614dbd4 FS",
      "parent": "be3e9ed8-3d2b-4202-a063-38403457f4a0",
      "type": "project"
    },
    {
      "id": "9263f8c1-ba46-4b37-a11d-7436ce3daa9e",
      "text": "Assess System Performance and Identify Needs",
      "custom_tooltip": "<b>Assess System Performance and Identify Needs</b><br>Evaluate the current performance of all silo systems (life support, power, waste, security) to identify areas requiring maintenance, upgrades, or replacement. This includes analyzing performance data, conducting inspections, and gathering feedback from operational staff.<br><b>Resources needed:</b><br><ul><li>System Engineers</li><li>Data Analysts</li><li>Operational Staff</li><li>Inspection Equipment</li></ul>",
      "start_date": "2059-04-21",
      "duration": 110.0,
      "progress": 0,
      "open": true,
      "meta": "64989431-c5ae-469f-b8d5-a2cf8f223925 SS",
      "parent": "64989431-c5ae-469f-b8d5-a2cf8f223925"
    },
    {
      "id": "47d310a3-9ffd-460c-9ade-06ce8f4712c2",
      "text": "Source Replacement Parts and New Technologies",
      "custom_tooltip": "<b>Source Replacement Parts and New Technologies</b><br>Identify and procure necessary replacement parts for existing systems, as well as research and evaluate new technologies that could improve silo operations and efficiency. This includes contacting vendors, comparing specifications, and negotiating contracts.<br><b>Resources needed:</b><br><ul><li>Procurement Specialists</li><li>System Engineers</li><li>Technology Researchers</li><li>Vendor Database</li></ul>",
      "start_date": "2059-08-09",
      "duration": 110.0,
      "progress": 0,
      "open": true,
      "meta": "9263f8c1-ba46-4b37-a11d-7436ce3daa9e FS",
      "parent": "64989431-c5ae-469f-b8d5-a2cf8f223925"
    },
    {
      "id": "34978561-9cc2-4569-a61e-0d7389d3edf9",
      "text": "Schedule and Execute Maintenance/Upgrade Activities",
      "custom_tooltip": "<b>Schedule and Execute Maintenance/Upgrade Activities</b><br>Develop a detailed schedule for maintenance and upgrade activities, taking into account system dependencies, resource availability, and potential disruptions to silo operations. Execute the schedule, ensuring all work is performed to required standards and safety protocols.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Maintenance Technicians</li><li>System Engineers</li><li>Safety Inspectors</li><li>Construction Crew</li></ul>",
      "start_date": "2059-11-27",
      "duration": 110.0,
      "progress": 0,
      "open": true,
      "meta": "47d310a3-9ffd-460c-9ade-06ce8f4712c2 FS",
      "parent": "64989431-c5ae-469f-b8d5-a2cf8f223925"
    },
    {
      "id": "8a6441de-756b-43e1-946e-e8aa7c3ff19e",
      "text": "Test and Validate System Improvements",
      "custom_tooltip": "<b>Test and Validate System Improvements</b><br>After maintenance or upgrades are completed, conduct thorough testing and validation to ensure that systems are functioning correctly and meeting performance targets. This includes running simulations, analyzing data, and obtaining sign-off from relevant stakeholders.<br><b>Resources needed:</b><br><ul><li>System Engineers</li><li>Testing Specialists</li><li>Data Analysts</li><li>Quality Assurance Team</li></ul>",
      "start_date": "2060-03-16",
      "duration": 110.0,
      "progress": 0,
      "open": true,
      "meta": "34978561-9cc2-4569-a61e-0d7389d3edf9 FS",
      "parent": "64989431-c5ae-469f-b8d5-a2cf8f223925"
    },
    {
      "id": "d1c12dbd-4df4-43ab-9e59-06534722e0ea",
      "text": "Document Changes and Update Procedures",
      "custom_tooltip": "<b>Document Changes and Update Procedures</b><br>Update all relevant documentation, including system manuals, operating procedures, and training materials, to reflect any changes made during maintenance or upgrade activities. Ensure that all personnel are trained on the updated procedures.<br><b>Resources needed:</b><br><ul><li>Technical Writers</li><li>Training Specialists</li><li>System Engineers</li><li>Documentation Management System</li></ul>",
      "start_date": "2060-07-04",
      "duration": 110.0,
      "progress": 0,
      "open": true,
      "meta": "64989431-c5ae-469f-b8d5-a2cf8f223925 FF, 8a6441de-756b-43e1-946e-e8aa7c3ff19e FS",
      "parent": "64989431-c5ae-469f-b8d5-a2cf8f223925"
    },
    {
      "id": "2c6f7fa0-752e-4a5d-b2a5-b3af151dd5dd",
      "text": "Manage Resource Allocation",
      "custom_tooltip": "<b>Manage Resource Allocation</b>",
      "progress": 0,
      "open": true,
      "meta": "64989431-c5ae-469f-b8d5-a2cf8f223925 FS",
      "parent": "be3e9ed8-3d2b-4202-a063-38403457f4a0",
      "type": "project"
    },
    {
      "id": "2f6fedd7-4f6c-4c8e-832c-5f61f82cd044",
      "text": "Assess Current Resource Levels and Consumption",
      "custom_tooltip": "<b>Assess Current Resource Levels and Consumption</b><br>Objective: Determine current resource stores and consumption rates.\nScope: Inventory all resources (food, water, energy, materials) and analyze usage patterns.\nSteps: 1. Conduct physical inventory. 2. Analyze historical consumption data. 3. Project future needs based on population and activities.\nDeliverables: Resource inventory report and consumption forecast.<br><b>Resources needed:</b><br><ul><li>Resource Manager</li><li>Data Analyst</li><li>Inventory Specialist</li></ul>",
      "start_date": "2060-10-22",
      "duration": 137.0,
      "progress": 0,
      "open": true,
      "meta": "2c6f7fa0-752e-4a5d-b2a5-b3af151dd5dd SS",
      "parent": "2c6f7fa0-752e-4a5d-b2a5-b3af151dd5dd"
    },
    {
      "id": "7a706776-6145-4a7f-9792-21c8421c6378",
      "text": "Model Resource Flows and Dependencies",
      "custom_tooltip": "<b>Model Resource Flows and Dependencies</b><br>Objective: Understand the interdependencies of resource production, consumption, and recycling.\nScope: Create a system dynamics model of resource flows within the silo.\nSteps: 1. Map resource flows. 2. Identify critical dependencies. 3. Develop simulation model.\nDeliverables: Resource flow diagram and simulation model.<br><b>Resources needed:</b><br><ul><li>System Dynamics Modeler</li><li>Environmental Engineer</li><li>Agricultural Specialist</li></ul>",
      "start_date": "2061-03-08",
      "duration": 137.0,
      "progress": 0,
      "open": true,
      "meta": "2f6fedd7-4f6c-4c8e-832c-5f61f82cd044 FS",
      "parent": "2c6f7fa0-752e-4a5d-b2a5-b3af151dd5dd"
    },
    {
      "id": "7aafcdc6-fbdb-4beb-b0d7-1a4fe4bd14d5",
      "text": "Develop Resource Allocation Strategies",
      "custom_tooltip": "<b>Develop Resource Allocation Strategies</b><br>Objective: Create strategies for allocating resources based on priorities and constraints.\nScope: Define allocation rules and procedures for different scenarios.\nSteps: 1. Define resource allocation priorities. 2. Develop allocation rules. 3. Establish monitoring and enforcement mechanisms.\nDeliverables: Resource allocation plan and procedures.<br><b>Resources needed:</b><br><ul><li>Resource Manager</li><li>Social Systems Planner</li><li>Governance Administrator</li></ul>",
      "start_date": "2061-07-23",
      "duration": 137.0,
      "progress": 0,
      "open": true,
      "meta": "7a706776-6145-4a7f-9792-21c8421c6378 FS",
      "parent": "2c6f7fa0-752e-4a5d-b2a5-b3af151dd5dd"
    },
    {
      "id": "459e4838-ca33-4dd5-8732-ad677e0d24c9",
      "text": "Establish Contingency Plans for Shortages",
      "custom_tooltip": "<b>Establish Contingency Plans for Shortages</b><br>Objective: Prepare for potential resource shortages due to unforeseen events.\nScope: Identify potential shortage scenarios and develop mitigation strategies.\nSteps: 1. Identify potential shortage scenarios. 2. Develop mitigation strategies (e.g., rationing, alternative sources). 3. Establish emergency protocols.\nDeliverables: Resource shortage contingency plan.<br><b>Resources needed:</b><br><ul><li>Risk Assessment Specialist</li><li>Resource Manager</li><li>Security Personnel</li></ul>",
      "start_date": "2061-12-07",
      "duration": 137.0,
      "progress": 0,
      "open": true,
      "meta": "2c6f7fa0-752e-4a5d-b2a5-b3af151dd5dd FF, 7aafcdc6-fbdb-4beb-b0d7-1a4fe4bd14d5 FS",
      "parent": "2c6f7fa0-752e-4a5d-b2a5-b3af151dd5dd"
    },
    {
      "id": "3a7c5706-47ce-43e1-986a-0ce526c70158",
      "text": "Enforce Social Controls",
      "custom_tooltip": "<b>Enforce Social Controls</b>",
      "progress": 0,
      "open": true,
      "meta": "be3e9ed8-3d2b-4202-a063-38403457f4a0 FF, 2c6f7fa0-752e-4a5d-b2a5-b3af151dd5dd FS",
      "parent": "be3e9ed8-3d2b-4202-a063-38403457f4a0",
      "type": "project"
    },
    {
      "id": "327d7e97-6ab3-4931-9d16-569e05697392",
      "text": "Establish Control Monitoring System",
      "custom_tooltip": "<b>Establish Control Monitoring System</b><br>Objective: Create a system to monitor adherence to social controls.\nScope: Define metrics, select monitoring tools, and establish reporting procedures.\nSteps: 1. Define key performance indicators (KPIs) for social control adherence. 2. Select appropriate monitoring technologies (e.g., surveillance systems, data analytics). 3. Develop a reporting system for identifying and addressing violations. 4. Train personnel on monitoring procedures.\nDeliverables: Monitoring system operational, KPIs defined, reporting procedures documented.<br><b>Resources needed:</b><br><ul><li>Social Control Administrator</li><li>Security Systems Engineer</li><li>Data Analyst</li><li>IT Support</li></ul>",
      "start_date": "2062-04-23",
      "duration": 137.0,
      "progress": 0,
      "open": true,
      "meta": "3a7c5706-47ce-43e1-986a-0ce526c70158 SS",
      "parent": "3a7c5706-47ce-43e1-986a-0ce526c70158"
    },
    {
      "id": "aedc0ee4-1da3-4a64-86f9-f5a0f55e8893",
      "text": "Develop Response Protocols for Violations",
      "custom_tooltip": "<b>Develop Response Protocols for Violations</b><br>Objective: Create protocols for addressing violations of social controls.\nScope: Define levels of violations, determine appropriate responses, and establish due process procedures.\nSteps: 1. Define a hierarchy of social control violations. 2. Develop corresponding response protocols (e.g., warnings, sanctions, re-education). 3. Establish a fair and transparent due process system for accused violators. 4. Train personnel on response protocols.\nDeliverables: Violation response protocols documented, due process procedures established.<br><b>Resources needed:</b><br><ul><li>Social Control Administrator</li><li>Legal Counsel</li><li>Security Personnel</li><li>Ethical Oversight Committee</li></ul>",
      "start_date": "2062-09-07",
      "duration": 137.0,
      "progress": 0,
      "open": true,
      "meta": "327d7e97-6ab3-4931-9d16-569e05697392 FS",
      "parent": "3a7c5706-47ce-43e1-986a-0ce526c70158"
    },
    {
      "id": "e33cae23-ab90-4d35-b9b7-20c7a2532334",
      "text": "Implement Feedback Mechanisms for Controls",
      "custom_tooltip": "<b>Implement Feedback Mechanisms for Controls</b><br>Objective: Establish channels for residents to provide feedback on social controls.\nScope: Create anonymous feedback systems, conduct regular surveys, and hold town hall meetings.\nSteps: 1. Implement an anonymous feedback system (e.g., suggestion boxes, online forms). 2. Conduct regular surveys to gauge resident satisfaction with social controls. 3. Organize town hall meetings for open discussion and feedback. 4. Analyze feedback and propose adjustments to social controls.\nDeliverables: Feedback mechanisms implemented, survey results analyzed, town hall meeting summaries documented.<br><b>Resources needed:</b><br><ul><li>Social Control Administrator</li><li>Communication Specialist</li><li>Data Analyst</li><li>Ethical Oversight Committee</li></ul>",
      "start_date": "2063-01-22",
      "duration": 137.0,
      "progress": 0,
      "open": true,
      "meta": "aedc0ee4-1da3-4a64-86f9-f5a0f55e8893 FS",
      "parent": "3a7c5706-47ce-43e1-986a-0ce526c70158"
    },
    {
      "id": "ccd99c86-501e-4b1c-8861-067e781c7d84",
      "text": "Train Personnel on Control Enforcement",
      "custom_tooltip": "<b>Train Personnel on Control Enforcement</b><br>Objective: Train personnel on the proper enforcement of social controls.\nScope: Develop training materials, conduct workshops, and assess personnel competency.\nSteps: 1. Develop comprehensive training materials on social control policies and enforcement procedures. 2. Conduct workshops and simulations to train personnel on handling various scenarios. 3. Assess personnel competency through testing and performance evaluations. 4. Provide ongoing training and updates on social control policies.\nDeliverables: Training materials developed, personnel trained, competency assessments completed.<br><b>Resources needed:</b><br><ul><li>Social Control Administrator</li><li>Security Personnel</li><li>Training Specialist</li><li>Psychologist</li></ul>",
      "start_date": "2063-06-08",
      "duration": 137.0,
      "progress": 0,
      "open": true,
      "meta": "3a7c5706-47ce-43e1-986a-0ce526c70158 FF, e33cae23-ab90-4d35-b9b7-20c7a2532334 FS",
      "parent": "3a7c5706-47ce-43e1-986a-0ce526c70158"
    }

    function zoomFit() {
        const tasks = gantt.getTaskByTime();
        if (tasks.length > 0) {
            const firstTask = tasks[0];
            const lastTask = tasks[tasks.length - 1];
            gantt.showDate(firstTask.start_date);
            
            // Calculate total duration in days
            const startDate = new Date(firstTask.start_date);
            const endDate = new Date(lastTask.end_date);
            const durationDays = (endDate - startDate) / (1000 * 60 * 60 * 24);
            
            // Choose appropriate scale based on duration
            if (durationDays > 3650) { // More than 10 years
                gantt.config.scale_unit = "year";
                gantt.config.step = 10;
                gantt.config.subscales = [
                    {unit: "year", step: 1, date: "%Y"}
                ];
            } else if (durationDays > 365) { // More than 1 year
                gantt.config.scale_unit = "year";
                gantt.config.step = 1;
                gantt.config.subscales = [
                    {unit: "month", step: 1, date: "%M"}
                ];
            } else if (durationDays > 30) { // More than 1 month
                gantt.config.scale_unit = "month";
                gantt.config.step = 1;
                gantt.config.subscales = [
                    {unit: "day", step: 1, date: "%d"}
                ];
            } else if (durationDays > 7) { // More than 1 week
                gantt.config.scale_unit = "week";
                gantt.config.step = 1;
                gantt.config.subscales = [
                    {unit: "day", step: 1, date: "%d"}
                ];
            } else {
                gantt.config.scale_unit = "day";
                gantt.config.step = 1;
                gantt.config.subscales = [];
            }
            gantt.render();
        }
    }

    function zoomIn() {
        const currentUnit = gantt.config.scale_unit;
        const currentStep = gantt.config.step;
        
        if (currentUnit === "year" && currentStep === 10) {
            gantt.config.scale_unit = "year";
            gantt.config.step = 1;
            gantt.config.subscales = [
                {unit: "month", step: 1, date: "%M"}
            ];
        } else if (currentUnit === "year") {
            gantt.config.scale_unit = "month";
            gantt.config.step = 1;
            gantt.config.subscales = [
                {unit: "day", step: 1, date: "%d"}
            ];
        } else if (currentUnit === "month") {
            gantt.config.scale_unit = "week";
            gantt.config.step = 1;
            gantt.config.subscales = [
                {unit: "day", step: 1, date: "%d"}
            ];
        } else if (currentUnit === "week") {
            gantt.config.scale_unit = "day";
            gantt.config.step = 1;
            gantt.config.subscales = [];
        }
        gantt.render();
    }

    function zoomOut() {
        const currentUnit = gantt.config.scale_unit;
        const currentStep = gantt.config.step;
        
        if (currentUnit === "day") {
            gantt.config.scale_unit = "week";
            gantt.config.step = 1;
            gantt.config.subscales = [
                {unit: "day", step: 1, date: "%d"}
            ];
        } else if (currentUnit === "week") {
            gantt.config.scale_unit = "month";
            gantt.config.step = 1;
            gantt.config.subscales = [
                {unit: "day", step: 1, date: "%d"}
            ];
        } else if (currentUnit === "month") {
            gantt.config.scale_unit = "year";
            gantt.config.step = 1;
            gantt.config.subscales = [
                {unit: "month", step: 1, date: "%M"}
            ];
        } else if (currentUnit === "year") {
            gantt.config.scale_unit = "year";
            gantt.config.step = 10;
            gantt.config.subscales = [
                {unit: "year", step: 1, date: "%Y"}
            ];
        }
        gantt.render();
    }

    function downloadCSV() {
        if (GANTT_DATA_CSV === null) {
            return;
        }
        const blob = new Blob([GANTT_DATA_CSV], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        const url = URL.createObjectURL(blob);
        link.setAttribute('href', url);
        link.setAttribute('download', GANTT_FILENAME_CSV);
        link.style.visibility = 'hidden';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    // Gantt Initialization
    gantt.config.readonly = true;
    gantt.config.date_format = "%Y-%m-%d";
    gantt.config.scale_unit = "month";
    gantt.config.step = 1;
    gantt.config.subscales = [
        {unit: "day", step: 1, date: "%d"}
    ];

    gantt.config.columns = [
        {name:"text", label:"Task name", width:"*", tree:true},
        // {name:"start_date", label:"Start time", align: "center"},
        // {name:"duration", label:"Duration", align: "center"}
    ];

    gantt.templates.task_class = function(start, end, task) {
        if (task.type === "project") {
            return "project-task";
        }
        return "";
    };

    gantt.templates.tooltip_text = function(start, end, task) {
        return task.custom_tooltip || "No tooltip";
    };
    
	gantt.plugins({
		tooltip: true
	});
	gantt.attachEvent("onGanttReady", function(){
		var tooltips = gantt.ext.tooltips;
		tooltips.tooltip.setViewport(gantt.$task_data);
	});
    gantt.init("gantt_container");
    gantt.parse(GANTT_DATA_DHTMLX);

    // Hide the export to CSV button if there is no CSV data
    if (GANTT_DATA_CSV === null) {
        document.getElementById('exportToCSVButton').style.display = 'none';
    }

    document.getElementById('zoomFitButton').addEventListener('click', zoomFit);
    document.getElementById('zoomInButton').addEventListener('click', zoomIn);
    document.getElementById('zoomOutButton').addEventListener('click', zoomOut);
    document.getElementById('exportToCSVButton').addEventListener('click', downloadCSV);
</script>
