    },
    {
      "id": "bd265eae-8b4e-4d24-8d8d-b6004fd5b34c",
      "text": "Develop flexible staffing model",
      "custom_tooltip": "<b>Develop flexible staffing model</b><br>Objective: Create a staffing model that can be adjusted based on actual recruitment rates and data volume.\nScope: This includes defining different staffing scenarios and identifying triggers for adjusting staffing levels.\nSteps: 1. Define different staffing scenarios based on recruitment rates. 2. Identify triggers for adjusting staffing levels (e.g., number of participants enrolled, data volume). 3. Develop a plan for onboarding and offboarding staff as needed.\nDeliverables: A flexible staffing model document with defined scenarios and adjustment triggers.<br><b>Resources needed:</b><br><ul><li>Principal Investigator</li><li>Study Coordinator</li><li>HR representative</li></ul>",
      "start_date": "2026-12-04",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "99587c7c-08ff-480f-99df-7b14f88f26bc FS",
      "parent": "e1057570-6988-47c1-bc80-83424331f95c"
    },
    {
      "id": "52d9268f-0f28-470d-ae79-66d12a95b40a",
      "text": "Consult sleep research staffing experts",
      "custom_tooltip": "<b>Consult sleep research staffing experts</b><br>Objective: Obtain expert advice on optimal staffing levels and best practices for managing research staff.\nScope: This includes identifying and engaging with external consultants who have experience in sleep research staffing.\nSteps: 1. Identify potential consultants. 2. Contact consultants and schedule consultations. 3. Obtain recommendations on staffing levels and best practices.\nDeliverables: A consultant report with recommendations on staffing levels and best practices.<br><b>Resources needed:</b><br><ul><li>Principal Investigator</li><li>Study Coordinator</li></ul>",
      "start_date": "2026-12-07",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "bd265eae-8b4e-4d24-8d8d-b6004fd5b34c FS",
      "parent": "e1057570-6988-47c1-bc80-83424331f95c"
    },
    {
      "id": "7e8179cd-a530-4a84-9767-e84556f6207d",
      "text": "Document staffing coverage model",
      "custom_tooltip": "<b>Document staffing coverage model</b><br>Objective: Create a comprehensive document outlining the staffing coverage model, including roles, responsibilities, and coverage schedules.\nScope: This includes defining the roles and responsibilities of each staff member, creating coverage schedules, and documenting procedures for handling staff absences.\nSteps: 1. Define the roles and responsibilities of each staff member. 2. Create coverage schedules for each role. 3. Document procedures for handling staff absences and emergencies.\nDeliverables: A staffing coverage model document with roles, responsibilities, and coverage schedules.<br><b>Resources needed:</b><br><ul><li>Principal Investigator</li><li>Study Coordinator</li></ul>",

    {
      "id": "4a53ebb8-d324-4765-8f8d-405b679289e5",
      "text": "Identify potential risks",
      "custom_tooltip": "<b>Identify potential risks</b><br>Objective: Identify all potential risks that could impact the project.\nScope: Consider technical, financial, operational, environmental, and security risks.\nSteps: Conduct brainstorming sessions with stakeholders, review project plans and documentation, and consult with experts.\nDeliverables: A comprehensive list of potential risks.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Risk Management Expert</li><li>Stakeholders</li></ul>",
      "start_date": "2026-12-13",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "622a3cd3-15d1-4498-8d4d-efbeb4dfa0e2 SS",
      "parent": "622a3cd3-15d1-4498-8d4d-efbeb4dfa0e2"
    },
    {
      "id": "95236961-8da8-4722-b613-271ad2ee7064",
      "text": "Assess risk probability and impact",
      "custom_tooltip": "<b>Assess risk probability and impact</b><br>Objective: Evaluate the likelihood and potential impact of each identified risk.\nScope: Quantify the probability and impact using a risk assessment matrix.\nSteps: Assign probability and impact scores to each risk, prioritize risks based on their overall risk score.\nDeliverables: A prioritized list of risks with probability and impact assessments.<br><b>Resources needed:</b><br><ul><li>Risk Management Expert</li><li>Project Manager</li><li>Data Analyst</li></ul>",
      "start_date": "2026-12-15",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "4a53ebb8-d324-4765-8f8d-405b679289e5 FS",
      "parent": "622a3cd3-15d1-4498-8d4d-efbeb4dfa0e2"
    },
    {
      "id": "f745d353-c6b5-4c21-aade-b50448996204",
      "text": "Develop mitigation strategies",
      "custom_tooltip": "<b>Develop mitigation strategies</b><br>Objective: Create strategies to mitigate or eliminate the identified risks.\nScope: Develop specific actions to reduce the probability or impact of each risk.\nSteps: Brainstorm mitigation options, evaluate the feasibility and cost-effectiveness of each option, and select the most appropriate strategies.\nDeliverables: A detailed risk mitigation plan with specific actions, responsibilities, and timelines.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Risk Management Expert</li><li>Subject Matter Experts</li></ul>",
      "start_date": "2026-12-17",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "95236961-8da8-4722-b613-271ad2ee7064 FS",
      "parent": "622a3cd3-15d1-4498-8d4d-efbeb4dfa0e2"
    },
    {
      "id": "9ed86e57-e062-4a88-b2f8-50600ffc40de",
      "text": "Document risk mitigation protocol",
      "custom_tooltip": "<b>Document risk mitigation protocol</b><br>Objective: Create a formal document outlining the risk mitigation protocol.\nScope: Include risk identification, assessment, mitigation strategies, and monitoring procedures.\nSteps: Compile all relevant information into a comprehensive document, review and approve the document with stakeholders.\nDeliverables: A finalized risk mitigation protocol document.<br><b>Resources needed:</b><br><ul><li>Project Manager</li><li>Technical Writer</li><li>Stakeholders</li></ul>",
      "start_date": "2026-12-19",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "f745d353-c6b5-4c21-aade-b50448996204 FS",
      "parent": "622a3cd3-15d1-4498-8d4d-efbeb4dfa0e2"
    },
    {
      "id": "6f474d72-8164-40f9-9a46-f889e6f7ab49",
      "text": "Implement and monitor risk mitigation",
      "custom_tooltip": "<b>Implement and monitor risk mitigation</b><br>Objective: Put the risk mitigation strategies into action and track their effectiveness.\nScope: Execute the actions outlined in the risk mitigation plan, monitor risk levels, and adjust strategies as needed.\nSteps: Assign responsibilities for implementing mitigation actions, track progress against timelines, and report on risk levels.\nDeliverables: Regular reports on risk mitigation progress and effectiveness.<br><b>Resources needed:</b><br><ul><li>Project Team</li><li>Risk Management Expert</li><li>Project Manager</li></ul>",
      "start_date": "2026-12-21",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "622a3cd3-15d1-4498-8d4d-efbeb4dfa0e2 FF, 9ed86e57-e062-4a88-b2f8-50600ffc40de FS",
      "parent": "622a3cd3-15d1-4498-8d4d-efbeb4dfa0e2"
    },
    {
      "id": "7cf0ea07-fbbf-4ed1-ac01-0706681846b4",
      "text": "Define Data Annotation Workflow",
      "custom_tooltip": "<b>Define Data Annotation Workflow</b>",
      "progress": 0,
      "open": true,
      "meta": "2a431dd8-6d4a-4cab-8ce4-43fa90790bce FF, 622a3cd3-15d1-4498-8d4d-efbeb4dfa0e2 FS",
      "parent": "2a431dd8-6d4a-4cab-8ce4-43fa90790bce",
      "type": "project"
    },
    {
      "id": "986e3c4c-d579-43e8-8257-97f2cd13bd4c",
      "text": "Define data annotation categories",
      "custom_tooltip": "<b>Define data annotation categories</b><br>Establish a clear and comprehensive set of categories for annotating parasomnia events, including specific criteria for each category. This will ensure consistency and accuracy in the annotation process.<br><b>Resources needed:</b><br><ul><li>Sleep experts</li><li>Data scientists</li><li>Clinical psychologist</li></ul>",
      "start_date": "2026-12-23",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "7cf0ea07-fbbf-4ed1-ac01-0706681846b4 SS",
      "parent": "7cf0ea07-fbbf-4ed1-ac01-0706681846b4"
    },
    {
      "id": "12d90ee0-d0ed-4463-95d9-d21341302ec1",
      "text": "Develop annotation guidelines document",
      "custom_tooltip": "<b>Develop annotation guidelines document</b><br>Create a detailed document outlining the annotation categories, criteria, and procedures. This document will serve as a reference for annotators and ensure consistency in their work.<br><b>Resources needed:</b><br><ul><li>Sleep experts</li><li>Data scientists</li><li>Technical writer</li></ul>",
      "start_date": "2026-12-26",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "986e3c4c-d579-43e8-8257-97f2cd13bd4c FS",
      "parent": "7cf0ea07-fbbf-4ed1-ac01-0706681846b4"
    },
    {
      "id": "1e18641c-e88c-481f-a728-fdf91332fd3e",
      "text": "Pilot test annotation workflow",
      "custom_tooltip": "<b>Pilot test annotation workflow</b><br>Conduct a pilot test of the annotation workflow with a small subset of data to identify any issues or areas for improvement. This will help to refine the workflow and ensure its effectiveness.<br><b>Resources needed:</b><br><ul><li>Annotators</li><li>Data scientists</li><li>Sleep experts</li></ul>",
      "start_date": "2026-12-29",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "12d90ee0-d0ed-4463-95d9-d21341302ec1 FS",
      "parent": "7cf0ea07-fbbf-4ed1-ac01-0706681846b4"
    },
    {
      "id": "ccce86f3-1f46-4488-bf1a-96977ab3f9fa",
      "text": "Refine guidelines based on pilot test",
      "custom_tooltip": "<b>Refine guidelines based on pilot test</b><br>Based on the results of the pilot test, revise the annotation guidelines and workflow to address any identified issues or areas for improvement. This will ensure that the final workflow is as effective and efficient as possible.<br><b>Resources needed:</b><br><ul><li>Sleep experts</li><li>Data scientists</li><li>Annotators</li></ul>",
      "start_date": "2027-01-01",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "1e18641c-e88c-481f-a728-fdf91332fd3e FS",
      "parent": "7cf0ea07-fbbf-4ed1-ac01-0706681846b4"
    },
    {
      "id": "1ce2c1cd-4f05-433e-85bf-eee3e6a49966",
      "text": "Train annotators on workflow",
      "custom_tooltip": "<b>Train annotators on workflow</b><br>Provide comprehensive training to annotators on the established workflow and guidelines. This will ensure that they are fully equipped to perform their tasks accurately and consistently.<br><b>Resources needed:</b><br><ul><li>Sleep experts</li><li>Data scientists</li><li>Training materials</li></ul>",
      "start_date": "2027-01-04",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "7cf0ea07-fbbf-4ed1-ac01-0706681846b4 FF, ccce86f3-1f46-4488-bf1a-96977ab3f9fa FS",
      "parent": "7cf0ea07-fbbf-4ed1-ac01-0706681846b4"
    },

      "custom_tooltip": "<b>Acquire Residential Property</b>",

      "open": true,
      "meta": "53f3aab8-5ca4-4f33-b54c-f32986ab02f1 SS",
      "parent": "53f3aab8-5ca4-4f33-b54c-f32986ab02f1",
      "type": "project"
    },
    {
      "id": "49f9c940-3b98-44e0-862d-bf531ba0d5fc",
      "text": "Conduct thorough property inspection",
      "custom_tooltip": "<b>Conduct thorough property inspection</b><br>Objective: Identify potential structural issues before purchase.\nScope: Engage a qualified inspector to assess the property&#x27;s condition.\nSteps: Schedule inspection, review report, address concerns.\nDeliverables: Inspection report, list of necessary repairs.<br><b>Resources needed:</b><br><ul><li>Licensed property inspector</li><li>Inspection equipment</li><li>Property access</li></ul>",
      "start_date": "2027-01-07",
      "duration": 45.0,
      "progress": 0,
      "open": true,
      "meta": "2abbc96d-d07f-45f5-84a2-5399fb0f01dc SS",
      "parent": "2abbc96d-d07f-45f5-84a2-5399fb0f01dc"
    },
    {
      "id": "00566072-8a38-4326-9822-cee4a23c9b76",
      "text": "Engage licensed renovation contractor",
      "custom_tooltip": "<b>Engage licensed renovation contractor</b><br>Objective: Secure a contractor with experience in similar renovations.\nScope: Identify, interview, and select a qualified contractor.\nSteps: Research contractors, request bids, review proposals, sign contract.\nDeliverables: Signed contract, renovation plan.<br><b>Resources needed:</b><br><ul><li>Project manager</li><li>Qualified contractors</li><li>Renovation budget</li></ul>",
      "start_date": "2027-02-21",
      "duration": 45.0,
      "progress": 0,
      "open": true,
      "meta": "49f9c940-3b98-44e0-862d-bf531ba0d5fc FS",
      "parent": "2abbc96d-d07f-45f5-84a2-5399fb0f01dc"
    },
    {
      "id": "6095c7ed-62b5-4331-9ad5-36277ab10a3e",
      "text": "Secure preliminary building permit approvals",
      "custom_tooltip": "<b>Secure preliminary building permit approvals</b><br>Objective: Obtain necessary permits for renovation work.\nScope: Prepare and submit permit applications to relevant authorities.\nSteps: Gather documentation, submit application, address queries, obtain approval.\nDeliverables: Approved building permits.<br><b>Resources needed:</b><br><ul><li>Architect</li><li>Permit application forms</li><li>Building plans</li><li>Local building authority</li></ul>",
      "start_date": "2027-04-07",
      "duration": 45.0,
      "progress": 0,
      "open": true,
      "meta": "00566072-8a38-4326-9822-cee4a23c9b76 FS",
      "parent": "2abbc96d-d07f-45f5-84a2-5399fb0f01dc"
    },
    {
      "id": "db978cc3-a80a-40b5-bd44-22a27ea866ab",
      "text": "Establish relationships with multiple suppliers",
      "custom_tooltip": "<b>Establish relationships with multiple suppliers</b><br>Objective: Mitigate supply chain risks for construction materials.\nScope: Identify and establish relationships with multiple suppliers.\nSteps: Research suppliers, request quotes, negotiate terms, establish accounts.\nDeliverables: Supplier list, price agreements.<br><b>Resources needed:</b><br><ul><li>Procurement specialist</li><li>Supplier contact information</li><li>Material specifications</li></ul>",
      "start_date": "2027-05-22",
      "duration": 45.0,
      "progress": 0,
      "open": true,
      "meta": "2abbc96d-d07f-45f5-84a2-5399fb0f01dc FF, 6095c7ed-62b5-4331-9ad5-36277ab10a3e FS",
      "parent": "2abbc96d-d07f-45f5-84a2-5399fb0f01dc"
    },
    {
      "id": "636a8c42-e427-4cee-b3a7-be90edb270e4",
      "text": "Renovate Property",
      "custom_tooltip": "<b>Renovate Property</b>",
      "progress": 0,
      "open": true,
      "meta": "2abbc96d-d07f-45f5-84a2-5399fb0f01dc FS",
      "parent": "53f3aab8-5ca4-4f33-b54c-f32986ab02f1",
      "type": "project"
    },
    {
      "id": "f8463012-fd32-45ca-ba7c-c801c02ac7e1",
      "text": "Design Equipment Layout",
      "custom_tooltip": "<b>Design Equipment Layout</b><br>Develop a detailed layout plan for the equipment within the renovated property, ensuring optimal workflow and safety. This includes specifying the placement of PSG, EEG, video monitoring, and other sensors. Deliverable: Approved equipment layout diagram.<br><b>Resources needed:</b><br><ul><li>Architect</li><li>Sleep Technologist</li><li>Principal Investigator</li></ul>",
      "start_date": "2027-07-06",
      "duration": 23.0,
      "progress": 0,
      "open": true,
      "meta": "636a8c42-e427-4cee-b3a7-be90edb270e4 SS",
      "parent": "636a8c42-e427-4cee-b3a7-be90edb270e4"
    },
    {
      "id": "e71126c0-0602-49e0-b80d-1bab84ecc6f6",
      "text": "Prepare Site for Equipment Installation",
      "custom_tooltip": "<b>Prepare Site for Equipment Installation</b><br>Ensure the renovated property is ready for equipment installation. This includes verifying electrical wiring, network connectivity, and environmental controls (temperature, humidity, lighting). Deliverable: Site readiness checklist.<br><b>Resources needed:</b><br><ul><li>Electrician</li><li>IT Technician</li><li>Contractor</li></ul>",
      "start_date": "2027-07-29",
      "duration": 23.0,
      "progress": 0,
      "open": true,
      "meta": "f8463012-fd32-45ca-ba7c-c801c02ac7e1 FS",
      "parent": "636a8c42-e427-4cee-b3a7-be90edb270e4"
    },
    {
      "id": "a3b22722-4b42-4e09-aa0c-a5f31c6bd076",
      "text": "Calibrate and Test Equipment",
      "custom_tooltip": "<b>Calibrate and Test Equipment</b><br>Calibrate all equipment according to manufacturer specifications and conduct thorough testing to ensure proper functionality. This includes PSG, EEG, video monitoring, and environmental sensors. Deliverable: Calibration and testing reports.<br><b>Resources needed:</b><br><ul><li>Sleep Technologist</li><li>Data Engineer</li><li>Equipment Vendor</li></ul>",
      "start_date": "2027-08-21",
      "duration": 23.0,
      "progress": 0,
      "open": true,
      "meta": "e71126c0-0602-49e0-b80d-1bab84ecc6f6 FS",
      "parent": "636a8c42-e427-4cee-b3a7-be90edb270e4"
    },
    {
      "id": "63e83bde-db0b-4e6f-b2cc-ec6015310b10",
      "text": "Integrate Equipment with IT Infrastructure",
      "custom_tooltip": "<b>Integrate Equipment with IT Infrastructure</b><br>Connect all equipment to the local NAS and data analysis software. Configure data acquisition and storage protocols. Deliverable: Integrated equipment and IT system.<br><b>Resources needed:</b><br><ul><li>Data Engineer</li><li>IT Technician</li><li>Sleep Technologist</li></ul>",
      "start_date": "2027-09-13",
      "duration": 23.0,
      "progress": 0,
      "open": true,
      "meta": "636a8c42-e427-4cee-b3a7-be90edb270e4 FF, a3b22722-4b42-4e09-aa0c-a5f31c6bd076 FS",
      "parent": "636a8c42-e427-4cee-b3a7-be90edb270e4"
    },
    {
      "id": "3a94ad85-195a-4c7f-9377-d62174a84480",
      "text": "Procure Equipment",
      "custom_tooltip": "<b>Procure Equipment</b>",
      "progress": 0,
      "open": true,
      "meta": "636a8c42-e427-4cee-b3a7-be90edb270e4 FS",
      "parent": "53f3aab8-5ca4-4f33-b54c-f32986ab02f1",
      "type": "project"
    },
    {
      "id": "a3ef9bbb-3688-4fab-8680-5d8193d684f5",
      "text": "Identify Equipment Vendors",
      "custom_tooltip": "<b>Identify Equipment Vendors</b><br>Objective: Identify potential vendors for each piece of equipment required for the research unit.\nScope: Research and compile a list of at least three vendors for each equipment type (PSG, EEG, sensors, etc.).\nSteps: Online research, vendor directories, conference contacts.\nDeliverables: Vendor list with contact information and preliminary pricing.<br><b>Resources needed:</b><br><ul><li>Research Technician</li><li>Principal Investigator</li></ul>",
      "start_date": "2027-10-06",
      "duration": 12.0,
      "progress": 0,
      "open": true,
      "meta": "3a94ad85-195a-4c7f-9377-d62174a84480 SS",
      "parent": "3a94ad85-195a-4c7f-9377-d62174a84480"
    },
    {
      "id": "9d8eecad-839e-4da0-80da-074e3b0cf350",
      "text": "Obtain Equipment Quotes",
      "custom_tooltip": "<b>Obtain Equipment Quotes</b><br>Objective: Obtain detailed quotes from selected vendors for all required equipment.\nScope: Contact vendors, request quotes, and clarify specifications.\nSteps: Prepare RFQs, send to vendors, track responses.\nDeliverables: Detailed quotes from each vendor, including pricing, delivery timelines, and warranty information.<br><b>Resources needed:</b><br><ul><li>Research Technician</li><li>Study Coordinator</li></ul>",
      "start_date": "2027-10-18",
      "duration": 12.0,
      "progress": 0,
      "open": true,
      "meta": "a3ef9bbb-3688-4fab-8680-5d8193d684f5 FS",
      "parent": "3a94ad85-195a-4c7f-9377-d62174a84480"
    },
    {
      "id": "6e373f0c-27a4-45f3-bbf9-37fa37f1601e",
      "text": "Evaluate Vendor Proposals",
      "custom_tooltip": "<b>Evaluate Vendor Proposals</b><br>Objective: Evaluate vendor proposals based on price, quality, and delivery timelines.\nScope: Compare quotes, assess vendor reputation, and negotiate terms.\nSteps: Create a scoring matrix, review proposals, conduct vendor interviews.\nDeliverables: Vendor selection report with justification for each choice.<br><b>Resources needed:</b><br><ul><li>Principal Investigator</li><li>Data Engineer</li><li>Research Technician</li></ul>",
      "start_date": "2027-10-30",
      "duration": 12.0,
      "progress": 0,
      "open": true,
      "meta": "9d8eecad-839e-4da0-80da-074e3b0cf350 FS",
      "parent": "3a94ad85-195a-4c7f-9377-d62174a84480"
    },
    {
      "id": "00d44c83-d142-4040-83d9-dac8d6eedcce",
      "text": "Place Equipment Orders",
      "custom_tooltip": "<b>Place Equipment Orders</b><br>Objective: Place orders with selected vendors and track delivery.\nScope: Prepare purchase orders, submit to vendors, and monitor shipment status.\nSteps: Generate POs, send to vendors, track shipments.\nDeliverables: Confirmed purchase orders and delivery schedules.<br><b>Resources needed:</b><br><ul><li>Study Coordinator</li><li>Research Technician</li></ul>",
      "start_date": "2027-11-11",
      "duration": 12.0,
      "progress": 0,
      "open": true,
      "meta": "6e373f0c-27a4-45f3-bbf9-37fa37f1601e FS",
      "parent": "3a94ad85-195a-4c7f-9377-d62174a84480"
    },
    {
      "id": "a15b7905-470e-4c1a-ba08-879a62afbcc3",
      "text": "Verify Equipment Specifications",
      "custom_tooltip": "<b>Verify Equipment Specifications</b><br>Objective: Verify that delivered equipment matches specifications and is in good working order.\nScope: Inspect equipment upon arrival, conduct initial testing, and document any discrepancies.\nSteps: Unpack equipment, compare to PO, perform basic functionality tests.\nDeliverables: Equipment verification report with any issues noted.<br><b>Resources needed:</b><br><ul><li>Data Engineer</li><li>Research Technicians</li></ul>",
      "start_date": "2027-11-23",
      "duration": 12.0,
      "progress": 0,
      "open": true,
      "meta": "3a94ad85-195a-4c7f-9377-d62174a84480 FF, 00d44c83-d142-4040-83d9-dac8d6eedcce FS",
      "parent": "3a94ad85-195a-4c7f-9377-d62174a84480"
    },
    {
      "id": "3ceaf8a6-ec88-4020-a3e2-43c1c65108c1",
      "text": "Install Equipment",
      "custom_tooltip": "<b>Install Equipment</b>",
      "progress": 0,
      "open": true,
      "meta": "3a94ad85-195a-4c7f-9377-d62174a84480 FS",
      "parent": "53f3aab8-5ca4-4f33-b54c-f32986ab02f1",
      "type": "project"
    },
    {
      "id": "84ab5aac-7695-488c-b048-985c0cb89d24",
      "text": "Unpack and Inventory Equipment",
      "custom_tooltip": "<b>Unpack and Inventory Equipment</b><br>Objective: Unpack all procured equipment and verify its completeness against the purchase orders.\nScope: This includes all PSG, EEG, video, and sensor equipment.\nSteps: 1. Unpack each item. 2. Check against packing list. 3. Document any discrepancies.\nDeliverables: Inventory list with confirmation of receipt and condition.<br><b>Resources needed:</b><br><ul><li>Research Technicians</li><li>Inventory Management System</li></ul>",
      "start_date": "2027-12-05",
      "duration": 8.0,
      "progress": 0,
      "open": true,
      "meta": "3ceaf8a6-ec88-4020-a3e2-43c1c65108c1 SS",
      "parent": "3ceaf8a6-ec88-4020-a3e2-43c1c65108c1"
    },
    {
      "id": "ebbd8699-610b-43bf-b647-c75cee75b194",
      "text": "Calibrate and Test Equipment",
      "custom_tooltip": "<b>Calibrate and Test Equipment</b><br>Objective: Calibrate all equipment to ensure accurate data collection.\nScope: This includes PSG, EEG, video, and sensor equipment.\nSteps: 1. Follow calibration procedures for each device. 2. Test equipment using phantoms or simulated data. 3. Document calibration results.\nDeliverables: Calibration reports for each piece of equipment.<br><b>Resources needed:</b><br><ul><li>Research Technicians</li><li>Calibration Tools</li><li>Testing Phantoms</li></ul>",
      "start_date": "2027-12-13",
      "duration": 8.0,
      "progress": 0,
      "open": true,
      "meta": "84ab5aac-7695-488c-b048-985c0cb89d24 FS",
      "parent": "3ceaf8a6-ec88-4020-a3e2-43c1c65108c1"
    },
    {
      "id": "ee9c0cbc-d8ca-4c1e-96e9-4715bfd9059c",
      "text": "Configure Equipment Settings",
      "custom_tooltip": "<b>Configure Equipment Settings</b><br>Objective: Configure equipment settings according to the study protocol.\nScope: This includes PSG, EEG, video, and sensor equipment.\nSteps: 1. Define optimal settings for each device. 2. Configure software and hardware. 3. Document settings.\nDeliverables: Configuration files and documentation.<br><b>Resources needed:</b><br><ul><li>Data Engineer</li><li>Research Technicians</li><li>Study Protocol</li></ul>",

    {
      "id": "77da9e82-a40b-4a2a-9086-95c4538264e4",
      "text": "Integrate Equipment with IT Infrastructure",
      "custom_tooltip": "<b>Integrate Equipment with IT Infrastructure</b><br>Objective: Integrate all equipment with the IT infrastructure for data storage and analysis.\nScope: This includes network connectivity, data transfer protocols, and data storage configuration.\nSteps: 1. Connect equipment to the network. 2. Configure data transfer protocols. 3. Test data transfer. 4. Configure data storage on NAS.\nDeliverables: Functional data transfer and storage system.<br><b>Resources needed:</b><br><ul><li>Data Engineer</li><li>IT Support</li><li>Network Infrastructure</li></ul>",

      "id": "6002e943-522d-47dc-a684-9151e483de9d",
      "text": "Design Network Architecture",
      "custom_tooltip": "<b>Design Network Architecture</b><br>Define the network topology, addressing scheme, and security protocols for the research unit&#x27;s IT infrastructure. This includes selecting appropriate network devices (routers, switches, firewalls) and configuring network services (DNS, DHCP).<br><b>Resources needed:</b><br><ul><li>Network Engineer</li><li>IT Architect</li></ul>",

    {
      "id": "2cc66004-00d6-4ed1-b8c0-a29e144c41b0",
      "text": "Configure Servers and Storage",
      "custom_tooltip": "<b>Configure Servers and Storage</b><br>Set up and configure the local NAS with 50TB storage capacity, including RAID configuration, user access controls, and data backup procedures. Install and configure necessary server software (e.g., database server, web server).<br><b>Resources needed:</b><br><ul><li>System Administrator</li><li>Data Engineer</li></ul>",

    {
      "id": "694b8ce9-9b3a-4def-b575-7b08ee0fb36d",
      "text": "Implement Data Security Measures",
      "custom_tooltip": "<b>Implement Data Security Measures</b><br>Implement data encryption, access controls, and intrusion detection systems to protect sensitive participant data. Ensure compliance with GDPR and other relevant data privacy regulations. Conduct regular security audits and vulnerability assessments.<br><b>Resources needed:</b><br><ul><li>Security Specialist</li><li>Data Engineer</li><li>Legal Counsel</li></ul>",
      "start_date": "2028-01-24",

    },
    {
      "id": "a0ccf5f9-3eb3-4cb7-9231-7fc67d7dbaeb",
      "text": "Install and Configure Software",
      "custom_tooltip": "<b>Install and Configure Software</b><br>Install and configure data analysis software, video-EEG monitoring software, and other necessary applications. Ensure compatibility between different software components and provide training to research staff on software usage.<br><b>Resources needed:</b><br><ul><li>Software Engineer</li><li>Research Technicians</li></ul>",

      "custom_tooltip": "<b>Test and Validate IT Infrastructure</b><br>Conduct thorough testing of the IT infrastructure to ensure network connectivity, server performance, data security, and software functionality. Validate that the infrastructure meets the research unit&#x27;s requirements and is ready for data collection.<br><b>Resources needed:</b><br><ul><li>Network Engineer</li><li>System Administrator</li><li>Software Engineer</li><li>Research Technicians</li></ul>",

      "custom_tooltip": "<b>Screen Applications</b><br>Review all applications received and shortlist candidates who meet the minimum qualifications and possess the desired skills and experience.<br><b>Resources needed:</b><br><ul><li>Principal Investigator</li><li>Senior Researchers</li><li>Study Coordinator</li></ul>",

      "custom_tooltip": "<b>Conduct Interviews</b><br>Conduct interviews with shortlisted candidates to assess their suitability for the positions, evaluate their research experience, and determine their fit within the research team.<br><b>Resources needed:</b><br><ul><li>Principal Investigator</li><li>Senior Researchers</li><li>Clinical Psychologist</li></ul>",

    {
      "id": "8c071756-0271-4ab5-9def-c3c54bf9a758",
      "text": "Develop PSG scoring training module",
      "custom_tooltip": "<b>Develop PSG scoring training module</b><br>Create a comprehensive training module on polysomnography (PSG) scoring, covering AASM guidelines and specific considerations for NREM parasomnias. This includes creating video examples, practice datasets, and quizzes to assess understanding.<br><b>Resources needed:</b><br><ul><li>Sleep Technologist</li><li>Clinical Psychologist</li><li>Training Software</li><li>PSG Data</li></ul>",

    {
      "id": "99acb767-f370-4236-b74b-cf9c06b8dc3f",
      "text": "Create EEG artifact recognition training",
      "custom_tooltip": "<b>Create EEG artifact recognition training</b><br>Develop a training program focused on identifying and mitigating EEG artifacts, including muscle artifact, eye movement artifact, and electrode artifact. This will involve creating visual aids, interactive exercises, and real-world examples.<br><b>Resources needed:</b><br><ul><li>EEG Technician</li><li>Data Engineer</li><li>Neurologist</li><li>EEG Data</li></ul>",
      "start_date": "2028-04-26",

    },
    {
      "id": "f08b431a-1e00-41c7-b23c-d12dfa110333",
      "text": "Establish inter-rater reliability protocol",
      "custom_tooltip": "<b>Establish inter-rater reliability protocol</b><br>Define a standardized protocol for assessing and maintaining inter-rater reliability in event scoring. This includes establishing clear scoring criteria, implementing a dual-rater system, and conducting regular reliability checks.<br><b>Resources needed:</b><br><ul><li>Principal Investigator</li><li>Postdoctoral Researchers</li><li>Statistical Software</li></ul>",
      "start_date": "2028-05-02",

    },

      "id": "1b25e981-2cbd-40d0-92a4-90bf4ef40c46",
      "text": "Train staff on data privacy compliance",
      "custom_tooltip": "<b>Train staff on data privacy compliance</b><br>Conduct training on data privacy regulations, including GDPR, and implement data encryption and access controls. This will involve creating training materials, conducting workshops, and establishing clear data handling procedures.<br><b>Resources needed:</b><br><ul><li>Data Protection Officer</li><li>Legal Counsel</li><li>IT Specialist</li></ul>",

      "id": "ca5a4d8b-a0b2-413a-8cb5-463655b2749a",
      "text": "Outline Training Modules",
      "custom_tooltip": "<b>Outline Training Modules</b><br>Define the scope and objectives of each training module, including key learning outcomes and assessment methods. This involves identifying the specific skills and knowledge required for research staff to effectively perform their duties related to parasomnia research.<br><b>Resources needed:</b><br><ul><li>Principal Investigator</li><li>Postdoctoral Researchers</li><li>Clinical Psychologist</li></ul>",

      "id": "8e66dfc7-623f-4e5a-8114-5241e6c96b5c",
      "text": "Develop Module Content",
      "custom_tooltip": "<b>Develop Module Content</b><br>Create detailed training materials for each module, including presentations, handouts, videos, and interactive exercises. Ensure the content is accurate, up-to-date, and aligned with the latest research findings and best practices in sleep research.<br><b>Resources needed:</b><br><ul><li>Postdoctoral Researchers</li><li>Research Technicians</li><li>Data Engineer</li></ul>",

      "id": "bda5682c-664a-463d-9ab2-5b66fdfcb410",
      "text": "Design Hands-On Exercises",
      "custom_tooltip": "<b>Design Hands-On Exercises</b><br>Develop practical exercises and simulations that allow research staff to apply their newly acquired knowledge and skills in a realistic setting. This may include mock data analysis scenarios, equipment operation simulations, and role-playing exercises for participant interaction.<br><b>Resources needed:</b><br><ul><li>Research Technicians</li><li>Clinical Psychologist</li><li>Study Coordinator</li></ul>",

    },

      "id": "5e7bc638-dc48-4b96-8974-b9c7ef1e5576",
      "text": "Create Assessment Tools",
      "custom_tooltip": "<b>Create Assessment Tools</b><br>Develop assessment tools to evaluate the effectiveness of the training program and identify areas for improvement. This may include quizzes, exams, performance evaluations, and feedback surveys.<br><b>Resources needed:</b><br><ul><li>Principal Investigator</li><li>Study Coordinator</li><li>Data Engineer</li></ul>",

    {
      "id": "a397132b-bc22-42a7-9b80-be2791d3add8",
      "text": "Identify Potential Referral Sources",
      "custom_tooltip": "<b>Identify Potential Referral Sources</b><br>Objective: Identify and list potential referral sources for participant recruitment.\nScope: Includes sleep clinics, neurology practices, general practitioners, and online communities.\nSteps: Research local and regional healthcare providers, compile contact information, and assess their suitability as referral partners.\nDeliverables: A comprehensive list of potential referral sources with contact details and preliminary assessment.<br><b>Resources needed:</b><br><ul><li>Study Coordinator</li><li>Research Assistant</li></ul>",

    {
      "id": "dd10d9ed-157f-42f6-b741-b7758ef7ed84",
      "text": "Develop Recruitment Materials",
      "custom_tooltip": "<b>Develop Recruitment Materials</b><br>Objective: Create compelling and informative recruitment materials.\nScope: Includes brochures, flyers, website content, and social media posts.\nSteps: Design visually appealing materials, write clear and concise text, and ensure compliance with ethical guidelines.\nDeliverables: A suite of recruitment materials ready for distribution.<br><b>Resources needed:</b><br><ul><li>Study Coordinator</li><li>Graphic Designer</li><li>Principal Investigator</li></ul>",

    },
    {
      "id": "52ad8a2d-eba2-47cf-994b-b60cd7c215c8",
      "text": "Establish Agreements with Referral Sources",
      "custom_tooltip": "<b>Establish Agreements with Referral Sources</b><br>Objective: Formalize partnerships with key referral sources.\nScope: Includes negotiating referral agreements, outlining responsibilities, and establishing communication protocols.\nSteps: Contact potential referral sources, present the study, negotiate terms, and finalize agreements.\nDeliverables: Signed referral agreements with key partners.<br><b>Resources needed:</b><br><ul><li>Study Coordinator</li><li>Principal Investigator</li><li>Legal Counsel (if needed)</li></ul>",
      "start_date": "2028-06-29",

    {
      "id": "004abf74-6edb-48a0-99e8-d11349ef30b9",
      "text": "Create Online Recruitment Platform",
      "custom_tooltip": "<b>Create Online Recruitment Platform</b><br>Objective: Develop a user-friendly online platform for recruitment.\nScope: Includes website, online surveys, and social media presence.\nSteps: Design and build the platform, create engaging content, and ensure data security.\nDeliverables: A fully functional online recruitment platform.<br><b>Resources needed:</b><br><ul><li>Data Engineer</li><li>Web Developer</li><li>Study Coordinator</li></ul>",

    {
      "id": "e8220c26-86be-432d-a24d-19ed77dd0b61",
      "text": "Develop recruitment materials",
      "custom_tooltip": "<b>Develop recruitment materials</b><br>Objective: Create compelling recruitment materials to attract potential participants.\nScope: Design flyers, brochures, website content, and social media posts.\nSteps: 1. Draft content. 2. Design visuals. 3. Obtain ethics approval. 4. Print/publish materials.\nDeliverables: Approved recruitment materials.<br><b>Resources needed:</b><br><ul><li>Study Coordinator</li><li>Graphic Designer</li><li>Ethics Committee</li></ul>",

    {
      "id": "b76d2560-8614-4acb-b06d-feb58a774fd4",
      "text": "Engage with referral sources",
      "custom_tooltip": "<b>Engage with referral sources</b><br>Objective: Establish relationships with neurologists and sleep clinics for participant referrals.\nScope: Contact potential referral sources and present the study.\nSteps: 1. Identify potential referral sources. 2. Prepare presentation materials. 3. Schedule meetings. 4. Follow up with referral sources.\nDeliverables: List of engaged referral sources.<br><b>Resources needed:</b><br><ul><li>Principal Investigator</li><li>Study Coordinator</li></ul>",
      "start_date": "2028-09-03",
      "duration": 36.0,
      "progress": 0,
      "open": true,
      "meta": "e8220c26-86be-432d-a24d-19ed77dd0b61 FS",
      "parent": "2b517788-ec1d-4ad0-bb94-8270186d54b9"
    },
    {
      "id": "dd68ac84-acec-4f2b-a19d-6609eadb2f80",
      "text": "Implement online advertising campaign",
      "custom_tooltip": "<b>Implement online advertising campaign</b><br>Objective: Utilize online platforms to reach potential participants.\nScope: Design and launch targeted online advertisements.\nSteps: 1. Identify target demographics. 2. Create ad content. 3. Launch campaign on relevant platforms. 4. Monitor ad performance.\nDeliverables: Active online advertising campaign.<br><b>Resources needed:</b><br><ul><li>Data Engineer</li><li>Study Coordinator</li></ul>",
      "start_date": "2028-10-09",
      "duration": 36.0,
      "progress": 0,
      "open": true,
      "meta": "b76d2560-8614-4acb-b06d-feb58a774fd4 FS",
      "parent": "2b517788-ec1d-4ad0-bb94-8270186d54b9"
    },
    {
      "id": "9d1efe01-7b98-479f-8647-e4d63909e7d4",
      "text": "Conduct community outreach events",
      "custom_tooltip": "<b>Conduct community outreach events</b><br>Objective: Raise awareness about the study within the local community.\nScope: Organize and host community events to recruit participants.\nSteps: 1. Identify suitable event locations. 2. Plan event activities. 3. Promote the event. 4. Host the event.\nDeliverables: Completed community outreach events.<br><b>Resources needed:</b><br><ul><li>Study Coordinator</li><li>Research Technicians</li></ul>",
      "start_date": "2028-11-14",
      "duration": 36.0,
      "progress": 0,
      "open": true,
      "meta": "dd68ac84-acec-4f2b-a19d-6609eadb2f80 FS",
      "parent": "2b517788-ec1d-4ad0-bb94-8270186d54b9"
    },
    {
      "id": "b7da1041-9251-4b28-8684-9fe5c362bdfe",
      "text": "Screen potential participants",
      "custom_tooltip": "<b>Screen potential participants</b><br>Objective: Assess eligibility of potential participants based on inclusion/exclusion criteria.\nScope: Conduct initial screening interviews and administer questionnaires.\nSteps: 1. Develop screening protocol. 2. Conduct phone screenings. 3. Schedule in-person assessments. 4. Review assessment results.\nDeliverables: List of eligible participants.<br><b>Resources needed:</b><br><ul><li>Clinical Psychologist</li><li>Study Coordinator</li></ul>",
      "start_date": "2028-12-20",
      "duration": 36.0,
      "progress": 0,
      "open": true,
      "meta": "2b517788-ec1d-4ad0-bb94-8270186d54b9 FF, 9d1efe01-7b98-479f-8647-e4d63909e7d4 FS",

    },

      "id": "0a0421e4-003a-4288-8c39-db411b9efc69",

      "custom_tooltip": "<b>Collect Data</b>",
      "progress": 0,
      "open": true,
      "meta": "2b517788-ec1d-4ad0-bb94-8270186d54b9 FS",

      "type": "project"

    {
      "id": "dd403037-62ba-490f-aff8-6fec1505f4a5",
      "text": "Schedule Participant Monitoring Sessions",
      "custom_tooltip": "<b>Schedule Participant Monitoring Sessions</b><br>Coordinate with participants to schedule convenient and appropriate monitoring sessions, considering their availability and sleep patterns. This includes confirming appointments, providing pre-session instructions, and addressing any participant concerns.<br><b>Resources needed:</b><br><ul><li>Study Coordinator</li><li>Research Technicians</li><li>Scheduling Software</li></ul>",
      "start_date": "2029-01-25",
      "duration": 183.0,
      "progress": 0,
      "open": true,
      "meta": "0a0421e4-003a-4288-8c39-db411b9efc69 SS",
      "parent": "0a0421e4-003a-4288-8c39-db411b9efc69"
    },
    {
      "id": "533ad9d7-8821-4e69-be5b-a2218ddcd8ab",
      "text": "Conduct Polysomnography (PSG) Recordings",
      "custom_tooltip": "<b>Conduct Polysomnography (PSG) Recordings</b><br>Perform overnight polysomnography (PSG) recordings in the residential unit, ensuring proper electrode placement, equipment calibration, and continuous monitoring throughout the night. This includes troubleshooting any technical issues that may arise during the recording.<br><b>Resources needed:</b><br><ul><li>Research Technicians</li><li>Polysomnography Equipment</li><li>Emergency Medical Personnel (on call)</li></ul>",
      "start_date": "2029-07-27",
      "duration": 183.0,
      "progress": 0,
      "open": true,
      "meta": "dd403037-62ba-490f-aff8-6fec1505f4a5 FS",
      "parent": "0a0421e4-003a-4288-8c39-db411b9efc69"
    },
    {
      "id": "a03c778c-0022-4b28-9c9b-0814c754743a",
      "text": "Collect Video-EEG and Sensor Data",
      "custom_tooltip": "<b>Collect Video-EEG and Sensor Data</b><br>Simultaneously collect video-EEG data, contact-free mattress sensor data, infrared camera recordings, ambient microphone recordings, and environmental sensor data during PSG sessions. Ensure proper synchronization of all data streams.<br><b>Resources needed:</b><br><ul><li>Research Technicians</li><li>Video-EEG Monitoring Equipment</li><li>Dry-electrode EEG Headbands</li><li>Contact-free Mattress Sensors</li><li>Infrared Cameras</li><li>Ambient Microphones</li><li>Environmental Sensors</li></ul>",
      "start_date": "2030-01-26",
      "duration": 183.0,
      "progress": 0,
      "open": true,
      "meta": "533ad9d7-8821-4e69-be5b-a2218ddcd8ab FS",
      "parent": "0a0421e4-003a-4288-8c39-db411b9efc69"
    },
    {
      "id": "eab6c916-4f70-4f22-9ef4-e56cb1a46604",
      "text": "Store and Backup Collected Data",
      "custom_tooltip": "<b>Store and Backup Collected Data</b><br>Securely store all collected data on the local NAS with 50TB storage capacity, implementing robust data backup procedures to prevent data loss. This includes regular data backups, data encryption, and access control measures.<br><b>Resources needed:</b><br><ul><li>Data Engineer</li><li>Local NAS with 50TB storage capacity</li><li>Data Backup Software</li></ul>",
      "start_date": "2030-07-28",
      "duration": 183.0,
      "progress": 0,
      "open": true,
      "meta": "a03c778c-0022-4b28-9c9b-0814c754743a FS",
      "parent": "0a0421e4-003a-4288-8c39-db411b9efc69"
    },
    {
      "id": "bb450dfd-17b7-49b2-b869-d20e6c4f8b6e",
      "text": "Monitor Participant Well-being During Sessions",
      "custom_tooltip": "<b>Monitor Participant Well-being During Sessions</b><br>Continuously monitor participants for any signs of distress or adverse events during monitoring sessions. Implement safety protocols to address any medical emergencies or safety concerns that may arise.<br><b>Resources needed:</b><br><ul><li>Research Technicians</li><li>Clinical Psychologist (on call)</li><li>Emergency Medical Personnel (on call)</li><li>Safety Protocols</li></ul>",
      "start_date": "2031-01-27",
      "duration": 183.0,
      "progress": 0,
      "open": true,
      "meta": "0a0421e4-003a-4288-8c39-db411b9efc69 FF, eab6c916-4f70-4f22-9ef4-e56cb1a46604 FS",
      "parent": "0a0421e4-003a-4288-8c39-db411b9efc69"
    },
    {
      "id": "26687578-5a03-4c56-9c1c-2a34d8bb8bec",
      "text": "Ensure Participant Safety",
      "custom_tooltip": "<b>Ensure Participant Safety</b>",
      "progress": 0,
      "open": true,
      "meta": "0a0421e4-003a-4288-8c39-db411b9efc69 FS",
      "parent": "b0ab152e-4780-4caa-9aab-bcefad365ee8",
      "type": "project"
    },
    {
      "id": "4d23b988-edc2-40b5-8df2-ddf9da8345f7",
      "text": "Establish Emergency Response Protocol",
      "custom_tooltip": "<b>Establish Emergency Response Protocol</b><br>Develop a detailed protocol for responding to medical emergencies or adverse events during sleep studies. This includes defining roles and responsibilities, establishing communication channels, and ensuring access to necessary medical equipment and personnel.<br><b>Resources needed:</b><br><ul><li>Clinical Psychologist</li><li>Principal Investigator</li><li>Facility and Safety Manager</li><li>Medical Personnel</li></ul>",
      "start_date": "2031-07-29",
      "duration": 36.0,
      "progress": 0,
      "open": true,
      "meta": "26687578-5a03-4c56-9c1c-2a34d8bb8bec SS",
      "parent": "26687578-5a03-4c56-9c1c-2a34d8bb8bec"
    },
    {
      "id": "b8272ca7-e474-4b19-a20e-b0912db90efd",
      "text": "Implement Pre-Screening Procedures",
      "custom_tooltip": "<b>Implement Pre-Screening Procedures</b><br>Conduct thorough pre-screening of participants to identify potential health risks or contraindications for sleep studies. This includes reviewing medical history, conducting physical examinations, and administering questionnaires to assess psychological well-being.<br><b>Resources needed:</b><br><ul><li>Clinical Psychologist</li><li>Research Technicians</li><li>Study Coordinator</li></ul>",
      "start_date": "2031-09-03",
      "duration": 36.0,
      "progress": 0,
      "open": true,
      "meta": "4d23b988-edc2-40b5-8df2-ddf9da8345f7 FS",
      "parent": "26687578-5a03-4c56-9c1c-2a34d8bb8bec"
    },
    {
      "id": "2ecf647d-661d-44a5-86cf-dabff9b8d812",
      "text": "Provide Participant Education",
      "custom_tooltip": "<b>Provide Participant Education</b><br>Provide detailed explanations of the study procedures, potential risks, and safety measures to participants before they enroll in the study. This includes obtaining informed consent and addressing any questions or concerns they may have.<br><b>Resources needed:</b><br><ul><li>Study Coordinator</li><li>Principal Investigator</li><li>Research Technicians</li></ul>",
      "start_date": "2031-10-09",
      "duration": 36.0,
      "progress": 0,
      "open": true,
      "meta": "b8272ca7-e474-4b19-a20e-b0912db90efd FS",
      "parent": "26687578-5a03-4c56-9c1c-2a34d8bb8bec"
    },
    {
      "id": "714cd727-38e0-40b7-920b-114ff814bfe7",
      "text": "Monitor Participants During Sleep Studies",
      "custom_tooltip": "<b>Monitor Participants During Sleep Studies</b><br>Continuously monitor participants during sleep studies to detect any signs of distress or adverse events. This includes using video and audio monitoring equipment, as well as trained personnel to observe participants&#x27; behavior and physiological responses.<br><b>Resources needed:</b><br><ul><li>Research Technicians</li><li>Clinical Psychologist</li></ul>",
      "start_date": "2031-11-14",
      "duration": 36.0,
      "progress": 0,
      "open": true,
      "meta": "2ecf647d-661d-44a5-86cf-dabff9b8d812 FS",
      "parent": "26687578-5a03-4c56-9c1c-2a34d8bb8bec"
    },
    {
      "id": "92867f0e-47eb-46eb-a987-841ecb5ee744",
      "text": "Address Participant Concerns Promptly",
      "custom_tooltip": "<b>Address Participant Concerns Promptly</b><br>Establish a system for participants to report any concerns or discomfort they may experience during sleep studies. Ensure that these concerns are addressed promptly and effectively by trained personnel.<br><b>Resources needed:</b><br><ul><li>Study Coordinator</li><li>Research Technicians</li><li>Clinical Psychologist</li></ul>",
      "start_date": "2031-12-20",
      "duration": 36.0,
      "progress": 0,
      "open": true,
      "meta": "26687578-5a03-4c56-9c1c-2a34d8bb8bec FF, 714cd727-38e0-40b7-920b-114ff814bfe7 FS",
      "parent": "26687578-5a03-4c56-9c1c-2a34d8bb8bec"
    },
    {
      "id": "c6183ddf-34c7-4c91-be89-10762dc1e2f0",
      "text": "Manage Participant Data",
      "custom_tooltip": "<b>Manage Participant Data</b>",
      "progress": 0,
      "open": true,
      "meta": "b0ab152e-4780-4caa-9aab-bcefad365ee8 FF, 26687578-5a03-4c56-9c1c-2a34d8bb8bec FS",
      "parent": "b0ab152e-4780-4caa-9aab-bcefad365ee8",
      "type": "project"
    },
    {
      "id": "74ace7d6-a09b-4ba3-8ad5-4e425ecd72dc",
      "text": "Establish Data Security Protocols",
      "custom_tooltip": "<b>Establish Data Security Protocols</b><br>Objective: Implement robust data security measures to protect participant data. Scope: Includes encryption, access controls, and regular security audits. Steps: 1. Define security requirements. 2. Implement encryption. 3. Configure access controls. 4. Schedule regular audits. Deliverables: Secure data storage and access system.<br><b>Resources needed:</b><br><ul><li>Data Engineer</li><li>IT Security Specialist</li><li>Compliance Officer</li></ul>",
      "start_date": "2032-01-25",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "c6183ddf-34c7-4c91-be89-10762dc1e2f0 SS",
      "parent": "c6183ddf-34c7-4c91-be89-10762dc1e2f0"
    },
    {
      "id": "7b77c6b9-4ba6-4080-8af4-9d8980580fab",
      "text": "Implement Data Backup and Recovery",
      "custom_tooltip": "<b>Implement Data Backup and Recovery</b><br>Objective: Ensure data integrity and availability through regular backups and a recovery plan. Scope: Includes defining backup frequency, storage location, and recovery procedures. Steps: 1. Define backup schedule. 2. Select backup storage. 3. Implement backup procedures. 4. Test recovery process. Deliverables: Functional data backup and recovery system.<br><b>Resources needed:</b><br><ul><li>Data Engineer</li><li>IT Administrator</li></ul>",
      "start_date": "2032-01-28",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "74ace7d6-a09b-4ba3-8ad5-4e425ecd72dc FS",
      "parent": "c6183ddf-34c7-4c91-be89-10762dc1e2f0"
    },
    {
      "id": "d1f7c95d-988d-4c80-93fd-95f54d0aaee9",
      "text": "Ensure GDPR Compliance",
      "custom_tooltip": "<b>Ensure GDPR Compliance</b><br>Objective: Adhere to GDPR regulations for data privacy and protection. Scope: Includes obtaining consent, managing data access, and handling data breaches. Steps: 1. Obtain informed consent. 2. Implement data access controls. 3. Establish breach response plan. 4. Conduct regular compliance checks. Deliverables: GDPR-compliant data management system.<br><b>Resources needed:</b><br><ul><li>Compliance Officer</li><li>Legal Counsel</li><li>Study Coordinator</li></ul>",
      "start_date": "2032-01-31",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "7b77c6b9-4ba6-4080-8af4-9d8980580fab FS",
      "parent": "c6183ddf-34c7-4c91-be89-10762dc1e2f0"
    },
    {
      "id": "2203b2b0-2a97-496e-a195-ec807cde36f8",
      "text": "Monitor Data Quality and Integrity",
      "custom_tooltip": "<b>Monitor Data Quality and Integrity</b><br>Objective: Continuously monitor data for errors and inconsistencies. Scope: Includes implementing data validation procedures and regular audits. Steps: 1. Define data validation rules. 2. Implement data validation procedures. 3. Conduct regular data audits. 4. Correct data errors. Deliverables: High-quality and reliable participant data.<br><b>Resources needed:</b><br><ul><li>Data Engineer</li><li>Research Technicians</li><li>Data Analyst</li></ul>",
      "start_date": "2032-02-03",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "c6183ddf-34c7-4c91-be89-10762dc1e2f0 FF, d1f7c95d-988d-4c80-93fd-95f54d0aaee9 FS",
      "parent": "c6183ddf-34c7-4c91-be89-10762dc1e2f0"
    },
    {
      "id": "2ae7aa36-9039-4f6d-bf57-bcb74139f286",
      "text": "Data Analysis & Tool Development",
      "custom_tooltip": "<b>Data Analysis &amp; Tool Development</b>",
      "progress": 0,
      "open": true,
      "meta": "b0ab152e-4780-4caa-9aab-bcefad365ee8 FS",
      "parent": "55cc68a7-1535-4473-b69e-b73f710d2f4f",
      "type": "project"
    },
    {
      "id": "6bb0f155-9c60-4916-ba9c-f09ffb7e731e",
      "text": "Annotate Data",
      "custom_tooltip": "<b>Annotate Data</b>",
      "progress": 0,
      "open": true,
      "meta": "2ae7aa36-9039-4f6d-bf57-bcb74139f286 SS",
      "parent": "2ae7aa36-9039-4f6d-bf57-bcb74139f286",
      "type": "project"
    },
    {
      "id": "629dc07c-3443-45d1-9827-1618e4efd8da",
      "text": "Develop Annotation Guidelines",
      "custom_tooltip": "<b>Develop Annotation Guidelines</b><br>Create detailed and consistent guidelines for annotating parasomnia events in EEG and video data. This includes defining event types, scoring criteria, and examples. The objective is to ensure consistency and accuracy across all annotators.<br><b>Resources needed:</b><br><ul><li>Sleep experts</li><li>EEG technicians</li><li>Clinical psychologist</li><li>Annotation software</li></ul>",
      "start_date": "2032-02-06",
      "duration": 24.0,
      "progress": 0,
      "open": true,
      "meta": "6bb0f155-9c60-4916-ba9c-f09ffb7e731e SS",
      "parent": "6bb0f155-9c60-4916-ba9c-f09ffb7e731e"
    },
    {
      "id": "997659f4-d4e6-4926-8247-fa52c4c2caad",
      "text": "Train Annotators",
      "custom_tooltip": "<b>Train Annotators</b><br>Conduct training sessions for all annotators to familiarize them with the annotation guidelines and software. This includes hands-on practice with sample data and feedback sessions. The goal is to achieve a high level of inter-rater reliability.<br><b>Resources needed:</b><br><ul><li>Sleep experts</li><li>EEG technicians</li><li>Clinical psychologist</li><li>Training materials</li><li>Annotation software</li></ul>",
      "start_date": "2032-03-01",
      "duration": 24.0,
      "progress": 0,
      "open": true,
      "meta": "629dc07c-3443-45d1-9827-1618e4efd8da FS",
      "parent": "6bb0f155-9c60-4916-ba9c-f09ffb7e731e"
    },
    {
      "id": "2701b345-a44d-4268-b190-002868e68a55",
      "text": "Perform Data Annotation",
      "custom_tooltip": "<b>Perform Data Annotation</b><br>Annotate the collected EEG and video data according to the established guidelines. This involves identifying and scoring parasomnia events, marking relevant features, and documenting any uncertainties. The deliverable is a fully annotated dataset.<br><b>Resources needed:</b><br><ul><li>Trained annotators</li><li>Annotation software</li><li>EEG data</li><li>Video data</li></ul>",
      "start_date": "2032-03-25",
      "duration": 24.0,
      "progress": 0,
      "open": true,
      "meta": "997659f4-d4e6-4926-8247-fa52c4c2caad FS",
      "parent": "6bb0f155-9c60-4916-ba9c-f09ffb7e731e"
    },
    {
      "id": "bdeb6d2e-0522-4c48-bc8f-3912c5271655",
      "text": "Assess Inter-Rater Reliability",
      "custom_tooltip": "<b>Assess Inter-Rater Reliability</b><br>Evaluate the consistency of annotations across different annotators. This involves calculating inter-rater reliability scores and identifying areas of disagreement. The objective is to ensure the quality and validity of the annotated data.<br><b>Resources needed:</b><br><ul><li>Statistical software</li><li>Annotated data</li><li>Sleep experts</li></ul>",
      "start_date": "2032-04-18",
      "duration": 24.0,
      "progress": 0,
      "open": true,
      "meta": "2701b345-a44d-4268-b190-002868e68a55 FS",
      "parent": "6bb0f155-9c60-4916-ba9c-f09ffb7e731e"
    },
    {
      "id": "92578f56-d478-4401-b4ca-4e0b1a12da00",
      "text": "Refine Annotation Workflow",
      "custom_tooltip": "<b>Refine Annotation Workflow</b><br>Based on the inter-rater reliability assessment, refine the annotation guidelines and training procedures. This may involve clarifying ambiguous criteria, providing additional examples, or implementing new quality control measures. The goal is to improve the accuracy and consistency of future annotations.<br><b>Resources needed:</b><br><ul><li>Sleep experts</li><li>EEG technicians</li><li>Clinical psychologist</li><li>Annotated data</li><li>Statistical analysis</li></ul>",
      "start_date": "2032-05-12",
      "duration": 24.0,
      "progress": 0,
      "open": true,
      "meta": "6bb0f155-9c60-4916-ba9c-f09ffb7e731e FF, bdeb6d2e-0522-4c48-bc8f-3912c5271655 FS",
      "parent": "6bb0f155-9c60-4916-ba9c-f09ffb7e731e"
    },
    {
      "id": "f2063ce3-80b2-4be3-93a7-a8e0dffffb4d",
      "text": "Analyze Data",
      "custom_tooltip": "<b>Analyze Data</b>",
      "progress": 0,
      "open": true,
      "meta": "6bb0f155-9c60-4916-ba9c-f09ffb7e731e FS",
      "parent": "2ae7aa36-9039-4f6d-bf57-bcb74139f286",
      "type": "project"
    },
    {
      "id": "17221d5d-4aba-4dbf-997e-eb9ba32a09ea",
      "text": "Clean and Prepare Data",
      "custom_tooltip": "<b>Clean and Prepare Data</b><br>Objective: Ensure data quality and consistency for analysis.\nScope: Handle missing values, outliers, and inconsistencies.\nSteps: 1. Identify missing values and outliers. 2. Impute or remove missing data. 3. Correct inconsistencies in data formats. 4. Standardize data units.\nDeliverables: Cleaned and prepared dataset.<br><b>Resources needed:</b><br><ul><li>Data analyst</li><li>Data cleaning software (e.g., OpenRefine)</li><li>Data validation scripts</li></ul>",
      "start_date": "2032-06-05",
      "duration": 23.0,
      "progress": 0,
      "open": true,
      "meta": "f2063ce3-80b2-4be3-93a7-a8e0dffffb4d SS",
      "parent": "f2063ce3-80b2-4be3-93a7-a8e0dffffb4d"
    },
    {
      "id": "1fa4e4f8-b7d8-44fd-bd45-2b77e0e06ded",
      "text": "Perform Descriptive Statistics",
      "custom_tooltip": "<b>Perform Descriptive Statistics</b><br>Objective: Summarize key characteristics of the data.\nScope: Calculate descriptive statistics for relevant variables.\nSteps: 1. Calculate mean, median, mode, standard deviation, and range for each variable. 2. Generate histograms and box plots to visualize data distributions. 3. Identify potential patterns and anomalies.\nDeliverables: Descriptive statistics report and visualizations.<br><b>Resources needed:</b><br><ul><li>Data analyst</li><li>Statistical software (e.g., R, Python)</li><li>Visualization tools</li></ul>",
      "start_date": "2032-06-28",
      "duration": 23.0,

    function zoomFit() {
        const tasks = gantt.getTaskByTime();
        if (tasks.length > 0) {
            const firstTask = tasks[0];
            const lastTask = tasks[tasks.length - 1];
            gantt.showDate(firstTask.start_date);
            
            // Calculate total duration in days
            const startDate = new Date(firstTask.start_date);
            const endDate = new Date(lastTask.end_date);
            const durationDays = (endDate - startDate) / (1000 * 60 * 60 * 24);
            
            // Choose appropriate scale based on duration
            if (durationDays > 3650) { // More than 10 years
                gantt.config.scale_unit = "year";
                gantt.config.step = 10;
                gantt.config.subscales = [
                    {unit: "year", step: 1, date: "%Y"}
                ];
            } else if (durationDays > 365) { // More than 1 year
                gantt.config.scale_unit = "year";
                gantt.config.step = 1;
                gantt.config.subscales = [
                    {unit: "month", step: 1, date: "%M"}
                ];
            } else if (durationDays > 30) { // More than 1 month
                gantt.config.scale_unit = "month";
                gantt.config.step = 1;
                gantt.config.subscales = [
                    {unit: "day", step: 1, date: "%d"}
                ];
            } else if (durationDays > 7) { // More than 1 week
                gantt.config.scale_unit = "week";
                gantt.config.step = 1;
                gantt.config.subscales = [
                    {unit: "day", step: 1, date: "%d"}
                ];
            } else {
                gantt.config.scale_unit = "day";
                gantt.config.step = 1;
                gantt.config.subscales = [];
            }
            gantt.render();
        }
    }

    function zoomIn() {
        const currentUnit = gantt.config.scale_unit;
        const currentStep = gantt.config.step;
        
        if (currentUnit === "year" && currentStep === 10) {
            gantt.config.scale_unit = "year";
            gantt.config.step = 1;
            gantt.config.subscales = [
                {unit: "month", step: 1, date: "%M"}
            ];
        } else if (currentUnit === "year") {
            gantt.config.scale_unit = "month";
            gantt.config.step = 1;
            gantt.config.subscales = [
                {unit: "day", step: 1, date: "%d"}
            ];
        } else if (currentUnit === "month") {
            gantt.config.scale_unit = "week";
            gantt.config.step = 1;
            gantt.config.subscales = [
                {unit: "day", step: 1, date: "%d"}
            ];
        } else if (currentUnit === "week") {
            gantt.config.scale_unit = "day";
            gantt.config.step = 1;
            gantt.config.subscales = [];
        }
        gantt.render();
    }

    function zoomOut() {
        const currentUnit = gantt.config.scale_unit;
        const currentStep = gantt.config.step;
        
        if (currentUnit === "day") {
            gantt.config.scale_unit = "week";
            gantt.config.step = 1;
            gantt.config.subscales = [
                {unit: "day", step: 1, date: "%d"}
            ];
        } else if (currentUnit === "week") {
            gantt.config.scale_unit = "month";
            gantt.config.step = 1;
            gantt.config.subscales = [
                {unit: "day", step: 1, date: "%d"}
            ];
        } else if (currentUnit === "month") {
            gantt.config.scale_unit = "year";
            gantt.config.step = 1;
            gantt.config.subscales = [
                {unit: "month", step: 1, date: "%M"}
            ];
        } else if (currentUnit === "year") {
            gantt.config.scale_unit = "year";
            gantt.config.step = 10;
            gantt.config.subscales = [
                {unit: "year", step: 1, date: "%Y"}
            ];
        }
        gantt.render();
    }

    function downloadCSV() {
        if (GANTT_DATA_CSV === null) {
            return;
        }
        const blob = new Blob([GANTT_DATA_CSV], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        const url = URL.createObjectURL(blob);
        link.setAttribute('href', url);
        link.setAttribute('download', GANTT_FILENAME_CSV);
        link.style.visibility = 'hidden';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    // Gantt Initialization
    gantt.config.readonly = true;
    gantt.config.date_format = "%Y-%m-%d";
    gantt.config.scale_unit = "month";
    gantt.config.step = 1;
    gantt.config.subscales = [
        {unit: "day", step: 1, date: "%d"}
    ];

    gantt.config.columns = [
        {name:"text", label:"Task name", width:"*", tree:true},
        // {name:"start_date", label:"Start time", align: "center"},
        // {name:"duration", label:"Duration", align: "center"}
    ];

    gantt.templates.task_class = function(start, end, task) {
        if (task.type === "project") {
            return "project-task";
        }
        return "";
    };

    gantt.templates.tooltip_text = function(start, end, task) {
        return task.custom_tooltip || "No tooltip";
    };
    
	gantt.plugins({
		tooltip: true
	});
	gantt.attachEvent("onGanttReady", function(){
		var tooltips = gantt.ext.tooltips;
		tooltips.tooltip.setViewport(gantt.$task_data);
	});
    gantt.init("gantt_container");
    gantt.parse(GANTT_DATA_DHTMLX);

    // Hide the export to CSV button if there is no CSV data
    if (GANTT_DATA_CSV === null) {
        document.getElementById('exportToCSVButton').style.display = 'none';
    }

    document.getElementById('zoomFitButton').addEventListener('click', zoomFit);
    document.getElementById('zoomInButton').addEventListener('click', zoomIn);
    document.getElementById('zoomOutButton').addEventListener('click', zoomOut);
    document.getElementById('exportToCSVButton').addEventListener('click', downloadCSV);
</script>
