<script type="module">

    const GANTT_DATA_CSV = "project_key,project_name,project_description,project_start_date,project_end_date,project_progress,project_parent,originating_department\n55cc68a7-1535-4473-b69e-b73f710d2f4f,Parasomnia Research Unit,\"Parasomnia Research Unit\n\nFinal deliverable:\nOperational Research Unit\",3/11/2026,7/26/2033,0,,PlanExe\n2a431dd8-6d4a-4cab-8ce4-43fa90790bce,Project Initiation & Planning,,3/11/2026,1/7/2027,0,55cc68a7-1535-4473-b69e-b73f710d2f4f,PlanExe\nd37cdee1-a0c9-42a3-8d3d-d564453a91f5,Secure Funding,,3/11/2026,9/7/2026,0,2a431dd8-6d4a-4cab-8ce4-43fa90790bce,PlanExe\n96f161ff-a122-4f24-b263-a9c2337dd72a,Prepare DFG grant proposal,\"Prepare DFG grant proposal\n\nDescription:\nObjective: Develop a comprehensive and competitive grant proposal for the Deutsche Forschungsgemeinschaft (DFG). Scope: Include all necessary sections, such as project description, methodology, budget, and team qualifications. Steps: 1. Review DFG guidelines. 2. Draft proposal sections. 3. Obtain internal reviews. 4. Finalize and submit. Deliverables: Complete DFG grant proposal.\n\nResources needed:\n\u2022 Principal Investigator\n\u2022 Postdoctoral Researchers\n\u2022 Grant Writer\",3/11/2026,4/25/2026,0,d37cdee1-a0c9-42a3-8d3d-d564453a91f5,PlanExe\nb9635e60-123e-46c8-9707-bca09be96c28,Secure University of Bonn internal funding,\"Secure University of Bonn internal funding\n\nDescription:\nObjective: Obtain internal research funding from the University of Bonn. Scope: Prepare application materials, present project to relevant committees, and secure funding approval. Steps: 1. Identify internal funding opportunities. 2. Prepare application. 3. Present to committee. 4. Secure approval. Deliverables: Approved internal funding application.\n\nResources needed:\n\u2022 Principal Investigator\n\u2022 Department Head\n\u2022 Research Administrator\",4/25/2026,6/9/2026,0,96f161ff-a122-4f24-b263-a9c2337dd72a,PlanExe\n24d75bb3-1221-4156-b648-ae58e6468cfc,Develop budget justification,\"Develop budget justification\n\nDescription:\nObjective: Create a detailed and justified budget for the research unit. Scope: Include all anticipated expenses, such as personnel, equipment, supplies, and travel. Steps: 1. Estimate costs for each category. 2. Prepare budget justification document. 3. Obtain internal review. 4. Finalize budget. Deliverables: Complete budget justification.\n\nResources needed:\n\u2022 Principal Investigator\n\u2022 Research Administrator\n\u2022 Accountant\",6/9/2026,7/24/2026,0,b9635e60-123e-46c8-9707-bca09be96c28,PlanExe\n43cb8cd3-f536-4ee5-aa75-45061700e89d,Explore alternative funding sources,\"Explore alternative funding sources\n\nDescription:\nObjective: Identify and explore alternative funding sources in case of delays or insufficient funding from primary sources. Scope: Research potential funding opportunities from foundations, industry partners, and other government agencies. Steps: 1. Research funding opportunities. 2. Assess eligibility. 3. Prepare preliminary applications. Deliverables: List of potential alternative funding sources.\n\nResources needed:\n\u2022 Principal Investigator\n\u2022 Grant Writer\n\u2022 Research Administrator\",7/24/2026,9/7/2026,0,d37cdee1-a0c9-42a3-8d3d-d564453a91f5,PlanExe\n6f880b91-0159-4884-b044-bd94960ebcdf,Obtain Ethics Approval,,9/7/2026,11/6/2026,0,d37cdee1-a0c9-42a3-8d3d-d564453a91f5,PlanExe\n3e92d961-64fe-4834-b0a7-194b22fc36ca,Prepare ethics application documents,\"Prepare ethics application documents\n\nDescription:\nGather all necessary documents, including the study protocol, consent forms, and data management plan, for submission to the Ethics Committee.\n\nResources needed:\n\u2022 Principal Investigator\n\u2022 Study Coordinator\n\u2022 Postdoctoral Researchers\",9/7/2026,9/22/2026,0,6f880b91-0159-4884-b044-bd94960ebcdf,PlanExe\n44fa6cc4-93e1-4c8d-bb62-bac75cdef09b,Submit ethics application to committee,\"Submit ethics application to committee\n\nDescription:\nFormally submit the prepared ethics application to the Ethics Committee of the University of Bonn.\n\nResources needed:\n\u2022 Study Coordinator\",9/22/2026,10/7/2026,0,3e92d961-64fe-4834-b0a7-194b22fc36ca,PlanExe\na8b53d8c-13d0-418b-985c-bda623c84695,Address committee feedback and revisions,\"Address committee feedback and revisions\n\nDescription:\nRespond to any feedback or requests for revisions from the Ethics Committee and resubmit the application as needed.\n\nResources needed:\n\u2022 Principal Investigator\n\u2022 Study Coordinator\n\u2022 Postdoctoral Researchers\",10/7/2026,10/22/2026,0,44fa6cc4-93e1-4c8d-bb62-bac75cdef09b,PlanExe\nd3effc45-93e5-4039-b2a0-60e3943ada60,Obtain final ethics approval,\"Obtain final ethics approval\n\nDescription:\nSecure the final approval from the Ethics Committee, ensuring all requirements are met and documented.\n\nResources needed:\n\u2022 Study Coordinator\",10/22/2026,11/6/2026,0,6f880b91-0159-4884-b044-bd94960ebcdf,PlanExe\ncaaea1ff-0fe9-4917-9475-20d6c494f497,Define Recruitment Channel Strategy,,11/6/2026,11/18/2026,0,6f880b91-0159-4884-b044-bd94960ebcdf,PlanExe\ne0176048-5bc5-4f6f-8b8d-938d30d165df,Identify Potential Recruitment Channels,\"Identify Potential Recruitment Channels\n\nDescription:\nObjective: Identify a diverse range of potential recruitment channels for the parasomnia study.\nScope: This includes online platforms, partnerships with medical professionals, and community outreach programs.\nSteps: Research potential channels, assess their suitability, and prioritize based on reach and cost-effectiveness.\nDeliverables: A list of prioritized recruitment channels with contact information and estimated reach.\n\nResources needed:\n\u2022 Study Coordinator\n\u2022 Principal Investigator\n\u2022 Research Technicians\",11/6/2026,11/9/2026,0,caaea1ff-0fe9-4917-9475-20d6c494f497,PlanExe\nf85072c8-99c9-4c12-911f-1b894f62725d,Assess Channel Suitability and Feasibility,\"Assess Channel Suitability and Feasibility\n\nDescription:\nObjective: Evaluate the suitability and feasibility of each identified recruitment channel.\nScope: This includes assessing the target audience, cost-effectiveness, and potential ethical considerations.\nSteps: Conduct market research, analyze historical data, and consult with experts.\nDeliverables: A report summarizing the suitability and feasibility of each channel, including recommendations for implementation.\n\nResources needed:\n\u2022 Study Coordinator\n\u2022 Principal Investigator\n\u2022 Clinical Psychologist\",11/9/2026,11/12/2026,0,e0176048-5bc5-4f6f-8b8d-938d30d165df,PlanExe\nfaf27850-c287-4550-a712-f90d7a1ac249,Establish Formal Agreements,\"Establish Formal Agreements\n\nDescription:\nObjective: Formalize agreements with selected recruitment channels.\nScope: This includes negotiating terms, drafting contracts, and obtaining necessary approvals.\nSteps: Contact channel representatives, negotiate terms, and finalize agreements.\nDeliverables: Signed agreements with selected recruitment channels.\n\nResources needed:\n\u2022 Study Coordinator\n\u2022 Principal Investigator\n\u2022 Legal Counsel\",11/12/2026,11/15/2026,0,f85072c8-99c9-4c12-911f-1b894f62725d,PlanExe\n82ba7f47-46a3-465d-9e6e-731b3de80e74,Develop Recruitment Materials (1),\"Develop Recruitment Materials\n\nDescription:\nObjective: Create compelling recruitment materials tailored to each channel.\nScope: This includes designing advertisements, writing brochures, and developing online content.\nSteps: Develop materials, obtain feedback, and revise as needed.\nDeliverables: A set of recruitment materials for each selected channel.\n\nResources needed:\n\u2022 Study Coordinator\n\u2022 Research Technicians\n\u2022 Graphic Designer\",11/15/2026,11/18/2026,0,caaea1ff-0fe9-4917-9475-20d6c494f497,PlanExe\nb8e6771c-87eb-4ad3-8767-ab17f2117df3,Define Recruitment Stringency Strategy,,11/18/2026,11/26/2026,0,caaea1ff-0fe9-4917-9475-20d6c494f497,PlanExe\nc335e343-19b4-46d2-b8d2-9ada3adb8df8,Review Literature on Stringency Criteria,\"Review Literature on Stringency Criteria\n\nDescription:\nObjective: Conduct a comprehensive review of existing literature to identify relevant and validated stringency criteria for NREM parasomnia research.\nScope: This includes searching databases (PubMed, Scopus, Web of Science) for studies on parasomnia, sleep disorders, and related neurological conditions. The review will focus on inclusion/exclusion criteria used in previous studies, their rationale, and their impact on sample characteristics and event capture.\nSteps:\n1. Define search terms and keywords.\n2. Conduct literature search.\n3. Screen articles for relevance.\n4. Extract data on stringency criteria.\n5. Summarize findings and identify potential criteria for the current study.\nDeliverables: A summary report of the literature review, including a list of potential stringency criteria and their rationale.\n\nResources needed:\n\u2022 Principal Investigator\n\u2022 Postdoctoral Researchers\n\u2022 Literature databases\n\u2022 Reference management software\",11/18/2026,11/20/2026,0,b8e6771c-87eb-4ad3-8767-ab17f2117df3,PlanExe\n97e4a4e6-e7ea-42cc-a744-d8ca4cdd5dc7,Consult Sleep Disorder Neurologist,\"Consult Sleep Disorder Neurologist\n\nDescription:\nObjective: Obtain expert opinion from a neurologist specializing in sleep disorders to validate the proposed stringency criteria and ensure their clinical relevance.\nScope: This involves scheduling a consultation with a neurologist, presenting the proposed criteria, and discussing their potential impact on participant selection and data interpretation.\nSteps:\n1. Identify a suitable neurologist.\n2. Schedule a consultation.\n3. Prepare a presentation of the proposed criteria.\n4. Conduct the consultation.\n5. Document the neurologist's feedback and recommendations.\nDeliverables: A written summary of the neurologist's feedback and recommendations, including any suggested modifications to the stringency criteria.\n\nResources needed:\n\u2022 Principal Investigator\n\u2022 Neurologist\n\u2022 Presentation materials\",11/20/2026,11/22/2026,0,c335e343-19b4-46d2-b8d2-9ada3adb8df8,PlanExe\n9a398a37-2b43-4463-a88f-805eff72136f,Pilot Test Stringency Criteria,\"Pilot Test Stringency Criteria\n\nDescription:\nObjective: Conduct a pilot test of the proposed stringency criteria to assess their feasibility and impact on participant recruitment and event capture.\nScope: This involves applying the criteria to a small sample of potential participants and evaluating the number of eligible participants, the characteristics of the recruited sample, and the number of parasomnia events captured.\nSteps:\n1. Recruit a small sample of potential participants.\n2. Apply the stringency criteria.\n3. Assess the number of eligible participants.\n4. Collect data on participant characteristics and event capture.\n5. Analyze the data and evaluate the impact of the criteria.\nDeliverables: A report summarizing the results of the pilot test, including the number of eligible participants, the characteristics of the recruited sample, and the number of parasomnia events captured.\n\nResources needed:\n\u2022 Study Coordinator\n\u2022 Research Technicians\n\u2022 Potential participants\n\u2022 Data collection equipment\",11/22/2026,11/24/2026,0,97e4a4e6-e7ea-42cc-a744-d8ca4cdd5dc7,PlanExe\nca7389de-8206-49dc-a55e-73b1a5a75a97,Refine Criteria Based on Pilot Data,\"Refine Criteria Based on Pilot Data\n\nDescription:\nObjective: Refine the stringency criteria based on the results of the pilot test and the neurologist's feedback.\nScope: This involves analyzing the pilot test data, considering the neurologist's recommendations, and making any necessary adjustments to the criteria to optimize participant recruitment and event capture.\nSteps:\n1. Analyze the pilot test data.\n2. Review the neurologist's feedback.\n3. Identify potential modifications to the criteria.\n4. Discuss the proposed modifications with the research team.\n5. Finalize the refined stringency criteria.\nDeliverables: A final version of the stringency criteria, incorporating the results of the pilot test and the neurologist's feedback.\n\nResources needed:\n\u2022 Principal Investigator\n\u2022 Postdoctoral Researchers\n\u2022 Pilot test data\n\u2022 Neurologist's feedback\",11/24/2026,11/26/2026,0,b8e6771c-87eb-4ad3-8767-ab17f2117df3,PlanExe\n8aafc70a-56e5-4684-aa51-d6402d1df8e1,Define Data Acquisition Intensity Strategy,,11/26/2026,12/1/2026,0,b8e6771c-87eb-4ad3-8767-ab17f2117df3,PlanExe\n7c8befaf-e7b7-423b-96ff-e221f2e4ac49,Define EEG montage and sensor placement,\"Define EEG montage and sensor placement\n\nDescription:\nDetermine the optimal EEG montage and sensor placement strategy to maximize signal quality and minimize artifacts. This includes selecting appropriate electrode locations, considering head size and shape variations, and establishing standardized procedures for sensor application.\n\nResources needed:\n\u2022 Sleep Technologist\n\u2022 Neurologist\n\u2022 EEG equipment\n\u2022 EEG software\",11/26/2026,11/27/2026,0,8aafc70a-56e5-4684-aa51-d6402d1df8e1,PlanExe\n885f94b1-ad50-4570-86e4-d22b0c44d06b,Establish PSG data acquisition parameters,\"Establish PSG data acquisition parameters\n\nDescription:\nDefine the parameters for polysomnography (PSG) data acquisition, including sampling rates, filter settings, and impedance thresholds. This involves optimizing the settings for each channel (EEG, EOG, EMG, ECG, respiratory sensors, etc.) to ensure accurate and reliable data collection.\n\nResources needed:\n\u2022 Sleep Technologist\n\u2022 PSG equipment\n\u2022 PSG software\",11/27/2026,11/28/2026,0,7c8befaf-e7b7-423b-96ff-e221f2e4ac49,PlanExe\n8e6a11d8-4501-4136-ba5c-61a6d0017a93,Develop data quality control procedures,\"Develop data quality control procedures\n\nDescription:\nEstablish procedures for monitoring and ensuring the quality of acquired data. This includes implementing real-time artifact detection, developing protocols for addressing data quality issues, and establishing criteria for data rejection or re-acquisition.\n\nResources needed:\n\u2022 Data Engineer\n\u2022 Sleep Technologist\n\u2022 PSG equipment\n\u2022 EEG equipment\n\u2022 Data analysis software\",11/28/2026,11/29/2026,0,885f94b1-ad50-4570-86e4-d22b0c44d06b,PlanExe\ne0ba4998-c102-4a68-b82e-c458872987d3,Pilot test data acquisition protocols,\"Pilot test data acquisition protocols\n\nDescription:\nConduct pilot studies to evaluate the effectiveness and feasibility of the data acquisition protocols. This involves collecting data from a small number of participants, analyzing the data quality, and refining the protocols based on the results.\n\nResources needed:\n\u2022 Sleep Technologist\n\u2022 Research Participants\n\u2022 PSG equipment\n\u2022 EEG equipment\n\u2022 Data analysis software\",11/29/2026,11/30/2026,0,8e6a11d8-4501-4136-ba5c-61a6d0017a93,PlanExe\n2b74964a-8c3f-404b-b031-d49c3477cb6d,Document data acquisition procedures,\"Document data acquisition procedures\n\nDescription:\nCreate detailed documentation of the data acquisition procedures, including step-by-step instructions, troubleshooting guides, and quality control checklists. This documentation will serve as a reference for research staff and ensure consistency in data collection across participants and time points.\n\nResources needed:\n\u2022 Study Coordinator\n\u2022 Sleep Technologist\n\u2022 Technical Writer\",11/30/2026,12/1/2026,0,8aafc70a-56e5-4684-aa51-d6402d1df8e1,PlanExe\ne1057570-6988-47c1-bc80-83424331f95c,Define Staffing Coverage Model,,12/1/2026,12/13/2026,0,8aafc70a-56e5-4684-aa51-d6402d1df8e1,PlanExe\n99587c7c-08ff-480f-99df-7b14f88f26bc,Analyze workload based on participant projections,\"Analyze workload based on participant projections\n\nDescription:\nObjective: Determine the required staffing levels based on the projected number of participants and the data collection activities involved.\nScope: This includes analyzing the time required for each data collection session, data annotation, and participant management.\nSteps: 1. Estimate the time required for each data collection activity. 2. Project the number of participants enrolled per month. 3. Calculate the total workload in hours per month. 4. Determine the number of staff required to meet the workload demands.\nDeliverables: A detailed workload analysis report with staffing recommendations.\n\nResources needed:\n\u2022 Principal Investigator\n\u2022 Study Coordinator\n\u2022 Data Engineer\",12/1/2026,12/4/2026,0,e1057570-6988-47c1-bc80-83424331f95c,PlanExe\nbd265eae-8b4e-4d24-8d8d-b6004fd5b34c,Develop flexible staffing model,\"Develop flexible staffing model\n\nDescription:\nObjective: Create a staffing model that can be adjusted based on actual recruitment rates and data volume.\nScope: This includes defining different staffing scenarios and identifying triggers for adjusting staffing levels.\nSteps: 1. Define different staffing scenarios based on recruitment rates. 2. Identify triggers for adjusting staffing levels (e.g., number of participants enrolled, data volume). 3. Develop a plan for onboarding and offboarding staff as needed.\nDeliverables: A flexible staffing model document with defined scenarios and adjustment triggers.\n\nResources needed:\n\u2022 Principal Investigator\n\u2022 Study Coordinator\n\u2022 HR representative\",12/4/2026,12/7/2026,0,99587c7c-08ff-480f-99df-7b14f88f26bc,PlanExe\n52d9268f-0f28-470d-ae79-66d12a95b40a,Consult sleep research staffing experts,\"Consult sleep research staffing experts\n\nDescription:\nObjective: Obtain expert advice on optimal staffing levels and best practices for managing research staff.\nScope: This includes identifying and engaging with external consultants who have experience in sleep research staffing.\nSteps: 1. Identify potential consultants. 2. Contact consultants and schedule consultations. 3. Obtain recommendations on staffing levels and best practices.\nDeliverables: A consultant report with recommendations on staffing levels and best practices.\n\nResources needed:\n\u2022 Principal Investigator\n\u2022 Study Coordinator\",12/7/2026,12/10/2026,0,bd265eae-8b4e-4d24-8d8d-b6004fd5b34c,PlanExe\n7e8179cd-a530-4a84-9767-e84556f6207d,Document staffing coverage model,\"Document staffing coverage model\n\nDescription:\nObjective: Create a comprehensive document outlining the staffing coverage model, including roles, responsibilities, and coverage schedules.\nScope: This includes defining the roles and responsibilities of each staff member, creating coverage schedules, and documenting procedures for handling staff absences.\nSteps: 1. Define the roles and responsibilities of each staff member. 2. Create coverage schedules for each role. 3. Document procedures for handling staff absences and emergencies.\nDeliverables: A staffing coverage model document with roles, responsibilities, and coverage schedules.\n\nResources needed:\n\u2022 Principal Investigator\n\u2022 Study Coordinator\",12/10/2026,12/13/2026,0,e1057570-6988-47c1-bc80-83424331f95c,PlanExe\n622a3cd3-15d1-4498-8d4d-efbeb4dfa0e2,Define Risk Mitigation Protocol,,12/13/2026,12/23/2026,0,e1057570-6988-47c1-bc80-83424331f95c,PlanExe\n4a53ebb8-d324-4765-8f8d-405b679289e5,Identify potential risks,\"Identify potential risks\n\nDescription:\nObjective: Identify all potential risks that could impact the project.\nScope: Consider technical, financial, operational, environmental, and security risks.\nSteps: Conduct brainstorming sessions with stakeholders, review project plans and documentation, and consult with experts.\nDeliverables: A comprehensive list of potential risks.\n\nResources needed:\n\u2022 Project Manager\n\u2022 Risk Management Expert\n\u2022 Stakeholders\",12/13/2026,12/15/2026,0,622a3cd3-15d1-4498-8d4d-efbeb4dfa0e2,PlanExe\n95236961-8da8-4722-b613-271ad2ee7064,Assess risk probability and impact,\"Assess risk probability and impact\n\nDescription:\nObjective: Evaluate the likelihood and potential impact of each identified risk.\nScope: Quantify the probability and impact using a risk assessment matrix.\nSteps: Assign probability and impact scores to each risk, prioritize risks based on their overall risk score.\nDeliverables: A prioritized list of risks with probability and impact assessments.\n\nResources needed:\n\u2022 Risk Management Expert\n\u2022 Project Manager\n\u2022 Data Analyst\",12/15/2026,12/17/2026,0,4a53ebb8-d324-4765-8f8d-405b679289e5,PlanExe\nf745d353-c6b5-4c21-aade-b50448996204,Develop mitigation strategies,\"Develop mitigation strategies\n\nDescription:\nObjective: Create strategies to mitigate or eliminate the identified risks.\nScope: Develop specific actions to reduce the probability or impact of each risk.\nSteps: Brainstorm mitigation options, evaluate the feasibility and cost-effectiveness of each option, and select the most appropriate strategies.\nDeliverables: A detailed risk mitigation plan with specific actions, responsibilities, and timelines.\n\nResources needed:\n\u2022 Project Manager\n\u2022 Risk Management Expert\n\u2022 Subject Matter Experts\",12/17/2026,12/19/2026,0,95236961-8da8-4722-b613-271ad2ee7064,PlanExe\n9ed86e57-e062-4a88-b2f8-50600ffc40de,Document risk mitigation protocol,\"Document risk mitigation protocol\n\nDescription:\nObjective: Create a formal document outlining the risk mitigation protocol.\nScope: Include risk identification, assessment, mitigation strategies, and monitoring procedures.\nSteps: Compile all relevant information into a comprehensive document, review and approve the document with stakeholders.\nDeliverables: A finalized risk mitigation protocol document.\n\nResources needed:\n\u2022 Project Manager\n\u2022 Technical Writer\n\u2022 Stakeholders\",12/19/2026,12/21/2026,0,f745d353-c6b5-4c21-aade-b50448996204,PlanExe\n6f474d72-8164-40f9-9a46-f889e6f7ab49,Implement and monitor risk mitigation,\"Implement and monitor risk mitigation\n\nDescription:\nObjective: Put the risk mitigation strategies into action and track their effectiveness.\nScope: Execute the actions outlined in the risk mitigation plan, monitor risk levels, and adjust strategies as needed.\nSteps: Assign responsibilities for implementing mitigation actions, track progress against timelines, and report on risk levels.\nDeliverables: Regular reports on risk mitigation progress and effectiveness.\n\nResources needed:\n\u2022 Project Team\n\u2022 Risk Management Expert\n\u2022 Project Manager\",12/21/2026,12/23/2026,0,622a3cd3-15d1-4498-8d4d-efbeb4dfa0e2,PlanExe\n7cf0ea07-fbbf-4ed1-ac01-0706681846b4,Define Data Annotation Workflow,,12/23/2026,1/7/2027,0,2a431dd8-6d4a-4cab-8ce4-43fa90790bce,PlanExe\n986e3c4c-d579-43e8-8257-97f2cd13bd4c,Define data annotation categories,\"Define data annotation categories\n\nDescription:\nEstablish a clear and comprehensive set of categories for annotating parasomnia events, including specific criteria for each category. This will ensure consistency and accuracy in the annotation process.\n\nResources needed:\n\u2022 Sleep experts\n\u2022 Data scientists\n\u2022 Clinical psychologist\",12/23/2026,12/26/2026,0,7cf0ea07-fbbf-4ed1-ac01-0706681846b4,PlanExe\n12d90ee0-d0ed-4463-95d9-d21341302ec1,Develop annotation guidelines document,\"Develop annotation guidelines document\n\nDescription:\nCreate a detailed document outlining the annotation categories, criteria, and procedures. This document will serve as a reference for annotators and ensure consistency in their work.\n\nResources needed:\n\u2022 Sleep experts\n\u2022 Data scientists\n\u2022 Technical writer\",12/26/2026,12/29/2026,0,986e3c4c-d579-43e8-8257-97f2cd13bd4c,PlanExe\n1e18641c-e88c-481f-a728-fdf91332fd3e,Pilot test annotation workflow,\"Pilot test annotation workflow\n\nDescription:\nConduct a pilot test of the annotation workflow with a small subset of data to identify any issues or areas for improvement. This will help to refine the workflow and ensure its effectiveness.\n\nResources needed:\n\u2022 Annotators\n\u2022 Data scientists\n\u2022 Sleep experts\",12/29/2026,1/1/2027,0,12d90ee0-d0ed-4463-95d9-d21341302ec1,PlanExe\nccce86f3-1f46-4488-bf1a-96977ab3f9fa,Refine guidelines based on pilot test,\"Refine guidelines based on pilot test\n\nDescription:\nBased on the results of the pilot test, revise the annotation guidelines and workflow to address any identified issues or areas for improvement. This will ensure that the final workflow is as effective and efficient as possible.\n\nResources needed:\n\u2022 Sleep experts\n\u2022 Data scientists\n\u2022 Annotators\",1/1/2027,1/4/2027,0,1e18641c-e88c-481f-a728-fdf91332fd3e,PlanExe\n1ce2c1cd-4f05-433e-85bf-eee3e6a49966,Train annotators on workflow,\"Train annotators on workflow\n\nDescription:\nProvide comprehensive training to annotators on the established workflow and guidelines. This will ensure that they are fully equipped to perform their tasks accurately and consistently.\n\nResources needed:\n\u2022 Sleep experts\n\u2022 Data scientists\n\u2022 Training materials\",1/4/2027,1/7/2027,0,7cf0ea07-fbbf-4ed1-ac01-0706681846b4,PlanExe\n53f3aab8-5ca4-4f33-b54c-f32986ab02f1,Facility Acquisition & Setup,,1/7/2027,2/20/2028,0,2a431dd8-6d4a-4cab-8ce4-43fa90790bce,PlanExe\n2abbc96d-d07f-45f5-84a2-5399fb0f01dc,Acquire Residential Property,,1/7/2027,7/6/2027,0,53f3aab8-5ca4-4f33-b54c-f32986ab02f1,PlanExe\n49f9c940-3b98-44e0-862d-bf531ba0d5fc,Conduct thorough property inspection,\"Conduct thorough property inspection\n\nDescription:\nObjective: Identify potential structural issues before purchase.\nScope: Engage a qualified inspector to assess the property's condition.\nSteps: Schedule inspection, review report, address concerns.\nDeliverables: Inspection report, list of necessary repairs.\n\nResources needed:\n\u2022 Licensed property inspector\n\u2022 Inspection equipment\n\u2022 Property access\",1/7/2027,2/21/2027,0,2abbc96d-d07f-45f5-84a2-5399fb0f01dc,PlanExe\n00566072-8a38-432 yout plan for the equipment within the renovated property, ensuring optimal workflow and safety. This includes specifying the placement of PSG, EEG, video monitoring, and other sensors. Deliverable: Approved equipment layout diagram.\n\nResources needed:\n\u2022 Architect\n\u2022 Sleep Technologist\n\u2022 Principal Investigator\",7/6/2027,7/29/2027,0,636a8c42-e427-4cee-b3a7-be90edb270e4,PlanExe\ne71126c0-0602-49e0-b80d-1bab84ecc6f6,Prepare Site for Equipment Installation,\"Prepare Site for Equipment Installation\n\nDescription:\nEnsure the renovated property is ready for equipment installation. This includes verifying electrical wiring, network connectivity, and environmental controls (temperature, humidity, lighting). Deliverable: Site readiness checklist.\n\nResources needed:\n\u2022 Electrician\n\u2022 IT Technician\n\u2022 Contractor\",7/29/2027,8/21/2027,0,f8463012-fd32-45ca-ba7c-c801c02ac7e1,PlanExe\na3b22722-4b42-4e09-aa0c-a5f31c6bd076,Calibrate and Test Equipment (1),\"Calibrate and Test Equipment\n\nDescription:\nCalibrate all equipment according to manufacturer specifications and conduct thorough testing to ensure proper functionality. This includes PSG, EEG, video monitoring, and environmental sensors. Deliverable: Calibration and testing reports.\n\nResources needed:\n\u2022 Sleep Technologist\n\u2022 Data Engineer\n\u2022 Equipment Vendor\",8/21/2027,9/13/2027,0,e71126c0-0602-49e0-b80d-1bab84ecc6f6,PlanExe\n63e83bde-db0b-4e6f-b2cc-ec6015310b10,Integrate Equipment with IT Infrastructure (1),\"Integrate Equipment with IT Infrastructure\n\nDescription:\nConnect all equipment to the local NAS and data analysis software. Configure data acquisition and storage protocols. Deliverable: Integrated equipment and IT system.\n\nResources needed:\n\u2022 Data Engineer\n\u2022 IT Technician\n\u2022 Sleep Technologist\",9/13/2027,10/6/2027,0,636a8c42-e427-4cee-b3a7-be90edb270e4,PlanExe\n3a94ad85-195a-4c7f-9377-d62174a84480,Procure Equipment,,10/6/2027,12/5/2027,0,636 hantoms or simulated data. 3. Document calibration results.\nDeliverables: Calibration reports for each piece of equipment.\n\nResources needed:\n\u2022 Research Technicians\n\u2022 Calibration Tools\n\u2022 Testing Phantoms\",12/13/2027,12/21/2027,0,84ab5aac-7695-488c-b048-985c0cb89d24,PlanExe\nee9c0cbc-d8ca-4c1e-96e9-4715bfd9059c,Configure Equipment Settings,\"Configure Equipment Settings\n\nDescription:\nObjective: Configure equipment settings according to the study protocol.\nScope: This includes PSG, EEG, video, and sensor equipment.\nSteps: 1. Define optimal settings for each device. 2. Configure software and hardware. 3. Document settings.\nDeliverables: Configuration files and documentation.\n\nResources needed:\n\u2022 Data Engineer\n\u2022 Research Technicians\n\u2022 Study Protocol\",12/21/2027,12/29/2027,0,ebbd8699-610b-43bf-b647-c75cee75b194,PlanExe\n77da9e82-a40b-4a2a-9086-95c4538264e4,Integrate Equipment with IT Infrastructure (2),\"Integrate Equipment with IT Infrastructure\n\nDescription:\nObjective: Integrate all equipment with the IT infrastructure for data storage and analysis.\nScope: This includes network connectivity, data transfer protocols, and data storage configuration.\nSteps: 1. Connect equipment to the network. 2. Configure data transfer protocols. 3. Test data transfer. 4. Configure data storage on NAS.\nDeliverables: Functional data transfer and storage system.\n\nResources needed:\n\u2022 Data Engineer\n\u2022 IT Support\n\u2022 Network Infrastructure\",12/29/2027,1/6/2028,0,3ceaf8a6-ec88-4020-a3e2-43c1c65108c1,PlanExe\n1dbd9ee9-aa70-4d6d-bbf8-34e1e98603d1,Establish IT Infrastructure,,1/6/2028,2/20/2028,0,53f3aab8-5ca4-4f33-b54c-f32986ab02f1,PlanExe\n6002e943-522d-47dc-a684-9151e483de9d,Design Network Architecture,\"Design Network Architecture\n\nDescription:\nDefine the network topology, addressing scheme, and security protocols for the research unit's IT infrastructure. This includes selecting appropriate network devices (routers, switches, firewalls) and configuring network services (DNS, DHCP).\n\nResources needed:\n\u2022 Network Engineer\n\u2022 IT Architect\",1/6/2028,1/15/2028,0,1dbd9ee9-aa70-4d6d-bbf8-34e1e98603d1,PlanExe\n2cc66004-00d6-4ed1-b8c0-a29e144c41b0,Configure Servers and Storage,\"Configure Servers and Storage\n\nDescription:\nSet up and configure the local NAS with 50TB storage capacity, including RAID configuration, user access controls, and data backup procedures. Install and configure necessary server software (e.g., database server, web server).\n\nResources needed:\n\u2022 System Administrator\n\u2022 Data Engineer\",1/15/2028,1/24/2028,0,6002e943-522d-47dc-a684-9151e483de9d,PlanExe\n694b8ce9-9b3a-4def-b575-7b08ee0fb36d,Implement Data Security Measures,\"Implement Data Security Measures\n\nDescription:\nImplement data encryption, access controls, and intrusion detection systems to protect sensitive participant data. Ensure compliance with GDPR and other relevant data privacy regulations. Conduct regular security audits and vulnerability assessments.\n\nResources needed:\n\u2022 Security Specialist\n\u2022 Data Engineer\n\u2022 Legal Counsel\",1/24/2028,2/2/2028,0,2cc66004-00d6-4ed1-b8c0-a29e144c41b0,PlanExe\na0ccf5f9-3eb3-4cb7-9231-7fc67d7dbaeb,Install and Configure Software,\"Install and Configure Software\n\nDescription:\nInstall and configure data analysis software, video-EEG monitoring software, and other necessary applications. Ensure compatibility between different software components and provide training to research staff on software usage.\n\nResources needed:\n\u2022 Software Engineer\n\u2022 Research Technicians\",2/2/2028,2/11/2028,0,694b8ce9-9b3a-4def-b575-7b08ee0fb36d,PlanExe\n3c1ba2af-c07a-4c68-88d8-52788125fd2f,Test and Validate IT Infrastructure,\"Test and Validate IT Infrastructure\n\nDescription:\nConduct thorough testing of the IT infrastructure to ensure network connectivity, server performance, data security, and software functionality. Validate that the infrastructure meets the research unit's requirements and is ready for data collection.\n\nResources needed:\n\u2022 Network Engineer\n\u2022 System Administrator\n\u2022 Software Engineer\n\u2022 Research Technicians\",2/11/2028,2/20/2028,0,1dbd9ee9-aa70-4d6d-bbf8-34e1e98603d1,PlanExe\ne7d59ffb-5ad5-4e73-b241-0a241db1c2e8,Staff Recruitment & Training,,2/20/2028,5/30/2028,0,53f3aab8-5ca4-4f33-b54c-f32986ab02f1,PlanExe\nd5b0c4bd-c877-4d4c-9b02-ffcc9ddda69e,Recruit Research Staff,,2/20/2028,4/20/2028,0,e7d59ffb-5ad5-4e73-b241-0a241db1c2e8,PlanExe\nd52f318e-36e5-4ef5-b253-fd8835bd0820,Draft Job Descriptions,\"Draft Job Descriptions\n\nDescription:\nCreate detailed job descriptions for each research staff position, outlining responsibilities, qualifications, and required skills. This includes technicians, postdocs, and the study coordinator.\n\nResources needed:\n\u2022 Principal Investigator\n\u2022 Human Resources\n\u2022 Senior Researchers\",2/20/2028,3/3/2028,0,d5b0c4bd-c877-4d4c-9b02-ffcc9ddda69e,PlanExe\n62e6bf7b-3793-45e3-b283-0a1675d054d1,Post Job Openings,\"Post Job Openings\n\nDescription:\nAdvertise the job openings on relevant online platforms, professional networks, and university job boards to attract a diverse pool of qualified candidates.\n\nResources needed:\n\u2022 Study Coordinator\n\u2022 Human Resources\n\u2022 Online Job Boards\",3/3/2028,3/15/2028,0,d52f318e-36e5-4ef5-b253-fd8835bd0820,PlanExe\nebac3ad0-be63-46a2-be17-a6253be73056,Screen Applications,\"Screen Applications\n\nDescription:\nReview all applications received and shortlist candidates who meet the minimum qualifications and possess the desired skills and experience.\n\nResources needed:\n\u2022 Principal Investigator\n\u2022 Senior Researchers\n\u2022 Study Coordinator\",3/15/2028,3/27/2028,0,62e6bf7b-3793-45e3-b283-0a1675d054d1,PlanExe\n5f3248eb-fd2a-4b74-b7b7-c935325431f2,Conduct Interviews,\"Conduct Interviews\n\nDescription:\nConduct interviews with shortlisted candidates to assess their suitability for the positions, evaluate their research experience, and determine their fit within the research team.\n\nResources needed:\n\u2022 Principal Investigator\n\u2022 Senior Researchers\n\u2022 Clinical Psychologist\",3/27/2028,4/8/2028,0,ebac3ad0-be63-46a2-be17-a6253be73056,PlanExe\n7d4f7e19-0ac5-4802-8bec-3e664ec97b11,Onboard New Hires,\"Onboard New Hires\n\nDescription:\nComplete the onboarding process for selected candidates, including background checks, paperwork, and introductions to the research team and facilities.\n\nResources needed:\n\u2022 Human Resources\n\u2022 Study Coordinator\n\u2022 Principal Investigator\",4/8/2028,4/20/2028,0,d5b0c4bd-c877-4d4c-9b02-ffcc9ddda69e,PlanExe\n6a49957b-1f74-493b-90c1-b666fe837dcf,Train Research Staff,,4/20/2028,5/14/2028,0,d5b0c4bd-c877-4d4c-9b02-ffcc9ddda69e,PlanExe\n8c071756-0271-4ab5-9def-c3c54bf9a758,Develop PSG scoring training module,\"Develop PSG scoring training module\n\nDescription:\nCreate a comprehensive training module on polysomnography (PSG) scoring, covering AASM guidelines and specific considerations for NREM parasomnias. This includes creating video examples, practice datasets, and quizzes to assess understanding.\n\nResources needed:\n\u2022 Sleep Technologist\n\u2022 Clinical Psychologist\n\u2022 Training Software\n\u2022 PSG Data\",4/20/2028,4/26/2028,0,6a49957b-1f74-493b-90c1-b666fe837dcf,PlanExe\n99acb767-f370-4236-b74b-cf9c06b8dc3f,Create EEG artifact recognition training,\"Create EEG artifact recognition training\n\nDescription:\nDevelop a training program focused on identifying and mitigating EEG artifacts, including muscle artifact, eye movement artifact, and electrode artifact. This will involve creating visual aids, interactive exercises, and real-world examples.\n\nResources needed:\n\u2022 EEG Technician\n\u2022 Data Engineer\n\u2022 Neurologist\n\u2022 EEG Data\",4/26/2028,5/2/2028,0,8c071756-0271-4ab5-9def-c3c54bf9a758,PlanExe\nf08b431a-1e00-41c7-b23c-d12dfa110333,Establish inter-rater reliability protocol,\"Establish inter-rater reliability protocol\n\nDescription:\nDefine a standardized protocol for assessing and maintaining inter-rater reliability in event scoring. This includes establishing clear scoring criteria, implementing a dual-rater system, and conducting regular reliability checks.\n\nResources needed:\n\u2022 Principal Investigator\n\u2022 Postdoctoral Researchers\n\u2022 Statistical Software\",5/2/2028,5/8/2028,0,99acb767-f370-4236-b74b-cf9c06b8dc3f,PlanExe\n1b25e981-2cbd-40d0-92a4-90bf4ef40c46,Train staff on data privacy compliance,\"Train staff on data privacy compliance\n\nDescription:\nConduct training on data privacy regulations, including GDPR, and implement data encryption and access controls. This will involve creating training materials, conducting workshops, and establishing clear data handling procedures.\n\nResources needed:\n\u2022 Data Protection Officer\n\u2022 Legal Counsel\n\u2022 IT Specialist\",5/8/2028,5/14/2028,0,6a49957b-1f74-493b-90c1-b666fe837dcf,PlanExe\n09180a31-492d-4b59-8c22-68854e5c223b,Develop Training Materials,,5/14/2028,5/30/2028,0,e7d59ffb-5ad5-4e73-b241-0a241db1c2e8,PlanExe\nca5a4d8b-a0b2-413a-8cb5-463655b2749a,Outline Training Modules,\"Outline Training Modules\n\nDescription:\nDefine the scope and objectives of each training module, including key learning outcomes and assessment methods. This involves identifying the specific skills and knowledge required for research staff to effectively perform their duties related to parasomnia research.\n\nResources needed:\n\u2022 Principal Investigator\n\u2022 Postdoctoral Researchers\n\u2022 Clinical Psychologist\",5/14/2028,5/18/2028,0,09180a31-492d-4b59-8c22-68854e5c223b,PlanExe\n8e66dfc7-623f-4e5a-8114-5241e6c96b5c,Develop Module Content,\"Develop Module Content\n\nDescription:\nCreate detailed training materials for each module, including presentations, handouts, videos, and interactive exercises. Ensure the content is accurate, up-to-date, and aligned with the latest research findings and best practices in sleep research.\n\nResources needed:\n\u2022 Postdoctoral Researchers\n\u2022 Research Technicians\n\u2022 Data Engineer\",5/18/2028,5/22/2028,0,ca5a4d8b-a0b2-413a-8cb5-463655b2749a,PlanExe\nbda5682c-664a-463d-9ab2-5b66fdfcb410,Design Hands-On Exercises,\"Design Hands-On Exercises\n\nDescription:\nDevelop practical exercises and simulations that allow research staff to apply their newly acquired knowledge and skills in a realistic setting. This may include mock data analysis scenarios, equipment operation simulations, and role-playing exercises for participant interaction.\n\nResources needed:\n\u2022 Research Technicians\n\u2022 Clinical Psychologist\n\u2022 Study Coordinator\",5/22/2028,5/26/2028,0,8e66dfc7-623f-4e5a-8114-5241e6c96b5c,PlanExe\n5e7bc638-dc48-4b96-8974-b9c7ef1e5576,Create Assessment Tools,\"Create Assessment Tools\n\nDescription:\nDevelop assessment tools to evaluate the effectiveness of the training program and identify areas for improvement. This may include quizzes, exams, performance evaluations, and feedback surveys.\n\nResources needed:\n\u2022 Principal Investigator\n\u2022 Study Coordinator\n\u2022 Data Engineer\",5/26/2028,5/30/2028,0,09180a31-492d-4b59-8c22-68854e5c223b,PlanExe\nb0ab152e-4780-4caa-9aab-bcefad365ee8,Participant Recruitment & Data Collection,,5/30/2028,2/6/2032,0,e7d59ffb-5ad5-4e73-b241-0a241db1c2e8,PlanExe\nc0e342d5-5f2a-456a-807c-3a51135107a0,Establish Recruitment Channels,,5/30/2028,7/29/2028,0,b0ab152e-4780-4caa-9aab-bcefad365ee8,PlanExe\na397132b-bc22-42a7-9b80-be2791d3add8,Identify Potential Referral Sources,\"Identify Potential Referral Sources\n\nDescription:\nObjective: Identify and list potential referral sources for participant recruitment.\nScope: Includes sleep clinics, neurology practices, general practitioners, and online communities.\nSteps: Research local and regional healthcare providers, compile contact information, and assess their suitability as referral partners.\nDeliverables: A comprehensive list of potential referral sources with contact details and preliminary assessment.\n\nResources needed:\n\u2022 Study Coordinator\n\u2022 Research Assistant\",5/30/2028,6/14/2028,0,c0e342d5-5f2a-456a-807c-3a51135107a0,PlanExe\ndd10d9ed-157f-42f6-b741-b7758ef7ed84,Develop Recruitment Materials (2),\"Develop Recruitment Materials\n\nDescription:\nObjective: Create compelling and informative recruitment materials.\nScope: Includes brochures, flyers, website content, and social media posts.\nSteps: Design visually appealing materials, write clear and concise text, and ensure compliance with ethical guidelines.\nDeliverables: A suite of recruitment materials ready for distribution.\n\nResources needed:\n\u2022 Study Coordinator\n\u2022 Graphic Designer\n\u2022 Principal Investigator\",6/14/2028,6/29/2028,0,a397132b-bc22-42a7-9b80-be2791d3add8,PlanExe\n52ad8a2d-eba2-47cf-994b-b60cd7c215c8,Establish Agreements with Referral Sources,\"Establish Agreements with Referral Sources\n\nDescription:\nObjective: Formalize partnerships with key referral sources.\nScope: Includes negotiating referral agreements, outlining responsibilities, and establishing communication protocols.\nSteps: Contact potential referral sources, present the study, negotiate terms, and finalize agreements.\nDeliverables: Signed referral agreements with key partners.\n\nResources needed:\n\u2022 Study Coordinator\n\u2022 Principal Investigator\n\u2022 Legal Counsel (if needed)\",6/29/2028,7/14/2028,0,dd10d9ed-157f-42f6-b741-b7758ef7ed84,PlanExe\n004abf74-6edb-48a0-99e8-d11349ef30b9,Create Online Recruitment Platform,\"Create Online Recruitment Platform\n\nDescription:\nObjective: Develop a user-friendly online platform for recruitment.\nScope: Includes website, online surveys, and social media presence.\nSteps: Design and build the platform, create engaging content, and ensure data security.\nDeliverables: A fully functional online recruitment platform.\n\nResources needed:\n\u2022 Data Engineer\n\u2022 Web Developer\n\u2022 Study Coordinator\",7/14/2028,7/29/2028,0,c0e342d5-5f2a-456a-807c-3a51135107a0,PlanExe\n2b517788-ec1d-4ad0-bb94-8270186d54b9,Recruit Participants,,7/29/2028,1/25/2029,0,c0e342d5-5f2a-456a-807c-3a51135107a0,PlanExe\ne8220c26-86be-432d-a24d-19ed77dd0b61,Develop recruitment materials (3),\"Develop recruitment materials\n\nDescription:\nObjective: Create compelling recruitment materials to attract potential participants.\nScope: Design flyers, brochures, website content, and social media posts.\nSteps: 1. Draft content. 2. Design visuals. 3. Obtain ethics approval. 4. Print/publish materials.\nDeliverables: Approved recruitment materials.\n\nResources needed:\n\u2022 Study Coordinator\n\u2022 Graphic Designer\n\u2022 Ethics Committee\",7/29/2028,9/3/2028,0,2b517788-ec1d-4ad0-bb94-8270186d54b9,PlanExe\nb76d2560-8614-4acb-b06d-feb58a774fd4,Engage with referral sources,\"Engage with referral sources\n\nDescription:\nObjective: Establish relationships with neurologists and sleep clinics for participant referrals.\nScope: Contact potential referral sources and present the study.\nSteps: 1. Identify potential referral sources. 2. Prepare presentation materials. 3. Schedule meetings. 4. Follow up with referral sources.\nDeliverables: List of engaged referral sources.\n\nResources needed:\n\u2022 Principal Investigator\n\u2022 Study Coordinator\",9/3/2028,10/9/2028,0,e8220c26-86be-432d-a24d-19ed77dd0b61,PlanExe\ndd68ac84-acec-4f2b-a19d-6609eadb2f80,Implement online advertising campaign,\"Implement online advertising campaign\n\nDescription:\nObjective: Utilize online platforms to reach potential participants.\nScope: Design and launch targeted online advertisements.\nSteps: 1. Identify target demographics. 2. Create ad content. 3. Launch campaign on relevant platforms. 4. Monitor ad performance.\nDeliverables: Active online advertising campaign.\n\nResources needed:\n\u2022 Data Engineer\n\u2022 Study Coordinator\",10/9/2028,11/14/2028,0,b76d2560-8614-4acb-b06d-feb58a774fd4,PlanExe\n9d1efe01-7b98-479f-8647-e4d63909e7d4,Conduct community outreach events,\"Conduct community outreach events\n\nDescription:\nObjective: Raise awareness about the study within the local community.\nScope: Organize and host community events to recruit participants.\nSteps: 1. Identify suitable event locations. 2. Plan event activities. 3. Promote the event. 4. Host the event.\nDeliverables: Completed community outreach events.\n\nResources needed:\n\u2022 Study Coordinator\n\u2022 Research Technicians\",11/14/2028,12/20/2028,0,dd68ac84-acec-4f2b-a19d-6609eadb2f80,PlanExe\nb7da1041-9251-4b28-8684-9fe5c362bdfe,Screen potential participants,\"Screen potential participants\n\nDescription:\nObjective: Assess eligibility of potential participants based on inclusion/exclusion criteria.\nScope: Conduct initial screening interviews and administer questionnaires.\nSteps: 1. Develop screening protocol. 2. Conduct phone screenings. 3. Schedule in-person assessments. 4. Review assessment results.\nDeliverables: List of eligible participants.\n\nResources needed:\n\u2022 Clinical Psychologist\n\u2022 Study Coordinator\",12/20/2028,1/25/2029,0,2b517788-ec1d-4ad0-bb94-8270186d54b9,PlanExe\n0a0421e4-003a-4288-8c39-db411b9efc69,Collect Data,,1/25/2029,7/29/2031,0,2b517788-ec1d-4ad0-bb94-8270186d54b9,PlanExe\ndd403037-62ba-490f-aff8-6fec1505f4a5,Schedule Participant Monitoring Sessions,\"Schedule Participant Monitoring Sessions\n\nDescription:\nCoordinate with participants to schedule convenient and appropriate monitoring sessions, considering their availability and sleep patterns. This includes confirming appointments, providing pre-session instructions, and addressing any participant concerns.\n\nResources needed:\n\u2022 Study Coordinator\n\u2022 Research Technicians\n\u2022 Scheduling Software\",1/25/2029,7/27/2029,0,0a0421e4-003a-4288-8c39-db411b9efc69,PlanExe\n533ad9d7-8821-4e69-be5b-a2218ddcd8ab,Conduct Polysomnography (PSG) Recordings,\"Conduct Polysomnography (PSG) Recordings\n\nDescription:\nPerform overnight polysomnography (PSG) recordings in the residential unit, ensuring proper electrode placement, equipment calibration, and continuous monitoring throughout the night. This includes troubleshooting any technical issues that may arise during the recording.\n\nResources needed:\n\u2022 Research Technicians\n\u2022 Polysomnography Equipment\n\u2022 Emergency Medical Personnel (on call)\",7/27/2029,1/26/2030,0,dd403037-62ba-490f-aff8-6fec1505f4a5,PlanExe\na03c778c-0022-4b28-9c9b-0814c754743a,Collect Video-EEG and Sensor Data,\"Collect Video-EEG and Sensor Data\n\nDescription:\nSimultaneously collect video-EEG data, contact-free mattress sensor data, infrared camera recordings, ambient microphone recordings, and environmental sensor data during PSG sessions. Ensure proper synchronization of all data streams.\n\nResources needed:\n\u2022 Research Technicians\n\u2022 Video-EEG Monitoring Equipment\n\u2022 Dry-electrode EEG Headbands\n\u2022 Contact-free Mattress Sensors\n\u2022 Infrared Cameras\n\u2022 Ambient Microphones\n\u2022 Environmental Sensors\",1/26/2030,7/28/2030,0,533ad9d7-8821-4e69-be5b-a2218ddcd8ab,PlanExe\neab6c916-4f70-4f22-9ef4-e56cb1a46604,Store and Backup Collected Data,\"Store and Backup Collected Data\n\nDescription:\nSecurely store all collected data on the local NAS with 50TB storage capacity, implementing robust data backup procedures to prevent data loss. This includes regular data backups, data encryption, and access control measures.\n\nResources needed:\n\u2022 Data Engineer\n\u2022 Local NAS with 50TB storage capacity\n\u2022 Data Backup Software\",7/28/2030,1/27/2031,0,a03c778c-0022-4b28-9c9b-0814c754743a,PlanExe\nbb450dfd-17b7-49b2-b869-d20e6c4f8b6e,Monitor Participant Well-being During Sessions,\"Monitor Participant Well-being During Sessions\n\nDescription:\nContinuously monitor participants for any signs of distress or adverse events during monitoring sessions. Implement safety protocols to address any medical emergencies or safety concerns that may arise.\n\nResources needed:\n\u2022 Research Technicians\n\u2022 Clinical Psychologist (on call)\n\u2022 Emergency Medical Personnel (on call)\n\u2022 Safety Protocols\",1/27/2031,7/29/2031,0,0a0421e4-003a-4288-8c39-db411b9efc69,PlanExe\n26687578-5a03-4c56-9c1c-2a34d8bb8bec,Ensure Participant Safety,,7/29/2031,1/25/2032,0,0a0421e4-003a-4288-8c39-db411b9efc69,PlanExe\n4d23b988-edc2-40b5-8df2-ddf9da8345f7,Establish Emergency Response Protocol,\"Establish Emergency Response Protocol\n\nDescription:\nDevelop a detailed protocol for responding to medical emergencies or adverse events during sleep studies. This includes defining roles and responsibilities, establishing communication channels, and ensuring access to necessary medical equipment and personnel.\n\nResources needed:\n\u2022 Clinical Psychologist\n\u2022 Principal Investigator\n\u2022 Facility and Safety Manager\n\u2022 Medical Personnel\",7/29/2031,9/3/2031,0,26687578-5a03-4c56-9c1c-2a34d8bb8bec,PlanExe\nb8272ca7-e474-4b19-a20e-b0912db90efd,Implement Pre-Screening Procedures,\"Implement Pre-Screening Procedures\n\nDescription:\nConduct thorough pre-screening of participants to identify potential health risks or contraindications for sleep studies. This includes reviewing medical history, conducting physical examinations, and administering questionnaires to assess psychological well-being.\n\nResources needed:\n\u2022 Clinical Psychologist\n\u2022 Research Technicians\n\u2022 Study Coordinator\",9/3/2031,10/9/2031,0,4d23b988-edc2-40b5-8df2-ddf9da8345f7,PlanExe\n2ecf647d-661d-44a5-86cf-dabff9b8d812,Provide Participant Education,\"Provide Participant Education\n\nDescription:\nProvide detailed explanations of the study procedures, potential risks, and safety measures to participants before they enroll in the study. This includes obtaining informed consent and addressing any questions or concerns they may have.\n\nResources needed:\n\u2022 Study Coordinator\n\u2022 Principal Investigator\n\u2022 Research Technicians\",10/9/2031,11/14/2031,0,b8272ca7-e474-4b19-a20e-b0912db90efd,PlanExe\n714cd727-38e0-40b7-920b-114ff814bfe7,Monitor Participants During Sleep Studies,\"Monitor Participants During Sleep Studies\n\nDescription:\nContinuously monitor participants during sleep studies to detect any signs of distress or adverse events. This includes using video and audio monitoring equipment, as well as trained personnel to observe participants' behavior and physiological responses.\n\nResources needed:\n\u2022 Research Technicians\n\u2022 Clinical Psychologist\",11/14/2031,12/20/2031,0,2ecf647d-661d-44a5-86cf-dabff9b8d812,PlanExe\n92867f0e-47eb-46eb-a987-841ecb5ee744,Address Participant Concerns Promptly,\"Address Participant Concerns Promptly\n\nDescription:\nEstablish a system for participants to report any concerns or discomfort they may experience during sleep studies. Ensure that these concerns are addressed promptly and effectively by trained personnel.\n\nResources needed:\n\u2022 Study Coordinator\n\u2022 Research Technicians\n\u2022 Clinical Psychologist\",12/20/2031,1/25/2032,0,26687578-5a03-4c56-9c1c-2a34d8bb8bec,PlanExe\nc6183ddf-34c7-4c91-be89-10762dc1e2f0,Manage Participant Data,,1/25/2032,2/6/2032,0,b0ab152e-4780-4caa-9aab-bcefad365ee8,PlanExe\n74ace7d6-a09b-4ba3-8ad5-4e425ecd72dc,Establish Data Security Protocols,\"Establish Data Security Protocols\n\nDescription:\nObjective: Implement robust data security measures to protect participant data. Scope: Includes encryption, access controls, and regular security audits. Steps: 1. Define security requirements. 2. Implement encryption. 3. Configure access controls. 4. Schedule regular audits. Deliverables: Secure data storage and access system.\n\nResources needed:\n\u2022 Data Engineer\n\u2022 IT Security Specialist\n\u2022 Compliance Officer\",1/25/2032,1/28/2032,0,c6183ddf-34c7-4c91-be89-10762dc1e2f0,PlanExe\n7b77c6b9-4ba6-4080-8af4-9d8980580fab,Implement Data Backup and Recovery,\"Implement Data Backup and Recovery\n\nDescription:\nObjective: Ensure data integrity and availability through regular backups and a recovery plan. Scope: Includes defining backup frequency, storage location, and recovery procedures. Steps: 1. Define backup schedule. 2. Select backup storage. 3. Implement backup procedures. 4. Test recovery process. Deliverables: Functional data backup and recovery system.\n\nResources needed:\n\u2022 Data Engineer\n\u2022 IT Administrator\",1/28/2032,1/31/2032,0,74ace7d6-a09b-4ba3-8ad5-4e425ecd72dc,PlanExe\nd1f7c95d-988d-4c80-93fd-95f54d0aaee9,Ensure GDPR Compliance,\"Ensure GDPR Compliance\n\nDescription:\nObjective: Adhere to GDPR regulations for data privacy and protection. Scope: Includes obtaining consent, managing data access, and handling data breaches. Steps: 1. Obtain informed consent. 2. Implement data access controls. 3. Establish breach response plan. 4. Conduct regular compliance checks. Deliverables: GDPR-compliant data management system.\n\nResources needed:\n\u2022 Compliance Officer\n\u2022 Legal Counsel\n\u2022 Study Coordinator\",1/31/2032,2/3/2032,0,7b77c6b9-4ba6-4080-8af4-9d8980580fab,PlanExe\n2203b2b0-2a97-496e-a195-ec807cde36f8,Monitor Data Quality and Integrity,\"Monitor Data Quality and Integrity\n\nDescription:\nObjective: Continuously monitor data for errors and inconsistencies. Scope: Includes implementing data validation procedures and regular audits. Steps: 1. Define data validation rules. 2. Implement data validation procedures. 3. Conduct regular data audits. 4. Correct data errors. Deliverables: High-quality and reliable participant data.\n\nResources needed:\n\u2022 Data Engineer\n\u2022 Research Technicians\n\u2022 Data Analyst\",2/3/2032,2/6/2032,0,c6183ddf-34c7-4c91-be89-10762dc1e2f0,PlanExe\n2ae7aa36-9039-4f6d-bf57-bcb74139f286,Data Analysis & Tool Development,,2/6/2032,2/20/2033,0,b0ab152e-4780-4caa-9aab-bcefad365ee8,PlanExe\n6bb0f155-9c60-4916-ba9c-f09ffb7e731e,Annotate Data,,2/6/2032,6/5/2032,0,2ae7aa36-9039-4f6d-bf57-bcb74139f286,PlanExe\n629dc07c-3443-45d1-9827-1618e4efd8da,Develop Annotation Guidelines,\"Develop Annotation Guidelines\n\nDescription:\nCreate detailed and consistent guidelines for annotating parasomnia events in EEG and video data. This includes defining event types, scoring criteria, and examples. The objective is to ensure consistency and accuracy across all annotators.\n\nResources needed:\n\u2022 Sleep experts\n\u2022 EEG technicians\n\u2022 Clinical psychologist\n\u2022 Annotation software\",2/6/2032,3/1/2032,0,6bb0f155-9c60-4916-ba9c-f09ffb7e731e,PlanExe\n997659f4-d4e6-4926-8247-fa52c4c2caad,Train Annotators,\"Train Annotators\n\nDescription:\nConduct training sessions for all annotators to familiarize them with the annotation guidelines and software. This includes hands-on practice with sample data and feedback sessions. The goal is to achieve a high level of inter-rater reliability.\n\nResources needed:\n\u2022 Sleep experts\n\u2022 EEG technicians\n\u2022 Clinical psychologist\n\u2022 Training materials\n\u2022 Annotation software\",3/1/2032,3/25/2032,0,629dc07c-3443-45d1-9827-1618e4efd8da,PlanExe\n2701b345-a44d-4268-b190-002868e68a55,Perform Data Annotation,\"Perform Data Annotation\n\nDescription:\nAnnotate the collected EEG and video data according to the established guidelines. This involves identifying and scoring parasomnia events, marking relevant features, and documenting any uncertainties. The deliverable is a fully annotated dataset.\n\nResources needed:\n\u2022 Trained annotators\n\u2022 Annotation software\n\u2022 EEG data\n\u2022 Video data\",3/25/2032,4/18/2032,0,997659f4-d4e6-4926-8247-fa52c4c2caad,PlanExe\nbdeb6d2e-0522-4c48-bc8f-3912c5271655,Assess Inter-Rater Reliability,\"Assess Inter-Rater Reliability\n\nDescription:\nEvaluate the consistency of annotations across different annotators. This involves calculating iable. 2. Generate histograms and box plots to visualize data distributions. 3. Identify potential patterns and anomalies.\nDeliverables: Descriptive statistics report and visualizations.\n\nResources needed:\n\u2022 Data analyst\n\u2022 Statistical software (e.g., R, Python)\n\u2022 Visualization tools\",6/28/2032,7/21/2032,0,17221d5d-4aba-4dbf-997e-eb9ba32a09ea,PlanExe\nedb7e505-3071-4815-9bc1-d0620df2b032,Conduct Statistical Modeling,\"Conduct Statistical Modeling\n\nDescription:\nObjective: Identify relationships between variables and test hypotheses.\nScope: Apply appropriate statistical models to the data.\nSteps: 1. Select appropriate statistical models (e.g., regression, ANOVA). 2. Fit models to the data. 3. Evaluate model performance and significance. 4. Interpret model results.\nDeliverables: Statistical models and interpretation report.\n\nResources needed:\n\u2022 Data analyst\n\u2022 Statistician\n\u2022 Statistical software (e.g., R, Python)\",7/21/2032,8/13/2032,0,1fa4e4f8-b7d8-44fd-bd45-2b77e0e06ded,PlanExe\nd0863aa5-b0c5-421c-9e03-000344b2083e,Visualize Analysis Results,\"Visualize Analysis Results\n\nDescription:\nObjective: Create visualizations to communicate findings effectively.\nScope: Generate charts, graphs, and tables to present analysis results.\nSteps: 1. Select appropriate visualization techniques. 2. Create visualizations using statistical software or visualization tools. 3. Refine visualizations for clarity and impact. 4. Prepare presentation-ready figures.\nDeliverables: Visualizations of analysis results.\n\nResources needed:\n\u2022 Data analyst\n\u2022 Visualization tools (e.g., Tableau, ggplot2)\n\u2022 Presentation software\",8/13/2032,9/5/2032,0,f2063ce3-80b2-4be3-93a7-a8e0dffffb4d,PlanExe\ned7958b2-11fd-4c58-84ff-16deac25d00b,Develop Event-Triage Tools,,9/5/2032,1/3/2033,0,f2063ce3-80b2-4be3-93a7-a8e0dffffb4d,PlanExe\n44000901-196a-4e69-82d3-efde63aa1baf,Define Event Criteria,\"Define Event Criteria\n\nDescription:\nEstablish clear, objective criteria for identifying and classifying parasomnia events to ensure consistency and accuracy in triage.\n\nResources needed:\n\u2022 Sleep specialists\n\u2022 Neurologists\n\u2022 Data scientists\",9/5/2032,10/5/2032,0,ed7958b2-11fd-4c58-84ff-16deac25d00b,PlanExe\n8bf5b55d-35ac-4ec7-8017-fd45c1c99001,Select Algorithm,\"Select Algorithm\n\nDescription:\nEvaluate and select appropriate machine learning algorithms for event detection and triage based on performance metrics and computational efficiency.\n\nResources needed:\n\u2022 Data scientists\n\u2022 Machine learning engineers\",10/5/2032,11/4/2032,0,44000901-196a-4e69-82d3-efde63aa1baf,PlanExe\n3e3f0611-b245-44b1-9bd9-87190d28a934,Train Model,\"Train Model\n\nDescription:\nTrain the selected machine learning model using annotated data to accurately identify and classify parasomnia events.\n\nResources needed:\n\u2022 Data scientists\n\u2022 Computational resources\n\u2022 Annotated data\",11/4/2032,12/4/2032,0,8bf5b55d-35ac-4ec7-8017-fd45c1c99001,PlanExe\nc97cc6f0-6099-4665-bc86-123b3e0b8379,Integrate with System,\"Integrate with System\n\nDescription:\nIntegrate the trained event-triage tool with the existing data acquisition and analysis system for seamless operation.\n\nResources needed:\n\u2022 Software engineers\n\u2022 Data engineers\n\u2022 IT infrastructure\",12/4/2032,1/3/2033,0,ed7958b2-11fd-4c58-84ff-16deac25d00b,PlanExe\n8d511a56-ef92-4c1d-b898-068ff508d107,Benchmark Event-Triage Tools,,1/3/2033,2/20/2033,0,2ae7aa36-9039-4f6d-bf57-bcb74139f286,PlanExe\nc7bca3c1-4f03-44aa-9abe-be824e0fa2df,Define Benchmark Metrics,\"Define Benchmark Metrics\n\nDescription:\nEstablish clear and relevant metrics for evaluating the performance of the event-triage tools. This includes sensitivity, specificity, precision, and F1-score. Define acceptable performance thresholds for each metric.\n\nResources needed:\n\u2022 Data Scientist\n\u2022 Sleep Expert\n\u2022 Biostatistician\",1/3/2033,1/15/2033,0,8d511a56-ef92-4c1d-b898-068ff508d107,PlanExe\n38cf5161-2b73-4b75-b937-146e10c04bb7,Prepare Gold Standard Dataset,\"Prepare Gold Standard Dataset\n\nDescription:\nCreate a high-quality, manually annotated dataset of parasomnia events to serve as the ground truth for benchmarking. This involves selecting a representative sample of data and having it independently scored by multiple experts to ensure accuracy and reliability.\n\nResources needed:\n\u2022 Sleep Technicians\n\u2022 Sleep Experts\n\u2022 Data Storage\",1/15/2033,1/27/2033,0,c7bca3c1-4f03-44aa-9abe-be824e0fa2df,PlanExe\nc3e31f65-47c3-4c11-ac63-59854dcccecf,Run Benchmarking Experiments,\"Run Benchmarking Experiments\n\nDescription:\nExecute the event-triage tools on the gold standard dataset and record their performance according to the defined metrics. This involves configuring the tools, running them on the dataset, and collecting the results.\n\nResources needed:\n\u2022 Data Scientist\n\u2022 Computational Resources\n\u2022 Event-Triage Tools\",1/27/2033,2/8/2033,0,38cf5161-2b73-4b75-b937-146e10c04bb7,PlanExe\nc6a4988b-f439-49ef-9088-4544ab7e79f3,Analyze and Report Results,\"Analyze and Report Results\n\nDescription:\nAnalyze the benchmarking results to determine the strengths and weaknesses of the event-triage tools. Prepare a report summarizing the findings, including recommendations for improvement.\n\nResources needed:\n\u2022 Data Scientist\n\u2022 Report Writing Software\n\u2022 Sleep Expert\",2/8/2033,2/20/2033,0,8d511a56-ef92-4c1d-b898-068ff508d107,PlanExe\n059db610-6c25-4566-9480-ce7f48fd3c12,Dissemination & Reporting,,2/20/2033,7/26/2033,0,55cc68a7-1535-4473-b69e-b73f710d2f4f,PlanExe\nbb1be7ae-9007-4499-9e42-aaa9940a5b4c,Prepare Publications,,2/20/2033,3/24/2033,0,059db610-6c25-4566-9480-ce7f48fd3c12,PlanExe\n0593a797-5272-4f76-b981-1d1f04637b1b,Outline manuscript structure and content,\"Outline manuscript structure and content\n\nDescription:\nDevelop a detailed outline including sections, subsections, key arguments, and supporting evidence for each publication. This ensures a logical flow and comprehensive coverage of the research findings.\n\nResources needed:\n\u2022 Principal Investigator\n\u2022 Postdoctoral Researchers\n\u2022 Data Analysis Results\",2/20/2033,2/28/2033,0,bb1be7ae-9007-4499-9e42-aaa9940a5b4c,PlanExe\n0a77ce97-cc97-4a22-8a01-921d30aec7b4,Draft initial manuscript sections,\"Draft initial manuscript sections\n\nDescription:\nWrite the first draft of each section of the manuscript based on the outline. Focus on clarity, accuracy, and conciseness in presenting the research methods, results, and interpretations.\n\nResources needed:\n\u2022 Postdoctoral Researchers\n\u2022 Research Technicians\n\u2022 Data Analysis Results\",2/28/2033,3/8/2033,0,0593a797-5272-4f76-b981-1d1f04637b1b,PlanExe\nce687e15-ba43-4afc-ac75-ec9509e2ed2b,Review and revise manuscript drafts,\"Review and revise manuscript drafts\n\nDescription:\nConduct thorough reviews of the drafted sections, focusing on content accuracy, clarity, and consistency. Incorporate feedback from co-authors and subject matter experts to improve the overall quality of the manuscript.\n\nResources needed:\n\u2022 Principal Investigator\n\u2022 Postdoctoral Researchers\n\u2022 External Scientific Advisory Board\",3/8/2033,3/16/2033,0,0a77ce97-cc97-4a22-8a01-921d30aec7b4,PlanExe\nd37d3611-428f-4e67-b6f2-3f81ef92f548,Finalize manuscript and prepare for submission,\"Finalize manuscript and prepare for submission\n\nDescription:\nAddress all remaining comments and suggestions, ensure adherence to journal guidelines, and format the manuscript for submission. Obtain final approval from all co-authors before submitting to the target journal.\n\nResources needed:\n\u2022 Principal Investigator\n\u2022 Postdoctoral Researchers\n\u2022 Study Coordinator\",3/16/2033,3/24/2033,0,bb1be7ae-9007-4499-9e42-aaa9940a5b4c,PlanExe\n4cf6e2b2-e86d-4b9c-83bd-bed1fa418e13,Submit Publications,,3/24/2033,6/24/2033,0,bb1b       "custom_tooltip": "<b>Develop budget justification</b><br>Objective: Create a detailed and justified budget for the research unit. Scope: Include all anticipated expenses, such as personnel, equipment, supplies, and travel. Steps: 1. Estimate costs for each category. 2. Prepare budget justification document. 3. Obtain internal review. 4. Finalize budget. Deliverables: Complete budget justification.<br><b>Resources needed:</b><br><ul><li>Principal Investigator</li><li>Research Administrator</li><li>Accountant</li></ul>",

      "text": "Explore alternative funding sources",
      "custom_tooltip": "<b>Explore alternative funding sources</b><br>Objective: Identify and explore alternative funding sources in case of delays or insufficient funding from primary sources. Scope: Research potential funding opportunities from foundations, industry partners, and other government agencies. Steps: 1. Research funding opportunities. 2. Assess eligibility. 3. Prepare preliminary applications. Deliverables: List of potential alternative funding sources.<br><b>Resources needed:</b><br><ul><li>Principal Investigator</li><li>Grant Writer</li><li>Research Administrator</li></ul>",

    {
      "id": "e0176048-5bc5-4f6f-8b8d-938d30d165df",
      "text": "Identify Potential Recruitment Channels",
      "custom_tooltip": "<b>Identify Potential Recruitment Channels</b><br>Objective: Identify a diverse range of potential recruitment channels for the parasomnia study.\nScope: This includes online platforms, partnerships with medical professionals, and community outreach programs.\nSteps: Research potential channels, assess their suitability, and prioritize based on reach and cost-effectiveness.\nDeliverables: A list of prioritized recruitment channels with contact information and estimated reach.<br><b>Resources needed:</b><br><ul><li>Study Coordinator</li><li>Principal Investigator</li><li>Research Technicians</li></ul>",

    {
      "id": "f85072c8-99c9-4c12-911f-1b894f62725d",
      "text": "Assess Channel Suitability and Feasibility",
      "custom_tooltip": "<b>Assess Channel Suitability and Feasibility</b><br>Objective: Evaluate the suitability and feasibility of each identified recruitment channel.\nScope: This includes assessing the target audience, cost-effectiveness, and potential ethical considerations.\nSteps: Conduct market research, analyze historical data, and consult with experts.\nDeliverables: A report summarizing the suitability and feasibility of each channel, including recommendations for implementation.<br><b>Resources needed:</b><br><ul><li>Study Coordinator</li><li>Principal Investigator</li><li>Clinical Psychologist</li></ul>",

      "id": "faf27850-c287-4550-a712-f90d7a1ac249",
      "text": "Establish Formal Agreements",
      "custom_tooltip": "<b>Establish Formal Agreements</b><br>Objective: Formalize agreements with selected recruitment channels.\nScope: This includes negotiating terms, drafting contracts, and obtaining necessary approvals.\nSteps: Contact channel representatives, negotiate terms, and finalize agreements.\nDeliverables: Signed agreements with selected recruitment channels.<br><b>Resources needed:</b><br><ul><li>Study Coordinator</li><li>Principal Investigator</li><li>Legal Counsel</li></ul>",

      "text": "Develop Recruitment Materials",
      "custom_tooltip": "<b>Develop Recruitment Materials</b><br>Objective: Create compelling recruitment materials tailored to each channel.\nScope: This includes designing advertisements, writing brochures, and developing online content.\nSteps: Develop materials, obtain feedback, and revise as needed.\nDeliverables: A set of recruitment materials for each selected channel.<br><b>Resources needed:</b><br><ul><li>Study Coordinator</li><li>Research Technicians</li><li>Graphic Designer</li></ul>",

      "custom_tooltip": "<b>Define Recruitment Stringency Strategy</b>",

      "meta": "caaea1ff-0fe9-4917-9475-20d6c494f497 FS",

    {
      "id": "c335e343-19b4-46d2-b8d2-9ada3adb8df8",
      "text": "Review Literature on Stringency Criteria",
      "custom_tooltip": "<b>Review Literature on Stringency Criteria</b><br>Objective: Conduct a comprehensive review of existing literature to identify relevant and validated stringency criteria for NREM parasomnia research.\nScope: This includes searching databases (PubMed, Scopus, Web of Science) for studies on parasomnia, sleep disorders, and related neurological conditions. The review will focus on inclusion/exclusion criteria used in previous studies, their rationale, and their impact on sample characteristics and event capture.\nSteps:\n1. Define search terms and keywords.\n2. Conduct literature search.\n3. Screen articles for relevance.\n4. Extract data on stringency criteria.\n5. Summarize findings and identify potential criteria for the current study.\nDeliverables: A summary report of the literature review, including a list of potential stringency criteria and their rationale.<br><b>Resources needed:</b><br><ul><li>Principal Investigator</li><li>Postdoctoral Researchers</li><li>Literature databases</li><li>Reference management software</li></ul>",
      "start_date": "2026-11-18",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "b8e6771c-87eb-4ad3-8767-ab17f2117df3 SS",
      "parent": "b8e6771c-87eb-4ad3-8767-ab17f2117df3"
    },
    {
      "id": "97e4a4e6-e7ea-42cc-a744-d8ca4cdd5dc7",
      "text": "Consult Sleep Disorder Neurologist",
      "custom_tooltip": "<b>Consult Sleep Disorder Neurologist</b><br>Objective: Obtain expert opinion from a neurologist specializing in sleep disorders to validate the proposed stringency criteria and ensure their clinical relevance.\nScope: This involves scheduling a consultation with a neurologist, presenting the proposed criteria, and discussing their potential impact on participant selection and data interpretation.\nSteps:\n1. Identify a suitable neurologist.\n2. Schedule a consultation.\n3. Prepare a presentation of the proposed criteria.\n4. Conduct the consultation.\n5. Document the neurologist&#x27;s feedback and recommendations.\nDeliverables: A written summary of the neurologist&#x27;s feedback and recommendations, including any suggested modifications to the stringency criteria.<br><b>Resources needed:</b><br><ul><li>Principal Investigator</li><li>Neurologist</li><li>Presentation materials</li></ul>",
      "start_date": "2026-11-20",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "c335e343-19b4-46d2-b8d2-9ada3adb8df8 FS",
      "parent": "b8e6771c-87eb-4ad3-8767-ab17f2117df3"
    },
    {
      "id": "9a398a37-2b43-4463-a88f-805eff72136f",
      "text": "Pilot Test Stringency Criteria",
      "custom_tooltip": "<b>Pilot Test Stringency Criteria</b><br>Objective: Conduct a pilot test of the proposed stringency criteria to assess their feasibility and impact on participant recruitment and event capture.\nScope: This involves applying the criteria to a small sample of potential participants and evaluating the number of eligible participants, the characteristics of the recruited sample, and the number of parasomnia events captured.\nSteps:\n1. Recruit a small sample of potential participants.\n2. Apply the stringency criteria.\n3. Assess the number of eligible participants.\n4. Collect data on participant characteristics and event capture.\n5. Analyze the data and evaluate the impact of the criteria.\nDeliverables: A report summarizing the results of the pilot test, including the number of eligible participants, the characteristics of the recruited sample, and the number of parasomnia events captured.<br><b>Resources needed:</b><br><ul><li>Study Coordinator</li><li>Research Technicians</li><li>Potential participants</li><li>Data collection equipment</li></ul>",
      "start_date": "2026-11-22",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "97e4a4e6-e7ea-42cc-a744-d8ca4cdd5dc7 FS",
      "parent": "b8e6771c-87eb-4ad3-8767-ab17f2117df3"
    },
    {
      "id": "ca7389de-8206-49dc-a55e-73b1a5a75a97",
      "text": "Refine Criteria Based on Pilot Data",
      "custom_tooltip": "<b>Refine Criteria Based on Pilot Data</b><br>Objective: Refine the stringency criteria based on the results of the pilot test and the neurologist&#x27;s feedback.\nScope: This involves analyzing the pilot test data, considering the neurologist&#x27;s recommendations, and making any necessary adjustments to the criteria to optimize participant recruitment and event capture.\nSteps:\n1. Analyze the pilot test data.\n2. Review the neurologist&#x27;s feedback.\n3. Identify potential modifications to the criteria.\n4. Discuss the proposed modifications with the research team.\n5. Finalize the refined stringency criteria.\nDeliverables: A final version of the stringency criteria, incorporating the results of the pilot test and the neurologist&#x27;s feedback.<br><b>Resources needed:</b><br><ul><li>Principal Investigator</li><li>Postdoctoral Researchers</li><li>Pilot test data</li><li>Neurologist&#x27;s feedback</li></ul>",
      "start_date": "2026-11-24",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "b8e6771c-87eb-4ad3-8767-ab17f2117df3 FF, 9a398a37-2b43-4463-a88f-805eff72136f FS",
      "parent": "b8e6771c-87eb-4ad3-8767-ab17f2117df3"
    },

    {
      "id": "7c8befaf-e7b7-423b-96ff-e221f2e4ac49",
      "text": "Define EEG montage and sensor placement",
      "custom_tooltip": "<b>Define EEG montage and sensor placement</b><br>Determine the optimal EEG montage and sensor placement strategy to maximize signal quality and minimize artifacts. This includes selecting appropriate electrode locations, considering head size and shape variations, and establishing standardized procedures for sensor application.<br><b>Resources needed:</b><br><ul><li>Sleep Technologist</li><li>Neurologist</li><li>EEG equipment</li><li>EEG software</li></ul>",
      "start_date": "2026-11-26",

    },
    {
      "id": "885f94b1-ad50-4570-86e4-d22b0c44d06b",
      "text": "Establish PSG data acquisition parameters",
      "custom_tooltip": "<b>Establish PSG data acquisition parameters</b><br>Define the parameters for polysomnography (PSG) data acquisition, including sampling rates, filter settings, and impedance thresholds. This involves optimizing the settings for each channel (EEG, EOG, EMG, ECG, respiratory sensors, etc.) to ensure accurate and reliable data collection.<br><b>Resources needed:</b><br><ul><li>Sleep Technologist</li><li>PSG equipment</li><li>PSG software</li></ul>",
      "start_date": "2026-11-27",
      "duration": 1.0,
      "progress": 0,
      "open": true,
      "meta": "7c8befaf-e7b7-423b-96ff-e221f2e4ac49 FS",

    },
    {
      "id": "8e6a11d8-4501-4136-ba5c-61a6d0017a93",
      "text": "Develop data quality control procedures",
      "custom_tooltip": "<b>Develop data quality control procedures</b><br>Establish procedures for monitoring and ensuring the quality of acquired data. This includes implementing real-time artifact detection, developing protocols for addressing data quality issues, and establishing criteria for data rejection or re-acquisition.<br><b>Resources needed:</b><br><ul><li>Data Engineer</li><li>Sleep Technologist</li><li>PSG equipment</li><li>EEG equipment</li><li>Data analysis software</li></ul>",
      "start_date": "2026-11-28",
      "duration": 1.0,
      "progress": 0,

    },
    {
      "id": "e0ba4998-c102-4a68-b82e-c458872987d3",
      "text": "Pilot test data acquisition protocols",
      "custom_tooltip": "<b>Pilot test data acquisition protocols</b><br>Conduct pilot studies to evaluate the effectiveness and feasibility of the data acquisition protocols. This involves collecting data from a small number of participants, analyzing the data quality, and refining the protocols based on the results.<br><b>Resources needed:</b><br><ul><li>Sleep Technologist</li><li>Research Participants</li><li>PSG equipment</li><li>EEG equipment</li><li>Data analysis software</li></ul>",
      "start_date": "2026-11-29",

      "progress": 0,
      "open": true,
      "meta": "8e6a11d8-4501-4136-ba5c-61a6d0017a93 FS",

    },
    {
      "id": "2b74964a-8c3f-404b-b031-d49c3477cb6d",
      "text": "Document data acquisition procedures",
      "custom_tooltip": "<b>Document data acquisition procedures</b><br>Create detailed documentation of the data acquisition procedures, including step-by-step instructions, troubleshooting guides, and quality control checklists. This documentation will serve as a reference for research staff and ensure consistency in data collection across participants and time points.<br><b>Resources needed:</b><br><ul><li>Study Coordinator</li><li>Sleep Technologist</li><li>Technical Writer</li></ul>",
      "start_date": "2026-11-30",
      "duration": 1.0,
      "progress": 0,
      "open": true,
      "meta": "8aafc70a-56e5-4684-aa51-d6402d1df8e1 FF, e0ba4998-c102-4a68-b82e-c458872987d3 FS",

      "id": "e1057570-6988-47c1-bc80-83424331f95c",
      "text": "Define Staffing Coverage Model",

      "meta": "8aafc70a-56e5-4684-aa51-d6402d1df8e1 FS",

    {
      "id": "99587c7c-08ff-480f-99df-7b14f88f26bc",
      "text": "Analyze workload based on participant projections",
      "custom_tooltip": "<b>Analyze workload based on participant projections</b><br>Objective: Determine the required staffing levels based on the projected number of participants and the data collection activities involved.\nScope: This includes analyzing the time required for each data collection session, data annotation, and participant management.\nSteps: 1. Estimate the time required for each data collection activity. 2. Project the number of participants enrolled per month. 3. Calculate the total workload in hours per month. 4. Determine the number of staff required to meet the workload demands.\nDeliverables: A detailed workload analysis report with staffing recommendations.<br><b>Resources needed:</b><br><ul><li>Principal Investigator</li><li>Study Coordinator</li><li>Data Engineer</li></ul>",
      "start_date": "2026-12-01",
      "duration": 3.0,
      "progress": 0,
      "open": true,
      "meta": "e1057570-6988-47c1-bc80-83424331f95c SS",
